body:
  text: 欽定四庫全書四川通志卷一圖考河出圖洛出書聖人則之嗣是豳風禹貢及周書王會之篇類皆有圖圖固與書相為參考者也蜀為梁州之域提封數千餘里山水甲天下以之繪圖足標竒勝矣不寧惟是凡星野之躔度疆域之險易城郭之大小與夫川塗陸道及東西南北之廣袤莫不粲然陳列則聖天子九重端拱而邊疆要地一覽靡遺美哉金湯之固國之寶也作圖考志圖目天文全圖分野圖全省輿圖江源圖都江堰圖都江灌溉圖成都金水河圖峩眉山圖成都府輿圖重慶府輿圖保寧府輿圖順慶府輿圖敘州府輿圖夔州府輿圖龍安府輿圖寧逺府輿圖雅州府輿圖直𨽻嘉定州輿圖雍正十二年升為府直𨽻眉州輿圖直𨽻卭州輿圖直𨽻潼川州輿圖雍正十二年升為府直𨽻瀘州輿圖直𨽻資州輿圖直𨽻綿州輿圖直𨽻茂州輿圖直𨽻達州輿圖直𨽻敘永廳輿圖直𨽻雷波衛輿圖惠逺廟圖裡塘輿圖諸葛武侯八陳圖諸葛武侯銅鼓圖星野易曰在天成象在地成形周禮保章氏以星土辨九州蓋文曜麗乎天而因是可辨其方位則秉陽而垂日星秉隂而竅乎山川固可參互考定矣蜀為井鬼分野史記天官書謂益州為參分又河圖括地象云岷山之地上有井絡言岷山之精上為井星也今聖天子欽若時憲握經緯之樞紐協箕畢於羣情其求天道於人事者至詳且悉以故泰階常平衆星拱極蜀雖僻壤而井明而端參明而大當亦觀乎天文者所樂覩也作星野志史記天官書二十八舍主十二州益州為參分漢書巴蜀分井鬼參又云觜觿參主益州晉書天文志自東井十六度至栁八度為鶉首又參七度益州入隋書益州分參丹元子步天籟天帝西垣第四星曰巴五曰蜀唐書劒南道分井鬼又云南戒自岷山嶓冢實地之陽宋史益梓利夔四路分井鬼又曰東井輿鬼鶉首也盡巴蜀漢中之地河圖括地象岷山之下為井絡帝以會昌神以建福言蜀之分野也午山張庭云井絡即鶉首華陽國志仰稟參伐蜀紀帝居房心決事參伐是為蜀分天文占候太白主畢觜鎮星主井五車卿星弧矢星俱主益州天文次舍井十度至鬼栁為鶉首於辰在未成都府屬井鬼之分入參一度為鶉首之次重慶府屬井鬼之分入參三度保寧府屬井鬼之分入參七度順慶府屬參井之分鶉首之次敘州府屬井鬼之分入參三度為鶉首之次夔州府屬翼軫之分龍安府屬井鬼之分入參二度寧逺府屬井鬼分野雅州府屬井鬼之分入參一度直𨽻嘉定州屬雍正十二年升為府井鬼之分入參四度直𨽻眉州屬井鬼之分入參三度直𨽻卭州屬井鬼之分入參一度直𨽻潼川州屬雍正十二年升為府觜參之分入觜一度直𨽻瀘州屬井鬼之分入參四度直𨽻資州屬井鬼之分入參一度當鶉首之次直𨽻綿州屬星躔井參直𨽻茂州屬井鬼之分入參一度當鶉首之次直𨽻達州屬軫翼之分四川通志卷一
