body:
  text: 四川通志卷五上戶口周禮遂大夫以歲時稽夫家之衆寡及三年大比以萬民之數詔司寇司寇於孟冬祀司民日獻其數於王王拜受之登於天府凡以重民數也蜀自漢唐以來生齒頗繁煙火相望及明末兵燹之餘采葍遷徙丁戶稀若晨星我朝嘉惠元元休養生息多歷年所蜀中元氣既復民數日增人浮八口之家邑登萬戶之衆盈寧富庶雖厯代全盛之時未能比隆於今日也作戶口志成都府屬三十一州縣全書開載明季原額人丁一十三萬九百五十三丁八斗內溫江縣折去四百五十一丁實編一十三萬五百二丁八斗國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名一十二萬七十六户人丁三萬五千四百一十六丁四分三釐五毫八絲六微六塵九纎八沙九渺八末雍正六年奉行清丈除分設資綿茂三州後實存府屬一十六州縣新舊實在承糧花戶五萬九百三十四戶重慶府屬二十州縣及石砫酉陽石耶地壩平茶邑梅六土司全書開載明季原額人丁一十三萬六千一百九十八丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名一十一萬一千八百五十四戶人丁一萬四千五百九十二丁三分二釐五毫一絲四忽四微雍正六年奉行清丈除安居武隆二縣未開復實存府屬一十八州縣新舊實在承糧花戶九萬一千七百三十九戶保寧府屬一十州縣全書開載明季原額人丁六萬七千一丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名三萬六千六百一十五戶人丁一萬五千二百三十二丁六分八釐九毫四絲六忽九微六塵四纎雍正六年奉行清丈除撥梓潼分屬綿州後實存府屬九州縣新舊實在承糧花戶三萬三千一百八十一戶順慶府屬十州縣全書開載明季原額人丁七萬三百七十七丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名五萬八千七百九十三户人丁一萬二十四丁六分七絲四忽一塵四纎五沙六渺雍正六年奉行清丈新舊實在承糧花戶四萬七千五百五十八户敘州府屬十二廳縣全書開載明季原額人丁六萬二千一百五十八丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名四萬九千八百七十四戶人丁一萬五千三丁七斗六升九合四勺四抄二撮一圭五粒四粟五末雍正六年奉行清丈府屬及新併屏山縣內除改設直𨽻敘永廳外實存十一縣一廳新舊實在承糧花戶三萬五千四百二十一戶直𨽻敘永廳併屬永寧一縣今自雍正九年歸併改設後開載新舊通共實在承糧花戶六千六百四十戶直𨽻雷波衛併屬黃螂一所國朝雍正八年新設至雍正十一年清查報部番民户名一千二十八戶夔州府屬一十三州縣全書開載明季原額人丁三萬四千二百丁大寧縣奉文審增三千一百四十丁太平縣審增八丁共三萬七千三百四十八丁除達州東鄉太平開除七十四丁實編三萬七千二百七十四丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名六萬九千一百七十八戶人丁七千六百四十四丁九分三釐九毫七絲二忽二微四塵一纎四沙六渺雍正六年奉行清丈除大昌歸併巫山又撥達州東鄉太平分設直𨽻後實存府屬九縣新舊實在承糧花戶二萬七千三百六戶龍安府屬三縣全書開載明季原額人丁一萬四千四百一十一丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名九千三十三戶人丁五千五十三丁四分二釐五毫雍正六年奉行清丈新收松潘衛彰明縣共四縣一衛新舊實在承糧花户七千七百五十戶寧遠府屬一州三縣一衛三所全書開載明季原額丁戶未經開載無憑纂入國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名二千八百三十八戶雍正六年奉行清丈新舊實在承糧花户一萬四千七百五十戶雅州府屬六州縣全書開載明季原額人丁一萬一百二十丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名九千七十一户人丁五千二百八十一丁六斗五合五勺七抄五撮六圭一粒四粟雍正六年奉行清丈新舊實在承糧花戶一萬一千五百八十五戶直𨽻嘉定州併屬七州縣全書開載雍正十二年升為府明季原額人丁三萬一千六百七十五丁二斗三升國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名一萬一千五百八十五户人丁一萬四百五丁六斗一升四合六勺六抄六撮五圭一粒一粟一末雍正六年奉行清丈新舊實在承糧花戶五萬三百一十四戶直𨽻眉州併屬四州縣全書開載明季原額人丁一萬六千九百九十二丁半國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名二萬八百九戶人丁三千二百九十六丁七升八合六勺五抄八撮二圭四粒二粟八末雍正六年奉行清丈新舊實在承糧花戶九千八百六十二戶直𨽻卭州併屬三州縣全書開載明季原額人丁一萬五千一十三丁五斗國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名九千八百六十二戶人丁六千三百一丁六斗三升四合九勺一抄九撮一圭九粒雍正六年奉行清丈新舊實在承糧花戶一萬五千二百四十七戶直𨽻潼川州併屬八州縣全書開載雍正十二年升為府明季原額人丁五萬二千七百三丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名五萬五千一百三十五戶人丁一萬四百九十丁五分九釐五毫二忽七微五塵九纎三沙三渺四末雍正六年奉行清丈新舊實在承糧花戶三萬一千七百八十九戶直𨽻瀘州併屬四州縣全書開載明季原額人丁三萬七千五百三十六丁國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著自首開墾報部戶名一萬四千五百三十五戶人丁五千四百一十七丁七斗二升六合五勺四抄五撮五圭五粒五粟雍正六年奉行清丈新舊實在承糧花戶一萬五千七百二十九戶九姓司全書舊未開載原額人丁戶口數目款項無憑載入國朝以來陸續奉行清查至康熙六十一年徵輸止查出土著實在承糧花戶五十一戶直𨽻資州併屬五州縣全書舊未開載原額人丁戶口數目款項無憑載入雍正六年改設直𨽻清丈出實在承糧花戶一萬七千四百七十三戶直𨽻綿州併屬六州縣全書舊未開載原額人丁戶口數目款項無憑載入雍正六年改設直𨽻清丈出實在承糧花戶一萬四千八百九十二户直𨽻茂州併屬三州縣全書舊未開載原額人丁戶口數目款項無憑載入雍正六年改設直𨽻清丈出實在承糧花戶四千七十一戶直𨽻達州併屬三州縣全書舊未開載原額人丁戶口數目款項無憑載入雍正六年改設直𨽻清丈出實在承糧花戶一萬八千九十八戶田賦華陽黑水在禹服為梁州厥土青黎田惟下上賦則下中三錯固未得與雍冀諸州埒也沃野千里以環繞省會之地言之外此則崇山峻嶺鮮原隰平衍之區以故蜀之田賦於經費多未敷焉我朝定賦悉因往制而斟酌損益之撫字維殷催科不擾蓋勤恤小人之依為巳至矣猶念遠疆編户未免虞芮之訟命使乘傳遍厯田間履畝正界爭端永息由是食德服疇田野日闢書曰咸則三壤又曰以庶邦惟正之供蜀民當此薄斂深耕之際致足樂也作田賦志四川布政司明萬厯原額官民田地通共一十三萬四千八百二十七頃六十七畝二分三釐八毫二絲五忽五微六纎官田二千九百二十二頃三十五畝四分八釐二毫五絲六忽一微民田一十三萬一千九百五頃三十一畝七分五釐五毫六絲九忽四微六纎夏稅秋糧通共一百二萬八千五百四十五石一斗三升三合一勺七抄一撮九圭八粒二粟夏稅米三十萬九千八百九十二石一斗六升四合二勺六抄六撮九圭四粒起運米二十七萬二千二百五十石四斗一升四合九勺五抄八圭四粒折布米六百六石五升折布一千二百一十三匹荒絲米六千六百四十石三斗二升六合二抄六撮二圭五粒該絲六千六百四十斤零五兩二錢一分六釐四毫二絲遇閏加絲五百五十三斤零七兩七錢一分二釐三毫八絲九忽三微二纎二沙存留米三萬三百九十四石九斗二升三合二勺八抄九撮八圭五粒秋糧米七十一萬八千六百五十二石九斗六升八勺四抄五撮四粒三粟起運米五十六萬五千七百二十九石六升三合一勺二抄四撮五圭五粒三粟折布米七萬九千五百四十七石五斗折布一十五萬九千九十五匹存留米七萬三千三百七十六石四斗五合六勺五圭九粒地畝綿花七萬三百八十九斤二錢四分二釐一毫一絲國朝康熙十年原額實熟田地通共一萬四千八百一十頃三十六畝五分三釐二毫二絲九忽四微七塵七纎九沙七渺又下地估糧一千六百一十六石一斗二升九合通共載稅糧三萬八百二十八石八斗九升四合三勺四抄二撮七粒一粟四沙共徵丁條屯糧銀三萬八千四百兩二錢二分九釐二毫九絲二忽二微四塵三纎二沙八渺該本色京斗米荍豆共八千九百六十四石九斗四升一合九勺六抄一撮八粒四粟又土司見載折徵糧銀三百八十二兩三錢三釐又營兵開墾田地八十七頃五十二畝九分六釐一毫六絲一忽八微載糧五十石四斗一升六合九勺六圭六粒三粟應徵條糧銀一百七兩八錢二分一毫八絲七忽二微七纎三渺康熙十一年至雍正五年開墾及自首隱匿實熟上中下田地通共二十二萬三千二百三十一頃三十七畝五分四釐六毫二絲八忽一微三塵七沙八渺共徵丁條糧銀通共三十三萬九千二百二十七兩三錢九分八毫八絲四忽一微四塵九纎七沙八渺雍正六年奉行清丈除遵義烏蒙分撥雲貴外實熟上中下田地通共四十三萬一千二百二十一頃五畝二分五釐四毫七絲九忽五微三塵三纎共徵丁條糧銀六十三萬四千九百五十一兩九錢一分八釐六毫九忽三微二塵九纎一沙七渺荒下田地共二萬七千八百六頃七十八畝四分一毫四絲一忽共該徵丁條糧銀二萬一千四百七十四兩四錢四分五釐四絲四忽六微八塵九纎二項通共田地四十五萬九千二十七頃八十三畝六分五釐六毫二絲五微三塵三纎二項通共徵丁條糧銀六十五萬六千四百二十六兩三錢六分三釐六毫五絲四忽一塵八纎凡所屬應徵丁條糧銀額數仍開載各府州項下成都府屬三十一州縣全書開載明季原額稅糧一十五萬七千七百二十九石六斗四升一合四勺一抄三撮三圭三粒內除先年裁革官員減米并綿竹縣免徵米羅江縣水衝糧通共五百石七斗一升八合八勺四抄實徵糧一十五萬七千二百二十八石九斗二升二合四勺七抄三撮三圭三粒國朝以來陸續奉行清查至康熙六十一年徵輸止自首開墾新舊報部上中下學田地共六萬六千二百二十六頃一十九畝三釐一毫一絲五忽五微七塵八纎一沙七渺載糧蕎麥四萬一千一百八十九石四斗八升八合九抄七撮三圭三粒五粟四末六漠實徵載丁條糧銀八萬七千七百八十六兩四錢五分七釐一毫二忽九微七塵一纎一沙九渺雍正六年奉行清丈除分設資綿茂三州外實存府屬十六州縣新舊通共上中下田地六萬六千一百四十一頃八十畝七分三釐七毫六忽八微五塵九纎共徵丁條糧銀九萬四千四百二十四兩九錢一分三釐八毫二絲一忽四微二塵二纎荒下田地共一千五百六十五頃七十