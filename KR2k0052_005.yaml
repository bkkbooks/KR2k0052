升平六十餘載兹當嗣位之始宜隆祀享之儀特遣專官虔申昭告惟冀時和歲稔物阜民安淳風遍洽乎寰區厚德長敷於率土神其歆格鑒此精誠維雍正三年嵗次乙巳四月戊辰朔越二十八日乙未皇帝遣四川巡撫王景灝致祭於江瀆之神曰惟神肇源岷山作紀南國百川吐納九派朝宗朕撫馭寰區考稽典禮將祈福以庇民宜加封而致祭爰命所司崇神封號曰南瀆涵和大江之神所冀波瀾永息蒸黎獲利濟之安風雨以時稼穡享屢豐之慶神其昭鑒來饗苾芬先農壇祭文維雍正年嵗次月朔日某官某某等致祭於先農之神曰惟神肇興農事萬世永賴兹當東作之時躬耕藉田祈諸物豐茂為民立命謹以牲帛酒醴庶品之儀致祭尚饗祀先師孔子樂章迎神樂奏咸平之章大哉至聖峻德𢎞功敷文衍化百王是崇典則有常昭兹辟雍有虔簠簋有嚴鼓鐘初獻樂奏寧平之章覺我生民陶鑄前聖巍巍泰山實豫景行禮備樂和豆籩惟靜既述六經爰斟三正亞獻樂奏安平之章至哉聖師天授明德木鐸萬世式是羣辟清酒惟醑言觀秉翟太和常流英材斯植終獻樂奏景平之章猗歟素王示豫物軌瞻之在前神其寧止酌彼金罍惟清且旨登獻既終弗遐有喜徹饌樂奏咸平之章璧水淵淵崇牙嶪嶪既歆宣聖亦儀十哲聲金振玉告兹將徹鬷假有成羮牆靡愒送神樂奏咸平之章煌煌學宫四方來宗甄陶胄子暨豫微躬思皇多士膚奏厥功佐豫永清三五是隆先農壇樂章迎神樂奏永豐之章勾芒秉命土牛是驅天下一人蒼龍駕車念彼田疇民命所需生成有德尚式臨諸奠帛初獻樂奏時豐之章先農神哉耒耜教民田祖靈哉稼穡是親功德深厚天地同仁肅將幣帛肇舉明禋厥初生民萬彚莫辨神錫之庥嘉種乃誕執兹醴齊農功益見玉瓚椒醑肅雍舉奠亞獻樂奏咸豐之章上原下隰百穀盈止粒我生民秀良興起樂舞具備吹豳稱兕再躋以獻肴馨酒旨終獻樂奏大豐之章穈芭秬秠維神所貽以神饗神曰豫將之秉耒三推東作允宜五風十雨率土何私徹饌樂奏屢豐之章於皇農事自古為烈莫敢不承今兹欣悅籩豆既豐簠簋云潔神視井疆執事告徹送神樂奏報豐之章麻麥芃芃粳稻連阡縱橫萬里皆神所瞻人歌鼓腹史載有年嵗有常典茀祿綿延望瘞樂奏慶豐之章玉版蒼幣來監來歆敬之重之藏於厚深典禮由古豫行自今樂樂利利國以永寧四川巡撫請給丁祭正項疏題為祭祀國之大典懇乞轉詳題請給發經費銀兩以光盛舉以垂永久事康熙十一年閏七月十三日據布政司金俊呈稱據成都府詳據成都縣詳前事該臣看得春秋祭祀所以尊崇先聖昭格羣神誠朝廷之巨典而守土之臣所當恪恭而不敢褻越者也查成都府屬春秋二祭向係各官捐備原非經久是以前撫臣張德地於康熙七年二月二十六日為詳請春秋祭需等事疏內議成都府每嵗丁戌等祭於條糧銀內動支五十四兩四錢一分具題部覆以請旨酌省存留錢糧事疏內將蜀省春秋祭祀文廟及各壇廟祠等處銀一百一十五兩存留應用今該撫欲動正項錢糧殊屬不合查照前行遵奉可也等因轉行在案今據布政司金俊詳稱前項存留銀兩乃係建昌等衛未經清丈時照舊例折徵丁銀於祭需內費用後建昌已經清丈則此項銀兩已改徵條糧故厯年以來仍係各官捐備賦役全書開載可考但祭祀關係大典若令有司捐備恐其派纍窮簷議以成都為省會之區蒸嘗全設歲應動銀五十二兩三錢三分其餘各府州縣衛每嵗量動銀一十六兩以資備辦通計闔屬每年共該銀二千七十二兩三錢三分請於條糧屯租米折銀兩動支以光祀典可否準從應聽部議上請睿裁既據詳請前來除將原册送部外理合具題伏乞皇上敕部議覆施行謹題請旨康熙十一年閏七月二十四日題奉旨該部議奏康熙十一年十一月十五日準戶部咨為祭祀國之大典等事四川清吏司案呈奉本部送戶科抄出該本部覆川撫題前事等因康熙十一年閏七月二十六日題九月十一日奉旨該部議奏欽此欽遵於本月十二日抄出到部該臣等查得四川巡撫疏稱春秋祭祀關係大典成都為省會之區蒸嘗全設嵗應用銀五十二兩三錢三分其餘各府州縣衛每嵗量用銀一十六兩若仍令有司捐助恐其派纍小民亦不可定通計闔屬每年共該銀二千七十二兩三錢三分請於條糧等項銀內動支以光祀典等因題請前來查直𨽻各省春秋祭祀所需銀兩俱於存留項下銀內支給但川省無存留錢糧故一應祭祀係各官捐用原係一時權宜今該撫既稱祭祀關係大典若仍令有司捐備恐派纍小民亦不可定請於條糧銀內動支應如該撫所奏於康熙十二年為始照數動支仍將用過數目造入奏銷册內具題以憑查核可也等因康熙十一年九月十九日題本月二十六日奉旨依議欽此欽遵抄出送司奉此案呈到部擬合就行為此合咨前去煩為查照本部覆奉旨內事理欽遵施行四川巡撫請復武侯祠祀典疏題為武侯廟貌重新闔郡士民鼓舞懇順輿情請頒祀典以光前哲事康熙十一年九月十一日據布政司布政使金俊會同按察司署司事分巡川東道僉事曹禮先提學道僉事張含輝詳奉院批據成都府屬貢監生員李培李元吉彭如珍耆老楊有功李躍龍等呈前事詞稱竊照祀事之設所以尊崇有功隆禮先賢實興起教化之大端也伏見漢諸葛武侯才兼文武德合聖賢以淡泊寧靜為居躬以開誠布公為治法精忠大節炳蔚古今六合之內無不敬仰而當年惠澤尤在全川白叟黃童咸知愛戴自西晉迄明一千四百餘年廟宇長新蒸嘗勿替載之史册傳自詩歌蓋確然可據也况厯來水旱災傷有禱輒應福國祐民實有攸藉慨遭兵火之後舊祠煨燼都人士女經過欷歔兹賴原任按察使司宋可發景行昔賢訪尋遺址鳩工庀材毅然身任重建祠宇塑侯遺像厥功告成闔郡士民共相瞻禮以手加額咸謂從此仰賴神庥殘川庶有起色方擬具詳本院特疏以聞請復祀典因升廣東布政使刻期赴任未遑詳請培等思有功於國惠愛及民考之祭法允稱符合且武侯明德冠冕羣倫幸際盛朝宜崇祀典若使馨香罔薦何以昭式來兹况值院憲撫綏全蜀潔己勤民一本輿情以彰公好修廢舉墜在所當先伏乞俯循舊制早為題請用昭式廬封墓之聖恩兼舉崇德報功之大典永光俎豆千載不渝等情奉批據呈武侯精忠大節且為蜀民遺愛厯來水旱災傷有禱輒應福國祐民宜在祀列應否題請崇祀仰布政司會同按察司提學道查例確議報繳奉此該本司會同按察司提學道查議得國有祀典所以報功而古之名賢忠義大節凛然如在用能風勵後人綱維名教蓋所稱功被萬世者也舉而祀之斯可以鼓舞天下而昭示來兹矣祭法曰法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之漢諸葛武侯神靈英爽可謂兼之矣當羣雄割據之時以一身兼將相之任顯烈精忠卓絶今古而其保乂全蜀教養斯民史册昭然實有足據所由廟食兹土厯千四百年而莫之廢也兵燹之後舊祠已毁荒煙蔓草過者悽愴蓋以厯來旱潦禱祀侯祠最為靈應今廟貌已完祀典未復據貢監生員李培李元吉彭如珍耆民楊有功李躍龍等具呈本院懇為題請祀典荷蒙批行查議苐蜀省屢經劫難舊案無稽然仰遵古訓祭法所載侯之應祀非止一端方今時值升平正當講求典禮以垂永久本司道竊見山西省蒲州關聖帝廟已蒙敕賜春秋祭祀每年現同文廟丁祭一並舉行况武侯與聖帝同仕蜀漢尢宜尊禮原其至德略無異同相應並崇俎豆各表忠貞用俾後人咸知觀感所謂法施於民莫大乎此也至於春秋所需備祭各季酌用銀四兩為數無幾請於缺官俸紅銀兩內照數動支年終報銷相應一並詳明伏乞俯順民情具題等因到臣據此該臣等看得諸葛武侯竒才天授忠義性成原其行已立朝允堪垂範後世當年保乂梁益澤被民生自晉迄明廟食已久有祠在成都府城南門外因遭兵火舊迹無存原任按察使司今升廣東布政使宋可發訪尋遺址請詳督撫提鎮勸諭各屬共捐俸資重新立廟兹據府屬士民呈稱厯來千四百年蒸嘗勿替水旱災傷禱之輒應請復祀典以答神庥考之祭法允為符合臣行據布政司金俊會同按察司署司事分巡川東道曹禮先提學道僉事張含輝查議比照山西省蒲州關聖帝廟已蒙敕賜春秋祭祀武侯功德方之聖帝同出一揆而且福祐民生弭災捍患相應並列祀典以示優崇據議每季約用祭祀銀四兩春秋二季共用銀八兩請於缺官俸紅銀內動支年終報銷臣思為政之體惟當順適民情况乎尊禮先賢尤關興起教化則修復武侯祭祀洵屬可行今據該司道金俊等詳議前來理合具題伏乞皇上敕部議覆施行康熙十一年九月二十五日題奉旨該部議奏康熙十二年正月初四日準禮部咨為武侯廟貌重新闔郡士民鼓舞懇順輿情請頒祀典以光前哲事禮科抄出該本部題覆四川巡撫題前事內開該臣等議得據四川巡撫疏稱該臣等看得漢諸葛武侯澤被民生有祠在成都府城南門外因遭兵火舊迹無存共捐俸資從新立廟比照山西省蒲州關聖帝廟已蒙敕賜春秋祭祀武侯功德方之聖帝相應並列祀典伏乞皇上敕部議覆施行等語查得諸葛武侯功髙績著見在配祀歷代帝王廟其該撫題請諸葛武侯二次致祭之處無庸議等因康熙十一年十一月十八日題本月二十日奉旨著照該撫所奏行欽此四川通志卷五下
