捕官以弭盜復奉節縣學以育才大寧雲安鹽課溢額楚蜀馬船更遞甚為民病悉請罷之旋督蜀學所取稱得人云徐禎稷號厚源松江人父三重以理學名世及禎稷繼成進士清白世其家天啓間以部曹出守夔州律己嚴與人恕吏民愛戴御史毛羽健按蜀稱其才守並超特疏薦之禎稷薄於宦情纍遷憲職不赴龍安府梁李龍遷武帝普通三年土豪楊傑據龍州武陵王蕭紀鎮益州以龍州為鄧艾取蜀捷徑遂命龍遷為守築城捍蔽一方民德之大通三年卒葬牛心山側鄉人立祠祀之歷代封龍州土主明革去淫祀以龍遷有功於民仍命有司春秋致祭云魏裴果西魏龍州刺史土賊張遁等寇州果擊破之州境晏然周辛昻狄道人後周時為龍州刺史領郡事州帶山谷民俗多梗昻威惠洽著吏民畏而愛之陸騰後周時為龍州刺史通江油路直抵南秦州孝文謂之曰此是卿取柱國之日後位開府平巫蠻之亂隋和洪汝南人以戰功纍遷車騎大將軍儀同三司時土蠻任公欣李國立等聚衆為亂刺史獨孤善不能禦朝議以洪有武略代善為刺史月餘擒公欣國立皆斬之餘黨悉平何妥郫縣人少機敏有才辨初事梁湘東王後仕隋上疏言八事與蘇威有隙出為龍州刺史有負笈從遊者妥為講究學者皆敬禮之嘗作刺史針勒石州門官至國子祭酒卒諡曰肅唐雍無逸大厯中龍州别駕吐蕃入寇無逸夜襲其衆破之以功封什邡縣男蘇邈事實舊志闕尉遲説長慶中刺史冇善政及民宋宋祺字叔寶幽州薊人晉天福六年舉進士宋太祖建隆中召拜左補闕開封府推官出知龍州周知人情尤通吏術太宗召赴闕歷同平章事吳濟大中祥符五年為龍州知州始興學校教授生徒李莊嘉祐中知龍州有善政張上行德陽人元豐進士為石泉令夷人寇邊上行言於蜀帥孫羲叟曰吐蕃有兩道一由青川抵松茂一由綿州抵雞城今石泉威蕃亭最為要害宜先築堡以禦之次升石泉為軍以重其權然後調思黔土軍以討之蔑不濟矣羲叟用上行計大破之邊境帖然蜀賴其惠趙善齡政和元年為龍州知州多政績尤以文學名於時有龍陽十咏詩魏禧平涼人紹興初為石泉令凡官廨學校城郭創建悉備治功懋著民思不忘因立祠栖雞山祀之史祁乾道七年知龍州重修學校尤多題詠王稱淳熙十六年龍州知州有治聲後召為尚書吏部侍郎洪咨夔於潛人嘉泰二年進士寶慶中知州事州貢麩金率科礦戶咨夔嘆曰將奉上乃厲民乎出官錢市之江油之民歲戌邊苦運餉為請於漕司免之毁鄧艾廟改祀武侯歷官學士卒諡忠文薛巖景定間知龍州以守城有功世襲龍州知府謝伯林知江油嘗興水利開赤甲等堰書養生潭三字石刻尚存元王祥元帥府制使羌夷桀驁獨當一面大軍取蜀助餉轉輸又能聘賢訓士敦尚儉朴龍之科第接踵土俗淳厚皆祥之遺教也李仁廣龍州同知性剛直善騎射羌戎帖服元兵取蜀首先歸附朝廷嘉其順賜世襲明薛文勝洪武初知龍州率兵從征松潘開路修橋供給軍餉及克松潘遂留安撫招降生番甚衆薛繼賢洪武間知龍州公勤愛民修學校創橋梁州人愛而頌之周伯汶泰和人洪武中知江油撫字有方以善政稱蔣貴松潘副總兵宣德中偕方正分剿叛羌身先士卒厥功良多寇深唐縣人監生正統間以僉都御史鎮守松潘瞻視有威將士事之如神番人款服邊境寧謐完城堡修道路不時巡督諸寨凜然又疊溪無井深濬暗竇數里外引水入城又添永鎮等堡蜀之門户始固景泰初召還遷左都御史死於曹欽之難諡莊肅劉綱青州所千户正統間破上江賊有功升指揮僉事羅綺磁州人進士為刑部侍郎景泰二年撫治松潘多智勇深得邊情犯者輒殺不宥威州寨帥王永煽動上下五族欲拒南路綺一舉殄之自是不敢擾邊復興學育才文教蔚起邊氓感化為豎安邊政績碑馬雲成化中以副將征進疉溪智勇兼備身先士卒督軍往來東南二路夷人畏懾潛伏邊境凛然澆或成化間以副總兵征松茂謀勇過人督率軍士搜羅山寨夷人逺遁迄今威望尚存鄒濙麻城人成化中知石泉時經番夷之害民多逃徙濙善招撫復業者甚衆丘顒常熟人成化間彰明縣丞愛民息盜百姓樂業刻像祀之范輅柳州人正德間進士拜御史以直言謫龍州經歷修學宫以教士子立漏澤園以瘞枯骨所著有范龍州遠咎子集行於世張倫鞏縣人松潘衛前所副千户正德十年邊酋侵犯松潘地名黃勝草場倫率軍斬獲甚衆巡撫馬昊奏四川西南危地一旦聞賊人心搖動張倫乃能拒敵大有斬獲俾逆番逺遁厥績良多宜用優賞以鼓勵邊鄙將士乃升倫指揮僉事世襲後又殺惡番八大根等纍升小河參軍潘大武普定人嘉靖中知江油城中多火災公具冠服拜火火自熄革去平番戊卒及金井夫銀民便之黃國華豐城人進士隆慶中守龍安時郡新設賦繁重國華務節省一時汰革殆盡萬厯初入覲卒於京卒之前一日猶議陳地方利病其盡心民事如此訃聞士民哀悼立祠祀之胡昶永昌舉人萬厯二十三年知石泉清操有古人風民仰其亷周藎臣黃岡舉人天啓間任知縣清操有善政民思之林有麟號衷齋華亭人父景㿩萬厯間有聲諌垣天啓七年有麟以任子自刑曹出守龍安時蜀定奢氏之亂所在喘息甫寧將士驕悍有麟悉心休養約束兵辨皆肅然奉令而給餉以時賞勞優厚將吏更相悅服境外諸番所得歲賜茶繒無或浮冒皆感激拜舞上官深器重之遂署監軍道事親履要害捐資練兵三百餘人皆一以當十又修治學宫纂輯郡志自江南經史古今文集分布黌舍課令誦習又以邊州命諸生習騎射亦懸賞以勸之刻有射法成書又建議龍安為省會北門宜於秦蜀之交益兵駐鎮以壯鎖鑰會有麟引疾去事不果行崇禎之季秦冦披猖蜀北蜀勢不支人乃服其先識在官二載百廢具舉案無留事龍人目為林青天去之日哭泣奔送者三百餘里寧逺府漢任貴為越巂郡太守建武中卦為國王蜀漢張嶷蜀延熙間為越巂太守招集蠻酋結以恩信繕治城郭番夷男女莫不效力在郡十五年邊境賴之梁王紀梁益都督武帝時建寧越巂叛紀開通道路撫定夷戎隋梁毗開皇四年為西寧州刺史不受夷人餽金在州十一年徵為大理卿唐常仁壽為南寧州都督寄治越巂將兵循洱西河開地數千餘里尋詒置七州十五縣酋豪來見授以牧宰威令簡肅人皆安悅元談澄中統間西南夷羅羅斯內附世祖以澄文武兼資授副都元帥同知宣慰司事至境諭夷曰皇王一視同仁特置大帥安輯招懷非有所徵求於汝也夷人大悅明劉遜安福人由進士任御史忤中貴調外又以不阿王府謫建昌行都司都事撫按藩臬重之委署合州崇慶金堂精明果決民不稱冤人人感泣魯毅蘄水人寧番衛指揮洪武中裕嚕特穆爾反攻圍城池時衛初設百度未舉毅運謀撫衆與士卒同甘苦晝夜拒守伺賊怠擊破之圍始解以功升遼東都指揮使富好禮前順慶府同知憫瀘河嵐瘴又相嶺路甚險乃自鎮西所開路通至峩眉名曰春山路土人勒碑頌之周光鎬監軍駐越巂制兵恤民建學造士有遺碑尚在張東臯重修越巂衛城清文屯田軍民服其公平鄧思啓添設越巂營壘安兵措餉造士恤民卓有成效著兵政録雅州府唐王果雅州刺史多惠政士民德之韋臯西川節度使於黎州築要衛等城與東蠻共擊吐蕃前後斬首至萬餘級善撫士卒蜀人德之見其遺像必拜李德裕西川節度使番人入寇民不聊生德裕置雄邊子弟共築仗義城以制大渡清溪關之衝作禦武城以控榮經掎角之勢作柔逺城以拒西山吐蕃復邛崍關徙巂州治臺磴以奪蠻險逺民乃安五代王賁雅州刺史于著為百丈主簿皆有政績賁尤善書筆法精妙高曩閣藏烏思藏戎國人孟知祥據蜀閣藏招撫部落歸附賜世勳二字世襲天全安撫宋許仲宣四川轉運使開寶中西南夷寇掠邊境仲宣親至大渡河諭以逆順示以威福夷人率服曹光實義軍都指揮王全斌平蜀殘冦猶據沈黎光實討平之遂以光實知雅州安集勞來蠻落懷服遷黎州刺史侍其曙大中祥符初黎州夷亂詔曙乘驛招撫之許其酋首納款復與殺牲為誓所至皆降孫構知黎州時夷酋數擾邊構用間殺之蜀帥吕公弼上其事擢知真州蕭定基明道間知黎州有善政歲歉賑活飢民甚衆初黎州無舉進士者定基教育有方文風丕振踰年貢禮部遂得數人裴子良皇祐間知黎州儂智高反聲言入南詔犯蜀州人情危懼子良能以鎮靜待之民始安堵雷簡夫至和初儂智高走入雲南蜀人驚怖益州守張方平薦知雅州既至蜀人遂安蘇洵攜二子來謁簡夫力薦之由是父子著名李良臣知雅州亷能著於邊徼吕由聖河南人誨之子在郡八年去任日傾城攀餞人多垂泣吕由誠字子明由聖之弟臨事精敏有惠於民昆弟相繼為守郡人建棣華堂孫侯嘉祐末知黎州時邛部夷酋反覆不常屢為州患侯率師戮之立其弟為土目范鼎臣治平初知黎州督戍卒治隍塹數歲畢功民不知役進士鄧復亨為循吏傳以美之郭綸黎州都監官滿貧不能歸權嘉州鹽稅蘇軾詩河西猛士無人識日暮津亭闍過船路人俱知驄馬瘦不知鐵槊大如椽因言西方久不戰截髮願作萬騎先我常憑軾與屬目看君飛矢射蠻氈丘常崇寧間縣令有惠政宇文常政和末知黎州有上書乞於大渡河外置城邑以便互市者詔訪於常常言太祖觀蜀地圖畫大渡為境歷百五十年無夷患今若於河外為城邑邊隙寢開非中國之福也乃止孫偉宣和間知黎州飲食外不市一物比去謂人曰吾所愧古人者囊中有十金耳先是偉之官丞相張方平笑曰沈黎亷者不往往者不亷偉默然不答後竟以廉潔稱之宋南強豐縣人父汝為使劉豫勉豫以忠義被留幾死後亡歸獻恢復大略秦檜欲殺之變姓名入青城山卒檜死南強哀訴於朝擢知雅州房咸知蘆山有政績尤以文名郭公壽知雅州推誠愛民嘗旱祈雨輒應州人立像祀之楊仁知雅州興學勸農士民德之李燾雅州推官時欲增簡州鹽策燾力爭之蒞事精明豪強斂迹公餘力學博稽典籍虞允文紹興初為名山令清溪橋茶廳前梅槐成行皆其手植遺墨尚存後權知黎州有旨下制司貿上品珍珠蓋秦檜意也帥府承奉唯謹督允文市之番蠻允文力持不可會檜沒而止牛大年知黎州兼節制黎雅屯戍軍馬紀律井然馮儼安嶽人知榮經時有沈黎部落之警儼作雄邊寨以戍之軍民奠居焉楊璜眉山人沈黎羌擾璜調兵征之民賴以安明高國英天全人洪武初率衆歸附授招討使子孫世襲高繼先即五代時高曩閣藏之裔洪武初年率衆歸附後以功升天全六番招討使羅容江西人景泰中為四川行都司都事興利除害民懷之相政河南人景泰中為四川行都司經歷常有惠政與羅容並稱劉毅武昌人成化中知州事居官亷介戴中新淦人進士調判雅州秉心公直處事剛明調停茶禁利害切中時宜升副使蘭道立江陵人進士知榮經素嫻武略時番夷反覆道立簡兵防守多方招徠夷心畏服施電雲南舉人知名山教士愛民陳經字質之寧武人進士任御史調榮經知縣蒞政公勤邊民信服立城垣修學校擢守雅州屠巒洱海人正德中令江夏以忤中使調蘆山天全土司攻城蠻力請征𠞰俘其酋長復所侵故地邑人建祠置田報祀焉牟秀和州人知榮經剛柔相濟政聲赫奕土漢畏服劉澤嘉靖間守雅州清心苦節蔬食布衣人號為青菜劉升夔州府同知張全婺源人由舉人歷知雅州多惠政民謡曰急流下有深灘劉澤後有張全升任去立去思碑孫籌知榮經籌邊決䇿立政有方阮福豐城人榮經主簿務德化興學校上下稱之張淮襄城人進士調判雅州清操不茍僚屬化之升按察司僉事周安武岡人知蘆山屏姦去暴興革咸宜卒於官趙良永康人進士任都給事調蘆山賑窮恤孤達邇懷之升僉事易鼇會同人嘉靖中知名山勸農節財多惠政卒於官直隸嘉定州雍正十二年升為府漢朱博杜陵人由左馮翊為大司農左遷犍為太守先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中一清徙山陽太守後代孔光為丞相封陽鄉侯李邈郪人與兄朝俱以文稱劉璋時為鞞長先主領牧為從事正旦行酒讓先主曰振威以將軍宗室肺腑委以討賊元功未效先寇而滅邈以將軍之取鄙州甚為不宜先主曰知其不宜何不助之曰匪不敢也力不足耳有司將殺之孔明力請得免久之封安漢將軍蜀漢陳震字孝起南陽人先主時拜犍為郡建興中遷尚書令奉命使吳孔明與兄瑾書曰孝起忠純之志老而彌篤入吳與權歃盟定好還封城陽亭侯鄧方南郡人以荆州從事隨先主入蜀為犍為屬國都尉章武三年卒史臣贊曰揚威才幹欷歔文武當官理任衎衎辨舉國植才施有義有敘李嚴南陽人少為郡吏以才幹稱先主定蜀拜為興業將軍賊馬秦高勝等起於郪合數萬人至資中時先主在漢中嚴不更發兵但率將士五十人自討平之越巂夷帥高定遣兵圍新道縣嚴馳往赴救賊敗走加輔漢將軍王離廣漢人以治幹稱為督軍推法平當後代何祗為犍為太守政有美績晉杜軫成都人犍為太守前為池陽令治最百姓為立生祠與涪人李驤齊名每有議論朝廷多允行之軫蒞任惠愛在民既沒後弟烈字仲武為衡陽太守自表兄子幼弱求去官扶軫喪還葬舊墳武帝歎惜軫才未盡其用而嘉烈之意詔轉犍為太守亦有美政蜀人榮之隋段文振北海期源人仁壽初嘉州獠作亂文振以行軍總管討之引軍山谷間為賊所襲文振復收散兵出其不意竟大破之趙昱青城人與道士李玨遊纍辭徵聘後煬帝徵為嘉州太守時州有蛟為害昱令民募船數百率千人臨江鼓譟自披髮仗劒入水天地晦冥少頃雲霧斂收昱左手持劍右手提蛟首奮波而出河水盡赤蛟害遂除唐太宗封為神勇將軍廟祀灌口明皇幸蜀進封赤城王宋張詠治蜀值賊亂詠禱祠下得神助蜀平事聞封川主清源妙道真君至今奉祀者比屋焉唐李思行隋大業末為唐公李淵使長安具論機䇿以贊大議京師平神堯即位擢嘉州守封樂安郡公卒贈洪州都督諡曰襄李百藥貞觀中為夾江令有政聲尤富於文學嘗撰北齊書五十卷岑參南陽人天寶間進士杜甫薦之遷侍御史出拜嘉州刺史敏於政事後退居杜陵山冇嘉州詩集行於世花驚定長安人至德間從崔光逺入蜀討平段子璋有功卒封忠應公犍民感德立祠祀之薛能汾州人會昌六年進士咸通中以監郡攝嘉州事政尚嚴察絶私謁雅好題詠有江山集許昌集十卷行於世孟昭圖黃巢之亂田令孜勸僖宗幸蜀從之至成都黃頭將作亂昭圖時為左拾遺請奏對不允因上疏極陳黃頭將亂陛下惟與令孜閉城自守不召宰相共謀羣臣欲入不得求對不許天下者高祖太宗之天下非北司之天下陛下九州之天子非北司之天子北司豈悉忠於南司廷臣豈無用於敕使疏入令孜矯詔貶昭圖嘉州司戶參軍至蟇頤津殺之士論惜焉王公元琅琊人宰洪雅政理俗化教民以禮纍官至檢校尚書虞部員外郎兼御史柱國五代田淳嘉州龍遊令孟蜀時以國用不支始鑄鐵錢凡須鐵者署場𣙜之又遣使嚴督諸路纍年負逋淳上疏言擾民犯天意聚財損君德語甚切直淳又好談治辭大略纍陳朝政得失嘗言王昭逺伊審微韓保正不可用或勸之以遜辭取貴淳曰大丈夫豈能附鼠輩求進哉又上諫用兵疏劉贊蜀王衍時為嘉州司戶時衍學士韓昭等為狎客陪宴後宫宫女雜為豔歌謔浪鄙褻贊獻陳後主二閣圖併作歌以詠之衍雖不罪不能用也宋袁繼志并州人乾德中征蜀隸大將劉延讓麾下既克蜀除嘉州監軍死之日家無餘財縉紳稱之子用成雍熙初登進士官太常博士王明知榮州乾德初太祖召公卿舉清白吏才幹者一人給事中馬士元以明應詔為左拾遺楊槱乾德初為夾江令歲飢盜起槱賑濟有方盜賊寧息李虛已知榮州太祖書布惠愛民奉法除吏等字賜之虛已兼工詩有雅正集三十卷劉美并州人父通宋初掌禁旅遷嘉州刺史美以劉后兄事真宗于藩邸被親信真宗即位補三班奉職大中祥符二年護屯兵于漢州徙嘉州上屢欲委之兵柄以皇后懇讓加武勝將軍節度使卒贈太尉左震大中祥符間令犍為作興人材建儒學立興文樓以教邑之子弟陳希亮青神人天聖間進士初為大理評事纍遷判三司朝廷以三司事冗簿書留滯乃命希亮又兼開折司榮州鬻鹽凡十八井歲久泉竭有司責課如初民破産籍沒者三百餘家希亮為言還其籍歲蠲三千餘萬斤黃疇若豐城人董蠻合部族入寇疇若知嘉州邊備廢弛而平戎莊莊民可用遂權免是年炭估麻租令子弟上邊守備蠻窺有備乃退後遷禮部石介魯人為嘉州軍事判官善善惡惡遇事敢為州人立祠祀之賈昌朝為嘉川守東坡有送昌朝詩所著有羣經音辨某七卷引經義議政益自昌朝始吳祕慶厯初祕獻劉牧易傳五十卷於朝優詔奬之後知嘉定州有善政沈立東陽人慶厯間知洪雅有政聲著海棠記劒南風物録三十六種宋白開封人為玉津令有詩曰竹底衙人吏花間押簿官可以想其風趣卒諡文安有文集一百卷行於世李畋為國子直講諸生晨謁見畋巾角火起是日報除榮州後還朝力言榮州鹽害得蠲歲額三十萬斤還雜役三百一十五家所著冇張乖崖語録四卷羅拯祥符人知榮州州介二冮每水漲輒犯城郭拯作東西二堤以除其患後歷轉運使所至皆有惠政吳仲復永興人進士及第知峩眉縣縣多淫祠仲復悉廢之廉於居官代還不載一物後官監察御史歷龍圖閣直學士劉弇安福人元豐進士紹興間為峩眉令治先教化為文剷剔瑕纇卓偉不几有雲龍集二十卷行於世宇文昌齡雙流人登進士為榮州推官熊本經制梓夔郡凡攻討招襲建南平諸城寨皆出其畫後召為左司員外郎王庶慶陽人崇寧間進士席益為京西宣撫使求庶自副高宗即位除直龍圖閣郡延經略使纍立戰功知成都改嘉州後為湖北安撫使楊承仁紹興中嘉州通判時鄭克為四川經略法頗峻承仁曰政而虐行之非立法意也召諸縣令曰平易近民恩威並用其謹行之王知遠紹興間守嘉定上疏乞復嘉之豐逺邛之惠民二監鑄小錢以便民用民懷之孫松夀郫縣人紹興中進士知嘉定府有惠政何耕知嘉州有惠政與何逢原孫松夀宋誨先後繼美人思之繪像以祀曰四循良吕由誠河南人知嘉州臨事精敏老吏不能欺唐恪薦其剛正有家法冝任臺臣召至京與恪議不合力求退去楊泰之青神人攝通判嘉州白崖寨將王引蠻寇利店刑獄使者置于法又欲論平民以鄉導坐死泰之固請釋之不從乃去官著甚富王淮郪人知榮州清節大著張頤為榮州助教進所藏書二百二十一卷祕書官言此皆闕遺之書乞加褒賞詔賜進士出身李燾知榮州榮因溪為隍夏秋率苦水潦燾築防捍之張方提點刑獄治事嘉定循行州縣平滯獄劾貪吏又開新渠以殺三江怒濤自是舟行無患孫詔字尹升紹興元年知洪雅修學宫繪田淳像以風學徒張價淳熙間知榮州在官崇尚風教清介卓立有興學講道之功諸生塑像於學宫楊仲修臨邛人淳熙間為榮縣令與士夫李昌齡等九人議政明道張孝方稱其有美政焉遊仲鴻南充人淳熙進士趙汝愚甚重之初調犍為簿知中江李昌圖奇其才薦之孝宗登遐贊定大䇿出拜嘉州民有積負奏罷之又修堰通水政平民悅卒諡曰忠魏了翁初以武學博士召試七對䇿語甚切直御史徐相劾其狂妄遷校書郎遂以親老乞外補知嘉州為政寬平士民胥悅何逢原溫州人開禧中知嘉定府以愛民為心著論語解又注王梅溪詩傳之夔學宋中和眉山人舉進士慶元初守榮州廉勤節儉為西蜀循吏第一高定子嘉定二年進士知夾江以教化為先寬𣙜酟水潦民飢發廩給諸富家俾以時價糶出而民償之由是米溢於市民得不飢俞興理宗時守嘉州元兵圍城五旬興夜開關力戰而闈解尋以興為四川制置副使知嘉定府事兼成都安撫副使理宗曰俞興嘉定城下之捷尤為奇偉賜金帶元傅夢臣京兆人為嘉定總管政事明敏有器局善撫字稱為循良塔爾海蒙古人登進士擢嘉定府同知以清謹見稱任滿升宣撫同知民為立德政碑頌之明李習淮安人洪武初改嘉定府為州習以御史調知州事撫字有方民安其化張宗沂州人由監生知嘉定剛果治事廉正律已深得民心段鑑昆明人由舉人知嘉定多惠政作排柵以捍江漲曽手植松柏百餘株於學官以志遺愛前人稱嘉守以鑑為最魏瀚餘姚人以御史謫守嘉定才識過人築衛城堤修明倫堂尊經閣璧津樓續修州志山川形勢悉有題詠官至都御史曾棨麻城人舉孝亷天順間任犍為教諭誨人不倦為文尚理致不事浮藻一時文體為之丕變李端雲南人知犍為縣士民安之嘗積榖二萬石以賑凶荒解組後遂入籍於犍家居時民有持田券以十金求押一字竟不與其亷如此趙淮由衛經歷任同知亷正冇幹濟才後左遷通判去任士大夫甚惜之蔡璉知夾江敦本善俗置積善碑書五事曰懼法度冇廉恥無爭訟睦親戚和鄉里民咸感勸胡凖安福人知嘉州時有盜弄兵潢池凖調集兵餉編柏為柵緣堤護城盜不敢入并得免水患焉王讓貴州人成化末知洪雅為政平恕實心愛民去任時囊無長物士民稱其亷嘗於署後植柏數株人思其治呼為王侯柏云歐陽倫永川人知犍為蒞政清勤實心撫字代去民為立碑陳達揚州舉人知威逺為政平恕深得民心錢承德常熟人以御史謫知犍為廉能正大政教兼舉胡纘宗字世甫泰安人官翰林檢討以不附逆瑾謫嘉定州州判捐俸修水城衛民廬舍又教士子多所成就士民均感其德蕭敬中公安人任犍為九載立義倉以賑飢民捐俸薪以給寒士後奉檄督木政調度得宜吏民建祠於厰以祀之董良卿由舉人嘉靖中知夾江值採木之役百姓疲憊良卿招集流移使復業官方以清白著稱馬文健體貌清癯操如氷蘖人以居敬行簡稱之去任日僅篾囊二具袁昌祚進士由廣西提學轉參議駐嘉定平易近人淡泊自甘丁艱去徒跣登舟了無長物孫徵蘭字睡足洪縣人進士為御史以直言彈權貴外調少參駐嘉定時流賊勢日熾乃勤訓練治戰具地方恃以無患鍾振進士知嘉州建九龍書院教養士類袁子讓郴州人進士知嘉定九年以亷明著有惠澤及民去任日童叟士女數萬人擁車泣送百里外以其清白多持芋蔬哭道左云劉澤知犍為調洪雅居官亷謹以明果蒞治胥吏畏法升知雅州韓立貴州宣慰司人舉孝廉嘉靖中自仁壽縣調洪雅嚴介有法數年積猾屏迹一境稱治束載曲靖人舉孝亷嘉靖間知洪雅嚴介公勤重修城垣加意學校聞道立永寧人萬厯間知洪雅英爽敏練修飭學宫吏畏民服擢戶部主事吳郡欈李人萬厯間以舉人知洪雅亷正有守為民丈田均賦民德之李禎趙越仲鎬袁道徐臻易紀俱峩眉令崇祀名宦兵火後邑志缺失事迹無考董繼舒平原人萬厯間知夾江時邑中甚乏科目繼舒精形家言於治南水口建武侯祠築小山於祠後集多士肄業由是科第相望厥後獻賊之難死忠者孝亷王運開運閎兄弟皆其所作育云陳嗣宗公安人知洪雅為政精明造就人才士民甚德之嚴實瑛分宜人舉孝亷任犍為教諭勤於立教嚴於持己約諸生以修身務本為重顧朴廬陵人任犍為教諭邑中冠婚喪祭督士之用家禮儀節翕然變俗李如柏字近公山西絳州人天啓間授嘉州蓮幕佐理修堰築隄民享其利藺賊叛軍興有督運功難民冇被官兵掠獲者捐金贖之賊既平當事賢其才會州守缺委視州篆平反寃獄修學課士尤留心文教升任去士民勒石竹溪旁頌之曰悒然不平思我李君祀名宦習孔言潼關人崇禎間知威逺縣亷介有政績祀名宦直隸眉州唐張允濟青州人仕隋為武陽令亷平自矢民安其政貞觀初纍遷刑部侍郎蘇味道欒城人九歲能文與李嶠齊名稱蘇李舉進士纍官中書同平章事中宗朝貶眉州內史治郡有聲卒於眉子孫因家焉王綝眉州刺史其子為眉州司戶參軍綝入相武后曰卿在相位何子之逺對曰廬陵王是陛下愛子今尚在逺臣之子安敢近馮元常眉州刺史劒南有火光盜夜掠人財畫匿山谷中元常輸以恩信賊相率就縛斬其為首者餘悉縱之去皆感化為良民馬涓昭宗時眉州刺史王建以為節度判官涓知建有不臣之心凡所賜豫悉却不受及建僭號遂匿迹山林莫知所終李獻眉州别駕以清惠稱時宰相有請婚者力不能拒遂棄官居家其弟遇疾暴卒獻燒指致禱於神弟得復生時稱其友愛云高仁厚中和初以西川牙將討賊凡出軍六日五賊皆平拜眉州防禦使五代張琳眉州刺史繼章仇兼瓊修通濟堰溉田一萬五千頃民被其惠歌曰前有章仇後張公疏決水利粳稻豐南陽杜詩不可同何不用之代天工山行章攝守眉州時郡無羅城行章合五縣之力成之逮宋淳化中李順亂攻城半載不能下益思行章之績宋段思恭乾德初通判眉州時賊攻逼州城刺史趙廷進懼不能禦敵將奔嘉州思恭止之因帥屯兵大敗賊衆州乃獲安李簡淳化中知眉州李順攻眉簡設方略堅壁固守賊力屈解去張逸字大隱榮陽人天禧中知青神縣多異政縣有松柏灘歲恆溺死數人逸禱神不踰月徙數里自是無溺者又興學校教生徒邑人陳希亮楊異相繼登第改其居曰桂枝里後逸以樞密直學士知益州蔣堂天聖中通判眉州有令名後纍歷州郡皆以善政聞祀於益州十賢堂楊繪字元素綿州人由進士為開封推官仁宗愛其才欲超置侍從繪以母老請知眉州有異政黎錞字希聲廣安州人知眉州仁明不苛既滿將代衆請於朝又留三年見蘇軾記文噩蜀郡人文翁之裔由進士以大理寺評事知縣事勸民孝弟有六孝子賦郭敘紹興三年任考核簿書明決詞訟時邑無寃民獄無滯囚封朝奉大夫袁淵明廣漢人進士紹興二十四年任知縣引泉溉田至今利之劉光祖知眉州有德政進直寶謨閣魏了翁知眉州尊禮耆耉拔簡俊乂延進諸生親為講説士林大悅之于栗慶元中知眉州魏了翁贈詩曰士為謀身蛇有足人於嚚訟鼠無牙獄書一落于公手不識從來豪大家吳昌裔字委仲中江人嘉定中為眉州教授取諸經為之解説祠周程張朱揭白鹿洞學規倣潭州釋奠儀簿正祭器士習丕變後通判眉州有政績元劉恩元初以管軍萬戶戌眉州勇而有謀以材武稱纍立戰功雍熙天厯初知彭山修通濟堰以禦旱災民賴其利張文桂至大間任州事修柵頭書院立夫子廟率士人春秋祀之明張伯綱洪武初任州事建州治儒學凡百創立後人賴之胡彥祥陜西人永樂初知眉州重農務本津新學宫修蟇頤堰以廣水利楊鐸天順間知丹稜修城池遷學校百度維新士民攸賴入名宦祠林敷莆田人進士成化四年知州事以文學飭政務築隄修堰興學建橋士民頌之許仁廣東人進士成化十五年知州事修學校以興文教創聚秀亭以誨生徒考最加從四品俸郭祥鵬泰和人進士成化二十二年知眉州持亷秉公歲歲賑濟有方全活甚衆歷官參政王鐸陜西人有孝行舉進士𢎞治六年歷知眉州以治行考最遷秩四川參政張瓉中部人𢎞治中知眉州勤敏亷潔卒之日囊無一錢原道蒲城人舉孝亷正德中知眉州剛正有守創建石城不煩民力民思之楊麒字夢孚雲南舉人嘉靖初令青神廉介勤密歷任八年擢安順守去任日行李蕭然百姓遮道送之蔣廷璧普安人舉孝廉嘉靖中任青神教諭性忠直立教嚴明捐俸以給寒儒著璞山教約吳廷秀雲南舉人嘉靖十年令青神興利除害惠政良多五年擢夔州府通判督大木卒於途舒大猷通城人嘉靖間知眉州州每苦旱大猷親詣田野見有沙堰淤塞因即高處創開堰口田皆得水又治東五里許近大江居民屢遭水患復為築隄數百丈插柳固岸至今賴之行取員外歷官浙江左布政使陳尚表鞏昌人由選貢任眉州牧天啓元年以課最升湖廣常德府同知尹為憲眉州牧辰州府人歷任五載教養兼盡升保寧府同知崇禎十三年眉人請入名宦直隸邛州漢王吉臨邛令有政聲與司馬相如友善隋柳儉邛州刺史在職十餘年民夷悅服還鄉敝車贏馬人服其廉唐袁天綱成都人好道藝以相術聞貞觀中為火井令嘗登山相縣治後人因名其山為相臺秩滿入京太宗召見謂曰巴蜀古有君平卿自顧何如對曰彼運不逢時豈若臣遇聖主臣固勝也一時如王杜輩天綱皆於風塵中識之所決禍福無不立驗善數學者每推袁氏云柏貞節邛州刺史能禦段子璋徐知道二寇之亂杜甫詩蜀中寇已甚柏氏功猶存宋馬知節至道初為益漢邛等州都巡檢使會劉旰脅牙兵為亂知節擊斬之云燕肅字穆之益都人舉進士知臨邛縣民嘗苦吏追攝肅削木為牘民訟有連逮者書其姓名使自召之皆如期至張及知臨邛時太守欲引水泛舟遣吏於縣決堰時農事方興及曰涸民田以事嬉遊可乎令可去水不可決太守斂容謝之文同皇祐間通判邛州王安石送以詩文翁出治蜀蜀士始文章犖犖漢守孫千載起相望王伯憲紹興中令蒲江民安訟簡有無訟堂民為立碑李昌圖乾道中知邛州請減積欠錢引民英不感其德陳寧火并令民戴之如父母畏之如神明趙雍淳熙間知邛州以儒術飭吏事待士恤民期年政化大行郡人畫像以祀之姚希得知蒲江巨室挾勢希得以嚴治之聲譽著聞張方嘉定中守邛州敬以立體寬以惠民去官後人多思之明張郁洪武初為邛州同知修舊起廢興學校繕城郭士民安之聞仲昌知邛州練達政體勤於撫字天龍寶謀叛寇掠鄉村仲昌率兵立柵禦之冦遁民賴以安羅質南昌人知邛縣勵精政事一塵不染民甚德之安郁字從周臨潼人蒲江典史正統中邑大旱郁齋沐籲天積柴於紫極觀立誓不雨則自焚至期大雨民謡曰安從周積薪樓感天雨民有秋昔無衣今有裘升知本縣事熊祥麻城人舉孝亷知蒲江築土城修儒學建演武場政績大著子縝知成都縣有政聲後知邛州李廷詔福建人守邛州端方有善政修砌石城民永賴之馮泰大邑令亷正無私勞心撫字邑人德之秩滿保留復任九年杜亷長沙人舉孝亷嘉靖中知邛州開七里􅄵疏通水利州人受其賜楊完泰和人嘉靖中知邛州性狷介居官數月訟簡刑清以母老向治兵使者乞終養不聽強欲解組而行使者難之曰若不為利得無為名耶完曰大人第聽去即為名為利皆可也使者竟成其志姚高郵人知邛縣築城垣改州治事不辭勞屹有成績直隸潼川州雍正十二年升為府蜀漢霍峻字仲邈枝江人仕蜀為中郎將先主取劉璋留峻守葭萌張魯遣部將楊帛誘峻求共守城峻曰頭可得城不可得帛退去後璋遣部將扶禁向存率萬餘人由良水攻圍峻俟其怠選精鋭出擊大破之斬存蜀既定嘉峻之功乃分廣漢為梓州郡以峻為梓州太守子弋為太子舍人後主立太子濬以弋為中庶子盡言規諫甚得切磋之體後為參軍楊戲知梓州為政清約不煩張翼字伯恭武陽人為涪陵令遷梓潼守有守禦功官至左車騎將軍晉周虓為梓州太守時妖賊李𢎞李金根等聚衆萬餘自稱聖王虓討平之梁趙瑤為小溪令歲旱瑶率官吏齋戒於邑三里外引咎自責稽首流血應時大澍民德之隋董淑封開皇四年為鹽亭令有德愛政暇遊鳯凰山後人思之號為董淑山姚萇字景徹長安人開皇間為西川都統瀘夷寇普昌二州文帝命萇帥西川之兵討之有功擢普州刺史兵亂後民多流徙萇招徠安業後卒於官民為立祠其子孫遂家焉李直之字正叟長安人任凱州刺史八年除害去弊興學設教化行俗美晚年上疏乞骸隱於銅官山童稚歌曰我知古凱州今日得李侯李侯切莫去此地無可憂年七十九卒民祠祀之魏文升資中人山獠作亂文升單騎造其營諭以利害渠帥感悅解兵而去前後歸附十餘萬上大悅以為遂州總管唐唐儉普陽人武德初都督遂州以守禦功給食綿州六百戶封莒國公蘇榮味道之父為梓州參軍人皆稱之郭元振初名震大名人神龍間為通泉縣尉任俠不檢小節嘗盜紬錢武后詰之既與語奇共人索所為文上寶劒篇后嘉之遂得擢用景雲二年進同中書門下三品以功封代國公崔城開元十三年任遂州刺史詔宰相諸王御史以上祖餞之顔杲卿司法參軍性剛直蒞事明決嘗為州刺史詰讓正色别白不為屈賈島字浪仙范陽人為普州司戶參軍工吟咏人為刻詩於碑盧坦字保衡為節度使東川兵戍安州坦時使人周其父母妻子視疾病給醫藥士卒感之不置馮宿字拱之東陽人東川節度使完城郭增兵械十餘萬涪水數壞民廬舍修築防禦民賴之王潛唐興令修明政事尤存恤鰥寡薛昭汾陽人為普州刺史以亷能著聲喬琳太原人至德中任刺史創立學宫文教盛行柳仲郢公綽之子字喻蒙大中六年為東川節度使在鎮五載美績流聞大吏邊章簡挾勢肆貪前帥不能制仲郢因事殺之官吏肅然李絳任東川節度使恩威並行吏民畏服王涯字廣津穆宗立出為劒南東川節度使時吐蕃寇邊西北騷然又掠雅州涯調兵拒之上言蜀有兩道直搗賊腹一由龍州以抵松州一由綿州威番柵以抵棲雞城皆險要地臣願不愛金帛使信臣持節與北虜約曰能發兵深入者殺某人取某地則受某賞開懷以示之所以要約敦好為他日用則邊警無慮矣帝不報竇兢字思順為郪縣令修郵舍除道路設冠婚之制定祠祭之儀百姓德之李商隱字義山第進士大中七年東川節度使柳仲郢辟為節度判官檢校工部郎中在東川最久於政事多所贊畫一切箋奏咸出其手李洪生而神異為小溪令惠政良多家居值歲歉捐資全活十萬家及卒人為立廟祀之宋崇寧間賜號豐澤明正德間鄢藍賊衆縱火焚之不能燬其廟但聞空中隱然有聲賊驚遁去人咸異之李匡逺開元中為鹽亭令捕盜勤勞時號健令夏侯端梓州刺史以祕書監出任散祿周貧不為子孫計宋燕肅知梓州有異政又嘗作蓮花漏用候昏曉並刻石以紀其法司馬池令小溪正版籍均賦役以澤民為心劉華辟知司祿參軍纍官天章閣待制張仕遜字順之陰城人進士令射洪以寬厚得民嘗禱雨使君祠須臾大雨仕遜立廷中雨足乃去後轉運使檄移治郪民遮馬首不得去遂聽還射洪安撫使至梓州問屬吏能否張雍曰射洪令第一改襄陽令纍官同中書門下平章事封鄧國公卒諡文懿張雍安德人知梓州值王小波李順之亂守城却賊蠲煩苛尚簡素後人為立祠勾士良少城人嘉祐間以祕書丞出知中江築隄捍江憂深慮逹其隄防三興三廢後令廖子仲克成之廖子仲治平中由太常知中江前令勾士良築隄捍江名勾隄子仲更築之永稱鞏固馮瓉知梓州賊夜攻城瓉密令促更籌未夜分擊五鼓賊悉遁去因縱兵追擒其首境內獲安康延澤普州刺史全師雄作亂延澤招散卒千餘人破賊衆三千由是賊勢少沮普遂等處皆平民始安居程建用字彝仲眉山人元豐間知中江以循吏稱嘗作書寄蘇子瞻記山亭狀風物寫情景山川如在几案間學識才行有大過人者趙抃為梓州轉運恩威並著教養兼施父老子弟罔不悅服州人廟祀之彭乘知普州普人鮮知學乘為興學召其子弟教育之程通熙寧間中江令不事繁苛政教畫一民賴其治趙尚寬知梓州恩惠洽民為一時所推敬比代去吏民遮道攀戀不已范百祿提點利梓二州刑獄諸將欲屠瀘夷之來降者百祿堅執不可違受其降安置得所范純禮字彜叟吳縣人仲淹子以祕書省出任潼川有邊將調度苛繁純禮一以靜鎮待之辦具不取諸民民圖像於廬奉之名曰范公菴草場火守吏惕息純禮曰草燥則生火何足怪但使密償之庫吏盜絲多罪至死曰以棼然之絲而殺人吾不忍也聽其家趣賣以贖株連者悉釋之後擢户部郎中京西轉運使虞祺仁壽人進士歷知潼川以仁愛蒞治秦檜嘗遣督使貢方物祺以地瘠民困聞於上檜慚而止劉甲字師文東光人忠肅公摯之孫以寶謨間學士出任清心約已疏滯滌弊度地以居民發廪以賑乏儲書以勸學市田以養士前後費巨萬奏免稅緡八萬四千有奇黃震字伯起蒲城人進士為遂州判官詔給兩川軍士緡錢東川詔獨不至軍士遂謀為變震白主者曰朝廷忘東川耶殆詔書稽遲耳即開州帑給錢如西川衆乃定明日詔果至纍遷尚書郎許彪祖玉池人紹興間知中江作義阡於亞松山收暴骨無所歸者瘞之凡九百餘冢唐文若字元夫眉山人少英邁為文豪健登進士分教潼川給事勾濤薦之詔赴行在既至而勾濤出不得見文若奏書闕下略曰昔漢高慢士四皓去之而西都少廉恥之人光武禮賢嚴光友之而東都多節義之效陛下駐蹕東南兩宫將歸五路初復正宜市朽骨式怒蛙以來豪傑寧惜此數刻之對耶翌日召對高宗大悅改官通判漢州賈尹富義人紹興間中江令作蓮花漏縣尉楊大中有記居官多惠政趙善宣開封人知遂寧府才猷練逹善於經制嘗徙建儒學至今仍之王儔字尚友平陽人乾道中知樂至亷潔謙恭寬民嚴吏民立生祠祀之家炎眉山人郪令先是郪二十年皆攝令人疑其不利虛正寢不敢居炎至居之時兵火創殘之餘折嚚訟簡冗費代民輸賦二十萬有奇學故有籍沒盜田鄉人有為盜謀於宣撫司檄反其田炎具本未白宣撫歸於學後遷敘州通判知資彭普三州李熹燾之弟知遂寧治民寬厚凡無名之賦悉奏蠲免李垕字叔勤燾仲子知遂寧府政主簡靜濟以剛果間有措置卒歸平恕郡人宜之李壁字季璋燾季子張福攻遂寧壁傳檄諭之福讀檄泣下會官軍搦戰賊忿盡焚其城顧府治曰李公所居勿壞之壁授計於大將張威遂平賊許奕字成子簡州人淳熙中以寶謨閣直學士出任導利去害潔已愛下捐緡錢十二萬為民代輸嘗霪雨壞城奕撤而築之不甚煩民民立祠祀之宇文洞成都人嘉定間為邑酒正攝縣事建學宫祀周程朱張四子度正魏了翁有記張材開封人隆興間知樂至有惠政及民民咸仰賴之勾大章字德成士良之孫士良嘗築西隄歲久傾圮大章沿岸創為隄防三里許名曰勾公隄參軍景西仲有記鄧應午字明父新都人進士初為高博尉時潰卒近境人情洶洶應午督兵守禦乃定歲大疫市藥散賑不遺餘力郡有疑獄一訊立辨嘗攝令通泉芟吏弊免逋租後為華陽丞扈元永泰令興學立教有善政及民張宏字巨卿益都人進士知遂州以勤儉著聞後入為度支員外郎劉光祖淳熙中召對恢復事宜除直祕閣出任郡守慈惠得民仁聲四達時賢守光祖稱最馬趙仕陴知遂寧江水暴漲瀕江有隄水嚙其趾仕陴索胡牀坐隄上左右請避去不許移時水落時人以比王尊云魏了翁攝潼川事修陴浚隍賊兵遏郡知其有備不敢攻而去後為潼川知府約已裕民政績大著轉本路安撫使李禹卿字君益蘄水人嘉定元年以棘寺丞出任亷明多善政惠商通逺百物充牣幼子偶出市從者買玩具授之辭不受識者異其子而益信禹卿素履云趙昻發字漢卿昌化人淳祐進士為遂寧州司潼川簽判素以節行稱後守潭州死節元周鎬晉寧人射洪尹多善政崇教化建金華書院汪敬昌監遂寧州去民瘼除姦黨上下稱其亷能父老立頌德碑明董煥英寧波人洪武間自巴州牧遷知潼川府以文章飭政事聲震一時威德大著鄭文彥大同人洪武間知潼川府持已方直賦役均平後升工部侍郎錢恕洪武間知遂州有廉潔行存撫字心創建壇廟廨署民不知役范府洪武間由舉人知遂寧裁抑豪悍修復學宫易土城以巨石永為一方保障葉國華興國人進士知遂寧小心畏謹凡倉卒難已之資悉以俸資應之其父自任還里莫能治裝邑士大夫率助以金後改南昌徵授户部主事談道生始興人知潼川廉潔有守具幹濟才郡城圮壤伐石更修制強梗撫善良簡詞訟在任七年郡中大治致仕去唐汝楫武功人洪武末任安嶽公勤蒞政撫民有恩去之日民擁道泣送之纍官禮部侍郎姬靈永樂間知蓬溪重修縣治始正版圖吳昌衍進士宣德間知鹽亭勤恤民隱因地制賦甚協人心後徵入為御史升四川左參政郭鏜思縣人進士成化間以大同巡撫謫任射洪節冗費省科罰均徭役期年境內翕然稱治陳琓由監生成化間知鹽亭剛直有才邑路去保寧甚遠夫役苦之琓議南部民出柳邊驛接遞又申免戌邊民丁邑人至令頌其功德章昻雲南嵩明人𢎞治間任中江流賊猖獗誓死守城賊為解去蔣容字德夫武進人𢎞治中知潼川下車三月即增修學宫創東西廊舍三十間扁曰六德為諸生講讀之所又撰郡志以振厲人文建名世堂以表章先賢築東城隄以消水患修來熏橋以成利涉政平人和甘露降於庭柏士民德而頌之余祺新建人正德間知中江除巨盜釋寃獄賑活飢民甚衆邑舊有茂州守倉役民破産莫能供力請罷之創五門月城尊經閣又重建鄉賢名宦等祠社學倉庫樓義阡遞鋪無不加意升瀘州知州胡進律正德間由舉人為鹽亭令剛介明敏創修城池為邑保障時鄢藍猖獗賴以固守云胡纘宗由檢討謫官正德中知潼川以文學飭治一切檄命差役一凖丁糧以定輕重興學教士以文章政事稱於時滕友西安人進士安嶽令謙謹有才多牧民之政牒升蒲城人安嶽令廉平愷悌視民如子歷九年如一日擢鄧州知州顔公輔巴陵舉人正德中任知縣均徭平賦薄罰省刑卓有循良風民思其遺愛為立祠祀之程春震雲夢人進士以御史調安嶽發擲如神築城垣修公署𢎞治中大旱賑恤安集曲盡其心後盜起糾兵捕除民賴安堵王紹先貴州舉人任中江知縣刻厲苦節一文不取百姓咸受其福以不肯阿時乞休去士民思之胡叔寶永康人中江尉初蒞任民有當辟者其親屬暮夜懷金祈免叔寶執赴公堂置之法縣令胡定一以縣政咨之叔寶勸農桑興學校定科差平賦稅南陽李賢奉敕察蜀吏治疏其善政以聞遂升知本縣張暹字景暉丹徒人射洪令節冗費省科罰均徭賦期年民無訟訐野無寇警境內翕然稱治張東周蒲圻人進士嘉靖間由雲南僉事謫州坰慷慨任事署篆多惠政條陳地方利害上官多允行之後卒於任李明吉水人嘉靖間知安嶽剛正有才改遷學宫重修縣署徙壇壝建橋梁除巨盜為政嚴肅陶清字楊之建昌人初守劒州以治繁調知潼川端方剛果吏不為姦事至立辦新學校正士習潼人甚德之趙德宏鶴慶人舉人嘉靖中任潼川牧自幼有孝行御史唐龍奏聞旌表及蒞潼有善政增修城垣民賴保障段有學昆明人知中江縣政尚寬平擒妖賊捕夥盜民甚戴之董性麻城舉人嘉靖間知安嶽臨民以寬馭吏以嚴課諸生除巨盜斷寃獄民為立碑頌之張厚貴州宣慰司舉人政多仁愛嘉靖戊子年大荒力請當路得發帑金全活甚衆明年麥秀五岐以得罪監司去官士民泣送農人釋耒耜爭肩其輿出境顧雲鳯常熟人進士萬厯丁亥知潼川州為政最得大體凡民輸課必令自稱兌不多分毫郡當孔道應之整暇有術吏民不病治潼七年民深愛戴升刑部員外郎去王良謨蒲圻人由舉人知蓬溪六年事治民懷革宿弊立社倉率義民助輸供得穀萬餘石分儲之以濟貧民復買學田士民不能舉婚喪者輒助之蓬民久而不忘云吳伯錡夷陵州人知遂寧輕刑薄罰一無私徇一時感頌稱吳青天升雅州太守田舜年字壽子山陽人由選貢崇禎中知樂至務實政倣常平遺意建倉備賑樂邑久乏科目舜年又建書院親為講授年六十未舉嗣士民代禱於神果生一子因名樂生升陕西平涼同知民請崇祀名宦雷轟都勻人由監生知鹽亭縣勤慎有聲賑荒多所全活升雲南北勝州祀名宦梁一桂懷集人由舉人知鹽亭政尚簡靜百事振修祀名宦張寬應山人知鹽亭政期平恕時值兵燹供億得宜上下稱善任賓臣印江人由舉人知遂寧在任精白乃心平易蒞政值獻賊圍遂與鄉官吕大器招集義勇身先士卒力守城池賊遁去邑民賴以保全詹丞祉浙江人進士知遂寧寬仁清儉修理城池兵火中賴以保障邑人為立去思碑直隸瀘州漢成存廣漢人建安十八年始置江陽郡以都尉成存為太守有嘉政蜀漢彭羕字永年廣漢人官州書佐劉璋時以罪髠鉗為徒隸會先主入蜀羕往見龎統統薦之先主領羕傳宣軍事指授諸將奉使稱意成都既定先主領益州牧拔羕為治中從事丞相亮密言羕心大志廣難與保安主意稍疏左遷江陽太守隋張威高祖時王謙作亂以威為行軍總管從元帥梁睿擊謙軍次通谷謙守將李三王擁徑兵拒守睿以威為先鋒三王初閉壘不戰威令詈侮以激怒之三王果出陳威令壯士奮擊三王軍潰大兵繼至擒斬四千餘人進至開逺謙將趙儼衆十萬連營三十里威鑿山通道自西嶺攻其背儼遂敗走追至成都及謙平進位上柱國拜瀘州總管唐陸弼潼川人天寶中為州刺史德澤及民卒於官櫬過射洪白崖山下溺焉人立廟於山曰白崖廟劉昌裔太原人遊蜀適楊子琳亂昌裔説之順命尋以裔為州佐柳玭以左補闕忤中官景福初出為瀘州刺史操行亷直有父仲郢之風宋錢若水字淡成河南人知瀘州撫綏有道得黎民心歷官樞密使劉平開封人夷人冦淯井以平權瀘州事平率土兵三千擊走之寇凖薦平知瀘州自是邊釁不作何湛通判瀘州權郡事蠻酋乞弟率衆迫城湛單騎至其營開説利害乞弟亦單騎送湛入城隨即引去民賴以安王光祖開封人知瀘州乞弟既降光祖團結兩江夷族為義兵自是瀘夷不復為邊患王獻可知瀘州時黃庭堅以黨籍謫涪人多畏禍不與交獨獻可遇之甚厚時人稱之孫羲叟徽州人政和初由徽猷閣直學士帥瀘州築城有功徽宗賜書奬諭之李如晦紹興中知江安操行廉介為士大夫宗許奕簡州人知瀘州威望甚著夷酋王燦桴木萬株入賈奕慮其探山陸之險驅之去時安撫使安丙新立大功讒忌日聞宰相出謗書問奕奕願以百口保之馮楫知瀘州紹興中詔海外四州與免經略楫抗疏不便於是瀘敘州長寧軍皆得免瀘民甚德之張奎通判瀘州通敏精強甚有治迹吏不敢欺魏了翁開禧間知瀘州修樓堞增器械教武事申軍制興學校蠲宿逋復社倉創義家建養濟院數月百廢俱興李燾知瀘州葺石門堡扼險要奏禁茶馬市又禁入山伐木以杜夷人借事入寇之端皆報可梁玠乾道中知瀘州歲餘民便之詔以瀘州為一路命玠為安撫使以旌其能設瀘州路并安撫使自玠始楊汝明知瀘州亷直有守撫綏得宜民皆懷之常丞廣安州人知合江撫綏有方民慕德政勒碑頌之何文才資縣人知江安十年亷能著聲趙邁知江安有善政民立碑頌德元牛世雄成都人皇慶間為江安令釐革弊政蠲除冗役修設學校善政甚多江安民咸服其化安文憲延祐中守瀘州興學重農卓有異政王佑長安人知納溪創建經文廟暇日集儒生講論史杜夔字舜臣平原人令納溪為政愷悌慈祥民不忍欺李福字介甫凌雲人知納溪勸課農桑邑人德之明陳謙荼陵人洪武初知瀘州時州屬重慶謙奏改直隸興學校重農桑卒於官民立祠祀之胡瑞字天祥新淦人知納溪縣明兵取偽夏瑞率衆首先歸附有保障功彭律江西人由進士洪武初任合冮創縣治修學校撫流民賑飢荒全活甚衆王仕忠武昌人知瀘州均徭役節財用窮民多賴存恤林遵義莆田人知瀘州約已愛民尤重學校一時士民戴之如父母賀讓衡山人正統中知瀘州有善政遇旱徒跣懇禱而輒隨車張翔崑山人知瀘州廉清正直與民興利去之日百姓泣送之楊瑋華亭人知瀘州為人剛介無欲政舉民安上下信服程達婺源人由舉人知州事為政嚴明而濟以和易執法無私豪右斂迹黃倫知江安臨事果斷化行政美既去民立碑頌德易子晉知冮安時大軍駐縣調度供億處之裕如歲荒發廩賑民未白監司竟以此得罪去胡思忠直隸人知瀘州留心民務瀘賦至重懇請減每石徵銀五錢三分自思忠始胡先廣東人任御史以直言謫瀘州驛丞委攝州事去淫祠修學校恤孤貧除豪猾多善政謝廷詔由歲貢任江安縣教諭受學蔣道林以身率諸生敦道義尚禮讓有裨風化人爭傳誦朱銑字文澤江西樂平人先任黃陂以忤權貴調合江端潔簡易值兵燹後修築縣治民不知勞李英成化元年任江安縣丞時縣中土城仍宋元之舊歲久傾頽英攝縣更修石城民賴保障直隸資州隋衛鉉益州總管長史仁壽初山獠作亂出為資州刺史以鎮撫之鉉單騎造其營謂羣獠曰我刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悅解兵而去前後歸附者十餘萬口高祖大悅賜縑二千匹除遂州總管仍令劒南安撫煬帝即位復徵為衛尉卿諸獠攀戀數百里不絶皆揮涕而去宋張旦知陵州時李順黨數萬來攻旦修整戰具驅市人進戰大敗之何耆仲任資州愷悌廉慎戢吏愛民政事和平范祖禹字淳夫治平中任資州龍水令寬簡愛民尤以興學校為首務張伸字子逮唐安人任資州約已敬士撫民戢吏尤作興文學為治稱第一李景孠熙寧間任資州太守民輸免役錢四十萬蠲和糶米六十斛增養士之田瘞久暴之骨申放生之今兵亂之後人皆歌誦文同任仁壽令奏革鹽井之弊名山古迹題詠最多楊佐陵州推官州冇鹽井深五十丈歲久幹朽敗欲易之而陰氣騰上入者輒死惟天有雨則氣下降稍能施工佐教工人以木盤貯水穴竅灑之如雨然於是井幹一新利復其舊楊紹紹聖間知陵州監以居民缺水引郡之小龍泉以資民汲號普惠井民利用焉鄧棐紹興中內江令酋修庠序利興弊革上下悅之楊師錫字舜欽蒼山人紹興中令􅓵陽明教化興禮義邑人繪像祀之陳咸淳熙中知內江均徭役賑飢民修學校積兵儲夷人入寇防遏之功居多仲大年淳熙中知內江嘗謂政教如五榖種之必生食之必飽若專用刑罰豈善政哉故敷教寬平民受其惠孫道夫知資州安撫鄭剛中薦其治行第一移知蜀州盜不敢入境遇事明了人目為水晶燈籠後乂知綿州李正炎嘉定中知內江循阡陌勸農桑重學校豎鴈塔以題科名其他善政率類此李憲熺內江縣尉與李正炎同時善則贊之否則規之協心愛民民並德焉趙彥誴紹定間知仁壽以德化民不尚威法再期而民孚繪像於霄漢室以祀之元劉起昌知資州勸導有方農勸於耕士興於學後遂家於資明馮讓字伯謙江西人景泰中知井研公正廉謹端士習培善良嘗纂邑志後因貴藩有警奉檄督運有功祀名宦吕律字正音江西人舉孝亷成化中任資陽教諭冇學有行勤於訓迪王澄字肅政陜西舉人成化中知資陽政平訟理修舉廢典時有瑞麥之應郭方字仲矩湖廣人成化中知􅓵陽亷明公謹時稱循良者以方為第一丁鋭江夏人成化中知井研輕刑詳讞士民安之升姚州去日百姓遮留泣送請入名宦屈伸綿州人𢎞治中任井研催科不擾尤善弭盜百姓安堵焉王璽字朝雲舉人正德中任資陽教諭謙已誨人嚴義利之辨有古儒者風升保寧教授尋擢涪州陳鑾湖廣人正德間知資縣純心愛民會流賊渡江將臨城鑾率衆禦敵破之城東陳銓知內江歲凶多方賑恤民免流離捕盜戮渠魁四境寧戢拜監察御史湛禮浙江人由進士知內江性廉介政尚寬平任滿去邑父老送之江滸禮指一木篋曰吾室裝奩也命左右啓視之惟簮珥數事而已擢評事歷升知府蜀人比之趙清獻方向桐城人以給事中謫資陽縣德威並著士民畏懷張文錦河州人正德中知井研縣芟鋤強暴百姓善良者必奬勵之嘗遷學宫於風山士民允服陳東零陵人嘉靖中知井研勤於作士改建倉鋪豎題名堂胥役擾於村里者輒禁絶百姓安之曽著南塘類稿李佩南鄭人知內江縣攜二蒼頭來視事糲蔬自甘一絲一布不取於民終户部主事子孫貧乏至不能自存沈伯龍嘉興人知內江縣有容物量徵輸供億視舊加省詔入禮垣以謇諤著王同道黃岡人以御史謫內江令調停里甲訓迪人才蘊藉風流古文詞賦咸有逸氣周希貴安義人嘉靖末任井研蒞政廉明興學造士嚴保甲脹流移嘗條陳邊儲免百姓輸運鹽井坍塌力請蠲課史旌賢雲南人知內江縣敏練端嚴遇士大夫有禮表章勝迹興起人文士民思之建祠以祀李用中朝邑人萬厯壬辰知內江縣性最孝凡家人來署毋有所遺必焚香西向拜謝居官清謹纍遷淮徐參議卒於官俸入不足以營葬事邑人聞而哀思之楊應登雲南人知內江縣征播之役運餉獨先又擒其偽都司以絶亂萌當路尤旌異之胡承詔天門人萬厯甲辰進士知夾江縣以治最調繁內江不畏強暴待人有禮作士有法為政務大體邑人至今思之詹淑字茂修湖廣人由舉人萬厯中任資陽在官九年公正慈廉條陳勸農養士省用恤刑等議皆見施行朱皓汾陽人由貢士萬厯中任資陽縣仁廉愛民修建學宫崇儒禮士賑荒有術張仲崇慶人字子健資州教職新學校與諸生講解有鄒魯之風民立生祠祀之朱國壽崇禎中知內江形家言縣治窪下宜培之因於治內建譙樓丙子鄉闈得十一人一時稱盛直隸綿州漢閻憲廣漢人綿竹令人有夜行者得遺錦旦乃送縣或曰暮夜無知何不攜去對曰縣有明府匿此則慚晉許遜洪州人知德陽心本清淨政尚德化有仙術遇歲歉點石為金以濟貧乏邑人祀之唐劉德威貞觀初為綿州刺吏政號廉平百姓立碑頌德何易于先為益昌令大著能聲纍有惠愛及民後遷羅江令為政不異於益昌時刺史裴休至邑見其廉嘆美之末乾道中縣令楊超為作循良吏碑立於署中宋鮮于侁通判綿州州處蜀左吏狃貪風至課卒伍薪炭芻豆侁一介弗取郡守以下效之歐陽觀廬陵人綿州推官廉潔好施凡死囚必求其生不得則告天而後斷毛嘉會括蒼人嘉泰間綿州守發粟賑飢伸決冤滯明李博文洪武中知安縣守己愛民政績超卓江洪蒲圻人洪武中以參議謫知綿州政尚寬簡留心撫字歲荒捐俸為粥以活飢民興水利灌旱田民祠祀之秦宗伊知安縣以禮自持教民首孝弟修人文廟清學田嘗建奠安墩以培縣脈邑賴之劉拯正統間知梓潼亷介固持始終如一後卒於官貧無以為殮至今稱其清盛昶直隸人天順間以御史謫知羅江廉明公恕興利除害時趙鐸寇亂昶率衆追剿報捷升知敘州府吳淑宜興人以御史謫知德陽恢學宫新邑冶勤恤民隱時稱賢令蔣夔泰和人德陽教諭克端模範清苦自甘後升蜀府伴讀李充輝豐城人𢎞治中為德陽簿慷慨多大節清白自勵於勢利泊如也先是龍州夷酋叛拒歷年前後招諭莫得其要領充輝持檄往諭為陳朝廷撫御恩且歷舉自昔梗化之禍又力却其贈金夷酋畏服遂感泣與充輝偕詣臺院數其罪而宥之反側遂定薑珍金華人監生正德中任德陽令其政平易其守清白至今稱廉吏者必以為首王大駱新鄭人監生正德中知綿州剛正有決斷捕除賊盜地方以寧劉璨臨川人正德間知綿州性亷介守城禦賊居民獲安聞母喪過哀而卒卒時無以為殮人以亷孝稱之杜濓嘉靖中知安縣冇治才愛民禮士安邑科目絶少濓勤勸課遷學於北缸遂聨捷數人焦烺泰興人嘉靖中知德陽縣不攜家室寢所衣笥撥吏守之政先大體綿陽江嚙城烺築隄數里以捍水高二丈濶稱之至今賴焉以督採大木為上官忌收獄尋得白歸惟圖書數卷而已齊清滄州人持己剛方有才辨嘉靖末知德陽邑故協濟綿州馬匹清立言其不可欲議徵銀折價時趙文肅貞吉過縣咨馬政清熟知利病條對甚剴悉文肅入朝即召為太僕寺丞王純臣鄖陽人任德陽教諭好古能詩詞持己嚴正著訓士約言以亷恥氣節為重士子遵行之李士鼇漢陽人任安縣清操不染百廢俱舉強希顔萬厯間任安縣明敏有為勘田畝革吏弊豪富不敢欺隱紀于竹洋縣舉人由兵部主事謫知安縣釐宿弊革重耗案無滯牘修城經理冇法民忘其勞張緒漢川人萬厯初知德陽以一老僕隨侍自奉甚約與民休息去任日猶捐廪以助城工至今屹然太守耿某為作去思記樊鼎遇黃岡人萬厯中以選貢知德陽縣吏治敏練繕城築堰置義倉創經樓捐俸購書數百卷以誨諸生其父官御史以建言謫戍鼎遇泣訴兩臺欲免官贖父罪直指彭某為奏得旨下吏部鼎遇即日告歸所著有道林小草藎草等書數百卷陸經術綿竹令崇禎丁丑流賊犯蜀綿城卑薄立陷賊去經術至捐金勸紳士助完城工高厚加倍獻賊至不得入民至今感之直隸茂州隋梁逺為汶川總管時吐谷渾吕夸寇邊逺以鋭兵擊破之斬首千餘級宋趙瞻知威州瞻以威茂雜羣獠險而難守不若合之而建郡於汶川條著甚詳後熙寧中經理西南就瞻取其書考焉孫羲叟神宗時節制綿茂軍先是塗靜時飛等蠻寇茂州知成都周燾遣兵馬鈐轄張永鑄等擊之畏懦不敢進羲叟遣中軍將种友直等破之其酋旺烈等悉降趙全時簡縣人神宗時知威州治行異等史學丹稜人哲宗時知茂州監軍營田魏了翁有記明劉堅永樂時知茂州奏請立學校以教軍民子弟秉公有守均徭平訟流民復業歲旱祈禱甘雨立應秩滿州民保留之陳敏華亭人知茂州先德後刑除姦宄保善類在任六年民立生祠祀之柳芳延安人宣德中知保縣羌民叛亂芳捍禦有方民賴安輯屠安民隆慶中任保縣捐俸築南城保人德之張祥江陵人成化中知茂州愛民育士學校橋梁多所修葺升太僕寺丞崔哲遼東人正德初知威州化服強畨邊陲無警軍民賴以安堵范淵桂陽人正德中以郎中謫威州選番民子弟入學宫教以詩書淑以道義自是番民慕義歸順民建祠祀之何福全鳯翔人由吏員歷判威州政尚誠實不事苛刻秩滿以安戢功保升本州守蒞任九年致仕歸孫漢江陰人嘉靖間知茂州時五寨蠻亂守禦有方蠻不敢犯未幾以憂去軍民如失父母王淵江西人以給事中謫判茂州治才卓異有清操去之日一馬一僕茂人無知者婁廷璋陕西人嘉靖中知汶川開設學校治汶有聲汪守廉黃岡舉人萬厯中知威州視民疾苦如痌瘝切身士民愛慕番獠傾服升曲靖同知舒文璧萬厯中任保縣捐俸築南隄二百餘丈民賴其利麻康萬厯中任保縣增寨禦夷在官十四年無邊釁民愛之如父母云吳偉漢中人由國子監生知茂州卓有政績歷升四川左布政使直隸達州周辛昻通州刺史推誠布信甚得蠻獠歡心纍遷驃騎大將軍唐李洞客貞觀初為通州刺史政尚清平民以慈吏呼之李適之開元中為通州刺史政不苛細為下所便明皇時水災適之作三大防曰長楊曰積翠曰月岥自是水始不為災天寶初入為左相韓滉宰相韓休子至德初為通州郡長史有政績德宗時為鎮海軍節度使綏輯百姓不踰年境內稱治歷官中書門下平章事李泌謂其公忠清儉真大臣之器卒諡忠肅宋余應求江西弋陽人崇寧中進士為監察御史論童貫談稹以中人預軍政為國之辱又言將相不宜爭私憤當早定戰守之計為時所忌出監達州茶場後官吏部員外郎李耆夀字南公紹興初為達州守辛於官魏了翁稱耆夀資性孝謹臨事有大慮其修之家行之官率多可紀楊載涪陵人紹興中知達州嘗憤劉豫之凶逆願橫行寇中手刃豫以報朝廷張浚壯而薦之故有是命後果著聲績云陳式永嘉人淳熙中知達州崇學勸農葺城完廩以禮為教民心感悅立祠祀之明曹嗣宗柳州人進士永樂中任達縣亷能有聲後歷陜西僉事邢元亨咸寧人知達縣鄢藍寇亂力為撫禦邑賴以安周雍永康人嘉靖初守達州講學訓士立社倉約法二十八條民便之徐朂湖廣人嘉靖初守達州歲大旱請禱甚恪併給牛種作水車是年有秋政暇與諸生講學不倦士民感之楊振文貴州人嘉靖中守達州不事苛刻歲頻旱多虎禱於神雨隨大霈一日虎斃者三傅汝楫山東恩縣舉人知東鄉政尚簡約却寇完城士民悅服秦曰藩字納賢鬱林州舉人萬厯四十年以重慶府丞改知達州學宫祠署鼎構一新既去郡人建祠尸祀焉紀壯陜西人萬厯四十年知太平縣凋敝之後撫綏頗稱得法以左遷去識者憐焉四川通志卷七上欽定四庫全書四川通志卷七下皇清名宦總部南朱馬喇滿洲鑲白旗人順治三年從未肅王定蜀為前鋒都統時獻賊餘孽靖朱馬喇奮勇當先所在撲滅盡力邉陲開拓疆宇大有造於西蜀南伊馬喇朱馬喇之弟與兄從貴肅王定蜀官前軍護衛值賊黨趙雲圍保寧伊馬喇與賊戰連發數矢賊將皆應弦而倒秉勝追擊保寧圍解全蜀底定隨肅王旋京師康熙十三年吳逆叛滇黔隴蜀復為賊據又以參領從軍征蜀進次廣元恢復保寧既而偽經略王平藩授首以次廓清厥功居多云李國英字培之遵化人隸正紅旗順治三年從肅王定蜀獻賊殱滅王師凱旋國英以孤軍鎮保順間羣寇環伺隨機剿撲未嘗少挫八年巡撫王遵坦卒廷議代者數人世祖特命國英以都御史任巡撫治兵閬中軍旅之後勸課農桑民足食用十四年晉總督旋加太子少保兼籌荆陜屢平大寇保釐全蜀者二十有一年卒於官諡勤襄郝浴字冰滌直隸定州人順治六年進士主政刑曹一時有大整西曹之譽八年改御史來按蜀時巨寇劉文秀等踞滇黔吳三桂專閫駐師保寧七年無功浴至劾其縱兵焚掠任用私人陰蓄異志諸姦狀無何三桂敗衄棄保寧退走漢中全蜀震動傳言賊旦夕至會補行辛卯科鄉試浴職任監臨入闈鎮靜以安人心乂一晝夜七馳檄曉以大義三桂始返斾然且猶豫浴授以機宜乃始固守既而賊抵保寧勢甚張浴親歷行間激發忠義遂克捷兩川以次奠定世祖章皇帝特命督守城池前後疏凡數十上並嘉納先是蜀地兵荒相繼民鮮儲蓄守土者貸民耕牛而徵其租租重牛尋斃民頗苦之浴為疏免姚締虞字岱鹿湖廣黃陂人順治己亥進士司李成都改官陜西安化令晉秩諫垣擢僉都御史巡撫四川時蜀紳宦遊者多以故土荒殘逗遛異地締虞具疏請令還籍以實地方並查勘田畝令民自首糧賦户口大為改觀一切民生利弊悉心調劑卒於官民追思不置張所志遼陽人順治十七年巡按四川時川中土廣人稀道路榛莽所志遍歷四履招徠約世祖嘉束條陳全川事宜章數上納之張能鱗順天大興人順治十八年由進士分巡建南道駐劄嘉定州時軍務倥偬芻糧急需挽運能鱗調度協宜雖輸將絡繹民不知苦又築蘇稽大堰以利農務至今賴之郎廷相字鈞衡遼東廣寧人康熙三年任四川布政司招撫流移廣行安插措置牛種勸諭耕鑿兵火之後公署無存廷相經營締造務合體制又修橋梁理舟楫建貢院至爨宫社學悉皆通飭修舉毫不纍民任蜀五載升豫撫去任逺近老幼遮道號泣趙良棟字擎之陜西安邊衛人康熙十九年己未奉詔討吳逆號令嚴肅賊莫敢攖其鋒王進寶與賊將王平聖祖特命為勇略將軍時奮威將軍藩相持於保寧良棟以偏師由陰平間道直抵成都賊衆望風奔潰旬日間郡邑傳檄而定會進寶亦奏捷保寧良棟遂乘勢收復全蜀大軍所至秋毫無犯至今蜀人德之卒諡襄忠杭愛滿洲人康熙十九年巡撫四川屬吏敬憚莫敢干以私時滇黔未靖調軍協餉勞績甚著王騭山東福山人順治乙未進士康熙十九年分巡松茂道時蜀中甫定廣為招徠又築都江堰堤以溥水利士民頌之周燦字星公陜西臨潼人順治己亥進士康熙二十五年督學四川嚴查優劣以示勸懲士皆向化丁卯庚午之間獲雋者率所拔取著有願學堂集行世李輝祖字蒲陽鑲白旗人康熙二十七年任四川布政司時因歲供蠟料棧道險阻民多病題之輝祖詳請免又奉旨清查田畝勸諭流民開墾按地起徴不漏不苛公私交便噶爾圖滿洲人康熙二十八年任四川巡撫查丈田畝募民墾闢流移復業刋刻大學衍義頒發膠庠俾士子向學又節省驛站公帑修治劍閣傾圮道路至今賴之嶽升龍字見之陜西莊浪衛永泰鎮人任天津衛總兵扈從聖祖北征平定噶爾旦録功晉秩康熙三十七年授四川提督操練軍士調度有方時建昌涼山諸番猖獗乃督率戎伍出奇制勝直逼巢穴番衆畏懾棄戈輸誠者凡十萬九千户聖祖仁皇帝書仁愛士伍四字賜之又賜一聨云太平時節原無戰上將勳名在止戈天章疉沛時多榮之高起龍字霖蒼鑲白旗人康熙四十年任四川布政司檄州縣徵收錢糧務令民自封投匱嚴禁私派遇編審之年俾里甲均平承辦胥吏不敢舞弊納課審丁悉有成規云韓成陜西人四川合州籍康熙四十二年任重慶鎮總兵法令嚴明諸蠻率服遇亢旱禱雨輒應郡中偶不戒於火成具衣冠肅拜匆返風火尋滅人稱為神劉德芳字純菴逺陽人康熙四十三年任四川按察司讞決平允時臬政兼𣙜茶鹽而西爐甫定積引未疏德芳籌畫徵收歲無停滯又修葺文翁石室為錦江書院一時人士欣然向學至今與文翁並祠祀焉陳璸字梅川廣東香山人康熙甲戌進士四十八年由部曹督學四川謝絶請託作育人才襆被蕭然止一蒼頭隨侍食朝夕無甘旨閲文夜分不輟試重慶未竣會閩撫題請調補臺灣道瀕行不能為資斧計後官湖南福建兩省巡撫卒於閩聖祖嘗以璸清亷謹慎追以上崇祀名宦贈禮部尚書諡曰端肅孟喬芳字心亭鑲紅旗人射少不屑事章句好騎太宗文皇帝奇其材引置左右遂隸旗籍擢刑部承政以梅勒章京管牛録事屢從征伐皆著戰功順治元世祖章年隨入關定李自成之亂帷幄中籌䇿居多自成皇帝戰敗竄歸關中喬芳帥師追之九月關中平拜兵部右侍郎兼都察院總督陜西時張獻忠尚據蜀二年冬十月喬芳遣總兵官范蘇等討之遂收龍安又疏陳蜀地戰守之計皆見施行九年入覲命總京師尋還西安十年處軍務十二月以病乞骸骨督陜西三邊四川等詔加少保馳驛回京會卒贈太保諡忠毅并賜祭葬席教事字覺海山西臨汾人前明癸未進士順治十七年以刑部主事擢四川提學僉事公明正直為一時學臣最著有閬中吟人多傳誦之衛紹芳字猶針號復菴山西猗氏人順治丙戌進士十七年任川北道參議時值郝承裔之變紹芳督餉轉運無誤賊平議敘轉浙江巡海道劉璽字爾符陜西朝邑人順治丁亥進士由浙江烏程令左遷四川按察司照磨署通江簡州皆有惠政民多感戴張光祖字大光河南新鄭人順治己丑進士康熙元年任四川提學剔積弊絶苞苴衡文以先正為宗士風丕變張椿字伯珩山西陽城人順治己丑巡按四川時保順二府初隸版圖與巡撫李國英綜理緩急請撥牛種五萬給散兵民本年奏銷除接應軍需外貯粟六千八百餘石又疏催學臣以興文教頒憲綱以肅吏治至今人稱頌之陳安國字斗垣陜西沔縣諸生後以僉事監軍四川會巨寇攻保寧甚急安國詣西安乞兵總督孟喬芳應之圍遂解又招降姚黃賊衆數萬尋以事下獄未幾得白升井陘道楊道淳字稚常陜西洋縣人順治四年以明經授四川監軍道時寇盜縱橫道淳單騎馳赴德宣布戢散亡尋升四川按察使攝巡撫事以勞苦威安致疾卒李藻字鑑明山西陽城人順治八年以湖廣辰常僉事遷四川川北道參議是年蜀省始行鄉試藻任提調方鎖闈校士聞賊至同官錯愕士子將散走藻以整暇竣試人服其識量王孫蔚字茂衍陜西臨潼人順治壬辰進士由刑曹纍官福建布政司左遷川東兵備道孫蔚精刑名每視事握朱墨二筆判決如流著冇軺香集馮雲驤字訥生山西代州人順治乙未進士由部郎康熙二十年提學四川時癸亥補行辛酉鄉試新録諸生尚未達部院司議以一體觀場恐於例有礙雲驤詳稱蜀方蕩平多士向化宜格外奬掖遂力主入試暨揭曉列名者三十餘人人服其知人且有膽力云佟鳯彩遼陽人康熙元年以都察院右副都御史任四川巡撫題修都江大堰於民田大冇裨益楊應魁滿洲人康熙元年分巡永寧道值鎮兵進剿江安土寇吳天民永城空虛賊驟至勢甚危急應魁徵調鄉勇指揮得宜擒斬賊兵無數招集流移人皆安堵張德地滿洲藉遵化人康熙三年由副都御史任四川巡撫時總督苗澄以蜀省額兵四萬欲抽撥七千人屯田通計一嵗所獲米數作折色可得銀五萬六千兩以足兵餉德地以為蜀當兵燹之餘土著稀少必照督臣所議行恐兵不習耕土不宜人日後必致兵農兩誤不若度川中稍緩之地量減其可裁汰者一嵗計省銀五萬六千三百兩有奇與屯田來數折色之銀相符於聖祖國計有益請定夔關總稅裁寧番越巂會川鹽井梅允其奏又嶺安寧大壩等處雜稅商民深德之李翀霄字息六山西絳州人拔貢生康熙三年任四川按察使時蜀初定抗逆株連者三百人力為平反止殱渠魁三人餘俱省釋又請革陜西茶馬纍以蘇蜀民後遷江西布政使王曰曽號省齋江南溧陽人康熙庚戍進士分巡建南道直陳東省一案清查田畝身歷田間較定弓步法嚴弊絶控馭諸蠻漢夷安堵升任日囊橐蕭然絶無長物李興祖鑲白旗人康熙四十一年任四川按察使讞決多所平反兼鹽茶驛傳通商利民郵政肅清張松齡字鶴生福建莆田人順治乙未進士選庶吉士擢給事中疏言選官守候羈苦聽回命清刑籍候憑仕途便之奉尋轉四川參議四川承凋敝獄疏錢法不撓權勢後民多逃竄松齡贖回悉給牛種加意撫綏流亡漸復後以裁缺歸值耿逆變作逼受偽職不從被囚數月終不屈卒髙蔭爵字淡菴鐵嶺籍鑲白旗人由廕生歷升四川松茂道按察司僉事康熙四十五年疏濬都江堰水利轉運黃勝關糧儲署布按兩司事綏懷有術訟獄無寃兵民交感後轉直隸口北道循以上吏成都府戴𢎞烈字山明江南桐城人順治辛卯領鄉薦康熙八年任成都令招流亡給牛種民有疾痛親製藥劑療之又親督夫役修都江堰以通水利民至今咸稱頌之馮昌奕山西蒲州人順治戊戌進士十八年授郫縣令有能聲擢陜西華州知州蕭永芃鑲白旗人康熙三年任溫江令甫至即咨詢地方利弊勸墾荒田掩埋枯骨招集流移期年民復其業王瑚鑲紅旗人康熙二十二年令溫江慈惠廉明嚴禁科派胥役畏法王宗祐廣東樂會人康熙甲子舉人丙戌授溫江令邑苦旱潦築江安堰浚楊柳渡民飫其利田軒來字東軒浙江山隂人康熙辛未進士三十六年任成都令潔己愛民興學造士至今人佩其德周輔奏浙江海鹽人由副榜康熙四十七年任成都令明斷剛決發姦摘伏每多奇中攝崇慶州篆時州案多未結輔奏署任甫數月為訊結一百三十六案讞語精詳共稱平允崇人建祠祀之循以上吏重慶府陳丹赤字獻之福建候官人順治辛卯舉人司理重慶以卓異歷升駕部郎中任浙江僉事覲分巡溫處攝臬篆入即舍舟兼程至東甌繕城堡歸至東昌聞耿逆變備糗糧晝夜守禦不避矢石時鎮帥𢎞𢎞勳隂通逆黨楊春芳計邀丹赤議事擁兵脅降丹赤正色慷慨開陳大義𢎞勳厲聲曰兵餉俱無何以出戰丹赤曰提兵前鋒計冇半萬何謂無兵糧可給至六月何謂無餉𢎞勳持丹赤手曰公獨不念骨肉墳墓乎丹赤麾之曰吾知以死報國不知其他𢎞勳目千總髙魁持鋼斧擁丹赤出斷其右臂兵刃交下而死事聞贈通政使司通政使賜諡忠毅諭祭賜葬立碑建祠致祭孟易吉湖廣武昌人拔貢生順治十八年任綦江令修城建學作士愛民時值遷移會𠞰勞心拮據善政孔多劉宗沛字鶴陵陜西蒲城人順治辛丑進士歷任合州知州勸課農桑興行禮教政績最著何徵蘭福建人康熙元年由進士知南川縣才勝繁劇兼有德威士民懷畏于成龍山西永寧州人副䅭康熙七年知合州賦情清介興學校課農桑惠政甚多歷任兩江總督李秉直江南江寧人貢生康熙七年任綦江縣招集流移民多愛戴方應禱廣東惠來人順治丁酉舉人康熙二十年任南川令嚴禁私派勸課農桑民甚德焉陳正鈡江西新建舉人康熙二十年任綦江令性恬淡以廉隅自持邑人稱之徐振基廣寧人康熙二十四年任綦江令性廉潔邑人頌德不衰虞兆清浙江嘉興人康熙己未進士三十七年任綦江令政教浹洽五載行取劉若鼐字敬菴山西臨汾人康熙壬子順天舉人三十二年任長夀縣令廉而有惠政治行舉蜀中第一纍官大理寺少卿方嶽浙江會稽人康熙三十三年由思貢任綦江令居官敬慎民樂其治喬文錦直隸人進士康熙三十六年知南川縣有惠政張景良河南人嵗貢生康熙四十年任南川縣愛民重士廉平稱職許國棠鑲黃旗人康熙四十二年由筆帖式任綦江令撫字有方民皆樂業後升知北直冀州姚孔鏞字柷如江南桐城人貢生康熙四十六年知合州興學重農催科不擾民樂輸將歷八載卒於任士民哀慕不忘張有孚字合田江南桐城人嵗貢生康熙四十七年令南川有惠政以上循吏保寧府李向榮字苑仙冀北人康熙二十六年任劒州牧時當報最值吳𢎞偽將談𢎞復叛屢加迫脅向榮不屈死之以上崇祀名宦郭嶷然字因之陜西朝邑人順治乙酉舉人由交城教諭遷福建閩清令再補昭化邑有黠婦為衆盜主前令多被挾制嶷然抵任首捕下獄斃之黨羽解散境內以安撫民如子為置耕織具地故産金俗呼狗頭金民爭以獻悉却之解官囊無長物顧亮江南吳江舉人順治二年任劒州牧加意學校一時士習油然向化咸大猷遼東人順治十五年任劒州牧撫集逃亡勸墾田土人深戴之張可立字蔚生福建福清人隸順天籍歸鑲黃旗順治乙未進士十七年任劒州牧重士愛民州人德之王保釐字東郊湖廣蘄水人順治戊戌進士康熙元年知通江縣修城垣建學宫為政平恕不尚苛刻喬鉢字文衣北直內邱人貢生康熙三年知劒州力均里甲澤被州人黃士龍廣東花縣人康熙壬子舉人任蒼溪令簡徭恤民興學造士卒於官橐無餘物士民謳頌不忘戴縰字鶴浦湖廣江陵人康熙癸丑進士二十六年知南部縣以循良著士民愛之屈穎藻字龍章陜西蒲城人康熙甲戌進士任蒼溪令以才能著兼攝梓潼士民豎坊以志其德佘嵩生正藍旗人巴州知州性亷靜多惠政士民戴之康熙辛卯科調充同考官以疾卒於省邸一無餘物上官憐而賻之始克成殮以上循吏順慶府袁定逺浙江人康熙庚戌進士任順慶守慈惠亷明正己率屬時有吏行冰上人在鏡中之頌廖士正湖廣人壬子舉人康熙十九年任營山令甫一月逆黨談𢎞裨將彭時亨叛執士正闕再至渠縣拘繫月餘脅迫以偽職大罵不屈望拜引領就戮事聞賜恤廕一子徐盛遼東人康熙十九年知廣安州值逆黨談𢎞之變為賊所縛不屈死事聞贈四川布政司參議監後授成都府同知賜祭葬廕一子印祖入以上崇祀名宦上官𢎞基字孕昌陜西朝邑舉人順治初年任營山令時供億取辦於里民𢎞基至悉除之政尚寬簡濟以嚴明及卒貧不能歸櫬邑人輸金助之張玉璘字魯賓福建人任營山令教養有方士民悅服熊焯陜西咸寧人順治己丑進士知渠縣招徠撫恤興立學校歷任四載擢御史士民扳留不忍其去湯裔振北直南皮人進士順治十七年知南充縣時軍興旁午裔振理煩督餉供億不匱且調度有方民不病役丁內艱去邑人思慕不已李時亨直隸棗強人進士順治十八年任鄰水縣時瘡痍初復時亨修葺城垣招徠人民綏撫有方邑遂殷庶雷鳴魯河南開封人歲貢生康熙二年任渠縣修復縣治招集流移後卒於官輿櫬歸民皆泣送路為之塞周世澤順天大興人順治辛丑進士康熙七年知鄰水縣甄拔士類時稱藻鑑勞溫良廣東人康熙庚戌進士知鄰水縣湛深經術治先教化士民歌頌不置胡雲龍遼東人康熙二十一年由廕生知鄰水縣招撫流移勸諭墾闢政績卓然蔣擢順天大興人康熙二十二年由官監生任鄰水令有政聲越四載以憂去民皆思之循以上吏敘州府錢紹隆浙江人康熙庚戌進士二十年宰富順時戎馬倥偬紹隆盡心保障安戢殘黎調協軍伍周貧乏掩遺骸迄今思之不置顔斆字敷五順天宛平舉人康熙二十年守敘郡時滇冦犯境戎馬在郊斆捍禦多方保障孤城民賴以安後卒於官郡人思之不已何源濬江南丹徒人拔貢生康熙二十一年知馬湖府時進剿滇寇源濬身親運糧民不擾而軍食常足百姓逃匿者給以牛種安插之厥後夷玀猖獗檄兵征討嘗單騎賚犒生夷懷德且懾服焉名以上崇祀宦薛起鳯陜西韓城舉人順治初任筠連令惟蒼頭一人掃室執爨事皆親理不假手吏胥士民服其清正卒於官貧無以殮民爭致賻舁櫬歸里且建祠祀焉周璧湖廣人由選拔知慶符縣邑多遊民不知務本璧出郊勸農日加誡諭不憚勞瘁遂改積習戴佩廣東始興人任屏山令時值荒歉民採蕨根充食佩為購米設粥以拯民飢劉天爵奉天人康熙二十八年任屏山縣首重文教士習丕變曹重北直豐潤人康熙四十五年由杭州府船政同知升授馬湖守愛惜士民漢夷樂業徐樹閎江南崑山人康熙五十九年知屏山縣修義學置學田學使方覲勒石志之陳聶恆字秋田江南武進人康熙庚辰進士任長寧令撫字有方聽斷明敏公餘課士文教日興捐置後江渡口義田並造清溪橋民多懷惠雍正元年升刑部主事廷臣薦其夙學奉旨特改翰林院編修以上循吏夔州府王正一江南太平人恩貢生康熙二年知萬縣孤介自持治行冠一時去任日民遮道留之楊印昌江南上元人恩貢生康熙三年知雲陽縣招徠撫字士民漸歸故土左其選湖廣夷陵州人拔貢生康熙三年知建始縣時城市荒蕪其選攜一僕至縣偕典史尹德親艾荆棘結茅以居招回流民數百人給牛種勸開墾邑中始有起色歷三年致仕歸邑人懷之陳漢良福建閩縣舉人康熙四年知奉節縣几十載吳逆叛全節以歸鄭朝清福建泉州舉人康熙十二年知萬縣為政清嚴士民懷畏栗生蘭遼東人康熙十九年知奉節縣惠政賢聲士民戴德旋升陜西臨洮府同知去任邑人立祠以祀之龍鱗錦廣東番禺舉人康熙十九年知萬縣自奉儉約禮士愛民鄒應泗陜西鳯翔人進士康熙十九年知雲陽招撫流移有良吏聲吳李芳湖廣寶慶人丙辰進士康熙二十三年以內開中書改補建始縣日與諸生講學無倦色歷三年邑人悉知禮教許嗣興鑲藍旗人康熙二十五年知夔州府事時寇氛初靖嗣興力事拊循尤留心學校纂修郡志事多徵實又念夔巫間夏秋江漲水險設救生船以拯弱丁卯歲旱郡城火三日不熄訛傳妖蛇為祟嗣興禱於城隍神俄頃大雨時有官可回天之謡史晟福建人舉人康熙二十六年知建始縣創學建署常平義倉俱次第修舉時稱良吏云王漢周字晉振湖廣黃岡人康熙癸未進士任奉節縣有亷明聲以課最歷知陜西鞏昌府惟赦衣一簏見者感嘆郭孝穆陜西長安人監生康熙五十四年知開縣加意學校設立義館延師訓士每遇賓興尤力為奬勵後丁艱歸士民深感之以上循吏龍安府王士穎字學齋福建閩縣人康熙已卯舉人五十五年知江油縣歷任七載撫字有方民立千家膏雨坊以志遺愛以上崇祀名宦章士穎福建龍巖乂順治丁酉舉人授龍安府推官以裁缺改知禮縣民素苦亡絶賠纍旗軍興屯揑報開墾民多逃亡士穎招撫墾荒給以牛種復業者甚衆乂申請蠲豁天嘉十九里正供井鞏禮文三衛所糧米會吳逆變受困四月圍釋乃鮮楊柱朝湖廣臨湘人順治巴亥進士授平武令邑遭獻賊蹂躪滿目荆榛柱朝招徠流亡相率復業稱良吏焉衛秦翰陜西韓城人順治辛丑進士始授北直靈壽令有惠政擢禮部主事由正郎出知龍安府下車即革里民供應陋規在任九年鎮撫獠夷結以恩信所隸三土司帖然輯服境內又安以年老致仕歸數百里中多泣送者張沖翼陕西富平人前明壬午舉人由教諭升平武知縣擢御史康熙十二年聖祖親試臺垣奏議沖翼名列第一翁佶字懋初直𨽻清苑人順治辛丑進士康熙五年知龍安府淡泊自甘歷任數載後因公赴省卒於邸囊無餘物黃極遼東人康熙十九年任江油令委署綦江縣俱有惠政及去任民咸惜之于有慶奉天潘陽人康熙三十五年由官生任江油縣歷任數載除羡薄棁邑有父母之頌循以上吏雅州府李應崇字繩二遼東人康熙四年由廕生任名山縣招撫流移開墾荒蕪又濬城隍修縣署民樂趨事尋丅外艱去邑人思之張起鼎字五一山西人滿洲籍康熙四年由廕生知蘆山多惠政捐修大陵石橋以便行旅民至今稱曰張公橋朱景辰字建北福建將樂人拔貢生康熙七年自湖廣當陽令調名山縣秉性方正人皆敬畏私弊悉絶劉啓和號石洲湖廣江陵籍江西廬陵人康熙丁未進士知雅州雅濱於夷通商販百貨輻輳民多逐末啓和勸課耕讀由是始敦本業遲熇鑲白旗人康熙二十一年知蘆山縣縣分三鄉明制照里甲定役康熙二十三年編審熇按畝均丁民甚便焉遂為成例楊廷琚浙江人進士康熙二十三年任蘆山令民愛敬之以病致仕扳留垂泣者絡繹於道丁傑直隸宛平人康熙三十八年任雅州置鐵索橋於洪港行者不病涉士民繪像祀之趙承燾字子容號點菴錢塘人康熙四十二年知名山縣人有惠風和日之稱尤鳴高福建閩縣人由貢生康熙四十三年知雅州州當西爐孔道茶鹽商賈往來絡繹鳴高嚴察吏胥稅遵定額商旅便之姚鋭字藻如江南桐城人歲貢生康熙四十四年由梓潼縣升雅州知州政教嚴明姦猾斂迹以病卒於官士民惜之以上循吏直隸嘉定州雍正十二年升為府冀霖字而亭山東臨清人康熙甲戌進士三十九年知峩眉縣屏絶餽遺有清名後行取纍官禮部正郎督學江西張芑字武仕江南桐城人康熙丁亥貢生任嘉定州牧創立書院以課士子所賞拔者後多成名又於邑中通津修治橋梁以利往來人呼為張公橋云以上崇祀名宦朱升浙江人進士知峩眉縣慈仁御下淡泊自甘引年致仕歸囊篋無長物劉靖寰奉天人康熙九年由廕生任犍為令時蜀疆初靖差務甚繁靖寰盡革加派耗羡民亨樂利倪懋祚浙江金華人進士康熙十九年宰犍為縣性淡泊分毫不取於民囊無餘積致政歸民餽以贐置之江干不受而去孫調鼎字燮臣正白旗人康熙二十一年由監生知夾江縣政平訟息吏治稱最劉際亨字賓虞正藍旗人康熙二十五年由廕生任夾江令修城垣開新堰後升工部主事循以上吏直隸眉州趙蕙芽字幼湘直隸淶水人拔貢生康熙元年知眉州築堤堰以資水利給牛種以勸開墾更設立義學延師訓士時推良牧第一以上崇祀名宦直隸邛州李德耀鑲白旗人康熙四年任大邑令嘗單騎遍歷原野開導水利於先賢古迹必建祠豎碑志之李紳文江南潁州人康熙戊辰進士三十五年宰蒲江縣丙子鄉試充同考官羣服其有知人鑑􅔦任六載以廉幹行取士民思之如父母云黃藜字天閣福建平和人康熙庚午舉人四十二年知大邑縣邑舊有堤堰三十六座導水灌田常資修濬藜於春作方興即捐俸親督堰長預期修築終藜之任秋成無歉以上崇祀名宦蕭恆字君常號月菴陜西三原人順治辛卯解元壬辰進士康熙四年知邛州多惠政溫廷橒字若華河南人選貢生康熙四年判邛州隨署州篆右文重士甫一載風俗文章煥然改觀黃復生湖廣人貢生康熙十九年知邛州適軍興旁午復生調劑輸將夫役往返酌量更換民賴以安傅燮調號繩菴直隸靈壽人康熙二十三年任邛州時有電掃訟庭響答詩筒之語荆元實江南丹陽人進士康熙二十六年任蒲江令禁革浮徭力行實政梁永祚字堯山康熙三十九年任蒲江令是時歲屢儉民多四散永祚按籍招徠計口授食且給以牛種履畝勸耕復業者衆以上循吏直隸潼川州雍正十二年升為府陳愚湖廣興國州人康熙己酉舉人知遂寧縣操守廉潔視民如子鄧元貞江南徽州籍湖廣漢陽縣貢生康熙二十七年知謝洪縣下車即禁私派課農警惰懲治豪強又詳設塘鋪嚴查私鹽以通商引稱廉能吏後卒於官以上崇祀名宦潘之彪江南丹陽人順治辛丑進士康熙七年知蓬溪縣詳請行銷水陸鹽引俾無壅塞兵民俱便纂修邑志最稱詳贍迄今傳之蔣垣字用崇福建候官人康熙壬子舉人母歿廬墓三年有羣鳥集鳴墓巔人以為孝感甲寅耿逆變作垣逃匿橘園洲偽曹以宿學交薦乃以巴豆漬面松煙熏目託廢疾拒之嗣約李天王然等謀內應以延被害垣得免師事泄天然等俱王師入閩經橘園洲士民舉垣忠節大帥疏康親王聞授歸化教諭遷泉州教授升四川鹽亭令廉明執法邑人頌之旋乞休卒雍正甲辰奉旨入忠孝祠周甲徵浙江山隂人康熙十九年任蓬溪令值吳逆披猖居人星散甲徵招徠流移歸者如市遂為完邑謝旻禧廣東舉人康熙三十四年知中江縣居官清正邑人士深德之刻石立祠今俱在張應詔字圖園貴州黎平人辛酉舉人初任直隸肅寧縣令康熙四十三年任潼川知州時有姑嫂同宿而嫂為仇所殺人疑姑有私應詔置不問濳訪凶惡置諸法女寃得雪其決疑獄類此他如革私派設義學修葺城垣安插流移皆實心實政內升刑部員外郎今七屬士民猶謳思焉以上循吏直隸瀘州王育奇正紅旗人康熙三十二年任瀘州牧革火耗嚴保甲民安盜息尋報最去任至今人稱良吏名以上崇祀宦孔斯和山西澤州舉人任瀘州牧務以德化人有忿爭搆訟者曲為諭解故人多去後思陳五典江南太湖人拔貢生知瀘州殫心任事士民戴之萬其智貴州黔西籍江西人舉人康熙十九年任納溪知縣時軍興旁午百姓逃匿其智詳請嚴禁勒索夫馬酒食民漸歸業朱士華直隸人思貢生康熙二十年知瀘州保民如赤訟簡刑清後以辦理軍需積勞成疾解組去楊奇烈三韓人康熙二十四年任瀘州牧均徭役勤教養士民愛慕之胡頊奉天籍遼陽人康熙三十一年任瀘州牧清查田賦酌劑維均民利賴之王帝臣奉天瀋陽人康熙三十六年知納溪縣卓有正聲署瀘州事纂修州志時文獻無考帝臣以因名核實為己任書成足備採擇張士浩陜西涇陽人貢生康熙四十六年自山西潞城令遷瀘州牧均平徭役民有爭訟面為剖決人稱神明建惠政坊以志不忘以上循吏直隸資州習全史陜西同官人進士順治十八年任內江令時兵燹之餘補築城垣修葺祠廟蒞任七年撫綏盡職士民懷之以上循吏直隸綿州常大忠字二河山西交城人順治壬辰進士知梓潼縣招撫流移墾闢荒蕪以循良著卜景超號介菴直隸固安人康熙己未進士二十三年任安邑招民開墾撫字有方後升吏部主事任紹爌字思菴河津人康熙甲辰進士三十一年任綿竹令以廉潔自矢公庭寂靜嘗單騎出部勸課農桑在任一年卒貧無以殮布政使髙起龍賻送歸里以上循吏直隸茂州陳名蟠字念齋福建福寧州人康熙丙午舉人任四川汶川令邑當蹂躪之後名蟠多方撫輯民免流亡有中山邪圃地隸汶川而徭冒威州年久逋賦乃按籍得三百户力請徭隨田派籍乃定以內艱歸歷升刑部郎中出守真定署井陘道正已率屬風裁卓然以勞卒於官士民思之立祠以祀張廷柱陜西韓城人監生初任廣西融縣令擢知北直保安州抑強鋤盜亷公有威尋以艱歸後補茂州漢夷率服尤多善政以上循吏直隸達州王舟江南合肥人順治辛丑進士康熙七年知太平縣散給牛種勸墾荒田士民德之陶虞揚江南全椒人進士康熙二十一年任達州力事撫綏流移趨附旋以丁艱去士民懷之程溥江南江都舉人康熙二十一年補太平令署達州事時歲飢流亡載道溥悉心安輯民賴以生董守義鑲白旗人監生康熙二十三年任達州牧有凶人手刃叔母假以盜殺赴訴守義片言摘發即伏辜舉州咸稱為神以才調直審官數年多所平反馬雲從遼東人康熙三十四年知達州己卯秋潦民食維艱雲從多方告糴境內賴以全活民立生祠祀之以上循吏補遺俞宣琅字雍來浙江海寧人順治己亥進士任大竹令時邑殘人稀宣琅招墾撫循民賴其蘇卒於官橐如懸罄邑民醵金賻之櫬始得歸魏學渠字青城浙江嘉善人順治戊子舉人任成都府推官時蜀民疲於差徭學渠撫綏得宜又定嘉眉邛雅賦額公私稱便升刑部主事歷任江西守道吳宏字芬月浙江淳安人康熙癸卯舉人任鹽亭令邑田地汙萊學宫榛蕪宏養教兼舉時有寃獄久不決默禱於神遂得尸所立白之升汝州知州以上循吏四川通志卷七下
