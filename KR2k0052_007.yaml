body:
  text: 四川通志卷七上名宦順慶府漢第五倫性質慤少文時以清白稱永平中為宕渠令有治行民甚懷之歷官大司空隋柳儉蓬州刺史潔己愛民獄無繫囚時稱亷正唐屈突通長安人知西充縣事規模制度賴以詳明顔真卿肅宗貞元元年李輔國脅遷上皇於西內真卿率百僚上表問起居輔國惡之貶蓬州長史仁以撫民寬以馭衆恤災患救飢寒遷利州刺史去郡人思德立祠祀之崔元亮開元中任果州刺史姚合送以詩騎吏緣青壁旌旗度白雲劔銘生蘚色巴字疉冰文足徴其概史謙恕果州刺史百姓歌之曰使君來何晚昔無儲今有飯李堅貞元間授果州刺史課最遷秩司農少卿韋貫之京兆人為吏部員外郎牛僧孺等忌之以考賢良事坐貶果州刺史有善政後仕至平章事宋趙繁開寶中任刺史建學育才人多仰之李晊知廣安軍事簡易為政寬厚治民滿任去郡人咸慕之朱昻開寶中知廣安軍事仁恕決訟寬簡臨民擒妖賊李仙蜀民以安歷官至翰林學士工部侍郎楊克讓知果州有善政特賜璽書褒美邵業字日華桂陽人太平興國中登進士第厯蓬州録事參軍時部民張道豐等被誣為盜獄已具業察其枉不署牘未幾捕獲正盜豐等得釋及代還太宗喜謂曰汝能活吾平民深可嘉也賜錢五萬授光祿寺丞王旦字子明大名人端拱間守蓬州清節著聞民被其澤官至平章事為名相卒諡文正查道字湛然休寧人端拱初登進士淳化中果州寇黨何彥忠擁衆不聽撫道單騎趨賊所諭以詔意賊咸曰仁郡守也肯害我乎相率拜給券歸農上賜璽書褒美寇瑊任蓬州軍事李順餘黨謝盛等復起為盜瑊擒送京師崔立任果州推官會有役兵輦官物道險乃索衆錢傭舟知州薑從革論如索斂法當斬者二人立曰此非私已罪止杖以示懲耳從革不聽後論奏詔如立所議凌䇿字子奇宣州涇人登進士天禧中判廣安軍事恪勤吏職處事精審歷官諌議大夫知益州初䇿登第夢人以六印加劒上遺之後往劔外凡六任卒符其夢云龔鼎臣字輔之須城人仁宗時知渠州渠故僻陋無學者鼎臣建學校選俊秀為生徒立課肄法自後始有登科者渠人繪像祀之李大臨字才之成都人登進士第官祕閣校理家貧無僕隸自秣馬仁宗使覘之還奏嘆曰真亷士也以親老知廣安軍事上言青苗不畏權要歷官集賢殿修撰致仕裴德裕知蓬州有善政每議法必依仁恕李修孺知果州有治狀蘇軾作詩美之葛宫知南充有惠政時東川飢民艱食部使者檄宫守資昌兩州悉以惠愛著聞陳瑊知南充有能名歲旱帥司免下戶兩稅轉運使安節以為虧漕計瑊言茍利於民違之不可節從之邵伯溫守果州請罷歲錢數十萬以省民力民受其惠擢提點成都刑獄再遷利州轉運使蜀人德之吳幾復知蓬州有惠政任蒲去父老拜庭下曰鄉民被使君之政久矣今聞還朝故來相别且歌曰使君來兮父母鞠我禮化行兮民無寒餓使君去兮不可復留人意悵悵兮淚雙墮馮澥字長源安嶽人登進士第知廣安軍事有政聲一時重之陳汝義建陽人紹興中知儀隴蒞官勤慎民悅之劉儀鳯知果州初儀鳯為果掾起居郎趙逵薦其富於才華恬於進取及擢州守政績著聞毛敏建炎間知鄰州時普惠諸井皆廢敏復之以蘇民病虞允文紹興中知渠州地僻民窶常賦之外又行加斂允文悉奏罷之遠近鼓舞孝宗時入相封雍國公尋卒諡忠肅劉光世字德修簡州人登進士第歷右正言知果州趙汝愚薦之擢殿中御史趙汝簡字伯訓開封人慶元間知蓬州以詩書為政先風化而後刑威席芾知儀隴縣蒞官嚴明興學勸農邑人頌之李道傳慶元進士為蓬州教授開禧間金兵窺散關急而吳曦復叛道傳遺書安撫楊輔論曦必敗宜舉義討之輔不能決乃棄官歸曦平進祕書郎歷官兵部郎中道傳明河洛之學篤於大義嘗書喚起截斷四字於卧榻屏間其慎獨如此卒諡文節尹天民會昌人由太學博士知果州時王黼專政黼舊在太學乃天民所隸齋生也有強天民共謁之者天民笑曰見王丞相豈不得好官但恐為顔閔所笑後召除侍講不就清議高之安丙嘉定間知渠州事恤民力夙有名望吏民畏懷郡人杜宿之撰德政記孔忠齊知果州號為循吏郡人為立良牧碑蘇植嘉定中知廣安軍以才學飭吏事存心撫字教養畢舉政令一新楊思復嘉定中知渠州有聲望每被旨典文衡學者宗焉胡載榮寶祐中知渠州時元人來侵載榮徙治保險率州人矢死固守卒賴以全元張大悅寶祐間守蓬元統中官至䦘蓬廣安順慶等路右副都元帥封成安郡侯時蓬俗多文士少富民自是務農力田咸大悅之力云劉仲達安西人大德初知渠縣作興文教鼎新學舍學者誦之馬蒙古岱慶陽人至元中為西充主簿時羣盜劫掠百姓逃竄聚處於南岷蒙古岱極力捍禦全活甚多今存老馬寨民歲時祭之劉哈瑪爾至元初以萬戶攻成都宋守臣劉整戰敗賴出奔哈瑪爾入城號令嚴明市不易肆衆以寧後鎮順慶境內安堵蜀人感德建祠於駟馬橋左祀之閻公至正間為營山令牛生二犢麥秀兩岐禾一本九穗人以為善政所致云明富好禮嘉興人洪武初府同知創街衢置坊巷户口田糧悉賴經理杜沂真定人洪武中知順慶宅心公正律己嚴肅郡人稱頌焉嚴升繁昌人洪武中任同知清租賦平徭役民得無擾管時中柏鄉人洪武間以御史言事左遷西充亷能有聲勸課農桑作興士類升吏部主事麥茂實洪武間任南充建設學校作興士類邑人頌之藺從善磁州人西充教諭實心鼓舞風化大行升秩贊善黃謙蕪湖人以御史言事謫營山清亷仁愛鄰邑民訟多質成任期年百廢俱舉政教一新士民懷之任重裕州人知營山居官廉謹政治公平任滿歸民不忍舍費文質華亭人知營山撫流民開闢田野性嚴明吏不敢欺羅福寶慶人教諭營山勤於訓誨激勸有方每以氣節相砥礪士風丕變談思敬洪武中知大竹克勤公事節用愛民薑勤永樂初知儀隴興學校恤民隱士民頌之楊榮扶風人知儀隴政尚寬簡遺愛在民思之不置周道石首人知儀隴興學校勸農桑清操懋著一時稱為賢令徐亮會稽人知儀隴興學校平賦役儀人賴之有古循良風利本堅英德人知儀隴時當多事省約以節民財邑賴安撫馮義滇人知儀隴興學勸農足邉餉歲大歉屢行賑恤全活甚衆余復衡陽人正統初知順慶性亷潔開拓城池條理學校勞績居多鮮延年棲霞人天順間知順慶亷靜寡欲治行多與前守余復相類咸為士民稱頌柴良平陽人天順間知廣安州澤及孤貧賢聲甚著後遇賊被害許仁高安人守廣安除暴安民興禮化俗捐俸修學不傷民財郭文知廣安州公平亷正舉行鄉約境內感化師用昌奉新人知南充愛民如子毫不忍傷藹然有愷悌之風符慶太康人知南充凡便於民者務在必行人咸德之嶽禎漢州人知南充持重寡言喜怒不形凡事務撙節以益民陳伯安黃陂人知南充才幹敏捷操守清正吏民畏而懷之錢瑞新淦人知南充一清如水性甚嚴厲權豪屏迹以勞瘁卒於官百姓哀之朱經知南充學宫隘陋遷於太白山為政簡易民甚稱便升任去民多思之王庸會寧人知南充增修學宫毫不取民刑清訟簡百姓樂業邑稱治焉李琳華州人知南充才識明敏遇事立決獄無寃滯髙鵬蘄州進士知南充秉性剛明吏胥畏服訊獄果斷不避強勢士民仰其德陳琳應城人天順中由御史左遷知嶽池與民約信不事鞭撲後升僉事邑人為立棠隂遺愛坊黃表南平人成化初由舉人任府通判留心撫字民皆仰之李昱成化初任蓬州學正教士有方士風一時興起與知州畢宗賢遷改學宫區畫得宜張璠會寧人蓬州訓導時大兵駐境學含圮壞璠倡義捐俸修葺規制煥然朱詮鳳陽人成化初知渠縣廉能公恕賦稅訟獄允服民心後有除寇功詔賜旌異陳亨莆田人成化中知順慶執法不撓吏畏民服去任不持一錢時稱清白陳瑛成化中知蓬州宅心誠實政尚公平李璽稷山人成化中知嶽池性清約持正士大夫非公事不敢入其室朱瑩南豐人由監生成化初知鄰水創立縣治撫字勤勞施為有序丁福隆德人知鄰水勤政事平徭役民受其惠丁瓛鳳翔人成化間授嶽池主簿以清謹稱民有犯法者暮夜遺之金瓛時病篤固却之尋卒於官宋彬永豐人知鄰水廉能勤慎政善民安梁谷才任嶽池愛民好士創縣治建學宫修築壇壝倉庫百工並作民不告勞田鐸陽城人進士任户部郎𢎞治初謫知蓬州喜興文學督諸生誦習積穀數千以備軍餉民食皆賴之升僉事民立德政碑鄒紞臨川人知蓬州時巴中擾亂紞外給軍餉內節民財勞瘁甚著逮賊平調去郡人追思之沈林長洲人𢎞治中知順慶公亷持正平易近人有古循吏風郡人立祠祀之劉永成𢎞治中知大竹剛直果斷才足有為建學宫置義倉士民胥賴焉黃藝豐城人𢎞治中由進士任府同知鋤強扶弱威惠並行薛平杞縣人知大竹施政有方斷獄明允諄諄以禮讓教人風化因之歸厚种山咸寧人知大竹剛介果斷政平訟理不行鞭撲而事治邑人德之曾倫雲南人鄰水教諭持身有禮接士以恩學規嚴謹講諭詳明甘澤蘄州人正德初知渠縣清慎剛果值鄢寇之變矢心死守邑賴保全渠人繪像以祀蕭韶龍泉人正德初知渠縣亷恕公平興學校勸農桑士民感戴沈良佐湖廣人正德中由進士知順慶府延士論以蘇民瘼廖日監吉水人正德間渠縣教諭博學勤教捐俸建明倫堂兩齋庖庫廢墜皆舉蔡彬南康人知大竹下車誓於城隍後果忠勤亷潔不負所誓民皆悅服黃閏正德中以監察御史謫議隴政尚嚴明犯者動繩以法民不敢欺號為鐵令尹潘譿荆州人知儀隴實心愛民九年如一日百姓乞留復任三載趙裕知儀隴理繁治劇廢墜咸舉秉性嚴正人莫敢干以私金紞正德間知蓬州政平訟簡民心悅服魏溶蒲圻人正德末知鄰水性剛毅不茍取與邑多盜日夕嚴捕盜遂解散嵗旱禱兩立應民大悅有兄弟訟田溶諭之曰世間最難得者兄弟田易得耳各泣謝而退後竟卒於官王仁盩厔人嘉靖初任通判有髙節始終不渝教民農桑風以禮讓聞母喪歸徒跣千里囊橐無餘物畢宗賢武進人知蓬州政教兼舉士民允賴王錦醴泉人知蓬州秉公執法請託不行餽遺一無所受時以剛明稱擢按察副使鄒瑛由進士任蓬州蒞政九年民心悅服董桓洛陽人知蓬州時州多虎民有告母被虎食者桓移牒城隍遣人捕虎於廟前殺之州人稱異崔允代州人嘉靖中由進士知順慶規模方正豪強斂迹朱簠浙江人嘉靖中由進士知順慶振廢典勵人文文學政事人咸稱頌沈橋會稽人嘉靖中由進士知順慶誠於愛民加意作興學校一郡稱治許奇貴陽人由舉人任順慶同知歷任六年多異績督通省木政議鹽井課租治行頗著民咸思焉吳懋大理人府通判善草隸工詩文尤長於政治升階州以採木勤勞卒郡人深惜之勞傳相德化人任推官平反惟允囹圄無冤一時有景星朗照之頌吳佩裕州人知蓬州愛民興學卓有循良之風劉昆萬安人知蓬州愛民造士冰蘗自甘遷蘇州同知去蓬人深思之李必聞睢州人由舉人知蓬州直介清約淡泊盟心時稱清官第一鍾程黔人嘉靖間知渠縣嵗大飢多方䀼濟活者甚衆擢御史去民思之初旦濳江人知大竹縣撫愛黎元嘗求無愧四知纍與神誓後遭謗去誣之者卒罹隂譴陸如衢趙州人知大竹縣居官清白姦惡斂迹擢守潼川囊橐蕭然士民追送多泣下者董仕毅麻城人由西充令擢蓬州守操履儉約後解組歸止行李一擔其清貧如此嚴傑武昌人知營山縣性亷潔蒞任未幾百廢俱興士民懷之劉時達金縣舉人嘉靖中知大竹縣時寇賊嘯聚時達密布方略捕獲凡二百餘人地方以寧居官五年姦慝無不斂手伍思韶江西人嘉靖間知廣安州多善政愛民如子有古循吏風周光鎬潮陽人萬厯間為順慶守倜儻有權略建越夷叛遷兵備副使監征南軍事有功馬虔武定人崇禎間知廣安州立法如一剛介不阿遷達州僉事敘州府漢唐蒙武帝時上書言由牂牁下南越之䇿拜為郎中從筰關入布漢威德卒通僰道陳立臨邛人成帝時為牂牁太守討平夜郎夷夜郎王興因立納貢後僰夷叛復命立鎮之蠻夷畏服今馬湖府及酉陽司并立廟享祀焉蜀漢張翼犍為人昭烈時舉孝亷為江油長纍官車騎將軍持法嚴峻盡心國事以劉胄叛逆徴還猶積糧為滅賊計薑維伐魏翼每勸其保國不宜黷武梁先鐵武帝時奉使討蠻獠立戎州以鐵為本州刺史多有勞績唐張九宗德宗時戎州刺史以治化稱嘗撰花臺寺記并書字畫遒徑韋臯德宗時為戎州都督獠蠻畏服立碑以誓之郡人繪像廟祀焉劉岑李通李達九奚采輿地紀勝唐時來為郡守者四人又見樂林官吏序宋宋太杓字末杓澤州晉城人舉進士以大理評事通判戎州多善政有詔褒美遷贊善大夫柳光熙乾德間為南夷巡檢使號令明肅恩威并舉十州五衛二十九縣之蠻悉嚮慕之寇瑊字次公汝州人大中祥符間為梓州路轉運使時多剛縣酋斗望劫瀘州燒淯井監瑊率兵大破之夷人相率來附瑊又置戍守建寨柵濬三濠以環淯井張宗誨字習之宋太祖時知富順監赤崖夷斗郎春叛羣獠騷動宗誨將郡兵攻破之歷官祕書監熊本字伯通番陽人通判戎州習知蠻俗後瀘州羅晏夷叛本為察訪使謂夷能擾邊者介村豪為鄉導耳乃以計致百餘人梟之其徒股栗願死自贖事平遷刑部員外郎歷官吏部郎中吕開知戎州嘗行免役法入奏稱旨范百祿知長寧因長寧等十郡八姓夷內作文以誓諸夷並立碑於武寧寨程球紹興中知南溪救荒有善政人心悅服僰人感化邵隆紹興中知商州值和議已定割商州為外境隆不悅嘗密遣兵盜馬以擾之秦檜憾隆遂改隆知敘州一日因飲酒暴卒或云檜使人鴆之黃棠字文叔隆慶府普城人為冨順監以勤政著聞何師心孝宗時為戎州守南蠻叛修戰守之具置崖岸以保居民鄉人德之周湛字文淵登州人通判戎州州俗不知醫病故以祈禳巫祝為事湛取古方書刻石教之并禁為巫者是人始用醫藥劉堯年權長寧軍事卜漏之變堯年以諸路兵為先鋒忠勇協濟卒平寇薛九齡知戎州時吳曦叛於蜀九齡鳩財治兵卒討平之時頌其功楊騫眉山人知富順監時仙茅病民騫為之白於制帥特行蠲免邑人賴之虞夷簡仁壽人允文之孫知富順監崇化善俗禁科斂賑貧窶廣儲蓄以濟窮民又為義莊魏了翁稱善焉周延俊景祐間知富順監文學豐贍為治冇聲王純仁眉山人知富順監以儒雅飾吏治登臨賦詩石刻多存趙希益金華人寶慶間知富順監勤於民事歲旱祈禱極誠獲應民懷其德繪像於學宫希益學術議論多得之吕東萊云郭知達知富順監富順舊以鹽移贍遂寧生徒歲為鏹八十萬緡知達以公養不豐請於漕運使又歲獲五十三萬二千緡許國陽安人為長寧判以和議成即休官歸子慶孫奕相繼顯逹世人榮之甄拔知長寧軍蠻人入城恣其劫奪拔嚴加禁戢俾納刀於候館然後入蠻人相語曰惡將軍張齊賢嘉祐間以尚書員外郎知縣事建碑記治西十五里道傍家炎咸淳中知富順監遇吳曦叛不屈魏了翁特稱之及卒為作墓志記焉支渭興國州人知長寧軍有惠政後為行省參政元張廷瑞金川人為敘州宣撫使立市茶法并屯田之制民甚便之任翔任珙州通守升馬湖總管府建大成殿周志剛為珙州學官博通經史勤於訓誨土俗自此向學明鍾鉉洪武初知富順當草昧之初焦勞心思經營制度廟學壇墠皆其創建桂芝慈溪人洪武中知敘州府興利除害卓有惠政湯行洪武中吏部侍郎謫知長寧卓有政績任福土人洪武間宣撫舉福任長官撫綏夷民衆心信服饒觀饒州人永樂中知敘州立法度修禮教德威兼著吏民畏懷吳善貴池人宣德間知富順時邑中多盜嚴法緝捕歲旱禱雨發倉賑恤一時頌聲載道劉歆宣德中都給事中謫南溪亷能剛毅豪強屏迹卒於官百姓哀之鞏固洋縣人宣德中知珙縣有勇略生擒賊首阿具田等夷人畏憚不敢近城何貫知珙縣首建石城邑人永賴趙彥宣德中知高縣恩威并著逺邇信孚未幾解去及正統間芒部入寇征討弗克諸夷曰趙尹來即降於是辟彥至諸夷皆納款事聞詔增彥秩後卒於官余炳知高縣明敏有決斷時邑多盜大肆流劫內一賊假稱鄰民出首炳知其計擒殺之人稱神明久旱祈禱霖雨大降李鑑湘陰人景泰中知敘州誠心愛民不受請託事至剖決如流案無停牘李盛麟景泰中知宜賓愷悌慈祥愛民如子歷任九年百廢俱修時稱為賢令云陸淵之上虞人成化中守敘州葺學宫毁淫祠政教兼舉士民懷德袁莒豐城人成化中任長寧教諭博學多才尤精於易太守陸淵之以為真才延至郡中使諸生有所矜式後以憂去顧綸嘉定人知馬湖剛明清政文學著名以忤權貴致仕張敏大理人守馬湖剛毅有大節嘗撫夷單騎至營推誠諭之諸夷羅拜受命解去擢兵備副使鄭冕閩人守馬湖徑直亷介吏畏民懷嘗征芒部有功張繹𢎞治中知南溪興學校廣儲蓄毁淫祠置祭器勞績居多路義貴州人舉人正德中知南溪却餽遺釐姦弊修城捍賊民賴保障周璧湖廣人知慶符革陋習正儒風時邑多遊民不知務本璧出郊勸農民心歡悅胡豐三水人正德中知敘州作興學校賑恤困窮置鋪舍平道路政績偉然歐陽選衡陽人進士正德中知筠連三江蠻叛與守備何卿併力禦之邑賴無恙時吳總兵欲議招撫選力辨其非又白去丈田增稅邊民稱便何卿正德中守備筠連後升總兵征白水三江蠻平之邊境肅清王尚用安福人嘉靖間府同知修職愛民上下信服歷任九年始終一致趙逺貴州舉人任通判署富順天性儉約一僕自隨節省財力鼓舞生徒邑人為立遺愛碑陶濓曲靖人進士嘉靖中任敘州府推官署富順奉法無私察豪猬為民害者除之邑人稱快張雲鵬大理人嘉靖初以部郎左遷宜賓令為人寬厚民心愛戴歷敘瀘兵備萬文彩雲南人進士嘉靖中知富順老成練逹判斷如流祛宿弊節冗費民甚德之李正彝巴陵人進士嘉靖中知富順恬淡清介人不可干以私才長經濟節用愛民禮賢下士後拜監察御史余良翰奉新人嘉靖末知敘州士民懷服建兩塔於府治東南以壯形勢工費捐俸不以煩民卒於官嚴清雲南府人嘉靖間進士以茂年初試為邑長明敏善斷羣姦屏息節費省役里甲甚安屬歲歉設議賑濟民賴以安去時行李蕭然唯圖書數篋而已趙儒華陰人嘉靖間為郡守平易近人寬嚴得體治獄無寃敷教善誘士民感悅杜傑黃岡人萬厯中知長寧適歲歉賑活甚衆是時九絲初定黠酋內訌拮據調劑卓有鴻勛後採木山中值水涸露禱於天忽大雨如注木遂出先是西南夷騷動喜功者有欲滅此朝食傑曰不可民方疲於力役又驅以戰吾恐邊地險阻徒勞罔績也當事者弗聽其言卒致覆敗人服其先識邵炯北直人萬厯間舉人知宜賓戊申春旱宜民飢死大半炯設䇿枚荒散米給粥活者以萬計有生祠肖像祀之陳大壯敘州府知府節儉正直遷建學宫士民戴之徐久德江西人天啓初奢酋叛時地方承平日久弛於武備人情皇皇賊甚熾使卒索印久德殺之捐金募壯士誓與民守城乃全居官愛民如子民依之若慈母升兵備副使尋致仕殷大白雞澤人性亷介持正一時上司推重之值大旱蔬食步禱妻病思茹葷大白力持不可曰吾方為萬民請命妻竟病卒後得大雨夔州府蜀漢劉琰字威碩魯人先主在豫州辟為從事以其宗姓有風流善談論甚親待之遂隨周旋先主定益州令琰為固陵太守後主立封都鄉侯為衛尉中軍帥後將軍遷車騎將軍然不預國政但領兵千餘隨丞相亮贊畫諷議而已後與魏延不和亮責讓之琰與亮箋致謝亮遣還成都官位則如故云羅憲襄陽人仕蜀漢為巴東太守鎮永安漢亡憲率所部臨於都亭三日吳人襲之憲曰吳不恤我難而背盟僥利不義甚矣乃繕甲誓衆與吳人戰大破之晉荆州刺史胡烈攻西陵以援憲吳乃退時後主入洛憲猶以孤軍守白帝城云晉鮑陋鎮白帝城為譙道福所圍城中無水鑿石開渠以汲道福不悟謂陋渴欲降之陋令人於江側得生魚遺道福乃解圍去民賴保障今疏鑿之迹尚存李遷哲安康人為將軍平漢州之亂拜信州刺史鎮白帝城先無倉儲遷哲取葛根造粉兼米以給軍士時有異膳即分賜軍中人感之咸思效命屢擊叛蠻破之周陸騰信州蠻冉令賢等據巴峽黨與連結詔騰帥衆拔其八城進攻水邏令賢走追斬之信州舊治白帝騰徙於八陳灘北以司馬裔為信州刺史司馬裔字遵印河內溫人歷官都督巴州武平中從陸騰討平信州蠻天保二年拜信州刺史兼都督諸軍事五年轉西寧都督裔推誠秉公人多稱之唐李孝恭高祖時以山南招討大使徇巴蜀下三十餘城拜信州總管時蕭銑據江陵孝恭討平之李靖隴西人武德初説趙郡王孝恭以取蕭銑十䇿孝恭上之以孝恭為夔州總管委以軍事靖説孝恭悉召巴蜀酋長子弟量才授任置之左右外示引擢實以為質因造艦習水戰自夔州東擊蕭銑時峽江方漲諸將請俟水落靖曰兵貴神速今吾乘江漲掩其不備此可成擒也乃帥戰艦五千餘東下銑果不為備拔其荆門宜都三鎮屢破其兵直圍江陵內外阻絶蕭銑乃降拜靖知夔州時蠻酋冉肇為寇靖擊斬之夔地賴焉歷官特進左僕射封衛國公源乾曜臨漳人神龍中為夔州參軍修圖經言風俗甚備開元初歷官同平章事謹重自持明皇稱其清深靜密有彌綸之識云南承嗣范陽人霽雲子為夔守有功嚴挺之華陰人開元中為萬州司户果斷有善政歷官左丞劉禹錫字夢得中山人貞元初登進士第歷官監察御史貶達州元和九年移知夔州表言一州利害公務不冗且以文雅稱歷官至檢校禮部尚書柳公綽字子寬京兆人幼孝友性質嚴重起居皆有禮法後舉賢良方正直言極諫補校書郎授渭南尉纍遷開州刺史地接夷落寇嘗逼其城吏曰兵刃不能制願以右職署渠帥公綽曰若同惡邪何可撓法寇亦引去遷侍御史吏部員外郎苗拯上黨人性峭直冇學術以諌議大夫貶萬州柏貞節大厯初授夔萬等州防禦使制稱其雅有器幹深於戎律蘊三略以經世秉一心而事君杜甫寓夔貞節厚加優禮嘗分俸給之崔旰反貞節率子弟起兵討旰故甫詩云柏公鎮夔門滯霧兹一掃齊映高陽人貞元初與崔造劉滋李勉同相造議宰相分判六曹映在諸相中頗稱敢言上寖不悅遂出知夔州唐次字文編北海人貞元中知開州簡易亷平居民胥悅凡十二年轉知夔州愷悌紓息盡心民事韋處厚字德載萬年人舉賢良方正擢侍講穆宗召講關睢洪範擢考功員外郎出為開州刺史時巴山有高僧清公能前知處厚往問還期清公曰一年半載一年半載又問官何止境曰宰相須從江邊得處厚果守開三年乃還文宗自江滸踐阼命處厚作相俱符清公之言溫造祁縣人穆宗時為侍御史李祐為左金吾將軍進馬百五十匹造奏祐違敕進奉請論如法詔釋之祐退謂人曰吾夜半入蔡州城取吳元濟未嘗心動今日膽落於溫御史矣敬宗初貶開州司馬性剛斷能體悉民隱士民慕之宋申錫文宗時謀誅宦官引侍郎王璠為京兆尹以密旨諭之璠泄其謀申錫坐貶開州司馬有善政卒於官韋昭範字垂憲以龍州刺史改通州昭宗幸鳳翔昭範首謁行在遷給事中歷中書門下平章事判度支五代張造秦宗權餘黨常厚屯白帝為成汭將許存所破厚奔萬州造時為州刺史悉力拒之厚奔綿州萬以造守得全宋馬亮雍熙中知夔州善藻鑑時吕蒙亨為州職官子夷簡在焉亮一見即妻以女妻怒亮曰此必國夫人也後夷簡果拜相亮遷知荆州府慕容德琛太原人淳化中知夔州時值王小波李順之亂以孤城抗賊大破其衆克復十餘郡民免鋒鏑咸頌其功仕至右監門衛大將軍袁逢吉河南䣕陵人淳化中知夔州時寇亂甫平逢吉盡心撫恤又決疑獄得其情川峽採訪使條上知州通判有治迹者七人逢吉與朱協李虛己薛顔邵曄查道劉檢與焉皆賜敕褒諭纍官鴻臚少卿薛顔淳化中知雲安軍政務修明採訪使薦之升夔州路轉運使始孟知祥徙州於東山縣峽以拒王師顔知民不便復其故址雷説淳化中為將作監丞知大寧監事初鹽場人户就井汲泉強弱相陵多抵於訟説乃於穴傍鑿石為池以瀦之外設橫板穿三十竅承以修竹分泉接引謂之筧筒蓋泉初出不可遏如此則水勢無奔衝不平之患至今以為規則唐介字子方江陵人天聖八年進士為奉節令其政以通民情理寃獄為先召授御史裡行劾張堯佐不得授宣徽使又論文彥博以燈籠錦媚宫掖非大臣體貶英州别駕天下想望其風乘後梅溪王十朋守夔檄奉節令喻思然立祠祀公自為文記之彭乘字利建華陽人舉進士任華陽判官性至孝父卒廬墓甘露降其樹人稱孝感寶元中為夔州路轉運使會土賊田忠霸誘下溪蠻將內寇乘適按郡至境大集邉吏勒兵守禦賊遁去其黨斬忠霸以降召修起居注擢知制誥纍遷翰林學士何郯字聖從成都人景祐進士寶元初任夔州府判有治聲後轉殿中侍御史面陳夏竦姦狀仁宗諭曰古有碎首諫者卿能之乎對曰君不納諫則臣碎首今陛下納諫如流臣何敢掠美纍官龍圖閣直學士束莊嘉祐間知萬州舊多火災莊籍羡緡募陶人屋皆易瓦並教民儲水為備其害始息民甚感之陳安石安陽人嘉祐間為夔州判官洞晰民隱時有蓄蠱毒者捕誅其首並刋藥方頒之由是遇毒者不死遷知州敕云起自世族華髮一心試之中外清節可紀孔嗣宗嘉祐中署大寧監事訪民不便皆除之於鹽泉南北立長以司其平又立寶源祠以祀井神建朝陽樓以壯觀望築凝香堂以延清眺後授夔州路轉運使司判官劉源嘉祐中為開州萬川令溪有灘舟楫患之源焚其石淬以醯石解流通民祀之張詵熙寧三年為夔州路轉運使時渝州蠻叛詵自帥兵討平之一路民賴蘇息焉程之元字德孺眉山人元祐中任轉運使有政績與弟之邵俱以才名世之邵後為夔州路轉運判官大寧鹽課太甚民苦之之邵發所儲以通商賈關市大悅鄭修蓬州人七嵗日誦萬言元祐中進士知梁山縣仁惠愛民俸祿所餘悉為民代輸民愛戴之陳辨靖康初上疏言天下之冶當聽直言近正人公喜怒銷朋黨明法度謹財用又直斥蔡京之黨謫監逹州茶場茶政以清史方建炎中知夔州時富順蠻寇施州方領兵至蕩其巢穴追至七女柵降其衆而還宇文韋雙流人建炎中以祕閣修撰知夔州實心愛民盡力革弊政聲大著其父昌齡崇寧初為户部侍郎奏省陜西糴價五百萬韋所施設不愧庭訓云虞祺紹興中擢知大寧監時鹽利多重徵祺悉蠲放每謂法無重徵例不可壞升知梓州秦檜遣使督貢方物祺以地瘠民困聞檜慚而止韓廣叔紹興中任夔有治聲太史黃庭堅曰惟勤能辦公家惟清能律貪吏嚴而信則吏不病民簡而敏則民多在野廣叔有焉馮時行字當可巴縣人紹興狀元與朱松曾開等極言和議之非出為奉節縣尉升知萬州公平亷謹治甚有聲百姓愛之立祠以祀虞允文紹興中為川陜宣撫使上言三路不可棄與史浩不合罷知夔州以夔為蜀門户修守禦撫軍民百務整肅明年入對言今日有八可戰且以笏畫地陳棄三路利害髙宗曰此史浩誤朕也歷官尚書左僕射同平章事封雍國公周執羔知夔州兼安撫使秦播蠻叛執羔責豪帥曰朝廷用爾為長今一方騷動責將誰任豪懼擊斬叛首以獻蠻患遂息張震字子發廣漢人以敷文閣待制知夔州為政以利民澤物為先疏言馬綱利害又修補大成樂及忠武侯祠皆自為記王十朋名龜齡號梅溪溫州樂清人紹興中廷對忠鯁高宗親擢第一隆興間為侍御史論史浩懷姦誤國八罪風裁凛然出知饒州乾道元年七月移知夔州時夔苦於馬綱十朋兩上狀極言其害州旱七月為文禱於諸廟雨大降誨生懦甚勤切大要以忠孝與思無邪為主民輸租者使自槩量其治以亷潔公正率下有不善者反復告戒誠意篤至人多信服去之日士民攀轅不舍所著有梅溪集行世程師孟提點夔州路刑獄建置常平倉歲凶賑民不足矯發他儲不俟報吏不可師孟曰必俟報餓者盡死矣竟發之查籥字元章隆興間為御史與王十朋馮方李浩胡憲相繼言事時號五賢乾道中出為夔州路運判時十朋為府帥相得甚歡多有倡酬後轉成都運使陸遊字務觀山陰入左丞佃之孫紹興末召對賜出身為樞密編修出為夔州判官有治聲嘗陳進取之䇿於宣撫王炎又謂經略中原必自長安始取長安必自隴右始嘗積粟練兵以俟後自夔倅入蜀九年乃歸晚召為南宫舍人致仕年八十六而終遊文行甚高詩為中興之冠有集百餘卷李浩字直夫臨川人中紹興壬戍進士不謁秦熺時論重之淳熙二年以祕閣修撰知夔州兼夔州路安撫使奉法循禮律己甚嚴思州田氏起兵相攻浩親草檄遣官諭之二人感悟歃血釋兵蓋以誠意銷患於未然也在鎮踰年以疾請尋卒於官年六十有一贈集英殿修撰趙希館字君錫舉進士調主管夔路轉運司事疏大寧鹽井利弊上諸朝民便之改知玉山縣未行召對希館首言民力困於貪吏軍力困於債帥國家之力則外困於歸附之卒內困於浮冗之費次論西蜀銓選科舉之弊次論大寧鹽井本末寧宗嘉納