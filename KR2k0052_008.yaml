body:
  text: 四川通志卷八人物江漢炳靈世載其英卿雲褒武之儔邈乎尚矣唐宋元明以來人材輩出亦越我朝氣運日隆教化日浹德業文章理學經濟麟麟炳炳光振千秋蓋非獨閭里之榮也夫鄉國之賢兩廡從祀其人固自不朽而後先迭起者或行誼可風或才猷較著輿論斯在物望攸歸亦難以湮沒昔人有云其山嶻嶪而嵯峩其人磊落而英多當斯語者舍蜀中安歸乎作人物志成都府周商瞿雙流人孔子弟子生於瞿上鄉殁亦葬於瞿上至今墓碣猶存文翁石室圖作商矍上漢張寬字叔文成都人景帝時廬江文黨為蜀郡守選寬等詣長安就博士受業寬還教授於蜀由是蜀學比齊魯仕至揚州刺史作春秋章句十五篇司馬相如字長卿成都人少好讀書學擊劒事景帝為武騎常侍以病免後客逰梁著子虛賦盛稱苑囿車獵逰觀之美其意微而婉其詞麗以則主於諷諫武帝讀而善之以蜀人楊得意薦召見屢獻賦拜為郎會唐蒙驚擾巴蜀遣相如諭之拜中郎建節乘傳至蜀通卭筰還報帝大悅後復奏大人賦帝稱其飄飄有凌雲之意尋以病免居茂陵楊宣字君緯什邡人少受學於楚國王子張河內鄭子侯長於天文圖緯成帝徴拜諫議大夫勸上立定陶王為太子出為交州牧太子即位徴拜太倉令上言封周公孔子後帝從之又薦王剛徐吉郭越龔勝皆名士平帝時持節授為講學大夫揚雄字子雲成都人少好學博極羣書口吃不能劇談而好深沈之思成帝時為郎給事黃門嘗奏甘泉河東校獵長楊四賦又著法言及太玄經等書楊終字子山成都人習春秋為郡小吏詣京師受業顯宗時召拜校書郎中嘗受詔刪大史公書為十餘萬言又著春秋外傳十二篇改定章十五萬言李尤字伯仁新都人少以文章顯名侍中賈逵薦尤有相如揚雄之才明帝召作東觀辟雍等賦拜諫議大夫太子廢為濟隂王尤上書切諫順帝立遷樂安相尢與劉珍共撰漢紀又所著詩賦銘誄頌七嘆十典凡三十八篇諒輔字漢儒新都人為郡五官掾時天大旱乃祝曰輔不能進諫納忠薦賢退惡至令天地降災咎在我乎若日中不雨乞以身自焚頃之雲合雨澍一郡霑洽翟酺字子超新都人四世傳詩酺尤善老子及圖緯天文厯算徴拜議郎遷侍中安帝時元舅耿寶及皇后子弟閻顯等並用威權酺上疏切諫不省出為酒泉太守擊殺叛羌威名大振遷京兆尹順帝即位拜光祿大夫遷將作大匠屢因災異多所匡正以忤權貴罷歸何英字叔俊郫縣人學通經緯著漢德春秋十五卷孫汶亦深於學著世務三十篇任永字叔本新繁人少習齊詩逰京師教授十餘年友人董奉德病死洛陽永躬推鹿車載喪至其家後奔師喪道卒臨命敕兄子造曰必致我尸於師之門使死而有知魂靈方不慙張楷字公超霸子通嚴氏春秋古文尚書門徒常百人五府連辟舉賢良不就順帝詔云楷行慕原憲操擬夷齊郡守以禮發遣稱疾不起性好道術能作五里霧張陵字處沖楷子官尚書大將軍梁冀帶劒入省陵叱之出敕虎賁奪之冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖百僚肅然初冀弟不疑舉陵孝亷責曰舉君適以自禍陵曰今伸公憲正報私恩也朱普字伯禽雙流人為郡功曹刺史與太守有隙訐劾之普被逮詣新都獄掠笞連月肌肉臭腐卒證太守無罪敕其子曰我死載喪詣闕使天子知我心任昉字文始成都人為尚書令梁冀憚之出為平原太守冀誅後昉復為尚書令歷司𨽻校尉趙戒字志伯成都人質帝時為司空梁冀弒帝戒與胡廣李固以清河王蒜明德著聞宜立冀不從改立桓帝戒官至太尉封亭侯趙典字仲經成都人少篤行博學襲封為太常朝廷每有疑議輒咨問之典據經正對兄子謙司𨽻尉車師王侍子為董卓所愛數犯法謙收殺之卓怒甚而素敬憚謙故不加罪轉為前將軍擊賊有功封郫侯卒弟溫初為京兆丞歎曰大丈夫當雄飛安能雌伏棄官去嵗飢設賑所活萬餘人獻帝徴為侍中時李傕郭汜相攻劫帝溫與傕書曰於易一為過再為涉三而弗改滅其頂凶傕怒欲殺之免官歸蜀漢董扶字茂安蜀郡人兼通數經善歐陽尚書又事聘君楊厚究極圖讖至京師遊覽太學還鄉教授弟子靈帝徴拜侍中在朝稱為儒宗甚見器重尋為蜀郡屬國都尉年八十二卒始扶發詞抗論益部少雙故號曰至止言人莫能當所至而談止也後丞相亮問秦虙以扶所長虙曰董扶能褒秋毫之善貶纎芥之惡杜瓊成都人受學於任安精究安術纍官太常靜默少言闔門自守不妄交一時名臣如蔣琬費禕輩皆器重之著韓詩章句十餘萬言文齊漢州人守滇雲疏鑿陂池厲兵保障甚有能聲晉杜軫成都人舉孝亷除建寧令政化大行士民悅服秩滿將歸羣蠻追送賂遺甚多軫一無所受纍遷尚書郎軫子毗為益州刺史次子秀為羅尚主簿俱死節於賊杜烈成都人軫之弟歷安陽令明於政事遷衡陽守聞兄軫亡自表兄子幼弱求去詔轉犍為太守蜀人榮之夀良字文淑成都人良少與犍為張徴費緝並知名治春秋三傳貫通五經操身貞素刺史皇甫晏貢之三司遂辟於太宰除霸城令歷始平太守治政著稱徙扶風轉秦國內史子紹纍官大長秋卒葬於洛北邙山柳隱字休然成都人少與同郡杜正柳伸並知名隱直誠篤亮交友居厚達於從政數從大將軍薑維征伐臨事設計嘗敵陷陳勇略冠軍為牙門將巴郡太守騎都尉遷漢中黃金圍督景耀六年魏鎮西將軍鍾會侵蜀入漢川圍戍多下惟隱堅壁不動會别將攻之不能克後主既降以手令敕隱乃詣會晉文帝聞而義之咸熙元年內移河東拜議郎武帝踐阼以為西河太守在官三年以年老去官乞骸還蜀卒於家年八十長子充連道令次子初舉秀才任熙字伯逺成都人漢大司農昉之後世有名德父元字秀明犍為太守執金吾熙治毛詩京房易通五經事親至孝居喪毁瘠為州鄉所稱察孝亷除南鄭令以病去官復授南鄭不就轉梓潼令為政清靜辭疾告歸太康中除越巂護軍非其好也不往徴給事中終以疾辭而蜀郡令每至官為之修謁嵗致羊酒即家拜朱提太守固讓不之官好述作詩誄論難皆燦豔年六十九卒於家子蕃察孝亷蕃子迪俱知名何攀郫縣人初為益州主簿泰始十年益州刺史皇甫晏表請討汶山白馬諸夷時盛夏出兵其所將中州兵蔡雄等以汶山道險又畏諸夷強遂引牙門張宏等殺晏誣其欲率已共反故殺之求以免罪攀以母喪在家釋衰絰詣洛訴晏忠孝而宏等惡逆詔以王濬為益州刺史斬宏等咸寧三年三月詔罷屯田兵大作舟船為伐吳計攀以為佃兵五六百人作船不能卒辦後者未成前者已腐宜召諸郡休兵借諸郡武吏並萬餘人造作嵗終可成濬從之即令攀典舟船器仗冬十月遣攀詣洛表吳可伐後纍以功封西城侯官大司農南北朝羅研字深微成都人有文學為刺史鄧元起屬吏蕭淵藻以私憾殺元起而誣以反研詣闕訟之上贈元起征西將軍後刺史蕭恢聞研名辟為别駕時郡盜大起或嘲蜀人貪亂對曰蜀川積弊實非一朝窮迫之人十有八九束縛之吏旬或二三若家畜五母雞二母彘牀有百錢布被甑有數升麥飯雖蘇張巧説於前韓白接踵于後將不能使一夫為盜況貪亂乎後為散騎侍郎隋何妥郫縣人少警敏有口才初事梁湘東王嘗上疏陳八事後歸隋與蘇威有隙出為龍州刺史時有負笈逰者妥皆為講説在職三年以病請還後為國子祭酒卒諡曰肅五代孫逢吉成都人博學尤善毛詩孟蜀時為國子博士檢校刻五經於蜀學同郡林罕亦善文學著説文二十篇目曰林氏小説附刻於學宫李起成都人仕孟蜀為補闕蜀以李昊領威信節度起援故事謂宰相無領方鎮者持論侃直昊畏之語曰以子之才能慎默當為翰林學士起曰喉無舌乃不言耳宋卞震成都人孟蜀進士為渝州判蜀平仍舊職會賊圍城震率士卒戰守與刺史陳文襲夾攻破之賊遂平子襄舉進士知將樂縣咸平中為淮南轉運明敏有幹局所至著名歐陽回華陽人父珏通泉令回初仕孟蜀纍官翰林學士遷平章事監修國史嘗擬白居易諷諫詩十五篇以獻昶嘉之賚以銀器錦綵後隨昶歸宋充翰林學士卒贈工部尚書王永華陽人為右補闕吳越納土永受命往均賦至則悉除無名之輸或言其多偏私太宗詰之對曰使新附民蒙天子仁恩雖得罪死不恨太宗大悅勾中正華陽人孟蜀時舉進士歸宋補曹州録事參軍中正精於字學古文篆𨽻行草無不工太宗時獻八體書授著作佐郎直史館詔詳定篇韻及雍熙廣韻子若古希古俱進士第何隨郫縣人初仕孟蜀為安漢令蜀亡去官詔有司遣吏送隨詣京時巴地大飢送吏取民芋以自給隨以緡繫芋根償其值民視芋見糸相與語曰聞何安漢亷必此也羅處約華陽人太宗時進士形神豐偉有詞學初知吳縣召直史館卒年三十三有東觀集十卷王著成都人進士授隆平主簿纍官殿中侍御史善著書太宗政暇嘗以文墨自娛著侍書多所規益陳充字若虛成都人雍熙中進士及第真宗時纍官刑部郎中祥符六年擢西京御史臺充詞學典贍性曠達善談謔淡于榮利臨終自為墓志有中庸子集二十卷任玠成都人通經史曉音律琴奕丹青皆得其妙真宗令試學士院撰詩一千二百韻以進賜進士授汝州團練推官玠具野服捧告身詣登聞鼓院納還西歸李建中成都人太宗時進士纍官太常博士表陳時政歷知曹解蔡潁四州終判太府寺性簡靜恬於榮利善書札𨽻篆籀俱入妙有集三十卷子周道周士相繼登進士第薛映成都人好學有文知開封府為治嚴明升江南轉運使歷知數州雞初鳴即起冠帶黎明決事雖寒暑無異纍官禮部尚書集賢院學士卒諡曰文恭梅摰字公儀新繁人天聖進士性淳靜平居未嘗問生業仕為侍御史嘗力論外戚李用和不宜加平章事又言張堯佐緣宫掖以進恐纍聖德仁宗嘗稱其言事有體後歷知數州有奏議四十餘篇何剡字聖從成都人景祐間進士為殿中侍御史嘗極陳夏竦姦狀仁宗諭曰古有碎首諫者卿能之乎對曰君不從諫則臣碎首今陛下納諫如流臣何敢掠美纍官龍圖閣直學士尚書右丞何維翰字叔良成都人試南省不第遂不復應舉居鄉里以教導為事薛簡肅奎薦其文行賜粟帛韓魏公琦安撫劒南時蜀大旱維翰募民間得米千斛以助賑濟琦嘉之薦授四門助教辟府學説書吳師孟成都人慶厯中進士及第博學善修書文與名甚著官至通議大夫子縝初登第即求修唐書歐陽永叔以其年少拒之及書成縝乃作唐書糾繆吕陶字元鈞成都人皇祐中進士其先曰懷玉曰公立世以風節聞陶通判蜀州知彭州俱有政績哲宗時除殿中侍御史上疏論蔡確韓縝章惇之姦以集賢院學士出知潞州後入元祐黨籍張唐英字次公新津人有文學撰蜀禱機嘉祐名臣傳皇祐中登進士英宗朝進慎始書授臺官范蜀公薦之擢殿中侍御史裏行丁父憂卒李謹交成都人幼頴異讀書一過輒能成誦父師器之年十四舉進士嘗進牡丹詩仁宗嘉之官至鄂州觀察推官范鎮字景仁華陽人仁宗時知諌院務引大體常請建儲面陳激切至泣下帝亦泣曰朕知卿忠鯁當俟之前後章凡十九上不聽轉翰林學士論新法與王安石不合以户部侍郎致仕司馬光嘗曰勇決吾不如范景仁卒諡文忠有文集百卷范百祿鎮兄錯之子第進士又中制科纍官翰林學士哲宗朝上言分别邪正之目以類相反者二十餘條以龍圖閣學士知開封府獄無繫囚後以資政殿學士知河南府卒諡文簡范祖述百祿子知鞏縣鑿南山導水入洛邑無水患以百祿在黨籍謫監中嶽廟久之知台州奏罷黃柑葛簟之貢靖康中避地汝州與汝守趙子櫟共城守旁郡盡陷汝獨全纍官朝議大夫范祖禹字淳夫鎮之從孫舉進士為校書郎從司馬光修資治通鑑有史才歷官侍講勸帝日御經筵除諫議大夫請帝先辨邪臣為翰林學士講説明切世稱講官第一後章惇譖之竄化州卒所著帝學帝鑑仁皇政典行於世范沖祖禹子紹聖中進士高宗時為宗政少卿直史館先是祖禹修神宗實録盡斥王安石之誤為蔡京所惡謫死嶺表至是命沖重修神哲兩朝實録纍官至翰林侍講學士王圭字禹玉永之後弱嵗竒警日誦數千言舉進士通判揚州後為翰林學士文章閎麗自成一家朝廷大典册多出其手纍官尚書左僕射兼門下侍郎封岐國公卒贈太師諡文恭有華陽集梁鼎華陽人祖鉞孟蜀劒門關使父文獻乘氏令鼎擢進士知秭歸縣為度支判官建議興水利歷知數州皆有政績磊落尚氣節好學工篆籀著隱書史論等書李大臨華陽人嘉祐中進士纍官祕閣校理僦居陋巷時仁宗遣使賜御書使者見大臨親秣馬還奏帝曰李大臨真廉吏也大臨清整有守議論識大體神宗時知制誥屢言青苖之害時論偉之鄭少微字明舉華陽人少孤力學元祐中成進士時蘇軾知貢舉得少微及郫邑楊天惠三嵎李新時人稱為三俊宣和間上書論時政坐廢貧無田宅寓居金繩院十五年不屈其志學益古文益工後徙居臨卭自號木鴈居士後官至朝請郎有集行於世李畋華陽人以學行為鄉里所稱初蜀士不樂仕宦張詠敦勉就舉畋遂登第纍官知榮州自號谷子所著歌詩雜文總百卷張詠語録三卷孔子弟子傳贊六十卷同舉者成都張及歷官御史張逵歷官職方皆有時名王琪華陽人舉進士歷知數州政尚簡靜以禮部侍郎致仕蹇周輔雙流人少與范鎮何剡為布衣交舉進士知宜賓縣纍官河北都轉運使遷刑部周輔強學善屬文子序辰亦善文仕至翰林學士承旨宇文昌齡雙流人進士神宗時為監察御史職事修飭纍遷太常少卿詔議郊祀合祭論者不一後竟用昌齡議出知梓夀等州徽宗立為户部侍郎建議嵗省陜西糴價五百萬子常纍官提舉成都路茶馬盡革宿弊馬遂溢額進祕閣修撰知夔州府謝湜金堂人元豐進士官至國子博士伊川高弟入京師過洛見伊川問曰何之曰將試教官伊川曰吾嘗買婢而欲試之其母怒曰吾女豈試者今求為人師而試之其不為此媪怒者幾希湜遂不行宇文粹中雙流人以文學稱纍官至尚書右丞宇文紹節粹中子登進士第纍官端明殿學士僉書樞密院事多所建明朝廷咨訪蜀事紹節審而後言皆周悉事情卒諡忠惠尹瞻溫江人以博通知名舉進士嘗通判永州建學訓士一日城中火且風瞻具朝服向火拜風止火熄許樊進士哲宗時為侍御史章惇請發司馬光吕公著冡樊曰此非盛德事也乃止惇又欲殺元祐諸臣如漢唐誅戮黨人故事樊又曰本朝治道逺過漢唐者以其未嘗殺戮大臣也事亦寢謝潛湜之弟元祐進士與兄齊名學術醇正議論剛方未嘗少貶以投時好嘗詆安石新法遂坐黨籍廢錮顛頓以至終身時頗惜之趙介胄甫冠舉進士常撫威州夷人遮道挽留擢侍講入經筵所著有易傳論語孟子講義漢書筆記北征録後漢纂言通鑑綱要等書勾濤字景山新繁人崇寧中進士纍官史館修撰後為湖北安撫使知潭州秦檜嘗命人諭意欲與共政濤辭乃上書論時事之害政者高宗歎其忠有文集西掖制書奏議數卷勾龍如淵灌縣人政和中金遣使議和許歸河南地使者倨甚議受書之禮未決如淵建議取其書納禁中人情始安楊希仲新津人未第時館成都富家主人少婦調客希仲拒之其妻是夕夢人告曰汝夫獨處他鄉能自操持不欺暗室神明知之當令魁多士以為報嵗暮希仲歸妻因問之乃言其故後果發解登政和進士張孝祥字安國溫江人紹興二十四年廷對高宗擢孝祥第一以為祕書郎纍遷起居舍人孝宗時為集英殿修撰張浚與湯思退不協孝祥言二相當同心戮力以副陛下恢復之志歷官荆南湖北路安撫使請祠卒楊天惠郫縣人幼警敏嘗取韓愈歐陽修文集縱觀作歌行十數篇舉元豐進士徽宗時上書言事甚剴切後入黨籍有文集行世孫松夀郫縣人字巖老博學工文詞紹興中進士剛方廣潔不求人知居官決事多用經術嘗守漢嘉甚有惠愛范成大入蜀引松夀薦於朝召用不起趙雄在樞府侍上言其賢詔特轉一官賜三品服趙汝愚入蜀復奏松夀挂冠勇退幾二十年內行素飭終始不渝乞賜褒表以勵風俗除直祕閣松夀素清強晚而彌壯年九十餘乃卒蜀人號為牧齋先生楊應詢郫縣人歷知信安保定軍為河北沿邊安撫使有政績知雄州治兵積粟夷人不敢犯邊後為定州真定大名副都總管諡康理鮮大年灌縣人令綿竹存心公恕蒞政勤敏不為豪猾所撓凡事之廢墜及前人所憚為者悉舉行之胡晉臣崇慶州人紹興末進士為成都通判孝宗召對除著作佐郎時近習用事晉臣極論之出知漢州後為侍御史林栗奏朱熹傲慢晉臣上疏留熹纍官參知政事與留正同心輔政卒諡文靖李繁崇慶州人第進士為隆州推官攝綿州賑飢活十餘萬人又知永康提刑成都路兼提舉常平嵗飢又賑活百七十萬人知興元府奏罷和糴之法梁洋間繪像祀之遷太府少卿繁講學臨政皆有源委撰桃溪集百卷劉光祖簡州陽安人登進士第為潼川提刑司檢法淳熙初召對論恢復事稱旨光宗時為殿中侍御史極論道學所繫甚重撰涪州學記諫官指為謗訕奪職謫居房州終顯謨閣直學士奉祠卒諡文節有後溪集趙全叔簡州人性孝友歷合嘉雅三州推官纍官華文閣待制知興元府治行皆可紀所著述甚富宋德之崇慶州人慶元初纍官武學博士與諸生論八陳之象本乎八卦竒正之變往來相生而不窮娓娓數千言甚得其旨出知閬州又自湖北提刑召為兵部郎官朝論疑安丙德之言蜀無安丙朝廷無蜀矣時韙其言歷官知眉州許奕簡州人慶元五年第一人及第授東川節度判官韓托胄議開邉奕貽書甚言不可以給事中使金金人禮迓甚恭纍官寶謨閣直學士知潼川府奕天性孝友家庭無間言在朝論諫甚多稱骨鯁臣通籀𨽻書所著有毛詩説論尚書周禮講義等書趙彥呐彭縣人少以才稱吳曦叛以祿禧為偽守守夔彥呐結義士殺之遂顯名於時嘉定中經理西和州金兵再至戰却之在州五年得軍民心端平初官為四川制置使許彪奕之子紹定中知中江作義冢於亞松山遺骸暴骨無所歸者悉瘞之尋以內艱去重道守禮人稱其不愧家學云元趙世延成都人先世居於雍父為元帥鎮蜀因家成都世延究心儒者體用之學擢御史劾僧格不法鞫獄平陽發伊哷圗贓巨萬歷四川肅政亷訪使軍官抑良民為奴痛加懲治又修都江堰入為御史中丞劾丞相特們德爾罷之進大都留守乞外拜四川行省平章開巴縣江津屯田七百八十二頃嵗粟三萬七千七百石仁宗崩特們德爾復相逮世延至京下獄逼令自裁世延不為動拜珠為言其寃乃得釋文宗拜為中書平章監修經世大典封魯國公養疾還成都卒諡文忠子伯夔州路總管死於囊嘉特之難贈蜀郡公諡忠愍費著華陽人進士授國子助教有詩名居母喪盡禮哀毁骨立歷漢中亷訪使調重慶府總管卒於犍為兄克誠亦擢進士時人謂成都二費黃澤澤於名物度數考核精審而義理一宗程朱作易春秋二經解三禮述略大德中授江州景星書院山長張䇓灌縣人僑寓江左從金華王柏學六經語孟以及周程張朱之書靡不潛心講究至元中行臺中丞吳曼慶延至江寧學逺近翕然尊師之稱曰導江先生有經説文集行世明王平新繁人洪武間以御史遷河南僉事行部孟津宜陽屬吏有謀以貨撓法者平以狀聞特敕褒奬纍官右都御史焦敏灌縣人洪武間以貢生任永豐訓導蹇義薦擢主事歷刑部員外卒於官敏諳刑名而行之以恕所至著冰蘗聲曽孫韶登成化進士授刑部主事升武選郎中出知曲靖境産瑞禾府民歌曰一本二穗嘉穀滿田太守焦公仁德及天為立生祠祀之終副使楊直漢州人洪武中監生授監察御史謹持憲度歷交址按察使周滿字謙之漢州人幼頴慧登進士初授主政理事之暇六經書史子集無不精研其説為文富贍纍官都御史宦途所歷如滇南宣大汀虔皆有異績後家居益肆力於學著有周易象義春秋原義受庵文集共若干卷鄭彥文彭縣人元貴州宣慰使洪武間投誠安撫播貴水西畢節有功擢户部侍郎守貴州鄒昱華陽人偽夏平章鄒興之子興治民有恩為夏守瞿唐死於陳太祖義之命入祀昱於永樂初以監生授漢中府同知勤政敢為終湖廣布政使劉成穆崇慶州人竒穎不羣齠齡善文辭年十五登賢書即以是嵗感妖夢卒蓋唐李長吉之流也所著有鉉倩集傳於世楊自泊崇慶州人舉孝亷初知萍鄉縣升袁州府丞刑部員外後僉憲滇南屢著賢聲鄉評推重王紀郫縣人以明經入太學見推六館知宛平縣公正亷慎綽有成績歷儀制郎中李全郫縣人任南大理評事謙恭慎密達於政體斷獄主平恕時以正人稱之尹淳崇慶州人正統中舉孝亷授狄道教諭言動不茍以身率人九年擢御史巡按雲南摘發姦宄所至有聲歷官參政致仕歸著陶洽集二十卷莊升成都人正統中進士任御史秉性狷介僉憲山東前官曽瘞金署中而卒僕掘得金升遣還前官之子未幾升亦卒弱子扶櫬歸家貧甚蜀藩賜以葬地都御史汪浩恤其家始存活何漢宗溫江人正統間進士歷官副使平生尚氣節不隨時俯仰居官清介學士周宏謨稱為鐵石心眻楊觀新都人正統中進士任御史調蒲城知縣新都舉進士自觀始居官行已卓有聲稱杜銘金堂人正統間進士性孝友與人誠信能決大事辨疑獄位至司寇歷官五朝忠勤如一功成身退世稱完人桂山字本寧成都人南唐司空桂卿之後登景泰辛未進士歷户部郎中練達亷潔凡有關軍國者雖咈衆力為之不顧司徒馬昂甚稱之升廣西恭政守左江時大藤峽猺獞寇南寧亟山一日馳至選土兵據要害以禦之烽火相望寇懼俱遁去民賴安堵自是蠻夷畏其威不敢肆云洪冕字廷章成都人登景泰進士仕為御史歷官參政遏抑權豪振肅紀綱所至政聲卓然桂茂之成都人山之姪景泰甲戍進士官户部歷郎中升雲南恭議廣東右恭政恬靜清勤精於吏治所至有聲弟莘之成化丙午舉人子珠正德丙子舉人居官咸有冰玉操士論重之孫嘉孝嘉靖中進士人以為茂之積德云梁萬鍾溫江人景泰間進士知仁和興利舉廢崇教厚俗邑民繪像祀之擢知杭州治西湖淤患升兩浙鹽運使未幾乞休坐逆瑾掎托代償逋負三千兩盡鬻田産輸官恬不介意年九十尚無恙訓課子孫相繼登科溫琮華陽人景泰中進士任御史巡按雲南時藩鎮錢能貪橫琮執法不撓風裁特著能始斂迹弟璽成化間成進士歷升河南參議時人有難兄難弟之稱子仁和亦纍官禮部尚書大學士謝秉中華陽人天順間進士任御史剛介正直不避權幸尋升雲南副使王弼華陽人天順間進士初知開化豪民余聨勒奪人田土妻女持府縣短長前令不能制弼以法繩之其黨懼誅火牛尾為厭勝術弼捕之急乃夜持七首匿公廨將害弼為雷震死後擢監察御史平反獄囚數十人升福建僉事漳南溫文聚衆為惡弼以計獲斬之衆遂散弼質實清慎居喪三年足不至公府子汝舟汝梅俱登進士王汝舟弼之子進士歷官至左布政使篤實剛明心貌如一致仕歸家惟有圖書而已王銓金堂人博學能文登天順間進士授刑科給事中多建白有直名升河南左參政得士民心革從時成都人登天順中進士歷主事員外郎以直氣自負上疏言五事曰開言路明義利汰冗官嚴考察飭邊務多見施行後忤權貴調知濟寧州卒張賁華陽人成化中進士歷太僕少卿謙恭勤儉所至皆得民心退歸山水自娛益堅孤介鄉黨稱之李宗泗彭縣人成化辛丑進士任池州府推官入為御史一時多所建白有褒崇宣聖控運邊儲諸疏尋擢僉憲築臨清河堤朝廷賜金帛勞焉閩廣寇警以憲副備兵南贛城會昌以扼其衝卒於宫所著有挹清軒集莊誠成都人升孫力學茹苦中丁卯鄉試教諭公安課士作人得袁宗道卓有藻鑑士皆服之移令徐豐多善政擢趙州守瀕行盡括贖金二千緍為民抵逋賦蘇活萬衆纍官朝陽郡丞以勞卒於官行囊蕭然子祖詔舉孝亷祖誥祖誨成進士俱以忠烈著詩書孝悌醖釀家庭才望廉聲琳琅宦績人謂皆誠之積善云何琛成都人登成化中進士知蠡縣有善政拜御史清理湖廣貴州糧儲及巡按雲南風裁凜凜權豪斂迹時征叛夷劾將官擅殺冒功者黜之升山東副使調江西觸逆瑾罷職瑾誅起為湖廣按察遷貴州左布政使卒於官時論重之陳一經成都人登成化中進士歷任左布政使清介不阿致仕歸杜絶請謁鄉評重之許淳成都人登成化中進士歷升雲南布政使抗逆瑾有直聲家居篤實謙慎為衆所服趙永禎成都人登成化中進士知汝州平易近民時豪強據公渠専水利永禎疏濬復舊民賴之官至南京刑部員外著竹忩小草楊玫新都人先世居楚元末有避亂入蜀者嘗活數百人即其鼻祖也玫以監生授水寧吏目公亷平恕州地廣人稀招佃鄰境與土民共耕而收其租鄰守請納厚價買之玫時署州印持不可曰他日生齒漸繁吾不為怨首乎後知州至卒如其請分價數百以遺玫玫不受後卒於官長子次子繼逝餘子俱幼妻熊氏護三喪還中途阻兵僑寓三年乃得歸家熊性嚴有德以義方教後人故子孫多顯官玫屢贈少保文淵閣大學士楊廷和字介夫新都人成化中以竒童中鄉試弱冠登進士官翰林檢討歷升翰林學士兼户部侍郎為劉瑾所嫉改調南京後召拜華蓋殿大學士兼吏部尚書與梁儲蔣冕同心輔政武宗無後廷和議迎立肅宗登極後旋以議禮落職廷和怡然歸里卒於家隆慶初追復其官諡文忠湯仰新都人進士任部郎出知衢州府纍官布政使惠政流聞致仕歸仕宦三十年囊無餘蓄座有銘曰勢無使盡福無享盡事無做盡言無道盡以此養德庶幾身潤延及子孫亦有餘慶此可見其大都云楊有仁廷和之孫登進士即具疏論時相以母老不果上鄒元標廷杖歸衆莫敢問視有仁獨送之國門以行人選侍御史抗論不避權勢纍遷河南僉事遂拂衣歸居鄉清儉雖出相門無異寒士楊宗吾廷和曽孫以任子官錦衣指揮開採中州不欲煩民抗章求罷禍幾不測然中州竟藉以罷役初與監璫同事璫橫甚宗吾屢上疏劾之由是權璫斂迹中州人甚感其惠廖鉉崇慶州人成化間進士奏改額米千餘石州民稱快知監利西安二縣有惠政遷雲南大理同知歷廣南知府築城池興教化致政歸進階三品盧英字文華崇慶州人幼篤孝弟宗黨稱之稍長肆力於學得一善言終身不忘登進士知黃巖縣俗狡詐強悍未十年而縣令去者六七英為政以愛民為本內質實而外端方所行多善政百姓畏而愛之任漢溫江人成化間進士歷御史抗疏論列權貴悉皆斂避林俊稱真御史纍進布政使升右副都御史總治鄖陽經略三省多所建白升大理寺卿平生孝友容止矜莊有詩六卷奏議十卷王資良金堂人成化間進士官兵部郎中遇事精審不紆不迫名公卿咸禮重之擢臨安守夷民雜處難治良大布恩信民愛之如父母雅重風教士經指授者咸登科第晚年吟咏陶然自得胡倫字天敘漢州人進士初授主事纍官鄖陽知府甚有惠政秩滿當遷以忤逆瑾遂歸鄖民慕之不忘嘗鑿井府治西稱曰胡公井曹山什邡人𢎞治間舉孝亷任杭州府推官讞獄多所平反擢寧波府同知有勢豪橫行者山以誠感之清出侵田二十餘萬畝減賠糧米七百餘石至今民受其惠李志剛成都人登𢎞治進士歷刑部員外首劾逆瑾不法推廣東僉事平劇盜復民田以萬計民立祠祀之居家友愛四方從逰之士相望於門萬輔崇慶州人舉人持重簡默崇俗尚浮屠輔思易之親喪遵行家禮儀節鄉人感化諺曰萬民一呼喪禮皆儒初訓居巢後諭榖城諸生皆法之稱曰鈍庵先生敖選金堂人少孤貧嗜學不倦後成進士授上海令痛革時弊請託不行行取廣西道御史彈劾不避權貴請告還家囊篋蕭然卒之日無以為殮聞者感歎何守拙字子工簡州人少穎敏講明心學尋以鄉薦令楚之永明崇正黜邪擢麗江同知會追論土酋鳯氏之亂死事者入崇祀典惟張澤如制而議者將欲濫及守拙以詩諷當路不悅竟罷去王伯字希召灌縣人𢎞治中舉孝亷知蘄水縣仁恕明敏建浮橋築隄於巴河鎮民咸賴之祀鄉賢李璲彭縣人以鄉薦司訓襄陽夜有賊入室以米肉遣之賊感泣為善遷順德諭聞陳白沙講學往見之坐語移日白沙歎曰君資可以入道顧佖字民表成都人正德中進士知豐城縣興學省刑築隄捍水時宸濠謀逆以重兵阻江佖飛馳告變於南贑巡撫王守仁守仁急會諸郡合兵進討南昌遂擒逆濠敘功首薦超升大理寺丞遷少卿免歸後言官交薦被命起用佖曰吾衰矣恐無以報朝廷未幾疾卒聞者惜之劉士元彭縣人七嵗能文二十登進士正德中任貴州巡撫平生孝友撝謙才猷文雅為時推重祝𢎞舒溫江人正德間進士任寒山令賑歉恤孤以才能調浙之太平俗不舉女𢎞舒下令嚴禁全活甚多升江淮鹽運使乞休歸著榿野漫興若千卷范時警成都人正德中進士好古博學倜儻有文武才僉憲滇中道聞安鳯之變星馳入省慨然以討賊自任鎮巡倚重檄領六路兵攻賊不血刃而地方廓清後以外艱歸廬墓三年服闋力請養母躬耕浣溪囊無長物恬如也姚激崇寧人登正德辛未進士世宗御極臨軒竒其貌有特簡意會激病卒崇有科第實自激始兄溥亦仕為潛江令皆有才名時稱二難李佶金堂人正德間進士選翰林庶吉士嘉靖初拜御史巡按浙江獨持風裁一時貪墨望風解去奏革織造太監以剛直忤時相毅然乞休縉紳重其風節桂嘉孝成都人茂之孫嘉靖癸丑進士初任車駕司主事綜馬政修邊牆移武選郎中持公核弊擢守漳州府時寇薄漳城嘉孝乘間入漳慰安居民申嚴戰守賊衆尋遁去士民尸而祝之轉淮浙鹽運使嵗增鹽課數萬緡一介不取辨烏程李令之誣雪屠氏二女殺父之獄人人頌德焉歷官二十年卒周俶成都人嘉靖辛丑進士居官清謹亢直為南京兆尹人畏其嚴尋請告歸里日惟種樹治圃門庭寂然鄉評重之劉進成都人為人剛直舉嘉靖戊午孝廉作宰滇中時直指某同鄉也進不樂庭見遂毅然挂冠歸家無長物守道終身陳傑字位卿成都人舉孝亷仕楚廣濟令淡於名利投牒而歸家居三十年鄉閭以為矜式年九十無疾而逝周遜成都人嘉靖中進士以疾居家後徴為刑部主事纍官雲南參議辭歸清操徑節為時推重有五津詩集何全字原學成都人嘉靖中進士自少以文學孝行稱歷官江西參議有惠政時濱海倭患甚亟全追海寇于南隩平倭寇于蘇常且奏減稅租以蘇民困士民立生祠以祀之周以庠始生之夜母夢李白至其家九嵗能吟咏春日口占云自歎春回寒未減固窮不肯賣心田廣居豈但餘千厦時價何曽值一錢父歎其早慧及長領鄉薦赴京途遇一廷試貢生被盜囊竭以庠許以三十金為助言訖亟取與之生感其惠且訝其速以庠曰凡人善念易起易止恐轉念故耳王印字德徴華陽人嘉靖戊午鄉薦任粵西義寧縣有少年武斷一邑者印擒治之乃潛置蠱毒欲害印印不死民以為神素性嚴重恥干謁蜀中當事多重之焦瑀雙流人以貢授處州通判時海寇猖獗瑀誘其酋長來降遷同知致仕後奉詔存問進階知府顧紹履成都人文章德行為里中儀型嘉靖辛酉舉人補國子助教歷西安同知所至持廉守法有惠政致仕歸子道領丁酉鄉薦道子其登癸丑進士樊景麟彭縣人進士知長沙民謠曰樊作長沙官止飲長沙水仕至雲南憲副忤巡撫意被劾朝臣皆素知景麟共言善狀巡撫罷景麟亦挂冠而歸邊維垣字師甫彭縣人進士初授南工部郎𣙜蕪湖清慎奉法忌者反以京察中之調禹州同知未幾攝守事出重囚鞫無辜士人白部使者竟釋之京陵王不法藏納亡賴隂署邏卒悉捕繫之置法又攝睢州條省里徭千六百金郡有張烈婦死節甚竒議旌例宜聽臺請維垣曰表節守臣職也若候會勘移文則停閣數年而不得慰幽魂竟自奏行為州佐凡期嵗兩上章名大顯破例內轉纍官江右巡撫轉南工部侍郎屢上疏求去皆慰留卒於官朝野惜之李鳯毛字于翔彭縣人嘉靖庚戌進士由大名府推官行取御史巡按宣大時北敵方熾鳯毛區畫戰守前後凡三十餘疏皆報可升光祿少卿會涼樓災自陳待罪上念邊功置不問復疏清查破冒嵗省光祿十餘萬金未幾遷南太僕嚴世蕃惡其不附已假風霾考察致仕歸馬朝錫字晉卿彭縣人進士起家蕭山令調安東開荒田招流徙後𣙜關蕪湖奏革船稅以便行人尋以讒歸朝野惜之著有捫參樓集五道原等書劉藻字文潔彭縣人以太學生領順天鄉薦為富平令政教兼舉不避權勢未久乞致仕歸聚徒講誦以沖淡自守唐廷珍字宗儒彭縣人由選貢令安化縣平易仁恕清修苦節百姓戴之顧紹俶字善夫號右江成都人年十九即有志程朱之學復深究易理手抄諸儒語録三十餘卷創宗祠家孰更置義田以供祭祀其子造成進士為臺臣紹俶封御史論者謂其宜祀於鄉云焦維章灌縣人嘉靖丙戌進士歷河南大參三典文衡兩司學憲清謹正直皆著藻鑑云胥鉉華陽人嘉靖庚子舉人性朴忠耿介官提舉尤謹修職業未幾遂拂衣歸鄒華南新津人嘉靖間進士纍歷仕途居官清正卒祀鄉賢姚繼先成都人中隆慶丁卯鄉試纍官平涼知府時值大旱繼先禱雨立應又捐俸設粥賑飢活者萬計纍升任太僕少卿以生母訃歸里遂堅卧不出所著有紹菴文集若干卷楊師心字觀吾華陽人舉孝廉日以歌吟自娛且慮當時文體卑弱獨以文學教士類人多宗之比於梁山來徴君知德當事薦於朝會師心以疾卒事遂寢時人稱徴君云李商耕華陽人萬厯癸未進士以父先芳年已耄耋陳請終養事親幾十年起遷户部主事監稅德州釐蠹弊察廉貪屬吏望風斂戢擢守襄陽後忤權璫左遷兩浙運同商耕不辨毅然解組襄人為之立去思碑云王德敷萬厯間以貢生任荊州府教授致仕家居足不至公門日以訓課為事隆冬盛暑講習不輟夀九十卒時人稱為典型鄒遇新津人萬厯中進士歷江西布政升湖廣巡撫卒於官生平剛方耿介以禮自持周恤鄰孤里人重之祀鄉賢何存斆字念卿成都人萬厯丁丑進士歷刑部郎時京師大俠鄭任成者歐死平人人不敢問司寇以屬存斆卒論如律升雲南僉事條弊政十議積蠹一清時永昌兵變賊挾戚同知為質存斆密謀出竒擒之賊卒授首戚得無恙旋以養疴歸里十餘年卒李元齡字仁卿華陽人幼聰敏以竒童稱中萬厯丁丑進士任臨清州知州入為都水郎治淮河工最加四品服俸旋以養母請告後起平陽知府升山東按察副使乞休生平好義業師張桂東無子奉之終身殁而立祠祀之著有翼經隨筆及詩文若干卷劉美字世德華陽人萬厯甲戍進士孝事孀母初任洋縣令調金壇兩邑皆著循聲入為户部主事司𣙜九江以廉直自矢任滿乞終養所著有臆説雜爼集解劉克勤新繁人萬厯乙未進士初任永州司理有聲升南户曹管中都倉分亳不取擢黃州知府操持益峻尋卒於官黃人至今思之李一敬華陽人恬靜端方甘貧力學中萬厯辛丑進士任即墨令單車之任約己愛民絶餽獻屏宴逰風裁凜然竟以勞瘁攖疾危坐廳事卒櫬歸里第妻孥猶苦飢寒士紳親友皆惻然歎惜之費嘉誥新繁人邑諸生性誠恕處鄉黨間雖遇寒賤未嘗凌忽後以明經授大竹教諭訓士有法卒於官嘉誥善詩詞生四子長經國貢士官訓導次經世次經濟皆庠生獻賊陷川經世以不受偽職遇害次經虞事親以孝聞舉崇禎間鄉薦任雲南昆明令廉潔端嚴民戴之曰吾邑四十餘年不見此清官矣時土官吳必奎反討平之驗閲武定俘民全活甚多升雲南府同知再遷廣西知府不之官歸里著書鄉人服其清介重慶府漢謁渙江州人仕為汝南太守有公直稱與同邑司𨽻校尉陳為度遼將軍詩章皆有時名然溫江州人仕為度遼將軍守桂陽長於治民能得其心譙元字君黃合州人成帝時仕為諫議大夫因王莽僭亂遂避之不事公孫述鄉人作詩以美之蜀漢董和其先巴郡江州人徙南郡枝江漢末率族西還依劉璋任成都令時俗侈甚和率以儉遷益州守清約如前推誠服夷南方信愛之先主定蜀徴和為中郎將與諸葛亮並署大司馬事外牧殊域內幹機衡二十餘年卒之日家無擔儲亮追思稱歎不置晉文立字廣休巴郡臨江人少逰蜀太學治毛詩三禮兼通羣書纍官梁州别駕咸熙元年舉秀才除郎中武帝方欲懷納梁益引致雋彥拜立濟隂太守武帝立太子立為中庶子上疏太子宜選賢佐帝報可立又上故蜀大官及盡忠死事者子孫雖仕郡國或有不才同之齊民為劇又上諸葛亮蔣琬費禕等子孫流徙中畿宜見敘用立事東宫盡輔導之節帝降詔嘉之以為散騎常侍纍辭不許西界獻馬帝問立馬何如對曰乞問太僕帝每善其恭慎遷衛尉猶兼都職中朝服其賢雅為時名卿咸寧末卒乃送葬於蜀使者護喪事郡縣修墳塋當時榮之又立同郡有毛楚楊崇二人皆以美德著楚為牂牁太守崇為武陵太守母雅巴郡江州人學冠四科貢於朝除涪陵漢平令為夜郎太守夷人感其惠卒年八十有二唐李陽冰合州人開元中為當塗令有政績宗人李白常往依之善篆書州治景厚堂有所書積善之家必有餘慶八字石刻尚存五代張武合州人後唐時仕王建為破浪都頭大破高季昌於夔州府歷升武鎮軍節度使宋母夢牛郡人初授樂源縣尉優於吏事茂著亷聲纍主文試院官至承直郎有全歸集行世石公恕江津人以武功大夫知威州有能名常作文刻碑戒子孫母得分異子孫世守其訓張弦江津人舉進士召對直言無所避忌纍仕至湖廣總領有幹局長於籌邊馮時行壁山人字當可紹興間狀元授左朝奉郎極言秦檜和議之非出知萬州秦檜諷使者托拾其罪坐廢有縉雲集行於世趙性合州人紹興中對䇿集英有曰以括囊為深計臣知其人矣主和議者當之以首鼠為圓機臣知其人矣杜言路者當之考官大驚以為劉蕡無以過檜欲罪之值檜卒而止羅志沖合州人潛心六經最精於易著易解發明程氏之旨為多度正合州人早從朱文公學歷官國子監丞上疏極言李全必反且獻破全之䇿有三纍遷禮部侍郎有性善堂集楊載涪陵人以功名自負金立劉豫載白張浚願得百兩橫行敵中當手刃劉豫以報浚壯其言遂遣之載偕十士至金偽降金信任之載行反間豫果廢十士已亡其八乃決歸浚以聞授知永睦縣蒲國寶壁山人開禧時狀元飽飫六藝淹貫經史趙立郡人第進士以上書忤賈似道被謫德祐初起為太社令湖北提刑使趣諸將入衛至蜀時咱萬夀已降於元張珏知重慶府方設城守為後圖立無以復命至涪州沉水而死元賈長卿長夀人淹貫經史以文章名凡使蜀者事竣還朝士大夫相訪必首詢曽得賈長卿文字否其為人所慕如此明江德海墊江人洪武初建學以明經授本學訓導以身率人多士信服植柏學宫餘蔭猶存劉信郡人洪武初由賢良方正任陜西參政左遷東流巡檢從征江介畨夷有功升忠州千户楊金奉邑梅司人洪武初為長官熟知邊情子孫世襲冉如彪酉陽司人洪武初知酉陽州善於化導風俗丕變升宣撫世襲柳申長夀人洪武間任大名府同知尋升大名知府深得民心童謠曰兒童竹馬街前唱還是舊官今日來李鑑江津人以鄉舉教諭蒲圻得士子心歷常德知府遇荒設賑多所全活石敏中江津人由嵗貢任松滋知縣清慎廉介居官如治家備軍餉築城垣民不知困松滋至今德之江孟綸江津人進士拜御史謇諤敢言巡按陜西大賑飢民辨民寃抑所著有梅庵集行於世江淵江津人由進士歷官至學士工部尚書清勤簡靜忠鯁不阿尤善文詞著觀老錦榮諸集王鐸榮昌人洪武中由太學生任嘉定縣丞政績著聞纍官交址布政使胡謙南川人洪武間以鄉薦拜御史風裁凜然以忤權貴左遷不赴任家居二十餘年而卒康健合州人初名子榮洪武間由太學生授給事中受太祖眷注改今名敷奏詳明歷官二十餘年冰霜之操終始不渝莫仲昭銅梁人洪武中由太學生纍官至浙江布政使老成諳練所至多有惠政上下咸孚陳價銅梁人纍官至都御史歷任三十餘年名實茂著有詩文藏於家弟僑子揆相繼登科楊大榮酆都人由進士歷江西僉事剛敏多政績學士程敏政為作傳楊孟瑛酆都人進士歷杭州知府不畏強禦居鄉嚴毅人服其介陳常長夀人洪武中任常德府同知清戎有法吏民懷畏且鞫訊明決獄無寃滯卒於官囊篋蕭然鄉評重之鄒成墊江人洪武間以太學生拜御史巡按入閩振揚綱紀吏民畏服牟俸巴縣人由進士拜御史有鐵面稱歷山東巡撫救荒擒賊有功於時白勉涪州人進士歷官刑部侍郎練達刑名有匡濟才及卒賜御祭有剛方清介之褒鄉人榮之劉岌涪州人清慎謙和歷仕兩朝眷注獨厚以禮部尚書致仕居家恂恂鄉人稱之李琳定逺人洪武末由鄉薦拜御史持憲得體風采凜然升福建僉事李永寧定逺人由進士守桂林清介剛方始終一節有古人風謝庸忠州人永樂初由鄉薦拜御史發姦摘伏行部肅然歷官山東副使李允忠州人進士歷翰林檢討年屆四十辭歸鄉黨重之談棨涪州人進士任陜西參政居家孝友歷官清亷御評重之張涪州人以鄉薦任知州剛正孝友以所居為祠堂率族衆修祀事鄉人化之何以讓涪州人由舉人任武昌令判大名府陳情終養贈懿孝名儒著有兩都賦等書行世卜孔時江津人由舉人任同知以剛正忤稅監誣奏繫獄凡十九年宰相申時行請釋之出獄兩鬢俱霜遷漢陽知府事詳明紀楊薑江津人由舉人任蘇州府同知居官清正忤織造監被謫事載明紀周榮合州人永樂間拜御史卓有直聲致仕歸足迹不至公門人服其介沈運重慶府指揮充參將守威茂蠻叛殺人運密置兵門內呼蠻至犒以酒食因并其黨殱之陳志巴縣人為燕山護衛指揮僉事有謀勇洪武末從靖難兵屢立戰功永樂初封遂安伯蹇義巴縣人洪武中進士初為吏部侍郎靖難後進尚書成祖北巡佐太子監國熟於典故政務大體奉命巡應天考察甚公進少師多啓沃宣德初卒在官五十餘年凡歷五朝諡忠定蹇霆巴縣人尚書義之孫歷僉事剛方清儉處事合度吏民感之人稱其不愧祖武云蹇賢巴縣人永樂中任監察御史執憲公平纍官布政使有冰蘗聲伍秉合州人正統中進士拜御史性剛介不附權貴劾中書李寶并總兵石亨擅權左遷卒賈奭巴縣人景泰中歷都御史剛介亷直不趨時好自居官至乞休如一日焉江朝宗巴縣人景泰中進士授翰林院侍讀學士進講經筵多啓沃之助時人俱推重之陳仲巴縣人初任通判擒賊有功擢知府解組歸不入城邑鄉人高其志節蔣雲漢巴縣人天順中進士揚歷中外德望兼著纍官至布政使一室蕭然清苦莫踰費廣合州人由進士拜御史天順初上疏劾石亨擅權謫知永寧改貴池卒於官有約齋詩文集行世李人儀榮昌人天順中任御史疏劾總兵石亨出守襄陽後改荆州卒於官何仲山涪州人成化丁酉舉人任武安令苞苴不行人稱其廉致仕歸里崇祀鄉賢趙炯永川人成化中任瀏陽令拜御史擢雲南副使亷正明達番漢悅服以忤時相謫漢中府同知羅廷唯永州人進士知棗強縣盜賊斂迹後拜御史條陳時政皆見嘉納朱光正大足人成化中由舉人知河西剛明亷謹得吏民心交址侵邊光正喻以大義夷退當道書談笑却兵旌之王璽合州人成化中進士授給事中封駁奏對著聲於時擢參議浩然乞歸家居二十餘年劉規巴縣人成化中任御史立朝有聲以忤權貴罷歸子春貴贈尚書羅九鼎合州人成化間進士筮仕大理評事多辨冤抑致仕歸家杜門不事請謁鄉評稱重馮衡合州人成化間進士風度沈逺令吳江大著強項聲未幾拂衣歸徒步千里與陳白沙逰白沙高其誼以見一顔其堂以唐詩有相逢盡道休官去林下何曽見一人之句也何梯合州人成化中進士拜御史歷任十餘年囊無羡金薄田數頃與族人共之年踰八十無疾而終曽昂銅梁人成化中歷官知府有文學能知人長於政事所至常有去後思張禎叔巴縣人成化中歷官都御史以直言謫官風節為時所重陳瑞忠州人𢎞治初以進士拜給事中疏劾中官郭鏞乞罷內侍官不得參機務上嘉納之升光祿卿請禁浮屠罷國醮及減奢費等事後省親道卒聞者咸歎惜之詹奎巴縣人𢎞治中進士為户部郎劾權姦挂冠歸後以徴召復起歷官十餘年家貧如故曹􅎁巴縣人𢎞治中進士任刑部員外郎治獄無冤出使晉藩餽遺無所受好古力學為時所重姚學禮巴縣人𢎞治中進士歷參議性忠侃初居南臺以敢言忤逆瑾罷歸人稱其忠節楊應春長夀人歷仕有政聲長於文學著世德補拙集郭明郁長夀人以鄉薦授學録深潛有識所著有五經注北山文集聶賢長夀人舉進士由御史升按察僉事歷刑部尚書以疾乞休楊慶長夀人任通判深得民心去之日士民遮道泣留時有羣燕飛繞其車人以為仁愛所感戴錦長夀人舉進士𢎞治中抗疏請除壅蔽權貴忌之中傷落職貧不能歸流寓徐淮間授徒自給久之及歸著絅菴諸集行於世余能繼長夀人生平剛正邑紳士憚服之以鄉薦授枝江令清正明允德愛在民恥阿附權要遂拂衣歸讀書教子自娛劉茝涪州人正德初任給事中時劉瑾擅權首抗疏極言其姦被廷杖落職瑾敗起守金華尋歸世宗初復徴為江西副使以疾卒胡守約合州人正德初以鄉薦授彭蠡知縣值寇攻城親出督戰身被數創遇異人療之不死歷官知府張縉巴縣人正德初歷官都御史巡撫兩浙恩威並著有保障功劉鶴年巴縣人正德中進士操守亷峻始任兵曹門無私謁歷官雲南布政不持一錢時稱廉吏李邦巴縣人正德間以鄉薦歷員外為人狷介莊嚴凜然不可犯鄉人敬之任轍巴縣人嘉靖初進士知許州嵗旱多方賑恤擢守黃州採木之役曲為調停民困以蘇歷官貴州都御史計縛叛夷許吾等邊陲賴以奠安李文進巴縣人嘉靖中進士歷給事中劾權貴不職晉都御史巡撫浙江大同等處執訊獲醜所向有功歷刑部尚書劉啓宗巴縣人嘉靖中進士任衢州府推官擢給事中抗言不避權貴謫荔浦尉歷升提學副使改苑馬卿居官二十餘年持亷守正卓有風裁劉應箕巴縣人嘉靖中進士初知餘姚歷擢陽和兵備與督府王崇古處置北敵得體起拜僉都御史旋晉副都御史卒所著有欵塞録擊轅集續集行於世王春巴縣人少負竒才學頗淹博尤精於易嘉靖中以嵗薦任安化訓導兩臺檄修楚志才名大著楊太史過巴時造其廬考論竒字所著有縉峰內外集藏於家胡堯臣銅梁人嘉靖中進士授大理評事歷浙江僉事會賊江天祥反擒殺之擢湖廣參議攝兵備擒巨盜趙朝勝事聞旌賞遷副使歷升浙江布政時海寇王直招集倭寇聨舟島嶼與內地姦民交通沿海為患堯臣以計招致置諸法拜副都御史巡撫河南尋卒李純朴定逺人嘉靖中任刑部主事改監察御史時俺答請鐵鍋部覆許之邊臣因議互市純朴上疏極言其不可己又申救獲譴言官鄭履等又請以薛瑄從祀文廟按部廣西獨持風節毁李士實碑人稱為真御史以不附時宰謫知監利縣裁魚例三百金其廉介類如此所著有懷野文集奏議行於世劉春巴縣人官至文淵閣大學士卒諡文簡沈靜寡欲居官守正涖政廉明文行為鄉閭表率李士亨銅梁人號竹野由舉人仕至副使通籍二十年夫人兩承恩為命婦服止布素課諸子名之曰養德養志後二子捷南宫人皆謂清白吏子孫自是昌大云高懋銅梁人嘉靖中進士擢監察御史論列有聲常按江北兩浙所至振肅風紀多異績嵗潦請蠲租全活甚衆尋遷湖廣副使兵備辰沅時苗寇為患懋每出密䇿多所斬獲又解五寨之圍地方安堵晉參政遂謝政歸李恆銅梁人嘉靖中貢入大學大司成深器之授奉新丞邑人多狡猾供應夫馬常後時不給捐俸辦之二年免歸囊不滿十金雅志好修絶迹公門卒之日闔邑之士私諡曰恭懿先生張佳印銅梁人少頴敏日誦千餘言尤工古文詞嘉靖中進士初知滑縣有詐錦衣官校至者出七首挾取帑金印從容計擒之嵗大飢平糶設粥活人甚衆詔賜金幣遷户部主事尋督學雲南整飭滇士稱西南齊魯焉纍升巡撫應天宣府俱著勳績浙以兵變聞上特命往視浙民復變印設方計不踰時兩定之上優詔賜緋進爵兵部尚書總督薊遼三鎮時邊境不寧土蠻入寇印指授方略先後以捷聞詔賜甚厚進太子太保廕錦衣千户世襲所著有崌崍集督撫奏議行於世熊動之榮昌人幼稱竒童過目成誦十二齡補諸生長通五經尤精二戴中嘉靖丙午鄉試四入春聞竟以數竒不遇年四十而卒生平守嚴一介里人至今欽仰長子文炳痛父齎志以歿下帷攻苦教子應占成進士歷贈動之陜西左布政使喻茂堅榮昌人釋褐知銅陵縣流賊猖獗縣無城郭茂堅內外設備奪賊艦百餘艘以卓異拜御史決疑獄緝巨姦墨吏解去歷任陜西布政時有花馬池之警分兵退敵賜白金文綺撫鄖陽奉命勘楚世子弒逆事疏上如議特旌其直總督漕運適妖賊紅羅女反設計平之轉刑部尚書疏救夏言觸怒歸囊無百金享年九十有三卒賜葬祭祀鄉賢喻應豸茂堅孫由恩貢任安寧同知升尋甸通判兼攝邑事萬口稱為喻母卒於官行李蕭條不愧其祖之清白云祀鄉賢喻應台榮昌人由舉人令漢陽有恥效鷹鸇居然鸞鳯之譽應台謙讓性成雖童孺亦必以禮貌待之故居官愛民好士歷任黎平知府華夷悅服卒祀鄉賢冷珂榮昌人登嘉靖丙戍進士座師稱其文竒字竒想其人亦竒珂幽居亦端坐罕入寢室楊升菴服其淵博當道慕而造門亦罕見其面除中書享年七十終曹忭巴縣人號自山由庶吉士改户科給事中疏劾張桂忤旨逮錦衣獄尋降謪歸居鄉嘉言懿行不勝殫述二子一孫皆進士至今稱先輩典型必曰曹自山先生云王琬巴縣人嘉靖中領鄉薦歷任廣東副使屢著賢聲至今所在思之劉綡巴縣人纍代通顯以世德著聞綡雅負文學尤有至行閭里稱述之舉省元歷仕未顯識者卜其流澤之未艾云田登年忠州人嘉靖中進士知青陽縣邑無城倭舊為患登年創建不避怨勞民賴以安歷任大理司正恤刑廣東多所平反出冤獄五十餘人廣人德之所著有洗寃録羅青霄忠州人少遊金陵旋從遊湛甘泉授以理學深達奧義嘉靖中進士授歸德府推官歷兵部郎中應詔陳定六事大要為忠州興利除害上多議從之忠南峯石砫土司與楚中路等司接壤世為忠患青霄請復川湖總督以控制之時皆以為碩畫出知漳州府漳人頌之為著清漳政績録然竟以介直忤時歸家環堵蕭然年八十終郭嘉文大足人嘉靖中鄉薦授盩厔教諭正身飭教遷知白河縣以德化民未幾告休民泣不忍别家居值蔡賊之亂焚劫居民望其廬舍咸相戒曰慎勿燬郭公室也其感人如此著有警心百勿篇行於世吳鵬翼大足人嘉靖中舉人知湘鄉縣裁嵗例千餘金催科一諭以理邑有巨盜彭廷憲者剽掠洞庭垂二十年前令不敢問鵬翼計縛之逺邇稱快雷孔聞大足人少岐嶷趙文肅貞吉見其文歎賞之嘉靖中進士時嚴嵩當國同第者往謁閽人難之孔聞毅然作邑遂返嚴聞之訝為耿介士授辰州府推官會土夷奪嫡據印屢檄諭之不服孔聞至以禮法化誨夷悉畏服遷户部主事尋乞歸邑人至今傳頌焉鄢桂枝大足人嘉靖中舉人知翼城縣邑素稱難治桂枝抑強梗裁冗費恤刑獄賑貧乏境內大化舊王府嵗例銀百餘兩悉取之民桂枝申革之擢知劒州翼民遮道送之先是麗江土夷鄰劒境上田膏腴前守聽民自賣桂枝一切禁止土夷欲收其糧潛以金餽叱之曰賣田已誤若糧去土人不為我用是重困吾民也竟不許祀名宦祠簡籍巴縣人嘉靖中領鄉薦官泰州學正亷介不茍品為世範年近百嵗誦程子四針而卒巡撫稱其性資從善家世業儒經纍朝全盛之太平近百嵗康寧之上夀為旌其廬李臨陽江津人性端亮常以寇萊公自許嘉靖中進士歷官嶽州府知府亷平惠愛嵗飢多方賑濟全活以數萬計擢陜西按察司後致仕歸闔郡士民遮道送之有士大夫為著惠愛録周世逺江津人嘉靖中進士􅔦官山西右布政所在亷明仁惠以清望著徐效賢江津人嘉靖中舉人知澄城縣清亷守正體國恤民澄城人繪像尸祝之祀名宦文方合州人號少江司李楚中素忤嚴嵩父子及嚴氏敗人多以附嚴被纍獨方免以疾歸舉朝高其氣節家居奉母母卒廬墓不入城市時白蓮賊亂過其門相戒勿擾服闋後徴辟屢下至中途以病上疏辭歸未久而逝李諫合州人號誠軒弱冠登賢書即老成持重初仕高邑縣單騎赴任九年不攜宅眷衙齋清冷如氷上官咸器重之以為治平第一居官二十年歸里囊無擔儲當事高其誼頻為式廬暇日與田野農民杯酒笑傲彈琴種花有彭澤遺意胡世賞合州人進士由縣令屢升至刑部尚書皆有政績居鄉醇厚郡人悉推重之曽所能涪州人嘉靖中舉人知雲南石屏州丰儀倜儻語言慷慨居鄉著孝友聲及居官以愛民為本盡心水利州人至今思之李士震長夀人舉人歷知麻陽翁源兩縣清嚴慈愛公庭無訟民有疾病手劑療之乞歸教子孫以修德讀書生五子登科者四劉世曽巴縣人嘉靖中進士立朝介直與馮璫不合遂引疾歸清苦一如寒素後馮璫敗起拜僉都御史巡撫雲南會賊嶽鳯與緬交通內犯乃上疏請剿卒克大憝上嘉之晉副都御史廕一子錦衣百户夏子雲涪州人嘉靖中鄉薦從趙文肅貞吉談理學因歎曰丈夫不恥不聞道乃豔一第耶自是躡屩為五嶽遊久之謁選知舒城縣時有貴人以事往道舒勢強甚子雲故不為理貴人踉蹌以去竟坐不稱調判寧州遷判嶽州府治九溪馭諸武辨嚴毅不少假借威令大行當道屢薦詔進五品服俸升衡州府同知尋引歸所著有少素文集諸書行於世文羽麟涪州人嘉靖中鄉舉任陜州知州歷官廉平居家孝友絶迹公庭尤以文詞著子孫科第蟬聨不絶文作涪州人隆慶中進士初知聞喜縣以治最徴歷武選郎贊議帷幄平遼之役其功居多及遷雲南參政分守臨元時羅雄土舍殺父據險潛謀不軌作奉檄剿之賊黨再叛復剿平之先後以功上聞升廣東布政並增秩劉世賞巴縣人少為文潁異薑鳯阿茅鹿門咸器重之隆慶中進士歷官布政居官二十餘年清慎如一處家溫儉後人罕及曹大野巴縣人隆慶中進士初知祁門縣廉平不苛舉卓異拜户科給事中論新鄭相當國有十大不忠謫乾州判官尋歷遷僉都御史巡撫江西懲酷吏薦賢能訪隱逸甄録遺士多所成就無幾為言者所中遂挂冠歸行李蕭然有棠韻焉汪言臣巴縣人萬厯中進士選翰林院庶吉士改監察御史巡按順天時馮璫用事以子民來謁言臣絶不與通上疏白御史劉臺之寃朝議稱快發倉粟賑平山邑飢民全活甚衆已巡廣東治珠池盜萬人擒其渠魁餘釋弗治民用欣服及再入京亦多所論列一時偉之高倬忠州人天啓乙丑進士官御史性謹厚然遇事敢言多所建白以草場災罷歸朝臣交章薦其可大用尋復職歷官操江巡撫卒曹邦化江津人以明經授吉安州通判嚴正不阿郡人劉給事忤時相時相銜之欲誣以事邦化力為之辨獲免遷寧州知州子進可登科報至遂辭不就任致仕歸里操行淳厚卒祀鄉賢曹進可邦化子由舉人歷官貴州新鎮道副使撫苖有聲從黔撫王三善監軍進剿大方屢言苖性叵測不宜懸軍深入三善不聼以及於敗進可馬上中石幾死與所部數百人突圍而出未幾致政歸優遊林下二十餘年慕義好施鄉人德之夀八十四而終户部侍郎倪斯蕙銘其墓有擊楫祖逖免胄汾陽制勝諸葛籌邊贊皇之語云王應熊巴縣人進士歷仕館閣直經筵有啓沃功官至大學士立身清介文章為時推重懷宗末年起首輔因時黨不協乞歸陳新甲長夀人少登賢書性極孝友有警敏才歷官薊遼總督整飭軍伍請選將用材懷宗召對細陳邊計形勢緩急纍千萬言帝重之書其名於御屏特升兵部尚書為忌者所搆竟置重典帝心旋深悔悼焉龔三級江津人崇禎間嵗薦生平操履清正學務躬行任綏陽教諭日與諸生講論多所成就升安順府推官辭不赴任既歸惟以書史自娛尤嚴於義方之訓二子弱冠掇科承其家學曹恢江津人崇禎壬午舉人任行人司博極羣書究心濂洛之學後罷官里居以積學力行教子弟年八十有三猶披覽不輟與同里龔懋熙俱稱典型學者宗之保寧府漢范目閬中人素有方略知高祖必定天下説帝為募發賨民要與共定三秦後封目為長安建章鄉侯譙隆閬中人為上林令武帝欲廣苑囿隆固諫後遷成臯令洛下閎閬中人隱居洛亭武帝時徴待詔太史改造太初厯嚴遵閬中人為長安縣令治政嚴明擢揚州刺史後當遷吏民遮道止之凡三遷車轍不得行任文公閬中人善天文王莽篡漢乃擕妻子奔於深山後武擔石折文公歎曰西川智士死我其當之乎益部語曰任文公智無雙趙珜閬中人為公車令王莽居攝棄官而歸趙閎閬中人嘗逰長安刺史王尊竒之後仕為涼州刺史卓有能聲楊仁閬中人學韓詩舉孝廉補北宫衛士令條對時政稱旨明帝崩馬后諸子爭入宫仁披甲執戟嚴勒門衛莫敢進者章帝立拜什邡令為政寬惠後辟司徒掾蜀漢周羣閬中人父舒明天文羣少受家學觀氣候言災祥多中舉茂才昭烈署為儒林校尉後欲與曹操爭漢中問羣羣曰當得其地後果如羣言馬參閬中人仕為廣漢太守有治行纍官至尚書僕射馬忠字德言閬中人為牂牁太守桑遠能邇甚垂惠愛官至鎮南大將軍卒後南中為立祠祀唐鮮于仲通南部人與弟叔明皆博學天寶中進士為京兆尹歷御史中丞劒南節度使以忤楊國忠貶官顔真卿志其墓鮮于叔明仲通弟擢明經歷洛陽令商州刺史繼仲通為京兆尹民有前尹赫赫後尹熙熙之號纍遷尚書左僕射德宗時封薊國公以太子太傅致仕卒諡曰襄子升纍官太子詹事李逢劒州人文行俱高尤邃於易宋陳省華閬中人有吏幹初事孟昶為西水尉蜀平歸宋纍官光祿卿拜諫議大夫卒贈太子少師陳堯叟省華長子端拱間進士第一纍官同平章事以右僕射知河陽卒諡文忠堯叟姿貌甚偉奏對明辨入典機密軍馬之籍悉能周記陳堯佐省華次子進士及第官至參知政事同平章事以太子太師致仕卒諡文惠為人寬厚儉約好學不輟自號知餘子所著文集三十餘卷陳堯咨省華季子咸平中進士第一纍官翰林學士後以武信軍節度使知天雄軍卒諡康肅為人以氣節自任工𨽻書善射世號小由基子述古篤學能文纍官至館閣校勘裴莊字端已閬中人孟蜀時以明經登第歸宋疏論邊將無功願申明紀律無使玩弛報可淳化三年召訪邊事稱旨又條列四事政曰去暴征二曰省嚴刑三曰擇吏職四曰敦稼疏入詔令開陳其所宜行莊對甚悉帝嘉納之纍官至西京留守御史臺入判刑部以疾分司西京郊祀改光祿卿求歸上都卒年八十一陳漸堯叟從子少以文學知名太宗時嘗與父堯封同廷試漸中第辭不受願擢其父許之後纍官耀州節度推官有文集十五卷自號金龜子何永閬中人以宋德隆盛記載踈略乃裒次三十卷號閬苑記其後同縣曹無忌乂增二十六卷俱閬中人蒲宗孟南部人曽祖潁士聚書百餘篋以訓子弟宗孟皇祐中進士官尚書左丞後以資政殿大學士知河中卒蒲卣南部人幼開敏登元豐進士歷提舉京湖常平提點潼川刑獄論稅𣙜不便罷之纍官中大夫鮮于侁南部人仲通商孫字子駿端重力學舉進士值行新法侁為利州路判官不請青苖錢蘇軾謂其上不害法中不傷民下不廢親為三難元祐中為諫議大夫建議以富弼配享神宗出為京東轉運使溫公嘆曰此一路福星也後以集賢修撰知陳州卒子綽太學博士馬涓南部人父從政未有子買一妄詢知其父卒於官不克還故鬻之遂遣還不責所值後夢一翁謝曰女見還君隂德也聞之上帝矣令君家富貴涓涓不絶後生子以涓名魁太學鄉薦中元祐狀元上疏忤蔡京罷歸雍孝聞南部人元符末力詆紹聖用事者未幾廷試時相誣以謗毁先烈亟加流竄入元祐黨籍李森巴州人政和中進士高宗時為侍中抗疏劾王黼出知復州黃裳劒州人幼能屬文乾道中進士為嘉王翊善光宗召諭曰王進學皆卿之功裳曰若欲進德修業追蹤古先哲王須尋天下第一人上問為誰以朱熹對官至尚書兼侍讀贈大學士諡忠文裳端純孝犮每講讀隨事納忠所著有春秋講義兼山集子瑾為大宗正張行成字文饒號觀物劒門鄉人與兄少成字寬饒俱登紹興間進士學士黃裳亟稱觀物先生魏了翁亦云吾鄉觀物先生得易數之詳有通變經世述翼鉉通靈等書傳於世陳槩劒州人乾道中進士直諒剛毅以師禮事張南軒問答往來講晣精微且為作潔白堂記皆聖賢服行之訓槩兄栗隱居不仕兄弟皆與黃裳友善名重一時鮮于天一劒州人登嘉定中鄉薦日誦數千言通天文厯數地理方技其學甚博風度粹然制行和雅一時名儒皆推重之蒲叔獻南部人管成都漕民歌之曰運使姓蒲民力可蘇召為宗正卿以韓托胄用事遂請去時論壯之馮友能南部人官至中書門下平章事一月間上封事數十廷諫不避朝野憚之楊巨源昭化人倜儻有大志善騎射監合江倉吳曦反巨源從征擒曦誅之功為第一補承事郎後因安丙爭功殺之事白贈寶謨閣直學士諡忠愍子復正為四川制置使嚴大猷蒼溪人吳曦僭蜀大猷詩云笏未到時難擊泚兵如入手易擒吳後特授隆慶府司理參軍著補闕蜀都賦方山集四卷向佺通江人理宗時有邊警佺多方悍禦卒贈團練使明蔣良輔閬中人洪武間歷官給事中以忤權貴出知羅山後任吉安府知府卓有政聲趙欽洪武間舉人任宿遷教諭考滿之京太祖欲授以重秩對曰臣有過曽取諸生米三升以待急客上笑曰孔子所謂束修非止此也因歎曰取米待急客權也為臣不欺君忠也命吏部秩欽善地就祿待養遷新都教諭造士有聲韓義南部人貢生博學善詩時行人巡茶至縣遂𣙜稅為民害義上疏言本縣無茶行人強𣙜殃民帝嘉其能言除南甸令李延昌南部人洪武中由孝亷任提舉再任開州居官端重以廉儉率民時郡有湖池島嶼縈回往來逰宴供費甚繁延昌一旦毁之逰人遂絶纍官至大名知府文時中南部人舉孝廉任兖州府學教授改四氏學教諭衍聖公孔彥縉受學焉嘗充順天鄉試禮部會試同考官公明能得士時號尋樂先生馮允敬南部人任山東登萊轉運使嘗疏民情十五事上俞其七召還將大用之允敬以親老抗章歸為時推許申克敬昭化人太學生才能卓練宦績著聞歷官河南右布政使何淵巴州人州學舊鮮科目淵首以儒士登孫賢榜筮仕龍泉令政教大行肇修隄防為一方保障以憂歸補贑榆縣值嵗荒多方賑濟全活甚衆陳鳯巴州人任刑部主事纍乞致仕家居怡然自得築室種竹所著有蚓鳴集行世王天爵劒州人洪武中由賢良方正薦至京帝試以欽若吳天賦稱旨授太原知府卓有聲績始終一節時輩推重母祥劒州人洪武中國學生除禮科給事中轉禮部郎中奉命巡視湖廣沙汰官吏復遣鎮守北平升太僕寺少卿從靖難師著功擢本寺卿以勤謹聞徐璋劒州人監生授鎮逺府同知盡心供職纍官河南按察司僉事馬信閬中人永樂中進士任檢討升大理寺副年未四十致仕楊文貞公送之以詩曰誰似翰林馬檢討黑頭苦思戀家山人比之錢若水云劉元凱閬中人由進士授太平令正風俗興學校有馴虎甘露之祥歷户部郎中辭疾家居講學不輟著夢覺稿詩文語録任儀閬中人進士選庶吉士授御史適權貴以內命建佛會于興隆寺一御史乘馬過寺門為宦者所辱儀上疏劾之坐是外補歷遷山西右參政忤逆瑾再謫西安府同知所著有錦屏集十卷王文秀閬中人知鄠縣改良鄉皆著政績當道稱之曰古貌古心不茍同於流俗省耕省斂大有造於疲民後遷鞏昌府通判致政家居足迹不履公庭所著有四書周易講義藏於家袁璿廣元人以貢任雲南縣令惠政恤民民追思之任彬蒼溪人景泰間舉人授雲南石屏知州州俗夷漢雜處乃立社學興州學選生徒之質美者授以經義親督課業次年舉鄉試者二人時有長官司吏目高秉權為頭目刁諒毒死委彬檢勘刁諒送黃白金數百兩拒絶不受明正諒罪人服其廉向翀通江人成化乙未進士擢御史巡按山東秉公考察屬吏感之又詔旨凡鬪毆人者得論減翀言如弟毆兄死姪毆叔母死事關倫理法在無赦餘者亦當追白金一鎰給死者之家遂頒為例家居卒謝遷楊廷和為撰墓志任守中通江人舉孝亷任蕭縣教諭制行不茍好義樂道後四子俱由國學登仕邑人重之向閣翀之孫舉人筮仕鳯縣極事撫綏以忤上官改補石首教諭遷平涼通判督三邊軍餉上籌邊十二䇿遷瀋府長史卒於官初通江茶課纍民閣赴公車建議條上制報可至今鄉中頌德李容巴州人舉孝廉器度嚴正教授鄉閭卓有師範𢎞治初應試禮聞時門生檢討王九思充同考官容堅執不就士論偉之後知狄道以廉直稱任惟賢閬中人進士性耿介學務躬行敦倫睦族歷任三十餘年清白自守家無餘積人多景仰焉李實巴州人𢎞治癸丑進士授翰林檢討升岐府長史動守禮法持正不阿有中官欲侵旁郡葦稅實執不可遂誣實下獄尋得白改趙府長史後致仕進階三品王尊賢閬中人性剛介博學能文嘉靖中貢至太學時帝好方士多災異人莫敢言尊賢撰聖學要義中和衍義上之及諌立東宫忤權臣下獄已而帝閲其書竒之謂輔臣曰布衣敢言當世事者忠臣也釋其獄授程番推官有異政致仕歸貧如韋布著史學辨疑紫霄文集楊勝賢閬中人由監生歷官雲南安寧知州調陜西華州以賢能著升西安知府加參政俸陳宗虞字于詔閬中人進士由郎署出憲閩中時有倭警宗虞著廓清功屢任江浙亦以兵事見竒海疆賴之嘗與銅梁張佳印等結社玉臺續七子之業南充任瀚序其詩又精墨妙喜奬掖後進執經問字者履錯户外後祀鄉賢趙炳然劒州人嘉靖乙未進士歷官兵部尚書慷慨沈毅凡所建白必據事直陳以文學侍從之臣歷漠北海南戎馬艱危者垂二十年加太子太保卒諡恭襄著歷官奏議集若干卷何澄劒州人舉孝廉知永福縣築陂濬渠與民興利除害及解去邑民爭餽金帛一無所受時稱循良順慶府漢龎雄渠縣人永平二年南單于擅興烏桓兵殺遼東守耿夔雄受命討之大破單于遷大鴻臚封都亭侯馮煥渠縣人安帝時幽州刺史秉正嫉邪為姦黨中傷詐作璽書收煥其子緄勸煥上訟果得詐者抵罪會卒帝憫之賜錢十萬官緄郎中馮緄字鴻卿煥之子少學春秋司馬兵法安帝時舉孝廉纍官車騎將軍討長沙武陵蠻有功賜錢十萬不受官至廷尉以剛正忤宦官時稱其公直及卒郡人廟祀之子鸞舉孝亷為郎中馮允緄之弟清白有孝行通尚書善推步纍官至校尉元賀渠縣人第五倫薦為九江郡太守改沛郡所至多有德政遷大司農卿去日吏民涕泣送之陳禪廣安州人字紀山仕郡功曹舉善黜惡邦內畏服舉茂才為漢中太守時土蠻叛聞禪名即降服遷馮翊順帝時官至司𨽻校尉蜀漢譙周廣安州人耽古篤學研精六經仕漢至光祿大夫嘗著仇國論以諷薑維孫秀躬耕桓溫辟之不應譙熙周之仲子舉孝廉為本郡大中正尋除沔陽縣令譙同熙之弟少知名不受州府之聘刺史夀良與東羌校尉何攀貢之三司及大將軍幕府再為尚書郎除無錫令王平字子京渠縣人諸葛亮征隴西以平參軍事屬馬謖謖違亮旨敗於街亭惟平領衆鳴鼓自振張郃疑有伏不敢進纍官至漢中太守封安漢侯勾扶渠縣人忠勇寬厚昭烈時數有戰功爵位亞於王平官至左將軍封宕渠侯晉陳夀字承祚廣安州人少好學師事同郡譙周蜀仕蜀為觀閣令史蜀平司空張華薦夀撰相諸葛亮集奏之除著作郎領本郡中正撰三國志凡六十五篇時人稱其善序事實有良史之才閻纘廣安州人博覽墳典慷慨有大節懷愍太子廢纘輿棺詣闕上書理太子寃子五人皆聞望有才長子亨為遼西太守龔壯渠縣人潔已守道平生重忠孝大節父叔為李特所殺積年不除喪卒為李夀定計殺特及夀立徴壯不就又上封事勸夀稱藩於晉夀不聽辭歸梁侯瑱廣安州人屢平蜀賊後敗侯景歷官司空太尉都督五州鎮湓城以功封零陵郡公諡莊肅趙震西充人任威逺令聽民訟以明倫為重宋何煥西充人初通判真定契丹入冦上疏請申明紀律師退召訪邊事稱旨拜監察御史風節凜然時人稱之號其里曰柏臺李協恭儀隴人雍熙間狀元授梓州刺史何宗元九龍歌孔孟周公道有歸昨夜夢中猶徘徊先生芳躅猶堪追題曰為狀元李協恭作何涉廣安州人讀書畫夜刻苦過目不忘六經百家山經地志醫卜之術無所不通後舉進士知合州遷司户員外郎著有春秋本旨盧江集七十卷雍鈞廣安州人治平中進士授為御史臺主簿時章惇用事朝士盈門鈞獨不往惇怒黜鈞蓬州何麗天廣安州人宦逰中都賦懷親十三篇如毛詩體隨表上進求外補上嘉其志因詔嶺南逺官皆許迎飬彭任嶽池人慶厯中富弼使遼任與偕行道次語弼曰朝廷書詞萬一與口傳異將何以對啓視果不同弼即日還朝更書而去任之力也任又與蘇老泉友善黎錞廣安州人慶厯進士朝議大夫英宗以蜀士為問歐陽修對曰文行蘇洵經術黎錞嘗知眉州蘇軾作逺景樓記稱其簡而文剛而仁明正而不阿久而民益信之王叔簡渠縣人徙居廣安博學能文尤長於詩登進士判潼川痛洗鹽策之弊太常博士葉進常以志行端一才能強敏薦之時稱其有難進易退之節張天珏嶽池人嘗讀書角竹洞元豐間舉進士纍遷諫議大夫蒞官盡職志節甚偉立朝敢諫知無不言彭戢鄰水人元祐中進士為兩浙提舉奉祠以歸嘗畜雙鶴士夫送行詩有扁舟載雙鶴萬卷貯羣書之句馮子修西充人元枯中進士為長安令不附童貫節義凜然鄭修蓬州人年七嵗日誦萬言登元祐進士知梁山州軍祿有餘悉為民代輸未及引年幡然而歸結茅以居扁曰飯牛庵年八十七卒今墓在蓬池雍沿營山人舉進士善吟咏有詩集行世張廷堅廣安州人字才之元祐中進士嘗上言司馬光吕公著之賢又薦蘇軾蘇轍忤執政出為京東轉運判官蔡京欲引為已用廷堅不從京憾之列諸黨籍編管象州卒贈徽猷閣學士諡節愍遊桂廣安州人隆興中進士志慕聖賢學窮性理所著有禮記經學三十一卷行世安堯臣廣安州人宣和初上書論權要補承務郎纍官南平太守王傳通六經詞賦秦蜀之士受業其門者多顯達遊仲鴻廣安州人淳熙中進士知中江制置使金鏜等薦之召入宰相趙汝愚甚重之時光宗以久不視重華宫鴻移汝愚書陳宗社計及孝宗升遐遂贊定大䇿後知嘉定有政績卒諡曰忠安丙廣安州人淳熙進士以資正殿大學士為四川安撫制置使平吳曦之亂進少傅卒贈少師諡忠定著有皛然集遊似仲鴻子嘉定中進士纍官吏部尚書入侍經筵帝問太宗貞觀治效何速如是似推原以對淳祐中為右丞相兼樞密使封南充公卒贈少師諡清獻蒲擇之渠縣人紹定間進士歷禮部尚書淳祜中元人犯蜀以擇之為制置使有却敵功元文如玊郡人少嗜學舉進士官東路太守政平訟簡士民懷之陳繼賢廣安州人登延祐進士判懷逺有廉明公正之稱捐俸鑄祭器置文廟中又置書萬餘卷袁岱渠縣人能文舉進士為蓬州路大寧判官有廣聲明母思義蓬州人洪武初舉人工詩文纍官知府名著一時慶智蓬州人洪武中由太學生任户科給事中卒祀鄉賢楊貴亨營山人洪武間舉賢良方正任部郎後知江西廣信府于紹營山人舉賢良方正任知縣招流移墾荒田政績甚著唐臣營山人由進士歷知府有惠政轉鹽運使未任而卒囊無一錢當道賢之著有拙庵集于禎營山人洪武中由大學生歷御史言時事有直聲後知河南府羅茂英儀隴人洪武中監生歷官清謹聲譽著聞終副使家無餘積范循南充人永樂初進士擢御史升貴州僉事克持憲紀有古人風以劾嬖幸獲罪直聲聞於中外王鐸蓬州人永樂中舉孝廉官萬縣訓導略陽教諭嘗陳保釐十二䇿有補著顔子集并詩稿行於世石泉嶽池人永樂間舉人歷南陽知府時嵗大旱泉披髮跣足拜禱三日大雨如注四野優渥王賓廣安州人永樂戊戌進士以御史建言廷杖罷歸卒祀鄉賢孫梁嘉靖癸卯舉人曽孫德光德完萬厯己卯同榜德完中癸未進士由庶常改給事中建言廷杖張永南充人景泰中進士選翰林庶吉士授禮部主事擢知嚴州府為政嚴明嵗飢不待報請減稅額御史上其狀賜璽書褒美馮孜南充人景泰中進士授户部主事擢知延安府改邵武寬賦役雪寃獄建陽賊嘯聚孜直抵巢穴擒斬賊首民賴以安升湖廣參政以親喪去任歸里廬墓哀毁遂養疾不出士論高之王佩南充人進士性剛毅不隨時俯仰歷湖廣副使卓有風裁及歸飭躬勵行鄉里推重汪洋嶽池人天順中舉人以訓導分較楚闈纍官至雲南同知清戎弭盜均役濬渠升知府吳伯通廣安州人天順中進士歷官按察使學務躬行以道自任督學河南浙江振起士類惓惓以治心養性為訓居家建甘棠書院教授百餘人手録白鹿洞規示之著達意稿近思録學者稱石谷先生向時嶽池人成化中進士歷南京禮部郎中知德安府均里役息爭訟民心感悅致仕歸訓子孫以廉介家範凜然年八十手猶不釋卷向信時之子由進士歷御史上封事數十條巡視通倉議修運河皆有碩畫楊純鄰水人成化中進士任監察御史巡按貴州斷決如流任滿百姓乞留一年上許之民謡曰鄰水楊但願年年巡貴陽貪汚畏法軍民安康歷升陜西副使去之日黎獠遮道涕泣攀留馬金西充人由進士纍官至浙江布政使所至有惠政民為祠祀弟籥由進士厯官參政併有聲譽於時馬廷用號紫崖西充人成化中進士歷官侍讀學士以經學推重天下所著文集數十卷學者宗之李陽春渠縣人𢎞治中進士任行人奉使各藩餽遺一無所受居諫議彈劾不避權要以太常少卿致仕歸恂恂如書生鄉人仰之談倫鄰水人𢎞治中進士任潮州府知府築海口隄數千丈民居獲安砌廣信橋往來便之王昂廣安州人𢎞治中進士官給事中歷陜西副使彈劾不避權貴致仕歸敦行古道表正鄉閭楊一鈞鄰水人𢎞治間進士官漢中知府禦侮救荒民賴以安升浙江副使漢人為祀名宦柳稷南充人𢎞治中進士著有封建論疾作曰吾嘗夢作志伊學顔論其能久乎果卒於京毋恩蓬州人𢎞治中進士知臨海縣治行卓然有聲升湖廣道御史著有詩集及家禮考韓士英南充人正德中進士授主事𣙜稅江西時宸濠不軌英持正不與通及守嶽陽弭盜賑飢屢有異政歷升都御史巡撫鳯陽晉大司徒改司馬滌􅗜減租選將練卒赫然有聲江萬實大竹人正德初進士任監察御史巡按江西抗疏言事動關國體時討寧庶人及平華林巨寇皆與有功稱名御史毋德純南充人由進士歷大理寺正以議禮獲譴尋復職升尚寶卿吏部尚書楊博疏言德純爭論國事力劾權姦衡困既深緩急可用數語可見其生平云張芊郡人正德中進士為郎中𣙜稅浙江以廉名擢漢中知府持法公平不逐時好所至有遺愛人爭傳誦韓孜南充人登鄉薦後築室青茅山沈酣典籍寒暑不輟任司務奉命賑秦民頒賚有法恩無不遍後遷員外石天柱嶽池人正德戊辰進士歷都給事中立朝敢言武宗欲幸宣府天柱刺血書疏以進遂止兵部尚書彭澤被誣當刑天柱陳澤征伐功忤旨外調嘉靖初詔復前職尋升大理寺丞卒於官所著有秀峯集及奏稿馮馴嶽池人正德中進士授户部主事會乾清宫災疏弭變七事言甚懇切出守興化除害民吏役素號二虎三彪者政治肅然民謠曰馮太守來何遲書吏瘠百姓肥銓部考最榜天下第一官至江西布政使司余正已嶽池人授清豐教諭博聞強記明數學造木牛流馬屢試輒驗定厯法三上疏糾占候之失阻於權右齎志以殁識者哀之楊端嶽池人正德中進士以行人封楚藩却其餽擢御史巡北城清戎除盜釐姦剔􅗜議大禮謫隨州判官卒於家隆慶初贈少卿張大用嶽池人嘉靖中進士性英邁以部屬𣙜稅城蕪湖報羡以千計遷陜西臬憲奉敕修長建鎮朔樓工成升副使管鹽法有太監敗鹽政參劾之一道肅然張郁蓬州人由太學生歷武昌鶴慶推官太僕寺正所至有聲子相由進士知醴泉慈溪以廉能名王竒嗣蓬州人嘉靖甲子舉人任貴州思南推官升知州遂乞歸不持一物卒之日語其子曰我生七十三平生不愧天在家不説事做官不要錢子孫皆如此福澤永綿綿諸子鬻産以葬亦可稱清白吏矣張鑑南充人嘉靖中進士初授會稽令均田畝豪右侵占民田悉清還之流移復業者五千家行取南御史出守建寧備兵臨清尋升山西按察使後巡撫山東行丈量墾田保甲弭盜法天下則之引疾歸用薦起總督糧儲八年宿蠧盡革卒時囊無一金人比之趙清獻云所著有皇極經世衍義賦役法屯操奏案東安圖議石州奏疏江泉别集中丞遺稿行於世任瀚南充人嘉靖己丑進士對䇿稱旨由庶吉士歷侍經筵寵眷甚渥為當國者所忌乞休年甫四十絶迹公庭工於文尤善自祕海內慕其文者接踵於路家居五十餘年以疾卒所著述甚多馮薦南充人登進士由榖城令擢御史時世宗好方技疏五上皆嘉納歷按山東湖廣兩主試事公明有聲以敢言忤權貴遷知府遂引疾歸捐俸置業以貽宗族姻戚之貧乏者士林重之王遵南充人嘉靖乙未進士任東陽縣令以寬平為理邑有礦徒橫肆遵馳尺一諭之皆帖服後為刑部郎有大獄株連數百人公疏枉滌滯全活甚衆纍官布政使閩省備倭尤為邊防所賴焉王廷南充人號南岷嘉靖中進士由户部主事改御史彈劾權忤謫州倅直聲籍籍升蘇州知府勤明廉介吳人祠祀之纍官河道總督轉翰籌畫咸當機宜又奏平倭功乞歸年登八十嘗被存問卒贈少保諡恭節所著有奏議詩文拊缶集兩漢書抄等書嚴敬營山人質直好義行喪禮斥浮屠人皆效法楊沂西充人嘉靖戊午解元登進士文章行誼至今傳誦袁諫西充人由進士歷官陜西神木兵備道卓有政聲後里居賑荒造橋周寒士恤孤寡迄今口碑存焉楊璽西充人家貧寡合力學自持後為湘隂令以直道去任民有去思碑李竹李益之叔生而神異一目數行俱下精天文數學不為舉子業家人迫之入場草畢不謄真監臨重其名命房官謄之既中式有草幅偏能中李竹藻文何自落孫山之句性嗜酒不宦不娶著有發明天文正謬等書李益南充人由舉人令寧鄉值清丈之役實心平賦豪右不悅尋改定邊捐俸創學士風丕變又嘗築石洞哨以禦寇決黑龍江灌溉瘠土全活者萬家所至皆祠祀之李若梓益之孫性孝友仕襄城令郡有麵油航稅為諸商病悉罷之三年調洪洞襄民赴闕上疏懇留奉旨以民情思戀著照舊供職旨下已到洪洞數月矣山西撫按亦據民詞留之其略云襄城洪洞均為赤子奪此還彼若洪洞何後升陜西兵備道時流寇猖獗斬渠魁神一元擒普天飛以勞瘁致病遷授河南布政使司卒崇祀鄉賢文衡南充人由進士任雲南僉事歷官以冰蘗著文章行誼卓有古風王續之南充人廷孫嘉靖壬戌進士歷兩浙憲副雲南大參江西布政司忠誠天賦敡歷有聲王度南充人精易學後學宗焉仕御史臺院中皆以老成推重之劉尚綸大竹人由嵗貢任順天推官時有疑獄久不能決尚綸一加推問即得其情人稱為神徐萬璧大竹人嘉靖癸未進士歷官陜西兵憲上籌邊議邊境賴以保障有罪囚不應死與御史爭之不得投劾歸養邑往有協濟萬縣守備東鄉諸役民不堪命萬璧力言於當路罷之里民至今頌焉所著有縣志族譜五谷集諸書王袞廣安州人性孝友登嘉靖中進士授行人擢御史執法不阿抗疏危言切中時事如辨天地合祭條馬政四事荒政十七事皆其大者巡按湖廣貪墨皆望風解綬去時人稱名御史云王柄渠縣人嘉靖丙戌進士任主事𣙜稅不私一物守嶽州有築隄功遷雲南副使德威丕著蠻酋納款乞休家居課子睦族鄉里翕然化之王嗣文大竹人由嵗貢仕至山東副使時齊藩事多不法嗣文抗直不阿力為裁抑後皆畏憚無敢干紀者李應和大竹人由進士任給事中遷參議亷介自守以德化民有侵官地若干畝者有司漁獵其利置不問應和清出還官計畝徴稅官民兩便人為立碑頌德焉李初元營山人嘉靖甲辰進士任御史性剛介出按河南豪右聞風斂迹卒於汴署啓其篋惟遺金五錢布襪一雙同官嗟歎唐寅營山人以貢生任華隂令清操自勵歸不治田産惟書史自娛衣布食蔬人所不堪而寅處之淡如也楊侃營山人以嵗貢司訓於秦登陜西乙酉鄉薦任知縣終雲南曲靖知府質亮端方所至有聲處鄉黨恂恂與物無忤李籌營山人少有文行任褒城令獨著清操恤民隱革弊政舉循良第一龔一麟營山人性資端謹文學博綜歷仕二十餘年所在皆有恩澤致仕歸著有南雍集陳以勤南充人由進士選翰林庶吉士同新鄭高拱侍講穆宗潛邸拱去後獨侍九年啓沃最多會儲位不安力為保護功著翊翼穆宗初年手詔以禮卿入內閣管樞務於時巖廊畫一海宇和寧以勤之功居多焉家居十七年卒於里第穆宗震悼輟朝賜祭葬如例諡文端初公遲回宦轍不屑投足幸門或笑其迂公歎曰士君子立身行已當自迂始作法於迂其弊猶通作法於通則孔光張禹之徒且抗旌攘臂而前矣故迄今有談先輩典型者必以以勤為歸陳于陛以勤子由進士入中祕至參大政是時帝方深居羣臣希進見于陛心憂之疏六事以獻悉採其意行之言官被斥者南北臺省幾空于陛亟疏其無罪皆報聞又請纂修五史備一代紀載既得請日夜編摩鈎校不遺餘力竟以此憊病劇而終天子為哀悼輟朝賜諭祭命皇長子往賻之禮部郎一人持節護喪歸第贈少保諡文憲黃輝南充人字平倩號慎軒弱冠舉省元由進士選入中祕光宗在東宫輝為講讀官啓沃調護甚見親禮歷大司成後引疾歸家居清素一如寒士四十喪偶終不再娶文名動天下尤精翰墨海內多寶之著有鐵庵集八十卷平倩逸稿三十六卷王德完廣安州人任兵科都給事中神宗欲易東宫抗疏直諫下詔獄究問主使只供太祖高皇帝廷杖一百為民光宗初論保國本功第一升左僉都御史歷户部尚書卒賜贈廕祭葬焉鄭卿西充人萬厯丁酉舉人博極羣書屢上春官不第選金堂教諭未任卒所著有博雅篇百四十卷羅玊西充人為黔滇御史謫發姦回籍籍有聲李兆字見可西充人由進士崇禎間三典銓選生平剛正不阿權貴人無敢干以私者纍官至右通政卒敘州府唐黎幹戎州人善星緯喜談辨玄宗時待詔翰林擢諫議大夫遷京兆尹宋丁處榮富順人咸平間王均叛圍富順守佐俱逃處榮具牛酒宴均於譙樓擒斬之擢為州長史李英恪富順人與丁處榮同誅王均擢知富順監其子見嘗讀書於神龜山著易樞牟蓋長寧人嘉祐初獠人謀內寇蓋引兵趨之捕斬七千餘級鈴轄司上聞詔賜錢鈔三十萬并錦袍銀帶尋為本州刺史廖翰宜賓人少以孝義聞時有蠻叛翰與戰於馬鳴溪敗陷溪水中流數里不沒時皆異之廖琮翰之子嘉祐二年進士歷官至朝議大夫年未五十即致仕歸里教授鄉閭多所成就縉紳高之廖有衡字致平琮之子進士及第官至朝議大夫家有荔枝二株實緑而味甘黃庭堅與衡友善號緑荔枝廖氏後人因而稱之以别其族李文淵宜賓人治平初進士纍官至朝議大夫時蔡京竒其才欲招致之文淵乃謝病還鄉程驤富順人紹興間進士知監事政平訟理有詩云吏散庭空無一事雲來雨過只催詩許志寧南溪人紹興中進士居鄉多善行邑人敬而化之嘗割地為學宫見宋似孫碑記史子申南溪人博學登開禧初進士南溪登第由子申始歷官提點刑獄張彬郡人以上舍登第留張浚募下富平之役彬以十二事諫浚不從去通判瀘州曲端之死彬以書與浚明端非叛者程公許郡人少孝友與兄公説公碩俱登嘉定進士纍官刑部尚書授寶章閣學士知隆興府進龍圖閣學士卒贈宣奉大夫所著有塵缶集內外制奏議行於世明熊宗魯南溪人貢生洪武初授為北平參議永樂中遷升交址參政歷官數載卓有政聲周均德郡人洪武中以聰明正直舉授工部右侍郎安濟土人洪武初湯和克蜀首率衆歸附授土知府賜詔褒嘉子孫世襲安本濟之子洪武間襲土知府建公署改學校永樂中賜誥褒封鮮原泥溪人永樂初以國子生授階州知州勸民勤農務善政甚多遷山東轉運同知郭廉富順人永樂初進士歷尚書疏諫北征詞甚剴切聲聞中外後歸鄉里有中貴至邑誅求太甚公束帶見之既退中貴曰郭公在此遂去何永川郡人幼習書算大司徒夏原吉見而器重之薦為本部主事歷任襄陽九江知府李志義宜賓人進士任刑部郎中忠厚廉平僚屬推重李從智宜賓人進士永樂中任大理寺評事讞獄無寃升知蘇州府以廉能著名後謝病歸屢徴不起梁承宗宜賓人永樂中進士歷山東監察御史秉公執法親老乞歸養詔許之牟倫宜賓人永樂中進士任監察御史直言抗疏敘南衛軍每苦逺調奏免之立鄉社以作養後學郡人咸敬慕焉周儒南溪人舉人歷官同知性質朴不事靡華聘黃氏女貧且陋人謂曰汝巨族高才何不别娶儒應之曰此天命也棄之不祥竟納之李永通長寧人正統中進士官至侍讀學士經筵進講多所啓沃文章羽翼六經治鄭氏三禮著為疏傳輔導憲宗勳勞益懋周洪謨長寧人登正統間進士官翰林即勸勤經筵以明聖學謹內外以敦政本成化初荆襄流民為亂洪謨建議設州縣以撫治之遂開設鄖陽府纍升禮部侍郎正璿璣玉衡蔡傳之訛改明七政尋掌邦禮凡朝廷制作禮儀如祧廟祔廟文議俱經裁酌遂為定制卒諡文安著四書五經辦疑及南臯子箐齋集李本富順人正統中進士居內翰長於撰著歷官禮部尚書時多建明朝野推重胡深富順人景泰中進士任户部主事抗直不阿忤權貴謫戍塞外後公論既定詔復其官安洪景泰間巡撫某以邊事寧息洪與有功疏聞於朝上給賜官帶襲授祖職侯旺長寧人天順初中鄉試居家時都蠻猖獗攻圍城邑有謀遷避者旺移書鹽水壩官軍示以死守城賴以全為息縣令俗好訟慣以墜胎誣人旺按治如律俗因以變乞歸詩曰迂叟襟懷惟典籍兒孫事業在綱常正德間知縣婁懌立祠以祀周汝瑞洪謨長子成化間舉人授户部司務轉中府經歷逆瑾伏誅條上五事俱見嘉納秩滿升銅仁知府至則興學撫叛漢夷懷服升河運使進階參政謝病歸鄉與弟汝靖徜徉山水人擬之二蘇云吳道宏宜賓人進士天順中歷任南京大理寺卿居諫垣時上言星變詞甚切總制三邊招撫流移民賴以安范珠字介庵成化丙辰進士任浙江道御史嘉靖初議大禮諸臣廷諫欲刑以錫蛇珠解衣裸體自糾錫蛇伏諫曰陛下若納臣言則天下治不納臣言則天下亂上怒欲加刑忽風雨暴至雷擊錫蛇獲免上嘉其直賜聨曰柏府霜操真御史黃堂直正古諸侯又賜金瓜一對稱為鐵面御史歸里卒賜祭周正蕃𢎞治間中鄉試知江西建昌縣舊有遺糧四百石正蕃詳免之民德焉適南部催糧者至正蕃拂其覬望乃以劣調漢川縣縣例糧萬石徵銀萬兩小民不勝逋負正蕃具奏奉旨著直指議覆乃每石減銀二錢又奏革劉家堡捕盜通判添設主簿仍申復陽羅驛故道以分省夫馬請菜湖嵗收官銀以備賑濟凡事擔當敢為徑節不撓類如此晏鐸字振之以庶吉士改御史按直𨽻山東所至有聲以言事謫上高典史興學校抑豪姦鄰境寇亂官兵不能討鐸承檄捕之歸所掠於民境內以安增注孝經小學周易參同契解隂符經注青雲集等書劉景寅長寧人𢎞治癸丑進士為户部主事蒞政廉謹尋進員外郎逆瑾招致不從勒為民瑾誅升陜西參政會武宗北狩諸吏皆趨行在景寅坐鎮城中日理煩劇因卒於官所著有忠恕軒集若干卷何振慶符人進士歷官考功郎中勤慎威嚴不徇權勢以疾乞歸纍徵不起喻良高縣人進士有文學為當時所宗歷官雲南按察使表率百僚輿論攸屬劉浣珙縣人進士任監察御史奉敕征蠻有竒功民建祠祀之李傅珙縣人𢎞治乙未進士知襄陽府時流賊鄢本恕湖賊楊廣富等寇諸縣督兵悉擒捕尋以外艱歸後升巡海副使剿平海寇吏部奏天下卓異第一轉貴州參政奉命撫勘宣慰事至誠開導宣慰父子感服署布政篆年餘致政歸代者查羡金七百餘送至宅傳笑曰義可取則取之矣固却不受其清介類如此陳輔宜賓人𢎞治壬戍進士歷刑部郎中剛介不屈執法明允以勘戚畹事忤旨就逮後帝知其直後升荆襄兵備乞休歸田德望為朝野所重陳準南溪人𢎞治中舉人歷官通政致任歸環堵蕭然以易學授徒出其門者皆為名宦年八十餘卒劉景宇南溪人正德卒未進士任御史因疏薦王守仁不報遂謝病桂蕚以書招之不應嘗手書范滂傳揭於庭日夕三復每嵗終將諸當道餽遺悉歸有司作書答謝周惠宜賓人正德丁丑進士嘉靖初任刑曹決獄明允歷官滇憲溫厚淳謹政績著聞以終養歸鄉評推重卞偉宜賓人嘉靖乙丑進士任御史巡按陜西豪右斂手擢雲南副使威攝土酋事繼母克盡孝養卒年八十李文續字紹庭宜賓人嘉靖己丑進士以監察御史巡按湖廣歷升河南布政司考天下清官第一郝維嶽郡人嘉靖己丑進士纍官至福建按察使招平劇盜擢雲南布政使民有青天之頌居鄉謙讓家教端嚴終都御史巡撫雲南熊過字南沙富順人嘉靖癸未進士授翰林庶吉士官至禮部郎中著周易象旨春秋明志録行於世甘為霖富順人嘉靖癸未進士歷官至少保工部尚書學問淵深孝友篤至自治郡陟孤卿公廉自矢權貴莫撓太廟建立議度材盡制省費世宗甚眷注後陳情養母歸里人重其行誼路顒富順人嘉靖癸未進士官户部侍郎時西山昌平一帶民苦賊寇顒奉敕賑濟撫綏流移得所總督漕運聲稱益隆解歸田宅一仍其舊鄉黨高之李方至富順人嘉靖中進士歷工部郎中以抗疏忤權要棄官歸家居幾二十年一經庭訓子長春官至尚書方至猶及見之人以為盛德之報李長春字棠軒方至之子隆慶戊辰進士歷官至禮部尚書聰潁博洽有詩文行世熊師旦字于侯富順人萬厯丙辰進士博洽經史尤工古文詞著晉言全刻伍文煥字象明郡人由進士歷户科給事中兼六科事萬歷間帝欲易儲同鄒元標纍疏力爭被謫光宗即位加太僕卿起用尋卒樊一蘅字杜臯宜賓人登萬厯己未進士精史學及周程張邵之書筮仕襄陽令有聲召入銓部人不敢干以私後為寧夏巡撫歸里值蜀亂諸鎮將跋扈一蘅正色責之咸懾服年七十八卒王常平夷司人由進士歷參政幼孤苦心力學及貴分俸惠族在粵平獠賊功最著熊應昌郡人性正直博學多才後膺嵗薦未仕而卒人咸惜之阮振中字紹一富順人父良選歷官秦楚有清名天啓辛酉振中舉孝廉崇禎甲戌知夀昌縣剖疑獄創堅城擒靛寇以廉能舉卓異夀昌人祠祀之辛巳擢江西道御史奏免湖州欠絹差視河東乞終養欽假省親杜門終老弟捷中死寇難宋世第字南仍富順人明經天啓辛酉奢崇明叛世第寓建武賊將至建時安邊郡丞出署他邑篆本所千户知廳帑尚貯銀數千兩欲借以給兵為守城計守者難之世第矯邊丞檄發帑金給兵城乃獲全丞至嘉其績具狀聞於撫軍朱燮元燮元訝曰此有用才也馳書徵請軍門贊畫機宜後仕至雲南彌勒知州多惠政丁內艱歸里年七十八卒夔州府漢扶嘉雲陽人其母於湯溪水側夢龍而生嘉長占吉凶巧發竒中高祖為漢王時與嘉相遇嘉勸定三秦高祖以嘉志在扶翼賜姓扶氏官至廷尉食邑朐䏰梁徐世譜奉節人勇力善水戰元帝時領水軍所造器械隨機損益妙思出人唐李逺郡人守承古泰和初進士大中間歷建州刺史令狐綯薦逺為杭州宣宗曰朕聞逺有詩云長日惟消一局棋豈可以臨郡乎綯曰詩人之言非有實也仍薦逺廉察可任乃俞之後視逺到郡謝上表左右曰不足煩聖慮也宣宗曰逺到郡無非時表章止有此謝上表安知不有情懇乎吾不敢忽也仕終御史中丞宋宗晏郡人為都押衙乾德中寇犯夔境晏捍禦甚力民賴以安以功補右班殿直達州招安巡檢後轉西頭供奉官龍景昭奉節人少有武勇初仕蜀為施州刺史歸宋改右千牛衛將軍初景昭弟處塘等四人隨孟昶入朝卒於道太祖憫之以其子補殿直廖彥正郡人為南平司録參軍徽宗求直言彥正上封事論時政缺失由是被召會修河除都水使中人有與爭者彥正欲力正其罪遂被斥後與黨籍李裳奉節人弟襲子公京公奕孫茂相繼登進士皆為正士時號五桂詹邈建始人元祐二年及第有文名士林推重姚邦基大寧人政和進士為尉氏令劉豫僭號遂匿山林聚徒以養豫誅朝廷尋訪隱逸邦基與焉高宗嘉之授以京秩袁師奭雲陽人紹興間進士第父孝純兄師允師文與師奭四人相繼登科鄉人榮之明陳思聰奉節人洪武間福建副使清謹有吏才冉通萬縣人洪武中進士任兵科都給事中面折廷諍直聲動天下雖在竄逐讀書不輟馬克用土人明初為長官善撫夷落人心歸附子孫世襲陳世顯土人洪武間為宣撫同知撫夷有功子孫世襲冉文彬土人洪武間為宣撫僉事撫字有方士民悅服子孫世襲雷震新寧人永樂戊子舉人任襄陽學諭上疏諫英宗親征不報及復辟録言官升禮部主事尋以直言忤旨謫戍遼東卒王思睿巫山人宣德間任吏部文選主事剛正無私朝士推服陳恭奉節人正統間知安慶明敏鯁介時稱循吏柳英字子鍾巫山人歷光祿卿剛方峭直不阿權勢黃以春雲陽人正統進士歷郎中守正不阿時稱長者周泰新寧人天泰州同知間任龍陽知縣廉謹有聲升稱清官第一致政歸行李蕭然汪瀚開縣人成化中進士知修武蒞政廉勤嵗旱設賑民賴全活以憂去父老泣留歷官太僕寺丞嚴琥開縣人成化末任高州府同知時石城信宜二縣大飢民多流徙琥捐俸賑濟化州吳州等處嵗辦礦鐵民苦賠補無敢言者琥力請停止民歌曰活我嚴父生我慈母汪安宅開縣人讀書好古不求聞達鄢藍賊攻城安宅率鄉兵禦之有别室在城外賊欲乘以攻城安宅發火箭焚其室連燒賊營圍遂解時稱為汪義士王彥竒雲陽人𢎞治中進士任知府端士習新橋梁士民德之纍官至都御史熊希古新寧人𢎞治間知天台縣歷官刑部員外以忤逆瑾謫官尋復員外升郎中讞斷明允擢守臨江築城弭盜卓有聲稱後升雲南副使朱鵬新寧人嘗省親於楚之益陽過洞庭舟覆鵬獨抱一木經晝夜不死人以為孝所至後任蒲圻知縣多善績尤嗜詩有集藏於家趙鏊新寧人正德末任大理寺寺副嘗決大獄持身清介不避權貴罷歸建高柳書齋吟詠不絶牟秉元奉節人居家孝友鄉人化之任廣東南雄府照磨勤廉供職當道旌異黃封雲陽人嘉靖中進士任兵部郎中端方有守王其高雲陽人寡言笑慎取與絶迹公門潛心儒業督學額其門曰學正行優郎文林萬縣人任經厯器度渾厚家甚貧人有餽金者却不受傅時望字仲瞻萬縣人隆慶戊辰進士授桂林知府禦倭寇嫻方略桂人至今稱焉邵仲祿字孟康奉節人登隆慶二年進士補江山令治行卓異召居銓部歷容臺京兆俱被眷倚萬厯中任江西巡撫卒贈少司馬所著有四書易經講意鄉範諸書鄧漢臣萬縣人拔貢生萬歷十七年任無錫縣令淡泊自甘百姓號為鄧菜羮劉五韓萬縣人生時母夢飛鳯入懷遂字夢鳯體不勝衣言若不出諸口萬厯間進士任江南無錫縣令以廉直著于繼勳奉節人少孤事母至孝身長七尺鷙勇絶倫治春秋曉暢兵機郡守辟居帳下遇土酋相攻輒遣慰撫萬厯中檄調征九絲城松潘等處斬獲甚衆以功升郴桂守備擢鄖陽都司僉事屢有戰功引疾乞歸江鳴臯奉節人精於易學者宗之萬歷中授臨戎令廉介有風裁沈鴻儒萬縣人家貧父早亡撫弟妹教育婚嫁中崇禎丁卯舉人歷任南京户部郎中龍安府唐李白字太白唐宗室也其父流寓彰明生白母娠時夢長庚星入懷故以白名才氣逸邁縱橫仕俠賀之章薦之於明皇召入試清平調歎曰仙才也坐以七寶牀手調羮賜之天寶末嘗推薦郭子儀果為中興功首後白坐永王璘事長流夜郎久之會赦得還終於宣城宋張安行彰明人登崇寧三年進士歷官朝議大夫賜緋魚為人慷慨有學為時推重文日新彰明人乾道四年進士廉惠仁慈治民以信仕終廉訪使朝廷延訪耆舊論治道日新與焉張珖淳熙中湖北副漕刺劒州受民多善政築隄捍水患博學工書題白鹽赤甲等字于夔峽雍繁孫平武人紹定中進士以文學名一時明王溥成化中進士任完縣令蒞政慈祥每謁祭文廟進諸生究經傳大指士人化之升禮部主事衛信江油人舉孝廉後守荆州秩滿當遷民乞留之歷九載政澤淪洽一時推重為賢守焉徐忠江油人進士任户部主事淡于仕進二年遂乞歸里居敦行古道言笑不茍為時所重王盤舉人授漢川令復補光化以廉平蒞政兩邑民俱建祠祀之張哲石泉人監生任南康節推愷悌勤慎惠愛及人見南康名宦南東平武人選貢厯公安醴泉二邑令政尚寬平歸置義冢葬枯骨夀八十卒孫逢吉江油人監生為兩當令建學興農士民感德考滿歸田訓子孫睦族黨年九十有三談笑而終豐爵疊漢千户深曉韜略遇敵果敢歷升逰擊將軍易文衛松潘衛學諸生少逰學內江得所師遂挈家就居不返者數年多識治體善論邊務所著有籌邊䇿寧逺府明吳朝元越巂衛人以明經授鳯陽府照磨性剛斷決事明允太守嘉其才委攝虹縣能撫字其民虹人德之歸里引掖後進喜施豫周人困乏為衛中之典型云雅州府漢衛繼名山人父為縣功曹縣長張君無子撫繼為嗣敏達博學歷仕清顯後復姓衛氏遷奉車都尉忠誠為衆所推郭德明清溪人師事陳留王孝逸通知文史漢王諒反遣將綦良攻黎州德明年十八募士軍五千號令嚴整倍道擊賊破之樊敏字叔達蘆山人總角好學治穀梁春秋察孝廉除郎官遷宕渠令遭母憂去光和末重舉孝廉辭不就後因聘為治中諸部從事彈凶糾貪務鋤民穢州里翕然號曰吏師以助義都尉養疾閭里年八十有四卒五代王承肇郡人蜀王宗侃之子母崔氏夢周公山神降祥遂生承肇後一僧見曰周公山靈氣減半乃孕於此子耶後節制洋州為行軍司馬宋景自芳郡人少負勇略破賊有功曹克明郡人光實從子喜兵法善騎射屢平賊寇以功遷知鼎州卒嘉賜推誠宣順功臣楊巽蘆山人嗜學工文大觀中成進士張巽之郡人寶祐二年進士以文行著張誾字子儀州人知睂州有惠政妻黃氏黃庭菜堅族姑子履娶史琰女才而賢即庭堅緑贊所云史君炎玉也次子祉字介卿擢進士第調青神尉時庭堅居涪州溯流往見每器重之云元趙榮祖名山人任江源令子賢任嚴道尹時人語曰名邑趙氏流芳大同父子相繼五受朝封深入吐蕃屢建竒功食祿獲賞垂世無窮明王彬郡人監生厯會通知縣為政公平有賢能聲許恩郡人正德庚午舉人嘗奏請復茶課以濟邊用裁冗員以省民財迄今公私利之纍調宜良令勸農養老捐俸施棺士民頌焉李應元郡人舉孝廉初知寧羌州捐俸濟荒建倉儲榖擢真定同知著蒙山堂稿六堂文集張經濟郡人知澧陵蘆溪以廉謹名陳應禎字國啓名山人有孝行嘉靖中舉順天鄉試任教諭升鎮逺知縣未幾解組行李蕭然葉桂章江西桂溪籍名山人幼穎敏善詞章正德間領鄉薦第一登舒芬榜進士纍官翰林侍講卒祀鄉賢晏朝寅名山人萬厯中進士歷官知府卒祀鄉賢張裴蘆山人舉孝廉歷官監察御史勤慎端慤歷江南布政使司四川通志卷八
