body:
  text: 四川通志卷九上人物直𨽻嘉定州雍正十二年升為府漢杜撫犍為人受業於薛漢定韓詩章句後居鄉里教授逺近宗之時馮良為尉恥迎督郵因毁車裂冠遁至犍為從撫受業周循犍為人教授生徒時新都楊統從循習業統子厚亦受業於循父子俱得循傳顯名於世費貽字奉君犍為人公孫述據蜀貽漆身為癩佯狂以避之與任永馬信同辭徵聘蜀平擢合浦太守任永字君業犍為人好學博古公孫述纍徵待以高位託青盲不至及聞述敗則曰世適平目即清光武聞而徵之會病卒馬信犍為人不仕公孫述與任永並託青盲及述敗乃盥洗更視光武召之亦會疾卒楊渙字孟義犍為人見耆舊傳子文方冀州刺史孫準字伯伾官太守太尉李固舉之楊宗字德仲夾江人為益州太守蜀漢伍梁字德山犍為人以節操稱為丞相亮功曹遷五官中郎將諫議大夫與秦宓杜微齊名程瓊犍為人官尚書與巴郡文立交後晉武帝聞其名以問立對曰臣知其人但年垂八十秉性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣費詩字公舉犍為人劉璋時為綿竹令先主平蜀以詩為督軍從事出為牂牁郡太守先主為漢中王遣詩拜關公為前將軍公聞黃忠領後將軍怒曰丈夫終不與老軍同列不拜詩謂公曰立王業者所用非一昔蕭曹與高祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怒今漢中王以一時之功隆崇於漢升然意之輕重寧當與君侯齊乎且王與君侯譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下為意也僕一介之使銜命以來君侯不受拜如是便還但惜此舉動恐有後悔耳公大感悟遂即拜受後羣議推漢中王上尊號詩上疏曰陛下憤曹氏篡竊糾合士衆以討賊今大敵未克而先自立恐人心疑惑昔高祖與楚約先入關者王及子嬰就降尚懷推讓今不法高祖臣愚不為陛下取也由是左遷永昌從事後主時纍官諫議大夫楊洪犍為人為益州從事昭烈攻漢中不克急議發益州兵孔明以問洪洪曰漢中益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也發兵何疑亮從之後為蜀郡太守事母至孝清忠端亮治國如家張翼犍為人建興十一年南夷劉胄反翼為庲降都督性剛猛不得蠻夷心將舉兵討胄胄未破翼被徵當還而以馬忠代翼或勸翼宜便馳騎即罪翼曰不然吾以蠻夷蠢動不稱職故還耳然代人未到吾方臨戰場當運糧積穀為滅賊之資豈可以黜退之故而廢公家之事乎於是統攝不懈代到乃發忠因其資以殄胄丞相亮聞而嘉之後追論其功賜翼爵關內侯晉費立字建熙州人學養沖邃察孝亷王國中尉王年少好遊觀立常正色匡諌及上疏風喻辭義尤剴切合規針之體出為成都令縣名難治立蒞之垂績以性公亮入為州大中正纍厯州郡封關內侯永嘉六年與子并歿於邊寇楊彭字敬宗弟逵字訓宗犍為人各以德行稱同察孝亷彭比蘇令甘露降其縣逵滇池令殊俗懷其德張徵字建興犍為人翼子篤志好學官至廣漢太守費緝字文平犍為人清檢有治幹舉秀才纍官至涪陵太守後遷譙內史張統犍為人仕苻秦為羑水令長安失守吕光自龜茲還涼州刺史梁熙謀閉境拒之未決統曰今關中大亂京師存亡不可知吕光之來其志難測將軍世受大恩忠誠夙著立勳王室宜在今日熙竟不能用統言後光果殺熙據涼州唐仲子陵峩眉人讀書峩山好古學舉賢良方正擢太常博士厯員外郎及卒惟圖書斗酒而已吳審字叔禮犍為人舉孝亷有文行大中六年客京兆卒時人哀之宋何友諒州人知忠州作白居易年譜與陳傳良所作各有發明田錫字表聖洪雅人太平興國中進士纍官諫議大夫奏議剴切詳明太宗稱為汲黯及卒遺表奏仁宗謂宜慈儉守位清淨化人居安思危在治思亂仁宗惻然謂宰相李沆曰田錫直臣也贈工部侍郎録其二子並為大理評事錫耿介寡合慕魏徵李絳之為人嘗曰吾立朝以來章奏五十有二皆諌臣任職之常言茍獲從之幸也豈可藏之以賣直乎遂皆焚之孫拱辰字德甫洪雅人踐行不越矩度善屬文詩尤清麗遺稿十五卷王澤字忠民洪雅人為雙流尉邑方改創澤贊佐有條理衆感之為立生祠升永康主簿百姓挽留咸稱為古遺愛云王夢易字潛夫榮縣人纍世同居家號義門父伯琦因州有鹽井籍民煎輸惟有祿家得免琦請於州均之為官戶所誣齎恨以歿夢易登皇祐中進士調綿州法曹掾官至太常博士欲成父志言於三司得上聞還籍者二百家蠲歲額三十萬致仕歸里築石於雙溪之上名曰歸來亭李觀字用賓夾江人崇寧中進士初為虢戶掾民犯法當杖守欲重其罪觀執不可知岐山縣俗健訟持吏短長前令多不終觀撫綏善良豪猾無所貸俗遂變權成都運判時公私告匱鎮以清靜歲飢東北流民入蜀觀令散居寺觀賑以官廩活人甚多纍官恭知政事卒諡曰允敏聶英顯謨閣學士直聲懿行朝野重之朝武字于飛夾江人敷文閣直學士精於詞翰著有北山集楊嶽夾江人任榮州刺史以學行為一代鴻儒文敦詩夾江人年二十一薦於鄉士友交賀敦詩曰士當以踐履為要今徒事空言規進取非古之道也益刻苦讀書思所以行其言摘録入則孝出則弟貧而樂富而好禮數語揭之座右勾龍廷實夾江人政和中進士召試學士院除校書郎後知眉州作通濟堰以溉民田眉人刻石記其事勾龍傳字明甫夾江人撰春秋三傳分國紀事本末劉後溪序之稱其嗜古尊經確乎自信云何熙志夾江人紹興間進士有文名朝公武薦為臺屬除授御史藺敏修夾江人幼頴敏博通羣書紹興中進士官至朝奉郎著論語解詩解劉甲字師文其先東光人元祐宰相摯之後流寓龍遊遂家焉淳熙初進士吳曦叛甲以大義拒之召赴行在遷寶謨閣直學士晝有所為夜必書之名自監有奏議十卷卒諡清惠余嶸字景瞻夾江人官戶部郎嘉定辛未使金賀生辰會有北師至涿而返所著有使燕録于震孫字長卿犍為人以詞賦試第一調隆州録事參軍知廣都人遵其教令一境大治纍官朝奉大夫薛緩夾江人舉進士纍遷祕書郎廷對極言韓托胄之姦坐免官與魏了翁講明易理著易解十卷馮拜佐夾江人任敘州太守與魏了翁講晰周禮尹均祥夾江人舉賢良方正授崇寧簿撫字有聲明梅應魁威逺人洪武中為寧波府推官不事苛刻辨鄞縣民邵觀之誣人服其神明永樂三年應求賢薦升刑部郎中厯廣東布政使孫瑜犍為人洪武間舉能吏纍官至戶部侍郎卒贈尚書子冕守城有功授為戶科給事中任敏字勉學州人年十九領鄉薦永樂間進士歷官山東亷使有骨鯁聲孫有齡為翰林庶吉士官憲副劉昶犍為人仁恕好施代人完娶者四營葬者七永樂辛卯領鄉薦宣德丁未考選稱旨擢御史未幾卒所施未竟其學紳士惜之邢綸字理之犍為人邃於春秋登賢書任池川同知恆捐俸以贍故舊尚書席珍洗馬張朝給事安磐少卿趙時進士談誾楊士麟皆從學世比之龍門王通云劉肅字敬之州人成化丙戌進士授行人奉册封秦府却其私餽拜監察御史按江西湖廣風裁懋著歷河南布政使陳惟直州人少以奇童名弱冠領蜀解成進士授安福令擢銓部主政厯驗封郎有鯁直聲假歸言官交薦起補山西憲副厯湖廣左布政使卒生平名節自持在晉特黜佞臣宋之問祠祀人服其有識張春峩眉人由舉人官至陜西僉事致仕歸囊無私物監司欲與以地春謝不受曰無以是為子孫憂錢貴峩眉人以明經任雲南富民縣令簡重亷平邑人李義為盜所誣貴亷其寃釋之義以三百金謝貴叱之去在邑常治圃自給及􅌰士民哀之張鵬洪雅人𢎞治中進士授徽州府推官讞獄明允嘗忤逆瑾瑾敗乃拜河南道御史以直聞巡視兩淮忤中貴移病家居後升巡按山西又以論大臣謫知漳州著北還集并西巡稿陳哲洪雅人由歲貢任學正事親孝以經義淑人鄉閭宗族貧者周恤之徐文華字用光州人有節操工詩文登𢎞治中進士任大理評事改御史升大理寺左少卿以言事編戌遼陽會赦還至靜海卒與給事中安磐侍御程啓充給事中彭汝實為友一時蜀中論人物四子稱首隆慶初贈僉都御史童瑞州人進士歷戶科都給事敢言時弊論王衡李鸞獄疏中貴矯取太倉銀雨悉治如法官至工部尚書屢疏乞歸林下世宗嘉慰焉彭汝實字子充州人由進士授南京吏科給事中極言近習變亂與國是偏執往復萬言又作貂璫録以寓化導不果上罷歸居家孝謹結廬山居成就後學程啓充字以道州人𢎞治中進士為御史抗疏清監局諌獵發馬昻祕謀皆其大者嘉靖初以議大禮謫戍十餘年放還置義田以贍宗族捐家資以新學宫又置學田若干畝隆慶間贈光祿寺少卿高任説字汝霖州人少篤學性端重嘗銘其座曰程明道坐如泥塑包文肅笑比河清後舉進士厯知鎮江府政先惠愛升浙江提學未任卒趙時犍為人正德間舉人厯知三郡連克巨寇有異績擢太僕寺少卿楊仲瓊州人進士授蒲城令定歲輸化刁頑升戶部郎首疏清理邊儲議賑荒歉任大理守鑿渠灌田釐弊蘇困民請留者九年後終潼關憲副為洪雅紳耆之表孫甫犍為人邃於易登進士知南城縣值宸濠叛力保城池境賴以安去南城日民泣送之王詠州人嘉靖中進士選庶吉士授御史厯官江西參議文學政事為一時最子育宗萬厯時亦成進士官檢討升中允請告歸里卒兩世詞林鄉黨稱其有世德焉高光峩眉人嘉靖中進士官至雲南僉事嘗捐俸賑飢後歸閉門却掃不談世事時人高之安磐字公石州人户部主事祐之子登進士選庶吉士改兵科給事中與程侍御彭給事相友善時號三高升都給事議大禮伏闕被笞家居守禮著家禮儀節萬厯改元贈太常寺少卿茍延庚峩眉人萬厯癸丑進士任湖廣兵備僉事勵志亷潔公餘力學不倦罷官歸里之日囊無餘資泊如也汪紹伊洪雅人萬厯戊戌進士授行人時蜀糧協濟貴州至江津交兌轉江督運者留難米多爛濕民甚苦之紹伊適奉使還蜀經其地曰民瘼如此非有司者之過耶於是督運者愧謝立為貯倉民賴以蘇厯官承天知府丁艱歸不復出仕趙楷字憲吾犍為人由進士任御史巡山西鹺政奏免運課以母老陳情終養起雲南憲副潛心理學多所著述聶汝器字公偉犍為人年二十父俊卒於國子監旦暮悲號往負骸骨歸補邑諸生撰孝友賦新都楊慎奇其人為作孝子行舉孝亷任唐縣令省河夫費歲減錢千緡又修南陽隄唐民肖像祀焉劉江字源岷洪雅人舉孝亷授江西東鄉令厯升桂林府知府有賢良聲擢廣西按察使端身率屬丰采凜然致仕二十餘年舉動不茍士類重之趙正學字子崇犍為人幼從父任耀州師事三原馬理遂傳其學性朴實口無過言尤篤孝友舉進士厯官河南按察使平師紹尚之亂止修河之役中州士民肖像祀之直𨽻眉州漢張皓字叔明州人漢留侯六世孫五遷至尚書僕射後出為彭城相徵拜廷尉辨正疑獄順帝即位拜司空多薦達天下士時趙騰因災變當伏重法皓諫曰騰本欲盡忠正諌如遂誅戮塞諫諍之源非所以昭德示後世也帝悟減騰死罪張綱字伯紀皓之子少明經學仕御史與杜喬等持節分按天下綱獨埋輪都亭曰豺狼當道安問狐狸遂劾梁兾等姦惡廣陵賊張嬰寇亂冀乃諷尚書以綱為廣陵守綱單車造嬰壘諭以成敗之幾嬰深感悟乃降南州晏然蜀漢楊戲彭山人為漢督軍從事職典刑獄論法決疑號為平當纍拜護軍監軍出領梓潼守入為射聲校尉所在清靜不煩延熙間著蜀漢輔臣贊晉李興彭山人密之子一名安太傅掾永興中鎮南將軍劉𢎞至隆中觀諸葛亮故宅立碣表閭命興為文楊邠字岐之州人少好學砥勵名行刺史王濬舉秀才纍遷汶山太守永嘉初進衡陽內史遇流民叛亂遂破郡城獲邠欲以為主邠不許賊晝夜執守邠候其少怠夜急走比覺已去逺收餘衆欲投湘州刺史茍眺其圖進取會眺降賊邠孤軍賊攻圍之誓死不移遂卒年六十九唐蘇祐州人刺史味道之後父釿唐末隱居行義甚高祐自少極力問學穎悟過人嘗至成都遇道士異之屏人謂曰吾能變化百物將以授子祐固辭道士笑曰是果有以過於人矣子杲杲子序序子洵皆有成宋段思恭州人乾德間全師雄之黨攻眉思恭募先登者許以厚賞賊遂敗思恭矯詔出上供錢帛給之其後度支劾思恭太祖嘉其果斷不罪命知州事孫降衷州人少博學慷慨多大志嘗至洛陽見宋太祖知非常人傾心事之及太祖平蜀召見授眉州别駕宋垂範州人景德間進士知潭州有惠政後挂冠歸趙抃贈詩云休官鎮浮俗眉壽冠同年恬養八十歲苦吟三百篇孫抃字夢得州人其六世祖長孺喜藏書號書樓抃好學能繼長孺志登進士皇祐中為御史中丞內侍王守中建節抃奏罷之張貴妃卒追册為后抃上疏力爭纍遷翰林學士承旨官至參知政事卒諡文懿石待問州人少以詩賦名纍官至太常丞時丁謂畏其直錢易竒其文楊億李諤服其議論即此可概其人石揚休州人少孤力學舉進士纍官刑部員外郎知制誥仁宗朝上疏力請廣言路尊儒術防壅蔽禁奢侈其言皆有益於國云陳希亮青神人幼孤好學其兄使治息錢希亮悉召逋家焚其劵天聖中舉進士厯知數州纍官太常少卿以才幹剛直名四子忱度支郎中恪滑州推官恂大理寺丞慥有隱名號方山子孫去非官至參知政事蘇洵字老泉州人祐曾孫序季子兄渙舉進士官至都官郎中洵年二十七始發憤為學遂通百家六經之説二子軾轍同舉進士父子文章遂擅天下宰相韓琦薦於朝除校書郎尋以為文安簿修纂禮書卒贈光祿寺丞有文集二十卷諡法三卷傳於世初王安石名籍盛洵以其不近人情作辨姦論及安石用事人服其先見云蘇軾字子瞻父洵嘗遊學四方母程氏親授以書嘉祐二年試禮部歐陽修得軾刑賞忠厚論驚喜疑門人曾鞏所為乃置第二復以春秋對議居第一修曰吾當避此人出一頭地治平二年入判登聞鼓院英宗自藩邸聞其名欲召入翰林知制誥宰相韓琦曰軾才逺大器也他日自當為天下用今驟進適以纍之遂直史館熙寧中王安石創行新法軾上書論其不便安石怒使御史謝景溫論奏其過窮治無所得軾遂請外通判杭州復徙知密徐二州再知湖州多以詩寄慨御史李定舒亶媒蘖以為訕謗欲置之死神宗憐之以黃州團練副使安置量移汝州元祐元年遷中書舍人尋除翰林學士哲宗嘗召對便殿宣仁后曰先帝每誦卿文章必歎曰奇才奇才但未及進用卿耳軾不覺哭失聲后與哲宗亦泣已而命坐賜茶撤御前金蓮燭送歸院厯官禮部尚書兼端明殿學士後坐元祐黨籍纍貶儋耳更三大赦遂提舉玉局觀歸卒於常州高宗即位贈資政殿學士諡文忠有東坡集數百卷行於世蘇轍字子由年十九與兄軾同登進士熙寧二年上書言事召對延和殿時青苗法既行轍以書扺安石遂出為河南推官未幾改著作佐郎復僉書南京判官元豐二年坐兄軾以詩得罪謫監筠州酒稅五年不得調移知績溪哲宗元祐元年召為右司諫宣仁后臨朝司馬光吕公著欲革弊政而舊相蔡確等窺伺得失轍皆論去之又疏吕惠卿之姦以散官安置建州二年遷起居郎中書舍人時宰執欲稍引用元豐舊黨以平夙怨謂之調停宣仁后疑不決轍面斥其非復疏論之由是調停之説遂寢六年拜尚書右丞進門下侍郎是年夏人犯邊轍引漢武事上奏哲宗不悅落職知汝州纍謫雷州安置遇赦北歸以大中大夫致仕築室於許號頴濱遺老卒年七十四淳熙中諡文定所著有春秋傳古史老子解欒城集並行於世蘇過軾之子軾謫嶺海獨過隨侍嘗為文曰志隱軾覽之曰吾可安於夷矣厯官郾城令通判中山府皆有績所著有孔門弟子别傳斜川集子七人籥節篳籧簫劉渤州人初令溫江修建學校元符中詔求直言凡九上書辨宣仁太后之誣及司馬光之枉乞用范純仁蘇轍斥退章惇蔡卞吕惠卿蔡京改提舉河北路常平尋坐元祐黨籍任孜州人以問學氣節推重鄉里名與蘇洵相上下官至光祿寺丞有能聲其弟伋亦知名通判黃州後知瀘州皆有偉績時稱為大任小任史照州人博古能文蘇氏兄弟以師事之著通鑑釋文三十卷桂堂州人熙寧中守威州時霸康保霸二州交惡堂自攜牛酒會二酋長諭以禍福乃降朱台符州人父賦官至殿中丞台符敏於詞藻舉進士纍官工部員外郎屢疏極言朝延得失有集三十卷弟昌符亦舉進士官至屯田員外郎子公佐亦登進士第次子壽隆試將作主簿楊孟容州人纍官至淮安軍治平間與濮議不合熙寧間議新法又不合元祐中乞致仕哲宗書清節二字賜之巢谷字元修州人與蘇氏兄弟交最深二蘇謫嶺海谷徒步訪之至新州病死轍聞哭失聲曰谷於朋友之義誠可謂無愧矣楊迹青神人少好學有文名嘗謁黃庭堅論學術邪正自是學有指歸學者宗之杜莘老青神人甫十三世孫纍官殿中侍御史後以直顯謨閣知遂寧府嘗嘆曰臺諫當論天下第一事若有所畏姑言其次是欺其心不敬其君者也及任言責極言無隱取衆所指目者悉擊去之聲振一時都人稱骨鯁者必曰杜殿院云王當字子思州人元祐中蘇軾以賢良方正薦廷對慷慨不避權貴調龍遊尉蔡京知成都舉為學官不赴後京入相遂不復仕富於經學尢邃易與春秋著春秋列國名臣傳五十卷吕陶字元鈞彭山人舉進士言新法忤王安石意通判蜀州尋知彭州哲宗即位除殿中侍御史上疏論蔡確韓縝章惇負國相繼罷去官至集賢殿學士文初彭山人父永客汴初尚在襁褓年二十至汴訪父踰年始得之暨登第封永為承事郎安輿奉迎時人稱之程之邵州人任新繁主簿厯知鄭州纍官顯謨閣待制攝元帥事屯兵行邊敵人聞風遁去任伯雨字德翁州人孜之子邃於經術登進士知雍邱縣擢右正言首擊章惇章八上貶惇處州繼論蔡卞六事居官半載所上一百八疏大臣畏其多言俾權給事曾布惡之出知虢州黨事起削籍編管通州徙儋州以星赦量移道州以八寶赦提點明道宫卒年七十冇三王宿州人與同郡李由頤程之才楊明家願楊珣楊千鈞賈勉中史彭年孫會嘉度史欽家德基家翰劉剛楊實張儒史勵節史移中家寧史書言張繻史勤李故成彪費易等二十五人俱元符時以上書入黨籍家願州人紹聖初舉進士為樂至令元符初應詔上書凡萬言入黨籍坐禁錮大觀初起知雙流高宗時擢知閬州初蘇轍讀願䇿謂當以直道聞果然任諒州人徙汝陽幼孤力學舉進士纍官龍圖閣直學士知京兆府能前知郭藥師必反嘗為懷州新學碑徽宗見之嘆曰文士也任盡言州人紹興中朝臣推湯鵬舉侍御史鵬舉思退子盡言以啓賀曰以三尺之童連冠雨科之士老牛舐犢溺愛誰先野鳥為鸞欺君孰甚王針州人蘇軾妻兄九歲通經弱冠時軾見其文甚愛賞針與成都侯元叔每論古文退即書數百言如史漢論贊元叔嘆其有良史才元祐間屢徵不仕子光先亦登進士第以詩文名師維藩州人為全州文學精於春秋徽宗時興太學國子司業高閲言建學之始宜崇老成以誘掖後進乃以維藩薦詔除國子學録楊洵丹稜人元豐五年進士知廣都縣與家願上書語切直入黨籍禁錮李燾字仁甫丹稜人紹興間進士厯官祕閣修撰同修國史以雷震建言上嘉其讜直拜禮部侍郎除敷文閣學士致仕卒贈太師諡文簡張南軒嘗稱之曰李仁甫如霜松雪柏所著資政通鑑長編一百八卷李垕燾次子官祕書省著作郎直言極諫嘗多奏議朝論重之李壁燾第五子性聰慧為文精博登進士第纍官端明殿學士知遂寧府平張福亂卒贈資政殿學士著書凡數百卷李􅌫燾第七子登進士第入為館職有文名奏對忠讜厯官禮部尚書淳祐元年奏請周程張朱從祀黜王安石上從之以資政殿學士卒諡文肅王賞州人舉進士纍官禮部侍郎兼直學士忤秦檜意出知利州賞為文師蘇軾有玉臺集子稱學問該洽初除直祕閣知龍州有美政纍官吏部郎中嘗著東都事略一百二十卷孫道夫丹稜人隨計貢辟雍坐收蘇氏文除籍後以張浚薦召對言修德以回天意定都以繫人心等事上諭宰相渡江以來文氣未有如道夫者除祕書正字纍官知蜀州遇事明斷人目為水晶燈籠纍官權禮部侍郎性剛直為秦檜沈該所忌云史守道字孟博州人通春秋登進士第官迪功郎致仕歸里所著博齋集春秋通會等書行世楊椿州人舉省試第一以不附秦檜被斥紹興末始起兵部尚書兼翰林學士除參知政事卒諡文安程掌字叔運州人豪俊明辨紹興三年廷試第一歷洋州觀察推官徒步謁真德秀於浦城議論時事皆中機務所著雲歸鼓吹自由編等書行於世宇文介州人登進士第歷官給事中與李燾同朝遇事敢言孝宗嘗召對謂有古直臣之風史通丹稜人少與兄恂以文學知名厯官石磐令有古循吏風著易經乾坤别解詩書義論孟義子義又世務機要十卷芻蕘䇿十卷楊大全青神人乾道中進士調溫江尉召監登聞鼓院時光宗久不詣重華宫大全為萬言書以諫人稱忠直寧宗時纍官司農寺丞會御史虛位有薦大全者囑一往見大全笑謝之明日遂乞外知金州劉焞州人贊讀恭王邸權尚書禮部侍郎光宗以太子尹臨安焞為判官兼少尹佐政諸貴不便出為湖北轉運判官知靜江府平李接亂家大酋州人願曾孫舉進士初授昭化主簿吳曦判大酉不受其招淳祐中侍講經筵纍官工部侍郎與宰相史嵩之論不合罷去大酉為人方直雖遭遇數奇所守不變卒諡文節唐瞻丹稜人唐庚之兄一名白虎字望之治春秋皆有家法唐庚字子西丹稜人善屬文舉進士遷承議郎卒庚為文精密作察言諸篇遂為士林所賞楊明丹稜人纍官朝請郎知合州以清節著樊漢炳青神人厯官尚書才望著聞唐文若丹稜人庚子少英邁不羣為文豪俊登進士第楊煒青神人為文通敏官修職郎楊汝明青神人舉進士為成都觀察推官吳曦叛汝明不受其招曦平宣諭使吳獵以聞遂召入纍遷工部尚書楊棟青神人汝明從子紹定間進士為宗政少卿廷對以正心修身之説進且云臣所學三十年止此一説至為易簡纍官禮部尚書參知政事以資政殿學士卒贈少保所著有崇道集平舟文集楊文仲棟從子幼孤母胡氏守節自誓教養諸子文仲邃於春秋寶祐初登進士纍官太常丞兼崇政殿説書以積誠感帝意官至工部侍郎兼國子祭酒後知泉州卒有見山集行於世楊泰之青神人字叔正少刻志力學慶元初應試調瀘州尉厯知果州皆有異政寶慶間召對謂今以直言求人而以直言罪之使天下士以言為戒恐士氣益消沮矣理宗奇其對遷大理寺少卿出知重慶府主鴻禧觀卒明左經州人洪武初任興山教諭博通經史人稱左五經蜀士有聲者多出其門所著有武昌集行於世譙明州人任御史巡按廣東鋤治豪猾亷介剛直改按雲南雪寃婦按撫苗夷邊宇寧戢余祥青神人任戶部郎中厯官亷介篤於故舊奔父喪負一篋過眉人飲以酒即於篋傍􅅹地者三主人訝之曰此吾友骸骨也吾負歸欲葬其鄉耳其好義如此後以子子俊貴贈都御史余子俊祥子登景泰辛未進士成化間為戶部郎有幹濟才遷西安知府城中井惡飲者多病乃為渠引滻水入城中人呼為余公井又開洪口灌溉民享其利厯官都御史巡撫陜西於榆林鎮修牆千餘里屯守有方以功晉兵部尚書總督三邊尋致仕復起為尚書加太子少保鎮大同名譽益彰以疾卒諡肅敏姪寰登進士官至戶部主事子真錦衣衛同知以忤逆瑾改南京孫承恩襲父職改四川都司充永寧參將承勛登進士官至翰林修撰承業登進士官至雲南僉事楊榮青神人為政興利除害復逋逃者七百餘戶時有虎夜入城傷人榮禱於城隍祠虎死廟前厯官參政余寰青神人子俊姪𢎞治間進士授戶部主事有能名識大體語及邊務輒能道其山川險阻慨然有用世之志後以督餉功遷員外郎進階奉訓大夫王一麟青神人𢎞治中進士授歙縣令補戶部主事從總制叢蘭分理邊務轉餉有功升員外郎致仕家居後進視為楷範張愈嚴州人由刑部郎出守南康當兵變之後勞心撫恤卒於官士民號泣祠祀名宦張景賢愈嚴之孫備兵洞庭解散羣盜又禦倭於狼山大捷世宗賜金帛擢至右僉都御史以不合時相間住詩文書法俱臻絶妙直隸卭州漢林閭字公孺州人揚雄嘗師事之陳立州人成帝時守牂牁討平寇亂又徙巴郡再守天水治績為天下最天子賜以金帛後為左護軍晉常勗字修業大邑人察孝亷除郫令為政簡而不煩鄧艾入蜀破諸葛瞻於綿竹威振西土諸縣望風降下朂獨率吏民固城拒守後主檄令降詣艾刺史袁宏嘉勗志節辟為主簿常忌字茂通勗從弟喪親哀戚以孝聞察孝亷為郎使吳稱職晉武帝踐阼拜騎都尉除河內令州號為難治忌挫折豪勢風教大行入為州倅方議為郡守會卒唐梁震州人登進士遊中原道出荆南為高季興所留甚重之震恥為所汚只稱唐進士終身宋計用章字虞卿州人天禧中章年十八登進士通判延安時范雍為帥章勸其修城練兵以備不測雍不聽及元昊圍城召問䇿用章以一死報國對會大雪圍解厯官至都官員外郎計有功用章之孫其父良輔慶厯三年進士有功夙好學有至行所著有唐詩紀事行於世費孝先大邑人至和初嘗遊青城董正圖學舍壞其竹牀欲償其值正圖曰成敗有數何償焉孝先視其側書曰某月日為費孝先壞遂大驚歎因師事正圖授以易學孝先遂以術名聞天下李絢字公素州人舉進士纍官起居舍人龍圖閣直學士仁宗春秋高未有繼嗣因侍祀高禖還奏賦其指言遠嬖寵近賢良則子孫蕃衍仁宗嘉納之趙卨州人舉進士為汾州司法參軍郭逵宣撫陜西辟掌文書多所建明夏人入寇俘馘有功纍官龍圖學士帥延安元祐中進端明殿學士陳賓州人熙寧中上書論蔡京之姦號白衣御史常安民州人年十四入太學有賢名熙寧中進士纍遷御史論章惇蔡京之姦峻直不回京用事詆為黨籍流落終身後贈諫議大夫吳時州人進士知鄭縣徽宗時為司業出提舉河東常平童貫經略北方時因進對言必速亂王黼怒斥之尋為徽猷閣侍制敏於為文未嘗屬藁人目之曰立地書厨常同州人安民子政和中進士除太常博士紹興初知柳州首論朋黨之禍除殿中侍御史又言和議先振國威則和戰常在我若一意議和則和戰常在彼人服其言後以顯謨閣學士知湖州卒葬嘉興子孫家焉李僑州人紹興中進士時光宗不豫久未朝重華宫僑初釋謁即慨然上疏曰祿不逮養乞將所得官資回贈二親冀以感動上意朝論偉之魏了翁字華父蒲江人本高姓出繼魏氏慶元中進士厯官僉書樞密院事忤史彌逺謫官卒諡文靖贈秦國公了翁潛心關閩之學築室鶴山授徒講學學者稱鶴山先生弟文翁為眉山尉俱祀鄉賢魏文翁登進士任眉山尉後知敘州嘗讀書思貽父母令名自號果齋張行成字文饒州人自號觀物先生魏了翁稱其得易數之詳大略因象以推數因數以推理得朱子本義之旨高定子字瞻叔兄稼以忠烈著定子博通六經纍官端明殿學士僉書樞密院事兼參知政事嘗以事忤史嵩之謫官卒贈少保其所歷之州縣以教化為先所著有存齋文集比門類稿高斯得稼之子少從李坤臣學坤臣失明斯得嘗扶侍之紹定中成進士授利州路推官歷史館檢閲稼死事於沔斯得奉遺骸歸葬纍官參知政事明張思誠大邑人洪武中進士任山東按察司副使聲績赫然張如巒州人由舉人厯官知府居官清潔後以戅直不徇時好致仕歸里始終一操鄉評推重之梁謙州人永樂中進士纍官浙江提學士林向服有公明神速之語致政歸田廉靜自守鄉里推焉孫之益字六吉州人萬厯丁未進士厯任太僕寺卿天啓時同鄒元標等劾奏魏忠賢欺君擅權觸忤璫貴解職家居崇禎元年忠賢伏誅起復仕至浙江巡撫王廷簡州人登進士初知江陵即抗權相被黜未幾復起用厯升廣西副使所在有惠政退歸家居三十餘載晉階二品屢薦不出所著有警愚筆紀今賢懿行録鄉閭則之入祀鄉賢劉應辰州人孝子文恂之子兄弟九人皆篤友干誼應辰尤多隱德教子綱紀俱成名劉綱應辰子登進士才學敏裕館選未幾即疏諫弭災極論元輔朝論憚而服之尋左遷外職卒於家有館閣草並弟紀所作合為二劉文集劉紀應辰次子幼清而慧弱冠領解著有劉子宥生等編西南之士多負笈錯趾其門任漢陽令年餘有異政思母老不能迎養和歸去來辭韻一篇拂袖而返囊槖蕭然隱居葫灣山中未幾卒直隸潼川州雍正十二年升為府漢文泰州人守益州不從莽述光武嘉之鄭紀字長伯射洪人仕至永昌太守以亷潔稱圖形東觀談顯字子誦射洪人師事司徒魯恭以孝舉厯豫州刺史收捕盜賊千餘憫其困苦陷罪釋之乃自劾詔置勿理仕至長樂衛尉王渙字稚子射洪人舉茂才初為河內溫令縣多姦猾渙以方略擒誅之由是道不拾遺夜不閉戶民歌之曰王稚子世未有平徭役百姓喜遷兗州刺史部中肅清拜侍御史又為洛陽令公平亷正發姦摘伏京師稱以為神病卒百姓痛哭為立祠祀之永初二年詔曰故洛陽令王渙秉清修之節蹈羔羊之義拜其子石為郎馮灝字叔宰射洪人纍官至越巂太守所在著有政聲避梁兾隱居作易章句及刺奢説恬然終老王堂字伯敬射洪人初為邑郡太守舉孝子嚴永隱士黃錯張滿徙左扶風政教嚴明轉汝南太守舉陳蕃為功曹應嗣為司隸校尉時號知人蜀漢王商字文表堂之孫博學多聞仕至蜀郡太守有懿德高名李朝字偉南射洪人益州别駕從事與弟邈俱以文稱號二龍常面諍昭烈時稱骨鯁杜微字國輔州人任安弟子先主定蜀稱疾不出建興二年孔明簡舊德以為主簿輿而致之固辭孔明曰君但當以德輔時不責以軍事何為求去乃拜諫議大夫從其志焉李撰字欽仲射洪人從梓潼尹默講學五經諸子無不該博後主以為太子庶子嘗著古文易書毛詩三禮左傳指歸晉李毅字允剛射洪人朝之子少敏達年二十餘詣郡太學受業太守王濬臨講問祭酒姬豔曰學中有可成進幾百人豔對曰可有百人怒曰童冠八百而成者百人教亦奚為毅對曰如豔之言明府之教盛於孔門不為少也濬竒之引為主簿後從濬伐吳與何攀並為參軍吳平封關內侯厯寧州刺史加龍驤將軍封成都侯諡曰威李苾字叔馨毅從弟也自少砥礪名行仕犍為太守以清儉履道稱王化字伯逺王商之孫父彭為巴郡太守化兄弟四人少有令望蜀漢時化除閬中令為政清靜察孝亷入晉復察孝亷為樂涫令縣近邊塞值夷人反化率吏民積穀堅守夷斷道重圍伺敵怠惰出軍擊之民得野掠適大軍驟至夷乃退化以功封為關內侯年七十有二卒王振字仲遠化仲弟亦有德任廣都令巴東太守王岱字季遠化叔弟勤恪居官厯廣陽作唐令王崇字幼遠化季弟學業淵博雅性洪粹舉秀才尚書郎陳壽同入京洛為二州標雋仕至蜀郡太守所著有蜀書王長文字德睿射洪人天姿聰警高暢敏識治五經博綜羣籍州三辟書佐不就武帝時刺史胡羆辟從事祭酒長文佯發狂疾步擔走出門羆纍請還遂歸家養母講學著書以母欲祿養咸寧中領蜀郡太守後因喪去官民思其政復起應梁王彤辟從誅賈氏有功封關內侯卒年六十四龔穎遂寧人益州刺史毛璩辟為從事璩為譙縱所殺佐吏並逃穎獨奔赴殯送以禮後縱僭位禮徵不起脅以兵刃執志彌堅竟不屈節唐符偉明趙元淑俱蓬溪人楊炯長江賦及孔子廟堂碑稱偉明元淑為鄉望所重以詩禮化俗云陳子昻字伯玉射洪人父元敬歲飢出粟萬石賑鄉里子昻年十八尚未知書輕財好施一日入鄉校感悔力學舉進士武后時拜麟臺正字請興明堂建太學語多切直拜右拾遺時吐蕃入寇為邊患最甚后方謀開蜀山因桂州道剪生羌以襲吐蕃子昻上書諌止之武攸宜以其儒者謝不納居數日復進計攸宜怒徙署軍曹聖厯初以父老表解官歸養父喪廬冢次縣令段簡貪暴聞其富欲害之家人納二十萬緡簡薄其賂捕繫獄中子昻初見捕自筮卦不吉果死於獄年四十三人愛惜之唐興文章承徐庾餘風子昻始變雅正初為感遇詩三十八章王適曰是必為海內文宗乃請交焉陳光字孔明子昻長子登進士官至朝議大夫詩入正聲集宋譜云是子嫓美前後難兄難弟並秀光宗學有淵源政多劻贊陳易輔光長子明經進士仕至監察御史與弟簡輔齊名決獄發姦宦業顯著張九宗遂寧人以儒業起家仕至御史遂寧文學自九宗倡焉王慧州人博學能文仕至左補闕後遷通州司馬李湛射洪人義府子真西山嘗曰義府姦邪人也其子湛以忠義聞若湛者洵可謂蓋父之愆矣李浦射洪人著有補履書十餘卷世號補履先生時宰相張延賞表拜右拾遺正色抗辭朝堂敬憚嚴昌文鹽亭人厯官至御史以言事不合黜為合江令卒於官葬合江號為端正公墓云嚴震鹽亭人與兄恍登進士詞氣豪贍纍遷山南東道節度使進同中書門下平章事建中間韋正狀其治行為山南第一德宗幸鳯天進封太保卒諡忠穆嚴礪震之從祖弟貞元十五年以興州刺史兼御史大夫出為山南西道節度使寬明儉惠嘗疏嘉陵江通澧水以溉民田州民德之元和元年以檢校尚書左僕射改東川節度使平劉闢拔劒門守險功居第一宋趙延義中江人兼通三經以術數擢判司天監與藝祖論五代漢祚短促由慘刻非天數時議誅蘇逢吉劉銖族聞延義語遂貸之蘇易簡字太簡中江人太平興國五年狀元以文章知名徐鉉稱其孝誠可以表人子篤學可以牖後進好尚可以激偷薄言行可以型有位纍官翰林學士承旨眷遇敻絶御書玉堂之署賜之纍官參知政事出知鄧州移陳州卒贈禮部尚書汝顔州人舉進士調鳯州幕職年未老請致仕仁宗嘉其高尚特授太子舍人馮宋州人太學生與陳同伏闕上書遂被黜落謝金字子真州人太平興國五年進士少居五龍山以詩自娛其詩平淡有韋柳遺風楊鄂州人有文名寇萊公比之相如王褒之儔仕至兖州判官牟袞字君華中江人端拱元年進士少負奇志嘗受學於普州多嶽以文章著名纍官翰林學士天禧間致仕著書自娛有詩文行於世于至蓬溪人七歲能屬文十七歲遊京師端拱五年及第上書十餘萬言時文章襲五代遺風至自出機軸嘗作蓬萊宫賦寇萊公準甚重之馮光戩安嶽人時李順已平諸將縱殺降附解體光戩白大將楊瓊止之自是降者以千數景泰州人字周卿天禧三年進士受坊州軍士推官通判慶州上言元昊必反又上邊臣要略二十卷平戎䇿十五篇徙知寧原二州以奇兵敗元昊於彭楊取鎮陽賊不敢犯後陟泰鳯路總管張述字紹明州人景祐元年進士為大理寺丞仁宗未有嗣述上言繼嗣為國之本宜擢宗親之賢者異其禮秩試以職務俾內外知聖心有所屬前後凡七上語最激切仁宗不以為罪厯知數州皆有政績纍遷尚書職方員外郎姚渙州人景祐中進士初監益州交子務發姦隱萬緡主吏法當死渙曰殺人干澤非吾志也義不蔽姦而已願不受賞於是全活者衆知陜州宜都以盜獄上渙疑之移核他有司無何果獲真盜徙知涪州民夷信服終光祿卿文同字與可鹽亭人皇祐元年以博學宏詞登進士官至湖州太守興利除害不避權勢同善詩文篆隸行草飛白又善畫竹文彥伯奇之曰襟懷灑落如晴雲秋月塵埃不到與蘇軾交最善軾嘗為同作篔簹谷記畫竹記詩篇倡和尤多同著有丹淵集傅耆字伯成州人少勵志學古年十四舉於鄉時周濓溪判合州因陸小溪知耆以書通訊耆往合州從之講明理學登皇祐六年進士厯知漢州至今遂寧稱耆為理學名儒蘇舜欽字子美中江人易簡孫少有大志好古文辭與歐陽修友善修服膺其文章行誼以為一時寡二杜衍愛其才以女妻之舜欽弱冠范仲淹薦於朝召試集賢校理極言時政得失忌者中之坐黜廢寓吳中築滄浪亭詩歌豪放卒年四十二修為作墓志祭文惋惜之情一篇中三致意焉蘇舜元字才翁中江人任氣節善詩歌工草書厯仕至三司度支判官所著有才翁集行世蒲規字正臣安嶽人有文名為洪雅令始以嚴治終以仁濟洪人德之杜田安嶽人以文章孝行舉厯江寧府教授終大邑縣丞所至有聲著杜詩補遺正謬行於世馮如晦安嶽人進士性明察遇事果斷范純仁帥環慶時有訟純仁不法詔置獄寧州命如晦往訊力辨其誣富弼韓縝有詩述其事楊天惠州人熙寧二年舉進士知雙流縣多著政績文詞有西漢之風蘇軾稱許之馮山字允南安嶽人熙寧末為祕書丞通判梓州鄧洵武薦為臺官山以不諳新法辭不就退居二十年范祖禹薦於朝官至禮部郎中所著春秋通解十卷允南集十卷王維射洪人元豐元年進士仕至榮州太守清節著聞馮澥字長源山之子元豐中進士靖康初召為左諌議大夫遷尚書左丞紹興間以資政殿學士致仕卒郡人張庭堅以言事斥象州死妻子流離澥力賑其家趙開字應祥安嶽人元符二年進士為成都路轉運判官建炎初提舉陜西茶馬𣙜酒法時張浚治兵秦川犒賞所費取辦於開而資常有餘馮楫字濟川蓬溪人自號不動居士政和八年進士為正字紹興中知涪州奏免瀘敘長寧招兵之擾仕至敷文閣直學士左中奉大夫馮康國初名轓字元邇遂寧人建炎三年進士高宗次杭州轓為節制參議苗劉之變張浚遣轓諭以禍福二凶稍戢孟后垂簾補兵部員外郎更名康國厯官顯謨閣知夔州紹興十一年卒劉鳯儀字韶美遂寧人紹興二年進士纍遷禮部郎孝宗受禪欲上光堯册寶鳯儀言乞候欽宗終制尋遷兵部侍郎兼侍講御史張持國言其書癖曠廢職事斥歸後起知均漢梁三州李蔓字修儒遂寧人隆興中進士初知瀘州建招撫䇿所至興利除害仕至利州提點刑獄楊甲遂寧人乾道二年對䇿言恢復之志不堅者二事上覽對不悅置第五賜文林郎清楊輔甲之弟進士及第纍官龍圖閣學士兼江淮制置使厯兵部尚書愛君愛國知無不言言無不切兄弟五人自為師友以孝聞諡莊惠有文集十卷杜孟樂至人讀書太學因童貫蔡京用事幡然而歸嘗訓子孫曰忠孝吾家之寶經史吾家之田號為寶田杜氏姚希得州人嘉定元年進士授小溪簿調磐石令更調嘉州司理參軍厯知慶元府發廩賑飢奏蠲逋負百萬石民賴以蘇召為國子丞纍官兵部尚書疏言用人才修政事治甲兵惜財用四事拜端明殿學士乞解機務以資政殿大學士潼川郡公致仕卒贈少保寧宗嘗言希得才望堪為閫帥所著有續言行録並奏藁等集吳泳中江人嘉定中進士厯著作郎屢抗疏直言遷寶章閣直學士嘗上言養心以清明約已以恭儉進德以剛毅帝深嘉納厯知溫泉州有鶴林集吳昌裔字季永中江人泳弟好程朱書研繹不倦舉進士厯監察御史遇事敢言慮蜀阽危條定規模審功賞訪軍實儲帥才四事以進徙為大理少卿以寶章閣待制致仕卒諡忠肅有儲鑑奏議四書講義行世袁廓州人由國學生仕至三司戶部侍郎厯守四郡清聲直氣為世所重元趙成慶州人纍官御史中丞卓有風裁激濁楊清官吏畏服張谷寶州人厯官御史遷平陽路總管德洽於民政聲清肅崔洪範中江人同知涿州纍遷西臺御史剛直嚴明名播朝野許維禎遂寧人為淮安判官屬縣鹽城有二虎為患維禎默禱神祠一虎去一虎死祠前境內旱蝗禱而得雨蝗亦息歲無雪民多疾禱之雪深三尺朝廷聞其事褒奬之謝端遂寧人纍官翰林直學士朝廷制䇿多出其手時稱有史才著正統論傳於世文禮愷遂寧人登延祐進士文章雅重於時人羡為朝陽鳴鳯明陳漢鹽亭人元末徐壽輝據蘄黃漢為萬戶率所部攻之洪武初歸附嘉其知幾拜大將軍都督府斷事後乞休太祖賜以歌有罕希老人七十餘虎頭猿臂蒼髯鬚之句王文貴中江人洪武間進士自縣令厯大理少卿居官清慎時論推重之陸必壽中江人洪武間貢生拜御史巡按江西及河南皆有聲望甘應樂至人洪武間監生擢廣東鹽課提舉政績著開纍官布政使司致仕歸家崇祀鄉賢席復遂寧人嘗從吳澄潛心經史洪武十三年劉基宋濓薦應賢良方正授潼川學訓與諸生講濓洛心性之學以年老致仕歸號橫岡先生黃敕中江人少穎異以竒童稱舉明經為學博著述甚富年八十卒王璲遂寧人永樂間編修才思敏捷與解縉等而華藻過之後居吳為寓公卒徐英中江人景泰間進士任給事中立朝方正抗直不撓官至都御史楊冕安嶽人天順元年進士授階州知州庚寅西番據石城叛都御史項忠薦冕以僉事整飭平涼固原蘭靖兵備俘獲甚衆後沙克嘉斯賚寇邊募兵捍禦有功擢副使王璿安嶽人天順間進士知臨淮潔己愛民政聲大著擢監察御史以抗論黜知宜都又厯宣城江陵咸有嘉績擢倅楚雄歷尋甸知府卒堯卿字廷輔安嶽人甘貧務學登順天己丑進士知昭化縣有異政擢太僕丞知銅仁府威著苗疆黎民安堵李常字恆吉安嶽諸生纍困棘闈晚由貢分教莊浪衛學訓課不倦始終以清苦自持士人化之致仕居家鄉人觀其動止以為步趨其見信於人若此吳憲字廷章安嶽人弱冠領鄉薦屢上春官不第授鄠縣教諭文學教化鳴於關中秦隴聞風來學者約數百人尋轉國子助教成化初特升翰林院檢討與修國史以疾致仕于瀛字登賢安嶽人登京闈賢書父孟暉卒京邸扶櫬還葬徒跣萬里後判澄江府民有寃獄力辨其誣再判金華府尋卒於任章憲極字錫疇安嶽人貢生以鄉舉任彭山令有治聲李萼字完之安嶽人成化間由舉人任陜西慶陽府通判尋升同知以余司馬子俊薦授山西僉事儲備賑荒有惠政厯升福建按察使平反寃情僚吏服其明決卒於官崇祀名宦王縉紳安嶽人進士厯官監察御史按浙江先後章奏皆見推行擢湖廣僉事懇乞致仕歸不入城市與楊冕等講學於真南書院士無遠近負笈從遊稱真南先生席書遂寧人𢎞治間進士初知郯城興水利墾荒田厯戶工二部主事作漕河志時雲南晝晦詔考察雲貴諸官吏公疏言致災之由在朝廷不必苛責臣下擢河南僉事請截漕米賑飢纍遷福建布政使宸濠之變發帑金募兵討之升湖廣巡撫擒豪民除貪吏進南京兵部侍郎江淮大飢條上賑濟䇿全活者數十萬又議大禮稱旨被召纍升禮部尚書武英殿大學士卒諡文襄席春書弟正德丁丑進士選翰林庶吉士授河南道監察御史差雲貴清戎大著風裁嘉靖初條上中外利弊上嘉納改翰林檢討進侍講學士充經筵講官多諷論規救上寵遇甚渥進學士掌院事厯吏部侍郎著有席太史文集席彖書弟厯任給事中以諌謫夷陵州城舊無井彖鑿之民以為便卒於官萬厯改元贈光祿少卿張翀州人正德辛未進士改翰林庶吉士厯都給事中嘉靖初疏請取回各省鎮守太監言甚切直復請罷額外貢獻以舒民困議大禮上怒詰責􆃬執議益堅乃同修撰楊慎遮百官於金水橋曰萬代瞻仰在此一舉有不同心者共擊之伏哭文華門聲聞大內上震怒逮繫錦衣獄杖八十謫戍瞿塘處困十年始終一節卒於戍所隆慶改元贈太常寺少卿著文集二十卷行於世楊儀射洪人正德丁丑進士授刑部主事以議禮逮繫錦衣獄杖於闕廷後厯兵部郎中晉貴州參議兵備畢節土酋叛督兵征𠞰俘斬甚衆邊境以安談誾蓬溪人正德間進士厯陜西副使備兵固原始議修築邊牆永為保障邊有鐵鑄泉番人數飲馬於此誾分兵守之不敢近境余本實遂寧人正德間為御史巡按雲南有聲後轉河南副使忤逆瑾罷歸王瑄遂寧人正德時任都給事中以建言罷歸遂閉門絶請謁人多賢之楊名遂寧人正德中官翰林編修上疏忤權貴免官家居敦行著書時論推重隆慶改元贈光祿少卿余方山遂寧人舉孝亷與王陽明遊得傳良知之學所著有五經四書實解崇祀鄉賢張庠蓬溪人正德間進士厯官貴州兵備副使都勻黠猓連年負固庠整兵直搗其巢執渠魁釋脅從猓人畏服稱小諸葛黃珂遂寧人由縣令厯尚書有介直譽宸濠奏求護衛珂堅執不署時人以為難卒諡簡肅黎希哲樂至人正德間厯訓西平安寧二學升教諭有文行卒日門人哀之今里中稱醇謹者必曰黎氏云王完州人正德辛未進士授廣信府推官遷貴州道監察御史巡按應天上疏請立朱子後於徽州復置五經博士一人宣城例貢雪梨完疏其物微而應貢甚艱言甚剴切特俞報罷永著為令厯官十年乞歸享年八十卒歐珠州人正德六年進士授行人簡任雲南道監察御史以謇直著聲巡按兩浙時杭州織造太監張志聰十年不完工珠下左布政馬卿議裁色料志聰因誣搆卿下詔獄珠疏救且劾志聰有旨責珠謫判商州轉知滑縣卒白賁州人嘉靖間進士授行人選廣西道監察御史入臺中凡七疏發嚴嵩之姦辨夏言之枉時世宗以中宫不遜下敕輔臣議行貶斥賁伏闕力諍辭極悽惋出按雲南屢檄安南入貢修藩臣禮至今南中稱名御史周贊州人由鄉薦任湖廣夷陵知州多惠政厯升知鶴慶府鶴慶舊無科第贊改遷學宫激勵後進科第至今不絶入名宦祠張錫命字月沙州人翀之裔孫進士厯官御史巡按兩淮卓有聲稱謝東山射洪人嘉靖中進士授兵部主事厯郎中纍官至右僉都御史巡撫山東敡厯中外者二十年著述有近譬軒集四十卷詩抄四十卷詩話四卷行於世王維賢中江人嘉靖十一年進士授河內縣令政務節愛調江都去任日士民遮道痛哭維賢口占云哭聲載道擁如林我亦欷歔淚滿襟莫道人心不可感感人未或是真心遷刑部主事厯陜西參議分守慶陽飭武備邊境晏然會丁艱歸遂不復出年九十卒談宣蓬溪人知河源縣時巨寇陳孜剽掠邊鄙民被屠戮宣以誠諭之賊乃解散鄰境亦賴以安陳講遂寧人嘉靖中歷直隸山西提學所至造育人材卓有成就歸休著茶馬志如鳥集等書海內重之黎堯勳樂至人嘉靖十四年進士授泰州知州泰州田賦不均堯勳特上疏請均丈定額部覆允行且令天下有田賦不均者俱宜清丈定數著為令厯仕至陜西參政升太僕卿楊維璧樂至人由選貢官夷陵州知州時有天下第一清官之譽致仕歸置義田以助族人享年八十卒祀鄉賢楊澄射洪人舉進士官監察御史巡按兩淮於泰州築隄百二十里置鋪周道商船稱便遂名楊公隄後遷大理少卿厯遷都御史巡撫山西所在皆有政績子最以忠節著聞湯紹恩安嶽人嘉靖丙戌進士厯紹興知府瀕海潮至多淹沒田舍紹恩議築隄建閘以時蓄泄闢田至數千畝越人歌之曰泰山巔高於天長江水清到底功名如山水萬古留青史立祠崇祀後厯升山東布政使卒於官黃華遂寧人從遊湛甘泉之門舉嘉靖十一年進士厯戶部郎知松江府奏上正風俗等十二事切中時弊又督餉有功升江西副使厯布政使晉光祿卿一日內官奉旨取光祿寺銀十萬兩華抗旨僅以半進時論偉焉告歸昌明道學激引後進尋卒帝悼惜賜祭一壇特豫葬賻著有麟經解義並詩文集十二卷談纘蓬溪人由進士以行人選授江西道監察御史議禮杖於闕廷又參論貴戚強奪民田幾中竒禍繼又劾掌院汪列先以揭帖呈堂列讀之面發赤云吾亦至此乎纘對曰御史無狀據所聞不敢隱也聞者吐舌十年升信陽兵備副使致仕卒張肅州人由鄉薦授承天府通判時留都兵變劫户部侍郎憲府檢轉餉者難其人肅毅然任之又委督修隄功不三月告成隄計百八十丈楚人德之為立祠焉升普安州知州遂投檄歸著鹿峰諸集行於世張二南州人由鄉薦授南鄭教諭升通渭縣令縣舊土城二南盡易以石不勞民而城工成撫按交薦之帝賜以金擢守商州踰年移所治營造新州賜名興安商民賴之張正道州人授豐城縣令厯升福建僉事值武林兵變調鎮台州飭紀律核軍餉兵民安堵因思母寢疾卒於官著有觀察文集十二卷行於世王任州人萬厯初進士授戶部主事尋轉刑部郎恤刑湖廣多平反升陜西參議有邊功賜金綺進河南參政駐汝南賑荒殱寇以功進福建右轄卒於任張正學州人萬厯中進士以中書舍人選吏科給事中時神宗久不臨朝乃上言宜延見宰輔委任大臣召用言官監察兩宫工程因極言蜀省採木諸弊皆嘉納之值三殿災又雷震西安門諭諸臣修省輔臣冇調停採礦欲責成撫按部臣歲額為令正學因上疏極言其非且謂山澤寶藏蓄為地靈發為山輝鍾為人傑若斫斷其脈則協氣不流而災沴生焉疏入調貴州宣慰司經厯卒著有道德經測旨淡如齋文集行世白恂州人少博洽性謙謹由明經授成都訓導升楚雄縣令以俸入代為貧民輸賦滇民有白老佛之稱致仕歸年八十卒無以為斂親故助之李長芳州人萬厯戊午舉人居家孝友授寶雞教諭課士有方崇祀鄉賢張任學字留孺安嶽人天啓乙丑進士初授太原令未幾調繁榆次崇禎間以亷能擢雲南道御史屢有建白懷宗嘉納之書其名於御屏遂命巡按兩淮先是賊犯鳯陽賊去陵旁有窟疑為賊掘命中使驗之自鳯撫以下論死者數十人任學按其事見窟小而曲無鍬鍤痕語中使曰狐穴耳非掘也上其狀各官得減死時賊遍河南推臺臣監軍皆不欲往任學毅然受命且憤諸鎮養寇疏請改總兵職銜討賊拔罪辨羅岱為中軍運籌分布有羅山襄承隨棗汝許諸捷會有忌功者遂解組歸菽水承歡蕭然寒素崇禎末仍以直指起之而任學已卒王伉字偉軒州人進士厯官太常少卿忤權璫魏忠賢挂冠歸里崇禎間起巡撫雲南時臨安士官普名聲肆行不軌伉奏聞督兵𠞰之功將成名聲賄當路劾以啓釁遂被逮論死臺臣申救得改戍遇赦歸普逆無所顧忌更為滇患後詔起伉伉已卒李實字如石遂寧人崇禎中進士為人方正清潔於書無所不讀令蘇州長洲縣民懷其德遂寓於蘇市隱者三十年著述甚富子仙根以鼎甲厯官户部侍郎實衣粗食淡如未有祿養者年八十卒蒲來舉蓬溪舉人初任陜西醴泉調劇甘泉縣奉解京餉數十萬響馬數十人入城搶劫一縣居民盡逃來舉主僕二人堅守銀扛持刀殺賊數人被害事聞贈太僕寺卿吕大器字東川遂寧人崇禎戊辰進士初授行人擢吏部文選郎遷陜西關南道副使尋巡撫甘肅計誅悍辨邊境晏然擢兵部侍郎時賊寇江西命大器督𠞰乃密布方略遣將於衢袁萬載萍灃諸路撲賊殆盡丁艱歸哀毁骨立楊騰龍射洪人天性孝友好善樂施以子應魁貴贈中憲大夫邑中人士公舉鄉賢亦準入祀直隸瀘州周尹吉甫州人宣王時北伐玁狁有功詩人美之曰文武吉甫萬邦為憲蜀漢董允州人仕為侍中兼尚書令秉心公亮專獻納之任武侯稱為忠亮死節之臣後主寵宦者黃皓皓畏允終允之世不敢為唐先汪州之南里人七歲日誦萬言貞元中舉神童後授合江令宋劉望之字叔儀合江人紹興間進士宰相沈該薦授學官遷祕書省正字著有觀堂集趙遹州人有文武才時夷酋卜漏剽掠遹行部昌州與别將分道追及獲卜漏斬之許沆州人纍官太府少卿該博善文詞有章奏賦詠雜著行世毛璞州人乾道中進士厯侍中終廉憲凡所著有六經解并三餘録自號方山子李鳴復州人嘉定初進士歷大理少卿侍御史兼侍讀進對言荆襄制臣有當戒者三曰去私禁暴懲怒工以為然立遷樞密院大學士先甲龍州人唐先汪裔孫開慶中進士退居安樂山講九經有讀書藏元劉植州人為國子大司成博學工文著名於時明張俊州人永樂中解元登進士授御史纍遷都御史揚厯中外卓有聲稱著書立言鄉評信服朱子和州人嘉靖間進士有異才補刑曹有勢家奴犯法論如律典江西試稱得人僉憲浙江以能吏稱著有初溪集藏之家子恭官參議姪藻官辰沅副使俱以治行聞王朝璽州人嘉靖乙卯鄉薦任山東齊東縣以清介著節及歸囊槖蕭然適邑大飢罄粟賑貸窮民夀九十六歲李鍪州人嘉靖中舉孝亷自幼以孝友聞授平江教諭捐俸以修學舍及為長子令備邊儲化強暴興革利弊當事薦為循吏李惟觀鍪子嘉靖進士初為寧國理刑平反寃抑民祠祀之拜御史建言崇正學等事皆見嘉納擢湖廣僉事平金岡大寇轉陜西參議致仕歸著有西臺疏草何其賢州人領鄉薦二十餘年未嘗一至公庭令湖廣通城有劇盜匿大姓家其賢密計擒之人稱神明出俸金以謝干謁留意刑獄民無寃抑以憂旱禱雨勞瘁致疾卒於官士民號泣送柩抵里里人榮之韓州人嘉靖中進士性耿介為吏部考功郎舉察咸當時布政使張翰參政張冕有時名為言者所諷力解之署文選杜請謁抑僥幸權貴切齒張天秩江安人舉明經任瀘州訓導好練習兵法以從征改邊佐均徭役省里甲邑人受其惠董邦理合江人號少原嘉靖間進士任廣平推官民間有卻狐裘辨寃獄之誦擢戶部員外奉使過里卒崇祀鄉賢周萃字正宇合江人萬厯中舉人任雲南保山令後知滕越州俱以清亷著致仕歸里德望益高屢舉鄉飲正賓壽九十卒崇祀鄉賢陳忠合江人貢士才識明敏官刑部郎以能平反洗寃抑著聲陳圭合江人貢士樂道安貧任宿州學正每教人看取本來生意致仕歸人思之為勒碑焉晚年研究十三經俱有解另著格致録馮任合江人舉孝亷博極羣書居官囊槖蕭然在家不入公門冇司重之趙杰合江人舉孝亷守新興開創學校請革銀場士民肖像祀之乞休著述時與諸生言忠孝辨義利士習丕變人稱為趙夫子有詩文行世董翼合江人號閬風萬厯中進士授湖廣益陽令厯官貴州巡按冇直聲曽為本邑請除免鐵溪倉銀里人懷其德云董為合江人號元圃萬厯中舉人授河南內鄉令歷官苑馬卿後以平涼討賊有功致仕歸著陰隲集行世曾為邑民代輸門堂銀里人感慕之曾震合江人進士才高學贍博通九流備兵榆林製有代漕陸舟法極精巧其遺制人多購求之曾海寬州人善詩家貧不仕授徒於合江常晚浴渡口得遺金七百盡還其主又以學資給鬻女償官錢者其人納券授女寬焚而遣之直隸資州漢王褒州人字子淵宣帝時刺史王襄嘗請褒作召見襄中和樂職宣布詩命士依鹿鳴歌之帝聞遂薦褒有軼才詔徵褒進聖主得賢臣頌上嘉賞令待詔數從行幸褒輒有歌頌受賜甚多擢諌議大夫後方士言益州有金馬碧雞之神帝使褒往祀焉卒於道董鈞字文伯資陽人習慶氏禮永平初為博士時草創郊廟禮樂威儀章服多從鈞議世稱通儒纍遷五官中郎將唐范崇凱內江人善屬文明皇命作花萼樓賦稱為天下第一弟元凱亦有文名時號梧岡雙鳯宋孫光憲仁壽人博學多智少遊荆南高從誨署為從事纍官祕書監宋兵討張文表假道荆南光憲勸繼沖曰中國自周世宗時已有混一之志今宋帝規模宏逺不若早以疆土歸之則可免禍繼沖從之太祖悅授光憲黃州刺史光憲聚有書數千卷搜閲不倦自號葆光子所著有荆臺集等書子謂讜並進士第龍昌期字起之仁夀人大中祥符間注易詩書論語孝經陰符道德篇韓魏公使蜀奏授試國子四門助教慶厯中文潞公奏授守校書郎府學講説明鎬薦為太子洗馬致仕著禮論諸書羽翼先儒時多稱之陳佑仁壽人熙寧中進士官至右司諫嘗言朝政不清由姦人抵毁善類乃劾論章惇蔡京蔡卞郝隨鄧洵武等忤旨出判滁州後入元祐黨籍韓駒字子蒼仁夀人少有詩名著詩法吕仁作江西詩派圖駒與焉登政和進士除祕書省正字纍直學士院嘗撰祀明堂圜壇方澤等樂章典則合體駒嘗從蘇轍學轍許其詩似儲光羲曾端伯亦謂其文乃臺閣之文所謂官樣者茍簡茍聳資陽人兄弟名振元豐間及宣和中同對䇿排斥姦佞簡遂為蔡京所殺聳以三舍生授營州文學何栗字文縝仁夀人政和中進士第一纍官御史中丞論王姦邪專橫罷之遷中書侍郎右僕射隨欽宗北幸被執不勝家國之恨仰天大慟數日不食死弟棠弟矩俱有時名號為三鳯虞允文字彬甫仁壽人七歲能屬文紹興間進士纍官中書舍人直學士院金完顔亮兵入江淮孝宗命葉義問督視江淮軍馬以允文參軍事義問敗績返建康允文收殘卒大敗北軍於采石北軍走揚州內亂猝發捷聞上大喜曰允文朕之裴度也後封雍國公卒諡忠肅著有文集行世李石州人以文學著名紹興間為校官乾道中為郎厯秉麾節坐與趙子直善觸執政怒以是晚年困抑有方舟集七十卷趙之禮州人字安道有逺識意氣豁如好義尊賢以孫雄貴纍封少傅薛鄭齊三國公趙逵州人讀書數行俱下紹興中對䇿擢第一為秦檜所忌授僉事劒南川東後纍遷至中書舍人高宗嘗稱其純正可嘉又以文章似蘇軾稱為小東坡有棲雲集三十餘卷趙雄之禮孫初除正字召見極論恢復之䇿孝宗大喜以中書舍人使金與金人辨論不為屈金人謂之龍鬭纍官參知政事拜右丞相朱熹論時事上怒雄言熹戅直罪之適成其名乃止後求出知瀘州光宗即位雄上萬言書陳修身齊家以正朝廷之道甚切直及卒諡文定李舜臣字子思井研人八歲能屬文及長應詔入京上江東勝鑑十篇乾道初舉進士對䇿論南北無可和之義出知德興縣專尚風化稍遷至宗正寺主簿卒為學邃於易著本傳三十篇後贈太師封崇國公陳咸仁壽人富文學遇事機敏登淳熙進士纍官利州路轉運判官吳曦反咸不受偽命事聞遷朝請大夫後以寶謨閣待制致仕虞剛簡允文之孫弟兄八人皆好學而剛簡最知名纍官利州路提刑有治績嘗與魏了翁范仲黼李心傳講學蜀東門外得程朱微旨著易書論語説以發明其義蜀人師事之嘉定中屢召不赴子圭知連州亦以文學知名張方字義立資陽人慶元間進士厯簡州教授知果眉二州提點利夔成都路刑獄兼四川制置使參議官以母老辭歸亷明剛介見義必為又為文戒後生好尚之偏務高忘本之病其言足針叔季膏盲有烹泉遺稿一百卷李性傳字成之舜臣子嘉定中進士纍官起居舍人兼侍講上疏論人君喪禮嘗進讀仁皇訓典帝從之纍官吏部尚書淳祐中拜端明殿學士參知政事同知樞密院事後以觀文殿學士致仕贈少保李道傳字貫之性傳弟讀程氏書玩索至忘寢食登慶元初進士厯官著作郎篤於踐履氣節卓然出知真州提舉江東路常平茶鹽以惠愛著厯遷兵部郎中後出知果州道卒李心傳字微之道傳弟慶元初閉户著書以崔與之魏了翁之薦為史館校勘尋撰中興四朝帝紀後遷著作郎詔重修十三朝會要書成遷工部侍郎致仕所著書數百卷牟子才字存密井研人嘉定中進士為史館檢閲入對首言大臣不公不和六事次陳備邊三䇿理宗命宰相優擢之會史嵩之專政忌子才遂出判吉州後纍擢禮部尚書以資政殿學士卒鄧若水字平仲井研人嘉定間進士為太學博士奏數千言請正史彌逺之姦丞相喬行簡大駭即出若水通判寧國府數月又以言罷遂不復仕學務躬行嘗削木為主大書自古以來忠臣孝子義夫節婦之位歲時祀之黃申井研人開慶間進士授德安尉調樂安丞廉謹有聲元兵拔撫州索降狀其僚屬聨署以上申獨抗不屈牟應龍井研人子才孫嶽子咸淳間進士除淶陽州教授以對䇿忤賈似道調定城尉宋亡不仕父子自為師友詩論經學皆有成説元虞汲仁夀人剛簡孫為黃岡尉徙居臨川與吳澄友善澄稱其文清而醇晚始起家教授以翰林編修致仕與子集槃俱有文名虞集汲之子隨父居臨川天性孝友𢎞才博學纍遷奎章閣學士日取經史中切於天德王道者陳進經筵凡奉顧問隨事規諫論薦人才必先器識一時大誥册咸出其手有道園學古録行世卒贈仁夀公諡靖子安民知安福州虞槃集之弟性方正少與兄從吳澄遊嘗著非非國語時稱其有識詩書春秋皆自論著纍官湘鄉州判官有巫稱神降者州長吏皆厚贈之槃訊得巫所為狀召鞫之並其黨繩以法人服其明明杜諒資陽人洪武中貢生授莊浪令升知通州有才幹太宗渡江一夕成橋論功升陜西參政黃貴資陽人洪武中舉人知濮州升監察御史以直諫著蔡道成資陽人洪武中貢生纍官知長沙府遷河南布政使所在皆有治績鄧謙州人建擢浙江元年任滁州同知厯戶部郎中布政秉性剛直才識過人居家持正訓子孫恪守彝倫鄉人化之向敬州人永樂進士厯官大理寺丞讞獄多平反守武昌有政績卒僚佐檢其遺槖惟圖書衣衾而已李蕃內江人永樂間舉人博涉羣書授漢中訓導不就洪熙改元上端本十六䇿敷陳切直宣宗即位擢兵科給事中差視沿邊城堡還言關堡虛空請城獨石等處清戎河南獻安養軍民十餘事有奏議詩文若干卷汪洋字仲寬資陽人貢士任蘭州訓導勤於教士都御史薦任肅州衛學博重修學校率勵諸生後告歸洋為人謙和平易處已接物事親交友居官臨事始終一致無可議者李裕中資陽人授湖廣荆州府推官涖政亷明豪強斂迹厯雲南副使擒剿夷寇邊徼晏然冰蘗之操始終如一李芳州人拜監察御史論劾無所避正統間按貴州會計河等寨苗賊叛芳一鼓平之撫其脅從諸苗化服蕭儼內江人景泰間進士厯刑部郎中審録多所平反升雲南參議河南參政時州官不法逮巡按守巡官至京惟儼素有風力得免餘皆被黜尋升貴州左布政使奏請頒樂器增解額俱賜允後致仕卒所著有竹軒稿三十卷集皇明風雅廣選五十卷田玉內江人監生景泰間知桐鄉縣以軍功升瑞州知州敦尚質朴政先惠愛一介不取士民懷之李臨安內江人景泰間進士厯戶部員外博學工詩賢名蔚起冡宰尹旻甚器重之卒於京旻親臨哭弔惜其未大用云張玉林內江人幼以道義自重馬湖土官安鼇聞其名延之師位為置産築室居之固辭而返景泰間成進士疏言七事知夀張縣以古道化民不任刑法升知州卒於途有靜庵集及語録鄧本端州人景泰間進士拜監察御史有文武才成化間劉千斤等作亂僭號命本端督諸軍討平之升陜西兵備副使劉時斆內江人天順間進士任山東僉事齊魯大飢時斆抗議借公廪以救荒歉嚴兵操以待調發巡撫題允行之以勞瘁卒於官劉元仁壽人天順間進士授主事厯雲南左布政清白自持惠政可紀里居時有巡方至其家留之食惟肉二簋菜二品巡方敬慕之贈聨青菜芳名逺緇衣世澤長李克嗣內江人成化巾進士任嶽州通判府治去倉所十餘里小民憚暑難於肩運克嗣為植柳道旁遂名李公隄纍官河南布政使時值大飢多方賑救民賴全活巡撫南京開白茆港以通舟楫行人便之遷兵部尚書參贊機務卓有風猷劉瑞時斆之子少穎悟父奇之勉以聖賢之學登成化中進士武宗即位疏言端政本九事逆瑾亂政誣以朋黨勒致仕奉母寓楚之澧州瑾誅詔起山西提學副使服闋補浙江以復古明道為己任纍官南京禮部侍郎瑞厯事三朝終始一節所著有改本三國志童觀録幼學稿敷納稿禁垣奏草澧南録雜序記碑序志論序志論議賦頌銘贊啓古今體詩若干卷藏於家汪藻內江人幼以奇童稱七歲補弟子員成化中登進士由翰林厯參政首劾汪直王越開邊釁立西厰章上罷厰遂貶直越朝寧肅然蕭翀內江人成化間進士官至右都御史總督兩廣軍務厯官四朝聲望赫奕居家儉素自持鄉閭重之高齊南內江人由舉人任嶽州府通判屢多善政甚得民心以子貴贈戶部侍郎陳心學仁夀人安貧好學不踰繩檢潛精易理著易經約解深得朱程理要以數奇不第胡榮井研人成化進士任刑部主事升雲南僉事通達治體獄無寃民後歸里以經授生徒多所造就馮積祿資陽人任山東沂州知州清介剛方有趙清獻風內擢部曹以剛直忤權貴拂衣歸結廬於水東武岫岡號水東居士足不入城市者三十年以詩書自娛尤篤於行義族有商於滇而道卒者積祿質田得資付其子俾扶櫬歸御史繆文龍亦以清介自勵聞積祿高節造廬訪之歎服欽重立石碣題詩褒美焉王一言內江人成化進士厯都御史巡撫陜西威望儼然鄧應祁字永卿內江人令楚麻城亷潔豈弟吏牘盈前不移晷而事竣尤好士折節下之麻城紳士公評謂政學兼長古人罕儷云宋有文州人成化間進士厯都御史巡撫陜西黜姦去貪法紀肅然致仕歸囊無餘物第宅一仍其舊人多其廉而子孫亦甘守其貧云高公韶字太和齊南子性警敏負奇氣年十八舉於鄉𢎞治己丑登進士授撫州推官徵為御史按河東東粵秉正嫉邪獨持風裁霍文敏韜偷祭酒以訓皆出其門下南海稱名御史惟公韶為最比還京有中貴豪戚謀襲柳安逺侯爵公韶執法鞫之又疏論王瓊忤旨謫富民縣尉量移潯陽令嘉靖改元詔復御史會有疑案三司不能決公韶力剖其枉獄遂白全活千人俄以母疾歸母卒躃踊幾絶久之復起升戶部右侍郎懇辭致仕優遊林下二十年夀八十四卒所著有邑志補遺讀史抄高氏家訓張潮內江人正德間進士厯禮部尚書兼翰林學士以文章知名當時德器溫醇操履端正縉紳稱之張元電州人負奇氣有風裁初為御史彈劾無所避忤閹瑾改刑部主事後遷知保定府武宗南狩江彬以無賄故誣繫獄弗屈尋奏釋之改處州值黃巖賊起諭以禍福賊即遁去郡人感而祀之後免官家居十三年卒有石峰書法文集十餘卷劉望之字商霖內江人厯官南大理卿剛正有為初以給諫敢言為時宰所忌謫魏縣丞久乃參議貴陽撫戡苗夷有功轉晉布政使劾奏寧河王奪其祿入覲不持一錢嘗語人曰凡心上忍不過理上解不去法上行不得者決不可為卒年八十賜祭葬所著有一巖文集正韻便覽魏縣志等書子翾翲俱登進士厯官有聲為時望族云劉翾字元翰望之子嘉靖壬戌進士令渭南多異政召入為御史敢言極諫豪貴斂迹後備兵浙江以討倭功受上賞晉大參與時相議左嗾其黨劾之而歸有西臺疏草若干卷藏於家趙貞吉內江人少穎悟絶倫讀書青神山有文名登嘉靖乙未進士試翰林庶吉士第一厯學士大司成立朝謇諤遇事慷慨廷斥嚴嵩誤國謫戌嶺表隆慶初詔起侍經筵前後進講深切治理皆見嘉納進大學士毅然以天下為己任與首相持議不合引歸率其徒講明理學四方從遊者甚衆萬厯丙子卒諡文肅詩文與楊升菴任少海熊南沙稱蜀四大家趙占字吉卿內江人與文肅公同登賢書筮仕華容令適湖泛隄圮豪右兼並為之正疆界復流移容民尸祝之已刺秦州丞襄陽以母老乞養人稱其孝家居不營生業惟以課子為事長子從先舉癸酉鄉試以文學孝行稱未仕而卒子孫世其詩禮焉陳祖舜州人授麻城教諭遷漢中教授為人剛介亷直在麻城奏劾御史不法狀在漢中奏保去任知府曹子徽復任其氣槩才負類如此嘗著覆瓿集若干卷趙雪航重之贊曰學博追聖賢之緒文富究經傳之義秋水淡雲泊乎素志寒岩古柏凜乎義氣張萬鍾州人任高安令高安舊俗新令至率有銀器為供具萬鍾辭不受更為其民償逋負民德之及憂歸鄉居不履城市二十年卒子孫發其篋笥惟書籍而已高鏞字京甫內江人初以平陽令徵拜御史按江右時分宜柄政鏞行部不修私覿又逮其家不法者無少徇竟以此失歡落職外補纍官南曹郎遂致政歸篋無長物庭鮮干謁其事關鄉閭利害者則侃侃言之里人陰受其福焉馬呈圖內江拜監辛酉鄉薦筮仕鄠縣令治行卓越御史巡按貴州廣西亷明方正所在人思至論列謀議關切綱紀有古埋輪風陰武卿字定夫內江人七歲能文弱冠登省試第一明年成進士以刑曹郎僉關中學憲冰鑑絶人分守江右九江鄱湖盜藪為之一空尋以陜西布政司入加太常卿會舉籍田郊祀饗陵諸大典善為威儀進止甚都上目屬之未幾巡撫保定又未幾協理院事厯侍郎六載晉南司空改大司馬焦勞體國旋以疾卒所著月溪文集若干卷皆經世大略馬升階字汝弼內江人領鄉薦應禮部試聞王陽明講學東南毅然向往購其語録誦之有當於心遂決意性命之學謁銓授武陵令豪滑斂手招貧民復業者三百家尋以直道忤上官歸士民刻像祀之生平潛心理要垂老不倦所著有宜山集略省躬慎思二録易義會通二氏旨要諸書合十餘卷行世鄧繼曾州人拜兵科給事中上急修省惜名器飭戎政正禮弭災諸疏又劾戎將之不職者皆見嘉納隨又劾宦官擅權下獄謫金壇縣丞在治復廢田三千餘頃溧陽崇山民聚衆為亂檄公平之升無錫令請寢增賦三萬餘石民立生祠尋罷復起令寶應擢知維摩州厯寶慶徽州知府俱有遺愛宋翰州人任昆明令政尚寬平當路以吏事責之遂浩然乞歸居家嚴整以詩史自娛非公事不至公門縣令以金遺之固辭不獲後令解任翰盡還之封識宛然卒年九十餘蘇秉彞州人家貧嗜學厯學諭升國子助教所至有聲以母老奏改蜀府教授病革猶與趙文肅貞吉講格致性命之學至夜分乃罷明日整衣冠而卒龔懋賢字晉甫內江人隆慶丁卯與兄懋賞同科於鄉戊辰成進士令廬陵奏最選授御史按東粵懲貪勸亷海忠介公深服之時京師大旱詔求直言乃上五少三多疏謂天下任事之臣少朝廷心膂之臣少兵少財少公論少為五少天下刑獄多冗費多議論多為三多疏入報聞觀察河南為忌者所中遂堅意求歸所著書有明法堂稿學業通古本參同注疏蕭如松字心甫內江人舉孝廉任貴陽司理擢留臺侍御防江視屯積弊一清會礦稅起虐璫煽焰監司守令被逮纍纍屢疏論救言甚切直纍官至大理寺丞所著有留臺疏經制要略洗寃要覽諸書周嘉賓內江人癸未進士令范陽金溪加意拊循吏民懷畏厯升儀部郎首嚴各藩請封查勘文册以廣朝廷敦睦之典諸竇悉除宗藩賴之張堯臣字希夔內江人進士厯戶曹出守鳯翔多惠政備兵江防嚴捕剽掠長江賴以無虞遷雲南鳯酋授首堯臣與有餽餉勞厯升布政使滇秦皆俎豆之張季思字以誠內江人任御史京師大飢請發倉以賑僉憲關中值西夏變督餉不匱升山西參政愛恤商民議藩封諸事皆稱碩畫請告甫三月無疾而逝陳紀字維修內江人舉孝廉由溧水教諭遷大興尹尋主戶部河南司事紀體貌碩偉江陵相張居正嘗於朝班見之期一識面謝不往居正有牡丹園園丁負逋紀置於法朝紳甚壯之高察字汝哲內江人仕至廣西布政使以不赴江陵父喪注年老休致歸時年四十有五察歸儲書虛白樓蒔花種竹不問戶外事論者謂其淵博似子長汪洋似叔度清約似淵明云馬魯卿字道傳內江人登進士除盩厔令語客曰吾不解為今令也客曰稍刓方為圓耳答曰方可刓乎隨請改為松江府教授纍遷鳯陽守繼補溫州吏治整飭入為水部郎外轉雲南按察司副使未幾致仕歸以子鳴鑾封中丞馬鳴鑾字君御內江人幼從大父宜泉公口授經史輒能成誦趙文肅貞吉一見嘆曰此國器也登萬厯甲戌進士歷右都御史兵部侍郎總督宣大卒於官鳴鑾揚厯中外偉績甚多所著奏議及籌邊尺牘鳯麓稿總若干卷鄧林喬字子正內江人纍官至僉都御史巡撫大同在邊三封名王十經貢市勞勩甚著晉總督陜西三邊軍務命至而林喬卒已旬日著有平旦悟言三封録等書何起鳴字應岐內江人以盩厔令徵入禮垣尋掌科事請蠲逋負帶徵者以萬計奉使入蜀請減川西溢額課革金堂黃灘魚塹桑梓賴之纍官至大司空提督壽宫所省財用無算屢疏乞歸上勉徇其請時二親猶無恙朝夕承歡里人以為榮又以賜金盡推讓諸弟其天性孝友如此及卒邑人請於當路建專祠祀之所著有蓄德要覽教言奏疏諸書父祥亦以理學崇祀蕭柿字子先內江人侍御世延子弱冠領鄉薦知昆陽州升楚雄同知以迤西督餉報最遷升澄江知府以清白稱郡多礦利毫不染指梅友松內江人任工部郎營繕悉當擢參議纍官延綏巡撫嚴守備勤訓練諸番懾服晉都御史兼兵部總督三邊條上十二事皆報可旋致政歸徜徉里閈所著有奏疏九子山堂稿藏於家周世科內江人進士居郎署最久政府冢宰俱同年人謂一通候京卿可立至世科終不往尋補僉事未任而卒子永豐能世其業余之禎字善先內江人弱冠舉進士起家襄陽司李吏治精謹以卓異稱仕終甘肅巡撫籌邊禦番功在疆域賜宴紀録士大夫榮之鍾應麟字孟仁內江人厯知宿州宿值歲旱民半流徙應麟多方慰撫民獲安堵中州紅賊陸梁擒其魁劉養性等數百人以卓異紀録焉張應登字玉車內江人厯吏兵二科給事中任山東憲副以邊才調龍右應登性慷慨風裁峻整在諫垣日多所論建如請兵食清戎政罷楚師置三省總督核東征功罪論西討戰撫機宜皆能稱旨時稱為名給諌張問達字德孚內江人七歲能文由欈李令入為御史論蒲州相左遷浙運判聘主書院分校鄉闈皆得人以萬安令起南戶部郎條上七議皆允行之馮玶資陽人天啓辛酉鄉薦初授浙江武義縣令縣舊無城郭寇賊竊發民苦之玶捐修城垣周十里許民以無虞又俗多溺女錮婢公嚴禁之復刋示化諭民革其俗纍官金衢二郡同知郡人思其德建祠祀之王範字慕吉內江人崇禎辛未進士知丹陽縣操持清白遇事勤敏公餘寢處廨後一室三年未嘗入內行取御史巡按浙江風裁峻厲以忤時相轉僉事蜀亂寓居丹陽丹人素德之歲時贍送薪米不絶子于蕃于宣俱登科第徐佩弦仁壽人崇禎辛未進士知崇仁縣在任八年興學造士潔已愛民值歲屢歉賑活者以萬計行取南部主事尋升撫州知府因寇變歸里為人慈祥豈弟能敦睦桑梓夀八十五終直隸綿州漢杜貞綿竹人誦書百萬言嘗言兵事於翟酺酺免後尚書令與司隸劾之復逮詣獄貞上章救之受鞭笞六十獄中明酺無罪京師壯之以時衰亂散財施宗族不應公車辟卒於家劉寵字世順綿竹人明公羊春秋上計除成都令政教明肅治安漢郪郿皆著績遷牂牁太守自乘一馬布衣蔬食儉以為教吏人為之立銘景毅字文堅梓潼人太守丁羽察舉孝亷司徒舉治劇為沇陽侯相高陵令立鄉學以禮讓化民遷太守以子顧師事少府李膺膺誅自表免官久之拜成都令遷益州太守值益州亂後毅至恩化暢洽鳩鳥巢其廳孕育而去三府表薦徵拜議郎自免歸劉焉表拜都尉為人亷正疾淫祀敕子孫惟修善為禱仁義為福年八十一而卒楊充字盛國梓潼人少好學求師遂受古學於扶風馬季長吕叔公南陽朱明叔潁川白仲職精究七經其朋友則潁川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海內名士充還教授州里嘗言圖緯非聖人之學不以為教舉孝亷為郎卒邊韶字孝先梓潼人教授生徒常百餘桓帝徵為大中大夫景鸞字漢伯梓潼人少遊學七州遂明經術還乃撰禮略河洛交集風角雜書月令章句凡五十餘萬言太守命為功曹察孝亷舉有道博士徵不詣然上陳時政得失又戒子孫以人紀之禮及遺令喪葬務從節儉云韓揆字伯彥綿竹人為邑令綺裒主簿時黃巾賊入界裒為賊所得見害揆殮葬畢詣從事賈龍求兵討賊大破之揆曰本報令君而茍自活非忠也乃自殺鄭度綿竹人劉璋用為益州從事昭烈據涪城度謂璋曰彼客我主軍無轉餉仰給於我今既與我仇不過野榖是資若盡驅巴蜀梓潼之民內守涪水以西倉廪野榖盡行燒除堅城勿戰不過百日彼將自走走而截之此成擒矣昭烈聞而怒之璋不從蜀漢秦宓字子敕綿竹人有學善談辨昭烈定益州彭羕薦宓乃辟為從事祭酒踰年無所知名建興元年丞相亮領益州牧選士以宓為賢迎為别駕尋拜左中郎將長水校尉居無何吳遣使張溫來聘亮甚嘉溫歎曰江東菰蘆中何意生此奇才因欲見宓於溫溫將還設供帳東門外百官往餞宓獨後往亮數使使促之及至與溫問答如流溫大敬服纍遷大司農卒晉李驤州人與成都杜軫俱為尚書郎齊名一時每有論議朝廷莫能折人稱蜀二郎南北朝李膺字公輔州人有才辨為涪令劉季連反刺史鄧元起討之糧乏時歸附二萬餘人或説以民多詐藏若檢籍發之所獲必厚膺諌曰前有嚴敵後無繼援小民始附於我觀德若糾以刻薄衆心必離雖悔無及膺請出圖之乃率富民上軍資米得三萬斛宋楊允恭綿竹人少倜儻任俠初丁德裕討賊至州允恭以䇿干之署綿漢招牧巡檢太宗時捕海賊纍官荆湖江浙都巡檢使允恭有心計好言事子可咸平初進士善屬文有吏幹詔試戶部鹽鐵判官厯知洪宣潤夀潭等州纍遷至都官員外郎弟告纍官右諫議大夫授江寧知府魯交字叔達梓潼人刻苦力學長於詩仁宗手録交清夜吟賜天臺山僧嘉其清絶也仕至虞部員外郎楊繪綿竹人少奇警讀書五行俱下登進士第通判荆南府遇事迎刃而解仁宗愛其才神宗時知諌院改兼侍讀繪以諫官不得其言則去不拜後纍官翰林學士繪表裏洞達一出於誠為縉紳所重宇文之紹綿竹人舉進士為文州曲水令神宗朝上疏論時政不報遂以太子中允致仕歸年未四十自強於學不易其志司馬光曰吾聞志不行顧祿位如錙銖道不同視富貴如土芥今於之紹見之矣張浚字德逺綿竹人登進士第高宗時平苖劉之亂有社稷功秦檜柄國惟浚始終不主和議纍官僕射知樞密院事封魏國公卒諡忠獻張栻字敬夫浚之子穎悟性成以古聖賢自期仕為直祕閣浚開府治戎栻內贊祕謀外參庶務嘗以軍事入奏孝宗異之召為吏部侍郎每召對皆言修身務學畏天恤民等事後知江陵府卒諡曰宣栻聞道甚早與朱熹為友熹嘗許為大本卓然學者稱為南軒先生淳祐初從祀孔子廟庭著有南軒文集傳世張杓栻之弟以父恩纍官知袁衢二州有能聲提舉湖北嘗入奏事孝宗甚喜杓天姿高爽吏材敏給纍官端明殿學士知建康府又尹臨安南渡以來京尹以杓為首子忠恕治郡以賢能著官直祕閣在朝纍陳諌疏有祖父風張洽栻之孫嘉定中揚州司理參軍有獄囚久不決洽鞫得其情杖殺之有弟兄爭財者洽諭之曰訟於官祗為吏胥計且冒法以求勝孰若各全手足之愛乎辭氣懇切訟者感悟後為白鹿洞書院長選諸生好學者日與講論務發明理奧云元鄧文原州人博學善書初為杭州學正纍官翰林待制出僉浙西亷訪司事時有吳興民夜為長身者刺其脅而死有司執值初更者使服文原鞫之得真殺人者人以為神後遷集賢直學士兼國子祭酒卒諡文肅有文集行世子衍浙江儒學副提舉明霍繼宗安縣人永樂貢士擢御史剛正不阿天子器之巡按山東摘姦除弊風采赫然祀鄉賢祠金爵州人天順間進士任太僕寺纍官廣西左參政素履純篤不言人過居官以仁恕為主所至有聲金獻民州人進士厯湖廣按察使為政剛明不避權幸以忤逆瑾罷歸尋召進都御史刑部尚書掌院事持大體不事瑣屑糾劾彈舉臺中肅然進兵部尚書嚴明精察銓次武籍犂然不紊金臯州人正德辛未進士選庶吉士授翰林檢討厯右春坊右贊善充東宫日講官多啓沃大禮議起叩閽伏蒲逮繫錦衣獄仆於闕廷謫荆州府推官歸以詩文自娛正直端方為世楷模所著有谷菴詩稿金深州人少負大志博通今古善詞章弱冠領鄉薦中嘉靖癸丑進士觀工部政郎請告歸足不出户手不釋卷性嚴重以規矩自間鄉人多敬憚之年八十無疾而卒著有緋江詩集余貴州人舉孝亷由司務厯員外知黎平黃州二郡化夷弭盜鑿井修城歸里後所行種種皆造福事鄉黨人多德之李美字充實州人進士知新淦縣值宸濠變與義兵攻截江上破其軍入為御史張雲翰德陽人由進士任給事中上宰執書拳拳以進拔人才遵崇正學為説又以䇿獻大司馬王驥極盡備邊之方仕至山東參政羅世守德陽人以明經令江州有富家被誣告者乘世守出投狀輿中展視曰午飯一餐代金三百世守遂書狀尾曰做官受私賄虧心又害理敢因一餐飯喫盡子孫米辭不受尋以母老歸民像祀之易以巽安縣人萬厯甲戌進士厯雲南亷使決獄明允加大理寺卿歸卒祀鄉賢趙宗普字聖符安縣人由鄉貢仕潛山令邑當流寇要衝兵凶相繼宗普抵任冒死為民請命正供悉免流亡漸集尋攝宿松篆一以撫字為先往來兩邑士民均感其惠逾年實授宿松為政愈從寬簡遂舉清亷第一有棠陰兩邑皎月一簾之句升儀部郎卒入名宦祀鄉賢劉夔綿竹人性謹默不言人過不以勝氣加人好義樂施終身如一子舉鄉薦孫宇揚由舉人官至大參宇烈兵部侍郎宇亮官大學士人稱夔積德所致劉宇亮字蓬玹夔之孫登萬厯己未進士選庶常平生倜儻好竒以經濟顯又素慕里中張魏公之為人凡館中經筵日講以及起居注誥敕撰文等事一切不與同官皆笑之間居無事率子弟童僕角射或親與格鬭以習武事纍官大學士為首揆戊寅督師至真定與總督孫傅廷合營首劾天津帥劉肇基逗遛詔即軍中斬之亮又再疏請寬奉旨切責罷歸長才逺志未竟厥施公論惜之李冕梓潼人天順間進士成化中厯湖廣僉事征剿辰靖叛夷擒獲水西寇有功升福建副使持憲有聲尋升陜西按察使嘗與周瑛講明聖賢之學學者稱崇岡先生有崇岡集直隸茂州宋謝方叔威州人嘉定中進士厯監察御史多所建明纍遷給事中兼侍講淳祐中參知政事封永康郡侯拜右丞相兼樞密使進封惠國公明沈連州人有隱德永樂中上封事請設州學始建學立師風化以開祀鄉賢支鳯州人性剛介孝友以明經授乳源令清慎自矢民受其福解組歸士負笈從之教人以躬行為本不屑屑文藝家居端整雖燕居無惰容晏子綸字仲誠州人茂僻陋未有科第乃奮然負笈逰成都交諸文學講究經義遂中𢎞治乙卯鄉試授陜西乾州知州為政有古循良風後改雲南賓州致政歸惟杜門訓課子孫雖臥疾不倦云唐宗智州人歲貢以孝弟聞仕廣東羅定同知有治績陳朝儀州人嘉靖中舉孝亷知阿迷州升雲南府同知性醇厚政多愷悌以憂歸杜門不出鄉里高之吳洸威州人由選貢厯武定府同知有治劇才騰永之役以築城功受上賞初為臨潼令考最擬授御史會臺長以資格撓之遂遷州守云吳礖威州人歲貢厯河東運副鹺政肅清歸里時止圖書數篋鄉人重之直隸達州宋杜仁偉州人為馬步軍都指揮淳化中李順作亂仁偉罄家資給官軍討賊斬獲甚多以功授檢校太子賓客達州别駕王汲州人嘉祐中嘗作天將以夫子為木鐸賦多士以為矜式因呼王木鐸後舉進士官至梓州通判多政聲弟昌熙寧間進士任黔江令元豐中景靈宫成昌作賦獻之辭極雅麗又有太平讜議三江集李傅州人元豐間進士欽宗居東宫時傅與耿南仲俱侍講及即位賜水晶斧以旌其德後知漢州羅戩州人以剛直聞遊太學進孫吳二書徽宗幸學集百官蔡京坐而談兵戩哂之仰視屋角觸怒歸自號觀光山人王汶州人任湖廣安鄉縣令撫字有聲歸家好善樂施鄉里賢之張大中州人經史百民一覽不忘人目為書厨宣和間舉進士授南浦令時稱亷吏纍官果州通判楊晨州人宣和初試禮部第一丞相趙鼎薦其才召試荆蜀形勢論除贊督府機宜撫諭西蜀吳玠餽遺過禮晨不欲阻其意悉上督府以佐軍用袁沔州人未冠遊太學靖康中金兵圍城上書言當東據成臯西臨沔池以鋭卒搗其巢穴則城下之師自解不報已而城陷沔歸漢中乃畫防險五事其後膺薦復條十二事力抵諛佞用事者忌之沔度不見用拂衣而歸王賓字觀國東鄉人紹興十八年王佐榜進士授從政郎大安軍教授致仕歸以亷孝化其鄉人時號其地曰觀化里明唐仁字秉元州人景泰中舉孝亷任吏科給事中封駁內外章奏斥廷臣不職者人多憚之袁達州人成化丁未進士性聰敏讀書一目成誦廷對日試喜雨詩稱旨授庶吉士黃元白字用章州人嘉靖丙戌進士擢兵科左給事中力詆權貴幾斃廷杖者二尋分守陜西邊境肅清去日軍民至泣下所著有文集若干卷藏於家王以修州人嘉靖中進士厯松江嘉興二郡太守劑徭賦決嚚訟政聲卓然衛承芳字君大號淇竹州人隆慶初進士厯吏部尚書加太子少保承芳聰慧嗜學善屬文工草書尤長詩律揚厯中外一以清白自矢歸葬日子孫至鬻田宅以畢喪事諡清敏崇祀鄉賢廖恆吉字思德州人進士由戶部郎參滇藩度支政事文章兩相濟云四川通志卷九上欽定四庫全書四川通志卷九下皇清人物成都府張吾瑾字石仙金堂人性純孝母疾篤日夕禱於神請以身代沈疴漸愈人稱孝感順治甲午科鄉薦第五乙未成進士授山東夏津縣令擢行人兩與文闈分校德州田司農雯武清李中丞煒皆出其門後致仕歸里非公事不出因都江堰為成都七州縣水利力請當事修三伯洞古埭里人德焉著有鵲符齋集邑人公舉崇祀鄉賢唐大陶成都人順治丁酉舉人康熙十年知山西長子縣以經術飭吏治公庭清暇有調鶴鳴琴之趣未久去官人皆惜之楊兆熊什邡人康熙己酉舉孝亷任湖廣漢陽令多惠政後解組歸里教授生徒原本經術粹然一出於正以上人物重慶府李芳述字贊芝合州人康熙十九年勇略將軍趙良棟從白水江入川芳述率先納欵隨大兵進𠞰吳逆餘黨收復滇黔纍官西寧總鎮擢貴州提督整飭營伍懾服苗蠻加太子少保卒於官贈太子太傅鎮遠將軍諡壯敏以上崇祀鄉賢簡上字謙居號石潭巴縣人性至孝幼值歲飢嘗孤身百里外負米養親順治辛卯舉於鄉知直隸巨鹿縣事以亷能擢吏部文選司郎中提學江南後補廣西右江道所入俸多分給族黨貧乏著有四書彚解行世劉如漢字倬章號雙山巴縣人順治乙亥進士選庶吉士受職檢討後補兵科給事中章數上皆報可纍遷副都御史巡撫江西未抵任丁外艱哀毁骨立尋以疾卒恤典甚優覃銓字公簡巴縣人癸丑歲貢吳逆迫以偽職銓百計逃免後家居授徒多所成就茍金徽合州人康熙甲子登賢書性孝友潛心理學初任廣東曲江令以卓異升廣西新寧州牧丁繼母艱慟甚抵家三日卒以上人物保寧府張思房閬中人纍官貴州黎平府知府改陜西鞏涼二府同知其守黎平時滇寇未靖思房折衝禦侮不少挫致政歸十餘年屢舉鄉飲大賓以上崇祀鄉賢劉沛先字棠溪閬中人性沈默寡言笑順治甲午舉於鄉任山東東阿令擢刑科給事中遷兵科掌印給事條陳蜀中轉運情形蜀疆無匱乏之虞秦民省轉輸之苦聖祖嘉納之後以目疾歸里尋卒王來熊字夢叶劒州人順治丁酉鄉薦性剛介任河南新野令宦歸囊槖蕭然趙𢎞覽字僧照劒州人少遭亂未嘗廢學中順治戊戌進士任江西廬陵令以憂去補江南虹縣令有德政虹人感之祀名宦冉德廣元人康熙丙午舉於鄉避吳逆微聘逃匿深箐中賊劫其父德奔救臨以刃弗去賊義而釋之蜀平選陜西西寧縣知縣李先復字曲江南部人康熙壬子舉人初任山東曹縣令後補湖廣大冶縣有惠政行取浙命挽運江道御史厯官兵部左侍郎西陲用兵奉政歸囊軍需至巴里坤晉工部尚書雍正元年致無餘資然性喜施與每甘淡泊以周貧乏以上人物順慶府趙心抃字清章西充人壬子鄉薦任山西太平令報最擢兵科給事中章疏十上皆關國計條陳蜀省事宜尤中時弊解官歸杜門却掃鄉人忿爭者輒婉言開道多所感悟以上崇祀鄉賢郭榮貴字仲禹渠縣人性任俠明末羣寇蜂起榮貴首倡義率弟榮高及族里數千人築寨大斌山為保障計會賊吳應元驅衆二萬焚掠鄰水大竹將至渠榮貴詭詞約好乘機殺應元及左右數十人衆驚潰順治戊子秋賊楊秉印衆數萬踞禮義城與斌山對壘相持一載榮貴乘間走成都投撫軍李國英請為前驅國英遣總兵盧光祖馬化豹統兵從榮貴破之東北二道始入版圖陳瑺營山人中順治辛卯鄉試會多盜率鄉勇力保地方歲大飢與弟􅢔設場給粟存活甚衆後任湖廣耒陽令以賢能著耒人建祠祀之陳􅢔瑺之弟順治辛卯與兄同舉於鄉知河南郾城縣著有四書彚解行世高儀坤字寧一西充人性孝友順治甲午薦於鄉授浙江平陽縣令卒於官無歸窆資平陽民號泣斂賻送櫬歸里羅為賡字西溪南充人順治甲午鄉薦任浙江孝豐令民德之立祠祀焉擢行人致仕歸里馮天培字默佑西充人順治甲午領鄉薦第一任福建漳平縣知縣邑人德之耄年解綬還鄉值歲祲炊粥賑飢存活無數陳汝昌營山人性嗜學值明季避兵奔走雖流離中手不釋卷順治丁酉科領鄉薦任江南太平令有賢聲黃世臣字柱伯西充人順治丁酉舉於鄉康熙二年任夾江教諭日以經術與諸生相切劘後遷江南來安知縣時值旱蝗世臣募民捕蝗滿一石者給錢一緡稻五斗民爭捕以獻蝗不為災陳扆字補袞西充人順治丁酉舉人任山東巨野令一介不取民稱其亷蒲昌迪渠縣人順治丁酉舉人任山東鄆城令升山西絳州牧鄆人籲留不忍其去昌迪喜奬拔後進鄆城庶常魏希徵絳州庶常李復泌等皆於布衣受知後致仕歸卒於道絳人請入名宦王之麟字呈祥西充人康熙癸卯鄉薦寡言笑人不敢干以私任廣東番禺令為政不尚苛察彭際盛字於斯南充人康熙六年以明經任河南武陟令邑有沁水厯為民患際盛捐金修築隄塹民得安堵歲丁未蝗蝻為災深夜虔禱蝗竟飛去後乞休歸民立祠祀之以上人物敘州府樊曙字旭東宜賔人明末以門廕襲指揮僉事博通典籍寇亂後家業蕭然躬耕養母弟㬚流寓滇中老艱嗣息遣人迎歸為之置妾生一子吳逆迫以偽命力拒之年七十二卒著有楚澤吟諸刻鄉以上崇祀賢宗敦一字凌霄宜賓人前明進士知江南旌德縣愛民好士厯江南巡按督學御史國朝督學順天官至通政使李迎晙號青梅隆昌人前明進士順治間工部右侍郎德望政績卓然稱異蕭韶屏山人歲貢生讀書天魁山一時從遊者悉經明行修之士當事額其廬曰儒林師表後任開縣訓導李謨字采臣富順人中康熙甲子鄉試性孝友尤慷慨好義與友人楊文茲北上文茲卒於都謨為經理後事扶櫬回籍後任河南太康令有亷名尋致仕歸依然寒素平居言動不茍教授生徒每以收放心為急務又謂聖狂之别須於起念處省察嘗設教峚山學者困稱峚山先生鄒宗浩屏山人康熙戊寅歲貢甘貧嗜學白首弗衰胡相才屏山人康熙己卯鄉薦力學不倦為一邑師表赴選中途病卒人甚惜之樊敘倫字仲彞宜賓縣貢生幼失父奉母避吳逆亂荒山乏食覓糧數百里外為賊所得監守甚嚴無計得脫會兵辨覓能書者敘倫稍見禮重遂以老母在哭告兵辨感動至深夜給米少許縱之潛逃及抵母所母病且死敘倫呼搶大慟具棺殮時平扶舁歸葬人稱其孝陳暻雯字杲亭富順人康熙乙未進士家貧力學自號破愚子任廣東樂昌令居官數年懷清履潔昌人稱其有守以上人物夔州府程正性字存存萬縣人順治十六年以貢生任北直開州州同升河南睢州牧建學宫置書院歲捐俸教育貧士遷雲南永寧同知以疾卒於官以上人物龍安府張偉竒字素臣松潘衛人性孝友喜讀書尢長於言兵康熙十一年拔貢因母疾侍湯藥不就選家居教授生徒多所成就又獻䇿當事撫綏蠻部逺人率服以子元佐貴誥封榮祿大夫賢以上崇祀鄉直隸嘉定州杜廷玉州人登甲子賢書性孝友文行高卓尢喜曲成後學生平好義樂施州人慕之合請入祀鄉賢朱軫裔字三瞻嘉定州人性敦孝友厯患難如一康熙己酉登鄉薦任浙江景寧知縣慈惠愛民人咸戴之厯任十五年升南城兵馬司指揮使悉除陋弊尋以年老乞休至邯鄲道中病卒鄒養浩榮縣人制行端方康熙九年入庠後值吳逆據蜀屏居抗節不赴選舉國朝恢復後始出應歲試食餼後登歲薦任重慶府學訓導課士之法以忠孝為本文藝次之士習丕變至今有道學之稱吳良璧字夢星榮縣人康熙壬子副榜吳逆叛據時綱羅人士良璧隱居萬山中教授生徒康熙二十一年司鐸丹稜講學不倦楊蒧字聖與犍為人康熙辛酉領鄉薦由江安教諭卓異擢湖廣宜章令兼攝鄰邑俱有亷聲解組後宜民立生祠祀之袁開聖峩眉人康熙丁卯舉於鄉家貧力學不倦邑人師事之由成都教授卓異遷江南泰興令解組後泰興人繪像祀之以上人物直隸邛州植敏槐字稚青邛州人順治辛卯鄉薦明季寇患邛郡書籍多燬敏槐家藏禮記存要一書潛心研究承平後邛郡諸生治禮記者皆賴其傳築室白鶴山南教授生徒二十餘年學者稱鶴山先生物以上人直隸潼川州雍正十二年升為府張泰階鹽亭人順治辛卯舉於鄉幼值寇變父被虜泰階哀求請代賊感動并釋之事繼母孝撫諸弟友愛甚篤鄉里稱之張象翀字六飛安嶽人康熙甲辰進士父母早逝每值忌日致奠盡哀如初喪始宰饒陽力請裁減驛站邑多偷盜亷得首惡盡法治之盜風頓􅒚擢知膠州設養生堂葺藥室撫嬰療病全活甚衆所著有處和詩集陳四聰鹽亭人事親至孝孺慕之思垂老不忘生平以誠信自矢尤好奬進後學士林奉為楷範張烺字沖寰遂寧人教子鵬翮成進士厯官中外烺屢膺封典淡若寒素刻感應篇修萬里橋廣行善事康熙五十二年入都門敬祝聖祖六旬萬壽慰問良久有八卒賜養志松齡扁額年八十賜祭葬祀以上崇鄉賢楊應魁射洪縣人騰龍子精通滿漢文字戴本朝特用任敘瀘道實心愛民民咸感至今祝頌李仙根字南津遂寧人順治甲午登賢書辛丑成進士廷試第二授翰林院編修康熙六年安南黎維禧奪高平莫元清搆怨侵殺維禧奪高平元清奔皈朝聞仙根皈朝滇界也廣西總兵王會奏安南正使以內祕書院侍讀加一品服充敕諭黎氏移元清於廣西南寧府且致書維禧責安南臣工誤國十節往復千端安南君臣始奉詔後纍官戶部錢法侍郎生平工書法嫻文辭有安南使事紀要行世張鵬翮字運青遂寧人康熙庚戌進士授庶吉士由部曹出守蘇州遷河東鹽運使司歷兵聖祖仁部左侍郎康熙二十六年皇帝南巡特簡浙江巡撫額轉兵部右侍郎督學江南秉公校士尋欽賜懷冰雪扁欽命回遷都察院左都御史江總督又籍祭告江瀆補授兩命查西安蠲賑改授河道總督兵部尚書加進吏部尚書太子太保在任八年轉工戶二部尚書太雍正元年晉秩大學士兼吏部尚書卒於官子太傅文華殿賜祭葬諡文端周嗣胡字參兩號遁菴安嶽人年十有五補博士弟子員留心帖括博涉經史纍躓棘闈隱居教授大為士林推服晚年廬於祖墓絶迹城市以詩文自娛彭士垣遂寧人康熙癸卯舉人砥礪家修楷模一邑以上人物直隸瀘州曾亮瀘州人康熙甲子舉人有同族孀婦子女孤貧流寓他邑亮移歸瀘郡經理其家婚嫁俱力任之授浙江鄞縣令視民如子力拯窮困逾年致仕歸琴書外一無餘槖李鳴珂字名玉合江人淹貫經史著述甚富以上人物直隸資州胡世安字處靜别號菊潭井研人少有異才事親孝前明進士選庶常分校禮闈典試兩浙世祖章所得皆名俊我學士遷禮部侍郎晉尚書皇帝擢為翰林國初典章文物以及厯律多所參定後官至大學士及卒聖祖仁皇帝賜祭葬廕恤有加王師保字元燮資陽人性亷靜以厚德著登前明鄉薦任五河令凡利民事多方區畫值歲國歉力請蠲漕米賑恤擢戶曹邑人扳輿泣送解組朝以原官督理鳯倉設法轉輸著有成績後寓五河年七十六卒民建祠祀之以上人物直隸綿州李鑑字涵白安縣人前明進士任北直永清令以戅直忤權貴調湖廣黃陂有禦寇功纍國遷宣雲巡撫總督宣大三鎮尋罷歸復起西夏巡初仍原官後撫當榆林告警鑑坐運帷幄不折一矢而靈州奏捷未幾寇復犯榆林鑑授方略大破之又濬河道賜祭葬豁賠糧剔弊除姦靈人深德之及卒廕二子張舜舉順天籍進士四川綿竹人順治六年授陜西蒲城知縣時蒲為王永強竊據暨底定城市一空舜舉招集流亡又慮兵民難以雜處建立營房兵民俱便邑境以寧白良玉字田生梓潼人幼有智計時土賊為害畫䇿捍禦庇護鄉鄰生平重義輕財於師友間一無吝惜順治甲午舉於鄉康熙七年任山西高平令減浮耗除雜徭善政良多歷七載以亷能行取考授科員抵京卒高平人仕於者為醵錢以助殯殮焉以上人物直隸達州唐敬一字慎齋達州人順治甲午舉於鄉厯官洮岷副使獄冇寃囚擬大辟者十七人久未決敬一訊得其狀後俱省釋又勘醴泉盜案全活無辜甚衆以上崇祀鄉賢四川通志卷九下
