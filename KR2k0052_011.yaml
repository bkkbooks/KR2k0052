body:
  text: 列女大禹娶於塗山生啓弗子凡十三年於外而塗山氏能教其子使著敬承之美焉迄今考其候人之南蓋葛覃卷耳之音實權輿於此也然則蜀中女德之貞有自來矣夫倡隨一室穆穆雍雍安其常也乃若孤鸞寡鵠所以矢從一之志禦強暴之侮者其節行不尤激烈耶蓋女史所陳遭逢雖異而貞靜同歸今當盛代旌揚之典不遺幽遐祠祀之隆用光俎豆此固宜載筆以紀其實矣即未經題旌者或出於詩書之門或出於編戶戎伍之內芳型所著遺徽彤管亦未可略也作列女志成都府漢敬同成都人適張霸隨夫之河南生三子二女霸卒葬於河南同曰先人廬墓在蜀義不可離乃率子女歸里課子成立女適人同以節終姚超二女超為廣漢屬縣長生二女長曰饒少曰姚未嫁值九種夷叛超見殺饒姚為夷所獲共詐欲飲水乃連腰沈水死見夢於兄兄依夢求之得尸以葬高氏漢州人張勝遠妻年十八夫歿甫半歲氏勵志守節備厯艱辛唐俞氏成都李希妻有軍校徐瑶從王建入蜀獲俞氏逼之俞曰吾夫嘗為進士爾安得無禮於我瑶以劒示之俞曰吾寧死瑶乃杖而遣之宋黎賢婦雙流宇文邦彥妻性嗜觀書能通大義勸相其夫督勵諸子子粹中厯詞掖諫垣皆所教云師氏彭縣人適范孝純建炎初遷蜀至方城縣遇賊孝純被害執氏欲犯之師罵曰我豈受辱者吾夫已死其速殺我賊殺之喻氏二女彭縣喻舜俞女舜俞客死京師二女無所歸依其姑以居苦節著名御史按行屬部甚為嘉嘆因擇所宜壻歸之陳堂前漢州王氏女歸陳安節歲餘夫卒守節事舅姑克盡孝養訓子新入太學旋卒撫二孫綱咸皆以篤學聞戚屬中貧者王為之收養婚殯甚衆族人尊之曰堂前元費氏灌縣人至正丁酉青巾賊入蜀肆行剽掠泣曰親恩未報乃不幸罹此賊害遂縊死明楊氏妙明成都人乾道妻年二十五夫卒誓不他適撫遺腹子昭為娶參政汪藻姊生子相昭卒汪時年十六或欲奪其節汪哭曰吾姑不負吾舅吾豈忍負吾夫姑媳孀居撫相成立事聞旌表文氏郫縣人李孝先妻夫歿竭力事舅姑撫幼子光登科第苦節厯三十餘年永樂間旌表關氏成都人汪源妻源以從戎卒於邊關年二十子懷甫周歲母子相依獨處一室或欲奪其志關剪髮以示曰此可誓也年八十八卒邵氏成都人適向升陽甫期年夫溺死誓死守節撫遺腹子事舅姑厯七十六年終楊氏成都籍莆田人周繪妻年十八守節撫妾子成立孀居極嚴夫之昆弟子姪亦不得見躬自紡績為子婚娶年七十卒曹氏成都人戊子舉人蔣芹妻年二十七守節多方訓子長三近次三益俱成進士季三畏授恩儒官封太安人年七十三卒都御史王督學胡為序賢節傳方氏成都人知縣方璈女桂瑄妻瑄卒無子氏時年二十四守節事舅姑以孝聞厯五十餘年李氏成都人庠生周選妻選病劇以老母幼子為託後家益貧氏養姑撫子不失溫飽皆女紅之力也年五十七卒熊氏成都人王鳴珂妻事翁姑最孝賊破城氏被執逼汚氏曰我名家婦豈屈身從汝遂大罵賊殺之程氏華陽人廩生楊琯妻年二十九琯亡奉孀姑何氏撫兩孤成立年七十有四卒學使以雙節表其門劉氏華陽人徐大美妻年十九守節撫孤起宗補弟子員恤貧扶危時有負庫夫官銀者將鬻其妻氏代償全之事聞旌表趙氏華陽人宋元嗣妻年十九守節撫遺腹子成立有司給米帛以助苦節旌其門胡氏華陽人庠生楊惟畏妻夫卒胡年十九遺腹生一女胡翁就其舍相依為命訓以古截耳斷臂諸節烈事氏守父訓誓不他適撫女及筓贅壻生孫年七十三卒潘氏參政潘璵孫女華陽舉人賈席慶妻席慶赴公車卒於京櫬還潘號哭治喪畢自縊死事聞旌表劉氏華陽人戶部主事美之女程時信妻年十八守節旋喪親姑事繼姑極孝撫遺腹子入泮苦志三十餘年邑令旌其門曰操比冰霜李孝女華陽諸生李廷幹女母劉早卒繼母楊撫育備至年十三楊病篤氏割股以進母病漸愈事聞旌表鄭氏溫江人何志聰妻初未有子為夫買妾夫止之鄭曰常見妒婦絶夫嗣者多矣我不忍效之後生二子妾生一子夫歿均産婚娶或問之鄭曰夫託乃爾庶有顔面見於地下也彭氏彭縣人庠生葉馨妻年二十五守節撫孤世蓁領正德丙子鄉薦蓁卒又撫一孫成立訓以詩禮能世其家直指使檄縣按月給米一石年八十七終謝氏成都林景元妻景元卒謝年二十四遺子森甫半歲矢志守節為森娶韓氏森旋歿遺子軏姑媳孀居教軏登嘉靖甲辰進士太史楊升庵有傳徐氏溫江民田汝均妻夫故氏年二十三服闋詣墳哭拜歸辭舅姑還家堅卧水漿不入口七日死事聞院司表其閭李氏溫江人湖廣桃源縣令劉炅母夫歿守節教子成名旌其坊曰節操冰霜楊處子漢州人楊通之女正德初為流賊所執大罵不屈投水死李烈女金堂人李勝高女有美色許聘邑庠生彭尚仁鄢寇突至隨母逃難寇騎薄之李躍灌子潭死楊氏金堂人楊洪女適李仕俊甫二年值鄢寇至負兒逃匿至高土橋遇寇楊負兒投水死彭氏金堂人杜勝海妻夫死撫遺腹子皓成立後任無錫縣丞守節三十四年卒事聞旌表杜氏金堂人郭惟尚妻翁年九十杜調護曲至口舐潰癰事聞旌表黃氏遂寧人黃珂女新都楊太史愼之妻博學工詩文慎被譴雲南卒家人欲成喪黃曰幸而得貶卒天威尚難測以春秋大義自當藁葬未幾世宗遣使啓驗見青衣布袱上感動乃還原爵氏有文集行於世薑氏漢州人郭朝用妻年二十八而寡苦志四十餘年撫二子俱中嘉靖乙酉鄉試卒年七十有四楊氏新都人孫思孔妻年十八而寡姑憐其幼令他適氏不從事姑愈謹求孫族之親而賢者立為嗣備厯艱辛教子成立當道表其門曰貞心苦節趙氏新都人楊延學繼室年二十四而寡無子女有強之再適者泣曰吾從一終也前妻子瑱方在襁褓趙矢志撫之辛苦萬狀年八十六卒學使旌其門杜孝女簡州人杜季寬女性至孝母多疾遂不願有家內江殷憲副求以配其弟子襄不從託邑宰勸諭再三始許之未婚而子襄卒氏誓不他適奉母終身人稱杜孝女云夏氏簡州人李瑞妻羣盜入室氏知難脫密令夫遁去以身當賊受刃死羅氏簡州人李朝英妻年二十三守節教子成名五十二歲卒唐氏崇慶州人適庠生葉相家貧躬紡績以資夫學夫死無子有強其再醮者遂投井鄰人救免苦節終身黃氏崇慶州人寧川衛方從德妻年二十守節事舅姑撫幼子八十五歲卒鍾氏崇慶州人庠生梁拱岷妻拱岷卒氏青年守節奉旨旌表王氏崇慶州人王民悅女幼字庠生劉無我未婚無我卒氏剪髮削指誓不再醮詔旌其家李氏溫江人貢生任高妻隆慶初高除天門學訓攜李及二女同赴任後升萬載縣諭舟行遇盜虜掠長女絶裙投河死李隨之次女罵不絶口亦投水死次日三尸浮出面皆如生有司以聞建坊天門置祭田祀焉萬厯初御史孫請建三烈坊學使郭青螺有記林氏郫縣人武功令王正宇繼妻二十五歲守節撫前妻幼子成立冰操凜然後奉旌表高氏成都人楊綸妻年二十八守節撫三月孤亷成立尋歿遺孫茂勳僅二歲高苦節撫養萬厯初旌表有坊劉氏郫縣人庠生鄧承芳妻年二十四守節事聞旌其門曰正氣凌霄張氏郫縣人庠生陳三甲妻年二十五而寡厯四十餘年卒詔旌其門鄭氏華陽人諸生劉南陽妻年十八守節壽八十卒以子美貴封太安人萬厯間奉詔建坊旌表王氏灌縣人文可刋妻可刋死營葬將畢自縊以從事聞建貞烈坊左氏新繁人庠生趙及第妻及第無子為之娶妾生二子及第卒誓不再適撫兩孤與妾相守二十餘年卒羅氏新繁人庠生楊體乾妻年二十守節父母莫能奪其志御史旌之曰苦節凌霜王氏新繁人向可久妻苦節三十餘載撫六子俱成立直指為旌其門並給米帛孟氏句容人漢州戴處信妻年二十守節有勸其再嫁者氏誓死不移後依兄居松潘極邊苦寒採野菜以食不失婦道事聞旌表鐵氏漢州人方涇妻年二十守節善事翁姑撫子成名年八十卒建坊旌表許氏漢州人方涇妾涇卒氏苦節終身後奉旌表馬氏漢州人趙文耀妻十九歲孀居訓二子成立年八十餘卒旌表唐氏漢州人何其瑞妻年二十守志撫子節登萬厯乙未進士奉旨建坊郭氏漢州人監生趙一琴妻一琴卒於太學郭甘貧誓志郡守上其事旌以苦節章氏漢州人孝亷胡桐妻年二十九守節至八十歲卒陶氏漢州人舉人江禹澤妻崇禎七年被賊執不從與兒媳張氏同聲罵賊死張氏漢州人張代明孫女崇禎十七年聞賊至將周身衣服俱縫固投井死賊退家人出尸井中顔色如生馬氏什邡人馬桐女李可植妻可植死遂自縊直指督學檄表其門李氏二女什邡人皆貢生李愛芳之女姊妹適朱氏弟兄會獻賊至大搜宗室二朱溺水死二女曰夫死安歸乎遂投水以從賈氏什邡人顧存志妻崇禎間存志援剿楚黔氏家居值賊陷蜀分掠什邡氏偕長媳顧氏焚其室皆自縊死柳氏彭縣人葉瑞之妻年十七守節一以祖姑彭氏為法撫其孤旋殤煢煢二十年卒王氏彭縣人庠生劉松茂妻十七歲孀居撫子成立婚娶後子旋故與媳同守苦節年六十卒黃氏彭縣人劉時雨妻攜子避兵為賊所獲欲脅之不從賊並殺之趙氏彭縣人明經楊雲鵬妻賊至夫遇害氏奉姑避川南備厯艱險晨昏惟謹守節以終袁氏新津人諸生藍燦妻燦為獻賊所殺袁聞訃遂自縊官氏威逺人適彭縣趙姓賊至與數女俱自縊賈氏扶風人川西副使道張繼孟妻崇禎甲申獻賊破成都繼孟抗節死賈被執罵賊遇害劉氏祝氏俱彭縣人劉為邑貢生趙三畏妻祝為邑庠生邊一俊妻二氏夫亡守節皆厯四十餘年望衡對宇交相砥礪奉姑教子閨門整肅里中無間言直指勞以米帛學使為旌其閭重慶府漢李烈女重慶人李正榮女許聘聶氏子暴卒女聞訃自縊死宋雍氏昌州人趙昻發妻昻發通判池州元兵大至昻發命雍先走雍曰君為忠臣妾獨不能為忠臣婦乎遂同縊死贈順義夫人明胡氏江津人曽子遷妻年二十二守節撫子成立同里江公有詩曰已抱終天憾惟存兩歲兒於今能色養天道豈無知年九十六終天順中旌表夏氏巴縣人庠生宣謨妻年二十謨病篤刲股以進少愈數月竟卒誓不二志撫六月孤事舅姑益謹年八十五終成化間旌表王氏巴縣人張啓宗妻年二十守節養姑年六十終事聞旌表侯節婦巴縣人失其氏夫戍松潘歸途溺死婦方裁衣或告之裁製自若告者再至遂以剪刀刺心死毛氏巴縣人張袞妻年十七適兗甫一年袞故毛觸棺破面流血氣絶而死鄭氏巴縣人負兒避難江津賊兵至室義不受辱母子投澗死李氏巴縣人監生王徽妻年十七徽病劇氏割股以愈之徽自著列女傳一帙以彰淑行越數年徽卒氏撫棺欲與同死家人救解守節終身邑令上其事表之秦氏江津人尚書江淵孫江厚妻年二十四厚於龜停山溺死秦至溺所號泣投水者數次衆持之不果龜停之水洶湧凡溺死無獲者秦誓死不還卧水坎九晝夜竟獲夫尸人以為至誠所感後年七十終魏貞女江津人魏尚元女年十七聞賊至女與母嫂約曰賊至寧不辱既而榮昌援兵至其門舉家驚走女即由後門潛出至石梁頭投水死嫂知非賊追無及矣曹氏江津人太學生梁松妻成化中松卒年三十三矢志不二撫姪顯用為子底於成立後以夀終黃氏江津人夏至善妻年二十六至善卒誓不再適紡績自給年八十終胡氏江津人鄒璇妻年二十守節撫子娶婦後子婦俱喪撫幼孫成立年九十終事聞旌表陳氏忠州人黎某妻夫死自縊𢎞治時建坊旌表况氏江津人庠生鄭裔昌妻值寇難隨夫避居濛溪遇賊欲逼之氏不從負子墜岩死金氏長壽人適庠生陳吾琳避兵石砫司寇倐至縛氏及夫氏告賊曰盍先殺我使我夫見之賊不忍金大罵以激之賊怒殺氏次及其夫左氏長夀人監生楊瓊妻二十三歲守節遺腹生子益宗少長癡愚或勸之嫁氏曰但得延嗣何計癡愚耶後益宗生二子氏躬親撫養至於成立姑病篤氏割股以進遂愈年八十有二終邑人稱其節孝楊氏長夀人陳鳯瑞妻正德中為賊所執強以上馬從行氏大罵不屈賊折其足而死王烈女永川人王文瓊女許字李秉善將請期矣有史初者素以王為義女時負商人資暗以王許之欲完所貸王聞之曰我王家女也吾父已許字李彼何人斯敢以我為資乎徑取刀自刎舉家驚惶不及救一邑悲之吳氏永川人何嘉會妻年二十五夫卒遺孤一歲後白蓮賊起負姑匿山中採藿養姑姑歿典衣治壙苦節三十餘年年六十一卒里人稱其冢後溪曰孝節溪查妙蓮永川人查柏女正德時避賊匿崖穴中為賊搜獲欲犯之氏大罵不絶口遂被殺胡氏永川人胡天坤女帥勳妻其姑性悍有汚行與所私楊起謀辱氏氏義不受汚投帥家灘死事聞坐姑與起各如律氏未得表揚御史宋公按部永川夢一女子垂髮衣濕泣訴於前明日閲卷乃知氏死節狀檄邑令備禮營葬親為文以祭之時大旱是夜甘霖立沛人以為感應之神有詩以紀之曰夜半雷轟地欲掀霎時風雨滿郊原始知東海三年旱只為區區孝婦寃碑尚存王氏永川人張仁魁妻正德中為流賊所獲驅之行氏不屈賊殺之張烈女永川人張寅啓女幼許字成國玉將笄國玉卒氏求往弔父不許竊隨父奔喪次劈踊哀號受姑金叉一股歸則剪髮割耳不櫛不食競以終焉蠱貞女永川人蠱士榮女幼讀書識內則年二十尚未字流賊掠永川蠱與父兄避寺中知不能免於難因佩刀以死自誓後賊倐至即引刀自盡氣未絶更以兩手自裂其喉而死劉氏永川人何青山妻年十八夫歿有欲奪其志者劉往拜夫墓斷髮刺面以誓事聞於令嚴斥邑豪而旌其節後連值歉歲劉採粟食姑以稗秕自活撫二子成立長皆能養夀至七十三終馬氏壁山人文魁女幼許聘羅姓未婚羅卒誓不再字備厯艱苦終身完節今馬坊橋有碑記存焉周孝女江津人周宏智女年十七母喪紡績養父不出户限正德中流賊劫縣與父俱被虜逼汚不屈賊怒並其父殺之兵備何副使旌表仍恤其家王松秀榮昌人王仲玉女名松秀正德中流賊入境仲玉遇害執松秀欲犯之松秀罵曰汝殺吾父恨不得啖汝肉耳遂投深堰賊戕其首而死謝氏榮昌人庠生喻應鶴妻年二十二應鶴卒有二女尚幼喻司寇難其節謝曰祖為忠臣氏願為忠臣冢孫節婦蔡賊入城攜二女避山中百鳥環鳴其樹賊不疑遂獲免害邑令旌其門朱氏榮昌人庠生喻應夢妻年二十守節撫六月子思欽成人事兩世舅姑極孝謹操守堅定邑令旌其門盧氏榮昌人庠生徐際明妻年十七際明卒撫孤守節甫越月孤亦卒盧中夜自縊死邑人哀之李金秀大足人李實女正德中遇賊驅秀使前秀走入池中賊執戟援之不從時兄亦在側秀大聲曰吾死矣兄可善事父母賊怒遂殺之嶽士真大足人嶽仲秀女正德間被賊執大罵不屈死梁氏大足人馬正添妻夫卒氏兄受趙姓聘財強之改醮不從自縊死蔣烈女名淑姑大足人蔣永正女年十六為賊所執鎖於室欲汚之淑姑引刃刺頸死曹氏貞姑大足人曹自強女幼聰慧年十四為流賊所執以刃逼汚父止之賊刃其父貞姑罵賊冒刃死牟氏綦江人陶鳴鎬妻播賊破城殺其夫氏伏尸救之亦被害吳烈女墊江人吳大有女正德中遇賊欲犯之烈女年甫十八自投於水賊即水中刺之父母收其尸傷凡七處劉氏綦江人羅尚價妻于歸五載尚價卒撫子守節遇賊突至強逼之行氏曰我守節三十餘年豈肯從汝有死而已罵不絶口而死楊氏綦江人庠生羅倜妻年二十無子生二女倜被賊執楊奮身力救弗克竟受害楊泣尋夫尸歸葬撫育二女事聞旌表羅氏綦江人張啓中妻生二子夫故孀居值播賊至被執不屈過高灘河挽子同溺死羅氏綦江人庠生王邦珍妻年二十八守節孝翁姑事聞旌表李氏綦江人庠生陳懷禮妻年二十二守節勤絍績以課二子皆列宫牆有司上聞旌表其門王氏綦江人庠生歐仕達妻值寇賊之難被執過高灘懸崖數十丈王盡力挽賊同墜崖下俱碎其尸邑令鄒昌魯以臨難持節旌之吕氏黔江人李文選妻年三十夫歿殯葬後即欲自縊妯娌屢勸得止氏矢志不衰事姑教子曲盡苦心厯節五十四載李氏黔江人朱繼遊妻年三十夫歿誓不再嫁茹荼守節厯年三十冇九縣令旌其門曰柏舟獨矢容氏黔江人向大志妻賊至恐汚攜女自焚里人稱其烈焉朱氏黔江人千户馬如龍妻聞夫卒於外即自縊死朱氏黔江人龔寬妻被賊執之渡江即投江死陳氏合州人何溥祐妻年二十二夫卒無子父母憐其少欲嫁之氏以死自誓紡績給食夀七十七終事聞旌表黃氏合州人程鳯儀妻年十八守節奉姑撫遺腹子事聞旌表魏氏合州人陳本初妻年二十二守節撫弱子養舅姑詔旌貞節湯氏合州人張仲歡妾青年守節與嫡相依煢居五十年足不逾閾子姓罕覩其面周孝女合州人周世亨之姑也撫世亨以延周後遂終不字人稱曰孝女家甚貧約日夜治絲枲身舂宿糧以哺世亨稍長授之句讀勉以大義世亨力學得舉里選童氏合州人王肱妻年二十八守節家貧教子孫多所成就孀居五十餘載或欲上其事以請旌揚氏曰婦職當如是耳年八十六乃卒子孫貴盛人以為完節之報李氏合州人程頌妻頌卒無子氏年二十一矢志守節撫兄之子宇鷺為己子登辛卯鄉試宇鷺復夭無嗣又立孫程鱣承祧嘗有賊過其門不敢驚擾後以夀終其歲頌墓發連理枝事聞表其閭王氏安居人郭嘉禾妻正德中賊陷城被執罵賊死馮桂秀銅梁人馮大木女正德中遇賊欲犯之罵賊死楊氏銅梁人傅萬輝妻正德中流賊突至驅之行至黑龍灣遂投水死羅氏酆都人光祿寺丞楊節妻萬厯間建貞節坊四節婦失其姓皆綦江人萬厯間播寇肆掠男婦多避飛龍洞中有四婦被執馳鞭從行四婦義不受辱拽裾投崖死陶氏銅梁人舉人舒九齡妻九齡故無嗣營殮畢沐浴更衣柩前哭拜自縊死萬厯時建坊旌表胡孝女壁山人胡萬臣女年十五未聘父母俱亡遺弟先德幼無所依孝女終身不字撫弟成名任密雲兵備道子孫蕃衍孝女年八十卒萬厯十四年以貞孝聞詔旌其門曰王章寵秩劉氏合州人鄒太史智之妻歸鄒未久智以直諫貶死氏自石城間道歸杼柚自給立操峻厲厯數十年卒萬厯間合人建祠與太史並祀副使黃克纘為作記秦氏大足人庠生鄢鶴妻鶴病劇秦割股救之及卒守節不二萬厯二十五年旌表向氏銅梁人庠生張叔珵妻年二十守節孝事翁姑厯三十載天啓間建坊旌表袁貞女定逺人袁璽女幼許字胡宗教及笄宗教歿聞訃痛毁欲絶誓不再字依父兄孀居四十餘年卒秦良玉石砫宣撫司女官也奢崇明叛以厚賂求助良玉斬其使將所部萬餘人率弟民屏姪翼明捲甲疾趨至重慶營於南坪關扼賊歸路又燒其船賊大窘厥後撫臣王三善被難良玉弟民屏戰歿良玉上疏有讐不共戴義難茍安之語上壯其志賜民屏恤典並徵其兵良玉激勵出師卒蹙奢氏之勢皆其力也孫貞女忠州人孫培祖女幼許聘劉元未笄元卒孫望門自縊巡道以乾坤正氣旌其門雷氏忠州人周裕妻青年守節有司表其門田氏陸氏俱忠州人田為黃襄妻陸為黃妻賊至二氏義不受辱並投江死之陳氏長壽人適古姓年二十守節子肇岐甫二歲氏撫養訓迪得膺歲薦孫鉁中崇禎丙子鄉試厯九十五歲卒奉旨旌表黃氏忠州人庠生孫國益妻賊至投井死趙氏忠州人庠生趙之鶴女周士吉妻夫死守節崇禎壬午年建季女英鳯坊以旌之徐氏忠州人羅良士妻夫亡自縊崇禎間建坊羅氏綦江人羅香女年十八適王啓賓數月夫卒遺腹一女堅志守節終身不改羅氏綦江人諸生劉熠勳妻播酋破城夫婦被虜羅自縊死王氏康氏俱綦江人王為翁秀妻康為翁臺妻秀卒王年十八安貧守節未幾臺繼卒康甫十六乘夜溺水以救免娣姒苦節獻賊破綦江康被執不屈死王全節終身郭氏李氏俱綦江人郭為庠生楊霏璧妻李為庠生楊霏玉妻獻賊破城二氏義不受辱罵賊死羅四姑綦江人庠生羅大道女年十四獻賊破綦江大道引女匿老鸛沱邊賊搜逼四姑投水死陳滿姑綦江人廩生陳明祿妹父母早逝滿姑年十五與兄避難螺螄堰為賊所執咬斷賊指賊怒碎其尸王氏南川人廩生蕭子元妻年二十五守節事姑至孝後建坊旌表楊氏黔江人朱家鳯妻年二十二夫歿氏矢志守節孝事翁姑嚴訓二子年六十七終縣令旌其門曰貞節善教熊氏酆都人廩生戴應昌祖母建坊旌節楊氏朱氏俱酆都人楊為黃珣妻朱為黃世修妻兩世守節修建世祀菴以奉父母翁姑有司旌其門曰一門雙節蔣氏酆都人廪生徐懋卿繼妻青年守節撫遺腹子姑病篤割股療病御史旌其門古氏酆都人古養浩女適楊同春甫三年同春死僅遺一女長以適廩生余子化未一載子化歿母女同甘苦節後舉二姓舅姑喪及夫柩葬白鹿山下築室墓前俱削髮為尼厯數十年有司旌其雙節余氏酆都人楊漢堯妻以節稱馬氏酆都人庠生郎書妻書故氏年二十五撫子本立娶媳毛氏年十七本立復故姑媳撫幼女苦節相倚馬六十三卒毛六十一卒林氏酆都人古三登妻守節三十年范氏酆都人許成誥妻年二十成誥溺死氏聞訃悲泣夜投繯死陳氏榮昌人喻思欽妻年十九夫死守節事姑崇禎六年旌表陳氏榮昌人敖乾恆妻年十八守節事姑撫遺腹子值獻賊難與姑同縊死李氏墊江人黃友茂妻年二十守節撫子成立壽九十終馮氏涪州人張孔時妻年二十二撫幼子養舅姑厯六十四載有司表其門王氏涪州人張德星妻年十九守節家甚貧親織絍育其子鉉使就學後領鄉薦鉉子善吉為都給事人以為苦節之報云蕭氏涪州人任學妻年十九守節家貧無子事姑克孝又為姑幼子經營完娶年八十二終范氏涪州人吳鼎妻青年守節家甚貧兄憐其孤苦欲迎之還氏弗許厯八十五歲卒州守旌之夏氏涪州人廪生張詡妻年十九而寡無子女誓志守節有豪家請姻者割耳截髮以示不移後以異節題請旌表建坊許氏涪州人劉大節妻年十九守節撫遺腹子成立營葬舅姑至今稱為節孝里龎氏涪州人文可宗妻二十八歲守節養姑撫幼葬兩姑嫁三女年七十六卒事聞旌表夏老姑涪州人夏子霄女霄無子姑性孝誓終身不字以供子職父母屢強之不從好書史屏華飾年四十卒鄉人以老姑名之碑墓俱存韓市朱氏涪州人張親仁妻夫卒事姑孝孀居終身事聞建節孝昭垂坊劉氏涪州人都諌劉秋佩女適進士錢玉之子年十九夫卒誓死靡他時人謂父忠女烈云張氏涪州人沈掞妻以節孝建坊鹽井壩王氏涪州人文武妻武早卒氏年十八事姑孝言動惟謹有勸其改節者氏割耳刺面以示志茹苦五十餘年州牧以聞建節孝流芳坊趙氏涪州人陳一亷妻年二十夫卒撫一子生三孫皆領鄉薦九十三乃卒事聞建冰心映日坊許氏彭水人貢生戴宗明妻宗明卒氏年二十二遺孤比辰甫三歲辛勤教育苦節四十餘年崇禎間旌表周氏彭水人戴比辰妻事孀姑許氏至孝夫亡土苗劫掠氏避居岩洞中食盡死羅氏彭水人貢生王彜妻年二十二彞卒茹蘗自甘教子紹先人緒苦節五十餘年梁氏彭水人秦之益妻年十八夫歿苦志守節邑令彭法古旌表其門李氏彭水人廩生唐道泰妻為賊所執欲犯之大罵不屈投江死冉氏彭水人董興棫妻十七歲守節厯年七十二卒周氏彭水人庠生王新甲妻年二十守節至七十五卒李氏彭水人劉尚文妻尚文歿氏年二十三撫子成立子亡撫其孫邑令彭法古旌表其節方氏彭水人葛德純妻年二十德純卒氏斷髮自誓撫妾之子朝彥朝美以承夫緒苦節四十餘年王氏彭水人陳尚選妻夫早亡剪髮誓志苦節守貞年七十六卒李氏彭水人庠生李天敘妻夫歿截髮守節卒年七十何氏彭水人吳從心妻年二十夫歿姑欲奪其志不從終身守節王烈女合州人許聘諸生王開宿未婚開宿卒氏赴柩前自刎死崇禎間建坊旌表郝公贈以詩云未親夫面繼夫亡不比尋常烈女行白髮不能持晚節紅顔豈肯沒春光馮氏彭水人寧昌祜妻年十八守節厯四十餘年王氏彭水人諸生龔子進妻子進以孝聞氏年二十二子進卒無嗣矢志守節奉翁姑誠敬一如子進人謂婦道無虧陳氏合州人庠生董昌微妻崇禎甲申昌徵死於賊陳攜孤避難黔中豪強多謀娶氏毁容以死自誓厯兵燹二十年撫子成立操節凜然劉氏彭水人毛明傑妻遇賊不受汚死戴氏彭水人監生欒鳯徵妻與夫同為賊執賊將殺鳯徵氏大呼曰寧殺我母殺我夫遂自刎賊義之鳯徵獲全周氏彭水人汪仲學妻賊將談天敘寇鎮氏為所虜奪刀刺賊不克而死謝氏彭水人庠生許拔妻十八歲守節厯兵燹備嘗甘苦八十二歲終董氏彭水人龎德惠妻夫婦俱為賊所執以綆相繫赴水死陳氏彭水人葛朝英妻為賊所執不屈死陳氏彭水人庠生葛維樛妻年二十三撫孤守節終身不二李貞女彭水人貢生李天成女幼許聘向南未嫁為賊所執罵賊而死保寧府漢譙氏閬中人茂才楊始旦妻年二十八夫歿守節終身宋馮氏南部人陳省華妻教子謹嚴以堯叟貴封鄢國夫人堯咨及第後守荆州歸省馮曰汝典名藩有何異政對曰州當孔道過客見兒善射皆嘆為小由基馮怒曰不行仁政化民特專一卒之技豈爾父忠孝訓哉擊以杖墜其金魚上聞之曰勿易以旌母德任氏南部人鄧景仁妻守節孝舅姑厯五十餘年陳堂前南部人堯咨之姪婦十八而寡守節終身人以堂前稱之張娥閬中人母早喪父客遊陜西卒娥聞訃朝夕痛哭水米不下咽十餘日而絶縣令旌其墓曰貞孝性成元韓貞女閬中人年十二遭明玉珍之難慮為所掠乃偽服男子衣自稱韓關保混處民間既而被掠在兵中十年人莫知為女子後從王總兵略雲南經成都遇叔父贖歸以適馬氏稱為韓貞女有傳見藝文明金淑貞年十八適廣元陳文才未踰年夫卒守節年八十六終𢎞治間旌表諡貞節李氏巴州人王賢妻年二十一守節事姑有富家謀娶者姑欲許之氏誓死不從壽七十卒𢎞治間旌表廖氏閬中人貢生廖愷女年十五適庠生鄭應輝甫三月而欲從夫死姑數解諭之遂斷髮矢志孝事其姑巡撫為表其門茍氏趙氏俱閬中人庠生王一松妻妾苟年二十趙年十八俱無子息同甘苦節至老不渝事聞旌其雙節李氏閬中人楊宷妻宷死止遺一女氏孀居苦節女長適庠生徐敏達敏達死無子家貧甚女歸與母同居守節奉旨建母女雙節坊張氏指揮田垕妻年二十一而寡厯九十七歲垕妾亦張姓年十六而寡厯九十七歲垕子指揮世勳妻蕭氏年十八而寡無子厯六十九歲次子世武妻韓氏年二十一而寡厯八十四歲冰霜凜冽萃於一門楊太史慎詹吏部景鳯俱有詩弔之邢氏郡人邢懋官女庠生張顯妻年二十一夫死遺子一月孀姑八十餘氏斷髮守節孝姑育子屢被旌奬張氏閬中人庠生賈傑妻守節撫子厯七十五年王氏閬中人羅某妻年三十二夫亡氏紡績為生撫幼子穎入泮配馮氏年十八穎亡遺腹生子廷禎王與馮相倚為命屢厯荒亂堅志不渝苦教廷禎亦列黌序家訓嚴肅人無間言楊氏閬中人陜西乓備副使任希祖妾希祖卒楊年二十二收殮畢沐浴振衣自縊死院司旌其門張氏蒼溪人幼許字黎姓未笄而黎瞽父欲改字氏泣曰許婚以定命也何改為遂相夫終身羅氏蒼溪人李明哲妻隨姑避亂山中姑病劇聞寇至驚悸卒羅掩埋訖遂墜崖死李氏南部人李延昌孫女龔思賢妻孀居事姑自甘苦節不求旌揚厯八十餘歲卒楊氏南部人李廷相妻幼通孝經列女傳及史鑑年十六歸廷相二十七而寡守志不二縣令旌其門王氏南部人羅昭妻夫亡無子撫其二女耕織為生艱辛萬狀志節凜然倪性貞廣元人適曹姓十七歲而寡割髮自誓甘守孤貧年八十六終韓氏廣元人適軍士張智輔三年無子智輔當戌松潘臨别囑曰老母在堂無人奉侍萬一不還肯終事之乎韓諾之及智輔死於外氏事姑維謹行年七十始終一節劉氏廣元人舉人彭有年妻年二十八而寡柏舟自矢閏門肅清事聞旌表解氏廣元人廪生黨人文妻人文赴舉渡河溺死解沿河悲泣欲與同歿得尸伏哭幾絶徐理殯葬遂終身食蔬撫子成立奉例旌表徐氏利州衛百戶馬九方妻年十七守節家素貧養姑撫子後以疾終子呈圖哀其苦節廬墓三年趙氏廣元人何天衢妻年十七守節撫遺腹子成立有司旌之李娥廣元人李仲仁女幼受庠生陳遷聘遷夭死娥母往弔娥沐浴登樓自縊奉詔旌表鄭氏幼許聘利州衛百戶張鴻翼次子應奎未成婚父母俱亡養於張氏應奎病夭鄭扶棺悲慟旋以線密縫上下衣自縊死羅氏昭化人庠生陶舜徵妻青年守節訓子有方家規整肅後奉旨旌門曰婦節母慈吳氏昭化人庠生李明揚妻夫早卒姑老子瞽家極寒日用所需惟出女紅奉姑克孝撫子承祧後奉旌表李氏吳氏俱昭化人李為庠生賈昌印母吳為庠生任如永母同避賊山中為賊所執俱罵賊死楊氏昭化人諸生羅希玉妻夫歿姑年七十氏苦志守節事姑至孝鄉里共稱李氏昭化人諸生羅紹尹妻夫早喪氏守節事姑克盡婦道縣令旌之趙氏南江人王塘妻正德中夫被賊執趙氏挺身救夫賊捨夫執趙趙恐被汚投水死事聞旌表楊氏昭化人庠生賈天祿妻正德六年賊陷城夫婦被虜賊欲汚氏氏奪刀自殺梅氏昭化人百戶吳鑑妻青年守節後奉旌表李氏昭化人廩生吳國彥妻二十四歲守節撫子保禧膺副薦年九十六旌表節夀牟氏昭化人年十五許字晏耳鼎耳鼎客於外人傳已死母遂以牟改字廣元參將某牟苦諌不從時參將來娶耳鼎亦遠至不敢爭牟使婢約耳鼎抵家拜母成婚參將聞而謝之後流寇掠昭化牟恐被汚投江死旌表建坊陳氏劒州人鄭玉紞妻鄢藍賊圍城陳著男子衣助夫禦敵被執不從賊殺之事聞旌表陳匾兒劒州人陳萬鏊女鄢藍之變同母王氏逃避山間賊追及殺其母匾兒恐為賊所汚奔聞溪投水死事聞旌表汪氏綿州人劍州監生李瓉妻有婦德敬夫如賓鄢藍陷城執其夫欲殺之汪乞以身代賊遂殺汪楊氏董氏俱劒州人楊為吏員母道福妻董為庠生賈仲妻鄢藍之亂各執節死張烈女劒州人小字七花兒鄢藍賊入境執烈女欲汚之烈女厲聲罵賊遂被害齊氏巴州人李開妻開死於賊氏誓不再適撫妾生遺腹子如己出里人賢之嶽氏巴州人陳九鼎妻年二十七而寡矢志育孤與九鼎之妹陳氏同以節著張烈女巴州人年十五未字值流寇至挾之馬上行數十步近懸崖飛身墜死張氏通江人適庠生閻自昌甫二年自昌卒張遂自縊知縣黃祜具其事上聞詔旌表閻氏通江人監生閻旻女王廷輔妻流賊陷城閻遁縣北林箐中為賊所執觸樹未死罵不絶口賊怒殺之羣鳥環尸哀鳴不散向氏通江人御史向翀姪女適郭宗實甫六年而孀遺孤方在襁褓氏苦志撫之厯節四十年後旌表何氏通江人同知何宗源女典膳趙萬安妻年二十而寡苦節六十年郡守旌其門王氏指揮王澤女馬繼祖妻夫卒無子青年守節事舅姑如禮厯四十餘年萬厯丙午旌表蘇氏通江人劉治邦妻萬厯間治邦鬻茗松潘遇賊劫死櫬還號慟旋治酒為翁姑延賓遂鎖戶自縊人咸痛悼當路旌之邑令徐一濓感其事為作傳屈氏通江人庠生郭宗夔妻苦節四十年撫遺腹子之幹成立按察使梅國樓旌其門曰苦節凌霜茍氏通江人兵馬使茍璋女適王言三載言卒毁容守節畢生未見笑容後以壽終事聞旌表嶽氏南江人通江楊簡繼室簡蚤逝嶽撫成前妻子上林嶽病上林割股救之得愈人稱慈孝一門李氏通江人李公輔女庠生秦之璋妻璋卒李年二十五營葬畢自經墓側事聞旌表楊氏閬中人楊廷實女戶部郎劉元凱繼室元凱卒楊年十九家貧勤女紅以奉姑苦節五十餘年萬厯壬寅詔建廉臣節孝坊王氏亦王澤女保寧庠生沈繼顯繼妻年十九守節事姑育成前妻之子萬厯丙午旌表建節孝坊徐氏蒼溪人貢生陶文舉妻年二十九守節撫遺腹子於泗成名萬厯八年建坊梁氏劒州人知縣梁柱次女庠生李惟華妻惟華歿姑老多疾氏善事之姑亡喪畢無子可依乃歸母家其兄梁可宗分給田宇扃戶獨居至親罕見其面可宗卒氏撫可宗子四人婚教成立蓋兄妹兩相成也事聞旌表梁氏劒州人舉人母性妻夫亡守節厯五十年教孫擇鄰登科苦節賢慈里中稱頌孫氏郡庠生光先女王豐年妻孀姑老病奉侍二十餘年乙酉豐年他出氏聞獻賊入城急遣子恩選逺遁乃與及笄女蘭姑閉戶自焚死張氏劒州人賊入州張年十八懼為賊汚投水死聶氏劒州人庠生李一鴻妻賊至聶被執欲汚之聶大罵不從賊刳其腹而死張氏劒州人貢生趙公選妻賊陷城張逃至石子嶺被執將汚之張大罵賊撞其齒齒落殆盡罵不絶口以刃穿其胸而死李氏巴州人廩生楊日升妻值獻賊至氏被虜投江死梁氏劒州人庠生趙𢎞暢妻獻賊據成都責紳士以觀望執暢夫婦解至城將殺之氏呼獻忠名大罵不絶賊怒懸於竿上三日死順慶府漢趙娥渠縣人避黃巾亂夫萬有足疾難行娥扶持之萬為賊所殺欲汚娥不從賊以矛指之娥竦身當刃貫胸而死明姚氏南充人靖難時闔門盡節里人具棺以葬題其碣曰姚氏之門陳氏渠縣人陳南山女歸同里王某年二十一守節織絍以奉翁姑厯四十年如一日天順間旌表張氏南充人年十五適庠生龎嶽嶽卒止遺一子祖姑年九十姑亦逾七十家甚貧勤紡績供兩世甘旨教遺孤遊泮閭里死葬竭力匡助有司褒之趙氏南充人張永昻妻于歸四載昻卒遂自縊囑其與夫同穴詔旌之李氏南充人庠生謝彭年妻謝早逝舅姑欲奪其志李以刀截雙耳乃止甘貧守節奉舅姑竭力喪葬教其子遊於庠姚妙清渠縣人適千戶吳旻生子甫三月旻卒孀居四十餘年教子成立𢎞治間旌表楊氏南充人進士楊芳隆女嫁甫一期夫卒長齋繡大士像數百軸資夫冥福年八十端坐而逝塗烈女嶽池人塗元海女正德間為流賊所獲欲犯之塗不從赴水死事聞旌表明氏南充人給事中明時舉女適王朝卓年十八而寡守節六年為賊首所獲欲納為妻明大罵曰賊奴我名臣女士人妻使賊奴為我僕尚不屑敢汚我乎賊百計誘之其罵愈厲賊怒寸斬之而去趙卯秀西充人趙子高女同父母避賊至南部寶馬井賊欲劫以行女急投崖不死賊復強驅以行卯秀大罵與其母相繼投水死事聞旌表樊小解西充人庠生秉亮幼女鄢藍賊奄至被獲欲加辱小解大罵賊怒殺之李氏西充人知州唐通繼妻適通踰年通病篤與訣曰若年少且無子能守乎李嚙指以死自誓通卒守節五十四年事聞旌表楊氏西充人年二十適王味龍甫期年味龍故遺腹生子撫之成立後子亦卒又撫其孫以壽終安氏西充人劉景妻正德辛未為流賊所虜欲辱之安厲罵不從遂被殺陳氏西充人張騰霄妻年二十一守節撫子文淵登進士厯官雲南參政贈恭人建坊旌表張氏西充人進士張文淵女諸生陳韶妻年二十四守節撫子竒學竒藴入庠年七十六終馬氏西充人廩生吉旭妻年二十七守節姑病篤割股以救遂愈教子頤貞中甲午鄉試年六十餘終斯氏西充人庠生何達光妻年十七守節撫子顯應食廩餼年七十餘終巡撫旌其門鄧氏西充人庠生王進善妾年二十二方娠進善疾篤知其妻妒祕畫像遺鄧氏生子選長婦訟於官言非進善子鄧取像為驗容貌宛然其像以手指軸柄官命破之有遺囑在遂定為進善子鄧事長婦以禮撫選登第年九十卒陳氏西充人庠生馬雲官妻雲官赴試溺死陳年二十守節五十餘年事聞旌表王氏西充人高似斗妻年二十二守節厯五十餘年終杜氏西充人時泰女庠生陳輔聖妻姑病篤杜割股救之旋愈人稱其孝于氏蓬州人庠生崔之茂母賊亂同子避雲山寨賊破寨氏繫頸於柱未死賊已至釋其索欲強之行遂墜岩死侯氏營山學生楊凌曦妻鄢藍賊攻縣侯攜女蕙英避叢薄中賊搜獲欲犯之侯罵不絶口母女被殺事聞旌表李氏營山人李鍪女父患心疾矢志不嫁以奉雙親親歿紡績自給年登八十以處女終王烈女營山人王召女許聘蓬州賀姓賀卒或欲再聘烈女割耳泣曰豈有女子而再聘者我有父母孝養終身足矣遂守貞不渝有司旌之王氏營山人王猷母夫歿守節養翁姑教子遊泮上官為旌其門蘇氏營山庠生蘇之印女適侯甸甸卒氏年十七守節事翁姑撫孤子子殤冰節愈厲厯四十餘年事聞建坊旌表王氏營山人王化女顧應聘妻年十七而寡扄居一室霜操肅然年五十餘卒有司表其門曰甘貧苦節羅氏營山人羅翔鳯女庠生王言妻年二十一守節養姑撫夫弟成立清苦自甘年八十餘卒有司旌其門李氏羅氏李氏俱營山人李為庠生王昱妻生二子長昌印娶羅氏次繼印娶李氏姑媳三人避亂山中賊搜獲之同聲怒罵曰我等世族也殺即殺豈從汝賊奴耶賊怒悉肢解之李氏營山人李乾道妻乾道事親以孝聞早卒李苦志守節厯六十餘年教子得義方之道年九十餘乃卒有司表其節壽于氏營山人生員李晟妻遇流賊劫寨罵賊肢解死于氏營山人貢生自密女適庠生李仕明生子方一月夫死子亡氏痛哭曰無夫無子雖生何為以頭觸柱而死李氏營山人李永蓁之妻蓁早卒撫子成立娶媳廖氏子亡偕媳撫孤孫成名李享年八十廖享年九十有司旌其門曰兩世苦節羅烈女儀隴人羅某女年十五未字值鄢藍賊破城被執其時女父與縣令俱為賊獲賊欲汚氏氏紿曰官為一邑主父為一家主汝釋之吾從汝及釋去女罵賊投岩死縣令以聞旌其坊曰松筠張氏儀隴人傅佐政妻年二十守節七十餘歲終何氏儀隴人張仕祿妻年二十三而寡守節教子年八十有五終雒氏儀隴人楊明道妻年二十五夫歿苦節六十載終王氏兵部主事王德光女適世襲指揮吳某甫期月而夫亡氏釘戶守節飲食由傳桶進一日聞報欲以指揮弟襲夫職氏泣謂姑曰似可緩姑詢之以有孕告果生子伯成襲指揮職年八十卒學臣以聞詔旌表建坊頡氏字妙善渠縣人年十八歸陳政政卒氏謂家人曰婦人以夫為天今不幸無恃不死何待遂自縊死羅松貞渠縣學生汝傑女鄢藍賊陷城舉家於白石洞賊攻破洞門執松貞欲犯之遂罵賊投崖死事聞旌表李氏渠縣人李陽春女適庠生唐宥賊陷渠城被執李罵曰我給事女知府兒婦肯從狗彘乎賊怒殺之事聞旌表許錦秀渠縣人景閏女正德間鄢藍寇渠舉家奔散女坐深閨不去為賊所獲欲犯之女罵賊不絶口遂遇害事聞旌表吳氏渠縣人仲禹女適良壽夀重聽且瘖啞吳事之維謹流賊入其家見吳殊色欲劫之去吳紿賊抱幼子踰垣赴水死來氏渠縣人來薦書女燕化鳯妻年十七而寡父母憐其少諭令更適氏不從孝事舅姑守節五十餘年人無間言李氏渠縣人劉廷可妻年二十廷可卒無子李艱苦奉姑拮據喪葬鄉人稱之陳氏渠縣人庠生李高魁妻魁早卒家甚貧教長子儲乙中庚午鄉試次含乙中甲戌進士受封太宜人厯七十有五卒金蓮渠縣人失其姓庠生陳其珍之婢也癸未九月賊破渠金蓮負其珍幼子以逃為賊所獲賊令棄其子隨之行金蓮泣曰吾主暮年止有一線死則死耳斷不忍棄也賊怒將殺子金蓮以身蔽之受數創終不移賊乃捨去蓮死幼子得生李氏渠縣人郭玉安妻值兵燹隨夫乘船往達州避難為賊追及李有二女及笄呼二女曰寧清白以死不可忍辱而生母子攜手赴水死王貞女渠縣人未嫁而夫卒父母將改字之女誓不從遂縊死巡撫旌之陳氏大竹人馮天開妻守節三十餘年終石孝女嶽池人痛父母早喪弟瓊尚幼誓不適人撫弟讀書遂克成立年八十終太史楊升庵為作傳學臣郭青螺以事聞建坊旌表李氏渠縣人何玉妻有殊色生子數月鄢藍賊入境李負幼子奔江滸賊追及欲汚之李大罵不屈抱子投水死馮氏南充人年十八適張寧陽生子環甫一歲而夫逝甘貧守節撫環成立娶媳文氏環病革囑其妻曰吾母老汝少無子汝能養吾瞑目矣文自誓守節以紡績養姑雖親戚童僕罕見其面馮年八十餘卒文益勵初志嘉靖中分巡道表其閭何氏西充人崔大韶妻年二十三夫歿斷髮守節撫子官泮年九十七乃終隆慶元年旌以節壽談氏鄰水人吳湝妻夫早卒氏冰霜自守萬厯間建坊旌表吳氏鄰水人庠生侯世延妻夫卒守節萬厯年間建坊旌表李氏西充人庠生李大年妻崇禎丁丑冬遇流賊於小陵鎮抗節不屈邑令上其事奉旨旌表陳氏西充人平陽令高儀坤妻值姚賊追至夫婦被執道經祖塋謂其夫曰今不幸遇賊若受辱何以對先人於地下言畢撞崖死李氏西充人高道妻遇姚寇屯營山夫婦被執知不得脫乃與夫永訣觸石而死陳氏西充人孝亷陳扆女年十六未字值獻賊至隨父母避射洪為賊獲脅之使行大罵不屈賊怒殺之黃氏南充人太史黃輝孫女適杜瑤夫卒年十七生遺腹子崇禎甲申聞賊將至泣語其子曰爾幸遊泮我苦節十七年值兹寇亂敢求活乎我死汝勿事賊即報汝父母矣遂縊死杜氏西充人杜可大女張竒䇿妻避獻賊難於張村溝被執杜詈罵不從賊怒斷臂而死黃氏西充人佩九女諸生任某妻避難蓬溪之金山寺遇賊被執脅之不行罵賊死其弟親臣亦死李氏蓬州人庠生劉沛然妻善畫工詩文沛然死李年二十四豪勢欲脅娶之氏剪髮毁容誓不再嫁年七十終盧氏蓬州人庠生王杰妻值流賊之難避於雲寨被執賊欲汚之盧大罵奪刀自刺而死田氏儀隴人傅佐靖妻青年守志事翁姑撫稚子六十有五歲終侯氏儀隴人庠生何潔誠妻年二十五守節教長子所讓登崇禎癸酉鄉試次子入泮年六十終王氏儀隴人適席存仁甫一載存仁歿苦節育子年踰七十終縣令旌之張氏儀隴人貢生楊若栒妻值流賊破寨被執欲汚之氏大罵投崖死楊氏儀隴人張如輝妻崇禎甲申之難為賊所獲欲犯之楊罵賊死李氏儀隴人舉人友柏孫女適張景運避難戴天寨賊破寨氏跳崖死陳氏南充人文憲孫女適廣安州王瓘瓘早卒氏守節逆賊劉盡忠據廣安州欲奪其志氏剪髮破面刺一日以示賊賊服其節烈乃止龔氏營山人生員王扆妻扆歿無子龔時年二十五妾杜氏年十八共誓守節值姚黃賊亂乃分左右自縊死石氏三門嶽池石天柱姊父母早喪天柱幼三女交誓不字且撫且教後天柱登進士豎三淑聨芳碑劉氏嶽池人鄒秉浩妻崇禎甲申獻賊入川被執大罵不屈賊強之上馬終不從賊怒殺之周五女鄰水人年十四喪父誓奉孀母終身不字年七十四罵姚黃賊舉火自焚陳氏彭氏鄰水人姑媳雙節鄉里稱服敘州府唐黃氏宜賓人名帛張真妻真渡江覆歿黃求夫尸不得遂於溺所自沈後十四日抱夫尸浮出灘下顔色如生明何氏宜賓人張奎妻年二十八奎卒子福方三歲次祜在襁褓氏事姑撫子洪武中事聞旌表蹇氏慶符人王伯英妻年二十八而寡舅姑父母憐其少欲嫁之蹇誓不再適洪武間旌表陳氏宜賓人張閙妻夫陳歿氏年二十七守節撫子鑑鐸成立永樂中旌表劉氏宜賓人夫杜高賓溺死氏入水從之會救免乃密取夫故巾襪繫肘間以毒和餅食之姑驚視猶持半餅厲聲曰今日得為杜門鬼矣言畢而絶年二十五廖氏宜賓人知縣廖汝崑女庠生張文星妻年二十一而寡苦節終身張氏長寧人車軫妻二十五歲守節卒年八十有五𢎞治間旌表沈氏長寧人庠生李膾妻年二十四守節正德間旌表李氏宜賓人李方伯文續之女知州樊一若妻總督樊一蘅嫂事舅姑以孝著賊犯敘李被執緣一蘅為總督欲繫諸郡以辱之李大呼曰總督公奉命勦賊必殄絶汝類賊怒碎其尸於塗夏氏宜賓人樊一若妾年二十被賊執厲聲罵賊奪刀自殺賊怒懸其髮於梁肢解死文氏宜賓人舉人文之煥女廪生樊斗卯妻斗卯死於賊文年二十七誓不再嫁辛勤撫育子女以節終周烈女富順人周孟端女正德癸酉廖賊入境周與羣女匿巖穴中賊得之周投江死時年十九父母哭於江濵其尸忽浮水面人咸嘆其靈異蕭氏張氏蕭北直人張山西人俱宜賓李春先妾春先早歿蕭年十八張年十六皆守節以壽終韓氏珙縣人張仲雍妻嘉靖丙午土賊劫掠仲雍被殺韓抱女投巖下賊引藤下援韓罵賊死楊氏南溪人談本立妻年十八適談未一月夫歿翁姑繼殁夫弟方二歲楊撫之為娶妻夫弟旋卒弟婦有遺妊欲嫁楊懇留之産一子楊復撫之姪娶後又卒姪婦遺腹生子而姪婦别嫁楊又撫其姪孫世傑娶余氏生三子談祀賴以不墜年七十卒劉氏南溪人羅秉禮妻年十九適羅生二子越六年夫故守節撫孤二子旋故育孫曾入庠年八十一卒翰林李廷機贈云劉氏早歲鏡分寧忍一家以無嗣中年珠碎能堪百歲之傷心奉旨旌表李烈女富順人李定女其家素未嫻禮幼以女許聘同姓子後有别姓圖娶執同姓應離律欲奪之女曰我豈犬彘可輕許兩姓哉遂縊死魏氏富順人適劉福壽生一子夫歿守節拾禾以教子後登科甲詔建坊旌表之楊氏富順人司馬楊述忠女讀書史工文詞適隆邑庠生郭懋宏未踰年懋宏抱病臨訣時遺命續嗣氏許以死殉乃書誓詞于帶曰妾心一片鐵不與紅爐滅煢煢未亡人茹苦肱九折一死鴻毛輕豈受風塵紲妾髮可剪頭可截越二年懋宏胞弟生次子孝懿氏遂立為嗣長七歲氏曰可以死矣爰歸寧自縊天啓五年旌表陽氏富順人庠生楊炌妻年二十八守節教子維喬登乙丑進士何氏何氏張氏高縣人魏天威之妻妾也奢酋叛天威獨負母逃三氏走避至三角岩遇賊欲汚之三氏攜袂同赴水死天啓間旌表一門三烈舒氏富順人萬鼒妻年二十守節至八十有七歲卒楊氏富順人周衡妻夫亡苦節三十餘年駱氏富順人甘芹妻芹卒氏守節終身熊氏富順人適庠生劉堯銓堯銓病劇氏割股以救及卒伏棺痛哭幾斃慰之者曰以子才貌何自苦乃爾氏聞而詈之遂割鼻自矢孀居數載獻逆至罵賊不從慘戮而死李氏長寧人蹇文卿妻年十九守節至八十四歲終詔旌之楊氏宜賔人兵部侍郎劉之綸妻守節教子遇寇被執賊逼之氏曰我命婦也豈為賊屈罵不絶口賊剮其兩乳死邵氏夏氏宜賔人尹方伯伸之妻妾也獻逆至避難山中俱為賊所獲罵賊死楊氏尹恩妻伸長媳郡人楊僉事藝春之女與姑同時被獲不為賊所汚並死之龎氏長寧人馬純妻年二十六夫喪家貧守節姑憫其年少欲令改適氏誓死不從紡績奉姑撫遺腹子成立以壽終楊氏長寧人舉人李元勳妻元勳卒三年不出户庭姑病刲股愈之撫子婚畢子旋歿與媳車氏守節撫其孫成立年七十卒朱氏長寧人諸生侯啓雍妻年二十五守節至八十有五卒胡氏廩生范璵妻隆昌胡學使克開孫女崇禎庚辰賊至氏同夫避於縣西明通寺賊追及並執之強氏行氏攜女罵不絶口遂遇害盧氏副使元卿女隆昌庠生劉兹妻獻賊至兹被獲賊殺之執盧氏強之行氏紿曰必見夫尸乃行及至兹死所抱尸痛哭罵賊死陳三姑高縣人陳徵女幼許聘黃應昌未嫁應昌卒適流寇至避落角硐中賊破硐欲汚之投水死郭氏筠連人彭儒妻年二十二儒卒遺子應元甫三月郭守節孝舅姑撫應元成立任教職年六十卒學使旌其門曰貞節詹氏筠連人李霖妻年二十守節至六十歲卒李氏筠連人嚴安妻年十八安卒守節教子厯七十歲卒蘇氏筠連人李永年妻奢賊掠境蘇被獲強之行至鳴鳯岡墜崖死母氏筠連人蘇亮工妻乙酉流賊破城挾氏行至鳴鳯岡墜崖死尹氏羅氏俱筠連人尹為陳登彥妻羅為陳臺妻同避流賊於落瓦硐賊破硐被執欲汚之相攜投崖死李氏宜賔人李合宗女庠生余智妻崇禎甲申賊至與夫俱被執大罵不屈同死之張氏屏山人庠生瞿蕙妻年二十一守節至八十三歲卒建坊旌表安氏沐川土司夷太平妻年二十八守節養姑撫子逾二十年姑歿安哀毁成疾不數日亦卒事聞旌表直𨽻敘永廳樊氏永寧人聞克明妻年十八守節家苦貧辛勤教子道立得中鄉試纍官浙江司員外郎萬厯間建坊旌表張氏永寧人庠生周登順妻年二十二守節教子于用中己酉鄉試授湖廣承天司理氏常朂以寬慎有所平反則喜一日謂其子曰吾苦志教汝至此而逺離汝父之墓非吾願也于用泣下遂致仕歸萬厯間奉旨建坊曰節孝兩全四川通志卷十一上欽定四庫全書四川通志卷十一中列女夔州府明楊氏瞿塘衛千戶楊武女適千戶劉本天順丁丑本以從征清浪陳亡楊年十八誓不再適教子有成襲補父職成化丙午旌表其門年七十終黎氏雲陽人王存輝妻存輝早歿氏守志事舅姑撫遺腹子苦節四十五年成化間旌表黎氏雲陽人年十九適王曾曄生子軫甫一歲曄卒黎養舅姑撫幼子誓不他適孀居四十五年成化末年旌表胡氏萬縣人庠生隆海宏妻年二十一守節撫孤正德九年旌表屈氏新寧人年十七適李茂植鄢藍賊猝至夫遇害欲脅氏以去屈曰吾夫既死恨不啖汝肉耳賊怒殺之易氏雲陽人適王大用年十八守節撫子貢成立貢卒又撫其孫嘉靖三十四年旌表史氏向氏俱奉節人史為梅成羹妻年十七守節撫子時際成立向為庠生梅調羮妻年十九守節撫子時黃入庠隆慶六年太守郭棐表其門曰一門雙節方氏奉節人瞿塘衛舍餘聶宗妻年二十二而寡撫遺孤甘貧守節萬厯三年旌表周烈女奉節人周良之女幼許字楊時忠及笄未嫁值鄰家火時忠馳至以手援之女慙憤赴火死萬厯二十七年豎烈女碑表其墓曹氏奉節人瞿塘衛指揮方天祿妻年二十六天祿領軍戍守柳州道卒訃聞曹斷髮自誓孀居六十餘年萬厯間建坊旌表任氏奉節人瞿塘衛指揮任忠女適曹鶚鶚卒年二十撫孤守節至六十六終華氏奉節人華泰女適瞿塘衛左所陳佐佐卒華年二十有二家貧守節事姑育子初終如一曾氏奉節人守清女適瞿塘衛王瑜瑜卒曽年二十撫孤守節卒年七十有二方氏奉節人向雲漢妻年十八守節事姑育子厯六十餘年有司旌其門談氏奉節人有齡女萬民化妻年十七守節閉戶課子戚屬少見其面郡縣表其門曰芳節凌寒張氏奉節人適諸生金邦賢年十九守節厯六十年上官屢旌其門胡氏巫山人向文質妻文質早卒子繼殤氏苦節事姑事聞旌表晏氏巫山人聶子傑妻子傑卒與妾侯氏年俱二十七苦節撫孤曾氏巫山人向瓊妻年二十一而寡子雲鶴尚幼撫孤守節備厯艱辛袁氏巫山人向雲鶴妻年十八雲鶴卒遺子巽方襁褓姑憫其少欲令更適袁誓死靡他與姑同節厯三十年縣令旌曰一門雙節向氏巫山人張獻臣妻夫卒撫遺腹子光祖成立守節四十一年後奉旌表馮氏巫山人庠生向豫誠妻豫誠卒氏撫遺腹子大學成立守節終身後旌表黃氏巫山人江儀妻儀溺于江氏聞之泣奔溺所投水死閲二日抱夫尸浮於水面事聞旌表楊氏巫山人楊深女庠生羅英妻年二十六守節訓子嚴肅年七十有五終後旌表宦氏巫山人冉天恩妻年二十夫病篤割股救之及卒姑令再醮氏誓死不從守節厯五十餘年後奉旌表魏氏巫山人庠生黃瑛妻年二十守節厯三十餘年劉二虎寇巫氏子煥被驅入營氏遂自縊於夫之墓側龔氏萬縣人幼許傅承爵閲三年承爵歿家貧守節父文試憐其少令他適氏遂自縊死崇禎十年旌表侯氏巫山人庠生黃甲開妻流賊入境氏被執罵賊不屈死王氏巫山人陳大位妻年二十三夫喪守節撫二子成立值流賊破寨義不受辱攜媳王氏及孫女孫男俱投巖死陳氏巫山人馬猶龍妻猶龍遠出陳孤苦自持姪馬華計賺至家陰許賊將惠養亷為妾令人誑迎之氏料不可脫欣然往紿養亷先寢托故出反扣其門自縊死張氏巫山人士魁女何某妻值兵燹為賊所執欲汚之不屈死張氏巫山人庠生國忠女劉養氣妻夫卒有欲奪其節者氏乃置酒遍邀戚眷辭之凡三日畢閉户自縊談氏巫山人庠生劉大同妻避兵山中流賊破寨氏不受辱投崖死劉氏巫山人庠生方日旭妻流賊執之義不受辱罵賊死彭氏梁山人庠生許繼文妻年二十守節撫孤學使旌其門曰婦行不虧趙烈女梁山人舉人趙趣女年十五值賊陷城被執罵賊死都御史林俊以聞建貞烈坊汪孝女梁山人安宅女事親孝父將議聘女曰父老矣無子且二姊已歸女願依父以老遂終其身不字李氏梁山人來某妻夫卒守志冰操凜然建坊旌表戴氏梁山人楊某妻夫卒青年苦節表其坊曰正德象賢隆氏萬縣人冉應海妻生子未彌月應海卒誓不再嫁孝姑撫子事聞旌表陳氏萬縣人庠生向東妻年二十一守節撫子婚娶子尋卒遺腹生孫甫一嵗其媳又卒陳育孫成立邑令陳敏貫表其節解氏萬縣人傅萬榮妻年二十三守節厯年六十一終張氏萬縣人適向東洋年二十二守節課子入庠縣令表其門曰貞節崔氏萬縣人進士竒勳女適庠生沈逾越五年生一子夫卒遂剪髮自誓教子遊泮縣令旌其門曰苦節可風萬氏萬縣人陳某妻談賊破城被執氏知不免紿以夫有金藏崖畔賊取之氏墜崖死向氏萬縣人陳某妻姚黃賊渡江氏夫營一巖洞避之賊破洞殺其夫氏攜二子墜崖死談氏萬縣人監生用豫女適梁山庠生古元直值流賊陷梁山被執罵賊觸階而死賊壯其節令掩之何氏開縣人秦昻妻年二十八守節子翰才甫二歲族人欲滅孤利産逼嫁之何誓死無二後翰才弱冠遊於庠汪氏開縣人適庠生熊飛生二子年二十有八飛卒撫孤守節邑人賢之陳氏開縣人年十八適周倫倫早卒陳年二十有四奉姑孝教子體膺歲薦年八十七卒陳氏開縣人甘某妻年十七守節舅姑欲奪其志陳假歸寧投水死姚氏開縣人適遊治治卒年二十撫子文選膺歲薦年八十卒鄭氏開縣人向潘妻年十九守節厯八十餘歲卒龍安府蜀漢李氏守將馬邈之妻炎興元年冬十一月鄧艾深入陰平徑達江油邈不為備一日閲軍天甚寒邈歸私室與妻擁爐妻曰近聞邊關告急君豫然何也邈曰天子聽信黃皓溺於酒色吾意禍不逺矣魏兵至日吾必降李唾面曰君為男子先懷不忠不義之心虛受國家爵祿吾何面目與君共立乎邈默然忽報鄧艾已入城邈大驚忙出降李聞之自縊死艾門其故邈以實告艾憐其賢具棺葬之靜軒詩曰可憐巴蜀多名將不及江油李氏賢明袁氏平武人袁成保女年十八適庠生嚴庸永樂五年庸至興文棧道墜江溺死袁聞訃奔至溺所投水死家人購尸兩月弗得至潦盡灘清漁人李大用於沙回頭河見袁氏與庸二尸相並於崖側有司上其事表其門為貞烈任氏判官王正妻正故守節不二事聞旌表李氏石泉人蹇俊妻年二十夫亡子大亨在襁褓中氏教子成立年八十一歲終石氏石泉人判官李昺妾昺卒無子氏年二十二苦節二十餘年卒劉氏青川指揮女也年十七適指揮高嵩踰年嵩卒劉越三月生遺腹子登撫成廕襲孀居六十年事聞旌表張氏青川王世英妻夫卒二子繼亡遺孫廷用僅一歲氏撫廷用成立百有三歲終有司表其門曰節壽柴氏青川廩生李南山妻夫亡孀居教子允陽膺選貢厯四十年終吳氏松潘衛指揮吳偉女年及笄歸衛鎮撫謝郁正統癸亥秋郁以疾卒閲三日吳自縊事聞旌表徐氏松潘衛人都指揮僉事徐貴女千戶馮政妻年二十守節撫六月子昶成立都御史表其門蔡氏松潘衛人徐琮妻琮陳亡子甫一歲蔡守節育子啓成立卒年六十黃氏松潘衛人張勳妻勳早卒守節育子曉成立正德十六年巡撫旌表其門路氏松潘衛人指揮徐承業妻年二十二而寡守節六十載壽八十二卒有司旌之堯氏松潘衛人指揮謝世源妻痛夫陳亡拔刀自刎被救得不死守節三十餘年巡按以事聞旌表何氏松潘衛人指揮徐仁妻守節撫子嘉靖中旌表常氏松潘衛人諸生陳其䇿妻夫亡守節教子成立女適夏之良亦早卒母女同室孀居有司旌其門曰雙節劉氏松潘衛人諸生馬既佶妻佶早逝劉守節課子成立孀居四十年年七十卒白氏松潘衛人指揮李恩妻恩戰亡白年二十守節壽至九十五卒萬厯間旌表王氏松潘衛人適廩生黃尚義甫期年尚義卒與姑同居一室三載終喪姑憐其少欲令改醮氏閉門自縊事聞旌表朱氏松潘衛人王楊忠妻忠卒氏青年守節厯五十載張氏郡人年十七適嚴某生子明典明謨夫卒氏苦節教子俱為庠生崇禎間建坊旌表徐氏松潘衛指揮之女歸千户指揮韓鍾英崇禎丁丑鍾英援茂州死之徐年二十割耳自誓奉翁姑育孤子成立年八十二終奉旨旌表馮氏松潘衛庠生吳永捷妻永捷亡撫子廷彝入泮守節三十年徐氏松潘衛廩生徐英妻年二十六守節撫子成立年七十有五終寧逺府明陶氏西昌人姚敬妻年十九守節撫遺腹子嶽成立事聞旌表陳氏冕寧人貢生步之俊妻夫亡守節三十餘年鄧氏冕寧人適貢生陳竒藴藴早喪鄧守節三十餘年余氏冕寧人鄧應學妻夫亡無子苦節四十二年黃貞女越巂衛人幼字同衛某未歸而夫死黃聞訃即誓志不字以處女終事聞旌表陶氏越巂衛人程雲妻夫早逝氏青年苦節事聞旌表周氏唐氏周為越巂衛指揮王自敏妻唐為衛庠生湯謂妻姻婭也流賊攻城甚急二氏知不免相謂曰等死耳遂閣室自焚又庠生張光裕聘王氏吳獻才聘俞氏唐純智聘宋氏吳鶴臯聘唐氏同時赴火死俱越巂衛人雅州府宋黃神女郡人少好清虛辟穀茹柏天禧間年及笄父母欲嫁之氏即飄然赴水死父母思之匆從雲中現致詞曰吾本上清侍書姬也因小過謫下人間今復還仙班矣言訖而去朱氏郡人適李愷愷客遊建昌卒朱誓不改嫁年七十餘終史琰字琰玉蘆山人張履妻聰慧能文履甥楊巽為學正每休沐輒謁見相與窮日論文凡命題課士多就正之事載黃山谷碑贊明田氏雅州千户廖武妻武卒無子氏營舅與夫葬守節事姑巡按鄒堯臣嘉之曰田氏節行異常誠百鳥中孤鳯也為旌其門楊氏天全人招討顯招女適招討使高松年二十守節事姑教子𢎞治間旌表馮氏郡人庠生宋鑾妻年二十守節撫孤厯六十六歲卒任氏郡人庠生湯茂藺妻夫疾篤氏割股以進遂愈有司表其門曰克盡婦道薑氏郡人適楊倫生子茂春倫早卒茂春旋故氏守節事姑厯六十年伍氏榮經人諸生黃信賢妻二十而寡孝舅姑守節教子年六十餘終王氏榮經人貢生時清女周應詔妻年二十四守節至七十餘歲終高氏榮經人劉東陽繼妻夫任上海與倭寇戰歿氏年十九殮尸扶櫬歸苦節厯七十八歲終黃氏榮經人教諭㻦之女諸生嶽遂妻年二十五而寡家貧守節至八十歲終黃氏榮經人饒州通判王心妾夫病篤憐氏年少令改嫁不從及卒扶櫬歸毁容守節厯二十九年李氏榮經人貢生張廷臣繼妻年二十二守節撫子正傑文傑俱成名年七十餘終馮氏蘆山人布政使張斐妻年二十八斐卒於官毫無遺資苦節厯九十三歲終楊氏蘆山人李應陽妻年十八守節撫遺腹子郁成立學使匾其門曰貞節馬氏蘆山人年少孀居鄉里欽重薑氏蘆山人夫死守節以終薑氏天全人百夫長薑珏女七歲隨母謝氏赴京奏茶課因進為宫人七日不樂召謝賞鈔令引還適鄉人王佐佐早卒薑年二十生女適高昻昻亦卒女同母志守節不渝人以雙節稱之王氏清溪人指揮曹學瑋妻年二十三守節撫子勳承襲父職巡院旌之唐氏清溪人年十七歸諸生張廷臣二十一而寡孝舅姑教子成立年七十餘卒直隸嘉定州雍正十二年升為府漢趙氏字媛薑犍為盛道妻建安五年夫妻以罪繫獄媛薑中夜脫道桎梏授以資使攜子走媛薑度道去逺乃以告吏甘受刑後道父子以赦歸感其義終身不娶宋牟孝女名阿回榮縣人年十歲牧牛至晚母迎之歸及中途虎銜母去阿回大呼疾走持杖擊虎虎乃舍其母母尚能言父與鄰人偕來虎乃去母尋死全尸而返向氏向太后從孫女榮縣王孟易妻夢易卒守志立節鑿洞雙溪之側延師教子長庠次序俱成大儒郝節娥州人母故娼也娥五歲時家苦貧賣洪雅良家及笄奪歸逼為娼娥曰願習女工以給母母怒且箠且罵密與邑少年期因祀蠺叢具酒邀娥娥見少年即驚走母挽娥強飲之娥嘔吐滿地少年卒不得侵娥遂投江死鄉人謂之節娥云陸氏州人李亨甫妻年二十二守節奉姑育子事聞旌表明李氏州人黃文進妻年二十二守節事姑教子洪武中旌表安氏州人程御史啓充妻少通孝經列女傳事姑與夫盡其道夫坐事戍遼安悲憤卒吉氏金陵人程啓充繼妻年二十有四啓充卒家難頻仍吉屹然自樹撫子成立沈氏州人郝明德妻年二十守節撫子彥禮成立事聞旌表陳氏州人陳宗女適太學生李穎年二十九守節教子吉登進士官大理評事贈孺人詔旌其門李氏州人梅方伯應魁繼妻年二十四應魁卒守節撫子新新之妻任氏年二十八新卒無子苦節一如其姑並賜旌表韓氏州人工部尚書童瑞妻纍封淑人姑易氏病危割股以進遂愈事聞旌表鍾氏州庠生伍河妻年二十二守節撫子傳成立厯五十年卒王氏州人少參王詠女適諸生楊偕偕早卒無後氏為立嗣矢志守節厯四十餘年詔旌之李烈女犍為人名射姑年十六隨父母避難相失遇賊欲汚之氏拒罵不從賊怒支解其尸正德間旌表其血痕至今尚存山石間程氏州人儒士程直女適雷煥宙未一年夫死撫遺腹子成立苦節四十餘年卒陳氏州人陳政女參將楊景新妻袁韜賺殺景新父楊展圍州三月城破景新與陳同死馮氏州人庠生帥振邦之母夫亡守節有圖安者率衆強逼之氏大罵自縊死事聞旌表葉氏州人庠生葉桂芳女冷逢泰妻逢泰久病氏剜股以進疾愈州守鍾振旌其門教子極嚴一日子見薦紳車馬過里心異之呼其名以告氏氏曰車馬何足榮且小子呼長者名彼雖不聞爾則慢矣遂鞭其背後子遊於庠里中溺愛其子者皆化焉李氏峩眉人楊鸞妻年十七守節撫遺腹子再傳任江南安慶府知府封宜人劉氏洪雅人教諭劉養鋭女適劉昌年頗識文字言多典則夫卒無子時年二十八守節撫孤女至八十餘歲卒祝氏洪雅人庠生祝籛妹適夾江李鳴和夫蚤喪祝以守節自誓經厯患難始終不渝享年八十餘歲籛媳宿氏楊氏陳氏陳氏王氏並籛少女祝氏避兵山中懼為賊所劫六氏俱投水死蓋節烈固其家風云袁氏洪雅人御史張鵬側室鵬卒漳南袁年僅二十攜三子扶櫬還守節四十年嘉靖癸丑有司以聞詔封恭人陳氏洪雅人庠生胡其慎妻割股療夫疾不起遺長子公願甫二歲次子公裔甫一月陳以撫子自誓嚴課二子皆成佳士年八十餘卒馮氏夾江人諸生查述妻述早卒守節至七十餘歲終事聞旌表郭孝女犍為人郭大宏女年十四隨母楊氏早出會雲霧四塞遇虎搏母女力救之母脫女傷有司匾其門曰孝烈楊氏關中人安主事聘為繼室未婚而安卒楊號泣赴弔子安磐憫之勸還母家楊不可堅心守貞未幾磐卒遺孤七月氏與磐妻吳氏共撫育之後成立楊年五十六終內翰方池祭以文曰生不忘未面之夫子死不忘再世之遺孤云云康氏犍為人庠生曾加禮妻年十八夫故遺腹生子魯撫子成立事聞旌表聶氏犍為人車用隆妻年二十守節事聞建坊表之周氏犍為人郭邦妻年二十守節孝事孀姑撫育二子年九十五卒事聞建坊表之楊氏州人武舉楊忠女庠生郭大年妻獻賊殺大年氏曰願同夫死賊義之乃出所生幼子付姑從麗正門城上躍入江中死江氏犍為人孝亷周時望妻年二十無子守節至九十歲卒有司屢旌異之聶氏犍為人汝器女監生魯劵妻年二十六守節訓三子俱入庠年九十卒有司奉例旌表羅氏犍為人諸生周廷元妻孀姑病篤割股活之既而夫疾亦然車氏犍為人庠生萬彭齡妻彭齡早故氏守節不渝馬氏犍為人謝鈴妻夫卒無嗣守節終身羅氏犍為人包正興妻年二十四守節撫子應舉成立孫蒙吉登賢書卒年七十有五袁氏二女犍為人長名可慈次名可順父俊病危二女皆未及笄同時割股以救父病愈事聞旌表陳氏二女犍為人孝亷陳天祐女賊陷蜀天祐不屈夫婦俱被殺賊官任元祐拘二女置輿中舁經縣學前二女揚聲曰我陳氏二女也今往與父母同死一處斷不至玷我鄉黨及至營門見父母尸踴身撞石指賊大罵遂遇害吳氏二女犍為人俱早寡值兵變為所獲皆挺身冒刃而死劉氏諸生王昆璿妻年二十三守節家極貧撫子入庠侯氏總兵良柱孫女縣丞楊明新妻年二十二明新歿偽將竇知覺謀強娶之侯義不受辱遂縊死任氏孝亷乘龍女庠生彭大同妻獻賊索諸生赴省試大同遂死成都任設酒邀戚鄰永訣自縊死胡氏諸生帥多翼妻夫死成都氏年二十二事姑育子苦節三十餘年直隸眉州宋程氏州人適蘇洵通經史有氣節生子軾轍時洵遊學四方程教二子以書甚嚴每語家人曰二子必不沗蘇門軾嘗讀范滂傳慨然問曰軾若為滂夫人許之否乎程曰爾能為滂吾顧不能為滂母耶師冀二女州人冀官右正言靖康中避難還蜀至唐州方城驛遇賊執二女長曰宜速殺我次抱其子不從賊並殺之元楊氏州人父仲文以春秋世其家學明於性學楊氏在室即能通曉適內江虞汲生子集宋末兵燹汲挈家避嶺外無書可攜楊口授集論孟左氏傳歐蘇文比還已盡讀諸經通大義後集以文章名世皆母訓也明諶氏州人黃裳妻正統間裳以進士任行人卒於京無子諶年二十有四守節二十八年成化間有司以節聞詔旌表其閭張氏青神人余祥妻尚書子俊母孀居三十年有司上其事特旨旌表程氏青神人茍翔妻翔卒氏年二十五教子延年領鄉薦任源江知縣延齡充邑庠生年九十五終御史督學皆旌其門直隸卭州漢陳氏臨卭人適楊鳯圭圭歿生遺腹子族人欲其改嫁陳引刀割咽幾死卒全其節五代黃崇嘏州人孟蜀女狀元工詩事詳詩話宋程小姑大邑人姚三五妻姚他出小姑煢處閨中夜漏半強奴挾刀逼之小姑號呼義不受辱身被重傷竟全大節縣令上其事論奴如律大觀中封旌德縣君俞氏蒲江人節判盧翼妾姑田氏年八十餘病篤俞割股以進病愈知縣朝賓申表其門明喻氏州人廩生孫繼齡妻夫亡苦志有貞節坊劉氏州人庠生楊春妻卒氏矢志不渝後建貞節坊彭氏州人常天祐妻天祐早喪氏苦節自甘有貞節坊張氏州人劉東妻年二十守節事翁姑養葬盡禮憫父母無嗣迎養於家及卒安厝畢嘆曰豫四十年來不早死者以翁姑在堂父母無後耳今事畢矣遂自縊事聞建節孝坊吉氏蒲江人庠生廖啓祐妻夫病割股及卒哀泣失明守節教子萬厯四十年旌表雷氏蒲江人庠生廖英妻年二十夫歿撫棺號泣遂終萬厯四十年旌表王氏州人舉人劉道貞妻崇禎十七年獻賊破卭州道貞起義兵與賊戰死賊大索家屬縛氏至罵賊不屈賊殺之直隸潼川州雍正十二年升為府晉李秀州人名秀寧州刺史毅之女也明達有父風時五種夷圍州毅憂憤卒衆推秀領州事奬勵將士堅城固守糧盡炙鼠拔草食之伺夷稍怠輒出兵擊破之宋賈氏楊揄母夫死不嫁事舅姑以孝聞舅姑年俱九十餘乃終賈喪葬盡禮有芝草生於墓側賈年八十康健不衰榆登淳熙進士詔旌其門明楊氏州人舉人楊茂女適何宗禮甫七月夫死氏年十七誓不再嫁奉舅姑四十五年操守清約後旌表姚氏州人張保兒妻夫亡子方五月氏守節撫孤厯四十餘年宣德初旌表錢氏二烈女州人錢汝吉女長菊秀年十七次粉嬌年十五俱有殊色天順間賊首吳升掠鄉村汝吉遇害二女義不受辱投涪江死劉賽姑州人劉嘉雄女正德間流賊肆掠賽姑避於大獲山賊搜獲之大罵不從賊怒斷其手而去張氏州人庠生嶽庭鳯妻被賊執大罵之遂見殺事聞旌表黃小姑州人大政之女李子明妻為賊所執黃罵不絶口遂遇害有司表其墓張氏州人王以衡妻以衡將死張舉首撞地謂之曰君必不起我先死待君於地下是夜自縊以救免衡死張勺水不入口旬日亦死時年十七謝氏州人適王姓夫卒謝年二十翁姑欲奪其志嚴拒之既而勢不可爭乃散所有於衆夜閉夫室自盡事聞旌表黃氏州人副使黃偉之妹劉異甫妻年二十三而寡事舅姑撫子守節終身嘉靖初旌表歐氏州人張正論妻年十八守節育子世印成立厯年八十奉旨旌其門曰青年白璧石氏州學生任國玉妻國玉卒氏年十九髠首毁面孀居五十年卒事聞旌表賽蓮州人侯元亮妻年二十三守節厯五十餘年卒楊氏州人年十五甫嫁夫殁楊割鼻剪髮誓志守節年八十卒後旌表黃氏鹽亭人周環妻夫亡氏青年守節厯百有五歲萬厯初旌其門曰百年人瑞陶氏安嶽人彭鶴端妻夫故遺一子陶撫之成人為娶婦旋俱亡又撫遺孫吉成立年踰七十終萬厯三十六年旌表張氏州人御史張錫命女遂寧孝亷黃纘妻守孀嚴謹賊陷城執之罵賊死黃氏州人解元黃文麟女適歐如虹被賊執不屈死朱氏州人貢生楊先憲妻崇禎甲申賊執之罵賊死李氏州人鄧嘉賓妻嘉賓病篤謂李曰若年少其他圖之李泣曰妾之不死徒以幼子故耳乃斷髮預入嘉賓柩中嘉賓淚下歿後李苦節教子以壽終黨氏州人李明逺妻年十八明逺歿子瑤甫一歲黨與繼姑張氏共勵清操撫瑤成立及張卒瑤亦卒家極貧黨志愈堅吳氏州人舉人萬谷暘妻獻賊拘士紳家口入城姑曰汝子女幼宜撫之我當往吳曰姑年老願以身代拜辭畢子女泣留之吳絶袂而去至則死之缺氏進士李為鼐妻夫逺出聞賊至成都恐為所辱自縊死楊賽姑射洪人未字時為賊所執欲汚之投崖死張氏射洪人十八歲喪夫無子女獨居高樓四十八年詔建貞節坊虞氏射洪人許升妻年十九守節撫二子俱成立其一名思正任渭南縣丞猶氏射洪人庠生張貞妻夫死氏立誓守節以終後旌表楊氏射洪人庠生謝皇鎛妻獻賊破城自縊死蒲氏射洪人庠生謝皇錫妻被賊虜逼上馬馬上自刎死蘇氏鹽亭人陳子剛妻年二十四守節撫遺腹子魁成立以節終伏氏鹽亭人雷昺妻年二十七昺卒無子守節孝翁姑至八十歲終文氏鹽亭人李通妻年二十四無子守節孝事舅姑至九十歲卒許氏鹽亭人何瑛妻年二十二守節孝於姑撫子溥長能成家溥生四子氏教育之八十二歲卒周氏鹽亭人庠生顧鼐妻鼐遊學營山死於賊周年二十三矢志守節育二子成立年百有餘歲卒孫氏鹽亭人顧鼎妻年二十鼎死氏甘貧守節至九十五歲終趙氏中江人庠生劉世芳妻年二十世芳死遺子湛氏苦節課子厯七十載崇禎間旌表鄭氏遂寧人文斗女明經曠世觀妻世觀早卒鄭苦節四十餘年能恤里中婚葬貧乏者事聞建乾坤正氣坊曾孫曠昭官至都憲六世孫廣亦年少登第人以為節惠之報冉氏蓬溪人貢生冉學宗女遂寧庠生余隆秋妻年十八夫卒孀居至老事聞旌表馮氏遂寧庠生盧可嘉妻年二十三守節上奉孀姑下鞠幼子邑令旌其門曰靡他著節潘氏遂寧人曠昭妾昭卒潘年二十遺子古鏞甫一歲苦節撫之鏞長就外傅稍不勤學則持而泣曰我忍死至此以有汝耳汝不學吾何以見汝父於地下厯二十餘年鏞竟成名董氏何氏郭氏蓬溪人王峩妻妾夫歿同心守節撫子王庭登第事聞建一門三節坊蒲烈女射洪人幼許字楊謙未婚夫亡遂自縊崇禎間旌表鄭氏蓬溪人庠生談文仁妻年十六守節厯三十五年陳氏蓬溪人良才女談性妻為賊所獲逼汚之氏大罵不從遂見殺李氏安嶽人張貞學妻年十八夫亡無子氏守節奉翁姑晨昏定省厯四十年不衰曹氏樂至人適朱姓夫年甚幼與曹不相稱翁欲嫁之為子再娶同齒者女曰吾惟從一耳遂自刎事聞旌表吳氏樂至人鄒應第妾應第與長子暨正室盧氏相繼卒吳無子偕長媳王氏撫其孫簡臣中崇禎間鄉試苦節四十六年卒吳氏樂至人鮑子儀妻守節旌表荆娘樂至人楊文煥妾文煥卒苦志守節賊陷城被執大罵殺之直𨽻瀘州漢元孝女州人名紹父尼和為漢符縣吏縣長趙君遣尼和詣巴郡溺水死召聞之乘小舟至父溺處哀號自沈見夢於其弟曰本月二十日當與父俱出弟往候之至日果浮於江郡縣上其事建碑以旌其孝元鄢氏合江人青巾賊至被虜奪刀自刎事聞旌表祀節義祠明劉氏州人李堯中妻夫歿截髮教子以壽終事聞旌表楊氏州人李春妻春早卒守節事姑以孝聞年七十終奉詔旌表胡香州人張琴妻琴患惡疾見者掩鼻走香事之不少違及卒遂自縊葬同穴焉史氏州人史榮女年二十適馬仲芳彌月伸芳溺水死史抉一目守節以終趙氏瀘州衛千戶韓繼先妻年二十二守節撫子應綬成立年八十卒旌表鄧氏州人庠生張鳴鐸妻年二十二歲守節厯五十餘載撫子健登甲第事聞建坊旌表黃龍英州人黃銘女十六歲被賊曹甫劫掠龍英罵不絶口賊怒斬其首奉旨以育姿秉正頭斷不汚清冢流芳紅顔如在坊旌之黎氏州人黎鶴山女胡大斗妻流賊攻破白馬硐大斗遇害賊強之行黎不從自刎死陳氏州人舉人高在崙妻避賊山中被執罵賊見殺鄧氏州人李應林妻林早卒氏貞節自持撫子成立州牧旌之馮氏江安人馮敏季女幼聰慧通列女傳未字敏卒葬之日斷左小指置壙內誓不受聘母弟欲許字人令婢諭意女操刀擊婢事遂寢縣令余緯上其事旌表焉杜氏江安人杜堅女庠生陳尚文妻尚文卒無子誓死守節厯七十餘年事聞旌表文正針江安人文愛萬女有姿容年十七為流賊所執義不受汚投江死嘉靖己丑知縣薑梁訪求節義為録其事胡氏江安節婦嘉靖壬子奉旨建貞節坊元氏合江人父渡江溺死氏至死所赴水求父尸三日後抱父尸浮出事聞旌表羅氏合江人庠生王悅妻天啓辛酉奢賊陷城羅被執悅奔趨求贖之羅大聲曰君莫至贖我無具恐反罹害也遂投馬街渡死事聞旌表閔性善納溪人甫五歲父亡依舅氏養母有求配者性善曰母所依在我若適人將何依誓不嫁母疾祝天刺血和藥立愈及卒負土成墳時稱為孝女云李氏納溪人庠生趙繼鱗妻遇曾英敗兵於巖頭遂投崖死繼鱗後續娶傳氏即傳貞烈孫女乙酉丙戌間歲大歉斗米十金繼鱗指潭水語傅曰我知不能活將從河伯遊矣若尚少當更有憐而收之者傅曰君疑我不能死耶即隨夫墜淵死王氏納溪人庠生閔翼聖妻乙酉避賊蘆延鄉賊有謀奪之者王投繯死賊義而葬之王氏庠生易衍禹妻乙酉歲被賊獲不受汚大罵墜巖死高氏納溪人年二十五夫歿子幼氏織絍撫孤誓不他適守節五十三載年八十餘終直隸資州五代花蘂夫人資陽人蜀王王建妃建子衍敗妃賦詩自縊死葬於邑明董氏州人王宗妻夫卒年二十四子湛甫四月董語人曰女子以身事人今夫亡妾當與俱亡奈舅老子幼何遂親舂汲以事其舅擇師訓子底於成立苦節終身桂氏州人沈思妻年十九守節織絍事姑厯四十餘年卒冷氏州人蕭傑妻年二十三守節撫一歲孤底於成立卒年八十有三孟氏州人鄧祥妻祥卒子甫五歲氏撫養成立苦節三十年郭氏州人張墉妻年二十五而寡守節以終王氏州人饒興仁妻年十九守節家甚貧養姑克孝撫遺腹子恩厯六十餘年卒張氏州人庠生查聨舉妻聨舉歿姑年八十氏守節養姑終身無二志蔣氏資陽人適王九臯攜蔣隨父宦雲南旋病卒蔣負骸骨歸葬時年二十一撫幼子萬鼎節操凜然吕氏資陽人陶琰妻琰卒子生方兩閲月氏年二十一守節奉翁姑教子成人陳轉桂資陽人陳紹陽次女受諸生孫瑞林聘未嫁瑞林卒轉桂聞訃即縞衣血拜辭父母往赴喪父力阻之遂持刀自刎以救免仍刺骨立誓不嫁父憐而養之繼母病割股愈疾事聞旌其節孝李寶哥資陽人李一元女受黃應奎聘未嫁應奎卒有求娶者父母皆許之李堅不從衣黃之聘衣自縊死時年十九事聞旌表朱氏資陽人諸生陳璟妻璟為獻賊迫試未歸婦知不免遂扃其戶自縊死陰氏內江人王尚賓繼室年二十二而寡前妻遺一女亦孀居母女相依矢志不渝黃氏內江蕭世隆妻年十七守節事舅姑厯三十五年始終一致馬氏內江人田某妻年二十八守節教子泓領戊子鄉薦事聞旌表吳氏內江人都御史馬炳然妻炳然赴任南都舟行遇賊被害吳泣曰公死矣我義不可辱遂抱幼女赴水死事聞旌表陳氏李氏俱內江人陳為巡檢蕭騰妾李為贈監察御史蕭露妾俱苦節撫孤陳之子世建充庠生李之子世廷舉進士年皆逾七十乃卒嘉靖間建雙節坊冷汝玉內江人郎中冷向春女隨父任南昌以奏績北上至棗林閘夜遇寇汝玉躍起曰父可自為計勿以我為念即赴水死僉事方豪作棗林怨以哀之何氏內江人李早繼妻夫卒遺腹生子甫彌月遇飢民劫掠氏抱兒逃免又族人欲奪其田訟官得直撫子成立年七十八終陳氏內江人省祭吳良貴妻年十五隨夫為吏於建始無子為夫娶妾生子夫歿氏負兒扶櫬歸葬守志撫孤茹苦三十年卒張氏仁壽人庠生徐可畏妻守節四十餘年嘉靖中旌表蕭氏內江人員外馬泰階妻年十六孀居教子彥卿後官知府氏受封誥孫鳴轂中戊子解元曾孫士騄舉壬子鄉試年九十卒旌表陳氏內江人張愷妻愷歿守節訓三子次子楠早卒妻喻氏年二十一長子德繼卒妻黃氏年二十八姑媳三人相倚為命教楠子克臣入庠孫問達登進士厯御史曾孫炯舉癸卯鄉試三氏俱以壽終萬厯庚寅奉旨建坊題曰乾坤正氣三氏貞操云楊氏內江人庠生陰錫順妻年二十守節撫孤厯七十一年事聞旌表梁氏大足人內江范全妻全早逝氏青年誓志教子課孫俱以科第顯年百歲卒陰氏內江庠生余瑾妻年二十五而寡子甫三歲撫之成立子亡又撫兩孫年八十卒何氏內江高世渤繼妻年十九守節撫前妻三子入泮李氏內江人孝亷熊動之側室生子文灼甫二歲動之卒氏年二十六誓守節撫其孤灼為庠校名士氏厯六十二歲終後嫡孫應占成進士疏言李苦節狀詔旌表之楊大姑楊二姑內江人楊浩女奢賊掠縣闔家被執母觸階死二女年將及笄義不受辱奪賊刀自刃不死俱赴水歿賊退二尸執手浮水面事聞旌表張氏內江人大參張季思女監生陳聖道妻夫卒氏年二十二苦志不移院司旌其節何氏北直巡撫紹充女庠生羅拱明妻讀書曉文理獻賊過內江拱明為賊所獲何遂投江死周氏仁壽人辜鳯禎妻鳯禎卒家貧守節教子延泰登鄉試年七十四終詔旌表其門辜烈女仁夀人舉人辜鳯翼孫女及笄未字聞流寇將入境常懷利刃寸許及賊至遂刎死陳氏仁壽人方之斗妻青年寡居父欲奪其志不從投井死事聞旌表題額千古留芳羅氏仁壽人舉人羅元德次女庠生劉應禧妻夫婦避兵嘉陽應禧外出舟覆溺死氏聞痛哭曰亂離夫喪何以自存翼日登嘉城三江門投水死侍婢亦殉閔氏仁壽人庠生左灼妻崇禎十三年流寇陷城夫婦被執賊欲汚之不從罵賊死徐烈女仁壽人達之女幼字陳玉鋐未嫁玉鋐卒氏痛哭三日勺水不入口嘔血而卒姚氏仁夀人劉雲起妻孝事翁姑後姑病氏焚香泣禱姑病遂愈事聞旌表劉氏仁壽人貢生徐著妻性最孝姑病篤氏割股以療之姑病得瘥金氏仁壽人劉慶衍妻夫歿遺子方襁褓姑憐其少欲嫁之氏截髮涕泣誓無他志守節終身直隸綿州漢龎氏德陽人薑詩妻姑嘗思飲江水一日出汲歸稍遲姑渴詩怒而遣之龎乃止鄰家晝夜紡績市美饌托鄰母遺姑久之姑怪問鄰母具言其故姑感泣復呼婦還赤眉賊入境相戒曰驚大孝必觸鬼神皆逺退里中賴以無恙晉季薑梓潼文氏女將作大匠王敬伯夫人也少讀詩禮敬伯前室有男博女紀季薑生子康雅芝女二凡前後子女撫愛若一姑性頗嚴子孫雖見官二千石有小過猶杖之季薑引咎跪而受罰初姑隨敬伯任後以老家居季薑常侍左右姑亡季薑教訓諸子及子婦一堂雍睦無間言年八十卒諸子解綬持服諸女從公舍交赴內外冠冕百有餘人當世榮之魏劉氏梓潼人太守茍金龍妻梁兵圍城茍卧病劉氏帥軍民登城拒戰時高景謀叛劉斬之與士卒分衣食同勞逸莫不畏懷時汲道為敵所據會大雨劉出布絞取水儲之梁兵退魏封其子唐李氏梓潼人何煥章妻年二十六夫歿守節終身宋張氏羅江人母楊氏寡居值親黨婚會母女偕往其典庫雍乙者從行先歸死於庫提刑張饒疑楊有私命石泉軍劾治拷掠終不服女曰母以清潔受刑吾將訴怨於天言訖自殺石泉果地震連日雨雪勘官李志寧夕坐恍有猿墜前因念殺人者非袁姓乎詢之門卒言張氏有傭夫袁大執訊之即服罪曰適盜庫金會雍歸遂殺之楊乃得免女死方數日郡守榜其居曰孝感明白氏綿州趙俊德妻正德間流賊渡河被執賊逼之不從遇害事聞旌表鄒氏綿州人高王政繼妻三十而寡守節至八十卒張氏德陽人因死父難天降紅雨事聞敕建坊祠祀之趙氏名桂香德陽人同知范鵬侍妾鵬故水漿不入口者十七日姻戚諭之再四趙曰吾已許主以死矣尋赴葬所嗚咽而絶年十八歲誾氏名成哥德陽人里豪金海聘為媳金妻瞽子幼百計誘之不從加捶楚焉如是者三年餘竟弗少屈金恚甚一日入氏室逼汚氏仍力拒金擊殺之有司遣驗猶處子也巡撫任公樹貞烈維風坊祠祀之安氏德陽人劉繼魁繼室年二十四而寡誓死不再嫁不御酒肉前妻有壻曰范良知其父繼美欲娶安安聞之即登樓閉户者三年繼美遣善言者百計誘説不為動繼美歿乃下樓撫前妻二子成立年八十二卒蓋閉户清齋者五十八年矣范壻入庠食餼後亦早卒其女慕繼母之節守志終身有司表其門曰兩世貞節杜氏德陽人高邦智妻年十九守節厯數十年教二子高才高德補弟子員潘氏德陽人庠生王大化妻年十八守節持已甚嚴雖至親罕見其面事聞建坊王相妻某氏綿竹人正德六年廖賊掠境氏與其女為賊所執欲犯之母女同聲罵賊遂遇害相亦終身不復娶姚氏綿竹人疊溪百戶曹烈妻廖賊掠四鄉氏抱乳女潛林中為賊所獲欲迫姚姚不可賊以掖持之姚咬斷賊指賊怒遂被殺史氏綿竹人蘇蒙宗妻早寡撫子若瞻辛勤訓課時稱史有孟母風皮氏安縣人庠生張心法妻青年苦節教子成立董氏安縣人太學生李資生妻獻賊據蜀資生不屈被殺氏從之死徐氏安縣人張玉卿妻夫卒撫二子守節二十年貞節如一日後死於賊袁氏綿竹人王宗道妻翁病宗道欲割股以進氏贊成之果愈後獻賊屠綿見氏美逼之從行氏憤罵不從賊殺之薑氏綿竹人貢生施竒才妻崇禎丁丑竒才北上值流賊犯蜀薑避西山賊且至薑拔一簪授其婢曰吾不能逃汝速避萬一得生語若主我不為家門羞也言訖投崖死楊氏綿竹人舉人陶以忠妻夫故守節撫遺腹子成材朝夕課讀後膺選貢以孝聞詔建子孝母節坊趙氏綿竹人庠生王鐸妻崇禎十年流寇抵綿鐸夫婦被執賊令鐸跪大罵不屈殺之賊挾氏行不從又殺之曹氏什邡人綿竹劉延齡妻也延齡移官道經武昌金口驛賊劫其舟氏偕其女瓊姐俱投水死事聞表其門曰雙烈有司置田祭祀遺子宇揚宇烈宇亮皆貴顯李氏張氏宋氏俱綿竹人李為關南道劉于揚妻張為侍郎劉宇烈妻宋為大學士劉宇亮妻崇禎甲申賊魁劉文秀抵綿竹三氏皆以未亡人避西山白崖溝相謂曰昔者吾姑涪水遇盜懼辱投水吾輩終有死時今若受汚異日何顔見姑與夫於泉下遂同縊死王氏劉宇亮子裔盛妻崇禎甲申賊獲裔盛於成都迫以官使回縣移家氏曰賊之官汝固可做賊之妻吾決不為遂自縊以死雷氏綿竹庠生顧天澤妻乙酉賊陷城氏嘆曰死有遲早到底不免此身不可辱也遂抱幼女投井死勾氏綿竹人文仕舉妻乙酉賊至被執欲汚之氏大罵不屈賊怒碎其尸仕舉得乘間逸去龎氏綿竹庠生陶修吉妻乙酉賊陷城夫婦被縛氏紿賊曰我願往何縛為賊寬之夫婦共投崖死蕭氏綿竹人庠生楊元吉妻李賊至蕭語生曰祖宗不可無後我力難行君其逺避同死無益生泣去賊搜獲蕭紿賊曰素貧苦今相從吾願也行數武遇井躍入死楊氏梓潼人諸生王子俊妻年二十夫沒氏勤紡績奉姑教子守節終其身雒氏梓潼人適庠生尚聘聘早逝苦節四十餘年事聞建坊旌表魏氏梓潼人庠生趙節妻崇禎十年為流寇所執氏紿曰家有金藏之江邊願取以付之寇喜同至圍子潭氏即奮身投水死趙氏梓潼人庠生蒲先春妻獻賊破蜀被執罵賊投江死事聞旌表趙氏梓潼人魏元良妻獻賊破蜀被執投繯死事聞詔旌其門直隸茂州明吕氏王氏州人吕氏父秀文無子以女贅壻生子仲亷遂承吕嗣壻早歿吕誓志不移撫仲亷成立娶媳王氏仲亷尋卒時王年二十二事姑孝姑媳相依吕年八十有五王年六十有六天順八年事聞旌表陳氏茂州鎮撫朱政妻灌縣人成化乙未羌寇犯邊政戰死陳抱尸慟哭既殮投崖死鄧氏茂州學生文節妻節赴秋試姑李氏病劇鄧割服以進姑食之甚甘越數日復思之子嘉謨跪告於鄧曰母能活姑孫獨不能活祖耶亦割股以進李病愈撫按嘉其雙孝疏開旌表夏氏州人李端妻成化間羣盜入室索其夫夏氏請當刃盜怒並殺之同邑劉玉嘉其事作烈義傳李烈娥州人李茂少女許聘王廷用未嫁適茂夫婦外出止娥獨在室廷用突入欲私之娥以計紿出即縊死李節娥州人李泰女既嫁有新臺之變娥引刀自刎幾絶再犯之乃縊死茍氏州人茍友諒女贅同里張必榮二年必榮卒氏年二十一守節善事舅姑教子有成厯九十六歲卒陳氏州人李友諒妻年二十一守節厯年六十四卒王氏州人適參政谷茂之子嶽年十九而寡撫子成立卒年八十傅氏州人韋伯珣妻夫歿事姑至孝苦節七十年卒陳氏州人年二十夫死無子氏立嗣守節厯三十年巡撫劉公旌表其門胡氏州庠生談繼妻夫卒無嗣孀居五十七年卒晏氏茂州衛百戶張綱妻綱陳亡無子晏守節以終清名無玷史氏茂州衛舍人尚孜妻青年守節厯四十載有司旌其門薛氏保縣原威州人馬昱妻昱客死薛奔喪營葬後有謀娶者薛閉户自縊死王氏保縣人張仁妻夫蚤喪堅節自守有司旌其門王氏保縣人幼許字徐思未歸而思故姑遣媒令别適氏泣曰夫雖不幸妾當事姑志不可奪遂歸徐養姑三十年卒段氏茂州知州羅銘鼎安人也趙賊陷州城銘鼎被執段投水而死王氏保縣人王元女既聘其夫家旋悔婚事氏曰婚既定矣悔之不義遂投江死童氏保縣人省祭董浮妻隨夫於留都夫卒遺二子皆幼氏年甫二十攜子扶櫬歸孀操嚴肅厯年九十終李氏汶川人鎮國中尉丞燋嫡配封恭人年二十三燋歿撫子事舅姑雖至親不得入中閫孀居六十五載卒直隸達州宋趙氏州人年二十寡居有凶人欲犯之脅以白刃氏不為動計誘百端不從遂殺之皇祐二年州守立祠以祀元劉氏州人羅福興妻元末與姑避兵漢中值冬月姑病欲食瓜劉覔之山澤間遇盜被執哀訴其故賊義而釋之後年百歲卒州牧周雍立孝義坊復市地於城西門外建祠與宋趙氏並祀明舒氏州人給事中唐仁妻年二十孀居以節終楊氏州人監生楊琰女庠生談議妻年十九守節事姑厯五十餘年觀風使馬紀大書節孝以旌其門龔氏州庠生許懋實妻年二十六而寡撫妾子雲霄入庠雲霄旋卒偕媳李氏撫弱孫育麟辛苦萬狀年八十有六卒學使旌其門何氏袁氏俱東鄉人姑媳同節何暮年袁紡績以奉之尤盡孝道萬厯間俱旌表建坊楊氏向氏俱東鄉人楊為貢生冉璘之母向則璘妻也璘父子為流賊所執姑媳相謂曰勢不可免矣遂登樓縱火自焚死項氏太平人項超之女王秉忠妻年二十一秉忠卒項自縊死萬厯間建坊旌表龎氏太平人庠生景忠女冉學顔妻年二十二守節至七十終縣令旌之袁氏太平人冉潛妻賊殺其夫袁罵賊死龎氏太平人庠生冉斐妻賊欲殺其夫氏以身護賊並殺之四川通志卷十一中欽定四庫全書四川通志卷十一下皇清列女成都府楊氏成都人湖廣提督嶽超龍生母年二十五夫亡守節端淑持躬冰操瑩潔教其子以忠勇著母道克全厯節四十九年雍正元年誥贈一品夫人建坊旌表祀節孝祠葉氏成都人年十九適江以寬二十六夫卒守節養翁姑撫幼子厯二十五載文氏成都人年十五歸諸生周之德二十七歲夫亡二子相繼而殤氏資織絍以奉姑姑忘其貧苦節四十三載鄭氏成都人劉漢倫妻年二十一夫歿姑老子振羽甫一歲氏截髮誓志事姑教子振羽路拾遺金獻鄭鄭命俟於得金處還之厯節三十九年張氏成都人年十九適諸生高廷英越八載廷英卒養葬孀姑撫育稚子無愧婦職苦節三十載王氏成都人軍士酆登相妻年二十二守節力勤紡績孝事孀姑不以貧窶少懈訓子至於成立苦志三十餘載王氏成都人軍士汪𢎞烈妻年二十五夫歿堅志守正奉甘旨於孀姑竭恩勤於孤子厯節二十六載李氏成都人年十六歸陳有世年二十四夫歿事舅姑克盡婦道教二子仁泰俱入庠苦節厯三十七載趙氏成都人王世美妻年二十六夫卒守節竭力奉姑以媳代子義方訓嗣以母兼師勵志三十八載王氏成都人年十六適軍士郭現瑞二十三歲夫歿事翁姑克全養葬撫子成立守節三十年任氏成都人明賓女劉友諒妻年二十五守節辛苦茹荼克勤紡績事翁則敬養有加撫孤則慈嚴兼至厯節四十餘載胡氏成都人胡輔朝女劉瑞麟妻年二十五守節善事翁姑教其子觀列於庠葉氏成都人軍士鄭國興妻國興征西爐傷胸又素嘔血氏竭力調之卒不起翁姑老子幼家且貧孝養撫孤守節三十年黃氏華陽人徐學明妻年二十七而寡苦志守節家貧紡績事姑義方教子婦職母訓兩無愧焉厯節四十一載張氏華陽人十九歲適龍安營千總王𢎞勳年二十九𢎞勳歿辛苦紡績奉六十孀姑撫二齡椎子厯節三十餘載石氏華陽人馬元鼎妻年二十一夫卒姑憐其少欲勸他適氏號泣自誓願養姑撫子冰操不易厯三十一載黃氏華陽人黃三元女年十九適杜秉鉞甫一載秉鉞卒無子翁姑老家貧黃誓志曰子死婦猶子也代夫養親未亡人分內事遂扄戶勤女工養葬如禮撫堂姪為子恩若已出苦節三十二年侯氏雙流人徐蓼妻年二十一蓼亡無子姑憐之欲令改適氏曰娶婦以養母也母無他子誰復為養願奉姑以終身姑不能奪苦節三十三年鄭氏溫江人石士林妻年二十七士林卒泣誓守節有欲奪其志者氏引刀自刎以救免家極貧操愈堅訓二子崇正崇先俱登鄉薦苦節三十餘年劉氏溫江人年十六適諸生張邦達二十三歲夫卒遺一子旋殤氏哀號幾絶或勸之嫁泣曰命薄至此若懷二心何以見吾夫於地下願事舅姑以終身守節三十八年林氏溫江人諸生張邦倫妻年二十七夫殁子甫三齡翁姑欲奪其志氏截髮毁容誓不他適勤女紅以養翁姑斷機杼以教幼子苦節三十八年與姒劉氏同矢柏舟人稱一門雙節有雙節坊夏氏溫江人諸生張珖妻年二十三夫歿時姑衰子幼氏堅志守節日事女工竭力維持奉孀姑以終天年撫弱嗣以至成立卒年六十有四李氏溫江人周耀隆妻年二十八而寡守節七十五載壽百有三歲子年七十有七兒孫五代一堂冇坊曰貞壽之門劉氏新津人功加都督僉事武嶽年妻年甫三十二夫歿堅志守節孝養孀姑教子世臣登乙酉鄉薦厯節三十載林氏新津人宋玉洪妻年二十五玉洪歿氏截髮刺面誓志守節時翁姑皆七十有六祖姑九十有三養葬俱各如禮撫二歲孤成名厯三十六載謝氏金堂人年十七適諸生李廷藩越七載廷藩卒無子氏號泣不欲生以孀姑垂白忍死矢志勤紡績以供饘粥脫簪珥以備衣衾苦節三十四年劉氏金堂人諸生楊于泓妻年二十一守節奉翁姑極盡孝養撫子幕燕婚畢旋亡姑媳相依茹荼三十餘載里黨間咸稱一門雙節張氏崇慶州人年十七適諸生殷輅夫歿事舅姑以孝稱喪葬盡禮日勤紡織教子元福遊庠守節三十五年李氏崇慶州人儒士秦開甲妻年二十六夫歿勤儉持家舉動合禮教子友之成立苦節自勵厯三十餘年如一日顧氏郫縣人何以政妻以政與流賊戰歿於軍氏年二十六子甫一歲氏曰吾不忍以一死殄忠烈之祀也堅心撫子有欲奪其志者以義峻拒之厥後子亦成立守節四十五載郭氏郫縣人樊彬妻年二十三夫歿家甚貧織絍奉姑燃粳課子厯節三十三載趙氏郫縣人年十六適張鳯騰越十載夫歿養姑育子婚畢子媳俱亡遺一孫氏力撫之再世存孤艱辛萬狀守節四十一年李氏郫縣人唐廷猷妻年二十四夫歿翁姑年耄氏孝養備至前後力舉三喪撫二子遊泮厯節三十三載劉氏新繁人王璘妻年十九璘病篤子甫六月璘自知不起屬氏撫孤以養繼母氏泣誓無他志及卒恪守夫言孝慈并著守節三十二年劉氏新繁人年十五適諸生鄒望臣越三載夫歿守節時舅姑卒於湘江氏為返骸歸殯撫襁褓弱嬰獲遊泮水厯節五十餘年高氏新繁人適鄒珏年二十守節孀姑衰邁氏竭力孝養始終弗怠孤子稚弱撫育成立茹荼三十餘年危氏新都人庠生師大成妻夫亡氏以柏舟自矢姑老甘旨承歡喪葬如禮撫遺孤二長遊庠次亦成立苦節三十餘年何氏漢州人劉尚臣妻夫亡舅姑年邁竭力奉養逮卒喪葬如禮撫二歲孤立以世其家厯節四十餘年郭氏漢州人胡加貴妻年二十二夫歿剪髮誓志孝事翁姑撫子成立厯節四十九載以上俱旨旌表已奉劉氏成都人軍士李遇隆妻年二十遇隆歿事六旬姑撫五月子守節三十一載梅氏成都人軍士陳大章妻年二十八守節養翁姑撫三子成立葉氏成都人王勳妻年二十七勳卒遺二子俱幼擇師訓課長日章膺歲薦司鐸渠縣次亦成立妾俞氏年甫二十葉憐其少無子欲遣之俞曰婦人之道從一而終妾願共撫二子後葉俞俱享大年人稱雙節許氏成都人林啓彥妻年二十二守節勤女紅事翁姑撫子成立厯三十年楊氏成都人陳萬安妻年二十八安卒遺二子俱幼值兵燹攜二子走匿艱辛萬狀卒致成立苦節五十年李氏成都人吳鑑妻年二十三鑑溺江死辛勤育子勵節五十年杜氏成都人張某妻張歿家貧守節撫子成人年六十有五終黃氏福建籍適成都庠生許時輝二十七歲守節年六十餘歲劉氏成都人軍士李元母青年守節終身不改向氏成都人舉人日升女許字監生張元德未筓元德卒於京氏聞訃一慟幾絶櫬還之日泣請衰服往祭其父從之後值元德父母喪悉往祭盡哀矢志不易節操凜然劉氏華陽人適軍士段作霖甫一載餘生子彌月作霖卒劉以撫孤自誓冰操凜然厯三十有五年張氏華陽人周永安妾年二十刲股療夫病不起嫡妻曹氏亦歿無子張以姪纘承祀纘亡撫孫宗旦宗旦亡又撫曽孫元音三世存孤年九十三歲終吳氏華陽人蔡度妻年二十四守節厯三十載卒楊氏華陽人吳興邦妻年二十二守節厯四十餘載何氏溫江人適成都諸生稅璌璌寢疾氏衣不解帶者數月及卒欲刎頸與同棺姑救之得不死誓守節奉翁姑育子成立縣令旌其門張氏溫江人諸生任朋萬妻年二十守節奉孀姑教子入庠厯五十餘年劉氏溫江人孝亷劉嵩女適王師和甫三載師和歿苦節五十餘年陳氏新都人適趙瑅年二十四守節奉舅姑撫遺腹子成立范氏郫縣人李司李妻年二十四守節撫子峻成立厯五十餘年張氏郫縣人陳綱妻年十九而寡苦節三十載教子舜裔入泮陳氏郫縣人楊逺妻年十七逺溺死氏絶粒泣七日卒郭氏郫縣人樊述聖妻年十九守節撫子振世入庠振世卒撫二孫成立厯年五十有二胡氏郫縣人張宇續妻年二十五守節厯六十歲陳氏郫縣人成都劉沛裔妻結褵二十日裔病劇刲股救之不起苦節五十年李氏郫縣人適保縣貢生袁文蔚之子甫一歲夫亡守節三十餘年余氏雅州人隨父治用司鐸郫縣適郫邑廩生梅月月早卒遺四子二女余守節撫孤長調元季魁元補博士弟子員其餘婚嫁甫畢余偶病諸子以藥進堅却之曰吾不即從汝父地下者以若輩故也今畢乃事何以生為遂絶粒死蔡氏郫縣人松潘鎮卓䇿妾年二十䇿病知不起諭蔡改適蔡截髮毁指誓守節及夫歿獨處一室家人罕窺其面厯二十八年卒重慶府夏氏巴縣人張國縉妻年二十餘夫歿夏投河以殉鄰人救之得不死越一載卒自縊云田氏巴縣人年十八適王英甫八載英歿時祖翁及舅姑俱存氏竭力奉養喪葬如禮課子封廣得遊泮苦節三十二年張氏巴縣人蔣玉錫妻有篾工焦言偶傭於氏家適玉錫外出言乘夜潛房側以刀掘竇入欲汚氏氏不從因被害王貞姑巴縣人舉人王咸宜女幼許字曾壬及笄壬卒姑慟哭欲自死其母力勸之乃止因請於父母治素奩具徑歸曽門為夫服三年喪事翁姑極盡孝道凡厯二十餘年徐氏巴縣人年十八歸秦師聖越六載師聖疾氏刲股療之不愈欲投繯以殉因救得免養葬孀姑教育稚子苦節三十二年吳氏巴縣人劉公升妻會吳病公升他出鄰有祝永者窺伺徑入氏室欲行強汚氏大呼鄰人執永赴官氏隨自刎死楊氏合州人孝亷石邦楫妻年二十三邦楫卒氏剪髮誓志孝事繼姑撫育稚子長璵登戊子鄉薦次璠食餼膠庠厯節三十餘年蔡氏合州人年十六歸諸生張素蘊越七載夫殁矢志柏舟翁姑衰老養葬如禮撫育稚子成立守節四十三載金姑銅梁人徐應後女年甫十三有粵西民陸君祥佃租應後地在山伐竹適金姑牽牛偶經其處君祥欲汚之姑恕罵不從君祥以刀刺其喉死王氏涪州人冉仲道妻有鄰人况榮謙伺仲道他出持斧脅氏欲汚之氏詈罵不從榮謙以斧劈氏頭顱而死楊氏涪州人彭長春妻年十九長春卒氏哀毁欲絶截髮誓志侍奉翁姑姑病刲股以療及歿事繼姑亦如禮撫遺腹子克承宗祧厯節四十八年吳氏涪州人年十八適楊芳林二十五歲夫歿家貧堅志守節備厯辛苦紡績惟勤課遺腹子名時得膺歲薦年四十五卒何氏涪州人楊竒妻年二十而寡事孀姑誠孝備至姑頻病氏百計調扶撫遺孤以義方列名黌序厯節三十五載劉氏綦江人庠生羅鳯翥妻夫歿氏青年守節奉姑姑終盡禮教子惟勤成名以繼夫志荼蘗旨旌表自甘四十餘年以上俱已奉曹氏綦江人總兵張奏凱妻奏凱死獻賊難曹年甫二十冰霜自凜四十餘年人有忠節成雙之目毛氏酆都人李嗣靖妻順治丙申夫死父難氏年二十三撫養遺腹子守節四十年李氏郡人軍士陳登雲妻年二十八登雲卒氏養翁姑撫二子成立苦節自勵厯四十餘載如一日宋氏郡人軍士莊三竒妻年二十一夫歿矢志守節孝事雙親慈育稚子厯年五十四歲秦氏郡人王國泰妻年二十五夫殁糟粳自給事姑撫幼苦節三十五年崔氏郡人軍士王謨妻年二十九而寡苦節五十三年吳氏郡人軍士安進修妻夫亡守節五十三載孫氏巴縣人軍士張仁妻年二十二夫亡遺一子甫五月夫弟甫六月家貧無以自給氏勤女紅為饔飱計竭力事姑姑病割股救之苦節三十載張氏巴縣人軍士李相泰妻年二十七守節撫子仕茂成立為千總官年踰八十乃卒章氏巴縣人軍士張會妻年二十九而寡厯節五十二載教兩子俱成名王氏江津人適劉芝翰甫一載翰卒遺腹五月氏矢志終身孝事翁姑撫孤成立年八十餘李氏江津人貢生龔瑛妻年二十二夫殁子甫二歲氏撫孤成立值翁姑喪祭葬盡禮年五十八終鄭氏江津人馬子玉妻年二十六夫歿家苦貧氏紡績度日撫二子一女皆成人厯節三十餘載劉氏江津人王賡堯妻偕夫往視姑姊是夕姊夫江學東與堯同宿劉與姑姊宿內室異榻夜深學東潛入冒為賡堯與劉同寢次早劉以禮責其夫堯驚曰無也劉知為東所汚遂飲泣痛恨自縊死東懼罪自刎縣令余甸嘉劉之志以禮瘞之并表其墓瞿氏長壽人陳璋妻年二十七璋病兩刲股以救不愈遺三子瞿撫之俱成名孫登賢書者三守節五十七年年八十四終遊氏永川人凌勷妻年二十二守節課子爾照成雍正癸卯進士年八十餘歲楊氏永川人貢生楊素次女歸喻伸甫三日伸遘病越月而卒楊勤女紅以奉姑及歿祭葬如禮撫堂姪承祧守節三十五載田氏綦江人諸生王英妻年二十英亡遺孤四歲家窶貧苦節撫子三十餘年羅氏綦江人杜廣生妻年二十八而寡撫孤成立茹荼三十載陳氏綦江人適王諫臣年二十八守節厯四十年陳氏綦江人王廷妻廷卒陳年甫十八厯三十餘載終邑令旌其門王氏綦江人歸陳常銘年二十而寡毁容斷髮守志不渝以壽終任氏綦江人諸生陳益虞妻年二十七守節備厯艱辛撫二子成立年九十有五終邑令以節壽旌其門劉氏綦江人適諸生羅鵬翼年二十七鵬翼歿遺孤二俱幼辛勤撫育長偉烈入庠次亦成立夀七十終李氏綦江人諸生石琪妻琪病李割股以救弗痊年二十一甘貧守節內外無間言陳氏綦江人歸諸生楊乂年二十六乂卒子甫三齡越數載乂弟林繼逝妻陳氏年二十三無子娣姒同居共矢苦節縣令以一門雙節稱之陳氏綦江人趙天聰妻年二十二而寡家貧苦節四十餘年金氏綦江人羅振倫妻姑病劇氏刲股以愈人稱其孝熊氏忠州人趙維舒妻維舒卒熊年二十二慷慨殉夫自縊死高氏忠州人文贊妻子歸甫六月贊溺於水氏痛哭三日赴江死高氏忠州人任某妻年二十二守節終身不出户庭徐三姑酆都人正林女早喪母值林他往三姑出汲鄰人逼汚不從急投井適遇救得免越六日父歸泣告旋自縊死縣令王廷獻旌其門張氏黔江人朱瑄妻年十九夫歿誓不他適勤紡績以供甘旨教子世傑成名厯節五十載謝氏黔江人朱璧妻年二十夫歿子方襁褓氏撫育曲盡苦心年七十餘終何氏江津人王言士妻性甘淡泊雅好施與孝養翁姑勤勞備至里人咸稱為女中君子保寧府周氏閬中人舉人劉以灝妻灝以公車卒於京邸氏年二十六無子事姑誠孝撫夫幼弟以潛肄業詩書得膺選拔守節二十餘載彭氏閬中人母懿妻年二十夫殁家貧乏姑老子幼俯仰待給氏勤女紅以資菽水撫育孤兒守節三十五載楊氏閬中人諸生劉昌李妻年二十四夫歿子亦繼逝族姓謀欲嫁之氏剪髮刺面以誓甘貧守節李氏閬中人適諸生劉世經年二十四夫病氏割股以療及夫歿翁姑以家貧欲奪其志氏引刀自刎以救免誓不再適苦節二十八載謝氏閬中人劉靜逺妻年二十七夫歿乏嗣孀姑年邁氏竭力奉養始終不懈撫夫幼妹使得所歸善承姑志厯節三十六載楊氏閬中人李桂妻年二十八夫亡守節姑年衰老氏備極辛勤以供甘旨及歿祭葬無缺撫幼子成立克全母道苦節三十三年張氏閬中人軍士李標妻年二十四標歿氏號泣絶粒欲身殉之姑以撫孤相責屢勸乃復食自是苦節三十六載吳氏閬中人貢生如登女田兆瑞妻年二十二夫歿無子氏午夜紡績敬事祖姑姑年八十餘生養死葬盡禮盡哀守節凡三十一載文氏蒼溪人閻啓麟妻年二十三夫歿孝事孀姑雖蔬食必誠敬以進教育稚子名列宫牆守節四十載陳氏蒼溪人胡天瑞妻年二十八夫亡奉事孀姑克誠克孝義方教子家道有成守節四十六載卒年七十有四陳氏蒼溪人忠州學正陶淑理妻年二十九夫歿矢志靡他教子其念成名守節三十餘載溫氏巴州人年十六適楊先春越八載先春卒子甫六歲氏泣誓守節事姑克孝撫子成立厯節三十四載張氏巴州人署都司僉書營遊擊事劉崑妻雍正八年烏蒙蠻叛崑以戰死氏謂二女曰我與汝豈可受逆賊辱遂殺二女復自殺妾吳氏亦自刎奉旨從優議敘照伊夫加贈品級給與表且立碑於殉難封典其妾吳氏與二女俱各豎坊旌之處以表貞烈王氏通江人庠生朱琨妻琨年十九入賊穴救父賊并執之罵賊死氏年十七生子甫五月聞翁及夫皆被害呼搶極哀屢欲自縊以救免撫孤成立守節五十年劉氏劒州人何維漢妻夫亡家貧矢志勤儉鞠孤俾家道漸豐復撫幼姪婚嫁者七人以全夫旨旌表之友愛厯節四十餘年以上俱已奉周氏閬中人孝亷張鶴翔妻值吳逆叛賊黨劫之氏自縊死楊貞婦太倉州學正楊爾緒妻寇亂流離秦隴貞潔自矢後聞夫在斷指寄血書夫妻重聚侯氏蒼溪人廪生韓輝妻輝早亡守節撫孤厯七十餘歲康熙三十五年縣令旌其門曰皎若冰霜袁氏蒼溪人李明珠妻夫歿守節三十餘載康熙三十五年縣令旌之李氏蒼溪人知州任鍾麟妻鍾麟歿於官扶櫬歸撫子膺歲薦苦節三十餘年陳氏南部人宋之仁妻夫亡殯葬畢投繯死縣令題其門曰之死靡他何氏南部人庠生何迪妻年二十四夫亡守節四十餘年卒縣令焦澍旌其門楊氏南部人庠生王凱妻凱亡無子苦節厯三十載縣令以苦節二字旌之吕氏南部人曲和賡妻年二十三夫亡守節五十餘年劉氏廣元人李猶龍妻順治二年獻賊破城猶龍以抗節被害氏年二十一守節四十餘年撫子庚生以孝行舉學使有義士節孝萃於一門詩序劉氏昭化人吳琮母守節教子厯兵燹不易其志知縣劉見龍表其節李氏昭化人賈應昌母值流賊至避山中為賊所虜投崖死王氏昭化人諸生羅開熙之母年二十四夫歿二子方襁褓遭獻賊之變避居深山訓二子後俱成名縣令旌其門曰節堅冰霜劉氏昭化人諸生梁之佑妻年三十夫應試卒於郡城家甚貧氏勉力歸櫬孝事翁姑嚴教三子縣令旌其門曰冰霜同貞鄧氏南部人何現圖妻康熙十三年吳逆據蜀賊兵夜入室欲汚之氏不從死張氏昭化人諸生楊珩母年二十四夫歿珩方襁褓氏勤紡績撫育成立縣令旌之張氏巴州人徐天祐妻年二十守節強豪欲脅娶之氏自縊死李氏巴州人貢生李馥女張某妻家貧撫子苦節三十餘年徐氏巴州人某妻年二十二夫歿未葬里豪某強奪至家徐紿曰次日易服夜自縊死何氏巴州人年十八贅壻楊嵩甫一夕嵩赴保寧童試死於郡邸何聞訃遂自縊死杜氏巴州人諸生王誥妻年二十誥病諭氏他適氏泣曰勿憂此吾不負君及病危氏乘夜先縊死誥聞之一笑而卒吳氏通江人庠生向百揆妻年十八守節撫子入泮苦節四十餘年文氏蒼溪人文天倬女幼字諸生余昆為妻父死母欲改字何姓氏不從母潛令何以幣迎之氏覺即奔赴余門余不敢納適縣令杜士秀課農至其地聞狀得實即令與余成婚仍立坊表之順慶府冉氏南充人年十七適舉人程于淳甫匝月于淳北上逆奴謀殺於道冉聞訃奔喪泣陳情於所在有司乃執逆奴論如法夫讐得報歸奉孀姑撫姪承祧苦節五十一載何氏西充人諸生張應捷妻年二十夫歿與孀姑相依時獻賊掠西充執氏欲汚之不從引頸就戮賊怒斷其手氏昏絶賊去復蘇苦志六十載年八十終王氏渠縣人前明禮部主客司郎中李含乙妾與同胞姊宜人同日歸含乙時獻賊猖獗含乙興義兵討之勢敗殉節王與宜人攜十子二女避山中賊破渠大索宜人及衆子於是王與七子為賊獲王冒為宜人罵曰我朝廷命婦爾狗輩敢無禮耶賊怒刃之罵益厲受數十創死七子並親屬三十餘人皆被害其三子與宜人乃得脫馮氏西充人年十九適陳鐸甫三載夫卒冰霜自凛侍奉翁姑養葬盡禮詩書課子名列宫牆苦節三十一載劉氏西充人高膺社妻年二十夫歿泣誓守節事姑誠孝撫幼女成人苦志三十年蘇氏營山人侯甸妻年十九甸卒無子孝事翁姑撫夫幼弟逾數年翁姑歿夫弟亦繼逝竭力殯葬後值兵燹家益貧堅志不易卒年七十有三雷氏渠縣人黃應朝妻夫與流賊戰死氏青年守節紡績以資朝夕教二子俱入泮雷氏渠縣人適黃政峩政峩卒孝事孀姑苦節四十年教子瓉琮奮志勤學列名黌序氏年六十歲終陳氏大竹人馮瑗妻年二十七守節家極貧有郭外田數畝為強鄰奪占或教以鳴諸官氏曰未亡人肯因此露面公庭耶教子貴德登乙酉鄉薦苦節三十四年汪氏鄰水人適諸生楊伯元年二十六伯元卒氏哀甚淚盡繼以血姑病劇割股療之得瘥撫遺腹子宗美膺歲薦孫崇俱孝亷以上俱已奉旨旌表陳氏渠縣人監生李獻明妻遭獻賊變獻明從軍死於遵義氏與妾余氏苦志守節翁憐其少屢欲嫁之終不可奪厯節三十餘年縣令熊焯旌其門張烈女西充人貢生張尚選女年二十時獻賊據西充氏與父母同遇賊被執賊紿以好語烈女大罵不絶賊怒殺之李氏西充人諸生斯為朴妻為朴亡子舉斯方五歲值獻逆昌獗挈子避山中艱辛備厯教育舉斯中順治甲午鄉試縣令旌其坊曰貞節舉斯夫婦繼卒又撫孫翼入庠年八十六終趙氏蓬州人良應妻值兵燹闔家逃散人傳姑被賊追溺趙聞之即訪至其所見姑尸大號慟隨奮身自溺死縣令表其墓曰孝嫓曹娥劉氏渠縣人王樹極妻獻賊破渠避難舟中為賊獲欲驅以行劉紿之曰汝且取資財須共去也得間躍入江中死馮氏南充人孝亷冉世維妻世維任湖廣桂陽令卒於官馮扶櫬歸葬如儀教子存意登康熙己酉賢書布政使金俊旌其門曰白髮冰操張氏南充人馮璧妻姑病劇夜禱於天刲股和藥以進姑病得瘥任氏南充人青明妻年十九夫殁無子家極寒或欲奪其志斷髮毁容奉姑孝值歲飢氏粃粳自饜以甘脆奉姑姑歿裹土以葬極盡哀思守節五十八年王氏南充人許大用母年二十七夫亡治喪繼治夫之兄姊喪俱如禮教子大用中康熙甲子鄉試苦節三十三年楊氏南充人嚴天衢妻年二十天衢卒遺孤甫襁褓豪右不能奪其志幾厯寇難教子成名年七十有五終張氏西充人諸生李鍾林妻鍾林遇虎嚙死遺子佺方三月張年二十哀號負尸歸葬奉繼姑極孝姑屢辱之俾易節卒不從孀居五十一年教子佺得遊泮陳氏西充人龎之望妻年十八夫歿子甫一歲撫育成立姑任氏屢病陳割股者三年七十餘卒李氏西充人高儀坤妾同夫之任平陽儀坤卒李年二十僅一女有欲奪其志者堅不從數千里外攜幼女扶櫬歸以苦節終龎氏西充人楊勝任妻庠生龎可述女勝任卒龎年二十有六遺孤三月撫育成立年七十八終何氏西充人諸生馮昌運妻年二十守節艱辛撫育稚子縣令王葵錫額其門曰冰雪松筠陳氏西充人蒲綸妻綸故陳年二十而無子守節四十餘年縣令以柏舟徑節四字旌之徐氏西充人貢生劉時妻時奉檄招安土寇楊問奇被害徐年二十無子守節土寇平徐攜嗣子孝亷荀龍鳴時寃問奇伏辜年六十卒歐氏江南上元人適西充孝亷黃世臣世臣官來安令歿歐苦節三十餘年教子倜舉康熙戊子鄉試崔氏西充人適孝亷陳我志年二十六夫亡守節教子䇿登歲薦學使旌之曰閨閣名賢賈氏西充人諸生陳我素妻年二十二夫亡守節教子汝翼補弟子員學使以巾幗鬚眉四字旌其節吉氏西充人適庠生何榮榮病危以母及二子屬吉吉誓曰不為君養姑撫子者鬼神殛之後果盡孝養教二子成立何氏西充人王玉卿妻夫亡守節撫子俊臣入泮年七十卒趙氏西充人諸生李培妻年二十九培卒苦節三十餘年教二子入庠趙氏西充人適何祚蕃夫亡苦節四十年二子俱遊泮楊氏西充人王再熊妻年二十四守節以紡績撫二子成立彭氏西充人王懋德妻年二十二夫亡苦節終身蒲氏鹽亭人適西充諸生馮相吉年二十而寡守節三十餘年卒郭氏西充人吳家翺妻年二十二守節厯四十年胡氏西充人何嵩妻年二十三守節撫二子成立何氏西充人適諸生趙世卿年二十六而寡苦節四十年育二子成立縣令以慈孝完節四字旌之李氏西充人任妻年二十九病篤刲股救之卒不起苦節數十年張氏西充人劉文琦妻年二十文琦歿一女尚幼氏堅貞守節年八十餘終吕氏西充人李映庚妻性最孝即兵戈擾攘事翁姑克盡婦道人以孝稱廖氏蓬州人宗映女諸生熊起麟妻家貧以紡績事姑姑病劇割股以進遂瘥于氏營山人侯應鳯妻鳯早卒氏甘貧守志終身不改蔡氏營山人李綱妻與綱弟約妻張氏俱以年十六喪夫各撫遺腹子成立始終不渝人稱雙節陳氏營山人監生于之驥妻驥入太學司業歿於京師氏聞訃悲號數日自刎死程氏廣安人年十九歸鄭大敘甫百日大敘歿程觸地幾絶急救得蘇閲三月閉户自縊卒成殉夫之志賈氏廣安人諸生蘇眉傑妻年二十六守節孝事舅姑力供甘旨教子鑑列明經卒年七十有七李氏渠縣人劉宗現妻宗現病李許以身殉及卒從容營葬畢自縊死李氏渠縣人年十八適諸生段生一子夫亡氏養姑育子備厯艱辛後子又亡豪族欲娶之氏斷髮自誓秉節彌堅楊氏渠縣人楊清寰女幼字同里王姓後王遭吳逆之變家計蕭條父母以貧故欲别字之女聞之曰奈何以盛衰改節耶悲號數日竟自縊死鄒氏渠縣人董慶吉妻慶吉逺出值姑病氏勤侍湯藥數月不怠疾篤刲股以救縣令給匾旌其門敘州府尹氏宜賓人年十六適樊澤迥越四載澤迥卒氏毁容絶粒欲以死殉姑泣諭乃以孝翁姑撫子如樟司鐸冕寧苦節三十一載胡氏南溪人年十七歸侯鼎越三載夫歿氏立志守節或勸他適引刀截髮誓死不移撫二齡子成立苦節四十二年翟氏南溪人王如玉妻年二十二夫歿誓不他適孝事舅姑慈育稚子備厯艱辛幾四十載鄉人咸嘉其苦節云李氏南溪人年二十一適諸生任覺民二十三歲夫歿上養垂白孀姑下撫襁褓幼子辛勤織絍節孝著聞厯四十二載尢氏富順人王子蕃妻年二十三守節姑目翳氏每晨起必跪而舐目復明姑病癰頻吮之得愈課二子極嚴長子維時舉鄉薦次子入庠厯節三十二載蔡氏富順人諸生楊師震妻年二十四夫歿氏泣血欲殉宗族以親老子幼勸日夜哀號誓不他適殷勤事姑篝燈課子厯數十年郭氏富順人年十八適凃朝卿二十四歲夫病剪髮焚禱願以身代及歿痛絶復蘇者再四竭力事姑撫三齡子克繼宗祀苦節四十三年陳氏富順人李天樞妻年二十三夫亡極哀毁臨窆觸石以求同穴姑泣曰汝死遺孤失恃如李氏一線何挽救之得不死繼喪姑子又旋逝復撫數月孫至於成立慈孝并著胡氏富順人丁元卿妻年二十二夫歿孀姑六旬子甫八月氏堅志守正勤機杼以備奉養訓稚子名列膠庠厯節三十七載王氏富順人年十六適李九河逾五載夫歿哀慟絶粒誓以身殉母慰曰汝死孀姑稚子誰與為依氏乃勉從奉姑養葬盡禮育子成家守節三十一載李氏富順人諸生王夢卜妻年二十餘夫卒堅志守節孝事舅姑撫子潾仁獲登鄉薦茹荼三十餘載何氏筠連人董世俊妻年二十六夫歿奉事孀姑喪葬盡禮撫夫兩妹得遂于歸甘心淡泊教子勤耕里人呼其田曰節婦田厯節二十八載陳氏筠連人諸生羅邦傑妻年二十三夫歿守節事姑早夜辛勤克盡婦道教子芳檊舉鄉薦厯四十六歲終詹氏筠連人陳夢筆妻年二十七夫卒子尚襁褓泣誓守正族黨欲奪其志氏抱孤長號絶食數日舅姑哀之卒成其節詹氏筠連人郝嶤妻年二十一夫卒柏舟自矢扃户幽居親族罕覯其面養翁姑孝敬備至教孤兒督責甚嚴其子栻廕中康熙辛卯舉人守節三十年蹇氏屏山人張服仲繼妻服仲司鐸崇慶州氏留養七十翁姑越九載服仲以疾歸卒氏年二十九孝養愈篤撫己子并前妻子辛勤慈愛俱至成立守節四十載楊氏屏山人王舉民妻年二十二夫歿翁姑皆六旬家貧如洗氏勤紡績修孝養撫育孤子苦節三十六載黃姑屏山人黃智仁女幼許字曾茂先未歸茂先卒姑誓不再字惟勤紡績以養父母自十五歲守貞至六十一歲卒王氏建武營兵權世魁妻年二十七夫戍金沙江病卒訃聞欲自盡勸阻絶粒數日後慟祭夫靈遍請鄰右泣託三歲孤官保夜竟縊死彭氏永寧人庠生彭大昌女年十六適李其進其進青年入泮蚤亡孀姑年高齒落氏嚼飯以哺遺孤三長天成遊庠次天盛天臣肄業氏以母道而兼師教厯節四十餘年以上俱已奉旨旌表袁氏宜賓人學博趙發祥妻隨夫任之榮縣有貧民鬻弟以完公帑者袁脫簪珥贖之撫三姪旨贈孺女為擇配子暐任吏部文選司員外奉人尹氏宜賓人思南道如廣女李𢎞雯妻甲申賊寇敘尹奉姑避黔中厯顛危不失孝道教子任旨贈孺山西聞喜令奉人宋氏宜賔人諸生李華時妻華時早歿宋苦節四十餘年年七十三卒學使廖賡謨旌其門韓氏宜賓人樊澻妻年二十二而寡孝翁姑教子紹宗食餼膠庠苦節三十餘年尹氏宜賓人樊澤達妻事舅姑孝家貧以紡績佐饔飱及澤達登第任侍讀學士尹仍朴素如常里人賢之顧氏宜賓人韓溥妻年二十九守節撫子成立厯八十歲卒王氏宜賓人諸生童心妻年二十九夫歿撫成三子苦節四十餘年年七十五卒爨氏宜賔人羅天滋妻夫死無子守節以終學使廖賡謨旌之李氏宜賓人黃熙妻年二十三守節辛勤育子厯六十七歲終汪氏宜賔人李永昌妻年三十守節撫子成立厯三十六年凌氏宜賔人宋璋妻年二十七守節教子維世遊泮維世之姑宋氏適凌爾宗早寡氏年二十二與凌相依並勵冰操以壽終樊氏宜賓人彭天綸妻年二十五而寡撫二子入庠以節終彭氏宜賓人庠生羅懋德妻年二十八懋德亡遺子琦璐姪瑤俱幼家極貧氏守節撫育孝翁姑苦志四十八年年七十六歲王氏宜賓人武舉方如川妻年二十二守節以紡績事孀姑撫幼子厯四十餘年年六十五歲吳氏宜賓人廩生趙暄妻暄蚤卒吳年二十八無子守節二十餘年劉氏宜賓人徐綸妻年二十四夫亡無子撫姪承祧苦節厯五十年黃氏宜賓人念一女尹綸妻年二十夫亡父母憐其少欲改適黃不從矢志守節厯六十四歲張氏宜賓人楊繼晟妻年二十五守節厯六十二歲吕氏宜賓人胡世爵妻年十七而寡撫遺腹子成立苦節三十餘年范氏宜賓人庠生何珩妻年二十三守節養舅姑辛勤撫二子厯三十七年曾氏宜賓人軍士宋攀龍妻年二十八守節厯三十餘年育二子俱成立高氏宜賓人軍士鄧知性妻年二十六而寡守節三十餘年仵氏宜賓人貢生徽理女杜琬妻守節三十餘年撫子成立彭氏宜賓人鄭文鈁妻生一子甫八月文鈁卒氏年二十守節事翁姑撫子厯五十一年王氏宜賓人茍開業妻二十五歲守節厯五十八年余氏宜賓人龔月高妻夫亡無子苦節終身劉氏宜賓人仵德逺妻年二十守節撫姪承嗣厯六十三載孫氏宜賓人諸生尚𢎞毅妻孝翁姑課子極嚴里人賢之張氏宜賓人貢生黃道開妻夫歿以紡績育子甫婚畢子媳俱亡張飲冰茹蘗以終其身白氏宜賓人適鄧嘉祐嘉祐夙有顛疾氏敬事之終身如一以女工育成二子人稱賢婦張氏南溪人文富女及笄未嫁同鄉鄰衆女避吳賊於江濱賊渡江衆女被執氏奮身躍江中賊駭其節烈相顧驚散被執者皆得脫羣感之立祠以祀羅氏富順人舉人羅萬象女幼許字楊師文未歸師文卒羅匍匐奔喪守志誓不再字事姑誠孝姑歿數十年每言及輒涕泣不止鄉里嘆服江氏富順人劉元復妻年二十六守節撫孤成立卒年七十朱氏富順人熊江繼妻年二十四守節卒年八十何氏富順人監生楊愈新妻年十九守節卒年七十有二江氏富順人聶璜妻年二十五孀居事姑孝育子成立余氏富順人楊必讀妻青年守節至一百有三歲邑令姚鋭以百齡人瑞旌之李氏富順人夏之璜妻年二十九守節教子朝常登雍正癸卯鄉薦柳氏永寧人廩生宋聨元妻年二十五而寡撫子仲郊食餼旋卒又撫其孫守節四十五年學使旌之胡氏永寧人廩生黃坤妻年二十五坤卒孝事舅姑撫子成立守節三十六年鄉里稱之吳氏永寧人劉勷妻勷歿後飲冰茹蘗勤儉操家厯節三十五年羅氏永寧人諸生藺育蘭妻年二十于歸勸夫力學育蘭卒氏奉事舅姑以孝稱撫子藺芳不廢學業苦節三十八年夔州府段氏奉節人庠生劉贊元妻年二十一夫卒無子時翁姑叔嬸相繼殁氏以一身竭力營葬備極艱辛厯三十餘載撫姪燦繼嗣後膺歲薦龔氏奉節人龔旺女適袁國相康熙二十八年國相病氏割股救卒不起時氏年三十撫二孤厯四十年足不踰人以賢節稱之袁氏奉節人庠生朱之瑞妻事舅姑孝夫卒家甚貧氏守節三十六年撫二子俱已成立陳氏奉節人王遜妻年二十九孀居遭兵燹事姑尤謹撫子治亨後為普安守備李氏雲陽人劉世祿妻有楚民李周士乘其夫外出欲行強汚氏厲聲叱出周士旋復來氏持刀相拒周士奪刀刺氏喉死李氏梁山人李國虎女幼許字謝昌永父殁母李氏挈女適姻黨周姓家周有姪應洪強逼成婚女年十二託言取薪出户即自縊死凃氏梁山人武舉馮之詮妻事翁姑孝年二十七之詮卒長子致祥甫數歲次著祥尚襁褓家既貧復遭火災氏艱辛紡績課二子讀書皆食餼膠庠苦節三十二年談氏萬縣人宋雲得妻雲得亡氏守節八載有宋誠者窺氏室無人強欲汚之氏大罵堅拒誠以斧劈氏頭顱死劉氏萬縣人薑榮吉妻榮吉他出有向一升者乘醉突入執氏欲汚之氏大罵不從奮力􅎲其面一升因火其居氏同一子三女俱焚死以上俱已奉旨旌表聞氏夔協守備聞昌女本江南通州人幼許字溧陽宋亦郊年十七亦郊亡女以翁姑無子奔喪孝養厯八年翁姑相繼歿後歸依其父入川及父母俱故弟姪貧流落夔州艱辛萬狀至死不渝其操趙氏奉節人𢎞之女杜葵妻葵卒氏年二十九子幼翁姑老氏守節三十八載以孝慈著周氏奉節人軍士周奇女李鵬妻年二十八夫歿遺子上苑甚幼無親族且貧氏守節撫孤苦志四十餘年劉氏萬縣人文何典妻年二十二夫病危日夜禱以身代何典死遺子甫襁褓氏矢志守節事姑撫子備厯艱辛張氏萬縣人平其安妻年二十四守節厯三十八載薛氏萬縣人劉思亷妻年二十五夫亡撫子入庠苦節三十二年卒傅氏萬縣人王英妻年二十二守節厯五十三載廖氏萬縣人丁應寵妻年二十九守節卒年六十有七秦氏石砫人諸生馬千藩妻年二十夫亡長子維麟三歲次良麟甫數月氏立志守莭教維麟食餼於庠苦節三十齡年馬氏石砫人生員談良存妻良存蚤殁無子氏苦節終身吕氏石砫人把目林正源妻年二十夫殁僅一女撫育出嫁稱苦節焉許氏石砫人向文學母夫殁氏年十八文學尚幼撫養婚娶司人咸感歎云彭氏石砫人秦某妻年二十四夫亡父母憐而欲嫁之氏曰我有子可撫有田可度日敢存他念後有求娶者父母許之民聞備香帛至夫墓痛哭自縊死龍安府蔣氏江油人廪生舒繼董妻年二十九夫卒堅志守節事姑孝謹姑有疾虔禱於神刲股以療教稚子成名茹苦四十七載已奉旨旌表王氏平武人諸生任仕舉妻夫殁矢志守節堅正不渝王氏平武人趙加慶妻加慶卒王以節自勵髽髻蒿簮終身不改文氏石泉人諸生鮮于德妻年十八于德卒氏撫遺腹子祚遠訓課不輒後祚遠卒氏煢煢無依兵荒備厯堅白自全邑令張延基旌其門魏氏石泉人文成章妻年二十夫溺水死無子氏孤孑無倚冰霜自矢年七十五終唐氏諸生景星妻年二十一夫歿屢有求娶者氏堅守不渝教二子俱皆入泮縣令旌之方氏松潘人趙之正妻二十二歲夫亡守節年六十八終馮氏松潘人諸生吳永捷妻夫歿遺一子馮欲自縊姑力勸止之後撫子廷彝入泮守志一十九年里人咸稱其節徐氏松潘人諸生余英妻年二十六夫歿矢志守節撫子成立年七十五終寧遠府李玉靖西昌人幼許字張正元將婚正元卒玉靖泣赴張門執夫喪父母憐之欲改適玉靖剪髮刺容誓不别嫁事翁姑凡三十餘載彭氏會理州人年十六適劉之琦二十五歲夫亡矢志守貞孝奉翁姑喪葬盡禮慈育教子名旨旌表列膠庠苦節四十六年以上俱已奉陸氏冕寧人庠生步中和妻孝姑育子守節三十餘年縣令額其門曰節永天年盧氏貢生步之俊妾周氏之俊子貢生中行妻俱冕寧人順治乙丑流賊攻城避兵於普咱渡村為賊獲驅之行至長河盧氏周氏攜手投水死王氏冕寧人陸歡妻夫亡守節三十餘年步氏冕寧人諸生陳天爵妻無子為夫娶妾王氏生四子天爵歿王再適步孝姑撫其子苦節三十五年王氏越巂衛人及笄未字父蚤亡母病割股以療逾年母卒氏守正終身不字雅州府韓氏蘆山人諸生程門偉妻年二十六夫殁家貧守節孝事翁姑養葬盡禮撫子成名厯四十旨旌表八載已奉葉氏雅安人張翀妻年十八守節孝翁姑教子成立楊氏雅安人武生楊全名女年十六適彭映方匝月映卒楊乘夜自縊柩前翁姑驚救得蘇苦節數十年不虧婦道柏氏名山人劉文寬妻年二十五夫歿矢志守節誓不他適茹荼三十四載年五十九歲楊氏名山人文榜女幼許字邑人劉襟全未嫁而劉卒楊守正不字事舅姑撫姪承祧苦志五十歲李氏名山人朱孔章妻年二十四夫歿堅正自矢惟勤紡績守節二十六載厯年五十歲田氏蘆山人廩生竹應宫妻年二十一守節育二子成立至八十餘歲卒巡撫能泰旌其門曰節夀曹氏清溪人年二十適拔貢盛珽越四載珽以渡河水溺死曹年二十四苦節四十年卒李氏清溪人郝秉翰妻年二十四而寡值吳逆之變避居山中艱苦備嘗撫二子成立年七十五終黃氏清溪人周圻妻年二十五夫歿守節撫孤荼苦自甘年七十四歲李氏清溪人曹玕妻年十八夫歿無子誓不再嫁依母氏紡績度日母死喪葬盡禮厯節五十三載年七十一歲直隸嘉定州雍正十二年升為府楊氏州人覃思勝妻年二十餘思勝卒舅姑年高氏拮據奉養不以貧窶惰志撫弱齡子克承宗祧苦節三十四載陳氏峩眉人黃開甲妻年二十守節家居貧窶俯仰無依勤紡績奉孀姑教子星高列歲薦厯節五十一載宋氏夾江人庠生雷乾位妻年二十八守節厯九十一歲鄧氏夾江人庠生雷乾仲妻年二十六守節壽八十有八二氏交相砥礪皆能矢志青年完操白首厥子若孫俱次第成名有一門雙節旨旌表坊以上俱已奉李氏州人任長安妻年二十守節孝翁姑撫子成立厯四十載楊氏州人時榮女祝之茂妻獻賊至嘉縱兵肆掠楊恐被虜赴水死陳氏州人祝之至妻賊至赴水死陳氏州人祝之至妾賊至赴水死祝氏州人祝之至妹汪大生妻賊至赴水死陳氏州人胡其慎妻其慎病篤陳割股以救不起守節撫二子年八十餘卒何氏州人廪生登明女袁良相妻良相蚤歿矢志守節子文亮登康熙己酉鄉試梅氏州人諸生張廷機妻廷機死獻賊難梅聞變即投水死節義成雙人咸稱之蕭氏州人庠生徐珙妻珙為獻賊坑於成都蕭年二十守節後以壽終孫氏州人戴天相妻甫婚天相病篤氏侍湯藥不怠越二十日遂亡既葬氏即自縊邑令沈敏建坊旌之龔氏州人正士女諸生陳憲明妻憲明早歿龔年二十二苦節教子厯五十五年趙氏州人庠生趙之琯女陳兹悃妻兹悃歿子甫二歲趙年二十五守節育子厯四十一載宋氏州人黃星章妻星章亡遺子振甫一月宋年二十一守節四十八年張氏峩眉人庠生萬沛雲妻年二十守節以壽終宿氏夾江貢生孔昭女祝之恆妻獻賊至赴水死王氏夾江舉人王運開妹祝之郊妻賊至赴水死段氏犍為人鮑怡妻獻賊掠蜀段翁及夫已被害乃負姑攜子潛匿山中被獲驅至屠所將刃之天驟雨昏黑得免賊退姑已驚怖死段泣尋翁及夫骸手自鋤土與姑並厝撫子成立孫膺歲薦守節七十年周氏犍為人朱文燦妻生子萬鍾甫三歲文燦殁周矢志守節課子成立康熙二十五年邑令旌其賢王氏富順人生員岐鳯女適榮縣吳良屏獻賊破蜀良屏隨父逮宦氏奉姑依岐鳯家藏匿山箐值糧盡夜出採蕨食姑後良屏歸旋歿氏年甫二十九守節厯六十一歲卒李氏榮縣人張之蕃妻年二十三守節至六十歲卒馬氏峩眉人萬月庚妻吳逆據川月庚以抗節死馬年二十二守節年七十卒李氏宜賓人適榮縣謝朝恩年二十六夫歿苦節四十年吳氏樂至人嘉定鄒應第妾應第與長子學魯及妻盧氏相繼卒吳年十九無子偕學魯妻王氏撫其孫簡臣成名苦節七十年年九十終直隸眉州胡氏州人適談學廩學廩蚤卒子女幼有豪貴欲奪為妾氏峻拒之恐不免遂削其髮撫子女成人年六十終嚴氏丹稜人諸生彭之權妻青年守節養翁姑撫弱息辛苦三十二載汪氏彭山人黃仁妻仁卒遺一子一女尚幼氏勤紡績撫育成立厯久不移其操郡守旌之直隸卭州馮氏大邑人夫歐陽世科司鐸洪雅卒於官氏年二十七教育二子俱列膠庠守節五十三載但氏大邑人徐文燦妻年二十八夫歿翁姑年髦幼子零丁氏矢志守節勤女紅以奉舅姑課長子希賢入泮次思賢得與選拔厯節三十載以上俱已奉旨旌表王氏州人諸生植公梓妻年二十七守節育子成立厯六十餘載高氏州人朱勳佐妻青年守節教子頴蕃中康熙己卯鄉試頴蒙亦成名氏年六十餘終楊氏州人舉人植敏槐妻槐病侍湯藥衣不解帶及卒數日不食送柩至河干泣血而絶程氏大邑人舉人汪飛妻年二十八而寡撫子淇登康熙甲子鄉試旋歿復教孫元英中康熙庚子鄉試元份補弟子員年八十終高氏大邑人庠生范恂妻二十歲夫亡守節撫二子入泮年七十終直隸潼川州雍正十二年升為府田氏州人年十六歸唐峻德越二載夫亡旬日不食幾以死從顧念姑老子幼俯仰無依乃苦志守節養姑撫子不憚辛勤厯三十七載葉氏州人楊鼎妻年二十四夫歿家貧守節勤女工以膳翁姑訓子安仁安禮俱入宫牆李氏州人王繼緒妻年二十二守節辛苦食貧篝燈課讀寒暑無間長子模登鄉薦次子楷列名膠庠厯五十三載張氏州人原任江南千總薛應試妻隨夫之江南年二十五夫卒於官氏跋涉萬里危苦備嘗扶櫬歸葬代夫養親育子慈孝兼至守節四十七年趙氏射洪人年十六適羅廷臣越五載夫歿欲自盡以翁姑老子尚幼忍死守節事翁姑養葬盡禮課二子於宗祠令日夜警惕以繩祖武俱得食餼宫牆守節三十一年彭氏射洪人年十七適王命新二十一歲夫亡翁姑年逾六旬孝養備至撫髫年二子皆得成名厯節三十四年王氏鹽亭人汪美忠妻年二十二夫歿翁姑垂老弱子三齡氏脫簮珥以營奉養勤織絍以撫孤兒守節三十三年袁蕙姑遂寧人幼許字楚中唐際陶未嫁而際陶卒蕙姑聞訃哀毁奔喪堅欲同穴母力援之乃止苦節五十年樊氏蓬溪人年十八歸楊端泰二十二歲夫卒舅姑俱耄遺孤未及晬氏矢志守節竭力養葬旨旌表撫子蓁克成家業以上俱已奉鄧氏鹽亭人諸生許鴻儒妻儒歿雙親七十餘二子方襁褓氏矢志不二勤紡績以奉甘旨撫二子俱成立里人以孝慈稱之袁氏鹽亭人張玫妻玫病篤語袁曰身後事吾不為汝計也氏泣截指以見志及卒撫孤教子曲盡苦心人稱貞節黃氏安嶽人彭天祐妻夫歿氏矢志守節教子成名縣令聞而旌之周氏安嶽人鄒調元妻夫歿子甫半歲氏哀慟幾絶矢志守正終身不改鄧氏安嶽人戴天志妻夫歿氏盡哀營殯葬悉如禮事畢即自縊死人稱其從容就義焉直隸瀘州曽氏州人馬愷妻愷歿氏年甫十九矢志守節族人馬建耀逼之嫁氏剪髮刺面誓不他適事姑維謹教子成名厯節三十載萬氏州人陳子陛妻夫故氏年二十三事孀姑勤女紅以佐甘旨姑卒殯葬盡禮遺孤圖甫一月撫養成立苦節四十餘年王氏合江人蔣士樟妻年十九士樟卒俯仰無依撫遺腹子三歲旋殤氏孑然一身辛苦萬狀厯節四十二年杜氏合江人前明撫標參將徐明蛟妻夫出討賊氏佐夫軍中夫遇害氏年二十餘投繯欲殉以救得免攜二子避難採薇而食卒致成立以上俱已奉旨旌表先氏合江人張振鼇妻年二十五夫歿遺子瑜方二齡備厯艱辛貞操自矢教子若孫皆成立年七十餘終直隸資州汪氏資陽人年十七適貢生劉之歆之歆司鐸富順卒於官時氏年二十九哀悼幾絶冰操自周氏安嶽人鄒調元妻夫歿子甫半歲氏哀慟幾絶矢志守正終身不改鄧氏安嶽人戴天志妻夫歿氏盡哀營殯葬悉如禮事畢即自縊死人稱其從容就義焉直隸瀘州曽氏州人馬愷妻愷歿氏年甫十九矢志守節族人馬建耀逼之嫁氏剪髮刺面誓不他適事姑維謹教子成名厯節三十載萬氏州人陳子陛妻夫故氏年二十三事孀姑勤女紅以佐甘旨姑卒殯葬盡禮遺孤圖甫一月撫養成立苦節四十餘年王氏合江人蔣士樟妻年十九士樟卒俯仰無依撫遺腹子三歲旋殤氏孑然一身辛苦萬狀厯節四十二年杜氏合江人前明撫標參將徐明蛟妻夫出討賊氏佐夫軍中夫遇害氏年二十餘投繯欲殉以救得免攜二子避難採薇而食卒致成立以上俱已奉旨旌表先氏合江人張振鼇妻年二十五夫歿遺子瑜方二齡備厯艱辛貞操自矢教子若孫皆成立年七十餘終直隸資州汪氏資陽人年十七適貢生劉之歆之歆司鐸富順卒於官時氏年二十九哀悼幾絶冰操自旨旌表嚴氏州人夏之華妻時吳逆兵至驚逃郭外遇賊被執持刀逼汚之不從赴深淵死馬氏德陽人貢生倪攀桂妻年二十四攀桂卒遺一子二女俱幼父母欲奪其志氏不從姑病篤氏禱於天求以身代旋愈年五十有六卒羅氏江西人綿竹劉揚俊妻揚俊由延津令遷宜黃娶羅歸蜀旋亡羅教育子孫三十餘年邑人稱賢母王氏綿竹人胡繼鳯妻年二十七而寡甘貧守節厯八十餘歲子大振嘗刲股療母病及卒廬墓盡哀時有節孝一門之稱吳氏浙江進士邦瑞長女梓潼舉人白良玉繼妻通書史隨良玉任高平令嘗刲股以療夫病良玉卒於官吳年二十八縞素萬里扶櫬以歸教子嵋司鐸溫江苦節四十五年年七十三歲卒裴氏梓潼人王之翰妻康熙十三年為吳寇所逼投潼水死直隸茂州宋氏州人葉定國妻年二十守節事姑撫子厯三十餘載焦氏保縣人庠生王四璉妻夫亡氏年二十奉舅姑養致敬喪盡哀婦道無虧遺孤二人竭力撫其成立厯節四十三年郭氏保縣人夫蚤歿與族姪郭維智居同井里維智有夷僕格斗保傭工氏家暮不能歸宿於樓下夜起欲強汚氏氏詈罵峻拒為斗保趕毆墜樓而死以上俱已奉旨旌表葉氏成都人州學生林承恩妻承恩性極孝父寢疾祈以身代及瘳承恩倐病卒葉欲以死殉夫翁姑泣止之遂以節自矢時人稱節孝之門段氏雲南人隨子羅銘鼎任茂州牧值賊趙榮貴叛城破銘鼎死之段曰子能為國死難吾復何恨投大石缸死士民鐫其事於石缸以表之劉氏夾江舉人劉玉鼎女適州人王璘越二載生子世棟甫六月而夫亡氏哀號截指誓志後侍姑病割股以進苦節終身不改直隸達州李氏州人黎雲妻雲病篤氏日夜焚禱卒不起氏慟絶復蘇曰婦人之道以從夫為主今將從夫於地下矣家人防之越百日竟縊死王氏太平人應蛟女年十四歸楊二甫彌月吳逆僭據有賊牛惠強以勢奪之臨别謂其夫曰我必死此行矣來朝視我遂至牛室故為喜容紿牛出款客即閉户自縊死其中衣預密縫固不可解明日二冒死往視面容如生大慟幾絶後數日二亦死後知縣程溥為合葬表其墓曰節義冢四川通志卷十一下
