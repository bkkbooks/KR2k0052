body:
  text: 四川通志卷十二忠義河嶽日星為乾坤正氣人生其間秉五行之靈秀而依阿淟涊不能以成仁取義自任非夫也蜀在往代為用武之國當其時忘家忘身大節不奪赫然為光嶽偉人者固自不乏至於國朝殄氛靖寇用張仁義之師而臨難殉節之臣慷慨從容見危致命太史公所謂與日月爭光者兹其人歟至若鄉閭之賢慕義強仁或因公憤發為國干城或力庇一方好行其德英風烈概亦可書之以垂不朽作忠義志成都府漢何武郫縣人字君公宣帝時射䇿為郎舉賢良方正第一拜諫議大夫遷揚州刺史成帝以為京兆尹進大司空封泛鄉侯武以忠義自奮好薦拔士類王莽篡位誅不附己者武因自殺史稱其公忠云王忳新都人嘗詣京師見一書生疾困愍而視之書生曰我腰有金十斤願相贈死後乞藏骸骨忳即鬻一斤營其葬餘悉置棺下後為大度亭長有馬馳入亭中大風飄一繡被復墮忳前忳怪白令令以歸忳馬主訪至忳所得其狀嘆曰卿何隂德而致此忳因告以書生事驚曰是我子也遂與俱迎喪餘金尚存厚遺忳忳不受由是顯名舉茂才為鄒令宿斄亭亭長白有鬼數殺人忳不聽夜夢女子曰妾夫為涪令之官亭長利貨財殺我一家十人瘞樓下忳且召亭長詰問具服罪即收其同謀悉誅之王皓王嘉皓字子離嘉字公卿俱成都人平帝時皓令美陽嘉為郎王莽篡位皆棄官歸公孫述遣使召皓嘉皓自刎以首付使者述怒遂誅皓家屬嘉聞而歎亦對其使者伏劔而死羅衍成都人公孫述據蜀衍説述尚書解文卿鄭文伯共諫述使歸漢述怒閉三子於幽室三子守志不回死之侯剛字直孟新繁人為中郎王莽篡位剛佯狂負木主詣闕號哭莽使問之剛曰漢承堯緒享無窮之祚今篡之豈天意乎吾寧蹈仁義而死之不忍事非主莽怒殺之後光武立遣使歸葬常播字文平灌縣人仕縣主簿功曹縣長廣都朱遊被上誣劾以逋沒官穀當論重罪播詣獄爭訟身受數百杖肌膚潰爛毒痛甚慘至更三獄幽閉一年有餘事始得白遊免刑戮衆咸嘉播節義凛然不為刑屈舉孝亷除郪長年五十餘終章明字公濡新繁人為大中大夫王莽篡位明歎曰吾不忍以一身事二主遂自殺張任新都人為劉璋將性忠義與昭烈戰屢敗退守雒城昭烈圍雒欲招之降任曰老臣終不能事二主矣城陷不屈死蜀漢張裔成都人治公羊春秋博涉書史漢昭烈定益州以為太守後為丞相亮參軍裔少與楊恭友善恭早死遺孤未數嵗裔迎恭母事之如母撫恭子如子為娶婦買田宅時人重其義後加撫漢將軍吕凱字季平永昌人仕郡五官掾功曹時雍闓等聞先主崩於永安驕黠滋甚凱與府丞王伉閉境拒闓及丞相亮討闓至南中上表曰永昌郡吏吕凱府丞王伉等執忠絶域十有餘年雍闓髙定逼有東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守封陽遷亭侯後為叛夷所害傅彤義陽人為將軍昭烈東征敗衄使彤及馮習張南拒後吳軍追至語彤曰何不降彤罵曰吳狗安有漢將軍降者復戰與張南馮習俱死吳軍中傅僉彤之子彤死拜僉為左中郎後為關口守將會副二蔣舒率衆降鍾會僉格鬭死馬良字季常襄陽宜城人兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良先主領荆州辟為從事諸葛亮以昆弟待之亮入蜀良留荆州先主稱帝以良為侍中遣入武陵招納五溪蠻夷夷帥皆受印號會先主敗績於夷陵良遂遇害諸葛贍字思逺丞相亮子年十七尚公主拜騎都尉屢遷侍中尚書僕射加軍師將軍亮嘗以瞻聰慧嫌其早成恐非重器戒曰夫君子之行靜以修身儉以養德非淡泊無以明志非寧靜無以致逺及魏鄧艾入蜀瞻督諸將至涪城力戰而死時年三十七長子尚亦遇害次子京位至廣州刺史諸葛尚瞻子年少慷慨有大節鄧艾縋兵入蜀取江油瞻引兵七萬人守綿竹尚年十九為前部鄧艾遺書諭降尚勸瞻斬其使父子俱力戰死之張遵飛之孫苞之子為尚書郎同諸葛瞻引軍拒鄧艾於綿竹戰死唐王先成彭州軍士昭宗景福元年六月王建圍彭日久不下民皆竄匿山谷建兵肆行剽掠先成度建諸將惟王宗侃最賢乃往説之切陳彭民流離困厄狀宗侃惻然因以白建建説撤圍民復故業楊晟昭宗乾寧二年五月以司徒守彭州王建據蜀數攻彭州城陷之日不屈而死安師建彭州馬步使王建攻彭州殺其守楊晟執師建欲使為將帥師建泣謝曰誓與楊司徒同生死不忍復戴日月速死為惠再三諭之不從乃殺之宋郝逢成都人幼好學不以寒餒為憂咸平中賊亂索諸生官之不從者戮逢曰逢非儒不能從命詞氣不屈賊怒令引去斬之復問者三終不易詞賊意解乃敬而釋之杜翊世華陽人紹聖中進士通判懷逺軍靖康初中原多故夏人乘隙入寇奄至城下翊世與知軍劉銓率衆守禦謀徙妻子於長安妻張氏曰寧同死此城陷賊脅使降翊世瞋目叱之舉家皆赴烈熖中死事聞贈朝議大夫官其後表所居曰忠義坊黃哲華陽人崇寧進士知永興軍舉主管文字徐師仁薦於朝忤蔡京意除國子學録遷宗正寺少卿金人陷都城索玉牒哲貯以陶器坎地而藏獲免髙宗郎位被旨迎玉牒及幸維揚哲言宜幸金陵為朝論所阻除國子祭酒後扈駕渡江被金兵追執不屈死宇文虛中雙流人粹中之弟舉進士官至僉書樞密院事謫韶州建炎初應詔以資政殿大學士使金金留之虛中密以蠟書奏虛實後遇害有文集行于世楊震仲成都人負氣節淳熙進士知仁夀縣後擢知大安軍吳曦叛招震仲辭疾不行遺書家人曰武興之事從之失節不從禍立見我死禍止一身不及妻子遂飲藥死詔贈朝奉大夫諡節毅賜廟額曰旌忠王翊字公輔郫縣人寶慶進士吳䂀常招入幕抗節不拜後為參謀官元兵至蜀竭力拒守城陷朝服危坐尋赴井死羅涓崇寧人合州同知厯知劔眉二州以母老歸養元軍入蜀不屈而死劉紹榮四川都巡檢使兵馬鈐轄符昭夀驕恣侵虐軍士趙延順謀作亂殺昭夀欲奉紹榮紹榮曰我本燕人性直豈與爾同逆耶汝急殺我我不負朝廷遂經而死張玘四川都巡檢使與青城王小波戰於江原射中之已而為小波所殺波亦傷重而死丁黼成都制置使嘉熙初元兵趨成都黼夜出城南迎戰至石筍街兵散力戰而死黼帥蜀為政寬大蜀人思之陳隆之四川制置使淳祐初成都被圍城破隆之家數百口皆死檻隆之至漢州使諭州城降隆之大呼令堅守勿降遂見殺李大會簡州守元兵攻城大會見執不屈被害元文允中成都人天資髙邁無書不通為嘉定路學正至正時狀元及第任修撰為四川儒學捉舉遭亂沒於難布景範新都人至正進士益涼同知時李額驢侵掠景範舉義兵拒之力戰終日矢盡而死張繼志四川行省郎中以政最聞遷本道亷訪司副使時李嘉陷四川繼志帥兵與戰力屈被執不食而死嶽時中成都人為漢州太守李嘉入寇時中率兵殺賊甚衆衆寡不敵死之馮文舉什邡人初舉鄉試授漢州學正逹嚕噶齊燕僚屬以一手致酒文舉不受遂拂衣去次科復登第歷雲南儒學提舉明玉珍攻雲南文舉謂其妻曰我元進士蒙厚恩今軍至有死無二汝光州馬中丞子孫也其從之乎馬氏曰官人既欲死妾願相從遂焚香立誓皆自縊死時人重之明王福成都人讀書尚義偽夏時元御史丁夀曽流寓於蜀福館之事以父禮既卒厚殯蜀藩聞其事更福名義命儒臣賦詩美之吳承勛成都人治博士業平生篤孝尚義內外待舉火者數十家又施藥濟貧苦閭里賴之何宗魯郫縣人監生知浪穹縣為政嚴明剛直不屈為上官窮托而死先遺書所知曰某以私怨繫我經年我死訴上帝未幾某果暴卒靈異甚著民立祠祀之方法桐城人洪武己卯舉人四川都司斷事文皇即位諸司皆表賀法不肯署名尋被逮舟過安慶投江死方政蜀人宣德初以都督征松潘勇略過人屢立戰功後陳亡少師楊東里嘗薦之云亷謹公勤衆所推服陳懷合肥人宣德初西畨攻圍松潘懷以都督帥軍由洮州入解圍開道增置城堡調官軍輪班備守後以陳亡封伯爵何洪全椒人正統時征麓川以功升都指揮景泰間征天柱銅鼓等處進都督僉事洪御衆嚴整待之有恩將士樂於用命故所向有功天順癸未德陽賊帥趙鐸既降復叛逼成都洪率師討之死於戰贈都督同知趙祐雙流人𢎞治中進士正德初授御史立朝謇諤屢上疏陳時弊劾劉瑾罷歸瑾誅復升副使未就任而卒馬傑涿鹿衛人進士正德初任副使征藍廷瑞等不避艱險直抵其巢穴力戰而死王源太原人進士正德初任僉事值藍廷瑞等作亂源巡厯營山賊已逼境顧兵無可用以死自誓賊至城陷源遇害於顔魯公祠吳景南陵人進士正德初任僉事性剛方慷慨多大節遇賊曹甫寇江津景督戰死之楊慎號升庵新都人大師廷和子少穎悟七嵗作弔古戰場文人爭傳誦正德庚辰進士殿試第一授修撰嘉靖初議大禮伏闕泣諫廷杖幾絶已謫戍滇南慷慨就道蠻荒逺地手不釋卷晚年學益博著述益富隆慶初詔徵命下慎已卒贈光祿少卿所著書四百餘卷行於世劉克學什邡人嘉靖中進士任德清知縣以才調上海時值倭變縣舊無城克學日夜率民築之甫完工寇至乘城防禦身中流矢久之以勞瘁致仕歸尋卒士民祀之房嘉寵靖虜衛人任四川守備萬厯二十五年楊應龍屢犯綦江嘉寵職任守禦時大兵未集應龍遣沐照攻城城陷死之後事聞立廟以祀加贈官秩張良賢固原人萬厯中以參將守綦江與房嘉寵竭力守禦因衆寡不敵城陷而死事聞立廟祀之贈官有差劉繼祖成都中衛世襲指揮調征九絲蠻斬獲有功推選中軍轉升馬湖守備奉督撫令與李獻忠連營把截馬湖要路夷兵猝至遂與戰斬賊十餘人援兵不至與獻忠同日陳亡事聞褒恤魯文獻彭縣人以母老兄瞽不仕道遇遺金不拾歲旱且疫捐地以瘞道殣易志明彭縣人居慈峯三子務農為業共爨濟貧瘞殍建橋鄉黨以三代遺民褒之張守業彭縣人張文廣僕文廣疾篤託孤於其壻壻辭因屬守業業泣受之成葬畢即迎里中諸生至登記簿籍封扃內宅安養主母撫孤成立仍邀前諸生至奉簿籍管鑰悉歸其主財産數倍於前毫不自私衆請復其身守業曰我張氏老奴也將安往士大夫待以賔禮徐可求由進士厯副都御史巡撫四川駐節重慶秉政清肅卓有風裁天啓元年藺酋奢寅有叛志因邉堠有警偽言願以兵三萬人備邉可求閲兵於演武場寅將樊龍等索餉頒賞不給遂叛執可求殺之並從官數百人傅炳清字光宇簡州諸生天啓辛酉藺酋奢崇明叛炳清為所執不屈大罵賊怒殺之事聞旌表程時修成都諸生精易學生徒雲集間得修脯即以購書有餘盡以給諸生之貧者學使先後禮奬咸謂輕財尚義年八十三卒王秉乾字育精華陽人初任湖廣湘隂縣賦重差繁民疲於奔命秉乾捐俸金代民完解天啓五年以卓異行取時魏璫擅權欲招致秉乾秉乾力拒之遂罷考選授大理寺正平反無冤滯致仕歸言行不茍人咸奉為模楷賊陷成都秉乾先令闔家眷投井罵賊死之胡永夀其先楚之衡州人父真為新繁典史遂家馬夀至九十七平生樂善好施鄰有盜取其綵帛者衆得其情告之夀曰彼亦自有帛耳我何與焉嘗有積金遇急難者慨然與之老年時每扶以蒼頭徐行街巷遇貧乏常加賑濟子孫科第蟬聫人以為積德之報馬玘新繁人與華陽諸生蔣文魁善知其貧贍之且為之娶郫人羅嘉賔貸玘金三百旋遘難玘焚其劵有叔卒於雅州遺孤方襁褓乃迎柩歸養其嬸撫孤備至嘗貨布於市盜者竊去旁見者以告玘曰彼買去非竊也盜愧謝不復為盜陳雲鵬字凌斗漢州人父早逝率母教十六補諸生值奢酋變援兵飢乏鵬罄所有輸榖麥凡千五百石明末獻逆搜執之欲授以官不從遂罹害子太常後登鄉薦任廣東廣州府推官塗澤民字志伊漢川人進士初任內黃知縣纍官僉都御史巡撫八閩時值海寇曽一本倡亂上疏合兩廣會剿廣兵未至澤民先機出奇屢破賊兵數千悉就火死捷聞進副都御史廕一子著有説詩意得諸書駱日升福建人由進士歷川南道副使奉命監軍有風裁嚴紀律同巡撫徐可求點閲奢寅兵變亂卒起遂遇害時東川守道孫好古巡道李維周知府張文炳咸罵賊死之黃文魁福建人四川總兵值奢寅兵變文魁手刃梟賊賊攢刺殺之其妾聞變投水死唐慶忠彭縣人性好施雖斗米必濟貧乏楊𢎞義彭縣人鄰有寒士敖選家甚貧𢎞義周之後得志酬以千金不受顧其仁字湛一華陽人任工科都給事中天啓間逆璫魏忠賢擅權其仁特疏紏參落職為民崇禎元年以忠鯁起用復原官尋遷陜西參政致仕卒乾曰貞字遵陽成都人任知縣丁內艱歸事父孝謹獻賊陷城曰貞以磚擊賊而死邱之坊字粲吾成都人明經子祖德任山東濟南府推官受封如其銜之坊素以理學名獻賊陷城成都偽令遣役招之坊之坊卧於牀曰吾受國恩已久更知誰耶轉背復卧不食而死邱祖福之坊第三子成都府諸生賊陷城賊官遣役招其父父卧不起祖福代父往賊嗔其不跪祖福曰吾乃朝廷士子豈跪賊乎罵不絶口而死陳士竒字平人鎮海人以進士任督學副使藻鑑甚明崇禎十五年升僉都御史巡撫四川尋遷南通政時獻逆犯蜀已入夔門士竒至重慶將吏謂士竒曰既卸撫軍事公可去矣士竒以新撫未至義與封疆共存亡遂奉瑞藩堅守重慶城陷死之丁應選馬京馬亭李華宇應選官建昌行都司海棠堡指揮使署所印崇禎甲申八月初九日賊破成都巡道胡恆調應選救援行至黎州所官沈雲龍阻截其兵賴宣慰馬京及京弟亭令通使白某及子白寰翠招集黎州富莊薑黃李奈蔡包張七姓頭人子弟合兵萬餘千戶李華宇年八十率領赴黎至雅州界八步石龍觀川對岸與賊力戰殺賊數千恢復黎雅與應選合兵殺賊苦戰三載後兵敗應選與二馬陳亡華宇及白氏父子被擒磔死榮經令黃儒城破被磔縣之開善寺時有天全碉門六番招討使楊之明成都進士朱俸伊川北舉人鄭延爵率兵拒賊於雅州龍仙關兵敗之明俸伊就擒二人皆被賊磔死成都南關延爵逃至總岡山收兵再戰後亦殁於陳楊孟凱知簡州值妖人劉千斤亂守禦甚力賊不敢犯徐瑞屢彭縣人性孝謹業醫治病不計貧富賊至脫衣履置觀音泉岸上赴水死魯城隍彭縣人人以其正直有守遂以城隍呼之失其名賊至執城隍赴省大罵不屈賊割其舌猶噀血大罵賊寸磔死之劉祚昌彭縣諸生匿山中被賊執大罵不屈賊遂殺之莊祖詔字鳳傳成都人纍官順天府冶中在任清正居家敦睦子孫皆明經獻賊至城陷舉家死之龍文光柳州人由進士分守川北道以參政擢右僉都御史巡撫四川駐節順慶聞獻賊至成都星馳赴省以圖拒守城陷投水死劉之渤字羽長寶雞人由進士以御史巡按四川時獻賊犯成都之渤與巡撫龍文光調兵守成都城陷被執賊以之渤秦人同鄉欲降之之渤瞋目大罵曰死賊我恨不滅汝豈從汝作賊乎罵不絶口賊怒磔之臨死語賊曰汝寧多殺我一刀少殺我一百姓遂死張繼孟扶風人進士任按察副使分巡川西獻賊陷成都死之陳其赤江西崇仁進士任守西道獻賊陷成都不屈自投百花潭死方堯相字紹虞黃岡人任監紀同知提兵守城而餉不繼與巡按請於蜀藩不允城陷被執不屈尋受害於萬里橋有絶命詞曰時危節見古今同取義成仁且盡忠江水茫茫須借力此身飄蕩赴團風方家團風鎮故云劉鎮藩山東人鎮蜀死獻賊之難劉士斗廣東南海人由進士任成都府推官以亷能著以巡按劉之渤特薦擢建昌兵備僉事獻賊將入境之渤趨之行士斗曰安危生死同此耳復何往遂與之渤畫䇿以守及城陷死之沈雲祚江南太倉人由進士知華陽縣獻賊攻成都城陷被執雲祚罵賊不屈死之王源長新津人崇禎間拔貢值獻賊變源長揭一聨於室云存心正大光明夜可焚香告上帝立身忠孝亷節日將披赤事明君後為獻賊所執不屈死妻徐亦自縊莊祖誥字天秩成都人歷雲南按察使致仕歸獻賊屠城祖誥衣冠端坐於堂賊至痛罵遂罹害何教授失其名獻賊破成都坐明倫堂鳴鼓集諸生不至夫婦自縊死徐明蛟四川撫標參將崇禎末督兵討賊陷陳遇害李思明華陽人以賣線為業辛勤居積孝事繼母田氏凡葬市民陳軫輩三十餘冢施棺槨衣米無算王履亨字坤軸華陽人歷任宣府同知被獻賊執至新橋不屈投江而死何繼臯字直卿華陽諸生偽學官楊允升迫脅應考繼臯憤恨大罵即自刎死李之珍崇禎末授都司僉書甲申獻賊陷成都死之阮士竒雅州指揮領兵守成都獻賊破成都城陷死之顧鼎鉉貢生崇禎末流賊執之鼎鉉罵不絶口賊抉其兩目以死雷應竒素負俠氣崇禎末賊至應竒曰奈何郡縣無一人殺賊者糾集義勇拒賊於髙境關力戰死之竇成川西小卒𨽻安慶撫標辨將廖應登營守桐城隨應登出偵賊並為賊所獲且挾至城下諭城中降應登未及言成大聲曰廖將軍今被賊執來諭城降然賊兵無幾大營未至城中可堅守勿為廖將軍所惑也賊怒寸磔之桐人感泣立專祠春秋享祀劉佳印崇禎末四川總兵官獻寇圍成都與巡撫龍文光率官軍三千從川北來謀設守城破同文光赴浣花溪死鄭安民浙江人由貢生授蜀府長史賊圍成都安民守南城城陷不屈死之王勵精陜西米脂人崇禎末知崇慶州以清亮端方著獻賊破成都勵精具朝服北向拜復西向如北禮從容書為臣死忠為子死孝而今而後庶幾無愧十六字於屏投筆登樓貯火藥於樓下賊至令僕縱火自焚死獻賊壯其節斂遺骸葬之趙嘉煒浙江人監生崇禎十七年知郫縣甫五月獻賊陷成都時嘉煒方督修都江堰賊執之不屈投江死李甲湖廣蒲圻人由舉人知雙流縣崇禎甲申委署建昌監理廳道經榮經縣值獻賊犯雅安官軍潰甲隨師中力竭死焉一僕守甲尸數年後楚路通始載以歸重慶府周巴蔓子忠州人周末巴國亂蔓子時為將軍請師於楚許以三城楚既救巴遣使請城蔓子曰藉楚之靈克弭禍難誠許楚王三城可將吾頭往謝城不可得也乃自刎以頭授楚使楚王嘆曰使吾得臣若巴蔓子用城何為乃以上卿禮葬其頭巴國葬其身亦以上卿禮漢嚴顏建安中為劉璋將領巴郡太守為張飛所虜飛呵顏曰大軍至何不早降而敢截戰顏曰公等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒令斬之顔容色不變曰斫頭便斫頭何怒為飛壯而釋之甘寧墊江人仕孫吳嘗獻計孫權謂先取黃祖鼓行而據楚關可漸窺巴蜀權深納其言時稱江表虎臣後以戰死宋袁延慶元祐間以軍功授合州兵馬攝事天性忠義兄弟七人協力平賊范鎮為作忠義傳屈堅忠州防禦使建炎初金人圍陜府堅引兵救之圍解後金人執堅堅曰吾來解圍城茍全吾死何憾叱金人使速殺之陳用庚淳熙間任大足教授適元詔至用庚曰我宋臣也不拜棄官去趙昂發大足人為遂寧州司戶咸淳中權池州通判元兵渡江池州守王起宗遁昂發攝州事為守禦備明年元兵大至昂發知不能守乃置酒與親友飲訣謂其妻雍氏使出走雍氏曰君為忠臣我獨不能為忠臣婦乎及兵薄城昂發書几上曰國不可背城不可降夫婦同死節義成雙遂與雍同縊死事聞諡文節雍氏贈順義夫人劉霖永川人德祐元年瀘州守梅應春以城降於元霖獻計於郡守張玨恢復瀘州後元兵陷重慶霖被執不屈死之郝仲連昌元人為防禦節制河東軍馬元將婁宿以重兵壓城仲連力戰度不能守先自殺其妻女城陷不屈並其子皆遇害贈觀察使曹琦知南平軍元兵來攻被執既得脫南歸時制置使辟為主管機宜文字聞都統趙安以城降琦遂自縊而死張珏陜西鳳州人魁雄有謀善用兵以都統制守合州算無遺䇿德祐元年升四川制置使兼知重慶府元兵攻重慶玨率兵與戰趙安等夜開門出降珏巷戰力盡走涪州元將追執之至安西解弓弦縊死文天祥在獄詩西南失大將蓋謂珏也馮坤以六郡鎮撫使守咸淳府元兵攻城楊文安與坤同里開諭之使降坤不從既而城陷坤悉力巷戰力屈就擒死之王仙涪州守元兵攻圍無虛日勢孤援絶宋亡一年城始破仙自刎死明鄒公瑾江津人洪武初以經明行修薦本縣教諭擢監察御史建文時死節劉元長夀人洪武中任吏部貟外奉使過河南見餓殍盈道發倉賑之草奏上聞活人以萬數胡子昭大足人任榮縣學訓導升翰林院檢討厯刑部侍郎建文初充纂修官文皇渡江與方孝孺等俱不屈死臨刑詩曰兩間正氣歸泉壤一點丹心在帝鄉嘉靖間立祠崇祀江英江津人永樂初應求賢舉知滄州擢參議值寇亂多所捍禦有功於時尹鉉巴縣人正統中進士拜監察御史從征北邊卒於土木之難李實合州人號虛菴進士英宗北狩舉朝無敢往者實以都給事中加侍郎使北單騎入敵營面折額森得見帝帝喜曰在此逾年始見卿至矣時實賦有重整衣冠拜上皇備聞聖語重凄涼之句自實有此行後漸議迎駕論者謂回鑾之功不在李賢而在實劉福巴縣人成化中厯貴州按察使盤江賊叛挺身赴戰遇害王養心巴縣人郡庠生工詩文筆札有才氣樊龍張彤之變養心詐降周旋兩賊欲行反間因勸彤殺龍事泄龍收養心令供同謀者養心備受諸苦體無完膚瀕死不招遂被支解後録其子入學燕有臺巴縣人以貢生任榮經縣教諭值藺賊據城遂閉户絶食憤悒而死又貢生劉雨金廪生曹延詵鄒良翰俱不食而死陳懷德巴縣人吏員任雲南衛經歷多籌畫後歸里值樊龍之變以田産貸金募兵並率鄉里之願從者三百餘人守牛角沱以保鄉里遇賊力戰而死張祚達巴縣人素負驍勇樊賊欲官之乃引刀刲其臁見骨得免後與賊戰南紀門下連斬數級力屈死之王俊民合州人正德間以進士歷給事中謇諤有聲中外畏憚嘉靖中永嘉方眷遇尊顯衆無敢抗俊民前後持大禮諸疏糾之不少假竟忤旨斃杖下隆慶初詔賜追恤楊正朝江津人與向保王曰生俱為民兵正德中吳僉事守江津為流賊所敗三人俱以甲為吳擁蔽賊並殺之龔恕江津人明經著有龍門詩集任寧夏衛經厯以憂歸廬墓三載置義田二處一以贍族之貧者一以贍族之為士使勤於學至今稱之趙可懷巴縣人嘉靖中進士由知縣屢著異績厯遷兵部右侍郎巡撫應天興利除弊吳人戴服焉又以平倭屢助兵給餉劻勷居多詔入為工部左侍郎會橫璫陳奉暴於楚奉特簡往撫遂定楚亂晉兵部尚書楚悍宗聚亂鼓譟軍門可懷開門出諭申明祖訓國法且戒標兵毋得入衛欲以靜鎮釋之忽逆黨狂逞擁入遂遇害事聞加賜葬祭廕一子中書舍人蘇孚陶舜臣俱合州諸生嘉靖末白蓮賊起殺掠人民二生奮然討賊親冒矢石為賊所殺州人悼之請入祠祀鄒智字汝愚合州人别號立齋年十有四舉省試第一以庶吉士值星變上疏言陽不能制隂宜進君子退小人萬安劉吉尹直三小人王恕王竑彭韶三君子其言切直觸時忌被逮繫獄謫石城吏目死時年二十六諡曰忠介董之威合州諸生萬厯間妖賊田純聚衆攻城之威率衆固守城賴以全又能出竒擊賊擒其渠黨獻馘軍門授以職未仕而卒張奏凱綦江人天啓四年征播有功授川北副總兵復拒闖賊升天柱總兵會獻賊攻成都奏凱守東門城陷死難張邦登綦江人鄉里中喪不能殯者邦登助以棺具癸未邑有火災所居左右俱燼其家獨存人僉謂好善之報云夏衍虞江津人天啓丁卯舉於鄉任臨漳知縣有惠政升曲靖司理署道事丁亥張賊陷滇衍虞貽巡按羅國瓛書約為義舉事覺遂與國瓛俱閣門遇害李興永川人路拾遺金盡還其主市豬過於所直邀其主償足之晨出遇盜其園蔬者即歸以避之其厚重如此董盡倫合州人舉鄉薦歷大同鞏昌府丞以鯁介忤時歸築舍蘭溪謝絶干謁值奢酋據重慶將入合州盡倫捐資募兵與州守議拒賊賊使吏蔡璇招降倫剔其睛以酒吞而殺之兵威大振賊不敢入境川以北賴其保障督兵進取佛圖關為賊所害事聞贈光祿卿世襲錦衣千户特祠血食詹天階白璽王三元封尚聘鄢應期俱綦江諸生值播賊變被執不屈一時同受害蔣世鉉永川人獻賊遣其黨由重慶入永川居民竄匿世鉉倡集義旅二百餘人攖城守禦後與賊戰於東門為賊所執招之降世鉉瞋目大呼曰寧速殺不屈賊怒寸磔之臨死罵不絶口李文隂壁山人崇禎間任川北鎮副總兵守石隘與張獻忠戰於白水江被擒逼降罵賊不屈死之羅良沛壁山人好善樂施歲置棺數十具貧不能殯者助之歲飢出積穀以賑年八十卒曾異撰榮昌人崇禎壬午舉人知貴州永寧州賊陷黔窺滇州人望風欲遁時江津進士程玉成明經龔懋勳寓州署與曽畫䇿曰州據盤江天險厄吭全滇棄之不守豈人臣義乎遂激勵軍民竭力拒之賊至愈衆勢不能支城遂陷異撰同程玉成龔懋勳閣署自焚死羅大爵合州人崇禎間鎮成都賊至死之董克治合州諸生魁梧慷慨崇禎末獻賊破重慶旁掠合州克治傾資募義勇殺賊甚多後於長安坪與賊死戰力不能支率兵民據洞中避賊賊誘以髙爵不為動相守月餘賊鑿山積火其上凡三千餘人感克治風義毫無變志俱被燻而死郭大德銅梁人隨父宦之楚宿蘄江旅館拾遺金還主家居喜施與族黨貧不能婚嫁者力助之人稱義士梁士騏永川人崇禎己卯舉人獻賊陷城士騏遇賊欲執以行騏不屈大罵受刃彭琯永川人登崇禎甲戌進士授福建漳州府推官行取工科給事中值李賊變被執大罵不屈受慘刑死曹立卿江津人郡庠生賦性端方潛心經史以躬行實踐為學持功過格二十餘年言動不茍為鄉黨所矜式明末闖逆陷京師立卿聞之北向泣血悲憤成疾洎獻賊據川懸偽職逼勒士紳籠絡甚衆立卿誓死不汚偽命易簣時戒子恔曰吾家世受國恩爾弱冠登賢書兹大節攸關之日失身取義只爭些子吾一生自反無愧今日可謂得全所生爾其勉之又曰我此時若萌一貪生念便如烈火燒身想到守身全歸真入清涼境界矣言畢而逝張九經涪州人客有隱金銅佛中寄其家後家破盜以佛故未攫去客至九經歸佛與金客感其義分金謝之竟不受段髙選雲南人進士任巴縣忠厚慈祥甚得民心藺賊變被害巴人悲之王錫字古田江西新建人進士任巴縣有實學異才愛民課士聲卓一時獻賊陷渝錫倉卒被執慷慨激烈罵聲甚厲賊怒與巡撫陳士竒備受五毒磔死王行儉字質行江南宜興人崇禎丁丑進士知重慶府甲申六月獻賊攻城城陷賊縛巡撫陳士奇知巴縣事王錫暨行儉縛之演武場中將殺之俄而雷電晦置獻忠對天詬曰我殺人與天何涉架飛炮向天齊擊之遂皆遇害保寧府漢譙鉉閬中人成帝時以對䇿髙第拜議郎數陳災異及養居攝易姓名竄歸公孫述連聘不起賜以毒藥鉉嘆曰保志全髙死亦何恨其子瑛盡捐家資十萬以贖父死乃獲免蜀漢黃崇閬中人事後主為尚書郎鄧艾冦蜀崇勸諸葛瞻速行據險不從崇苦諫流涕艾兵入綿竹崇帥麾下力戰死於陳程畿字季然閬中人昭烈領益州牧辟為從事祭酒章武二年昭烈東征敗績畿奉帝泝江走石門灘追者甚急或告畿曰後追至解船可以免畿曰吾在軍中未嘗為敵走況從天子而見危哉追者至畿身執戟戰死五代姚洪隸董璋部下璋反唐令洪戍閬州璋以書誘之洪投諸厠州破謂洪曰何須相負洪曰老賊昔為李氏奴感恩無窮今天子用汝為節度何負於汝而反耶寧為天子死不同人奴生璋怒然鑊於前令壯士十人刲其肉自啖之明宗厚恤其家官二子焉宋羅承之巴州人少慷慨好兵略乾德中文協率衆攻閬中承之竭兵募士擒協太祖召見賜感義軍節度使兼知巴州上官正開封人太宗跱為劍門都監李順遣衆數萬冦劍門正麾下止疲兵數百激以忠義勇氣百倍會成都監軍宿翰兵至正與合兵擊賊大敗之斬馘幾盡時朝廷深以賊阻棧道為憂正孤軍力戰閣道無壅王師得以長驅滅賊以功加招安使又與平王均劉旰之亂官至大將軍防禦使張憲閬中人嶽武穆用為偏將驍勇絶倫征戰有大功與嶽雲俱為秦檜所害明追諡烈文侯配祀嶽武穆於杭州西湖及湯隂楊震仲知南部縣有惠政及民吳曦招之不從飲毒而死朱勇利州統制與金人戰於瓦亭被執臨死罵詈不絶口事聞立廟賜額忠節在寶峰寺之東趙廣寶祐間為閬中推官有氣節元兵至不屈而死張實楊立徐昕王佐實為馬湖守將為元紉璘所獲遣招苦竹隘實入隘遂與守將楊立堅守元兵至劍州攻隘取之立戰死獲實殺之進圍長寧山鵝頂堡守將徐昕王佐亦戰死曹友聞利州都統有智勇屢敗元兵遂扼仙人關蜀帥強檄徙大安與弟友諒部將劉虎齊發禦敵力戰一軍皆死血流三十里江彥清巴州人德祐初任珍州守瀘州守梅應春以城降於元元兵併力攻珍城城陷巷戰而死元范忠至正間為劍州萬户明玉珍陷巴州擒之不屈而死明鮮𢎞閬中人任醫學正科天順間寇掠南部逼閬境檄𢎞率民兵禦之遇賊力戰死旌祀張友諒南部人成化初邑中苦山賊劫掠知府李正芳檄友諒及其弟友富友貴率敢死之士搗賊巢穴絶其黨類追賊魁儀隴斬之當道嘉奬欲表友諒為巡檢固辭御史費亷有詩以表焉王通南部人藍賊猖獗太守李正芳使衛封境通生擒掠陳三人斬之於市後同黃興逐賊通斬賊首一人以援兵不至通與興同冒矢石死之太守躬視俱給以冠帶殮葬之存恤其家劉湖閬中人𢎞治初歲飢湖捐金急公奉檄散賑嶽池全活甚衆傅義閬中人知保定縣遭值逆瑾用事毅然不屈遂罷歸瑾誅起用永福縣卒時人語曰孝言無間於鄉閭正氣不阿於權幸李毅南部人讀書明理有詩文集宣德正統間儲榖數千石賑貸貧民遭歲連荒乃取劵悉焚之仍納榖數百斛於賑濟倉中人稱其義雷應通廣元人正德初流賊衝百丈關縣令何溥提兵拒敵應通父子七人踴躍倡衆誓以死戰經旬無援為賊所執父子俱罵賊死李開之劍州人冠帶散官都御史林俊募征鄢藍率兵至入寧山挺身赴敵手刃二賊為賊擒不屈而死林公壯之祀忠義祠馬傑正德中知蒼溪以剿鄢賊戰敗自刎死陳表蒼溪諸生鄢藍賊迫境表率鄉兵陳紹聰等禦之盡日對敵殺賊數十人無援被執不屈罵賊死袁璋南江人正德間藍賊倡亂都御史林俊委令殺賊璋所向有功其後兵盡矢竭為賊所獲男襲挺身救父連殺七賊被擒襲死三日目猶瞪視其父林俊為詩挽之榜其門父子忠節總制彭澤嘉其節義勒石城隍廟祀於忠義祠羅照南昌人正德中以吏員任劔州判官鄢藍之變率鄉勇拒守被執不屈死之其子價復號召勇士圖復父仇亦見殺奏聞殮送還鄉廕價子入監讀書復於州東為立忠義廟徐旻千户所百户奉令討鄢藍多斬獲功副使馮傑於鐵山關被圍旻單騎進救援兵不至被擒罵賊不屈死總制彭澤為奏聞贈正千户蔡髙利州府指揮值鄢藍之變奉檄守隘賊至髙督衆力戰為賊所執不屈死馬繩祖利州衛百戶奢酋叛督兵戰江門身被數創猶奮勇衝陳死事聞旌敘崇祀忠烈祠楊輔政通江南山巨族也正德間督率族衆追鄢藍賊戰於羅江列坪鎮賊屢却輔政乘勝逐北孤軍逺入援兵不前力戰死都御史林俊奏聞立忠烈坊以旌之茍惠通江人剛烈有膽略藍賊起惠率兵合玀􅉰軍為犄角以擊之賊敗走龍潭惠從間道衝殺賊溺水中死水為之不流復與戰於松樹埡殺傷甚衆會日暮賊伏兵出惠力屈而死有司録其子良䇿為縣諸生良䇿方廬墓賊擒之去亦不屈死茍溥通江人惠族弟膂力過人鄢藍陷城縱火煙焰蔽天溥帥鋭卒五百人合兵進擊敗賊於三花頂兵聲大振尋又敗賊於龍潭尸枕山谷忽賊數百潛入其家溥短兵接戰身被數十創死父子兄弟同時遇害者三十五人張茂輔薑玉山鄭廷祿俱劍州人領鄉兵禦賊死鄭輅劍州人鄢藍賊陷城輅奔歸謂父母曰賊至矣請死以當之遂縊於門賊哀之父母得免於難朱林趙俊王思政俱劍州人時鄢藍賊起禦戰而死今俱祀忠義祠馬仁德巴州人嘉靖七年大荒疫仁德出粟濟貧掩埋流殍二千有餘御史邱道隆奬曰馬仁德濟貧掩骼仁人所為誠不易得乃旌其門曰尚義王名正千戶所千户嘉靖中奉委採木時入山多觸瘴生還者十不三四人多規避名正獨慨然請往獲木千章果死瘴癘遺言寄子曰我死無遺憾獨母老失養為不安耳汝善圖之一言不及私學使郭子章為立傳盛典利州衛千户萬厯丙戌盜賊猖獗秦蜀皆擾典領兵拒敵至楊家壩射殺一賊衆賊湧至典受重傷血漬衣履猶躍馬殺二賊死王才啓劍州諸生流賊攻城才啓登城禦敵射殺二賊城陷遂遇害李猶龍廣元人獻賊破廣猶龍以抗節被害楊于鼎劍州人舉孝廉崇禎十年冦至衆潰于鼎率子姪楊令青等與州守徐尚卿守城城陷尚卿被執于鼎率衆巷戰奮臂擊賊賊怒支解以死子姪並被殺王承祖劍州人御史梁之棟僕也獻賊據蜀之棟子田璧知不免止一五歲兒名繩武召承祖夫婦囑之曰一線之脈盡託於汝其善保之梁氏一家俱遇害承祖負繩武以逃賊追急遂棄己子而匿繩武巖穴間得脫後賊復起知繩武在欲索之承祖又負之逃丐食山中及盜賊平息為之經營婚娶延師以教庚子舉於鄉竒童子通江人崇禎間流賊犯境邑令李存性守禦甚嚴賊知不可近佯為官兵將襲城道遇童子紿之曰勿言我兵也童子佯應之且走將及城門大呼曰賊至矣賊殺之邑令為葬於城西祭以文羅中元字文魁劍州人任湖廣襄陽經厯有介節休致歸置田數十畝以贍族人復置祭田以供祀事郡守楊如震為義田記以美之劉喬杶陜西人令昭化崇禎十年賊至陳亡祀名宦徐尚卿福建人由舉人知劍州崇禎十年冦至召州民語之曰此城必不可守爾等當避之吾惟有死衆不忍去尚卿手書城空不可守仗節為誰危茍竄那無計殊羞孤影隨數語匿于懷自縊死單之賓崇禎末以中江教諭署劍州賊至民皆散去之賔罵賊死鄭夢眉江西人崇禎壬午知南部縣氷蘗自矢興利除姦政聲迥異獻賊至夫婦不屈俱縊死李俊英南部人郡庠生姚黃賊掠南部俊英涕泣誓衆起兵旬日得數千人禦賊江岸戰屢捷賊不敢犯日久糧乏其弟跪泣告曰我等冒矢石城中人相繼遁去無援矣曷暫退俊英叱之曰寧為君父死不為一身生自是無敢言退者賊計窘將引還會同事有忌俊英者噪而奔賊得從下流渡圍數層俊英奮勇突圍多殺傷不得出還至江岸投水死順慶府漢紀信廣安州人為漢將軍項羽圍漢王滎陽急王患之信曰事急矣臣請誑楚可以間出信乃乘王車黃屋左纛曰食盡矣漢王請降項羽信之漢王得以數十騎出西門遁去羽於是殺信宋時加封忠祐安漢公紀通信子高后八年太尉周勃討諸呂通時掌符節納北軍竟成安劉之功蜀漢張嶷字伯岐廣安州人昭烈時以都督平山賊除越嶲太守政先恩惠羣蠻降服後拜蕩冦將軍與魏戰歿民聞之立廟以祀晉譙登字慎明西充人周之孫也父為李雄巴西太守馬晚所殺登募巴蜀流士得二千人時鎮西將軍羅尚駐巴郡登從尚索益軍討雄不得乃往攻宕渠斬晚剖腹食其肝巴西賊破復詣尚求軍尚參佐以不利辭乃加責於尚尚但下之而已會羅羕殺雄太守李離舉梓潼來降登徑進涪城雄自攻登為登所破而尚恨登之見侮不供其軍食雄知之遣李驤致攻兵窮士餓誓死不退衆亦餓死而無去者永嘉三年為驤所生得見雄言詞慷慨不屈死之唐何滔嶽池人隱居讀書於金城山天寶間安史之亂舉義兵討賊死難廟祀此山宋時賜額曰靈濟宋趙寅西充人登進士第官至奉議郎閬中分僉冇氣節元兵至不屈而死杜源蓬州人事親孝聞禧中蜀大飢疫遺殍載道北路尤甚源慨然曰民吾同胞何忍暴露遂别男女骸骨作二冢葬之王雲字子飛西充進士厯官講議司編修欽宗遣康王如師雲為副比至磁州雲有膽識衆忌雲立功故賊之雲遂死諡忠介贈尚書施擇善寶祐六年為蓬州連山轉運使元兵入劍門連山守將遂以城降擇善不屈而死明姚氏一門永樂靖難時姚氏聚闔門男婦置酒哭祭建文痛飲俱縊死鄉里積尸焚之為棺木二丈許大窖藏焉太守不敢顯旌題其碣曰姚氏之門在城南紅土坡孫仲玉南充人正德癸酉流賊侵縣仲玉與衆守李灘為賊所獲令探水仲玉示不可渡且呼衆固守之賊不得渡斬仲玉遂去總制彭公大書忠義以表之何本清儀隴人鄢藍賊攻縣本清當先陷陳力屈死之事聞旌曰忠義馬驤字尚德西充人由貢生任都察院都事正統中陳亡賜祭葬廕其子惟善入監後惟善官湖廣臨武令亦以清節著費𢎞道蓬州人鄢賊犯境王僉事令領兵隨至營山剿賊王被執衆皆首鼠獨𢎞道躍馬格鬪殺數十人力屈死之事聞詔恤其家每歲給米帛免其役子孫世襲冠帶附祀忠節祠王源山西五臺人分巡川北道督兵征鄢藍至營山遇賊死之有死節傳見藝文志張添夀營山人有膽氣追鄢藍賊至富順三母灘戰死事聞旌表曰義勇蘇應奎渠縣人樂善好施值歲歉餓殍盈道瘞者千餘人蕭伯琩渠縣人鄢藍之亂琩率堡兵剿捕纍立戰功後以聲援不至戰死巡撫林俊為文祭之鄧俊石首人任營山典史署縣事川北僉事王源命督兵禦賊藍廷瑞等城陷俊父子被執罵賊死事聞廕其子王樹極渠縣人從李興師為裨將纍立戰功乙酉恢復廣安乘夜攻城李戰敗為賊獲樹極已潰圍出遙見之反戈格殺數人被執不屈死陳忠渠縣人當鄢藍之亂忠輸米五百石以助軍餉蕩平後詔旌其閭曰尚義之門楊凌曦營山諸生正德間藍賊陷城擕妻女潛避身叢葦中賊獲之犯其妻妻不從凌曦不顧相拒而死事聞旌為義夫馬仁營山醫官鄢藍之變城陷死於難楊思義西充人嘗以資貸人值歲荒凡未償者焚其劵又出粟千餘石入官賑濟有司立坊以旌之孫文領鄉薦賈雄西充人為寧川衛百户正德間以孤軍擊賊於花牌樓斬賊百餘人力戰死賊亦敗去僉事王綸檄縣致祭號曰英勇作記以紀其功吉人字天相西充人舉孝廉好施與常以財帛濟貧居家教子必以忠義其後諸子俱登科第何子明南充人嘉靖乙丑進士筮仕錢塘砥節礪操不阿權貴有季吏目者寃死獄中子明為鳴其枉尋召為御史多所彈劾遷廣東僉憲諸如戎馬屯政備邊之事無不諳悉粵龍門從化賊倡亂新寧盜鼓噪從之勢甚猖獗當事計莫知所出子明時以少參授節鉞招撫之不煩甲胄不肆殺戮且嚴督將裨非生擒不作功由是人無幸志渠魁授首及紀平冦績晉憲副錫金帛而于明已卒李含乙渠縣人由進士任禮部員外崇禎末丁艱里居時張獻忠破成都以其偽都督馬元利掠順慶地戍守焉含乙破家募士得數千人圍廣安州城幾陷會元利赴援含乙戰敗而死之陳桂棟鄰水人崇禎庚午鄉薦任內黃縣令有惠政升徐州牧適李賊圍城桂棟殉節王蘋崇禎間武生獻賊至語其父曰食國家水土力不能報畢命可耳父然之賊至其父拔刀殺數賊死焉遂擒蘋蘋罵不絶口死王光先營山諸生明李流冦犯城光先率義勇戰於城北被執欲脅之降光先罵不絶口遂遇害李完西充人進士厯官御史致政歸值獻賊陷西充完不屈死楊文嶽南充人由進士厯任太僕卿忤逆璫謫外時登萊新設巡撫文嶽首任其事甚得軍民心後命討闖賊困於汝寧被執賊呼以先生文嶽大罵不食數日賊灌以粥嚼舌和粥噴血復罵死之樊明善南充諸生闖賊破京師聞變大慟時撫軍龍文光駐節順慶明善喪服詣軍門曰鼎湖新去臣子不共戴天公聞變三日矣而無所施為耶龍深謝之後破家募士與獻賊屢戰死之陳懷西南充武生獻賊誘以官懷西曰寧作明朝武生豈作逆賊元老賊斬之懸首於東門其子亦哀慟而死同時西充廪生馬孫鸞罵賊被賊割舌死之李乾德字雨然西充人崇禎辛未進士纍官偏沅巡撫蜀亂奉命聨合江土兵將恢復地方時賊據滇黔稱王一時靡然從之無敢一言抗犯乾德獨拒不從書詞凛厲後被執與其弟升德慷慨赴水死張鵬翼字南溟西充明經崇禎丁丑令衡陽獻逆破城鵬翼罵賊被沈死事聞建祠恤贈王爾讀儀隴人王臯家僕獻賊破城縣令李時開被賊追及將執之爾讀奮身持石禦賊令奔脫爾讀被殺周宗應儀隴人為縣倉吏崇禎士午景亮兵破城知縣趙學敏被執宗應涕泣求賊願以身代死賊兩釋之鄧士亷字人麟廣安州人為廣東海陽令厯官至吏部尚書甲申殉難死泉應化營山人值姚賊猖獗應化倡先修寨逺近難民俱集邑中冉世恆冉兆元亦各以積糧濟之各寨堡俱破此寨獨全存活無數寨中泉應厚冉良富李尚聰出寨巡守被賊執俱不屈死王宷儀隴諸生時姚賊破寨被執寀曉以大義賊偶踈遂墜岩死李沁營山諸生與生員李晟督邑中義勇捍流冦有功姚黃賊起沁與晟守城東被冦傷俱死席雙楠儀隴諸生值姚賊破寨被執雙楠請於賊肅整衣冠向北拜伏刃而死劉義國儀隴人姚賊破寨被執義國指賊大罵投岩死楊正道儀隴人值姚賊破寨與其妻王氏被執賊脅之降夫妻罵賊不屈死之敘州府宋司馬夢求敘州人溫公後裔景定中進士咸淳末調江陵沙市監沙市地險固恃水為防德祐初水忽涸元兵來攻乘南風縱火都統程文亮逆戰敗降夢求身著朝服望闕再拜自縊死王佐為長寧守將寶祐中元兵拔長寧佐與其子俱不屈死之明向能成化初任長寧典史會晏州夷攻城父子奮勇出戰死於陳侯啓忠長寧人𢎞治間進士厯江西參政安化之亂啓忠倡衆削平精忠盡節播聞中外著有淯里文集楊廷用宜賔人𢎞治中任應天府治中素行端嚴剛介不屈居喪廬墓恤孤讓田有友人于忠母死不能殯捐資助之鄉人服其惇義夷靖沐川土官嘉靖初捐田種三十石為學田又出榖一千石賑飢民當事嘉之唐大湖隆昌人隆慶初大旱大湖散粟賑濟全活甚衆事聞敕建義民坊旌之尹伸字子求萬厯戊戌進士厯官陜西提學湖廣布政以節義文章自負善革書尤工於詩有自編東遊等集甲申歲避亂山中遇賊罵不屈賊重伸名欲生致之至井研縣界罵愈厲賊怒殺之馬完驥陕西人萬厯中知長寧以忠勇死題請崇祀張振德蘇州人由貢生授興文知縣值奢崇明叛賊兵奄至振德血戰力盡痛哭入城率其妻錢氏長媳顧氏次子張緄女淑英淑慶北向再拜縱火自焚僕嚴英顧美等男女二十一口亦同時投烈焰中死惟振德長子純以應試歸僅存一息事聞贈光祿寺卿諭祭葬建祠立坊諡烈愍廕一子錦衣衛正千戶其妻錢氏等一體旌表附祠義僕嚴英等照例給恤王碩輔貴州人萬厯間知南溪縣奢酋之變抗節殉難事聞贈尚寶卿艾吾鼎湖廣漢川人知興文縣署宜賔冦至厲聲罵之夫婦就戮閣門無存者聶純昌天啓辛酉舉人是歲冬奢酋叛犯縣城純昌集鄉勇數百人拒賊東津殺賊甚衆後敗衄被執不屈死廕其子侯良柱郡人天啓間以副將充鎮守四川總兵官時奢崇明猖獗良柱奉命討之戰於水藺崇明授首進秩宮保廕一子錦衣衛指揮獻賊冦蜀良柱鏖戰於綿州高本山力盡而死賊裂其尸李縉宜賔人天啓辛酉奢酋叛縉為千總領兵堵禦敗賊於慶符之小蒜壩升遊擊與賊又戰於金鵝池陳亡巡撫朱燮元題奏賜世襲敘南衛百户李師聖隆昌人天啓時任大同推官遇流賊陷城闔家死難子迎晙賜廕盧元卿字調元富順人天啓己卯解元纍官寧夏河東道以清廉著聲闖賊陷秦恨力不能致討轉徙秦徽間憂憤而卒盧安世字環水赤水衛舉人天啓中巴學博奢賊掠城邑令死之安世鼓集義勇誘賊渠孟竇山入城斬首持示賊賊驚潰掩殺無數後以監軍平賊有功升兵備參議甲申冦至不屈而死劉佐聖永寧諸生天啓中知奢夷有叛志乃服衣冠諭以大義賊刃之崇禎二年奉旨旌奬入鄉賢祠張令藺州土人初為宣撫奢崇明土目崇明與子寅將叛令密通撫鎮願斬以獻事聞擢副總兵守川北統領通巴五路屢著軍功賊不敢逼境者數年令善弩軍中號神弩將軍未幾調守夔關賊突至呼其壘曰誰是張將軍令挺身出戰中弩箭而死胡棟字壯宇宜賔人萬厯丙午舉人厯官鞏昌府同知崇禎丁丑冦警捐金修築北闕敵臺又嘗輸餉招募義勇有功敘人賴之李師武宜賔諸生與魚嘉鵬同舉義為賊所執不屈磔之郭大勳宜賔諸生為流賊所執大罵不屈闔門俱死王應世宜賔諸生流賊陷城被執不屈死李合宗宜賔人大司馬樊一蘅壻時獻賊陷蜀一蘅奉命剿賊賊遣偽都督索其家遂執合宗賊意欲藉以招一蘅合宗不從械至成都見獻忠罵不絶口久諸生梁為憲亦一蘅壻與合宗同志並械至成都俱死之李獻忠成都右衛正千户為人忠勇厯征九絲白草有功升黎雅守備調雲南征𬗟甸奪戰象執渠魁大建奇捷升本省都司僉書時建南夷猓猖獗奉督撫令引兵把截馬湖獻忠請增兵餉未報建夷乘釁大舉外援斷絶獻忠力戰手刃數賊而死劉之綸字與鷗宜賔人崇禎戊辰進士選庶吉士以言事超擢兵部侍郎上表出師會戰將北左右度不支請遁綸曰惟一死以報君耳身中流矢卒喪還諭祭葬廕其子劉信南溪人厯官廣西參政有廉名獠人叛信討之親冒矢石遂死於陳曾印昌敘州人敘南衛世襲指揮同知升遊擊分鎮白水江獻賊圍成都死之周壩渡子遺其姓明末流賊與官兵相持兵拒南岸冦拒郡城官軍退賊欲渡江遂之喝渡子駕舟不從且厲聲罵賊遂被殺魚嘉鵬字萬程郡庠生篤學力行獻賊遣偽官至嘉鵬率衆殺之賊大搜獲拷詢其黨嘉鵬厲聲曰我自為之恨不能殺獻賊耳他人何與賊磔殺之大學士王應熊特旌焉晏正寅宜賔諸生母早喪父貧且徴不復娶貿易教子正寅體父志讀書以成名及父死哭泣三年依依孺慕邑侯常公嘗親奠焉已而獻賊躪蜀被執不屈死之楊興旺永寧人值獻賊餘黨據永城興旺攜家逺避為賊搜縛興旺大罵賊斷其舌又噴血怒詈賊碎其尸闔家俱遇害熊兆桂字岩渠郡庠生乙酉春獻賊踞蜀兆桂率兵拒戰被縛大罵曰天運至此任爾賊奴戕賊良善賊殺之剝其皮布鼓懸之城門令出入者擊之劉苞字玉巒郡庠生嗜古文詞甲申獻逆殺掠人民苞被執見其貌偉強入伍苞詈罵不絶賊殺之張祖周郡人苦志力學獻賊陷蜀語其友曰百年有盡何貪生為遂赴潭水死周元孝字慕若郡人幼力學有文名初聘何氏女為配後何女瞽且跛父母將毁盟元孝堅不肯從竟成姻崇禎丙子舉於鄉甲申歲元孝為賊所執強以官辭不受賊殺之何察慶符人明末蜀亂誓不茍生遂自縊其子五歲日夜拊父棺痛號不食而死袁向科珙縣舉人官湖廣江陵令旋里值獻賊變逺避不屈賊遍索之得於鎮雄闔家死難夔州府五代髙彥儔為夔州守將劉光義攻夔州彥儔閉牙城拒守判官羅濟勸其走彥儔曰吾昔不能守秦川今又奔北雖人主不殺我我何靣目見蜀人乎又勸其降彥儔亦不許乃自焚死宋秦傳序淳化中為夔州巡檢使賊李順犯夔州傳序督士卒晝夜拒賊城破乏食傳序盡出已資市酒肉以犒軍士衆感泣拒戰城陷投火而死上官夔宋末為萬州守將時元兵圍城夔守禦甚力元招之降不從城陷夔巷戰而死楊夀孫雲安軍主簿元兵至清江縣夀孫與將官何唐安惟臣田廣澤多坤等連戰二日俱死之韓明開州守將元兵破開州軍潰散明父子猶率部兵巷戰力屈被執死之明青文勝大寧人洪武間為龍陽典史邑賦凡三萬七千有奇濵於洞庭每苦水患民不能輸文勝疏減凡三上不執遂縊於登聞鼓下事聞矜其誠切詔減賦二萬四千餘石民德之妻子貧困不能歸占籍龍陽有司祠祀扁曰忠惠黃從禮巫山人永樂間任交州同知黎賊之叛抗節不屈死唐儉雲陽人成化十九年有雲陽會試舉人周欽李林劉斗邱鑑柴伸柴奉並指揮二人覆舟僅以身免儉各具衣一襲銀十兩為治裝赴京其好義如此王禎成化中任夔州府通判時流賊冦巫山禎率兵攻之追至大昌馬陷泥中為賊所害事聞贈夔州府同知立褒恤祠以祀之陳禧廣東香山人正德初任梁山縣典史領兵擊賊死之巡撫林俊嘉其忠勇祭之以文時植通許人監生正德初倅梁山攝縣事流賊方陳攻城力戰死之妻賈氏自縊女赴火死事聞褒嘉及其妻女並録其子杜斌大寧人監生為河南沈邱縣丞正德間流賊攻沈邱斌同都司王寶督衆力戰援絶勢孤遂死焉嘉靖初事聞贈知縣廕子入監向孔洙大寧人正德間流賊鄢藍攻縣孔洙率民兵臨城拒敵相持數日城陷孔洙奮勇出敵衆皆鼓譟隨之面中流矢猶力戰殺傷數賊賊勢稍却賊又詐議和突入城獨尋孔洙孔洙墜城而死李清開縣人正德中流賊壓境委守險隘賊間出黃土清知其狀要擊斬之事聞授武寧巡檢司陳秉元開縣人正德七年鄢藍為亂揚言欲奪臨江市秉元倡率義兵二千有奇追至富順三毋灘奮勇當鋒賊衆辟易援兵不繼力戰死鄉人義而祀焉雷禎新寧省祭官鄢藍賊熾巡撫林俊聞其勇敢檄取領兵追賊至蒼溪時官兵敗績禎奮力對敵手刃數人而死當道哀之遣官致祭朱伯通朱伯珍俱新寧人值鄢藍賊之亂兄弟並起義兵屢戰有功後俱死於難都憲表其墓徐敬之梁山人剛悍過人流賊之變衆舉敬之為鎮長賊至身先士卒力戰而死都御史林俊題其墓曰忠勇義士為文祭之趙趣梁山諸生流賊之難趣同其友黃甲呂鳳何景蕭鋭徐宣楊義寬趙采誓死赴敵連戰三晝夜城陷死之都御史嘉其義立祠祀焉髙日臨江西鄱陽人貢生崇禎五年任大寧令蒞任三載多惠政崇禎七年春流賊犯境日臨以孤軍拒險禦賊被執不屈罵甚厲賊寸磔之遂與官舍同燼鄧天祿萬縣人明末為太平戍守把總與覃璞共守城楊東廕陷太平覃璞被執賊欲降之不屈賊磔璞天祿奮拳擊賊賊怒並磔之羅維先萬縣人明末戌守太平楊賊陷城維先家東門事危急手刃妻子驅家人閉於一室縱火焚屋躍入火中舉家俱死吳獻棐萬縣貢生獻賊入城被執強以為參軍不受賊怒令斷臂解腕而死子之英亦被磔向書開縣人赴京渡黃河拾一囊內有巫山舉人王翺咨文銀兩因前追翺告之翺泣曰吾但得文引失金二百兩悉可相酬書竟盡數歸之孫天澤奉節人有里人陳朝益因事鬻子天澤憫其悲啼脫婦簪珥以贖又王明偶以納賦遺金投河天澤救歸如數豫之歲飢疫設粥食餓者全活甚衆又瘞流殍數百家萬厯二十七年兩院額其門曰躬奉天經羅傑大昌人明末賊亂鄉人告以往避傑云此處即避兵所正衣冠坐中堂列書史以待賊至傑正色辱罵遇害龍安府唐田昉昭宗時刺史王建陷城昉死之宋王煠平武人任宣府僉事有惠政嘉靖間流冦圍城煠力戰死明曾貴洪武十年以指揮僉事征威茂松疊屢著奇功後征建昌清水江蠻中流矢卒贈都指揮同知遣官致祭至今王人稱曽將軍云梁道濟郡諸生與妻楊氏同避亂於山中賊執之使跪道濟罵曰我讀聖賢書忠義自許豈為賊屈耶欲犯其妻妻亦罵曰我名家女士人妻爾速殺我隨夫地下豫願足矣賊縛磔之夫妻至死罵不絶口文理均州人宣德中知江油縣性剛政簡番冦至理與民共守城陷夫婦死之葬金盤溪梁昱疊溪千户宣德二年番冦攻圍阻截水道城中乏水十餘日昱委身奮勇率軍出城取水以濟軍渴後戰死蔣忠疊溪所總旗正統間領軍巡視永鎮堡至白石坎遇起塘夷追至旄牛山與夷賊對壘忠氣益勵中流矢而死謝琳成化中以指揮使征松茂分兵深入攻破番寨甚衆人稱為謝老虎後為番夷所襲戰死胡澄疊溪所百户𢎞治間守備普安堡番人攻圍澄督兵出戰追賊至葫蘆嶮嘴力戰久之不少怯中流矢死張鳳松潘衛指揮𢎞治間提督三舍送哨至松林堡忽遇蠟梅寨番賊至鳳奮勇衝陳手擊數人俄被流矢貫喉猶忍傷拒敵而卒時風雨晦冥經月祭之而天始霽人謂其忠氣所感云髙照松潘衛諸生正德六年值雪欄番僧叛照同諸指揮逐番番勢甚盛被殺邉輔史寬劉賢方犍俱松潘衛百户正德六年番僧雪欄王出謀為不軌輔寬嬰鋒遇害賢犍被執赴寨罵不絶口賊畨縛賢犍於柱剖腹剜腸而死事聞命子孫承襲各進一階孟臯張果松潘衛百户正德十年巡撫馬旻征安觀諸夷臯歿於安觀果死於羊洞事聞果無子弟臯子承襲加一級李藻貴州舉人任江油縣教諭正德中值鄢藍賊之變奉委督餉守城身親決戰亡於陳李敖松潘衛百户正德十五年征惡落等寨力戰死邉輪輔弟承兄職以輔陳亡進署指揮使有邊永興者輪家僕也史卜匝者本衛餘丁嘉靖七年輪巡南路至北定關遇橫梁茹兒等寨惡番約衆百餘至輪與永興史卜匝等數人奮戰值天雨溪泛諸番四集輪被傷永興負輪而行至崖不能進執刃死戰知不能支乃伏於輪身主僕俱被害鎮臣具奏輪死為國僕死為主一門忠義誠為可嘉詔贈輪都指揮僉事永興贈百户史卜匝等俱厚賚優恤田秀春松潘衛倉官嘉靖十三年同李明蕭七輸運與強番戰俱不屈死范伏三松潘衛百户嘉靖十三年取花寨力戰死之尹崇松潘衛百户嘉靖十三年攻阿孝寨力戰死吳政松潘衛千户嘉靖十三年大小耳别寨番蠻三百餘在五哨溝起塘政馳馬迎敵被鎗而卒謝世源松潘衛指揮萬厯二十四年率兵救援至撈撒溝世源中箭傷死張松潘衛百户守小官堡羊洞賊番屢出石關墩劫人修橋於關南賊番突出彎弓連傷三人弓折被番磔死李棟松潘衛千户防紅崖堡值賊番夜劫棟隻身相持至天明力不能支遂為衆賊剖腹死張學詩松潘衛指揮任小河防禦遇羊洞畨四集學詩手斬十餘番力盡被執夫婦皆罹害施千瑞授金吾指揮委小河練兵值羊洞番攻堡夜劫殺軍兵百餘人千端力不能支被殺杜世仁松潘衛百户萬厯二十四年西夷火落赤子名八雁者率四萬餘人攻圍鎮夷堡數日幾陷世仁父子三人堅守力戰箭中八雁貫腦死夷人泣聲滿營是日即撤營回巢世仁父子亦各中箭傷相繼死胡寧松潘衛指揮征番僧被執剖腹而死事聞以一子承襲都連芳小河百戶天啓元年與番賊戰於北門陷於泥河為賊所殺楊鸞松潘衛總旗南蠻叛鸞與戰於陡溝子賊勢衆鸞力孤被蠻賊殺之王懋烈任通判獻賊據蜀抗節不降舉義兵恢復兵敗全家死難寧逺府明髙明西昌人以明經知湖廣長沙縣事有治聲丁內艱還里戊子春流賊入建昌明督士民拒於焦家屯賊勢衆不能支明泣嘆曰我受朝廷祿豈可以從賊乎遂盡室自焚死雅州府宋曹光實郡人父疇靜南軍使少武勇遷永平軍節度乾德中賊蠻圍其軍光實揮戈負母突圍出纍遷都巡檢使後又擊蠻賊於葭蘆溝戰歿帝悼之官其四子孫璹榮經人號足菴父嘗穴山通水灌田利人人猶病其不足璹繼父志乃捐資鑿之由是獲利者甚衆寧宗賜迪功郎何充德陽人通判黎州攝州事元兵破卭崍關充自刺不死為元將所執誘之降充嘆曰吾三世食趙氏祿為趙氏死無憾遂死之妻陳氏亦罵不絶口死坰時死者四十餘人元侯彥直郡人忠翊校尉至元間王虒冦雅彥直引兵力戰於名山兵寡力弱為賊所擒罵不絶口遂遇害明劉東陽榮經人歲貢生嘉靖間官上海縣丞倭賊入冦力戰死豫恤馬京黎州土千户甲申獻賊犯蜀京集番衆與弟亭攻圍偽將擒獲七十餘人於演武場巾明大義斬首祭旗起義師屢戰雅州龍觀山又發義倉以濟軍民以憂瘁卒弟亭嗣之後賊犯川誘執亭不屈遇害黃儒福州舉人令榮經獻賊攻城儒竭力戰守兵敗被擒磔死直𨽻嘉定州雍正十二年升為府宋王貴行洪雅人宋末為興縣丞元兵至令率吏民迫貴行降貴行嘆曰大丈夫不能忘君以事仇遂整衣冠投水死侯興為都統德祐元年元兵攻嘉定九頂山興死之事聞贈復州團練副使元趙資任行省參政與完者都及參政郎革歹守嘉定偽夏明玉珍養子明三奴攻嘉定城陷完者都郎革歹皆遁時資保凌雲寺三奴執其妻子以招資資曰癡婦不死何為汝不見平章婦乎平章婦乃革歹之妻成都陷時赴水而死者資語畢以強弩射殺其妻已而凌雲陷資領敗兵與完者都郎革歹會於龍州謀興復為偽夏遊兵執至重慶玉珍欲用之三人抗志不屈同日斬于市蜀人謂之曰三忠明宿進字儒忠夾江人進士厯刑部員外郎逆瑾擅權進以直言受杖卒嘉靖初贈光祿卿縣人祠祀簡仁瑞州人天啓丁卯舉人厯官平涼知府流冦陷平涼死之秦民湯漢陽人知榮縣明末值獻冦亂為賊所縛大罵不絶被射死陳天祐犍為人家貧好讀書獻賊據蜀檄召不至適賊將張可望駐縣南虎吼壩天祐被執至營罵賊死之闔門盡節周正選犍為人拔貢值獻賊據蜀為賊將張可望所執脅降不從死之周正犍為人獻賊據成都令州縣捉之欲授以官正不從後被執與陳天祐同罵賊死之其子成儒與少弟議以家屬託其叔父曰臣死君子死父乃共奔賊營尋父尸抱之痛哭賊並殺之王運開字亘籙夾江人崇禎間舉孝亷授雲南永昌府推官獻賊餘黨入滇攻永昌府城陷自縊王運閎字亨籙運開胞弟崇禎間舉孝廉後往滇省兄遇賊陷永昌運開死之運閎被執過江口占一絶曰行來漸近永昌府吾兄英靈如欲語兄弟不作兩截人魂魄同歸見父母遂投江死宿士敏字元魯夾江人崇禎間舉孝廉賊陷蜀偽令迫之出士敏治裝赴省至千佛巖䇿馬投江馬死士敏泅水得生賊信其已死置不問已而士敏遂乘夜逃匿雅州山間易姓名人服其節羅國瓛州人崇禎癸未進士以御史巡按雲南因獻賊餘孽沙定州入滇國瓛按部被執大罵不屈死余飛洪雅人獻賊兵至飛誓里人曰義不共戴吾里有從賊者共誅之於是戶抽義兵衆至萬餘伺賊來飛選義勇伏左右兩山多張旗幟於松柏間飛自迎敵於花溪口戰輒佯北餌之深入左右伏發翼而擊之賊大敗步騎皆陷田中斬馘無算飛且備且耕屢立戰功賊增兵索戰飛遂歿於軍直𨽻眉州漢朱遵州人為功曹率兵拒公孫述絆馬被擒不屈死贈復漢將軍晉楊稷字文曹州人泰始初為交址太守平九真鬱林日南等郡斬吳交州刺史劉悛大將軍修則武帝方授交州會孫皓遣大將軍薛珝陶璜帥十萬人攻稷被圍八月救援不至衆寡不敵遂為珝璜所獲囚稷欲送皓處稷嘔血死帝嘉其忠烈贈交州刺史宋孫昭逺眉山人元祐中進士調長沙尉有能績建炎初遷河南尹西京留守收集散亡為義兵以拒敵既而金人來攻昭逺戰不利其下欲之南還昭逺不從遂遇害劉汲丹稜人紹聖中纍官直龍圖閣知鄧州與金人戰衆潰汲力屈而死贈大中大夫諡忠介唐重彭山人少有大志大觀中纍官起居舍人疏言開之禍起於童貫宜誅貫以謝天下纍知京兆府兼經略制置使金人圍城固守逾月城陷重力戰中流矢死初重度金人入汴勢不可支以書辭其父克臣曰忠孝不兩立義不茍生以辱吾父克臣報曰汝能以身殉國吾含笑入地矣史次秦州人舉進士為泰安軍教授時吳曦叛招次秦次秦以石灰桐油塗目比至託目已失明母又命家人詐以訃聞乃聽還及曦平改利州主管文字仕至合州太守家鉉翁眉州人舉進士問學該博尤遽於春秋纍官端明殿學士僉書樞密院事元兵至使奉表祈請被執聞宋亡哭泣不食元世祖高其節欲授以官不受後教授河間成宗即位放還賜以金帛辭焉馮仲曄宋末知丹稜縣元兵入眉仲曄死之明王用才彭山人舉進士授寧府長史宸濠潛蓄異謀用才匡救以正誓死不從逮獄者纍月終不屈竟憂憤死事聞贈太常少卿賜祭於家直𨽻卭州宋李稷州人絢之子以廕厯官陕西轉運使督餉築永樂城既成輦致金帛其中以足儲偫夏人圍城急稷守之不去卒死於難髙稼字南叔蒲江人嘉定七年進士真德秀一見以國士稱之厯四川制置司參議與元兵力戰却之曰丈夫不于汗青垂名則碌碌人耳及沔城陷稼死之子斯得紹定初進士稼死事於沔斯得潛至其地奉遺骸以歸後李心傳領史事辟至史館纍官參知政事著有詩膚説等集郭正孫州人舉進士纍官太府丞帥興元金人內侵屹守孤城遂死於敵鄧得遇州人淳祐進士知韶州遷廣西提點刑獄時兵起破靜江得遇取幅紙書云宋室忠臣鄧氏孝子不忍偷生寧草一死明黃宗晦州人永樂中進士授兵科給事中征交址居守十餘年平夷奏凱時冒煙瘴而卒劉養貞大邑人由進士厯漢陽府推官升授部郎崇禎帝殉難養貞為持服蚤暮悲泣尋卒劉道貞字墨仙州人天啓辛酉舉於鄉性恬淡工詩文獻賊據成都道貞避亂沈黎激勵土漢同曹勳等舉兵敗賊於小關山嚴道以南不被冦者道貞與勳之力也道貞為人縝密時羽書交馳簿書必自校以勞瘁卒人咸哀之朱藴羅江夏人知蒲江縣明末值獻逆陷城罵賊闔家死節胡恆天門人號補菴由舉人任卭州巡道明末獻逆陷城恆率子之曄巷戰死之先是恆託友人婺源汪光翰調兵保城及翰調兵至恆父子已戰死止媳朱氏孫峩生得脫潛民間光翰尋獲之多方保護朱氏竟得全節及蜀平光翰送氏母子歸里蜀人多稱其信義云直𨽻潼川州雍正十二年升為府蜀漢王甫射洪人為綿竹令劉璋時為璋書佐先主定蜀遷為荆州議曹從事後征吳戰於秭歸死之唐李巨宗室上元二年任遂州刺史東川兵馬使段子章反攻陷州城巨死之謝萬歲為遂州都督以討琰州叛蠻入洞招諭遂遇害稅隆鹽亭人僖宗幸蜀有救駕功顧彥暉東川節度使賊來攻城援絶城陷彥暉乎殺妻子乃自刎諸將亦自殺五代夏魯竒字邦傑青州人天成四年治遂州繕甲兵益戍守董璋懼約孟知祥攻之知祥遣將軍李仁罕圍城魯奇嬰城固守城陷魯奇不屈自殺知祥義而葬之州人立祠祀焉宋賈子坤州人進士為西和州推官關外被兵子坤與郡守陳寅誓死以守城陷同家人死之追贈承議郎官其子仲武其孫昌忠純孝同登進士純孝後為右司郎中崖山師敗抱二女同妻牟氏躍海死楊子謨中江人性凝重淳熙七年擢甲科通判成都歲旱捐歲帑贏羡為民代輸時吳曦叛諸蠻將俟釁而發子謨誓死守卒不動纍遷至嘉定州卒有退齋集四十卷景思忠字進之普州安嶽人為長寧參軍夷人冦淯井思忠率部卒五百救之戰不利左右勸引避不聽奮劍疾戰與弟思誼俱歿於軍神宗憫之官其子蹇彜州人以進士纍官通判元兵攻蜀􅉓與子永叔堅守力戰衆寡不敵城破舉家死之弟維之亦舉進士都統王宣辟行軍參軍亦迎敵力戰而死明王健樂平鄉人多力尚義嘗收捕盜賊鄉境以寧成化六年土冦嘯聚健率衆擊賊力戰死僉事蕭凱弔以文有死得其正千載垂光之語劉珏中冮人成化中進士官至鶴慶知府有惠政民夷信服歲飢捐金帛以濟全活甚衆贈户部侍郎楊鼐字子亨安嶽人𢎞治元年飢鼐入穀千石於官以賑之知縣程春震以事聞旌其門楊最射洪人正德中進士厯官郎中轉知府雅著清操仕至太僕卿抗言國事死於廷杖隆慶初詔贈都御史諡忠節張澄安嶽人任平江典史流賊冦平江澄與知縣宋鑑率民兵出境對敵賊氣稍沮鑑曰宜退保城東澄曰保城東則西南虛矣吾當以死拒之已而賊前鋒突至城西民兵潰澄力戰而死事聞旌表廕一子入監王嘉禾州人由歲貢厯任武昌府教授兄四典庠校皆以身率士致仕歸恬淡寡營三十喪偶不娶享年八十餘卒羅賢蓬溪人正德間舉人任漢中通判鄢藍賊攻城賢仗節入壘諭以禍福賊解去總兵楊洪逼擾賊衆賊怒復加攻殺賢抗節死四川巡撫以事聞贈本府知府録其子嶽廷鳳蓬溪人任海豐縣丞值海賊圍城母子妻孥俱被獲不降死奉旨建坊張公輅字從質安嶽人嘉靖七年飢公輅出穀千石以貸窮民官為給劵公輅持劵還官著有耕雲集蒲來舉蓬溪人舉孝亷任甘泉令委解軍餉數百鞘宿於治內夜間響馬賊突入城劫搶居民盡逃解夫亦走來舉主僕二人死守殺賊數人遇害贈太僕卿崇祀鄉賢談文化蓬溪人壬戌進士仕至兵部車駕司主事解組歸賊犯蜀欲招致之不屈而死竇可進安嶽人崇禎庚辰進士官雲南兵備副使致仕家居獻賊破安嶽被執大罵不屈賊剝其皮磔之李紹先江西人崇禎中知鹽亭流冦陷城縛執紹先不屈而死贈光祿大夫廕一子祀名宦王起峩字如蘇安嶽人崇禎庚辰進士家居適張獻忠陷蜀起峩舉義兵萬餘拒之沒於戰張公璉字玉夫安嶽人嘗拾遺金立求其人還之歲飢鄉人貸不能償即焚其劵一日過故人女收而嫁之及卒臨哭如市李錦中州庠生獻賊遣偽官考試潼川錦中佯狂卧地旋閉户自縊張應禮遂寧人官都司僉書獻賊攻遂寧應禮募民兵捍禦城賴以完後援沔陽師潰抗節死姚思孝遂寧人明經授內江縣教諭獻賊執之守義不屈罵賊被殺李永蓁州人崇禎丙子科舉人魁岸善飲獻賊據蜀永蓁避老安寺斷葷絶飲稱病卧牀賊嚴索不赴乃令偽官舁至成都張目不言引頸受刃直𨽻瀘州晉侯馥字世明瀘州人舉孝亷寧州刺史王遜表馥為江陽太守往江陽之沘源撫恤蠻獠時李雄將李恭已在江陽馥修繕舟艦為進取計恭舉衆攻馥衆寡不敵為所破生虜馥送雄馥不屈雄義而釋之宋王世昌權瀘州安撫使元兵迫城誓不屈節及城破自縊死許彪孫理宗時為瀘州制置司參謀知州劉銓欲叛降元召彪孫草降文彪孫不從闔門仰藥死之明朱琉字德義州人𢎞治乙丑進士正德十二年任臨安府時盜賊滋起琉窮其淵藪率驍騎擒斬之祀雲南名宦曹滕江安人鄢藍倡亂滕率衆討之至東鄉縣界糧盡與張朝輔俱為賊所執不屈死之總制彭澤録其子曰恩曰榮咸請授冠帶世襲以報之傅生納溪諸生藺賊起生聞之悲泣數日具酒食與親鄰永訣因題目不睹君親之難耳不聞僭亂之聲四肢願付清流一心可質上帝之語於扇頭以遺弱孫使僕負之逃舉家乘舟自沈江中冦平聞於朝旌表其閭曰一門節義髙光州人萬厯中舉孝亷任徽州别駕歸里後值藺酋奢寅叛死難崇祀韓洪鼎州人萬厯中舉孝廉任澤州牧致仕歸獻賊破瀘罵賊死湯名揚州人初業儒有識力天啓間藺冦起名揚集義勇百餘隨大司馬朱燮元征討屢捷授松潘守將時有邊警名揚自龍安轉戰三百里築寨堡十數拒之纍官為裨將流冦入蜀名揚遇賊於虎頭山十數戰北之賊益恨急圍名揚於二郎關援兵不至卒飢多戰死名揚被數十創猶舉刃殺賊賊大恚磔之當事聞於朝賜廕祠祀韓國士州人以勳裔為諸生藺賊逼城守者開門降國士義不肯屈令妻朱氏子三人女二人皆縊死乃題句於外壁曰不貪幸生不汚賊刃闔室同歸甘於一燼題畢赴烈焰死事聞於朝詔祠祀方伯元州庠生獻賊至州伯元獨不屈厲聲罵賊殺之晞容州城七寶寺僧獻賊攻打豹子硐晞容奮臂曰硐中數百生靈豈可坐視其死遂糾合鄉勇五百餘人身先衝殺賊大敗硐圍乃解於是簡練精悍相持兩載先後殺賊千餘一日賊突至遂為賊害會薦祚瀘州諸生獻賊陷城不屈投江死楊鼎江安人崇禎辛未進士厯官兵部尚書後殉難死方旭字升東郡諸生崇禎時獻賊破瀘掠諸生至賊所有泣訴求脫刃者旭叱之曰我輩受國家養士之恩三百年矣恨不能噬賊之肉尚欲靦顔求脫乎大丈夫死即死耳哀乞何益賊大恚支裂之至死猶怒罵不已韓大賓州人崇禎丙子鄉薦任貴陽楚雄兩郡推官獻賊陷滇不屈死王萬春瀘州衛指揮使崇禎末獻賊所至多降萬春率屯軍並招集義勇拒賊轉戰數日被執不屈闔家遇害鍾子英州庠生崇禎末兵燹後繼以飢饉蜀中人相食子英嘆曰吾讀聖賢書忍目擊此乎乃尚貪生為也妻亦不忍離其夫遂携手投於江蘇瓊江南人進士崇禎末知瀘州獻賊掠州城陷瓊正衣冠向闕拜泣坐堂上賊至遂死之直𨽻資州周萇𢎞資中人博學多智識敬王時為王畿大夫輸忠王室欲遷都以延周祚故列國大夫有狄泉之役城成周也𢎞事劉文公劉氏晉范氏世為婚姻故周與范氏趙鞅以為討周人遂殺萇𢎞蜀人藏其血三年化為碧玉宋郭瓚字直聲內江人隨父宦遊寓安陸元符末應詔上書言天下大事不報後為汝陽令金兵犯蔡瓚朝服坐廳事戟于大罵與二子俱死趙昱雄之子少好學以周程為師厯官東川節度判官開禧中吳曦叛昱貽書成都帥臣楊輔勸舉義兵昱為曦等所制遂絶粒而卒明馬炳然內江人成化中進士知嘉魚縣擢御史厯升右副都巡撫寧夏正德初改總督南京糧儲為流賊劉六所殺事聞贈右都御史諡莊愍余才內江人正德間進士官至光祿寺少卿執持堅定智識過人以議禮死於杖隆慶改元贈太常少卿周冕州人嘉靖中進士任御史疏請祀太廟慎選銓曹具蒙採納又請東宫講學以端國本降雲南典史尋升兵部郎中劾嚴嵩父子冒濫軍功力救楊繼盛寃廷杖為民穆宗登極擢太僕寺少卿以父憂歸卒於家鄧景州人性孝友兄明無子乞養陳氏子更名繼夔明卒景體其意撫愛如己子繼夔卒又為立兄曷之子繼先悉以明産豫之鄰人有負輸鬻婦者為代輸歸其婦嵗大歉具棺瘞道殣復施鬻以餔流移親黨不能自給者尤曲為周恤人多德之孫宏初州人父環舉孝亷早卒宏初少失怙遵父遺訓儀範肅然宗族子弟嚴憚之嘗居一小樓靜坐讀書飯糲茹蔬意甚恬適值嵗荒設粥賑飢女弟適張姓産殊薄宏初捐腴田助之子福任知縣有治聲陳伯貫資陽人世業儒嘉靖壬子嵗凶邑賦難輸令被遣責民困捶楚伯貫捐金代納後民爭償之悉辭不受撫按表其門曰儒義先聲萬厯丁亥甲午嵗復大歉伯貫子大輔屢發積粟賑濟全活甚衆至今人猶頌德劉宏芳資陽諸生為賊所拘持扇歌行至西門遂投石橋灘而死張亮內江人字伯揆少登賢書由員外郎備兵榆林升都御史巡撫安廬時左良玉有異志金陵震動亮單騎赴營談笑止之奉詔入覲條議終日灑血披誠皆見嘉納卒諡忠烈周世昌內江人萬厯庚戍進士厯官雲南布政司時土酋叛勢甚鋭世昌與之相持四十餘日糧盡死之張於亷內江人弱冠登賢書任彭澤令一介不取致仕歸適獻賊逼就偽職於亷不從與其妻鍾氏罵賊死吳伯鈞內江人舉孝亷任襄陽府推官討賊卒於軍事聞諭祭賜恤贈官廕子龍新明仁夀諸生獻賊屠蜀新明集鄉勇拒賊被執罵不絶口死劉士凱仁夀諸生值流賊陷成都同舉人賈鍾斗禦賊而死陳應新仁夀諸生寇陷城被執罵賊死之左灼陳素俱仁夀諸生流寇陷城被執不屈死之辜鳳翼仁夀人天啓甲子鄉薦性謹厚言動不茍任靜海知縣亷潔仁慈致仕歸值流賊陷蜀以憂憤卒閔繼縉仁夀人萬厯壬子舉孝亷崇禎庚辰知台州修城繕學設粥賑飢育嬰施藥百廢具舉時嵗大荒民賴以存活者甚衆劉三䇿江西饒州人由舉人於崇禎十三年任仁夀流賊寇蜀矢死守城多方捍禦每對紳士云事迫矣吾惟有不動心三字及城陷死之事聞贈尚寶寺丞祀名宦唐鳳翥字一明一字威赤江南宿松人崇禎辛未進士除嘉興知縣補仁夀作宰兩邑俱以慈得民晚節禦侮危強吮血裹瘡接戰而死賈鍾斗仁夀人崇禎己卯科舉人值獻賊據成都鍾斗率鄉勇同諸生劉士凱等禦賊力戰死之直𨽻綿州漢李業字巨遊梓潼人舉明經為議郎值王莽篡漢託病去官公孫述使人持毒酒脅之業曰危邦不入遂飲鴆而死後光武下詔表其門閭以圖其像焉李翬業之子業以節死公孫述恥殺名士以賻錢百萬豫之翬逃不受明嘉靖中立祠肖像於業座右配享南北朝李苗綿州人膺之子有忠節仕元魏為散騎常侍爾朱兆反苗奮曰今朝廷有不測之危正忠臣效命之日臣雖不武請以一旅徑斷河橋魏主許之苗募人從上流下縱火焚橋兆兵爭橋北渡死者甚衆南援不至苗力戰而死宋張鏜綿竹人南軒後裔省祖墓寓楚長衡間時益王立詔天下勤王鏜起兵衡山移檄安化寧鄉得民兵數千接應文天祥兵敗被執元將崔斌慕其勇欲降之鏜曰今降而死何顔見我祖魏公於地下斌令書起兵始末鏜奮筆斥罵數百言斌怒殺之明溫應祥州人有勇尚義趙鐸肆掠州境應祥挺身拒之為賊所刺腸出裂布裹之復戰二十里賊皆披靡遁去至家而卒曾傳字子遇德陽人知咸陽縣以嚴為治豪猾斂手渭水漲傳拜於泥中水為之却尋中蜚語歸貧甚子守身舉進士官憲副嵗時以俸寄養乃分贍族人自甘淡泊里人以此益重之趙珊綿竹人天順甲申德陽賊趙鐸叛珊倡義攻殺手刃數人搜捕散亡追至二郎鎮為賊所害詔録其子恤其家焉吳瓊學綿竹人與趙珊倡義討賊賊潰瓊學極力追賊遇害詔廕其子王志恭綿州人慷慨仗義渠賊趙鐸叛攻陷州郡志恭首倡討賊之義率兵二萬餘戰德陽鐸潰志恭單騎搗其穴鐸幾就擒從兵不至為矛所中脅下腸出志恭以手捫腸大吁衆士前進喊不絶口而死事聞贈始信校尉廕其子成都衛百户何光裕梓潼人嘉靖間進士官翰林諫用仇鸞廷杖卒世宗遺詔贈太常寺卿所著有石亭初集傳於世蘇夢蛟綿竹人萬厯己酉舉孝亷崇禎間任陜西鳳翔令居官清正吏民愛戴邑嘗歲飢遂傾已資賑濟所活無算平生矜老恤孤助其娶葬未嘗少倦去官之日闔邑人民俱流涕罷市陶以忠綿竹人萬厯己卯舉人幼以孝聞好施與及通籍即以所得坊金置田給族之貧者每年冬令鄉長各舉貧者與以衣曰吾餘此無所用行之竟其身楊可賢綿竹人貢生崇禎庚辰獻賊執可賢挾之曰汝子國柱守城汝令以城降可免汝死可賢佯諾之及臨城語其子曰賊兵不滿千汝堅守城勿以我為念賊殺之城不可克舍去後賊復至國柱率城內士民數百人與賊戰力盡而死李廣生安縣人監生大中丞鑑之子積學有聲值獻賊據蜀催赴監廣生嘆曰吾為大臣子豈肯為賊屈乎遂與其妻董氏投繯死之張月曉字二橋安縣人慷慨好義遇荒出穀賑濟舉鄉飲賓年八十卒趙鴻偉安縣人明經教子晟成進士以義自守時獻賊據成都逼子晟赴監不應全家罹難卜大經江南人崇禎末任綿竹典史獻賊陷城大經與其僕縊死直𨽻茂州明薑第茂州貢生任重慶府教授行敦古處曽娶瞽女終身尤足風世王達保縣人幼業儒遇番寇士民畏不敢鬬逹卧城門待旦力戰死之王允德保縣人多智略時番夷屢破關堡允德出資募鄉勇前後戰却之又屢諭和番衆使不爭殺民獲安堵縣令為奏聞命未下而卒朱讓棟號几山明宗室襲封奉國將軍居汶川篤孝父母友于兄弟常捐資濟內外婚喪以居讓族人之貧者建橋修塔中年喪偶遂不復娶人稱其義髙仲選汶川人嵗貢生任大足教諭獻逆攻汶仲選擕子女投江死孟時正汶川人以明經知河南西平縣建學課士愛民如子致仕歸里賑濟鄉黨貧乏人咸德之崇祀鄉賢直𨽻逹州宋景林洙逹州人咸平初王鈞叛林洙率鄉勇拒戰於州北為賊所戕首殞而身不仆跨馬奔歸人訝之曰公無首矣尸隨墜地邦人即其地立祠祀之袁沔新寧人木冠逰太學靖康中金兵圍城上書言當東據成臯西臨沔池以鋭卒搗其巢穴則城下之師自解不報已而城陷沔歸漢中畫防險五事其後膺薦復條十二事力詆諛佞用事者忌之沔度不見用拂衣而歸明孫天舟孫天髙俱逹州鄉勇正德初從𠞰流賊夭舟兄弟與姪某及同伍范永冠義氣所激皆死於陳王世琮逹州舉人任河南汝寧府推官闖賊犯河南世琮與之力戰矢貫耳不為動號王鐵耳纍升河南僉事闖賊破汝寧世琮罵賊不屈賊怒用大炮擊世琮並巡撫楊文嶽俱糜爛死冉璘東鄉人崇禎時恩貢流冦猖獗挈家避天臺寨賊至璘同子宗孔被執不屈死母楊氏妻向氏登樓縱火自焚死覃朴太平諸生奉委守城流賊楊秉蔭圍城百計禦之三閲月城陷被執大罵不屈賊怒磔之至死罵不絶口袁繼登太平人由選貢任陜西安化縣李自成陷城索卬不與死之覃天明太平人由貢生任陜西興安州州同致仕歸聞李自成陷都城流涕數日不食而死陳朂冉學邃俱太平人賊寇蜂起朂奉文團練鄉勇堵禦獻賊入境朂與學邃同時力戰死鄧明才太平人楊賊圍城明才出戰而死陳三諸生陳訏謨之僕明末遭劉二虎之亂全家虜入賊營訏謨夫婦俱亡止遺一子陳三恐其罹賊害棄己子竊負幼主而逃撫育成立仍安主僕分闔邑公舉旌奬皇清忠義成都府傅永吉成都人順治七年知福建長泰縣時鼎革初民弱兵強永吉善為彈壓九年海寇圍城永吉晝夜履堞巡督炮如飛蝗不避也與守將王進率驍勇力戰彎弓殪其酋長三人賊乃却城賴以全永吉方射賊時中炮洞腹氣垂絶猶連呼殺賊不止事聞贈按察使司僉事致祭廕一子蕭亮四川人順治十二年以博士弟子員隨征入閩知寧洋縣時寇盜充斥亮𠞰撫互用復招集流亡修城郭百廢具舉士民立祠祀之張略山西右衛人康熙九年任四川提標右營遊擊二年隨總督李國英𠞰郝搖旗劉二虎諸冦師次夔府三滙鋪與賊遇力戰身殞王之鼎滿洲人任四川提督康熙十九年駐節永寧吳逆偽將胡國柱等圍城急之鼎堅守彌月援兵未至城陷被執不屈死之王天祿成都人提標候推守備康熙三十九年隨師取打箭爐奉令守冷竹關與賊蠻力戰聞恤賞歿於陳事子以衛千總録用致祭廕一周玉麟成都人康熙三十九年以守備隨提督唐希順進打箭爐攻大岡得功議敘厯升冕山營逰擊四十八年冕山賊蠻羅都等肆掠玉麟帶兵往諭賊蠻猝至四面圍攻矢石如雨玉麟身旨贈副中五矢猶奮勇決戰陷陳身死奉用將恤賞致祭廕一子𢎞祚以守備重慶府李如星字井仙酆都人有膽略當流寇猖獗時欲羅致之堅不赴尋遣將張啓殺之次子嗣靖請代不許抱父尸同死黃瑶字白雲忠州舉人順治四年任陜西安塞令才智明敏遇事敢為殘疆大有起色六年王水強作亂瑶死守孤城力拒強敵卒殞於難事聞贈按察司僉事廕一子入監張宷陜西蒲城舉人康熙十二年知綦江縣時吳逆竊據宷矢志不屈憤惋成疾死李成芳巴縣人由拔貢厯任雲南寧州州同康熙十三年吳逆悖亂寧州把總李忠投賊劫州庫成芳統領丁壯生擒李忠解報上官以功加議敘同知十四年賊復攻城成芳出城拒戰兵敗聞贈布死之事議廕子思賢入監讀書政司參傅汝友巴縣籍陜西延安府清澗縣人官提標隨征總兵康熙十九年出師永寧與提督王聞贈都之鼎暨費雅達等被執至貴州不屈死事督同知賜祭葬子𢎞經廕衛千總王無荒號曙靈河南孟津人康熙十九年由貢生任綦江令未幾吳逆餘寇至無荒百計拒守餉盡援絶死之李文仲巴縣人任貴州安籠鎮標守備雍正六年六月勦滅八達寨逆㺜力戰陳歿事聞贈署都司僉書賜祭葬保寧府楊繼生字爾敘閬中人順治初由進士知福建連江縣丙申寇陷縣繼生縊死城樓妻劉氏同日殉節楊來鳳巴州人順治四年以縣肅王令攝蒼溪縣事六年改湖廣沅陵知縣遇賊被執不間奉屈死之事旨遣官祭葬贈按察司僉事劉崑巴州人康熙戊子科武舉雍正六年以署都司僉書管烏蒙鎮左營遊擊事八年烏蒙賊猓猝叛崑挺身決戰身被數十創力竭陳亡妻張氏妾吳氏並二女全家十餘人皆殉節聞奉大兵至得崑子暨婢僕四人雲貴總督咨送回籍事旨加贈署遊擊事恤賞致祭廕一子以守備用順慶府李映庚字白符西充人父兆由進士厯戶部郎以清節名映庚由廕生授都察院司務康熙甲寅吳逆叛具金幣招映庚映庚力拒之旋卒王質浙江山陰人康熙十八年由陜西髙陵縣典史隨奮威將軍王進寶入川討逆有功川陜總督哈占請授渠縣知縣十九年因公赴省值逆寇餘孽復叛被執囚繫數月抗節不屈死敘州府趙家駿欣州人順治辛丑進士康熙十一年知南溪縣時蜀省甫定城郭未修值吳逆叛家駿自度守禦無具而職司守土不可委之以去遂自縊死魯明芝湖廣鍾祥人康熙十一年任永寧中營守備以不從吳逆棄官家永寧十九年賊將胡國柱圍城明芝奮勇同兵士登陴堅守城陷死之周尚功江西豐城人康熙十三年任永寧中營遊擊以不從吳逆棄官十九年賊將胡國柱陷城被執不屈死之全家二十一口俱遇害費雅達滿洲人陜西漢羌鎮總兵官康熙十九年調守永寧賊將胡國柱圍城與提督王之鼎協力固守孤軍乏援城陷奮力與賊戰殺賊無數力盡死之張竒星屏山人康熙十九年吳逆餘黨據馬湖百姓驚逃竒星團練族姓鄉勇百餘人挺身抗賊逆黨奔潰郡民復業當事表其功曰忠勇可風閻有貴永寧人康熙十九年吳逆攻永寧城破被執不屈死夔州府楊春芳萬縣人由行伍厯官都督同知管溫州城守副將康熙十四年耿逆犯溫州春芳死旨優恤之二十年奉賜祭葬薛人鳳浙江人由湖廣夷陵州同於康熙十九年升夔州通判七月解軍餉赴渝州道經萬縣適遭吳逆賊將談𢎞叛率兵劫之於七里溝縛至天城山以偽官誘降人鳳曰吾今日止有一死耳斷不汝從也賊怒礪刃于頸奮罵愈烈死之龍安府徐維新松潘衛人雍正九年以千總隨於大兵駐劄巴里坤賊兵夤夜猝至戰歿軍奉旨贈署守備恤賞致祭寧逺府姚開先字堯門陜西淳化人拔貢生由山西臨縣令補鹽井衛經厯吳逆兵入蜀開先不屈自縊死常珍陜西榆林衛人隨征屢著戰功任會川營中軍守備善撫兵民漢夷戴德康熙二十七年阿所悖逆劫殺魯姐珍率兵奮力援救竟遇害時論惜之直𨽻瀘州劉澤厚直𨽻吳橋人順治己亥進士康熙三年任江安令土賊白應龍吳天民攻城急澤厚聞贈按率丁壯與民晝夜防守後力竭城潰死之事察司僉事直𨽻資州胡天湛井研人順治三年知福建大田縣時盜賊猖獗所在焚掠天湛調撥卿兵悉心防禦城孤援絶力困不支四年十月初八日城陷被擒不屈而死黃開運內江人順治戊戌進士流寇至內江肆行屠戮開運集義勇士襲之斬獲甚衆賊懼走邑人多全活纍官直𨽻定州知州轉刑部郎中直𨽻綿州邱希孔字所願綿州諸生為人倜儻負氣節明末避兵漢南順治六年寧夏巡撫李鑑偉其人委署靈武同知治花馬池薑瓖賊將劉登樓陷城希孔踞坐罵賊賊怒斷其頭尸猶箕踞坐上不為動賊懼以為神羅拜之乃仆直𨽻逹州張正化太平諸生流賊楊秉蔭陷太平正化偕里人避居山中分以糧食全活數千百人率鄉里保銅城寨順治六年首以寨歸總督李國英授參將劄委令城守康熙元年從征茅麓山賊平正化曰吾保鄉里耳安事功名幸升平可髙枕矣堅辭城守以布衣終補遺熊應鳳字碧山酆都人任浙江溫州守備順治三年平陽初入版圖山寇吳肇馨乘虛襲城據守應鳳率兵馳至一矢殲之餘衆潰遁明年西港桐山諸寇兩次攻城俱擊退及大兵至搜山𠞰捕鳳力捕殲沈可耀陳倉尤四諸賊己亥移汛磐石海寇鄭成功圍城應鳳率先登城百計守禦久不下賊以大炮裂城鳳急馳下巷戰負重傷猶殺數賊被執戮其幼子脅降鳳聲色愈厲闔門死者聞贈副三十二人事將賜祭廕子天球拖沙喇哈番任溫州衛左所入籍錢塘亦於康熙甲寅閩變在溫殉難事聞贈遊擊楊三虎浙江義烏人任秦州副將康熙十八年吳逆寇蜀調三虎從征克復永寧城旋陷力旨諭祭戰死之奉贈左都督武功禹貢三百里揆文教二百里奮武衛武功所關千古為昭矣蜀地素號巖疆僻在滇黔秦楚環以蠻僰羌番幅員遼濶伏莽易生所以動煩整旅其間運帷幄之謀決疆場之勝克敵致果以彰戎經矯矯虎臣為國干城者厯代固不乏人以至我朝聖武布昭無逺弗屆凡選將率師旌麾所指無不仰仗天威風行電掃膚功立奏所稱師中之吉長子之功保障重臣洵足以紀旗常而垂竹帛矣作武功志漢光武建武五年己丑公孫述據成都岑彭謀伐蜀留威虜將軍馮駿軍江州都尉田鴻軍夷陵自引兵還屯荆州要會喻告諸蠻降者奏封其君長十一年乙未彭使臧宫拒延岑自分兵泝都江而上襲擊侯丹徑拔武陽使精騎擊廣都去成都數十里勢若破竹初述聞漢兵在平曲遣兵逆之及彭至武陽繞出延岑軍後述大驚岑盛兵於沅水臧宫衆多食少欲引還會帝遣謁者將兵詣岑彭宫矯制取以自益登山鼓譟聲動山谷岑不意漢軍猝至大震恐宫因縱擊破之斬首溺死萬餘人岑奔成都其衆悉降十二年丙申春正月吳漢破公孫述將魏黨公孫永于魚涪津遂圍武陽述遣史興救之為吳漢擊敗因入犍為攻廣都拔之遣輕騎燒成都市橋七月將軍馮駿拔江州獲田戎吳漢將步騎二萬逼成都阻江北使副將劉尚屯江南述使謝豐袁吉攻漢使别將劫劉尚令不得相救漢因潛兵就尚合軍迎戰大破豐吉斬之遂引兵還廣都臧宫拔綿竹破涪城斬公孫恢復攻拔繁郫與吳漢會於成都公孫述困急與岑定議募勇士五千餘人助岑以擊漢軍漢隂具船欲遁蜀郡太守張堪聞之馳往見漢謂述必敗不宜退師漢從之十一月臧宫軍咸陽門述攻漢使延岑戰宫宫敗漢護軍髙午唐邯將鋭卒擊之述兵遂潰午刺述墮馬而死延岑以城降蜀始平安帝元初四年益州永昌越巂諸夷叛益州刺史張喬遣從事蜀郡楊竦將兵討之殺夷三萬餘人降赦三十六種舉劾姦貪長吏九十人黃綬六十人諸夷皆平獻帝初平十九年甲午閏五月諸葛亮命張飛趙雲將兵克巴東飛獲太守嚴顏令斬之顔容色不變飛見其壯釋之引為賓客雲從外水定江陽犍為飛定巴西德陽昭烈帝進圍成都劉璋開城出降帝遷璋於公安盡歸其財以諸葛亮為軍師法正為蜀郡太守蜀漢後主建興三年乙巳諸葛亮討雍闓至南中所在戰捷由越巂入斬雍闓孟獲收闓餘衆以拒亮獲素為夷漢所服亮生擒之既得使觀於營陳之間問曰此軍何如獲曰向者不知虛實故敗今蒙觀營陳若祗如此即易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰丞相天威也南人不復叛矣時益州永昌牂牁越巂四郡皆平晉武帝泰始八年益州牙門將張𢎞叛殺其刺史皇甫晏廣漢主簿李毅言於太守王濬曰廣漢與成都密邇而統於梁州者朝廷欲以制益州之襟領正防今日之變宜即時赴討不可失也濬欲先上請毅曰叛主之賊為惡尤大當不拘常制濬乃發兵討之惠帝永寧元年辛酉冬十一月李特據廣漢進攻成都羅尚大破之斬李特特弟李流代領其衆自稱益州牧特子雄有竒才軍事悉以任雄大安癸亥二年閏十二月尚大攻李雄雄敗走遂定成都穆帝永和二年丙午十一月都督桓溫因李勢驕淫不恤民事帥師討之袁喬麾軍前進直抵成都李勢悉衆出戰溫乘勝長驅至成都縱火燒城漢人惶懼無復鬬志勢送降文於溫尋輿櫬面縛詣軍門溫解縛焚櫬送勢及宗室十餘人於建康舉賢旌善蜀人悅之安帝隆安八年壬子十二月遣益州刺史朱齡石討蜀劉裕與齡石密謀曰往年劉敬宣出黃虎無功而還今以大衆自外水取成都疑兵出內水此制敵之竒也而慮此聲先馳别有密書付齡石署函邉曰至白帝乃開諸軍雖進而未知處分所由癸丑九年秋七月齡石至白帝發書曰衆兵悉從外水取成都臧熹沈叔任等從中水取廣漢老弱乘髙艦從內水向黃虎於是諸軍倍道兼行譙縱果使譙道福以重兵守涪城備內水齡石攻其北城譙縱棄城出走齡石遂入成都誅縱黨羽餘皆安堵詔以齡石進監梁秦州六郡諸軍事齊髙帝建元間益部山險多不賓服大度村獠前刺史不能制益州刺史陳顯逹遣使責之獠殺其使顯逹分部將吏聲將出獵夜往襲之悉殲其衆由是山獠震服梁元帝承聖二年癸酉三月武陵王紀攻江陵留蕭撝守成都帥諸軍東下梁主甚懼與魏書請討之宇文泰曰取蜀制梁在此一舉諸將咸難之大將軍尉遲迥獨以為可克泰乃遣迥圍成都五旬蕭撝屢戰皆敗乃請降魏以迥為益州刺史北魏宣武帝時髙肇伐蜀假傅豎眼將軍持節領兵三萬先克蜀北及梁刺史張齊進圍益州拒塞三日豎眼轉戰二百餘里齊大敗益州平隋文帝開皇間王謙叛益州總管梁睿率于義等將步騎二十萬討之至漢川謙阻兵以拒遣李三王守通谷睿使張威破之進龍門謙復拒敵睿軍由間道而出四面攻擊進逼成都謙走死劒南悉平仁夀初嘉州獠叛行軍總管段文振討之引軍山谷為賊所敗文振復收散軍擊其不意大破之大業二年王謙猖獗利州總管豆盧績嬰城固守謙遣兵攻之時績士卒不過二千書夜相拒勢漸迫績率趙仲卿出竒兵擊之斬數千級投服二千餘衆梁睿兵至賊因解去唐髙祖時二鴉蠻叛以周法尚為巴州刺史破賊於鐵山肅宗永泰元年乙未吐蕃引羌寇西山拓靜等州劒南節度使嚴武先破吐蕃於當狗城武奏崔旰為漢州刺史將擊吐蕃連拔其城攘地數百里吐蕃遂不敢犯代宗廣德十四年己未冬十月吐蕃入寇詔神䇿都尉李晟討之斬首二千恢復維茂二州德宗貞元四年戊辰吐蕃為患將寇西川約兵十餘萬屯瀘北西川節度使韋臯遣兵擊破於清溪關外辛巳十七年韋臯大戰吐蕃於雅州厯破四十八萬壬午十八年春正月韋臯復破吐番於維州斬首五萬自是吐番不復侵擾建中時西川兵馬使張朏襲成都為叛節度使張延賞奔鹿頭城朏醉延賞遣將捕出斬之遂復成都憲宗元和元年丙戌西川節度使劉闢作叛戊子令髙崇文與兵馬使李元奕節度使嚴礪同討之二月礪拔劒州斬其刺史文昭德時宿將甚多皆自謂當征蜀之選及詔用崇文皆大驚崇文時屯長武城練卒五千受詔即行器械糧糗一無所闕三月劉闢將邢泚引兵遁去髙崇文入屯梓州六月崇文破鹿頭關連戰皆捷辛亥克成都劉闢帥數十騎西奔吐蕃崇文使髙霞寓等追及擒之及入成都屯於通衢休息士卒市肆不驚秋毫無犯檻劉闢送京師斬之餘無所問從容指麾一境皆平穆宗時吐蕃寇邉西北震動又略雅州東川節度使王涯將兵拒之吐蕃遂不能入文宗太和四年庚戌冬十月以李德裕為西川節度使先是南詔入寇劫掠蜀民德裕至鎮作籌邉樓圖蜀地形南入南詔西逹吐蕃日召習邉事者訪以險要未踰月皆若身厯乃練士卒葺保障積糧儲以備邉蜀人粗安因索南詔所掠百姓得四千人懿宗咸通中南詔入寇西川節度使盧耽與瀘州刺史楊慶復戮力守禦帥牙將李讓以突將出戰殺蠻二千餘蠻夜遁僖宗乾符中南詔寇蜀髙駢徙鎮西川發兵追蠻至大渡河斬賊無數擒其酋長十餘人修復卭崍關諸城柵置兵防禦蠻不入寇宋太祖乾德二年十二月王全斌入蜀擒其招討使韓保正蜀兵大潰劉光義曹彬帥師至夔州夔有鎖江為浮梁夾列炮具光義等行帝示以地圖指鎖江曰我軍泝流至此慎勿以舟師爭勝當先以步騎陸行襲擊之及師至夔距鎖江三十里舍舟步進先奪浮梁復牽舟而上蜀寧江制置使髙彥儔謂監軍武守謙曰北軍逺來利在速戰不如堅壁待之守謙不從獨領麾下與光義騎將張廷翰戰潰走廷翰乘勝登城彥儔戰敗奔歸自焚真宗咸平三年庚子春三月益州戍卒作叛奉王均為帥陷漢州僭號大蜀帝以雷有終為川陜招安使帥師討之知蜀州楊懷忠會兵討均冬十一月雷有終復益州均走死懷忠取均首級及僭偽法物旌旗甲馬斬擒六千餘人詔進有終懷忠等秩而流其黨牛冕儋州張適連州命梁皓往安撫之明太祖洪武四年偽夏明升據巴蜀帝命湯和為征西將軍率荆湘舟師廖永忠等由瞿塘趨重慶傅友德為前將軍率河南陜西步騎由秦隴趨成都上密諭友德曰蜀人恐吾西伐必悉其精鋭東守瞿塘北阻金牛若出其意外直搗階文門戶既弱腹心自潰命朱亮祖為副將軍率兵助伐蜀夏四月傅友德等克蜀階州渡江至五里關蜀將丁世珍集兵固守友德破之竟進白水江克綿州漢江阻水欲以消息逹湯和而山川懸隔以木牌數千書克階文綿州日月投江中順流而下蜀守者見之解體友德進逼漢州蜀守向大亨迎戰擊敗之遂拔漢州時和攻夔州江漲師駐大溪口帝聞之詔水陸并進詔至永忠率師先次夔府擒其帥襲興六月永忠至瞿塘關分水陸兩道一軍攻陸寨一軍攻水寨以鐵葉裹船頭置火器蜀人盡鋭來戰永忠已破陸寨既而將士舁舟出江者揚旗鼓噪而下下流之師擁舟前進火炮火筒夾擊大破之越明日湯和兵至分道並進直抵重慶明升大懼遣使詣永忠納欵面縛銜璧與母彭氏及羣臣奉表詣軍門降並其官屬至京朝見封為歸義侯蜀地悉平洪武時松潘未下御史大夫丁玉率師平之開通關堡設立酋長諸蠻震服二十五年壬申建昌土官月魯帖木兒叛命涼國公藍玉越巂侯俞通淵討之玉遣百户毛海誘致月魯帖木兒送京師遂於卭部州築城置越巂衛鎮守其地永樂間保縣羌民黑大肆行不法四川都指揮李敬帥兵進𠞰直搗賊窟悉殲其衆生擒黑大斬之羌民畏服茂州土官楊者者叛徐凱率兵討平後海西侯納哈馳降將劉大平領兵伐雲南中途太平反凱追至青州六戰六克擒太平於沔縣盡收其衆復征階文二州擒賊首張超達諸蠻遂平景泰間威州寨帥王永煽動上下五族欲拒南路時羅綺撫治松潘一舉殄之天順末夔茂威嘉盜起連劫州郡僉事汪浩密設方略多張疑兵深入擒斬賊衆尋討平巨賊趙鐸進浩副都憲宗成化十四年戊戌夏六月巡撫四川都御史張瓚平松潘諸蠻先後破寨五十有二降寨一百有五展拓茂州城池增置墩堡留兵戍守遂上疏班師嘉靖間河東三溝復叛朱紈誓師應敵擒斬無數餘寇悉降神宗萬厯二年甲戍春正月四川蠻夷猖獗張居正薦兵部右侍郎曾省吾往討之授省吾方略深入凌霄九絲等寨斬首四千六百餘級擒蠻三十六人拓地四百里得諸葛所遺銅鼓三十九面而還萬厯間播人吳洪假楊應龍後聚衆沙溪連結水西為叛時王象乾為四川巡撫設方略討平之熹宗天啓元年辛酉九月四川永寧宣撫使奢崇明及其子奢寅與土目樊龍樊虎叛時大吏文武皆被害賊虜重慶分兵扼夔州遵義瀘州等處全蜀震動石柱宣撫司女土官秦良玉起兵討賊所部萬餘人率弟民屏姪翼明捲甲疾趨潛至重慶營於南坪關扼賊歸路夜襲兩河燒其船阻賊東下良玉沿江而上水陸并進留兵千人多張旌幟護守忠州移文夔府設兵守瞿塘賊逼成都指揮雷安世瞿英周邦泰張愷率兵禦之安世英力戰死邦泰降愷走免巡撫都御史薛敷政左布政朱燮元併力禦賊二年壬戌春正月奢崇明出旱船髙數丈長五百尺架樓數重左右有障板上插羽旗一人披髮仗劎坐內列數百人各挾機弩毒矢牛數百頭運行旁翼兩飛樓俯視城中燮元曰此非炮石不可破乃以巨木為杆柱置兩軸柱間繫索運千斤之石飛擊如彈丸旱船不得近又以炮擊牛牛返走官軍逐之賊大敗其將羅乾象密約報效由是賊中舉動皆知乾象與陷賊諸生范祖文鄒蔚等夜焚賊營崇明驚遁還重慶事聞以燮元為四川巡撫三年癸亥夏四月燮元列營於納溪陽為進取而隂令諸軍會於長寧乘霧奪險而入進攻永寧奢寅親自搏戰敗之追至涼傘鋪盡燒賊營奢寅父子遁去皇清順治元年上命肅王入川討流賊張獻忠賊聚兵順慶府屯於西充縣之金山鋪大治舟楫將遁走湖廣賊將劉進忠至朝天關遇大兵降為先導肅王遣裨將同進忠疾馳五晝夜及獻忠營時賊無遊兵又無塘撥不虞王師猝至獻賊衣飛蟒半臂率牙將出視進忠指示曰此獻忠也裨將雅布蘭發一矢中額獻忠訝曰果然遂潛伏積薪之下執近侍詢之而得曳出斬之六年己丑賊黨盧名臣盤踞重敘馬湖一帶梅勒章京葛朝忠總兵陳德楊正泰等水陸兼進攻破佛圖關直抵賊巢斬擒無數三府悉平康熙元年壬寅冬十二月上命總督李國英統領湖廣陜西河南四川四省官兵會勦茅麓山賊李來亨袁宗第等李國英至夔府道路榛莾伐木開道以進癸卯日大兵奪羊耳山宗第遁入深箐我師屯七里壩宗第屯茶園坪山勢陡絶諸將攀藤而上宗第敗走巴東大兵追及巫山遂據其城衆議移守夔門督師計巫山地勢卑狹雖馳驟不便可利固守於是深溝堅壘具炮石城下樹梅花椿賊至不得進椿外挑品字坑又於城外髙處立敵樓以防偵探具甫備郝永忠劉體純合數萬衆攻巫山甚急我兵出戰體純等敗走適陜西會𠞰兵至陳家坡奪老木空體純自縊大兵乘勝追至黃草坪永忠宗第皆授首惟李來亨居茅麓山髙險難攻我兵四面圍之來亨出入地名通梁路徑陡絶我師乘霧露未開遂奪通梁來亨力窮勢迫八月初六日焚其妻子自縊茅麓山遂破馬騰雲拓天寶王光興俱納欵投誠李自成張獻忠二賊餘孽至是誅滅殆盡總督李國英凱旋重慶全州俱入版圖矣十三年甲寅吳三桂偽總督王公良率偽將軍王鳳岐劉之衛等據夔州逾六年庚申四川總督楊茂勳率師由楚江峽路逆流而上破巫山隨風直進不二日抵夔城兵不血刃羣逆鼠竄遁去遂復夔郡十八年己未冬十二月吳三桂賊黨吳之茂潛兵白水壩勇略將軍趙良棟討之抵白水賊阻江對壘十九年庚申正月初一日官兵渡江直入擒斬千餘人追至青川賊伏石峽官兵四面攻擊自未至酉殺賊無數龍安餘賊望風投降良棟乘勝追𠞰正月二十四日克成都文武兵民跪迎道左發兵各路招撫辛酉二十年三月逆黨胡國柱等復踞關山象嶺良棟同將軍紀哈禮率總兵鄒九疇等三路征𠞰箐口站周公橋俱皆賊營官兵破之抵土地橋賊密架鎗炮恃關抗拒大兵分為兩翼戮力攻戰賊衆大潰良棟遣兵乘夜跋崖直上關頂奮勇𠞰戮克復關山象嶺黎州諸地陳斬四千餘級復戰於大渡河口斷賊歸路攻急投降建昌一帶逺近聞風相率輸誠十九年庚申賊黨王屏藩陷漢中據保寧奮威將軍王進寶討之戰於武關身先士卒所向無前賊潰進寶直抵保寧屏籓縊死餘黨約降猶據城觀望進寶單騎馳入大呼曰我仁義將軍也降者待以不死衆賊感泣歸命遂定閬中二十四年乙丑五族番蠻作患松潘鎮總兵髙鼎請兵𠞰撫番蠻納土投誠三十九年庚辰打箭爐番蠻阻兵渡河四川提督唐希順總督席爾逹巡撫貝和諾等會疏進𠞰參將李麟爭先破蠻守渡大兵會於河西三路並進遊擊張自成等攻哪叱頂壩參將馬爾植等攻大岡唐希順率遊擊沙虎魏國珍等直攻咱威殺蠻人四百餘衆直進𠞰哪叱頂復馳咱威攻木岡磨共斬八百餘人至磨西面從間道而上蠻兵潰逃奪營一十四座斬首千餘級張自成從宰牛埧截入追殺斬喋吧昌側集烈首級以獻馬爾植攻取大岡衆蠻憑髙據險官兵奮勇𠞰戮辛巳正月班師抵爐喇嘛番民等歡呼跪迎歸附一萬二千餘戶皆諭以皇上德威賞給銀牌緞匹鞍馬示令各安本業四十九年庚寅寧番瓦尾逆番不法四川提督嶽升龍領兵進𠞰招安涼山一帶沙罵阿都各路酋長投誠五十四年西藏凖噶爾肆行不法戕害喇藏上厪宸衷命定西將軍噶爾弼等帥滿漢官兵討之攻克拉里與平逆將軍延信進取招地賊乃使推木品宰桑守渡拒敵噶爾弼約會前𠞰至工卡爾拉地方苦圖克等望風輸誠復攻墨竹工卡賊懼奔散遣千總趙儒往撫喋吧打克渣及喇嘛中古兒逹蛙等歸順分布侍衛那沁郎中鄂理副將嶽鍾琪為頭隊都統五哥為二隊副都統吳那哈總兵趙坤馬會伯為三隊攻取招地投降大小喋吧及各寺喇嘛等衆安營固守斷賊糧道搜獲凖噶爾喇嘛等衆立斬賊首五名招地悉平六十年辛丑松潘口外上下惡洛諸番肆行盜劫為邊民害提督嶽鍾琪總兵路振揚帥兵討之賊番奔北過河悉償所劫以降並降阿壩土目且增等又西邉苦苦腦兒索羅穆等處被郭羅克愛滿等搶掠遊擊周瑛等率兵攻取下郭羅克之吉宜卡二十一寨遂抵中郭羅克連克納務等二十餘寨斬三百餘級擒獲賊首酸他兒蚌索布六戈復乘勝抵上郭羅克之插六等寨寨目旦增等綁縳首惡假磕並賊從格羅等二十二名以獻餘番皆輸誠乃以雜谷土目囊索沙加布管理其地雍正二年甲辰四川提督嶽鍾琪松潘總兵路振揚率領漢土官兵出師西寧由黃勝關出口𠞰撫十二部落招安阿壩郎惰毛革麥雜等處番目灣布桑頓等納土歸誠是年下羊洞凶番拔那等猖獗松潘鎮總兵周瑛率領遊擊劉屏翰邱名揚進𠞰擒獲逆番拔那剛讓笑等餘寨投誠番夷皆為編戶下羊洞等處闢地二百四十里得番民三十七寨建城於南坪壩為南平營川陜道路始通聲援相應四年丙午建昌大小涼山夷猓猖獗建昌鎮總兵趙儒副將張成隆領兵𠞰撫攻克兒斯堡寨擒賊首金格阿租官夀斬首諸夷遂平六年戊申夏六月米貼逆夷陸氏勾連雷波土司楊名義並附近結覺諸番及吞都千戶德昌等聚衆搶劫傷害滇兵陸氏旋就擒獲餘黨未靖川陜總督嶽鍾琪四川巡撫憲德提督黃廷桂請兵進𠞰奉上諭據嶽鍾琪黃廷桂等奏稱米貼逆夷陸氏已經擒獲餘黨搜捕指日可竣其四川雷波土司楊明義從前私遣部落幫助陸氏今又劫奪糧運傷害兵丁並誘附近結覺阿路阿照平底等處苖蠻聚衆妄行罪惡顯著再吞都千戶德昌私助陸氏土兵與官兵公然對敵甚為狂悖均屬不法應請用兵𠞰除以安輯苗地等語烏蒙等處凶苗抗拒官兵該督等遣兵進𠞰今已悉就擒獲而楊明義等當陸氏潛匿之時輒敢朋比隱藏今又劫糧聚衆誠為法所難宥但用兵關係緊要必須武職大臣統轄方為妥協著提督黃廷桂即帶領會𠞰米貼漢土官兵檄委將辨會期前往仍飭副將張瑛嚴行防範相機撫𠞰著總兵張耀祖帶領滇黔官兵分路堵截使賊苖四面受敵勿致竄逸著總督嶽鍾琪雲貴總督鄂爾泰飭總兵趙儒於涼山相通阿路各處嚴加防範再飭總兵張耀祖於各要路委辨巡輯遇有逃匿即行擒解黃廷桂著賞銀五千兩張耀祖著賞銀五千兩為二人行軍賞賚之用俱於四川司庫內動用支給此番用兵係川省地方之事進退機宜著張耀祖等聽黃廷桂節制調遣特諭欽此雍正六年七月初八日提督黃廷桂率漢土官兵圍吞都山擒土司德昌攻破夷寨斬賊首屋雞母雞二十餘人獲賊八十餘人分兵直搗賊窟由黃螂雷波中路進發副將張玉駐劄黃螂王剛駐劄竹核互為聲援遊擊康世顯渡江斷賊歸路王安民吳維翰髙麟端等由太平馬湖兩路截𠞰楊明義勢敗遠逃官兵乘機進𠞰復斬二百餘級獲賊甚衆賊目遁磨石簸箕屯內恃險負固又分遣官兵四面攻擊自己至酉九洞皆克拔營前進四山賊蠻膽落望風投降因體皇上好生之德曉之以大義令其自新衆苗感激泣下即進兵直抵黑龍岩黃草坪奮勇深入大破賊巢九月十六日擒楊明義復盡奪賊寨惡目逹姐等皆授首卑租阿路亦次第擒獲土司沙罵投誠招撫苗民一千五百九十六戶留兵暫駐以資防範夷地悉平雍正八年雲南烏蒙府逆蠻肆行不法傷害滇省官兵盤踞烏蒙東川一帶蜀滇兩省會兵進𠞰四川提督黃廷桂建昌總兵趙儒統領漢土官兵堵擒烏賊招撫沿江各路土司投誠雍正十年壬子春三月獏狻賊番擅殺廠商負固為逆四川總督黃廷桂因河水泛漲糧運維艱奏準於秋成後進𠞰先檄行建昌鎮總兵派撥官兵轉飭冕山營遊擊沈國卿等帶往三渡河口要隘地方先行防範分屯堵截秋九月檄調漢土官兵並調齊署參將傅𢎞禮遊擊夀長楊澤厚洪揚沈國卿都司馬踰隆張懷元署都司吳金章守備干為章等悉交建昌鎮總兵趙儒統領進𠞰分遣諸軍由河口過渡從瓜别窩卜水墨岩趕到底四路並進總兵趙儒駐劄媽木居中䇿應總督黃廷桂仰遵睿謨悉心調度爰行密檄俾盡力掃除於時各將辨合力同心軍士爭先奮勇甫經兩月一切險巢惡硐𠞰滅靡遺各堡首從凶番或當陳擒斬或遍山搜捕無復漏網癸丑春二月凱旋漢土官兵次第各歸營伍苗疆悉平四川通志卷十二
