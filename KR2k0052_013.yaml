城房屋多用草苫蓋即街市瓦房亦係竹壁編成間或不戒於火每至比屋延燒雖各設木桶貯水但器小易竭亦難盡恃為救焚之具是河一開即有祝融為患而隨處有備不難立時撲滅其利三舊河既塞城中地泉鹹苦每至春夏沈鬱穢濁之氣不能暢逹易染疾病昔杭州近海民飲井水多病唐刺史李泌始引西湖水入城作六井至今賴之是河一開則地氣既舒水脈亦暢民無夭札其利四卑府細詢僚屬博訪輿情僉無異辭再查雍正元年議準條奏內開行令各省確查大小河道如有淤塞者即行設法疏濬務期實濟造册報部等因通行在案相應詳請憲臺俯念民生飭發公項銀兩委員雇募人夫興工開濬務期深通可垂久遠從此惠澤旁流當與導江之功比烈矣等因當蒙撫都院憲發藩司高議詳查得沿河一帶俱為商賈闤闠輻輳之所而三橋又為省會適中之地一經開濬便商便民誠有如該府所云者且河流深滿可息不戒之風煙地脈疏通可散不時之疫氣該府所詳甚屬妥協自應速為奉行等因隨奉批允於二月十七日興工三月二十九日告竣共用工費一千四百兩俱係撫都院捐給亷俸給發併將滿城水東門另造石橋可以通舟凡商賈舟楫由大河撥換小船直通滿城又於九年六月十九日詳為再陳城河善後事宜以垂遠利事竊照省城金水河一道開自宋時相沿已久近年失於疏濬以致不通舟楫民苦沮洳深為未便幸蒙撫都院俯念城河有關水利慨捐清俸獨力興修卑府遵奉督率廳縣各員於本年二月十八日興工分段挑濬計自西門外磨底河起由西門內滿城一帶三橋青石橋玉河沿直至東門外府河止共挑濬過一千五百二十六丈今已次第工竣但查善政之垂貴於可久使無專司分理之人則日久仍歸淤塞深為可惜卑府謹酌末議惟憲臺採擇焉一查卑府同知一員原有專管水利之責請嗣後城河一應事務令該同知管理其成華兩縣縣丞亦經卑府議加水利職銜詳請在案應令該同知督率分管以專責成一省城向係旱門今東西添設水關其西門水關原係密釘鐵簾不用啓閉自有滿兵看管外至於東門水關通船出入必須依時啓閉應請照旱門之例交與城守營撥兵看管以重防守夏一城河新濬兩岸俱係浮土如遇夏秋雨淋衝刷泥土下河難免淤墊兼以來源係引江之水亦未免夾帶流沙必得每年淘濬方能深通無阻况已成之功更可力省功倍查水利同知衙門都江堰工每年各縣額解銀一千二百兩有竒請於每歲冬間於修理堰工餘剩銀兩動支雇夫疏濬一例報銷以垂永久一東門水關最為緊要查關洞係舊時建造原屬堅固但沿城上遊俱係土岸恐日久被水汕刷猶恐囓及城根應請兩邊添築護城雁翅各長丈許下簽木樁兩岸用磚石包砌以資捍禦一三橋以下水勢猶緩惟板橋一帶水勢迅利蓋緣板橋兩岸逼仄橋門既狹又值河勢灣曲以故水急浪湧似應於轉灣之處兩岸略為取直并將橋旁石柱改換木柱則水道寬緩併請將一洞青石卧龍等橋俱照安順橋之例改換木橋以緩水勢庶稱利涉一沿河兩岸俱係居民凡糞草腌臢每圖便易傾入河內易至堙塞請刋木榜曉諭禁止仍令牌頭不時稽查有犯即送該管縣丞量責示警實於河道有益一城河之源來自郫灌西門外應請建閘水大時下閘以防衝溢但冬月源水稀少若再任其直逹府河則城河必致淺涸似應於束水關外河口之處建閘一座交與華陽縣縣丞管理一遇水淺即將閘下板蓄水毋使外泄凡有貨物出入俱於閘邊搬運統俟冬間水涸興工則永享其利矣奉撫憲批發藩憲詳議允遵在案本年三月成都府知府項誠又議請於蜀王城之南三橋之西北相度地形開新河一道直通貢院河并修淘貢院周圍河道通舟便民又新開河路搭橋二座總共需木植夫價銀七百兩有零奉藩憲高酌議允行隨捐發銀三百兩又奉臬憲劉及重慶府知府張光鏻龍安府知府張育茳雅州府知府張植眉州知州高思雍資州知州李懷智各捐銀有差併臬憲劉發下充公銀兩共五百四十兩有零成都府知府項誠自捐銀一百六十兩有零於三月興工七月告竣計開新河一百八十九丈六尺九寸開淘王城河一千零五十八丈一尺五寸從此舟楫可直逹王城之北矣厯朝堤堰碑記並水利諸考附元揭徯斯蜀堰碑江水出蜀西南徼外東至於岷山而禹導之秦昭王時蜀太守李冰鑿離堆分共江以灌川蜀川蜀以饒自秦厯千數百年所值衝薄蕩囓大為民害有司歲治堤防百三十二所役兵民多者萬餘人少者千人其下猶數百人每人七十日不及七十日雖事治不得休息其不役者日三緡富屈於貨貧屈於力上下交病會其費歲不下七萬緡毫髮出於民十九藏於吏概其所入不足以更費今上皇帝即位之明年僉四川亷訪司事吉當普巡行周視得要害之處三十有二餘悉罷之且召灌州判官張𢎞計曰若甃之石則役可罷民蘇弊除何憚而莫之為𢎞曰公慮及此生民之福國家之幸萬世之利也𢎞請出私錢試以小堰堰成水暴漲堰不動乃具文書會行省及邊軍七翼之長郡縣守宰鄉遂之老各陳便宜皆曰便復禱於冰祠與神約昔鑿離堆以富川蜀建萬世之利神功也今水失其道民失其利吏乘其弊若此而神弗之救是神之惠弗終也神克相豫於治弗豫相請與神從事卜之吉於是徵工發徒以至元改元十有一月朔肇事於都江堰都江即禹鑿之處分水之源也鹽井關據其西南江南北皆東行北舊無江冰鑿以避沫水之害中為都江堰少東為大小釣魚磯又東跨二江為石門以節北江之水又東為利民臺臺之東南為侍郎楊栁二堰其水自離堆分流入於南江南江東至鹿角又東至金馬口又東過大安橋入於成都俗稱大皂江江之正源也北江少東為虎頭山為鬭雞臺臺有水則尺為之畫凡有水一及其九其民喜過則憂盡沒其則則民困乃書深淘灘低作堰六字其旁為治水之法皆冰所為也又東為離堆又東過凌虛步雲二橋又東至三石洞釃為二渠其一自馬騎東流過郫縣入於成都古謂之內江今府江是也其一自三石洞北流過將軍橋又北過四石洞折而東流過新繁入於成都古謂之外江即冰所穿二江也南江自利民臺有支流東南出萬工堰又東為駱駝又東為確石繞青城而東鹿角之北涯有渠曰馬壩東流至成都府入於南江渠東行二十餘里水決其南涯四十有九歲疲民力以塞之乃自其北涯鑿二渠與楊栁渠合東行數十里復與馬壩渠會而渠始安流自金馬口之西鑿二渠合金馬渠東南入新津罷藍淀黃水千金白水新興至三利十二堰北江三石洞之東為外應顏上五斗諸堰外應顏上之水皆東北流入於外江五斗之水南入於馬壩渠皆內江一支流也外江東至崇寧亦為萬工堰堰之支流自北而東為三十六洞過清白堰東入於彭漢之間而清白堰水潰其南涯延袤二里餘有司因潰以為堰堰壞乃疏其北涯舊渠直流而東罷其堰及三十六洞之役嘉定之青神有堰曰鴻化則授成其長吏使底其功應期而畢若成都之九里堤崇寧之萬工堰彭之堋口豐潤千江石洞濟民羅江馬腳諸堰工未施亦責長吏農隙為之諸堰都江及利民臺之役最大侍郎楊柳外應顏上五陡次之鹿角萬工駱駝確石三利又次之而都江又居大江中流故以鐵萬六千斤鑄為大龜貫以鐵柱而鎮其源以捍其浮槎然後即工諸堰皆甃以山石範鐵以關其中取桐實之油刀麻為絲和石之灰以苴罅漏禦水潦岸善崩者密築江石以護之上植楊栁旁種蔓荆櫛比鱗次賴以為固蓋以數百萬計所至或疏舊渠而導其流以節民力或鑿新渠而殺其勢以益民用遇水之會則為石門以時啓閉而泄蓄之凡智力所及無不為也先是郡縣及兵家共掌都江之政延祐七年其兵官奏請獨任郡縣乃以其民分治下流諸堰增其修廣而大其役民苦之至是復合焉當歲蓄水之用僅數月堰輒壞今雖緣渠所置碓磑紡績之處以千萬數四時流轉而無窮甚便初都江水深廣莫可測忽有一大洲湧出其西南方可數里人得用事其間入山伐石崩石以滿隨取而足用所向皆然蜀故多雨自初役至功畢無雨雪故力省而功倍民不知勞若有相之者亦其忠誠所感如此致使天子賜酒之使相望於道臺省觀工之檄不絶於使所溉六州十二縣之民咸歌舞焉而下自郡縣上至藩部惡其害己且疾且怨或決三洞之水以灌其坎或毁都江之石以壞其成撓之百計不拔益固甫五越月大功告成百一恆費民永休饗古未有也而吉達布會以監察御史召省臺上其功詔臣徯斯記之於碑臣聞水先五行食首八政九疇之敘其次可觀矣夫水者衣食之源也然所以為利亦所以為害在善導之而已禹平水土猶已溺之后稷播種猶已飢之萬世有稱焉是故為政不本於農不先於水是為不知務是謂冥行之臣李冰一鑿離堆民受其賜吉達布一修其業神且不違彼失其利而欲廢之不亦悲乎惟吉達布才大而德敏愛深而知遠不枉其道不屈其志臨難忘身為國忘家安於命而勇於義而知所先務故事可立而功可建其在四川請罷鹽運司正鹽井之法以去姦利置安撫司以撫四方流寓之民使安其耕鑿及居臺端知無不言言無不合誠國之寶也判官張𢎞殫智竭慮終始克相其志雖百折而不悔亦今之賢有司乎是役也石工金工皆七百人水工二百五十三人徒三千九百人而邊軍居其二工糧為石千有竒石之材取於山者百萬有竒石之灰以斤計六萬有竒油半之鐵六萬五千麻五千撮其工之值物之價以緡計四萬九千有竒皆出於民之所積而在官者餘二十萬一千八百緡責灌守以貸於民歲取其息以備祭祀若淘灘修堰之供仍蠲灌之兵民常所繇役以專其堰事嗚呼後之蒞此土者尚永鑒於斯勿怠其政墮其事以為民病以為國家憂臣拜手稽首而作頌曰天一濬靈多源於西岷山導江禹績可稽民生之初惟水利賴夫既利之胡忍貽害運有推遷事有因革保制安危神實任責於穆英惠藩屏坤維於赫仁祐駿烈四馳自秦徂漢祀以千計維王父子蜀境是庇江源自蜀王鑿其阻蜀溉餘波厥施乃溥江趨而東勢通蜀山春夏暴漲橫潰是間既遏其衝又決其支以漫以灌惟堰是資昔王受命司我芻牧為兹惠利以阜我蜀今我蜀民作堰歲勞殫智疲力以捍江濤僉憲有謀將息斯患王實誘之肯遺以艱吏籲於王願授指教王繇之詞繼導之珓詢謀允孚百役以興厥志無二惟王之慿象鼻之漲茫無津涯湧為淺瀨有礫有沙匠陟彼巘言鑿其堅山夜發洪穴不得穿匠取彼石既磊既砢撝椎運斤惟右惟左蜀川不雲蜀日旦出涉冬屆春民就愛日彼揵彼舊昔水今石其崇言言永固爾壖民聼鼛鼓追思往年富民醵錢耕者廢田今兹永逸孰究我圖顯允二神作我蜀郛聖神在御懷柔百神封章屢上亟命詞臣錫以徽稱華以欽命以旌王功以致皇敬渙號於庭揭虔於祠帝命不褻神惟顯思登瀛有臣復請詠賜俞音自天寵命洊至嗟彼嬴氏百郡列署惟兹蜀守勳烈昭著異趨殊歸惟德與力王初庇民顧盡乃職豈謂異世猶濯厥靈俾王初志炳乎丹青王不恃力務德是勤有偉斯績益光前聞詞臣作歌守吏視刻江流沄沄昭彼無極明陳鏐鐵牛記粵稽古導江自岷山掠成都之南而東下成都之北水不及焉河渠書曰蜀守冰鑿離堆以避沫水之害引其水益用溉田疇之渠以億萬計蓋至是始分江通北道堰之始也沫蓋江之源云冰姓李仕秦有功於蜀民德之所在血食號曰川主其作堰之善遠不可考崖下有古刻曰深淘灘低作堰蓋治法云至漢唐尚因之宋以後或失其法堰遂壞至元間有僉事吉當普者聚鐵石大舉繕治民亦利之然不能如李之舊不百年復崩我朝自𢎞治以來當事者百計修復隨築隨圮有司歲伐竹木歲役人夫費不下巨萬民甚病焉嘉靖間太守蔣君憫其民思欲修秦守之政乃具其事以請憲副周君相度地勢求故址得堰之最要者九欲盡甃之石其都江堰當水之衝則石之外再護之鐵議者韙之計所費不資會君隨帶赴江西參伯事遂寢憲副施君繼董其事曰事貴有序功貴因時鑄鐵之功易於甃石且要焉盍先之徐謀其後乃檄崇寧尹劉守德灌尹王來聘謀鑄鐵牛其費則議出公儲之應修堰者經畫處置甚悉蜀王聞而賢之命所司助鐵萬斤銀百兩時巡撫李公巡按鄢公皆急於民多所因革執施君議深以為然咸刻期朂之成議定當庚戌二月矣春水始發即不能為功衆懼焉施君曰即不及事不可以為來歲計乎毅然為之於是劉崇寧以君意晝夜勤事絶流浚沙鑿江底凡厥所需不數日咸集以是月二十四日入冶一晝夜牛成牛凡二各長丈餘首合尾分如人字狀以其鋭迎水之衝高與堰嘴等坯治之日蜀府差長史李鈞齎幣帛羊酒勞諸從事者民環而觀之者億萬歡聲震山谷間其父老皆合掌曰此吾子孫百世利也計鐵七萬斤及工費共用銀七百兩時各州縣多堰工舊逋君下令民樂之不數日輸既充費有嬴水次居民杙急湍為磨碓以規水利君弗以例禁薄稅之復歲得八百金故事修堰需舟車之類盡取諸民間至是皆有備可不勞民力不費公帑云僉事陳鏐以督學入灌口牛方落成往觀之曰物與水激其重必克數十萬之石可致而不可合數十萬之鐵可冶而合也合則其重并無尚矣水遇重不勝則洄而支支則力分而弱及其弱也竹木砂礫或可以當之故堰莫急於衝莫要於鐵嗣世而後若再甃之石如蔣君之所議者以歲舉焉其百世利也李守故智要不出此時劉崇寧及通判張仁度尚有事堰上曰此正古人用鐵之意而未之發明也乃今知之請紀其事遂書之牛背後系之銘銘曰岷嶓既藝民之攸塈惟蜀之利岷江之隂陵谷變易亦有原隰惟禹之戚乃啓後賢曰李冰氏乃鑿離堆乃堰江洔乃拯昏墊乃沃千里顧兹積石月囓歲蝕代有吏勤屢興屢踣蜀民謷謷勞此洚水畚鍤靡止百室罄只明嘉靖間守令則賢亦有憲副憫此下瘝謀用大作維力則艱施君繼之相時事事弗顧弗忌冰心姒思乃砥洪流言鑄之鐵神人胥悅二丑崢嶸天一迸裂馮夷駭驚蛟龍怒咽奔突既定江沱既灑溉此萬畦豈惟生民籩豆餴饎郡邑十二惟堰之資匪堰之力繄人之力嗣冰之功纘禹之迹爰有同心視此牛勒後千百年其永勿泐陳文燭都江堰記灌縣都江堰蓋江之會云禹導江自岷山西入大渡河南通於汶厯於灌堰在江中流為二有南河者會新津有寶瓶口者流為三至於漢至於崇寧至於華陽故稱灌口堰外低而寬堰內高而狹水勢也作堰灌田始於秦李冰司馬遷著河渠書瞻蜀之岷山大李公之功且云渠可舟行民饗其利蜀人廟祀焉漢唐以及宋元堰法漸壞至元間僉事吉當普鑄鐵龜民利之昭代以來屢修屢圯嘉靖間復鑄鐵牛詳在僉事陳公鏐記中其銘曰問堰口準牛首問堰底尋牛趾堰堤廣狹順牛尾水沒角端諸堰豐須稱高低修減水真名言云萬厯乙亥江大溢堰盡壞成都知府徐元氣灌縣知縣蕭竒熊列狀修復巡撫都御史曽公羅公慨然允行後先軫念巡按御史郭公慮益深長增以鐵柱令尋牛趾而濬之自堰以下如仙女三泊洞寶瓶五陡口虎頭諸岸間植三十鐵柱每柱長丈餘共用鐵三萬餘斤又樹柱以石護岸以堤水遇重則力分安流則堰固大都倣古云水利僉事杜公詩悉心區畫始萬厯三年十一月越四年三月工成費金三百灌溉千里民咸歌頌御史公適還朝復按兹地左布政使袁公隨右布政使潘公允端按察使劉公庠參政蔡公汝賢秦公淦副使王公原相僉事甄公敬共觀厥成燭聞而嘆曰蜀稱天府號陸海豈謂沃野不在人耶秦法作渠與井田並太史公論禹厮二渠以引河其來舊矣如西門豹引漳水鄭當時引渭水足利於國中原變遷閭殫為河法多湮滅惟李公之堰幸存於蜀乃二三公修之俾古人之遺意千載如斯尚永賴哉今天下事鑿者創新論怠者失故道及其不支諉曰天也沒壁負薪何益焉假令人皆師古則刋山表木之勳至今存耳寧獨一堰哉余益嘆二三公經世之智云盧翊灌縣治水記蜀守李公冰鑿離堆以利蜀刻深淘灘低作堰六言於石立萬世治水者法所以制水出入為旱潦計者至矣其用功緩急疏密之序意自較然漢晉以來率用是法永嘉間李公嬴深韙之唐宋相承世享其利元始肆力於堰無復深淘之意無乃公言不足法歟假令沙石湧磧水不得東潤則雖鎔金連障高數百尺牢不可拔亦何取於堰哉矧所謂鐵龜鐵柱糜費幾千萬緡者曽未幾何輒震蕩湮沒茫無可賴方諸籠石亷省古今便焉者孰得比來民受其困宜坐諸此豫竊少之乃檄有司置鑱鑺巨蘲役夫三千從事灘漬以導其流堰則仍民之便而已顧工多力少羣力告瘁未能勉其所欲為究其所當止如公法云者恥也舊刻相傳在虎頭山鬭雞臺水側其旁歲久剝落索弗獲慮後之君子無考焉因磨石重鐫碑側云國朝朱載震修建太平堤記成都府灌縣之都江堰其水源來自松潘之上流其利於民也成郫等九邑咸資灌溉昔人所稱陸海者也雖有歲修成例要皆視為故事塗飾一時康熙丙戌夏五月霪雨彌旬山水泛溢人字堤三泊洞府河口盡被衝決諸邑沿河之城郭廬舍田畝漂沒者災傷見告矣大中丞能公惻然深念立捐俸資委員詳驗俾多方撫恤無使失所繼又嘆息言曰是特一時權宜事耳不可不為一勞永逸計冬十月躬行相度計程三百里不憚勞瘁一日往返乃與寮屬從容商確某處當修某處當濬暸如指掌惟是工費繁多非千數百金不足以濟而民力民財又不可以重纍也公於是首先倡捐清俸以及藩臬兩司成都府屬用水九邑皆與焉復遴委别駕標員協力鳩工自一陽始生至次年春仲凡三鬩月築人字堤長三十八丈高八尺又於府河口三泊洞築新堤長八十三丈高八尺厚五丈支分條析水得復循故道灌溉無遺民將世世食其利豈特一時慶安瀾已哉以故九邑之食租而衣稅者咸拜首而頌曰公之樂於創始孰如公仁公之洞悉源流孰如公智公之倡導捐輸孰如公義公之先時集事孰如公信嗟乎公撫蜀僅三年耳凡此十郡六州之人前所謂不便及今所願欲而不得者公皆為之除弊而興利焉春生秋肅陽開隂閉令修於庭户數日之間而人自得於河山千里之外今又軫念九邑黔黎遺樂利於無窮者如此公之功與流水同長矣是役也勞在社稷不可以不書堤堰考水經注曰江水由湔塴江入郫江撿其左其正流遂東郫江之右也因山頽水坐致竹木以溉諸郡又羊摩江灌江西於玉女房下作三尺人於白沙郵郵在堰官上立水中刻要江神水竭不至足盛不沒腰是以蜀人旱則藉以為溉雨則下遏其流故記曰水旱從人不知飢饉沃野千里世號陸海謂之天府也俗謂之都安之堰亦曰湔堰又謂之金堤左思蜀都賦云西踰金堤者也諸葛亮北征以此堰農大國之所資調征丁夫二百人主護之有堰官李膺記云玉女房鑿山為穴深數十丈中有廊廡堂室屈曲殆有神功非人力矣堤堰志曰粵自禹導江正源至石紐出汶川而南其北無水秦昭王襄王時蜀守李冰鑿離堆虎頭於江中設象鼻七十餘丈首濶一丈中濶一十五丈後一十三丈指水一十二座大小釣魚護岸一百八十餘丈橫瀦洪流故曰都江以分岷江之水北折而東灌溉蜀郡田疇以億萬計蜀用富饒號稱陸海於所過處又設護岸蓋籠石附岸水不蠧土而渠可堅久指日數十處如象鼻狀以扞之皆冰之所作也都江口舊有石馬埋灘下凡穿淘必以離堆石記為準號曰水則其下淘深二丈二尺而水則亦深七八尺石渠水口橫一丈五尺縱一百二十丈深六尺石洞水分為三曰灌田水口橫一丈縱一百二十丈深六尺曰彭州水口橫三丈又分為二其一縱十有五丈深五尺其一縱四十丈深三尺曰將軍橋水口橫二丈三尺縱四十丈深三尺外應水口橫一丈五尺縱一百三十丈深四尺倉門水口橫八尺縱五十丈深二尺馬騎水口橫六尺縱二百九十丈深二尺鼓兜石趾水口橫二丈五尺縱六十丈深二尺東穴水口橫三尺縱一百五丈深五尺投龍水口橫五丈縱八十丈深三尺北水口橫四丈縱一百八十丈深三尺鐵溪水口橫一丈縱六十丈深三尺徙水口橫三丈縱六十丈深一尺歲以為常過與不足其害立見由漢以來數千百年或因舊葺治或因時疏築而功實原於秦守冰故厯代廟祀之所謂馬騎水口者東南六七里間有堤名上馬騎下馬騎各長二百餘步世傳冰駐於此督工後訛以騎為堤也水利考按蜀中諸水咸出岷山江源在羌地之列鵝村所謂羊膊嶺者分為二派一西南流為尖囊大渡河一正南入溢村至石紐過汶川厯今灌縣境與湔水合焉灌之上流有水出尤溪口又有水出白沙口同會於灌經灌縣西南流者即禹所導岷江正流自秦李冰鑿離堆引江水循灌城東注北折於是始以東南正流為南江經離堆薄灌城而東北注者為北江北江自寶瓶口穿三泊洞而北注者為外江自寶瓶口直東入五斗口而東北注者為內江蓋北江折為二江並南江而三其北行入五陡口一支在南北二江之上故以內江别之外江北經崇寧彭縣新繁漢州界會綿雒諸水出金堂峽內江東經郫縣崇寧界下過府城北至城東會府城前江以趨於彭山界南江經崇慶新津東流至彭與府江合為江口其出金堂峽者由簡資內江富順會於瀘州此都江一堰之源流也至於大渡碉雅諸水會於嘉定馬湖諸水會於敘州嘉陵江經合州納潼涪諸水會於重慶黔彭諸水會於涪州大都高山峻嶺無堰可作如巡撫佟鳯彩疏稱東南北三道並無新舊大堰是已獨李冰所鑿離堆山立都江堰當岷江中流歲費工資巨萬宋元祐間差官修築凡高下闊狹淺深以至灌溉頃畝夫役工料及監臨官吏皆注於籍元至元元年亷訪僉事吉當普建白用石包砌諸堰為石門以時啓閉用鐵萬六千斤鑄為大龜貫以鐵柱而鎮其源明初加意水利州縣與軍衛屯所共役人夫五千竹木工料計田均軫修葺堰得不壞成化九年巡撫都御史夏塤以遠人赴役不便將郫灌二縣雜派科差均攤得水州縣專備工料以供堰務𢎞治九年添設按察司僉事一員專一提督都江堰各府州水利於時灌縣知縣胡光代石冶金即舊址甃砌為防貫以鐵錠柱三各長一丈二尺使當湍勢石堤中貫鐵處固以油灰直長一十五丈高一丈三尺濶五尺首濶一丈二尺用鐵三萬二千二百餘斤洞油五百斤麻線二百斤木二千五百根各色工役計二十五萬三千二百有竒正德間水利僉事盧翊親詣督理疏濬直抵鐵板得秦人所書六字訣曰深淘灘低作堰大書灌瀾亭上以昭永鑒先是每年修築工役有不均之嘆翊乃下令以糧三石派夫一名分八班每八年一周而蜀府每年亦助青竹數萬竿委官督織竹籠裝石資築明末獻逆之變都江堰衝決數百丈沙石填淤大異於秦碑所云矣國朝順治十六年巡撫都御史高民瞻監軍道程翊鳯暨各文武官共捐銀二千有竒緣李冰舊制修築淘鑿以開民利十八年巡撫佟鳯彩行令用水州縣照種派夫每歲委官督修康熙四十五年夏五月霪雨人字堤三泊洞府河口俱衝決巡撫能泰倡捐修築人字堤三十八丈又築三泊府河新堤八十三丈時稱為太平堤云舊例派夫修堰或照糧或照田不無畸輕畸重至雍正八年丈田事竣巡撫憲德題請用水州縣區别遲早多寡計畝均攤派銀一千二百八十二兩二錢二分九釐每歲徵收完解以成都府同知為水利同知管轄其事民稱便利焉四川通志卷十三上欽定四庫全書四川通志卷十三下蠲政自春秋時有施舍己責之説而兩漢因有事於蠲貸由唐而下或因儉嵗或因大役或因恢拓土宇皆有蠲政至宋乾德四年免四川夏稅及諸徵之半田不得耕者盡除之元明以來於蜀中無名之斂不急之費間亦或從蠲減至我朝厚德深仁訖于四海川省尤疊邀異數田賦常除丁錢屢赦湛恩汪濊浹髓淪肌洵非蜀山峽水所得並其高深也作蠲政志皇清康熙二十五年奉上諭諭户部自古帝王撫馭九有軫念民依凡鞠養生全為計甚周猶以賜復蠲租為布德行仁之要務朕嘉與海內元元共圖樂利弛徵減賦時廑於懷惟頻渙恩施俾萬姓得沾實惠念直𨽻畿輔重地天下根本寬租之詔屢沛往年但順永保河四府較之畿南諸府差役倍多供億尤劇應再加軫恤又湖廣湖南福建四川貴州地方昔年為賊竊踞民遭苦纍今雖獲有寧宇更宜培養以厚民生一體蠲免用昭愷澤直𨽻順永保河四府及四川貴州兩省所有康熙二十六年應徵地丁各項錢糧俱著蠲免二十五年未完錢糧亦著悉與豁除湖廣湖南福建兩省所有康熙二十六年下半年二十七年上半年地丁各項錢糧及二十五年未完錢糧亦與盡行豁免爾部速行該地方官通行曉諭務使人民均被恩賞以副朕愛育蒼生至意如有不肖有司官役借端朦混及私行重徵者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或被告發定行一併從重治罪爾部即遵諭行特諭康熙三十二年奉上諭諭户部朕撫馭寰宇蚤夜孜孜惟以實惠及民俾登康阜為念廣西四川貴州雲南四省俱屬邊地土壤磽瘠民生艱苦與腹內舟車輻輳得以廣資生計者不同朕時切軫懷厯歲以來屢施恩恤廣西省康熙十六年通省錢糧十七年十八年民欠錢糧貴州省二十二年秋冬及二十三年春夏地丁錢糧又貴州四川二省二十五年未完及二十六年應徵錢糧雲南省二十七年以前屯地積欠錢糧俱經次第蠲豁茲念育民之道無如寬賦矧邊省地方非再沛優恤之恩則閭閻無由充裕所有康熙三十三年四省應徵地丁銀米著通行蠲免仍行文該督撫遍加曉諭令人沾實澤以稱朕嘉惠遠省民生至意如有不肖有司借端朦混私自徵收者該督撫指名奏劾從重治罪爾部即遵諭行特諭巡撫四川提督軍務都察院右僉都御史貝和諾題為欽奉恩詔事康熙四十二年四月十八日準户部咨四川清吏司案呈康熙四十二年三月十八日恭逢恩詔內開一恤民以免錢糧為要是以直𨽻各省錢糧屢經蠲免但雲南貴州四川廣西四省俱屬極邊之地朕未經巡視數年以來又未曽蠲免錢糧宜更施恩澤這四省康熙四十三年應徵地丁各項錢糧通著蠲免該部速行文地方官員遍行曉諭務使小民得沾實惠欽此欽遵為此合咨前去遵照恩詔內事理欽遵施行等因移咨到臣欽此隨即行司道府廳州縣土司一體欽遵恩詔將康熙四十三年應徵地丁各項錢糧通行蠲免並出示遍貼各鄉村市鎮曉諭使小民一體周知均沾實惠隨據闔省紳襟士民張烺張吾瑾徐仰亷等歡呼踴躍環聚公庭呈稱我皇上洪恩普被遠及萬方已無一夫不得其所又仰荷聖慈軫念蜀省極邊小民特頒恩詔將四十三年應徵地丁各項錢糧通著蠲免如此皇仁浩蕩烺等無由報答惟有朝夕焚香頂祝願我聖主萬壽無疆并請代為奏謝等語到臣看得蜀省遠處極邊荷蒙皇上時加軫恤今又欽頒恩詔將康熙四十三年應徵地丁各項錢糧蠲免臣準部咨隨即通行一體欽遵并刋刻告示曉諭務使均沾實惠以仰副皇上愛養元元至意兹據通省紳襟士民歡呼踴躍懇請代為題謝聖恩等情前來理合具題伏祈皇上睿鑒施行為此謹具奏聞康熙四十九年十月初三日奉聖祖仁皇帝詔曰朕躬膺天眷祇承烈祖鴻庥統馭萬方子育兆庶廑懷致治宵旰靡寧幸際海宇同風邊隅嚮化遐邇中外貼然衽席之安者皆仰荷天地祖宗福祐之所致也方朕八齡踐阼之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日少釋每思民為邦本勤恤為先政在養民蠲租為急數十年以來除水旱災傷例應豁免外其直省錢糧次第通蠲一年者屢經舉行更有一年蠲及數省一省連蠲數年者前後蠲除之數據户部奏稱通共會計已逾萬萬朕一無所顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕每歲供御所需概從儉約各項奏銷浮冒亦漸次釐革外無師旅餉饋之煩內無工役興作之費因以厯年節省之儲蓄為頻歲渙解之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁已歷七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久户口日蕃地不加增産不加益日用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年思沛大恩以及吾民原欲將天下錢糧一概蠲免因衆大臣集議恐各處需用兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始終三年以內通免一周俾遠近均沾德澤直𨽻奉天浙江福建廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外康熙五十年應徵地畝銀共七百二十二萬六千一百兩有竒應徵人丁銀共一百一十五萬一千兩有竒俱著察明全免並厯年舊欠共一百一十八萬五千四百兩有竒俱著免徵其五十一年五十二年應蠲省分至期候旨遵行民間舊欠既經豁免嗣後每年額徵錢糧務如數全完倘完不及額或别有虧空託稱民欠則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孶孶保赤之懷實心愛養力杜侵牟朘削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非升平樂利之盛事歟爾部移文各督撫諭旨到日即刋刻頒布遍示窮簷令咸知悉特諭巡撫四川提督軍務都察院右僉都御史憲德為仰沐皇恩懇請代陳樂輸報效事今歲川省辦理西藏烏蒙各路軍糈俱先動用附近州縣倉榖碾運至秋收動用軍需銀兩買補還倉經臣題明部議允準除辦米州縣已自倉領榖碾運者現在發銀催令買補外有成都府屬之崇慶州原於碾辦之時傳令里民領穀碾辦據各里民詞稱各家俱有現食餘米可應軍務若現領榖碾辦恐致遲誤不若先將各家現有之餘米攢湊應付其榖石暫貯在倉俟用著取領等情申報前來臣隨檄令百姓照數領榖官吏無得遲纍侵扣去後兹據成都府知府王􅕵詳稱委署知州田廷錫申報崇慶州紳襟士民舉人李青霔等詞稱崇慶州僻處川西兵燹凋殘地土榛蕪我朝定鼎之後沐聖祖仁皇帝加意撫綏以故田地日闢户口日增兼鼓士氣右文重學家興禮讓人爭奉公六十餘年深仁厚澤已淪肌而浹髓矣今皇上自繼統以來厲精圖治念切民生故五星照連珠之休日月垂合璧之象雨順風調年登大有此普天之同慶而為亘古所未有也偶有小醜釁起西域更遇狂悖騷動南川致廑睿慮以勞我六師崇慶州先後共計攢湊過軍需米一千五百石屢奉諭令里甲花户人等赴倉領榖竊思攘外所以安內除冦所以寧民今大兵之遠涉無非為小民身家計為民者正欲捐輸代辦稍效涓滴何忍以出過升斗之米而領倉榖以計償乎幸沐皇恩恆獲有年之慶婦子食用尚不需此矧倉榖所儲莫非皇恩之廣大為百姓備凶荒今值豐衣足食之日乞念下民之樂輸留此榖石永為崇慶州之厚資等情疊次聨名具呈不已臣伏查西藏烏蒙等處辦運軍需我皇上以軫念民生不忍絲毫纍及民間故暫動倉榖碾運秋成發帑買補抵還正項隆恩至渥矣今崇民以己資代辦已經三次榖數至三千餘石及催令赴倉償還乃紳襟士庶各稱情願捐輸異口同聲固由時和年豐家給人足實我聖天子仁育義正之休無遠弗屆教養安全故百姓急公樂義如斯也臣不敢壅於上聞據實陳奏伏乞皇上睿鑒俯允施行為此謹奏雍正六年十一月十六日奏十二月十八日奉旨據巡撫憲德奏稱崇慶州紳襟士民將各家現有之餘米湊運軍需及諭令領回榖石僉稱叨沐皇恩豐衣足食情願樂輸留此榖石永為崇慶州之厚資等語該州紳襟士民尚義急公情詞肫摯此皆聖祖仁皇帝六十餘年深仁厚澤浹髓淪肌是以風俗淳厚人心感戴朕心甚為慰慶著將崇慶州雍正七年額徵錢糧全行蠲免以示格外加恩良善之至意該部知道巡撫四川提督軍務都察院右僉都御史憲德為仰沐皇恩懇請代陳樂輸報效事雍正七年六月十六日準户部咨四川清吏司案呈户科抄出四川巡撫憲德題前事雍正七年二月初五日題三月初三日奉旨該部知道餘著議奏欽此欽遵於三月初四日抄出到部該臣等查得四川巡撫憲德疏稱崇慶州屬士民公捐米石上佐軍需經臣具奏仰荷皇上深仁下逮將崇慶州雍正七年額徵錢糧全行蠲免臣接準部咨差成都府知府王􅕵親詣崇慶州遍加宣諭務使蔀屋茅簷咸聞俞旨窮鄉僻壤共沐恩光兹據署布政司事建昌道參議劉應鼎詳據成都府知府王􅕵詳稱據該州紳襟士民葉榮賢等感激天恩懇請代謝復以蠲租益下為盛世之隆施而惟正是供實下民之常分當此軍糈孔亟民纍全無若論衆姓之公捐尚不足抵當年之私派今州屬錢糧七千餘兩照册全蠲為數不為不多受之已為過分至於自首田畝於雍正五年分已納之糧前蒙聖恩準抵作雍正七年徵收之數此項田畝既蒙赦其從前隱匿之罪何敢復邀免本年應納之糧所有雍正五年分已徵在官者情願仍於本年抵銷其丈量未畢者情願亦於本年一體輸納等情理合恭疏代題等因具題前來查川省隱匿田地雍正五年五月十五日欽奉上諭特沛寬大之隆恩準自行首出將從前欺隱之罪悉從寬免定限一年令其首報統於雍正七年入額徵解臣部欽遵行文去後該撫憲德以川省之田地欺隱太甚將本年首報之户業已題準於雍正五年徵收則續行首報之糧應請一例於雍正五年起徵臣部議覆以後報田糧在已經奉到恩旨之後令該撫謹遵諭旨統俟於雍正七年入額徵解但在一年內自首者悉遵恩旨奉行等因奉旨依議欽遵行文在案嗣據該撫憲德以奉到恩旨之後凡各屬已徵自首田糧若給發各州縣轉發納户誠恐里户繁多糧銀細碎反有胥役乘機侵蝕之弊題請留抵雍正七年之額徵臣部議覆準其留抵奉旨依議欽遵亦行文在案今該撫憲德疏稱崇慶州紳襟士民葉榮賢等感激皇上蠲免額賦之鴻恩情願即將雍正五年自首田地已徵在官之糧仍於本年抵銷丈量未畢者亦情願於本年一體輸納據情代題等語在百姓感激輸將實出於至誠然我皇上之仁恩浩蕩槩寬從前隱匿之罪令其自首統於七年入額徵解復因崇慶州供墊軍糈將一州七年額課全行蠲免正所以加惠元元使其共沐恩波之意也今若照該撫憲德所請將雍正五年田地已徵在官之糧仍於本年抵銷丈量未畢者亦於本年一體輸納與從前留抵新糧之恩旨似不相符合應令該撫憲德將雍正五年已徵之糧留抵庚戍年正課其丈量未畢者亦統俟庚戍年輸納俾得均沾實惠以仰副我聖天子澤沛重申之至意俟丈量事竣之日將地畝科則應徵數目分晰造具清册送部查核可也等因於雍正七年四月十九日題本月二十一日奉旨依議巡撫四川提督軍務都察院右僉都御史憲德為聖人恩澤溥博如天等事瀘州里民王在廷等先經具呈樂輸軍需米石一案臣將未經允其所請緣由據實陳奏仰荷皇仁廣被即著照崇慶州之例將瀘州雍正七年額徵錢糧全行豁免臣接準部咨隨即差成都府理事同知德爾格前詣瀘州廣行宣布並令該地方官親歷四境遍加曉諭務使窮鄉僻壤共曉恩綸咸沾實惠兹據該布政使趙𢎞恩詳準永寧道劉嵩齡移據代辦瀘州合江縣江聨輝詳據本州紳襟士庶余遐福等呈稱竊惟萬方惟正之供乃國家之大計九土輸將之職為臣庶之常經福等咸願公捐軍米不敢支領倉儲農有餘夫正可以挽輸自效民多餘力何曽以負戴為勞論小民之報效猶未竭夫涓埃乃皇上之恩膏更莫窺其高厚寸絲斗粟悉酬婦子之勤勞蠲稅除租咸荷君王之申錫從此千家澤潤萬姓春生矣聞崇慶州士庶以恩免錢糧情願將雍正五年自首已徵在官寬至雍正七年起科之糧仍於本年扺銷並現年自首尚未查丈定數之糧一體輸納公懇在案福等亦照崇慶州民之請情願一體完納等情理合恭疏代題伏祈皇上睿鑒施行為此謹奏雍正七年四月二十六日題六月初一日奉旨崇慶州已徴之糧留抵庚戌年正課其丈量未畢者亦俟庚戍年輸納已有旨了這所請瀘屬願輸錢糧著照崇慶州之例行該部知道巡撫四川提督軍務都察院右僉都御史憲德題為恭謝天恩仰懇題達事雍正七年閏七月十三日準户部咨為欽奉上諭事陜西清吏司案呈內閣抄出奉上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及剿撫苗蠻等事其一應軍需皆動用公帑備辦秋毫不𣲖及於民間而糧餉轉輸亦有資於民力今藏地苗疆俱已寧謐朕心嘉慰特沛恩膏著將庚戍年甘肅額徵地丁銀二十七萬七千六百兩零四川額徵地丁銀三十一萬六千三百兩零雲南額徵地丁銀一十四萬一千六百兩零貴州額徵地丁銀七萬四千二百兩零廣西額徵地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戌年額徵錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均沾實惠如有奉行不力被不肖有司暗飽私囊或被姦胥土棍強紳劣襟包攬侵蝕者朕必訪聞得知將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘迫而莫能支不肖者又將橫取而無所檢束矣是以酌定錢糧耗羡均給各官養亷之法此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一併蠲除是民雖邀格外之恩而官轉有拮據之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種轉多於耗羡之數於吏治民生均無禆益常見庸劣之地方官每以蠲免錢糧為不便於己心懷悵怏即此意也著於庚戍年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徵收耗羡將此永著為例欽此欽遵於雍正七年六月十二日抄出到部相應行文甘肅四川雲南貴州廣西西安各省督撫遵奉上諭事理應將庚戍年甘肅四川雲南貴州廣西五省額徵地丁銀兩悉行蠲免西安蠲免十分之三部文到日地方官著即遍為曉諭務使小民均沾實惠如有奉行不力及借端勒索侵蝕情弊該督撫即行指名題參從重治罪仍將蠲免過銀兩細數造册報部至耗羡銀兩仍舊照常徵收將各州縣衛所徵收過耗羡銀兩數目於歲底造册送部查核並知照直𨽻等省及順天奉天二府自庚戌年為始凡遇特恩蠲免錢糧之處其耗羡仍舊輸納若因水旱蠲免者不得徵收耗羡永為定例遵行可也為此合咨前去查照上諭內事理欽遵施行等因移咨到臣欽此當即出示曉諭時因秋闈已近各屬紳士雲集省城隨率同在城文武官辨紳襟士庶軍民人等望闕叩謝皇恩訖萬姓歡呼踴躍又行布政司刋刻告示轉發各府州縣衛所遍行曉諭務使窮鄉僻壤咸聞俞旨共沐皇仁去後兹於雍正七年八月初三日據四川闔省紳士宋瑋董新策張晉生葛秉敬等呈前事內稱竊念蜀省介在天末聖朝屢沛恩膏教養百年生成萬彚欽惟我皇上臨御以來眷顧時切凡兹命官取士重農恤兵以及田賦之均平蠻荒之綏靖無不上關睿慮措置得宜猶復軫念民依蠲租來歲俾凡六省之衆均沾一體之仁似此正供原屬定分况比戶催科不擾樂享太平且連年水旱無憂豐登大有今荷皇恩浩蕩天語周詳免此數十萬之金錢恤我億兆人之家室十行詔下四野歡騰從此千斯倉萬斯箱俱屬皇仁之優渥耕而食鑿而飲彌知帝力之高深白叟黃童共慶三生有幸深山窮谷齊呼萬壽無疆瑋等安棲畎畝榮列衣冠夙受豢養之恩難效涓埃之報同邀異數敬展餘誠感激有心頌揚莫罄懇乞俯順輿情代題稱謝等情到臣欽惟我皇上治洽堯封恩周禹甸深仁布濩宣阜財解慍之風至德覃施𢎞擊壤歌衢之化祈年祈榖時時陳七月之詩賜半賜全歲歲下三年之詔固已􅕗穗有十千之積倉箱留三九之餘矣乃猶以綏安西藏剿撫苗蠻雖諸路軍需無不動支國帑而計程挽運猶或勞我農人在羣情固樂於輸將惟睿慮常勤於撫字民若曰衣食足矣幸無煩宵旰之憂勞君若曰物力艱哉宜重恤閭閻之疾苦蓄於國何如蓄於野庶木金不患其穰飢富在官無寧富在民使菽粟恆多於水火爰申天語用飭地官弛各省之催科免來年之租稅紫綸飛下恩流邊鄙千村丹詔傳來澤沛西南半壁伏念惟蜀省之民安物阜全仰荷天庥而比年之開墾頻增幸無遺地利兹復供輸不事厖無夜吠之驚兼之地丁全除吏絶朝呼之擾崇瀘多委積一年有再見之絲綸巴蜀遍桑麻九郡沐同時之膏雨兵既吉凶有備歡呼於韜弓戢矢之餘民復樂利頻仍含鼓於鑿井耕田之下擬蜀山之聳峙難齊帝德巍巍極峽水之汪洋莫並皇恩蕩蕩臣仰體聖明之博愛宣布惟周欽承利濟之寬仁奉行是力戒飭健胥猾吏毋滋中飽分肥務使湛露均沾咸拜雨粟雨金之賜陽春遍至共賡如雲如日之謡兹據闔省紳士里民呈請前來理合恭疏代題伏祈皇上睿鑒施行為此具本謹具奏聞巡撫四川提督軍務都察院右僉都御史憲德為備陳下情等事雍正九年五月初六日準户部咨四川清吏司案呈尸科抄出四川巡撫憲德題前事雍正八年十一月二十四日題九年正月二十五日奉旨該部議奏欽此欽遵於本月二十六日抄出到部該臣等查得四川巡撫憲德疏稱川省雍正八年額徵地丁錢糧欽奉恩旨著蠲免除巴裡二塘供給喇嘛衣單土司蠻兵頭人口糧仍按數扣收外明正土司堅參逹結並所屬土司雍正八年應納貢馬折價並雜糧折徵共銀一百九十八兩四錢沈邊長官司應納雜糧折徵銀五十兩冷邊長官司應納雜糧折徵銀四十兩口外新附土司五十四處應納馬牛青稞等項折徵銀三千八百三十五兩四錢五分查各土司雖屬邊隅久𨽻版圖而各所屬頭目番民趨事赴公與內地無異厯年軍需糧餉該管番民俱各出力挽運並無遲誤可否與內地人民同沾愷澤以示柔遠之至意口外五十四處土司已奉免四年帶徵之項而本年應納錢糧應否一併邀免理合具題等因前來查川省雍正八年額徵地丁錢糧並新附五十四處土司帶徵之項俱奉旨蠲免在案今該撫既稱明正沈邊冷邊等各土司并新附土司五十四處雍正八年應納各項銀兩俱請與川民一體蠲免等語相應請旨應否準其得與川民一體蠲免同沾恩膏洪恩出自聖裁至於巴裡二塘供給喇嘛等衣單口糧應令該撫憲德按數扣收可也等因雍正九年三月十六日題本月二十日奉旨各土司應納銀兩著與川民一體蠲免餘依議四川通志卷十三下
