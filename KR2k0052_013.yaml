body:
  text: 四川通志卷十三上水利書載九川滌源九澤既陂由是而三壤咸則告厥成功然則土爰稼穡而非水之潤下曷以相濟也哉神禹治水導岷江以朝宗萬世永賴漸被逺矣嗣是李冰鑿離堆文翁穿湔江至今沃野千里號稱陸海蓋資其灌溉溝塍綺錯幾不下數千萬頃也其他疏瀹有方而順水之性因地之宜以成天之功者又豈區區鄭白之渠所可比烈也耶作水利志成都府成都縣附郭石堤堰在縣北四十里木籠堰在縣北二十五里清波堰在縣西二十里雙江堰在縣西三十五里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏華陽縣附郭欄杆堰在縣西南一十里龍爪堰在縣西南五里洗瓦堰在縣東五里姐兒堰在縣東一十里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏雙流縣金馬堰在縣西北一十五里鰱魚堰在縣東北二十里縣境內共三十二堰溉田溫江縣朱家堰在縣東三十里龍梁堰在縣東三十里縣屬水源自灌口下約三十里分一派入江安堰即新開河流溫江郫縣灌縣雙流華陽地方又自灌口下約四十里分一派入玉石堰流溫江雙流地方至用都江堰水止有六家每年照田畝出銀詳見巡撫憲德疏新津縣通濟堰在縣西南三里唐開元二十八年採訪使章仇兼瓊所開分四筒穿渠灌溉本縣東南田畝並彭山眉州青神等處二百餘里石馬堰在縣西十五里蕎草堰在縣西一十五里沙子堰在縣西北六十里俱引金馬河水溉田大寺堰在縣西北一十五里引西河水溉田五所堰在縣東一十五里引楊柳河水溉田七里堰在縣東北一十里引洋馬河水溉田金堂縣老馬堰在縣東一十里紡車堰在縣北二十五里天工堰在縣西一十五里石龍堰在縣東南一十里蠻仔堰在縣東北五里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏新都縣龍門堰在縣南二十里千工堰在縣西南一十五里馬沙堰在縣西二十里插板堰在縣北三十里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏簡州明陽鎮堰在州東北花落溝堰官斗溝堰平大鎮堰虎頭堰長溝堰州境內共六十五堰皆節絳諸水以溉田崇慶州百丈堰在州北黑石堰石頭堰沙河堰普濟堰普潤堰娑羅堰石魚堰州境內共七十四堰溉田郫縣萬工堰在縣西二十里黃土堰在縣南三十里漏沙堰在縣東南二十五里牛王堰在縣西北一十五里臘塔堰在縣西南三十里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏灌縣太平堰在縣東城下三泊洞在縣城北岸柏木河在縣東二里徐堰河在縣東二十里羊子河在縣東一十里油子河在縣東二十五里五陡河在縣東五里侍郎堰在縣南一十里鄉安堰在縣西二十五里即都江堰雍正八年巡撫憲德具題灌縣郫縣崇寧溫江新繁新都金堂成都華陽等縣照田畝之多寡以出夫即計夫役之多寡以折價永為定例崇寧縣毛家堰在縣北一十五里永寧堰在縣南一十里化家堰在縣東三里龍口堰在縣西一十里平樂堰在縣西一十里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏新繁縣興龍堰在縣東一十二里天生堰在縣西二里鐵馬堰在縣南七里金牛堰在縣西南一十五里楊栁堰在縣北五里縣境內凡溉田堰水源俱分自都江大堰每年照畝出銀詳見巡撫憲德疏漢州栁梢堰在州北引綿陽河水溉田馬乂堰在州北引石亭江水溉田馬腳堰在州北引金雁河水溉田老鴉堰在州西引馬蹄河水溉田粟米堰在州西引清白江水溉田州境內共三十六堰溉田什邡縣洛口堰青竹堰跑馬堰楊村堰縣境內共二十堰皆節雒水溉田彭縣闖平口堰在縣東馬鳴堰麻栁堰羅江堰濟民堰縣境內共二十四堰溉田敘州府長寧縣東溪西溪二溪環繞縣境居民引以灌溉田畝夔州府奉節縣附郭青苗陂在縣東白帝城東北五里方輿勝覽東屯有青苗陂杜甫詩東屯稻田一百頃北有澗水通青苗明一統志在瞿塘東蓄水溉田民賴其利龍安府江油縣文昌堰在武都龍門堰在縣北三里縣境又有小河許歐鐵佛陳公等七堰彰明縣龍備堰在縣東縣境又有胡中永安永豐羅村野壩等九堰雅州府雅安縣附郭黑水堰在慕義鄉引隴西河水灌田紅巖堰在上壩鄉引濆江水灌田蘆山縣石波堰在縣東三里其水出始陽山用木槽接水溉田名山縣黑水堰清溪縣溫江河發源於相嶺下壩田畝資其灌溉流沙河由龍越嶺來上壩田畝資其灌溉直𨽻嘉定州雍正十二年升為府楠木堰在州西一十五里起安谷鄉宋家場至馬落壕止引沫水灌田又名牛特堰康熙三年參政張能鱗重修更名張公堰永豐堰在州北一十五里起風洞子至白巖壩止穿山為洞連引綿竹鋪青衣水灌田夾江縣龍興堰在縣南一十里康熙四年知縣劉際亨以水小難周灌溉更於其南五里開鑿大渠民利賴之號曰劉公堰直𨽻眉州蟇頤堰在州東七里唐開元中益州刺史章仇兼瓊築障蜀江水溉眉山青神田畝七萬二千有竒宋嘉定間魏了翁又畚武陽石壘堤其利尢溥鴻化堰在青神縣北一十五里即唐張武等所開也舊志青神陂堰五十有一惟鴻化最大馨堰元和志在彭山縣西南二十五里擁江水為大堰開六水以灌郡田彭山縣通濟堰在縣西北四十里有大堰一小堰十唐時章仇兼瓊所開自修覺山下引水灌溉彭山眉州等處田畝凡三百餘里後五代時張琳重修元彭山令雍熙復修丹稜縣滄浪堰在縣東南隅水深數尺可溉田十餘畝天生堰在縣西五里係天成提堰不勞人力直𨽻邛州六堰在州東州志有頭堰二堰三堰皆大邑縣界四堰五堰六堰皆在州界自州東北向西南數十里沿河田地仰以灌溉大邑縣頭堰又有二三四堰并青山千工鐵溪石頭五龍正武羊頭芽草等堰直𨽻資州蒙溪堰在州西州境又有鴛鴦等六十一堰分引珠江水以溉田資陽縣水溪溝堰在縣東縣境共有二十六堰仁壽縣漢陽堰在縣北唐志在資縣東五里至德初置引漢水溉田二百頃文德元年縣令陳克復修漢志境內又有方家壩草狹溝鴛鴦池太平橋等十三堰直𨽻綿州雒水堰在州東北唐志在魏城北五里唐貞觀六年引安西水入縣民甚利之州志州境又有邊堆泉水野茅石草水通史君河北王武麻角丙水親開等十三堰德陽縣安樂堰在縣東南又有黃膠柳梢石板龍泉河等二十三堰西南有歐家堰引綿竹之射水溉田羅江縣芒江堰在縣北五里唐永徽五年縣令白大信置引羅江河水灌田楊村堰在縣東北一十四里唐貞元二十一年縣令韋德築引安縣之折腳堰水溉田舊志縣境又有泉水玉女馬山回龍靈龍等十九堰綿竹縣軍屯堰今名官渠堰在縣北三十里其下有硼砂走水龔家唐家等四堰皆引綿江水灌田又有黃土馬壩馬頭等堰火燒堰在縣西四十里其下又有疊溪象鼻貨家等堰皆引石亭江水灌田鹿角堰在縣西南二十里其下又有海香江家白鶴祖師麥草官堰土黃等七堰皆引射水灌田安縣折腳堰在縣南唐志在神泉縣北三十里唐貞觀元年置引水灌田雲門堰在縣東唐志龍安縣東南二十三里有雲門堰引茶川水以灌田唐貞元元年築下又有白馬黃土芭蕉等十二堰按蜀省水利所在多有而都江一堰尤為利溥功巨即成都所以稱沃野千里者也當事於此再一致意故成屬諸堰志中一一備載至若眉州之蟇頤堰彭山之通濟堰與夫嘉定之楠木夾江之龍興等堰利賴雖不及都江之廣然經章仇兼瓊魏了翁張能鱗劉際亨諸公疏濬修築仁人之澤歌頌難忘故亦在所不遺其餘如重慶保寧以及各府州縣或堵溪澗或壅澤梁非無塘堰以資灌溉要皆民間自作刻日可成者是以略而弗紀題修都江大堰疏四川巡撫都察院佟鳳彩題為詳興水農之政為足民之大本事案照順治十八年六月二十三日據左布政使楊思聖呈稱奉前巡撫高民瞻案驗順治十七年八月十七日準工部咨都水清吏司案呈奉本部送工科抄出該本部覆工科右給事中薛鼎臣題前事等因移咨到院備行到司奉此隨經備移水利守巡各道查議移報去後今準守西道移稱據成都府申據郫灌二縣回稱查得當日水利舊有都江大堰開鑿於秦時太守李冰灌溉十一州縣值張逆變後所餘人民止就隅曲之水以灌偏僻之田茍且延生未遑修理順治十六年蒙監軍道詳請三院司道府遠近文武捐金二千有竒雇募淘鑿即今開墾漸廣但疏濬之水道易為沙石滯塞欲為永久計必行令用水州縣照糧派夫每歲淘鑿庶民不憂旱而國賦漸增矣等因移司準此又準巡北道移據保潼二屬州縣回稱查得各屬州縣所轄百姓住居髙岡四野且地勢狹隘淺薄非平川可比並無新舊水利當興等因到司又準守巡東南各道移覆相同各等因移報到司準此相應呈報等因到臣該臣查看得蜀省川東川南川北皆崇山峻嶺並無應修應築之塘堰惟成都為省會平川之地舊有都江大堰在灌縣灌溉成屬州縣自遭兵燹之後堰堤崩頽通渠壅淤至十六年間文武各官捐助修築疏通水道目前暫資灌溉其於農政漸有禆益已於本年閠七月內備咨工部去後至八月初二日臣復將都江大堰修濬事宜於條議疏內列欵入告逮九月二十五日準部咨內稱此案應當題覆復行到臣該臣覆查前情無異理合具題題請李冰李二郎封號疏四川巡撫都察院憲德題為聖明在上川嶽效靈懇請賜封以光盛典事雍正五年十一月十一日準禮部咨祠祭清吏司案呈禮科抄出本部題前事內開該臣等議得四川巡撫憲德疏稱成都府灌縣都江堰口廟祀李二郎自秦以來尚未受封號查都江堰水源發岷山禹導江後沫水尚為民患秦蜀守李冰使其子二郎除水怪鑿離堆穿內外二江灌溉成都等州縣稻田使沃野千里康熙四十七年孟洞水決至灌口忽得木石關欄水泄外江保全成都等縣近四五年間江水安瀾灌口不乾不溢修堰之需比前費半功倍自皇上御極以來五穀豐登萬民樂業捍禦保障為功不淺相應題請敕賜封號等因前來查雍正二年詹事府少詹事錢以塏奏稱江海之神請恩褒爵秩一疏臣部以沿海地方廟祀諸神果有捍禦保障之功應請封爵者令該督撫查明彚題等因議覆奉旨依議欽遵在案今該撫既稱李二郎鑿山導江有功蜀地康熙四十七年孟洞水決獨至灌口忽泄外江保全成都等縣自皇上御極以來五穀豐登萬民樂業江水安瀾不乾不溢捍禦保障為功不淺等語理合敕賜封號以昭盛典但查司馬遷史記班固漢書專載蜀守李冰鑿離堆穿二江功績厯厯可考惟灌縣志書內有使其子二郎鑿山穿江之語是二郎雖能成父之績李冰實主治水之功又查王圻續文獻通考內元至順元年封秦蜀郡太守李冰為聖德英惠王二郎神為英烈昭惠靈顯仁祐王兹逢聖朝纍洽重熙屢彰顯應康熙四十七年既有保障之功近四五年間更覩安瀾之慶理宜並崇祀典用答神庥今該撫祇請封李二郎而不及李冰似未妥協或照該撫所請專封李二郎或將李冰並給封號之處恭候欽定俟命下之曰其封號字樣交與內閣撰擬進呈御覽行令該撫轉飭該地方官製造神牌安設致祭每歲春秋二祭仍照例致祭可也等因雍正五年九月初六日題本月初十奉旨李冰李二郎俱著給與封號餘依議欽此隨行文內閣去後今準內閣撰出李冰封號欽定敷澤興濟通祐王李二郎封號欽定承績廣惠顯英王等因到部相應移咨該撫遵照施行可也題都江堰酌派夫價疏四川巡撫都察院憲德題為敬陳管見仰祈睿鑒事成都一郡地處高阜