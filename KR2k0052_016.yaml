body:
  text: 欽定四庫全書四川通志卷十六上木政惟山有木工則度之所以備棟梁之用也然斧斤以時仲冬取陽木仲夏取隂木蓋鳩庀之中仍存撙節之意焉蜀産楠杉多在深山叢箐即有合抱良材往往運送維艱我聖祖軫念遐陬屢紓採辦今我皇上體恤民瘼營建概從節省即有所需必察地之逺近而均其勞逸要皆悉發帑金不使閭閻有絲毫纍凡此休養生息之衆孰不仰戴天心仁愛而優遊於覆幬之中者耶作木政志明永樂四年詔建北京行宫敕工部尚書河南宋禮督木前後凡五入蜀監察御史顧佐亦以採木至而少監謝安在藺州石夾口採辦親冒寒暑播種為食二十年乃還正德六年建乾清宫敕工部侍郎兼右僉都御史劉昺巡撫總督督木營建正德十一年又遣郎中李寅催督採木嘉靖五年敕工部右侍郎兼右僉都御史黃衷督木九年敕巡撫右僉都御史宋滄兼督木十九年議建獻廟敕右副都御史戴金督木以憂去潘鑑來代三十二年採辦枋板以巡撫都御史張某兼督木三十六年建三殿敕工部右侍郎劉伯躍督木躍憂去李憲卿代之四十五年修建承天等殿巡撫都御史談綸兼督木萬厯十一年建慈寧慈慶宫巡撫都御史雒遵兼督木二十四年建三殿巡撫都御史兼督木三十五年再建巡撫都御史喬壁星兼督木本朝康熙六年建造太和殿巡撫都御史張德地督木至八年奉旨停止採取二十四年建造太和殿工部郎中齊穡入蜀採木時蜀自兵燹後人民稀少聖祖深為憫恤至二十五年松茂道王騭調任口北道由蜀入覲備陳採木艱難情狀奉旨停其採運雍正四年建造萬年吉地著督撫遴選賢員辦理動支正項錢糧照民間價值給發巡撫都察院憲德遴委川東道參議陸賜書督木附萬厯三十五年大木議四川等處承宣布政使司為傳奉事萬厯三十五年七月二十六日奉督撫喬案驗準工部咨稱查得採辦楠杉等木該部臣照依原題丈尺數目併節次舊例坐派湖廣貴州四川三省採辦况楠杉大木採辦於林箐深麓之中挽運於長江大河之內萬里間關委難卒至當兹民窮財盡之時應得量減每省查照三十三年題派數目各減十分之三以示朝廷撫恤遐方至意其應採各數目如式採取分為三運頭運限三十六年以內二運限三十七年以內三運限三十八年以內各抵京應用銀兩悉照兩宫事例一面查其見貯大木等銀動支并本部料價事例銀兩贓罰商稅契稅缺官俸薪餘積等項如或不敷呈請撫按查照兩宫協濟事例徑自具題以便覆請分派各處無所供辦者照數協濟又近查得四川巡按李題議大木以濟民窮一節該臣等議覆御史李目擊蜀中採木獨纍細民比之從前勞逸頓殊議選廉明府佐數員以為總委文武官十數員以為分委招商採辦而一應人夫食米錢糧俱全省通融編派不致偏纍且使州縣正官亦不因採木遂妨正務是上下公私俱為便益等因題奉欽依將坐派本省後開大木板枋查照節年採木舊規併近日按院李題議委官董理招商採辦之法一面分派招商採買解運一面備查應用錢糧若干見貯若干有無足用倘或不足作何通融編派與夫一切未盡事宜作速會同按察司逐一悉心酌議妥確務期大工克濟小民無擾具由通詳以慿施行該司仍先行嚴禁各州縣毋得踵習夙弊乘此僉報殷實科派小民騷擾地方敢有違者本院訪出或告發定行從重參究欵開四川坐派楠木杉木板枋若干等因奉此本年十月初九日又奉本院憲牌為三門肇建急缺合式巨材乞行差官催解以濟大工事近接邸報工部覆題三門缺乏金柱明梁等料專差郎中一員前來川省催解應用梁柱巨材二十三根虎尾杉三百根限明春抵灣需用甚急若不預為經理誠恐臨期遲誤牌仰該司官吏即查前次合屬州縣所採三運楠杉大木已抵水次及到大江者共若干根內某州某縣有圍長丈尺合今次坐派二三四五號者若干根其餘堪充虎尾杉者若干根倘有圍長合式而未到水次及已到水次而未至大江者今當作何派運與前報木料中間有無合式巨材一併速查明確備將圍長丈尺造册具詳呈報有木州縣即為算入今次坐派有無堪動官銀及先年三運未完有無存剩銀兩遺留木植通候報司完日造册呈報外惟是分總任事以便責成量行加派以佐官帑二事最為喫緊合先呈請伏候上裁詳示以便遵行其諸事欵容俟諏咨詳審酌量緩急次第詳行庶臨時不至周章而大役乃可有濟也為照大工巨典掄材重務矧今次坐派數多支費浩繁幅員寥濶倘非在事諸臣協力勞心寧無誤事卷查萬厯十二年間奉文採木奉督撫雒案開凡鴻材巨木之産多在土夷深山之中不先探踏則去向靡定不先給銀則空令難行不先派數則採辦不力不先委總則調度不專本院參考舊規酌量逺近先將各司道坐派總管凡七總川西道為一總上川東為一總下川東為一總上川南為一總下川南為一總川北為一總建昌為一總備將楠杉木枋分派多寡等則案行本司遵行在卷今次應照往規分為七總木枋數目亦照上年分派惟添設之數或不合式或不足前數又當作何議處召買採運務在經理得宜期於明春起解庶免遲誤之愆其今次分派大木板枋數目及應用錢糧等項與夫一切未盡事宜速照往規及原行事理會議妥確另詳以憑具題施行奉此又奉本院憲票仰司即便查照原行並節年採買事規將前派楠杉大木板枋照各號圍長丈尺每根塊約該價若干目今該司與合屬庫貯堪充大木銀兩共有若干與夫一切未盡事宜作速從長酌議詳報仍將嘉靖三十六年以來節次坐派木數及用過銀數并採運緣由一並開呈以憑覆查具題施行奉此隨經移會按察司及通行各道查議去後屢催尚未齊集今照時日已迫難再遲緩該本司左布政使湯日昭右布政使王應麟會同署印按察司劉禹謨看得今次採辦通共二萬四千六百一根塊查得萬厯二十四年估計規則共約用銀三百六十三萬餘兩除虎尾保水二色杉木緣上次未奉派採價值亦無則例先已揭報本院裁酌外查得萬厯二十四年奉文採木彼時本司庫貯尚有二百五十餘萬金與征播之需相兼支發而分派州縣自行採買者又所費不資僅完二運若今次所派木枋數倍往額而司庫積貯罄竭無遺且川省自先年兵火之後疊罹災荒閭閻愁苦物力凋耗纍年正賦尚多積欠未完今議額外加征亦恐未易為力兹奉部議堪以留用者四司料銀贓罰商稅稅契缺官俸薪數項而已查得兩院贓罰鹽課及鹽稅稅契事例等銀每年湊足十萬四百餘兩解赴陜西濟邊四司料價嵗額一萬九千四百餘兩三十五年分已解部訖缺官俸薪原無常額數亦不多惟有每嵗商稅一半該銀一萬五千兩他如南京􅝤皮事例稅契等項俱堪留用總之每嵗不過四五萬兩曾不足當十分之一此外百計搜求别難措處誠莫知所為計矣除見行通查各府州縣見有庫貯外遵義一道原係産木之區但新疆甫定物力空虛似難獨任應就近併附上川東道為一總而量加其派額其虎尾保水二項杉木及門工亟用巨材責成上東下南二總在上東者除遵義外再加分派於下東在下南者量行分派於上南建昌等處採辦以充頭運之數一應事宜除督木道專任通行督理外仍行七總各道將分派木數轉行所屬府州若何而選委能官若何而招商採辦若何而驗木給銀若何而到江發運一聽從長計議隨宜處分要在無拂商民之心而共濟公家之事此最今日第一議也至若合用錢糧數纍巨萬俱毫不可缺亦不容緩者今求之帑藏既積貯無多欲俟之請撥又緩急難濟惟有先行加派庶濟目前之急也查得川省錢糧俱以丁糧起派今計通省額糧除浮糧番糧外實徵稅糧共九十七萬六千五百四十三石八斗二升零人丁八十八萬一千七百四十六丁若驟加徵派恐民力不堪合無先行量派每糧一石每年除原額外今加派銀五錢人丁一丁除原額外加派銀五分照征播事例不許優免仍聽該道查考務責令州縣正官定限追比彚解各該府州庫貯聽候司道行文支放不許拖欠不許稽遲自萬厯三十六年分起至採運完日停止凡招商採買雇募運夫等項即以前項銀兩支給并不許僉報殷實承買亦不許編派運夫入山是民間雖有一時加賦之苦而較之先年官民俱擾貧富並纍者相去懸絶或亦人情之所樂趨也他如招商驗木給價起運等項尚有許多節次許多區處通候司道議妥至日另詳外今將前議二欵先行呈請伏候本院裁奪再照今次派採大木數倍往額且鴻巨異常如一號楠杉連四板枋此等巨木世所罕有即或間有一二亦在夷方瘴癘之鄉深山窮谷之內尋求甚苦伐運甚難今者瘡痍未起以煢煢孑遺之民任此艱難重大之役其何以堪查得嘉靖三十六年間以三殿採木共木枋一萬五千七百一十二根塊萬厯二十四年以兩宫採木共五千六百根塊以今日所派較之嘉靖年間幾於一倍較之二十四年多至四倍矣多積於官固可以待用而併取諸民實力所不堪職等竊謂額派之數宜減部文派採定為三運其頭運部文限三十六年以內到京而門工巨材且限春運計期已在眉睫間而錢糧未措商賈未集合式之材不知其在山在水非有神輸鬼運之術何以卒辦且川省去京極逺奉文最遲即水運之程越厯江湖逶迤萬里由蜀抵京恆以嵗計矧加以採伐挽運之繁乎查萬厯二十四年奉文採木至二十五年起解頭運二十六年到京二十七年起解二運二十九年到京今次木巨數多尤為不易故職等竊謂運解之限宜寬也夫無米之粥巧婦難炊千鈞之任衆擎易舉今兹大役約費四百餘萬金而專責之一隅之物力是即杯水車薪之喻耳今查本省庫貯剩存及民間加派為數無多不敷支用此外惟有請發內帑外省協濟而已第今工役繁興水衡告匱封樁雖富檢發未聞似難輕率舉行惟是題留解京錢糧如四司料價贓罰商稅契稅缺官俸薪鹽稅茶稅事例等項銀兩并量留嵗解陜西濟邊銀十萬餘兩此雖戶部額餉而以前數即令陜西措解各邊準作協濟本省之數亦無不可其他省分非為重大役工者俱令量行協濟多者十萬餘金少者五六萬兩即請工部定派省分行令各照數速解以濟燃眉諒急公之義各有同心或不至秦越相視也至於雲南先年用兵借過川省銀共四十萬兩除上次採木取還並征播議解貴州助餉外尚欠一十九萬六千餘兩又三十二年借過司庫銀五萬兩今止還一萬二千兩尚欠三萬八千兩俱未解還今當此多事之秋該省有唇齒之誼前項借支急宜償還得此資助亦猶之乎協濟矣故職等又謂支費之資宜裕也凡此皆目前急務不容緩圖而又不敢以擅專者伏乞本院特疏題請部議俞允所謂寬一分而民受一分之賜庶幾物力稍充而大工易舉矣除各土官進獻升賞恩例及嚴禁有司科斂事宜通行各道轉行各有司土司奉行外其上次採辦在厰與到水次木植已經委官清查至日另報今將查議過前項緣由並分派各總木數二司未敢專擅合行開欵呈請等因由詳呈奉督撫喬批分總加賦二事誠為急務俱如議速行各遵照派採追徵不許怠緩減額寬限與請留協濟各項錢糧候會題行其虎尾保水二杉照上次採木圍長則例計算定價門木應用木料照原行上緊刻期採運仍移督木道查照督理未盡事宜議妥通詳可也國朝四川木政奏疏條議題報遵義屬地方楠木疏略巡撫四川都察院右副都御史張德地題為請旨事康熙六年九月初一日據署四川布政司事按察使司李翀霄呈稱奉本院案驗準工部咨前事內開該臣等查得會典開載成造宫殿遣大臣往四川湖廣江西浙江採木今造建太和殿理應需用大楠木應請敕下四川湖廣江西浙江督撫稽查見有採就木植或山中出産木植長徑尺寸根數需用錢糧確估俱限以文到兩月內報部酌議可也等因康熙六年閏四月十二日題本月十四日奉旨依議欽此欽遵抄出到部移咨到院準此案仰該司即便會同按察司備移守巡各道通行合屬府州縣欽遵施行等因奉此又奉總督四川部院苖憲牌亦同前事奉此即移催守巡各道查訪舊例採取大楠木去後於康熙六年八月十四日準遵義道移據遵義府呈據真安州申稱遵郡原係播夷舊地改土設流山瘠土薄從未産有長大楠木即間有産者並不堪大工之用且真安不通水路由綏陽桐梓綦江重慶入江其陸路之險竒峰深壑斜坂側徑空行之人攀躋維艱若拽運重木動經多人則寸步難移倘遇直路每日尚可那移一二里一遇轉折曲斜不能掉轉查平播在明萬歷年間彼時地方蕃庶人民稠密從未運出一木若不預陳終難結局除一面細查木植夫匠數目道里逺近造册申報又據桐梓縣申稱縣屬蘆溪里地名陳頭巖後水箐産有楠木大小共二十二株除將長短圍圓路程人夫錢糧鹽菜等項備造清册申齎但桐梓不通水路必須運至綦江始能上筏入江萬山如懸一線烏道自平播改設以來從未運出一木况值此人力艱微之日似有萬難者今奉憲駁理合具結申報又據綏陽縣申稱查得綏陽縣産木處所實不通水路必由桐梓綦江至重慶入江一路羊腸鳥道峭壁懸崖空行之人亦難若登天如拽重木必須多人一遇曲折狹徑并深澗斷壑必架廂填砌方可一日拽移二三里遵奉造册具結申報又據仁懷縣申稱縣屬雖有所産楠木皆在深嶺人迹不到之處至於砍伐非比平地木植可以隨用斧斤髙箐之中必須找廂搭架多用人夫纜索方可修巔去頂截根此砍木之難一也若夫産木處所盡屬危巖峭壁即空行尚須扳藤拊葛楠木一株動須人夫百千方能拽動而山路險窄亦難立足山勢曲折不能并走勢必開山填砌找廂搭架所用人夫非比泛常拽運工程難以日計此搬運之難二也至於上筏之處必由溪河水道而山谷一線涸水皆係亂石填阻若非天雨旬日則水不盈尺勢必從下流築隄截壅蓄水丈餘方可順流拽運然須逐路築隄蓄水始能前進若遇大石阻擋又必多用石匠鑿去相地形之髙下用轉移之權變事難程限此上筏之難三也憲行駁查不得不據實申報又據遵義縣申報縣屬原無産木不致隱匿印結申報各等情到府該卑府覆看得採取楠木奉督撫兩院駁查今據真安桐梓綏陽仁懷四州縣回報前因併遵義縣不致隱匿印結等因到道該本道覆看得真綏桐仁四州縣造報楠木根株併陸續轉江以及需用人夫錢糧等項逐欵登答前來覆核其木株之多寡册內已各稱某地産幾株長若干圍圓若干矣覆核其水陸運之所經册內已各稱從某至某矣獨是每株大小應用夫數並估計口糧鹽菜既無成例可以折衷惟有伏候憲裁酌奪等因到司該本司查看得楠木乃欽工之必需也蜀當繁庶之時培植頗多奈自蹂躪之後濵水州郡及道路平坦之地人迹所到無不焚燬殆盡且二十年來荒草茂盛以致佳木凋落故梁棟之材絶為稀少本司自奉行後仰遵部限屢催查報奈各屬具報十無一有即再三嚴駁不過願具甘結今幸催到遵義道查報樹株長徑尺寸前來竊幸可答部命但慮深山大箐峭壁懸崖人迹從來罕到距水最為隔逺現在踏勘猶號艱難則將來伐運之費誠不易為力也除各屬具結嚴駁合將遵義道所報樹株册籍呈報憲裁具題等因到臣據此該臣看得部行需用楠木事關欽工何敢草率溷覆業經臣咨部展限在案實因蜀罹兵燹之後即巨樹良材咸遭焚伐且無培植求其千百年長養拱抱堪為朝廷梁棟者誠不能如當年之可指畫而得也臣查蜀志所載馬湖永播素産楠木屢經嚴檄駁催今據署布政司按察使司李翀霄造報遵義府屬查勘樹株尺寸夫匠錢糧數目前來其樹株之果否合式堪充上用臣等未敢懸定應聽部議作何分别酌量示行即此現在查報之木亦俱産於林箐深麓之中巖險迫窄採運倍難拽移至江萬分艱逺需用夫匠浩繁所費錢糧不資既據該司呈報到臣自應先行據實題報以聽部核除將原册印結送部外臣謹會同督臣苖澄合詞具題伏乞皇上睿鑒敕部議覆施行題報溫犍峩彭屏宜髙興八縣楠木疏巡撫四川都察院右副都御史張德地題為請旨事康熙六年十一月初五日據署四川布政司事按察使司李翀霄呈稱奉本院案驗康熙六年五月二十四日準工部咨工科抄出該本部題稱該臣等查得會典開載成造宫殿遣大臣往四川湖廣浙江採木今建造太和殿理應需用大楠木應請敕下四川湖廣江西江南浙江督撫稽查現在採就木植或山中出産木植長徑尺寸根數需用錢糧確估俱限以文到兩月內報部酌議可也等因康熙六年閏四月十二日題本月十四日奉旨依議欽此欽遵抄出到部相應咨會等因移咨到臣該臣看得楠木乃宫殿急需臣嚴行遍查屢經催駁不啻三令五申祗因蜀省幅員遼濶山路﨑嶇往返動稽時日兼值流冦之後巨樹良材焚劫無存先據遵義府屬報到踏勘樹株夫匠錢糧數目隨經臣會題在案今據署布政司按察使司李翀霄續報成都府屬溫江嘉定州屬犍為峩眉重慶府屬彭水馬湖府屬屏山敘州府屬髙縣宜賔興文等通共八縣樹株尺寸人工錢糧數目造册前來其樹株果否合式堪充上用臣等未敢懸定應送部候議作何分别酌示遵行至於嚴駁再三查明咸稱地方不産楠木各府屬所具不致隱匿如虛甘罪印結除彚送部外臣謹會同督臣苖澄合詞具題伏乞皇上睿鑒敕部議覆施行題報採運楠木條議疏巡撫四川都察院右副都御史張德地題為敬陳採辦楠木之法上可無誤欽工不致糜費錢糧下可確實辦運不致纍及殘黎事竊照採辦楠木關係建殿急需臣冒險夷方遍至産木處所盡為查勘前至馬湖並遵義查出楠木株數丈尺圍圓另疏題報外臣查各州縣所報之木雖有大小長短之不同臣親披荆負棘直至各箐山頂踏勘而棟梁巨材各箐之中大約皆可採辦以資國用但其箐之大者周圍有五六百里其小者亦有一二百里非一朝一夕可以盡悉必須按日細查方可採取如離小溪五十里至百里者猶可採運若百里之外者山勢愈峻道路愈險雖有大木無可如何矣臣隨傳綏陽縣查出舊時木厰附近居民吳之璽梁維棟任明選等三人親問採木之法據供故明時綏陽設有一厰地名南宫北掃當日設有督木道一員駐涪州有督木同知一員專管錢糧架長斧手俱係湖廣辰州府人奉上司文著落辰州府召募來川人夫係本官召募架長看路找廂找廂者即墊低就髙用木搭架將木置其上以為拽運之説也斧手伐樹取材穿鼻找筏人夫拽運到河用石匠打當路石篾匠做纜子鐵匠打斧頭與一應使用器具一厰用斧手一百名石匠二十名鐵匠二十名篾匠五十名找廂架長二十名楠木一株長七丈圍圓一丈二三尺者用拽運夫五百名其餘按丈尺減用沿路安塘十里一塘看路徑長短安設一塘送一塘到大江九月起工二月止工三月河水泛漲難以找廂施工先於七月內動人夫五十名尋茹纜皮堆集放於廂上取其滑以拽其木每夫日支米一升雇工銀六分斧手架長日支米一升雇工銀一錢伐樹用三牲祭初一十五用豬羊祭其肉分給匠役人夫督木同知將放出木頭赴督木道交割八十株找一大筏召募水手放筏每筏用水手十名夫四十名差官押運到京等語據此又據署遵義府事成都府通判馬御世會同各州縣列欵條議到臣臣酌古凖今因革損益恭列數欵為我皇上陳之一督木之官宜専也臣查故明採辦設有專官管理木厰一應錢糧出入召募夫匠等事此其專任今以臣管見於馬湖應設一厰遵義應設一厰每厰用督木同知一員凡採辦事宜專其責任令其設法分頭覔採以供欽工之用果廉能辦事急公奉法則聽臣奬勵若糜費錢糧擾害地方聽臣題參一切錢糧出入木植已完未完聽臣綜核報銷庶賞罰明而彼知有懲勸恪供乃職錢糧不致糜費地方不致擾害而欽工方克有濟矣一夫役宜預為召募也産木之處人民無幾即盡其州縣之老壯男婦不過一二百人即俱充木夫不能運一木况大工一舉刻不容緩四川有土無民久在睿照勢必於附近富庶省分召募人夫五千名押送來川分給兩厰拽運庶人夫既足方可按時採辦計日運解不致有誤限期矣一斧手架長宜提取也查採木舊例斧手架長俱出湖廣辰州府其斧手砍伐穿鼻架長尋路找廂皆其慣習各有定法若不得其人木料必致撲損勢必於辰州府召募斧手二百名架長四十名押送來川分給兩厰庶安頓布置得宜而巨材易於伐運矣一棟梁之材宜請定式也若不先定丈尺株樹則錢糧夫匠之多寡難以懸度合無請明長若干丈圍圓若干尺定為號數若干株以便按式採取若木數既定則木植之大小距江道里之逺近用工之多寡方可照數估計錢糧確實有據不致有浮冒之弊矣一錢糧宜預請撥也四川逺在天末若待起工方請部撥而往返稽遲動需半載未免有誤欽工合無俟內部議定合式楠木若干株預行酌撥錢糧若干兩先運來川以資夫匠工銀米菜之需如有餘則存留别支如不足再請撥給總於運木到京之後總造清册報部銷算庶錢糧既足不致臨時掣肘而採運無難矣一木商斷不宜用也臣查故明初年專官採辦事克有濟及至末年信用木商領銀採辦一經入手任意花銷且於採木地方動以皇商為名索取人夫種種擾害不一而足以致里民驚逃而銀歸之烏有究竟並無一木得濟實用雖將姦商監禁追比徒然株連無辜終無抵償此輩原係亡命棍徒又無功名可戀身家可惜是以斷不宜用恐至糜費錢糧貽害地方耳一找筏完結入江起運宜逐省撥夫遞送也蜀省到京水程最逺約有年餘若不逐省遞送誠恐沿路遲滯查馬遵二府小溪俱會合於重慶大江由重慶而下夔關徑通湖廣若木植運抵楚界必須逐省沿途州縣撥水手人夫遞送前去仍各具不致耽延印結報部庶各地方皆有專責可無沿途遲滯之虞以上七欵俱係採辦事宜出臣管見至於需用夫匠錢糧必請自部撥若責令雇募夫匠到厰之日照舊時採運之例匠役架長日支米一升銀一錢夫役日支米一升工價銀六分而犒賞之費不與焉若於外省提撥但於日支米一升之外量給鹽菜銀兩而已應否採擇統候內部從長議覆請自睿裁非臣所敢擅專也理合具題伏乞皇上睿鑒敕部議覆施行康熙八年二月初四日題奉旨修造宫殿所用楠木不敷酌量以松木湊用已經有旨令著停止採取該撫速回省城料理地方事務該部知道署分巡永寧道馬湖府知府何源濬為請旨事據馬湖府詳前事康熙二十四年二月初四日奉布政司信牌轉奉巡撫四川都察院韓世琦憲牌準工部咨營繕清吏司案呈奉本部送工科抄出題前事內開該臣等查得四川巡撫韓世琦疏稱照部單所開之數逐一加算共得合式楠木四千五百零三根夫匠運價共需銀十二萬五千三百六十兩九錢合式杉木四千零五十六根共需用價銀三千零三十八兩五錢已足建造太和殿等因具題前來查先經臣部覆前任偏沅巡撫韓世琦疏內不合式楠木不議外其合式楠木四百八十七根杉木一千三百四十三根應聽各官捐輸運至等因具題奉旨這合式不合式楠木俱應捐助運送著再議具奏餘依議欽此隨將合式楠木四百八十七根不合式楠木四千二百五十五根俱應聽各官捐輸運送其公署內合式楠木四十根不合式楠木一千二百九十三根俟各省查木細册到齊之日再議題覆奉旨允行欽遵在案今江西廣東廣西山産合式楠杉木植相應行令該督撫俱照湖廣捐送之例設法捐輸差賢能官員毋致纍民運送到京除四川册報多餘楠木杉木不解外其餘楠木杉木已足建造太和殿亦應照湖廣例令其捐輸運送但需用錢糧頗多如全令捐輸遲誤亦未可定應行文該撫將所需錢糧再行嚴加核減設法酌量捐輸差賢能官員毋致纍民速運至京如捐輸錢糧不敷該撫將不敷數目題明聽戶部撥給正項其用過錢糧俟該撫造具清册題到之日查核其江南查得商人市賣杉木四千零十根辦買價銀七千八百八十三兩零又江南江西浙江福建湖廣公署合式楠木二百四十根不合式楠木三千四百四十三根楠木杉木已足建造殿工應將合式不合式楠木並辦買杉木俱停解送其四川酉陽湖北卯洞土司等所捐楠木行查至今未到應俟該撫查明到日再議可也等因康熙二十三年十月初八日題十一月初三日奉旨依議欽此欽遵等因備案行司移道行府該卑府看得採木以備欽工乃最為重大之事凡為臣子自宜竭蹶圖維以期良材克濟尚敢置喙於其間耶但細繹部文有將需用錢糧再行嚴加核減之語因思所用錢糧之多寡視乎大木採運之難易若事實艱難而求減費恐勢有未能卑府在湖言湖以馬湖之木計之查楠木皆生於深山窮谷大箐峻坂之間因其險逺人迹罕到所以能存此木於今日當砍伐之時非若平地易施斧斤必須找廂搭架使木有所倚且便削其枝葉多用人夫纜索維繫方無墜損之虞故明時必召募架長斧手於湖廣辰州府始能找廂伐樹此砍木之難也拽運之路俱極險窄懸崖側足空手尚苦難行用力最未容易必須墊低就髙用木搭架非比平地可用車輛上坡下坂輾轉數十里或百里始至小溪又苦水淺平時不能浮木且溪中皆怪石林立必待大水泛漲之時漫石浮木始得放出大江然木至小溪利於泛漲木在山陸又以泛漲為病故舊例九月起工二月止工以三月河水泛漲難於找廂是拽運於陸者在冬春拽運於水者在夏秋非可一直而行計日而至此拽運之難也至若所用夫役動以數千計蜀地民稀即盡一郡一邑之老壯男婦不足充木夫之用况有耕耘之業乎勢必出於雇募而應募者多係外省遊手之人無家屬之相繫伐木拽運乃艱辛之役必用厚值相雇稍經磨苦即易逃竄若必雇募本地有身家者則寥寥戶口應募無人查康熙八年前院張德地條議於外省召募夫役五千名以供採辦蓋有見乎此此夫役之難也至若經費一項康熙八年前院張德地題敬陳採辦楠木之法等疏一事內議每夫日支米一升雇工銀六分斧手架長日支米一升雇工銀一錢其合計錢糧之多寡則視乎人夫匠役之多寡與閲厯時日之遲速耳但查蜀志內載萬厯三十五年採辦木枋通共二萬四千六百一根塊彼時司議照萬厯二十四年估計規則共約用銀三百六十三萬餘兩彼當川省人民繁盛夫匠易集之時其費如此今通省查報合式楠杉二木共八千五百五十餘根而估計夫匠運價只共銀十二萬八千三百餘兩可稱萬分節減所慮蜀省文武官員逺宦天末處境苦寒非同腹裏富庶之地盡捐俸薪之外别無可措即其所捐恐未能克辦大役此經費之難也再查部文內有運送到京之語但蜀中水手止諳川河水性至於經歷之湖廣江西江南等處均屬大江風浪易作水性各有不同而山東北直閘河之行動則又有異非各省應付水手人夫遞運恐有漂沒之虞則經過地方作何接替其法不可不預為議定非先期行知各省不可也此運送到京之難也以上數事皆卑府管見確知其然一馬湖如此全省可知與其拮據於後孰若詳審於前擬合詳請憲臺預賜籌酌將不敷之處早請撥給庶欽工有賴不致貽誤矣等由呈詳到道據此該本道看得楠杉二木乃欽工所需業經查數具報奉行令各官捐助解運本道遵即轉行所屬嚴催捐運矣今據馬湖府詳稱大木皆産於深山窮谷人迹不到之地懸崖峭壁非比平地易施斧斤可用車輛必依古法找廂搭架多用人夫維繫以免墜損此砍木之難者一拽運數十里或百里方至水次路極險窄上坡下坂難用車輛必須墊低就髙搭架挽運古法九月興工二月止工以三月河水泛漲難於找廂耳及至水次溪淺石多阻礙難運必待泛漲之時木才得出此拽運之難者二所用夫役甚多本地民少不足充夫勢必雇募外省遊民多索雇價磨苦易逃此夫役之難者三查蜀志內載萬厯三十五年採辦木枋共二萬四千有零根塊彼時川省人民繁盛夫匠易集之時約費帑金三百六十三萬有零今通省所報楠杉二木共八千有零亦當年三分之一矣而計費僅十二萬有零可為萬分節省况捐助有限必致不敷難議核減此經費之難者四至運送到京所過之長江閘河水性各異非本地之水手人夫接替遞運恐有疏忽之虞必先立遞運之法行知各省照界交代庶臨時無誤此運送到京之難者五等情詳報前來鑿鑿可據且敘瀘二屬如永寧瀘州兩畨遇賊殘破之後敘郡被困屯兵之餘地方凋疲元氣未復舉事萬分艱難查報之木距水次逺近先經册報在案其所難之處與馬湖府所詳大同小異者也即據請詳前來擬合詳請憲臺俯賜籌酌如不敷之處作何請補夫役工匠作何召募畫一定規庶臨事不致貽誤而大役乃可有濟也除臨期或有繁難通變之處另行詳明奏請外為此云云四川等處承宣布政使司布政使加四級劉顯第為請旨事該本司查看得四川省所産楠杉二木前經欽差齊郎中率同川東建永等道親厯查勘共獲合式楠木四千五百零三根合式杉木四千零五十六根統計夫匠運價共需銀一十二萬八千三百九十九兩四錢業經本部院同欽差核確具題蒙部議查出合式木植照湖廣例捐輸運送又因需用錢糧頗多如全令捐輸遲誤亦未可定應將所需錢糧再行嚴加核減設法酌量捐輸差賢能官員毋致纍民速運至京其捐輸不敷錢糧題請撥給正項仰見皇上軫恤遐荒凋敝睿計萬全及大部持籌巨務節省錢糧無不極詳且周本司遵奉憲行隨即備移會同松茂川東建昌永寧四道將所需錢糧嚴加核減仍倡率所屬勉力捐輸及疊次駁詰開諭兹準各道陸續牒覆前來查所屬錢糧毫釐皆係公帑凡為臣子者惟恐不能節省上報皇仁於萬一豈敢輕為多估致干糜費之愆覆查蜀省志書開載明朝採木事宜計採辦木枋二萬四千六百一根塊共估銀三百六十三萬餘兩此時地方富饒人民繁盛其木不過平常之材猶估計至如許之多今計查獲合式楠杉二木共八千五百五十九根木數較之前數有三分之一更加棟梁之選所需夫匠運價止估計一十二萬八千三百九十九兩四錢零是所估較前數僅十分之一况地方疊罹兵燹人民稀少物力凋耗非昔殷實時之所可同日而語即前估計之時乃蒙本部院與欽差戶部齊郎中率同司道等官悉心確核惟恐少浮業經一減再減反覆酌計委係至少之數猶慮將來夫匠以工費不敷致滋紛擾斷斷乎再不能稍減者也至如設法酌量捐輸四川荒殘之區大小各官僅藉俸銀以糊口再四勸諭僉稱身荷朝廷豢養洪恩值此舉行大工敢不勉效犬馬微忱且蒙本部院體國急公首先倡捐銀三千兩本司勉抒蟻忱亦措捐銀千兩至提督泉司各道府州縣所捐雖五百三百以至數十兩不等然涓滴纎埃悉盡心竭力罄厥忠悃合計通省大小各官共捐輸銀二萬一千九百三十五兩七錢三分一釐九毫九絲一忽相應分晰職名銀數造册齎呈較以原估之一十二萬八千三百九十九兩四錢零計算尚不敷銀一十萬六千四百六十三兩六錢六分零應請具題候部撥給竊惟所需錢糧實不能再減各官捐輸僅有微數至於採伐運送之處又不能不為急酌焉查前估計册內載採伐楠杉二木找架需用架匠伐木穿鼻需用木匠造運木車輪需用木鐵二匠製拉木篾纜需用篾匠搭運木天橋需用木石二匠又大江扎筏須用木匠統計分厰採伐每日所需必得架匠四十名木匠四百名鐵匠一百五十名石匠一百名篾匠四十名方可分撥聽用查各項匠役四川止可備木匠二百名鐵匠一百五十名其餘各匠蜀民並無諳習之人康熙六年前院張德地奉文採木時曽議將架長斧手取之辰州今計此架匠篾匠必派取湖南至不足之木匠二百名及石匠一百名必分取秦楚兩省其匠役雖取諸鄰省而匠役之工費仍照估計之定數於四川給發又採木夫役查前估計册內開造採伐楠杉二木找架與夫伐木穿鼻以及陸路拉木搭蓋運木天橋並小溪河需用撥運夫江內找筏需用砍運雜木夫等項統計每日所需必得夫五千名方可分撥若令在於四川備辦蜀省人民無幾朝野共知至多者不過一二百名少則僅數十名萬不足三分之一本司再四籌計四川止可雇備夫三千名其餘二千名必於鄰近秦楚二省幫協而夫役工費仍按估計之定數在川給發又皇木入於大江查前估計册內開載楠木需用頭舵工各六百五名需用橈夫七千二百六十名在川省即有一二頭舵工止可驅䇿於川江且頭舵工及橈夫所需如許勢必於楚省請協一半若湖廣江南長江大河非川江可比須得彼地之人熟諳水性者方可勝任况皇木重大萬不敢令未嫻篙櫓者冒昧操楫是應於經過省分預備頭舵二工以及橈夫接替更換運送赴京其頭舵工橈夫日費仍令川省解運之官按估計定數給發但工匠夫役則謹請鈞裁矣至木之下水與轉折於溪河又不能無議焉竊惟建造太和殿乃聖天子肇造萬年鞏固之基山川草木罔不效靈豈用下吏鰓鰓過計奈四川産木地方俱係崇山密箐絶巖危溪上則險於登天下則墜於深淵陸路惟附葛攀藤水路多線流巨石前此欽差齊郎中同各道單身查勘尚需二年之久始得報竣况大木之出山紆回周折固非月日可計及至于小溪河水大猶易於撥運倘水涸微細之時縱有人力莫可施為勢必延候水漲此中經年纍月難以預定均所當仰請題明者也緣係欽工大典採運事宜本司不敢避其瑣屑臚列敷陳伏祈本部院鴻裁核題統候部議示覆等因奉批蜀省查獲合式楠杉二木共八千五百五十九根前經估計採運等費共銀一十二萬八千三百九十餘兩既經復核萬難再減今將本部院倡先捐輸併通省文武各官共措捐銀二萬一千九百三十餘兩彚册造報前來尚不敷銀十萬六千四百六十三兩零仰候具題請撥正項至於各項匠作夫役除蜀省自行雇備之外其架匠四十名篾匠四十名循例派取湖南至不足之木匠二百名及石匠一百名與採木等項人夫二千名請行秦楚二省各相幫協至於木入大江需用頭舵橈夫共計七千九百六十九名應於楚省請協一半並木植經過地方行令預備頭舵橈夫更換運送赴京以上各夫匠工費均於川省原數內給發各緣由統候一並題明並聽部議遵行繳分巡川東道按察司僉事霍焜為請旨事康熙二十四年九月二十六日奉署理四川巡撫印務布政使司劉顯第憲牌康熙二十四年九月二十三日準工部咨營繕清吏司案呈奉本部送工科抄出題前事內開該臣等查得四川巡撫韓世琦疏稱蜀省應解合式楠杉二木共八千五百五十九根估計需用銀十二萬八千三百九十餘兩通省文武各官共計捐輸銀二萬一千九百三十五兩零尚不敷銀十萬六千四百六十三兩零乞照數撥給查先經臣部覆四川巡撫韓世琦疏內川省合式楠木杉木亦照湖廣例捐輸運送錢糧不敷該撫將不敷數目題明聽户部撥給正項錢糧等因具題在案今該撫既稱除捐輸銀外尚不敷銀十萬六千四百六十三兩零應行戶部照數撥給正項錢糧又疏稱採運楠杉二木需用架匠四十名篾匠四十名木匠四百名鐵匠一百五十名石匠一百名蜀省自兵燹之後戶口寥寥止可備辦木匠二百名鐵匠一百五十名其餘各匠蜀無諳習之人其架匠篾匠應於湖南派取木匠石匠於秦楚二省分行派取又找架伐木及拉木搭橋撥運等項統計每日需夫五千名蜀省止可確辦三千名其餘二千名應於秦楚二省幫協又運送楠木需用頭舵工各六百五名橈夫七千二百六十名杉木需用頭舵工八名橈夫九十六名川省止有一二頭舵工所需如許請於楚省派協一半其各夫匠工費仍在川省估計錢糧內給發等語查蜀路險民稀木植又多匠夫既不足用應令陜西湖廣湖南督撫於所題之數會同確議就近分派數目雇覔幫協其需用雇價俱於川省估計銀內照原估數目給發又疏稱木植一至湖廣江南須得彼地熟識水性之人方可勝任庶免疏誤之虞乞於木植經過省分預備頭舵橈夫接替運送等語查康熙六年四月內原任偏沅巡撫題報起運建造太和殿楠木一疏臣部題覆行直𨽻湖廣江南山東等各省巡撫將前項木植解到各該地方水路酌量不勞民力設法運送在案今川省路途遙逺黎庶寥寥與他省不同且所需頭舵橈夫甚衆如令直送進京必致經年纍月棄産拋家有纍於民相應亦如該撫所題行令經過之湖廣江南山東直𨽻各省雇覔頭舵橈夫逐省更換運送至京其雇價亦於川省原估銀內照數給發仍行各該督撫嚴飭地方官於木植到日照數雇覔更替不得因預備擾纍小民運送時應令川省遴選賢能官員運送木植進京沿途給散夫價不得侵冒如至更替夫役省分亦令各該督撫選委賢能官員帶領夫役交替運送如有借端科派纍民者該督撫即行指名題參可也等因康熙二十四年七月初一日題本月初一日奉旨四川人民稀少且屢經兵火困苦已極採辦楠杉等木甚屬艱難起運又派别省民夫絡繹解送必致大纍小民今各省所報起解木植數目曽否足用著察明確議具奏欽此欽遵於本月十一日抄出到部該臣等再議得四川巡撫韓世琦具題解運四川楠木杉木一案臣部題覆奉旨四川人民稀少且屢經兵火困苦已極採辦楠杉等木甚屬艱難起運又派别省民夫絡繹解送必致大纍小民今各省所報起解木植數目曽否足用著察明確議具奏欽此查得四川所報建造太和殿需用楠木共四千五百零三根於原估數目查對多木四十三根將此多餘楠木停其解運外其福建廣東廣西湖廣所報楠木並各土司捐助楠木內酌量大小折作明梁金柱簷柱墊板枋子􆀢木斗科等項應用其四川應解大木內應扣除一千七百九十七根停其解運各省所解杉木已經足用四川省杉木四千零五十六根亦應停解所有不敷梁柱等項應用大木二千六百六十三根仍令四川運送其應減楠木杉木所需匠夫頭舵橈夫運價等項該撫具題册內並未分晰細數不便懸減仍令行該撫將此項逐一核減並將起解楠木所需匠夫頭舵橈夫運價核定議題到日再議候命下之日將四川應解楠木丈尺數目開單移咨該撫可也等因康熙二十四年八月初一日題本月初五日奉旨依議欽此抄出到部送司奉此相應移咨案呈到部移咨到院準此擬合就行為此仰道官吏查照部覆奉旨及粘單內事理即將四川所報建造太和殿需用楠木四千五百零三根與原估數目查對將多餘楠木四十三根停其解運外其福建廣東廣西湖廣所報楠木並各土司捐助楠木內酌量大小折作明梁金柱簷柱墊板枋子􆀢木斗科等項應用四川大木內應扣除一千七百九十七根停其解運其各省所解杉木已經足用四川杉木四千零五十六根亦停解運所有不敷梁柱等項應用大木二千六百六十三根仍令四川運送其應減楠木杉木所需匠夫頭舵橈夫運價等項逐一分晰細數核減並將起解楠木所需匠夫頭舵橈夫運價核定星速造册確議詳報以憑具題聽候部議施行毋得遲誤慎速火速等因奉此除應用大木逐一分别細數確定所需匠夫頭舵橈夫運價等項會議核減造册另文詳報外該本道查得前報闔省楠木今奉部文應採辦大木二千六百六十三根運送進京需用明梁金柱等項大木産在東路遵義所屬者甚多採辦維艱扣算準咨日期部限四個月轉盼即屆其採辦搭架找廂修理道路以何處所産楠木就近出水為便則不可不覆勘確實俾易者酌量修路設厰便於採運其難者亦不可不存留免採節省工匠所當亟為斟酌辦理以副嚴限今本道會核計册事已告竣應照部文前往遵義各屬産木處所覆勘採伐楠木設厰及修理道路以便詳委遣官辦理庶欽工尅日告竣而部限不致遲誤矣除詳督憲外理合詳明為此具由同書册呈乞照詳施行須至呈者條陳採運楠木疏國朝戶部尚書王隲山東人奏為殿工之需材甚殷採運之民力實寡謹陳見聞仰祈睿鑒以免遺誤以安殘蜀事該臣案查康熙二十四年七月初一日工部議覆四川巡撫韓世琦題報採運楠杉捐輸銀兩數目並稱全蜀戶口寡少夫匠等項請派附近之陜西湖廣等省分協幫一疏奉旨四川人民稀少且屢經兵火困苦已極採辦楠杉等木甚是艱難起運若派别省民夫絡繹解送必致大纍小民今各省所報起解木植數目曽否足用著查明確議具奏見報之日全蜀臣民莫不感泣嵩呼咸頌我皇上明見萬里之外幸蜀省鋒鏑殘黎瘡痍未起復慶更生有路也後經部議各省應解杉木足用將四川應用杉木四千零五十五根免解所有各省應解楠木不敷梁柱等項於四川所報需用楠木四千五百零三根內扣除免運共一千八百餘根仍令運送二千六百六十三根奉旨依議欽遵在案是四川楠杉二木邀恩已免十分之七矣建造太和殿近係萬國之觀瞻逺係聖子神孫萬年之基業採運木料臣下職分子來共在民心艱難豈忍置喙但事遇艱難有勉強竭力而後可為者有勉強竭力而終不能為者臣一介書生忝任分巡道員在蜀五載略有見聞今當代覲敢避斧鉞不以入告上負皇上視民如傷之念下負臣子事君盡忠之義所有蜀土山川險易之勢蜀民轉運艱苦之情敢為聖明陳之蓋四川四面環山巉巖虧蔽惟成都府境左右稍稱平衍所産並無大楠臣曽出勘産木處所如沙坪灌口賈家山何家山等處俱屬峻嶺懸岩運路自山抵江或百餘里或七八十里所經由者俱屬深澗幽壑一溪之行紆折幾盤必費多力而始轉一石之塞橫互長川必待暴水而後過較他岡阜迥逾千倍此臣之所見也至若遵義馬湖等府之楠木大材尤俱産諸髙山窮谷老箐密林之中非獨人迹不到即鳥道亦稀前撫臣杭愛登山督察時遙望一木所在必縴拽始至其地足胝履穿攀藤骨戰側身亦苦難立砍伐何以施工臣嘗細訪輿論皆謂今存大楠因其斧斤難施所以在山長年至於運道﨑嶇罄竹莫盡其尤甚者如遵義府屬之落水孔豬閬孔細鱗洞􅝤子峽曲折之字拐彎天生橋三箇硐葫蘆硐水從硐中流出又下魚硐須搭天橋長三百六十餘丈等語馬湖屬內則有髙硐赤岩黑岩偏橋板鬼溪豬閬岩弔藤岩九溪三渡水等處峭壁乾溝亂石壅塞山水旋長旋涸不能濟運等語此臣之所聞也即以參考古法採取必須找廂搭架拽運必須墊低就髙輾轉上下木在溪澗利於泛漲木在山陸又以泛漲為纍故陸運必於春冬水運必於夏秋忽水忽陸非可一直而行計日而至其大概然也臣伏讀採辦楠杉等木甚屬艱難之旨固已密悉聖聰矣如使民力稍可足用竭力所當勉圖顧四川幅􅊷雖廣滿目祗有荒煙百里竟無半竈當進兵運糧時疲病死亡鄭圖難繪臣伏讀四川人民稀少且屢經兵火困苦已極之旨又已密悉聖聰矣幸托天威蕩平數年以來老弱安生瘡痍漸起但以通省之戶口總計之仍不過一萬八千九十餘丁是合全蜀數千里內之人民不及他省一縣之衆就中抽發五千入山採辦楠木其供送衣糧器具者勢不可少又將動用千百遣發饋送逺者千里近者數百里耕作必致全廢國賦誰為輸將且度山度嶺多恐失墜風棲露處恆懼虎狼種種情狀不能殫述且蜀值風鶴之後民情慣聽訛傳前察木時工猶未動聞風私逃攜妻挈子拋棄室家若實在動工用夫之際豈不逺則他徙近則走險乎其採運之艱難人民之稀少民情之搖惑如此四川楠杉雖已解運十分之一而所運用之大木二千二百六十三根斷不能如他省之解運者可以按數按期而至也殿工不容少稽川運誠恐致誤臣請敕四川撫臣姚締虞親詣産楠處所察勘應運楠木有設法竭力可以砍伐者共若干株有雖設法竭力而不能砍伐者共若干株其必不能砍運者俟奉旨之日定奪其可以砍運者星速採取趲運俾百姓曉然共知惟視其力之所可為而不強其力之所必不能為各守本業踴躍從事不致狂惑竄匿庶殘疆子遺頂戴皇上如天好生之德同覆載以無疆而工料亦見實效矣臣已蒙恩升任口北道參議運楠事宜固非職掌但臣任蜀已久熟悉情形仰體皇上愛養小民軫念殘疆至意敢就在蜀所見所聞披􅅹實陳事屬條陳運楠事宜字多逾格貼黃難盡如果芻蕘可採伏乞睿鑒全覽施行巡撫四川等處地方提督軍務都察院右僉都御史加一級憲德為欽奉上諭事雍正六年正月初七日準工部咨辦理萬年吉地事務處案呈雍正五年十二月初五日準工科抄出工部等議奏前事內開雍正五年十月初九日內閣交出奉上諭昨蘇州巡撫陳時夏因金磚事具奏前來已交該部議奏萬年吉地所用楠杉木植前已降旨交與該督撫等動用正項採買不許尅漏恐地方官員陽奉隂違仍有擾纍民間之事應再行申飭凡需用各項物料俱著該督撫動用正項錢糧照時價給與不許分毫尅扣務令小民均得利益自然歡欣樂從其如何辦理方為妥協之處著户工二部會議具奏欽此我皇上聖諭周詳仁恩優渥俯恤民隱洞矚下情惟恐地方官員不能實心奉行屢頒聖訓申誡諄切命臣等將辦理妥協之處會議具奏臣等伏查雍正四年九月二十五日工部奏萬年吉地需用楠杉木植等項請令各省備辦等因奉旨工部查照舊例啓奏朕亦不便改換舊例但楠木難得如果不得即松木亦可以應用其備辦此等木植自京城差遣官員未免騷擾地方即交與總督巡撫著動正項錢糧地方官果係實心料理如不尅漏錢糧事情自然有濟著怡親王大學士馬齊張廷玉會同爾等協辦欽此工部行文山東江南江西湖廣浙江福建四川廣東廣西等省令其採辦在案今奉諭旨臣等謹議得楠杉等木各有出産之地應令各該督撫於所屬內遴選賢能清操之道一員總司其事令其於該省內選委府佐二員分任採辦之差該道於司庫支動錢糧交與分委之員敬謹照式採辦將各省現今所報已得楠木件數併未得數目開列粘單行文各省或有未能盡得合式者或有可以多得者令其互相會同照數採買此採買之楠杉木植悉照時價給值先於採辦地方恭録聖諭遍行出示曉諭務使商民咸知聖恩浩蕩恤商愛民之至意所給價值銀兩務必足色足平使販運楠杉之人得均霑實惠其江南所造金磚山東所造臨清磚令該督撫即委該府縣官敬謹製造務照其工料所需動支司庫銀兩給與價值鐵梨木係廣東專辦應令該督撫即令承辦楠木之員領司庫錢糧照式採辦給與本地時價凡此採辦人員咸當仰體聖心凛遵諭旨敬謹奉行將所辦木磚等項於雍正六年十月內運送抵通倘該員內有不仰遵諭旨陽奉隂違者該督撫即嚴查題參恭候命下之日户部動撥欵項行文各該省督撫欽奉遵行為此謹奏等因於雍正五年十二月初二日奏本月初四日奉旨各省採辦木植等項俱著該督撫遴選賢員辦理照民間價值給發不許絲毫尅扣務令均霑實惠仍著督撫等時時留心察訪俾屬員敬謹遵奉倘稍有不遵諭旨之處朕必訪聞將該督撫等一併從重治罪欽此欽遵相應行文各該省督撫可也為此合咨文前去查照施行等因到本都院準此合就檄行巡撫四川都察院右僉都御史憲德題為欽奉上諭事該臣等看得辦理萬年吉地需用楠杉木植先經前撫臣馬會伯準咨檄行布政司委員遍行覔採及臣到任復又嚴檄飭催在案嗣準部咨隨檄行布政司欽遵動支庫銀遴選賢員承領採辦續據該司詳請經臣檄委川東道參議陸賜書總理辦運速赴司庫承領銀兩星速採辦並飭先將採辦合式木植運送工價銀兩數目詳報以憑具題並咨會各省去後兹據布政使管承澤詳稱除移川東道通行所屬一體遵照採買購覔及續據不産楠木之各府廳州縣各出具不致容隱印結在案惟據産楠木之馬湖府屏山縣巴縣廣元洪雅犍為丹稜宜賔汶川井研納溪遵義真安州綏陽仁懷桐梓南川等府州縣各詳稱所産楠木必得能通大江附近水次者方能轉運今所産合式楠木俱在萬山之中盡屬懸崖峭壁既不能直達大江又無附近水次難以砍伐運送等情除陸續駁飭再加確查果否難以轉運外查有附近水次稍易運送之崇慶州眉州雅州灌縣四處已得合式楠木一百四十四根枋十一塊應請先行採辦起運送京所有已得楠木件數丈尺徑寸一併造册呈齎等情前來臣查既有附近水次合式楠木一百四十四根枋十一塊應即先行運送以應欽工隨即檄飭布政司動支庫銀分發崇慶等四州縣照時價給發不許分毫扣尅作速採辦起運至重慶府交總理川東道參議陸賜書專員送京除咨會採辦楠木各省撫臣並册分送部科外理合題報至出産楠木之馬湖等府州縣果否難以轉運現在嚴檄確查其採辦運送合式楠木一百四十四根枋十一塊動用銀兩數目容臣檄令核實造册另疏題報合並聲明臣謹具題伏祈皇上敕部查照施行臣未敢擅便為此具本謹題請旨四川通志卷十六上欽定四庫全書四川通志卷十六下𣙜政關市之賦載在周禮即𣙜政所自昉也厥後齊𣙜鹽鐵漢𣙜酤唐𣙜茶額漸廣課亦漸增矣我朝輕徭薄稅惟正之外固無煩科抑末之中尤加節制故定額成規奉行恪守蓋纎悉無敢濫取而裕國通商固可以兩全無弊矣蜀民多務耕讀少行商而懋遷有無以化居積者往來輻輳况際德政覃敷之世疇不願操竒贏而出於其塗乎作𣙜政志成都府雜稅四門雜稅設自康熙二十一年原額銀三百七十五兩三錢八分四釐一毫三絲三忽係成都府知府徵收解交藩庫至康熙三十四年自瀘州歸併定額每年實徵稅銀六百九十五兩八錢九分零八毫三絲遇閠增銀三十八兩四錢七分六釐八毫三絲自雍正四年奉文儘收儘解每年除正額外其贏餘多寡不等渝關木稅在重慶府巴縣康熙四十六年四川巡撫能泰題請設立係川東道徵收貯庫未定額數保寧府閬中縣𣙜關設自康熙十九年每年正額雜稅銀一百零八兩七錢六分五釐九毫遇閏增銀一十二兩八錢七分七釐八毫係閬中縣知縣徵收解交藩庫廣元縣𣙜關設自康熙十九年每年正額雜稅銀一千四百八十一兩七錢四分八釐九毫遇閏增銀一百四十三兩二分八毫係廣元縣知縣徵收解交藩庫自雍正五年因人物繁殷商賈輻輳詳請儘收儘解每年除正額外其贏餘多寡不等永寧縣𣙜關舊𨽻黔省額徵鹽雜稅銀四百零五兩雍正三年遵旨報首隨經黔撫題定每年雜稅正額共銀六百四十七兩零四分三釐遇閏增銀四十二兩六錢六分三釐三毫三絲三忽自歸併四川之後係敘永廳徵收解交藩庫夔州府𣙜關設自康熙六年正額稅銀一千五百四十一兩六錢九分二釐五毫遇閏增銀一百二十二兩六錢七分六釐原係夔州府知府儘收儘解雍正五年十二月內四川巡撫憲德疏稱夔關稅課日多已不下於他省鈔關應請照各省監收之例按年遴員更換以慎考核雍正六年部議以雍正七年為始照滸墅淮關之例派差監督一員據實徵收奉旨依議建昌𣙜關康熙六年議裁會鹽寧越各小稅止設建昌一稅正額銀二百二十七兩七錢四分五釐六毫遇閏增銀二十九兩一錢一分七釐四毫係寧逺府知府徵收解交藩庫雅州府𣙜關設自康熙二十一年每年正額雜稅銀二百八十六兩四錢七分六釐遇閏增銀四十一兩七錢九分九釐係雅州府知府徵收解交藩庫自雍正四年清查關稅奉文儘收儘解每年除正額外其贏餘多寡不等打箭爐𣙜關設自康熙四十年定爐之後每年正額稅銀五千三百一十六兩六錢九分八釐九毫派差監督一員徵收自行啓奏開銷題報銷雜稅疏略巡撫四川都察院右副都御史佟鳳彩題為報銷康熙元年雜稅等事康熙三年正月二十三日準戶部咨四川清吏司案呈奉本部送戶科抄出本部覆四川巡撫佟鳳彩題前事等因康熙二年九月初二日題十月二十四日奉旨該部核議具奏欽此欽遵抄出到部等因到臣該臣查看得康熙元年分遵義永寧徵收過雜稅銀共三千六百四十八兩二錢三分零業經造册題報訖部覆查册內未開每年應徵總數場稅未經説明何場雜稅並鹽茶二項應合造清册敕臣另册分疏具題以憑查核等因除各場稅遵照分晰場名另造清册送部外惟部駁每年應徵總數若干查雜稅一項非州縣正賦可比正賦照頃畝定有則例而雜稅惟視比年商販之有無定稅銀之多寡况夔門初定明季舊設之關稅尚未開復不過從稍有商販往來之處暫議設稅原非他省舊設之𣙜關可以定每嵗之額總也再鹽茶二項四川原另有鹽稅茶稅係照引票徵納其數目另造清册報部而雜稅內所報鹽茶二項乃係遵義永寧界連黔省每有鹽茶出關者即納出關之稅原與雜稅同若造入所行引票之鹽茶稅內則行過引票數目反無稽考而錢糧愈見混淆故仍造入雜稅册內臣於題報康熙二年雜稅疏內已經備細敘明矣今準戶部咨查前來理合再行題明伏乞皇上敕下該部核查施行題覆夔稅議裁會鹽等處疏略四川巡撫都察院右副都御史張德地題為請設夔關總稅疏通商賈以裕國課事康熙六年六月二十日據四川布政司左布政使郎廷相呈稱奉本院案驗康熙六年三月十三日準戶部咨四川清吏司案呈奉本部送戶科抄出該本部覆四川巡撫張德地題前事等因康熙五年十月二十七日題十二月二十五日奉旨該部議覆奏欽此欽遵於本月二十六日抄出到部該臣等查得四川巡撫張德地疏稱夔郡實係吳楚上遊明季於斯設稅自叛逆盤踞夔路梗塞是稅湮廢兹冦平時寧舟楫稍通仍宜於此設稅俾一府佐經理徵收自是裕如較之僻處便可以一倍十至寧番越巂會川鹽井梅嶺安寧大壩等處地僻民殘商稅稀少永為禁止以惠商民等因具題前來查該撫雖稱夔郡設稅較之僻處便可以一倍十但應徵確數又未説明至寧番等衛所舊有徵收稅銀遽行裁去恐缺舊額仍應請敕該撫將夔郡設稅共應徵稅銀若干寧番等處舊稅若干今如裁去有無虧缺舊額逐一查明具題以憑再議可也等因康熙六年正月二十三日題本月二十五日奉旨依議欽此欽遵抄部送司奉此相應移咨案呈到部咨移到院準此擬合就行為此案仰該司官吏查照咨案內部覆奉旨事理即查夔關設稅每年應徵稅銀若干其寧番等處舊稅若干有無虧減逐一查明報院以憑具覆等因奉此隨即備移守東下南建昌三道查明確數移報去後本年閏四月十九日準下南道咨據敘州府申移準敘永軍糧廳關文等因到道據此該本道看得梅嶺安寧大壩三處原係邊陬僻壤山箐險阻商賈未通前設立抽徵每嵗些微既無裨於國課近日邊界寥落稅課益為缺少兹據該府申請裁去以恤民困允為妥便擬合咨覆準此又準建昌道牒據監理通判鮑積倉回稱等情又據寧越撫夷同知顧香臨回稱等情到道據此該本道覆查得建邊五衛僻處遐荒舟楫不通陸路險逺漢番雜居古稱不毛凡有往來貿易者率多擔挑背負之小販竟無車載駝運之巨商以致每年所徵之課統而計之會鹽寧越每年所入多不過八十餘兩少則止有六七十兩盈縮不等多寡無額若五衛俱設小稅似覺繁瑣而無實濟不若止設建昌一稅其鹽井寧番越巂每年徵報甚寡相應裁減以蘇商困至於會川衛雖據監理廳呈稱較之鹽井僅約三十餘金仍應裁去準此又準守東道咨據夔州府申稱查得夔關雖已開復商販漸次往來然亦無甚多也蓋以蜀産消滅殆盡貨物不行如各厰無人開鑄而銅鉛無從出賣楚省鹽茶有禁而興販不敢越境舉全蜀通省之人民不及腹裏之一郡安望其擊轂摩肩商賈濟濟能充國課乎卑府請以稅務按月稽查自無隱匿之弊委用擇人自無虧缺之虞若定額以病商又不如因時裕課之為得計也各處小稅如聚腋成裘可否裁留統候定奪等情申道據此查商稅有額天下通行之例但夔地凋殘且係創舉其間徵多徵少原不可以懸定今據該府查復前來相應咨覆等因到司準此隨查守東道之議詞語未確不便具題隨又就近移會巡下東道併行夔州府查取妥議去後催據夔州府申稱該卑府查得夔關一稅厯唐宋元明皆設於下關城鎖遏之處逮今世逺人亡舊額莫考况三峽古稱天險自四五六七八月水勢洶湧船莫能保故商艘於秋夏難行而數目亦難以臆定也今奉有確查之憲行但目今川省凋敝因而商賈亦稀卑府妄議以春冬二季每季定稅銀三百兩秋夏二季每季額稅銀二百兩共約計每嵗一千兩之數俟後日貨物流通商賈漸集請祈嚴飭委官增添額數何所不可此就今日商疏民少久廢初議興復之時勢而言可否允行伏候憲裁等情到司據此該本司覆查看得夔關一稅為巴蜀下流總匯之區昔年川貨之出荆襄達吳粵與夫各省諸貨之入蜀者無不道經三峽途出夔門也雖目今人民寥寥元氣未復蜀土所宜乏人經理將來生齒漸繁蓄植自廣貨物漸出商賈自通舊制既經復設嵗額可望漸增以之較梅嶺鹽井等數處山僻小徑每嵗之稅不過百有餘兩者相去甚懸殊也今設一總要而裁其支流是一處之徵抽即可大倍於數處上可裕國下復便民本院自有定衡也至於建昌道之議留建昌衛而裁去會鹽寧越四衛下南道之議將梅嶺安寧大壩三稅俱裁無非皆以崇山峻嶺舟楫不通肩挑背負貨物有限具稅之名無稅之實也何若夔關當此民物凋零之時尚於每嵗約估千兩之稅公家既獲豐盈之益小民咸荷涓滴之仁此夔稅之當設會鹽寧越梅嶺安寧大壩之當裁不必再計而可決矣等因到臣據此該臣看得夔州府總稅應設寧番等處小稅應裁先經臣具題在案部議夔稅應徵若干寧番等處舊稅若干裁去有無虧額行臣查明具題臣隨行查據詳稱夔關為巴蜀總匯凡川貨之通荆襄達吳粵與夫各省諸貨之至蜀者無不由此出入也但今人民寥寥土産無多商賈稀少每嵗約計可徵銀一千兩俟後日物廣商集自然漸為增額其寧越會鹽四衛與夫梅嶺安寧大壩等處皆崇山峻嶺舟楫不通肩挑背負貨物有限總計每嵗所抽不過百有餘兩大相懸殊若設夔關徵稅而裁寧會等處徵稅不但於額多增即商民均有多便既經查明詳報前來臣謹會同督臣苖澄合詞具題伏乞皇上敕部議覆施行謹題請旨題報渝關設立木稅疏略康熙四十六年四川巡撫都察院右副都御史能泰題為敬陳管見以裕課稅事竊惟川省地方山深林密産木頗多但從前𣙜課之時止將杉板報稅其餘木植槩未議徵查歷年抽稅檔案所收杉板稅銀寥寥無幾且商販所運木植杉板過關時止納板稅其餘木植運赴湖廣江南貨賣者湖廣江南俱係一體抽稅而出木之省反不徵收揆例似有未協應請將川省木植嗣後均照杉板抽稅之則估本徵收庶例得歸於畫一矣臣查重慶為川江上流要區木多由彼經過而夔州府與楚接壤俱係川東道管轄凡稽察木植事宜應責成該道總理徵收如此則商無隱避而稅額亦增矣臣謹會同川陜總督兼管西安將軍事務臣博濟合詞具題伏乞皇上敕部議覆施行清查渝關木稅疏略雍正六年四川巡撫都察院右僉都御史憲德題為據實首報事該臣看得各關稅口贏餘銀兩經徵各官自當據實解報今據川東道參議陸賜書報稱渝關木稅自雍正五年八月初七日到任起至雍正六年四月十七日止收過正稅銀三千二十三兩三錢零照例共收耗銀一千五百十一兩六錢五分零又重慶府知府張光鏻報稱雍正五年四月十八日起至八月初六日止護道任內共報解正稅銀一千一十七兩四錢三分零耗銀五百八兩七錢一分零正護二道一年共報收正耗銀六千六十一兩一錢二分零並據該府張光鏻及重慶府通判馬世藻將從前護道任內所取耗銀一併首報前來臣查渝關木稅每年原額四千七百五兩九錢零從前經徵各官俱按定額報銷自康熙六十年奏請儘收儘解以後稅銀遞減現有雍正三四年報銷銀兩節準部覆行查定議在案今該道等徵收現年正耗銀數已溢於定額則厯年所報減少之數明係侵隱隨行據川東道將康熙六十年奉文儘收儘解以後厯年經徵各官交代起止月日及收過銀數查明造册詳齎到臣批司核議詳追去後兹據布政使管承澤詳稱查渝關木稅自儘收儘解之後節年俱僅照正額報解其所收耗銀並未據實解報以致不敷原額今既據川東道等查明向有加五耗銀均應按年計算盡數扣追查厯任正署各官建昌道汪錫齡應追銀八百四十一兩五錢零重慶府知府蔣興仁應追銀二千七百五十兩五錢三分零巴縣知縣周仁舉應追銀三十三兩五錢九分零重慶府同知楊文斌應追銀八十四兩五錢九分零重慶府知府周天祜應追銀九百二十一兩八錢八分零建昌道安定昌應追銀一百四十六兩六錢四分零又重慶府知府周天祜應追銀二百一十一兩六錢三分零夔州府知府喬鐸應追銀八百七十兩四錢三分零前川東道金德蔚應追銀五百四十七兩八錢八分零蔡珍應追銀三千五十兩五錢六分零以上各員共應追銀九千四百五十九兩二錢六分零相應開明各旗分籍貫詳請參追至此項木稅正耗既已溢於定額嗣後仍請儘收儘解飭令將所收正耗銀兩盡數解報不許絲毫隱匿如經徵之員或有侵隱纍商等弊即行參處等情前來臣覆核無異相應題參請旨敕部文行各該員本旗本籍於各家屬名下著追再查上年奉部駁查雍正三四等年稅項之時該道陸賜書護道張光鏻僅按正稅數目率詳其厯年各官私收耗銀並未查出具詳相應附參但伊等任內自收正耗銀兩今已據實首報並無踵行侵隱情弊應否議處統聽部議臣謹合詞具題伏祈皇上敕部議覆分咨著追施行臣等未敢擅便謹題請旨清查稅銀疏略四川巡撫都察院右僉都御史憲德題為清查稅銀於錢糧有益事該臣看得清查各關徵收稅額贏餘一案續準部咨奉旨準各處將實在數目自行首出其從前多收之處免其究問欽此經前撫臣馬會伯檄行布政司轉飭收稅各員欽遵在案及臣到任復加嚴飭確查令其據實盡數首報去後兹據布政司管承澤詳稱川省稅口除東川府已改歸滇省無庸查報蒲江縣抽收雍正五年分稅鐵正項贏餘銀兩另册報銷夔州府徵收夔關雍正五年分稅銀實數另案詳題外查雍正五年分成都府徵收雜稅銀二萬七千四百五十七兩八分零廣元縣徵收雜稅銀六千七百三十五兩三錢二分零閬中縣徵收雜稅銀三百五十三兩八錢雅州徵收雜稅銀六千二百四十七兩三錢八分零敘永廳徵收雜稅銀四千六百九十二兩二錢五分零五釐監理廳徵收雜稅銀三千三百八十兩一錢七分零遵義府通判徵收雜稅銀一萬二千一百六十一兩八錢八分零以上成都閬雅永建遵等各稅口共經徵雍正五年分連閏四季共銀六萬一千二十七兩九錢一分零內除各關原額共該銀七千二百四十兩五分零遇閏加增銀六百四十一兩九錢三釐零又各稅口在關書役人等工食并一切解稅腳價各關共支用銀二千七百六十四兩九錢五分零外四季總共解收贏餘銀五萬三百八十兩九錢八分零俱按季批解彈收貯庫並無隱匿所有各稅口徵解正額贏餘實收數目相應分晰詳請核題等情前來臣覆查無異謹合詞具題伏祈皇上睿鑒敕部查照施行謹具奏聞條議打箭爐稅務疏略欽差修惠逺廟工臣趙殿最諾穆圖奏為敬陳管見稍補邊疆事該臣等看得四川之有打箭爐實為緊要通衢且西南一帶唐古特等養命之資悉賴於此不可不為整理臣等蒙皇上重恩來此少有見聞何敢以非臣等應干之事不據實奏聞謹將愚見數條敬為我皇上陳之一宜裁冗員以餘稅課也查喇嘛原無收稅之例因打箭爐初定之時番蠻不便專令內官管理始令喇嘛一員同辦事務今皇上盛德逺布此地番蠻無不戴恩恭順與內地之民無異臣等訪聞此地之例打箭爐有明正土司官一員專管本地之人有自藏內派往喀木布名色喇嘛一名專管貿易之唐古特等有把總一員專管貿易之人現在喇嘛一缺除坐分稅銀之外别無事件依臣等愚見嗣後派部院才能有品之官一員令其總管打箭爐地方兼理稅務應將喇嘛一缺裁革再此處有筆帖式二員亦應裁一員止留一員不令干與稅務於稅銀內酌量給與養廉令其辦理翻譯書寫事件如此則地方不擾而稅課得以贏餘矣一宜恤商旅以裕稅課也凡商旅之所憚者不在正課惟在私抽蓋正課有數而私抽無憑臣等聞得現今來打箭爐貿易之人較之往年漸少訪其緣由皆因不恤商之故譬如每銀一兩即收稅三分亦只取其三十分中之一分衆商豈有不欣然願納之理今此處於正額之外添索戥頭添戥之外又索飯錢肆意苛徴全無底止甚至暗蝕稅銀不入正項益無憑查對依臣等愚見嗣後令收稅之員將打箭爐何項貨物當作課幾何之處務照本地價值確算定議報部頒戥稱徴收再查各處稅差俱有部發衆商自行填寫檔册此専為考察一年所收實數而設此處亦應照例發給務令衆商自行填寫不許書辦代書如此則不肖之胥吏家人難以作弊打箭爐之商旅自可較前大集矣等因於雍正七年三月二十日奉旨交議政議奏欽此欽遵該臣等公同議得趙殿最諾穆圖奏稱宜裁冗員以餘稅課等語現今打箭爐既有明正土司官一員又有西藏派往喇嘛等理唐古特等又有把總管理內地貿易之人則管理稅務不須多員趙殿最等奏請將收稅喇嘛裁革筆帖式裁革一員似屬近理查郎中伊特格爾三年差滿此際應換之時應令各部院於司官內揀選才能有守之員命往打箭爐管理稅務筆帖式派往一員酌量給與養廉倘該管官員有隱匿勒索等情令該撫即行題參從重治罪又奏稱宜恤商以裕稅課等語查各關徵收稅務俱視物價之貴賤以定稅銀之多寡打箭爐收稅既係三十分中取一分實為不多惟額外之勒索衆商既不能免應將趙殿最等所開打箭爐收稅單子交與該撫憲德俱照內地各關抽收之例於各路口詳細出示曉諭一例輸稅該部頒發流水檔案令各商據實自行填寫其需索戥頭飯錢槩行嚴禁則侵欺勒索之弊得以全除矣雍正七年四月初四日奏奉旨依議題報打箭爐稅務疏略雍正七年四川巡撫都察院右僉都御史憲德題為奏聞徵收一年錢糧數目事該臣看得打箭爐稅課厯係監督衙門自行報銷原無定額雍正七年經該監督明德奏報徵收雜稅銀兩準部議覆所報稅銀是否儘收儘解可否作為定額之處令臣會同督臣查明據實保題定額等因移咨到臣隨經行司並移咨監督據實查覆去後兹據布政使髙維新詳準監督明德咨移到任以來每月親臨稅卡商人茶雜貨物到關眼同查點徵收稅銀俱係儘收儘解毫無隱匿至打箭爐雖久歸版圖猶係邊末其茶雜貨等項赴爐交易者無幾均屬番蠻人等逺來貿易販賣而該番蠻來止不常又查打箭爐行茶商人多有沿積引張隔年輸稅每年徵收稅銀多寡不一非內地稅口可比惟期關稅毫無隱漏國課有所裨益其永為定額之處誠難預期懸擬等因出具印結移司查該監督所稱實係儘收儘解定額難以預期懸擬之處出自實情並無掩飾是在監督逐年據實報解毫無隱漏則通商裕課即可為永久之成規等情詳齎印結前來臣覆查無異除結送部外臣謹合詞具題伏祈皇上敕部議覆施行臣等未敢擅便謹題請旨四川通志卷十六下
