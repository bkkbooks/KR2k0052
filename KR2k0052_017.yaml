body:
  text: 四川通志卷十七屯田黃帝立丘井出則荷戈入則振旅兵民本合一也自阡陌開而兵農始分矣漢文用鼂錯言募民實塞下趙充國金城之役屯牧湟中屯田之制於斯肇舉其屯於蜀中者歷代有之蓋均其衆以壯邊衛上無養兵之費下無供邊之勞不可謂非制之得也顧蜀中明季被兵土滿而曠幸際我朝太平日久生齒繁而疆隅闢野無隙地軍有餘糧士飽馬騰之象已不必更議屯田而兵食罔弗充足又何庸強介胄之士責以耒耜為哉然則相地度時固不得與李通之屯順陽諸葛之屯渭水同日而語矣作屯田志宋髙宗紹興五年詔淮南川陜荆襄屯田紹興七年以川陜宣撫吳玠治廢堰營田六十莊計田八百五十四頃歲收一十五萬石以助軍儲詔奬諭焉度宗咸淳三年詔除淮蜀湖襄之民所種屯田租舊欠并除之復催者以違制論元世祖四年敕鞏昌總帥汪惟正戍青居軍還屯利州至元二年命四川行院分官屯田十一年置西蜀四川屯田經略司遣瀘州屯田軍四千轉漕重慶十六年以巴哈行西川樞密院事總兵入川平宋諸城之未下者調兵守釣魚山寨屯田明正統元年奏準各處屯種每軍止徵餘糧六石二斗令各處軍職舍人除應襲外每五丁撥地四十二畝耕種照例辦納籽粒二年令各都司衛所管屯官三年滿日造册二千里以裏赴京比較二千里以外從按察司並巡按御史比較又令四川都司衛所屯種水田者納米陸地者納豆八年添設提督屯田僉事以專理之隆慶二年命大臣分督屯田一往江北兼山東河南一往江南兼浙湖雲貴一往河東兼四川諸衛所萬厯六年四川各衛所屯田通共四萬八千八百四分零一十畝三分五釐二毫三絲四忽八微成都右等二十二衛所各項屯田每二十四畝為一分共三萬九千五百九十四分零一十畝三分五釐一毫三絲四忽八微原額屯田一萬二千六百三十四分零八畝五分三釐六毫新增屯田一萬八千九百六十一分零二畝三分九釐八毫遺失清出田一千二百四十八分零二十畝四分四釐四毫四絲額外屯田八百七十五分零二十二畝五分三釐二毫四絲八忽屯糧各項每分徵糧六石通共糧二十九萬四千三百三十九石四斗九升五合六勺三抄一撮八圭一粒二粟成都右等二十二衛所各項屯糧共二十三萬九千七十九石四斗九升五合七勺三抄一撮八圭一粒三粟原額糧七萬五千八百六石一斗三升四合新增糧一十一萬三千七百六十六石五斗九升九合五勺遺失清出糧七千四百九十三石一斗一升一合一勺額外糧五千二百五十五石六斗三升三合一勺二抄今成都右等二十二衛荒廢建昌五衛改軍為民皇清順治七年四川巡撫李國英題為蜀疆屯政肇舉兵民少濟竒荒仰祈聖鑒事案照順治五年七月內準督餉部臣王來用咨準户部咨先該臣奏為兵民以食為天屯田安川本計等事一疏請蒙聖恩允撥濟川牛種銀五萬兩隨行委守東道臣袁一相臣標參將王述宗赴秦接領買過秦牛一千二百七十三隻籽種白米粟米黃豆小麥共四千九百二十四石五斗一升內除水手人夫解官員役支過口糧六百六十九石九斗實到保寧倉四千二百五十四石六斗一升陸續解運入川并買本地籽種榖豆雜糧共二百一十四石一斗二升八合行布政司轉發保寧順慶龍安潼川等府州縣兵民就地開墾耕種又經查取順治六年分收獲屯租數目册報去後今據該司呈稱蜀省頻經荒亂公私交罄新舊介士之芻粟概仰給於秦其轉輸之苦挽運之勞耗費虧折難以縷指本院撫輯殘黎躊躇本計緩之無以養士急之又恐厲民特疏請發牛種開屯蒙皇恩重念蜀困俞發帑銀五萬兩本司遵奉憲檄移會守東道袁一相參將王述宗往秦接領就便採買牛隻籽種管糧右布政吳允茂專任督催保順龍潼各屬量地聚民招徠開墾牛種陸續運至隨交院鎮司道府縣給發兵民且耕且戰統為布分畫一遵行順治六年分乃經始之初領種有先後不同籽種完納有多寡不等計一歲之入除原發牛種尚存兵民外共得稻粟榖豆雜糧府斗六千八百九十四石四斗八升三合折算京斗六千三百四十四石七斗七升四合零此則六年分所收之數也伏乞撫都院移咨報部特賜具題雖涓滴無補於髙深然在匱乏時升合皆膏澤也備細逐一造册開報等因到臣據此該臣逐細查明看得蜀地赤野荒殘招徠無術因於受事之初嘔心區畫思所以還定安集之圗故特請頒牛種贍給開屯以資本計蒙恩霈發銀五萬兩委官買運前項牛種交給布政司臣王原膴查收清楚酌發保寧順慶龍安潼川等屬兵民結廬墾種一以使流離風鶴堅其戀土之心一以使枵腹窮兵少救呼庚之苦聖恩深厚軍民咸被如天矣及查前項牛種自秦至蜀解運良艱向來隨到隨給前後之領種不齊因而量縮酌盈納租之多寡亦異查據順治六年分發兵民領過牛九百三十七隻內除司道各官領牛六十一隻因蜀中無從編徵俸薪莫措故權令自耕以資養亷又除龍安於六年五月領牛二十隻播種逾時應於順治七年承租又綿州領牛三十隻因地荒民少止給民二十隻承租尚存寄養十隻順治六年分實在承租牛八百二十九隻支白米折算籽種連粟豆雜糧共計一千四百九十五石八升民屯共收租稻粟豆雜糧五千八十石兵屯共收租稻粟豆雜糧計一千八百一十四石四斗八升三合通算順治六年兵民二屯共收租稻粟榖雜糧府斗六千八百九十四石四斗八升三合折算京斗米六千三百四十四石七斗九升四合零陸續接濟六年分軍需訖尚有剩存牛隻交保順二府寄養見經陸續招佃給發開屯俟七年終彚報其剩存籽種因六年夏秋官兵糧餉匱絀動支接濟統入兵糧册內另行報銷此雖臣同按臣與司道守令諸臣勉力舉行悉心區置俾仳離少獲生全實聖上軫念窮荒隆恩再造之所致也除將買過牛種銀五萬兩并六年分按例收獲屯租細數逐一另册咨部外今據該司詳報前來臣謹會同按臣張瑃合詞具題康熙六年四川總督苖澄題為革弊務窮其所由興利必圗其可久敬陳管見仰祈睿鑒採擇事康熙五年內兩經部覆奉旨依議欽此備咨到臣隨即備咨撫提二臣及行布政司酌議去後於康熙六年閏四月初四日據布政司呈詳到臣該臣看得蜀省自屠戮以後百里之內幾絶人煙凡兵丁駐劄之處無不有肥美之地可墾則耘播緝防其功固可並奏而無礙也古人行師有虞兵食不繼而分半屯田且耕且戰豈有古人能行於軍旅方殷之際而今人獨不能行於休兵罷戰之日乎臣是以再四思維通盤打算除提標官兵有節制通省居重馭輕之勢未便分撥又建昌一鎮及松潘漳臘小河龍安威茂疊溪平番石泉黎雅等營路俱設在極邊不便輕為抽撥且駐劄之地俱屬不毛難議開種又如永寧一鎮併建武馬邊大壩龍場峩邊潼綿順合等營額設兵丁無幾俱難議抽屯外今酌擬於重夔鎮撥步守兵八百四十名遵義鎮撥步守兵二百名川北鎮撥步守兵六百名水師鎮撥步守兵一千名重慶城守營撥步戰守兵七百五十名成都城守營撥步戰守兵六百名敘馬營撥步守兵三百四十名通巴營撥步守兵二百名仁懷營撥步守兵二百名黔彭營撥步戰守兵三百四十名達州營撥步戰守兵三百四十名巫山營撥步戰守兵三百四十名昌寧營撥步守兵三百四十名太平營撥步戰守兵一百六十名以上共計抽撥屯兵六千二百五十名再照臣標三營亦有節制全省居重馭輕之勢但臣駐劄重慶與重夔水師二鎮相近分布頗周亦應抽撥七百五十名共七千名應查其駐劄處所如逼近邊隘而田地沃衍者即於本處開墾要不致貽誤地方也至興屯所入之數約一人可以耕田五畝每畝約可收榖三石每榖一石約可得淨米四斗計一人五畝所入歲可得淨米六石通計七千人每歲可入淨米四萬二千石此興屯所入之數也至屯本一項計二人耕田十畝應合用水牛一隻農具一付籽種一石通計七千人應用水牛三千五百隻農具三千五百付籽種三千五百石其價值計水牛每隻應用一十四兩農具籽種每石付各應用一兩通計應需五萬六千兩此應用屯本之數也惟是錢糧不敷之際此項屯本若必請户部撥給未免又費一番措置而往返查議之間不免稽延日月今酌一不煩部撥不費司帑而出入無二之法以候睿裁焉蓋蜀省額兵四萬名每歲約需口糧米十二三萬石及查蜀省每年本色徵需糧米可支兵食者通計不及二萬石其餘非發銀召買即係以四錢三分京斗折給而此項召買折給銀兩每歲皆係户部於頭年估計撥發者但部內係按年全撥而在外係逐月支銷則此項部撥米折銀兩固於春夏之時強半尚存司庫而未動也今興屯在春而秋間即可坐收興屯之米計屯本共需五萬六千兩不若徑於來歲米折銀內動支給發而將秋收所得屯米四萬二千石即支來歲秋冬兵食徑照例以四錢三分京斗算作折色奏銷則恰該銀五萬六千兩適足原發屯本之數除本年所收屯米折價已完本年所發屯本外以後朝廷每年坐收興屯四萬二千石之米歲可省户部撥給折色銀五萬六千兩其於國計軍需似亦有小補也再照抽屯各兵大約俱在汛防處所開種即令該鎮營原管將辨俱各兼董其事不但耕守無岐抑且臂指相習似不必另設分理之員以致縻費而滋擾也即間有一二地方磽瘠須調赴成都開墾者亦只須於本營中遴一諳練老成之千把管押監督同往無煩另設多事至於清疆界而禁紛爭辨肥磽而察勤惰與夫種種應行事宜又在臣與該管營辨併鄰近開屯地方之有司隨時斟酌損益務得其宜而不敢一一上塵清聽也但恆情可與樂成難於創始今一旦以介胄之夫令親耒耜其間不無視為苦難今既決意舉行更祈皇上敕部嚴立勸懲之法如抽屯各鎮營內就近兼屯務各官有不實心任事借端推諉以致貽誤者經臣指參作何從重議處以為慢上誤公之戒若三年內屯務修舉克勤罔懈經臣題報作何從優議敘以示奬勵庶幾勸懲明而人知自奮將充國金城之效不難再見今日矣巡撫四川都察院右副都御史張德地題為革弊務窮等事康熙七年十一月初八日據四川布政司郎廷相呈稱奉本院案驗準户部咨四川清吏司案呈奉本部送户科抄出本部覆四川總督苖澄題前事等因奉旨該部議奏欽此欽遵抄出到部該臣等查得蜀省營兵屯種一事先據四川總督苖澄酌議於重夔等鎮共抽兵七千名開墾將秋收所得屯米四萬二千石即支來歲秋冬兵食以後每年可省部撥折色銀五萬六千兩業經臣部覆準奉旨遵行在案今據該督疏稱俞旨到川之日已踰仲春播種之期請於來歲舉行等因前來但查該督先題疏內已稱屯種事宜俱逐一分晰明確自應於文到舉行二月內既已文到三月即可耕種且正值耕種之時稱已逾期來歲舉行不合其中恐已經耕種藉稱未經耕種亦未可定相應仍照前旨遵行可也等因奉旨這四川田地若以為全經墾種不給所食錢糧如實未耕種兵丁何賴以生果否耕種著再察明具奏欽此欽遵抄出到部該臣等查得二月內既已文到正當耕種之時並未逾期且伊疏稱已將布政司解到銀兩照數買備牛隻農具籽種分發各兵等語如果逾期應於文到即行具報且將牛隻農具籽種等物已經分發何至四月終始稱逾期具題推此則因伊身離任徇情具報亦不可定相應請敕該督撫仍照前旨遵行可也等因奉旨前苗澄稱照伊所請二月內既已文到牛隻籽種已發兵丁後又稱踰期兵丁不及開墾前後參差今若照爾部所議不給錢糧兵丁如實未開墾何賴以生著行文該撫將部文到日實係開墾與否察明到時將苖澄一併察議具奏欽此欽遵抄部送司案呈到部移咨到院轉行到司隨移提督併咨行各鎮營路去後除各鎮回報繁文不贅外今準提督照會內開該本提督看得抽兵屯田利賴軍國謬叨蜀帥敢不殫心及將部文奉旨播種踰期並兵丁實未開墾不給錢糧何賴以生事宜咨行各鎮營確查去後兹據各回稱前督苖部院於康熙七年二月內準到部文通行各鎮營承領牛種農器因四川地方遼濶奉行在三月及差人赴重承領回日往返耽延又在五六月不等不但時已踰春而且夏季將盡康熙七年分是以實未開墾也至於兵丁既未開墾錢糧仍舊支給誠有如皇仁體恤之至意乃各鎮營嚴責將領督率屯兵芟草開荒預為康熙八年分興屯之計不料各兵身親南畝以荷戈之夫荷鋤非其所長欲耕不能即強耕無益勢必兵農兩誤紛紛泣訴處處皆然且謂全川四面環夷其中百里無煙彈壓防禦差使護餉民鋪未設安塘遞送盡係兵丁兵農勢難兼顧恐致貽誤地方各鎮營身任封疆目擊各兵不能開屯之狀不得不據實陳請代為控籲者也本提督再四思維前督苖部院抽兵七千名開屯原取其銷兵省餉今以素不耕穫之人而欲求以耕穫之利恐兵徒銷而餉不可省何如就事變通從長酌議之為得也以本提督管見計之與其抽兵七千人日後兵農兩誤莫若度全川稍緩之地量為裁汰其可裁汰者共計缺額並實在官兵一千七百餘員名馬八百八十餘匹俸餉乾米操賞等項每歲共減出銀五萬六千三百有竒是上可有禆於國計下亦無誤於地方似於銷兵省餉之廟謨庶可少佐其萬一云爾倘荷俞允仍行各鎮營將原領牛種農具如數變價還官所有本提督前具題移緩就急一疏議裁重慶城守營馬兵改戰戰兵改守撥補提標潼綿等營缺額將該標營缺額同前後議抽建武重夔等鎮營缺額兵丁移付建昌六汛召募並今裁水師各鎮營官兵馬匹裁兵減餉細數另册移送係關錢糧事務煩為查照備移事理希即轉呈撫院主稿具題至於裁出見兵除水師鎮原係投誠兵丁應仰體朝廷安插得所之旨照發原籍編里為民其各鎮營裁出見兵二百四十餘名撥付缺額營伍頂補食糧裁出馬匹查各鎮營有倒斃者撥發騎操並裁缺遊守等官統俟俞允之日本提督另疏具題外相應一併移明等因準此該本司覆看得屯田一案各營本年實未開墾情由已經提督備載甚明惟查屯田出自鎮營軍政取裁提督既以兵不習耕將來無益而有貽誤遂議裁兵減餉因即就事以為變通此必提督灼見兵情確為定議軍機重大誠非本司所敢輕議者然即據見在方議止屯則從前實未開墾又不問可知也伏乞本院察提督咨移屯田難墾之兵情據各營本年未墾之實覆查前總督原有明歲開墾之檄行憑各屬買備籽種見在儲倉之的證則屯田實未開墾皆為鑿鑿無疑而本司之遵奉行查實非泄泄從事所有備録提督移送清册相應一併具詳等因到臣據此又準提督臣咨覆緣由已經備載司詳毋庸贅敘外該臣看得蜀省抽兵屯種先經原任督臣苖澄具題部覆奉旨行臣將部文到日實係開墾與否察明題報等因臣隨咨移提鎮各營並行布政司星速轉行各屬確查去後屢經嚴催今據布政司郎廷相呈稱部文雖在二月終到川而督臣苖澄提取屯本買備牛隻農器分發承領俱在四五六月之間不等是分發承領之日入夏交秋久踰春耕之期矣又各屬發買籽種咸稱見在貯倉俟來春給發則各營今歲尚未領種屯耕也明矣是部文到日實未開墾之確據也又準提臣咨開兵丁既未開墾糧餉仍舊支給乃各營屯兵以荷戈之夫荷鋤非其所長欲耕不諳強耕無益與其抽屯七千人日後兵農兩誤不若度全川稍緩之地量為裁汰每歲共減出銀五萬六千三百有竒銷兵省餉有裨國計造册咨題前來臣思撤兵興屯原為兵餉不足冀將來糧米可以漸增外協可以漸省成屬荒地頗多就此可以漸墾實為殘川要務無奈始經撥舉即有兵不諳農之控將來艱難已可概見川省自兵燹之後土著稀少所以見在各營兵丁皆係外省有自幼從戎而食餉者有隨寇入川而投誠者荷戈持戟是其所長胼手胝足實所未習總計全川田土惟成都一隅稍為平坦其餘皆髙山深澗實非外省之人所能措手者今若必照前議行之誠恐兵不習耕土不宜人勢必有種無收既無家室可戀而欲如數徵糧則抵償無策雖欲不逃而不可得也且兵民雜處未免有彼此之分究竟兵屯增餉未能而牛種付之烏有或致轉妨民耕亦未可知雖蜀中見在寧謐而邊隅要隘捍衛仍宜周備此提臣恐防禦興屯兩有所誤所以有度稍緩之地量為裁汰每歲可省數萬金之議也臣愚以為提臣久在封疆軍情素悉節省變通誠為有見若蒙俞允每歲可實省數萬金之外協而與前議歲增之米數似乎取效多矣總為通變節費起見統候部議請自睿裁非臣所敢擅便也除將應裁應補兵馬册送部查核外臣謹具題伏乞皇上睿鑒敕部議覆施行為此具本謹題部議應如所請題奉俞允邊防蜀僻處邊陲界鄰蠻部如敘永重夔巴通水藺昔時固稱險阻矣至建昌一郡苖猓環居一線羊腸椎髻出沒捍衛所宜熟籌若乃松茂威疊之地即古氐羌與西番接壤皆以孤城介在絶域防禦之道尤當加謹焉今聖天子睿慮神謨超軼百代於各邊要地置營汛以樹藩籬宣化導以安住牧關防縝密覬覦潛消所由異域傾心羣番革面來享來王之盛為亘古所莫及也作邊防志松茂道屬西番西番即吐番也其先本羌類凡百餘種散處河湟江岷間其酋發羌唐旄等居析支水西後有樊兄者西濟河踰積石居跂布川或邏婆川隋開皇中有論贊索居牂牁西唐貞觀二年始通中國代宗大厯十五年十月吐番率衆入冦上令李晟等討平之其先崔寧在蜀十餘年恃其地險兵強恣為淫侈朝廷不能易後因入朝吐番與南詔合兵三道寇蜀州縣多陷上憂之趣寧歸鎮楊炎言於上曰不若留寧發范陽戍兵雜禁兵往擊之何憂不克因得納親兵於其腹中蜀將必不敢動然後更授他帥使千里沃壤復為國有是因小害而收大利也上遂留寧遣李晟等擊破之德宗建中元年吐番乞歸其俘蜀將士言不可歸上曰戎狄犯塞則擊之服則歸之擊以示威歸以示信威信不立何以懷逺悉命歸之是年吐番遣使入貢貞元三年韋臯領劔南節度使吐番寇瀘北臯遣兵擊破之五年復巂州八年攻維州獲其將九年拔吐番五十柵斬首與投崖死者無數十七年臯遣將將兵二萬出成都西山南北九道並進破吐番於雅州轉戰千里拔城七軍鎮三焚堡百五十斬首萬餘級圍維州吐番遣大相論芥熱將兵十萬往救臯設伏邀之獲論芥熱殺其士卒過半自後西邊寧靖唐末種類分散入內屬者謂之熟户餘謂之生户文宗太和四年李德裕為西川節度使作籌邊樓圗蜀地形南入南詔西達吐番日召習邊事者訪以險要未踰月皆若身嘗涉歷乃去屬兵羸弱者四千人募少壯與北兵得二千五百人與土兵參居轉相訓習日益精練威聲大振吐番首領悉怛謀舉維州來降德裕遣兵守其城且奏其狀帝使羣臣議皆如德裕策而牛僧孺獨謂納降無以示信上然之詔德裕以其城及悉怛謀等歸吐番吐番誅之境上武宗會昌三年德裕言維州據高山絶頂三面臨江在戎虜平川之衝是漢地往來之路自為吐番所陷號曰無憂城得此遂併力西邊憑陵近甸故韋臯欲經略河湟以此為始臣到西蜀空壁來歸山西八國皆願內屬可減八處鎮兵坐收千里舊地當時不喜臣者望風疾臣詔送悉怛謀等命彼自戮絶忠款之路快凶虐之情從古以來未有此事乞追奬忠魂詔贈悉怛謀為右衛將軍宋時朝貢不絶其首領嘉勒斯賚始居鄯州後徙青州神宗哲宗髙宗朝皆授以官元憲宗始於河州置吐番宣慰司都元帥府又於四川徼外置碉門魚通黎雅長河西等處宣撫司世祖時復郡縣其地設官分職以吐番僧人薩巴為大寶法王帝師領之嗣者數世弟子號司徒國公佩金玉印者前後相望明洪武間設行都司於建昌無復南警西邊松茂諸蠻反覆不常十三年遣御史大夫丁玉討平之召集諸寨首領給以銀錁俾各守地方蠻人以為世寶又於東路設八郎麻兒匝芒兒者阿角寨四安撫司與麥匝者多北定祈命蛒匝牟力結等一十七長官司俱𨽻松潘衛南路設長寧安撫司與嶽希蓬靜州隴木頭三長官司俱𨽻茂州疊溪欎郎二長官司𨽻疊溪千户所各降印信仍立首領一人為土官以世掌之永樂間建立董卜韓湖等宣慰使司雜谷等安撫司於吐番境內以統番部其俗尚異端故於松潘又立番僧二人為國師曰商巴曰綽領二人為禪師曰黎巴曰完卜商巴事道黎巴事佛皆授銀印令撫諭之宣德二年松潘千户錢宏聞有交址之役憚於逺征乃誘蠻族入寇虛張奏報得留不遣蠻自是煽禍攻圍城堡朝廷遣都指揮韓整高隆調四川各衛官軍五千員征之至威州黃土鋪失利道遂不通三年命總兵都督陳懷劉昭參將趙安蔣貴等率陜西兵四萬由洮州入松潘解圍懷增置城堡守備回京蠻猶弗靖八年復遣都督方政調四川建昌貴州官軍討平之正統四年都督指揮趙諒誘執蠻長國師商巴以犯邊被擒奏聞遣都督李安征之尋察其偽且生釁乃誅諒蠻始服十二年僉都御史寇深提督軍務修飭營堡平治道路於疊溪迤上添設普安靖夷鎮番三堡又於麻答崖青岡嘴畫佛崖海螺洞萬江崖沿山鑿石駕木懸棧縻費錢糧巨萬軍民胥困而後人賴其利景泰二年蠻長王永隂持兩端煽動上下五族欲拒南路刑部侍郎羅綺撫治松潘設䇿制勝一舉殄之厥後召綺還京但置按察司副使一員整飭松茂二路兵備天順五年蠻復要截糧道入龍安石泉等處成化十一年蠻勢益張按察司僉事林璧奏請文職重臣提督軍事乃敕巡撫四川右副都御史張瓚兼理邊務十三年瓚調漢土官兵五萬分布東南二路駐劄十月令都指揮沈運李鎬等分兵攻剿掇坪懦弱白羊嶺鵝飲溪大白飲馬池通林等二十一寨進克木爪竹頭坪等寨斬蠻四百餘人於是商巴等二十六族詣軍門獻馬納款各諭以利害遣之十四年正月僉事林璧進攻黃頭復水諸寨俘馘三百餘人總兵堯彧領兵二萬攻西坡等寨都指揮謝琳等分兵為五哨進攻前後殺獲男婦七百餘人赭其碉房九百墜崖死者不可勝計番蠻困憊輸款正德二年副總兵楊宏兵備高江誘殺綽領寺國師雪郎三出諸番紏合圍殺官軍自後本寺小宛卜等動出擾害松城之外不敢晝牧十一年副總兵張傑兵備胡澧整兵奮敵蠻稍懼斂嘉靖間烏都勃鴿鵝兒雞公刁農五寨番蠻紏合黑虎等寨八百餘番攻圍長安等堡阻截南路勢甚猖獗十二年巡按御史宋庭立奏調漢土官兵七千分為六哨命守備指揮李葵鄧斌陳崇魯元忠宋璉領哨夾攻朝廷又敕副總兵何卿自松潘來節制諸軍又敕都御史楊守禮提督軍務烏都等十一寨皆次第剿平又屠遮花寨於是黑虎等寨觀望寒心皆詣軍門納款僉議仍量給賞需以示柔逺之恩十三年巡撫都御史宋滄克平壩底白草諸寨諸夷獻侵地二千餘頃又克茂州雞公寨十五年長寧等處深淺諸寨番蠻求索賞需兵備副使朱紈督兵搗其巢擒斬首惡餘俱以次降年例賞需盡行裁革於是西陲安靖皇清定鼎之後蠢兹番蠻間猶騷動順治十二年威州龍蒲等寨逆番紏合賊黨攻城掘冢勢甚猖獗總督李國英檄行威茂監軍道僉事程翔鳳松潘副總兵王明德出其不意六路進兵殲其凶首掃穴平碉剿撫並用諸蠻乃服十四年雜谷土官桑吉朋阿日土官巴必太合兵千餘攻圍瓦寺土官曲翊伸番寨未下闖入內地劫堡斷橋殺戮汶民掠去男婦四十餘人監軍道僉事程翔鳳調防威守備關天爵林阿桂等領徑兵六百首尾夾攻斬馘不計其數生擒凶首阿朋并賊番一十三人桑吉朋巴必太共負重傷逃回六月內吉朋輸款納甲以圗自新各番控籲部院願獻所掠男婦以贖阿朋及釋阿朋歸見吉朋沒其家資遂成莫解之讐康熙元年內水田星上曾頭三寨賊番聽阿朋誘惑阻路橫劫威保聲息不通威茂兵備道參政陳子達松潘副總兵何德成奉令調剿四路夾擊平其寨斬其渠魁各番始納款輸賦聽瓦寺打喇二土司官約束每歲量給賞需以示羈縻諸番悉平康熙二年剿上下五族先是青片上下五族等寨生番散居石泉茂州山後地方綿亘數百里凶肆自擅不討之日久矣至是松潘副總兵何德成奉令剿撫於正月十七日分兵進討克平下五族上五族之番畏威投順願𨽻版圗合上下五族每年俱輸蠟認糧番寨近茂州者責之茂州隴木土司管束近石泉者責之石泉縣唐李土司管束邊患以靖又阿朋紏阿薑濟等於元年內逐土官桑吉朋於别思蠻地方而立其姪視雜谷如几上肉也夫雜谷古維州地吉朋為貢臣長無吉朋則無維州無維州則威保之藩籬不固矣兵備道陳子達有鑒於此十二月遣中軍張士龍由董卜接吉朋至省尋帶至汶示部番以有所歸並宣布朝廷恩威撫諭阿朋迎故主以蓋前愆奈阿朋恃惡不悛斷我繩橋阻我哨道煽引諸番攻堡日急亦於康熙二年始討平之二十四年疊溪大定堡山後住牧巴豬五族逆番阻道劫營抗撫拒敵四川巡撫韓士竒題請抽調漢土官兵相機進剿復繕寫招撫告示委松威道僉事王騭親往列角雙馬等寨諭以安分住牧免取株連并招撫巴豬令其歸順乃逆番恃其緊鄰之卓沙白卜撮箕等寨為之脅從反覆抗撫松潘總兵高鼎領兵攻擊各寨剪其羽翼逆番猶恃險拒敵我兵奮勇直攻斬焚逆番數百餘人遂屯營山頂給發白旗招安各寨俱畏威投降惟巴豬逆番詐降復叛巡撫韓士竒隨分遣漢土官兵三路進發巴豬逆番約六七千人亦分三路迎敵我兵奮勇攻擊自辰至卯當陳擒斬并焚死追殺番蠻七百餘口獲偽印一顆偽敕一道紗帽一頂角帶一條其首惡挖子已被焚死餘番盡奔大厯日寨見大兵追至復奔黃梁走大定我兵力追抵黑水江岸復擒斬一千餘人其先後招撫番蠻共一十三寨輸賦納糧屬大定堡撫夷管束邊患遂消康熙三十七年松潘黃勝關外川柘等寨係潘州故址久沒番地番目綽爾濟等夷搶去占住屯牧人畜經巡撫貝和諾委筆帖式爾吉圗查詢招撫始輸誠納賦松潘鎮屬之漳臘營西路包子寺牟尼等寨平番南路雲昌等寨及東路阿思洞等寨諸番自昔梗化旋撫旋叛野性靡常逮聖祖仁皇帝蕩平偽逆恢復以來始皆傾心向化於康熙四十二年經總兵周文英宣布朝廷威德加意撫賞西北兩路土目情願每年輸納青稞貝母聽充正項五十九年庚子口外惡洛西番劫我兵民提督嶽鍾琪松潘總兵路振揚請兵由松潘進剿數敗賊番阿壩土目旦增等歸降願償所劫許之先是住藏之厄魯特貝勒額付阿保移文乾清門頭等侍衛拉錫言西邊郭羅克愛滿肆行搶掠請派兵剿撫奉旨著提督嶽鍾琪等即行剿撫蕩平又派滿洲兵數百名并插漢丹津兵協助提督嶽鍾琪遊擊周瑛於五十九年冬十月率諸軍進攻取下郭羅克之吉宜卡等處二十一寨直抵中郭羅克之那務等寨賊番出敵官兵奮武連破一十九寨斬三百餘級擒獲首惡酸他兒蚌索布六戈乘勢復抵上郭羅克之插六等寨寨目旦增等綁縛首惡假壒并賊從格羅二十二名以獻賊從盡正法首惡酸他兒蚌等三名解部其投誠番衆令雜谷土目囊索沙加布管理留土兵一千名駐劄自黃勝關至惡洛俱安塘站由是西番平服我皇上膺寶籙之元年四川提督嶽鍾琪因西寧之役帶領遊擊張元佐王剛并漢土官兵由黃勝關出口剿撫十二部落招安阿壩郎隋毛革麥雜等處番目彎布桑頓獨賴林柯等納土歸誠雍正二年甲辰下羊洞凶番拔那剛讓笑等復猖獗不法松潘鎮總兵張元佐率領遊擊劉屏翰邱名揚進剿擒獲首惡餘寨投誠番目牽慢甲箇札實太等率各寨番皆願為編户闢地二百四十里得番民三十七寨建城於南坪壩為南坪營川陜道路始通五年丁未雜谷土司約束下郭羅克番蠻不嚴仍行劫掠川陜總督嶽鍾琪遣平番營守備宋宗璋領兵進剿招撫下郭羅克阿樹等一十三寨歸併本營管轄由是川陜各邊并閫內番屬俱帖然懾服天朝威德各安住牧大抵番人性耐飢寒壘石巢居如浮圗數重人以梯上下貨藏於上人居其中畜溷於下高一二丈者謂之雞籠十餘丈者謂之碉房凡遇糧夫經行或據險築塘或臨高擂石或隔河放流矢截軍索貨往往有不能制者自朝廷天威大振文德誕敷薄海內外罔不率從土夷傾心向化自無復向日之頑梗者矣茂羌茂州氐羌地方數千里始在萬山漢武南通夜郎西開冉駹始置汶山郡驅羌蠻而西之以大江為限舊領羈縻蠻自推一人為州將常在茂州受處分州舊無城惟植鹿角蠻以昏夜入州掠人畜貨賣遣州將往贖之習以為常宋神宗熙寧八年范百常知州事民請築城既而蠻長訴稱城侵其地乞罷築百常不許九年三月始興築靜州蠻數百奄至百常率州兵擊斬數人蠻乃退百常遷民入牙城明日蠻數千人四面焚鹿角及廬舍引梯衝攻牙城矢石雨下百常悉衆乘城拒守二蠻長為木櫑所傷乃却州南有雞宗關通永康軍北有隴東道通綿州皆為蠻所據百常募人間道詣成都又書木牌數百投江中告急蜀綿兵救之蠻始解圍誓和明設茂州以統羌民設茂州衛以統軍伍軍居內城民居外城永樂間羌民黑大肆行不法四川都指揮李敬率兵進剿直搗賊窟擒斬渠魁正德八年羌豪張敖劉芳焦拱等誘羌民圍城欲殺指揮萬嘉言等嚇銀七百兩敖畏罪使其黨唐茂誣奏嘉言等受羌民錢伺勘官至復聚衆圍之殺旗舍廖易受陶惠等以脅勘官自是益橫動輒攻城殺人十一年撫按官亷知其狀行楊兵備擒敖等殺之萬厯二年刁農窄溪得勝魏門等寨願納款降附知州張化美探知其情條議具報招撫歸順量給羈縻列為編民崇禎末年土司乘亂占據各寨羌民搆訟頻年不安國朝康熙六年知州黃陛查驗前知州張化美給劵遵奉院道批詳給以木牌鐵刻鐫石州前永𨽻茂州不許土司侵管羌民悅服惟黑虎生番歷代以來恃其山箐險阻屢肆猖獗有明三百年出沒官道掠虜人民虔劉牲畜歲無虛日接連茂州龍溪十八寨羊腸一線羌番雜處其人皆不通聲教非可以威力制以文誥服者故明時設軍衛亭障斥候逺邇相望所謂綢繆禦侮之計難且慎矣自我國家統一區宇天威疊震聲靈赫濯先時龍蒲星水等寨蠢動帥臣用張撻伐黑虎龍溪各寨固已聞風竄伏罔敢跳梁康熙四十二年巡撫貝和諾提督嶽升龍先後招撫各寨納土歸誠俱賞給銀牌縀布牲牢米物復命州牧協同威茂參將親臨碉寨閲其疆界稽其户口以杜侵冒諸羌羣相恱服獻圗列册黑虎七族生番每年量輸麥糧以示羈縻龍溪十八寨得户千一十有二歲輸麥糧八十石自是各番始畏威懷德傾心內附大抵茂去省近漢夷相半羌民久被聲教間有不逞者可以王法繩之惟松疊為巴西極塞夷情狡狙控制維艱且雜谷金川土司每每恃功驕縱故必重兵備守蓋松茂所以扼塞吐番疊溪則為松茂脈絡昔人謂吐番有事必自黎文南詔有事必自沈黎吐番南詔共有事必於灌口然則三城為邊之藩籬灌口為疊茂喉襟威茂為灌口保障岷山又為全蜀之屏翰者也附前明楊一桂雕剿處置人荒等三寨議萬厯七年松潘兵備副使楊一桂議松潘設居極邊番種近多為地方患最桀驁者無如丢骨人荒沒舌三寨跳梁架寨堵截糧運時或默地築塘劫掠財物連年犯順未嘗一創以致肆惡橫行請相機剿撫等因又按察司關行楊副使覆議三寨陸梁宜加誅剿但大征恐滋别寨疑畏未若雕剿可以懲一戒百巡撫王廷瞻看議四川要地莫重於松潘番蠻悍戾莫甚於三寨狼貪無厭出沒無常數十年來地方苦其荼毒蓋以負山箐之險挾羽翼之衆耳雕剿之議允屬可行又據提督歸化指揮曹希彬報三寨番蠻聞知委官放糧聚衆搶奪等情即令希彬帶領千户李世傑等奮勇對敵斬番級五顆獲馬匹器械乘勢追之番據險力戰因調大兵深入擒斬四十五人銃箭傷死無算燒燬碉寨平房七十八座糧儲一空各寨哀詞納款羅拜投降奏上有功人員分别賞賚處置風村白草投順等番奏議萬厯七年二月四川巡撫王廷瞻據兵備道黃德洋據石泉縣報稱熟番全保領肉兒卦寨番牌餓柘等説各番不曽窩藏丢骨人荒沒舌三寨蠻子今與齊風村巔等十一寨備馬甲前來投降願做百姓隨帶番牌兒十書餓柘等譯審又據守備宗綬呈稱熟番羅背報稱白草野豬窩等一十七寨説近日村巔等寨投降討得安生這白草等寨生番商量齊心亦出馬甲器械投降願做百姓望賞白旗任守地方等情本道審得二十八寨男婦八千四百九十四口仍行各官譯審俱願各換姓名每年萬夀聖節長至各番俱叩頭每寨輸蠟一斤以供灌燭之用等情僉事黃德洋議得各番在嘉靖二十三年僭稱偽帝及李保將軍黑殺總兵等號致煩興兵征討今一旦回心向化誠是竒事巡撫王廷瞻巡按虞懷忠看議風村白草等番素恃虎負常逞鴟張盤據各番之中密邇會城之地部落既衆控御為難因松潘三寨雕剿投降又見威茂諸羌議封納款一旦傾心甚衆願為編氓者有之矣而變易番姓則前此未聞願貢方物者有之矣而從習漢儀至今始見此二百餘年蜀川之所僅有者也奏上奉旨黃德洋先行賞賚通判李茂先仍以都司職銜管壩底事專一撫化番夷其風村白草等番收入石泉版籍自此邊境寧謐國朝雕剿各寨奏疏雕剿龍蒲等寨疏四川巡撫李國英題為塘報雕剿逆寨大捷仰祈睿鑒事順治十二年九月牌行監軍道官吏仰查龍番自前砍狗盟誓悔罪俯服之後於某月日復於某處某所為某事不法應剿要見侵犯者何地受害者何人作祟者係何情形紏合黑虎生番誰人眼見有何憑據今應當作何剿除逐一開列詳報以憑裁奪如係風影之言或小人挾讐謊聳希利一面傳諭各番守法安分一面據實回報嚴行查處毋得再以模稜之語徒煩議論等因到道該道將逆番通賊叛亂實迹逐一列款呈詳批行松潘副將王明德調集官兵會同監軍道進剿去後隨據監軍道僉事程翔鳳具由呈報十二月二十日本道會同副將王明德奉令雕剿六路進兵搗其巢穴焚斬賊番不計其數剗平八十七碉凶孽既除餘黨奔潰曲山大寺等寨諸番望風投順各給白旗招安許其自新該臣看得龍蒲等三寨逆番逼處威州城外相隔一衣帶水耳自獻逆據蜀惡番投逆受印之後即大肆桀驁恃其碉寨險峻黨羽繁多阻截行商焚燒關堡威城外纍纍千冢掘發無遺人鬼含寃欲食其肉而寢處之非一日矣且隂與成灌逆賊常相勾連屢謀為內應以我隄備之嚴不得發該邊道將屢請於臣謂是心腹之患宜先剪也臣行查明確密授方略出其不意乃馘其凶渠焚其碉寨逆番幾無遺種舉百十年盤踞之窟穴一旦蕩為灰燼踏為平陸泄神人久憤之寃除內地肘腋之患餘威所震且使拗山大寺小寺等寨素稱頑梗作祟者莫不畏懼乞降稽顙恐後亦可謂快心之舉矣除漏網惡番檄行道將嚴加緝捕投順各寨給旗安插奪獲偽印關防二顆轉齎肅王同固山查驗鳥鎗盔甲等項收營存貯所獲牛羊分給有功員役並優恤陳亡官兵外至監軍僉事程翔鳳祕謀制勝松潘副總兵王明德勇略超羣文武合同以致克捷並在事有功員役所當一例紀録者也謹會同督臣金礪按臣髙民瞻合詞具題奉旨據奏逆寨剪除具見調度有方在事有功官丁著察敘具奏該部知道雕剿處置星上水田曽頭等寨疏四川巡撫佟鳳彩題為恭報生番畏威歸誠率土輸賦並陳分管控制之法仰祈睿鑒事據威茂道參政陳子達呈報據西路保縣乾通一帶士民焦溥袁明保等訴為逆番造叛愈熾殺戮殘民難堪等事該本道看得自威至保古道一帶乃國家內地而星水諸番雖從來不受約束往往隆冬水涸伏路搶奪非敢稱兵橫肆對壘抗衡也今為叛逆阿朋煽動結黨猖狂謀襲古道致威保首尾不接今據村民呼籲望救情迫詞哀相應轉詳伏乞本院俯鑒輿情立賜裁奪由詳奉批曽頭星上水田等寨逆番比附阿朋聚衆稱兵謀襲內地法不容貸據詳已咨移提督矣仰一面嚴加防禦若官兵到時該道會同領兵營將相機剿撫務出萬全仍嚴飭瓦寺曲翊伸謹守邊界不許逆番竄逃彼地至於糧米更須極力措備務俾飽騰可也本年十月三十日又奉總督部院都御史李國英批據逆番猖狂阻道截殺法無可宥但前準提督咨報水田星上各寨比附阿朋作叛情形業經咨覆只俟招撫阿朋不服即進兵一同誅剿矣奉此該本道隨於十一月二十四日會同松潘副將何德成俱到古城察各寨之險易並逆番為惡之首從分布進剿其進剿情形斬馘賊級獲其器械節經塘報在案本道見番寨如鱗逆番如蝟雖一時官兵剿洗而逃奔者實繁有徒我兵來而獸散我兵去而蜂屯禍根未絶終非長䇿遂定議招撫即傳喚牛騾二寨番目朋之太路必等給以白旗令往招撫曾頭寨仍喚活擒番目郭之太本道親解其縳諭以國法惕以兵威亦給豫白旗令往招撫星上水田各敗番並赤雞寨敗逃於星水寨各番遂於二十六七等日曽頭星上水田赤雞等寨番頭俱赴本道投見本道仰體本院恩威並施責其拒敵官兵之罪仍許其改過自新遂各認納官糧一百一十五石作我熟番又再查曽頭星水各寨原無統率各自雄長乃就中查番頭之最桀黠者給以劄付提調諸番催納麥糧而總轄則歸之瓦寺土司與打喇土司分管本年正月初四日本道齊集隨征將領千把領旗等官並各寨歸順番目大張鼓樂犒賞已畢即頒給鐵刻糧牌內書糧石數目並各官銜寨分一給番寨為憑一發威州存案而各寨番目俱俯首悅服回寨訖此皆仰荷本院威略逺振遐邇覃服之所致也仍將本道自買茂州官店一所每歲收店租銀一十五兩捐作各番賞需以示羈縻等因呈報到院據此該臣看得星上水田等寨乃界連威州之生番也當明季時倚險為勢黠悍異常從來未歸王化及雜谷土官番目阿朋驅逐本官桑吉朋聚衆稱兵而渠等輒敢附比作祟屢犯內地臣隨移商督提二臣行令該道將遵奉俞旨先行招撫各逆番仍怙惡不悛後我兵搗巢破穴始畏威歸誠率土輸賦除進剿斬獲情形所獲器械已經督臣詳細題報在案惟是各番地處深山窮谷之中皆刀耕火種素稱窮苦若免其輸賦恐番性犬羊叵測不常而向背無可稽考故令認納雜糧一百一十五石雖為數無幾然不過見歸誠之據而已至於各番種類繁多因將番頭朋之太量加提調名色威茂道給以印劄約束番寨而總轄則分𨽻之於瓦寺打喇二土司至各番既已歸誠輸賦而歲賞又係撫邊之要道據威茂道陳子達詳議自買官店一所每歲約租銀一十五兩捐作遞年賞需俾新附野番既畏其威復懷其德應如所議謹題奉旨依議雕剿阿朋疏四川總督李國英題為番目謀吞內地提臣督兵剿平恭報大捷事康熙二年正月內據威茂兵備參政陳子達呈報逆番阿朋結黨逐主土官桑吉朋避之别思蠻地方及接吉朋至省阿朋仍攻據要隘阻其歸路等因到院隨咨移提督相機剿撫去後隨準提督咨移親統官兵於二月十一日深入賊巢攻破老碉擒阿朋阿薑濟當陳斬之剿撫番寨一百三十有竒桑吉朋仍安置維州等因咨移到部院該臣看得逆番阿朋阿薑濟等擅逐土官協謀不軌紏連生番窺犯內地勢甚猖狂臣咨移撫提轉行道將屢為招諭恬不知改及臣具疏入告奉有酌發官兵再行撫諭如仍抗拒不服即行剿滅之旨臣準部咨後即奉有會剿巨寇之命隨將撫剿阿朋咨移撫提兩臣轉行道將再加曉諭開導以昭朝廷浩蕩之恩無奈阿朋阿薑濟等冥頑抗背全無悛悔之心尤且唆黨肆劫流毒滋蔓臣咨移撫臣籌措糧糈將進剿機宜密咨提臣於十一月十四日檄令松潘副將何德成統領官兵會同撫提兩標及威茂各將兵相機進發沿邊各寨撫者撫剿者剿而阿朋等猶據險丹這猛老寨阻厄要隘抗衡愈力該提臣於正月二十六日親統士馬前往剿撫並用至二月十一日阿朋等擁衆拒敵三路官兵出竒追殺雖奔入老碉尚未大挫凶鋒及十二十三等日攻破頭碉二碉猶有逆番救援盡為擊敗至攻破三碉而阿朋等力窮勢急突圍衝出各將士奮力合擊阿朋阿薑濟當陳斬馘各番兵追殺無遺共計撫剿番寨一百三十有竒元凶授首諸番效順其雜谷土官桑吉朋仍歸維州一時聲靈丕播十數萬之番蠻俯首納款千餘里之巖疆奠如磐石是役也皆仰賴我皇上威德逺震致報大捷而師武臣力其功良有足多者均應照例紀敘奉旨依議平定巴豬等寨逆番情形疏康熙二十四年九月四川巡撫韓士竒題為恭報平定巴豬等寨逆番情形等事該臣看得巴豬等寨逆番阻道劫營抗撫拒敵情形先經臣等一面會疏密題一面抽調漢土官兵相機進剿復念此等生番從古不庭罔知漢法先當示以兵威繼宜諭以招撫使其畏威懷德傾心向化各安住牧以仰體我皇上好生之仁臣是以繕寫告示傳牌專委松威道僉事王騭面領親往大定堡一帶責令安巡土司並通事人等執持牌示曉諭列角雙馬等寨安分住牧不許助惡自取株連并招撫巴豬逆番悔悟歸順親到軍前受撫免其進剿又經屢檄該道并咨移松潘鎮會同多方招撫不得妄行殺戮致傷生命去後今據該道王騭呈詳并準松潘鎮臣髙鼎咨稱差人化諭再三鎮道曲盡招撫而巴豬逆番留我往招人役作質始議數番前來投拜願獻首惡一人交還搶去器械送以退兵牛羊該鎮道隨準其受撫給示領賞回寨擒獻首惡而緊鄰之卓沙小厯日白卜等寨見巴豬已降方赴軍前受撫各領告示賞需令歸本寨去訖嗣見巴豬逆番詐稱首惡挖子逃走恃險復叛致已經受撫之卓沙等寨亦變幻而抗撫矣因思巴豬逆番所恃雙馬列角廟山小寨大小厯日卓沙白卜撮箕等寨為之脅從必先剪其羽翼以示兵威遂分遣官兵攻取小寨老窩垜列角寨乃逆番敢以鳥鎗箭石恃險拒敵我兵奮勇齊攻斬殺逆番七十餘名燒死逆番數百餘名我兵屯營山頂給發白旗招安而白卜卓沙小厯日撮箕雙馬廟山作力合卜等寨及已破之小寨老窩垜列角三寨始畏兵威投降恐後願納糧差永不侵犯哨道惟巴豬寨逆番詐降復叛怙終不悛惡貫滿盈自干天討隨分遣撫標遊擊冶秉孝提標遊擊穆廷栻城守副將賀雙耀松潘鎮標遊擊李鎮鼎王世臣瓦寺土官坦朋吉卜等授以方略統領官兵三股進發而巴豬逆番約有六千餘名各執弓矢鳥鎗亦分三股前來迎敵我兵奮勇攻擊當陳斬殺一千七百餘名生擒梟首及跟追殺死搜出正法逆番共計一千餘名得獲鳥鎗弓箭長鎗甚多燒死番蠻二千三百餘名搜獲偽印一顆偽敕一道紗帽一頂角帶一條當同塘報咨解在案尚有巴豬漏網餘孽盡奔大厯日寨見我兵追至復奔梁黃走往大定我兵復至大定逆番聚衆拒敵我兵奮勇力戰陳斬七百餘名焚死三百餘名其不能入寨者我兵追至黑水江岸逆番浮水過江者僅止百十餘名餘皆落水溺死我兵欲渡江窮追但隔江乃係黑水生番之界不便深入重地是以回營今厯日梁黃大定俱已投降受撫認納糧差至巴豬首惡挖子業已被火焚死驗明首級無異等因造具有功人員傷亡官兵得獲器械并白卜撮箕小厯日卓沙作力合卜小寨子老窩垜列角廟山雙馬大厯日大定梁黃一十三寨納糧清册呈賫前來臣查此一役也數百年不歸王化之生番今一旦願納糧差為我編氓數百年不獲清寧之官道自此不煩送哨邊患永消此皆仰賴皇上天威遐震之所致也雖所納之糧為數無幾然借此以羈縻其野蠻之性知有約束而不敢再行作祟為害矣至在事有功人員相機調度剿撫並用者松潘鎮臣髙鼎松威道臣王騭也其餘有功人員并傷亡官兵及各寨納糧數目等册除送部查核以聽分别議敘恤賞并將搜獲偽紗帽角帶臣即在外焚燬止將偽敕印送部查收銷燬外所有平定巴豬等寨逆番情形理合題報臣謹會同川陜總督臣席爾達四川提督臣何傅合詞具題伏乞皇上睿鑒敕部議覆施行按松茂道屬周秦為西羌所居自漢武帝募民耕塞下以代轉輸設河西五郡以洮州岷州河州扶州潘州松州𨽻湟中郡後趙充國設金城十二屯政統十五萬之衆分十二屯營開設松州亦在屯營之一屯兵一萬有零置護羌校尉逮後屯政廢弛轉運不給始分洮州岷州河州屬秦松州潘州扶州屬蜀至漢季晉魏或設或失邊防不復可考至隋改設縣治名曰交川在今紅花屯一里又設翼州即今疊溪所在漢時名蠶陵縣皆屬松潘地方唐貞觀間總天下之屯開府兵九百九十有竒設立松州亦屬府兵之一設一都督府統之至一易而為彍騎再易而為戍兵松州駐劄數萬之衆以防禦吐番宋設上中下潘州明洪武十三年設松州衛潘州衛二十年廢潘州衛止設松潘衛軍民掌印指揮使司設一副總兵領之總設兵備道統領宣德四年調成都前衛後所為小河所千户增置城堡添調成都利保等衛所官軍更番戍守先年兵備提督皆侍郎都御史成化初改設按察司副使總理之皇清蕩平宇內百制維新順治初奉裁茂州衛疊溪威州小河等千户所十年以地方荒殘將安綿道暫停推補尋奉裁改松潘道為松龍道提調龍安順治十八年仍改為松潘道威茂道兼攝巡西道康熙六年二道俱奉裁於康熙八年題請復設松威道松潘仍設分守副總兵添設城守守備龍安威茂仍各設參將疊溪小河漳臘仍各設遊擊平番石泉各設守備康熙十年奉旨改遵義為協松潘為鎮設松潘鎮中左右三營遊擊三員守備三員馬步兵二千四名逮康熙二十七年改松威道為松茂道祗設松潘鎮馬步兵二千名仍管龍茂漳疊小河平番南坪等營各屬要害分兵汛守松潘舊有四州三近漳臘今阿失寨即上潘州班班簇即下潘州二州之間即中潘州去松不過二三日故城遺址尚存今設潘州達建二營亦屬松潘管轄與漳臘諸番犬牙相參自松達茂三百餘里路循河岸夷碉棋布山巖視之如蜂房堡縣有堡過漢索橋則古維州故城三面臨江殊陡險蓋董卜韓湖宣慰司與雜谷安撫司交界處城上有李德裕籌邊樓明景泰間為叛夷王永所毁遺址尚存州址今為雜谷碉寨迤北則古無憂城故經略者謂松潘乃西蜀之重鎮諸番之要區東連龍安南接威茂西距吐番北抵洮岷鎮城關堡之外四面皆番威茂疊龍亦屬要地故先時俱設重兵以鎮之國家大張撻伐廓清蕩平節制之兵一可當千經制所設營鎮馬步戰守簡閲倍精已詳載兵制矣比年以來諸番帖服邊圉敉寧但夷情叵測綢繆未雨又在籌邊者加意勿懈云四川通志卷十七
