body:
  text: 四川通志卷十八上邊防永寧道屬叙瀘瀘戎即僰羿苗猓等種是也宋時淯井監在夷地吏或非人徃徃致寇宋真宗祥符中晏州夷斗望刧掠江安知縣秦職追之遇害轉運使寇瑊同王懐信進討破之神宗熙寧七年六姓夷入寇命經制熊本討敗之柯隂乞降本盡籍其丁田歸之官以其酋箇恕知歸徕州其子乞弟為番部廵檢八年渝州南川獠木斗叛復詔本安撫本進營銅佛壩破之木斗舉溱州地五百里來歸建為南平軍詔本知制誥元豐元年羅茍夷叛詔韓存寳討之存寳召乞弟犄角討蕩七十囤邨乞弟恃功悖慢遂圍熟夷羅箇牟族王宣救之一軍皆沒詔存寳統兵三萬討之存寳不敢進坐逗撓誅以林廣代將詔熟夷楊光震併力討賊破其巢穴築城於樂共江門砦梅嶺巖席帽溪西達淯井東到納谿皆控制要害乞弟既失土窮甚無依而死於是羅始黨斗然等諸酋請依十九姓團結為義軍從之自是瀘夷不復為邊患徽宗政和五年知梅嶺砦髙公老之妻帝宗女也常出金玉器飲晏州夷酋卜漏等心艷之㑹瀘帥賈宗諒以斂竹木擾夷部夷人咸怨漏等遂相結因上元張燈襲破梅嶺砦擄公老妻及其器物四出剽掠轉運使趙遹聞之倍道趨瀘州討賊詔發陜西軍三萬人以遹領之捕山猱束麻灌蠟爇之猱奔燒賊舍大軍繼進斬卜漏賊平拓地二千里遹為建城砦畫疆畝募人耕種且習戰守號曰勝兵髙公老妻不辱死詔贈節義族姬加遹龍圗閣直學士經畧安撫使召對拜兵部尚書元至元十九年發都掌阿永等民為兵征哈瑪爾都掌等上言宋時未嘗僉軍乞出馬牛助軍需從之三十年十月西川奉詔征疊茂汶川番夷六年陜西平章伊蘇岱爾奉命討順元叛蠻自慶符入十降八九回軍就糧至永寧阿永蠻酋雄挫及芒部反伊蘇岱爾討之雄挫遣阿大乞降雄挫赴京賞衣服弓矢鞍轡放回大德五年右丞劉深征八百媳婦令順元遞運人馬土官宋隆濟蛇節等拒命朝廷命四省與田楊二氏軍馬收捕各府土官以逺征供輸煩勞皆叛梁王出駐陸梁州烏撒烏䝉東川馬湖四族聚衆四千復起羅羅斯軍渡金沙江刻日取建昌朝命伊蘇岱爾充平章總湖廣陜西雲南軍及梁王見兵一萬次第討平之明洪武二十七年戎縣夷出沒不常奏調敘南衛左千户所於本縣守禦永樂間遣總兵官梁福征討夷竄深箐不能追乃招安之十三年遣都督李敬率師擒其渠魁而撫其餘黨宣德二年夷復寇筠連都指揮徐諒撫安之未幾又刼髙珙長寧慶江等縣監察御史楊燦詣戎縣招撫大壩等砦捕獲夷首械送京師九年夷賊又叛調都指揮李榮督戎縣官兵擒斬三十九名正統四年又燒刼各縣都指揮王杲集戎縣漢夷鄉老招出五邨夷諭以禍福令回各砦擒賊三十四名其餘埋石為誓景泰元年正月髙珙筠戎夷人並起聲言漢人毎年公差下砦徵糧害我我當出報遂縛公差於樹殺之各攻本縣屠長寧劫慶符江安納谿燒田舍恣殺掠諸縣為之一赤有司飛奏遣僉都御史李匡監察御史劉澣經制其事適時盛暑地多疫癘士卒死者甚衆匡澣俱嬰疾澣卒匡尋愈遣都指揮周貴等破箐前昔乖等砦俘斬數百賊舍米粟負財物入深箐大軍圍之削木皮以食餓死幾半乃乞降天順元年芒部諸夷妖言惑衆號天師圍筠連凡九日敘南衛指揮丁信李英等力戰殲之五年以戎縣夷人連年流劫遣總兵官許貴討平之成化元年戎縣都掌夷頻嵗入冦遣僉都御史汪浩都督芮成征之侍讀周洪謨上疏請於都掌照九姓司設長官使砦主自擇素所信服者命為土官部議以其事付汪浩芮成時浩在成都捕反賊趙鐸成在敘州知戎縣漢民不欲夷人割置土官而利其鈐轄乃不用本縣勘報惟召其鄰縣夷酋導㕘議王禮等詣都掌諸砦諭以設官之意諸夷大悦其酋長率二百人詣敘州見成自具馬二十七匹為赴闕謝恩計成犒之而賞以布令還戎縣以俟尋遣人報浩㑹奏謂都掌箐前大壩三處宜設三長官司疏入方議鑄印九月汪浩至自成都戎縣漢民不欲置土官者以甘言啖浩謂成所招諸酋雖授以官終不能禁其劫掠此皆梟雄一可當百乗機除之則餘孽皆庸劣不足慮也浩不知其詐遂決意殺之至戎縣諸酋迎謁浩諭之曰降蠻太少與官太多可回砦招三千蠻民來即與奏異日諸酋入即閉營門壯士皆露刃環列浩厲聲責之諸蠻自納款之後久釋金革至是惟叩首請罪露刄者皆前殺二百七十餘人浩使人報成成曰是成所招者已與公㑹奏矣奈何殺之猶豫數日乃又與浩合奏夷始雖歸降終則異志且欲伏兵敵殺官軍不得已調大軍剿之斬首若干破砦若干既而諸砦餘黨聚議報讎十月乃赴貴州總兵官處詐降都指揮丁實等出迎之夷伏兵四起官軍五千餘衆皆没十一月初欲冦四川浩等聞之夜奔長寧分軍實各縣徑還成都時官軍夜行迷道人馬墮溪谷死者不可勝紀衆賊追浩等聲言欲臠其肉不及乃攻長寧三日適聞戎縣人刧其巢穴乃觧圍去時夷恨既深鋒不可當貴州兵屯金鷄池四川兵屯戎縣兩軍堅壁不出而夷人由其間循江之南直抵江安合江如履無人之境諸縣官民皆遷江北露次浩徃來江上不敢南泊江安賈家砦為賊所屠殺五百五十餘口縣官走白浩浩怒曰吾方報㨗豈又有賊耶捶之幾死乃遣人鉗各縣欲訴夷情者一夕夷驅合江等縣婦女一百七十人水牛三百次長寧石笋山下都指揮宰用等率軍逐之賊皆遁盡獲所擄人畜時三司以成浩既奏賊宜剿不宜撫故勞餉以供兩軍二年既不能剿又不敢撫㑹長寧縣具陳夷人向攻城時有必欲復讎之言以聞朝命如可撫則撫之於是遣人招撫夷人遂聽命使夷首十二人赴京貢馬十二銅鼓一具告乞仍設土官但畏浩等勢不敢言枉殺父兄事浩等欲實前奏終不與設官夷人益恨復抄掠上聞乃遣總兵官襄城伯李瑾兵部尚書程信等率兵來討三年十二月大軍至芮成由戎縣進都御史陳宜㕘將吳經由芒部進指揮韓忠由普水腦進貴州總兵吳榮為左哨由李子關進汪浩督㕘將宰用為右哨由渡船堡進大軍剿賊燒二百餘砦叙南指揮同知李鑛破凌霄城功為最諸賊既平程信等奏改大壩為太平置長官司舉永寧土人黄錤為長官於渡船堡置瀘州衛尋舉殺賊有功僉事嚴正為副使韓忠為都督僉事充㕘將守川貴地方六年之間賴以寧謐七年大壩夷首阿告殺把事阿尚黄錤并請衛言阿告擅殺在官把事請加兵誅之告言尚本逃民寵於其長毒衆已甚我為衆除害何為請兵誅我欲脇諸砦以反忠正以告詞直乃遣人諭告依夷例酬償骨價則免兵誅告從之遂以銀八鎰酬尚妻子夷黨乃安正德九年葛魁夷人普法惡與夷女米浪通生子假稱浪為王母子為彌勒佛惡為天官潛刻符印造旗劔集僰羿苗猓等夷燒香各給印符一張使佩之謂兵不能傷又謂劔出人頭自落旗動軍馬自潰作諸幻妄謀為不軌夷人愚惑傾心事之十年十二月夷部與筠連縣流民蘇衝等争田有隙屢訴不直惡乗衆忿誘之復讎屠數百人於是諸夷寨俱叛衆幾萬人攻城堡刧財殺人焚廬舍僭上號事聞命廵撫都憲馬昊總兵吳坤調集漢土官兵萬餘人征之七月昊令土廵檢安宇招撫白水江四十八寨來降十月令都司張麟杜琮西從筠路進昊自督都司曹昱知縣步梁等東從珙路進又命通判趙文振監烏䝉東川軍南從本路進刻期夾攻取黨宋老虎母豬岩底及田保白牛落木祥落木柔等寨乗勢星馳至叙復破落崖川山洞猫兒崖洞鷄爪山下火龍響黄溝等寨又併攻峯崖寨普法惡敗走涪州鄉勇皮邦興斬其首自胸至足有毛長寸餘餘黨推阿告為主拒守十二年正月取磨底等寨五月趙文振破大井壩擒首惡羿子阿設者過賊黨悉平各軍通計俘斬三千餘其墜崖溺水者不可勝數二月師回五月阿告等來降鄉兵邀功殺之㑹量田官復増額糧奪降者之田以授他人衆心憤恨流民謝文義乗機煽惑二千餘人九月圍筠連縣守禦官望風奔潰署印訓導李韶竭力戰守賊乃還焚劫千餘家殺擄五百餘人御史盧雍令知府陸芸遣人招撫賊黨來降十一月賊復攻筠連兵備田荆統兵適至討平之嘉靖中戎夷負嶮驕肆綁擄千百户殺死廵檢搶辱知縣妻孥自是刧掠不止六縣而叙州瀘州江安納谿俱罹荼毒蠻酋阿大阿二方三等俱僭王號據九絲城勢甚猖獗萬厯元年廵撫四川都御史曽省吾聲罪請討詔許之於是調漢土官兵共一十四萬有竒悉𨽻總兵劉顯以副使李江監軍江建議先攻凌霄城次都都寨剪其兩翼然後進攻九絲顯從之五月㧞凌霄六月拔都都寨八月進逼九絲九絲峻嶮諸蠻死拒不下官兵亦以仰攻為難止在城下圍守冀賊出奔坐收擒斬之功李江宻報省吾請下令漢土官兵先登九絲者為上功諸軍聞令思奮冀得重賞㑹天雨雪浹旬把總吳鯨土官楊王宗購死士夜半銜枚腰絚而上未明斬關徑薄蠻所蠻驚懼不知所出自相踐踏又五路官兵並進衝殺死者無算九絲遂平先後下蠻寨六十有竒燔營舍六千所斬首俘獲四千六百有竒擒酋長三十六名招安三千三百口拓地四百里獲銅鼓九十三面題改戎縣為興文縣即内官寨列雉為城名曰建武㕔設總兵兵備僉事坐鎮之𨽻以安邊同知一守備司一坐營司一守禦千户所一儒學一其他阨寨悉設堡戍守官兵則自瀘州衛中前二所徙置焉自諸夷為患於長筠髙珙慶江等縣亦云烈矣至是興文改縣建武設學冠裳文物漸逺頑俗而夷患亦稍息明季兵燹頻仍僰羿苖猓之屬亦罹屠戮所存無幾但難馴之性易於走險皇清順治十八年因川南地方初闢文武將吏尚未全設横江四屯夷人陳奎鄭士道為朱奉鋡王應泰煽惑作亂夜至叙州攻城推官霍焜署知縣董顯與戰衆寡不敵城破被執奪去印綬同時賊黨分犯屏山慶符等縣知縣王敬公沈彲力屈被執永寧鎮總兵髙宗署兵備道董明命聞警遣遊擊王魁領兵倍道赴援明命措備糧糗隨營撲剿破南廣復叙城㑹署道紀耀揚斾自瀘而上賊衆宵遁馬湖我兵尾後土官王嗣續亦出土兵相應内外夾攻多所斬獲奪回所執官印而朱奉鋡王應泰及㕘謀張最元先後成擒追陳奎鄭士道等於石灰窑斬之撫其餘類而叙馬人民始得安枕康熙十三年吳逆變叙瀘一帶土夷復乗間騷擾勇畧將軍趙良棟遊撃李芳述等討平之雍正六年六月米貼逆夷陸氏聚衆肆行殺害滇兵川陜總督岳鍾琪四川廵撫憲德提督黄廷桂請兵進剿遵奉上諭指授方畧本年七月十三日提督黄廷桂兵抵馬湖進圍吞都山擒土司德昌兄弟二人攻破夷寨斬賊首屋雞母雞二十餘人擒獲頗多於是分兵四路直搗賊窟提督黄廷桂由黄螂雷波中路進發令副將張玉駐劄黄螂以資彈壓王剛駐劄竹核互為聲援遊撃康世顯渡江斷賊歸路王安民吳維翰髙麟端何懋甫等由太平馬湖兩路截剿斬賊二百餘級擒獲甚衆賊因遁磨石簸箕􅋭内恃險負固提督黄廷桂親至其處周閲形勢見兩山𦂳抱一峯半山有數十峝峝外賊蠻羣持標鎗毒矢并積巨石坐守木柵之下當即分遣官兵四面攻撃自己至酉連克九峝遂拔營前進直抵黒龍崖黄草坪奮勇深入大破賊巢九月十六日生擒賊黨楊明義連奪一百餘寨惡目達姐等皆授首卑租阿路亦次第擒獲土司沙罵投誠招撫苗民共計一千五百九十六户留兵暫駐以資防範夷地悉平先是越雟衛阿羊賊蠻加巴貫子劫掠商旅毎月朔望必湏派撥官兵五十名䕶送徃來名曰放哨自提督黄廷桂削平結覺之後道路蕩平徃來絡繹無阻並安設叙馬建武馬邊大壩峩邊安阜普安各營屬永寧協管轄以控制其險要云附前明廵撫曽省吾議處都蠻疏畧議照都蠻東連永寧南接芒部西通烏䝉北達馬湖而戎長髙珙慶筠六縣近相連絡即古戎僰漢西南夷也唐宋置州内附不過羈縻至本朝悉改為縣流官鈐治屬之戎縣辦納税糧已為編民故土夷環列一有不靖尤勤問罪矧兹編民在中獨可任其跳梁是以洪武永樂宣德正統以來屢用燒劫為害或撫或剿不一然未大創惟景泰元年夷賊並起攻破長寧慶符江安納谿諸縣為之一赤僉都御史李匡監察御史劉澣入山征剿比以癘疫大興賊逃山箐旋復班師天順元年五年兩次攻圍各縣先後遣總兵都督等官問罪延至成化元年賊勢益張遣兵部尚書陳信襄城伯李瑾御史郎中主事等官率領大兵十八萬駐防四年士卒損傷雖衆然亦頗貽數十年之安嘉靖時生齒日繁逋逃助惡毎毎騷動縣官隨剿隨叛愈撫愈張綁擄千百户殺死廵檢搶掠縣令衙署久益無忌至今搶掠又復不止六縣而叙瀘江納均罹荼毒兼之土司平時則交通罔利調征則黨助縱逃包藏禍心漸成尾大失今不治不惟長效尤之惡而地方三面瀕夷時有兵革一隅玩愒衆患可虞此羣蠻之罪在今日法所必誅而以剿為撫事後設官此議處之大畧也經畧平蠻善後疏照得山都巢穴今已蕩平所有善後事宜條為十事庻懲前慮後禦防可以無虞酌古凖今經制因之漸備徃昔負固之區今當屹然成一巨鎮不惟鄰夷近土便於控扼而雲貴接壤亦得相犄角以永治安矣一復兵道查得下川南地方原設守廵兵三道隆慶三年内裁減分廵併歸守道今照守道駐叙州廵道駐瀘州皆係内地相去蠻方動踰五日之程且錢糧獄訟煩多勢難逺周荒徼而九絲初平經綸草昧之始招攜懐逺均田治兵其勢必得憲臣專力彈壓方克内修戎備外震諸夷且總鎮兵權雖重而府州縣一應軍需臨時非有該道㑹同明文必難調發故今日為地方久安之策莫先遵守成法查復兵備與總鎮㑹同行事使文武相資上下相繋庻事有統紀邊方之憲度一新而職有專司善後之安攘有賴矣一設府佐照得都蠻既平夷方盡為中土但去府城數百里據土司四面之中勢頗孤懸又山川險阻夷漢錯雜必得文官分理於下方保無虞但遽議郡縣則荒惡之區所居未能成聚附之鄰近縣分則聲勢隔絶未免仍復生奸僉議謂設同知兼理兵民始為得䇿及查叙州府先年原有通判一員駐劄嘉明鎮督糧後行裁革今見奉明詔查復成法合無於該府添設安邊同知一員照依各省海防事例欽頒關防專駐新築城内管理兵餉収放税糧清理詞訟安撫民夷上承兵道委用下定武職賢否庻邊鎮政刑俱有統紀而錢糧出納亦有責成矣一建城垣照得安内攘外固以設險為要圗而况啓土建邦尤以築城為首務今照山都地方周圍數百餘里扼險設要尤必得道里適中形勢之區方足以壯居重馭輕之勢據司道等官奉臣明文看得各寨舊名多惡宜更換以新耳目權將九絲城為平蠻城凌霄城為拱極城印靶山為文印山弔猴山為降蠻山雞冠嶺為金雞嶺内官寨為武寧山都都寨為都定寨隨踏得武寧一處地土寛厚風氣凑集坐西面東前對文印山後坐金雞嶺左扼平蠻右倚都定應於本處建城以為雄鎮就前面大河為濠城制周圍計九百丈開東南西北門内設總兵兵備道衙門同知府館守禦千户所坐營公署倉塲庫獄城隍廟旗纛神廟各一所修葢營房一千二百間另立演武㕔於馬草坡其合用木石磚瓦等料及造作工價聽守廵道委官估計呈詳修理一移守禦照得城垣既建應有守禦官軍世守本土而外用招兵協守則主客相濟斯保無虞今照叙南衛三所軍數僅一千有零又經題撥馬湖府一所難以别議查得附近瀘州衛先與瀘州同郭止設左右中三所成化年間因大壩蠻叛將該衛改調太平九姓二長官司適中之地奏將重慶衛前所全伍官軍割附瀘州衛奏併四所毎所額設旗軍一千一百二十名今蠻既蕩平即當全衛改入九絲但該衛去新建武所城不滿百里分兵兩地同禦一方聲勢足以相援控扼尤為便益合無將該衛中前二所官軍割併守禦千户一所及將叙南衛原守隘官軍有屯田附近九絲者行兵備道查明附改新所差操充實營伍請乞改定所名另頒印信直𨽻都司仍於叙南瀘州二衛指揮内軍政考選一員掌管所印一理疆土照得平蠻武寧地方廣袤疆界當清而田土膏腴經制宜定東南與永寧九姓太平二長官司東北與戎長髙珙筠連諸縣西北與鎮雄府威静二司相連四面界限已經守廵道同總鎮委官清查明白樹立石碑以杜侵争其見在田地一面委官清丈分别上中下三等造冊收查一面行集附近軍民有情願受廛為民者各委官就籍名在冊分定某處住居量其人力衆寡撥給田畝即為世業仍分别某人上中下田糧各若干新造黄冊註定某甲毎年止徵本等額糧本折各半一應驛傳鹽鈔丁差雜派俱行豁免其髙山深谷不便耕種者分撥附近居民樵牧俱免起徵内有茶利者仍丈量畝數官佃民軍採摘毎畝徵銀一錢收貯所庫專聽兵道總鎮賞犒軍兵花布之費前項田地税糧俱待一年之後徵輸聽安邊同知催徵収放置立循環文簿送兵備道稽查又照所城新復遐荒百無一備戍守官員相應酌其職之崇卑將附近田地量行撥給以敷薪菜馬料之資其總兵衙門田地各一百五十畝同知衙門田地各八十畝新設千户所掌印指揮一員田三十畝千户毎員田二十畝百户毎員田十畝不拘田地永不起科其總兵衙門廪給毎日五錢於瀘州商税銀内動支待新定地方賦有定額即於本處徵觧田地候裁革之時止給一半與遊擊衙門耕種餘一半入官另行招人領種辦納糧差一扼要害照得平蠻地方漢夷雜居犬牙交錯險道連雲深林集霧易於狐兔跧伏之所即今巢穴雖空未免逃匿兼之土夷徃來彼此構釁必湏多方設備以戒不虞除調到土兵已經撒散應畱軍兵酌量備用外所據有名險寨及𦂳要隘關俱應設立堡墩互相守望今議得穵口魚井坑蠻寨文印山得杭都定寨得勝營黑㡌尖山毛壩拱極城頂冠山各設堡一所毎處用兵五百名又於平蠻城山頂設墩四所脚板崖竹柏嶺金雞嶺阿兒寨平寨髙寨降蠻山得九麥易營黄連洞和尚寺洞礦溪落照谷爆筆架山口蠻埡飯甑陳四落甕各設墩一所毎處用兵五十名深溝子銅罐芭蕉歇馬青岡毎處用兵一百名以上官兵即於總兵劉顯並原任總兵郭成㕘將張澤標兵及上年設隘原兵並今年所募新兵内挑選共足一萬七千六百名分劄前項堡墩備行總兵劉顯督同大小將領統攝防守一應機宜悉聽總鎮調度候萬厯二年三月中將前兵汰減七千六百名年終汰減五千名止存五千名候調撥軍兵赴所分撥墩堡防禦及待二年後田糧起徵編取民兵再行遞減並各墩堡應留應革亦俟以漸議裁庻軍食既足而錢糧以次可省矣一起民兵照得蠻方險逺應有戍兵防守見今分布各堡隘者俱係僱募官兵漸當裁減今照本處沃田數多應以本地之利供本處之兵庻可以省公帑之費免轉輸之勞所據見在標兵即使授田屯守似亦寓兵於農之意但各兵係四方選集無冊籍可稽而遽使坐受糧餉之人轉驅南畝風氣不調勞苦不耐勢必逃移他日田地荒蕪不無後慮若作軍田照屯例起科則子粒太重人不樂從募民實塞與額兵屯田事體自難一律衆論㕘詳俱屬不便今議招集附近土著軍民領種田地三年之後照畝起科誠為便利然止徵税糧不起鄉兵則所取甚㣲養兵太少亦非長計合議以糧起兵就令於附近隘所防守自衛身家即保甲相連守望相助之意非所以為厲也合無待户籍既定居民凑集之日毎糧一石起丁壯一名即令於相近隘堡處所聽委官調度操練防禦安邊同知親加督理嚴禁堡官私役科求等弊兵道亦不時稽查以寛恤新民充實邊土一通道路照得蠻夷未平則阻隘塞關以遏截為上蠻夷既平則伐木通道以開治為先平蠻地方在萬山之中徃來曲徑俱由箐林絶壁豺虎縱横徃時蠻衆毎由間道出劫而漢民不敢經行必由羅星落亥迂路濡遲今既蕩平巢穴則山溪便道隨處可通西則由歇馬漢村達黑帽尖山以入得勝營東則由長寧達蠻埡口以至毛壩營北則由得穵口達魚井以至文印山及諸小道可以徃来俱行總兵劉顯委撥官兵剪伐林木開治平坦其外則南廣水路一道直達新城中間有趲木二灘亦當開濬徑通舟楫以達該所仍備造大河船千隻伺兵備道總鎮衙門廵歴之用陸路至叙州府經由慶符髙縣至珙縣計程速則三日緩則四五日若自南廣間道從月口漢陽薄刀嶺羅洗塲龍灣鎮日半可以徑透珙縣但以中途無止宿之處夫馬無接遞之便遂阻不行今應於羅洗塲適中地方設一公館就將興長髙珙慶筠宜賓七縣原僉夫馬内毎縣抽取馬十匹夫十五名共一百零五名委官一員管束在彼答應公差只換夫馬不支廩糧再於薄刀嶺漢陽壩二處令慶符縣添設堡分二所自珙縣起至新所沿途十里設堡與薄刀漢陽二堡俱另編司兵二名遞送公文應給工食照各縣所轄地方編派屬新所地界者暫行珙縣動支官銀僱募候二年之後於該所應徵税糧内動銀僱役以上造船水手應修公館堡舍錢糧等項俱聽守廵二道委官估報修理一設社學照得修文來逺莫先教化今蠻荒所闢既建鎮城本宜立學但桀悍餘風遽難盡革且人民招集未多經制應當有漸合於新所之中設立社學一處大書教民榜文掄選近縣年髙有德明於講説者二名送赴學中為教讀塾師令新集之民朔望赴學聽講其後生子弟送學訓教詩書漸變夷風安邊同知親行提調應給教讀燈油米柴於茶税銀内動支待後人民凑集另議建學育材而文命覃敷矣一恤民困照得髙筠興珙慶長六縣人民二三百年來被都蠻荼毒最苦最深丁壯非被擄掠即散之四方老弱非遭殺戮即轉於溝壑雖有孑遺之民挨縣居住亦朝不保暮而六縣之官徒擁空名有選出不赴任即乞休者此以前時勢孤危不可盡狀今仰一人神武鋭意除殘流離之民漸次復業隨據守廵下川南道議得復業艱難將軍前支剰米豆量動四萬石權為分别賑濟但前米係各倉久貯賑榖所碾幸而因糧於賊得此餘剰堆放之久未免浥爛前項極困之民若非破格蠲免何以慰更生之望扶起瘡痍及照全省順逆水次州縣轉運兵餉辦理雜需軍機所係急於星火亦屬偏累所當併恤伏覩隆慶六年六月初十日奉詔書内一款軍國錢糧隆慶二年三年四年各量免十分之三等因欽遵外及查六縣賦役不多合無將萬厯元年以前小民拖欠各項錢糧悉從特免其餘濱江州縣各將前項應免年分錢糧除已免已完外其未完之數俯准減豁以寛小民供辦之力以溥朝廷浩蕩之恩則所謂既出諸水火而又加之袵席之上民益安集歡欣内地實而外患永消矣國朝雍正七年户部議覆四川提督黄廷桂條奏雷波建昌寧番阿都等處善後事宜節畧户部為遵㫖查議事四川清吏司案呈和碩怡賢親王等謹奏臣等查得四川提督黄廷桂陳奏雷波建昌等處善後事宜十四條除黄螂土司國保情願輸誠獻土已奉諭㫖加恩給以守備職銜並賞銀五千兩外其雷波改設流官應令該提督黄廷桂㑹同督撫妥議具題餘十三條臣等分别詳議具奏據四川提督黄廷桂奏一稱雷波隔江與米貼井底相望又直逼凉山西有烏角東有牛吃水東南有豆沙溪南有虎跳西南有那比二渡通千萬貫一帶路徑繁多皆屬要隘請建城造橋設官修署置塘房添營汛等語臣等按地圗雷波黄螂路通凉山關隘應如所請添設官弁建築城垣併造官署兵房營房動支正項其所増二營遊守等員該提㨂選題補増設兵丁該提召募壯健充當金沙江搭橋之處該提詳勘具奏一稱馬邊石角之中地名西寧隘係卸甲坡黄草坪一帶夷人出沒隘口通黄螂連雷波最關𦂳要除馬邊九汛舊𨽻營兵外酌請増設等語臣等查馬邊一營北接寧越南連黄螂九汛之中西寧尤為夷人出入隘口應如所請於馬邊營増設馬步兵一百六十名并原額共四百名西寧隘増設兵八十七名并原額共一百名將原駐石角把總移汛西寧其作何召募支給糧餉之處該提㑹同廵撫憲德定議具奏一稱雷波黄螂内附伊始尚可不設州縣請設衛守備一員駐劄雷波所千總一員駐劄黄螂官署門役等項照建昌衛所例該衛備弓兵五十名所千總弓兵三十名操練捕緝等語臣等查雷波黄螂地方新附户口無庸建設州縣應如所請設立衛所守備千總以司刑名錢糧之事仍聽永寧道藩臬二司稽查考核其官署門役弓兵悉令照例葢造召募一稱雷波黄螂水陸地利甚廣苗民成熟田畝歴來不知分别坵段限界多致侵佔仇殺今既内附該衛備等應履畝清勘定界守業飭令量納租石數年後再酌肥磽始定按畝起科之制等語臣等查雷波黄螂新附該衛備等勸諭開導將各名下田畝清理界址無令紛擾俟奉公守法之久該督撫逐户詳查量定科則具奏一稱雷波黄螂土地甚多開墾宜急今四方流寓輻輳應效建屬之鹽井衛柏香坪乾縣等處開墾事例仰懇聖恩照雲貴題定開墾事例則應募有人荒土漸闢邊鄙繁盛等語臣等查邊郡荒蕪之地招徠開墾固屬善䇿但雷波黄螂新經設流與建昌之鹽井等處不同不可一槩招集流寓之人聽其佔地開墾該提督斟酌分别其久歸版圗墾户計口授地新附者暫令夷人自行開墾俟安居樂業之後仍有曠土閒田再准流寓之人分墾庻絶争端又杳雷波等處向化苗民據廵撫憲德題請毎十户賞牛一隻并給稻種雜糧以資耕種應將願墾夷苗悉照此例賞給其招徠流寓之人亦應照川陜總督所請川省開墾借給牛種銀兩之例毋庸照雲貴開墾事例更開捐納一稱番民風俗各以土司土目族類為婚請預籌鈐制之法必先確查姻黨註入在官冊籍嗣後有定親迎娶者湏向地方文武官報明如違勒令離異治罪等語臣等查撫綏夷衆惟因俗制宜使之得所若不先教以禮而遽為拂情矯俗之舉則事既難行而法亦未善番民族類結婚習俗已久今一旦禁止勢所不能且從前姻黨令其報官註冊將來聫婚者於定親迎娶時俱令報明地方官未免煩擾至稱瞞官迎娶勒令離異更為未便應將該提督所請毋庸議一稱雷波黄螂新設營伍有駐防兵目復因開墾招徠漢民與夷猓雜處貿易或漢民騙詐抑買致成拉當巨案請設立塲期令該管營弁稽查務令公平交易如敢私立陋規勒索科派以及誘買為奴等弊應照建昌之例從重科罪等語臣等查開設塲期委弁兵稽查係該管文武官自應辦理之事其私立陋規勒索抑買以及誘買苗猓俱有定例應令該提督悉遵成例行一稱苗民夷户歴來不分姓氏或數十人同一名或一人三五其名遇事脱卸漏網請定鱗冊審其姓氏禁其遷徙着落該管頭目查究再苖民出入禁帶利刄併私藏鳥鎗等物照建昌例科罪等語臣等查一人數名不免脱卸之弊應令將姓名審定至魚鱗冊籍等事報造實繁今夷方新附似在可緩其擕帶利刄私藏鳥鎗等物應照定例嚴行禁止一稱雷波所屬土司地方甚廣既經改土附近夷類應歸營汛管轄然千萬貫以下地方山林隂宻奸良雜混查土婦沙氏諸蠻悦服著有勤勞委令安插約束其所生幼子楊明忠交馬邊營經管教訓俟長成應否代伊母管理地方之處另行奏請遵行等語臣等查千萬貫谷堆魚紅天喜哈都魯等處應如所請將沙氏安插約束委千總職銜其幼子楊明忠令馬邊營守備教之讀書知禮俟長成後該營詳請提臣㑹督撫具奏請㫖定奪一稱雷波黄鄉兵食皆由叙府而水陸運送俱艱自應改設折色請將當年徵納耕輸科則按名支放外其餘不敷米石照松潘南坪例毎斗折色二錢四釐分撥官兵自行備辦俟招墾充裕日再為核減等語臣等查雷波黄螂既設營汛則兵食務先籌畫該提督請將耕輸科則支餉兵糧其不敷米石照松潘南坪例折買應如所請計營汛兵丁名口分春秋二季於川藩庫内支發俟商通米賤時據實核減毎斗所支銀兩該撫統入該年兵馬奏銷冊内報部查核一稱寧番為冕山咽喉門户番苗出沒無常請添設官弁再西溪一帶直通阿都利呃為各番出入隘口請於建昌鎮右管抽兵并守備移駐等語臣等查寧番為冕山西南要地應如所請於冕山營内撥千把各一員馬步兵一百五十名移駐寧番其西溪一帶道接阿都利呃亦應如所請於建昌營抽兵一百三十名并令守備移駐至靖逺新設營汛令該提督將冕山所轄東南一帶夷人分定地界歸於靖逺營遊撃管轄一稱漢夷互相交易應分别漢奸科條嚴禁漢人土司代筆主文以致啓釁拉當窩藏劫奪諸弊仰懇皇仁姑先示諭再查夷奸有入凉山勾通情罪照漢奸究治等語臣等查該提督奏陳漢奸情罪詳悉開列通行示諭令其改惡從善倘教而不改則嚴拿按律治罪夷奸有犯者與漢奸同科毋得少縱一稱建南諸番惟阿都强悍現在土目聚姑原係沙罵土司安偉威嫡姪因阿都乏嗣土婦禄氏招贅聚姑管理地方既非阿都親生正派復性懦不能約束夷人不服阿都尚有親女舍哵羈管建昌昨於進𠞰阿都之際調至軍前効力著有勤勞苗猓亦願屬舍哵管轄請㫖量委職銜居住建昌協同土目聚姑夫婦管理等語臣等查聚姑既柔懦不能約束應如所奏以舍哵協同聚姑夫婦管理阿都事務至量委職銜之處俟舍哵辦理三年之後果能約束夷衆遵法守分該提督具奏加以副土司職銜兵部給與號紙可也以上十三條臣等據愚見議覆伏祈皇上訓示為此謹奏請㫖雍正七年六月十二日奉㫖依議招撫雷波各苖民疏四川廵撫都察院右僉都御史憲德題為招撫苗民事據四川布政使司布政使趙𢎞恩詳准永寧道移稱案奉本都院牌開雍正六年十一月初六日准提督黄廷桂咨照得雷波阿照等處賊蠻勾結跳梁誠為國法難容本提督奉命進𠞰仰仗天恩其首惡賊黨悉已擒剿苗疆亦已底定進剿之時各處苖疆有扶老擕㓜匍匐行營誠心歸順者俱經安插尚有老幼夷猓畏威逃匿山林者既屬無辜自當仰體皇仁予以招撫使之仍歸住牧各得其所又必善為化誨令其認納稞糧毎嵗徵収可以繩其野性今本提督駐劄竹核相距雷波阿照等處路途遥逺不能辦理惟冀貴道㑹同遵義協副將張玉叙馬營遊撃鄂世威逐處招撫查明户口分晰納糧數目造具清冊分送再有逸賊二名達姐覺木雖非正犯係卑租供出之夷前派兵捜擒據捉獲苗蠻供稱逃徃結覺今結覺已平查無達姐等踪跡未知生死今乗招撫之便詢其就撫諸苗查明去向即與駐防協將商酌捜捕庻不致漏網等因除照㑹永寧道並行遵義協副將外相應備移等因到本都院准此合就檄行為此仰道官吏查照牌内咨移事理即便星速㑹同遵義協副將張玉叙馬營遊撃鄂世威將雷波阿照等處逐一招撫查明户口分晰納糧數目令其認納稞糧造具清冊以憑題報等因行查去後今據該司道詳報前來該臣看得雷波阿蘇等處賊黨勾結跳梁助逆不法奉㫖命提臣黄廷桂統領漢土官兵進剿仰仗天威逺震首惡兇黨悉已就擒剿撫兼行苖疆底定但查各土司多年殘虐苗民久不聊生幸遇王師得離湯火今咸來歸附向化輸誠又當仰體皇仁予以安全俾仍歸住牧各得其所臣准提臣黄廷桂移咨隨行永寧道㕘議劉嵩齡前徃雷波等處㑹同叙馬營遊擊鄂世威等逐為化誨加意招撫隨據該道詳以招撫苗民必用賞需行據署布政司事建昌道㕘議劉應鼎議覆動撥軍需銀三百兩令該道承領自備賞項帶徃招撫地方酌量分賞去後嗣據該道劉嵩齡報稱㑹同遵義協副將張玉叙馬營遊撃鄂世威等逐一開誠化導宣示招徠旋有雷波壩等處苗民價的六合等並那古壩等處苗民結壁嚕日等共七百七十七户計大小男婦三千七百一十四名先後投誠就撫查驗各苗民俱係傾心向化仍令各歸舊巢應請分别賞恤將那古壩等處苖民以地土現係成熟止賞各頭人銀牌花紅以示鼓勵雷波壩等處苗民俱在乏食俯仰艱難請於現存軍需米内按口給與斗米以示賑恤又查各苗地方在在荒蕪時正春耕牛種無措應請酌給牛種俾得及時播墾衣食有賴可否撥銀三百兩同前次所領賞需銀兩通融買給等情臣復行布政司查議據覆似應如該道所請分别賞恤其應酌給牛種亦如所請於軍需項内動銀三百兩觧交該道㑹同協營等酌量置買散給以廣皇仁等情又經臣批令該司動銀移交該道照議速行並查所賞恤銀米數目及應需牛種為數若干議報題請去後兹據布政使趙𢎞恩詳稱准永寧道㕘議劉嵩齡移報那古壩卸甲坡二處苗民共三百零九户男婦大小八百七十九名止賞各頭人以銀牌錦綾烟布等項共用過賞需銀三十五兩二錢六分雷波壩等處苗民共五百六十八户男婦大小二千八百三十五名遵照於支存軍需米内動支按口給以斗米共給過米二百八十三石五斗至各苗民應需牛種議以十户賞牛一隻共約需牛五十七隻並合衆苗民共約需稻種雜糧各五十石俱各分途採買逐處賞給以資耕種統俟事竣一併核實報銷餘存銀兩歸還軍需原項合並聲明移令該道將各苗民户口花名及有無願納稞糧並此外再有續招苖民作速查造清冊移送至日另詳咨部等情詳請具題前來臣覆查無異除飭令永寧道照造各冊至日另咨送部外所有招撫苗民動支軍需銀米分别賞恤並約計酌給牛種數目理合先行題報臣謹具題伏祈皇上勅部查照施行川東道屬重夔重夔二府去㑹城頗逺所屬達東太平大寧大昌等州縣達州今改直𨽻轄東太新等三縣達州營今改屬川北鎮轄山深地曠流移逋逃易於嘯聚為盗明正德間羣盜藍廷瑞鄢本恕廖麻子等相繼倡亂為蜀中大害又所屬黔江武隆彭水忠涪建始奉節巫山雲陽等州縣界與湖廣施州衛所轄散毛施南唐崖中路等夷司犬牙交錯加之播酉石砫等司土漢相雜争鬬劫害無歲無之𢎞治元年設兵備副使駐劄達州統轄重慶黔江並忠州瞿塘並湖廣施州衛等衛所而達州東鄉太平三州縣又調重夔新寧梁山墊江長夀銅梁合州巴縣蓬州渠縣營山岳池鄰水大竹等衛所州縣軍快共二千名團操防禦嘉靖十年於黔江千户所與散毛宣撫等司交界處設立老鷹等三闗五堡就於該所分撥官軍防守嘉靖二十年廵撫都御史劉大謨廵按御史王珩㑹同湖廣撫按具題改調九永守備官一員於施州衛駐劄約束散毛施南中路等土司苖蠻兼制酉陽石砫二宣撫司石耶邑梅二長官司黔江守禦千户所並聽川湖守廵官節制嘉靖末大足縣民蔡伯貫以幻術愚衆攻破合州定逺等州縣黄中盜據雲萬山中旋即剿除萬厯初夔州府知府郭棐建議夔屬山溪阻深鳴吠之徒慣於嘯聚請設通判一員自是事專責成數年之間盜賊衰止無復揭竿之民明季夔門不守獻賊入蜀沿江州縣大受屠戮且土寇蜂起互相殘殺所存人民牛種既無耕耘盡廢千里無烟斗米值數十金而酉陽石砫諸土司亦疲於奔命固圉弗遑矣皇清布昭神武處置得宜土夷稽顙就我戎索惟夔屬寧昌間舊為十三家賊李來亨等憑據皇仁浩蕩屢行招撫頑梗不悛康熈元年四川總督李國英鋭意廓清題請致討朝廷可其奏命湖廣陜西四川提督合師進剿國英授鎮將方畧遂復夔郡二年癸卯正月元曰進兵羊耳山賊袁宗第焚營挈老幼遁匿深箐中諸將謂宜速追國英曰賊之羸誘我也因屯於大昌下按軍不動度宗第疲且窘乃遣將出竒冒險突擊搗茶園坪宗第竄逃巴東賀珎子始率其黨來歸命昌寧悉平二月師次巫山適郝揺旗棄房竹至巴東與諸逆合攻七連坪楚師失利賊勢猖獗且謀犯蜀國英曰巫地勢低凹難以馳驟賊衆逺來利速戰我堅壁以待彼不能久持乗其懈可擊而殲也於是躬先士卒繕完城垣國英與提鎮分汛登陴仍調水師鎮總兵譚詣防江為内外翼至八月二十四日賊合數萬衆直薄城下攻圍甚鋭我軍静以待之乗其鋭盡鼓勵鎮將於九月初七日黎明四出衝賊營斬首數千賊衆敗遁郝揺旗竄入大寧國英檄五寨鄉勇扼險據守復諭降賊約還其妻子之被俘者公誠所布入人心腹由是羅茂同向風倡順郝袁之衆接踵歸誠而劉二虎營中隐㣲機宻無不洞悉於我軍矣十二月西安將軍傅副都統杜大兵至先搗陳家坡再舉老木孔賊黨望風奔竄體純自縊我兵乗勝長驅雪夜擒郝袁等渠魁於黄草坪獨李來亨仍負隅茅麓山康熙三年正月靖西將軍都統穆咨㑹總督李國英等恭同禁旅進偪賊壘國英環視逆寨延袤六百里壁立如削乃分汛據險以困之閏六月初九夜賊犯通梁死戰冀脱我師奮勇截戰來亨計無所出繯首自焚而死馬黨塔王光興窮廹投楚我師凱旋蜀楚以寧夫以蠢兹頑梗勞我王師二年而後克之經費不貲飛運維艱非以其地僻山險三省錯壤狐兔易為跧伏攻難而守易歟然前此兵燹頻仍營制廢弛今則重夔水陸俱安大鎮城守而黔彭巫山梁萬昌寧達州太平達太二營雍正八年改屬川北鎮各營俱設重兵彈壓雍正八年四川提督黄廷桂復題請全川沿江設立哨船自是河道寧謐徃來商旅均恃以無虞矣附前明廵道張儉麥子山議為清察賊巢修備關堡以防後患事近該本道廵歴夔州府詢訪民情土俗俱稱麥子山地方重岩複嶺陡澗深箐非惟山勢惡險兼且地連湖陜素為盜賊淵藪如先年鄢藍嘯聚於此釀成大患蜀中被其荼毒即今雖云寧靖但舊穴猶存難免日後之患已委夔州府衛經歴文尚綱陳瀚朝前去踏勘地勢詢采居民方畧或焚其林箐或塞其險阻或究其出没要路應否設堡把守務使賊巢掃蕩永保無虞以為經久之計去後今據各官稱遵依親詣本山訪看得山勢延袤數百餘里東抵湖廣當陽房竹及本省寧昌等縣北隣陜西平利及本省東太等縣西南二面與本省奉節雲陽開萬等縣連界内有紅線岩篩羅壩栗子砦雙古墳四處原有古砦舊基可容百萬餘人壁立萬仭四面俱是懸岩止有一線之路可通上有平田古井足供衣食山腰天生石門一座若被賊把守再無别路可登正所謂一夫當關萬夫莫敵者也山内雖有新舊居民千有餘户但地廣居散力分勢寡難以守禦况北連萬頃柴山常有各省流民一二萬在彼砍柴以供大寧鹽井之用一遇饑荒即投入山據險流劫尤為可慮本山居民願乞於石門雙古墳篩羅壩等處通賊要路設立關堡鄰近居民情願編為夫甲輪流把守緩急有備使各賊不得入山據險民得安生等因轉呈到道看得麥子山之利害繫全蜀之休戚歴年以來因無先事之備徃徃致賊據險流劫釀成大患今據所呈欲於石門雙古墳篩羅壩通賊要路設堡編夫把守則本山居民各以保家為念不待督責而嚴似為有見合無依其所擬委官前去估勘設立併將本山新舊居民量地逺近編立火夫分屬各堡仍選立千夫長一名百夫長五名本道給與粉牌管束令其輪流把守杜賊入路其立堡所費除本山原有石木不計外應給工食量於附近縣庫查支無礙官銀給發不許侵尅冒濫毎月朔望日附近縣分仍取各堡千百夫長不致縱賊入砦賣放正盗妄拿平人結狀申繳本道查考各完日將動支過銀兩數目編僉過夫甲姓名各造冊繳報庻幾永為禦備之規潛消意外之變矣川北道屬巴通通江介秦蜀之境蕞爾孤城設在萬山間崇林絶嶠一睇數百里夙號巨寇出沒之藪明成𢎞間鄢藍猖獗陷破城邑都御史林彭先後提師數年始平嘉靖間何賊倡亂據險勤兵三省凡四載始議招安萬厯間秦中黠賊嘯聚山林竿旗挺刄剽殺生民守備鄧起龍督兵剿之民稍獲安明季姚黄賊盤踞巴通間而長林豐草之中悉為負固藏奸之所我皇清定鼎蜀路蕩平而川北先被聲教設有專鎮彈壓巴通營復有守備千把馬步戰守兵以防禦之斯深山窮谷盡有居民無復有潛藏竊發者矣四川通志卷十八上欽定四庫全書四川通志卷十八下邊防建昌道屬建昌建昌本西南夷地唐末改曰建昌府明置建昌軍民指揮使司㝷置行都司領衞六曰建昌曰建昌前衛曰寧番曰越嶲曰鹽井曰㑹川守禦千户所六曰禮州曰打冲河曰德昌曰冕山曰打冲河中左所曰迷易長官司五曰昌州曰威龍曰普濟曰馬喇曰卭部俱屬行都司沿邊各路設關堡六十二處各於本衛撥軍防守成化二年設建昌兵備道副使十六年設分守太監嘉靖四年設守備官一員以都指揮體統行事守備寧越地方駐劄鎮西守禦千户所七年又設守備官一員亦以都指揮體統行事守備黎雅地方駐劄雅州守禦千户所十年撤回分守太監十五年二月建昌地震數次死傷甚多軍民驚惶無措寧番越嶲鎮西卭雅等衞所州縣同日俱震愚民妄為古瀘州沈海之言轉相煽惑幾至為變廵撫都御史潘鑑廵按御史陸琳禁止訛言補葺城郭預支軍糧優恤被災人户拖欠舊糧暫令停徵脱監囚犯悉聽首官酌處為事軍職亦令聽委立功贖罪被傷極重之家免税糧一年後乃無事隆慶六年逆酋安文等因與土官瞿氏争襲統率蠻賊首惡阿貴佐擢拍自牛瀘阿阿支撒他等廹城擾害至萬厯元年四月十九日文等率各番蠻劄住木拖邨凹郎河等處擄劫人財建昌道兵備副使楊芷㑹同監理通判王爵牌行各衛官齊集兵民人等嚴守城池先令旗軍周英等前去安文等賊營宣諭利害陽為撫安以便整旅將原募兵勇八百餘名分劄城關要害調取土舍安鎮土官家丁逆止穤姑咱計始撒刺各率部兵馳赴土官院南門橋要賊賊恃黨衆於本月十一日突至城下芷親督兵驅戰授以方畧官兵奮勇截殺擒斬數百人奪獲甲馬器械若干建昌六衛軍民始得安枕萬厯三年廵撫都御史曽省吾廵按御史郭莊題將建昌前衛併入建昌一衛明末兵革之後荒蕪極目所有衛所屯軍凖以當時舊額尚可得十之二三但番猓出沒不常行旅居民頻遭刼擾我朝恩威逺及剿撫兼施南番東猓以及卭部蠻酋莫不震懾順治十六年四川總督李國英廵撫髙民瞻蕩平黎雅之後冕㑹寧越相嶺瀘河鳥道一線梗阻全消署兵備道張元凱親詣各汛查驗衝險詳請兩院題定經制易行都司以總鎮府鎮標遊擊三員守備三員千把總十八員馬步戰重兵彈壓冕山㑹川仍有專防後兵備道奉裁至康熙八年仍設建昌道有監理㕔以司糧糗更有建昌㑹川鹽井寧番越巂等衛守備五員守禦各所千總十五員雖改軍為民亦足以壯控制之勢但番性貪險惟事剽掠可威制而不可德化防禦稍疎即乗機刼奪順治十八年總鎮王明德調征川東後凉山各寨番猓嘯聚大衆盤踞冕山相嶺刼殺桐槽站屯堡商旅不行塘撥不通署兵備道張元凱奉廵撫佟鳳彩方畧相機捕剿斬獲頗多逆番始平康熙九年四川廵撫張德地前後十餘疏大概襲土官以重羈縻請印記以專事權酌減税務請恤災傷議邊官之去留勸邊地之開墾其所以布置内地安戢外番可謂周悉而切當矣康熙二十七年㑹川營所轄東夷阿所因守備常珍失於駕馭致成邊釁為賊所傷隨經遊擊吳永祚討平之建南土夷迷易黎溪紅卜苴普隆膩乃維沙普雄那交濫田壩覺魯黑保嘴裴貝大孤山吽他等素恃險逺叛服不常康熙四十九年四川提督岳昇龍統兵招撫先是寧番城西土夷獏狻搶掠人民遊撃周玉麟領兵剿討至坎到底地方為賊蠻羅都伏弩所傷亡於陣至是提督岳昇龍一併撫定俱各納土歸誠康熙五十五年越巂衞所屬阿羊夷人加巴貫子結連腊珀嚕都肆行不法四川廵撫率漢土官兵討之於十一月初八日抵越巂城外駐劄諮訪地利知阿羊賊巢地名紅岩相距越巂衛六十里阻隔溪河山箐陡險其所勾連紅岩以北則有小臘梅松光林載白沽恰里嗎阿波羅姑巴沽西糾白石岩等夷砦紅岩以南則有腊珀青崗林普雄落處必歴老紅羅烏結白等夷岩俱係連山夾箐延袤三百餘里各砦有數十户者有百餘户者皆猓玀種類約畧二三千人素相交通聫絡又越嶲城南有炒米關兩河口皆通普雄小路阿羊出沒之所而賊夷後路又可抵峩邊營之太平墩一帶山箐俱分布官兵堵截要隘廵撫率守備蕭應鴻李萃等劄營紅岩居中䇿應復遣冕山土百户慕庚糯猓咱等齎傳令箭前徃賊寨宣布朝廷威德冀其悔過革心乃逆夷自負山險執迷延玩於是飛檄各路同日進剿連破其巴沽普雄東山木枯等岩殺傷賊蠻數百直搗阿羊巢穴絶其黨羽隨將五里箐南至青崗林普雄落雪羅烏等處交膩乃安撫土司經管五里箐北至腊珀嚕都紅岩小臘梅交䕶理卭部宣撫土司經管自西糾至巴沽白石岩等處交煖歹宻土千户經管令其約束蠻人各安住牧雍正四年建昌糯咀所管夷猓金格等滋事不法騷擾邊境川陜總督岳鍾琪奏請調總兵趙儒副將張成隆等於本年八月二十六日領兵進古魯橋直抵羅乾縣五馬山等處努力前進奮勇殺賊擒獲賊首金格阿租官夀斬首大小凉山逺近番蠻悉已歸誠又因大赤口為凉山之咽喉建昌之門户隨委峩邊營守備司九功帶本營兵丁於大赤口近通太平墩一路清查户口踏勘形勢經過膩乃等處橋梁道路又招撫二百餘户均令剃頭留辮認納糧差雍正五年寧番三渡水黑麻溪腊汝窩等寨番蠻恣行盜刼擄掠人民川陜總督岳鍾琪奏請各路漢土官兵進剿正分布間黑麻溪瓦都瓦尾哈哈等村蠻赴營乞降許之維三渡水迤西生番心懐反側總兵趙儒副將王剛統兵進剿從頭渡造船齊進分兩翼擊之破其中渡水黑岩對山之兒斯等七寨雍正六年六月三渡既平遂乗兵威進剿腊汝窩先是兇蠻住牧建昌㑹鹽營西共十二邨素行不法於康熙五十八年殺傷鹽井衛守備李起龍屢經官兵剿撫至是復叛川陜總督岳鍾琪委令洮岷協副將王剛領漢土官兵分三路進討連破賊寨追至左所之水寨地方擒獲首惡丫馬車其餘河東各寨助惡番蠻俱經剿撫陸續投誠隨同建昌道馬維翰調集各處番猓並招回之麽麽以及哈哈窩卜等寨男婦五百餘人於青山嘴地方宣布天朝威德羣蠻皆洗心改過認納糧差永作良民是年十月四川提督黄廷桂進討結覺適建昌逆番阿驢阿都等狂悖不法殺傷滇省官兵隨撥兵救援復親臨䇿應分路進剿斬其首惡助兵之别哺加樂阿必擒觧滇省所有剿平結覺地方交沙罵土司管束餘衆招撫化誨各蠻俱畏威感德出寨投誠情願認納糧馬各安住牧先是川陜總督岳鍾琪既定諸蠻據建昌鎮趙儒建昌道馬維翰㑹詳題請凉山普雄安設營汛議將阿都宣撫司慕枝等二十一員土千户暫交河東宣慰司兼理建昌鎮標中營遊擊分汛管轄審扎土千户顧車喇嘛等三員附近凉山歸建昌鎮右營遊擊分汛管轄水黑岩土百户韓雅皮等九員番部俱在漢民界外或隔三渡河或附近凉山歸冕山營遊撃分汛管轄擺站田土百户大咱等五員並寧番安撫司地方俱漢番雜處歸寧番衛守備管轄與漢民一體編甲輸納膩乃安撫司維沙等八員番部深居凉山普雄歸越巂營遊擊管轄土官土百户六沛等七員番部俱近凉山歸寧越營守備分汛管轄大赤口土千户啞志等三員番部俱係凉山後路歸峩邊營遊擊分汛管轄外有曲母土百户咩咱愿繳印信號紙改土歸流其一切經商官道俱倣松潘之例毎十里築土堡一座週圍約一里五分以資䕶衛毎五里築土墩一座週圍仍築土堡約濶七分以便兵民同住共相守望且議善後事宜八條一近地土司宜酌改流以一治理一守土司牧宜改設以彰表率一苖猓攜帶兇器宜定處分一地方疆界宜清一拿賊之法宜定一蠻俗稱呼宜更易一蠻人拉當永宜杜絶一漢蠻貿易宜定塲期以杜流棍鑽夷之弊俱候睿裁奉㫖依議自是萬仭蠻山盡歸王化改建昌衛為寧逺府領三縣一州一衛設營防汛詳載兵制而其籌畫經營之處合觀前明建昌兵備道鄧貴善後條議今昔時勢又可覽而悉矣附前明建昌兵備道鄧貴善後條議一直陳建南地勢以便防禦竊謂歴建南者然後可以談建南亦必備知今日建南之情形者然後可以治建南殆未可以耳談也以蜀邊而論如松潘與番隔河為界又苦寒不宜屯種故城堡之外並無漢人邨落是以營屯一固事體歸一亦便防守也至遵義先年播州之役已改設郡縣盡為編户至於善後又加派兵餉一十三萬經十年而始減故力完而守易也乃建南然乎哉彼建夷負固一隅蠻烟瘴癘自大渡河起至金沙江止一千五百六十里皆髙山峻嶺而五衛八所各據要領又皆與西番東猓百十餘寨為鄰漢人所藉以徃來者止有一線鳥道廻繞屈曲殆三千餘里以三千餘里之鳥道經百十寨夷之隘口雖有營堡稀若晨星豈能保無疎虞此其無月無日無時無刻而皆當為防五衛八所毎歲額辦屯糧五萬餘石邨屯星散既不能如松潘之歸一兼以前歲大舉比之遵義兵不滿四萬限不過五月元兇雖已授首逋酋豈能盡殲伏莽假息尚繁有徒職以不才謬承善後之責目撃藩庫如洗籌兵措餉千難萬難所幸五年以來仰遵憲令寨酋靡不聽撫拮据業有次第即如邇者土官安崇業為醉忿自刎中外駭傳咸謂各寨無統先年安世隆之變必且復見於今日迺以在在有備在在戒嚴各夷即欲乗釁為奸而終不可得且近奉本院批勘繼立土婦之事原據監理並副總閫司各衙門㑹同四把事召集各火頭保勘在案又該職遵行覆勘院檄一傳四十八寨馬火頭喇咱脚故阿咱普馬沙罵什卜革革沈渣已卜罵魁期江西脚㘽氣拍落烏脚㘽幸駕五列厄拍卜得阿友故拍者脚胯坡咱脚説脚散阿水説果已架脚鳥咱暮等各率部落叩首轅門願保瞿氏聽受約束又據監理總閫復令建昌衛指揮王國揚等押發於教塲仍命立誓歃血各立木刻以後如有奸夷潛出願聽軍令協擒獻功此衆耳衆目共聞共見者職竊謂五年如此而後日之建南可知也故夫千里鳥道防守最艱此天之所以限建南其地勢然也餉額一定兵食兩足無事可以屯耕有事足以防禦國威既振邊氛自消是職等遵奉憲令所恃以守建南也一乞查邊額以壯藩籬建南係全蜀籓籬查蜀志唐天寳以來南詔歳為邊患大厯十四年十月南詔令吐蕃帥兵十萬三路入寇而一路自黎雅卭崍關陷諸郡邑太和三年復陷邛巂逼成都劫玉帛子女以去咸通十一年冬蠻賊圍成都矢石如雨蜀地大震十四年又入寇造浮橋濟大渡河至新津而還明年始修復卭崍關大渡河諸城柵内地稍戢至宋藝祖以玉斧畫大渡河而邊患息與宋祚相終始則建南今日即議善後亦為全蜀豈為建南乎昔太祖統一海内旋定西蜀改建南為五衛添設續裁前衛共六衛原指揮八十五員千户鎮撫七百六十八員此官額也衛所城操並撥守屯堡共官兵五萬八千餘名此軍額也本邊軍餉惟是建㑹二衛取足於本地屯糧至寧鹽越三衛並冕山鎮西二打冲四千户所官軍三萬一千五百零八名俱六個月取給於内州縣民糧據先署監理同知赫奕譚天相冊報毎嵗額請内地協濟糧米一十三萬四千九百九十五石零五升銀一千八百五十兩以越巂論毎米一石折銀八錢以鹽井論毎米一石折銀九錢即今三衛四所毎嵗六個月尚仰給於藩庫可考也此餉額也以國家勘定之餘威先年本邊全勝之物力故五衛八所之長皆足以敵蠻勢而制其死命豈非坐収勝算哉二百年來邊備日弛蠻害日慘官軍日耗屯堡日虚迄今查五衛八所指揮千百户鎮撫止一百四十三員矣衛所各軍逋亡殆盡今止存五千二百四十九名矣當事者不為設法勾補以為本邊籌桑土之計且舉本邊協濟額糧陸續盡移於松潘等邊以博節省之名彼百十寨夷更何所憚而安得不貽頻年之劫殺乎顧久移之餉無望再復而當全蜀連嵗兵火之擾閭閻之困已極又豈堪派累兹幸善後以來仰遵憲令又仗藩臬同心百計措處一留原題建南合營操標兵歲額餉銀二萬三千二百一十二兩一督令五衛官軍開墾積年荒屯歲抵餉銀一萬二千四百二十五兩零督令營堡目兵開墾一帶荒地収租歲抵餉銀三千八百三十二兩零清理歴年各衛民糧餘剰脚價等項歲抵餉銀二千六百六兩零以上共留兵四千六百八十名歲該餉銀四萬一千九百七十七兩零並舊防兵四千二百零四名歲額餉銀三萬八千三百一十五兩零歲共八萬零二百九十二兩有竒合之五衛八所見在城操官軍五千二百四十九名總共軍兵一萬四千一百三十三名比之當日額軍五萬八千餘名尚不及十分之三查自大渡河起至金沙江止計修舊營五十六處増新營七十七處共一百三十三營堡皆經本道冐瘴渉險相度形勢緩急定為額兵以扼各寨之吭今幸五年於兹二千餘里在在有備在在皆有額餉似可為善後之一助然非藉憲示難以垂久也一沿邊險隘宜修以保金湯夫王公設險以守其國内地且然矧以歴年劫殺之建邊乎本邊建㑹鹽寧越五衛並禮州冕山鎮西等城皆頗堅固此後時時修葺儘足防守又建昌為五衛腹心歲苦凉山諸寨為患今從父老之請已奉兩院批允為築一大石城設有額兵且耕且守皆云此建昌百世之金湯也惟德昌與建鹽打冲此三城者創自國初皆四面鄰邊倒塌日久急宜修築至於鹽之河西建之瀘沽鐵厰松林越巂之南關桐站此皆軍民輳集之地四面鄰夷之衝即今隘口皆有營堡目前可無他慮而數年之後亦當漸為各築一石城或為量築一土城庻城堡一築番猓不敢以生心而烟火聫絡守望皆可以相助况查一切工築銀兩本道歴年皆有積剰不煩派之民間者苐甫定之邊瘡痍未復未敢遽興大工以聽後道另詳此亦建南久安長䇿也一通夷法禁宜嚴以杜邊釁夫本邊所恃以安民禦蠻而長保敉謐者獨恃有國法耳顧通夷之禁不啻三令五申奈本邊軍民狃於粗安有乗夷市而恐嚇以討人命錢者有私授於蠻而從中播㺯者有潛販違禁者有賴騙蠻債激蠻之怒至綁擄人口以代償者有蠻債不還而反誣報為搶掠者有収留蠻口為奴婢者有衙棍指稱激成蠻患者故夷市不嚴則貿易即為劫殺矣播㺯不繩以重法則奸宄悉為牙爪矣私販違禁不設法擒捕則控制不得擅長技矣蠻債不為切禁則挪借即為綁擄之媒蠻奴蠻婢不禁則閨閫即為諱盜之門矣指稱不為窮治則七十二屯之焚劫且復起於衙棍矣國法具在邊例尤嚴非獨苛於邊也要令人不敢犯故長保敉謐也兹節奉明文舉行鄉約編立保甲若不嚴連坐之法誰復肯為官家任怨者故十家為一甲十甲為一保不論尊卑長幼並所歇客商盡書名於一牌所營之事所歇之客所徃之處保正一月一報冊於官有犯不首者十家連坐而犯應遣戍者必延綏極邊等衛南人北去與大辟等耳軍即僉十家之中最殷實者為觧子其餘幇貼盤費以一軍而累十家則十家懼矣十家又以富户為首觧則富者自愛且有所懼矣此亦牽制奸民之一䇿也一土官乗機宜革以救邊民夫邊職之漢夷並設也實番蠻雜處非兼土司不能聫屬也查先年寧番土酋怕兀他從裕嚕特穆爾為叛太祖特命總兵徐凱征討遂廢土改衛止將環居西番編為四圗聽我羈縻㑹川鹽井雖設土職火頭然皆各有分土不甚桀驁越巂卭部土官嶺柏應自嶺鳳起釁搆難移之柏香坪今可無慮獨建昌安土官雖有總轄之名號原無一定之寨分先年舊居衛城萬厯丙戌毎夜出城劫邨左右兩所官軍不堪荼毒至有率衆攻城以討賊者丁亥周憲副光鎬請於兩院奏調土漢官兵剿伐始定雖將土官移居於城外之東街苐去衛城不數步蠻丁出入終不能禁此所謂腹背之一大疽也查安氏世職以來安革安仁安夷安忠四世相承衛蠻猶多懾服嘉靖末忠妻鳳氏權攝夫職是以患成尾大鳳氏死疏屬安登冐嗣蠻心不服是以有厮養卒逆止之變安登死其妻瞿氏紹良更無能節制是以安文頻歲為叛至有臨城劫村之慘瞿氏紹良死安世隆嗣而其妻沙愛以踰城淫奔為安世隆所逐又為羣奴力怕等復煽諸蠻擁沙愛為主且與世隆相讎殺是以貽本邊之禍今安崇業又以逺枝承繼且性狡猾邇者奉㫖鵰剿屢漏洩賣放及聞善後留兵益鞅鞅不樂毎日垂頭喪氣如有所失此酋不死建南之禍未息也兹幸天斬其嗣據建昌通學生員呈乞停土官之繼仍復先年責成四把事約束之例以絶禍本以救邊民但土嗣雖絶尚有土婦先年夫亡妻繼之規倘瞿氏不蹈覆轍則異日嫠嗣已絶即不議繼可也矧四把事原同土官管束部落者彼皆係籍蠻種熟知其情今其弟男子姪又多入泮屬我編氓儻四把事果堪約束亦可以代土官之責更為駕馭之便即不必議繼可也儻謂國制不可驟更亦聽彼時臨期斟酌以俟後之君子可也近據瞿氏承繼屢奉本院厪念再三駁勘為邊民籌久安之䇿此亦異日酌議土官之一大機㑹也一將領宜加激勵以便駕馭夫本邊環繞三千餘里倚將領為長城而將領終歲責成視勸懲為勤怠道鎮以下各有責任所以奬翼其忠義而痛治其玩愒者惟恃有激揚大典耳顧邊警非毎歳糾㕘則疎虞者無懲邊功非毎歲品叙則勤勞者無勸矧善後立法之始一次失事即難逃於歲終之㕘而一次停俸又將冀於來歲之復孰敢視為傳舍而不争相濯磨也至本邊千總亦係邇者大征所選調於各邊或曽攝守備或加銜指揮等官此皆才畧翹杰赳赳干城之望而鵰剿以來留守本邊又皆各寨信服可戰可守之士頃䝉撫院憲牌内開營堡提調等官如一季已終地方寧謐無有他失者官兵議詳奬賞仍掲薦優擢等因通行在案又據行都司掌印張大道呈稱浙江之沈有容以布衣竟躋㕘將惟防海獲薦得致顯位又周三陽陳邦憲二哨官耳乃於四十四年内斬賊三級遂兩院題薦人思自奮瀚海晏然今建南營哨擐甲千總提調肅肅兔罝靡不乗時思奮大之拔寨陷陣首奏掃蕩之㨗次之冐瘴涉險亦標擒斬之功獨無課殿之例遂不入題叙之條雖竭蹷報效九死一生總之不過一千總止耳一提調止耳似應比照閩廣浙直防海之例有功無過者毎遇歲終得與題叙不則嚴加處分等因條議在卷看得建昌邊防吃𦂳全在各處總路隘口劄營扼險所責成於千總提調者最為得力惟有歲終一題乃可以激發其志乞本院垂念甫定孤邊㑹同撫按院俯允行都司所謂得比閩廣浙直防海歲終之例彼聞進身有路孰不效死力而壯邊聲是亦善後駕馭之一䇿也一邊儲吃𦂳宜籌以實軍需夫國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國矧在不毛窮邊乎今連歲豐登而一觧糧少遲即不免枵腹倘歲值大祲本邊既無所入而内地徵觧又未必如期將聽營堡逃散乎若禁營堡逃散將使枵腹守隘乎西番東猓百十餘寨彼且乗時蜂起將何以待之乎大征之舉可以再擾乎故邊儲不可不籌也查得本邊瘴癘之苦各營堡逃亡事故無月無之而逃故者又勢不能不為急補乃免於疎虞即以此曠役之剰糧或扣其本色貯之建越兩倉或扣其折色聽監撫兩㕔歲終㑹計報道轉詳兩院毎歲以此存積量糴十分之一另項上倉登報循環以聽查盤以備凶荒而扣本色者皆追納净榖或納糙米可以久貯而無蟲蛀之患但不許止納舂净之米易生蟲蛀且為異日倉攢斗級得藉為侵耗之名又蕩平以來五衛軍民亦有援例納吏聽其赴布政司告納給帖止令上榖於本邊寒苦地方如越嶲鎮西二倉不滿三五歲亦可積榖無算以聽查盤以備凶荒而何憂於水旱乎再查鑄錢之令所禆於軍需不少先年原任行都司臧京奮然力主其議祗為有司之初入仕途者未諳事務妄議停阻今查重慶等府皆已興工况建南與滇接境俱係産銅之地毎次哨期皆為客商販之外省在在鼓鑄官民兩便而本邊獨不獲鑄錢之利豈不深為可惜竊謂今日善後計此法終不可罷也一邊地器械宜精以裨實用夫營堡而無兵甲與無營堡同兵甲而不堅利不練習與無兵甲同昔在鼂錯葢詳哉其言之矣而况於建邊乎夫鳥銃佛朗機百子銃綿甲長鎗鐵钂利弩鉛彈滚牌本邊之長技也矢石毒弩番猓之長技也我官兵之長技七番猓之長技三勝負既已分矣惟是善後以來籌兵措餉尚未暇圗今之鳥銃佛朗機百子銃五年之久半已朽蛀綿甲長鎗鐵钂利弩鉛彈滚牌前此大征歲久漸耗毎兵僅月口糧七錢二分餬口弗給豈能自備查得㑹川操練之兵皆經陳副總設法置造器械鮮明甲於各路而四將領亦以限於力而尚未置造合無即將本邊營堡逃故今後所積者毎歲詳院量為之備亦首務也黎雅黎雅夷即天全六番諸部散居黎雅之間者宋時屢為邊患孝宗乾道四年風流等番部欲入抄掠知縣張文禮閉絶蛇浴等山路不許番部來徃番從蛇浴嶺後斫生路至邨攘劫宣撫司委知永康軍李繁等領軍討之番部來降十一月砂平番首髙志良至碉門互市與居民鬭不勝乃詣寨官喻炳陳訴炳決責之志良銜恨去明年正月來攻碉門制置司遣李俊禦之志良懼欲償還所燒寨舍以錢贖罪守臣不允官兵遂入砂平焚其屋廬番人初皆潛伏後忽鳴角聚衆以出官兵失利而還乾道九年青羌吐蕃諸羌蠻等以黎州負其馬價侵掠安静寨推官黎商老等禦之敗死安撫司委鈐轄李彦堅領軍徃討青羌等始詣州伏罪買馬如故宣撫司以擅與交和劾奏守臣王昉降兩官十一月復犯安静至大小壩搶擄軍民一千餘人黎州守邵逢年及通判吕宜之招卭部漢土官兵併力攻擊乃遁去淳熙三年五月納爾齊等同元擄漢人詣州州犒之提刑司以擅與交和劾罷守臣秦嵩諸羌蠻等以互市久不得通咸怨望白水寨將王文才與之婚姻復誘之搶掠知黎州陸束之梟文才於市前明於黎州設安撫司天全六番設招討司蓋就便輯治之意萬厯四年越嶲衛所屬卭部長官司土官嶺伯死妾沙氏與孽子嶺應昇争印時應昇住越嶲城内亞夷阿堆阿阻等擁沙氏至越嶲城外索印經過利濟站阿堆等燒毁軍民廬舍後沙氏悔罪斬阿堆等自贖廵撫羅瑶廵按何汝成㑹同兵備僉事石檟等議題請照土官夫死妻繼事例令沙氏署管印信夷人悦服明末流寇據蜀黎雅土夷亦行侵擾我朝底定諸夷向化不為邊患康熙十九年吳逆平後其黨胡國柱等踞關山相嶺勇畧將軍趙良棟同將軍紀哈禮率總兵鄒九疇等三路進剿賊大潰遂復關山相嶺黎州諸地而建昌一帶亦逺近聞風相率投誠雍正六年天全六番土司貪殘不法經廵撫都御史憲徳題請改土歸流易直𨽻雅州為府各營所土司改設流官化林添設都司防汛加嚴蠻夷漸被聲教衣冠文物儼如内地無復有强悍如昔時者矣打箭爐打箭爐故旄牛徼外地也雅州西去大渡河五日程羌蠻混雜連山接野鳥路沿空漢永平中白狼槃木唐菆等百餘國舉踵奉貢越山坂負襁而至皆此種𩔖蜀漢時諸葛武侯征孟獲遣郭達於此造箭因名打箭爐至今土人猶廟祀郭將軍方輿勝覽云大渡河於黎州為南邊要害之地唐韋臯拒吐蕃李德裕拒南詔皆扼此水為險要故議者謂大渡之不守則黎雅卭嘉成都皆擾宋建隆三年王全斌平蜀以圗來朝議欲因兵威復越巂藝祖以玉斧畫此河曰外此吾不有也於是為黎雅之極邊曩時河道平廣可通漕舟自玉斧畫河之後河之中流忽陷五六十丈河流至此澎湃如瀑從空而落舂揰號怒船筏不通名為噎口殆天設險以限羌蠻也元明時番人俱於此地互易茶馬自明末流冦之變商民避兵過河攜茶貿易而烏斯藏亦適有喇嘛到爐彼此交易漢番雜處於是始有坐爐之營官管束徃來貿易諸番疊經更替歴有年所我朝定鼎德威所被直通西域康熙十九年恢復關山相嶺則打箭爐一區亦川省所轄三十五年曽經四川廵撫于養志查勘邊疆題請仍許諸番照舊居處貿易三十九年番蠻阻兵渡河四川提督唐希順題請𠞰討㑹同將軍莽吉禄調集漢土官兵相機進取㕘將李麟登先破蠻首渡大兵㑹於河西提督唐希順分兵三路進𠞰連破其地班師抵爐是役也提督髙希順率遊撃沙虎魏國珍等直攻咱威殺蠻四百餘衆進哪叱頂攻大岡磨西面共斬八百餘蠻從磨西面間道而上奪營一十四座獲千餘級而㕘將馬爾植亦攻取大岡遊撃張自成從宰牛壩截入俱奮勇𠞰戮賊蠻既平喇嘛番民等歡呼跪道歸附者一萬二十餘户皆與宣諭皇上德威賞給銀牌令各安住牧建鐵索橋於河上御製碑文取名瀘定明正司於此辦差康熙五十四年西藏準噶兒肆行不法戕害喇藏上命定西將軍噶爾弼總兵趙坤副將岳鍾琪等率滿漢官兵由打箭爐進討之降大小碟巴遂克招地雍正七年以新設雅州同知駐劄打箭爐管轄口外各土司如巴裡二塘以及乂丫革達直通西藏一路廣袤數千里俱安設塘汛要隘處設重兵鎮守自古迄今幅員之廣文德武功之大未有如我朝之盛者但控馭維艱籌邊將吏能加意勿懈則荒裔永靖矣題請打箭爐設防疏畧四川廵撫都察院右副都御史貝和諾題為籲請官兵駐防打箭爐事康熙四十年九月初九日准兵部咨職方清吏司案呈奉本部送議政大臣㑹覆四川廵撫貝和諾題前事内開該臣等㑹議得先經侍郎滿丕等啟奏打箭爐安設兵三千名副將一員遊撃五員守備五員千總十員把總二十員令其分防㑹議准行具題奉㫖官兵駐防打箭爐如運送糧餉不致有悞方可令其久駐將運送糧餉有無不致遲悞之處並未詳議應移咨廵撫㑹同提督等盡情詳議具奏等因欽遵行文該撫在案今據四川廵撫貝和諾疏稱打箭爐地方將糧餉永逺僱夫負運雖多給脚價但路險途遥難免遲累伏祈勅部議覆再准督臣席爾達咨稱今逆番已經伏誅打箭爐已經平定天威逺震如地巴悔悟前愆稽顙輸誠哀請照舊貿易我聖主如天之仁何所不包依然雨露同滋則本部原題化林營官兵移駐打箭爐及建昌鎮標撥守備一員兵丁二百名汛守化林營之請殊足彈壓止可於川省㕔員中酌移一員於爐撫綏番土兼収貿易貨税協同鎮守該營糧料自可折價何須輓運何慮打箭爐新定番土叵測川提標現有官兵四千名可比照陜西督標戍守廣元例毎年於五營輪派遊撃一員帶領該營官兵八百名駐防化林營糧料可就近採買不致累民輓運等因又准提臣唐希順咨稱打箭爐地方新復需兵汛守然必糧食無悞方可久駐皇上已明見萬里之外查打箭爐木鴉等處雖不産米榖有青稞麥豆等雜糧可以採買嵐州嘉慶擦道等處有大米雜糧足供兵食既議折給則無運送之煩惟是官兵未到打箭爐時青稞麥子毎一京斗價銀一錢五六分一錢八九分二錢不等自官兵入爐以後青稞麥子毎一京斗價銀二錢八九分或三錢不等今安設官兵止三千人向後價值諒應照舊其米折價銀將打箭爐向時之貴賤斟酌折衷比照松潘沿邊米價毎斗一錢六分四釐之例折給各兵自行採買以得其平等因臣查督臣提臣咨内係設兵事宜合併叙明具題統候聖裁等因前來查先經㑹議着該撫㑹同提督等打箭爐久駐官兵搬運錢糧米石有無遲悞之處詳議具奏等因具題行文在案今總督廵撫提督等雖各陳已見具奏該撫並未將米料可否折給銀兩定議具奏再該督止將化林營移駐打箭爐及建昌鎮標守備一員兵丁二百名汛守化林營殊足彈壓等語應將此案不便遽議仍行該撫㑹同可否止移化林營兵五百餘名及長久安設三千名兵并可否折給之處畫一詳確定議速行具題可也康熙四十年八月十七日題九月初一日奉㫖依議欽此欽遵抄部送司案呈到部擬合就行為此合咨前去欽遵查照施行等因到臣該臣看得官兵駐防打箭爐一案准部咨令臣㑹同畫一詳確定議速行具題臣查打箭爐係新復之區必駐有官兵方可彈壓若官兵三千久駐需用月米槩議折給錢糧不無糜費且青稞雜糧偶遇歉収兵丁艱於購買亦未可定今議將化林營兵五百七十五名照督臣席爾達等原㑹題之疏移駐打箭爐糧米如提臣唐希順所議照松潘之例折給兵丁自行採買但夷性叵測防範宜周相應照督臣席爾達前議撥建昌鎮標守備一員兵二百名汛守化林又將侍郎臣滿丕與提臣唐希順駐防官兵原疏在本省兵内抽調之一千兵今分為兩營以五百分防嵐州烏泥苦泥嘉慶擦道一帶地方以五百駐劄沈村分守三渡兩營設遊撃二員守備二員千總四員把總八員其兵丁月米照化林營例折給再將提標兵八百名駐劄泥頭撫標兵三百名駐劄蠻庄照廣元之例輪班戍守月米仍照原營估計如此河東共有二千三百名分防聲援爐内既不慮兵單而錢糧亦不致多費更可免别省抽調之繁其添設官員俟部覆俞允之日照沿邊之例揀選題補衙署營房照東川之例修造自爐至各營汛作何安塘聫絡之處俟駐妥之日令各將弁確議詳報至日將各渡口設船隻水手情由一并另行題咨再將成都府同知移駐打箭爐給與印信令其撫綏抽税如該同知撫綏蠻夷三年無過令督撫保題應作何陞用聽候部議等因咨商督提臣去後兹准督臣席爾逹提臣唐希順俱與臣㑹商相同咨覆前來臣謹㑹同吏部尚書兼禮部尚書署理川陜總督事務臣席爾達四川提督臣唐希順合詞具題伏乞皇上睿鑒勅部議覆施行題剿撫冕山金格疏川陜總督臣岳鍾琪題為仰仗天威苗方底定等事竊照建昌冕山營所屬賊番金格阿租等稔惡肆奸煽衆狂悖經臣據報具奏仰䝉聖謨廣運特指授方畧遣建昌鎮臣趙儒化林協副將張成隆等㑹同前徃相機剿撫臣遵即派撥漢兵二千五百名木坪瓦寺金川等處土兵共一千七百名照例備給口糧軍裝檄令鎮臣趙儒等統領前進於雍正四年六月内官兵進抵冕山先事招撫以仰體皇上好生之仁詎知逆番抗拒不出遂於八月二十六日分兵進剿至九月二十八日官兵直抵結白普雄奮勇捜剿俘馘甚衆所獲牛羊馬匹即分賞官兵隨又進兵至乾縣波羅下沈渣等處劄營正欲遣兵分剿而彼處數十餘旗番苖相率投營乞降鎮臣趙儒等准其請開誠化誨令其將逆首金格等拿獻方見傾心向化之誠隨據衆番苖暨投誠之千户糯咀等争為嚮導情願協拿因而我兵繼進於十一月二十七日十二月初三日將逆首金格阿租先後擒獻并將關夀一犯誘擒一併觧省臣即據情奏報奉㫖在事官員兵丁俱應加恩議叙賞賚欽此臣復遵㫖檄行鎮臣趙儒等将餘黨再加詳悉料理安插去後隨將普雄凉山竹核等處番苖悉行招撫認賦貢馬又有從前被擄漢民九十一名口查明帶回各地安插嗣因麽些黑麻谿喇汝窩三渡水等處各番族心存反覆恃險梗化又恐窩藏金格等之餘孽臣因宻遣洮岷協副將王剛馳赴軍營作速商量料理時值河水泛漲因編筏造船分領官兵渡河衝險鼓勇四進惟黑麻谿一處即來歸誠查係實心向化遂不加兵其餘番族仍然抗拒我兵歴險捜殺剿撫並施餘番莫不畏威輸服剃頭留辮造冊歸誠並將所有鹽井一并開報認賦輸糧令其各安住牧又查出被擄附近漢民兵一十七名經鎮臣趙儒等各令回家團聚一面將拿獲之逆番除已經正法外其滅脂等二十餘名並逃奴長夀呷等十一户共六十名口分别觧審發訊以及查明縱逆不法之宣慰安撫土司瞿氏安承裔等并宣慰安撫司土千百户慕枝恩咀菊虐等共現追出印信五十六顆號紙四十八張聲明苖方底定彚案呈報前來臣思冕山番苖狂悖不法仰賴我皇上睿謨指授威徳逺敷各官兵效命剿撫悉平從此僻壌遐荒咸附版圗以成一勞永逸久安長治之至計臣查是役也剿殺逆番甚多墮崕落河者不計其數其帶傷漢兵五名土兵二十三名陣亡漢兵一名土兵六名并官兵效力人員姓名功次另行造冊送部凡就撫番族户口田土賦役數目安營設汛以及已追印信號紙之土司并另疏㕘究之瞿氏安承裔等地方即為改土歸流等項俱於善後事宜内臣㑹同撫提諸臣詳議另疏題請伏乞睿鑒施行題報建昌設防疏四川廵撫都察院右僉都御史憲德題為飛報事據四川布政使司布政使管承澤詳奉本都院牌開雍正六年五月二十四日准提督黄廷桂咨開建昌乃巖疆要地防範需兵查鎮標前派兵二百名㑹剿陸氏又派兵二百名䕶運軍糧後又派兵八百名進剿喇汝窩今因結覺賊蠻截路阻糧擅傷兵丁復派兵三百名前徃策應實屬汛守單弱宜速遣兵貼防但標鎮協營官兵派遣進藏及㑹剿烏䝉俱經派遣各營汛均有防守地方之責不便再為行調今建昌需兵彈壓甚殷其新増營汛應設馬一步九兵一千九百五十名查提標招募兵一千有餘行令署中軍㕘將印務遊撃張聖學出具印領自本年六月初一日起支請領庫銀按名散給銀兩製備行裝並按名發給鳥鎗㓲刀委員統領速赴建昌鎮収伍分佈防守目前既可資其彈壓将來分撥新増各營汛兵早備而營伍頓興矣臣等謹合詞具題伏祈皇上睿鑒施行題平定喇汝窩疏畧川陜總督岳鍾琪謹題為恭報剿平賊番事據協辦建昌凉山事務陜西洮岷協副將今陞肅州總兵官王剛呈稱前䝉本部院牌開查喇汝窩逆番屢行狂悖去年整兵剿撫業已平定今為日未幾復有餘孽丫馬車等竟敢搶刼煽誘復逞故智今已㑹商速剿撫平定等因到臣該臣看得四川建昌屬喇汝窩賊番屢行不法乃於剿撫甫定之後復有逆番丫馬車倡兇不法將附近漢土地方人畜紏黨肆行搶刼經臣據報奏請派撥建昌鎮標屬官九員兵八百名并附近喇汝窩各土司所屬土兵一千餘名檄令協辦凉山善後事宜之洮岷協副將王剛統領前徃相機擒剿又因喇汝窩等處與雲南永北鎮汛界相連誠恐逆番勢窮潛匿隨移提臣黄廷桂飛咨永北鎮派撥官兵堵禦隘口其川省官兵所需口糧移咨撫臣憲德酌量備支并於藩庫公用銀兩内動支銀一千五百兩觧交副將王剛賞給所派土兵去後兹據王剛報稱於雍正六年六月初六日自建起程分兵三路前進而逆番丫馬車等聞風遁藏遂令漢土官兵於沿途山箐窮捜極捕直至雲南蒗渠地方除永北鎮漢土官兵堵禦捜緝殺死賊番一名擒獲賊番男婦六十八名觧赴永北鎮外據建昌鎮標遊擊張臣節守備趙良弼等先後具報殺死拒敵賊番五十五名擒獲賊番丫馬車之叔沙喇布等併大小男婦共一百六十二名口追急投誠之阿夸哵唎兩邨男婦共三十二名口其所獲騾馬牛羊八百一十有零已分賞漢土官兵訖至賊首丫馬車於七月十六日我兵追至左所之水寨地方已經拏獲并其伯叔兄弟沙喇租卡哵七靈者等三名内除卡哵一名已經病故隨将賊首丫馬車等觧赴到營即撥兵防䕶觧交鹽井衛守備王永祥収明觧省審擬其餘拏獲各邨賊番俱係與官兵拒敵逆犯應行就近正法其阿夸哵唎二邨亦以追急投誠實非傾心歸附亦按罪輕重分别發落老幼婦女分賞在事漢土官兵所獲逆番弓箭盔甲刀矛等物交㑹鹽營収貯再移家中所之起力廹耳阿卜兒等三邨番户於未進兵之先搬出投誠查係實心向化應遷内地安插其帶傷漢土兵丁六名調養已痊今因剿撫雷波土司一案奉令前赴竹核遥為聲援行知滇員如有賊番藏匿滇省者嚴飭汛防逐細查拿在川省者責令中左土司及土千户等務獲觧報并酌留守備一員帶漢土兵丁共七百五十名於附近鹽井適中之地駐劄彈壓其餘漢土官兵行令撤回所有剿平喇汝窩逆番縁由相應呈報等情前來臣查喇汝窩番蠻屢次反覆皆由其地處深山重林疊箐恃其險邃為營汛之所不及得以負隅狂逞及至遣兵進剿則竄伏山箐兵退則復萌故智且喇汝窩番族僅止六七邨今起力等三邨已經投誠遷徙内地其餘逆番俱經剿洗平靖所遺番地自四川鹽井衛之外以至雲南之蒗渠地方相去二百餘里其中曠無居人必湏遞設汛防庻不至再貽奸藪即川販路徑亦可杜其徃來應統於欽奉上諭事㑹勘疆界案内臣與雲南督臣鄂爾泰委員確勘分别酌設另疏題請今先酌留漢土官兵以資彈壓并責令中左土司協同捜捕毋遺餘孽外所有帶傷漢兵二名土兵四名并官兵效力姓名另行造冊送部移家投誠之起力廹耳阿卜兒等三村男婦應令新設鹽源縣分撥地方安插查造户口與漢民一體編入保甲其臨陣擒獲之男婦大小番衆應如王剛所議分别發落至賊首丫馬車併伊叔伯兄弟沙喇租七靈者等應交撫臣憲德訊明請㫖即正法以儆悖逆除建昌標屬官兵支過口糧仍於本兵米折銀内按數扣還并賞給土兵公用銀兩應俟撫臣憲德核報外所有剿平喇汝窩逆番縁由理合題報再查王剛已陞肅州鎮總兵因提臣黄廷桂進剿雷波等處令赴竹核聲援應俟事竣之日前赴肅州新任合併聲明臣謹㑹同川撫臣憲德提臣黄廷桂合詞具題伏祈皇上睿鑒勅部施行雍正六年十月初二日奉㫖冕山賊番向來稔惡肆奸敢行不法久為平民之害而地方大吏俱畏難因循不肯辦理岳鍾琪遵㫖剿撫調度有方苖疆永逺寧謐甚屬可嘉岳鍾琪交部議叙併將在事官兵加恩議叙賞賚已有㫖了其兵丁等如有曽經借支銀兩一槩加恩賞給不必扣還岳鍾琪奏請派兵暫駐以資彈壓之處着照所請行土兵口糧亦照所請賞給該部知道欽此題平阿驢疏川陜總督臣岳鍾琪謹題為分剿逆蠻仰仗天威擒獲賊首恭疏報㨗事准四川提督臣黄廷桂咨稱竊照本提督於雍正六年十月初二日攻打結覺之際突聞阿驢不法傷害滇省官兵隨派漢土官兵交肅州鎮統領前徃策應已將㑹合滇黔官兵縁由繕摺奏明於十一月初十日本提督同建昌鎮率兵由紐姑中路前進以便四面督催於本年正月内剿撫已畢所有撤兵縁由相應咨請題報等因移咨到臣准此該臣看得阿驢賊蠻狂悖不法傷害滇省官兵縁於雍正六年有四川雷波等逆暗助米貼朋比作奸提臣黄廷桂奉㫖進𠞰檄行雲南㝷霑營叅將哈元生領兵過江前至阿驢所屬阿路嗎地方駐劄防範繼因雷波事定川兵已抵魚紅於阿路嗎一帶就近可以防守隨令滇兵撤回哈元生於雍正六年九月二十一日撤兵起營令阿驢土目落資隨營䕶送詎料落資妻父拖科惡目覺過以伊壻帶徃行營不知下落即同伊弟虐慮伊子吾租紏合阿都逆賊别哺加樂并阿必等圍營追劫傷害官兵提臣黄廷桂聞知此事撥兵救援旋即親統官兵前赴策應業將㑹剿縁由奏聞在案兹又准提臣黄廷桂咨稱仰仗皇上天威各次第剿撫已將逆賊别哺加樂阿必父子擒觧赴滇并將拖科首惡覺過同弟虐慮子吾租於雍正七年正月初五日追至雲南赤衣臺跌羅山箐臨陣斬殺割取首級一併觧交滇省首惡既除其餘無辜苖民俱經招撫蠻方平定已於本年正月初十日撤兵回署等因咨報前來臣查阿驢悖逆皆由拖科覺過起釁滋事實為此案罪魁而阿都逆賊别哺加樂等同惡相濟均為法所難容提臣黄廷桂派遣官兵分途進剿斬其元兇擒其黨惡而各處番民無不招撫安插一切新撫地方需兵彈壓查雍正五年十一月内臣於建昌善後事宜條奏請㫖已將建昌沿邊要隘添設營汛足資防範無庸再議惟西溪一帶東連利呃南接永定路通阿都為番蠻出入之所甚關𦂳要原駐防兵七十名不足分布今議再撥建昌左營兵丁一百三十名共足二百名之數令建昌左營守備駐防西溪暫資彈壓拖斜賊首既已剿除番部無人統屬地隔建昌三百餘里應請就近交沙罵土司安韋威管轄查明户口按年完納馬匹造冊報部其餘拖覺土目過歌隨營效力並無助逆情弊所屬地方仍令管理阿都土司聚姑協擒黨惡亦無助惡情由其逆賊加樂阿必等查其醜類名為黑骨頭自來强悍不服土司約束此番横行不法似不便波及土司今加樂等業已就擒所遺番衆亦應暫令土司聚姑管轄統於善後事宜内斟酌奏請剿撫事定一應出師官兵除留駐防雷波黄螂八百一十員名已經臣於雷波報㨗案内題明外其餘漢土官兵以及前於仰仗天威案内留駐提標兵四百名木坪土兵四百名相應一併撤回已准提臣黄廷桂同建昌鎮臣趙儒肅州鎮臣王剛俱於本年正月初十日撤兵起營除滇省進剿阿驢縁由聽雲南督臣鄂爾泰彚疏題明外所有川省㑹兵剿撫阿都拖科及事竣撤兵日期理合恭疏題報臣謹㑹同川撫臣憲德提臣黄廷桂合詞具題伏祈皇上睿鑒勅部施行題蕩平西藏疏川陜總督臣岳鍾琪謹題為番藏悉鋤兇惡萬邦共仰天威永奠要荒普天同慶事雍正六年十一月十一日准欽差查郎阿等清字咨為知㑹事内開本部堂等欽奉上諭現今西藏波羅鼐帶兵來報康濟鼐之仇阿爾布巴帶兵彼此成隙戰鬭相持為此將派大臣前去安頓料理之處曾經繕寫諭㫖頒給達頼喇嘛其伊等彼此成隙之事着派左都御史查郎阿着副都統邁禄陪去選派西安滿洲兵四百名跟隨命徃大臣前去其帶領四川緑旗兵丁着派散秩大臣品級之鑾儀使周瑛帶領陜西緑旗兵丁着派西寧總兵官周開㨗帶領雲南緑旗兵丁交鄂爾泰酌量選派總兵官一員副將一員此内或總兵或副將着留一員在乂木多駐劄着一員領兵進藏其雲南四川兵丁着周瑛管轄俟三處兵丁㑹合時亦着周瑛承領行走到藏之時着查郎阿總管欽此欽遵於本年八月初一日到沼將阿爾布巴隆布鼐扎爾鼐及事内一干人犯俱行鎖拿派兵看禁㑹同在沼駐劄之副都統馬拉内閣學士僧格審問得阿爾布巴等設法鎮壓欲求中國將伊慈愛贈奬無故將康濟鼐并伊二妻兄弟嫡親殺害家産抄搶又假傳㫖擅調遣各處兵馬征𠞰波羅鼐欽取喇嘛馬匹拆毁寺廟殺害人民查阿爾布巴隆布鼐扎爾鼐等所行種種逆欵俱各自認不諱如此跳梁横行若不處以法令以示番人嗣後則此等違法之事不能永禁應將伊等正法之處理應具題請諭㫖欽遵施行但伊等取死之罪甚重各欵俱已顯露伊等懼罪或致自經殞命俱不可知是以於九月三十日一面具題一面將阿爾布巴等案内人犯俱行正法訖相應移㑹等因到臣當經繕摺奏報并傳示在省大小文武各官及兵民人等莫不歡呼慶幸仍移行川陜文武衙門知照並曉諭軍民外伏念西藏地方昔年慘遭諄噶兒焚掠甚至屠滅黄教聖祖仁皇帝遣發大兵蕩平安輯又䝉皇上睿謨廣運欲令其長治久安是以特揀貝子康濟鼐管理西藏事乃逆賊阿爾布巴潛謀不道將康濟鼐肆行殺害希圗背叛毒虐番衆其為罪惡在所必誅者也我皇上特遣大臣提兵察究凡一切軍機緩急俱䝉睿算周詳更能於番部情形無不洞若燭照故令波羅鼐得仗王師之震赫以擒悖逆之元兇統由我皇上預定聖謨先幾决策故使萬里之外㨗於響之應聲從此永奠番夷再造黄教仍將逆賊阿爾布巴等顯戮市曹寸磔兇頑以著天朝之明憲恩威所播萬國騰懽臣慶切於中不勝忭舞之至為此恭疏慶賀伏祈皇上睿鑒施行按建昌一鎮向為巴蜀西南荒裔上至大渡河下至金沙江東接烏䝉西達三渡廣袤數千里錯處諸夷中雖建昌泰寧各設鎮協彈壓冕山㑹川寧越越嶲㑹鹽柏香靖逺永定黎雅化林阜和德靖寧安各營沿邊隘口増設汛兵防守然夷類犬羊成性甚不可以歸誠而忽之也向日文職設通判一員以經理之雍正七年因土司地方歸流者多事務繁劇添設知府一員更名建昌衛為寧逺府其越嶲衛㑹理州並新改西昌冕寧鹽源三縣俱歸知府管轄至於野苖熟番白骨頭黑骨頭等夷其風土性情徃徃各别修其教不易其俗齊其政不易其宜使之樂育並生於函盖之中尤服官於兹土者所有事也題七兒堡善後事宜疏雍正十一年工部議覆四川總督黄廷桂條奏苖疆善後事宜工部為遵㫖議奏事營繕清吏司案呈領侍衛内大臣英誠公臣豐等謹奏為遵㫖議奏事四川總督黄廷桂奏苖疆善後事宜一摺奉㫖辦理軍需大臣議奏欽此臣等逐條酌議恭呈御覽一奏稱河西廣袤千有餘里由上渡廟頂至打箭爐計程不出旬日由接興過渡即係木裡交界由瀘沽數日可抵瓜别㑹鹽四通八達雄山疊峙前後臨江最為險塞非重兵大員不足以壯軍威而資分布查有兒斯之七兒堡地居適中平洋寛敞應請於此設㕘將一員左右軍守備二員千總四員把總八員馬一步九兵一千二百名於週圍次冲處所分置大汛以聫臂指查七兒堡北有廟頂一寨係窩卜上渡及山後接興等處徃來要徑形勢髙曠瞭望四旁數十里如在目中應分左軍千總一員兵一百名移駐防範又西北有磋多其地逼近後山江岸上下小渡甚多與明正司屬之烏爾呷𦂳隔一江應移駐左軍把總一員兵五十名以資廵察又七兒堡東有查凹濱臨中渡與水墨巖紫古别隔江相望應分左軍把總一員兵三十名把截江岸以防夷蠻偷渡南有瀘沽乃㑹鹽瓜别出入總匯兼通河東麻哈渡口應令右軍千總一員兵一百名駐劄廵防但瀘沽至七兒堡相距二百餘里沿途山箐深宻應於適中之木羅拉枯二處令右軍把總二員各帶兵五十名分駐聫絡其七兒堡之西過意魚卡為接興老寨地險山深對江即係木裡木卡各枝夷部渡口繁多應分右軍千總一員兵二百名控扼防禦以壯後山聲勢又西南則糯居五堡形勢衝要上自接興下至拉枯木羅瀘沽皆可呼吸相通與七兒堡大營前後對峙應分右軍守備一員帶把總二員兵二百五十名駐劄於此提調接興拉枯木羅瀘沽各汛並彈壓江外土部以助大營之不逮至於河東地方前應河西兒斯控扼三渡後連冕寧建昌叢山綿互勘其地勢瓦尾據腹心之上游而虚郎亦當首尾之衝要必湏分設官兵庶可臂指交資應於瓦尾設都司一員千總一員把總二員馬一步九兵四百名自瓦尾而北為黒􅨇山上接窩卜下據水墨巖中渡瓦尾而南為麥地溝乃枯魯冉興一帶番蠻出沒要隘應於黑􅨇山麥地溝二汛各分把總一員兵六十名駐防稽察又赶到底逼近下渡應令瓦尾外委一員兵三十名駐劄盤詰至虚郎四山環繞番猓雜處前接白宿凹後連白路溝均屬險隘請設都司一員千總一員把總二員馬一步九兵四百名内抽撥把總一員兵八十名分防白宿凹再撥把總一員兵五十名分防白路溝再於虚郎左右馬吾呷六翁二處令外委二員各帶兵三十名分防以司廵邏其新増各營俱歸七兒堡㕘將兼轄仍𨽻建昌鎮統轄庻輕重相維措置嚴密而營汛得控扼之宜苖疆収彈壓之效倘䝉恩允請將新設各營仰懇欽定佳名垂諸永久並請㫖勅部鑄給㕘將都司印記以昭信守以上議設㕘將都司守備等官俱請於本省熟諳風土夷情人員内㨂選題補千把等弁即請於現在新兵千把内撥補至添設馬步兵丁二千名無湏另募亦即請於新兵内撥充一千八百名其餘二百名查寧番營遊擊管轄冕山寧番兵丁八百名今河東河西俱經安設碁布星羅壁壘相望該營兵數似屬過多應抽馬一步九兵二百名配𨽻新營以敷其數所有新舊營汛分定界址以及各路應設塘撥統俟各營設立之日再為隨便宜布置另冊報部等語查三渡河東西新闢苖疆幅􅊷遼濶其不法逆番甫經懲創自應設立官兵控制彈壓以為久逺寧謐之計今該督黄廷桂酌量險要處所増設營汛分布弁兵聫絡防禦之處尚屬周密應如所奏於河西之七兒堡設㕘將一員守備二員千總四員把總八員馬一步九兵一千二百名内照數抽撥分駐廟頂磋多等處以資防範再於河東之瓦尾虚郎二處各設都司一員千總一員把總二員馬一步九兵四百名内照數抽撥分駐黒􅨇山白宿凹等處以資防範所設瓦尾虚郎二營俱歸七兒堡㕘將兼轄統𨽻建昌鎮總轄其營名由内閣撰擬恭候欽定至於印記交與禮部鑄給新増㕘將都司守備等官令黄廷桂於通省弁員内揀選題補千總等官於新兵千把内揀選調補所設馬步兵二千名查雍正九年欽奉諭㫖勅令黄廷桂募兵一萬名分撥標協營路在案應於此項新募兵内挑選一千八百名充補其餘二百名在於寧番營兵内抽撥仍令黄廷桂俟各營設兵之後即將分定界址及新設塘撥造冊報部一設兵必並籌餉查建昌鎮屬毎歳除屯糧支放之外率多不足仍給折色今新設苖疆一切増置營汛四季餉米自應按其時地酌予價值以敷備辦查河東瓦尾虚郎等處雖跬步皆山但相距冕寧較之河西畧近徃返䭾運尚屬易通新設都司二營請照松潘鎮屬龍安營之例毎斗折色一錢四分關給採買若夫河西則去内地險逺懸崖側徑所在﨑嶇兼阻三渡䭾載匪易本處之田土既不出産米穀而營制創設之始商販亦勢不能立即流通兵丁日食惟藉資内地零星採辦合計米價䭾值需費實昂似應比照泰寧協屬化林營之例毎斗折色一錢六分四釐俟墾闢漸廣各商輻輳米糧充裕之日再為核減惟是兵丁米折例應按季關支但查甫定之邊營距内地遥逺冬春水涸道路可行採買日食猶易為力若值夏秋之際隂雨連綿山徑泥濘不無阻隔一時難於購買各營兵丁未免即致乏食并請照普安安阜二營之例將河西新營各兵應支次年四季米折於本年秋成之後令該管營將出具印領全數預行領出即便委員照數採買米石存貯按時給散庻營伍均沾飽騰之愷澤兵丁益得盡力於操防而新疆日有起色等語查河東河西新設營汛所需餉米該督黄廷桂按照道路之逺近分别多寡折價採辦亦屬妥協應如所請將河東兵米毎斗折銀一錢四分河西兵米毎斗折銀一錢六分四釐各照數關給該營委員採買運供仍令黄廷桂俟苖疆開墾成熟米糧充裕之日再行酌減至所稱河西距内地遥逺冬春水涸道路可行若值夏秋隂雨連綿不無阻隔請將兵丁應支次年四季米折於本年秋成後全數領出採辦之處亦應照所請行一設官分職宜有專司將弁止可約束兵目而招徠撫輯惟於文員是賴查寧逺府厰務同知一員今各厰既經封閉則該同知即請移駐七兒堡一切化導夷猓安插漢番聽斷詞訟支放糧餉諸事責令專司如遇命盜大案照例由冕寧縣審轉招觧該府但同知駐劄河西其河東瓦尾等處勢難分身兼顧請再添設冕寧縣縣丞一員移駐瓦尾以資辦理倘䝉恩俯准其同知關防仰懇勅部換給至同知衙門原設書吏民壯即可隨徃供役無湏另設惟同知縣丞衙署及縣丞應需胥役民壯人等請照例葢造召募再查河西七兒堡一帶逺隔三渡今既設立大營似應預籌積貯以備急需可否恭懇皇上天恩於七兒堡大營選擇髙燥處所建造倉厫積貯米二千石即交該地同知㑹同營員加謹収貯值青黄不接之際酌量平糶支借俟秋成後即行如數買備還倉倘有虧缺嚴㕘治罪似此出陳易新遞年接濟而新設重地永無艱食之虞等語查夷民新附未嫺禮法如設立專員撫綏化導自於苖疆有益今寧逺府厰務同知自封厰後已無經營之事應照該督黄廷桂所請將該同知移駐七兒堡專司化導夷猓撫輯漢番聽斷詞訟監放糧餉諸事如遇命盜大案照例由冕寧縣審觧再添設冕寧縣縣丞一員移駐瓦尾以資佐理其同知關防交部換給除同知衙門原設有書吏民壯無庸増添外同知縣丞所需衙署及縣丞應設胥役民壯令黄廷桂酌量料理仍將葢造衙署工價並胥役民壯工食銀兩造冊報部查核至該督請於七兒堡積貯米二千石查重兵駐劄苖疆米糧充裕則緩急可恃應照所請於七兒堡建造倉厫貯米二千石交該地同知㑹同營員加謹収貯毎年於青黄不接之時酌量平糶支借俟秋成後照數買補還倉倘有虧缺立即㕘處勒令賠補仍令黄廷桂將採買米價並建倉工費銀兩㨿實題銷一河東河西各處髙田下地從前已種成熟之處所在俱有而山林坡岡之間猶未盡闢者亦復不少均應招徠樹藝未便任其抛荒况大兵進剿原為誅鋤首逆而無辜脅從餘苖軍務事定自當仰體至仁就近安插各予生全但兵燹之後就撫苖民耕耘無力似應請照普安之例將招出苖民毎户量給賞牛具籽粒以資耕牧俟夷衆安居樂業之後仍有閒田另招墾户分地開種統俟數年之後再行查明分别起科以充兵餉等語查苖地尚多曠土而苖民中如有無力耕種者應照所請將所需牛具籽粒酌量賞給以資耕作仍將給過數目報部查核至荒廢田地如苖民不能全行開墾應令招民墾種酌定年分分别起科一城堡備禦非常官署兵房外壯觀瞻而内資棲止均不可缺第蠻荒甫定之區官兵一經設立即應作速建造若俟估計題覆至日再行動工興築逾時太久不惟風雨淋漓弁兵難於露處且非捍衛所宜似應仰懇聖恩乞將新營各路應需土城土堡官署兵房塘房一面委員確估動項興修一面分晰造冊報部統俟工竣之日核實請銷庶得及時葢造而於防守邊荒重地乃有禆益至於三渡河口係東西營汛過徃必由之要津但查上下二渡冬春之際水落灘平船皆可渡一至夏秋水漲洶湧衝擊兩岸逼窄實多危險惟中渡水勢紆徐四時平緩舟楫甚稳應請於上中下三處渡口各設渡船一隻冬春各歸本渡夏秋則三渡船隻總於中渡一處以便兵民利濟所有修造經費僱募水手並嗣後按年小修大修統交驛鹽道照普安營溪落渡之例辦理其新定地方沿途一帶有懸崖石磴步履維艱之處並請量動公用銀兩酌加寛修俾公文商旅兩無阻滯則王路蕩平而邊疆永賴等語查東西兩河業經駐劄官兵則土城土堡以及官署兵房塘房俱所必需該督黄廷桂既經動項興修應俟工竣之日將用過工料銀兩核實題銷至三渡河口所設渡船三隻應需修造工價及水手工食並嗣後修葺等費令該督照例料理其山路﨑嶇有礙行旅之處亦令該督動用公項酌量修補仍將動過公用銀兩歲底彚冊報部一軍營器械惟鳥鎗一項較弓矢既能及逺而制勝更覺迅利於遵奉㫖議奏事案内部議沿邊沿海省分毎兵一千名設立鳥鎗四百桿等因遵照設立在案惟是川省地方腹裏邊外無非疊嶂層巒兼轄土司故營汛防範與行走征進率以鳥鎗為利器近年以來各案調遣所派鳥鎗名數較之弓箭居多葢以折鋭衝堅實惟鳥鎗是賴今計千兵四百桿之數以之防守汛地固不少若值軍務則派遣在外而營路之鎗手兵丁即覺不足似應仰請聖鑒乞將此新設七兒堡各營兵丁二千名俯准照雲貴之例毎兵一千名設立鳥鎗六百桿至通省標鎮協營毎兵一千名量増鳥鎗一百桿庶火器充裕而防守征剿均敷其用等語查鳥鎗為標營利器而川省標鎮協營多係貼近苗疆至新設之七兒堡各營更在苗疆自宜多設鳥鎗以資備禦應如所奏將新設之七兒堡各營毎兵一千名設立鳥鎗六百桿通省標鎮協營毎兵一千名于原設四百桿之外再増設一百桿于邊防實有禆益以上六條臣等公同酌議是否允協伏候聖訓為此請㫖雍正十一年四月二十三日奉㫖依議欽此八月二十三日准兵部咨奉㫖將七兒堡増設三營欽定佳名為瀘寜營嘉順營懐逺營設兵分駐并移寜逺府同知駐劄七兒堡化導番夷添設冕寜縣縣丞一員移駐瓦尾以資辦理四川通志卷十八下
