  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0052_WYG_019-1a, image: WYG0560/WYG0560-0054a.png}
body:
  text: 四川通志卷十九土司書稱弼成五服葢舉要荒而被之以聲教也其中豈無族類各殊言語不接者于以控制羈縻亦有道以處之矣我朝徳洋恩普撫綏萬邦雖九州之外且不憚梯山航海重譯来朝矧土司之屬界連内地者乎蜀中三面環夷凡松潘建昌與叙永重䕫之所鈐轄峒長山猺罔不洗心革面輸賨貢毯之恐後則夫按其山川道其習俗稽其户口徭賦之數亦可以備職方之考也作土司志松茂道轄直𨽻茂州屬静州長官司李垣其先于前明世襲土職垣曽祖董應詔于康熙五年歸誠仍授原職請領長官司印信一顆無號紙亦無認納税銀糧馬駐劄之地曰静州其地距州城一里東至關子堡下門隴木司接壌三十里南至梨園村漫水灣接壌二十里西至岷江岳希司接壌十里北至疊溪營接壌六十里原管静州里羌民四十一户在茂州納糧不願土司管轄于康熙五十二年詳斷歸州外所管十寨俱係畨夷隴木長官司何其懿其先于前明世襲土職懿祖何延禧于康熙五年歸誠仍授原職請領長官司印信一顆無號紙駐劄之地曰隴木寨其地距州城東四十里東至水甕子石泉縣接壌三十里南至曹毛與州治隴東里接壌五里西至關子堡與静州司接壌五里北至疊溪界三十里土原管隴木里羌民九十一戸在茂州納糧不願司管轄于康熙五十二年詳斷歸州外所管畨民一百一十七户毎嵗認納黄豆三十六石五斗二升黄蠟三十六斤責成該土司徵収兌交威茂營兵餉岳希長官司坤鴻徳其先于前明世襲土職徳祖坤道齡于康熙五年歸誠仍授原職請領長官司印信一顆無號紙駐劄之地曰水西寨其地距州城五里東至本州鎮西橋接壌南至牟托廵檢司地方蝍魚寨接壌二十五里西至章圭寨壳壳溝接壌二十里北至竹木坎廵檢司地方松溪寨接壌五十里原管岳希里羌民四十户在茂州納糧不願土司管轄于康熙五十二年詳斷歸州外所管黒虎七族畨民一千零十户每嵗認納蕎麥糧折米一十四石八斗一升一合五勺五抄二撮兌支威茂營兵餉長寜安撫司蘇文耀其先于前明世襲土職耀祖蘇廷輔于順治九年歸誠仍授原職康熙六年請領安撫司印信一顆無號紙亦無認納税銀糧馬駐劄之地曰壩寨其地距州四十里東至長寜堡官道接壌七十里南至水草坪廵檢司地方接壌三十里西至龍平大小厯日三姐等寨接壌五十里北至實大關接壌十八里原管番民四百三十户水草坪廵檢司蘇文炳其先於前明世襲土職炳祖蘇廷賔于順治九年歸誠仍授原職康熙六年請領廵檢司印信一顆號紙一張亦無認納税銀糧馬駐劄之地曰水草坪其地距州城三十里東至長寜堡接壌十里南至魏門關接壌四十里西至鎮戌堡與岳希司龍嘴接壌四十里北至官道兩河口與長寜安撫司接壌十里十原管番民二百二七户牟托廵檢司溫如玉其先于前明世襲土職玉祖溫世英于順治九年歸誠仍授原職康熙五年請領廵檢司印信一顆號紙一張亦無認納税銀糧馬駐劄之地曰牟托其地距州城四十里東至溫水灣墩與茂州石鼔村接壌三十里南至威州保子關接壌二十里西至汰派後溝生番地方接壌十五里北至蝍魚寨與岳希司地方接壌二十五里原管番民一百零八户竹木坎土副廵檢司孫光耀其先于前明世襲土職光耀祖孫六受于順治九年歸誠仍授原職至光耀請領副廵檢司號紙一張無印信亦無認納税銀糧馬駐劄之地曰竹木坎雞公寨其地距州城五十里東堡擦耳崖三姐寨生番按壌十五里南至長寜岳希司接壌二十里西至黒虎寨與竹木坎寨接壌三十里北至水草坪廵檢司接壌五里原管番民四百戸同岳希長官司管轄汶川縣屬加渴瓦寺安撫司桑朗溫愷其先于前明世襲土職溫愷祖曲翊伸于順治九年歸誠仍授原職請領安撫司印信一顆無號紙至溫愷屢效勤勞授以功加遊擊職銜駐劄之地曰塗禹山其地距汶川縣城二十里東至保子關與西溝一帶生番接壌四十里南至遥濟寨與董卜宣尉司接壌六百里西至班南山與金川阿日兩土司接壌五百里北至沙派關與雜谷安撫司接壌二百五十里原管番民一千二百戸毎嵗認納汶川縣糧銀十三兩八錢零威州糧銀九兩六錢保縣屬雜谷安撫司板第兒吉始祖即吐蕃之裔其先于前明世襲土職至康煕十九年歸誠仍授原職請領安撫司印信一顆無號紙並無認納税銀糧馬駐劄之地曰雜谷其地距保縣城五十里東至索橋抵保縣接壌六十里南至膽罷抵金川接壌七百里西至桑湯抵草地接壌一千五百里北至茶堡與吐蕃接壌一千二百里東北至達豁寨抵八稜稠接壌四百八十里邊原管番民十數萬戸强悍狡詐唐宋以来屢為患而保縣奸民往往濳匿其中或為細作或為主文或販賣違禁貨物種種不法當事者急宜加意金川寺演化禪師湯鵬其先于前明世襲土職鵬父吉兒卜細于順治九年歸誠仍授原職請領演化禪師印信一顆無號紙並無認納税銀糧馮駐劄之地曰金川占固其地距保縣五百九十里東至每喏抵木坪董卜土司接壌二百四十里南至漢謝抵阿日接壌三十里西至關兒隘抵扣色吉生番接壌一百二十里北至膽壩抵雜谷接壌三百里原管番民九百三十三户阿日灌頂浄慈妙智國師哈兒吉其先于前明世襲土職吉祖黒兒加於順治七年歸誠仍授原職請領灌頂浄慈妙智國師印信一顆無號紙並無認納税銀糧馬駐劄之地曰阿日其地距保縣五百五十里東至責兒閣抵瓦寺土司接壌一百一十里南至達歪抵木坪董卜接壌一百一十里西至佑兒寨抵雜谷接壌三百五十里北至漢謝抵金川司接壌四十里原管番民六百戸大金川安撫司色勒奔于雍正元年新設至雍正八年提督黄廷桂題准授安撫司職銜請領印信一顆號紙一張並無認納税銀糧馬龍安府屬陽地隘口長官司王懋永其先于前明世襲土職永曽祖王熎于順治六年歸誠仍授原職請領長官司印信一顆號紙一張並無認納税銀糧馬住龍安府城其地東至鐵蛇關䒵子寨與平武縣接壌二十五里南至梧崆關木作昔腊等寨與羊峝接壌六十里西至黄羊關别望等寨與青片白草接壌一百六十里北至化雄關瓦舎等寨與陜西文縣接壌一百八十里原管陽地隘番民三百八十四戸土通判王懋恩其先于前明世襲土職恩祖王啓睿于順治六年歸誠仍授原職請領土通判號紙一張無印信並無認納税銀糧馬住龍安府城其地與長官司同八原管陽地隘番民三百十四戶土知事薛獻珠其先于前明世襲土職珠祖薛兆選于順治六年歸誠仍授原職請領土知事號紙一張無印信並無認納税銀糧馬住龍安府城其地東至黄頭與生番接壌三百里南至䒵子寨老鶯等寨與平武縣接壌一百里西至木𤓰竹頭等寨與小河營接壌二百三十里北至黄羊關土通判陽地隘口熟番接壌三十里原管番民七十七户漳臘營分𨽻中營屬拈佑阿革寨土百戸阿邦之父個個柘于康熙四十二年歸誠授職頒給土百戸號紙一張無印信住牧之地曰阿革寨其地東至羊角溪牟泥下寨接壌南至毛革生番接壌西至熱霧殺念寨接壌北至䝉雜溝生番接壌馬管轄七寨番民三十五戸並無認納税銀糧西路熱霧寨土百戸王加笑于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰作壩寨其地東至大寨東路接壌南至鉢囉子來卧接壌西至克應寨東路接壤北至拈佑東岳寨接壤無管轄十五寨番民一百零六戸並認納税銀糧馬西路峩眉喜寨土千戸狼柘他于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰峩眉喜寨其地東至七布徐布寨接壌南至雜谷安撫司接壌西至毛革生番接壌北至峩寜寨與熱霧寨接壌税管轄十三寨番民二百七十一戸亦無認納銀糧馬西路七布寨土千戸巴弄日記于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰徐之河寨其地東至龍子寨與新子寨接壌南至雜谷安撫司與物惰寨接壌西至峩眉喜寨與蛇汝寨接壌北至峩寕寨與熱霧寨接壌管轄十一寨番民一百六十四戸並無認納税銀糧馬毛革阿按寨土千戸王乍麥雜蛇灣土百戸安布笑二員俱于雍正四年歸誠題准授職頒給號紙各一張俱無印信四至無考每嵗共認納青稞六十四石五斗每石折倉斗米四斗五升共折米二十九石零二升五合解中營完納兑支兵食西路包子寺土千户郎加笑之父噶竹于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰包子寺其地東至雞公寨東路接壌南至大寨南路接壌西至羊角溪生番接壌北至鴉六墩北路接壌一管轄十三寨番民一百零六户每嵗認納青稞十六石内除分𨽻元壩寨番民認納青稞七石七斗每嵗止納青稞八石三斗每石折倉斗米七斗五升共折米六石二斗二升五合解中營完納兌支兵食左營屬阿思峝土千戸折加笑之父業架于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰阿思峝其地東至納海寨深山接壌南至雞公寨與漳臘營西路接壌西至漳臘營東路接壌北至椽子溝與漳臘營北路接壌管轄番民一百二十八戸每嵗認納青稞九石每石折倉斗米七斗五升共折米六石七斗五升解左營完納兌支兵食漳臘營分𨽻右營屬元壩等寨番民每嵗認納青稞七石七斗每石折倉斗米七斗五升共折米五石七斗七升五合解右營完納兌支兵食威茂營屬梭磨副長官司嚢索沙加布于雍正元年歸誠題准授職頒給印信一顆號紙一張住牧之地曰梭磨因不能約束郭羅克土目于雍正七年内降為副長官司平番營屬南路丢骨寨土千戸龍布革之父沙乍謨于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰丢骨寨其地東至白革髙山堡與小河營接壌南至鎮江關掃水巖與平番營接壌西至額唧寨松坪與黒水生番接壌北至西寜關鐵爐溝與漳臘營接壌管轄十五寨番民七十二戸每嵗認納青稞十六石每石折倉斗米七斗五升共折米十二石解平番營完納兌支兵食南路呷竹寺土千户安畔之父七谷于康熙四十二年歸誠授職頒給土千戸號紙一張無印信住牧之地曰呷竹寺其地東至白革壩熱節青片黄通生番接壌南至永鎮堡與疊溪營接壌西至松坪黒水物托等寨生番接壌北至平番營革達壩與雲昌寺土千戸接壌管轄番民一百六十戸每嵗認納青稞十四石每石折倉斗米七斗五升共折米十石五斗貝母二百二十五斤每斤折倉斗米一斗共折米二十二石五斗二項共折倉斗米三十三石解平番營完納兌支兵食西路雲昌寺土千户革都判于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰雲昌寺其地東至本舌寨白草髙山堡接壌南至鎮江關掃水巖與平番營接壌西至額唧寨生番接壌北至西寜關鐵爐溝與漳臘營接壌管轄番民一百一十二户每嵗認納貝母二百二十五斤每斤折倉斗米一斗共折米二十二石五斗解平番營完納兌支兵食疊溪營屬大姓土百户郁偉之父郁鳴鳳于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰七族寨其地東至山後青片昔歪寨接壌南至威茂營實大關與踏花寨接壌西至河西索多與勒谷寨接壌北至平番營平定關皮袋寨接壌管轄番民三百零三户每嵗認納青稞八石六斗五升每石折倉斗米七斗五升共折米六石四斗八升七合五勺解疊溪營完納兌支兵食小姓土百戸郁鳴儀之父郁華于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰七族寨