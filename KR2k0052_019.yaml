豬羊肉半生熟食之疾病不服藥延番僧誦經死葬用生前偏氊裝斂以大桶為棺山嶺為一小室停放其中竹笆塞門再不開視二曰僰人子其狡猾變詐不常亦知襲漢人衣冠獨婦人著細褶裙婚喪以飲食會客連朝繼夜般樂無厭其子弟有秀美者亦知讀書為儒為吏與漢人為婚姻漸入禮教矣三曰擺夷其人貌善心惡以黑帕裹頭戴笋籜尖帽身著短衣赤足帶巴疊短刀婦人纒花手巾上著短掩襟下著無褶筒裙赤足飲食捕鼠作鮓撲蟲煮湯或殺雞犬并撈水中青苔作酸為羮婚姻男子用水一盆潑女足上即為聘定徐以牛羊為禮娶之初生小兒抱于河中洗胎其居好臨流水以茅蓋屋居止不常常雇與漢人種田養蠶死葬無棺竹笆舁去為坑瘞之生前所用器物盡棄墓所若夢見祖父必懼焚紙用羊毛索卜卦卜其所欲欲豬則必殺豬祭欲羊亦然雖赤貧亦借債或鬻身為之刻木為信滿嵗倍息償還不能者纍嵗算之父死子償取無盡期此貧夷所以不能聊生也近因嚴禁其俗少變四曰麼些其人長大黑色男子紐鬚成索白手巾纏頭著短衣穿皮鞋遍身脂膩不沭內披衣甲外覆大黑偏氊出入常帶刀居荒村種蕎麥及青稞食之畜犏牛山羊為生有事以艾炙羊膊卜其吉凶婦女紐髮細辮短衣赤腳內披氊毯外披羊皮飲食以青稞蕎麵牛羊酥乳煎茶食之疾病殺牛羊祭鬼求安不服藥婚姻以牛馬聘娶燕會以牛羊豬肉或刴碎或燒煮半熟為食青稞蕎麥為酒死葬不用棺椁富者以綾絹貧者以布纏裹用竹笆舁去殺豬帶毛壓扁名曰豬膘同尸燒之取其頭及手足骨挂于懸崖之上三年復殺馬延僧作佛事將骨拋棄再不復視五曰狢􅢱其人矮小男女俱用布裹頭短衣赤足長帶弓弩絆索地網入山捕獵其性與猓玀略同住居山野以草為屋開種山地收取雜糧為食疾病以豬羊胎為醫藥其俗男女無别婚姻以牛馬為聘語言本類自知與他夷不相通燕會酒食與麼些同死葬以布裹尸焚之棄其骨于水中永不經由其地乃于焚時拔草根置小籃內携歸以為祖宗嵗時祭之六曰咱哩其人男女與僰人同語音各别居板屋耕種貿易本類自相婚姻聘禮用牛馬銀布燕會酒食燒肉咂酒頗同西番苐多黃白二酒疾病自採草藥療之死葬用棺斂或燒或瘞葬後以柏枝插瓶內挂屋西壁為祖宗每嵗清明拜祭七曰漁人其人狡猾語言繁瑣傍卭湖居住男晝夜泛舟取魚女負籠入市婚姻自相嫁娶聘用布匹酒食以豬羊泡酒飲之死葬以棺斂燒埋清明日祭掃八曰猓玀其人性狠好殺男女插髮著長衣腰繫皮帶曰飢飽索裹帕赤足身佩刀劒居板屋刀耕火種喜獵有事以艾灸羊膊卜吉凶有急以刃刺人或自刺而死輕生樂鬬蓋其俗習婦人紐髮蟠頭上身著繡花長衣無袴赤足外披細氊衫覆之乘騎盤足橫坐馬背上不墜飲食以蕎麵作餅以菜作羮燕會撒松毛鋪地盤膝坐食待漢人以矮小桌凳男女分席而坐殺豬用火燒去其毛以生肝蘸椒鹽食之泡咂酒飲之器用木碗木杓筯用竹簽婚姻以牛馬羊為聘死葬不用棺椁以錦帛纏之燒化以土掩之乃刻木以羊毛線纏縶為祖宗每嵗六月二十四日宰牛羊祭之夜燃炬聚飲九曰􅉰􅉰其人柔姦剛徑音類漢人亦有番語不食驢騾豬肉其牛羊與雞鵝鴨必自殺乃食本類自相婚姻疾病作佛事祈福不延醫巫死喪食肉但不飲酒死者削去鬚髮布袋裝斂用木匣舁去臨穴取尸入坑去衣扭頭西向覆之以板而瘞之留木匣復用每嵗清明日用麵餅祭掃不祀鬼神不焚錢紙專敬天地而已每年輪轉一月闔家男女清齋白日不食待星上方食之平居耕種貿易大似齊民右建昌僉事范守已于夷情撰次頗詳今按古稱西南夷惟卭筰兩都蠻爾漢置越巂郡領十有三縣皆為編民蕭齊改越巂為㺐郡其所謂㺐乃猓玀之本名不知何時更易今稱之以為羅羅斯南詔以為落蘭部實同名異皆字音之訛傳爾其曰狢􅢱蓋亦㺐之别種云獨僰人之稱最古為羌戎族類漢有僰道縣其人乃其遺族爾漁人附居卭池亦漢之遺民􅉰􅉰乃唐宋回鶻之衆今海內俱有之不獨此處為然至若白夷一種幻化不經其用蠱毒人則又百粵蠻夷之故習也蕞爾南土蠻夷雜居其不為吾民蟊賊者幾希倘束以有司而鞭撲之狼奔鴟張在所不免前此所以鄙棄其衆不以郡縣之治治之也逮至我朝德盛化神殊域遐方罔不向化置郡縣添營制仁漸義摩風俗漸淳若夫曲突徙薪之䇿駕馭鈐束之道當事者尚冝留意爾補遺松茂道轄鵲個寨土百户蒙亞于雍正十年歸誠題準授職頒給土百户號紙一張無印信住牧之地曰鵲個管轄番民一百一十三户每嵗認納本色貢馬二匹解漳臘營交納牽領營馬藏浪寨土目奪賴所管番民十五户蒿鄧寨土目林柯所管番民十三户小喀樹土目薑錯所管番民二十一户年以上土目三名俱于雍正十歸誠由松潘鎮繕給委牌每嵗共認納本色貢馬一匹解漳臘營交納牽領營馬四川通志卷十九
