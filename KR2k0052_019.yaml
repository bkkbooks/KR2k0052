  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0052_WYG_019-1a, image: WYG0560/WYG0560-0054a.png}
body:
  text: 四川通志卷十九土司書稱弼成五服蓋舉要荒而被之以聲教也其中豈無族類各殊言語不接者于以控制羈縻亦有道以處之矣我朝德洋恩普撫綏萬邦雖九州之外且不憚梯山航海重譯來朝矧土司之屬界連內地者乎蜀中三面環夷凡松潘建昌與敘永重夔之所鈐轄洞長山猺罔不洗心革面輸賨貢毯之恐後則夫按其山川道其習俗稽其户口徭賦之數亦可以備職方之考也作土司志松茂道轄直𨽻茂州屬靜州長官司李垣其先于前明世襲土職垣曽祖董應詔于康熙五年歸誠仍授原職請領長官司印信一顆無號紙亦無認納稅銀糧馬駐劄之地曰靜州其地距州城一里東至關子堡下門隴木司接壤三十里南至梨園村漫水灣接壤二十里西至岷江嶽希司接壤十里北至疊溪營接壤六十里原管靜州里羌民四十一户在茂州納糧不願土司管轄于康熙五十二年詳斷歸州外所管十寨俱係畨夷隴木長官司何其懿其先于前明世襲土職懿祖何延禧于康熙五年歸誠仍授原職請領長官司印信一顆無號紙駐劄之地曰隴木寨其地距州城東四十里東至水甕子石泉縣接壤三十里南至曹毛與州治隴東里接壤五里西至關子堡與靜州司接壤五里北至疊溪界三十里土原管隴木里羌民九十一戶在茂州納糧不願司管轄于康熙五十二年詳斷歸州外所管畨民一百一十七户每嵗認納黃豆三十六石五斗二升黃蠟三十六斤責成該土司徵收兌交威茂營兵餉嶽希長官司坤鴻德其先于前明世襲土職德祖坤道齡于康熙五年歸誠仍授原職請領長官司印信一顆無號紙駐劄之地曰水西寨其地距州城五里東至本州鎮西橋接壤南至牟托巡檢司地方蝍魚寨接壤二十五里西至章圭寨壳壳溝接壤二十里北至竹木坎巡檢司地方松溪寨接壤五十里原管嶽希里羌民四十户在茂州納糧不願土司管轄于康熙五十二年詳斷歸州外所管黑虎七族畨民一千零十户每嵗認納蕎麥糧折米一十四石八斗一升一合五勺五抄二撮兌支威茂營兵餉長寧安撫司蘇文耀其先于前明世襲土職耀祖蘇廷輔于順治九年歸誠仍授原職康熙六年請領安撫司印信一顆無號紙亦無認納稅銀糧馬駐劄之地曰壩寨其地距州四十里東至長寧堡官道接壤七十里南至水草坪巡檢司地方接壤三十里西至龍平大小厯日三姐等寨接壤五十里北至實大關接壤十八里原管番民四百三十户水草坪巡檢司蘇文炳其先於前明世襲土職炳祖蘇廷賔于順治九年歸誠仍授原職康熙六年請領巡檢司印信一顆號紙一張亦無認納稅銀糧馬駐劄之地曰水草坪其地距州城三十里東至長寧堡接壤十里南至魏門關接壤四十里西至鎮戌堡與嶽希司龍嘴接壤四十里北至官道兩河口與長寧安撫司接壤十里十原管番民二百二七户牟托巡檢司溫如玉其先于前明世襲土職玉祖溫世英于順治九年歸誠仍授原職康熙五年請領巡檢司印信一顆號紙一張亦無認納稅銀糧馬駐劄之地曰牟托其地距州城四十里東至溫水灣墩與茂州石鼓村接壤三十里南至威州保子關接壤二十里西至汰派後溝生番地方接壤十五里北至蝍魚寨與嶽希司地方接壤二十五里原管番民一百零八户竹木坎土副巡檢司孫光耀其先于前明世襲土職光耀祖孫六受于順治九年歸誠仍授原職至光耀請領副巡檢司號紙一張無印信亦無認納稅銀糧馬駐劄之地曰竹木坎雞公寨其地距州城五十里東堡擦耳崖三姐寨生番按壤十五里南至長寧嶽希司接壤二十里西至黑虎寨與竹木坎寨接壤三十里北至水草坪巡檢司接壤五里原管番民四百戶同嶽希長官司管轄汶川縣屬加渴瓦寺安撫司桑朗溫愷其先于前明世襲土職溫愷祖曲翊伸于順治九年歸誠仍授原職請領安撫司印信一顆無號紙至溫愷屢效勤勞授以功加遊擊職銜駐劄之地曰塗禹山其地距汶川縣城二十里東至保子關與西溝一帶生番接壤四十里南至遙濟寨與董卜宣尉司接壤六百里西至班南山與金川阿日兩土司接壤五百里北至沙派關與雜谷安撫司接壤二百五十里原管番民一千二百戶每嵗認納汶川縣糧銀十三兩八錢零威州糧銀九兩六錢保縣屬雜谷安撫司板第兒吉始祖即吐蕃之裔其先于前明世襲土職至康煕十九年歸誠仍授原職請領安撫司印信一顆無號紙並無認納稅銀糧馬駐劄之地曰雜谷其地距保縣城五十里東至索橋抵保縣接壤六十里南至膽罷抵金川接壤七百里西至桑湯抵草地接壤一千五百里北至茶堡與吐蕃接壤一千二百里東北至達豁寨抵八稜稠接壤四百八十里邊原管番民十數萬戶強悍狡詐唐宋以來屢為患而保縣姦民往往濳匿其中或為細作或為主文或販賣違禁貨物種種不法當事者急宜加意金川寺演化禪師湯鵬其先于前明世襲土職鵬父吉兒卜細于順治九年歸誠仍授原職請領演化禪師印信一顆無號紙並無認納稅銀糧馮駐劄之地曰金川占固其地距保縣五百九十里東至每喏抵木坪董卜土司接壤二百四十里南至漢謝抵阿日接壤三十里西至關兒隘抵扣色吉生番接壤一百二十里北至膽壩抵雜谷接壤三百里原管番民九百三十三户阿日灌頂淨慈妙智國師哈兒吉其先于前明世襲土職吉祖黑兒加於順治七年歸誠仍授原職請領灌頂淨慈妙智國師印信一顆無號紙並無認納稅銀糧馬駐劄之地曰阿日其地距保縣五百五十里東至責兒閣抵瓦寺土司接壤一百一十里南至達歪抵木坪董卜接壤一百一十里西至佑兒寨抵雜谷接壤三百五十里北至漢謝抵金川司接壤四十里原管番民六百戶大金川安撫司色勒奔于雍正元年新設至雍正八年提督黃廷桂題準授安撫司職銜請領印信一顆號紙一張並無認納稅銀糧馬龍安府屬陽地隘口長官司王懋永其先于前明世襲土職永曽祖王熎于順治六年歸誠仍授原職請領長官司印信一顆號紙一張並無認納稅銀糧馬住龍安府城其地東至鐵蛇關䒵子寨與平武縣接壤二十五里南至梧崆關木作昔臘等寨與羊洞接壤六十里西至黃羊關别望等寨與青片白草接壤一百六十里北至化雄關瓦舍等寨與陜西文縣接壤一百八十里原管陽地隘番民三百八十四戶土通判王懋恩其先于前明世襲土職恩祖王啓睿于順治六年歸誠仍授原職請領土通判號紙一張無印信並無認納稅銀糧馬住龍安府城其地與長官司同八原管陽地隘番民三百十四戶土知事薛獻珠其先于前明世襲土職珠祖薛兆選于順治六年歸誠仍授原職請領土知事號紙一張無印信並無認納稅銀糧馬住龍安府城其地東至黃頭與生番接壤三百里南至䒵子寨老鶯等寨與平武縣接壤一百里西至木瓜竹頭等寨與小河營接壤二百三十里北至黃羊關土通判陽地隘口熟番接壤三十里原管番民七十七户漳臘營分𨽻中營屬拈佑阿革寨土百戶阿邦之父個個柘于康熙四十二年歸誠授職頒給土百戶號紙一張無印信住牧之地曰阿革寨其地東至羊角溪牟泥下寨接壤南至毛革生番接壤西至熱霧殺念寨接壤北至蒙雜溝生番接壤馬管轄七寨番民三十五戶並無認納稅銀糧西路熱霧寨土百戶王加笑于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰作壩寨其地東至大寨東路接壤南至鉢囉子來卧接壤西至克應寨東路接壤北至拈佑東嶽寨接壤無管轄十五寨番民一百零六戶並認納稅銀糧馬西路峩眉喜寨土千戶狼柘他于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰峩眉喜寨其地東至七布徐布寨接壤南至雜谷安撫司接壤西至毛革生番接壤北至峩寧寨與熱霧寨接壤稅管轄十三寨番民二百七十一戶亦無認納銀糧馬西路七布寨土千戶巴弄日記于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰徐之河寨其地東至龍子寨與新子寨接壤南至雜谷安撫司與物惰寨接壤西至峩眉喜寨與蛇汝寨接壤北至峩寧寨與熱霧寨接壤管轄十一寨番民一百六十四戶並無認納稅銀糧馬毛革阿按寨土千戶王乍麥雜蛇灣土百戶安布笑二員俱于雍正四年歸誠題準授職頒給號紙各一張俱無印信四至無考每嵗共認納青稞六十四石五斗每石折倉斗米四斗五升共折米二十九石零二升五合解中營完納兑支兵食西路包子寺土千户郎加笑之父噶竹于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰包子寺其地東至雞公寨東路接壤南至大寨南路接壤西至羊角溪生番接壤北至鴉六墩北路接壤一管轄十三寨番民一百零六户每嵗認納青稞十六石內除分𨽻元壩寨番民認納青稞七石七斗每嵗止納青稞八石三斗每石折倉斗米七斗五升共折米六石二斗二升五合解中營完納兌支兵食左營屬阿思洞土千戶折加笑之父業架于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰阿思洞其地東至納海寨深山接壤南至雞公寨與漳臘營西路接壤西至漳臘營東路接壤北至椽子溝與漳臘營北路接壤管轄番民一百二十八戶每嵗認納青稞九石每石折倉斗米七斗五升共折米六石七斗五升解左營完納兌支兵食漳臘營分𨽻右營屬元壩等寨番民每嵗認納青稞七石七斗每石折倉斗米七斗五升共折米五石七斗七升五合解右營完納兌支兵食威茂營屬梭磨副長官司囊索沙加布于雍正元年歸誠題準授職頒給印信一顆號紙一張住牧之地曰梭磨因不能約束郭羅克土目于雍正七年內降為副長官司平番營屬南路丢骨寨土千戶龍布革之父沙乍謨于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰丢骨寨其地東至白革髙山堡與小河營接壤南至鎮江關掃水巖與平番營接壤西至額唧寨松坪與黑水生番接壤北至西寧關鐵爐溝與漳臘營接壤管轄十五寨番民七十二戶每嵗認納青稞十六石每石折倉斗米七斗五升共折米十二石解平番營完納兌支兵食南路呷竹寺土千户安畔之父七谷于康熙四十二年歸誠授職頒給土千戶號紙一張無印信住牧之地曰呷竹寺其地東至白革壩熱節青片黃通生番接壤南至永鎮堡與疊溪營接壤西至松坪黑水物托等寨生番接壤北至平番營革達壩與雲昌寺土千戶接壤管轄番民一百六十戶每嵗認納青稞十四石每石折倉斗米七斗五升共折米十石五斗貝母二百二十五斤每斤折倉斗米一斗共折米二十二石五斗二項共折倉斗米三十三石解平番營完納兌支兵食西路雲昌寺土千户革都判于康熙四十二年歸誠授職頒給土千户號紙一張無印信住牧之地曰雲昌寺其地東至本舌寨白草髙山堡接壤南至鎮江關掃水巖與平番營接壤西至額唧寨生番接壤北至西寧關鐵爐溝與漳臘營接壤管轄番民一百一十二户每嵗認納貝母二百二十五斤每斤折倉斗米一斗共折米二十二石五斗解平番營完納兌支兵食疊溪營屬大姓土百户郁偉之父郁鳴鳳于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰七族寨其地東至山後青片昔歪寨接壤南至威茂營實大關與踏花寨接壤西至河西索多與勒谷寨接壤北至平番營平定關皮袋寨接壤管轄番民三百零三户每嵗認納青稞八石六斗五升每石折倉斗米七斗五升共折米六石四斗八升七合五勺解疊溪營完納兌支兵食小姓土百戶郁鳴儀之父郁華于康熙四十二年歸誠授職頒給土百户號紙一張無印信住牧之地曰七族寨