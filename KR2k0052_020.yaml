body:
  text: 四川通志卷二十土司總論附自古無土司之名有虞氏征三苗髙宗伐鬼方漢武檄冉駹卭僰統謂之蠻禹貢曰三百里蠻詩曰用逖蠻方皆是也其地踞湖貴川雲兩廣六省自巴夔上下迤及海嶠數萬里溪洞箐篁之中曰犵曰狑曰獠曰猺曰獞凡數十種厯代迄今各有大姓為領袖如北魏之冉氏田氏向氏南宋之舒氏彭氏楊氏蘇氏皆雄長其地呼嗾羣族特未嘗建設州司𨽻之銓選如所稱土官土吏者惟有明踵元舊事悉加建設其法倣之蜀漢昭烈授羅伽李恢為郡功曹主簿晉帝用興古爨深作本郡太守宋太祖舉猺人秦冉雄使之自治辰州而推廣其意乃遍設官吏盡布籍屬于是土司之名興焉彼其大姓相嬗世積威約雖同為編土而主𨽻之分定之已久我因其已定之分而假以豫奪初不過借朝廷之名器用相羈縻而等威所至折箠惟命所謂以虛名收實利者強狖之縶維生駒之羈靮如此而已然而以蠻治蠻即以蠻攻蠻儻溪洞之間竊發時起則就近徴調頗易為力因之設土兵相制之法而其後展轉假借凡議大征者無不藉狼兵土兵逺為驅遣雖周武伐紂亦嘗以羌髳彭濮諸蠻同會牧野而後之人控馭無方究之利害各半故王文成議𠞰賊不用狼土而武功成焉按有明洪武初年凡西南夷來歸者即用原官授之而稽其土官土兵及賦稅差役駐防守禦之制但定銓選不立徴調其定銓選法凡土官名號曰宣慰司曰招討司曰安撫司曰長官司初皆𨽻吏部驗封而後以土兵相制半𨽻武選每襲替則必奉朝命其無子弟者即妻女皆得襲替雖數年之後萬里之遙亦必赴闕受職逮天順末詔許土官繳呈勘奏即與襲替於是控制稍疏動多自恣至成化中又有納榖備賑急公補授之令則規取日陋離畔日生雖孝宗發憤釐革而正德以還陋習未除暨嘉靖九年始毅然復祖宗之舊令該府州縣正二經厯巡檢驛傳三百六十𨽻驗封宣慰宣撫招討安撫長官一百三十三隸武選其𨽻驗封者布政司領之𨽻武選者都指揮使司領之文武相維機權攸寓細大相關股掌易運蓋蠻實難馭獷悍桀驁其性猜忌讐殺其習烙跖善走枵腹善鬭則其力也耽戀窟穴不忍違離假重爵命威制服屬則其勢也知其性與習則不宜喜功生事而知其勢與力則勢可以為我用而力不可以使之自用故自洪武暨崇禎一十六朝二百七十餘年之間凡沿革向背大征大役或得或失稍見史乘者略輯其大凡彚為一編名曰合志考古者覽焉四川古西南夷國即漢冉駹卭僰筰都牂牁夜郎諸地故其地外雜氐羌而內盤羅獠䴦屯烏合靡有定居在前朝小番大番實界松茂當全川西北屢為邉患而沈黎越巂建昌諸衛環繞蠻貘當全川西南其中烏羅閟畔交牙互齒最易啓釁洪武五年播州宣慰使楊鏗來朝始置宣慰司令仍舊職而其既龍州土官薛文勝天全六番土官髙英以次歸順以文勝為龍州知州英為天全六番招討司是時卭州六番招討使芍德本元世官明玉珍據川德從明氏至是亦來朝貢馬乃稍降其職為黎州長官曲靖宣慰使祿哲亦元世官至是妻實卜與弟阿哥亦來貢授實卜烏撒女知府阿哥霑益知州其餘乍降乍叛茂州土官楊者七已授知州而以叛伏法於是稍稍經理定播州宣慰司賦稅改永寧長官而以土酋為長官置威州千户所松潘等處安撫以龍州知州薛文勝為安撫使又置阿昔洞等十三族長官及副長官會筠連州勝大寨蠻酋編張等叛命將袁洪討平之而巴縣蠻王立保自稱應天大將軍燒佛圖關犯通逺南紀二門播州江度蠻王安茂州土酋董貼里龍州土官趙宗夀先後為亂皆移兵𠞰除之而立重慶衛並復威州千户所及茂州衛指揮使司互相鎮守時四川都司遣兵修灌縣橋梁至天陶關汶川土酋孟道貴疑為襲已集部落阻陶關道皆擊𠞰無遺其地茶蠻洞獠眉縣賊彭普貴宋儂茶洞賊田大蟲皆隨滅惟建昌衛指揮使裕嚕特穆爾並柏興州賈哈喇穆蘇等相繼稱亂已遣藍玉為總兵擒裕嚕特穆爾父子獻俘而哈喇未伏會沔縣吏髙福興土民田九成僧李普治謀叛有何如順者號天王大敗官軍焚略陽縣治殺知縣吕昌執教諭吕銑去復焚徽州治殺學正顔叔彬詔遣都督徐凱指揮黃中討哈喇長興侯耿炳文武定侯郭英討九成等皆以次𠞰平無遺孽於是改播州安撫司為播州宣慰使領安撫司二曰黃平曰草塘領長官司五曰播州曰餘慶曰白泥曰容山曰真州改設東川烏撒烏蒙芒部四軍民府而以黎州長官司為安撫司永寧長官司為宣撫司領長官司一曰九姓與平茶洞直𨽻長官司同𨽻布政司而别以酉陽石砫二宣撫司並邑梅洞長官司𨽻之重慶衛泥溪平夷蠻夷沐川四長官司𨽻馬湖府其都司領者則軍門千户所曰龍州招討使曰天全六番軍民指揮使司曰松潘等處領長官司十八曰隴木頭曰靖州曰嶽希蓬曰占藏先結簇曰蠟匝簇曰白馬路簇曰山洞簇曰阿昔洞簇曰北定簇曰麥匝簇曰者多簇曰牟力結簇曰斑斑簇曰祈命簇曰勒都簇曰包藏簇曰阿昔簇曰思曩兒簇守禦千户所一曰疊溪此皆𨽻兵部武選司者土官則知府四人曰烏撒曰烏蒙曰芒部曰東川同知一人曰烏撒判官一人知事一人曰龍州把事一人曰馬湖巡檢八人曰信寧曰侮伲溪曰麻刺村曰昭平堡曰寒水曰寧戎曰明月曰三盆驛丞七人曰溪龍曰阿用曰祿馬曰蠻夷曰白水曰太平曰瀘沽改流知府一人曰馬湖此皆𨽻吏部驗封司者乃設四川行都司領建昌等六衛而屬以昌州威龍普濟三長官司水樂初指揮丁龍杜福撫諭亞堅等十一寨生苗三十六户已認輸黑鉛銅布上以苗人叛服不常命悉𨽻酉陽宣撫管轄而免其賦役四年置疊溪鬱郎二長官司令屬之疊溪守禦千户所設吏目一人是時諸土官皆遣貢獨永寧宣撫使阿聶妻奢蘇親入貢乃增設赤水宣撫司𨽻永寧衛又設重安長官司令屬之播州宣慰而以張佛保為長官又設馬刺卭部二長官司𨽻行都司設八郎安撫司𨽻松潘衛又設酉陽宣撫司之邑梅洞長官司𨽻重慶府大率烏蒙烏撒芒部東川以東皆烏蠻爨蠻土獠諸種其居多板屋椎髻披氊出入佩刀劍相見以去帽為禮男長將娶擊去左右齒以子日貿易名所集地為鼠街其在播黎諸地稍慕華風婚姻以銅器氈刀弩矢為禮燕樂則擊銅羅鼓橫笛歌舞每市易不用錢漢以細絹茶布番以紅椒鹽馬宣德初麻兒匝簇去松潘七百里有刺麻著八讓卜聚衆侵掠遮遏八郎安撫朝貢松潘衛指揮吳瑋招之讓卜向化使其兄子完卜入貢且言其地廣過於八郎請置宣撫以轄之上乃置麻兒匝安撫司以著八讓卜為安撫使既而龍州土官薛忠義請升龍州為宣慰以鎮番戎不許時播州草塘安撫所屬榖撒等四十一寨蠻長作亂攻牛場乾溪等堡敇撫之不從遂𠞰平之因改龍州宣撫司𨽻布政司會烏蒙烏撒二土知府祿昵尼祿等爭地讎殺遣行人章聰侯璉奉敇往諭而烏蒙讓地上甚奬賞無何茂州嶽希蓬長官司血只同與靖州隴木頭長官司各寨羌民一百七十餘人奏言茂州僻處邉隅與松潘疊溪生番接界纍嵗被害有知州陳敏在官能撫恤人民制馭生番今敏以親喪去民失所請本官起復以安邉境敇令復任乃增設阿用簇長官司𨽻松潘衛先是威茂二州南路生番多夾居十五關堡隔河阻山盤踞為患明初丁玉討定立衛祗就中通路一線為中國所有其他如鐵罏溝走石坡鴛鴦橋石花鞋奤子灣木驢溝掃冰巖三哨嘴楊廣墩炮腦溝老虎石翟貴哨石窩墩關門石陡溝子大小橫梁溝沙灣龍溝秦王箭鐮刀灣掃水巖涼水井黃沙壩索橋頭五哨溝乾溝黃土坎野貓壩石門坎亂石窖石蛇兒􅉰子嘴龍打溝洞子溝沙灣麻答嘴諸處東路如天花石三坌溝乾溝子琵琶頂谷驢兒溝髙哨子旋風巖險頭哨髙子哨出龍洞母豬洞落魂橋月兒巖山蔥溝髙哨子大灣松坪子擦兒巖鬭老巖弔巖子龍黎兒溝髙橋雞公嶺大沙灣臘菜坪諸處北路如寡石巖虹橋關絶寨墩鐵門墩銅柱墩八呷口林燦口恰乍口惡柘口寒盻口丫裕口麻盻口唐弄敵貢壩柏木橋東勝墩諸處俱番姓出入路也來則逼官道行劫去則阻河而居諸衛饋餉多被剽截雖嵗增防兵不能捕宣德初大征安南當調松潘軍而衆皆憚行千户錢宏姦黠計惟蠻亂可免調乃與其黨尚清入番塞掠番番大恚番長阿用等號衆出掠殺指揮陳傑上切責三司官械宏入京誅宏命都指揮僉事韓整以三千人𠞰捕而蠻五萬人圍松潘城焚上下四關威茂諸衛皆被圍都指揮僉事蔣貴同松潘指揮吳璋急招之皆不從乃敇都督同知陳懷等會兵四萬人自洮河取路進而蠻方攻圍疊溪指揮吳玉等遇之失利韓整兵亦敗內臣令番僧失刺藏卜等至諸族寨慰諭兼賜布幣番長結弟言我向化四十餘年未嘗敢亂而錢宏陳傑無故統官軍哃喝索生口捕男女大小而取吾碉錢是豈吾歸懷意哉今朝廷宥我罪賚我敢不承命遂令結弟遍諭生熟番十一族占藏卜九族黑水生番二族皆納款去蔣貴遽止陕西官軍令勿進時尚書蹇義以龍州勢輕請升龍州軍民所為宣慰不許乃改龍州為宣撫𨽻布政司已而諸蠻復出掠破綿竹縣仍劫威茂二州官軍戰不利鎮撫侯璉等死之遂敕都督陳懷及方政蔣貴進兵乃合陕西貴州兵六萬餘人錦衣指揮何敏等四人督戰蠻方攻筠連巡檢吳瓘出家財募兵守城大兵至合擊破走之乃撝官軍及土兵分道進攻以精鋭五千人擊其西北大寨破之貴督兵七千破任昌大寨而都督指揮趙營分道進兵以次討平龍溪三十七寨前後斬首一千七百餘級墜崖赴水死者無算餘悉撫定因增松潘衛前千户所茂州衛前後二千户所且增置潘幹寨阿角寨芒兒者三長官司𨽻松潘衛諸蠻惕息不敢出巡按御史王翺上便宜五事其一謂松潘近邉去省城八百餘里番寇為害都督陳懷居省城緩急未便雖委官領軍難盡約束當令懷往彼鎮守以壓邉境其二謂松潘威茂諸衛所官軍月糧乃成都諸府州縣所運多被劫掠若令暫於成都諸府州縣等衛倉收貯農隙之際類集有糧諸人齊力起運而都司撥軍護之且令布政司委官交量則道路無虞而收受亦無弊上曰善遂敇陳懷鎮松潘正統四年以王翺代懷著威惠番酋商巴等感悅盡率諸部受約束入貢者接踵景泰初諸蠻并起撫臣羅綺檄悔罪不聽乃招募材武得禪師智中牌頭尤弄柯皆豪健各統精鋭乘夜銜枚分道搗賊巢綺介胄隨之破撲爬諸寨擒劇賊卓勞阿兒結十餘人戮之既定治以簡易暇即與番人接杯酒歡番人畏慕終綺任不敢叛成化中諸蠻大劫掠參將請增兵巡撫夏塤曰將不在兵兵不在衆乃揀精鋭四千八百人往更之而一無所增時黑虎寨最強相傳有神術先知官兵未至即遁去或潛伏要害竊發屢敗我衆按察使龔璲獨曰我目不密耳彼何能知夜半密勒諸將統兵進凡三十里平明抵其寨蠻大驚潰斬縛各千人得其首惡餘潰死無算既而大征破寨二十餘斬五百級降者數千皆編籍輸糧副使陳思忠于大石佛嘴鑿山開路人皆便之乃復遍𠞰惡匝平山諸寨斬首百餘級萬厯中復大征人荒沒舌丢骨三寨南路盡平時自威茂達松潘從小河三舍漳臘官道兩傍修築邉牆護諸往來堵禦竊發一時稱便其後牆稍圮隨時補甃議者謂南路後山自雄溪西寧以達蒲江北定抵鎮平界倚山為磧築城設敵樓而鎖兩頭以重關且復增舊牆聮絡相接以防番寇則輪班戍軍可以盡革嵗省兵餉可數十萬其周遭屯種嵗之所入亦不下數百萬而其説不用山都掌蠻在敘州西偏介川貴間與永寧芒部烏撒相接諸峯盤互大壩為門户其東則進為凌霄又進為九絲旁峙都都寨舊稱九姓後以蠻族棼雜改九絲所在結寨無慮千百族宋熙寧間蠻叛用白芀子兵破之因作誓蠻文稱民壯為白芀子明初諸蠻皆出降入籍輸賦分山都六鄉水都四鄉皆𨽻之戎縣而水都平衍逋逃無所匿獨山都突奧不可窮詰故但稱山都掌蠻宣德初蠻叛官軍討平之正統中復叛時西北用兵不暇及至景泰元年都御史李匡御史劉幹始議討以疫作不前天順中都督許貴再討不能勝撫諭而返至成化改元川貴撫臣各奏蠻分劫州縣遂命川撫江浩貴撫李浩總兵官芮成副總兵李安徴原調官軍刻期會𠞰時翰林侍讀周洪謨謂蠻各有主請擇蠻人有望者立為長官司𨽻之本府統各寨夷民而漢民則統之戎縣流官使各有分屬則夷情自定而副總兵李安復請委永寧宣慰奢貴赴大壩令諸夷就宣慰管轄議莫能決國子學録黃明善獨昌言曰夷漢分屬不無近理信如安奏則奢貴平日所轄土獠羿蠻尚不能鈐束以致攻燒屯堡殺掠軍士其能撫都掌之衆哉命下總兵官審處而芮成等已先進兵劄西華等鄉分道擊殺遂破賊寨斬六百餘級會貴州兵至並集金鵝池合攻大壩并遣指揮孫泰督芒部土兵截賊後路永寧土兵守落敖山口賊不能支乃遣阿圭等三十七人詐降軍門思倉卒生變以圖內應成驟擒之阿圭袖小刀左右擊刺卒就執乃燒賊三十七寨斬賊首五百八十七級報捷甫還師賊復出掠值給事中秦崇御史吳㻞勘軍政即遣崇等會川貴兵敗賊小峯埡青岡坎諸處斬賊首四百七十餘級復還師敘功芮成李浩秦崇等皆次第升賞而賊以次年召諸蠻阻山大寇乃決計大征襄城伯李瑾為總兵官程信為兵部尚書督軍往討信至永寧分大軍三道四川軍由戎縣貴州軍由芒部雲南軍由普市水腦並入期共會大壩而自督兵入金鵝池時南寧伯毛寧亦至為左哨敗賊李子關伐木開道官軍發神鎗徑弩乘風縱火焚龍背豹尾七百五十一寨米倉三千八百一十一所斬首一千六百餘級生擒三百四十人進至大壩攻山都六鄉焚一千四百五十七寨米倉九百八十一所斬首三千十七級生擒九百五十三人獲銅鼓六十三面牛馬豬羊盔甲鏢弩牌刀旗幟弓箭無算餘賊遁山箐者皆搜𠞰無賸願降者聽有匿天井水磨諸洞者下令遍塞諸洞門而環以兵月餘死洞中臭達十餘里官軍為謡曰洞無關有臭蠻乃並平九姓土獠之附賊者遷瀘州衛於渡船鋪增置江門水流崖洞掃處關堡改大壩為太平州設長官司分故都掌地𨽻永寧芒部加信兼大理卿進瑾榮為侯餘人頒賞有差播州漢牂牁郡也唐改郎州既又改播州楊氏世有其地元世祖授楊邦憲為宣慰使賜其子漢英名賽因巴哈封播國公明初楊鏗內附使仍為宣慰改𨽻四川領黃平草塘二安撫真播白泥餘慶重安容山六長官司統七姓為田張袁盧談羅吳而田張最大世為目把永樂初楊升奏所轄當科篤雍等十一寨蠻人梗化不服上命升討之宣德初楊欽正統中楊炯楊綱皆世修職事獨綱子輝傑黠多豪舉天順初私閹土民黃保等為火者嘗嬖妾田氏以其所生子美居長屢欲奪嫡安撫宋韜長官毛釗執不可曰楊氏家法立嗣以嫡不以長獨奈何紊之輝不得已乃立嫡因名庶曰友名嫡曰愛言相友愛也然而嬖庶之心終不忘幸客張淵説輝曰主官欲貴孟主而唧唧與仲主為讎毋論勢有所未便即使奪仲以與孟不過剽吾左以益吾右耳且重貽口實以滋後議何不别為孟主地雙貴而朋立是使孟創業而仲傳世也輝曰為之奈何淵曰夭霸諸苗主官部境也山箐險逺憨而易虐誣之曰賊因請兵討之然後歸功孟主而請立安撫以治其地誰曰不然輝大喜乃立召容山長官韓瑄重安長官張通告以生苗反狀使上變瑄爭之謂苗實不反輝怒杖瑄通惶恐叩頭曰反反請從輝署名上變上命都御史張瓚同輝進𠞰殺諸苗千人輝乃賂瓚疏友功且曰友謀勇冠軍手刃七馘時友甫十三嵗乃請設安撫于安寧授友安撫使而以張淵為長官然友實赤嘗之官也既而爛土諸苗賫果等忿夭霸以無辜受戮時時攻安寧瓚又疏請于凱里寨築城衛之費糧數千萬成化十九年輝死愛修怨于淵淵屢謀殺愛不克二十二年丹章諸苗寇安寧四川參政謝士元副使翟廷蕙都指揮楊綱以兵往過播州詣愛家置酒髙會翼日視學適州民賽社士元等坐學宫臨觀愛復擕酒至訓導楊禮艴然曰視學而觀社提兵而樂酒略等威而款下屬竊為名公恥之士元等大慚而起時淵伺愛隙謂愛實通苗越境為亂故款官軍逗遛修私怨為文報貴州守臣而致書舉人路義使之通賂值安撫宋韜獲其書以視友友乃易其書遣使投義義信之遂詣貴撫陳楊愛反狀貴撫不聽且曰播非我轄也義為書復友而愛執之愛遂據義書報川撫將聲罪發難友大懼淵嗾友上變言愛結苗夷反叛造火器旗纛金瓜鉞斧調總旗等號親軍閹割士民立金龍門於宅前而開尚甕等鐵冶令偽閹官煉熟鐵為軍刀置織造院收民人趙其一百餘户充織匠造龍鳳蟒袍立商稅局於白田壩起調軍兵三千餘衆假水西送喪演習武藝設教坊司以偽閹官掌其事虜良家龎兆期女勝正福等一百餘名充女樂教習雜劇每遇節旦愛衣龍衣自稱國主天主而稱其妻地主且置後宫奪趙髙僧幼女玉正為宫妃用巫師魘魅庶母貫氏禁父妾馬正蔣正等宫中姦使有身嘗強淫宫婢宋正不從裸之縛於杌牽羣狗導之淫凌辱狼藉而後殺之科派各里人民分上中下三户得金銀若干萬兩養老莊田子粒若干萬石珊瑚樹若干株珍珠簾若干絓玉圭若干笏馬若干匹牛若干頭嘗夢騎龍登天門上帝謂之曰此南方帝子也既醒龍成五色因作詩有霹靂一聲震天下南方須起赤鱗龍之句廷議大駭立命刑部侍郎何喬新錦衣衛指揮劉綱會川撫及巡按鞫之俱不實淵坐妖言律路義削籍友論死贖免發保寧城中羈管未幾友黨纂友歸與愛讎殺不已且糾衆攻播州焚愛居第及公私廨宇略盡廷臣方請討會大征鄢藍兵不暇及未幾友卒廷議為逋友雖死子𢎞尚存仍調兵𠞰以彰國法而川撫勘奏謂𢎞父友搆亂法固難宥但友搆亂時𢎞尚幼稚似當開自新之路與以更始况友所焚殺已經照土例折價及還所侵奪於官宜授𢎞冠帶土舍而其既愛死子斌豪甚舊制土官有功祇賜豫衣帶及旌賞部下人員無升職加銜者斌以平普安蠻功於正德初加四川按察司銜賜蟒衣玉帶𢎞忌之仍起讎殺及𢎞卒重安土舍馮綸等又以怨𢎞誘諸苗攻安寧貴撫鄒文盛命斌討平之而請復安寧安撫令𢎞子弟得襲舊職廷議不許嘉靖六年𢎞弟張復以為請時張盜邉劫得白泥司印信復與斌子相重相讎殺較前更烈守臣乞改凱里屬貴州以張為土知州以解釋之事久不決初廷議為楊張習父兄之惡幸免於辜輒敢肆然執印以要君且其所爭田莊及椎埋殺人等罪尚未得決正宜收置於理令其悔過還印償所奪寨苗諸地而驟議復職未便其後用兵部尚書胡世寧議謂張黨已成若不因而撫之恐流禍無已乃復張凱里安撫屬治貴州而相則襲播州宣慰如故然其讎殺相尋終不能盡革舊習也正德二年鎮監羅籥奏威茂所轄卜南村曲山等寨自𢎞治四年叛後不服征徭者十七年矣乞為白人請衣巾願納糧差白人者其俗以白為善以黑為惡也嘉靖二年馬湖土巡檢安宇自言從征年久纍獲首功奏乞改注職官兵部覆宇本土知府安鼇之子法當置廣西因四川用兵暫留行間雖有功例應給賞而宇故辭之隂為開復土官之地則先朝岑猛岑濬事可取鑒也上然其言遂不許先是楊斌子相襲播宣慰職以祖父嫡庶讎殺沿禍數世相不之鑒仍寵庶子煦欲奪嫡烈而其妻張氏甚悍與子烈盜兵逐相相走水西死烈乃乞水西還父尸播故有水煙天旺地與水西近水西宣慰安萬銓屢挾奏不可得至是要之必歸地而後豫尸烈陽許之及得尸悔約讎殺相攻剽垂十年總督侍郎馮嶽討平之嶽乃奏三省接壤民苗之衝若四川餘慶之走馬坪播州之三度關貴州石阡之龍泉司各立哨堡於重慶偏橋等衛委指揮三人督兵防守仍移銅仁參將于石阡移思石守備于龍泉控扼播州令犬牙相制而後設重慶府通判一人使之駐龍泉以收糧稅則控馭較便上然其言靜州長官司土舍節貴以叛見誅並亡失印信其弟車勻請襲職部議謂叛人子孫法當廢革但車勻頗著忠勤宜特與承襲統攝羌苗仍照例納穀五千石免其赴京報可天旺落六寨土女酥郎孿産牝牡而獸尾衆以為女與畜交故有此三度關守者白之總督馮嶽嶽曰蠻族本穴居巢卧人獸相雜此即槃瓠馬人之故習也何怪焉遂敕壞所産而置女不問芒部土官隴慰死其子隴夀與隴政支祿爭立朝命以嫡故立夀而隴政支祿倚烏撒土舍安寧等數為亂且稱兵向夀夀亦借水西兵相抵粗而政竟殺夀收夀印川撫王軏與御史劉黻上其事黻言宜順從夷情以立支祿而軏言隴政支祿同以犯公殺朝廷命吏罪不赦詔遣參將何卿督𠞰之斬支祿并賊黨二百餘級俘二十餘人降者數百而政奔烏撒卿令土舍安寧及土婦奢勿擒政以獻安寧初許諾既而出獻阿核阿達尸云政無有久之傳政死兵部議奏芒部隴氏釁起蕭牆騷動兩省王師大舉始克蕩平今其本屬親支已盡無人承襲請改芒部軍民府為鎮雄府設流官知府統之分屬夷良母響落角利之地為懷德歸化威信安靜四長官司使隴氏疏屬阿濟白夀祖保阿萬四人統之其朝貢馬匹如程番府例以重慶通判程洸升試知府松潘參將何卿兼提督守其地許之既而夷目沙保謀復立土官隴氏遂挾衆叛攻鎮雄府城陷之執試知府程洸而奪其新印殺數十百人洸奔畢節川貴守臣急遣使招撫沙保已送出鎮雄府印乞降然尚持兩端欲復立土官如故上遣川撫王廷相同何卿提兵進𠞰土官阿濟稱沙保已殺死廷相據聞而芒部諸夷復挾沙保子普奴為亂聲言夀有子隴勝在阿濟處隴氏實未絶請復土官而使隴勝襲其職官軍與戰於畢節不利既而御史施山總兵牛桓具稱保亦不死阿濟言不實敕行提督尚書伍文定同鎮巡官搜捕沙保并擒獻普奴而兵部尚書李承勛復以文定專主用兵為非計詔文定回京於是或𠞰或撫相持不決者數年川撫唐鳳儀新任仍敕𠞰捕且專責阿濟使之擒沙保斬于軍門乃奏言烏蒙烏撒東川三土官故與芒部為唇齒自芒部改流官諸夷懷不平反者數起今懷德長官阿濟等雖自詭擒賊而其復土官而存隴氏之心實未嘗忘也臣請如宣德中復安南故事俯順夷情則不假兵力禍源永塞時川按戴金貴按陳講奏與同而兵部尚書胡世寧覆言革流官而復隴氏未便夫芒部自成𢎞以來數自讎殺斯時未設流官也今隴政以爭襲誅死隴夀又死而隴勝方幼諸夷皆云非隴氏子故前都御史王軏不得已奏設流官知府分四長官司各統其衆制非不善徒以軏等遷去知府程洸迂暗不能拊循故芒部復亂今諸夷輒易其詞云願復隴氏夫夀政皆隴慰親子猶相爭殺二十餘年今勝非夀正子也一旦得立使阿濟得弄諸股掌其他三長官司所統各寨萬一不平而各尋一隴姓者求立守臣能爭之乎若謂烏蒙諸土官咸懷不平而芒部土人終憚流官約束則請諭鎮巡以仍設土官之意然後收芒部舊印與鎮雄新印敕四長官司及各寨頭目能守法奉職三嵗不為亂者聽徑屬布政司不復制以府治或立土官知府及流官統轄者皆隨所願其隴勝令布政司羈留教育俟别處改用無何戴金奏芒部夷穴不可守宜俯順夷情以立土官而唐鳳儀等奏勝實隴夀正子蓋私通長官阿濟妾奢即所生者夷俗重骨脈衆所嚮服宜量授府佐令統屬四長官司仍選流官經厯如舊三年之後果能率職奉貢始準復舊銜其鎮雄之名不必更改四長官司亦照新設詔從其言後復敕威清兵備仍還安莊添設兵備一員於貴州駐劄畢節專制畢節赤水永寧烏撒諸處而增防守官軍八百名於各站所事平掣去其戍畢節者則量從貴州撥入統之兵備作防禦焉嘉靖二十五年白草番為亂陷平番堡及奠酒關虜指揮使丘仁殺百户耿爵等朝議罷川撫王大用副將髙岡鳳而以都御史張時徹都督何卿代之時徹乃議分石泉壩底龍州兵為三哨復調天全招討使髙繼光馬湖長官王祥鑾等率土兵玀􅉰及建昌諸衛兵助之生擒首惡黑殺李保白石兒白石撒剌等斬首七百級俘男女二百七十七人燬碉房四千八百七十餘牛馬器械儲積以萬計山都掌蠻有凌霄九絲都都諸寨凌霄者阿茍之所據也茍之先在天順成化間謀不軌兵部尚書程信襄城伯李瑾討平之其後有阿共嘗為盜未敗嘉靖間以從征賜冠帶即茍父也茍有壻阿辱大事紀作阿孰與其黨阿奓么兒阿繆皆桀驁多膂力至是重以為可恃遂衣蟒衣張蓋策駟馬所至用鼓吹響呼夾道而馳萬厯二年都御史曾省吾御史孫代聞於朝下兵部議先是兵部尚書談綸曾撫川奏都蠻為患其來已久今遺孽復熾當先練關隘遊兵以備不測乃募浙人製鳥鎗鎗發口啞而死者數人蠻甚憚之至是綸請征敕省吾及總兵劉顯進𠞰至大壩僅獲其酋長阿果梟斬之然茍益不平乃流殺長寧諸處椎埋坑儒生刳剔孕婦其時有羅氏女冬兒被執不可辱則支解而挂之樹間都御史責劉顯觀望且慮諸蠻多效尤相繼起乃調永寧宣撫奢效忠與水西土舍安國亨各以萬人至同指揮守備據險從三路入而副使李江參議沈伯龍轉漕軍中會武舉人李之實與阿茍善同知洪一貫使為間誘執之乃乘勢轉戰連獲阿辱阿奓等斬首二百級檻阿茍獻軍前茍仰首笑曰么兒在雖執我何益哉么兒茍義兒多力者也顯乃設伏馬草坡襲落豹惡淚坎寨然後向凌霄攀藤援木而上諸蠻皆走獨么兒以滚壘石當我軍我軍稍却步兵鄭龍奮而前曰諸軍苐望我火箭火箭舉則齊發而入於是各貫弓挾矢目逆龍龍忽燃火箭直衝蠻鋒諸軍萬弩齊進蠻盡墮下既前執么兒並胡大漢等九十五人斬二百餘級焚死無算阿茍聞阿兒被擒哭曰九絲不復守矣其後餘黨據他寨者盡為劉顯等所滅於是有都都寨九絲之戰都都寨寨主名阿墨與九絲蠻同據險稱亂方諸軍擊凌霄時即欲𠞰九絲而都御史獨決策謂先攻都都可斷九絲左臂也是時鎮雄土舍隴清親帥三千軍軍藍澱坡用火攻都都而總兵郭成吳鯨等亦舉火燒董布壩及紅崖逼寨寨中鼓譟出四走會雷雨火熄蠻復聚大兵乃迎諸蠻戰諸蠻皆殊死不可敗翼日顯與成各分兵二路攀崖仰攻而印壩諸苖千餘來援顯回擊却之乃督鎮雄酉陽諸土兵更番入斬蠻王四首則阿墨在焉乃大搜諸寨生獲阿歐阿當阿瓦阿挂等虜茶榖金鼓梭槍無算而九絲乃大恐九絲之蠻以萬數阿大阿二方三其著者也當是時阿大阻雞冠嶺而阿二方三嬰九絲城壁壘相望乃以凌霄都都相繼滅震懾思詐降以覘虛實會長寧諸生王希忠珙縣監生何鈺有機智請使賊為間乃令二人持銀牌綺幣往撫而阿大大喜遽隨二人出徒跣叩軍門請得備編户不敢反都御史初疑之必得阿二方三來始受降既而豫冠帶趨受約束使捕阿二等自贖阿大乃遁去顧其勢與九絲隔隂為聲援將伺我師走奧中則翼而復之諸將詗實戒勿進然同時諸蠻若雞冠黃土內官母豬弔猴崖得居印靶諸寨則實以阿大降故皆先後歸順九絲由此勢孤先是副使李江司轉餫遙從萬山中逆舟而上中有趲本二灘亂石縱橫水勢直下若建瓴長年循髙崖牽引多死至派僧夫數十人猶不足營山青神二主簿相繼道斃成都知府陳大壯鳩工鑿二灘但梅雨暴漲督工巡檢曾本死於水相顧嚄唶至是諸蠻降諸軍多因糧於賊省轉餫乃遣劉顯為大將佐以郭成劉綎冉維屏奢效忠等將入都都寨而先從深溝楊桞坡印靶穵口穀爆以扼其險期日請決戰不勝乃薄責效忠隴清等謂前以一萬騎三日破凌霄五日破都都寨今合兵五萬騎而連月不克一九絲何哉效忠發憤提羿兵夜半隂襲隘詰旦為重陽日我師方就蠻飽食將登髙望而蠻俗以是日賽神天大霧晝晦度我師不能至皆盡醉鼾睡諜者得其狀會暴雨夜半傳發冒雨入攀絙而上未明斬守關者蠻大驚自殘殺蹈藉我師益衝擊之遂大潰追獲阿大于雞冠寨斬阿二方三于夜郎大盤之間先後下寨柵六十有竒斬首捕虜得四千六百餘人酋長十人獲銅鼓為諸葛鼓九十三面他若牛羊諸物不可勝計時阿大見銅鼓跪而泣為大將軍言曰是鼓有神凡鼓體剝蝕而聲䃔䃔者上鼓也可易牛千頭體澤而聲韸韸者次鼓也可易牛八百頭蠻人得上鼓二三面便可雄視一方當吾興師時擊鼓髙山諸蠻聞山頭鼓聲纂纂來椎牛而饗之而後出行劫劫勝則復椎牛祭鼓以為神今可得乎初戎縣以都蠻得名至是更名曰興文賜驛名曰都寧倉名曰恆裕並易九絲曰恆蠻凌霄曰拱極都都曰都定印靶曰文印鈎猴曰降蠻雞冠曰金雞且又通內官寨道置總兵僉事以鎮臨之𨽻以府同知一人守禦千户所一人傀厦為卭部羌寨有亡命趙永成者與土人葵咱呷五十呷聚衆將為亂會竹麻寨攘七執鎮西軍陳黑子者而強買其婦黑子欲贖之七不從羌俗貿易必遷居貨至鎮西號為趕集黑子度是時七必贏錢至至則執七索還婦乃約宗人陳禮保捕七七覺跳身走追至羊圈河禮保彀弓射諸羌中羌人龍扒死七引諸羌責黑子無故殺龍扒當抵擁至傀厦寨值葵咱呷方舉兵至是號衆曰漢兵將滅我果至矣鳴鼓登城門從鎮西站縱火燒官廨百户魏繼武持印走殺而奪之時王廷瞻為巡撫聞于朝且讓守備丘紹先令戴罪𠞰捕而五十呷買千叭寇曬經關道路不通于是副使景承芳統指揮王選及丘紹先軍竹麻有禆將李獻忠者獲鴛哥别于鬼皮果寨讞之非鴛哥别即亡命趙永成曩時自鬻于五十呷者也五十呷喪永成如失首目而諸軍破曬經關搗宰猓轉戰二日諸羌助之張髙岡上大小沖三尖三梭各以兵至官軍用鳥銃連擊連勝于是諸羌皆乘船浮江官軍追北至江上矢發如雨湛其船羌兵溺水死水為不流旦日乘勝復擊之諸羌大敗先是卭部長官嶺柏死有妾沙氏與嶺應升爭掌印舉火延燒利濟跕而官不之問以故宰猓鐵洗姑都遂焚八里嶺蠻平堡一無所忌今咱呷等燬官廨殺百户弄兵與官軍轉戰而聽其逋逃渠魁未殄何以服蠻衆兵部督𠞰捕甚急王選丘紹先皆按部不動未幾禆將劉綎忽奏記都御史曰傀厦宰猓洗馬竹麻諸寨已捕縛葵咱呷那一加腳那加賈别冬谷兒短褚張田保鎖那加等若干人且獻褚那呷執散喇呷傀鮓枯撒腳腳穵等首級詣軍門叩頭請貰死於是都御史以聞斬咱呷等首級鎮西市而諸羌盡服南路四十八寨惟丢骨人荒沒舌最大兵備一作千户王詔巡邉至三寨三寨度詔至必道崖下乃並伏伺詔過擊詔墜馬死副使林應節乘傳道沒舌沒舌人掠應節資裝臨行褫其衣萬厯元年寇安化關明年寇歸化關又明年擊斷我糧道邀奪松潘諸轉運軍食故事嵗正朔撫賞諸夷遣判官賫銀幣堂堂道三寨至是劫賞殺官吏黃申等四人于是御史托前事奏遣指揮曺希彬徐承業禆將易鶴陽𠞰之殊死戰斬酋長白臉兒而三寨俱起希彬承業乃統諸軍軍楊廣墩木瓜坪羅鍋嶺諸處十道並發先破人荒寨盡焚其窯房碉房兩寨見火舉鼓譟自相騰踐然後官軍並乘之賊大潰死者甚衆其明年正月復賞羌會他寨媧媧兒子川盻匿三寨導甲仲牛兒等隂入城以為耳目賞羌者覺其姦乃搜得四人殺之當是時西有呷竹諸羌東有林洞諸羌為四十八寨其外喇嘛番衆耳阿舍思熱浪牢熱等皆同時請降三寨盡平惟疊溪諸羌為梗迹及白草番議用兵然已久斷輿梁逃黃頭山後拒絶羌衆不與通石泉令強勉往諭其酋納麻舌皆降且嚴除三寨需索陋例曰新班錢熱衣錢架梁錢屣草錢放狗錢挂綵錢斷酒錢而其後白草復叛白草風村野豬窩諸寨在武宗朝曾帥白若羅打鼓寇壩底指揮使何卿討平之其後嘉靖中陷平番是時卿已為都督都御史張時徹奏請仍拜卿為大將軍捕斬黑殺白石􅷌喇等于是風村一十七寨並匍匐介肉挂兒寨餓柘詣軍門請降願獻馬羊及腦包哈喇弓矢番刀等物都御史王廷瞻許之方刻木盟去亡何他寨若番牌大力孫子皆請歸降效風村故事且得通道大印龍州期日詣軍門兵備使使石泉令李茂元受之羌俗囚首無冠茂元具漢冠易其名姓書冠間屆日啓軍門鐃吹數部樅樹鼓大鉦令諸羌魚鱗入諸羌聞鼓鉦望見漢冠及朱杆彩旗乃大喜舉足盤跳舞歡呼震天乃出漢冠冠諸羌諸羌跪起各互視其首踊躍東西走既而又跪捧其首以謝乃言願嵗輸黃蠟一斤元日長至赴縣庭朝賀寨樹一白幟削木祝皇帝萬嵗編户得二千四百四十男子四千二百五十六女四千一百三十八事聞加賞賫其後楊栁羌寇普安傍近白草風村及小河木瓜之間頗聞白草導榖粟寨反有據都御史徐元太遽請兵擊之白草絶穀粟往來自訴嵗寨貢黃蠟一斤賦菽糧二斗如故今請益菽一斗示不反是時周嘉謨為安綿兵備遣龍安知府按驗降册實得壩底堡白草河西風村顛轉架孫兒挂馬鹿坪桃桃紅椒薗子龍藏野豬窩鵝燕溪啞浪壩照隊太白白羊嶺落落坡等二十八寨并新降獨坪大圤召對通寧口四寨編户如例茂州羅打鼓宣德中嘗盜邉上遣大將軍陳懷蔣貴擊破之𢎞治六年又帥白若諸寨擾漢境是時房驥為將軍請國門外建東勝菜園諸墩以備之萬厯初再入茂州茂州城晝閉驛路不通既而凌霄九絲軍大捷斬首虜千級時刁農雞公最強乃畏威率頭目列余之等來降于是羅打鼓谷國日列寨獨密寨並叩寨願附如刁農雞公兵備使王維善下其事指揮田賦問狀皆猶豫未決茂州知州張安美直前請曰昔古冉駹之國乃六夷七羌九氐地也幸而歸化使我不受之以示德意甚失諸羌心且使諸羌雖當誅以將軍威重不假斧鉞于境外而款塞踵至將軍其歸御史御史大夫于以彰國威而風邉境不亦可乎會虞懷忠為御史王廷瞻為都御史皆謂茂州議是遂受之是嵗也生羌血熱血書伯什及黃草坪水磨溝崖立寨吉革寨亦皆願降如羅打鼓廷瞻乃召諸羌辨核之其在黃草坪寨有紅即説太兒等水磨崖立寨有白説等吉革寨有西日巴等楊栁者疊溪羌也番牌財主兒子至太平堡值鼓刀屠者擊牛番牌見之垂口涎索強山牛酒強山與之飲番牌死楊栁疑強山鴆番牌乃于河東邀東路窯溝大小粟穀丢骨人荒沒舌諸羌于河西邀思答歪地王答甘燕耳别乾溝牛尾諸羌直犯金瓶堡大索賞賜贖番牌死不與遂大鬨指揮豐承業張應時擊破之復合麻答蜱寨再寇金瓶殺百户陳克勤去時黃焯為兵備請都御史徐元太追𠞰且按諸指揮失軍狀先是指揮田賦曾稱貸于楊栁葉兒這得五百金久不還兒這每至堡但飲酒去兒這怒與諸羌同入寇至是並逮訊田賦而别遣偏將擊樹底雙橋西坡牛尾諸寨俱勝之乃調天全大渡諸土兵發樓船卒至搭魚觜窺楊栁楊栁方與牛尾麥兒數百人張弓弩在河梁見樓船卒至弓弩齊發我師踰河救殺傷相當副使劉禹謨復與偏將劉用光邉之垣議議先攻麥兒以分其勢然後徐圖泉水崖則楊栁可擒也命兵備黃焯重帥田賦豐承業張應時等使戴罪殺賊遂佯攻麥兒旦日引兵至泉水崖其酋長財主兒子出碉房所貯青稞麥菽及蜂桶牛羊諸畜以誘我軍我軍不一顧遽舉燎燒土圈碉房而雜用烏嘴百子火磚噴筒諸藥器並擊楊栁楊栁出不意返走自蹂踐乘勝追北至後溝雪山會日暮度楊栁必且走麥兒麻答預令土官舍坤安溫卜引步兵渡河伏道左楊栁果以詰旦至伏起大敗之諸羌降既而喇麻機復起犯蒲江關將軍曺銓等引兵堵禦會蜱剽略還自黃沙壩遂逐蜱搗其巢禆將邉之垣等力戰皆捷其明年窯溝大小二姓復寇蒲江關副將朱文達開關迎敵多斬獲于是將軍李應祥兵備黃焯謀大征諸羌而辨其向背計前殺戮我禆將趙世爵等及商民四百八十餘人實東路溝窯溝丢骨人荒西北蜈蚣龍溪土官茹兒阿孝惡閙王答甘燕戈臘熱溪别柘思答地諸羌其殺我許九等八百二十餘人者實大小粟穀北定玉柱阿牛王龍交舍安貫煙蔥列柯歪地西革牛尾鹿卜石砫諸羌他若次上漢人羊思定雞公上牟泥下牟泥野和尚亞寨阿思洞上泥巴呷竹呷二為熟羌胡子川羊先結阿讓臘梅老虎為降羌分别進𠞰第松邉寒瘠不生五穀往往廪食他傍郡他傍郡飛芻挽粟佐軍餉不給于是上書請輸餉并調土官楊應龍冉維屏楊光祖統播州酉陽平茶天全諸兵及敘馬玀􅉰兵合二萬餘而國師喇嘛亦聚阿牛丢骨諸寨兵屯裝塘鐵罏溝待我軍于是郭成周于德邉之垣等大戰却敵厯破裝塘沒舌龍溪惡閙窯溝蜈蚣諸寨斬首四百六十餘級生獲酋長喇嘛灣仲臘臘帳王答兒茹兒及番婦番女生口無算時惡閙歪頭請降而思答歪地乾溝以阻河負固如故乃既克河東羌遂治浮橋擊河西思答列柯歪地黑水乾溝大小粟穀凡下十五寨斬首三百一十餘級生獲酋長黑壤著兒柘川柯絨柯及日者瞎子合兒結番婦女一百餘口先是征楊栁時捕得生口白失結既而逃去會白泥和尚楊栁歸降仍命捕白失結及樹底保保兒子以贖罪至是諸羌願降者當捕其酋長來獻如白泥和尚例乃各獻其酋長閻卜利兒子等數十人生埋之道傍曰復反者有如此冢又羌初發難刻石為誓其石一在廟子溝一在牛尾寨既命力士椎碎投于河諸羌亦曰所反覆不如將軍令者有如此石其後兵部稽功簿有云奪得邉輪首骨漆器一具按之則嘉靖中茹兒寨羌曽斬指揮邉輪首以為飲器至是輪生之垣于攻茹兒時奪其首歸蓋之垣孝子即輪亦烈士云漳臘之羌二十九有元壩潘咂商巴石嘴與北庭小王子吉曩相通嘉靖二十九年吉曩寇河西欲服屬租兒結白利不從吉曩死其子插幹兒及傳􅑕並富強仍欲服屬租兒結白利仍不從會俺答念吉曩渡河久託言鐵嶺山有生佛出欲遣他子賔兒往鐵嶺建寺因盡得插幹兒及傳􅑕馬畜而使傳􅑕誘租兒結使租兒結誘白利並嵗奉貢獻萬厯三年俺答親渡河迎佛入寇牟泥寨包子寺與松城相去止二十里而元壩潘咂商巴石嘴四寨並闌出物與俺答交易且以二百騎寇爾爾壩聲言欲遍寇保定撒喇洮岷松茂諸邉是時副使來經濟兵備李丁並請于都御史李尚思徴天全六番播州土兵得六千人以萬鏊郭成邉之垣軍漳臘松林西寧諸處以禦之部使李化龍上書曰松潘者全川之門庭也臣按輿地由松潘而北則為漳臘漳臘之頂北可望洮岷西可望莽揑以松潘而視西部僅有此山為之間耳其中嶮巇髙峻盡屬土番土番外結則為患不小矣是不可不早為備也會俺答賔兒俱徙去獨火落赤留伏揑工川如故而兵已旋罷建昌土酋伍咀咱與土舍馬米粒阿乃等弒土婦鳳氏而奪其土田至千餘頃遂率麻科諸羌樹黃幟鼓吹白晝公行東街薑坡道中縱火燒房屋殺我軍宋泗髙仲彪等千餘人而略軍妻趙氏等有司莫能治先是卭部長官嶺柏死其妾沙氏與舍目阿祭通竊柏印與祭祭子嶺鳳起據有其印遂自立于廣洪瓦布寨卭部亂至是越巂衛黑骨夷猓阿弓凹溪咱等與桐槽王大咱聚黨為寇殺把總余興國及千户丁應時等燒軍舍與伍咀咱安守安四兒為聲援巡撫徐元太遣將李應祥邉之垣朱文達分道進𠞰先建昌而後卭越大敗賊衆于河上賊衆走樟木我師力追之不得既而遍搜磨旗大牛毛山崩土坎及河水熱水諸寨俘斬甚衆會元日伍咀咱安守將乘間徙去文達追之逼於阿羅哩乃先斬哪㗫吽咱賊而諭諸酋來降者當是時麻科諸羌方燒紙房堡平川驛為我師所敗爭先乞降而把卜番牌若加柘等亦請款塞皆許諾獨贊畫陳忠請曰以豫所聞伍咀咱及安守尚依樟木麻栁魚水以為險樟木麻栁可通西番虛郎熱水雲南魚水可通科州烏蒙馬湖會川縱橫數百里間若不先據其險則西部一通何以卒應今當以一將軍軍髙山堡以備西番一將軍軍别溝以備虛郎一將軍軍魚水以備科州罝罘既布然後議𠞰盧白木木拖而事成矣夫盧白木者伍咀咱之女兄也木拖者安守之所時往來也夫欲擒安守與伍咀咱則非𠞰二寨不可于是以王言為將軍征木拖果獲安守而盧白木懼告伍咀咱所在擒之橙村遂並問桐槽黑骨及諸卭部皆次第懾服惟黑骨夷阿弓強梁公行相嶺間乃設伏大孤山待阿弓阿弓至大戰擒斬之時斬首二千級降羌三千虜獲男婦牛畜無算其所獲器仗中有金冠銀冠各造蟠龍護其頂而所獲番刀有名梅花聮五道聮者皆羌中異物當時僭號諸蠻俱佩之女土官秦良玉者石砫掌印宣撫使也秦氏繼馬氏為宣撫使萬厯末良玉兄邦屏邦翰皆以援遼力戰死邦屛故為宣撫使因從征請女弟掌印而其幼弟民屏者亦同時被創力戰潰圍出歸不能視事良玉忠勇多大略諸部便之請襲終其身會藺賊奢崇明反夷寨蜂起多響應崇明念石砫強且巫夔門户地遣使賫白金詣秦氏求助良玉開轅召使入斬使留其金料所部兵得萬人親將之而使弟民屛姪翼明分左右哨捲甲疾趨銜枚度重慶駐兵于南坪之間隂分兵襲兩河燒其船使不得順流東下别留兵一千為疑陳張旗幟守忠萬界為犄角復移文夔州使設兵防瞿塘通上下聲息而後親統兵溯江水陸並進會朱燮元大破賊良玉乃迎賊于佛圖關敗之至二郎殺賊三千人復其地值水西安邦彥反良玉追賊戰新都而遣弟民屏以别哨援水西大破邦彥于平越當是時勤王兵論功良玉第一民屏次之獨惜民屏搗大方從貴撫王三善行三善死殉之崇禎七年李自成破夔州良玉統土兵出戰却其衆使自成無西志十三年獻賊既降于督師而叛驟與過天星出寧昌分兵窺羊頭坂渡大昌副將劉貴遮擊之轉而向巫山良玉即陳兵洛門扼于百子溪賊不敢近已而楊嗣昌至嗣昌湖人欲使湖地無賊盡驅賊入川而後乃徐圖𠞰滅陽言吾以川困賊勢不得不先困川盡收川兵之壯者益守湖而苐以單弱者屯夔巫間時良玉將兵三萬援夔城川撫邵捷春檄之使駐近重慶與守將張令為聲援而復分其兵半嬰重慶城會綿州知州陸遜之罷官歸川撫遣之按行諸營過良玉良玉冠帶飾佩刀出見左右男妾數十人皆巖裝然謹畏不敢仰視較他營整肅既見設饗禮酒數巡微與遜之論兵事甚悉已而嘆曰開府不知兵吾一婦人受國恩死固不惜所惜與開府同死此耳遜之請故良玉曰開府移妾自近去其所駐重慶三十四里而遣張令守黃泥窪固已失地勢矣夫賊在歸巫萬山之上俯瞰吾營驅鐵騎建瓴而下張令破次及我我敗尚能救重慶之急乎且閣部驅賊入川無愚智皆知之開府不于此時爭山奪險令賊毋敢即我而坐以設防此覆軍之道也無何官兵敗于土地嶺湖將汪之鳳轉戰死良玉力疾偕張令扼賊衆于竹箘坪大殺賊已乘勝出而賊以伏弩射張令喉令死官軍潰良玉力救之不得還顧石砫兵皆奔無一駐者乃急集餘衆轉戰大敗遂單騎入重慶城見捷春曰事急矣盡出吾溪洞兵不減二萬我自廪其半而以其半給之官猶足破賊吾土官家法調兵急則以箸曰能飯者畢至也再急則以帚曰掃境出也捷春聞事敗張皇甚獨念嗣昌不相顧且川無見糧如之何頃之謝良玉良玉哭而出其後獻賊破四川僭號而自成已陷京師良玉毁冠帶再拜號咷曰吾兄弟三人皆死王事而吾以孱婦受國恩二十年今不幸至此其敢以餘年事逆賊哉悉召諸所部約法曰有從賊者族無赦于是設四境杜通漢路守以強兵獻賊遍招諸土司用降人為誘鑄金印齎之以易其官從否參半顧無有入石砫境者黎州馬金者故馬岱後年十六有器識獻賊招土司至黎州念黎故險阻卭崍飛越溪洞窅冥有山曰斗門三面懸絶僅通道一線阻之易為梗乃齎厚幣鑄宣慰金印叩頭獻馬金馬金笑曰而欲使我從王八賊耶以金印擲賊使面血出捧其首而走金好酒色嘗為晝夜飲醉則裸睡婦人傍醒復飲越一年卒雅州有髙克禮楊之鉻者兩家互讎殺而之鉻有弟之喬乘亂弒兄請獻忠兵攻髙氏獻忠大悅聲言邉境初附免租賦三年會雅州知州王國臣西安人初歸馬廣既而歸獻忠嘗與川南道胡寅不相能將執寅赴成都寅不得已遁之雅州髙克禮家至是國臣通之喬共以攻髙氏為名執胡寅家口數十人送獻忠殺之而于是髙楊二姓皆從賊矣四川通志卷二十
