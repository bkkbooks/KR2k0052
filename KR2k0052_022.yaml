摧崩之故然其布位㕘差不齊不可强曉兹繪於左以俟知者八陣圗蹟蜀志言孔明推演兵法作八陣圗咸得其要今考侯八陣圗凡四其在廣都之八陣鄉者一百二十有八當頭陣法也在魚腹永安宫南江灘水上者六十有四方陣法也在沔陽之高平舊壘者二百五十有六下營法也在益州城東南隅棋盤市者亦云二百五十有六今無其蹟八陣本始風后握竒經曰八陣四為正四為竒餘竒為握竒或總稱之先出游軍定兩端天有衡地有軸天地前後有衝風附於天雲附於地天衝重列各四隊前後之衝各四隊風居四維故以圎地軸單列前後之衝各三隊雲居四角故以方天居兩端地居中間總為八陣陣訖游軍從後躡敵或驚其左或驚其右聽音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居其中張翼以進鳥掖兩端向敵而翔以應之虛實二壘皆逐天文氣候山川向背利害隨時而行以正合以竒勝天地以下八重以列或曰握機望敵即引其後以掎角前列不動或合而為一因離而為八各隨師之多少觸類而長八陣總論李昭玘曰陣之所以八者自有所祖述葢其法肇於黄帝具於成周而變化於諸葛孔明非諸葛孔明之獨能為是也昔黄帝潛通八卦而建一都之法黙㑹九天而設三軍之制是以周公則而象之以九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都自九夫之井至於四縣之都而得乎一都之法又以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍自五人之伍至於五師之軍而合乎三軍之制至於孔明則又上探黄帝之㣲意下採成周之遺法因而循之與道神之革而化之與時宜之而陣法備焉故其制為八陣自九夫為井而演之縱横皆八而有八八六十四陣者所以通乎八卦也立為三軍自五人為伍而演之周旋皆九而有九九八十一陣者所以㑹乎九天也然則孔明之所祖述者可謂深且逺矣非與古人之精神心術流通為一者疇能爾哉雖然論其深妙固未易以立談判考其大綱則不過竒正二字而已葢古之制軍合萬二千五百人而為軍其為伍者一千一百二十五其為兩者二百五十十取三焉而為竒其餘七以為正四竒四正而八陣生焉是其分陣之數有竒有正也回旋九攢以象天四平正列以象地散渙邪直以為風前大後鋭以為雲天地風雲四者陣之正也延袤綿互以為龍蟠前合後開以為虎翼彌漫散合以為鳥翔回屈包羞以為蛇蟠龍鳥虎蛇四者陣之竒也是其布陣之形有竒有正也天子上將居中而不動疑兵游軍出沒而無常是其用陣之勢有竒有正也乃若神出鬼沒千變萬化不可致窮則又所謂竒正之相生如環之無端者八陣記八陣漢丞相諸葛亮經畧中原之所作也壘石為之其跡在䕫州魚浦灘自古相傳六十四陣而已易卦為之宗握竒為之原其孰能推之哉孔明乃則河圗之圎而分為四層則洛書之方而分為九軍則井田公私之制而分為中外之營則文王後天卦位而定四竒四正之名西北乾卦也曰天陣西南坤卦也曰地陣東南巽卦也曰風陣東北艮卦也曰雲陣取艮為霧也東方青龍之獸也曰龍陣西方白虎之獸也曰虎陣南方朱鳥之獸也曰鳥陣北方𤣥武之獸也曰蛇陣中為中軍陣太極之位也中軍四象為正四獸為竒四象四獸各以六陣相從或四象七陣四獸五陣中軍大將所居中中四陣為餘竒大將所握别為游騎三十四陣以繋八陣之後陣有八門開闔出入以為變化南正手北正足中正身前竒首後竒尾左右竒翼游騎爪牙首尾伸縮以為節也兩翼翕張以為權也爪牙徃來以為勢也身體手足鶉立鼇據以為主也氤氲變化為方為圎為曲為直為鋭其變無窮不外八陣分合而已後世有以天地衡軸衝分配者有演為天覆地載風揚雲垂龍飛虎翼鳥翔蛇蟠八形者又為三百六十四變合天度之數者不足信也新都縣八陣圗記新都楊慎著諸葛武侯八陣圗在蜀者二一在夔州之永安宮一在新都之彌牟鎮在䕫者葢侯從先主伐吳防守江路行營布伍之遺制新都為成都近郊則其恒所講武之塲也武侯之人品事業前哲論之極詳不復𠞰同其説獨其八陣有重可慨者史謂侯推演兵法作為八陣咸得其要自令行師更不覆敗深識兵機者所不能洞了葢勝之於多算而出之於萬全非借一於背城而僥倖於深入也惜乎其方鋭意以向中原而溪蠻洞獠左跳右跋以裂其勢外冦方殷内境自憊使夫八陣之妙不得加於二曹三馬之梟敵而乃止試於七縱七擒之孟獲天威神算不騁於中原王者之區宇而僅以服南中巴僰之偏方事機既已遲精力又已虧勇賈其餘師用其分以為大舉譬之逐盜救火之家挺刃决水猶恐不及而内有讐賊自相乗機胠篋助燎則雖有倍人之知力亦自無如之何侯之不幸勢正類此天之所壊誰能支之祚去炎漢不待隕星而後知矣嗟乎國之興亡天也而千載之下君子獨遺恨於蜀漢之事者非以武侯故邪至其故壘遺墟獨為之愛惜不已乃其忠義之激人不獨其法制陣伍之妙也不然則竇憲嘗勒八陣以擊匈奴晉馬隆用八陣以復凉州是在侯前已有之而後亦未嘗亡也功既有成而後世猶罕所稱述况能傳其遺跡至今乎慎嘗放舟過䕫門弔永安之宫㝷陣圗之跡維時春初水勢正殺自山上俯視下百餘丈皆聚細石為之凡八行六十四蕝土人言夏水盛時沒在深淵水落依然如故在吾新都者其地象城門四起中列土壘約高三尺耕者或剗平之經旬餘復突出此乃其精誠之貫天之所支而不可壊者葢非獨人愛惜之而已耳慶陽韓君大之以進士出宰吾邑始至拜侯之荒祠次觀遺壘重有感焉謂慎曰之罘篆鍥燕然銘石蓺焉爾人不足稱也愛其蓺者不冺其跡矧侯之地而可忽諸今陣圗在䕫者有和叔獨孤之記少陵東坡之詩四方灼知而此頋冺焉無所表識使徃來者不軾樵牧者不禁非缺與祠宇行當新之陣圗所在欲伐石樹道左大書曰諸葛武侯八陣圗碑隂之辭子宜為之夫崇賢存古以示嚮徃循良事也推表山川考記徃昔者史氏職也遂書之使刻焉八陣圗疏鄭林繪曰臣通攷古今陣法莫有過於軒轅黄帝破蚩尤之陣也黄帝按井田作陣法大軍居中専主旗鼓八節旋繞悉聽指揮若正北受敵則東北西北二兵為竒兵張左右翼以援之若正南受敵則東南西南二兵為竒兵張左右翼以援之其正東正西及四隅受敵亦如之所謂常山蛇擊其首則尾應擊其尾則首應擊其中則首尾相應也古之名將知此法者惟太公望孫武子韓信諸葛孔明李靖諸人而已吳起以下莫能知也一大陣之中固有八陣而小陣之中亦各有八陣大陣則法伏羲八卦小陣則法文王六十四卦所謂陣間乎陣隊間乎隊者也若夫造楯甲有九星開八門用三竒者則又黄帝命風后為之也葢聖人以神道設教以神其術使人莫知其所以然也大將居於𤣥武之位而北獸則常山蛇也故曰常山蛇陣諸葛銅鼓紀事前明萬厯元年廵撫曽省吾平九絲城獲諸葛銅鼓擇其有聲者分天地人三號以獻銅鼓在蠻中視為寳器其有剥蝕而聲響者為上上易牛千頭次易牛七八百頭得鼓二三面即可雄視一方鼓所鑄皆竒文異狀僅可辨者雕刻螭鷺間綴蝦蟇其數皆四舊志所載頗詳要從征伐得之非自然呈現者也國朝雍正十年閏五月二十五日石工吳占祥目兵廖君亮等採石至黄螂所五馬寺岩洞内獲銅鼓四其形圎髙尺許上寛而中束下則敞口面各有四水獸如蟾蜍形四周有細花紋皆剥蝕作翡翠斑旁有四耳置水上以楢木桴撃之聲極圎潤微破者聲愈𢎞安阜營都司毛龍甲呈送總督黄廷桂賫獻内庭按武侯集銅鼓者諸葛製以鎮蠻徃徃埋置山谷間有云鼓去則蠻運終揆之理數確實不爽聖天子德威廣播四海一家如黄螂雷波逺近諸蠻久已輸誠向化盡入版圗雖以僰道夷疆皆得附郭依城耕田鑿井共享昇平之福宜乎地不愛寳上與慶雲疊應嘉祥較之武侯集所稱及徃代所獲者尤為曠古罕覯而總督黄廷桂先以提督出師雷黄仰遵睿算故機畫咸宜帖然懾服兹當綏輯之餘化椎結為編氓樂業安居納總納秸任封疆之重者惟有拜颺懽忭慶銅鼓之出惟其時矣四川通志卷二十二中欽定四庫全書四川通志卷二十二下津梁易稱地險山川為最顧山險可踰水險難越豈必海若鉅觀始嘆望洋也哉一溪一澗而舟梁之未備將何恃以稱利濟快攸往乎火朝覿矣清風戒寒先王於時有水涸成梁之教民所以無病涉也我朝八荒在闥六合為家㑹萬方之玉帛致重譯以来朝而蜀地岷江導源支分派衍津梁更通絶徼凡一葦所杭與夫竹木之結構鐵絙石柱之連互皆可履若坦途俾往来者不致有濡軌之虞詎弗美歟作津梁志成都府金花橋在成都縣城中衛大街即市橋也昇仙橋在成都縣北昔魚鳬王張伯子乗虎仙去因以名橋相如東遊題其柱曰不乗駟馬車不復過此故亦名駟馬橋浣花橋在成都縣西門外笮橋在成都縣西四里桓温伐蜀陳兵于此普濟橋昇仙橋左寳蓮橋蜀府遵義門前青羊橋在成都縣西南廣福橋在成都縣北三十五里建昌橋在成都縣西南竹箐橋在成都縣西四里金泉橋在成都縣西十五里遇仙橋青陽宫左舊浣花橋青陽宫右蕭公橋舊藩金水河西蕭公廟左九里隄在成都縣西北隅其地窪下水勢易趨諸葛亮築隄九里捍之宋乾徳中劉熙古修築又號劉公隄金津橋在華陽縣東門内下蓮池金水橋在華陽縣東門内錦江橋在華陽縣東錦江街龜化橋在華陽縣南金水河之東俗呼青石橋普安橋在華陽縣東水津街流芳橋在華陽縣東黄水河濯錦橋在華陽縣東門外萬里橋在華陽縣南門外寰宇記孔明于此餞費禕聘吴曰萬里之行始于此矣又唐明皇幸蜀過此問橋名左右對以萬里明皇嘆曰開元末僧一行謂更二十年朕當逺遊萬里外此其驗也橋髙三丈寛半之長十餘丈兵燹後頽圮康熙五年重修南虹橋在華陽縣南一名安樂橋洪濟橋在華陽縣東門外明萬厯中布政使司余一龍建以鎖水口為洞者九其南岸即廻瀾塔形勝壯觀今俗呼新橋是也洗面橋在華陽縣南一里圓通橋在華陽縣南二里永清橋在華陽縣東五里觀音橋在華陽縣東五里桂溪橋在華陽縣東五里濟氏橋在華陽縣東門外梓潼舖左渡人橋在華陽縣東門外萬年隄在華陽縣東河岸長三百餘丈置石人石牛各九盖前人以之鎮水患者簇錦橋在雙流縣東二十里簇河橋在雙流縣東北十里唐店橋在雙流縣東二十五里大小街頭橋在雙流縣東北北岸有報國庵蔣家橋在雙流縣西南三里金花橋在雙流縣東二十里黄林橋在雙流縣南十里景陽橋在温江縣東二里長安橋在温江縣東二里蘇波橋在温江縣東三十里金馬橋在温江縣西五里傭工橋在温江縣西四里雙鳳橋在温江縣西二里楊栁渡在温江縣西二里廖家渡在温江縣西十里惠政橋在新津縣西一里石羊橋在新津縣南十里餘波橋在新津縣東南三里興義橋在新津縣東一里迎仙橋在新津縣西三里太平橋在新津縣西五里柏木橋在新津縣南二十里南河渡在新津縣南門外集賢橋在金堂縣學右綉川橋在金堂縣南一里三仙橋在金堂縣西三里貴通橋在金堂縣北十里上方橋在金堂縣南九里鎖江橋在金堂縣東二十三里古城橋在金堂縣北二里躍龍橋在金堂縣東四十里玉虹橋在金堂縣東闗外二里鈄灘渡在金堂縣東南趙家渡在金堂縣東三十里清源橋在新都縣南門外楊太師重修學士橋在新都縣南一里太師楊公建毘橋在新都縣南十里舊名大小毘