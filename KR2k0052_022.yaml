摧崩之故然其布位參差不齊不可強曉兹繪於左以俟知者八陳圗迹蜀志言孔明推演兵法作八陳圗咸得其要今考侯八陳圗凡四其在廣都之八陳鄉者一百二十有八當頭陳法也在魚腹永安宫南江灘水上者六十有四方陳法也在沔陽之高平舊壘者二百五十有六下營法也在益州城東南隅棋盤市者亦云二百五十有六今無其迹八陳本始風后握竒經曰八陳四為正四為竒餘竒為握竒或總稱之先出遊軍定兩端天有衡地有軸天地前後有衝風附於天雲附於地天衝重列各四隊前後之衝各四隊風居四維故以圎地軸單列前後之衝各三隊雲居四角故以方天居兩端地居中間總為八陳陳訖遊軍從後躡敵或驚其左或驚其右聽音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居其中張翼以進鳥掖兩端向敵而翔以應之虛實二壘皆逐天文氣候山川向背利害隨時而行以正合以竒勝天地以下八重以列或曰握機望敵即引其後以掎角前列不動或合而為一因離而為八各隨師之多少觸類而長八陳總論李昭玘曰陳之所以八者自有所祖述蓋其法肇於黃帝具於成周而變化於諸葛孔明非諸葛孔明之獨能為是也昔黃帝潛通八卦而建一都之法默會九天而設三軍之制是以周公則而象之以九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都自九夫之井至於四縣之都而得乎一都之法又以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍自五人之伍至於五師之軍而合乎三軍之制至於孔明則又上探黃帝之微意下採成周之遺法因而循之與道神之革而化之與時宜之而陳法備焉故其制為八陳自九夫為井而演之縱橫皆八而有八八六十四陳者所以通乎八卦也立為三軍自五人為伍而演之周旋皆九而有九九八十一陳者所以會乎九天也然則孔明之所祖述者可謂深且逺矣非與古人之精神心術流通為一者疇能爾哉雖然論其深妙固未易以立談判考其大綱則不過竒正二字而已蓋古之制軍合萬二千五百人而為軍其為伍者一千一百二十五其為兩者二百五十十取三焉而為竒其餘七以為正四竒四正而八陳生焉是其分陳之數有竒有正也回旋九攢以象天四平正列以象地散渙邪直以為風前大後鋭以為雲天地風雲四者陳之正也延袤綿互以為龍蟠前合後開以為虎翼彌漫散合以為鳥翔回屈包羞以為蛇蟠龍鳥虎蛇四者陳之竒也是其布陳之形有竒有正也天子上將居中而不動疑兵遊軍出沒而無常是其用陳之勢有竒有正也乃若神出鬼沒千變萬化不可致窮則又所謂竒正之相生如環之無端者八陳記八陳漢丞相諸葛亮經略中原之所作也壘石為之其迹在夔州魚浦灘自古相傳六十四陳而已易卦為之宗握竒為之原其孰能推之哉孔明乃則河圗之圎而分為四層則洛書之方而分為九軍則井田公私之制而分為中外之營則文王後天卦位而定四竒四正之名西北乾卦也曰天陳西南坤卦也曰地陳東南巽卦也曰風陳東北艮卦也曰雲陳取艮為霧也東方青龍之獸也曰龍陳西方白虎之獸也曰虎陳南方朱鳥之獸也曰鳥陳北方玄武之獸也曰蛇陳中為中軍陳太極之位也中軍四象為正四獸為竒四象四獸各以六陳相從或四象七陳四獸五陳中軍大將所居中中四陳為餘竒大將所握别為遊騎三十四陳以繫八陳之後陳有八門開闔出入以為變化南正手北正足中正身前竒首後竒尾左右竒翼遊騎爪牙首尾伸縮以為節也兩翼翕張以為權也爪牙往來以為勢也身體手足鶉立鼇據以為主也氤氲變化為方為圎為曲為直為鋭其變無窮不外八陳分合而已後世有以天地衡軸衝分配者有演為天覆地載風揚雲垂龍飛虎翼鳥翔蛇蟠八形者又為三百六十四變合天度之數者不足信也新都縣八陳圗記新都楊慎著諸葛武侯八陳圗在蜀者二一在夔州之永安宮一在新都之彌牟鎮在夔者蓋侯從先主伐吳防守江路行營布伍之遺制新都為成都近郊則其恆所講武之場也武侯之人品事業前哲論之極詳不復𠞰同其説獨其八陳有重可慨者史謂侯推演兵法作為八陳咸得其要自令行師更不覆敗深識兵機者所不能洞了蓋勝之於多算而出之於萬全非借一於背城而僥幸於深入也惜乎其方鋭意以向中原而溪蠻洞獠左跳右跋以裂其勢外冦方殷內境自憊使夫八陳之妙不得加於二曹三馬之梟敵而乃止試於七縱七擒之孟獲天威神算不騁於中原王者之區宇而僅以服南中巴僰之偏方事機既已遲精力又已虧勇賈其餘師用其分以為大舉譬之逐盜救火之家挺刃決水猶恐不及而內有讐賊自相乘機胠篋助燎則雖有倍人之知力亦自無如之何侯之不幸勢正類此天之所壞誰能支之祚去炎漢不待隕星而後知矣嗟乎國之興亡天也而千載之下君子獨遺恨於蜀漢之事者非以武侯故邪至其故壘遺墟獨為之愛惜不已乃其忠義之激人不獨其法制陳伍之妙也不然則竇憲嘗勒八陳以擊胸奴晉馬隆用八陳以復涼州是在侯前已有之而後亦未嘗亡也功既有成而後世猶罕所稱述况能傳其遺迹至今乎慎嘗放舟過夔門弔永安之宫尋陳圗之迹維時春初水勢正殺自山上俯視下百餘丈皆聚細石為之凡八行六十四蕝土人言夏水盛時沒在深淵水落依然如故在吾新都者其地象城門四起中列土壘約高三尺耕者或剗平之經旬餘復突出此乃其精誠之貫天之所支而不可壞者蓋非獨人愛惜之而已耳慶陽韓君大之以進士出宰吾邑始至拜侯之荒祠次觀遺壘重有感焉謂慎曰之罘篆鍥燕然銘石藝焉爾人不足稱也愛其藝者不泯其迹矧侯之地