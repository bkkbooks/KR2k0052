堡戍守以資保障向分為五大汛地除各衛所軍丁屯戍之外又設立營伍兵將聫絡星羅而殺掠跳梁猶無虛日迄於今則軍丁逃故城堡丘墟該固山額正侯墨勒根蝦題設全省經制部覆有俟全川恢復之日臣部另行酌定之語遵奉在案今該邊既入版圗所有原題經制應行照設以垂經久但十年以來時勢不無更變衝緩又當通融臣未據該鎮之先業將全川邊防經制與提臣再四籌審其間斟酌損益已有公議兹據鎮道會議開列應設要隘並擬應補職名前來臣覆查九年分題定原額及與提臣覆酌經制有原題之額鎮道為之變通者有鎮道之議臣又為之變通者總之因時地之緩急為設防之輕重期於垂畫一安邊境而已臣謹臚列為我皇上陳之一建昌原定經制設總兵一員中左右三營遊擊三員戰兵三千名今已設立不議外一會川衛原定經制設協守一員中軍都司一員戰兵一千名城守遊擊一員中軍守備一員守兵一千名鎮道議將協守官兵移駐越嶲其遊擊官兵照議設立該臣看得會川與雲南止隔一江為五衛藩垣九年分因滇冦密邇故議協守今滇雲底定協守官兵可以不設應照設遊擊一員中軍守備一員不用城守名色兵一千名半戰半守仍照川省馬三步七之例查得左路鎮裁缺旗鼓守備見奉委署會川遊擊事張國威武略超羣深明行陳堪以補授會川遊擊其中軍守備應以建昌鎮隨征守備馬希補授同駐會川一越嶲衛原未定有經制鎮道慮該衛孤懸議將會川協守改設該衛該臣看得越嶲為進建門户與建城逺隔相嶺聲援難通且番猓逼處誠宜設防但寧越設有官兵與該衛足相犄角今議增設守備一員守兵五百名查得該鎮左營左哨千總楊正勞著俸深堪以補授前缺駐防越嶲一寧越原定經制守備一員守兵五百名鎮道議照舊設立該臣看得寧越守備兼轄寧番越嶲二衛北控瀘河最稱衝要應照原題設立但守備舊駐鎮西所今應如鎮道之議移駐河南站查得該鎮右營中軍守備駱光逺捍禦勤勞堪以補授前缺駐防河南站所遺右營中軍守備員缺應以該鎮右營千總王希舜頂補一冕山所原未題設經制鎮道以其地當極衝但未入經制不便請設議以建昌城守官兵改駐該邊該臣看得建昌既有鎮臣駐鎮其原定城守遊擊一員中軍守備一員守兵一千名可以不設冕山居建越寧之中為涼山逆猓出沒要路應增設遊擊一員中軍守備二員兵一千名馬三步七半戰半守查得投誠副將奉委署行都司事冦坤才幹通敏久戍巖疆且自備親丁甲馬防禦宣勞堪以補授冕山遊擊其中軍守備應以該鎮隨征都司孫炳補授同駐冕山一會鹽原定經制設守備一員守兵五百名鎮道議照舊設立該臣看得河西守備兼轄會川鹽井二衛地方應如議照設查奉委道標中軍守備今奉裁缺林大受拮據著勞堪以補授前缺駐防河西一化林坪原未定有經制鎮道將化林列於衛所之內議設立官兵該臣看得化林坪係打箭爐通商行茶大道番部叢雜應增設守備一員守兵五百名查得建昌鎮標中營千總楊鵬翎征剿有功堪以補授前缺駐劄化林坪以上酌地因時裒多益寡其應設兵丁四千名與原定四千之經制符合而擬授各官皆久歷戎行熟習邊務人地相宜足堪任使至各營應設千把總俟奉旨之日容臣選委報部各隘兵丁亦俟俞允後除各官原帶兵丁之外有不足額行令鎮臣於該邊招募者也除全川經制臣另疏題請各官履歷功次備造清册送部查核外臣謹會同撫臣佟鳳彩合詞具題伏乞睿鑒敕部議覆如果臣言不謬即將張國威等照缺補授施行川陜總督臣嶽鍾琪為奏請川省應行事宜仰祈睿鑒等事疏稱打箭爐之外中渡河口係通西藏要隘不可無兵彈壓應將化林協守備移駐中渡建立土城撥把總一員兵二百名隨往分防其建城與官兵房屋容臣咨商撫提兩臣酌量建造等語應如所請準其將化林協守備帶領把總一員兵二百名移駐中渡其建立土城官兵房屋之處該督會商四川撫提酌量捐造又奏稱保縣在大河之南為土番出入隘口防汛不可不增請撥威茂營千總一員帶兵一百名移駐保縣以資防禦其應支月糧即以威州所征夷糧就近支給等語應如所請將威茂營千總一員帶兵一百召移駐保縣又奏稱建昌所屬越嶲衛地方甚為遼闊每多蠻猓出沒搶奪今僅設守備一員兵二百五十名實難分撥防禦請改設遊擊一員現在守備即為中軍再添千總一員把總一員兵二百五十名分防彈壓等語應如所請準其改設雍正元年三月初三日具題奉旨依議川陜總督臣嶽鍾琪奏稱建昌為邊疆重地番蠻初附應擇緊要之處分汛防範加兵彈壓如越嶲所屬柏香坪為普雄番蠻出沒之所雖增遊擊千總馬步官兵止可防範白沙溝並相嶺一帶而於普雄鞭長莫及請於柏香坪建修土城蓋造官署兵房設守備千把總各一員馬一步九兵三百名駐防一冕山貼近乾縣為諸夷門户番蠻出沒難以稽查原額兵五百五十名分撥塘汛不足分布請於乾縣修造土城蓋造官署兵房增設遊擊一員中軍守備一員千總二員把總四員馬一步九兵五百名駐防一寧番夷多漢少僅有把總一員兵五十名未能防守請將冕山營中軍守備移駐寧番衛城增添馬一步九兵二百五十名一寧越地方廣逺塘汛稀疏原額兵二百五十名不足分布請將寧越守備改設都司增添千總一員馬一步九兵一百五十名一會鹽營僅設守備一員把總一員兵丁二百五十名不能彈壓請增設遊擊一員千總二員把總一員馬一步九兵二百五十名駐劄鹽井衛其原設守備改為中軍守備帶把總一員馬步兵一百名移駐河西鹽井一汛夷人雜出必添設官兵分汛防範臘汝窩獻出黑鹽井煎鹽辦課須不時巡查一會川在萬山之中係涼山後路所屬披砂地方為夷巢咽喉原設遊擊一員馬步兵五百名不能兼制請於披砂修建土城蓋造官署兵房增設遊擊一員中軍守備一員千總二員把總四員馬一步九兵五百名駐劄防守各營汛添設兵共一千九百五十名一建昌東有木托係涼山夷人必由之徑原設千總一員兵七十名不足防範請於建昌鎮標抽發中營守備一員帶兵八十名合原額兵共一百五十名駐劄木托一建昌西北有熱水係大小涼山出入要地請於熱水修建土城蓋造官署兵房於建昌鎮標抽發右營遊擊一員千總一員帶兵二百五十名駐劄熱水等因奉旨依議川陜總督臣嶽鍾琪疏稱潘州與河州松潘為犄角潘州無兵則西寧與松潘聲息相隔請於潘州設副將一員守備二員千總四員把總八員兵丁一千二百名兩河口設守備一員把總一員兵丁三百名令潘州副將兼轄松潘鎮總兵統轄每年糧餉照松潘之例折給雍正三年十月二十七日奉旨依議川陜總督臣嶽鍾琪於雍正三年六月二十八日奏稱越嶲一營地方遼闊蠻多漢少且路當孔道為滇蜀來往咽喉誠屬緊要曽經題請改設遊擊現在守備即為中軍再添千把總各一員以資彈壓查越嶲營除原設守備一員把總一員馬步兵丁二百五十名外雍正四年十月初四日題新增遊擊一員千把總二員馬兵三十五名步兵三十名守兵一百八十五名營馬三十五匹奉旨依議巡撫四川等處地方提督軍務都察院右僉都御史臣憲德謹題為請旨事謹準部咨據提督黃廷桂奏稱新設柏香靖逺永定等處修築城垣兵舍一事先經行據寧逺府知府杜士秀約估銀六萬九千餘兩通報經督臣嶽鍾琪駁飭曽委文武再行逐處確估定議現在另委文武挨次會勘確估兹於雍正七年閏七月十八日據建昌鎮臣趙儒咨稱新設之柏香靖逺等營均處夷藪添設官兵原以資其彈壓雖以飭令分撥各為防範因未築城蓋房各兵露處值今歲雨水連綿委難久居衆兵懇切具呈各營將備轉請咨商迅即委員備辦工料早建城房俾得各安寧宇等情但營汛遼闊營造之頭緒繁多每至一處動需匝月方能估報必至蹉跎時日轉盻入冬土脈不堅難以築城且所需磚瓦木植釘板灰石蠻方無現成物料可以購買必須預備物料况營制已定汛防已設則建造城垣修蓋兵房尤不可緩等因咨商到臣臣等公同商酌建昌鎮趙儒所議似屬允協仰懇天恩即敕部先撥庫銀二三萬兩檄發該管地方各官先期備辦物料俟所委文武確估詳報定議具題之後即可動功修築其不敷銀兩一併題請補撥統於工竣之時造册核銷公帑原無糜費而城房即可及時建造似於防守邊荒重地不無禆益等因摺奏雍正七年八月二十五日奉旨著照該撫等所請行該部知道候補京堂臣趙殿最謹奏為遵旨議奏事於雍正七年七月二十九日準署川陜總督臣查郎阿奏稱據川陜總督臣嶽鍾琪奏稱噶達地方議設官兵之外若再有道路與别處相通亦須安兵防汛臣等逺在西安未能詳細周知仰懇敕諭現在辦理廟工之趙殿最等再加查勘酌議具奏等語查趙殿最等雖在噶達辦理廟工恐於彼地形勢亦未能周知熟悉現今任國榮駐防噶達應令趙殿最等會同任國榮詳察形勢細看各處要口將應添設防汛之處妥議具奏等因到臣臣等伏查防汛地方關係緊要廟工將次告竣達賴喇嘛移駐噶達所當設汛之處更不容緩臣任國榮因現在裡塘防護未敢擅離専差隨營松潘守備高含略赴噶查踩隨據該守備將各處隘口踏明繪圗前來與臣等訪聞無異但添設汛防必須布置周詳方能垂久若非親身閲歷恐未妥協緣臣等在噶在裡相隔尚遙各有專責弗克會齊往勘臣等隨議臣諾穆圗帶領守備高含略自噶達起程前去逐一細加詳察勘明回噶今臣等查得噶達西北一百七十里地名靈雀寺乃西藏往來之大路北通青海草地西連甘孜霍耳得爾格一帶土司東與革什綽交金川司雜谷等處接壤南則直達四川雲南交界誠為噶達後身要隘臣等細加商酌應於靈雀寺添設守備一員把總一員兵丁二百名以資防範總歸該協副將統轄此改設官兵請交四川提臣照例題補召募其官舍兵房亦照原奏交四川撫臣速為辦理自噶達至靈雀寺一路則有沙普隆一口亦係通青海之路並納布林山甲帕口過靈雀寺三十餘里則有蘇魯甲新楚喀二渡即在吹音堡之東雖詢據土人僉云甲新楚喀一帶河口遇水淺時在在皮船可渡各處行人不絶等語而來往之人槩不能飛越靈雀寺總口且此數處俱附近靈雀寺應令該守備即於駐劄靈雀寺兵內酌派安設塘汛至於噶達地方南有押納溝下八義二口東有榮果拉西有燒巫石二口北有榮若撮牙並阿玉拉堡三口俱係附近噶達應令該副將即於駐劄噶達兵內酌派安設塘汛如此庶與上中下三渡及吹音堡聲援聫絡而於噶達地方尤為嚴密矣謹將形勢四至繪圗敬呈御覽外臣等合詞謹奏伏乞皇上睿鑒敕部議覆施行兵部議覆四川提督黃廷桂疏稱雷波土司楊明義不思奉公報效竟敢縱逞部落滋擾邊方仰賴宸謨之明斷剿撫兼施苖疆既皆底定自應改設流官漸施教化俾番民咸知禮義各安其居前經部議令臣復與署督臣嶽鍾琪撫臣憲德會同確議今臣會商確議俱與臣意見相同應請仍照前議改設流官以重職守等因具題前來查先據該提督黃廷桂奏稱雷波黃螂內附伊始庶務尚簡暫可不設州縣應請酌設衛守備一員駐劄雷波所千總一員駐劄黃螂専管招民給墾聽斷詞訟收納科則給放糧餉化導夷猓等事其千總一員應行案件俱聽該衛守備查核管理奉旨議令遞行委署但雷波黃螂議又疏稱雷波黃螂歸附伊始其增設遊守等官必須熟悉地利夷情幹練之員方克資其駕馭查敘馬營遊擊鄂世威練達營務供職勤勉現今駐防雷波熟悉情形以之調補雷波遊擊其中軍守備員缺㨂選得川北鎮標中營千總王治泰久歷戎行諳練營伍歷著勞績洵稱幹練之員請補雷波中軍守備又黃螂守備員缺查重慶鎮標左營守備毛龍甲歷練老成辦事勤敏現派駐劄黃螂苗民畏悅以之調補黃螂守備均於苖疆有益再查黃螂為雷波必由之徑其新設守備應令雷波遊擊兼轄仍歸永寧協統轄其新設二營仰懇欽賜佳名更鑄給遊擊守備關防等語查四川省隨征大小官辨並陸續地方所出員缺雖近經大學士會同臣部遵旨依議欽遵在案應毋庸再議但係新設員缺必得熟悉夷情駕馭得宜之員庶於苖疆有益今該提督黃廷桂既稱遊擊鄂世威練達營務供職勤勉熟識雷波情形千總王治泰久歷戎行諳練營伍歷著勞績守備毛龍甲歷練老成辦事勤敏現駐黃螂苖民畏悅等語應如所請遊擊鄂世威準其調補雷波遊擊千總王治泰補授雷波中軍守備守備毛龍甲調補黃螂守備歸入雷波遊擊兼轄永寧副將統轄各給與劄付令其赴任其雷波黃螂二營臣部已送內閣撰擬佳名進呈恭候欽定至於遊守各員關防移咨禮部鑄給又疏稱雷波黃螂請添兵丁一千二百名現照數招募壯健遵照原議分汛防守但此項新招兵丁一並遣赴雷波黃螂更換各營留駐兵丁回營則舊兵一時盡撤新兵俱皆未諳似應陸續募補即陸續遣發將留駐各營兵丁節次換回俾新兵得以隨衆學習營伍其應支糧餉以入伍之日為始分别馬一戰四守五起支餉糧照依部議於春秋二季折支關給等語查招募新兵必須隨衆學習方能諳練營伍熟悉苗情亦應如所請令其陸續募補即陸續遣發將留駐各營兵丁節次換回其糧餉準於入伍之日遵照原議於春秋二季折支關給造册報部又疏稱馬邊營原額兵二百四十名增設馬步兵一百六十名共足四百名之數應俟招募足額即由該營抽兵八十七名並西寧舊設之兵十三名共足兵一百名添防西寧其原駐石角之把總既經移駐西寧查石角現駐兵丁二十七名應於馬邊營撥外委一員統領防守再於馬邊營撥兵五十名派該營外委一員帶領在於石角西寧隘適中處所沙灣地方駐劄其應支糧餉統於馬邊營按季請領分散至西寧沙灣二處及寧番添派之千總兵丁並建昌鎮屬西溪汛地添派之守備兵丁所需官署兵房應請一並建造等語查馬邊營西寧隘添設兵丁先經户部議準在案其作何招募及一應支給糧餉並西寧隘石角二處應於何處駐劄及添撥辨兵行令該提督會同巡撫憲德確議具奏今該提督請於西寧隘石角沙灣等處宜抽調兵丁派撥外委分汛防守其各營糧餉統於馬邊營支領亦應如所請造具清册報部查核可也川陜總督臣嶽鍾琪為遵旨議覆事接準提督四川黃廷桂咨稱潘州一境東北遙通洮州河州其間橫繞雜處者有竹利鐵布鹿哨甘家等番西通歸德西寧中有合壩上下作革播下等番及插漢丹津等部落住牧西南有阿壩郎墮郭羅克毛兒革等種悍夷是潘州實為邊塞重地若潘州無兵不但西寧松潘由草地一路聲息相隔即各處番夷或久經內附或剿撫方新悉𨽻於漳臘一營管轄誠恐鞭長莫及且松潘譬之內户黃勝關譬之堂奧潘州譬之門庭而専事堂奧非計之得其潘州安設官兵之處實為一方屏障似應仍照原議惟兩河口去黃勝關僅二十里而距潘州三百八十餘里中橫羊膊嶺路屬迢遙前議於兩河口安設官兵似與潘州聲息尚覺隔越查包坐之達建寺地方距潘州一百八十餘里距黃勝關二百二十里為潘州黃勝關適中之地且達建寺繞東北由挖藥而至羊洞僅一百二十餘里似應將議設兩河口官兵改設達建寺聲息乃為聫絡並開闢達建至挖藥羊洞路道安設塘汛以資控馭而兩河口雖逼近黃勝關但係四通要隘應即於黃勝關設駐劄之兵酌量分防布置更屬周密查文縣等處去潘州計程祗七八日即至將來潘州營制設立之後商民趨利奔集其米糧食物自有擔負販運而來者再為相地屯種其及時設法積貯自可接濟兵食至黃勝關係漳臘潘州之咽喉查黃勝關原額設有漳臘營之汛兵五十名未免單弱須增兵以資聲援今潘州達建寺既已安設則漳臘舊管之包坐五寨並新撫之阿細巴細上下作革合壩屋藏甲凹播下轄漫鐵布等處地方自應統歸潘州就近管轄再將漳臘營分防流沙東勝雄溪紅花羊裕塘舍壇邪谷粟髙􅋭等處塘汛兵丁盡行抽撤添撥一百五十名歸黃勝關合之黃勝關原額設兵丁五十名共足兵丁二百名將漳臘營守備移駐黃勝關內可為松潘之屏蔽外可為達建潘州等營之犄角其龍安營雖屬內地但查該營地方遼闊且東北接壤陽平階文實為秦蜀之扼塞必得參將彈壓似不宜議請移駐漳臘再查南坪地方險要番人出沒不常似應增兵稽查防範而小河地方雖汛防二百餘里界在內地無庸重兵應如所請將小河營遊擊帶兵一百五十名移駐南坪合之南坪現設兵三百名共四百五十名以資彈壓者也再查漳臘營與松潘鎮中右兩營向日所轄營汛參錯不便統轄應分别就近管束以専責成如漳臘營分防之流沙關汛距松潘鎮中營較近應歸併松潘鎮中營管轄而流沙關汛舊管之牟泥拈佑墊霧七布峩眉喜及新撫之毛兒革蛇灣等處一併歸之松潘鎮中營管轄似屬利便其漳臘營舊管雄溪紅花東勝谷粟高􅋭羊裕塘舍壇邪等堡以及元壩泥巴等寨去漳臘稍逺逺則稽查地方約束蠻番恐有不周莫如就近歸於汛少之松潘鎮右營管轄易於為力其漳臘舊管之寒盻商巴祈命並新附之出個阿壩郎墮郭羅克仍𨽻漳臘管轄以資控制如此則彈壓各得其便軍勢倍覺聫絡於邊方似有裨益等因移咨前來臣查龍安一營雖係內地但地方遼闊為秦蜀四通扼要之區必須參