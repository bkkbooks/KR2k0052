body:
  text: 欽定四庫全書四川通志卷二十二上兵制易象地水為師而箕疇政亦以師終之蓋弧矢之利所以威天下也故兵可百年不用不可一日不備况西蜀逺居天末崇山密箐三面距邊尤稱用武之地哉我朝聲教暨訖蠻夷率服而聖天子乃眷西顧猶厪睿謀舉凡蜀中要隘安營置汛莫不權其險易而輕重布之大小相維逺近相應洵疆隅永固而民生世世安堵矣作兵制志周武王孟津之師庸蜀羌髳微盧彭濮來會著於尚書巴師勇鋭歌舞以凌殷人倒戈故世稱之曰武王伐紂前歌後舞也秦惠王遣張儀司馬錯都尉墨等從金牛道伐蜀滅之錯率巴蜀之士十萬浮江伐楚取商於之地為黔中郡修整里闠張市列肆與咸陽同制漢髙帝前踵秦制置材官於郡國十一年發巴蜀材官衛軍壩上武帝置犍為郡後平西南夷置牂牁越巂二郡以益州刺史領之蜀漢昭烈帝初置五軍其將校略如西漢而兵有散騎武騎之别改益州為建寧郡諸葛武侯治蜀以八陳法教閲戰士晉武帝泰始八年王濬用蜀兵伐吳戍卒八萬武帝分置益州並設護南蠻校尉以太尉司徒大將軍大都督遙領之太康元年既平吳詔悉去州郡兵蜀郡武吏百人小郡五十人梁武陵王紀在蜀器甲殷積有馬八千匹北魏恭帝元年加尉遲迥督十八州自劍閣以南得承制封拜黜陟北周大象元年設益州總管督諸軍事隋文帝仍用齊府兵之舊制而加潤色分左右二衛皆置將軍以分統之蜀設劍南安撫使益州行軍總管領其兵開皇元年以蜀王秀為益州總管唐玄宗始置劍南節度使領兵事遙治之德宗元年以韋臯為西川節度使十八年吐蕃攻維州韋臯遣兵千人前行自將數萬人踵其後襲擊吐蕃大破之憲宗元和元年劍南節度管兵三萬四千八百人馬三千匹文宗以李德裕為西川節度使德裕至鎮作籌邉樓圗蜀地形訓練士卒葺保障以備邊偽蜀王建武成二年講武於星宿山步騎二十萬官馬八千私馬四千後唐明宗天成元年蜀騎兵三千步兵二萬四千孟知祥增置六千人宋太祖乾德二年詔以王全斌為西川行營前軍率禁軍步騎二萬人諸州兵萬人都部署三年四月詔改王全斌總置四川感化耀武等軍並為虎捷開寶八年設夔州路義軍土丁壯丁州縣籍稅户充或自溪洞歸投分𨽻邊寨習知山川道路遇蠻入寇遣使征討官軍但據險䇿應之其校長之名隨州縣補置月給衣糧犒賞有差有功者以次遷渝州懷化軍江津巴縣巡遏將皆州縣調補其户下率有子弟客丁遇有寇警一切責辦土户太宗以蜀中地逺切於防微凡弓弩鎗劍民家不得私藏乾德三年冬始置克寧兵士指揮以千人為額四年又以老小歸降者添為千人號羅城指揮又以縻棗堰衝決招防河一百人五年又招威棹兵士一千人咸平中升克寧威棹羅城兵士八百人為忠武指揮教閲有御陳法其法備載趙清獻公抃古今記仁宗慶厯五年密召益利梓夔鈐轄以弓弩習士卒候民間觀聽寖熟後即以短兵日教三十人十日一易皇祐二年詔四川戍兵及二年而未得代者罷歸鈐轄司以土兵歲一代之嘉祐二年籍稅户應常役外五丁點一為兵四川通省共得三萬九千八百人分隊伍行陳日習槍鏢排武藝號教閲廂庫戍西川者舊不訓練嘉祐以後始日習焉神宗熙寧四年以樞密院言四川路克寧以上招到軍各支小鐵錢一千糧二石春衣絹一匹小鐵錢十千冬衣絹一匹綿八兩小鐵錢五千並從之七年經制瀘州夷事熊本募上丁五千人入夷界蕩平其地二百四十里募民耕墾聫其夷屬以為保甲八年王安石言募兵未可全罷民兵則可漸復至於劍南邊地尤不可緩訓練之法當什伍其人拔其材武之士以為什百長自首領以下各以祿利奬勸使自勤於閲習九年詔四川經略使統番戍諸路有事即以征討哲宗元符二年詔四川沿邊州縣城池樓櫓各務修治有不治者罪之徽宗崇寧元年川峽置安逺軍四川路步軍之額自開逺而下並改曰克寧凡一百一十一指揮軍二萬三千四百人而克寧軍成都蜀漢雅邛嘉綿陵彭眉簡戎榮普資梓合瀘遂渠昌果懷安廣安興元洋利龍劍蓬壁安興文德三泉夔渝涪葛達開旋忠雲中大寧威棹成都嘉眉簡梓州路諸州軍劍安德夔渝涪萬安雲政和六年瀘南安撫使孫羲叟奏邊民冒法買夷人田依法盡拘入官招置土丁子弟見招到二千四百餘人欲令留番上從之宣和四年詔茂州石泉軍舊管子弟番土守把不諳射藝選施黔兵善射者各五十人分任教習候精熟日遣回孝宗淳熙五年四川刺史胡元質言關外西河階成鳳四州所聚兵民謂之忠勇皆以土兵為之向來虞允文團結四川忠勇軍其後不能增募乞令四川守臣添募仍立賞格元世祖元年置元帥府萬户之下置總管萬户佩金虎符千户之下置把總千户佩金符百户之下置彈壓百户佩銀符立樞密院以總之世祖三年平蜀後立萬户府及千户所以統軍士遇方面有警則置行省樞密院以總之事已則廢而移都鎮撫司屬行省至元七年命成都府括民三萬一千七十五户為僉義軍士凡四川腹裏萬户之府曰成都等路萬户府保寧萬户府敘瀘等處萬户府重慶五路守鎮萬户府嘉定萬户府順慶等處萬户府以兵籍係軍機重務漢人不閲其數雖樞密近臣職專軍旅者惟長官一二人知之故有國百年而內外兵數之多寡人莫有知之者至元三年以夔府劉整行中書省於成都潼川兩路分東西兩川都元帥七年以金州軍八百𨽻東川統軍司還成都呼喇濟軍戍東川十二年二月詔以東川新得城寨逼近夔府恐南兵來侵發鞏昌路補僉軍三千人戍之十五年八月安西王言川蜀既平城邑山寨洞穴凡八十三所其渠州等處凡三十三所宜以兵鎮守餘悉撤去從之成宗大德元年六月碉門魚通及黎雅諸處民户不奉國法議以兵戍其地發新附軍五百人蒙古軍一百人漢軍四百人往鎮戍七月以西川蒙古軍七千人新附軍三千人付皇子安西王八月調夔府招討張萬之新附軍俾四川西道宣慰使伊克德濟將之戍幹端七年四月調碉門四川軍一千人鎮守羅羅斯九年以行播州軍民使楊漢英為紹慶南平等處沿邊宣慰司管軍萬户佩虎符武宗至大四年雲南八百媳婦大小徹里作耗調四川省蒙古漢軍四千人命萬户囊嘉特部領赴雲南鎮守其四川行省言本省地方東南控接荆湖西北襟連秦隴阻山帶江密邇番蠻素號天險古稱極邊重地乞於存恤軍內調二千人往從之仁宗延祐四年十一月陜西都萬户府言碉門探馬赤軍一百五十名鎮守多年乞放還元翼樞密院臣議彼中亦係要地不宜放還止令於元翼起遣一百五十名三年一更鎮守原調四川各翼漢軍一千名鎮守碉門黎雅亦令一體更代泰定帝三年調碉門安撫司軍七百人成都保寧順慶廣安諸屯兵七千令萬户周戡統領直抵羅羅斯界以控扼西番及諸蠻部文宗至順二年七月以隆興西京軍士代上都戍卒還西川先是上都屯戍士卒皆在西川而戍西川者多隆興西京軍士每歲轉輸不勝勞費至是更之明洪武初年立大都督府節制中外諸軍事若有征討之役以公侯伯充總兵官名曰挂印將軍其在外鎮守地方武臣置都指揮使司以領衛所置總兵參將遊擊守備以司攻守諸軍在外者謂之翼洪武中改翼曰衛有指揮使等官各衛所官軍分番教閲大率以五千六百人為一衛一千二百一十六人為一千户所一百一十二人為一百户所每一百户設總旗二人小旗十人管領大小相維以成隊伍四川都司所屬二十一衛所原額十六萬三千六百三十六名有大征伐或量調各土司兵聽官兵總領節制指使三年詔四川立民兵萬户簡民間武勇教之技擊編隊伍時操練有事用以征伐無事為民永樂四年四川備禦用湖廣官軍五千不足復添五千分班輪戍宣宗宣德元年以平蠻將軍都督方政副總兵蔣貴鎮守松潘是年又以四川伍籍空虛籍民兵編保甲有土丁民壯之名鞍馬器械悉從官給免本户糧五石丁二丁事故不許勾補英宗正統元年以提督松潘兵部侍郎羅綺總兵都督徐海整飭四川邊務萬厯甲戌春正月用相國張居正言命兵部右侍郎曽省吾巡撫四川提督軍務總兵以下悉聽節制一切便宜從事熹宗天啓七年以朱燮元總督川湖雲貴廣西五省軍務皇清順治三年奉旨特命孟喬芳總督四川全省文武事務十四年九月以四川巡撫李國英升授川陜總督標下額設五營將備千把馬步兵丁康熙元年七月奉旨特命總督四川全省文武事務兼理糧餉駐劄重慶府居中調度康熙六年以苖澄總督四川七年劉兆麒接任旋奉裁康熙十九年以楊茂勳總督四川軍務雍正九年二月二十九日欽奉上諭川陜二省地方數千里甚為遼闊今西邊有辦理軍需之事總督一員難以控制向來川省曽設總督今仍著添設四川總督一員即以四川提督黃廷桂補授欽此後吏部議授總督四川等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史仍帶拖沙喇哈番紀録三次職銜奉旨依議嗣于雍正十三年十二月內奉裁督標額設督標中軍管中營副將一員中軍都司一員千總二員把總四員額設馬兵一百名步戰兵二百二十五名守兵一百七十五名馬步戰守兵共五百名馬一百匹以上兵馬奉裁撫標額設左右二營中軍兼左營參將一員守備一員千總二員把總四員右營遊擊一員守備一員千總二員把總四員額設馬兵三百名步戰兵三百七十四名守兵六百二十六名馬步戰守兵共一千三百名馬三百匹康熙元年臺議設川省總統彈壓諸軍以運餉副將梁加琦有威望奉旨特授是職設立總統標營後官兵俱奉裁提標提標額設中左右前後五營中軍兼中營參將一員中軍守備一員千總二員把總四員左營遊擊一員守備一員千總二員把總四員右營遊擊一員守備一員千總二員把總四員前營遊擊一員守備一員千總二員把總四員後營遊擊一員守備一員千總二員把總四員額設馬兵九百六十五名步戰兵一千七百二十七名守兵六百三十三名馬步戰守兵共三千三百二十五名馬九百六十五匹駐防康熙五十七年八月奉旨特設滿洲駐防成都八旗滿洲官兵副都統一員協領五員佐領十九員防禦二十四員驍騎校二十四員壯大八名前鋒一百五十二名撥什庫一百四十四名甲兵一千二百九十六名匠役九十六名炮手四十八名步兵四百名馬五千三百四十三匹兵房四千九百八十間每兵一名住三間共計四千八百間餘給弓匠鐵匠一百八十間倉房四十間庫房四十間演武廳三間牧地周圍六千二百八十六弓坐落沙河鋪東川北鎮總兵官一員鎮屬七營鎮標額設中軍管中營遊擊一員中軍守備一員千總二員把總四員左營遊擊一員守備一員千總二員把總四員右營遊擊一員守備一員千總二員把總四員額設馬兵四百名步戰兵六百名守兵一千名馬步戰守共二十名馬四百匹一駐劄保寧府城總兵官一員遊擊三員守備三員千總一員把總三員馬步戰守兵一千三百三十七名一分防廣元縣汛把總一員帶領馬步戰守兵五十名一分防朝天鎮汛千總一員帶領馬步戰守兵一百四名一分防南江縣汛千總一員帶領馬步戰守兵三十名一分防南部縣汛把總一員帶領馬步戰守兵三十名一分防昭化縣汛把總一員帶領馬步戰守兵一百一十七名一分防蒼溪縣汛千總一員帶領馬步戰守兵十五名一分防劍州汛把總一員帶領馬步戰守兵八十五名一分防蓬溪縣汛把總一員帶領馬步戰守兵三十名一分防安嶽縣汛千總一員帶領馬步戰守兵十二名一分防遂寧縣汛把總