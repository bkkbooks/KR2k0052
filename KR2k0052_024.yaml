body:
  text: 四川通志卷二十四山川順慶府南充縣附郭鶴鳴山在縣東十里相傳謝自然昇仙之日有鶴飛鳴於上旁有紫雲亭相近有凌雲山諸葛山在縣東四十里昔武侯駐師於此陣跡猶存請雨山在縣東七十里嘗祈雨有應因名朱鳳山在縣南十里周迴二十里髙一百七十二丈相傳爾朱仙及李淳風修煉之地丹井尚存蘇子瞻偕黄魯直居此嵗餘魯直書準提咒刻石今尚在昔有鳳凰集此因置鳳山觀清居山在縣南三十五里上有三峯下瞰四水又有仙人洞唐姚昂詩天峙兩峯南北峭地盤一水古今流宋端平中徙縣治於此至元初建征南都元帥府於此山之龍笻壩山有金樓髙與山等臨大江亭亭如浮屠常有光焰武陵丘山在縣南漢初縣西北九十七里一名凌江山龍城山在縣西南寰宇記在流溪縣東六十里與石梯山相連盤崖如龍絶壁如城重石山在縣西南元和志在流溪縣南一里金泉山在縣西二里唐貞元十年仙女謝自然於此白日飛昇上有石像韓愈詩果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在金水山一朝坐空室雲霧生其間須㬰自輕舉飄若風中烟元李宏詩昔時謝女昇仙處今日遺踪尚宛然蟬脱舊衣留石室龍飛流水湧金泉碑書故事封蒼蘚殿寫真容鎖翠烟薄暮嶺松聽鶴唳猶疑彷佛是神仙山有青霞觀步虚臺下有金泉寳臺山在縣西二里與金泉山相對上有覽秀亭西山在縣西一里山川環抱綿延千里果山在縣西八里層峯秀起上多黄柑晉御史陳夀隠居於此宋邵伯温詩從昔遨遊盛兩川充城人物自駢闐萬家燈火春風陌十里綺羅明月天棲樂山在縣西十里上有棲樂池與嘉陵江相通謝自然飛昇日仙樂振響峯頂因名舊有御風亭大方山在縣西三十里又有小方山並峙千峯萬嶺週迴繚繞若洞天然又有神女泉佛龕山在縣西五十里一名寳玉山大耽山在縣西一百里與小耽山對峙隋居士楊耽修道於此舞鳳山在縣西北十里狀如鳳翔清泉山在縣北十里有古刹下瞰龍門諸山舊志有小龍門山在縣北二十里徐仙洞在縣西富安鎮畫卦石在縣東四十里石平如砥上有八卦相傳李耳以足畫者嘉陵江在縣東自蓬州流入縣境西南流六十里經城東又一百十里入合州界唐韋應物詩水性自云静石中本無聲如何兩相激雷轉空山驚清水溪在縣東源出請雨山西北流一十五里至縣東北入嘉陵江居民藉以溉田又有羅溪在縣東十五里荆溪在縣西十五里奏溪在縣南四十里西溪在縣西自西充縣流入至縣西南入江流溪在縣西八十里流出遂州方義縣界平流三十里無灘因名下至當縣北流向東迤邐入江又有賴狼賴猿二溪亦自方義縣來大斗溪在縣東八十里源出岳池縣老君山西流入江溪旁有石如斗因名曲水在縣西四千里源出琉璃鎮盤迴曲折入嘉陵江是魚池漢志在安漢縣南今堙大小洲在縣西三里滴乳泉在縣西二十里昔有道士何志泉飲此泉年八十面如桃紅宋樊汝賢詩雲液落山腹脈與崑崙通云何山下叟八十桃顏紅昆井在縣西六十里即古之鹽井冽泉井在學東泉味甚甘天封井在縣城内昔爾朱真人吐丹在内有疾者飲之即愈西充縣西充山在縣城内西北隅為一邑之勝又有化鳳山在城内東隅亞夫山在縣東與縣城相倚鹿巖山在縣東八里鹿溪出此雙圖山在縣東十里兩峯相對宛如圖畫扶龍山在縣東二十里大陵鎮南岷山在縣南一十五里上有九井十三峯漢何岷隱居其上因名元至正間羣盜猖獗主簿馬䝉古岱率民築堡壘於此邑賴以全嵗堂山在縣南二十五里上有百福院邑人嵗時禳祝於此鳳儀山在縣南四十里孝廉山在縣東舊有文昌祠鳳臺山在縣西山頂方正如臺因名官祿山在縣西四十里織機山在縣西六十里上有織女洞瓊珠山在縣西三十里蜿蜒若瓊珠相連又乾明山在縣西四十里鳳頭山在縣西北五十里萬山環繞一峯特出隠居山在縣北十里上有清泉宫隋程太虛隱居於此回龍山在縣北三十里聳翠嵳峩縈迴盤繞拱宸山在縣北五十里又北十里有紫巖山蕭巖在縣西小陵鎮東髙十餘丈巖竇空闊泉水清潔又名虚清巖龍潭洞在縣西五十里又名上主洞穴通秋埡龍井琴洞在縣北二十里人履其中聲響如琴西溪在縣西東流入南充縣界入江寰宇記在縣西源出崇禮市山輿圖記勝在縣東四十步又有東溪舊志西溪即流溪之支流迴環曲折流合南充縣之曲水入江府志虹溪在縣東縈繞學宫前即為泮池順流至郡入江即西溪也又有鹿溪在縣東二十五里源出鹿巖山下即東溪也俱至三河口合流焉陵溪在縣西三十里小陵鎮亦名小陵河象溪在縣北四里海棠川在縣東源出雙圖山流十五里環繞縣治内多海棠又南流一百十里至南充縣入江蓬州玉環山在州城内北隅峯巒秀麗諸山拱揖嘉陵江水環之故名下有玉環井龍角山元和志在相如縣東二百步髙三百丈雲山在州東二十里接營山縣界宋淳祐間建州於此鳳凰山在州南五里上有三峯中峯髙峙兩峯相接如鳳凰飛舞之狀林木清秀江水環流崇覺山在州南二十里一名永安山兩峯髙峙下臨江水三合山在州西五十里三峯並起團環相合因名五馬山在州北五里五峯髙聳勢如奔馬壯山在州北八十里嘉陵江在州東自保寧府南部縣流入州境五十里至城東又西南流六十里入南充縣界岸上有石門石觜横截江心長約百丈青溪在州東自營山縣流入州境又流四十里入江玉泉在州南五十里泉水湧出狀如噴玉營山縣獅子山在縣東三十里以形似名青羊山在縣東五十里竒峯峭壁上有石池水泉清冽不盈不涸昔有仙修煉於此常有青羊出没舊建青羊宫菩薩山在縣東寰宇記在蓬山縣東三十里三角山在縣東南寰宇記在蓬山縣東三