本漢宕渠縣後漢宣漢縣地梁大同中置永康縣並置萬榮郡隋開皇初郡廢十八年改曰永穆屬清化郡唐武徳元年置萬州貞觀初州廢縣屬通州宋屬達州咸平二年改曰永睦元至元二十二年省思來廢縣在州北唐武徳二年析通川縣置屬通州貞觀二年省石鼓廢縣在州東漢宕渠縣地後漢宣漢縣地梁置石鼓縣西魏置遷州後周廢州置臨清郡隋開皇初郡廢縣屬通州郡唐屬通州寳厯初省大中元年復置宋屬達州寰宇記在州東六十里以縣東五十里江次有大石鼓而名九域志熈寧七年省入通州閬英廢縣在州北一百二十里以縣南五里閬英山為名唐天寳九年置屬通州郡宋乾徳五年省入石鼓六相樓在州學宫講堂前唐李嶠李適之劉晏韓滉元稹宋張商英皆官於此後皆入相故名戛雲樓在州南唐元稹為司馬時建垂楊臺在州北下有鮮遊池叢石山修竹園躑躅園今皆廢勝江亭在州西三里宋郡守王蕃建取白居易寄元稹詩通州猶似勝江州句為名有斐亭在鳳凰山白崖下萬竹叢生嘉靖時知州趙鳴鳳建爛柯亭在州北三里鳳凰山上有碑記剝落凝翠亭在翠屏山下雙清閣在州南濱江宋政和中州守王蕃建取杜甫詩心迹喜雙清句為名清風堂在州東四里舊志張俞作通州一詩今之清風堂休休堂琴亭遊觀等處並廢無考中和堂在州南宋建後更名凝香又有雲綿勤繼清隂三堂丁溪館在州南唐元微之集有通州丁溪館夜别李景信詩抽茶塲在州南元志宋時陳幷朱肱余應求李升韓均皆以言事切直謫建達州茶塲時目為五君子古碑記附漢車騎將軍馮緄碑舊志在廢永睦縣之西八十里碑文瞭然可讀其父煥亦有兩碑㫁裂不全漢廣漢屬國侯李翊及夫人墓銘舊志翊以靈帝熹平二年卒夫人亦不著姓氏疑其為臧氏字跡多缺唐處士墓銘舊志在州城北十五里馬腦鼻山下唐景龍二年刻字畫遒媚元稹告畬三陽神文元和志亦作通州之華陽觀廣福院修佛殿記舊志在廢永睦之廣福院唐㑹昌三年王欽説記瀘潭院鐫佛記舊志唐通川縣東富教里岸側石上乃唐人所鐫旁有中和造像立姓名百餘字餘多漫滅瀘潭又有龍洞節婦碑舊志節婦趙氏孀居有兇人欲犯脅以白刃婦不為動刺殺之時皇祐二年知州薛俅表其節立碑於達州之西北山後邑令薛仲侃為之建祠黄庭堅贈通州令韓廣叔文韓廣叔赴通州日黄庭堅以文贈之曰惟勤能辨公家惟清能律貪吏嚴而信則吏不病民簡而敏則民多在野東鄉縣東鄉故城在縣東北西魏置宋屬達州寰宇記在州東北一百七十里西魏置於益遷下蒲兩水間即今縣也唐武徳八年移治於縣東一里安養故城宋初復還舊志元省明正徳中復置下蒲廢縣在縣西劉宋置屬巴渠郡齊梁因之隋開皇三年廢唐武徳三年析東鄉縣復置屬南石州八年仍省昌樂廢縣在縣東北唐武徳三年析東鄉置屬南石州八年省入石鼓九域志巴渠縣有昌樂鎮即此觀風亭在縣治北知縣邵苾建太平縣東闗故城在縣東劉宋分宣漢東北境置東關縣梁末於縣置南晉郡及并州周改郡曰和昌隋改縣曰宣漢唐武徳元年復置南并州及東闗縣貞觀二年州廢仍省入東闗舊唐志是年宣漢自和昌城移治新安宋初省入東鄉寰宇記宣漢廢縣在東鄉縣北一百七十里梁於廢縣東一百五十里置南晉郡後魏廢帝二年於郡西百步置并州州領南晉郡郡理東闗縣周改郡曰和昌仍省縣入宣漢隋開皇五年移宣漢理東闗故城唐初又置南并州及東闗縣理新安廢鎮城貞觀初俱廢仍自南晉故城移宣漢理於新安鎮即今廢縣也巴渠廢縣在縣東北本漢宣漢縣東境劉宋置巴渠郡並置巴渠縣屬之以境在巴州宕渠間故名蕭齊因之隋初廢唐永泰元年又析石鼓四鄉置屬通州太和三年改屬開州四年還屬通州宋屬達州元至元二十二年省入達州宣漢廢縣在縣北後魏徙置寰宇記廢帝三年自達州移宣漢縣於南晉郡北二百里隋移理東闗而此城廢明通廢縣在縣東北二里本漢宣漢縣地九域志明通縣五代蜀置為催科賦税之地在州東一千一百里有宣漢鹽井縕欄三塲崇寧六年升置明通縣屬達州元至元二十二年廢諸葛城在縣北城口山下有中前後三城左抵紫陽右通平利相傳武侯嘗屯兵於此其地有三岡八坪形勢雄峻皇后城在縣東萬頃山麓戒石亭在縣治内今圮古碑記附書字崕碑舊志在巴渠西十里多㫁缺不成文有晉昌太守字按晉孝武方立晉昌郡則此必東晉以後人碑耳四川通志卷二十七
