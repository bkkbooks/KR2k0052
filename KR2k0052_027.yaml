body:
  text: 四川通志卷二十七古蹟龍安府平武縣附郭龍州故城在縣東一百二十里今名舊州壩西漢剛氐道蜀漢江油戍地三國志魏景元元年鄧艾侵蜀自隂平行無人之地七百餘里鑿山通道造作橋閣先登至江油降蜀將馬邈遂進至涪晉以後為隂平平武縣地西魏始置江油縣於此取江油戍為名尋為龍州治所隋唐皆因之寰宇記州治涪江南一里是也宋寳祐六年徙治雍村在今江油縣界元時再徙明洪武七年土知州薛文勝創設州城於青川所二十三年知州薛繼賢又徙樂平鎮舊志徙治盤龍壩箭樓山之麓即今治也故剛氐道在縣東漢置屬廣漢郡季漢屬隂平郡晉省平武故城在縣東北故剛氐道地季漢析置平廣縣屬隂平郡晉改曰平武宋屬北隂平郡元嘉二十七年使故氐楊文徳引兵自漢中西入搖動汧隴遂取魏隂平平武是也齊因之梁末李文智據此西魏仍為平武縣屬龍州隋屬平武郡唐貞觀八年省入江油隂平故城在縣東南一百五十里劒州界詳見梓潼縣方維故城在縣東北二百二十里西魏時置舊曰秦興置建陽郡隋開皇初廢郡改縣曰方維屬平武郡唐武徳四年改屬沙州貞觀初省入景谷縣青州故城在縣東北九十里漢剛氐道地後魏置馬盤縣兼置馬盤郡隋初郡廢縣屬平武郡唐屬龍州天寳初改為青州縣宋初因之端平後廢元初復立至元二十一年省入龍州明洪武四年改置青州守禦所併置思曩安撫司國朝省入平武江油廢縣舊志在舊州隋唐時龍州附郭邑馬龍廢縣舊志在青川境内建置無考青蓮鄉在縣西南接江油縣西北界一名漫波渡相傳李白母浣紗於此有鯉躍入籃中烹食之遂孕而生白舊志為彰明人蓋平武實割江油劒州梓潼彰明之地為邑則白又係平武人矣清暉樓在府治内宋張覺民有賦迎恩樓在縣東門外鎮羌樓在縣西門外半里龍遷樓在縣東一百七十里梁大通三年李龍遷建後人圖其像於樓元末州治燬樓猶存桂香樓在縣東二十里太白臺在縣東南一百三十里牛心山側李白與江油尉嘗遊於此宋州守史祈書白贈尉詩刻石又讀書臺在匡山李白嘗讀書於此止止亭在縣治宋太子中允宇文之邵建知縣楊恒有記望闕亭在府治内明隆慶時知府龍慶雲建濯纓亭在縣治嘉靖二十六年㕘政宋宜建久圮萬厯三年㕘將胡大賓重建翠峯亭在縣東牛心山側東臯亭在縣東三里萬厯二十一年推官焦宗㑹建巢雲閣在府治内忠正堂在舊州倅㕔宋建有范鎮司馬光像吏隱堂在舊州倅㕔宋僉判趙寰有詩范鎮司馬光和韻古碑記附牛心山靈異碑在牛心山之顯濟廟即李龍遷廟也廟碑不載撰人姓名呂純陽道貌碑在牛心山相傳純陽真筆宋御製封二郎神碑在玉虗觀米芾碑在玉虛觀龍門志楊熹序續志宋之源序江油縣江油故城凡有四季漢江油戍在今縣東魏景元中鄧艾先登至江油是也其戍尋廢西魏分平武置江油縣為龍州治在今府西隋唐因之宋寳祐六年隨州移治雍村在今縣西北元至元二十一年併入龍州至正中又隨州治武都興教鎮在今縣東北明洪武初併入梓潼十四年始置縣於今治屬劒州嘉靖十四年改歸龍安雍村在縣西北宋進士雍繁孫所居故名宋末嘗移縣治於此飛天藏在竇圌山宋淳熙八年建元至正中重葺明季兵火惟此獨存介福樓在縣土主祠内元至正中建微風樓在縣東門外今廢停驂樓在縣東十里明知縣葉自新建今廢仙遊臺在縣北竇圌山超然亭在縣北竇圌山係竇真人故蹟明萬厯間推官朱仲亷建名國朝康熙七年邑人楊廷傑重修有碑記舊竇圌亭感雨亭在縣南紫龍山麓明知縣余槐禱雨有應民建亭記之今圮古㕔在縣治内取李青蓮溪雲入古㕔句知縣朱樟建桂馥軒在縣治内知縣王上穎建軒前老桂榦聳花繁柳梅侶為之作記古碑記附𢎞真觀古碑在縣南一百三十四里太華山之登真觀不載撰人姓名匡山碑舊志鐫李白出山詩或云在江油縣遊天倉洞記穴碑舊志在太乙洞明嘉靖中保寧府同知葉松撰石泉縣石泉故城今縣治唐貞觀七年置屬茂州宋史政和七年静州夷寇邊攻茂州窒隴東道以孤石泉成都守孫羲叟上言石泉為邑介錦茂之間道里闊逺緩急不相應非有兵扼其衝要不足以捍外患於是詔改石泉為軍宋末徙廢北川故城在縣西三十里本汶江縣地後周置北山縣屬北部郡隋屬汶山郡唐永徽二年省入石泉威蕃城在縣西二十里唐置威蕃栅扺棲雞城地極險要宋時孫羲叟既建議立石泉為軍徳陽人張上行言於羲叟曰去石泉三十里威蕃亭即唐之威蕃柵也宜先築堡寨以禦其來然後建軍調兵以圖之於是遂城其地刳兒坪在九龍山第五峯下地稍平闊石上有跡儼如人坐臥狀相傳即聖母生禹遺跡誓水柱在縣西四十五里河岸柱髙丈許圍五尺前人恐水衝縣立此誓之威蕃亭在縣北一里唐時建今改為演武塲甘泉亭在縣南半里泉水甘美崖書甘泉二字望雲亭在縣治後舊為魏侯祠知縣胡桐更今名活民亭在縣北泉水清潤知縣李茂元建愛山亭在縣南一里取杜甫為愛丈人峯之句古碑記附禹穴碑在縣南二十里夏禹實生於此鐫古篆書禹穴二大字於石壁又有李白所書二字岣嶁碑在縣南一里石紐山下禹廟前大禹所書字畫竒古彰明縣彰明故縣凡三徙宋志巴西郡有漢昌縣齊因之隋志金山郡領昌隆縣唐屬綿州元和志縣南至州七十里本漢涪縣地晉孝武自白沙戍移漢昌縣僑治於此仍屬巴西郡後魏廢帝改為昌隆縣先天元年避諱改曰昌明後唐又避諱改曰彰明寰宇記縣初在清亷鄉梁大同四年移讓水鄉魏移孟津里唐建中元年移於舊縣即今理也宋元明皆因之國朝順治十六年併入綿州雍正七年後置興聖廢縣在縣西南唐武徳二年分昌隆縣置顯武縣神龍元年改曰興望開元二年併入昌明尋分巴西涪城萬安三縣地復置二十七年復廢李白宅在縣南二十里碑刻猶存蓮花池舊志在縣東五里粉竹樓在縣西北十五里遺址尚存漢王臺在縣西北三十五里文光亭在縣南元建今圮折栁亭在縣西北松潘衛嘉城故縣今衛治即古龍涸地亦曰龍鶴龍鵠華陽國志蜀時以汶山險要自汶江龍鵠冉駹白馬匡朋皆置屯守後魏太和九年岩昌王梁彌博為吐谷渾所逼奔仇池仇池鎮將穆亮帥騎三萬軍於龍鵠擊走吐谷渾立梁彌承而還益州記龍涸在蠶陵縣北八十里後周本紀天和元年吐谷渾龍涸王莫昌帥部落内附以其地為扶州隋志同昌郡嘉誠縣周置併置龍涸郡及扶州總管府開皇初府廢三年郡廢七年州廢唐改置松州後陷吐蕃明初始置松潘衛國朝因之湔氐故道在衛西北秦置漢屬蜀郡史記惠帝三年蜀湔氐反即此後漢因之晉改曰升遷屬汶山郡宋省水經注江水自汶關東經氐道縣北本秦始皇置後為升遷縣是也平康廢縣在衛西北季漢置屬汶山郡晉因之宋省後周復置隋仍屬汶山郡唐初廢㝷復置元和志顯慶中因古平康城置在平康水西屬翼州尋廢垂拱元年復置屬當州西南至州六十里寰宇記分交川及通軌翼斜三縣置天寳元年改屬交川郡復廢廢潘州在衛北七百五十里相傳漢武帝逐諸羌渡河湟居寨外築此城置䕶羌校尉禦之唐廣徳初松州以北皆沒於吐蕃宋時分置上中下三州今阿尖寨即上潘州班班簇即下潘州界二州之間即中潘州也元屬吐蕃宣慰司明初設松州潘州二衛後併為松潘衛其地愈北愈平曠逺無際雍正七年改𨽻龍安興樂廢縣在縣西北晉置屬汶山郡華陽國志元康八年汶山興樂黄石與廣柔平康羌有仇遂叛是也劉宋初省交川廢縣在衛南五里元和志周天和中置屬龍涸郡舊唐志又云周置龍涸郡隋廢為交川縣今名紅花屯江源廢縣在衛西周置屬汶山郡唐廢元和志江源鎮在交川縣西北三十里蓋即故縣為名廢軌州在衛西北本党項羌地唐貞觀中酋長細封步賴内附列其地為軌州後没吐蕃廢闊州在衛西北相近又有廢諾州俱唐貞觀五年置以處党項等降羌屬松州都督府永泉亭在衛金蓬山下正統初都督李安以劒鑿石二水迸出號文武水大書永泉二字鐫石崖築臺於此今圮瑞麥亭在衛西一里正統中産瑞麥因以名亭疉溪營蠶陵廢縣在營西一百二十里漢置屬蜀郡晉分屬汶山郡東晉後廢元和志漢元鼎中開梁太清中蕭紀於舊縣置針州尋廢章懐太子曰蠶陵故城在翼水縣西舊唐志在衛山縣西明一統志在所城北三里周改為翼針縣廢翼州在營西隋志有翼針縣周置又置翼針郡開皇初廢屬汶山郡唐置翼州元和志州西至悉州二百二十里北至松州一百八十里本漢蠶陵縣地周天和九年平蠶陵羌於七頃山下置翼州以翼針水為名隋大業三年改置利山鎮唐初復置治翼針縣周武帝置舊唐志武徳元年於左封縣置翼州以翼針屬之六年移州來治舊志七頃城貞觀十七年移治七里溪咸亨二年移州治羌前上元二年仍來治天寳初改縣曰衛山又改州曰臨翼郡乾徳初復曰翼州後陷吐蕃新唐志廣徳後翼當悉静並為行州是也寰宇記翼州南至茂州一百二十里西南至悉州一百五十里明一統志翼州城在所城南衛山廢縣在所西五里翼水廢縣在縣南隋志周置曰龍水縣并置清江郡開皇初郡廢改縣曰清江十八年又改曰翼水屬汶山郡唐屬翼州元和志縣北至州六十里本漢蠶陵縣地明一統志在所城南十里舊志在所西南九十里峨和廢縣在營北唐置屬翼州元和志縣南至州六十里本漢蠶陵縣地天寳十一年置以縣有峨和山為名明一統志在府北六十里永鎮橋廢當州在營西北隋志有通軌縣周置并置覃州及覃州榮鄉二郡開皇初郡廢四年州廢屬汶山郡唐改置當州舊唐志州初治利川鎮儀鳳二年移治逢舊橋天寳初改江源郡乾元初復曰當州寰宇記武徳後為行州吐蕃傳大厯五年後置當悉柘静恭五州於山陵要害之地而故地皆入吐蕃宋志茂州羈縻當州利和廢縣在營西唐置屬當州元和置縣西南至州三十里周天和元年於此置廣平縣尋廢顯慶三年於廣平舊城置又有谷利縣東至州六十里文明元年開生羌置又有平康縣西南至州六十里顯慶中因古平康縣置在平康水西屬翼州尋廢垂拱元年復置屬當州廢悉州在營西隋志有左封縣周置廣平縣又置翼州及廣平左封二郡開皇初郡並廢仁夀初改縣曰左封大業初州廢屬汶山郡唐置悉州元和志州東至翼州二百二十里西南至静州六十里顯慶元年分當州置在悉唐川因以為名其首領任刺史治識舊縣與州同置地名識舊因以為名領左封縣東南至州二十里周天和元年於此置廣平縣開皇十八年改名天寳中又於縣置守捉領歸誠縣西北至州八里本生羌地垂拱二年從化三年置縣以處之舊唐志武徳元年復於左封縣置翼州六年移州治翼針而縣廢貞觀四年復置縣二十年屬當州顯慶元年置悉州於悉唐以縣屬之咸亨元年移州來治載初元年移理東南五十里匪平州又曰在當州東南四十里天寳初改歸誠郡乾元初復曰悉州廣徳後復陷吐蕃廢靜州在營西南唐置元和志州東至悉州八十里東北至當州六十里西北至柘州三十里本漢蠶陵縣地天授元年置治悉唐縣領靜居縣西至州二十四里又領清道縣自顯慶元年與悉州同置天授元年割屬舊唐志顯慶元年分當州悉唐川置悉唐縣兼置悉州咸亨元年移州治左封又自翼針移翼州來治並置都督府儀鳳二年州還治翼針以縣置南和州天授元年改曰靜州天寳初曰靜州郡乾元初復曰靜州寰宇記州南至維州一百三十里西南至恭州六十里西北至柘州三十五里後陷吐蕃廢廢柘州在營西唐置元和志儀鳳元年置以山多柘木為名治柘縣前上元二年置又領喬珠縣東至州五十里與州同置舊唐志天寳初曰蓬山郡乾元初復曰柘州寰宇記州東至静州三十里南至維州三百里東北至松州二百六十里廣徳後陷吐蕃廢恭州在營西南唐置元和志州西南至維州二百五十里東北至柘州一百里開元二十四年分靜州部落於柘州西置治和集縣舊曰廣平縣屬靜州天寳元年改名領博恭縣西至州二十五里又領烈山縣西至州五十里舊唐志天寳初改恭化郡乾元初復曰恭州寰宇記州東至茂州三百五十里廣徳後陷吐蕃大厯十四年吐蕃入宼一由恭州過汶川至灌口是也龍涸城在營北元和志龍涸故城在衛山縣北十一里俗名防渾城城之北境舊是吐谷渾所居故名白㟁城在營西唐貞元中韋臯破吐蕃論莽熱兵進屯白㟁西山諸羌皆降新唐志翼州有白㟁都䕶祚鼎三城鷄栖城在營西南唐貞元十九年韋臯討吐蕃分兵攻維保松州及鷄栖老翁城即此寰宇記鷄栖川在悉州東南一百里元一統志鷄栖村在茂州東北一百七十里有三路一通茂州一通龍州一通綿州皆吐蕃險要之地今𨽻石泉軍疉溪長官司在營北一里領渴卓等五砦又鬱郎長官司在營西十五里領松埤等五砦皆明永樂四年置國朝順治初廢玉津亭在營南景泰初建寧逺府西昌縣附郭越巂廢縣今縣治隋置越舊郡治唐為巂州治元和志本漢邛都縣地開皇六年置新唐志自舊州又經沙野二百六十里至羌浪驛又經陽蓬嶺百餘里至俄準添館陽蓬之南為南詔境元志懿宗時立建昌府領建安永寧二州至元九年平建蒂分建昌為二州在城曰建安東郭曰永寧十五年又割建安立寳安州二十六年省明洪武二十五年改置建昌衛軍民指揮使司二十七年又置前衛皆為行都司附郭萬厯三年併前衛國朝因之雍正六年改為寧逺府治西昌縣邛都廢縣在縣東南古西夷邛部國西南夷傳自滇以北君長十數邛都最大司馬相如傳唐䝉既通夜郎相如因言邛筰冉駹皆近蜀秦時嘗通為郡縣漢興而罷天子乃使相如往使畧定西夷邛筰冉駹斯榆之君皆請為内臣除邊關關益斥西至沫水南至牂牁為徼通靈關道橋孫水以通邛都為置一都尉十餘縣屬蜀後元狩元年求身毒道復使閒使出西夷及平且蘭遂誅邛君以邛都為越巂郡王莽末越巂蠻夷任貴自立為邛穀王後附公孫述建武十四年貴自稱太守奉計十九年貴謀叛漢劉尚分兵先據邛都掩貴誅之華陽國志邛之初有七郡又有四部斯叟晉宋因之蕭齊時縣廢徳昌廢府在縣南元志徳昌路軍民府漢邛都縣地在建昌西南所居蠻號屈部至元九年内附十二年立定昌路以本部為昌州二十三年罷定昌路併徳昌路治本州葛魯城乃領昌州明洪武中改徳昌路為府二十五年廢府置徳昌千户所蘇示廢縣在縣北六十里漢置屬越巂郡後漢因之又曰蘇祁三國蜀志有蘇祁邑君冬逢叛張嶷討誅之即此華陽國志晉省宋復置蘇祁縣齊又省隋志郡復領蘇祁縣舊置亮善郡開皇初郡廢唐仍曰蘇祁屬巂州元和志本漢舊縣後陷夷獠周武帝重置新唐志自臺登九十里至蘇祁縣又南八十里至巂州後陷南詔縣廢元至元九年平籠麽城設千戶所即舊縣也十五年改曰禮州明初廢可泉廢縣在縣西南隋志越巂郡領可泉縣舊置宣化郡開皇初郡廢唐屬巂州元和志有西瀘縣東北至州二十七里本漢邛都縣地周天和二年於此置本可縣天寳元年改名有姜磨戍在縣西南三里舊唐志西瀘本梁置可縣隋治姜磨戍武徳七年移於今理後陷南詔廢元志建昌路領瀘州在路西昔名沙城臉即孔明摛孟獲之地段氏時於熱水甸立城曰洟籠至元十五年改為瀘州明初因之舊志在西南二十五里即古西瀘縣也武侯城自縣南三十里瀘水之東傳為武侯所築所謂五月渡瀘即此又有舊城堡在縣北二十五里亦以為武侯征蠻時築孟獲城在縣東二里相傳為孟獲所築新安城在縣南唐開元中所置後廢咸通五年南詔寇巂州戍將顔慶復請築新安遏戎二城從之保寨城在縣西南唐置新唐志巂州有新安三阜沙野蘇祁保寨羅山西瀘蛇勇遏戎九城皆戍守要地廢徳州在縣南元志徳昌路徳州在路之北地名吾越甸亦苴龍蠻所居蠻苴郎以逺祖名部曰頳綖憲宗時内附至元十二年立千戶十三年改為徳州明初廢廢普濟州在縣西南一百五十里夷名玕甸獹魯蠻世居之後屬屈部元至元九年内附於玗甸置定昌路二十三年改為州明洪武中廢設長官司廢威龍州在縣東南四百里元志徳昌路領威龍州在路西南夷名巴翠部領小部三曰沙渦普宗曰烏鷄泥宗曰媧諾龍菖蒲皆獹普蠻種至元十五年合三部立州明洪武中改長官司廢里州在城東三百里元志建昌路領里州䝉詔時落蘭部小酋阿都之裔居之因名阿都部至元十年内附十八年設千戶二十三年設軍民總管府二十六年罷烏州明初因之後廢廢闊州在縣東南四百里元志建昌路領闊州治密納甸烏䝉仲由之裔名科居此以名為部號後訛為闊至元中内附九年設千戶二十六年改為州明初因之後廢廢隆州在縣南元志建昌路領隆州在路西南與漢邛都縣接界唐㑹川縣之西北境䝉氏分㑹同立邊府瞼其後瞼主楊氏於瞼北塏土立城曰大隆城即今州治也至元十三年内附十四年設千戶十七年改為州明初廢廢姜州在縣東南元志建昌路領姜州姜者蠻名也㑹川有城曰龍納羅落蠻世居之大理髙泰時烏蠻閟畔部阿壇絳之孫阿羅攻拔之以祖名絳部憲宗時隨閟畔部内附至元十九年改為姜州明廢又見㑹理州廢羅羅斯司在縣東元志至元中設羅羅䝉慶宣慰司都元帥府瀘沽廢縣在縣北一百二十里本漢臺