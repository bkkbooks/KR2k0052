body:
  text: 四川通志卷二十八上祠廟祠廟之設所以崇德報功也故錫福於民者則丹楹刻桷以薦馨香書稱毖祀上下誠慎之也我朝釐定禮制祀典之所尊崇固已廟貌巍峩神斯妥矣其餘城社壇壝之屬忠孝節烈之倫凡有禆於民生風化者亦皆因時修治使得所憑依至若閭閻祈禱之神靈爽誠有不昧則聽其自為報賽蓋曰有其舉之莫或廢也自是蜀之人士承庥獲福者亦可曉然於明禋之昭格矣作祠廟志成都府成都縣華陽縣俱附郭文廟在府城南詳見學校祀典各州縣制同崇聖祠在五文廟東祀制孔子代各州縣同名宦祠在門文廟東鄉賢祠在文廟門西忠義祠在明倫堂東節孝祠在明倫堂西以上四祠各州縣俱有之關帝廟在總府街祀縣關聖及三代神王凡各州鄉鎮俱有之社稷壇在府城南附郭不置餘州縣制同風雲雷雨山川壇在府城南附郭不置餘州縣制同先農壇在府城東雍正六年建詳見祀典附郭不置餘州縣制同江瀆廟在城內南門西隋開皇二年建唐天寶六載重修祀南瀆大江之神康熙六年冬遣吏部左侍郎梁清寬致祭有御製文并清寬詩載藝文集巡撫張德地布政使郎廷相按察使李翀霄等捐金重修有刻御製祭文碑二知縣張行黃鈁督修雍正三年敕賜涵和大江之神碑一座城隍廟在府城東各州縣俱有之龍神祠在府城東門內雍正六年建文昌祠祀梓潼帝君會城四隅俱有之各州縣多有祀者東嶽廟在府城內祀泰岱天齊仁聖帝各州縣多有之大禹廟一在府東明萬厯間建一在府東北名集聖宮中殿祀禹王前殿祀蒼頡八蠟祠在府東按八蠟一曰先嗇二曰司嗇三曰農四曰郵表畷五曰貓虎六曰坊七曰水庸八曰百種厲壇在府城北各州縣俱有之真武廟在府城東祀玄天大帝康熙間重修玄壇廟在府城西南祀趙元帥康熙七年布政使郎廷相重建三官祠在城西南三教祠在府東火神廟在府東康熙三年布政使郎廷相建此以弭火災各州縣俱有之藥王廟在府西南巡撫張德地建蠶叢祠在府西蠶叢氏初為蜀侯後為蜀王教民桑蠶俗呼為青衣神今廢望帝祠在府城西五里蕭公祠在金水河東漢廟在惠陵東昭烈前殿武侯後殿關張北地王及諸將佐左右配饗有嶐碑唐裴度記柳公權書會城稱為三絶康熙十一年總督蔡育榮重建川主祠在府城東南祀秦太守李冰雍正八年縣敕賜封祭詳見祀典各州多有之三公廟在城內祀秦李冰漢文翁宋張詠二郎廟在府城東祀李冰之子雍正八年之敕賜封祭詳見祀典各州縣多有昭應祠在府城內金馬坊側漢宣帝時益州有金馬碧雞之神遣諫議大夫王褒醮祭宋賜廟額昭應今廢三義祠在城北祀昭烈關張諸葛祠在府東北射洪祠在府北門外蜀王建祀射洪陳子昻今廢杜甫祠在浣花溪上宋呂大防建韋臯祠在大慈寺內今廢三聖廟在府南五里張忠定廟在城內清獻祠在府東南祀太守趙抃濂洛祠在府東即相如故宅正德中提學王廷相建祀周元公程純公程正公張橫梁朱文公張南軒尹和靖魏鶴山薛文清蔣道林今廢嶽武穆祠在府北門外原任總督嶽鍾琪建五龍廟在府東相傳獻王入蜀至嘉州江漲舟不得上禱於神得濟乃廟祀焉神金姓一云即竇禹鈞康熙元年重建潛溪祠在府東祀明學士宋濂今廢方正學詞在潛溪祠左今廢祈水廟在府南巡撫張德地重建牛王廟在華陽縣治左康熙七年牛大疫巡撫張德地建此弭災五皇廟在雙流縣東南遺愛祠在雙流縣東祀明知縣孔友諒久廢三皇廟在溫江縣東二里金堂縣亦有之東王廟在溫江縣東一里新建女郎祠在溫江縣西三十五步女郎名玉蘭以三月九日仙去鄉人至是日祭之三烈祠在溫江縣南門內祀教諭任高妻李氏同其二女今廢盤古祠在新津縣東北瞿君祠在新津縣東六里後漢瞿武乘白龍仙去鄉人置祠祀之今廢五聖廟在新津縣北今廢劉公祠在新津縣東祀宋縣令劉叔寶水利源祠在金堂縣東龍君廟在新都縣龍門山祈禱輒應八陳廟在新都縣西二十里祀武侯前有八陳遺迹四聖廟在簡州北十里娘娘廟在簡州西門內宇文泰廟在簡州北七十里黑神廟在簡州衙左白龍廟在簡州北八十五里祀孝子茹榮先主廟在崇慶州東四十里有房琯碑文杜甫祠在崇慶州東文潞公祠在崇慶州內祀宋太守文彥博景賢祠在灌縣文廟內祀名宦呂大防宋璫馮伉劉綜劉隨馬執中張𢎞王鵬先儒范賢李浩宋汝為譙定鄉賢李畋代淵張綜張愈張須正尤溪祠在灌縣西旱禱即應金馬碧雞祠在崇寧縣北七里今廢聖像宫在崇寧縣城內魁星樓在新繁縣東南炳靈宮在漢州東萬厯間修花卿祠在漢州北祀唐將花驚定張魏國公祠在漢州城內祀張浚及其子栻南軒祠在漢州西張栻讀書處鐵峯土主廟在彭縣北五十里祀隋姚萇濛陽土主廟在彭縣東四十里祀唐韋臯勝井院在彭縣北五十里今廢有古塔寶珠井尚存楊晟廟在彭縣西重慶府巴縣附郭文廟在府城北詳見學校祀典各州縣如府制崇聖祠在東文廟名宦祠在東文廟鄉賢祠在西文廟忠義祠在前文廟節孝祠在朝天驛內以上五祠各州縣俱有之關帝廟在府西總督李國英建各州縣鄉鎮俱有之社稷壇在府城西附郭不置餘州縣制同風雲雷雨山川壇在府城南附郭不置餘州縣制同先農壇在府東雍正六年建詳見祀典附郭不置餘州縣制同城隍廟在府城內各州縣俱有之東嶽廟在府城東各州縣多有之文昌祠在府西各州縣多有之厲壇在府城北各州縣俱有之大禹廟一在府南門一在南岸塗山與后塗山氏並祀川主祠在府南門內各州縣多有之甘寧廟在府西今廢壁山廟在府內祀唐安撫使趙延之永川彭水二縣俱有之三賢祠在府南門內祀巡撫陳士竒知府王行儉知縣王錫皆有惠政故並祀之李公