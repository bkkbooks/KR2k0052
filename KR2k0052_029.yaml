道濟令裴方明擊破之已而糧竭方明敗走元嘉十年二月道養郊天方明襲破賊衆巴東太守周籍之帥衆援成都與方明合斬道養弟道助九月甄法崇為益州刺史收費謙正其罪道養逃入郪山時出為冦寧朔將軍蕭江之討平之梁劉季連南齊時為益州刺史至梁天監元年武帝以鄧元起代季連季連與元起有舊隙心不自安遂矯稱齊宣徳太后令舉兵恢復久之食盡計無所出武帝詔受季連降季連遂詣建康入東掖門數歩一稽顙帝赦為庶人焦僧䕶益州人天監四年聚衆作亂初蕭淵藻伐鄧元起為刺史以私隙誣元起反殺之僧䕶乗此搆煽時淵藻年未弱冠自將兵擊之不避矢石斬僧䕶衆悉平蕭紀武帝子封武陵王為益州牧大殖貨利聞湘東王立亦自立為帝將兵東下江陵元帝乞援於魏魏遣尉遲廻襲破成都紀進退無據元帝遣侯叡討之紀為樊猛所殺唐段子璋梓州刺史驍勇善戰明皇幸蜀時有功上元二年東川節度李奐奏替之子璋遂舉兵過遂州殺刺史虢王巨奐與戰敗奔成都子璋自稱梁王改元黄龍據綿州成都尹崔光逺率將花驚定與奐共討平之崔旰漢州刺史擊吐蕃有功嚴武甚重之武卒旰請以大將王崇慶為節度會朝廷巳除郭英乂英乂至誣崇慶以罪誅之召旰還成都不至英乂攻之敗奔簡州韓澄殺英乂送首於旰牙將栢茂琳楊子琳李昌巙各舉兵討之蜀中大亂以杜鴻漸為東西川副元帥鴻漸令旰與茂琳等罷兵及鴻漸還朝薦旰才可任旰亦入朝加尚書賜名寧時楊子琳乗虚襲成都寧妾任氏出家財募兵擊走之寧尋還鎮建中四年徳宗幸奉天寧至行在朝廷乃遣中使縊殺之劉闢由進士累官西川度支副使節度韋臯卒闢自為留後憲宗新即位未暇致討以為節度副使闢益肆求統三川不許遂發兵圍梓州朝廷遣髙崇文與李元奕嚴礪等討之破鹿頭闗直指成都拔之闢走吐蕃崇文使髙霞寓追擒闢送京師斬之郭琪西川黄頭軍使廣明二年僖宗幸蜀田令孜頒賜從駕軍不及蜀軍琪言於令孜令孜怒欲殺之琪率所部作亂節度使陳恭瑄率諸軍擊之琪敗奔廣陵投髙駢惟兵一人隨之琪愧歎乃解劒印命歸示恭瑄以為死云阡能邛州牙官因公事違期亡命為盜蜀人羅渾擎句胡僧羅夫子韓求各聚衆應之至萬餘人横行邛雅陳敬瑄使髙仁厚討之仁厚得能諜者温言諭遣使歸語賊衆許以歸降悉免死賊衆聞之解體尋擒羅渾諸寨皆降執句胡僧斬韓求能乃與羅夫子悉衆決戰衆不應仁厚軍至衆羅拜迎之凡出軍六日五賊皆平械送能與羅夫子於敬瑄敬瑄寸磔之韓秀昇涪州刺史僖宗在蜀秀昇與屈行從聚衆斷峽路遮江淮貢賦及雲安淯井之鹽陳敬瑄奏以髙仁厚為行軍司馬討之仁厚覘知賊精銳在舟老弱守寨乃揚兵江上賊挑戰不應潛遣勇士焚其寨又募善泅者鑿其舟相繼沈賊衆執秀昇行從以降械送行在斬之楊師立中和間為東川節度使髙仁厚討韓秀昇陳敬瑄許以東川賞其功師立聞之怒朝廷徴之不應舉兵屯涪城聲言討敬瑄詔以仁厚討之仁厚屢以伏兵敗其將鄭君雄等進圍梓州射書城中諭以順逆君雄遂率衆殺師立挈其首出降乃詔授仁厚東川節度王建字先圖項城人為神䇿軍使僖宗幸蜀有扈從功擢劒州刺史遂召募峒酋襲閬據之後因討陳敬瑄拔成都自稱留後詔授西川節度㝷封蜀王朱全忠篡唐建移檄興復天福中遂稱帝唐舊臣避亂在蜀者建禮用之建卒子衍嗣游晏無度宫中尤為䙝慢唐遣皇太子繼岌郭崇韜伐之衍迎降後為唐所戮孟知祥字保裔邢州人晉王李克用愛其勇使典親軍莊宗立詔授西川節度㑹李嚴監西川軍知祥斬之與東川節度董璋併力拒朝廷後又殺璋謝罪進封蜀王閔帝元年遂稱帝知祥卒子昶嗣宋太祖命王全斌等伐蜀大破之昶降後唐康延孝同光三年隨郭崇韜平蜀有功㑹崇韜以無罪被殺又遇敕使令董璋誅朱令徳延孝曰朱郭皆無辜族滅行及我矣遂自稱西川節度擁衆五萬招討副使任圜討之延孝戰敗入漢州閉城不出圜攻抜之延孝走綿竹擒送京師宋全師雄孟蜀文州刺史蜀亡歸宋乾徳三年王全斌等在蜀縱軍掠民詔發蜀兵赴汴給錢及廩食又不即奉命蜀兵憤怨行至綿州推師雄為首朱光緒遽滅師雄族師雄怒攻彭州據之自稱興蜀大王兩川震動曹彬等力戰乃破師雄於新繁全斌等繼之師雄走死東川因分道招輯始平其衆王小波李順俱青神民也蜀亡後庫積悉輸汴京任事者競起功利蜀地狹民稠貧不能給淳化四年小波因聚衆為亂貧者爭附攻青神掠彭山殺貪汙官吏都巡檢張玘戰於江原射殺小波玘亦死之其黨推小波妻弟李順為主攻陷成都分寇劒州劒州都監上官正與成都監軍宿翰合兵擊破賊衆王繼恩等亦斬賊三萬餘級獲順磔之餘黨仍肆攻掠繼恩等頓師不進詔以張詠知益州詠至激軍校以忠義由是官軍前進大致克捷餘賊悉平王均益州兵馬都虞候也初符昭夀侵虐部伍咸平三年衛卒趙廷順等推均為主攻漢州綿州陷之劒州知州李士衡知蜀州楊懐忠合兵擊賊廷順中流矢死均敗走十月均復分路襲官軍雷有終等逆擊大破之均乘夜逃竄石普追斬之譚汝翼施州土民也淳熙四年汝翼乗知州田汝弼新喪率衆掠黔江與田氏家衆戰於太平驛斬田氏數十級州人震恐詔以林栗知䕫州栗至大破其衆執汝翼俘於京吳曦嘉泰二年為四川宣撫副使獻階成和鳯四州於金金封為蜀王曦據興州三年二月隨軍轉運使安丙監興州合江倉楊巨源興州中軍正將李好義同謀誅曦是月乙亥黎明好義率衆入偽官稱奉詔誅賊李貴斬曦首盡收其黨殺之傳首臨安好義等復和成等州張福興元軍士也嘉定十二年與其黨莫簡等作亂以紅巾為號陷利州大掠果閬乃以安丙為宣撫使丙至築長圍困其衆絶樵汲福窮蹙請降械送京誅簡等一千餘人賊黨悉平元囊嘉岱䝉古人泰定間為四川行省平章至治元年據蜀反自稱鎮西王天厯元年攻陷播州尋據荆州逼襄陽文宗為皇太子遣使赦囊嘉岱市罪囊嘉岱歸命蜀地平後以囊嘉岱常指斥乗輿棄籍其家明玉珍隨州人至正中聞徐夀輝兵起率衆歸之乙未夏入蜀貿糧值青巾之亂遂襲取重慶尋拔嘉定聞陳友諒弑夀輝遂自稱隴蜀王壬寅稱帝國號夏玉珍卒子昇立明洪武初遣使招諭昇久不決後命湯和等伐之時廖永忠等由水道攻䕫門㫒悉力守禦而傅友徳破秦州入綿漢以油塗木牌書克漢州月日投江而下永忠等士氣百倍克夔闗趨重慶昇乃降昇將戴夀守成都至是亦降明封昇歸義侯明彭普貴蜀妖人也洪武中煽土民作亂破指揮音亮兵勢益張平羌將軍丁玉討平之趙鐸徳陽人天順中妖僧悮昇等聚黨肆掠鐸因之設謀主號召數千人自稱趙王都督僉事何洪都指揮劉雄楊瑛皆戰没朝廷遣官招降已而復叛成化元年巡撫汪浩用綿竹義士王志恭䇿遣軍助之大破鐸衆追至江油縣擒斬之藍廷瑞營山人正徳三年與湖廣崔蓬頭及大寧竈丁鄢本恕廖麻子等聚衆圍大寧縣令李睦斬蓬頭廷瑞率餘黨攻巴縣尋刼營山殺僉事王源巡撫林俊招之降而總制洪鐘邀殺廷瑞本恕等林俊致仕去廖麻子復屠劒門陷利州梁山等處㝷亦受撫被殺同時保寧賊劉烈江津賊曹甫方四麻六兒等亦相繼劫掠官軍先後討平之駱松祥内江人與成都衛舍人范藻相繼叛亂未幾就戮張敖焦珙劉芳俱茂州人正徳八年叅將徐勇督修城塲甚刻酷敖等執梃逐勇執指揮萬嘉言索勇銀七百乃釋之後復圍城殺旗舍廖一受等官軍擒斬之薛來保徳陽巨盗也川西北羣盜皆附之横行郡縣已而間行入省窺虚實為邏卒趙月興所執道院訊實斬之後月興往中江為其黨所殺家人訢於縣縣令集兵往羣盜負嵎有一盜傷踵羣盜推之下曰以此償汝縣兵不敢追縳跛盜歸周天星周天和鄢藍餘黨合流民張東陽以叛詔總兵何卿兵備林豫討平之周嘉江津人與弟虎彪以白蓮教惑衆嘉靖四十四年作亂與蔡伯貫等相應巡撫劉自強遣百戸李茂調䝉溪土兵討平之黄中石砫司人其父俊據支羅寨劫奪後伏誅中減死充戍逃歸招集亡命劫奉節雲陽等縣巡撫劉自強奏請川湖合𠞰川軍進午欄坪楚軍自施州衛入中為楚軍所獲川軍破其巢穴支羅平蔡伯貫田紞俱大足人與富順黄一元傳習陽曲妖人李桐白蓮邪敎嘉靖四十四年聚黨攻破大足銅梁等縣僉事傅思明通判郭雲鳯討平之詔磔伯貫及其黨於成都市何勉通江人隆慶中與弟姪及汪鐵鎚大鷂子小鷂子滚子等聚衆萬餘大肆劫掠川陜勛陽三撫臣調兵合𠞰悉平之楊應龍播州土司自唐時祖居於播凡二十九世矣應龍生而嗜殺隆慶中襲職從征諸番有功萬厯中賜飛魚服應龍漸驕蹇寵妾屠妻家在州專殺肆行劫掠妻叔張時照等告變朝議行川貴兩省㑹勘至二十三年羈其子可棟於重慶迫以贖銀㑹可棟死應龍乃反二十八年節制川湖貴總督李化龍調總兵劉綎馬孔英吳廣等與黔撫楚撫八路進兵綎身先士卒進克土城應龍自焚吳廣獲其子朝棟及其弟兆龍妾田氏等八路共斬賊二萬餘級獻俘闕下詔剉應龍屍殺朝棟等分其地為二府屬黔曰平越屬川曰遵義今並隸貴州吕由鍾征橎時嘗充把日萬厯三十一年聞成都等處有天鼓地震之異又值白蓮敎煽亂鍾乗機聚衆四千餘人偽署守備欲犯㑹城内江令楊應登以計擒之解散其黨由鍾服上刑吳洪播州人楊應龍黨後逃避貴州見改土設流法嚴不得自逞乃與盧文政劉堯等推應龍姪楊三老為主以偽檄招兵兼署官職遵義生員彭廷詔等告變兵備傅光宅知府蔡鳯梧總兵李應祥共討平之奢崇明永寧宣撫司奢孝忠無子崇明以族人得襲職性隂鷙子寅尤狠戾共謀不軌天啓元年奉調逺征至重慶巡撫徐可求㸃閲行賞寅出不意殺可求并巡道等數十員率衆攻成都巡撫朱夑元禦之又檄監軍道徐如珂等各集土司兵圍重慶賊石砫司秦氏亦以兵㑹賊遁走水西與安邦彦連兵抗拒時夑元已晉總制合黔楚蜀兵㑹𠞰三年擒斬二逆水藺悉平張獻忠膚施人從苗美王嘉印等作亂尋自號八大王受撫復叛劫掠楚蜀間崇禎甲申夏率衆數十萬由夔門直入攻重慶殺巡撫陳士竒等九月陷成都蜀王赴井死獻忠僭大號偽署守令屠戮蜀中紳士於萬里撟行盡𠞰法分佈賊黨搜獲各郡邑男婦少長悉戮之又欲殺蜀人之附營者於是棄成都移屯順慶營於金山鋪鳯凰山聞大清兵至秦欲再據川北以絶餉道一肅王入蜀遣數百騎從間道𢷬賊營獻忠額中矢伏積薪下曳出斬之餘賊奔潰國朝袁韜沔縣人先是蜀賊姚天動黄龍聚黨劫掠韜亦聚響馬賊數千與姚黄接踵乗獻賊之亂掠川東北所至焚燬殺老幼開墳墓時值饑疫賊以人為食順治二年巡撫李國英大破賊衆韜依楊展尋殺展據川南後隨獻逆餘黨歸黔黔事敗韜亦死十三家袁宗第郝揺旗等皆獻逆餘黨盤據夔東總督李國英合諸道兵進𠞰悉誅之譚𢎞萬縣人亦十三家之一見勢不支赴總督李國英投誠康熙十三年𢎞復附吳逆以叛庚申春川督楊茂勲等攻之懼而歸命是秋又叛將軍噶爾漢克雲陽𢎞已死執其子天祕斬之王公良吳三桂逆黨甲寅率偽將據夔州府川督楊茂勲統舟師直抵夔城羣逆走死劉文秀逆獻義子也與袁韜爭嘉定屢戰勝韜遂據蜀後數年官軍討平之盧名臣劉文秀禆將盤踞重叙馬湖陳徳葛朝忠率官軍水陸並進賊走死三郡悉平吳之茂吳三桂族子駐兵白水庚申春將軍楚良棟率官軍討之之茂乃降後伏誅胡國柱吳三桂之壻庚申五月踞闗山相嶺趙良棟與紀哈禮鄒九疇等三路進𠞰良棟夜遣壯士直上闗頂揮戈力戰遂復闗山相嶺又戰於大渡河前後斬獲甚衆賊走雲南後自焚死王屏藩逆桂偽總督庚申率衆陷漢中據保寧奮威將軍王進寶討之戰於武闗屏藩大敗走歸保寧自縊死進寶進攻保寧餘衆悉降按吳逆之變其時從賊諸臣如吳一元者本山東范縣人順治十一年為四川右布政康熙十三年從逆受偽職賊以子姪蓄之鄭蛟麟者遼東人順治十七年任四川提督後從賊授總統大將軍康熙十九年恢復四川時蛟麟已死𦵏西江河斲棺戮其屍羅森者直隸大興人康熙十年任四川巡撫後于偽職今職官志内俱已削其名氏附見於此四川通志卷二十九下
