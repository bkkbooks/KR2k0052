body:
  text: 欽定四庫全書四川通志卷三十職官名宦之紀必其功德及民而後英聲茂實得埀不朽至秩官一書則仿古人官署題名之例凡蒞茲土者咸得備載故雖有高下無去取焉夫自周秦以來士大夫官於西蜀計若干人而列名宦者幾何然則優絀相形後之人可以知所勉矣我皇上知人則哲能官人文武諸臣其務殫心職守俾事業可述而識則今之載於秩官者他時即可登於名宦詎不美歟作職官志總部節度使唐齊景胄王昱以上開元中任章仇兼瓊潁川人李璬明皇子韋倫京兆人嚴震鹽亭人嚴礪震之弟以上天寳中任嚴武華隂人上元中任張延賞蒲州人崔寧淸河人以上建中中任韋臯京兆人袁滋朗山人以上貞元中任武元衡太原人李絳贊皇人高崇文幽州人林藴莆田人歸融盧𢎞宣以上元和中任段文昌南郡人長慶中任杜悰萬年人開成中任李德裕贊皇人太和中任盧躭廣州人劉潼以上咸通中任高騈崇文孫安潛以上乾符中任陳敬瑄陳恭瑄高仁厚楊嗣復華隂人以上中和中任王涯太原人長慶中任馮宿東陽人盧坦周墀大中中任韋昭度京兆人大順中任郭釗韋丹桺仲郢華隂人鮮于晉高璩盧恆楊汝士杜元穎顧彦暉路巖顧彥明潘孟陽崔愼五代李承德薊州人董璋天成中任宋沈義倫西川轉運使乾德中任陳世卿南劒人東川節度使袁抗轉運使趙禎轉運使薛田轉運使司馬池夏縣人轉運使趙開安居人都轉運使馬知節都廵檢范純仁吳縣人成都轉運使劉光祖簡州人東川節度使汪應辰玉山人成都制置使范成大吳縣人四川制置使崔與之番禺人四川安撫使吳玠隴干人四川宣撫使孟珙棗强人四川宣撫使吳璘玠之弟趙汝愚餘干人四川制置使余玠蘄州人四川安撫制置使安丙廣安州人四川制置使畱正泉州人四川制置使胡元質四川制置使丘崈安撫制置使袁悦友建安人安撫制置使陳隆之四川制置使丁黼石埭人四川制置使梅應春桺學晏公武胡世將鄭剛中孫羲叟施擇善王世昌王剛中張珏李曾伯元汪良辰王守誠趙世延王利用通州人汪惟正楊文安張大悦吕域張廷瑞郭漢傑巡撫明丁玉洪武間撫松潘宋禮撫寧人永樂中任賈諒嶧縣舉人宣徳中任古廙廣徳州監生宣徳中任李匡黄巖進士正統中任宼深唐縣監生正統中任羅綺磁州進士正統中任李賢鄧州進士景泰中任汪浩石首進士陳泰邵武訓導陳宜泰和進士黄琛長樂進士夏塤天台進士張瓚孝感進士孫仁貴池進士劉璋南平進士何喬新南城進士以上成化中任謝士元長樂進士丘鼐貴溪進士童軒鄱陽進士郉表文安進士梁璟崞縣進士鍾蕃崇徳進士馮俊宜山進士劉纓新淦進士林元甫莆田進士劉丙安福進士劉洪安陸衛進士以上𢎞治中任高崇熙石州進士洪鍾錢塘進士林俊莆田進士彭澤蘭州進士馬昊寧夏進士劉昺安福進士盛應期吳縣進士陳雍餘姚進士胡世寧仁和進士以上正徳中任許廷光河隂進士湯沐江隂進士王軏江都進士黄衷鄭毅上饒進士王廷相儀封進士丁沂溧水進士唐鳯儀郃陽進士宋滄鉅鹿進士范嵩歐寧進士楊守禮蒲州進士張翰騰驤衛進士潘鑑婺源進士呉山吳江進士李欽武清衛進士劉大謨儀封進士戴金漢陽進士丘養浩晉江進士王大用莆田進士張時徹鄞縣進士應大猷僊居進士嚴時泰餘姚進士李香分宜進士張素雲南進士戴鱀鄞縣進士張臬進賢進士羅廷繡淳化進士黄光昇晉江進士羅崇奎南昌進士雷賀豐城進士陳堯通州進士谷中虛海豐進士劉自强扶溝進士譚綸扶溝進士以上嘉靖中任陳炌臨川進士嚴清雲南進士陳瓚獻縣進士劉斯潔易州進士羅瑤巴陵進士以上隆慶中任曾省吾承天進士王光瞻黄岡進士張士佩韓城進士孫光祐絳州進士雒遵涇陽進士徐元泰宣城進士李尚思曲沃進士艾穆平江舉人王繼光黄州進士譚希思茶陵進士李化龍長垣進士王象乾新城進士喬壁星臨城進士吳用先桐城籍休寧進士饒景暉進賢進士以上萬厯中任徐可求由進士朱夑元紹興進士尹同臯太原進士以上天啓中任田仰思南進士張論光州進士劉漢儒大城進士王維章夷陵進士邵㨗春候官進士廖大亨臨安進士傅宗龍昆明進士陳士竒鎮海進士龍文光雒容進士以上崇禎中任巡按明楊祥梁䕶吳閻田本淮安進士滕宗智余信童眞仁和人祝和林碩福州進士羅通吉水進士黄振劉可王綱上高進士以上永樂中任陳治𢎞熙中任裴俊嚴孟衡江西進士楊燦清江進士厲秉彝王豫丹徒監生王翺鹽山進士李實豐城進士蔣彥廣袁錠眞寧監生以上宣徳中任韋廣張玉高峻趙忠徐璟光山進士上官尹周濟陳員韜臨海進士姚鵬嚴頤泰和進士劉懷張哲頂城進士張洪安福進士牛宣以上正統中任李琮黄溥弋陽進士李周羅俊泰和進士徐瑄嘉定進士吳琛繁昌進士以上景泰中任王周泰和進士焦顯徳州進士周必兆安福進士胡寛餘姚進士錢璉鄞縣進士田斌江寧進士劉敬以上天順中任曹英滕霄山隂進士孫逢吉馮斐胡靖山西進士張璉安邑進士黎福安平進士戴用萬安進士栁淳華亭進士屠鏞鄞縣進士何鈞靈寳進士毛鸃長垣進士李溶安福進士翟廷忠洛陽進士張曉三元進士倪進賢婺源進士王輔同州進士兪振才新昌進士陸愈平湖進士以上成化中任兪俊麗水進士歐陽旦安福進士陳瑤全州進士張鸞咸寧進士魏英慈谿進士榮華藍田進士曾禄博羅進士姚祥歸善進士蕭柯萬安進士陳珀莆田進士以上𢎞治中任蔡中孚徳清進士胡暘任丘進士楊璋孝感進士陳威臨川進士余緇鄱陽進士陳鍾雲南進士陳祥筠陽進士王綸扶風進士王鏜雲州進士朱組崑山進士江良貴貴溪進士盧雍吳縣進士黎龍新喻進士蘇恩華亭進