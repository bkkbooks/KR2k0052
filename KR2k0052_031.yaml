  text: 四川通志卷三十一皇清職官總督孟喬芳鑲紅旗人順治十年總督陜西三邊四川等處軍務李國英正紅旗人順治十四年特設四川總督即以四川巡撫補授以太子少保兵部尚書都察院右副都御史任金礪苗澄滿洲籍任縣人康熙六年以兵部尚書都察院右副都御史任劉兆麒直𨽻寶坻人康熙十年以兵部侍郎兼副都御史任旋奉裁蔡育榮遼東錦縣人康熙九年以兵部左侍郎都察院右副都御史任兼制川湖駐劄重慶楊茂勳遼東人康熙十九年以太子少保兵部尚書兼都察院右副都御史任希福滿洲人康熙二十二年以兵部尚書都察院右副都御史任兼制川陜哈瞻滿洲人康熙二十二年任兼制川陜駐劄西安噶爾泰佛倫滿洲人康熙三十年以兵部尚書兼都察院右副都御史任吳赫以兵部右侍郎兼都察院右副都御史康熙三十三年任圖納滿洲人康熙三十六年以兵部左侍郎兼都察院右副都御史任席爾達滿洲人康熙三十七年以兵部尚書任博濟覺羅華顯滿洲人康熙四十年任齊世武滿洲人康熙四十五年以兵部右侍郎兼都察院右副都御史任殷泰滿洲鑲紅旗人康熙四十八年以兵部右侍郎兼都察院右副都御史任永泰滿洲人康熙五十年以右副都御史任鄂海年羮堯鑲白旗進士康熙六十年任嶽鍾琪陜西臨洮衛人雍正三年任查郎阿滿洲鑲白旗人雍正七年以吏部左侍郎兼右都御史任黃廷桂鑲紅旗人由四川提督雍正九年右特授四川總督兵部右侍郎兼都察院副都御史仍帶拖沙喇哈番巡撫王遵坦山東人順治三年以都察院右副都御史任李國英滿洲人順治五年以都察院右副都御史任高民瞻滿洲人順治十五年以都察院右副都御史任佟鳳彩遼陽人康熙元年以都察院右副都御史任張德地滿洲籍直𨽻遵化人康熙三年以都察院右副都御史任歷工部尚書杭愛滿洲人康熙十九年以都察院右副都御史任韓世琦正紅旗人康熙二十二年以兵部尚書兼都察院右副都御史任姚締虞湖廣黃陂進士康熙二十五年以都察院右僉都御史任噶爾圖滿洲人康熙二十九年以都察院右副都御史任于養志遼陽監生康熙二十九年以都察院右副都御史任貝和諾滿洲人以兵部右侍郎兼都察院右副都御史任能泰滿洲鑲白旗廕生康熙四十三年以都察院右副都御史任年羮堯鑲白旗進士康熙四十八年任塞爾圖滿洲人康熙五十八年以都察院右副都御史任蔡珽奉天正白旗進士康熙六十年以都察院右副都御史任歷官吏部尚書王景灝鑲黃旗人雍正二年任法敏滿洲人雍正三年任馬會伯陜西寧夏武狀元雍正四年以都察院右副都御史任憲德蒙古正白旗人雍正五年以都察院右僉都御史任雍正十二年升工部尚書學院宋衡江南廬江進士康熙四十五年任王奕清江南太倉進士康熙四十八年任王誥江南江都進士康熙五十一年任廖賡謨江南華亭進士康熙五十三年任後接任三年方覲江南江都進士康熙六十年任任蘭枝江南溧陽進士雍正二年任宋在詩山西安邑進士雍正五年任周人驥直𨽻天津進士雍正七年任隋人鵬山東萊陽進士雍正十一年任舊設巡按今裁趙班璽順治六年任張椿陽城人順治八年任郝浴直𨽻人順治九年任高民瞻滿洲人順治十一年任陳洪柱青陽人順治十五年任張所志遼陽人順治十七年任顧如華漢川人康熙元年任布政司吳𢎞融直𨽻真定人由中書舍人順治三年任王原膴直𨽻真定人由中書舍人順治九年任莊應會江南武進進士順治十年任徐永正遼東廣寧貢生順治十四年任楊思聖直𨽻巨鹿進士順治十五年任郎廷相遼東廣寧廕生康熙三年任金俊遼東遼陽人康熙八年任劉顯第遼陽東寧衛貢生康熙十九年任李輝祖奉天鐵嶺廕生康熙二十五年任高起龍正白旗廕生康熙三十年任于準山西廣寧州廕生康熙四十三年任何顯祖奉天義州廕生康熙四十五年任卞永式奉天監生康熙四十六年任吳存禮鑲紅旗人康熙四十九年任宋致河南商丘歲貢康熙五十一年任劉棨山東諸城進士康熙五十二年任孔育珣山東曲阜人聖裔康熙五十七年任戴鐸奉天鐵嶺人康熙五十九年任羅殷泰鑲紅旗監生雍正元年任佛喜鑲藍旗監生雍正四年任管承澤鑲藍旗監生雍正五年任趙𢎞恩鑲紅旗貢生雍正六年任高維新直𨽻寧晉進士雍正七年任劉應鼎貴州貴築舉人雍正九年任舊設守西道陳安國陜西漢中生員順治六年任朱之瑤江西安福官生順治十八年任郭亮江南上元進士康熙二年任舊設守北道李藻山西高平舉人順治八年任袁一相直𨽻宛平人順治九年任盧愼言直𨽻真定官生順治十年任王庭浙江嘉興進士順治十四年任衛紹芳山西猗氏進士順治十七年任楊素藴陜西宜君進士順治十八年任張清議江西懷寧進士康熙元年任何澄直𨽻真定進士康熙三年任舊設守上下東道袁一相直𨽻宛平人順治六年任許纘曽江南華亭進士順治十八年任王同春山西沁水進士康熙三年任舊設守上南道張能鱗直𨽻大興進士順治十八年任舊設守下南道張松齡福建莆田進士康熙元年任以上各守道俱奉裁按察司楊道淳陜西洋縣廩生順治四年任徐永正遼東廣寧監生順治十一年任高士俊遼東廣寧解元順治十二年任白秉真遼東杏山恩貢順治十三年任李棠馥山西高平進士順治十四年任王庭浙江嘉興進士順治十六年任于鵬舉江南金壇進士順治十七年任金鋐直𨽻宛平進士康熙元年任朱之瑤江西安福官生康熙二年任李翀霄山西絳州拔貢康熙三年任宋可發山東膠州進士康熙八年任宋琬山東萊陽進士康熙十二年任胡升猷進士康熙二十二年任王業興遼東遼陽廕生康熙