  text: 四川通志卷三十二武職官前明總兵顧時副總兵曹良臣副總兵張鈐都督武以上洪朝劉昭都督征松潘陳懷江南人朝以上宣德李安以安平伯掌四川都司充總兵征松潘正統朝盧能副總兵鎮守松潘天順朝芮成都督李瑾江南人以襄城伯征大壩宰用山後人以寧川衛指揮使歷升都督僉事鎮守以疊溪功升同知傅泰總兵李鎬副總兵湛清總兵化以上成朝房驥總兵顧玉總兵昌佐山後人以都指揮歷升參將松潘副總兵都督僉事鎮守韓雄山東人由瀘州都指揮使歷升松潘總兵失機謫戍固原衛朱廷江南人以寧川衛指揮使歷升松潘總兵以上𢎞治朝楊宏由陜西都指揮充參將松潘副總兵都督鎮守陳循都督僉事鎮守徐謙都督僉事鎮守閻勳遊擊將軍領兵征𠞰流賊張文淵江南人充松潘副總兵吳坤永寧衛指揮使充參將升都督同知張傑陜西人充松潘副總兵何卿成都前衛指揮僉事充參將進副總兵分守松潘歷升後軍都督府同知以上正德朝郭成四川人鎮守總兵官歷後軍都督府同知劉顯四川籍江西人由武舉歷中軍都督府同知以上隆慶朝沈思學江南狼山衛人由生員征討有功授本衛世襲升都督僉事鎮守李應祥湖廣九溪衛指揮世襲歷升都督僉事鎮守史綱山西大同衛指揮歷升都督僉事鎮守劉承嗣都督僉事鎮守萬鏊雲南臨安衛指揮世襲歷升都督僉事鎮守劉綎江西南昌衛指揮世襲歷升都督同知鎮守吳廣廣東人由部卒有功升都督僉事楊登山部卒以功升都督僉事鎮守侯國弼福建人以世襲歷升都督僉事鎮守黃守魁廣東人朝以上萬厯侯良柱永寧人任總兵羅尚文任總兵溫如珍臨安人川東鎮守甘良臣鄰水人川北鎮守劉鎮藩山東人任總兵張奏凱任副總兵張令副總兵川北鎮守參將趙安左參將征松潘蔣貴左參將征松潘留鎮守以上宣德朝周貴江南人協守松潘正統朝李文山西人協守天順朝劉芳江南人茂州參將孫圖直𨽻人協守鄒倫白珍李蔭江南人李永定王偉以上俱協守東路沈運魏啓馬隆徐勇芮成以上俱協守南路以上成化朝范守針成都人守永寧王繩堯守威茂魏之竒守威茂都指揮使趙清洪武朝周信江南人永樂朝徐諒江南人徐輔江南人張信江南人朝以上宣德張英江南人景泰朝劉芳江南人馬榮江南人沈運江南人楊剛山西人劉升江南人朝以上成化昌佐山後人徐繼江南人王泰吳坤鄒慶四川人韓恩山西人張傑陜西人廉瑛山東人陸震湖廣人何卿江南人朝以上𢎞治張麟江南人張倫河南人余承恩四川人丘岌江南人李爵江南人劉永昌江南人芮恩鄧斌喬志道方䇿徐昺田繼禮李印李繼武陳儀郭廷用馬禮張藎臣管籥以上嘉靖朝費懋甫江西人槐寅薛近宸以上隆慶朝陳善陳道李贇黃斌江南人蘇民望蔣基江南人阮維藩廣東人倪彥江南人徐兆麒江南人王納諌王庭光江南人劉有道江南人王廷蘭錢富民杜璧董仲􅭛浙江人袁千里湖廣人張世德湖南人施翰浙江武進士以上萬厯朝遊擊俞琪江南人尹林以上洪武朝夏成山東人趙得河南人朝以上永樂孫勝洪熙朝李榮直𨽻人髙廣江南人朝以上宣德孫敬江南人孫諒直𨽻人周貴江南人周琥江南人陳貴河南人朝以上正德吳榮山東人李文山西人朝以上景泰徐欽天順朝何節江南人孫閎以上成化朝陸愷湖廣人韓雄山東人周鳯江南人曹宗山東人張寧直𨽻人龎鳯山西人李蔭江南人李升山東人孫仲文山東人張悅直𨽻人張光宇以上𢎞治朝周爵江南人曹元江南人徐威李俊江南人羅紳陜西人孔仁許信沈一元魯元忠李洪田于公周繼張時舉周承芳王棟何自然柴沐顧承勳宣詔王詔陳實麒婁承宗沈禮江南人朝以上嘉靖姚應禎江南人孫繼武江南人謝崇爵江南人李逢亨張一桂畢英以上隆慶朝徐仁威趙鵬陳善周官霍采劉用光李贇江騰龍汪東之周于德程世文江西人李獻忠成都人萬鏊雲南人田中科楊威黃榜江西人范希正河南人淡章成都人陳愚見張神武江西人髙居仁江南人張世應沅州衛人上萬厯朝以羅大爵合洲人黎雅遊擊馬應試仁懷人侯天錫永寧人曽英福建人曹勳黎州人世襲指揮按是書於人物名宦孝友忠義等類俱上溯周秦以來迄於漢唐宋元明至國朝而稱極盛焉至於職官一書淵源出於班志其中文武分猷無容軒輊但舊志武職官一類惟載明時總鎮之屬而於前代皆未有所紀述兹姑仍其舊未敢妄增以滋絓漏之咎皇清武職官提督何傅福建人康熙二十年任吳英福建泉州府人康熙二十五年任嶽升龍陜西莊浪衛人康熙三十六年任唐希順陜西涼州衛人康熙三十九年任嶽升龍陜西莊浪衛人康熙四十年復任馬際伯陜西寧夏衛人康熙五十年任康泰陜西河州衛人康熙五十一年任嶽鍾琪陜西莊浪衛人康熙六十年任周瑛四川松潘衛人雍正三年任黃廷桂鑲紅旗人雍正五年任紀成斌陜西人雍正九年任顏清如陜西人雍正十年任總督標營副將李現光陜西人康熙五十八年任張可才陜西人雍正九年任都司僉書馬踰隆直𨽻人雍正九年任巡撫標營左營遊擊冶秉孝陜西人康熙十九年任周夢吕遼東人康熙二十七年任于海山東人康熙三十一年任張春福建人康熙三十八年任賈文玉山東人康熙四十二年任鄭璸河南武舉康熙四十六年任王炳直𨽻武進士康熙五十六年任聶三才直𨽻人雍正二年任曾文彬直𨽻人雍正六年任左營守備李芳名陜西人康熙十九年任劉宏聲直𨽻人康熙二十二年任衛若青山西武進士康熙三十四年任劉呈祥河南武進士康熙三十七年任馬良臣陜西人康熙四十五年任辛隆陜西人康熙四十八年任江啓明陜西人康熙五十七年任馬紀師陜西人康熙六十一年任曾