body:
  text: 四川通志卷三十八之一隱逸易稱漸陸詩詠考槃古隱君子者流類多混迹樵漁澹情軒冕士各有志無庸强耳蜀為山水奥區故遺滎守道之儒巖棲谷飲每有獨徃之蹤焉歴朝以來講君平之卜賣桃椎之屫者正不止一二輩要其寄懷沖澹如孤雲野鶴超然物表夫豈雋俗之士假㨗徑於終南索高價於少室者所可同日語哉作隱逸志成都府漢李𢎞字仲元成都人少讀五經得其精義不求利逹里中薰其德者班白不負擔男女不錯行後舉茂才不就羅充嘗遺以金固却之隱居衡門縕袍莞席揚子雲稱之曰不屈其志不辱其身不夷不惠居可否之間鴻安成都人與嚴君平友善君平卒安誄之曰無營無為澹然淵深楊厚字仲桓新都人父統精天文厚習父業順帝徵之拜議郎遷侍中梁冀以車馬遺之不受歸授門徒三千餘人李固徴之不起卒諡文父唐朱桃椎成都人高益州士廉遺以衣逃入山中夏則裸形冬則樹皮自覆每織芒屫置路旁見者皆言朱處士屫也易米置其地朱至夕取之終不見人宋孫知微字思邈成都人張詠鎭蜀雅慕之終不可致及還朝出劒閣一邨童持思邈畫以進詠問孫所在答曰已去遠矣馬知節守成都造訪解金帶以贈卽繫之苧袍人見其標韻蕭散皆以為李靑蓮也張愈字少愚一字淑才本晉人徙蜀居郫城性通敏㓜異凡兒篤嗜聖經並好漢書不讀百家言旣冠適四方與時之豪傑游日相薫炙業遂大成才豪氣逸武功蘇舜欽以詩豪當時一見愈大推服仁宗朝西戎入邊愈上書陳攻取十策寳元初除校書郎願以援父顯忠而自隱靑城山之白雲溪凡六辭召命文潞公有詩云欲作外臣誰是友白雲猿鶴在巖扉任易宗詩懶隨六品仕丹闕高臥一峯藏白雲所著詩文凡若干卷妻蒲氏亦知學文章精義有聲於時愈在靑城山常自為詩徧題壁上臨風對月翛然有高視一世之意聞佳山水不辭千里而徃愈卒蒲氏為文以悼之辭最工蜀士大夫多傳焉右丞何聖從銘其墓曰昔莊子之才子雲珍之謂其乆幽而不改其操今少愚亦隱於蜀不苟利欲不求聞達在莊之後十有餘歲其風凜然可以與之相追矣章詧字隱之雙流人博通經學尤長易太𤣥著發隱二篇蜀守蔣堂張方平趙抃咸以逸民薦於朝賜粟帛命為州助敎不就嘉祐中賜號沖退處士王素時為州守因更其居之鄉曰處士里曰通儒坊曰沖退詧導生養氣憂喜是非不膠於心常謂友人范百祿曰君子能强其所不足拂其所有餘太𤣥之道幾矣此子雲仁義之心予之於太𤣥述斯而已若苦其思難其言迂溺其所以為數而忘仁義之大惡足語道哉年七十六卒子禩好古學道所居猶存遺蹟郭長孺成都人風致閒逸遇人無貴賤悉禮下之然其中挺拔不倚終日劇談無戲語惟好書丹鉛點勘不去手自經史百氏浮屠黄老隂陽醫卜之術皆究其妙有易解書解道徳經解蔬食譜歌詩雜文等書又作孝行圖高逸圖陰陽雜證圖各為論述焉篐桶翁成都隱者程伊川在蜀嘗見其挾冊入市就視之則易也因質所疑酬答如響問其姓名不言及問未濟卦曰三陽皆失位也後袁滋問易於伊川曰易學在蜀郭震成都人博學能詩有飄然物表之志所著有漁舟集李畋稱其有孟郊風楊匯成都人杜門著書善賦詩人無知者邵伯溫為部使者薦其學行甚高淸節甚苦不報及卒學者謚為靜恭先生郭希樸華陽人以博學聞尤通於易任价以方郭林宗號有道先生能前知死生之故李畋為錄其事鄧至雙流人通六經學者從之甚衆每入市邑人皆拱立著徃事龜鑑通書一江集子綰翰林學士孫洵仁尚書洵文知樞密院事白如璧新都人博覽羣書隱居不仕避兵入山不食而死蘇雲卿漢州人紹興中寓豫章布褐草履終歲不易少與張浚為布衣交浚入相馳書函金幣屬帥漕致之帥漕因請見期之詰朝及翌日徃謁扃戸閴然書幣俱在而翁已遯去不知所徃元杜圭新都人勤學尚友通五經尤長於春秋隱居授徒來學者衆廬舍至不能容明楊敏字學可新都人師杜圭博通經史避兵雲南還蜀明玉珍廹之不仕洪武中命賜鈔歸隱蜀獻王給田八十畝贈云流水畫橋題柱客淸風精舍讀書人徐宗敬成都人博學工詩文自負甚高天順間被徵不起所著有中白子集傳於世徐䙗華陽人字山甫自㓜穎悟靜篤人鮮窺其涯際中正統丁卯鄉試再上公車遂絕意仕進撫按亷其賢薦除夷陵倅不受徧遊吳越以山水詩文自娛家居别築一室書孫綽體識𤣥遠出處同歸二語於壁間蓋自况云晚年德高行成當事欽慕片言隻字奉若典型或遇地方大事撫按就商之悉見之行事有欲輿致之者意不可得卒年九十九所著有忠愛堂稿行於世李政之簡州人正統間入鄉闈搜檢懷挾政之正色言曰國家掄才方勤咨訪乃令囚首裸足以希進取乎遂不入試隱居杜門嘉靖初卒張紹宗雙流人年九十六猶讀書談道隱竹溪業漁釣孔令入溪訪之與紹宗遇班荆而坐抽琴鼓南風之操賦詞十二首歌而贈之令扁其門曰竹溪淸隱汪懷字惟徳其先婺源人從祖指揮使居蜀懷少失父鞠於母從師苦學能詩文徃來吳楚以瞻母養一日寓吳賦懷歸詩曰乘舟淸夜鶴鳴孤一曲夷猶過鏡湖栗里喜培三徑菊錦江何羡四腮鱸夢回巫峽猿聲切目斷衡陽雁影迂白首歸來猶及養北堂稱壽學萊夫士大夫嘆曰隱君子也田本新都人淸心苦行博學好古結廬高隱不求聞逹年九十無疾而終劉䚸彭縣人受易於其父浩深得奥旨卽邑中文昌祠為書院聚鄉里俊髦與子士元日相琢磨值歲荒為粥賑饑凡戚屬不能喪葬者咸資之人服其德陳愛字處友華陽人成化間隱士洒落不羈以義自守文學宏博尤長於詩非賢長史不見嘗有臬使再至其門愛輒先逃臬使怒檄召將辱之庭愛從容以詩呈曰折簡慇懃累見尋布衣寧敢謁朝簪明公有道持身正賤子無知感德深柏府風霜尊偉望柴門山水遂閒心雲泥兩地無勞顧魚戀深淵鳥戀林乃解以授徒自給師道嚴整出其門者多俊良閭里愚氓亦知有陳先生也有華山人詩集傳世劉大昌别號珥江成都人嘉靖戊子鄉薦性恬淡高潔不樂仕進時内閣楊石齋先生當國大昌益引避不出日惟詩賦自娛絕迹公府常與楊用修太史倡和錦城大見稱賞用修著作多所訂正幕府聞其賢首訪之大昌堅避士君子咸高之朱之臣字菊水成都人萬厯間進士歴官所在著績崇禎初任江西右布政使因飛語逮繫刑部獄人咸為之臣危一夕莊烈帝夢兩僧在獄中笑語命内臣陰伺之則之臣與某對局談笑自若因釋之後官至刑部右侍郎退隱石城自號曰靑樵老叟年九十猶著書不輟里人咸矜式焉皇淸趙司鋐字退公彭縣人弱冠舉於鄉制府李國英敬其品學多與商論政務勸之仕弗應及殁國英哭曰若趙司鋐不愧靜正之士重慶府漢尹珍南川人桓帝時從汝南許愼學受五經還里設敎於鄉巴渝之人始知學宋譙定涪州人少學易於程頤頤貶涪定又從之靖康初召為崇政殿說書高宗卽位詔遣詣行在將大用之㑹北兵至定遂歸涪後居靑城山蜀人稱譙夫子云張宗範合州人有文行居嘉陵江建亭於學土山麓周濓溪至而愛之為名其亭李釣鼇綦江人長於吟咏好蒔菊作菊坡亭元雲山翁壁山人元末明氏據重慶以萬戸侯詔山翁不就結廬於五峯山有雲山詩集明趙天澤江津人元至正間至江東嘗同劉基游武林泛西湖見異雲起衆皆目為慶雲將分韻賦詩基獨滿飲不顧曰此天子氣也應在十年後有王者起我當輔之時杭城猶全盛諸人駭以為狂無知基者惟天澤奇之以為諸葛孔明之流乃為文以贈基天澤歸基亦以詩贈之胡子義大足人膺辟薦分敎威遠歴山東僉事聞兄子昭死節遂棄官避世隱於丹稜民家蜀獻王知而憐之生二子各已數歲乃語曰天不絕胡氏二子當免於難遂棄去不知所終子義有懷鄉詩曰一區廢宅棠山下半畆方塘夕照中鄉國匪遙身自遠乾坤雖大足難容鄧鎭永川人通六籍諸史善屬文性剛鯁議論持正成化中走京師以言忤權貴下錦衣獄拷掠折一足旣而赦回敎授於鄉以終鄒玉江津人隱居不仕詩多佳句月夜溪行云明月映溪天落鏡急流濺石水圓珠山居云樹色秋來減泉聲雨後增夜飲云淸香浮竹葉古調落梅花山行云好景須留戀浮名且罷休王儉銅梁人成化中嘗官都御史有政聲後削籍山居尤多高行余成歲合州人號太初所行俱敦古道處波靡中峻操凜然淸不絕俗和不混同恬不近名讀書博綜經史研究性學每求實踐不事空言以明經對詔大廷歸遂堅意不出儀型後學郡守羅式其廬曰孝友博學洵無愧潛德云何朝鳳長壽人㓜業儒長讀關閩濓洛書遂廢舉子業隱居西山力敦古道置義田義宅贍族賑貧恤孤拯急郡縣徵請不應帷敎子課農著書勸俗為務著有克已編袁氏功過格注年九十無疾終劉戡綦江人崇楨間貢生樂志林泉不求仕進以書史自娛年九十有六氣淸形健龔懋熙江津人生而穎異能識泰山石敢當五字七歲能文崇禎己卯舉於鄉時年十八旋登進士任太常博士後以養終歸里奉二人居山中怡情丘壑屢徵不起有厯圖四書講語梧竹居草鄧必感綦江人博學多識為士林模楷副使段師文聞其賢嘗造廬聽講周易題其門曰雲山數畝皇淸陳于夏江津人由貢生選梓潼訓導母張氏年十八孀居撫于夏成立至是老病難遠渉于夏遂辭職不赴家居養母沉酣典籍年八十卒有歴代典故抄林明儁字位旃酆都人學富經史甲申獻冦陷蜀從閣部王應熊討賊籌策多中後以病假歸屢徵不出隱居著述有澹遠堂巴子園桐梧居等集湯學尹黔江人年十二應童子試以能賦稱奇童後登康熙癸卯賢書黔邑兵燹之餘經學失傳學尹闡明易理敎授生徒盛暑嚴寒講習不倦名其齋曰勉菴潛心理學値吳逆之叛遁迹山林不履城市人稱為勉菴先生保寧府漢杜胄廣元人察孝亷明經不仕唐南中巴州人工詩隱居平凉仙洞宋王省劒州人太宗召對稱旨辭爵不受號清虛山人嚴大猷蒼溪人方山隱士吳曦叛於蜀大猷賦詩云笏未到時難擊泚兵如入手易擒吳有方山集四卷元袁大用南江人為四川制置總領元帥値亂歸再詔不起號隱君明鄭本昭化人登永樂甲午賢書雅志薖軸不樂仕進士林仰之賈瑄巴州人高尚其志足跡不入公府號白厓御史任儀亭曰淸風凜凜足以植名敎而激頽俗白厓有處士若增而高矣母道劒州人少警敏或試畫鵲應筆成詞充弟子員毎試冠軍後居艱遂臥不起士大夫强之出應明經受部牒遽還杜門蓋獨行君子也性孝友兼急人難所著書若干卷名東漁存稿藏於家梁一言劒州人少從墊師習句讀卽有志聖賢年旣富築室琴山談道講義郡守慕其高相繼造廬侍御馮空督學姜寶大學士夏言郡侯楊某皆題其門曰振古人豪曰劒南喬岳所著有心法要旨家塾彝訓三動錄恕齋文集詩學雜詠藏於家順慶府晉譙秀南充人譙周孫少靜黙郡察孝亷舉秀才皆不就李雄據蜀慕秀名徵之不應冠皮弁敝衣躬耕山藪桓溫滅蜀遣使勅所在有司四時存問唐蓬池隱者李太白金陵江上遇蓬池隱者詩心愛名山遊身隨名山遠羅浮麻姑臺此處或未返遇君蓬池隱就我石山飯空言不成懽强笑日已晚綠水向雁門黄雲蔽籠山嘆息兩客懷徘徊吳越間共語一執手留連夜將乆解我紫貂裘且換金陵酒酒來笑復歌興酣樂事多水影弄月色淸光奈愁何眀晨掛帆席離憾滿淸波其為太白所賞如此宋馮休南充人眞宗時不應辟召於小方山隱居著書李士寧蓬州人歐陽永叔詩蜀狂士寧者不邪亦不正混世使人疑詭譎非一行平生不把筆對酒時高詠初如不著意語出多竒勁傾財解人難去不道名姓金錢買酒醉高樓明月空床眠不醒一身四海卽為家獨來萬里聊乘興旣不採藥賣都市又不點石化黄金進不干公侯退不隱山林與之遊者但愛其人而莫見其術安知其心吾聞有道之士遊心太虛逍遙出入嘗與道俱故能入火不熱入水不濡嘗聞其語而未見其人也豈斯人之徒與不然言可純師行可純得而滑稽玩世其東方朔之流乎黄蓬石蓬州人嘉祐巖記稱李士寧黄蓬石擅名物表出處無考何羣西充人慶厯中在太學請復古制又上書言三代選士先行誼後世專以文詞請罷去詞賦科諫官御史亦以為言廷議韙其說而不行羣乃取平生所為賦八百餘篇焚之徑歸不復舉進士嘉祐中何剡表其行賜號安邑處士趙抃知益州奏羣遺稿云非若茂陵書也寢不下姚邦基岳池人舉進士知尉氏縣值劉豫僭竊邦基遂棄官去聚徒敎授隱於山林豫敗詔以京秩不就張先蓬州人南渡後取徐孺子傳讀而嘆曰危邦不入亂邦不居如徐孺子之制行斯可也遂潛修自得足迹不入城市墓在蓬池趙眞一師仁之後義不仕元隱居終身趙古則製碑比之伯夷氏明王鉞營山人永樂中中式隱居翠屏山不仕號竹壑老人言動不茍侍御史方昇贈以詩曰曽向蟾宫折桂花歸來林下度年華於今兩鬢俱成雪萬竹森森暮景賖趙之屏南充人嘉靖戊戌進士任大理評事多所平反歴貴陽憲副湖廣叅政征苗有功後致政歸讀書於方山洞著有洞林夢語石痀遺響等書趙祖益南充人精易學明性理著述博雅純正不作雕蟲語居鄉恂恂長者至老手不釋卷人稱嗜學醇儒王行之西充人嘉靖中貢生澹泊自甘絕意仕路化行鄉黨以敦本行為先甘鳴鶴字羽嘉隣水人明末貢生不樂仕進築室於老君山齋名天逸聚徒講學毎遇佳節率弟子登山臨水隨景吟咏有天逸齋稿年六十有四卒任準渠縣人博極羣書屢舉不第遂隱居著書有任子迂言籌畫寰區並周易解等書悉天人性命之理經世宰物之方學使聞而嘉之曰此吾鄉陳茂烈之流也表其門曰羽儀百世年七十終友人朝議大夫傅嘉行為之銘于仕華營山人㓜篤學遊太學思親衰老即日歸養安貧盡歡其孝思高志如此李兆襄南充人明經不仕敎授生徒講濓洛心性之學著述甚富皇淸傅惟淸字天一明末渠邑諸生博文强識高尚不仕撫軍李國英聞其名徵之居幕府數月即辭歸以壽終敘州府宋李見富順人嘗讀易神龜山著易樞天禧中上令附驛以聞不願仕進監司亦不能屈明劉琬郡人洪武初處士造舟活溺子孫至今有顯貴者何漢臣慶符人以貢赴京廷試遇新都楊愼於塗同作喜雨詩愼服其工至京以鄉人廣為延譽漢臣恥焉遂歸里隱峩眉山年八十有三卒著述甚富周一麟高縣人歲貢生不樂仕進蔬食水飲窮約自甘弟二麟拔貢生授貴州石阡府司理旋卽致仕退居畎畝訓誨生徒伯仲偕隱士林高之余仲高縣歲貢生矢志高尚山居讀書銓選不出皇淸李之藻珙縣人順治庚子舉人任合州學政課士有條滇南煽動遂隱遁深山尋卒鄧元功屏山人貢生康熙己丑訓導黔江因道路險遠不能迎養遂請致仕隱居奉二人菽水暇則讀書敎子三子俱明經夔州府宋王珪萬縣人築室南溪號志堂居士左右植松竹逍遙其下一時名流喜其高尚榜其居曰竹隱明熊士傑新寧人幼嗜學通曉經義及百家醫卜諸書隱居循禮有吟稿藏於家川中補鍋匠不知何許人徃來夔慶間為人補鍋至州邑不過三日卽去去或復來有欲學補鍋者即敎之補鍋不索謝錢直令負擔從有後學者至即令先學者去如是數年人皆識之呼為老鍋匠或售以錢布米亦不擇當食時與之食即不復索錢錢稍稍積囊中遇風雨寒暑不出補鍋以錢買酒飲自飲食嘗寄宿蕭寺一日於市中逢馮翁者二人相顧愕然已而相持哭哭已相牽入山巖中坐語竟日學補鍋者屏不得聞二人語語已又相持哭且别去言今永訣不可復相見後竟莫知所終或曰建文遺臣也馮翁亦不知何許人在夔州以章句敎童子給衣食能為對句及古詩詩尾輒自題馬二子或馬公或塞馬先生嘗作詩大書壁間云夜夢何奇特雲飛天漢津朝横滄海曲夕過滇池濱光雯皆五色蜿蜒無損鱗淵田變化間張主藉高旻後見補鍋匠歸即剷去時盖永樂甲申己酉間也後亦莫知所終皇淸沈巨儒字越鷄萬縣人明季避亂遂隱於山號西溪野人時總督李國英知其夙學勸之仕不應闢草堂以詩文自娛卒龍安府宋胡仲郡人隱居授徒徵辟皆不就名士許鼎輩師事之人呼其居為胡仲山皇清胡茂林平武人躬耕隴畝不入城市惟以詩禮訓課子孫享壽百有五歲人稱百歲翁邑令屢旌其門雅州府明梅元吉字復之州人自號夢周山人隱居不仕著述終老有雅安近紀程之緒蘆山人博綜書史善屬文性端方動合規矩隱居敎授著經濟内外篇祀鄉賢皇淸竹郎裔字水生蘆山人詩文下筆立就明季兵燹後舊家典籍皆為灰燼郎裔口授手書以敎後進時有興朝伏生之目竹全仁字冬茁蘆山人郎裔孫也能紹述祖志潛心經史縣令楊廷琚聘纂邑志採輯頗詳年六十餘貌若少壯著有中庸衍義李玉立字躬標號白衣州人性情恬澹不求名利傍祖墓結廬獨處二十餘年年七十卒有四書釋義香亭詩養心論諸集直𨽻嘉定州雍正十二年陞為府設樂山縣為附郭唐唐球州人不應王建辟嘗納詩稿瓢中投之江有見之者知為唐山人瓢接得之宋王庠榮縣人夢易子七歲能屬文早喪父哀痛深切與弟序閉戸窮經期繼父志未幾罷制科序嘆曰無愧先訓足矣復自陳與二蘇范純仁為知己係元祐黨屏居田里卒諡賢節王陽犍爲人與黄山谷遊山谷稱為高曠之士李圃州人淳熙中為忠州别駕歸隱白茅山築秀發齋淸風高節人至今慕之師伯渾犍為人陸放翁序其文集云伯渾文章英發鉅麗歌之淸廟刻之彝器然後為稱今一不可得而施顧退而為山巔水涯娛憂紓悲之言豈不可感哉明張瑛字玉華州人才器高邁性嗜學治詩書二經善屬文工詩孝親友弟俱可為鄉閭法潛德弗售郡守召之不應尹東郊字敬孚始為滇人父任榮縣令愛蜀中山水遂占籍嘉州東郊博學善為詩郡守魏瀚甚禮重之列其狀於朝將官之弗受人稱尹聘君云夏迪簡州人以選貢中崇禎壬午鄉試學行純粹隱居教授足不履公庭年八十不替所守士林重之梁應奇字平叔州人登崇禎戊辰進士為江南宣城令多惠政後遭亂避地牂牁不復求出皇淸萬月庚峩眉人康熙己酉舉人吳逆迫以偽職堅不出及吳逆殄滅凡抗節之士多採錄授官而月庚巳卒人咸惜之直𨽻眉州明余承勳靑神人進士官至翰林修撰嘉靖間議大禮被杖錦衣百戸王邦竒又假以建言邊情誣兵部主事楊惇惇子與承勳友善復罣誣被逮後復職還家著書三嵓山中四十餘年前後撫按屢為薦剡卒不起今三嵓深處猶有方池道院云直隷邛州漢胡安臨邛人隱居白鶴山講學司馬相如從之受經嚴遵字君平本姓莊避明帝諱改姓嚴臨邛人常賣卜成都市中與人子言依於孝與人弟言依於悌與人臣言依於忠日閲數人得百錢則閉肆下簾著周易揚雄毎稱之李疆為益州刺史欲辟為從事雄曰君但可見不能屈也疆見遵服其淸高以雄為知人云宋李繪州人舉八行不就以文史自娛所著有補註唐詩二百卷直隷潼川州雍正十二年陞為府設三臺縣為附郭漢王祐州人隱居不仕陳紀山善知人稱祐為天下高士馮信遂寧人博學好古公孫述累徵不就託目盲以自晦士林高之唐陳元敬射洪人倜儻豪俠歲饑發粟萬餘斛賑鄉里以明經擢第拜文林郎武后居攝遂山棲谷飲不復出馮中德樂至人博學能文有純雅之操不樂進取後進爭師事之子壻諸孫皆登科第趙𬎼鹽亭人明皇屢徵不起隱於梓州之長平山博考六經諸家同異著書號長短經明王霸大略李白嘗造其廬訪焉有詩載文苑嚴本鹽亭人震之父也負不羈才得遯世趣浪迹方外超然絶塵宋張震遂州人工文詞不仕所作有驀山溪詞二闋載在草堂詩餘王灼遂寧人文詞古雅隱居不仕所著糖霜譜一卷蘇伯起中江人易簡九世孫好古學聚書萬卷靡不窮搜劉德修舉賢良方正吳德夫以遺逸薦於朝皆不應牟煥中江人隱居讀書嘗鑿石龕藏書有銘人名其地曰牟公谷郭奕不知何許人初為宣司幹官紹興元年張浚自陜西歸過漫天坡奕為詩諷之因罷為通判不赴寓居普州以竇餅隱明楊襄字希臯安岳人淸修博洽累試不售作詩曰莫道儒冠解誤人時窮時達總吾身山中田地寛如許樵笠漁蓑都是春遂隱居瑞雲山四十餘年有瑞雲集數萬言一日盡焚之曰毋以是沽名也未幾卒申錫州人嘗作先天太極諸書自一歲一月一日一身皆有圖說至於九疇㑹極中央立極中星合極復分畫而附益之又作三易圖以釋其義讀書至老不倦謝秉德遂寧人性好讀書厚重質直不事華靡以古陳太丘自期許章愚遂寧人純孝根於天性絕意功名足跡不履城市周震州人博學能詩隱居不仕題潼川八景詩膾炙人口年九十作自輓詩無疾終人號之曰清風高士錢仁字考槃州人博極羣書善吟咏誦唐詩品類全部曁樂隱集有梅花三百詠著述極富嘗與郡守胡纘宗遊所居去州城百里足跡不至城市纘宗毎單騎就之直隷瀘州宋呂伯佑州人授徒於龍巖書院其徒文楊諸子相繼登科蕭子雲納溪人善詩文偽夏屢徵不就號石隱子有詩集為當時名流所推重云史扶州人與許沆同里隱居不仕以詩名與沆多賡和時號瀘南逸老明柳彦碩州人力學博覽刺史以明經累薦不起教授鄉閭後進俱登膴仕賀顒州人隱居不仕潛心經史家貧精河洛數以自給言動不踰矩矱士論擬之陳太丘云馮時字榕邨合江人少補博士弟子後棄巾服隱居食貧有司重其名希一面不可得嘗與新都楊愼為忘形交王統字蜀元合江人誅茅榕山下詩書自娛至老不倦里人評其品骨淸邁如露鶴溪松年七十餘卒張峩南合江人學問淵博不屑仕進與名流結青蓮社為文史之娛里中問字者咸執經造焉皇淸顔欽明州人舉孝亷潛心經史滇逆據蜀以虚文峻法迫脅士大夫欽明抗節不屈事平謁選赴京復以病歸結屋玉蟾山下二十餘年不入城市人稱堯日巢由直隷資州宋喻汝礪仁壽人有氣節工詩文靖安進士建炎初為祠部員外郎不附割三鎭之議聞金人立張邦昌遂掛冠歸隱於邛山之陽自號捫膝先生明陰秉衡字振平内江人隱居作文翰樓貯書千卷手不停披口不輟吟生平著述惓惓於天理人欲邪正之辨嘗叅酌朱子家禮為陰氏愼終錄又著婚禮節要鄉人呼之曰隱君子直隷綿州漢任安字定祖綿竹人少受太學孟氏易通數經行尚古道又從同郡楊厚仲桓學圖讖究極其奥時人稱曰居今行古任定祖欲知仲桓問任安明關大節安縣諸生性嗜潔有烟霞癖毎晨起必至水濱櫛沐徘徊瞻眺而返後應省試唱名日出遊錦水濱巾櫛畢而棘圍已扃遂浩然歸里散佚林泉終老焉趙顯貴安縣人雅慕高尚棄舉子業心游物外不入城市年七十無疾而逝舉棺甚輕人訝為尸解皇淸張性倫字桓宰安縣諸生寇亂建草堂於西巖種花自娛順治乙酉為獻賊所害趙熠字方開安縣人獻賊屠城安邑諸生二百人一時殆盡熠知幾先遁後遂棄儒服讀書終老王任閎梓潼人康熙壬子舉人吳逆僭亂强徵不出隱遁山中窮約終身年八十餘直隷達州宋樂喜聞州人築草廬於城西家貧授徒自給不事干謁與諸生談經日誦百篇未有倦意四川通志卷三十八之一欽定四庫全書四川通志卷三十八之一隱逸易稱漸陸詩詠考槃古隱君子者流類多混迹樵漁澹情軒冕士各有志無庸强耳蜀為山水奥區故遺滎守道之儒巖棲谷飲每有獨徃之蹤焉歴朝以來講君平之卜賣桃椎之屫者正不止一二輩要其寄懷沖澹如孤雲野鶴超然物表夫豈雋俗之士假㨗徑於終南索高價於少室者所可同日語哉作隱逸志成都府漢李𢎞字仲元成都人少讀五經得其精義不求利逹里中薰其德者班白不負擔男女不錯行後舉茂才不就羅充嘗遺以金固却之隱居衡門縕袍莞席揚子雲稱之曰不屈其志不辱其身不夷不惠居可否之間鴻安成都人與嚴君平友善君平卒安誄之曰無營無為澹然淵深楊厚字仲桓新都人父統精天文厚習父業順帝徵之拜議郎遷侍中梁冀以車馬遺之不受歸授門徒三千餘人李固徴之不起卒諡文父唐朱桃椎成都人高益州士廉遺以衣逃入山中夏則裸形冬則樹皮自覆每織芒屫置路旁見者皆言朱處士屫也易米置其地朱至夕取之終不見人宋孫知微字思邈成都人張詠鎭蜀雅慕之終不可致及還朝出劒閣一邨童持思邈畫以進詠問孫所在答曰已去遠矣馬知節守成都造訪解金帶以贈卽繫之苧袍人見其標韻蕭散皆以為李靑蓮也張愈字少愚一字淑才本晉人徙蜀居郫城性通敏㓜異凡兒篤嗜聖經並好漢書不讀百家言旣冠適四方與時之豪傑游日相薫炙業遂大成才豪氣逸武功蘇舜欽以詩豪當時一見愈大推服仁宗朝西戎入邊愈上書陳攻取十策寳元初除校書郎願以援父顯忠而自隱靑城山之白雲溪凡六辭召命文潞公有詩云欲作外臣誰是友白雲猿鶴在巖扉任易宗詩懶隨六品仕丹闕高臥一峯藏白雲所著詩文凡若干卷妻蒲氏亦知學文章精義有聲於時愈在靑城山常自為詩徧題壁上臨風對月翛然有高視一世之意聞佳山水不辭千里而徃愈卒蒲氏為文以悼之辭最工蜀士大夫多傳焉右丞何聖從銘其墓曰昔莊子之才子雲珍之謂其乆幽而不改其操今少愚亦隱於蜀不苟利欲不求聞達在莊之後十有餘歲其風凜然可以與之相追矣章詧字隱之雙流人博通經學尤長易太𤣥著發隱二篇蜀守蔣堂張方平趙抃咸以逸民薦於朝賜粟帛命為州助敎不就嘉祐中賜號沖退處士王素時為州守因更其居之鄉曰處士里曰通儒坊曰沖退詧導生養氣憂喜是非不膠於心常謂友人范百祿曰君子能强其所不足拂其所有餘太𤣥之道幾矣此子雲仁義之心予之於太𤣥述斯而已若苦其思難其言迂溺其所以為數而忘仁義之大惡足語道哉年七十六卒子禩好古學道所居猶存遺蹟郭長孺成都人風致閒逸遇人無貴賤悉禮下之然其中挺拔不倚終日劇談無戲語惟好書丹鉛點勘不去手自經史百氏浮屠黄老隂陽醫卜之術皆究其妙有易解書解道徳經解蔬食譜歌詩雜文等書又作孝行圖高逸圖陰陽雜證圖各為論述焉篐桶翁成都隱者程伊川在蜀嘗見其挾冊入市就視之則易也因質所疑酬答如響問其姓名不言及問未濟卦曰三陽皆失位也後袁滋問易於伊川曰易學在蜀郭震成都人博學能詩有飄然物表之志所著有漁舟集李畋稱其有孟郊風楊匯成都人杜門著書善賦詩人無知者邵伯溫為部使者薦其學行甚高淸節甚苦不報及卒學者謚為靜恭先生郭希樸華陽人以博學聞尤通於易任价以方郭林宗號有道先生能前知死生之故李畋為錄其事鄧至雙流人通六經學者從之甚衆每入市邑人皆拱立著徃事龜鑑通書一江集子綰翰林學士孫洵仁尚書洵文知樞密院事白如璧新都人博覽羣書隱居不仕避兵入山不食而死蘇雲卿漢州人紹興中寓豫章布褐草履終歲不易少與張浚為布衣交浚入相馳書函金幣屬帥漕致之帥漕因請見期之詰朝及翌日徃謁扃戸閴然書幣俱在而翁已遯去不知所徃元杜圭新都人勤學尚友通五經尤長於春秋隱居授徒來學者衆廬舍至不能容明楊敏字學可新都人師杜圭博通經史避兵雲南還蜀明玉珍廹之不仕洪武中命賜鈔歸隱蜀獻王給田八十畝贈云流水畫橋題柱客淸風精舍讀書人徐宗敬成都人博學工詩文自負甚高天順間被徵不起所著有中白子集傳於世徐䙗華陽人字山甫自㓜穎悟靜篤人鮮窺其涯際中正統丁卯鄉試再上公車遂絕意仕進撫按亷其賢薦除夷陵倅不受徧遊吳越以山水詩文自娛家居别築一室書孫綽體識𤣥遠出處同歸二語於壁間蓋自况云晚年德高行成當事欽慕片言隻字奉若典型或遇地方大事撫按就商之悉見之行事有欲輿致之者意不可得卒年九十九所著有忠愛堂稿行於世李政之簡州人正統間入鄉闈搜檢懷挾政之正色言曰國家掄才方勤咨訪乃令囚首裸足以希進取乎遂不入試隱居杜門嘉靖初卒張紹宗雙流人年九十六猶讀書談道隱竹溪業漁釣孔令入溪訪之與紹宗遇班荆而坐抽琴鼓南風之操賦詞十二首歌而贈之令扁其門曰竹溪淸隱汪懷字惟徳其先婺源人從祖指揮使居蜀懷少失父鞠於母從師苦學能詩文徃來吳楚以瞻母養一日寓吳賦懷歸詩曰乘舟淸夜鶴鳴孤一曲夷猶過鏡湖栗里喜培三徑菊錦江何羡四腮鱸夢回巫峽猿聲切目斷衡陽雁影迂白首歸來猶及養北堂稱壽學萊夫士大夫嘆曰隱君子也田本新都人淸心苦行博學好古結廬高隱不求聞逹年九十無疾而終劉䚸彭縣人受易於其父浩深得奥旨卽邑中文昌祠為書院聚鄉里俊髦與子士元日相琢磨值歲荒為粥賑饑凡戚屬不能喪葬者咸資之人服其德陳愛字處友華陽人成化間隱士洒落不羈以義自守文學宏博尤長於詩非賢長史不見嘗有臬使再至其門愛輒先逃臬使怒檄召將辱之庭愛從容以詩呈曰折簡慇懃累見尋布衣寧敢謁朝簪明公有道持身正賤子無知感德深柏府風霜尊偉望柴門山水遂閒心雲泥兩地無勞顧魚戀深淵鳥戀林乃解以授徒自給師道嚴整出其門者多俊良閭里愚氓亦知有陳先生也有華山人詩集傳世劉大昌别號珥江成都人嘉靖戊子鄉薦性恬淡高潔不樂仕進時内閣楊石齋先生當國大昌益引避不出日惟詩賦自娛絕迹公府常與楊用修太史倡和錦城大見稱賞用修著作多所訂正幕府聞其賢首訪之大昌堅避士君子咸高之朱之臣字菊水成都人萬厯間進士歴官所在著績崇禎初任江西右布政使因飛語逮繫刑部獄人咸為之臣危一夕莊烈帝夢兩僧在獄中笑語命内臣陰伺之則之臣與某對局談笑自若因釋之後官至刑部右侍郎退隱石城自號曰靑樵老叟年九十猶著書不輟里人咸矜式焉皇淸趙司鋐字退公彭縣人弱冠舉於鄉制府李國英敬其品學多與商論政務勸之仕弗應及殁國英哭曰若趙司鋐不愧靜正之士重慶府漢尹珍南川人桓帝時從汝南許愼學受五經還里設敎於鄉巴渝之人始知學宋譙定涪州人少學易於程頤頤貶涪定又從之靖康初召為崇政殿說書高宗卽位詔遣詣行在將大用之㑹北兵至定遂歸涪後居靑城山蜀人稱譙夫子云張宗範合州人有文行居嘉陵江建亭於學土山麓周濓溪至而愛之為名其亭李釣鼇綦江人長於吟咏好蒔菊作菊坡亭元雲山翁壁山人元末明氏據重慶以萬戸侯詔山翁不就結廬於五峯山有雲山詩集明趙天澤江津人元至正間至江東嘗同劉基游武林泛西湖見異雲起衆皆目為慶雲將分韻賦詩基獨滿飲不顧曰此天子氣也應在十年後有王者起我當輔之時杭城猶全盛諸人駭以為狂無知基者惟天澤奇之以為諸葛孔明之流乃為文以贈基天澤歸基亦以詩贈之胡子義大足人膺辟薦分敎威遠歴山東僉事聞兄子昭死節遂棄官避世隱於丹稜民家蜀獻王知而憐之生二子各已數歲乃語曰天不絕胡氏二子當免於難遂棄去不知所終子義有懷鄉詩曰一區廢宅棠山下半畆方塘夕照中鄉國匪遙身自遠乾坤雖大足難容鄧鎭永川人通六籍諸史善屬文性剛鯁議論持正成化中走京師以言忤權貴下錦衣獄拷掠折一足旣而赦回敎授於鄉以終鄒玉江津人隱居不仕詩多佳句月夜溪行云明月映溪天落鏡急流濺石水圓珠山居云樹色秋來減泉聲雨後增夜飲云淸香浮竹葉古調落梅花山行云好景須留戀浮名且罷休王儉銅梁人成化中嘗官都御史有政聲後削籍山居尤多高行余成歲合州人號太初所行俱敦古道處波靡中峻操凜然淸不絕俗和不混同恬不近名讀書博綜經史研究性學每求實踐不事空言以明經對詔大廷歸遂堅意不出儀型後學郡守羅式其廬曰孝友博學洵無愧潛德云何朝鳳長壽人㓜業儒長讀關閩濓洛書遂廢舉子業隱居西山力敦古道置義田義宅贍族賑貧恤孤拯急郡縣徵請不應帷敎子課農著書勸俗為務著有克已編袁氏功過格注年九十無疾終劉戡綦江人崇楨間貢生樂志林泉不求仕進以書史自娛年九十有六氣淸形健龔懋熙江津人生而穎異能識泰山石敢當五字七歲能文崇禎己卯舉於鄉時年十八旋登進士任太常博士後以養終歸里奉二人居山中怡情丘壑屢徵不起有厯圖四書講語梧竹居草鄧必感綦江人博學多識為士林模楷副使段師文聞其賢嘗造廬聽講周易題其門曰雲山數畝皇淸陳于夏江津人由貢生選梓潼訓導母張氏年十八孀居撫于夏成立至是老病難遠渉于夏遂辭職不赴家居養母沉酣典籍年八十卒有歴代典故抄林明儁字位旃酆都人學富經史甲申獻冦陷蜀從閣部王應熊討賊籌策多中後以病假歸屢徵不出隱居著述有澹遠堂巴子園桐梧居等集湯學尹黔江人年十二應童子試以能賦稱奇童後登康熙癸卯賢書黔邑兵燹之餘經學失傳學尹闡明易理敎授生徒盛暑嚴寒講習不倦名其齋曰勉菴潛心理學値吳逆之叛遁迹山林不履城市人稱為勉菴先生保寧府漢杜胄廣元人察孝亷明經不仕唐南中巴州人工詩隱居平凉仙洞宋王省劒州人太宗召對稱旨辭爵不受號清虛山人嚴大猷蒼溪人方山隱士吳曦叛於蜀大猷賦詩云笏未到時難擊泚兵如入手易擒吳有方山集四卷元袁大用南江人為四川制置總領元帥値亂歸再詔不起號隱君明鄭本昭化人登永樂甲午賢書雅志薖軸不樂仕進士林仰之賈瑄巴州人高尚其志足跡不入公府號白厓御史任儀亭曰淸風凜凜足以植名敎而激頽俗白厓有處士若增而高矣母道劒州人少警敏或試畫鵲應筆成詞充弟子員毎試冠軍後居艱遂臥不起士大夫强之出應明經受部牒遽還杜門蓋獨行君子也性孝友兼急人難所著書若干卷名東漁存稿藏於家梁一言劒州人少從墊師習句讀卽有志聖賢年旣富築室琴山談道講義郡守慕其高相繼造廬侍御馮空督學姜寶大學士夏言郡侯楊某皆題其門曰振古人豪曰劒南喬岳所著有心法要旨家塾彝訓三動錄恕齋文集詩學雜詠藏於家順慶府晉譙秀南充人譙周孫少靜黙郡察孝亷舉秀才皆不就李雄據蜀慕秀名徵之不應冠皮弁敝衣躬耕山藪桓溫滅蜀遣使勅所在有司四時存問唐蓬池隱者李太白金陵江上遇蓬池隱者詩心愛名山遊身隨名山遠羅浮麻姑臺此處或未返遇君蓬池隱就我石山飯空言不成懽强笑日已晚綠水向雁門黄雲蔽籠山嘆息兩客懷徘徊吳越間共語一執手留連夜將乆解我紫貂裘且換金陵酒酒來笑復歌興酣樂事多水影弄月色淸光奈愁何眀晨掛帆席離憾滿淸波其為太白所賞如此宋馮休南充人眞宗時不應辟召於小方山隱居著書李士寧蓬州人歐陽永叔詩蜀狂士寧者不邪亦不正混世使人疑詭譎非一行平生不把筆對酒時高詠初如不著意語出多竒勁傾財解人難去不道名姓金錢買酒醉高樓明月空床眠不醒一身四海卽為家獨來萬里聊乘興旣不採藥賣都市又不點石化黄金進不干公侯退不隱山林與之遊者但愛其人而莫見其術安知其心吾聞有道之士遊心太虛逍遙出入嘗與道俱故能入火不熱入水不濡嘗聞其語而未見其人也豈斯人之徒與不然言可純師行可純得而滑稽玩世其東方朔之流乎黄蓬石蓬州人嘉祐巖記稱李士寧黄蓬石擅名物表出處無考何羣西充人慶厯中在太學請復古制又上書言三代選士先行誼後世專以文詞請罷去詞賦科諫官御史亦以為言廷議韙其說而不行羣乃取平生所為賦八百餘篇焚之徑歸不復舉進士嘉祐中何剡表其行賜號安邑處士趙抃知益州奏羣遺稿云非若茂陵書也寢不下姚邦基岳池人舉進士知尉氏縣值劉豫僭竊邦基遂棄官去聚徒敎授隱於山林豫敗詔以京秩不就張先蓬州人南渡後取徐孺子傳讀而嘆曰危邦不入亂邦不居如徐孺子之制行斯可也遂潛修自得足迹不入城市墓在蓬池趙眞一師仁之後義不仕元隱居終身趙古則製碑比之伯夷氏明王鉞營山人永樂中中式隱居翠屏山不仕號竹壑老人言動不茍侍御史方昇贈以詩曰曽向蟾宫折桂花歸來林下度年華於今兩鬢俱成雪萬竹森森暮景賖趙之屏南充人嘉靖戊戌進士任大理評事多所平反歴貴陽憲副湖廣叅政征苗有功後致政歸讀書於方山洞著有洞林夢語石痀遺響等書趙祖益南充人精易學明性理著述博雅純正不作雕蟲語居鄉恂恂長者至老手不釋卷人稱嗜學醇儒王行之西充人嘉靖中貢生澹泊自甘絕意仕路化行鄉黨以敦本行為先甘鳴鶴字羽嘉隣水人明末貢生不樂仕進築室於老君山齋名天逸聚徒講學毎遇佳節率弟子登山臨水隨景吟咏有天逸齋稿年六十有四卒任準渠縣人博極羣書屢舉不第遂隱居著書有任子迂言籌畫寰區並周易解等書悉天人性命之理經世宰物之方學使聞而嘉之曰此吾鄉陳茂烈之流也表其門曰羽儀百世年七十終友人朝議大夫傅嘉行為之銘于仕華營山人㓜篤學遊太學思親衰老即日歸養安貧盡歡其孝思高志如此李兆襄南充人明經不仕敎授生徒講濓洛心性之學著述甚富皇淸傅惟淸字天一明末渠邑諸生博文强識高尚不仕撫軍李國英聞其名徵之居幕府數月即辭歸以壽終敘州府宋李見富順人嘗讀易神龜山著易樞天禧中上令附驛以聞不願仕進監司亦不能屈明劉琬郡人洪武初處士造舟活溺子孫至今有顯貴者何漢臣慶符人以貢赴京廷試遇新都楊愼於塗同作喜雨詩愼服其工至京以鄉人廣為延譽漢臣恥焉遂歸里隱峩眉山年八十有三卒著述甚富周一麟高縣人歲貢生不樂仕進蔬食水飲窮約自甘弟二麟拔貢生授貴州石阡府司理旋卽致仕退居畎畝訓誨生徒伯仲偕隱士林高之余仲高縣歲貢生矢志高尚山居讀書銓選不出皇淸李之藻珙縣人順治庚子舉人任合州學政課士有條滇南煽動遂隱遁深山尋卒鄧元功屏山人貢生康熙己丑訓導黔江因道路險遠不能迎養遂請致仕隱居奉二人菽水暇則讀書敎子三子俱明經夔州府宋王珪萬縣人築室南溪號志堂居士左右植松竹逍遙其下一時名流喜其高尚榜其居曰竹隱明熊士傑新寧人幼嗜學通曉經義及百家醫卜諸書隱居循禮有吟稿藏於家川中補鍋匠不知何許人徃來夔慶間為人補鍋至州邑不過三日卽去去或復來有欲學補鍋者即敎之補鍋不索謝錢直令負擔從有後學者至即令先學者去如是數年人皆識之呼為老鍋匠或售以錢布米亦不擇當食時與之食即不復索錢錢稍稍積囊中遇風雨寒暑不出補鍋以錢買酒飲自飲食嘗寄宿蕭寺一日於市中逢馮翁者二人相顧愕然已而相持哭哭已相牽入山巖中坐語竟日學補鍋者屏不得聞二人語語已又相持哭且别去言今永訣不可復相見後竟莫知所終或曰建文遺臣也馮翁亦不知何許人在夔州以章句敎童子給衣食能為對句及古詩詩尾輒自題馬二子或馬公或塞馬先生嘗作詩大書壁間云夜夢何奇特雲飛天漢津朝横滄海曲夕過滇池濱光雯皆五色蜿蜒無損鱗淵田變化間張主藉高旻後見補鍋匠歸即剷去時盖永樂甲申己酉間也後亦莫知所終皇淸沈巨儒字越鷄萬縣人明季避亂遂隱於山號西溪野人時總督李國英知其夙學勸之仕不應闢草堂以詩文自娛卒龍安府宋胡仲郡人隱居授徒徵辟皆不就名士許鼎輩師事之人呼其居為胡仲山皇清胡茂林平武人躬耕隴畝不入城市惟以詩禮訓課子孫享壽百有五歲人稱百歲翁邑令屢旌其門雅州府明梅元吉字復之州人自號夢周山人隱居不仕著述終老有雅安近紀程之緒蘆山人博綜書史善屬文性端方動合規矩隱居敎授著經濟内外篇祀鄉賢皇淸竹郎裔字水生蘆山人詩文下筆立就明季兵燹後舊家典籍皆為灰燼郎裔口授手書以敎後進時有興朝伏生之目竹全仁字冬茁蘆山人郎裔孫也能紹述祖志潛心經史縣令楊廷琚聘纂邑志採輯頗詳年六十餘貌若少壯著有中庸衍義李玉立字躬標號白衣州人性情恬澹不求名利傍祖墓結廬獨處二十餘年年七十卒有四書釋義香亭詩養心論諸集直𨽻嘉定州雍正十二年陞為府設樂山縣為附郭唐唐球州人不應王建辟嘗納詩稿瓢中投之江有見之者知為唐山人瓢接得之宋王庠榮縣人夢易子七歲能屬文早喪父哀痛深切與弟序閉戸窮經期繼父志未幾罷制科序嘆曰無愧先訓足矣復自陳與二蘇范純仁為知己係元祐黨屏居田里卒諡賢節王陽犍爲人與黄山谷遊山谷稱為高曠之士李圃州人淳熙中為忠州别駕歸隱白茅山築秀發齋淸風高節人至今慕之師伯渾犍為人陸放翁序其文集云伯渾文章英發鉅麗歌之淸廟刻之彝器然後為稱今一不可得而施顧退而為山巔水涯娛憂紓悲之言豈不可感哉明張瑛字玉華州人才器高邁性嗜學治詩書二經善屬文工詩孝親友弟俱可為鄉閭法潛德弗售郡守召之不應尹東郊字敬孚始為滇人父任榮縣令愛蜀中山水遂占籍嘉州東郊博學善為詩郡守魏瀚甚禮重之列其狀於朝將官之弗受人稱尹聘君云夏迪簡州人以選貢中崇禎壬午鄉試學行純粹隱居教授足不履公庭年八十不替所守士林重之梁應奇字平叔州人登崇禎戊辰進士為江南宣城令多惠政後遭亂避地牂牁不復求出皇淸萬月庚峩眉人康熙己酉舉人吳逆迫以偽職堅不出及吳逆殄滅凡抗節之士多採錄授官而月庚巳卒人咸惜之直𨽻眉州明余承勳靑神人進士官至翰林修撰嘉靖間議大禮被杖錦衣百戸王邦竒又假以建言邊情誣兵部主事楊惇惇子與承勳友善復罣誣被逮後復職還家著書三嵓山中四十餘年前後撫按屢為薦剡卒不起今三嵓深處猶有方池道院云直隷邛州漢胡安臨邛人隱居白鶴山講學司馬相如從之受經嚴遵字君平本姓莊避明帝諱改姓嚴臨邛人常賣卜成都市中與人子言依於孝與人弟言依於悌與人臣言依於忠日閲數人得百錢則閉肆下簾著周易揚雄毎稱之李疆為益州刺史欲辟為從事雄曰君但可見不能屈也疆見遵服其淸高以雄為知人云宋李繪州人舉八行不就以文史自娛所著有補註唐詩二百卷直隷潼川州雍正十二年陞為府設三臺縣為附郭漢王祐州人隱居不仕陳紀山善知人稱祐為天下高士馮信遂寧人博學好古公孫述累徵不就託目盲以自晦士林高之唐陳元敬射洪人倜儻豪俠歲饑發粟萬餘斛賑鄉里以明經擢第拜文林郎武后居攝遂山棲谷飲不復出馮中德樂至人博學能文有純雅之操不樂進取後進爭師事之子壻諸孫皆登科第趙𬎼鹽亭人明皇屢徵不起隱於梓州之長平山博考六經諸家同異著書號長短經明王霸大略李白嘗造其廬訪焉有詩載文苑嚴本鹽亭人震之父也負不羈才得遯世趣浪迹方外超然絶塵宋張震遂州人工文詞不仕所作有驀山溪詞二闋載在草堂詩餘王灼遂寧人文詞古雅隱居不仕所著糖霜譜一卷蘇伯起中江人易簡九世孫好古學聚書萬卷靡不窮搜劉德修舉賢良方正吳德夫以遺逸薦於朝皆不應牟煥中江人隱居讀書嘗鑿石龕藏書有銘人名其地曰牟公谷郭奕不知何許人初為宣司幹官紹興元年張浚自陜西歸過漫天坡奕為詩諷之因罷為通判不赴寓居普州以竇餅隱明楊襄字希臯安岳人淸修博洽累試不售作詩曰莫道儒冠解誤人時窮時達總吾身山中田地寛如許樵笠漁蓑都是春遂隱居瑞雲山四十餘年有瑞雲集數萬言一日盡焚之曰毋以是沽名也未幾卒申錫州人嘗作先天太極諸書自一歲一月一日一身皆有圖說至於九疇㑹極中央立極中星合極復分畫而附益之又作三易圖以釋其義讀書至老不倦謝秉德遂寧人性好讀書厚重質直不事華靡以古陳太丘自期許章愚遂寧人純孝根於天性絕意功名足跡不履城市周震州人博學能詩隱居不仕題潼川八景詩膾炙人口年九十作自輓詩無疾終人號之曰清風高士錢仁字考槃州人博極羣書善吟咏誦唐詩品類全部曁樂隱集有梅花三百詠著述極富嘗與郡守胡纘宗遊所居去州城百里足跡不至城市纘宗毎單騎就之直隷瀘州宋呂伯佑州人授徒於龍巖書院其徒文楊諸子相繼登科蕭子雲納溪人善詩文偽夏屢徵不就號石隱子有詩集為當時名流所推重云史扶州人與許沆同里隱居不仕以詩名與沆多賡和時號瀘南逸老明柳彦碩州人力學博覽刺史以明經累薦不起教授鄉閭後進俱登膴仕賀顒州人隱居不仕潛心經史家貧精河洛數以自給言動不踰矩矱士論擬之陳太丘云馮時字榕邨合江人少補博士弟子後棄巾服隱居食貧有司重其名希一面不可得嘗與新都楊愼為忘形交王統字蜀元合江人誅茅榕山下詩書自娛至老不倦里人評其品骨淸邁如露鶴溪松年七十餘卒張峩南合江人學問淵博不屑仕進與名流結青蓮社為文史之娛里中問字者咸執經造焉皇淸顔欽明州人舉孝亷潛心經史滇逆據蜀以虚文峻法迫脅士大夫欽明抗節不屈事平謁選赴京復以病歸結屋玉蟾山下二十餘年不入城市人稱堯日巢由直隷資州宋喻汝礪仁壽人有氣節工詩文靖安進士建炎初為祠部員外郎不附割三鎭之議聞金人立張邦昌遂掛冠歸隱於邛山之陽自號捫膝先生明陰秉衡字振平内江人隱居作文翰樓貯書千卷手不停披口不輟吟生平著述惓惓於天理人欲邪正之辨嘗叅酌朱子家禮為陰氏愼終錄又著婚禮節要鄉人呼之曰隱君子直隷綿州漢任安字定祖綿竹人少受太學孟氏易通數經行尚古道又從同郡楊厚仲桓學圖讖究極其奥時人稱曰居今行古任定祖欲知仲桓問任安明關大節安縣諸生性嗜潔有烟霞癖毎晨起必至水濱櫛沐徘徊瞻眺而返後應省試唱名日出遊錦水濱巾櫛畢而棘圍已扃遂浩然歸里散佚林泉終老焉趙顯貴安縣人雅慕高尚棄舉子業心游物外不入城市年七十無疾而逝舉棺甚輕人訝為尸解皇淸張性倫字桓宰安縣諸生寇亂建草堂於西巖種花自娛順治乙酉為獻賊所害趙熠字方開安縣人獻賊屠城安邑諸生二百人一時殆盡熠知幾先遁後遂棄儒服讀書終老王任閎梓潼人康熙壬子舉人吳逆僭亂强徵不出隱遁山中窮約終身年八十餘直隷達州宋樂喜聞州人築草廬於城西家貧授徒自給不事干謁與諸生談經日誦百篇未有倦意四川通志卷三十八之一欽定四庫全書四川通志卷三十八之二流寓自昔英人哲士其旅寄所至每令人流連俯仰且謹識之以示無忘覺名勝之蹟亦有藉以增色者焉蜀為蠶叢之國古稱行路難矣而山川之峭深風氣之古樸在搜竒攬異之士徃徃來游來歌甚且畱之遲乆而不能去彼其淸風雅槩不但與蜀土名賢相得而益彰即千百載下追踪高躅者猶當憑眺興懷慨然有餘慕耳作流寓志成都府唐杜甫字子美本襄陽人先世徙河南鞏縣肅宗乾元二年冬甫入蜀上元元年卜居成都西郭浣花溪上成都尹裴冕為築室堂嚴武再鎭蜀表為叅謀檢校工部員外郎待之甚厚嘗詣草堂訪之甫為詩渾涵汪洋千彚萬狀兼古人今人而有之忠不忘君情見乎詞又善陳時事人稱詩史段成式字柯古臨淄人為校書郎博學强記多竒篇秘籍父文昌鎭成都成式侍父於蜀為書工麗所引故實多前人所未用者人咸驚異之著酉陽雜爼記蜀事甚多張古道臨淄人唐景福中進士為右拾遺時方鎭擅兵古道上疏詞語切直謫施州司戸叅軍後入蜀變姓名賣卜導江靑城市中王建據蜀召為武部郎中至玉壘關謂所親曰吾唐室諌臣雖召必死死之日𦵏我於關東不毛之地題曰唐左補闕張古道墓可也後果遇害五代母昭裔字知古中州人貧時借文選於交遊見有難色遂發憤曰異日若貴當鏤板以遺學者後避難依孟蜀仕至宰相遂鏤文選諸書宋程顥字伯淳弟頤字正叔河南人父珦守廣漢顥與頤皆隨侍嘗遊成都見治篾篐桶者挾冊吟誦就視之則易也因論未濟灝兄弟爽然有悟後語袁滋曰易學在蜀滋入成都見賣醬薛翁與語大悅盖篾叟醬翁皆隱君子也姚平仲山西人靖康中為太尉金人圍成都平仲夜出將士攻敵營不克去隱靑城山建炎初揭榜以觀察召之不出淳熙間人於丈人山見之年已百餘宋汝爲豐縣人建炎初呂頤浩使致書劉豫遇烏珠軍為所得紹興中亡歸授處州通判後南北議合秦檜忌汝為言金人機事將械送金汝爲變姓名徒走入蜀靑城山而卒有忠嘉集一卷安世通陜西人隱居靑城山中吳曦反乃獻書於成都帥楊輔勸其舉義言甚深切輔未能從遂東如江陵請吳獵討之及曦敗獵使蜀蜀士爭推重世通獵優禮之明鄭彥文蔚州人仕元為萬戸入蜀居彭城因家焉明平蜀彥文率土官首先歸附授貴州宣慰使洪武六年調潼川知州未幾仍改宣慰使從征雲南有功進工部侍郎卒於官王紳金華人待制禕之仲子洪武間任成都府訓導父使元梁王為其所殺藁𦵏雲南紳冒險徃求遺骨歸蜀蜀獻王甚重之宋濓字景濓浦江人明初仕至學士上欲俾叅大政固辭濓素不勝杯酌嘗與内宴上强之至三觴行不成歩上親賦楚辭三章以賜仍命侍臣咸賦醉學士歌且曰俾後世知朕君臣樂若此也濓旣司制作之柄文章輝燦求者集門日本得濓潛溪集鏤板國中高麗安南使者請文以百金為獻郤不受平居布衣蔬食無異貧士自少至老未嘗一日廢書及致仕歸靑蘿山閉戸纂述洪武十三年濓孫愼以罪被劾安置濓於茂州子瓚隨侍入蜀間關萬里濓卒於夔而瓚亦殁瓚之從子懌以孤童治喪蜀王夙欽濓為名儒碩德遂移柩於成都葬之方孝孺字希直寧海人蜀獻王椿建國成都聘孝孺為世子傅表其居曰正學以風蜀人累官翰林承旨文皇靖難命草詔不屈死嚴安海寧人宋濓甥也任戸部主事因宋愼坐不法編戍茂州子茂博學善屬文茂州碑刻皆出其手當路愛其文行優禮之其子孫遷居於灌口陳以莊字子臨貴州永寧衛舉人嘉靖丙辰知成都有訟盗牛殺人者牛與屍俱不可踪跡以莊齋沐禱神祠感異夢依夢求之罪人卽得屍與牛俱在後因採辦大木事落職盡俸資並鬻產以償竟不能歸然以莊經營木政頗乆多得要領蜀中再値採辦當道數咨問萬厯初征都蠻巡撫曽省吾聘叅軍謀凱還遂居成都皇淸黄霖字玉符浙江鄞縣人性嗜學通經濟遨遊江湖至成都慕浣花勝槪遂卜居焉著有山鷄集四卷蜀紀畧二十四卷重慶府唐長孫無忌洛陽人性通悟與褚遂良同受太宗顧命悉心奉國有蹇蹇匪躬之風高宗欲廢后立武昭儀無忌立爭之許敬宗揣合武氏意陰令洛陽令上無忌變事詔削宗爵以揚州都督安置黔州卒宋范鎭華陽人舉進士累官翰林學士論新法不合以戸部侍郎致仕晚居江津卒葬長池里後人賢之名其邨曰范鎭邨云程頤哲宗時擢崇政殿說書紹聖間削籍竄涪州頤至州居北巖山注易傳所授皆為名士涪人崇把之王充順慶人遊黔南時黄庭堅謫於涪與充相愛甚篤庭堅書曰南充王子美其質溫粹乆與之游見其誠心而不疑循理而兢兢李仔字任道梓州人黄庭堅與王觀復書云有李仔任道者梓州人流寓江津二十餘年言物行恆叅道得要老成人也尹焞洛陽人少師事程頤靖康初以薦召至京師不欲畱賜號和靖處士金人入洛闔門遇害焞死復甦劉豫屢以禮聘不從乃自商州奔閬紹興四年止於涪就頤注易北巖山闢三畏齋涪人多宗之杜莘老靑神人子美十三世孫累官殿中侍御史後直顯謨閣知遂寧府晚居江津卒葬杜邨虞允文過江津題其墓曰剛直御史蘇過東坡子以謫官徙居江津縣聖鍾里子孫因家焉其後裔蘇伯瑜者以賢名世史用之眉山人出處未詳崇德廟碑文乃其所撰立論純正典則又長壽鳳山之麓有石刻讀書二大字傍識云端平三年鶴山赴召過樂溫為史子作其賢可知矣劉彝福州人累官直史館知桂州時禁與交人互市及交阯陷欽連等州彝坐貶官安置隨州尋除名為民編隷涪州明馬文升河南禹州人兵部侍郎忤太監汪直謫戍重慶衛直敗以公論起為吏部尚書卒諡端肅保寧府漢嚴遵字君平臨卭人嘗居南部蘭登觀朝自觀發徃蓬溪暮還宿觀中日以為常唐鄭谷字守愚宜春人乾寧間為都官郎中後避亂入蜀寓巴州有雲臺編等集傳世鄭畋勛陽人子凝淸迎養於通江羅隱字昭諫新淦人因亂入蜀隱居劒門徃來劒綿之間吟咏猶有存者宋孫知微字思邈成都人嘗採藥至保寧有孫氏池亭故址石刻尚存文彥博介休人㓜侍父監征閬州有道士異之曰公南極之精降為國之申甫遂號南極眞子周惇頤字茂叔道州人少為合州主簿嘗詣南部謁尚書左丞蒲宗孟宗孟與語移日嘆曰天下有此人耶顧予所為内省尚疚對此乃如青天白日矣聞其未娶遂以妹歸之李好義秦州下邽人與兄好古俱寓閬中好義初為吳曦部將累擊敗金人有功及曦叛好義結李貴楊巨源討斬之歴官中軍統制順慶府漢司馬相如成都人僑居蓬州故宅存焉宅畔有琴臺後人立祠祀之唐李白彰明人周遊四方經宕渠地有詩李淳風知星象訪袁天綱於蜀曽寓宕渠崔塗字禮山光啓中進士善詩嘗避亂宕渠沖霄寺詩刻尚存宋黎嵩浮梁人建隆初入蜀居廣安其孫錞最名於世蘇軾眉山人熙寧中寓廣安山寺今名來蘇寺碑刻尚存范正己姑蘇人文正公第三子純禮之子在官奉法守節不撓抗章論事知無不言後値金兵逼境徒歩㩦㓜至蜀蓬州因家焉何造成都人徙居蓬州其子絳孫修甫曾孫格非相繼登第有三桂堂元孔敬宣聖五十六代孫元統中寓居於渠多詩文張大悅寳鷄人泰定初寓蓬倡義保障鄉閭後封咸安郡侯張德潤大悅子襲封咸安郡侯首倡捐俸修聖廟及兩廡明雪菴和尚不知何許人靖難初至順慶愛善慶里山水奇絕里中有杜景賢者知其非常人為寺居之和尚朝夕讀易其中又嗜楚詞毎袖一本登小舟急棹中流朗誦一葉輒投一葉於水投已則哭哭已復誦終卷乃已衆莫測謂何或曰此松陽葉希賢也建文時曾為御史云李鐸光化人父智任蓬州學正因占籍永樂中舉孝亷授畧陽敎諭嘗陳保釐十二策被召入京待問一年復任著補註顏子集並詩稿行於世敘州府宋黄庭堅字魯直江西分寧人宋紹聖初貶涪州别駕移戎州安置蜀士從學者千計自號涪翁司馬子已洛陽人溫公七世孫寓居戎州該通理學不事科舉以清白名世元趙祖仝豫章人僑寓富順隱居讀書志行純潔鄉閭以為矜式善屬文凡郡邑碑刻皆出其手夔州府楚宋玉屈原弟子為楚大夫原沉汨羅玉作招魂以悲其志後常居巫山又作高唐神女賦托詞以諷襄王漢揚雄字子雲成都人其父寓巫山生雄及長博學善屬文與司馬相如先後齊名論者謂鍾十二峯之秀云五代庾子輿新野人性至孝其父守蜀卒喪遇巴峽時瞿塘秋水漲不可行子輿叩天水為退數十丈舟旣過水復漲如初行人語曰灩澦如牛本不通瞿塘水退為庾公在途有雙雀巢於舟至家又巢於庭後仕為尚書郎唐杜甫卜居成都叅嚴武軍事大厯初武卒蜀亂甫乃從江遊嘉戎次雲安居東屯在夔著詩四百餘首論者謂子美夔州以後詩益工云宋冦準萊州人太平興國初知巴東縣嘗賦詩云野水無人渡孤舟盡日横識者知其有宰相器愛夔山水嘗以公暇徜徉其間又愛溪水淸冽取以烹茗後入相夔人建橋溪上名為相公橋周惇頤嘉祐元年以太子中舎僉書合州判官事泝峽至秭歸聞龍昌洞之勝徃遊焉遂道於夔以至合州五年六月先生解僉判出峽東歸轉通判䖍州則夔乃先生過化地也邵雍洛陽人遊雲安築演易臺明宋濓累官翰林承旨安置茂州卒於夔余郁淳安人為御史亷介公正以事謫夔築竹坡以居澹然自適後卒子孫籍奉節陳良翰字景紳羅江人正德中由主事謫戍瞿塘張翀字習之潼川人有風節嘉靖中以議大禮謫戍瞿塘楊名字公實遂寧人有文章氣節以直言忤旨謫戍瞿塘多所著咏嘗修大昌縣志又與楊太史愼修省志號稱博洽云寧遠府唐元􅓶申州義陽人亷介有守以裴炎故流死巂州雅州府宋文同字與可潼川人以學行名操韻高潔嘗入雅州為王潛書濯纓序直隷嘉定州雍正十二年陞為府周陸通卽楚狂接輿也春秋時王使使聘通於江南通大笑不應妻曰妾與先生射耕而食紡績而衣據義而動樂亦足矣今受人重祿乘人良駟食人醲肥將何以待之通曰吾未許其聘也妻又曰君命不從非忠也不如去之遂以通變易姓名入蜀峩眉山隱焉漢竇誼居蜀之峩眉縣放浪不羈月夜子規啼竹上誼曰竹裂吾可歸峩峯是夕竹裂黎明遁於峩峯武帝三徵不起揚雄西漢末隱居犍為有揚雄山晉郭璞字景純聞喜人入蜀寓居嘉州烏尤山註爾雅洗墨山中魚吞墨水至今有烏頭魚唐李白讀書於鎬岡黄庭堅建太白亭於山之絕頂有登峩眉及平羌江等詩宋蘇軾讀書於嘉州有東坡書院至今以蘇稽名鄉人嘗拾其遺硯程公望寓居白厓山註易蘇文公嘗㩦二子從之授業黄庭堅謫戎州寓居嘉州後居涪翁亭遺址尚存邵伯溫洛陽人父康節嘗曰世亂蜀可居及宣和末伯溫使蜀盡室以行家於嘉州得免於難今犍為紫雲城乃伯溫故業也晁公武字子正澶州人靖康末避亂入蜀紹興中舉進士調榮州司戸後知成都府累官敷文閣直學士吏部侍郎卒葬嘉定之符文鄉劉甲其先東光人宋元祐宰相摯之後父著為成都漕司墓葬龍游因家焉甲中淳熙初進士累官興元府利東安撫使吳曦反以大義拒之召赴行在遷寶謨閣直學士白晝所為夜必書之名曰自監有奏議十卷卒諡清惠張孝芳楚人號滄湖嘗行部至夾江見山水之美卜築焉楊仲修謂滄湖先生負廟廊器有丘壑資無烟火語當世人流第一明韓懋號飛霞道士博極羣書善為詩歌遊京師大學士楊公禮重之聞於武宗召見與語大悅賜建飛霞宫後乞還峩眉寓嘉州士大夫為買行窩於錦江之滸直隷眉州宋黄庭堅神宗時謫居戎州嘗曰安得竒士盡刻杜甫兩川詩使大雅之音復振三巴之耳哉巴人楊素遂造請庭堅書石刻之作堂於南郭即八景之一也蘇軾為之記直隷邛州漢司馬相如事景帝為武騎常侍因病免歸寓臨邛與邑令王吉善富人卓王孫為具召之時卓氏女文君新寡好音相如鼓琴挑之文君夜奔武帝時以詞賦得幸拜中郎建節使蜀太守以下郊迎縣令負弩矢先驅蜀人榮之宋劉環曹州人通判邛州因家焉八世同居和睦不替平生所薦拔幾百人多知名士直隷潼川州雍正十二年陞為府唐杜甫嘗避兵寓潼川故有四載客蜀郡一年居梓州之句劉蛻字復愚長沙人咸通間官左拾遺懿宗欲調令狐滈為左拾遺蛻言滈無家法以布衣行相公之權滈父綯為子訴寃貶蛻山陽令寓居潼川年老瘞文於南山刻石曰文冢銘曰文乎文乎有鬼神乎風水為貞將利其子孫乎鄭思毅南昌人流寓安岳當路薦之遂攝學士李洞字才江諸王之孫居雍州以明經稱後避朱泚之亂入蜀居普州大雲山鑿石為洞讀易其中嘗師事賈島鑄像事之有詩一卷賈島集句讀一卷行世吳肇不知何許人僖宗廣明間扈從入蜀為鎭國大將軍食邑中江子孫遂家焉孫樵字可之關東人入蜀寓遂寧著有經緯集三卷五代馮涓信都進士唐昭宗時為眉州刺史其子羣玉為山陽令後避江淮之亂棄官寓遂寧時王建議稱帝涓獨獻議請以蜀王稱制建不從涓杜戸不出多岳天彭人蜀孟昶遣使徵之不就潛入普州寓居鐵峯敎授生徒門多名士卒葬鳳凰山元晏昇道江西人少通經術延祐初寓普州掘地得古鴈塔碑遂率同寓盧興祖芟草萊創文廟士類至今感之明王德成武進人洪武中編戍秋林攜子九臯九齡同行遂定籍焉後五世同居積善好施人多頌之今有一樂堂集行世直隷瀘州宋唐庚字子西丹稜人徙居瀘之安遠門號魯國先生有文集行世子文若早以文名有遯安集劉霖永川人徙居瀘州安撫使梅應春殺判官季丁孫推官唐奎瑞以城叛降於元霖詣合州説張玨復瀘珏未許霖願以身質玨乃决軍至城下夜四鼓先遣人梯城斬關舉火兵入城巷戰殺應春遂復瀘州玨薦霖知南平軍未幾卒於兵石正行眉州人徙居江安宋淳熙中登進士力學不倦尢工於書得黄庭堅筆法自號笑齋有文集曰毫芒集直隷茂州明呂經字道夫陜西寧州人進士授吏科都給事中以論潼關鎭守中官謫蒲州判嘉靖初召復原官歴副都御史巡撫遼東後以邊事謫戍茂州衛王元正陜西盩厔人正德辛未進士仕為翰林檢討初號三溪嘉靖間以議禮謫戍茂州衛前在京繫獄時有玉壘山之夢遂改號玉壘後過玉山嘆曰今何至此耶遂徘徊不去兵憲孫公卽於玉壘山下築室置之命曰玉壘行窩元正寄興詩酒寓止晏如直隷逹州晉郭璞寓達州有暗渡渡人人莫知也唐李白大厯間寓達州有白雲寺詩刻於懸巖間白居易字樂天太原人貶忠州刺史嘗寓達州與元稹徃來倡和時號元白而居易人品為優宋謝昇資州人父立為達州推官因家焉以上書救鄒浩權貴斥為邪黨李宗吉不知何許人寓居達州家饒於財喜周惠人歲正旦作苞苴以濟貧乏石砫安撫司唐李白𤣥宗時流夜郎蔡寛夫詩話白從永王璘世頗疑之觀其書懷詩云僕臥廬山頂餐霞潄瑤泉半夜水軍來潯陽滿旌旃空名適自誤迫脅上樓船徒賜五百金棄之若浮烟辭官不受賞翻謫夜郎天則白豈從璘者哉四川通志卷三十八之二欽定四庫全書四川通志卷三十八之二流寓自昔英人哲士其旅寄所至每令人流連俯仰且謹識之以示無忘覺名勝之蹟亦有藉以增色者焉蜀為蠶叢之國古稱行路難矣而山川之峭深風氣之古樸在搜竒攬異之士徃徃來游來歌甚且畱之遲乆而不能去彼其淸風雅槩不但與蜀土名賢相得而益彰即千百載下追踪高躅者猶當憑眺興懷慨然有餘慕耳作流寓志成都府唐杜甫字子美本襄陽人先世徙河南鞏縣肅宗乾元二年冬甫入蜀上元元年卜居成都西郭浣花溪上成都尹裴冕為築室堂嚴武再鎭蜀表為叅謀檢校工部員外郎待之甚厚嘗詣草堂訪之甫為詩渾涵汪洋千彚萬狀兼古人今人而有之忠不忘君情見乎詞又善陳時事人稱詩史段成式字柯古臨淄人為校書郎博學强記多竒篇秘籍父文昌鎭成都成式侍父於蜀為書工麗所引故實多前人所未用者人咸驚異之著酉陽雜爼記蜀事甚多張古道臨淄人唐景福中進士為右拾遺時方鎭擅兵古道上疏詞語切直謫施州司戸叅軍後入蜀變姓名賣卜導江靑城市中王建據蜀召為武部郎中至玉壘關謂所親曰吾唐室諌臣雖召必死死之日𦵏我於關東不毛之地題曰唐左補闕張古道墓可也後果遇害五代母昭裔字知古中州人貧時借文選於交遊見有難色遂發憤曰異日若貴當鏤板以遺學者後避難依孟蜀仕至宰相遂鏤文選諸書宋程顥字伯淳弟頤字正叔河南人父珦守廣漢顥與頤皆隨侍嘗遊成都見治篾篐桶者挾冊吟誦就視之則易也因論未濟灝兄弟爽然有悟後語袁滋曰易學在蜀滋入成都見賣醬薛翁與語大悅盖篾叟醬翁皆隱君子也姚平仲山西人靖康中為太尉金人圍成都平仲夜出將士攻敵營不克去隱靑城山建炎初揭榜以觀察召之不出淳熙間人於丈人山見之年已百餘宋汝爲豐縣人建炎初呂頤浩使致書劉豫遇烏珠軍為所得紹興中亡歸授處州通判後南北議合秦檜忌汝為言金人機事將械送金汝爲變姓名徒走入蜀靑城山而卒有忠嘉集一卷安世通陜西人隱居靑城山中吳曦反乃獻書於成都帥楊輔勸其舉義言甚深切輔未能從遂東如江陵請吳獵討之及曦敗獵使蜀蜀士爭推重世通獵優禮之明鄭彥文蔚州人仕元為萬戸入蜀居彭城因家焉明平蜀彥文率土官首先歸附授貴州宣慰使洪武六年調潼川知州未幾仍改宣慰使從征雲南有功進工部侍郎卒於官王紳金華人待制禕之仲子洪武間任成都府訓導父使元梁王為其所殺藁𦵏雲南紳冒險徃求遺骨歸蜀蜀獻王甚重之宋濓字景濓浦江人明初仕至學士上欲俾叅大政固辭濓素不勝杯酌嘗與内宴上强之至三觴行不成歩上親賦楚辭三章以賜仍命侍臣咸賦醉學士歌且曰俾後世知朕君臣樂若此也濓旣司制作之柄文章輝燦求者集門日本得濓潛溪集鏤板國中高麗安南使者請文以百金為獻郤不受平居布衣蔬食無異貧士自少至老未嘗一日廢書及致仕歸靑蘿山閉戸纂述洪武十三年濓孫愼以罪被劾安置濓於茂州子瓚隨侍入蜀間關萬里濓卒於夔而瓚亦殁瓚之從子懌以孤童治喪蜀王夙欽濓為名儒碩德遂移柩於成都葬之方孝孺字希直寧海人蜀獻王椿建國成都聘孝孺為世子傅表其居曰正學以風蜀人累官翰林承旨文皇靖難命草詔不屈死嚴安海寧人宋濓甥也任戸部主事因宋愼坐不法編戍茂州子茂博學善屬文茂州碑刻皆出其手當路愛其文行優禮之其子孫遷居於灌口陳以莊字子臨貴州永寧衛舉人嘉靖丙辰知成都有訟盗牛殺人者牛與屍俱不可踪跡以莊齋沐禱神祠感異夢依夢求之罪人卽得屍與牛俱在後因採辦大木事落職盡俸資並鬻產以償竟不能歸然以莊經營木政頗乆多得要領蜀中再値採辦當道數咨問萬厯初征都蠻巡撫曽省吾聘叅軍謀凱還遂居成都皇淸黄霖字玉符浙江鄞縣人性嗜學通經濟遨遊江湖至成都慕浣花勝槪遂卜居焉著有山鷄集四卷蜀紀畧二十四卷重慶府唐長孫無忌洛陽人性通悟與褚遂良同受太宗顧命悉心奉國有蹇蹇匪躬之風高宗欲廢后立武昭儀無忌立爭之許敬宗揣合武氏意陰令洛陽令上無忌變事詔削宗爵以揚州都督安置黔州卒宋范鎭華陽人舉進士累官翰林學士論新法不合以戸部侍郎致仕晚居江津卒葬長池里後人賢之名其邨曰范鎭邨云程頤哲宗時擢崇政殿說書紹聖間削籍竄涪州頤至州居北巖山注易傳所授皆為名士涪人崇把之王充順慶人遊黔南時黄庭堅謫於涪與充相愛甚篤庭堅書曰南充王子美其質溫粹乆與之游見其誠心而不疑循理而兢兢李仔字任道梓州人黄庭堅與王觀復書云有李仔任道者梓州人流寓江津二十餘年言物行恆叅道得要老成人也尹焞洛陽人少師事程頤靖康初以薦召至京師不欲畱賜號和靖處士金人入洛闔門遇害焞死復甦劉豫屢以禮聘不從乃自商州奔閬紹興四年止於涪就頤注易北巖山闢三畏齋涪人多宗之杜莘老靑神人子美十三世孫累官殿中侍御史後直顯謨閣知遂寧府晚居江津卒葬杜邨虞允文過江津題其墓曰剛直御史蘇過東坡子以謫官徙居江津縣聖鍾里子孫因家焉其後裔蘇伯瑜者以賢名世史用之眉山人出處未詳崇德廟碑文乃其所撰立論純正典則又長壽鳳山之麓有石刻讀書二大字傍識云端平三年鶴山赴召過樂溫為史子作其賢可知矣劉彝福州人累官直史館知桂州時禁與交人互市及交阯陷欽連等州彝坐貶官安置隨州尋除名為民編隷涪州明馬文升河南禹州人兵部侍郎忤太監汪直謫戍重慶衛直敗以公論起為吏部尚書卒諡端肅保寧府漢嚴遵字君平臨卭人嘗居南部蘭登觀朝自觀發徃蓬溪暮還宿觀中日以為常唐鄭谷字守愚宜春人乾寧間為都官郎中後避亂入蜀寓巴州有雲臺編等集傳世鄭畋勛陽人子凝淸迎養於通江羅隱字昭諫新淦人因亂入蜀隱居劒門徃來劒綿之間吟咏猶有存者宋孫知微字思邈成都人嘗採藥至保寧有孫氏池亭故址石刻尚存文彥博介休人㓜侍父監征閬州有道士異之曰公南極之精降為國之申甫遂號南極眞子周惇頤字茂叔道州人少為合州主簿嘗詣南部謁尚書左丞蒲宗孟宗孟與語移日嘆曰天下有此人耶顧予所為内省尚疚對此乃如青天白日矣聞其未娶遂以妹歸之李好義秦州下邽人與兄好古俱寓閬中好義初為吳曦部將累擊敗金人有功及曦叛好義結李貴楊巨源討斬之歴官中軍統制順慶府漢司馬相如成都人僑居蓬州故宅存焉宅畔有琴臺後人立祠祀之唐李白彰明人周遊四方經宕渠地有詩李淳風知星象訪袁天綱於蜀曽寓宕渠崔塗字禮山光啓中進士善詩嘗避亂宕渠沖霄寺詩刻尚存宋黎嵩浮梁人建隆初入蜀居廣安其孫錞最名於世蘇軾眉山人熙寧中寓廣安山寺今名來蘇寺碑刻尚存范正己姑蘇人文正公第三子純禮之子在官奉法守節不撓抗章論事知無不言後値金兵逼境徒歩㩦㓜至蜀蓬州因家焉何造成都人徙居蓬州其子絳孫修甫曾孫格非相繼登第有三桂堂元孔敬宣聖五十六代孫元統中寓居於渠多詩文張大悅寳鷄人泰定初寓蓬倡義保障鄉閭後封咸安郡侯張德潤大悅子襲封咸安郡侯首倡捐俸修聖廟及兩廡明雪菴和尚不知何許人靖難初至順慶愛善慶里山水奇絕里中有杜景賢者知其非常人為寺居之和尚朝夕讀易其中又嗜楚詞毎袖一本登小舟急棹中流朗誦一葉輒投一葉於水投已則哭哭已復誦終卷乃已衆莫測謂何或曰此松陽葉希賢也建文時曾為御史云李鐸光化人父智任蓬州學正因占籍永樂中舉孝亷授畧陽敎諭嘗陳保釐十二策被召入京待問一年復任著補註顏子集並詩稿行於世敘州府宋黄庭堅字魯直江西分寧人宋紹聖初貶涪州别駕移戎州安置蜀士從學者千計自號涪翁司馬子已洛陽人溫公七世孫寓居戎州該通理學不事科舉以清白名世元趙祖仝豫章人僑寓富順隱居讀書志行純潔鄉閭以為矜式善屬文凡郡邑碑刻皆出其手夔州府楚宋玉屈原弟子為楚大夫原沉汨羅玉作招魂以悲其志後常居巫山又作高唐神女賦托詞以諷襄王漢揚雄字子雲成都人其父寓巫山生雄及長博學善屬文與司馬相如先後齊名論者謂鍾十二峯之秀云五代庾子輿新野人性至孝其父守蜀卒喪遇巴峽時瞿塘秋水漲不可行子輿叩天水為退數十丈舟旣過水復漲如初行人語曰灩澦如牛本不通瞿塘水退為庾公在途有雙雀巢於舟至家又巢於庭後仕為尚書郎唐杜甫卜居成都叅嚴武軍事大厯初武卒蜀亂甫乃從江遊嘉戎次雲安居東屯在夔著詩四百餘首論者謂子美夔州以後詩益工云宋冦準萊州人太平興國初知巴東縣嘗賦詩云野水無人渡孤舟盡日横識者知其有宰相器愛夔山水嘗以公暇徜徉其間又愛溪水淸冽取以烹茗後入相夔人建橋溪上名為相公橋周惇頤嘉祐元年以太子中舎僉書合州判官事泝峽至秭歸聞龍昌洞之勝徃遊焉遂道於夔以至合州五年六月先生解僉判出峽東歸轉通判䖍州則夔乃先生過化地也邵雍洛陽人遊雲安築演易臺明宋濓累官翰林承旨安置茂州卒於夔余郁淳安人為御史亷介公正以事謫夔築竹坡以居澹然自適後卒子孫籍奉節陳良翰字景紳羅江人正德中由主事謫戍瞿塘張翀字習之潼川人有風節嘉靖中以議大禮謫戍瞿塘楊名字公實遂寧人有文章氣節以直言忤旨謫戍瞿塘多所著咏嘗修大昌縣志又與楊太史愼修省志號稱博洽云寧遠府唐元􅓶申州義陽人亷介有守以裴炎故流死巂州雅州府宋文同字與可潼川人以學行名操韻高潔嘗入雅州為王潛書濯纓序直隷嘉定州雍正十二年陞為府周陸通卽楚狂接輿也春秋時王使使聘通於江南通大笑不應妻曰妾與先生射耕而食紡績而衣據義而動樂亦足矣今受人重祿乘人良駟食人醲肥將何以待之通曰吾未許其聘也妻又曰君命不從非忠也不如去之遂以通變易姓名入蜀峩眉山隱焉漢竇誼居蜀之峩眉縣放浪不羈月夜子規啼竹上誼曰竹裂吾可歸峩峯是夕竹裂黎明遁於峩峯武帝三徵不起揚雄西漢末隱居犍為有揚雄山晉郭璞字景純聞喜人入蜀寓居嘉州烏尤山註爾雅洗墨山中魚吞墨水至今有烏頭魚唐李白讀書於鎬岡黄庭堅建太白亭於山之絕頂有登峩眉及平羌江等詩宋蘇軾讀書於嘉州有東坡書院至今以蘇稽名鄉人嘗拾其遺硯程公望寓居白厓山註易蘇文公嘗㩦二子從之授業黄庭堅謫戎州寓居嘉州後居涪翁亭遺址尚存邵伯溫洛陽人父康節嘗曰世亂蜀可居及宣和末伯溫使蜀盡室以行家於嘉州得免於難今犍為紫雲城乃伯溫故業也晁公武字子正澶州人靖康末避亂入蜀紹興中舉進士調榮州司戸後知成都府累官敷文閣直學士吏部侍郎卒葬嘉定之符文鄉劉甲其先東光人宋元祐宰相摯之後父著為成都漕司墓葬龍游因家焉甲中淳熙初進士累官興元府利東安撫使吳曦反以大義拒之召赴行在遷寶謨閣直學士白晝所為夜必書之名曰自監有奏議十卷卒諡清惠張孝芳楚人號滄湖嘗行部至夾江見山水之美卜築焉楊仲修謂滄湖先生負廟廊器有丘壑資無烟火語當世人流第一明韓懋號飛霞道士博極羣書善為詩歌遊京師大學士楊公禮重之聞於武宗召見與語大悅賜建飛霞宫後乞還峩眉寓嘉州士大夫為買行窩於錦江之滸直隷眉州宋黄庭堅神宗時謫居戎州嘗曰安得竒士盡刻杜甫兩川詩使大雅之音復振三巴之耳哉巴人楊素遂造請庭堅書石刻之作堂於南郭即八景之一也蘇軾為之記直隷邛州漢司馬相如事景帝為武騎常侍因病免歸寓臨邛與邑令王吉善富人卓王孫為具召之時卓氏女文君新寡好音相如鼓琴挑之文君夜奔武帝時以詞賦得幸拜中郎建節使蜀太守以下郊迎縣令負弩矢先驅蜀人榮之宋劉環曹州人通判邛州因家焉八世同居和睦不替平生所薦拔幾百人多知名士直隷潼川州雍正十二年陞為府唐杜甫嘗避兵寓潼川故有四載客蜀郡一年居梓州之句劉蛻字復愚長沙人咸通間官左拾遺懿宗欲調令狐滈為左拾遺蛻言滈無家法以布衣行相公之權滈父綯為子訴寃貶蛻山陽令寓居潼川年老瘞文於南山刻石曰文冢銘曰文乎文乎有鬼神乎風水為貞將利其子孫乎鄭思毅南昌人流寓安岳當路薦之遂攝學士李洞字才江諸王之孫居雍州以明經稱後避朱泚之亂入蜀居普州大雲山鑿石為洞讀易其中嘗師事賈島鑄像事之有詩一卷賈島集句讀一卷行世吳肇不知何許人僖宗廣明間扈從入蜀為鎭國大將軍食邑中江子孫遂家焉孫樵字可之關東人入蜀寓遂寧著有經緯集三卷五代馮涓信都進士唐昭宗時為眉州刺史其子羣玉為山陽令後避江淮之亂棄官寓遂寧時王建議稱帝涓獨獻議請以蜀王稱制建不從涓杜戸不出多岳天彭人蜀孟昶遣使徵之不就潛入普州寓居鐵峯敎授生徒門多名士卒葬鳳凰山元晏昇道江西人少通經術延祐初寓普州掘地得古鴈塔碑遂率同寓盧興祖芟草萊創文廟士類至今感之明王德成武進人洪武中編戍秋林攜子九臯九齡同行遂定籍焉後五世同居積善好施人多頌之今有一樂堂集行世直隷瀘州宋唐庚字子西丹稜人徙居瀘之安遠門號魯國先生有文集行世子文若早以文名有遯安集劉霖永川人徙居瀘州安撫使梅應春殺判官季丁孫推官唐奎瑞以城叛降於元霖詣合州説張玨復瀘珏未許霖願以身質玨乃决軍至城下夜四鼓先遣人梯城斬關舉火兵入城巷戰殺應春遂復瀘州玨薦霖知南平軍未幾卒於兵石正行眉州人徙居江安宋淳熙中登進士力學不倦尢工於書得黄庭堅筆法自號笑齋有文集曰毫芒集直隷茂州明呂經字道夫陜西寧州人進士授吏科都給事中以論潼關鎭守中官謫蒲州判嘉靖初召復原官歴副都御史巡撫遼東後以邊事謫戍茂州衛王元正陜西盩厔人正德辛未進士仕為翰林檢討初號三溪嘉靖間以議禮謫戍茂州衛前在京繫獄時有玉壘山之夢遂改號玉壘後過玉山嘆曰今何至此耶遂徘徊不去兵憲孫公卽於玉壘山下築室置之命曰玉壘行窩元正寄興詩酒寓止晏如直隷逹州晉郭璞寓達州有暗渡渡人人莫知也唐李白大厯間寓達州有白雲寺詩刻於懸巖間白居易字樂天太原人貶忠州刺史嘗寓達州與元稹徃來倡和時號元白而居易人品為優宋謝昇資州人父立為達州推官因家焉以上書救鄒浩權貴斥為邪黨李宗吉不知何許人寓居達州家饒於財喜周惠人歲正旦作苞苴以濟貧乏石砫安撫司唐李白𤣥宗時流夜郎蔡寛夫詩話白從永王璘世頗疑之觀其書懷詩云僕臥廬山頂餐霞潄瑤泉半夜水軍來潯陽滿旌旃空名適自誤迫脅上樓船徒賜五百金棄之若浮烟辭官不受賞翻謫夜郎天則白豈從璘者哉四川通志卷三十八之二欽定四庫全書四川通志卷三十八之三僊釋蜀自李耳畱跡普賢過化其有僊釋也由來舊矣厥後祖而述之代不乏人咸謂可以長生乆視感通利濟之不爽而執拘墟之見者又必欲盡廢其說夫佛老之教主於虚無渉於因果其與易之何思何慮書之福善禍滛畧相彷彿故孟氏言歸斯受之昌黎言墨名儒行則夫存其姓名紀其事實正所以因勢利導使後之宗其敎者就所明而漸通於經常之大義也作僊釋志成都府夏李八百蜀人初居筠陽之五龍岡歴夏商周年八百歲一云動則行八百里時人因號李八百或隱山林或居廛市又修煉於華林山石室丹成還蜀中周穆王時居金堂山號紫陽眞君其後遂得仙封妙應眞人周老子河南歸德府苦縣人為周柱下史得長生術嘗駕靑牛度函谷關為關令尹喜著道德經五千言曰千日之外求我於蜀中靑羊之肆至期果至授喜玉册金文賜以元始先生之號杜宇古蜀主蜀嘗大水宇率居民避長平山後鼈靈開峽治水人得陸處宇禪位與靈自居西山得道上昇時適二月子鵑鳥鳴故蜀人悲思曰吾望帝也因呼為杜鵑云漢費長房東漢時為市掾從壺公學仙後辭歸與一竹杖曰騎此任所之又作符曰以此主地上鬼神乘杖須臾來歸自謂去家旬日實已十餘年矣投杖葛陂中廻視則化龍矣葛坡今龍池寺張道陵修眞艷陽洞辟榖煉丹後羽化人呼為豔陽仙人李常在蜀郡人少治道術居民累世見之初有二男一女皆已嫁娶乃去止二弟子隨之後俱以靑竹杖度其身二弟子歸家置杖臥牀其父母見兒尸在牀各泣而埋之復有人於郫縣逢二弟子仍隨常在行附書到家其父母發棺視之惟見靑竹杖而已常在又别娶婦其子徃尋之常在曰吾兒欲來見我我法不得見兒兒泣而别去折象廣漢人少學黄老師事東平先生家世豐裕以為多藏必厚亡散千金以賑貧苦或諫之象曰竇子文有云我之施物乃逃禍非邀福也智者咸服其言後自尅期七日尸解如蟬蛻焉晉范友字子元涪陵人隱居西山蜀人敬之號曰長生惠帝時李雄攻成都百姓皆保險自守長生亦率千餘家依靑城山後雄得成都以長生有道欲迎為主長生固辭乃拜為丞相下令曰為國之道得賢則興吾得賢矣尊曰范賢於湔氐邨築館為長生稅駕之所拜進太師西山侯不受歸靑城山後仙去梁尚圓廣漢人自少出家以術救物梁武陵王紀宮中多鬼圓曰何以敢入王宮可聽我一言於是諸鬼合掌圓即發咒鬼皆失所在武帝聞之大加奬賞隋劉珍什邡人開皇中居安樂山忽取所藏經及鐘磬封於石室曰後六十年當有聖君取之且曰吾功行已成四月之望當上昇届期珍果沖舉倐至長安見隋文帝自言飛昇事帝未信遣使訪之悉符所言遂為建二觀後唐高宗時遣使取經並鐘磬以進珍言果驗宋治平中賜額延眞唐無相禪師益州人住成都淨因寺華亭船子和尚住淨衆寺王柯字野山靑城人母丁氏夢大星照身生柯幼而穎悟長而仁慈見老弱孤貧者惻然哀之毎大雪時施粒食以濟禽鳥嘗遇至人授以丹訣乃居洞中修煉歴年無成鼎忽破丹悉化為金後上西峯遇道士煉丹柯乃助其薪炭奉事三年不怠道士嘉其誠授以祕訣丹成分遺柯服之身輕門側有柏騰身而舉已在樹杪考其尸解時乃在高宗儀鳳三年五月云江西馬大師號道一什邡人生而頴異牛行虎視引舌過鼻足下有二輪開元中事南岳讓和尚祕授心印開法建陽臨川又至南康龔公山嘗言人各信自心是佛此心即是佛心又謂一切法皆是佛法諸法即是解脫解脫者卽是眞如諸法不出於眞如行住坐臥悉是不思議後於貞元中圓寂壽八十元和中追諡大寂禪師羅公逺彭州九隴縣人修道於澧沅常徃來靑城羅川間開元中因遊鄂州刺史園亭刺史問何來答云適見守江龍來此刺史未信曰須令見其形曰請俟後日及期刺史與郡人皆至見一白龍於江心頭與雲連食頃方隱刺史具聞明皇召見毎問無不稱旨嘗召公遠與葉法善金剛二藏試法而公遠嘗勝尤善自隱上欲傳其術公遠曰陛下玉書金簡已格九淸豈可以四海之尊輕狥小術耶若盡臣術必懷璽入民間困於魚腹也上不悟怒斬之後有使自蜀還公遠謂使曰吾晉成帝咸和年間入蜀棲修林泉聞天子好道而來又謂人間腑臟葷血充積三田未虛六氣未潔請以十年而授上如何遂殺我耶然得道之人形氣混合豈能以世俗兵刃為害因出一書謂使曰可以此達上上必悟焉仍以蜀當歸為贈驗不誣矣及明皇幸蜀迎公遠於劒門至成都拂衣而去世傳公遠於蜀九仙臺上昇彭漢之人至今立像祀之傅仙宗長安人父倫為資陽令宗性沈黙好道有神人告以修眞地遂乘靑騾赴平岡山隱焉開元間詔赴闕經利州桔柏江除水害利人祠祀之已而至都應對稱旨優賜後上問卿何道致此對曰守以恬淡行以簡易耳又問金丹曰惠及民物卽長生也上大悅乆之還山詔修葺舊觀賜額為眞應觀乾道二年沐浴登榻而逝邑人王念還自成都見其乘靑騾於簡州道上中丞宋渾為撰碑焉阿世多尊者天竺人唐時入中國止灌口靈崖山常令白牛下山募糧取水神異變幻難測今靈崖有石刻像存德山宣鑒禪師簡州周氏子丱年精究律藏於性相諸經無不貫通聞南方禪席盛行師氣不平出蜀往謁龍潭至法堂曰乆嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂棲止焉一夕侍次潭曰何不出去師出却回曰外靣黒潭點紙引燭度與師師擬接潭復吹滅師於此大悟咸通六年壽八十四卒師傳其法於雪峯存存後分法眼雲川二宗徐佐卿明皇九日獵沙苑射中飛鶴帶矢飛去益州道觀有道士徐佐卿寄寓是日自外持一箭歸曰吾為飛矢所傷已無恙因挂箭於壁書其月日且云後十年箭主至此付之後明皇幸蜀至觀中乃見箭悟達國師居彭州九隴山至德寺作慈悲水懺李商隱嘗師事之李班蜀人得黄石公丹道改名棲眞號太虚詣武夷山潛修七月歸經龍虎山先夕雩壇有夢真人者時旱禱弗應次日班至其處衆弗知也夢者指之羣請禱雨應時霑沛後至眞州王虚菴以道授張紫璚囑曰金丹宜潛修大道當人授尋歸靑城山以九月九日上昇了覺禪師京兆人得法於洞山价師初入湖南至洞山見堂僧問淨名大士入不二法門旨趣何如曰山僧未敢舉明又問若是則事理不分答云扁舟已過洞庭湖師剏成都昭覺寺五代神和子姓屈突名無為五代時人張詠常遊京師於封丘門逆旅遇一道士與飲至醉詠曰不知姓名異日何以相識道士曰我神和子也異日見子於成都耳後詠守成都始思其言嘗物色之弗得後於天慶觀院堂壁上畫一道人肖逆旅所見視其題曰神和子詠悵然自失昭覺圓悟勤禪師彭州駱氏子得法五祖示衆云通身是眼見不到通身是耳聞不及通身是口說不著通身是心鑑不出通身即且置或若無眼作麽生見無耳作麽生聞無口作麽生說無心作麽生鑑若向這裏撥得一線路便與古佛同參師卒於紹興五年茶毗時舌齒不壞本併五色舍利無數塔在昭覺寺側朝雍正十一年勅封明宗真覺禪師致祭一次元酆都道士未詳何許人元大德戊戌棲隱雪峯山乙卯季冬召集道友曰吾化矣大道坦然皎如日月雖由人𢎞豈隨人徃諸生宜遵道而行毋令半塗而廢偈曰朴菴寄住有年東西南北依然裏靣渾無一物只有𤣥文數篇今日草茅朽腐須要改换棟椽眼底風波大惡不容乆住山巓選得幽居去處和軀移上大天端坐而逝明張三丰不知何許人洪武中入蜀僑寓環衛姜指揮家寒暑惟一箬笠笠甚大雖小戸出入不礙繫鐵線條極工緻朝夕居一磐石上嘗取梅枝插土卽生花皆下垂故成都昔年猶遺照水梅種焉永樂中游内江寓明玉道人家詭云龎姓微示以異嘗履極險不墜渉水無少濡明玉善符咒多奇驗欲授三丰三丰笑曰我以道奉公公乃以法授我耶乃作道法會同疏一通畀之居歲餘胡濚物色之遂同玉見胡後又往來峩眉山中或曰天目人名君實字鉉一懷空學道玉屏山明永樂中欽賜講經寶帳有語錄行於世里人建寺置塔塔奉其遺軀後寺焚毁獨塔軀如故繡枕灌縣導江人明初以處女修証圓寂肉身至今存人號繡枕觀音遠近祈嗣者輒應譚子家天池山側生而穎悟一日行池上歸辭父母曰今日遇吾師當隨去遂不見父母哀思作室池上望而招之後數年歸省尋去里人為祠祀之故又名天池曰譚子池余喜巖延安人性資朴古住大淸宮年踰八十永樂五年三月二十六日更衣焚香盤趺而坐曰來由此門去由此路一脚不失回頭卽悟鼻垂雙柱旬日顔色不改智中國師彭縣人也生有異相年十二即禮月光禪師惠心清修苦行晝夜不息後惠心授松潘都綱師隨去尋代其職時番夷叛服不常師居邊撫化番夷莫不投伏天順間累加封國師仍賜勅誥降銀印師在邊四十餘年化行功著成化二年年踰七十詔歸彌陀庵優老焉楊汝眞揚州人自幼刻苦修全眞之道後遇異人授以奥理遠遊於彭來往葛仙陽平二觀蜀藩聞其道嘗致敬焉壽一百二十一歲於丹景山尸解赤脚姓金毫州人由秦隴來苦行絕火食赤足不襪近五十年至灌縣修靈崖寺路行叱虎虎卽遠去王勅字嘉訏號雲芝𢎞治中督學四川能前知休咎嘗煑雲母石為糧張鶴鳴有傳吳進寶成都道士𢎞治中嘗遊新繁駱本隆家夜有盗數十人至舉家驚惶寶戒之曰無恐為我取草來作小圈數十遂啓門盗入寶擲圈羣盗如縛不能動哀泣求解寶令本隆以酒肉賚之盗叩謝而去又嘗夏夜宿雷氏碾中近水多蚊寶以手畫碾中為界禁之至今無蚊在縣東郭外周仙葫名子興成都人居五塊石一日遇道士李丹陽於靑羊宮因師事之丹陽每至子興家必索食達旦不醉人莫測其所以且授以酒方釀成香徹數家後人效其方多不驗興家架上植藥葫蘆丹陽手挽一結於細腰處如出生成遂摘而藏之數年丹陽辭去興治具欵之臨行納熟肉一盤於袖而去明年有自楚歸者云某月日遇丹陽於延聖坊登樓共飯出袖中熟肉曰此周君贈我物也興計其日時甫踰刻耳因悔不與仙去乃取丹陽所遺書讀之獨臥一小室乆之棄家佩葫蘆往尋丹陽徧歴湘湖間竟莫知所終劉從儉新繁人嘗訓䝉有道士授以書從儉讀不釋手諸童䝉荒漸去其婦奪書投之火儉隨入火取書毛髪無損自是如狂不家宿人或以鴆酒試之笑而不飲明本漢州人少育於姊夫高晟家伐薪㸑一日載薪山中驢不行怒砍其耳血流被地心卽悔悟遂柷髪為僧入什邡高山寺安鉢功行極苦坐化之日人有自鎣華山來者見本隻履入山云失一履於禪榻下可令吾徒寄送見者至寺方知其已化云本來崇慶州人進士張某之子避難蘆山削髪為僧一日說法有將校闖入請以射為說師卽於座應聲曰射得中是爾的功行射不中是爾的慈悲僧德愛自號印心華陽人七歲出家聰慧好道通儒佛兼知醫遇病輒施藥救之壬子歲荒飯僧及流民活者甚衆晩年歸刹止靜棲禪臨終西向說偈而逝是夕紅光竟夜不散無遐不知何許人居九峯山絶頂修行時往來邨落中見邨民馬忠女甫週歲有病以破布繻餌之立愈又曰此女當貴後適趙姓果封恭人嘗至縣詣邊氏家一徒羡其侈麗曰汝樂之何不遂來此後三日徒死邊氏舉子哭不食乳師往探摩其頂曰卽來何須哭耶子遂輟哭一日語弟子治齋邀諸僧作别諸僧至舉齋一笑而逝妙琴字無絃華陽人母高氏有娠毎見異徵生而姿貌奇古善詩工書畵里人得一紙珍重如寶入楚又以畵牛得名稱牛和尚還蜀住草堂構室榿東有梅蕚千株畵梅入妙自號梅居老人萬厯九年趺坐道偈而終蜢蟲子不知何許人隆萬間來成都獨處靑羊棲足有惡瘡臭不可聞然四體溫粹如玉猶然童身無冬夏跣足敝衣時行市中市中無頼率小兒呼噪之有以竹刺其膚石擊其足者但笑曰蜢蟲子人因以為名見人則索酒與餅飲食之亦不謝或取草木之不可食者與之亦輒食好事者為製新衣履旋為羣丐所奪畧不為意時馮方伯成能偶遇而叩之耳語移時旣而曰公可歸矣馮逡巡未决忽以疾卒人始異之後竟不知所終明采崇慶州人少剃度為僧及長精止觀法門不立文字萬厯四十五年示寂其夜僧徒百許人見有紫氣投西南去有偈云念滅滅亦滅更有何不滅本來原無說皎月當空徹彭成新都人少業農長齋誦佛出語無倫次人目為癲萬厯己亥九月忽語人曰吾將大化幸以薪油助我衆笑之求不已漸有施者得油則飲薪則負至河濱疉而成樓又焚鬚髪搗飯作大念珠二十四以篾貫之瓣香向四方膜拜拜畢身坐柴樓火從香起持飯粒念佛不動端然而燼萬竹名紹乾號一淸後更號萬竹性恬淡篤學葺茅峩山雪巖僅可容膝茹菜三年神氣和暢還成都與道友犀泉結廬百花潭上叅究心宗一日憣然若醒嚮道甚力入南都講肄說法聽者如堵復挂錫五臺刺血硏金書法華九載萬厯初入燕京栖普賢庵刋行彌陀箋註講演諸經後還成都蜀主造講堂於浣花溪側居之一日登堂集衆端坐而逝皇淸海明號破山梁山人天童悟法嗣第三人也嘗勸賊帥李鷂子勿多殺人賊以羊豕進曰若食此吾當封刃破山曰老僧為百姓生靈忍惜如來一戒乎遂嘗數嚮賊為止殺識者比之誌公啖鴿摩什吞針云通醉號丈雪内江人破山弟子蜀禪教皆祖破山故丈雪演化於昭覺寺門徒甚盛年八十餘示寂住持弟子佛寃卽其從子顚和尚長安人蹤跡詭異蜀臬某迎之成都禮拜甚恭而顚往往靣斥之言無忌憚嘗食犬肉㡌簷插花一枝引羣丐遊行市中入昭覺寺見丈雪禪師詼嘲不屑禪師頗敬憚焉一旦騎馬出城數里語廏吏曰吾歸矣竟舎騎徒歩去臬追贐不受徃來秦蜀棧中所至輒畫達摩像施人歸至長安數日遂坐化張氏溫江人未笄而娠父疑之棄逐于外女剖膓示父内俱經書事聞賜建女仙觀在治北邑人上巳日常遊此石穴僧不知何許人夷臥成都山中石穴内二十餘年不起亦不飲食當臥處痕跡宛然山中樵牧習見之就問不答一日有士子於此山遇髯道人云此山有六祖應化之否士子卽詣僧禮拜云師六祖耶乆之張目曰莫信髯道人亂道明日再過之不復見矣重慶府漢王方平棄官學道寓太尉陳統家忽然尸解棲眞平都山魏青龍初白日昇天陰長生延光初從馬明王求仙乃取太清神丹經授之初居靑城後於平都山上昇晉淨業石照人姓文少業屠有羊旣乳將殺之二羔銜刃伏門業感歎棄家為僧忽大悟作頌曰昨日羅刹心今日菩薩靣羅刹與菩薩不隔一條線唐藺沖虚涪州人居于祖師觀神龍乙巳秋一夕乘雲而昇黄萬祐未詳何許人修道於黔南無人之境累世常在毎三五十年一出嘗賣藥成都言灾禍神驗王建禮事之問其服食皆秘而不言問其齒則曰吾只記夜郎侯王蜀之歲蠶叢氏都郫之年時被請出烏交馳花開木落竟不知其甲子矣一日南望嘉州曰犍為之地何其炎炎已而嘉州市肆果為瓦礫後辭建歸山固畱不聽爾朱眞人名通微號歸元子其先出元魏爾朱族遇異人得道唐末遂落魄成都市中嘗於江濱取白石投水衆莫測後自果至合賣丹於市價十二萬刺史召問其直更增十倍以其反覆盛以篾籠棄諸江至涪州漁人石姓者得之因授以丹二人俱仙去王㡌子出入闤闠為人修敝冠號王㡌子暮則臥於涪州天慶觀一夕尸解而去道士為葬之月餘自果山貽書致謝之韋昉蜀人夜渡涪陵江忽遇龍女遣騎迎入宫後昉登第十年知簡州龍女復遺書相迎勅命昉充北海水師宋宗璉石照人姓董住潭州大潙山有僧過其家指燈示之曰燈照汝耶汝照燈耶答曰燈亦不照我我亦不照燈扁其室曰窮谷劉錡鎭荆南問窮谷何義璉曰心盡曰窮性凝曰谷隨嚮應聲不疾而速顯嵩銅梁人姓李住巴州之宣密院三十年足跡不出紹興間集衆告以將逝作頌曰八十年中常浩浩宏開肆貨摩尼寶也無一箇共商量不是山僧收鋪早端坐而寂徐神翁常居樂溫之北眞觀相傳神翁於此飛昇去今觀之右有飛仙臺仙人跡尚存後人有仙翁去後畱踪跡丹竈沈沈瑣翠烟之句今題咏甚多趙覺未詳何許人修煉於合州之東山宋嘉祐中沖舉而去今山頂有飛龍觀石寶丹井井不盈尺常竭其水可愈疾人毎來取則以淨巾覆井上黙禱少頃水自滿又有禮斗臺今石上衣佩履跡見存石頭和尚號四祖師合州人自㓜入景德寺為僧有戒行因鑿石出火遂大悟作偈曰是石頭和尚咬嚼不入打破虛空露些子迹復白州守開釣魚山建䕶國寺自甃石二十四片為龕全身入門自掩端居而逝有草庵歌其末曰老僧不知輪甲子一葉落知天下秋眞容榮昌人姓徐氏自幼為觀音寺僧禮佛守戒後卒生於壁山魏伯禄家年十七不能言一日謂其家曰吾生前故觀音寺僧今當復還歸寺乃譚生前事皆不爽僧衆往謁皆知其名邑令周俊密使人往觀容先令徒一人具茶徃候于塗人皆異之號為神僧一日跏趺而化明楊常符豫章人雲游瀛山首創白雲觀金牛穿逕玉井開基連理呈祥甘霖應禱迄今山以仙名道因地顯代有異人楊大明常符首座賦性樸魯精於修煉一日拜辭師友結坐而化張太虚貴州人瀛山全眞披虎皮行乞人呼張虎皮終日嬉戲與物無忤蓋蘇門先生一流人也赤陽子不知何許人黔江縣西烏鵲觀有道士題詩云萬里長江渺碧霞彤雲飛映到烏鴉崖寒木冷仙寰别水秀山奇景物華游子樓頭傾竹葉牧童牛背落梅花興來一覽乾坤濶笑傲壺天歲月賖後書赤陽子題墨跡透壁喩常淸邑里無考寓黔江千戸陳綱家三年綱敬禮之常入八面山採藥歸寓燒煉一日丹成欲度綱綱適他往謂其僕曰吾在此三載矣汝主遇我厚無以謝汝主因畱葫蘆一枚草履一隻以作後驗逾年汝主有難時二物雖微可以解脫綱歸而常淸已去僕具以告綱異之未幾有自渝郡來者亦見常淸云然考其日月皆同乃始知其為僊也綱後果為人所訟幾致重譴因憶前葫蘆草履遂獻中丞林其中竟脫綱於難而中丞攜葫蘆及履入山修道焉胡老道黔江人修養有年年一百三十歲貌若少壯好事者以女色試之畧不為動後尸解去寶崖涪州人幼寡言不嬉戲棄家爲僧以布裹五指燒之曰信佛如此可也人以為風疾何不治之答曰身在空耳四大五肢復何有耶投火滅身而心不壤雪峯和尚黔江人有道行禱雨輙應後坐化人咸稱為善知識火傳居士姓沈氏名復賢墊江人幼喜老莊書嘉靖時為楚雄司李耿介有執法難移薑桂性媚人不易殺人難之句後歸里築室東山之麓寒暑誦華嚴不輟毎遇夜月明卽呼吸精華一夕命置棺於堂薰沐端坐吟曰辜吾一副臭皮囊煩惱曾經幾萬塲秋月一輪清徹骨翻然笙鶴白雲鄉吟訖投於案仰臥而卒後有鄉人經三峽見小艇中一鶴髮翁吟云孫登發一嘯火傳接其音亟鼔棹追之艇倐逐烟波而滅尚陽子不知其名姓寓居於墊江嘗就飲李長春家閱三年敬禮不倦時値除夕家乏鹽尚陽子曰兹何難子第閉目隨余往便可得鹽長春從之耳畔颯颯惟聞風聲及開眼時身已在壓子崖邊矣又邀之渡江長春不敢行遂獨乘白羊渡龍舌灘而往頃卽囘攜鹽若干雨付之曰足汝三年之用矣一揖而去長春果三年不苦淡食秀崖和尚法名興國墊江人邨中牧牛忽為僧萬厯間掛錫京師臥佛寺適青宮嬰疾醫院呈方皆不效師進觀音水一盂服之立愈勅封䕶國禪師太子太保陳五雲黔江鷄足山人修煉於八靣山每煉杏核丹以濟貧人皆稱為老僊與邑人湯瓊友善崇禎十二年忽辭别瓊瓊叩其故曰黔邑將壞不可乆居遂去明年冦圍城刼掠甚慘人始知其有先見也皇淸稽古靈住綦江中峯寺年一百一十有五骨健神淸不畏寒暑從逰者惟敎以敦倫行善他無所語康熙十九年呼衆升座說偈示寂蒼桐法名海華綦江儒家子棄儒入釋叅悟屢年有語錄行世年八十餘歩履如飛康熙二十三年一日坐木牀微笑而逝保寧府漢張道陵居閬中鶴鳴山煉丹修道感老君授以祕籙遂領弟子趙昇王長來雲臺山煉大丹服之永壽二年自以功成道著乃於半崖躍入石壁中自崖頂而出因成兩洞崖上曰峻仙洞崖半曰平仙洞是年九月九日將諸祕籙玉冊玉印斬邪劒授長子衡乃與夫人雍氏登雲臺峯白日昇天年一百二十三歲宋羅晏閬中人兒時牧山下見二道人奕捨牧觀之道人出囊中餅與之晏食已歸家覺腹中如燎發狂累日自是常飲水數日不一食預言禍福無不驗宋宣和中賜號靜應處士張浚嘗延至軍中晏曰相公勿恐明日賊退果然加號太和沖夷先生壽至百八十歲云明蒲從善江南人有道行祈禱治病符篆靈驗洪武十八年遊南畿受知於太祖鄭本昭化舉人至河北見雲端雙鶴聨翩而下及至則兩道人也因尾之二人顧問本跪道所以牽挽不舍二人曰吾被汝窺破因授以修煉法遂歸絶意進取棲隱山林年九十尚作小楷無疾趺坐而逝人以為尸解去雪凭不知何許人正統景泰間與無際禪師為友至廣元之天臺山喜其幽僻息心棲止初雖不知文字乆而成覺著雪凭語錄傳於世實相豫章人萬厯壬辰卓錫廣元之雪峯解文字時游戲詩畫譜經典翻刻七百則公案評唱若干卷逹官士人多採藏焉黄太史輝為作塔銘曉宗昭化人遊南海三十年萬厯丙申歸居縣之梵天院跪誦法華經禁歩不出五載結室於人頭山麓戊午秋集居人告以將去衆以為他往懇畱之曰未也嗣當辭謝兹山狼虎縱横日暮則人不敢出戸是夜諸人夢寐中俱聞叩門作謝聲達旦往視則跏趺逝矣鼻垂玉筯至膝遂作塔以藏焉順慶府漢馮眞廣安州人馮緄子也修煉岳門山頂白日昇天隋程太虛西充人自幼學道精修勤苦隱居南岷山絕粒有二虎侍左右九井十三峯皆其修煉處也一夕大風雨砌下得碧玉印人每乞符祈年印以與之輒獲豐稔唐元和中尸解後遷神於元宫容貌不變宣宗命人求之過商山宿逆旅躡絕險有居第如公館靑童引見一道士自稱程太虚祖居西充且囑曰明歲君自蜀入南岷無忘我及至蜀視畫像與前見者無異宋賜號道濟大師唐袁天綱南充人居朱鳳山修煉丹井尚存爾朱通微詳見重慶謝自然南充人貞元中以女冠於金泉山白日上昇萬目共覩韓退之有詩葛由蓬州人嘗乘木羊上綏山隨者皆得道上昇胡德元蓬州人從孫太和修煉千日畱偈上昇宋張英英宗初拜儀隴尹過采石江遇一女子姿貌絶世謂曰五百年夙約與君當㑹於大儀山英叱之至任幾半載日夕聞機聲一日率部衆逐機聲而往行數里至大儀山一石洞門鑰宛然門忽開前女出迎相攜而入洞門卽閉從吏哀號忽二圓石自門隙出衆取歸中道不能舉邑人建祠塑像各置一石於腹至今有禱輒應廟曰永濟圭峯禪師蓬州人相傳鷺鶿山有井井側有巨人跡女履其跡而娠生師棄諸野馬牛避弗踐鷺鶿以翼覆之母収以養及長奉佛於靑蓮山講經於上靑蓮湧出有八龍聼經今有八龍池在焉敘州府魏劉眞人武帝時隱山中得道自平蓋山駕鶴入建州唐預知和尚大厯時有梵僧結庵於北巖六日諭其徒衆曰整治資糧衆請其故答曰今夕當有暴客至以此待之旣而盗至悉取糧去然竟夕不能出山遂舎之而遁見李文淵北巖記宋彥室輿地紀勝云太平興國觀相得山有異人紹興中王籍彥室嘗行山間遇道人欵語以腹枵告歸道人笑以肘捫其腹者三彥室頓覺異常歸卽辟榖踰年復夢見道人啖以棗呼之過溪彥室曰吾親尚在乃止元張法眞自㓜好道術延祐間往龍虎山受籙遇至人示以祕法旣歸禳災沴治疫疾㨗如影響及卒鄉人立廟祀之有禱輙應明羅天祐漢州人來遊長寧市若顚若狂善言人得失嘗隱語書鄉榜封以寄人撤棘無不騐者後入成都見司戸薛瑗於座上而化王守中泥溪司人自幼學仙於後山鑿洞調息十餘載一日尹蓬頭來訪遂引之去十八年一日復歸家云來救兄死時兄已入棺命取出以水浸之復甦後兄仕滇二十餘年共仙去萬厯四十六年臘月十一日午時後山崩出仙人洞卽守中調息處夔州府蜀漢翟法言雲陽人嘗詣棲霞宫採藥得道能召灘神見仙鑑楊雲外雲陽人與翟法言相繼得道於棲霞宮張卞梁山人按蟠龍洞碑云卞為蜀先主將因諫先主攻固陵不聽入山遇樵叟自稱䲭夷授以丹訣修煉上昇唐岑道願江陵人隋末避亂隠名棲山草衣木食十有餘年不知所終明果子巫山秀峰寺僧辟榖食果因以為名人有疾病呪水服之立愈直指陳某右手病不能舉咒水與飲卽痊主簿韓逹有心疾呪水療之亦愈具樹碑以表其事焉龍安府唐竇子明江油人為彰明主簿後棄官隱於竇坪未幾至圌山修道抵仙女橋見一女人磨針因問之答曰鐵杵磨繡針功乆自然成遂感悟復歸圌山怡神養性三載白日昇天今塑像俱存張眞人平武人隱天倉洞中都夏馬西峯於古山修煉聞之遠來欲訪以道眞人先入洞遂畱住閬中天旱禱雨有應事聞封康濟龍王宋遊仙女寶祐中有二仙女遊於小溪山人驟遇之冉冉升雲而去異香杳靄至今名其地為仙女鋪元張羽士至正間嘗師赤脚張神仙善行雷法祈雨輒應遇呂蓬頭授以黄白術遂以風魔醉酒行歌顚狂竟不知所終明智慧菩薩古城周曉師女生而不食葷好誦經年十九有議婚事輒自靣壁經旬不起嘗絕粒食柏葉成化五年促父母送至江利口白馬寺樓上自焚結跏坐滅歴暑不朽神靈顯異鄉人遂以沙築其身裝塑成像號智慧菩薩劒梓人爭事之最有靈驗空庵彰明縣香火寺僧得悟禪宗毎歲買藥以濟病者以榖粟飼鳥至千百下食環集肩背善吟咏有語錄至百有餘歲坐化雅州府漢理眞俗姓吳從嶺表來種茶䝉頂殁化石為像其徒奉之號甘露大師水旱疾疫禱之輒應宋淳熙十三年進士喻大中奏師功德及民孝宗賜號甘露普惠妙濟大師峯頂號天涯大渡河人父鄭常道母孟氏漢元平七年六月從母頂誕生故名峯頂七歲能言口生肉齒合掌白母住瓦屋山出家不知所終唐爾朱眞人詳見重慶宋張守虛字無知鳳翔人嘗賣藥於梓州因訪友過金鷄遂棲眞名山延禧觀後歸梓州號落魄仙以九日飛昇可正字無礙俗姓彭壯歲入邛南丑泉禪寺禮天滄禪師之室滄黙識其非常材遂令祝髪為僧一夕頓悟暢明宗旨後示寂名山縣之天目寺禪慧名山人屢舉不第元符間郡守呂由誠以僧勅戲之卽削髪明日住天寧寺長老叩以佛法不許乗馬師曰文殊駕獅子普賢跨象王新來一個佛騎馬也何妨其機敏類如此著有禪慧語錄行世韜智行脚僧工詩字至蘆山無衣履或以衣贈之卽口占曰未衣豈盡寒旣衣豈盡煖寒煖不在衣君意如春轉劉淸天全州人有辟榖導引術能叱咤風雷禱雨輒應無瑕蘆山天主寺僧年九十餘說偈坐化陶道人清溪人紹興間入獅子山採薪遇異人得道與王畫龍同時王毎畫龍最神異然必有所闕否則隨雷雨變化陶毎見王輒以杖擊之曰此龍妖也後俱不知所終甘常宇蘆山人人有疾求醫但加手摩其頂卽愈人以醫仙稱之壽及期頤一日大笑而逝本宗流寓蘆山削髪雲峯洞洞高雲際足不下山者數十年一日探奇又至一洞迷失道餐柏葉七日遇樵夫引出卽建為靈源洞後入䝉頂為禪門善知識直隷嘉定州雍正十二年陞為府古廣成子黄帝嘗於峩眉宋皇觀就之聞道今遺礎尚存古碑猶在漢葛由列仙傳綏山在峩眉山西南無極山上有桃羌人葛由居焉常牧羊賣桃一旦牽羊入蜀城王侯貴人追之上綏山皆得仙故諺云得綏山一桃雖不得仙亦足以豪瞿眞人名居字鵲子犍為人入峩眉山四十年得仙乗白龍還家於平岡治白日上昇晉葛洪句容人為求丹砂乞補勾漏令後入蜀取雄黄於武都山得之色如鷄冠喜曰吾丹成矣至洪雅之花溪因居巖洞存神養氣道成白日昇天巖前影跡尚存唐呂洞賓居二峩山猪肝洞詩云敎化先生特意來世人有眼不能開有人識我眞名姓我是終南呂秀才題之東嶽廟督學王勅識其仙筆令鑽一字墨透泥竹遂取去慧持遊峩眉山入滅於嘉州道左之古樹中至宋世風吹樹折頭髪蓋身指爪圍腰一匝有司以聞取至都西僧總持擊金磬再拜遂出扣之曰吾乃遠法師弟也總持再扣曰吾將陳畱入定遂去宋孫思邈寓居九老仙人洞太宗嘗夢思邈乞雄黄煉丹遣中使送至峩眉山忽見一老人語中使曰汝可置石上有朱書謝表一通中使旋錄旋滅再物色之不可見矣祖覺俗姓楊嘉州人住峩眉山中巖倡明佛法學者雲集儒釋之書無所不讀作僧史一百卷并華嚴經金剛經集解行於世皇甫坦善醫藥宋高宗詔見問何以治身坦曰心無為則身安人主無為則天下治引治顯仁太后目疾立愈渥賞一無所受高宗書清静二字以賜隆興初入朝孝宗稱為先生而不名坦善相嘗言京南帥李道中女母儀天下後果為光宗后東汀和尚嘉州人不執文字别有見解如所云諸佛以一句演百千萬億句收百千萬億句祗在一句祖師門下半句也無宋孝宗召對稱旨帝注圓覺經命之作序一日往别禪友僧策策問行日師曰水到渠成索紙書十二月初九夜鷄鳴時九字如期而化明萬世尊一名峩眉山人巴陵楊一鵬見之囑曰三十年後當見汝於淮上後楊開府淮安遣僧寄書至發函得詩楊尋失機被刑連呼好師傅云直隷眉州周彭祖古陸終氏第三子籛鏗也自堯歴夏殷時封於天彭周衰始浮逰四方晩入蜀抵武陽家焉或云卽論語所稱老彭漢史通平光武時自會稽來蜀詣峩眉山謁天皇眞人授以三一之法及五符訣遂居靑神結廬煉大丹成龍虎狀又廣行陰德功滿白日昇天唐楊昭慶景雲中自京兆來眉志尚𤣥虛居靑神遊仙觀三十餘年感五嶽丈人希受眞君授以朱明龍文遂得尸解成無為丹稜人開元間女道士幼而出家誓死不嫁卜居龍鶴山下調形煉骨却粒茹芝年踰五十昇仙而去棲隱之處有龍洞遺跡李煉師眉山人天寶九載修道於桐柏山中能禱雨以救民旱其應如響可朋丹稜人有詩名性好飲無以償酒債作詩酬之自號醉秃邑令歐陽迥納凉於寺是歲暴旱而衆方羅列樽爼迥擊腰鼔以自適可朋見寺外耕者曝背烈日中因上田皷詩以質迥迥覽之惻然遽命撤宴其詞曰農舍田頭皷王孫筵上皷擊皷兮皆為皷一何樂兮一何苦上有烈日下有焦土願天宮降之以雨令桑麻熟倉箱富不饑不寒上下一般遂雨著有詩千餘篇號玉壘集張遠霄眉山人見老人授竹弓一鐵彈一質錢三百干而張無靳色老人曰吾彈能辟疫癘宜寶而用之再見老人遂授以度世法熟視舉首見其目有重瞳後往白鶴山垂釣西湖峯上有異人曰此乃四目老人翁君之師也寧遂忘授竹弓鐵彈時耶張大悟牟羅漢眉州人名安以廂兵隷卒如岷山陟上淸坂忽遇髯者顧笑曰汝饑何不食柏子耶摘子投其口顧髯者已不復見矣從此不火食大雪中庭有大甕貯水解衣就浴江水瀑漲舟不可行或戲指其笠曰乗此渡可乎牟遂置笠水靣趺坐其上亂流以濟人呼為牟羅漢云宋陳太初眉山人初與東坡同學於張易簡後東坡謫黄州有眉山道士陸惟中云有得道者陳太初問之則同學者也又數年見東坡於惠州云太初已尸解矣玉泉俗姓王丹稜人依大力院出家元豐間張無盡奉使京西南路就謁之請開法於郢州大揚言畢而逝人稱承皓禪師心道名常德丹稜徐氏子年三十剃度為僧出遊江淮抵舒之太平寺師事佛鑑得證道果後遇賊亂其徒欲引之南去師曰學道以了生死何避之有賊至舉槊刺之血皆白乳賊衆驚怖引席覆之而去明張元羽眉山人精於黄白之術遇仙欲度之元羽云九載遨遊掛銕船十讀楞嚴不學仙仙遂拂衣而去有元羽集行於世李靑霞眉州李氏子歲歉父母棄之江流至靑神漁人夫婦無子者網得之育十餘年隨瞽史學琵琶至綿州高翰林家有道士與之論丹法李忽擊碎琵琶而求為道士徒許之遂徧逰名山歸綿卒葬於竇圌山閱數載眉州别駕尹姓者江西人方蒞任齋宿城隍廟問焚獻道士曰汝名曾天成乎道士瞿然曰小道名何先知曰吾來時有李靑霞道士居吾郡言余必選眉州此吾鄉也城隍祠道士曾天成是吾徒也為我寄聲天成曰李師殁已數載且葬於綿何復遊人間世耶始知其尸解云直隷邛州漢莫將軍河南人遺其名文帝時征雲南駐節莫佛鎭山下見石山狀如蒼龍出洞遂鑿斷之流血夜聞空中人語云將軍旣認破此地能捨官出家後必成佛莫如其言於此修行竟成正果云周馬成子扶風人去家訪道遇黄蓋童子授以胎元鍊氣之法乃入邛之鶴鳴山復於石洞中遇異人授以神丹曰氣為内丹藥為外丹今授子此丹服之當列高眞成子遂白日昇天橘中叟邛州民家有橘樹霜後餘一大橘如丰剖視之有二叟身尺許鬚眉皤然相對奕棋一叟曰橘中之樂不減商山但不得深根固􅺓爾一叟於袖中出草根噀之化為一龍二叟共乘之冉冉騰空而去唐楊通幽洪都人唐天寶間修道臨邛安祿山犯闕明皇幸蜀至馬嵬賜貴妃死厥後克復長安明皇思慕貴妃命通幽招至貴妃魂白居易長恨歌臨邛道士洪都客能以精誠致魂魄即通幽也宋王興為蒲江主簿性淡泊好道一日於長秋山遇白玉蟾引載共駕祥雲昇天明張三丰洪武末入邛之鶴鳴山時石鶴復鳴人咸驚異居半載入天谷洞不出年已三百餘歲矣直隷潼川州雍正十二年陞為府漢張道陵詳見保寧府唐法眞梓潼人妙齡夙悟南遊見藥山道人次石嶺外大溈㑹下清苦練行溈深器之一日問曰闍黎在此不曾問一轉語師曰敎某向甚麽處下口潙曰何不道如何是佛師作手勢掩潙口潙歎曰子眞得其髓還蜀寄錫天彭山山有古樹圍四丈餘南開一門中間不假斤斧師因游息其中時人遂號為木庵禪師云一新州治舊無鹽井一新遊蜀至此指其地鑿之鹽泉湧出因建寺奉其遺軀焉宋陳摶安岳人生於崇龕鄉旣長辭父母去學道或居亳為亳人或居洛為洛人或居華山為華山人見一統志今崇龕梨亦摶所植王杞字昌遇東川獄吏梓人也盡心獄事多陰德遇異人授以仙訣詩百篇深契易理大中末舉家仙去賜號保和道人趙法應别號肖庵中江人幼著靈異年十五詣雲臺山結茅練習至十九歲畱偈云脫落一貧道謫凡十有九記其歸去時在處重陽酒遂端坐化去其遺蛻歴宋元猶存望之如生詳見雲臺記董仲潼川人其詳不可考今城北有董仲書巖詩文尚存世傳以為仙云呂陶建中靖國時知梓州有客至賓次肅之甚恭或以問陶曰此呂洞賓也余自此去人間事矣後果傳仙去明劉道明初名昭安岳人自少居天慶觀終日黙坐歴二十餘年遂知䜟緯由是名聞遠近永樂間以星史之占召入時値六月命築壇祈雨三日果大雨上竒之卒年九十有九其他靈異多不可悉時人稱為劉神仙云羅仙女中江人少顓䝉父母醮之忽一旦開悟卽諳經義遂入僧寺談空說法了了無礙且預知禍福人爭詢之未幾坐化去踰三年啟棺視之其靣如生覺壽遂寧人明心性遊長安道上得遺金俟其主反之後歸適廣福井調息跏趺坐井上鹽泉湧出永樂甲午邑乆旱復登廣福山絕粒禱雨旬日果大澍年九十不知所終福湛號天淵楚人居蓬溪智林寺勤苦修行解悟空寂為時禪宗所著有天淵錄二卷及卒有偈云七十七年一笑終倒騎木馬吼西風我今脫殻飛騰去明月淸風一様同無際姓莫名了悟一號蠶骨安岳人居大竹黒崖勤苦修行乆之若有所得乃師古拙及無念遂得釋氏之要旣而卓錫道林四十餘年脫胎離行時著靈異四方無賢愚咸嚮之正統間召入勅為宗師登壇說戒觀聽如堵及卒賜祭給傳還葬木門所著有語錄一卷了用姓張號雪機遂寧人少善應教偶聞人言遂感悟靜坐數年深有所得印證於天淵和尚嘗作山居詩有云傍樹修庵倚翠岑烟霞繚繞白雲嶔愚痴自合棲泉壑潦倒何妨論古今怪石溪邊塗去跡浮嵐巖下絕來痕始因人道藏幽谷截斷攀援更莫尋年七十二卒其日彩霞繞寺人咸異之直隷瀘州唐胡佯道人容貌竒古美髯秀目唐末於江安縣東六里山峯絕頂修煉嘗適梓州見獄吏王昌有陰德授以仙訣舉家白日上昇明韓飛霞州人其雋才為諸生制行高雅試不第遂棄儒服黄冠出遊遇異人授以仙術尋得道名聞於朝正德間召見賜號抱一守正眞人直隷資州明釋道慧資州人與德陽令樊鼎遇為方外交萬厯癸丑夏樊病甚因亢日夢帝命作桐柏山神以書問之慧謂之曰諸業由心造諸果亦由心證帝命亦由心改公平日見地作麽生於此著念樊又問病痛甚奈何曰提起主人公問誰為主曰覺痛者是曰四大解散痛亦不知誰為覺者慧曰覺原無痛痛亦非知知覺無痛痛痛卽離豈待四大解散覺體無邊際四大浮漚耳樊大有省悟直隷綿州宋黄鹿眞人綿州馬氏女名道興七歲時遇異人授以鉛汞符篆要術及笄乃祖逼以聘事堅辭夜與女奴攜杖策而去卜地修煉乆之前異人復至授以黄白之術後四十年道成遇羣盗入庵刼之遂乗黄鹿騰空而去異香經日不散後人卽其地建觀以崇祀焉明江老軍名添富綿州人嘗從軍遇異人授以修養要訣髪白反黒齒落復生一食斗米鄉人毎請禱雨必應暴風雨中屢日不動冬寒則剖冰而浴壽至九十有九尸解雪庵樂靜禪師安邑譚氏子嘉靖壬辰祝髪南叅還蜀嗣海藏住道峯院萬厯十一年元日索筆書偈曰只此漚泡幻影相隨六十餘年横眠三界刹那無處顚倒人間皎然空花影絕見聞寂寂虚閒問取雪庵靣目處處綠水靑山書畢跏趺而逝四川通志卷三十八之三欽定四庫全書四川通志卷三十八之三僊釋蜀自李耳畱跡普賢過化其有僊釋也由來舊矣厥後祖而述之代不乏人咸謂可以長生乆視感通利濟之不爽而執拘墟之見者又必欲盡廢其說夫佛老之教主於虚無渉於因果其與易之何思何慮書之福善禍滛畧相彷彿故孟氏言歸斯受之昌黎言墨名儒行則夫存其姓名紀其事實正所以因勢利導使後之宗其敎者就所明而漸通於經常之大義也作僊釋志成都府夏李八百蜀人初居筠陽之五龍岡歴夏商周年八百歲一云動則行八百里時人因號李八百或隱山林或居廛市又修煉於華林山石室丹成還蜀中周穆王時居金堂山號紫陽眞君其後遂得仙封妙應眞人周老子河南歸德府苦縣人為周柱下史得長生術嘗駕靑牛度函谷關為關令尹喜著道德經五千言曰千日之外求我於蜀中靑羊之肆至期果至授喜玉册金文賜以元始先生之號杜宇古蜀主蜀嘗大水宇率居民避長平山後鼈靈開峽治水人得陸處宇禪位與靈自居西山得道上昇時適二月子鵑鳥鳴故蜀人悲思曰吾望帝也因呼為杜鵑云漢費長房東漢時為市掾從壺公學仙後辭歸與一竹杖曰騎此任所之又作符曰以此主地上鬼神乘杖須臾來歸自謂去家旬日實已十餘年矣投杖葛陂中廻視則化龍矣葛坡今龍池寺張道陵修眞艷陽洞辟榖煉丹後羽化人呼為豔陽仙人李常在蜀郡人少治道術居民累世見之初有二男一女皆已嫁娶乃去止二弟子隨之後俱以靑竹杖度其身二弟子歸家置杖臥牀其父母見兒尸在牀各泣而埋之復有人於郫縣逢二弟子仍隨常在行附書到家其父母發棺視之惟見靑竹杖而已常在又别娶婦其子徃尋之常在曰吾兒欲來見我我法不得見兒兒泣而别去折象廣漢人少學黄老師事東平先生家世豐裕以為多藏必厚亡散千金以賑貧苦或諫之象曰竇子文有云我之施物乃逃禍非邀福也智者咸服其言後自尅期七日尸解如蟬蛻焉晉范友字子元涪陵人隱居西山蜀人敬之號曰長生惠帝時李雄攻成都百姓皆保險自守長生亦率千餘家依靑城山後雄得成都以長生有道欲迎為主長生固辭乃拜為丞相下令曰為國之道得賢則興吾得賢矣尊曰范賢於湔氐邨築館為長生稅駕之所拜進太師西山侯不受歸靑城山後仙去梁尚圓廣漢人自少出家以術救物梁武陵王紀宮中多鬼圓曰何以敢入王宮可聽我一言於是諸鬼合掌圓即發咒鬼皆失所在武帝聞之大加奬賞隋劉珍什邡人開皇中居安樂山忽取所藏經及鐘磬封於石室曰後六十年當有聖君取之且曰吾功行已成四月之望當上昇届期珍果沖舉倐至長安見隋文帝自言飛昇事帝未信遣使訪之悉符所言遂為建二觀後唐高宗時遣使取經並鐘磬以進珍言果驗宋治平中賜額延眞唐無相禪師益州人住成都淨因寺華亭船子和尚住淨衆寺王柯字野山靑城人母丁氏夢大星照身生柯幼而穎悟長而仁慈見老弱孤貧者惻然哀之毎大雪時施粒食以濟禽鳥嘗遇至人授以丹訣乃居洞中修煉歴年無成鼎忽破丹悉化為金後上西峯遇道士煉丹柯乃助其薪炭奉事三年不怠道士嘉其誠授以祕訣丹成分遺柯服之身輕門側有柏騰身而舉已在樹杪考其尸解時乃在高宗儀鳳三年五月云江西馬大師號道一什邡人生而頴異牛行虎視引舌過鼻足下有二輪開元中事南岳讓和尚祕授心印開法建陽臨川又至南康龔公山嘗言人各信自心是佛此心即是佛心又謂一切法皆是佛法諸法即是解脫解脫者卽是眞如諸法不出於眞如行住坐臥悉是不思議後於貞元中圓寂壽八十元和中追諡大寂禪師羅公逺彭州九隴縣人修道於澧沅常徃來靑城羅川間開元中因遊鄂州刺史園亭刺史問何來答云適見守江龍來此刺史未信曰須令見其形曰請俟後日及期刺史與郡人皆至見一白龍於江心頭與雲連食頃方隱刺史具聞明皇召見毎問無不稱旨嘗召公遠與葉法善金剛二藏試法而公遠嘗勝尤善自隱上欲傳其術公遠曰陛下玉書金簡已格九淸豈可以四海之尊輕狥小術耶若盡臣術必懷璽入民間困於魚腹也上不悟怒斬之後有使自蜀還公遠謂使曰吾晉成帝咸和年間入蜀棲修林泉聞天子好道而來又謂人間腑臟葷血充積三田未虛六氣未潔請以十年而授上如何遂殺我耶然得道之人形氣混合豈能以世俗兵刃為害因出一書謂使曰可以此達上上必悟焉仍以蜀當歸為贈驗不誣矣及明皇幸蜀迎公遠於劒門至成都拂衣而去世傳公遠於蜀九仙臺上昇彭漢之人至今立像祀之傅仙宗長安人父倫為資陽令宗性沈黙好道有神人告以修眞地遂乘靑騾赴平岡山隱焉開元間詔赴闕經利州桔柏江除水害利人祠祀之已而至都應對稱旨優賜後上問卿何道致此對曰守以恬淡行以簡易耳又問金丹曰惠及民物卽長生也上大悅乆之還山詔修葺舊觀賜額為眞應觀乾道二年沐浴登榻而逝邑人王念還自成都見其乘靑騾於簡州道上中丞宋渾為撰碑焉阿世多尊者天竺人唐時入中國止灌口靈崖山常令白牛下山募糧取水神異變幻難測今靈崖有石刻像存德山宣鑒禪師簡州周氏子丱年精究律藏於性相諸經無不貫通聞南方禪席盛行師氣不平出蜀往謁龍潭至法堂曰乆嚮龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂棲止焉一夕侍次潭曰何不出去師出却回曰外靣黒潭點紙引燭度與師師擬接潭復吹滅師於此大悟咸通六年壽八十四卒師傳其法於雪峯存存後分法眼雲川二宗徐佐卿明皇九日獵沙苑射中飛鶴帶矢飛去益州道觀有道士徐佐卿寄寓是日自外持一箭歸曰吾為飛矢所傷已無恙因挂箭於壁書其月日且云後十年箭主至此付之後明皇幸蜀至觀中乃見箭悟達國師居彭州九隴山至德寺作慈悲水懺李商隱嘗師事之李班蜀人得黄石公丹道改名棲眞號太虚詣武夷山潛修七月歸經龍虎山先夕雩壇有夢真人者時旱禱弗應次日班至其處衆弗知也夢者指之羣請禱雨應時霑沛後至眞州王虚菴以道授張紫璚囑曰金丹宜潛修大道當人授尋歸靑城山以九月九日上昇了覺禪師京兆人得法於洞山价師初入湖南至洞山見堂僧問淨名大士入不二法門旨趣何如曰山僧未敢舉明又問若是則事理不分答云扁舟已過洞庭湖師剏成都昭覺寺五代神和子姓屈突名無為五代時人張詠常遊京師於封丘門逆旅遇一道士與飲至醉詠曰不知姓名異日何以相識道士曰我神和子也異日見子於成都耳後詠守成都始思其言嘗物色之弗得後於天慶觀院堂壁上畫一道人肖逆旅所見視其題曰神和子詠悵然自失昭覺圓悟勤禪師彭州駱氏子得法五祖示衆云通身是眼見不到通身是耳聞不及通身是口說不著通身是心鑑不出通身即且置或若無眼作麽生見無耳作麽生聞無口作麽生說無心作麽生鑑若向這裏撥得一線路便與古佛同參師卒於紹興五年茶毗時舌齒不壞本併五色舍利無數塔在昭覺寺側朝雍正十一年勅封明宗真覺禪師致祭一次元酆都道士未詳何許人元大德戊戌棲隱雪峯山乙卯季冬召集道友曰吾化矣大道坦然皎如日月雖由人𢎞豈隨人徃諸生宜遵道而行毋令半塗而廢偈曰朴菴寄住有年東西南北依然裏靣渾無一物只有𤣥文數篇今日草茅朽腐須要改换棟椽眼底風波大惡不容乆住山巓選得幽居去處和軀移上大天端坐而逝明張三丰不知何許人洪武中入蜀僑寓環衛姜指揮家寒暑惟一箬笠笠甚大雖小戸出入不礙繫鐵線條極工緻朝夕居一磐石上嘗取梅枝插土卽生花皆下垂故成都昔年猶遺照水梅種焉永樂中游内江寓明玉道人家詭云龎姓微示以異嘗履極險不墜渉水無少濡明玉善符咒多奇驗欲授三丰三丰笑曰我以道奉公公乃以法授我耶乃作道法會同疏一通畀之居歲餘胡濚物色之遂同玉見胡後又往來峩眉山中或曰天目人名君實字鉉一懷空學道玉屏山明永樂中欽賜講經寶帳有語錄行於世里人建寺置塔塔奉其遺軀後寺焚毁獨塔軀如故繡枕灌縣導江人明初以處女修証圓寂肉身至今存人號繡枕觀音遠近祈嗣者輒應譚子家天池山側生而穎悟一日行池上歸辭父母曰今日遇吾師當隨去遂不見父母哀思作室池上望而招之後數年歸省尋去里人為祠祀之故又名天池曰譚子池余喜巖延安人性資朴古住大淸宮年踰八十永樂五年三月二十六日更衣焚香盤趺而坐曰來由此門去由此路一脚不失回頭卽悟鼻垂雙柱旬日顔色不改智中國師彭縣人也生有異相年十二即禮月光禪師惠心清修苦行晝夜不息後惠心授松潘都綱師隨去尋代其職時番夷叛服不常師居邊撫化番夷莫不投伏天順間累加封國師仍賜勅誥降銀印師在邊四十餘年化行功著成化二年年踰七十詔歸彌陀庵優老焉楊汝眞揚州人自幼刻苦修全眞之道後遇異人授以奥理遠遊於彭來往葛仙陽平二觀蜀藩聞其道嘗致敬焉壽一百二十一歲於丹景山尸解赤脚姓金毫州人由秦隴來苦行絕火食赤足不襪近五十年至灌縣修靈崖寺路行叱虎虎卽遠去王勅字嘉訏號雲芝𢎞治中督學四川能前知休咎嘗煑雲母石為糧張鶴鳴有傳吳進寶成都道士𢎞治中嘗遊新繁駱本隆家夜有盗數十人至舉家驚惶寶戒之曰無恐為我取草來作小圈數十遂啓門盗入寶擲圈羣盗如縛不能動哀泣求解寶令本隆以酒肉賚之盗叩謝而去又嘗夏夜宿雷氏碾中近水多蚊寶以手畫碾中為界禁之至今無蚊在縣東郭外周仙葫名子興成都人居五塊石一日遇道士李丹陽於靑羊宮因師事之丹陽每至子興家必索食達旦不醉人莫測其所以且授以酒方釀成香徹數家後人效其方多不驗興家架上植藥葫蘆丹陽手挽一結於細腰處如出生成遂摘而藏之數年丹陽辭去興治具欵之臨行納熟肉一盤於袖而去明年有自楚歸者云某月日遇丹陽於延聖坊登樓共飯出袖中熟肉曰此周君贈我物也興計其日時甫踰刻耳因悔不與仙去乃取丹陽所遺書讀之獨臥一小室乆之棄家佩葫蘆往尋丹陽徧歴湘湖間竟莫知所終劉從儉新繁人嘗訓䝉有道士授以書從儉讀不釋手諸童䝉荒漸去其婦奪書投之火儉隨入火取書毛髪無損自是如狂不家宿人或以鴆酒試之笑而不飲明本漢州人少育於姊夫高晟家伐薪㸑一日載薪山中驢不行怒砍其耳血流被地心卽悔悟遂柷髪為僧入什邡高山寺安鉢功行極苦坐化之日人有自鎣華山來者見本隻履入山云失一履於禪榻下可令吾徒寄送見者至寺方知其已化云本來崇慶州人進士張某之子避難蘆山削髪為僧一日說法有將校闖入請以射為說師卽於座應聲曰射得中是爾的功行射不中是爾的慈悲僧德愛自號印心華陽人七歲出家聰慧好道通儒佛兼知醫遇病輒施藥救之壬子歲荒飯僧及流民活者甚衆晩年歸刹止靜棲禪臨終西向說偈而逝是夕紅光竟夜不散無遐不知何許人居九峯山絶頂修行時往來邨落中見邨民馬忠女甫週歲有病以破布繻餌之立愈又曰此女當貴後適趙姓果封恭人嘗至縣詣邊氏家一徒羡其侈麗曰汝樂之何不遂來此後三日徒死邊氏舉子哭不食乳師往探摩其頂曰卽來何須哭耶子遂輟哭一日語弟子治齋邀諸僧作别諸僧至舉齋一笑而逝妙琴字無絃華陽人母高氏有娠毎見異徵生而姿貌奇古善詩工書畵里人得一紙珍重如寶入楚又以畵牛得名稱牛和尚還蜀住草堂構室榿東有梅蕚千株畵梅入妙自號梅居老人萬厯九年趺坐道偈而終蜢蟲子不知何許人隆萬間來成都獨處靑羊棲足有惡瘡臭不可聞然四體溫粹如玉猶然童身無冬夏跣足敝衣時行市中市中無頼率小兒呼噪之有以竹刺其膚石擊其足者但笑曰蜢蟲子人因以為名見人則索酒與餅飲食之亦不謝或取草木之不可食者與之亦輒食好事者為製新衣履旋為羣丐所奪畧不為意時馮方伯成能偶遇而叩之耳語移時旣而曰公可歸矣馮逡巡未决忽以疾卒人始異之後竟不知所終明采崇慶州人少剃度為僧及長精止觀法門不立文字萬厯四十五年示寂其夜僧徒百許人見有紫氣投西南去有偈云念滅滅亦滅更有何不滅本來原無說皎月當空徹彭成新都人少業農長齋誦佛出語無倫次人目為癲萬厯己亥九月忽語人曰吾將大化幸以薪油助我衆笑之求不已漸有施者得油則飲薪則負至河濱疉而成樓又焚鬚髪搗飯作大念珠二十四以篾貫之瓣香向四方膜拜拜畢身坐柴樓火從香起持飯粒念佛不動端然而燼萬竹名紹乾號一淸後更號萬竹性恬淡篤學葺茅峩山雪巖僅可容膝茹菜三年神氣和暢還成都與道友犀泉結廬百花潭上叅究心宗一日憣然若醒嚮道甚力入南都講肄說法聽者如堵復挂錫五臺刺血硏金書法華九載萬厯初入燕京栖普賢庵刋行彌陀箋註講演諸經後還成都蜀主造講堂於浣花溪側居之一日登堂集衆端坐而逝皇淸海明號破山梁山人天童悟法嗣第三人也嘗勸賊帥李鷂子勿多殺人賊以羊豕進曰若食此吾當封刃破山曰老僧為百姓生靈忍惜如來一戒乎遂嘗數嚮賊為止殺識者比之誌公啖鴿摩什吞針云通醉號丈雪内江人破山弟子蜀禪教皆祖破山故丈雪演化於昭覺寺門徒甚盛年八十餘示寂住持弟子佛寃卽其從子顚和尚長安人蹤跡詭異蜀臬某迎之成都禮拜甚恭而顚往往靣斥之言無忌憚嘗食犬肉㡌簷插花一枝引羣丐遊行市中入昭覺寺見丈雪禪師詼嘲不屑禪師頗敬憚焉一旦騎馬出城數里語廏吏曰吾歸矣竟舎騎徒歩去臬追贐不受徃來秦蜀棧中所至輒畫達摩像施人歸至長安數日遂坐化張氏溫江人未笄而娠父疑之棄逐于外女剖膓示父内俱經書事聞賜建女仙觀在治北邑人上巳日常遊此石穴僧不知何許人夷臥成都山中石穴内二十餘年不起亦不飲食當臥處痕跡宛然山中樵牧習見之就問不答一日有士子於此山遇髯道人云此山有六祖應化之否士子卽詣僧禮拜云師六祖耶乆之張目曰莫信髯道人亂道明日再過之不復見矣重慶府漢王方平棄官學道寓太尉陳統家忽然尸解棲眞平都山魏青龍初白日昇天陰長生延光初從馬明王求仙乃取太清神丹經授之初居靑城後於平都山上昇晉淨業石照人姓文少業屠有羊旣乳將殺之二羔銜刃伏門業感歎棄家為僧忽大悟作頌曰昨日羅刹心今日菩薩靣羅刹與菩薩不隔一條線唐藺沖虚涪州人居于祖師觀神龍乙巳秋一夕乘雲而昇黄萬祐未詳何許人修道於黔南無人之境累世常在毎三五十年一出嘗賣藥成都言灾禍神驗王建禮事之問其服食皆秘而不言問其齒則曰吾只記夜郎侯王蜀之歲蠶叢氏都郫之年時被請出烏交馳花開木落竟不知其甲子矣一日南望嘉州曰犍為之地何其炎炎已而嘉州市肆果為瓦礫後辭建歸山固畱不聽爾朱眞人名通微號歸元子其先出元魏爾朱族遇異人得道唐末遂落魄成都市中嘗於江濱取白石投水衆莫測後自果至合賣丹於市價十二萬刺史召問其直更增十倍以其反覆盛以篾籠棄諸江至涪州漁人石姓者得之因授以丹二人俱仙去王㡌子出入闤闠為人修敝冠號王㡌子暮則臥於涪州天慶觀一夕尸解而去道士為葬之月餘自果山貽書致謝之韋昉蜀人夜渡涪陵江忽遇龍女遣騎迎入宫後昉登第十年知簡州龍女復遺書相迎勅命昉充北海水師宋宗璉石照人姓董住潭州大潙山有僧過其家指燈示之曰燈照汝耶汝照燈耶答曰燈亦不照我我亦不照燈扁其室曰窮谷劉錡鎭荆南問窮谷何義璉曰心盡曰窮性凝曰谷隨嚮應聲不疾而速顯嵩銅梁人姓李住巴州之宣密院三十年足跡不出紹興間集衆告以將逝作頌曰八十年中常浩浩宏開肆貨摩尼寶也無一箇共商量不是山僧收鋪早端坐而寂徐神翁常居樂溫之北眞觀相傳神翁於此飛昇去今觀之右有飛仙臺仙人跡尚存後人有仙翁去後畱踪跡丹竈沈沈瑣翠烟之句今題咏甚多趙覺未詳何許人修煉於合州之東山宋嘉祐中沖舉而去今山頂有飛龍觀石寶丹井井不盈尺常竭其水可愈疾人毎來取則以淨巾覆井上黙禱少頃水自滿又有禮斗臺今石上衣佩履跡見存石頭和尚號四祖師合州人自㓜入景德寺為僧有戒行因鑿石出火遂大悟作偈曰是石頭和尚咬嚼不入打破虛空露些子迹復白州守開釣魚山建䕶國寺自甃石二十四片為龕全身入門自掩端居而逝有草庵歌其末曰老僧不知輪甲子一葉落知天下秋眞容榮昌人姓徐氏自幼為觀音寺僧禮佛守戒後卒生於壁山魏伯禄家年十七不能言一日謂其家曰吾生前故觀音寺僧今當復還歸寺乃譚生前事皆不爽僧衆往謁皆知其名邑令周俊密使人往觀容先令徒一人具茶徃候于塗人皆異之號為神僧一日跏趺而化明楊常符豫章人雲游瀛山首創白雲觀金牛穿逕玉井開基連理呈祥甘霖應禱迄今山以仙名道因地顯代有異人楊大明常符首座賦性樸魯精於修煉一日拜辭師友結坐而化張太虚貴州人瀛山全眞披虎皮行乞人呼張虎皮終日嬉戲與物無忤蓋蘇門先生一流人也赤陽子不知何許人黔江縣西烏鵲觀有道士題詩云萬里長江渺碧霞彤雲飛映到烏鴉崖寒木冷仙寰别水秀山奇景物華游子樓頭傾竹葉牧童牛背落梅花興來一覽乾坤濶笑傲壺天歲月賖後書赤陽子題墨跡透壁喩常淸邑里無考寓黔江千戸陳綱家三年綱敬禮之常入八面山採藥歸寓燒煉一日丹成欲度綱綱適他往謂其僕曰吾在此三載矣汝主遇我厚無以謝汝主因畱葫蘆一枚草履一隻以作後驗逾年汝主有難時二物雖微可以解脫綱歸而常淸已去僕具以告綱異之未幾有自渝郡來者亦見常淸云然考其日月皆同乃始知其為僊也綱後果為人所訟幾致重譴因憶前葫蘆草履遂獻中丞林其中竟脫綱於難而中丞攜葫蘆及履入山修道焉胡老道黔江人修養有年年一百三十歲貌若少壯好事者以女色試之畧不為動後尸解去寶崖涪州人幼寡言不嬉戲棄家爲僧以布裹五指燒之曰信佛如此可也人以為風疾何不治之答曰身在空耳四大五肢復何有耶投火滅身而心不壤雪峯和尚黔江人有道行禱雨輙應後坐化人咸稱為善知識火傳居士姓沈氏名復賢墊江人幼喜老莊書嘉靖時為楚雄司李耿介有執法難移薑桂性媚人不易殺人難之句後歸里築室東山之麓寒暑誦華嚴不輟毎遇夜月明卽呼吸精華一夕命置棺於堂薰沐端坐吟曰辜吾一副臭皮囊煩惱曾經幾萬塲秋月一輪清徹骨翻然笙鶴白雲鄉吟訖投於案仰臥而卒後有鄉人經三峽見小艇中一鶴髮翁吟云孫登發一嘯火傳接其音亟鼔棹追之艇倐逐烟波而滅尚陽子不知其名姓寓居於墊江嘗就飲李長春家閱三年敬禮不倦時値除夕家乏鹽尚陽子曰兹何難子第閉目隨余往便可得鹽長春從之耳畔颯颯惟聞風聲及開眼時身已在壓子崖邊矣又邀之渡江長春不敢行遂獨乘白羊渡龍舌灘而往頃卽囘攜鹽若干雨付之曰足汝三年之用矣一揖而去長春果三年不苦淡食秀崖和尚法名興國墊江人邨中牧牛忽為僧萬厯間掛錫京師臥佛寺適青宮嬰疾醫院呈方皆不效師進觀音水一盂服之立愈勅封䕶國禪師太子太保陳五雲黔江鷄足山人修煉於八靣山每煉杏核丹以濟貧人皆稱為老僊與邑人湯瓊友善崇禎十二年忽辭别瓊瓊叩其故曰黔邑將壞不可乆居遂去明年冦圍城刼掠甚慘人始知其有先見也皇淸稽古靈住綦江中峯寺年一百一十有五骨健神淸不畏寒暑從逰者惟敎以敦倫行善他無所語康熙十九年呼衆升座說偈示寂蒼桐法名海華綦江儒家子棄儒入釋叅悟屢年有語錄行世年八十餘歩履如飛康熙二十三年一日坐木牀微笑而逝保寧府漢張道陵居閬中鶴鳴山煉丹修道感老君授以祕籙遂領弟子趙昇王長來雲臺山煉大丹服之永壽二年自以功成道著乃於半崖躍入石壁中自崖頂而出因成兩洞崖上曰峻仙洞崖半曰平仙洞是年九月九日將諸祕籙玉冊玉印斬邪劒授長子衡乃與夫人雍氏登雲臺峯白日昇天年一百二十三歲宋羅晏閬中人兒時牧山下見二道人奕捨牧觀之道人出囊中餅與之晏食已歸家覺腹中如燎發狂累日自是常飲水數日不一食預言禍福無不驗宋宣和中賜號靜應處士張浚嘗延至軍中晏曰相公勿恐明日賊退果然加號太和沖夷先生壽至百八十歲云明蒲從善江南人有道行祈禱治病符篆靈驗洪武十八年遊南畿受知於太祖鄭本昭化舉人至河北見雲端雙鶴聨翩而下及至則兩道人也因尾之二人顧問本跪道所以牽挽不舍二人曰吾被汝窺破因授以修煉法遂歸絶意進取棲隱山林年九十尚作小楷無疾趺坐而逝人以為尸解去雪凭不知何許人正統景泰間與無際禪師為友至廣元之天臺山喜其幽僻息心棲止初雖不知文字乆而成覺著雪凭語錄傳於世實相豫章人萬厯壬辰卓錫廣元之雪峯解文字時游戲詩畫譜經典翻刻七百則公案評唱若干卷逹官士人多採藏焉黄太史輝為作塔銘曉宗昭化人遊南海三十年萬厯丙申歸居縣之梵天院跪誦法華經禁歩不出五載結室於人頭山麓戊午秋集居人告以將去衆以為他往懇畱之曰未也嗣當辭謝兹山狼虎縱横日暮則人不敢出戸是夜諸人夢寐中俱聞叩門作謝聲達旦往視則跏趺逝矣鼻垂玉筯至膝遂作塔以藏焉順慶府漢馮眞廣安州人馮緄子也修煉岳門山頂白日昇天隋程太虛西充人自幼學道精修勤苦隱居南岷山絕粒有二虎侍左右九井十三峯皆其修煉處也一夕大風雨砌下得碧玉印人每乞符祈年印以與之輒獲豐稔唐元和中尸解後遷神於元宫容貌不變宣宗命人求之過商山宿逆旅躡絕險有居第如公館靑童引見一道士自稱程太虚祖居西充且囑曰明歲君自蜀入南岷無忘我及至蜀視畫像與前見者無異宋賜號道濟大師唐袁天綱南充人居朱鳳山修煉丹井尚存爾朱通微詳見重慶謝自然南充人貞元中以女冠於金泉山白日上昇萬目共覩韓退之有詩葛由蓬州人嘗乘木羊上綏山隨者皆得道上昇胡德元蓬州人從孫太和修煉千日畱偈上昇宋張英英宗初拜儀隴尹過采石江遇一女子姿貌絶世謂曰五百年夙約與君當㑹於大儀山英叱之至任幾半載日夕聞機聲一日率部衆逐機聲而往行數里至大儀山一石洞門鑰宛然門忽開前女出迎相攜而入洞門卽閉從吏哀號忽二圓石自門隙出衆取歸中道不能舉邑人建祠塑像各置一石於腹至今有禱輒應廟曰永濟圭峯禪師蓬州人相傳鷺鶿山有井井側有巨人跡女履其跡而娠生師棄諸野馬牛避弗踐鷺鶿以翼覆之母収以養及長奉佛於靑蓮山講經於上靑蓮湧出有八龍聼經今有八龍池在焉敘州府魏劉眞人武帝時隱山中得道自平蓋山駕鶴入建州唐預知和尚大厯時有梵僧結庵於北巖六日諭其徒衆曰整治資糧衆請其故答曰今夕當有暴客至以此待之旣而盗至悉取糧去然竟夕不能出山遂舎之而遁見李文淵北巖記宋彥室輿地紀勝云太平興國觀相得山有異人紹興中王籍彥室嘗行山間遇道人欵語以腹枵告歸道人笑以肘捫其腹者三彥室頓覺異常歸卽辟榖踰年復夢見道人啖以棗呼之過溪彥室曰吾親尚在乃止元張法眞自㓜好道術延祐間往龍虎山受籙遇至人示以祕法旣歸禳災沴治疫疾㨗如影響及卒鄉人立廟祀之有禱輙應明羅天祐漢州人來遊長寧市若顚若狂善言人得失嘗隱語書鄉榜封以寄人撤棘無不騐者後入成都見司戸薛瑗於座上而化王守中泥溪司人自幼學仙於後山鑿洞調息十餘載一日尹蓬頭來訪遂引之去十八年一日復歸家云來救兄死時兄已入棺命取出以水浸之復甦後兄仕滇二十餘年共仙去萬厯四十六年臘月十一日午時後山崩出仙人洞卽守中調息處夔州府蜀漢翟法言雲陽人嘗詣棲霞宫採藥得道能召灘神見仙鑑楊雲外雲陽人與翟法言相繼得道於棲霞宮張卞梁山人按蟠龍洞碑云卞為蜀先主將因諫先主攻固陵不聽入山遇樵叟自稱䲭夷授以丹訣修煉上昇唐岑道願江陵人隋末避亂隠名棲山草衣木食十有餘年不知所終明果子巫山秀峰寺僧辟榖食果因以為名人有疾病呪水服之立愈直指陳某右手病不能舉咒水與飲卽痊主簿韓逹有心疾呪水療之亦愈具樹碑以表其事焉龍安府唐竇子明江油人為彰明主簿後棄官隱於竇坪未幾至圌山修道抵仙女橋見一女人磨針因問之答曰鐵杵磨繡針功乆自然成遂感悟復歸圌山怡神養性三載白日昇天今塑像俱存張眞人平武人隱天倉洞中都夏馬西峯於古山修煉聞之遠來欲訪以道眞人先入洞遂畱住閬中天旱禱雨有應事聞封康濟龍王宋遊仙女寶祐中有二仙女遊於小溪山人驟遇之冉冉升雲而去異香杳靄至今名其地為仙女鋪元張羽士至正間嘗師赤脚張神仙善行雷法祈雨輒應遇呂蓬頭授以黄白術遂以風魔醉酒行歌顚狂竟不知所終明智慧菩薩古城周曉師女生而不食葷好誦經年十九有議婚事輒自靣壁經旬不起嘗絕粒食柏葉成化五年促父母送至江利口白馬寺樓上自焚結跏坐滅歴暑不朽神靈顯異鄉人遂以沙築其身裝塑成像號智慧菩薩劒梓人爭事之最有靈驗空庵彰明縣香火寺僧得悟禪宗毎歲買藥以濟病者以榖粟飼鳥至千百下食環集肩背善吟咏有語錄至百有餘歲坐化雅州府漢理眞俗姓吳從嶺表來種茶䝉頂殁化石為像其徒奉之號甘露大師水旱疾疫禱之輒應宋淳熙十三年進士喻大中奏師功德及民孝宗賜號甘露普惠妙濟大師峯頂號天涯大渡河人父鄭常道母孟氏漢元平七年六月從母頂誕生故名峯頂七歲能言口生肉齒合掌白母住瓦屋山出家不知所終唐爾朱眞人詳見重慶宋張守虛字無知鳳翔人嘗賣藥於梓州因訪友過金鷄遂棲眞名山延禧觀後歸梓州號落魄仙以九日飛昇可正字無礙俗姓彭壯歲入邛南丑泉禪寺禮天滄禪師之室滄黙識其非常材遂令祝髪為僧一夕頓悟暢明宗旨後示寂名山縣之天目寺禪慧名山人屢舉不第元符間郡守呂由誠以僧勅戲之卽削髪明日住天寧寺長老叩以佛法不許乗馬師曰文殊駕獅子普賢跨象王新來一個佛騎馬也何妨其機敏類如此著有禪慧語錄行世韜智行脚僧工詩字至蘆山無衣履或以衣贈之卽口占曰未衣豈盡寒旣衣豈盡煖寒煖不在衣君意如春轉劉淸天全州人有辟榖導引術能叱咤風雷禱雨輒應無瑕蘆山天主寺僧年九十餘說偈坐化陶道人清溪人紹興間入獅子山採薪遇異人得道與王畫龍同時王毎畫龍最神異然必有所闕否則隨雷雨變化陶毎見王輒以杖擊之曰此龍妖也後俱不知所終甘常宇蘆山人人有疾求醫但加手摩其頂卽愈人以醫仙稱之壽及期頤一日大笑而逝本宗流寓蘆山削髪雲峯洞洞高雲際足不下山者數十年一日探奇又至一洞迷失道餐柏葉七日遇樵夫引出卽建為靈源洞後入䝉頂為禪門善知識直隷嘉定州雍正十二年陞為府古廣成子黄帝嘗於峩眉宋皇觀就之聞道今遺礎尚存古碑猶在漢葛由列仙傳綏山在峩眉山西南無極山上有桃羌人葛由居焉常牧羊賣桃一旦牽羊入蜀城王侯貴人追之上綏山皆得仙故諺云得綏山一桃雖不得仙亦足以豪瞿眞人名居字鵲子犍為人入峩眉山四十年得仙乗白龍還家於平岡治白日上昇晉葛洪句容人為求丹砂乞補勾漏令後入蜀取雄黄於武都山得之色如鷄冠喜曰吾丹成矣至洪雅之花溪因居巖洞存神養氣道成白日昇天巖前影跡尚存唐呂洞賓居二峩山猪肝洞詩云敎化先生特意來世人有眼不能開有人識我眞名姓我是終南呂秀才題之東嶽廟督學王勅識其仙筆令鑽一字墨透泥竹遂取去慧持遊峩眉山入滅於嘉州道左之古樹中至宋世風吹樹折頭髪蓋身指爪圍腰一匝有司以聞取至都西僧總持擊金磬再拜遂出扣之曰吾乃遠法師弟也總持再扣曰吾將陳畱入定遂去宋孫思邈寓居九老仙人洞太宗嘗夢思邈乞雄黄煉丹遣中使送至峩眉山忽見一老人語中使曰汝可置石上有朱書謝表一通中使旋錄旋滅再物色之不可見矣祖覺俗姓楊嘉州人住峩眉山中巖倡明佛法學者雲集儒釋之書無所不讀作僧史一百卷并華嚴經金剛經集解行於世皇甫坦善醫藥宋高宗詔見問何以治身坦曰心無為則身安人主無為則天下治引治顯仁太后目疾立愈渥賞一無所受高宗書清静二字以賜隆興初入朝孝宗稱為先生而不名坦善相嘗言京南帥李道中女母儀天下後果為光宗后東汀和尚嘉州人不執文字别有見解如所云諸佛以一句演百千萬億句收百千萬億句祗在一句祖師門下半句也無宋孝宗召對稱旨帝注圓覺經命之作序一日往别禪友僧策策問行日師曰水到渠成索紙書十二月初九夜鷄鳴時九字如期而化明萬世尊一名峩眉山人巴陵楊一鵬見之囑曰三十年後當見汝於淮上後楊開府淮安遣僧寄書至發函得詩楊尋失機被刑連呼好師傅云直隷眉州周彭祖古陸終氏第三子籛鏗也自堯歴夏殷時封於天彭周衰始浮逰四方晩入蜀抵武陽家焉或云卽論語所稱老彭漢史通平光武時自會稽來蜀詣峩眉山謁天皇眞人授以三一之法及五符訣遂居靑神結廬煉大丹成龍虎狀又廣行陰德功滿白日昇天唐楊昭慶景雲中自京兆來眉志尚𤣥虛居靑神遊仙觀三十餘年感五嶽丈人希受眞君授以朱明龍文遂得尸解成無為丹稜人開元間女道士幼而出家誓死不嫁卜居龍鶴山下調形煉骨却粒茹芝年踰五十昇仙而去棲隱之處有龍洞遺跡李煉師眉山人天寶九載修道於桐柏山中能禱雨以救民旱其應如響可朋丹稜人有詩名性好飲無以償酒債作詩酬之自號醉秃邑令歐陽迥納凉於寺是歲暴旱而衆方羅列樽爼迥擊腰鼔以自適可朋見寺外耕者曝背烈日中因上田皷詩以質迥迥覽之惻然遽命撤宴其詞曰農舍田頭皷王孫筵上皷擊皷兮皆為皷一何樂兮一何苦上有烈日下有焦土願天宮降之以雨令桑麻熟倉箱富不饑不寒上下一般遂雨著有詩千餘篇號玉壘集張遠霄眉山人見老人授竹弓一鐵彈一質錢三百干而張無靳色老人曰吾彈能辟疫癘宜寶而用之再見老人遂授以度世法熟視舉首見其目有重瞳後往白鶴山垂釣西湖峯上有異人曰此乃四目老人翁君之師也寧遂忘授竹弓鐵彈時耶張大悟牟羅漢眉州人名安以廂兵隷卒如岷山陟上淸坂忽遇髯者顧笑曰汝饑何不食柏子耶摘子投其口顧髯者已不復見矣從此不火食大雪中庭有大甕貯水解衣就浴江水瀑漲舟不可行或戲指其笠曰乗此渡可乎牟遂置笠水靣趺坐其上亂流以濟人呼為牟羅漢云宋陳太初眉山人初與東坡同學於張易簡後東坡謫黄州有眉山道士陸惟中云有得道者陳太初問之則同學者也又數年見東坡於惠州云太初已尸解矣玉泉俗姓王丹稜人依大力院出家元豐間張無盡奉使京西南路就謁之請開法於郢州大揚言畢而逝人稱承皓禪師心道名常德丹稜徐氏子年三十剃度為僧出遊江淮抵舒之太平寺師事佛鑑得證道果後遇賊亂其徒欲引之南去師曰學道以了生死何避之有賊至舉槊刺之血皆白乳賊衆驚怖引席覆之而去明張元羽眉山人精於黄白之術遇仙欲度之元羽云九載遨遊掛銕船十讀楞嚴不學仙仙遂拂衣而去有元羽集行於世李靑霞眉州李氏子歲歉父母棄之江流至靑神漁人夫婦無子者網得之育十餘年隨瞽史學琵琶至綿州高翰林家有道士與之論丹法李忽擊碎琵琶而求為道士徒許之遂徧逰名山歸綿卒葬於竇圌山閱數載眉州别駕尹姓者江西人方蒞任齋宿城隍廟問焚獻道士曰汝名曾天成乎道士瞿然曰小道名何先知曰吾來時有李靑霞道士居吾郡言余必選眉州此吾鄉也城隍祠道士曾天成是吾徒也為我寄聲天成曰李師殁已數載且葬於綿何復遊人間世耶始知其尸解云直隷邛州漢莫將軍河南人遺其名文帝時征雲南駐節莫佛鎭山下見石山狀如蒼龍出洞遂鑿斷之流血夜聞空中人語云將軍旣認破此地能捨官出家後必成佛莫如其言於此修行竟成正果云周馬成子扶風人去家訪道遇黄蓋童子授以胎元鍊氣之法乃入邛之鶴鳴山復於石洞中遇異人授以神丹曰氣為内丹藥為外丹今授子此丹服之當列高眞成子遂白日昇天橘中叟邛州民家有橘樹霜後餘一大橘如丰剖視之有二叟身尺許鬚眉皤然相對奕棋一叟曰橘中之樂不減商山但不得深根固􅺓爾一叟於袖中出草根噀之化為一龍二叟共乘之冉冉騰空而去唐楊通幽洪都人唐天寶間修道臨邛安祿山犯闕明皇幸蜀至馬嵬賜貴妃死厥後克復長安明皇思慕貴妃命通幽招至貴妃魂白居易長恨歌臨邛道士洪都客能以精誠致魂魄即通幽也宋王興為蒲江主簿性淡泊好道一日於長秋山遇白玉蟾引載共駕祥雲昇天明張三丰洪武末入邛之鶴鳴山時石鶴復鳴人咸驚異居半載入天谷洞不出年已三百餘歲矣直隷潼川州雍正十二年陞為府漢張道陵詳見保寧府唐法眞梓潼人妙齡夙悟南遊見藥山道人次石嶺外大溈㑹下清苦練行溈深器之一日問曰闍黎在此不曾問一轉語師曰敎某向甚麽處下口潙曰何不道如何是佛師作手勢掩潙口潙歎曰子眞得其髓還蜀寄錫天彭山山有古樹圍四丈餘南開一門中間不假斤斧師因游息其中時人遂號為木庵禪師云一新州治舊無鹽井一新遊蜀至此指其地鑿之鹽泉湧出因建寺奉其遺軀焉宋陳摶安岳人生於崇龕鄉旣長辭父母去學道或居亳為亳人或居洛為洛人或居華山為華山人見一統志今崇龕梨亦摶所植王杞字昌遇東川獄吏梓人也盡心獄事多陰德遇異人授以仙訣詩百篇深契易理大中末舉家仙去賜號保和道人趙法應别號肖庵中江人幼著靈異年十五詣雲臺山結茅練習至十九歲畱偈云脫落一貧道謫凡十有九記其歸去時在處重陽酒遂端坐化去其遺蛻歴宋元猶存望之如生詳見雲臺記董仲潼川人其詳不可考今城北有董仲書巖詩文尚存世傳以為仙云呂陶建中靖國時知梓州有客至賓次肅之甚恭或以問陶曰此呂洞賓也余自此去人間事矣後果傳仙去明劉道明初名昭安岳人自少居天慶觀終日黙坐歴二十餘年遂知䜟緯由是名聞遠近永樂間以星史之占召入時値六月命築壇祈雨三日果大雨上竒之卒年九十有九其他靈異多不可悉時人稱為劉神仙云羅仙女中江人少顓䝉父母醮之忽一旦開悟卽諳經義遂入僧寺談空說法了了無礙且預知禍福人爭詢之未幾坐化去踰三年啟棺視之其靣如生覺壽遂寧人明心性遊長安道上得遺金俟其主反之後歸適廣福井調息跏趺坐井上鹽泉湧出永樂甲午邑乆旱復登廣福山絕粒禱雨旬日果大澍年九十不知所終福湛號天淵楚人居蓬溪智林寺勤苦修行解悟空寂為時禪宗所著有天淵錄二卷及卒有偈云七十七年一笑終倒騎木馬吼西風我今脫殻飛騰去明月淸風一様同無際姓莫名了悟一號蠶骨安岳人居大竹黒崖勤苦修行乆之若有所得乃師古拙及無念遂得釋氏之要旣而卓錫道林四十餘年脫胎離行時著靈異四方無賢愚咸嚮之正統間召入勅為宗師登壇說戒觀聽如堵及卒賜祭給傳還葬木門所著有語錄一卷了用姓張號雪機遂寧人少善應教偶聞人言遂感悟靜坐數年深有所得印證於天淵和尚嘗作山居詩有云傍樹修庵倚翠岑烟霞繚繞白雲嶔愚痴自合棲泉壑潦倒何妨論古今怪石溪邊塗去跡浮嵐巖下絕來痕始因人道藏幽谷截斷攀援更莫尋年七十二卒其日彩霞繞寺人咸異之直隷瀘州唐胡佯道人容貌竒古美髯秀目唐末於江安縣東六里山峯絕頂修煉嘗適梓州見獄吏王昌有陰德授以仙訣舉家白日上昇明韓飛霞州人其雋才為諸生制行高雅試不第遂棄儒服黄冠出遊遇異人授以仙術尋得道名聞於朝正德間召見賜號抱一守正眞人直隷資州明釋道慧資州人與德陽令樊鼎遇為方外交萬厯癸丑夏樊病甚因亢日夢帝命作桐柏山神以書問之慧謂之曰諸業由心造諸果亦由心證帝命亦由心改公平日見地作麽生於此著念樊又問病痛甚奈何曰提起主人公問誰為主曰覺痛者是曰四大解散痛亦不知誰為覺者慧曰覺原無痛痛亦非知知覺無痛痛痛卽離豈待四大解散覺體無邊際四大浮漚耳樊大有省悟直隷綿州宋黄鹿眞人綿州馬氏女名道興七歲時遇異人授以鉛汞符篆要術及笄乃祖逼以聘事堅辭夜與女奴攜杖策而去卜地修煉乆之前異人復至授以黄白之術後四十年道成遇羣盗入庵刼之遂乗黄鹿騰空而去異香經日不散後人卽其地建觀以崇祀焉明江老軍名添富綿州人嘗從軍遇異人授以修養要訣髪白反黒齒落復生一食斗米鄉人毎請禱雨必應暴風雨中屢日不動冬寒則剖冰而浴壽至九十有九尸解雪庵樂靜禪師安邑譚氏子嘉靖壬辰祝髪南叅還蜀嗣海藏住道峯院萬厯十一年元日索筆書偈曰只此漚泡幻影相隨六十餘年横眠三界刹那無處顚倒人間皎然空花影絕見聞寂寂虚閒問取雪庵靣目處處綠水靑山書畢跏趺而逝四川通志卷三十八之三欽定四庫全書四川通志卷三十八之四祥異景星慶雲盛世以此稱瑞堯水湯旱帝王不諱言災故雖禨祥之說史稱儒者不言然休徵咎徵實關乎天道而亦人事係焉者也蜀中白雉祥麟嘉禾瑞麥要皆和氣之所招至若民間偶有眚災在修省者尢為加謹葢五行關乎五事八體配乎八卦善言天者固常有驗於人焉然則本堯典欽若之意念春秋感召之機天人之理不旣微而顯乎作祥異志周敬王時萇𢎞死三年血化為碧數里内土皆靑色顯王八年彗星見西方是時蜀開明王以珍玩報秦皆化為土武都山丈夫化為女子二十二年蜀王迎五女於秦至梓潼大蛇入穴五丁抴蛇山裂分為五嶺五丁五女俱死赧王五年秦恵王使張儀城成都大龜出於江儀因龜跡以成城秦昭襄王時白虎為害自秦蜀巴漢皆患之孝文王時灌口孽龍為患有二牛鬭於江心其一不勝因奔潰害始息始皇時有長人二十五丈見宕渠漢高祖三年秋太白出西方有光數重呂后七年地震羌道山傾江漢水溢後五年江漢水又溢文帝元年九月有星孛於西方景帝二年十二月有星孛於西南三年春正月長星出於西方武帝元封元年五月有星孛於東井又孛於三台昭帝元平元年三月有流星大如月衆星皆隨西行宣帝地節元年春有星孛於西方去太白二丈成帝建始三年十二月越巂山傾河平三年春二月犍為地震山傾壅江水逆流元延元年秋七月有星孛於東井三年春正月岷山傾壅江三日江水竭哀帝建平四年十二月白氣出西南從地上至天出參下貫天厠廣如疋布長十許丈十餘日方隱平帝元始元年春正月益州外夷獻白雉三年越巂郡上言黄龍潛江中光武帝建武元年夏四月龍出府殿前公孫述以為瑞應遂稱皇帝號大成改元龍興章帝時益州神馬出甘露降白烏見安帝延光三年夏四月閬中山傾四年冬十月越巂山傾桓帝建和三年秋七月梓潼山傾永壽元年夏巴益郡山傾永康元年八月巴郡言黄龍見獻帝建安元年越巂有男子變為女齊武帝永明六年熒惑逆行入於太微陳文帝天嘉元年九月癸丑彗星見長四丈芒指西南隋煬帝大業中嘉州有蛟為害太守趙昱入水擒斬之唐高祖武德元年彗星見於五車高宗永徽六年嘉州民辛道䕶妻一產四男武則天時松州雌鷄變為雄中宗文明元年秋七月辛未夕彗星見於西方長丈餘八月甲辰不見景龍元年十月壬午彗星見於西方十一月甲寅不見睿宗太極元年秋七月彗星出西方入太微明皇開元三年彗星出於五車代宗大厯八年彗星出於五車武宗會昌四年春正月西方見白虹宣宗大中二年彗星出於觜參懿宗咸通元年秋七月白虹横亙西方昭宗天復元年五月丁酉至於己亥太白晝見經天在井度八月己亥西方有白雲如履㡳中出白氣如疋練長五丈上衝天分為三彗頭下垂後梁太祖乾化三年五月騶虞見壁山有二鹿隨之四年麟見昌州後唐明宗天成二年十二月壬辰西南方有赤氣如火燄約三十里後晉高祖天福六年九月彗出西方掃天市垣長丈餘前蜀王建武成元年彗星見於鬼長丈餘永平二年什邡獲銅牌上有六十二字建命嗣子更名元膺字昌美符銅牌膺昌字為文誡之後蜀孟昶廣政二年太白晝見蜀中大水宋太祖建隆二年五月己丑歲星犯東井七年靑城王姓一產三男九年永康軍獻芝九莖乾德二年秋七月己卯朔夜西方起蒼白氣長五十尺貫天船五車參宿五年忠州火倉庫殆盡八年五月合州巴川縣獻瑞麥太宗太平興國元年冬十月渝州獻九穗禾八年七月銅梁民楊彥魯獻一莖九穗禾雍熙四年有犀自黔南入萬州民捕殺之獲其皮骨淳化元年十二月流星出天關歴東井至大角墜地光芒四照有聲二年永川民梁行良至道三年合州民蘇福家並牛生雙犢黔州摩圍洞慶雲見石生鱗鬛眞宗咸平元年八月涪州大風壞城舍大中祥符元年秋七月黔州嘉州異畝合穗十二月黔州芝草一莖十二枝若山峯狀三年昌州廨柱生芝四年七月地震八年四月癸丑熒惑掩井鉞八月有星入參天禧四年四月乙酉西南方兩月重出五年秋八月兩川稔仁宗慶厯三年七月戊辰夜西南生黑氣長三丈許經天而散英宗治平四年彗星見西方神宗熙寧五年有星行至參旗而沒靑白色有尾元豐二年忠州雨豆哲宗元祐三年秋七月忠州臨江塗井鎭雨黑黍四年江津石上生芝二本六莖紹聖元年渝州大水九月星出參至天倉沒四年三月有蒼白色異雲長三丈餘貫東井乆之乃散徽宗建中靖國元年正月星出西南如盂急流入尾崇寧五年正月彗出西方大觀元年二月星出參如桮急流至西南而沒欽宗靖康元年春正月丁丑夜赤白氣起西方高宗紹興二年涪州大疫五月渝涪皆旱十五年四月丙申彗星見參度五月丁巳化為客星其色靑白至六月乃沒六月乙亥朔日食於井寧宗嘉定九年二月東西兩川地震三月東川大水太白經天理宗淳祐十年六月忠州黄華洲石出雙魚寶祐三年忠州瑞蓮生度宗咸淳元年兩川地震熒惑入南斗五十餘日元世祖至元二十年三月庚申太陰犯井是後頻年屢犯大德五年八月庚辰彗星出井二十四度經天貫索星長丈餘至天市垣巴蜀之東凡四十日乃沒成宗元貞二年彗星出井入紫微垣武宗至大二年太陰犯參仁宗延祐三年彗出於井六月重慶大火泰定帝時碉門天全地震厥後成都及峽中同日地震文宗天厯二年太白經天四月重慶火順帝至正十一年有星孛於西方二十二年秋七月丙辰熒惑見西方白氣如長蛇横亙中天移時乃沒明太祖洪武十一年榮昌大旱三十年九月長星西隕冬十月熒惑守心成祖永樂四年神木出馬湖山夜聞吼聲度險自出膚寸不損六年八月丙申夜有星大如盞色靑白有光出西方宣宗宣德六年夏四月有星孛於東井茂州瑞麥兩岐或五岐英宗正統五年富順縣產芝一莖二葢八年黔江產嘉瓜並蔕麥秀兩岐白燕來巢天順元年綿竹縣大雨雹三年岳池縣產白蓮一莖雙花憲宗成化五年夏五月大足縣水漲壞稻及民舍八年富順縣生連幹梨瑞竹並頭蓮十三年黔江芝草生安居麥秀一本二岐二十一年春正月朔有火自中天西墜復化白氣上騰有聲西方有大星蛇形赤色聲如雷震二十三年江津多虎患縣令黄昭禱於神乃息孝宗𢎞治元年夾江民酈茂實妻一產三男二年綿竹大旱八年龍見於富順九年綿竹地震十五年夏六月墊江芝草生秋九月忠州雨黑黍白仁可食十七年安居石池產瑞蓮武宗正德二年安居縣官濺河地脉自生沙接兩岸四年秋七月永川白虹亙天五年威州旱秋七月廣元百丈關五色雲見十二年永川榮昌界蝗十五年江津大水十六年武隆甘露降世宗嘉靖元年秋八月大足產嘉禾四年綿竹縣龍蟒山竹實七年夏秋全蜀大旱八年春疫保順潼大饑十年冬十月岳池地震十一年萬縣產白渠縣榖一本三穗十五年春三月岳池地復震建昌寧番尤甚有聲如雷地裂陷四五尺十八年三月富順彩雲現十九年夏六月彭縣崇寧新繁新都金堂大水江津縣牛生二犢二十四年巫山熊入人家二十五年大足有海鸛飛集城市三十年蒲江一日獲四虎三十四年武隆少婦生鬚三十五年嘉定李樹結為豆三十六年安岳地生白毛長四寸如馬尾四十四年夏四月有星隕於大足形如狗頭入地有聲八月海鸛復集蒲江虎復為患穆宗隆慶三年羅江民濬井得龍首骨及珠一顆大如鵝卵晶光耀日忽雷震珠復墮井再覓不獲四年武隆大溪河產騶虞為鄉民所斃蒲江甘露降於學宮之柏六年夏四月綦江晝晦自午至未方明彭水縣天降紅雨點衣盡赤神宗萬厯元年安居二仙石生木連理四月初五日敘州府地大震十三日復震秋八月敘州府及雅州俱地震數日二年武隆酆都蝻蟲生禾根如刈東鄉縣虎伏城郊三年榮昌瑞竹生五年合州李樹結長豆栗實變桃味甚甘八年三月武隆雨沙黄雲四塞十一年五月東鄉大水十二年五月朔三夜保縣南溝龍行光如月聲如鼓吹雷雨大作十四年春三月武隆火龍見秋七月重慶虎入城十五年永州有石自行十八年綦江斗米三分二十二年春正月綦江民人見日下復有一日相盪數日方止六月望日有星隕於昭化縣之三堆掘地三尺許得黒石如斗大二十二年順慶有鳥狀如鸞明年大旱二十五年蒲江牛生三犢二十六年蜀郡邑大疫二十七年順慶鄉民掘地得穴深廣各數丈内有瓦棺以萬計二十八年冬什邡桃杏開花成實二十九年秋昭化大水冬十一月朔金堂縣大雷雨三十年夏五月金堂大雨雹三十二年正月成都城北閣為大風顚隕北門夜開夏六月石泉縣地震閏九月龍安保寧松茂地震二十三日辰時成都郡邑天鼓鳴白霧迷天有火下流至地始沒三十三年夏五月松潘衛天火墜秋七月有星如燈火自南墜於西三十四年夏六月成都白龍晝飛三十六年十一月朔建武地震三十八年春正月馬湖敘州地震三月十四日資陽縣火夏四月瀘州大風拔木同時越巂鎭西等處大雨雹同時松潘漳臘小河平番地震三十九年秋九月蜀世子府災宮室俱燬四十一年夏五月蜀府災四十二年除夕通江甘露降味如脂飴次年元日復降四十五年夏四月昭化縣麥兩岐冬十月成都地震四十六年春正月元日漢昭烈帝惠陵樹自焚八月初九日有星隕於東南九月十八日以後連朝地震十月朔日白氣見於東方四十七年春二月成都白燕來巢三月甘露降是年屢有地震之異又長星見於東方光宗泰昌元年冬十二月初八日天黑如夜熹宗天啓元年成都有秃鶖止於城堞兵象也應是年奢酋之叛三年夏五月大雪深尺許榮經縣江邊大石方廣數丈忽飛不知所之懷宗崇禎二年十二月甲寅地大震十二年成都東嶽廟玉帝像自動不止十三年夏四月天鼔鳴六月安岳紅雨著物俱赤色十六年大足縣李樹結實如刀豆甲申年日中有赤氣數道下寛上銳自東指西彭縣白鹿山裂皇淸順治六年秋七月朔七日一日一月一星以次順行至晩乃沒九年夏四月初九日洪雅縣聞空中如炮聲者三繼如鳴金數聲少頃如笙管迭奏十四年春三月朔威州汶川地震有聲山傾水沸並成都西南方俱動十六年秋霪雨不絕保寧城圯錦屏山亦傾陷如截去一靣成赤壁康熙元年黎州山顫數日下陷溪水不流二年夏四月名山縣天目寺前一山入地成淵三年冬彗星見長丈餘自翼軫經東井止於婁歴十五宿而隱七年春有白氣自西方亙數十丈下銳上濶光如銀形如竹箒凡兩夜始散八年夏四月茂州麥秀七岐九年夏五月西充夜雨溪漲水溢城圯百十丈十年夏五月綦江縣雨雹偃禾十五年夏南充縣大水十六年春三月十九日順慶府有甘露降味如飴夏四月初六日又降秋九月初二日又降十七年夏蓬州大水十九年歲大熟二十年歲大熟二十有一年夏六月綦江縣暴雨魚坎巖頽壓民居二十有三年保寧府旱三十一年秋七月嘉眉綿灌新津河水汎漲損民居傷禾稼三十三年西充大有年三十四年蜀中郡邑大有年三十五年秋八月大竹縣民蔡秉賢妻王氏一產三男嗣是自三十九年及五十九年廿載之間蜀中一產三男者凡七見云四十七年綿竹縣麥秀六岐或四五岐五十二年秋七月茂州地震疉溪平番城圯五十五年秋八月松潘衛地震雍正元年全蜀大稔二年冬十月簡州民王之佐妻一產三男三年夏六月西爐地震七年夏四月旬有二日瑞雲現於建昌五色呈彩光華捧日凡歴午未二時六月旬有三日瑞雲復見於敘府之師來山自東北而西環繞數十餘丈五色燦爛拱捧太陽歴未申酉三時八年夏六月初七日瑞雲見於黄螂雷波正西一帶五色絢彩光輝四映歴申酉二時九年春正月崇慶州民孫文林妻王氏一產三男秋九月南川縣產嘉禾糓穗十二莖每莖三穗十年春正月初三日寧遠府西昌縣㑹理州德昌河西迷易三所等處地震兩院具奏奉㫖發帑賑恤先是分巡建南道副使馬維翰奉委預行查勘巡撫憲德親至寧遠府屬西昌等處被灾地方督率各屬吏逐戸查賑軍民之家莫不懽忭共戴聖恩髙厚云是年夏五月峩眉榮經雅安眉州被水峩眉為甚建昌道副使馬維翰請發帑金賑恤峩邑其榮經等處亦各發常平倉糓以給災民又請豁免本年地糧銀兩秋九月省城先農壇耤田並郫縣耤田民田内各產嘉禾或三岐三穗或兩岐兩穗俱堅實穎栗異於常糓民間耆庶咸稱罕覯焉十一年夏五月戊子直隷潼川州鹽亭縣永賢鄉民楊士榮家牛產一麟身高二尺長二尺五寸頭中挺一肉角長寸許目如水晶週身鱗甲遍暈靑霞兩脊旁至尾各有肉粒如豆色如黄金麕身馬腿牛蹄產時風雨兼至金光四射草木映黄士民徃觀咸稱祥瑞四川通志卷三十八之四欽定四庫全書四川通志卷三十八之四祥異景星慶雲盛世以此稱瑞堯水湯旱帝王不諱言災故雖禨祥之說史稱儒者不言然休徵咎徵實關乎天道而亦人事係焉者也蜀中白雉祥麟嘉禾瑞麥要皆和氣之所招至若民間偶有眚災在修省者尢為加謹葢五行關乎五事八體配乎八卦善言天者固常有驗於人焉然則本堯典欽若之意念春秋感召之機天人之理不旣微而顯乎作祥異志周敬王時萇𢎞死三年血化為碧數里内土皆靑色顯王八年彗星見西方是時蜀開明王以珍玩報秦皆化為土武都山丈夫化為女子二十二年蜀王迎五女於秦至梓潼大蛇入穴五丁抴蛇山裂分為五嶺五丁五女俱死赧王五年秦恵王使張儀城成都大龜出於江儀因龜跡以成城秦昭襄王時白虎為害自秦蜀巴漢皆患之孝文王時灌口孽龍為患有二牛鬭於江心其一不勝因奔潰害始息始皇時有長人二十五丈見宕渠漢高祖三年秋太白出西方有光數重呂后七年地震羌道山傾江漢水溢後五年江漢水又溢文帝元年九月有星孛於西方景帝二年十二月有星孛於西南三年春正月長星出於西方武帝元封元年五月有星孛於東井又孛於三台昭帝元平元年三月有流星大如月衆星皆隨西行宣帝地節元年春有星孛於西方去太白二丈成帝建始三年十二月越巂山傾河平三年春二月犍為地震山傾壅江水逆流元延元年秋七月有星孛於東井三年春正月岷山傾壅江三日江水竭哀帝建平四年十二月白氣出西南從地上至天出參下貫天厠廣如疋布長十許丈十餘日方隱平帝元始元年春正月益州外夷獻白雉三年越巂郡上言黄龍潛江中光武帝建武元年夏四月龍出府殿前公孫述以為瑞應遂稱皇帝號大成改元龍興章帝時益州神馬出甘露降白烏見安帝延光三年夏四月閬中山傾四年冬十月越巂山傾桓帝建和三年秋七月梓潼山傾永壽元年夏巴益郡山傾永康元年八月巴郡言黄龍見獻帝建安元年越巂有男子變為女齊武帝永明六年熒惑逆行入於太微陳文帝天嘉元年九月癸丑彗星見長四丈芒指西南隋煬帝大業中嘉州有蛟為害太守趙昱入水擒斬之唐高祖武德元年彗星見於五車高宗永徽六年嘉州民辛道䕶妻一產四男武則天時松州雌鷄變為雄中宗文明元年秋七月辛未夕彗星見於西方長丈餘八月甲辰不見景龍元年十月壬午彗星見於西方十一月甲寅不見睿宗太極元年秋七月彗星出西方入太微明皇開元三年彗星出於五車代宗大厯八年彗星出於五車武宗會昌四年春正月西方見白虹宣宗大中二年彗星出於觜參懿宗咸通元年秋七月白虹横亙西方昭宗天復元年五月丁酉至於己亥太白晝見經天在井度八月己亥西方有白雲如履㡳中出白氣如疋練長五丈上衝天分為三彗頭下垂後梁太祖乾化三年五月騶虞見壁山有二鹿隨之四年麟見昌州後唐明宗天成二年十二月壬辰西南方有赤氣如火燄約三十里後晉高祖天福六年九月彗出西方掃天市垣長丈餘前蜀王建武成元年彗星見於鬼長丈餘永平二年什邡獲銅牌上有六十二字建命嗣子更名元膺字昌美符銅牌膺昌字為文誡之後蜀孟昶廣政二年太白晝見蜀中大水宋太祖建隆二年五月己丑歲星犯東井七年靑城王姓一產三男九年永康軍獻芝九莖乾德二年秋七月己卯朔夜西方起蒼白氣長五十尺貫天船五車參宿五年忠州火倉庫殆盡八年五月合州巴川縣獻瑞麥太宗太平興國元年冬十月渝州獻九穗禾八年七月銅梁民楊彥魯獻一莖九穗禾雍熙四年有犀自黔南入萬州民捕殺之獲其皮骨淳化元年十二月流星出天關歴東井至大角墜地光芒四照有聲二年永川民梁行良至道三年合州民蘇福家並牛生雙犢黔州摩圍洞慶雲見石生鱗鬛眞宗咸平元年八月涪州大風壞城舍大中祥符元年秋七月黔州嘉州異畝合穗十二月黔州芝草一莖十二枝若山峯狀三年昌州廨柱生芝四年七月地震八年四月癸丑熒惑掩井鉞八月有星入參天禧四年四月乙酉西南方兩月重出五年秋八月兩川稔仁宗慶厯三年七月戊辰夜西南生黑氣長三丈許經天而散英宗治平四年彗星見西方神宗熙寧五年有星行至參旗而沒靑白色有尾元豐二年忠州雨豆哲宗元祐三年秋七月忠州臨江塗井鎭雨黑黍四年江津石上生芝二本六莖紹聖元年渝州大水九月星出參至天倉沒四年三月有蒼白色異雲長三丈餘貫東井乆之乃散徽宗建中靖國元年正月星出西南如盂急流入尾崇寧五年正月彗出西方大觀元年二月星出參如桮急流至西南而沒欽宗靖康元年春正月丁丑夜赤白氣起西方高宗紹興二年涪州大疫五月渝涪皆旱十五年四月丙申彗星見參度五月丁巳化為客星其色靑白至六月乃沒六月乙亥朔日食於井寧宗嘉定九年二月東西兩川地震三月東川大水太白經天理宗淳祐十年六月忠州黄華洲石出雙魚寶祐三年忠州瑞蓮生度宗咸淳元年兩川地震熒惑入南斗五十餘日元世祖至元二十年三月庚申太陰犯井是後頻年屢犯大德五年八月庚辰彗星出井二十四度經天貫索星長丈餘至天市垣巴蜀之東凡四十日乃沒成宗元貞二年彗星出井入紫微垣武宗至大二年太陰犯參仁宗延祐三年彗出於井六月重慶大火泰定帝時碉門天全地震厥後成都及峽中同日地震文宗天厯二年太白經天四月重慶火順帝至正十一年有星孛於西方二十二年秋七月丙辰熒惑見西方白氣如長蛇横亙中天移時乃沒明太祖洪武十一年榮昌大旱三十年九月長星西隕冬十月熒惑守心成祖永樂四年神木出馬湖山夜聞吼聲度險自出膚寸不損六年八月丙申夜有星大如盞色靑白有光出西方宣宗宣德六年夏四月有星孛於東井茂州瑞麥兩岐或五岐英宗正統五年富順縣產芝一莖二葢八年黔江產嘉瓜並蔕麥秀兩岐白燕來巢天順元年綿竹縣大雨雹三年岳池縣產白蓮一莖雙花憲宗成化五年夏五月大足縣水漲壞稻及民舍八年富順縣生連幹梨瑞竹並頭蓮十三年黔江芝草生安居麥秀一本二岐二十一年春正月朔有火自中天西墜復化白氣上騰有聲西方有大星蛇形赤色聲如雷震二十三年江津多虎患縣令黄昭禱於神乃息孝宗𢎞治元年夾江民酈茂實妻一產三男二年綿竹大旱八年龍見於富順九年綿竹地震十五年夏六月墊江芝草生秋九月忠州雨黑黍白仁可食十七年安居石池產瑞蓮武宗正德二年安居縣官濺河地脉自生沙接兩岸四年秋七月永川白虹亙天五年威州旱秋七月廣元百丈關五色雲見十二年永川榮昌界蝗十五年江津大水十六年武隆甘露降世宗嘉靖元年秋八月大足產嘉禾四年綿竹縣龍蟒山竹實七年夏秋全蜀大旱八年春疫保順潼大饑十年冬十月岳池地震十一年萬縣產白渠縣榖一本三穗十五年春三月岳池地復震建昌寧番尤甚有聲如雷地裂陷四五尺十八年三月富順彩雲現十九年夏六月彭縣崇寧新繁新都金堂大水江津縣牛生二犢二十四年巫山熊入人家二十五年大足有海鸛飛集城市三十年蒲江一日獲四虎三十四年武隆少婦生鬚三十五年嘉定李樹結為豆三十六年安岳地生白毛長四寸如馬尾四十四年夏四月有星隕於大足形如狗頭入地有聲八月海鸛復集蒲江虎復為患穆宗隆慶三年羅江民濬井得龍首骨及珠一顆大如鵝卵晶光耀日忽雷震珠復墮井再覓不獲四年武隆大溪河產騶虞為鄉民所斃蒲江甘露降於學宮之柏六年夏四月綦江晝晦自午至未方明彭水縣天降紅雨點衣盡赤神宗萬厯元年安居二仙石生木連理四月初五日敘州府地大震十三日復震秋八月敘州府及雅州俱地震數日二年武隆酆都蝻蟲生禾根如刈東鄉縣虎伏城郊三年榮昌瑞竹生五年合州李樹結長豆栗實變桃味甚甘八年三月武隆雨沙黄雲四塞十一年五月東鄉大水十二年五月朔三夜保縣南溝龍行光如月聲如鼓吹雷雨大作十四年春三月武隆火龍見秋七月重慶虎入城十五年永州有石自行十八年綦江斗米三分二十二年春正月綦江民人見日下復有一日相盪數日方止六月望日有星隕於昭化縣之三堆掘地三尺許得黒石如斗大二十二年順慶有鳥狀如鸞明年大旱二十五年蒲江牛生三犢二十六年蜀郡邑大疫二十七年順慶鄉民掘地得穴深廣各數丈内有瓦棺以萬計二十八年冬什邡桃杏開花成實二十九年秋昭化大水冬十一月朔金堂縣大雷雨三十年夏五月金堂大雨雹三十二年正月成都城北閣為大風顚隕北門夜開夏六月石泉縣地震閏九月龍安保寧松茂地震二十三日辰時成都郡邑天鼓鳴白霧迷天有火下流至地始沒三十三年夏五月松潘衛天火墜秋七月有星如燈火自南墜於西三十四年夏六月成都白龍晝飛三十六年十一月朔建武地震三十八年春正月馬湖敘州地震三月十四日資陽縣火夏四月瀘州大風拔木同時越巂鎭西等處大雨雹同時松潘漳臘小河平番地震三十九年秋九月蜀世子府災宮室俱燬四十一年夏五月蜀府災四十二年除夕通江甘露降味如脂飴次年元日復降四十五年夏四月昭化縣麥兩岐冬十月成都地震四十六年春正月元日漢昭烈帝惠陵樹自焚八月初九日有星隕於東南九月十八日以後連朝地震十月朔日白氣見於東方四十七年春二月成都白燕來巢三月甘露降是年屢有地震之異又長星見於東方光宗泰昌元年冬十二月初八日天黑如夜熹宗天啓元年成都有秃鶖止於城堞兵象也應是年奢酋之叛三年夏五月大雪深尺許榮經縣江邊大石方廣數丈忽飛不知所之懷宗崇禎二年十二月甲寅地大震十二年成都東嶽廟玉帝像自動不止十三年夏四月天鼔鳴六月安岳紅雨著物俱赤色十六年大足縣李樹結實如刀豆甲申年日中有赤氣數道下寛上銳自東指西彭縣白鹿山裂皇淸順治六年秋七月朔七日一日一月一星以次順行至晩乃沒九年夏四月初九日洪雅縣聞空中如炮聲者三繼如鳴金數聲少頃如笙管迭奏十四年春三月朔威州汶川地震有聲山傾水沸並成都西南方俱動十六年秋霪雨不絕保寧城圯錦屏山亦傾陷如截去一靣成赤壁康熙元年黎州山顫數日下陷溪水不流二年夏四月名山縣天目寺前一山入地成淵三年冬彗星見長丈餘自翼軫經東井止於婁歴十五宿而隱七年春有白氣自西方亙數十丈下銳上濶光如銀形如竹箒凡兩夜始散八年夏四月茂州麥秀七岐九年夏五月西充夜雨溪漲水溢城圯百十丈十年夏五月綦江縣雨雹偃禾十五年夏南充縣大水十六年春三月十九日順慶府有甘露降味如飴夏四月初六日又降秋九月初二日又降十七年夏蓬州大水十九年歲大熟二十年歲大熟二十有一年夏六月綦江縣暴雨魚坎巖頽壓民居二十有三年保寧府旱三十一年秋七月嘉眉綿灌新津河水汎漲損民居傷禾稼三十三年西充大有年三十四年蜀中郡邑大有年三十五年秋八月大竹縣民蔡秉賢妻王氏一產三男嗣是自三十九年及五十九年廿載之間蜀中一產三男者凡七見云四十七年綿竹縣麥秀六岐或四五岐五十二年秋七月茂州地震疉溪平番城圯五十五年秋八月松潘衛地震雍正元年全蜀大稔二年冬十月簡州民王之佐妻一產三男三年夏六月西爐地震七年夏四月旬有二日瑞雲現於建昌五色呈彩光華捧日凡歴午未二時六月旬有三日瑞雲復見於敘府之師來山自東北而西環繞數十餘丈五色燦爛拱捧太陽歴未申酉三時八年夏六月初七日瑞雲見於黄螂雷波正西一帶五色絢彩光輝四映歴申酉二時九年春正月崇慶州民孫文林妻王氏一產三男秋九月南川縣產嘉禾糓穗十二莖每莖三穗十年春正月初三日寧遠府西昌縣㑹理州德昌河西迷易三所等處地震兩院具奏奉㫖發帑賑恤先是分巡建南道副使馬維翰奉委預行查勘巡撫憲德親至寧遠府屬西昌等處被灾地方督率各屬吏逐戸查賑軍民之家莫不懽忭共戴聖恩髙厚云是年夏五月峩眉榮經雅安眉州被水峩眉為甚建昌道副使馬維翰請發帑金賑恤峩邑其榮經等處亦各發常平倉糓以給災民又請豁免本年地糧銀兩秋九月省城先農壇耤田並郫縣耤田民田内各產嘉禾或三岐三穗或兩岐兩穗俱堅實穎栗異於常糓民間耆庶咸稱罕覯焉十一年夏五月戊子直隷潼川州鹽亭縣永賢鄉民楊士榮家牛產一麟身高二尺長二尺五寸頭中挺一肉角長寸許目如水晶週身鱗甲遍暈靑霞兩脊旁至尾各有肉粒如豆色如黄金麕身馬腿牛蹄產時風雨兼至金光四射草木映黄士民徃觀咸稱祥瑞四川通志卷三十八之四欽定四庫全書四川通志卷三十八之五風俗詩稱文王之化行於南國江漢之間實漸被之然則蜀土之淳風有自來矣其未列於十五國中者或以其附見於二南非畧之也厥後文翁之敎育武侯之政治後先接踵俗稱近古歴代以來習尚與時移易今則幸逢盛世仁漸義摩翕然向化蜀雖邊徼地秀者服詩書之澤樸者安耕鑿之常孝弟力田敦本務實彼夫輶軒至止問俗采風莫不頌聖主至徳涵濡引恬引養有自然登時雍而臻風動者矣作風俗志全省周文王之化被乎江漢之間秦豳同詠故有夏聲華陽國志巴蜀之人少愁苦而輕易蕩佚通典家有鹽銅之利戸有山川之材居給人足以富相尚逸史漢景帝時文翁為蜀郡守建立學校自是蜀士學者比齊魯焉文獻通考化杜宇之敎而力農務逸史民食魚稻無凶年憂漢志人多工巧綾錦雕鏤之妙侔於上國隋志成都府古蠶叢之國其民重蠶事故國中二月望日鬻花木蠶種號曰蠶市舊志地大而腴民勤耕作無尺寸之棄歲三四收宋志文翁治化猶存南軒道教尚在舊志風雅英偉之士命世挺生華陽國志民俗儉樸習尚淳良雙橋志務農業儒無為匪作奸溫江志力耕織尚禮文新津志俗樸民淳文風亦駸駸日盛金堂志業耕讀寡爭訟遠佛老新都志民和俗阜敦詩說禮有鄒魯風簡州志生聚漸繁頗興禮讓男耕女織士安絃誦崇慶州志士樸民厚頗稱淳風郫縣志俗尚氣節民知耕鑿灌縣志士皆敏慧人皆樸質崇寧志民富俗淳人文蔚起新繁志人士俊乂民樸而豐漢州志家敦絃誦野洽農桑什邡志士敏慧民質樸彭縣志重慶府江州以東其人半楚姿態敦重墊江以西精敏輕疾上下殊俗華陽國志二江商販舟楫旁午方輿勝覽民力稼穡士喜靜退其風淳質近古元一統志士愿而好學府舊志邑稱知禮人敦齒讓士隆文學農重耕耘江津志人尚勤儉士習詩書俗之剛悍漸化長壽志民樸訟少永川志俗尚節儉民勤本業壁山志男耕女織淳質未漓榮昌志力田務學富敎可加大足志務孝弟而勤力田黜浮華以重本業綦江志風俗樸淳服養簡質南川志土僻民淳儉而好學黔江志風俗樸厚秀異間生合州志山險水灘人多戅勇然工藝術銅梁志人性淳樸不尚浮華定遠志士多尚志倜儻不羣忠州志士民淳樸服食儉約酆都志民性淳樸喜以詩書自娛墊江志夏巴蠻夷悉遵禮法涪州志治絲衣布儉樸可嘉彭水志保寧府地暖氣淸民淳事簡宋太守李獻鄉南樓詩序質直好義士風淳厚閬中志人好禮義猶有古風蒼溪志士民淳厚恭儉而文南部志城南純帶巴音城北雜以秦語宋寧武廣元志儉樸相尚民情頗淳昭化志人安儉約惟尚農桑巴州志人務耕桑士敦禮義通江志質樸勤農循理守分南江志人性謙和百貨所聚劒州志順慶府古稱忠義之邦其民淳樸溫厚舊志漢以名節著唐以神仙浮圖顯宋以文章學術名宋開漢志近代儒風尤盛人物間出不減果遂之風宋郡縣志女勤紡績而不肆志逸游男力耕耘而恐身試刑法西充志婚禮親迎務農力作蓬州志務農桑而尚禮義重氣節而飭亷隅營山志民務耕士務學不事商賈儀隴志土膏饒沃民俗淳厚廣安州志士務讀民務耕多秦風楚俗渠縣志民耕士讀尚儉樸少儀文大足志居人庻富士務文學岳池志民務耕鑿而性質直士習詩書而氣勇健隣水志敘州府漢夷雜居風俗各異寰宇記其士靜而有文其民樸而易治孝宗承園記人心淳龎民俗古樸南溪志民力於穡士競於文重農守禮富順志士習淳正有古君子遺風長寧志士固窮而兢於文民尚勤而力於穡隆昌志盜息訟寡民風淳朴耕讀而外鮮有逐末慶符志其人誠質其俗樸儉高縣志習俗儉素不尚浮華士敦節義民勤稼穡筠連志士勤學問農習耕耨尚氣節而好禮珙縣志士樸民淳水耕火耨興文志遵文敎守禮法務農尚樸俗慤而愿屏山志建武㕔漢夷雜居風俗各異漢則淳而有禮夷則樸而易治建武㕔志直𨽻敘永㕔漢夷雜處務實尚樸敘永㕔志人民渾樸婚姻祭葬皆遵古制衣冠不異中州夔州府士風拙扑宋楊輔書民淳訟稀王龜齡詩燒地而耕杜詩註亦謂火耕踏磧而遊圖經夔人重武侯人日傾城出遊八陣上謂之踏磧藉商賈以為國有楚遺風府志服賈代耕地有山嵐氣辢茶以辟之大寧志士務文學民簡訟詞巫山志士習詩書商賈以鹽為利雲陽志人多勁勇士篤儒風民力於農吉凶相助梁山志土地肥美風俗淳樸不事賈販惟務農桑新寧志民力農桑佐以魚罟俗頗信巫萬縣志俗重田神地無醫藥開縣志地僻山深男婦力耕民淳而質建始志龍安府務農工業刀耕火種人性質直俗尚剛勁隋志風俗與武都畧同寰宇記尚儉樸服詩書平武志尚儉務農不競詞訟士有古風江油志畜牧耕稼俗尚靜約人性質直禮義漸興石泉志儉而不奢俗猶近古彰明志番多漢少男曰安達女曰白麻衣惟氁衫是尚食以酥油為佳日耕野壑夜宿碉房人精悍善戰鬭敎化旣乆風俗漸淳松潘志寧遠府地處邊末漢夷雜居人情狡悍好訟習尚樸俚少文邇來民風漸歸淳雅西昌志地氣煦和三種居民各安生業㑹理州志敎化漸通風俗日易冕寧志男女裹毯披氈辮髪赤足不事修飾鹽源志霑濡聲敎習尚衣冠越巂志雅州府山多田少地瘠耕勞男勤本業婦不外飾近山人戸藉採茶為業雅州志其民質而少文其俗淳而不薄力農採茶男婦勤苦自甘名山志民質淳厚知禮節從敎化榮經志民稠多土著俗淳而質樸蘆山志高陽遺黎世為土軍耕稼種茶為業天全志地瘠民貧俗淳訟少清溪志直隷嘉定州雍正十二年陞為府土地沃美民勤耕織士尚詩書州志農耕士讀俗尚儉節民淳事簡峩眉志俗厚風淳人勤稼穡文學漸興爭訟日息洪雅志敦樸尚禮士淳民質夾江志男事農桑女勤紡織雜處居民多務煑海犍為志民多樸實士好詩書榮縣志士不輟於絃誦農相安於耕鑿威遠志直隷眉州士以名節相尚唐通義志俗多近古士大夫貴經術重氏族其民尊吏而畏法其農夫合耦以相助宋蘇軾遠景樓記士類滋多人崇禮讓力耕務本不尚奢華丹稜志民無游惰士豔科第靑神志民俗樸儉服稼穡事陶冶彭縣志直隷邛州臨邛多殷實之家接壤錦里人多敏慧雅慕文學民樂農桑不務商賈州志俗尚禱祀人務耕桑大邑志人民質直禮義漸興蒲江志直隷潼川州雍正十二年陞為府土地沃美人士俊乂常據論士通經學民務農桑潼川志服食儉約不事奢靡人多務農煎鹽為業射洪志地瘠俗古不尚爭訟男女力穡鹽亭志俗樸務耕好學尚義中江志民勤耕織士敦禮讓遂寧志農務耕鑿鄉里族黨頗相親睦俗為近古蓬溪志士秀而文民樸而淳安岳志有無相通憂患相恤樂至志直隷瀘州氣候偏陽夏多炎燠冬無寒苦宋勾公記家詩戸書勤耕樂賦圖册風氣挺發賢哲間生州志力耕務織士樸民淳江安志稼穡多勤士好馴雅合江志人多樸直士敦禮讓納谿志直隷資州山川挺秀多産英奇王褒諸人皆以文顯圖經晝經夜史誦聲不絕何三益政文堂記民和俗阜有鄒魯風資陽志俗近唐魏風比齊魯衣冠之族多於他邑内江志地瘠力耕人多勤儉士好文學饒有淳風仁壽志土瘠地僻士好詩書農勤耕女勤織井研志直隷綿州介東西二川之間其俗文而不華淳而不魯舊志人饒地腴貨財繁茂州志節儉好禮獄訟寖息德陽志力耕農桑安分守法羅江志敎化日深風俗淳美安縣志士多絃誦民尚儉勤綿竹志風淳俗簡農安耕鑿士習詩書梓潼志直隷茂州其地有六夷七羌九氐各有部落其長頗知書而法制嚴重後漢志盛夏凝凍華陽國志俗耐饑寒圖經氈裘雜揉王咨防邊五事其俗疉石為􅠼以居如浮圖高二三丈者謂之籠鷄十餘丈者謂之碉房間有板屋土屋自汶川以東皆有屋宇圖經好弓馬以勇悍相尚茂州志漢羌雜處漢讀詩書羌遵王化保縣志石田山地俗尚勤儉咿唔之聲徹於四境汶川志直隷達州土地肥美地理志民俗儉勤競尚氣節白居易州志夏秋多瘴雪不到地州志男慕文學鮮商賈女多紡織尚儉素東鄉志民重農桑俗少健訟太平志四川通志卷三十八之五欽定四庫全書四川通志卷三十八之五風俗詩稱文王之化行於南國江漢之間實漸被之然則蜀土之淳風有自來矣其未列於十五國中者或以其附見於二南非畧之也厥後文翁之敎育武侯之政治後先接踵俗稱近古歴代以來習尚與時移易今則幸逢盛世仁漸義摩翕然向化蜀雖邊徼地秀者服詩書之澤樸者安耕鑿之常孝弟力田敦本務實彼夫輶軒至止問俗采風莫不頌聖主至徳涵濡引恬引養有自然登時雍而臻風動者矣作風俗志全省周文王之化被乎江漢之間秦豳同詠故有夏聲華陽國志巴蜀之人少愁苦而輕易蕩佚通典家有鹽銅之利戸有山川之材居給人足以富相尚逸史漢景帝時文翁為蜀郡守建立學校自是蜀士學者比齊魯焉文獻通考化杜宇之敎而力農務逸史民食魚稻無凶年憂漢志人多工巧綾錦雕鏤之妙侔於上國隋志成都府古蠶叢之國其民重蠶事故國中二月望日鬻花木蠶種號曰蠶市舊志地大而腴民勤耕作無尺寸之棄歲三四收宋志文翁治化猶存南軒道教尚在舊志風雅英偉之士命世挺生華陽國志民俗儉樸習尚淳良雙橋志務農業儒無為匪作奸溫江志力耕織尚禮文新津志俗樸民淳文風亦駸駸日盛金堂志業耕讀寡爭訟遠佛老新都志民和俗阜敦詩說禮有鄒魯風簡州志生聚漸繁頗興禮讓男耕女織士安絃誦崇慶州志士樸民厚頗稱淳風郫縣志俗尚氣節民知耕鑿灌縣志士皆敏慧人皆樸質崇寧志民富俗淳人文蔚起新繁志人士俊乂民樸而豐漢州志家敦絃誦野洽農桑什邡志士敏慧民質樸彭縣志重慶府江州以東其人半楚姿態敦重墊江以西精敏輕疾上下殊俗華陽國志二