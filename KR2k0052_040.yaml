body:
  text: 四川通志卷四十藝文表蜀漢諸葛亮前出師表臣亮言先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚以為營中之事事無大小悉以咨之必能使行陳和睦優劣得所也親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞逹於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以馳驅後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂懼恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠於陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所云後出師表先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可偏安於蜀都故冒危難以奉先帝之遺意而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然涉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長䇿取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰明年不征使孫䇿坐大遂並江東此臣之未解二也曹操智計殊絶於人其用兵也髣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後偽定一時爾况臣才弱欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲楊羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之內糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及蚤圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關某敗毁秭歸磋跌曹丕稱帝凡事如是難可逆料臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩也晉李密陳情表臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志祖母劉愍臣孤弱躬親撫養臣少多疾病九嵗不行零丁孤苦至於成立既無叔伯終鮮兄弟門衰祚薄晚有兒息外無期功強近之親內無應門五尺之童煢煢孑立形影相弔而劉夙嬰疾病常在牀蓐臣侍湯藥未嘗廢離逮奉聖朝沐浴清化前太守臣逵察臣孝亷後刺史臣榮舉臣秀才臣以供養無主辭不赴命詔書特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤嘗侍東宫非臣隕首所能上報臣具表以聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則以劉病日篤欲茍順私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜育况臣孤苦尤為特甚且臣少事偽朝歷職郎署本圖宦逹不矜名節今臣亡國賤俘至微至陋過蒙拔擢豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以區區不能廢遠臣密今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報劉之日短也烏烏私情願乞終養臣之辛苦非獨蜀之人士及二州牧伯所見明知皇天后土實所共鑒陛下矜愍愚誠聽臣微志庶劉僥幸卒保餘年臣生當隕首死當結草臣不勝犬馬怖懼之情謹拜表以聞針漢揚雄益州牧針巖巖岷山古曰梁州華陽西極黑水南流茫茫洪波鯀堙降陸於時八都厥民不禹導江沱岷嶓啓乾逺近底貢磬錯砮丹絲麻條暢有粳有稻自京徂甸民攸溫飽帝有桀紂湎沈頗僻遏絶苗民滅夏殷績爰周受命復古之常幽厲墮業破絶為荒秦作無道三方潰叛義兵征暴遂國於漢拓開疆宇恢梁之野列為十二光羡虞夏牧臣司梁是職是圖經營盛衰敢告士夫五代孟昶著官針朕念赤子旰食宵衣託之令長撫養安綏政存三異道在七絲驅雞為理留犢為規寬猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦役是切軍國是資朕之爵賞固不踰時爾俸爾祿民膏民脂為民父母罔不仁慈勉爾為戒體朕深思宋韓絳講堂針並序異嗚呼天地之道逺乎哉聖人之心乎哉動而任於理則天道是已純然得其性則聖心是已吾謂通其説者必以三才之原未始出乎一者也人之七情中焉而未發也則粹德內融豈不曰天下之大本歟及其發而皆中節也則和理外著豈不曰天下之逹道歟中者性也寂然而有容則與天道合焉和者情也淡乎其若忘則與聖心合焉所以八卦九章推明天人相與之際而著為吉凶休咎之符者非三才一原之效耶自古教化之迹或因或殊然而未始不本諸性情而納之皇極者矣貴賤以之位父子以之親兄弟以之友夫婦以之順此皆不待學而後知直出於性理之常分耳况乎學斯學者宜如何哉惟不獨私乎其身而已為能𢎞而大之包乎四海而不外詡乎羣侣而不遺使六沴弗得作諸福莫不至是豈非休吉之符歟彼有肆情縱欲暴蔑禮義父子之不保兄弟之不戚矧肯仁於親戚鄉黨乎矧肯憂於鰥寡孤獨乎是皆不知反求諸躬自滅天理所以養命之道以取禍敗顯則有金木訊之甚則有鬼神譴之是豈非咎凶之符歟夫學校之法所以養士使適是道而後養乎蚩蚩之氓者也豈徒麗言辭以自矜飾聲名以自髙希寵利以自封哉惟知其本者無取於彼而三者亦兼有之矣成都之學郡國莫先焉士人之衆四方鮮擬者其講堂舊卑隘不足以容諸生僉謂豫曰蔣侯嘗建西學後輒毁撤其基尚存盍興築焉因相其所圖搆廣厦為十有三筵度深稱是以甲辰嵗三月庚申落成耆幼縱觀咸曰時當於其旦則先生正衣冠率諸生羣萃於是以習揖讓周旋之儀相與衍聖經以明乎天道治性情以全乎中庸使父父子子兄兄弟弟夫夫婦婦老老幼幼一之乎大順故伸而上之以事其君則臣節於是乎立推而下之以庇其民則事業於是乎成不自德而德隨之不自功而功與之使風化之盛不其凛凛乎然則學校之設將以講求三極之道沈浸先王之澤盡在是矣豈曰無用之地不急之務哉豫慮是堂異時或若西學之廢輒為之針以告當御休哉夫民有物有則弗完厥中自肆戕賊聖哀其愚化奚由默圖惟敷施明用峻德學校之興教育有經賢率不肖胥及羣氓豈伊異術一本爾情情之不極瀹以蹈刑止邪未發將保爾生靡戢靡正瀆性之靈自暴自棄烏足與齒師生其難思迪於禮在昔有若去座為恥賜不受命萬世攸鄙矧過是者言行之偽敢登此堂寧無內愧斯庭燕間斯宇閎邃揖讓威儀講聞道義下士背馳君子來視毋或壞墮永錫爾類吕大防觀政閣針並序於成都圖開寶以來牧守之像大慈寺閣圖記其爵位名氏與其在官嵗月而不録其政事之美惡豈居是邑不非其大夫邦人之理宜如是歟然不足以申勸戒為後來者法余輒采秦漢至於唐領太守刺史節度使之職有政績可考而畫像存焉者得二十有八人别圖於他閣名其榜曰觀政蓋觀其善足以勸觀其不善足以戒其政事雖可考而像不存者舍之像雖存而僭竊不軌或暗庸無聞者黜之此觀者不可不知也寺僧求文余以為古者官有針焉作針以授之其辭曰蜀於禹貢是為梁州華陽黑水處坤之陬其山四塞氣鬱以酋人矜其技物産其尤牧野之師有功宗周秦始列郡置吏罷侯守冰殖利渠田肇修肆彼一方無衣食憂文翁處後教民文章多士化之傑出馬揚張堪亷惠去而益張五倫清約人監允臧亷范便民警之所當种皓繩姦不以勢妨李膺修設善飭其身髙朕勸學其迹猶新養士之利愈久愈存賢哉孔明討魏扶漢思清以密德順而健其功不克天未厭亂王濬豪俊知略不羣畫䇿平吳卒賴其勤高儉循吏為唐元臣象先廷碩嗣美且文嚴武暴厲忿欲並申天寶政紊乃以牧民崔寧繼之以昏易昏壯哉南康橫身扞難種羌方熾力弭其患中朝以安浮議可嘆崇文貪殘得不償失元衡靜安飾以儒術文昌更事遠俗清謐敏哉文饒裕蠱治詳擾弊之後補敗藥傷外禦其侮內教有方嗣復悰謨遵故守成叢孜疵政民無以生駢乎多罪禍積釁盈寃女呼天虐及孤惸懷瑄信盜俾民卒瘏燼其邦家可不慎歟自秦以還鎮守之臣政有良窳存乎其人牧臣司梁敢告執巾銘漢莊遵座右銘夫疾形不能遁影大音不能掩響默然託蔭則影響無因常體卑弱則禍患無萌口舌者禍患之門滅身之斧言語者天命之屬形骸之部出失則患入言失則亡身是以聖人當言而栗發言而憂如赴水火履危臨深有不得已當而後言嗜欲者潰腹之矛貨利者喪身之讐嫉妒者亡軀之窖讒佞者刎頸之兵殘酷者絶世之殃險害者滅嗣之場淫戲者殫家之塹嗜酒者窮餧之藪忠孝者富貴之門節儉者不竭之源吾日三省傳告後嗣萬世無遺晉張載劍閣銘巖巖梁山積石峩峩逺屬荆衡近綴岷嶓南通邛僰北逹褒斜狹過彭碣髙踰嵩華惟蜀之門作固作鎮是曰劍閣壁立千仞窮地之險極路之峻世濁則逆道清斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷戟萬夫趦趄形勝之地匪親勿居昔在武侯中流而喜山河之固見屈吳起興實在德險亦難恃洞庭孟門二國不祀自古及今天命不易憑且作昏鮮不敗迹公孫述既沒李氏勢銜璧覆車之軌無或重迹勒名山河敢告梁益唐楊炯梓州惠義寺重閣銘大辰之嵗正陽之月有郪縣宰扶風竇兢字思昭宣令德光闡化猷庶政惟和萬人以理間庭不擾退食自公逺覽形勢處心淨域乃與禪師釋智海忘言契道寓目於長平之山援飛莖陟峭削成千仞壁立萬尋俯觀天地僅如作棗葉下望須彌幾同芥子飛湍滴瀝而成殿作響喬樹璀璨而華榮玉堂石室千門相似大珠毫十方皆現慷慨榱桷壯作之未立吁嗟棟宇之莫修不捨有為取諸大觀夫左龍角右參旗前太微後營室駢羅列以雜沓瑟蕭條而參作清泠上磊落以晃朗下𢎞澄而作靉靆參差差森森纚纚千櫨萬栱乍合乍離蒨蒨粲粲絢絢煥煥六采五章或合或散莾如天覆矗似雲平金火含舍於垂珠日月相望於銜璧璇墀扣砌平接太階玉戶金扉俯臨閶闔曳紅日舒丹靈豐隆為雷砰作鏗訇於軒檻列缺為電翕曶霍於庭除寒署隔閡於牆垣虹霓回帶於廊廡仰之不極目炫炫而喪精登之無階心遑遑而失度土木翔九垓之表仍不逮於上榮文章窮四海之間猶未離於左墄借如梵天之宅處作釋帝説法之宫兩曜城池五雲樓觀輪王所純金為之堂諸佛所遊衆香作經行之地亦未可同年而語也夫黃金鏤榜曽不若四攝之門青石為牆曽不若三空之舍殫百工之力建七實之樓豈徒然哉良有以也夫何故如來神力且觀嚴淨導師方便化作一城事有古而可以質於今言有大而可以銜於小是則毗耶四舍作俱發道心險路衆人咸知寶所其銘曰長平山兮建重闕上穹窿兮下磅礴紛披麗兮駢交錯儼色作相兮沖寂寞誰所為兮天匠作段文昌諸葛武侯廟古柏銘凡草木有異於草木則靈武侯祠前柏夀千齡盤根擁門勢如龍形含碧太空散露虛庭合抱在於旁枝駢梢葉之青青百尋及於半身蓄風雷之冥冥攢柯垂蔭分翠間明忽如虬螭向空爭行上承翔雲孤鸞時鳴下蔭芳苔凡草古生古色天風蒼蒼泠泠曽到靈山老柏縱橫亦有大者莫之與京於惟武侯佐蜀有程神其不昏表此為禎斯廟斯柏實播芳聲歐陽詹棧道銘并序之秦之坤蜀之艮連髙夾深九州險也隂溪窮谷萬仞直下莾崖峭壁千里無土互隔岈絶巉巉冥冥麋鹿無蹊猿猱相望自三代而往蹄足莫之能越秦雖有心蜀雖有情五萬年間敻不相接且秦之與蜀也人一其性物同所宜嗜欲無餘門作教化無餘源之作可貿遷可親昵擘坼地脈睽離物理豈造化意乎天實凝清而成地實凝濁而形當其凝也如鎔金下鑄騰雲上浮空隙有所不開其作回翔有所不合澄結既定竅缺生乎中西南有漏天天之竅缺也於斯有兹地地之竅缺也天地也者將以上覆下幬含蓄萬靈可通必使而通者也茍有可通而未通則聖賢代其工地作而通之故有為舟以濟川為梯以踰山唯兹有川不可以舟涉有山不可以梯及粵有智慮以全元造立巨衡而舉追氏縋懸纑以下梓人猿垂絶冥鳥傍危岑鑿積翠截作以全力梁半空於未用斜根玉壘旁綴青泥斷岸以虹矯繞翠屛而龍蜿堅徑膠固雲橫砥平總庸蜀之道若作途繞岐雍之康莊都邑之能步山川之無脛水決防如鴻嚮陽南之北之踵武與湯躋峨峨以自若臨蒼蒼而不懼繇是贄幣以遙逹人神以會同稽禮樂之短長量威力之汚隆可王者王可公者公而相吹以風或曰受琢之石長存可搆之材無窮易刓代蠧斯道也未始有終嗚呼為上懷來在乎德為下昭德在乎義德義之如今日則或人之言有孚其反之則石雖存恐不為琢材雖多恐不為搆想夫往昔有時而有有時而無是用惕惕天下嗤嗤蚩知聖賢創物之意之人寡明德義固物之道之人稀敢陳兩端之要銘諸斯道之左庶主德義者存今日之所履踵武湯者荷古人之攸作乃銘曰天覆地燾本亦備作設大象難全或漏或缺損多益寡聖賢代工彼雖有缺與無缺同惟北曰秦惟南則蜀地缺其間坤維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天寶不通賢斯有造鑽堅剡徑無蹊以道若川匪舟若陸匪車緣危轉虛步驟交如搆雖有功存亦由德項怫劉怒從完以踣墮落我營作自顛而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不常恭作勿謂斯道可久禮不以禮可有而無恭不以可無而有創之之意如彼固之之理若茲彼知不易茲而易知勒名道左其同我思陸龜蒙卜肆銘蜀莊之託蓍龜也以忠孝仁義後來之託蓍龜也以偷佞險詖美之使怡愈怛之使駭畏小人惟惡是嗜曽不本惟禍是避惟福是覬惟瞽言集是媚究得失之所自故幽贊之蓍前列之龜乃比為庸妄之器嗚呼成都吾不知古為市之地况君平之卜肆耶強為之銘具刻其意宋古仁石室銘昔夏禹定九州貢法明三壤同異山川草木鳥獸戎夏土地所生財賦所出聲教所暨咸悉載之無一遺者至於天下人性賢愚民心善惡之所係則闕而不載焉三代而下史策所存者咸能著之圖籍而志其地理迹其記録則於天下人民所係之性亦略而無聞焉聖賢之述作亦有所闕乎豈聖賢之志將有所蘊乎意者謂人性之上下不常於世隨其教化而移易也故上之教行則民興善上之令嚴則民興暴皆從其上之所為爾語曰如風之偃草又曰若泥之在鈞者豈虛語哉此聖賢所以不可不筆之而傳後世者矣且蜀之開國地逺中夏民性怯懦而多浮侈逮文翁之為守立學校造講堂石室以備其制度遣俊乂之士東受七經還以教授於是風教大行而岷絡之地比於齊魯厥後相如既沒而淵雲之徒森然繼出兩漢之際舉不乏賢得人之稱逮今攸盛於戲蜀始以僻陋險隘人民夸誑古謂難治暨文翁以儒學教導之則其人莘莘然嚮慕於文學而見用於當世者得非上之教化移易於人民若是哉覽之前記尤美其事觀夫遺迹則石室猶存雖前賢有銘其徽烈者大率言立學興儒而以石室雕琢取學者磨礱之意又欲樹功於不朽也觀其言詞似猶未盡賢守教化之深意因復廣而銘之曰地有常形民無常性繇上之化所從而正維蜀之郡在天一隅俗尚浮侈人希服儒賢哉文翁來牧茲上爰立石室始興庠序俾此岷絡儒風大行於以兩漢英賢踵生降及我朝得人侔古家慕淵雲學隆鄒魯政教下格文材上通逮今蜀人詠歌德風蒲國寶金堂南山泉銘并序記蘭陵錢治嘗作南山泉實仁宗天聖四年距今蓋一百二十有一年也錢又誇大其言以謂陸羽作茶經第水之品三十張日新煎茶記又增其七毛文錫作茶譜又增至二十有八金堂南山泉當不在蘭溪第二水下然前之三人足迹曽不一履此地宜皆不為所賞鑑故此泉湮沒而無聞焉可歎也先朝時家恬戶嬉一時人士往往多以石泉試茗相誇為樂事至靖康後天下騷然苦兵生民困於征徭邑中之黔惴然方以貨泉供億縣官不給為恐泉之甘苦何暇議耶黃君才叔此方之修整士也紹興辛巳於南山之南手披荆棘鋤其荒穢當江山景物之會作屋十數楹極幽居之勝而嵒竇之間泉之湮者復逹引之庭除其聲涓涓遇暇日余率二三賓朋登君之堂洗心滌慮便覺煩暑坐變清涼酌為茗飲則又苾甘可愛誠如治之言者余以是知物之廢興通塞亦自有時何獨一泉耶是不可不銘銘曰峽水東注鶴峯北峙幽幽南山為國之紀有冽彼泉出於嵒底清新香潔酌之如醴吾儕小人豈曰知味宜茶而甘即為佳水近世錢治蓋嘗品第方之蘭溪不在第二陸羽既逺無復為紀不有奬鑑孰發其閟冉木震月巖銘黔號古郡地居極邊倅治倚山其山刺天曰有月巖古老相傳視事纍月遍求茫然偶濬溝渠巨石中填深掘視之厥狀巑岏中竇一穴透明而圓皎如秋月翳絶浮煙旁輔三隙如星之聯抆拭細觀古識存焉爰命僕夫舁置座前負以層石映以灣泉日對其側卷舒簡編凡物遭遇皆有因緣髙岸深谷知幾變遷惟我月巖存千萬年田楙丞相張公祠堂銘并序平大丞相文忠張公以治三年春初仕為雒縣簿其年冬十有二月來攝華陽縣衡山鎮之征官越明年秋八月丁內艱而去迄今凡九十年護國寺有堂舊刻公之遺詩紹興乙亥楙來獲觀景想風烈良用慨然乃新椽礎以繪公像從公之孫新敘南通寺講究家傳記其年月嗟夫公之大節在史官文章在天下勳德在生民是區區者亦何加損於公哉詩云髙山仰止景行行止意其在兹銘曰天為斯民挺生賢哲誰為厲階梗而莫合偉哉文忠岷峨之英瑞為鳳凰聲為雷霆熙豐元祐迄於崇觀世故多矣金石不變晚而來歸舜韶一夔豈不能從愛莫助之抱關擊柝我初不屑粲然珠璣散落遺碣貂袞誾誾凌煙功勳豈真公耶天壤遺文噫天何時復生此老浮遊汗漫固有不朽王賞有斐閣銘溫江蘇國士企先於東郊别墅創為閣前有修竹後有流水豫名之曰有斐而為之銘銘曰淇水湯湯緑竹猗猗武公之德託興在兹圭璧之質琢磨成器願子百年惟公是似栁夢弼泮宫逹泉銘并序可水供滌濯飰食之用民不一日無惟古信州上倚山下瞰江最苦汲負淳熙癸卯冬大著楊先生奉敕來領漕事慨然有澄清志越明年革鹽弊正銓曹平𣙜酤所以措雕瘵之民於安全之地者無不用其至猶以為未也知民艱於水思得良工相地脈開數井濟之聞泮宫有眢井泄治力必省乃命奉節令孫必益董其役俄而及泉新轆轤具綆缶嘗試嚌啜寒冽芬甘又甃其面屋其顛與此邦士民為永久莫大之利郡文學桞夢弼請名先生曰學井非他比也名逹為宜蓋取孟子之説四端若泉始逹之義先生惠顧多士所以期待者良不淺矣夢弼竊謂嘉量微物盤盂小器猶昭德記功載在銘典矧因民所利與乾造同不言之美逹則兼善使斯民無不被堯舜之澤可啃無一字以紹無窮乃為銘曰水哉似道日用叵無夔擁山椒雲頂鄽郛俯瞰蜀江汲負﨑嶇無井歎杜無力詠蘇悠悠何載泮宫鑿井水生其芹壇對惟杏青襟浴德朋來造請飲顔一瓢慕黃萬頃谷鮒惟何土石邇堙士困陸沈學以日新挈瓶為智叩户求人逖想西江疇憫波臣關西夫子道猶四瀆欖轡志清恩波滲漉謂學有源不逺可復試疏導之其逹必速乃任茂宰俾浚其眢九軔倍深天一中寒面以玉甃圍以珠欄今之孟子還取四端名之曰逹言近旨逺即學諸生盍亦自反志逹而明其流渾渾辭逹而文其初有本下學上逹素王是師兼善天下在推所為是聞非逹亦宜審之愈及愈新徑逹聖涯所謂逹者先王之德已逹逹人欲其同德一字袞褒要當默識勒銘學宫與道無極李􅌫魚復扞關銘并序漢古梁州域寶兼巴漢庸蜀地孝武改梁曰益梁州總八郡梁之為言強也益之為言厄也此昔聖賢察其風俗按其形勢而為之名也故其人則強毅精敏嗜義負勇其地則山屛水塹險介重阻沃野叢傎幅員萬里北以劍門為限東以魚復為守此二物者蜀之襟喉扃闌也戰國交侵楚肅四年始建扞關突在魚復置江關都尉以魚復設尉治東漢省尉而關如故而拒扞關蜀李秦張儀説楚謂下水而浮不十日雄説公孫述謂東下巴郡拒扞關之口皆指此魏酈道元注水經謂扞關乃廩君所置唐章懷注范史謂關故基在夷陵巴山縣矣無事則嚴封域二説皆非也蓋魚復之有關尚察姦軼有急則厄險要扞凌暴有國者所宜致謹也雖然嘗考諸古劍門以漢中武都為屏蔽失漢中武都則劒閣不足賴矣魚復以秭歸夷陵為保障失秭歸夷陵則魚復不可恃矣考秦以下以迄本朝舉兵定蜀者凡十有三惟秦司馬錯漢之來歙魏之鄧艾鍾會苻秦之楊安後魏之尉遲迥隋之梁睿唐之髙崇文後唐之郭崇韜本朝之王全斌實出劒門隂平道至若吳漢若岑彭若諸葛亮若桓溫若劉毅朱齡石以及劉光義皆擁舟師西指遡江扣關麾城摲邑易如拾芥耳何者皆以先得秭歸夷陵也漢昭烈襲取劉璋既北收漢中即東爭夷陵嗚呼若昭烈者可謂能知保蜀矣功之不遂此天也然而劉禪繼世猶以茍安者徒以與孫氏交歡也且蜀與吳楚為唇齒之國兩全則固一失則危是以自古在昔欲圖江南者必先巴蜀何者地勢便兵力接也秦取楚晉取吳隋取陳耀兵上遊舫船載卒乘流而東曽不頓一刃折一矢而荆揚之區已望風褫氣矣苻堅伐晉亦分軍而下不幸苻融之兵先敗於淝水故不能成功以此知英雄圖事後先一揆然則蜀之重也審矣自古或言蜀人嗜亂喜禍故所以制御操切之者尤盡其術嗚呼何其過也吾觀從昔亂蜀者皆非其國之人率由姦雄乘隙外至因竊據焉而蜀人莫之與抗蓋公孫述首禍於卒正風劉焉蓄姦於州牧陵鐘會兆謀於降將苛刻川李特奪迹於流人奪陽程道養怨激於劉季連計成於掎城司馬勳出於王族蕭紀興於帝胄王謙啓釁於易代知原劉闢席亂於留後王建發蹤於椎埋陽孟祥紹難於違愎脅州惟東晉譙縱本宕渠人然縱之初起實出逼觀其倉皇赴江以逃則知縱本庸人初無異志劫於羣叛不能自還若述焉以下數子者則其險詭睥睨有從來矣彼見蜀之險足恃蜀之富足資躍然動心逆節萌起蓋觀劒門之險而追笑劉禪攬兵甲之盛而思效昭烈而蜀之人形格勢制不能不折而從之其間能截然自固恥汚於偽如青衣之不賓公孫述牂牁之不臣於李特者類有之矣嗚呼一定而不易者地形也難保而易變者人心也故地形惟所守而人心惟所化茍知所守則力約而功倍圉固而敵畏茍知所化則嚚傲革為勇毅柔脆易為信順不知所守則嬴氏家函谷而滅田宗國東海而亡矣不知所化則暴悍踵起於江漢姦醜接迹於洙泗矣魚復與劒閣埒嶮角壯並為西南鎮昔有銘劒閣者獨此缺諸江出岷山行二千里合蜀衆流畢出瞿塘之口山竦而嶸崒水激而奔迅天下環偉絶特之觀至是殫矣是宜有銘琢刻磐石以侈寡匹以厲罔極其詞曰惟梁州域神禹所别有歸其閘險肇天設控引荆襄枕倚牂越岡聨嶺屬㟏岈嶻嶭洪流下瞰澎滲蕩潏衡潛抗髙華岱嫓桀上柱天倪旁扼曰轄惟所屏障則恃於峽如户斯闢此為之闌冦來是扞兵勢攸接鏡考前古棋勢輻裂水攻陸擊巖披谷抉犀甲熣爛白刃鎗䶪雲牁倐馳羽纛斯揭山奔貙兕壑濆螭霓水姦脫入孰睨旋竊虐環千里炖人於钀曽不逾時宗隕祚拔四方之人王化所逹寧甘嗜亂實守攸脅豈富是怙忍上之觖惟此山川重阻復疉德守者固兵據者蹶惟此黔庶嶷嶷業業力制則離道懷乃協皇帝聖武恩被䎀狘國有至仁九土臣妾勒銘山阿永彰宋烈張栻主一齋銘成都范文叔以主一名齋子嘉其志為銘以勉之人之心抑何危分百慮走千岐惟君子克自持正衣冠攝威儀瞻以整儼若思主於一復何之事物來審其機應以専匪可移理在我寧彼隨積之久昭厥微靜不偏動靡違嗟勉哉自邇卑惟勿替日在兹黃庭堅鏡硯銘瀘川之桂林有石黟黑硯則宜筆而受墨唐安任君從簡之硯面為鏡而背三足形駭天下山林不若而不得訪諸禹也唐庚古硯銘硯與筆墨蓋氣類也出處相近任用寵遇相近也獨夀夭不相近也筆之夀以日計墨之夀以月計硯之夀以世計其故何也其為體也筆最鋭墨次之硯鈍者也豈非鈍者夀而鋭者夭乎其為用也筆最動墨次之硯靜者也豈非靜者夀而動者夭乎吾於是得養生焉以靜為體以動為用或曰夀夭數也非鈍鋭動靜所制借令筆不鋭不動吾知其不能與硯久逺也雖然寧為此勿為彼也銘曰不能鋭因以鈍為體不能動因以靜為用唯其然是以能永年明黃景夔泮池銘湫作陬居僭雍之如誰乖厥初藝風塞荒士訛皇皇言此否臧其乖斯何易以其差匪以其訛制良治堅弓盈月弦首事時遷駕虹飛危石檻雲垂貫虛跨竒春水沄沄風行渙文翠委牽芹山英海靈秀脈潛生肆發光晶一士豪豪氣長朋曹德言功髙青襟忭歡我銘緒完列永永觀馮伉移建離堆山伏龍觀銘并序以夏書禹貢導江瀆出岷山秦史河渠鑿離堆以泄沫水懷襄昏墊之濔平之於前以陂九澤以通百貢於是乎錫圭鑄鼎夏后以膺圖立極瀦洳澒洞之患濬之於後以疏二江以灌萬井於是乎鬬牛沈犀李公以興利除害大惠浹於黎獻豐功遺於億萬其極一也與夫鄭國分渠於渭上西門引漳於河朔恩較其博倍將萬矣左思曰指渠口以為雲門灑滮池而為陸澤不其然乎非夫有道之士其孰能勇斯身仁斯民輝照竹帛豐潔祠享如此其光也詳夫驅風雲運神化剪妖厲謀疏鑿功廕萬世夀逾百嵗其在神仙之品得非漢天師許旌陽之徒歟離堆山伏龍觀者風俗傳云誅邪壓怪之所腴田沃野之會驚湍湧雷潄瀨飛雪洪流滉其淡淡回波潏乎溶瀜爾其雲壁髙坼霜濤中注靈阜嶙峋以磅礴沖淵澎湃而瀺灂硠硠灘滸清振林谷有若長蛟斷於陽羡支祈鎖於淮泗勿復害矣每嵗孟春役徒萬億計太倉為之給粟長吏為之督工築之繩之決之防之乘時以興比月而息枝分脈散環縈糾錯連州越郡膏沐千里雖密雲霮䨴愆陽蘊隆而田原是濡倉箱是粒書不云乎岷嶓既藝沱潛既道蓋坤維之上遊天府之陸海也爰建福地聿崇仙館旌哲人之餘烈慰生民之報德固其宜矣伉嘗覽舊史燦然神迹式將王命躬率僝功歷載惟三薈九芟草以廣其趾積石以增其注遷舊宇之翳即孤山之顯敞洪流璧轉列峯屛合東臨江口之關故靈基立其左崇功之義也西瞻寶室之穴故仙亭峙其右思道之旨也正居太上之殿中築朝真之壇喬木蔽乎陽岑二激乎隂壑石頭虎踞之狀蓬丘鼇冠之竒吕梁縣仞之險吳濤逆奔之勢羅列在目殆非人世之景五嘯於谷風玄鶴鳴於浦月白雲生座上拂仙香彩霧依巖下傳天樂轅字聖上凝命穹昊躋人福夀訪道以清中夏軒氏之理也望秋以遍羣神有虞氏之勤也兹地也名山周映靈迹孤標僉移集道之宫尊為逆釐之府事非改作功無用勞不革舊名惟崇新宇經搆輪奐之狀助揚穆清之化真風竒迹等天地久不亦盛乎不亦永乎拂石刻銘於彼山趾其辭曰李公英英日貫其誠竒功美利於今有靈仙鳬屹峙元都景明壇殿新製門闥舊名江沱泚泚揚漣玉清岷山峩峩回風雪零挂菌朝蔚漪瀾夜渟乘雲嘯歌浮丘赤城贊宋鄭藏休石室贊自張儀諷蜀劒路攸通向者魚鳬未知蠶叢詩書罔設禮樂誰崇征伐不休城池屢空爰暨有漢是生文翁符守此邦鬱為儒宗大開庠序啓我童蒙誦以八索歌之九功化流南蠻德伏西戎豈曰滇笮亦惟巴實其後相如傳之揚雄岷峨孕靈川瀆氣融石室猶在金聲無窮南鄰孔門北接玉宫千齡萬古永播餘風宋祁府學文翁祠畫像十贊漢蜀郡太守廬江文公贊曰天挺耆俊有德有文漢天子命公往撫蜀人蜀始朴蒙公不謂然選士詣學歸相教言一年而業二年而儒五年大成家詩户書以勤相矝以惰相恥出有教父入有順子文如馬揚節如嚴李由公教之聲塞天地蜀戴公仁世世奉祠千五百年惟公之思漢司馬相如字長卿贊曰蜀有巨人曰司馬氏在六葉為文章倡始言必故訓革戰國之弊斫雕混茫從神取祕摛發厥章日星佐華封禪遺篇意竭辭奢武用東之紹七十二家行雖小訾後帝賢嗟鳴王褒字子淵贊曰子淵軒軒洵美有文宵雅鹿帝用攸聞此盛德事讓不克堪頌聖得賢戒松喬是耽以諫大夫數從幸巡受詔作賦持節迎神未克告猷少謝良臣言莊遵字君平贊曰君平沈冥賣卜肆中子以孝臣以告忠日足百錢閉門著書十餘萬言黃老其徒李疆牧州喜欲吏君揖風而慙噤語於脣還謂子雲子誠知人九十夀終身概髙旻妥張寬贊曰惟武嗣位而有荒志厥德靡升神不祀婐然靈媛止乎渭濱帝使走咨何所而人媛告七車能為我言君稽首對吾祀弗蠲帝用謝愆君改厥薦天人之交自我而見李仲元贊曰髙也絶俗雖介不通卑也汚俗雖順不恭淵哉仲元內粹外渾衆不我知揚子識其賢其賢奈何在通恭之間可器有名非行至完彼顯在人吾晦與天天而不人萬世其傳何武字君公贊曰泛鄉為人鯁固清明嫉惡比周直鞅安行先問儒官已乃事事望侈德充晚相天子天子倚之姦臣內憎天喪道消卒為賊乘玉折不撓身沒名升語揚雄字子雲贊曰卓哉子雲為漢儒師凖易論同聖是非百家懘淫我獨正聲譎怪續藏孔道光明歆也致訾謂抵醬蒙惟談有言必傳無窮劇秦詭辭恨死新時曰漢中天果不吾欺耳蜀郡太守髙瞬贊曰顯顯若人有政自律摘民目尊右儒術晚漢多艱校屋蕩焚經生罔依弦誦不聞君大紹興新堂及廡繪帝王以還冠服所祖大掖翺翔坐復鄒魯與文偶祠血食千古文宋蔣堂字希魯贊曰蔣侯挺挺天與嚴方健而明不逢不將始治蜀人政未及孚纖者嫉侯膏吻騰誣侯政已孚蜀人熙熙侯坐徙官逺近驚咨侯始興學紹文之餘百堵增增大度厥居髦俊聿來晝經夜史盎然西南號多君子侯既去州右區即毁侯惠在人已膚而髓子産相鄭先謗後歌來世視之謂侯如何樞按吳曽漫録云蔣堂字希魯宜興人仁宗時以密直學士知成都嘗召髙才碩生會試府事親較才等勸成學者於學之側别建西學以廣諸生齋室迄成而公移蒲中其後轉運使毁之以增廨舍既而常山宋公尚書至府聞其事歎惜久之且欲成公意乃即其舊址建文翁祠祠之內圖莊君平鄭子真司馬相如揚子雲蜀士先賢凡九及公之像而十常山公為之贊黃庭堅緑菜贊石刻在蘆山縣古廟中可蔡蒙之下彼江一曲有茹生之以為䔩蛙蠙之衣采采盈掬吉蠲銑澤不溷沙礫芼以辛鹹宜酒宜餗在吳則紫在蜀則緑其臭味同逺故不録誰其發之班我旨蓄維女博士史君炎玉贊宋紹興甲戌知縣徐閎中跋云山谷老人緑菜刻石於蘆山縣廟中嵗更百祀典刑儼存贊末有史君炎玉之句讀者多所未喻蓋指言眉陽望族史氏女名琰者琰字炎玉髫丱資穎嗜學蘋蘩線纊一不經意志業専確乃博古善績文雅安張士儀諱誾少卿出守眉陽聞其才且賢納為冢嗣子履諱祺之婦炎玉之歸子履性素沖淡不事鉛飾服浣濯之衣日遊心於編簡翰墨平生臨覽之勝燕笑之適與子履詩詞酬唱格調間雅久而盈篋手自敘次目曰和鳴集善用秃筆字體莊徑少卿愛重之殊不責以中饋之職厥後少卿幼子介卿諱祉擢進士第調睂之青神尉是時山谷老人謫居涪城遡流見介卿誦親親之好蓋少卿之室江南黃按察諱廉之女弟於山谷老人姑輩也炎玉配子履實其親表因騰書致緑菜為信山谷珍其品以贊謝之有曰班我旨蓄惟女博士史君炎玉猶古女校書之褒云蘆山楊與權諱巽先生年垂八十炎玉宅相也大觀間以行藝為郡學政每休沐以甥禮侍見相與窮日論文且評課試近題淵源端緒不減謝韞解圍之辨傳播諸生咸推仰焉與權謂其才美秀嘗見許於文章宗匠恐浸久湮沒無聞詳其本末屬閎中記敘載石勉從其請張俞蜀三賢畫像贊并序有益州中興寺有墨池院院前漢揚子雲莊君平李仲元三賢畫像因各贊之來者觀像讀贊則知三賢之道至焉揚子雲贊曰子雲潛真與聖合神龍隱其德鳳耀其文撰法著玄統貫天人道德之首談稱絶倫莊君平贊曰淵淵蜀莊至人之貌心通蓍龜言必慈孝推道衍德窮神入妙子雲之師孰洞其照李仲元贊曰仲元何如貌人心天出方其隱默愈於言道兼夷惠質妙雲淵屈伸猶龍物無纍焉明吳薦宋賢贊宋朝議大夫黎公錞贊曰三傳融心六一攸契經術揚廷結知英帝學仕兼優借留斯致箋簡遺言百世爭媚秩右正言節愍張公庭堅贊曰大科傑魁正言清諫紙數陳侃侃無匹惟憸弗從三謫匪逸節愍揚名百世一日宣教郎畏齋遊公桂贊曰三禮正傳濬淵樂絶經學有編日星昭揭猗我文皇治教超越用輔休明大加采列少保忠定安公丙贊曰桓桓忠定神發皛然甫占仕版經濟默全霆掃凶逆談笑首傳功流秦蜀千斯萬年吳伯通自贊仁之居廓然義之路坦然此天之所以與我者與聖賢而同然雖余足之履有未遍也而其目之覩已了然惟之死而心亦靡他又能無適而不皆然則位雖止乎三品而夀亦拘乎百年兹生也庶乎其不徒然頌漢王褒聖主得賢臣頌夫荷旃被毳者難與道純綿之麗密羮藜唅糗者不足與論太牢之滋味今臣僻在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知顧有至愚極陋之纍不足以塞厚望應明旨雖然敢不略陳愚心而抒情素記曰恭惟春秋法五始之要在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革忽若篲泛塵塗如此則使離婁督繩公輸削墨雖崇臺五層延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻弊策而不進於行胸喘膚汗人極馬倦及至駕齧膝驂乘旦王良執靶韓哀附輿縱騁馳騖忽如影靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲狐貉之暖者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖主之所以易海內也是以嘔喻受之開寬裕之路以延天下之英俊也夫竭智附賢者必建仁策索逺求士者必樹伯迹昔周公躬吐握之勞故有圄空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆䇿則君不用其謀陳見悃誠則上不然其信進仕不能施效斥逐又非其愆是故伊尹勒於鼎爼太公困於鼓刀百里自鬻寧戚飯牛離此患也及其遇明君遭聖主也運籌合上意諫諍則見聽進退得關其忠任職得行其術去卑辱奧泄而升本朝離蔬釋蹻而享膏梁剖符錫壤而光祖考傳之子孫以資説士故世必有聖治之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝣出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊乂將自至若堯舜禹湯文武之君獲稷契臯陶伊尹吕望之臣明明在朝穆穆布列聚精會神相得益彰雖伯牙操鐘逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其德上下俱欲翕然交歡千載一會論説無疑翼乎如鴻毛遇順風沛乎若巨魚縱大壑其得意如此則胡禁不止曷令不行化溢四表橫被無窮遐方貢獻萬祥畢臻是以聖主不遍窺望而視已明不殫傾耳而聽已聰恩從翔風翺德與和氣遊太平之責塞優遊之望得遵遊自然之勢恬淡無為之場休徴自至夀考無疆雍容垂拱永永萬年何必偃仰屈伸若彭祖煦噓呼吸如喬松眇然絶俗離世哉詩曰濟濟多士文王以寧蓋信乎其以寧也宋孫漸芝堂頌宋哲宗紹聖四年夏四月八日有芝生於溫江縣觀音院齋廳之楹一本而數結煙縷氤氲閲月不散邑令孫漸扁其處曰芝堂而為之頌曰王母薦祉金精效竒是生神草雲英瓊𬎼給園之中湔水之湄地其幽矣芳而孰知陟彼岷宫正人頎頎夜授祕訣謂余搴之沃之醴泉濯之天池羞以石髓茹而忘飢黃綺為侶喬松可期盍獻天子以薦神祗劉錫至道聖德頌并序家臣聞惟王建國闢天下以為問罪弔民執征伐而自出禮樂興而車書混風雨順而隂陽和敷大信以被豚魚露至仁而及草木耕田鑿井且帝力以何知里詠途歌惟家給而自樂斯為有道之朝也我后握圖御宇下武承祧契壓紐之禎祥叶垂衣之厯數萬方景附百蠻子來邊隅之禍亂已平武庫之干戈不用觀書乙夜思政未央備窺得喪之由咸得步驟之理躬親庶政宵肝忘勞得士則昌所以崇四科而拔俊造知人則哲所以設千銓而較賢能英雄盡入於彀中寒苦詎遺於巖穴輪轅適用管庫皆甄白駒之詠不聞維鵜之刺靡作其有霜稜肅物直氣凜人負謇諤之通才蓄縱橫之逸辨諌油衣而作瓦止鑾輅以從橋若此者俾居諫署雕龍茂異比鶚聲華杳冥傳江氏之毫寤寐得丘遲之錦賦就而文無加點詩成而鉢未銷聲若此者司於文翰默識穎悟周才博通指天上之石麟咸欽異表問省中之溫樹不對家人若此者擢贊樞務籌謀兼濟宇量淵深一言可以興邦九功斯焉惟敘乘隂未革言從可陟於周師箭漏才移行令堪登於漢輔若此者升之於廊廟百職舉而萬務簡六籍興而五教修至若勇冠三軍謀深百勝蘊孫吳之妙略懷頗牧之沉機箭落酒樽王霸端居而不動君臨細栁亞夫上請以徐行有竇嬰濟衆之心擅景舍讓功之美劒刺而飛泉湧出戈揮而太陽再申識動風雲誠感天地若此者命之為上將則文王能官人漢髙善將將未可同年而語耶粵以二聖重熙垂四十載邇安逺肅時和氣清桂海冰天皆同尉候鶼林鰈水盡入提封四郊無多壘之虞重門罷擊柝之備刑措而不用化洽於大同眷彼坤維是為益部星分井鬼地接荆揚列肆雲羅珠貝熒煌於三市居人櫛比酋豪繁盛於五陵俗尚嬉遊家多宴樂犬子揚雄之故里文翁石室以猶存所以時有才名好藏文籍勸分務穡俗久返於淳和説禮敦詩門競成於鄒魯既富且庶役寡賦輕古為奧區今尤壯觀我后常矜逺服偏示優恩擇循吏以撫綏去貪人之刻削熙然無事迄今稍康儻軍旅尚多則仰給斯費徵斂及下咨怨必興擾我蒸民曷為父母所以減其戍卒用泰兩川務安黎庶之心冀免侵漁之弊不謂災纏分野盜起窺覦乘虛輒搆於姦謀恃險僭稱於大號聚徒作梗揭木為干驅脅我編氓虔劉我郡邑謂長安日逺劒棧天髙竊料王師焉能立至稍阻瓜時之約克成劇據之謀遂令不逞之徒分誘順非之輩數逾百萬毒甚豺狼先逼龜城恣行犬噬守臣敗職共治乖方復衆寡以相懸遂金湯而失險使我一城生聚陷塗炭以何辜三峽揚波躍鯨魚而害物使車入奏宸聽俄聞憤兹蜂蠆之微玷我承平之化雷霆赫怒貔虎徴師先擇統帥之臣能荷腹心之寄授受之際艱難責成顧謂宣政使王繼恩曰汝久侍冕旒嘗親帷幄執大節而不奪竭忠誠而可嘉屢從龔行備知韜略今以蜀民失馭蟻聚為妖若火燎原須行撲滅如湯沃雪暫枉師徒必以謀臣逹於閫制識董戎之體知應變之方僉曰汝諧祇膺朕命由是密承睿算寅奉宸嚴諭之以蕩定之期誨之以懷柔之略倐離景從夙駕星軺仗玉節以身先會虎賁於關右分萬乘憂勤之意解一隅俶擾之危莫不倍道兼行次於昭武登山臨水車殆馬煩察彼輿情斯亦勞止俾之休憩逮於浹旬皆知秣厲之方盡稟甲庚之令遽以單醪饗卒十乘啓行龍躍崩雲雨施屆路朱旗爍野霜矛凜空士一其心人百其勇過孟陽之劒閣易若轉丸下王濬之刀州疾如反掌賊首李順閉關設拒坐甲固存魚遊沸鼎之中莫知攸濟梟處危巢之上猶唳惡音王繼恩大陳俄臨中軍悉至親揮白羽競務先登萬旅齊驅排闥而入短兵接刃一以當千交鋒靡遺應弦皆斃類䳸鸇之逐鳥雀若鴻毛之遇順風李順力屈勢窮藏於羣冦亂兵所害橫尸莫知既免載於檻車亦幸逃於梟首自辰至午拯危就安巢穴砥平淑慝精辨茍非我后神機獨斷睿選當仁遵出口入耳之言副臨事制宜之旨曷以立除大憝罄剪羣凶波靜錦川雲集闤闠百姓胥悅三軍肅然禁暴戢兵府庫秋毫而不犯矜孤恤寡閭閻老幼以如歸氛祲消而和氣生祅逆除而皇風扇捷書才奏曲赦屢加什一之征併從蠲宥管𣙜之利取便人民小大之罪皆除逋次之徒盡釋雷雨作解咸與維新於是闔境緇黃一川士庶扶老㩦幼攀長吏之轅言發涕零感大君之惠日昨以頑愚背誕偷竊亂常上黷四聰逺勞七卒誠合赭宫汚地易貫移鄉或置於魑魅之陬或遷於成周之邑豈謂乾坤厚施雨露深恩免玉石以俱焚俾涇渭之分别匿瑕含垢以欲從人生者安懷土之情歿者遂首丘之志下哀痛泣臯之詔申禹湯罪己之言地處要荒再荷堯天之覆年當蒲栁重觀舜日之光願立豐碑請頌聖德知州樞密直學士張詠樂成盛事遂其所陳以臣漕運從軍備覿戡定具以衆懇請頌徽猷然而天地貞觀之仁日月髙明之道豈以雕蟲末技半豹謏聞能歌造化之功可紀照臨之德井視星而無幾螺測海以非多內省庸虛夫何敘致忝為臣子不敢讓辭惡殺好生雖裨竈焉知於天道歌虞頌魯即王褒粗曉於人心梗概直書謹為頌曰我后繼明應乾馭宇道冠百王功髙萬古越契踰繩登三邁五天下一家千年真主化臻清淨用急賢良除凶定難論道經邦往無弗克謀無不臧左右前後得人而昌覆載之中霜露所委法則衣冠混一書軌牛馬歸牧劒戟消毁萬國咸寧四郊絶壘西南益部羣盜狂搔謂地之險謂天之髙亂常作梗憑阻興妖窮凶極惡自孽難逃聲聞於天王赫斯怒親選帥臣即時屆路羽檄徵師函關西度十萬貔貅會集雲霧元戎貞律盡稟神謀平趍劒閣直入成都烏合蟻衆席捲風驅一日而定百姓重蘇渠魁既殲脅從皆釋宣諭安存閭閻萬億不獲已而亂是用殛班白感泣兒童悅懌蠢兹巨逆黷我一方民罹點汚帝用盡傷恩宥稠沓愍念凋戕視人如子降福穰穰中外緇黃遐爾耆艾泣告長吏鄙俗罪大比屋可誅聖恩全貸施重嵩衡命輕草芥請頌聖德刋在貞珉朝夕瞻企蹈詠聖神如依日月若拜君親長遵忠孝用誡曽雲司馬光解禪頌并序如文中子以佛為西方之聖人信文中子之言則佛之心可知矣今之言禪者好為隱語以相迷大言以相信使學者倀倀然益入於迷妄故豫廣文中子之言而解禪頌六首若其果然則雖中國行矣何必西方若其不然則非豫之所知也謹序如左李公丞相嘗謂聖人設教其道必歸於一故作是頌以釋未悟也頌曰忿氣如烈火利欲如銛鋒終朝長戚戚是名阿鼻獄其一顔回安陋巷孟軻養浩然富貴如浮雲是名極樂國其二孝弟通神明忠信行蠻貊積善來百祥是名作因果其三仁人之安宅義人之正路行之誠且久是名光明藏其四言為百世師行為天下法久久不可掩是名不壞身其五道義修一身功德被萬物為賢為大聖是名菩薩佛其六張俞成都府學講堂頌并序守今上嗣位之年昌黎公蜀之五月修文翁講學之事乃治學館就與諸生講習禮文又三月遂作大講堂明年三月甲子乃會僚佐及學官生徒等三百人行講禮於堂上是日府縣士民及四方之客逮萬人咸來觀聽且謂蜀之學逺矣肇興於漢歷晉唐至於戰國世世弦誦不衰所謂周公禮殿文翁石室越千餘載而巋然猶存今昌黎公復作講堂而穹隆龎鴻侈於漢之殿室自闕里及三都四方之講堂未有壯乎此也觀乎岌岌煌煌蔚有休光其為教化之本歟乃揚言而頌之曰維蜀學宫肇於漢初用倡庠學盛於八區八區洋洋絃誦復興周法孔經是纘是承宋炳文章與漢同風五世寖昌乃學之功文武韓侯撫我蜀都教我子弟一歸於儒乃嚴學宫乃崇講堂山岌洞闢巋然靈光儒師學徒翼翼羣居升堂接武講考詩書所講維何孔門四科若金在礪若圭在磨匪經弗習匪聖弗師羣言淆亂乃聖之疵伊昔魯堂有遊有夏蜀學之興亦有揚馬韓侯作藩文以化下揚天之聲爛於周雅明道二年公父太師由樞密直學士諫議大夫守益州崇學尚文振禮樂之聲召拜御史中丞遂參知國政號為名卿公嘗自諌院遷知制誥充翰林學士拜諌議大夫為中丞以亮直不回改侍讀學士為環慶路大帥就加端明殿學士移守成都又遷給事清德懿文陶化舊俗凜然穆然聲流江漢父老咸謂賢父賢子先後出入相繼其遺化紹功近世未有其倫者昔鄭正公之鎮興元創立儒宫開設學校其子宣公復居其位繼成前烈殆將三百年江漢之人誦其遺風若前日事今韓氏亦再世鎮蜀能懋其功比於二鄭之賢古今相照美哉豫故書其事以俟其子孫復有臨此都者得以觀焉楊天惠溫江縣二瑞頌并序千溫江隸成都遠王畿三幾百里有竒蓋西南偏邑也政和二年夏六月有嘉禾産於嚴氏之圃凡二本是嵗十二月復有甘露降於學宫之柏凡三日鄉以白縣縣以白府府遣從事即縣核狀皆有實可復不誣輒具書若圖上尚書省以聞詔下其副尚書禮部藏焉於是前縣令臣宗道馳書諭假彭山丞臣天惠曰盍頌諸臣越北闕而奏頌曰於皇御極百志惟敘曰農而農曰士而士爾安乃宫爾寧乃畝恩詔數下仁滂德膴農飽以歌士喜式舞協氣從之祥嘏如雨乃産嘉禾以慶農扈乃降甘露以幸士子其慶伊何珠穗紛舉俾爾甌寠戶有億秭其幸伊何雲液醲湑俾爾膏馥濡及嬰孺維我哲后博臨下土相彼多禾均此靈露道拜稽首誕告奔走惠拜稽首盱衡語語敢獻裨官以贊矇瞽宇文仕紹興聖德頌并序權紹興二十六祀皇帝總攬綱大公黜陟注意德臣使宅百揆聖賢相逢道同志合或因或革而庶績咸熙一都一俞而罔不被澤越明年廟堂胥議逺暨川蜀謂桃林放牛之後罷褒斜流馬之役民力未紓其弊安在降自外司搜剔軍實推其有羡除對斛之米數削縑直之倍佑使田夫桑婦榖其腹而絲其身乃下詔曰朕念四川邈在一隅德意志慮懼弗克究晝夜以思安得一時承流宣化觀風察俗之吏與朕同心使遐方絶微皆如畿內轂下不亦善乎又曰朕休兵息民之意爾等固知之矣惠在生而不傷厚而不困詎容煩役久為民患於戲德意甚大詔旨甚切舉全蜀五十餘郡越小大邦罔不精白以承休德凡逺所溪谷山澤之氓井飲田食咸知帝力之所加邈爾邊邑卉服椎髻詔下之日悉來竦聽尚恐未諭微臣稽首南望播告之曰德莫大於生成恩莫重於養育方今廓天地之德施父母之恩乃能全其生而遂其養有君如此何以報之相視嘆呀鼓舞而退是嵗之彛倫攸敘百穀用成民有餘力頌聲四起採於擊壤帥民鳩匠磨崖大書上以述聖朝納民仁壽之域下以紀齊民歸美報上之心豈不為萬世之休哉謹按漢王褒作聖主得賢臣頌徒出私意而不出民謠唐元結作中興頌功雖可紀而德無可録曷若方今弭兵之後下輕徭薄賦之令歌詠聖德皆含哺鼓腹之民自當過漢軼唐增大雅之什矣臣昧死再拜潤色其詞曰天作炎圖舄奕千載纍洽重熙盛德光大寶運中興上下交泰皇澤汪洋罔不霑溉僻陬奧壤尤託王靈中原俶擾獨此彌寧天雖設險衆心成城抵兵捍關下瞰三秦靈旗或指何征不克皇帝神武棄功就德一視同仁罔間南北斷自淵衷休師兩國吳越竦息齊楚來盟韜弓束矢不假用兵井絡編列迄於升平初幼終老獲全此生向者雲屯開口仰哺流馬褒斜暴迹於路外府不給犒軍加賦雖率爾力保爾所聚今之講好乃為息民外司過計覆獲其嬴冕旒燭逺亟下絲綸削縑罷糴戒諭丁寧惟皇建極斂時五福代天理物升之當軸都俞之間澤被遐域林林總總既生且育仰帝之德大矣乾坤懷帝之賜父母深恩萬口附和載之和聲此山不朽刻之以文左奉議郎知雅州蘆山縣事主學事勸農公事兼兵馬司監臣宇文仕撰并書碑漢故朝請巴郡太守樊府君碑公諱敏字叔逹肇祖虙犧遺苗后稷為堯種樹舍潛從岐天顧亶甫乃萌昌發周室衰微雲伯匡弼晉為韓魏魯分為揚充曜封邑厥土河東樹漢之隂或居於楚或集於梁君纘其緒華南西疆濱近聖禹飲汶茹汸總角好學治春秋穀氏經貫究道度無文不覩於是國君備禮招請濯冕題輿傑立忠謇有夷史之直卓密之風鄉黨見歸察孝除郎永昌長史遷宕渠令布化三載遭離母憂五五斷仁大將軍辟光和之末京師擾攘雄狐綏綏冠履同囊封袂長驅卑走枕北國復重察辭病不就再奉朝聘十辟外臺常為治中諸部從事舉直錯枉覃思舊職彈凶紏貪務鉏民穢患苦改俗喜怒作律案罪殺人不顧猖獗告子屬孫敢若此者不入墓門州里僉然號曰吏師季世不祥米巫凶虐續乘青羌姦狡並起啖附者衆君執一心賴無汙恥復辟司徒道辭不往牧伯劉公二世欽重表擢巴郡後漢中秋老乞身以助義都尉養疾閭里又辟奮義校尉君仕不為人祿不為已桓桓大度禮蹈萁首當窮台齡松喬協軌八十有四嵗在叶洽紀驗期臻奄忽藏形凡百咸痛士女涕零臣子褒術刋石勒銘其辭曰於戲樊考經德炳明勞謙損益耽古儉清立朝正色能無撓傾威恩御下持滿慮盈所歷見慕遺歌景形書載俊乂股肱幹楨有物有則模楷後生宜參鼎鉉再建皇靈出經阪險鬼方不庭所戢節足輕寵賤榮故敘天選而相陪臣晏嬰仰殿留侯距齊非辭福也乃避禍兮亂曰渾元留像岱瀆冶匠兮金精火佐實生賢兮豈欲救民德彌大兮遭遇陽九百六會兮當舉遐年今遂逝兮嗚呼哀哉魂神裕兮建安十年二月上旬造石工劉武良鐫書唐王勃益州德陽縣善寂寺碑若夫玉繩髙曜分寶厯於皇階金榜洞開遵蠙暉於帝幄雖復蒼梧北望湘山盈舜后之歌緑荇西浮江漢積文妃之頌未有激揚煩蔭栖妙果於香城揮發蓋纒樹冥基於淨域則紫房丹室猶存毁宅之間朱紱瑤筐未出塵籠之際我國家鳳翔元氣駕黃幄而層飛龍躍太虛絶蒼根而上傃文皇帝以八才御厯光升代野之榮文德后以十亂乘時恭贊塗山之業握仁王之寶鏡日月重光驅梵帝之金輪雷霆靜祲涅槃甘露睿承渥而霄流般若靈音雜祥風而曉引蛟臺蜃閣俄交震旦之墟月面星毫坐照毗耶之國善寂寺者蓋舊寺之餘址梁武帝之所建也爾其碧雞仙宇分絶嶂於金隄石兔遙源控長江於玉峽封畿四會龍坰舍衛之壇里閈三分鹿野徑行之地洎蒼鵝上擊銅馬交馳祇園興板蕩之悲沙界積淪胥之痛火炎崑嶽髙堂與雁塔俱平水浸天街曲岸與猴池共盡山川隱嶙空傳鷲嶺之基灌莾蕭條非復鶯林之樹武德伊始君子道亨正皇極而撫寰中登太階而平天下函關雲物更逢真聖之朝井絡星辰重集會昌之運雖開基撥亂獄訟知歸而繼絶興亡經綸未暇先皇帝統業貞觀御宸奉文物於三天布聲名於十地參羅上下充槖籥於襟懷八部神祗薦圖書於掌握皇寶降地花升含生無昏墊之虞法衆有來蘇之望俄而後庭遘癘椒房穆卜六宫震恐三靈愕眙馳瑶展幣有罄於羣宗碧劑懸針無徴於衆術帝乃降監回慮屏壁與球追勝迹於雲關事良緣於福地爰紆聖綍重啓禪宫峙璇剎於將傾鎮銀繩於已絶絲綸既洽棟宇行周坤德用寧隂儀載朗於是林衡授矩周官銓揆日之工梓匠揮斤荆客練成風之巧重楹畫栱坐出天霄復樹文閨俯臨霓宇顯慶中縣令蕭君道𢎞理鈎繩於日用憑藻繢於天成仙宫之妙匠可尋盧舍之神模不墜雕落鶴翥曳珠網於星津繡桷蚪伸吐璿璫於月徑緑房丹鎖綵綴晴霞紫閣青疏光含薄露春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰辰光轉卉翻寶字之龍花溽露低枝蕩真文於貝葉天童潤色黃珉碧玉之壇海聖彌綸獅子龍王之會建靈幢於厚夜琢飾年深縣法鼓於迷津規模嵗逺時又於佛堂東壁畫二聖僧丹青未畢大啓神光鄰玉麈之崇輝發金龕之實相朱軒夕朗似遊明月之宫紺宇晨融若對流霞之闕由是岷英蜀秀攀講序以雲趨帶驚裙鸞仰齊庭而霧合貪機大阻淨施旁流綺羅分解佩之因軒蓋得捐金之所靈妃翳日拾翠幄於香筵仙客停雲落霓裳於寶地自非沖姿密契景應潛周豈能照義祉於氤氲動元機於肸蠁者也爰有上座𢎞一節並沈研性符隱括仁崇凝妙律於神珠肅靈椒於寶印太昊奉楫截苦海而橫流風伯扶輪歷耶山而效駕騰燭龍於慧炬府鏡重昏奏鳴鳳於天歌下清羣籟摩珍在握遙臨七寶之宫正覺為心俯闢三乘之路湛衢鐏於忍地品藻雞園推水砥於言河扶持象化縣令宇文某河南人也帝隋尚書之玄孫皇唐侍中之令子爾其虹旗萬里御六氣而鵬翻霜戟千羣擁三川而鶚視帝葉皇枝之重對越乾坤金縢石匱之功光華宇宙公上流禔慶中和育祉見鍾鼎於南鄰奉軒寰於北闕雲姿月步下瑤澤而追風雪羽霞臨歷珠囦而矯霧芳蘭公子即以地業髙人幽桂王孫即以琴樽待物敘徽猷於禮樂則爼豆縱橫談賞契於林泉則煙霞咫尺自裁聲百里揆化雙川收武城之故事擇中牟之令典仁風易狎候丹翟於春坰惠化難經佇青鸞於曉墅山巨源之逺量嘯傲行藏謝太傅之髙風從容語默縣丞王敬衣簪舊族孝友名家白虹緘抵鵲之花紫電蓄衝牛之氣七年髙秀拂層漢以非遙六月雄圖擊長波而未逺鄉望等少承榮緒中區勝族門稱東别之標地接西隅之響嚴東平之履道盛德家傳秦子敕之談天風流代襲咸以為妙圖真諦事出於無名翠琰懸碑道凝於不朽弇州北跨猶疏騄驥之銘文石東區尚勒元龜之頌况乎玉衣流慶事屬於仙幃金屋延祥福纒於梵宇爰求勝筆載紀芳謠下官弱植少徒薄遊多睱薜蘿人事空餘江海之心筆札神交尚有淵雲之氣相如謝病訪詩酒於臨邛丘也棲遲聽弦歌於單父羣公以道之存矣思傳紀德之書下官以文在兹乎願展當仁之筆其詞曰蜀江東漸岷山西積月峽星橋勝金孕碧肸蠁靈兆丘墟梵迹雁塔摧基鹿苑遺迹肅肅黃運英英文母配乾垂慶儀坤握矩寵照香城仁沾淨土爰光大壯聿求多祚青牛福地白鶴祥林重扃霧敞復殿雲深龕雕翠玉剎樹黃金龜鏡夕照鳳鐸晨吟蕙樓彌望花臺出沒棟列長虹窗栖明月果唇周映蓮眸間發雨霽猴池煙生龍窟肅穆禪衆優遊令宰方駕天衢連舟性海鷲嶽增飾雞林潤彩藻繪相尋丹青盡在我今懷矣窮路何之承風詠德展義陳詞百年心事千載風期東西南北棲遑幾時梓州郪縣兜率寺浮圖碑若夫仙樓白玉窈冥崑閬之墟神闕黃金寂寞蓬瀛之浦斯則岡巒髣佛稽鳳册而空存島嶼慿陵艤龍舟而罕逮至若按皇軒於夏籙考璿構於殷圖周王北洛之宫秦帝南山之閣西京故事下聽雷霆東國餘基俯臨雲雨莫不陵遷谷變共榛灌而丘墟火絶煙沈與風雲而坱莾其有據坤輿之寶位借神道之冥扶占象緯而圖基揆川原而宅址蜂臺映月還臨舍衛之城雁塔尋雲即對𡺸闍之嶺成而不毁者將斯之謂歟兜率寺者隋開皇之所建也爾其林泉糾合之勢山川表裏之制抽紫巖而四絶疉丹峯而萬變連溪拒壑所以控引太虛蒸雲駕雨所以蕩泄元氣涪江千仞波潮將旭日爭光都城百雉甍棟與晴霞共色信造化之竒模盡登臨之妙境丹房霧轉抗金樞於桂岊之前紺殿星開栖玉剎於四崖花落沼近拂天衣澗葉低隂斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿清挾霜鐘而赴節若乃巡碧磴歷懸階鎖忩登煙綵瓊鋪洞照神姿滿月如臨石鏡之峰衆馥揚似對香爐之嶽信可下清人境上配天都為勝地之先鳴執名山之右契者也爰有信弟子某某等夙袪塵網蚤植慈根悲梵室之未宏悼禪宫之尤褊以為上棟下宇河圖避風雨之災廣榭崇臺時令著髙明之宅是以菩提長者競潔靈境之壇天帝人王爭闢仙宫之塔則知威容下麗羣生鮮悲仰之因材璞重雕黎人有子來之地乃於寺內建浮圖一所某年月日鄉望等兆基𢎞願繼發淨因陵轢中天規模大壯二髙列砌架浮軒直上千尋周回百步占氛候景神祗叶幽贊之功揆墨端行班倕逞絶羣之思收岱宗之杞梓聚崑山之玉石土兼五色金逾百鍊龍蟠萬栱巢屛翳而髙襄鶴矯千楣冠扶搖而獨運重擔藹藹雲將反覆於櫺軒洞宇寥寥風伯栖遑於戶牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返懸甍黮䨴若鵬飛之戾九天丹楹聨騫如鳳翔之遽千仞每至韶光煦野爽藹晴遙列郊墟於四野開雲氣於千里風恬雨霽煙霧藻天地之容野曠川明風景挾江山之助則有雕簾繡軸非淨域而停輪寶騎銀鞍指珍臺而聳轡於是按岫幌抵巖扃攀翠復而三休步髙梁而十憩廟軒外敞淑氣長延隂室中開鮮颷自激俯環瀛而極野積蘇非遠出雲漢而髙踐靈槎可託真福地之殊觀香域之巨麗者乎寺主等沉研二諦振耀三明抵蒼璧於耶山覽碧珠於定水挹其流者曲成般若之緣承其風者濬發菩提之願長史河東裴某風神朗潤操履貞勤蕭條江海之心磊砢冰霜之節下岷關而叱馭寄切全都臨蜀野而宣條功深半刺縣令衛某四河東望族榮髙銅墨仕握弦歌浹辰而風化大行逾月而姦豪屏氣陶潛彭澤自得髙人王吉臨邛仍延重客縣丞胡敬仁三河舊嗣一代良材提鏌鎁而願割蹁驊騮而待步江湖秋至方懷縱壑之圖海浪風髙未接垂天之翼鄉望等並中和受氣孝友承家才稱江漢之靈地實岷峨之秀或以時良入選擢迹鄉鄰或以輿望來儀升名郡縣並沐康衢之化俱成比屋之封瞻彼岸而同歸登春臺而共樂咸以垣墉遽覆猶傳路寢之歌銀鼎俄窮尚勒靈臺之頌况乎崇基奕奕與天地而爭工層搆峩峩配山川而永固豈可使宏規在我空存蔽日之基雄筆同時不借凌雲之氣謹聞命矣乃作銘云二象成紀三才定位開剖太虛導引元氣紛紛化迹颷颷聖致行傑趣約歸同葉異法王西眷教迹東流功超道茂義冠儒流丹青既備棟宇旋周梵宫霞積香閣星浮緬規蓬瀛金臺迥起曠瞻崑閬瑤房峻峙壯矣名都神居攸止大哉英服兹峯誕紀金繩對嶺玉榜分岑松扃委鬱桂幌深沉雲龕菜晦煙洞花深重巒霧結復澗泉吟肅肅禪衆遙遙淨境鹿野經文龍宫拂景梵奏金石光來石井峽曉猿清地曛鶴警岷峨舊族江漢英姿爭開法願重峻崇基占雲接廡撥景分墀天人合應幽顯呈期靈思孤出神模獨湧霧積千楹霞長萬拱玉牖星羅璿璫月擁復榭龍蟠重甍鳳聳峩峩峻岊奕奕崇標雕簾切漢寶綴凌霄深忩閟景洞戶流颷銀釭夕映珠鐸晨搖我辭秦隴來遊巴蜀勝地歸星名都憩足甫逮鄉縣頻移灰燭聿從良友時尋妙躅曠望原陸周流江汜桃李春風芙蓉秋水煙霞四面關山千里他鄉寓目兹焉復幾益州夫子廟碑記述夫帝車南指遁七曜於中階華蓋西臨藏五雲於太甲雖復星辰蕩越三元之軌躅可尋雷雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之動不足多也握瑤鏡而臨事業則萬機之湊不足大也故知功有所服龜龍不能謝鱗介之尊器有所歸江漢不能竊朝宗之柄是以朱陽登而九有照紫泉清而萬物覩粵若皇靈草昧風驪受河洛之圖帝象權輿雲鳳錫乾坤之瑞髙辛堯舜氏沒大夏殷周氏作逹其變遂成天下之文極其數遂定天下之象衣冠度律隨鼎器而重光玉帛謳歌及宗禋而大備洎乎三川失御九服蒙塵爼豆喪而王澤竭鐘鼓衰而頌聲寖召陵髙會諸侯輕漢水之威踐土同盟天子窘河陽之召三徽制度乘戰道而橫流千載英華與王風而掃地大業不可以遂絶由是河洛兆朕索王開受命之符天地氤氲元聖舉乘時之策興九圍之廢典振六合之頽綱有道存焉斯文備矣夫子姓孔氏諱丘字仲尼魯國陬人也帝天乙之靈苗宋微子之洪緒自元禽翦夏浮寶玉於南巢白馬朝周載旌旗於北面五遷神器琮璜列髙帝之榮三命雄圖鐘鼎冠承家之禮商丘誕睿下屬於防山泗水載靈遙馳於汶上禮樂由其輸委仁義所以來蘇排禍亂而備乾元掃荒屯而樹真宰聖人之大業也若乃承百王之丕運總千聖之殊姿人靈昭有作之期嶽瀆建非常之表珠衡王斗徵象緯於天經贊像龍尊集風雲於地紀亦猶三階暇月恆星知太紫之宫八桂衡霄羣嶺辨中黃之宅聖人之至像也若乃順時而動用晦而明紆聖哲於常師混波流於下問太陽亭午收爝火於丹衡滄海浮天控涓涔於翠渚西周捧夾仙公留紫氣之書東海摳衣郯子敘青雲之袂接輿非聖詢去就於狂歌童子何知屈炎涼於詭問聖人之降迹也若乃參神撥訓鍊道和倪屈太白於中郊絆乘黃於下邑湛無為之迹而衆務同并馳不言之化而羣芳取則雖復霓旌羽斾齊人張夾谷之威八佾三雍桓氏逼公宫之制洎乎歷階而進宣武備而斬俳優推義而行肅刑書而誅正卯用能使四方知罪爭歸舊奪之田三家變色願執陪臣之禮聖人之成務也若乃乘機動用歷聘棲遑神經幽顯志大宇宙東西南北推心於暴亂之朝恭儉溫良拱手於危亡之國道之將行也命道之將廢也命歸齊去魯發浩歎於衰周厄宋圍陳奏悲歌於下蔡聖人之救時也若乃筐篚六藝笙簧五典折旋洙泗之間探賾唐虞之際三千弟子攀睿化而升堂七十門人奉洪規而入室從周定禮憲章知損益之源反魯裁詩雅頌得弦歌之旨備物而存道下學而上逹援神敘教藏赤製於南宫運斗陳經動元符於北洛聖人之立教也若乃觀象設教三百八十四爻四十有九窮神知化應萬二千五百五十有五成變化而行鬼神觀隂陽而倚天地以鼓天下之動以定天下之疑索衆妙於重元纂羣微於太素聖人之讚易也若乃靈襟不測睿視無涯石砮昭隼集之庭土缶驗羵羊之井稽山南望識皓骨於封禺蠡澤東浮考丹蘋於夢渚麟圖鑒逺金編題佐漢之符鳳德鈎深玉策筮亡秦之兆聖人之觀化也時義逺矣能事畢矣然後拂衣方外脫屣人間奠楹興夕夢之災負杖起晨歌之迹撓虹梁於大厦物莫能宗推日觀於魯丘吾將安仰明鈞雨曜不能遷代謝之期序合四時不能革盈虛之數適來夫子時也適去夫子順也為而不有用而不窮五教逺而微言絶十哲喪而大義乖九師爭大易之門三傳裂春秋之幅六體分於楚晉四始派於齊韓淹中之妙鍵不追稷下之髙風代起百家騰躍攀戶牖而同歸萬匠馳驅仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荆棘蓬蒿不入昌平之墓聖人之遺風也道揚十聖光被六虛乘素履而保安貞垂黃裳而獲元吉故能貴而無位履端於大極之初髙而無名布政於皇王之首千秋所不能易百代所不能移萬乘資以興衰四海由其輕重雖復質文交映瞻禴祀而長存金火遞遷奉琴書而罔絶蓋易曰觀乎人文以化成天下又云聖人觀神道設教而萬物伏焉豈古之聰明睿知神武而不殺者夫國家襲宇宙之淳精據明靈之寶位髙祖武皇帝以黃旗問罪仗金策以勞華夷太宗文武皇帝以朱翟承天穆玉衡而正區宇皇上宣宗祖之纍洽奉文武之重光稽厯數而坐明堂陳禮容而謁大廟八神齊饗佇旒太史之宫六辨同和駐蹕華胥之野文物隱地聲明動天樂繁九俗禮盛三古冠帶混并之所書軌八紘閭閻兼臣之鄉煙火四極竭河追日夸父力盡於楹間越海陵山豎亥途窮於亷下薰腴廣被景貺潛周乾象著而常文清坤靈滋而衆寶用浥金溢於紫煙雨露均華栖玉燭於元都風雷順軌丹冥五健鳳彩龍姿激揚池禦殊徵肸蠁不召而自至茂祉昭彰無幽而不洽雖復帝臣南面降衢室而無為岱畎東臨陟名山而有事靈命不可以辭也大典不可以推也由是六戎宵警橫紫殿而摐金五校晨驅蹴玄雲而噴玉星羅海運嶽鎮川渟登碧墠而會神祇御玄壇而禮天地金箱玉册益睿算於無疆玳檢銀圖署靈機於不竭功既成矣道既貞矣歷先王之舊國懷列聖之遺塵翔赤驥而下云亭吟翠虬而望鄒魯泗濱休駕杳疑汾水之陽尼岫凝鑾暫似銅山之典乃下詔曰可追贈太師託鹽梅於異代鼎路生光寄舟楫於同時泉塗改照咸亨元年又下詔曰宣尼有縱自天體膺上哲合兩儀之簡易為億載之師表顧唯寢廟義在欽崇邇聞諸州縣孔子廟堂及學館有破壞并向來未造生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令諸州縣官司速加營葺九隴縣學廟堂者大唐龍朔三年鄉人之所建也爾其州分化鳥境徇蹲鴟贏錦室於中區託銅梁於右地玉輪斜界神龍蟠沮澤之雲石鏡遙臨寶牒祕禺山之影天帝會昌之國上照乾維英靈秀出之鄉傍清地絡庠序由其糾合纓辨所以會同文翁之景化不踰智士之風猷自逺於是雙川舊老攀帝奬而翹心三蜀名儒相成均而變色探周規於舊宅詢漢制於新都開基於四檜之㕓授矩於三農之際土階無級就擊壤於新歡茅茨不翦易橧巢於故事莊壇文杏即架椽欒夾谷幽蘭爰疏戶牖儀型莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢橫紐帶於西河絳帳宵縣聚青襟於北海雖秋禮冬詩之化以洽於齊人而宣風觀俗之規實歸於上宰銀青光祿大夫譙國公諱崇義大武皇帝之支孫河間大王之長子髙秋九月振玉贊於唐丘寶算千齡躍璇蚪於太渚我國家靈命東朝抗裘冕之尊宗子維城南面襲軒裳之重析鉉元之緒擁朱虛之位拜玉節於秦京輝金璋於蜀郡元機應物潛銷水怪之災丹筆申寃俯絶幽精之訟魏文侯之擁篲道在而謙尊董相國之垂帷風行而俗易司馬宇文公諱純河南洛陽人也皇根帝緒列五鼎於三朝青鎖丹梯跨千尋於十絶仲舉澄清之轡未極夷塗士元卿相之材先登上佐冰壺精鑒遙清玉纍之郊霜鏡懸明下映會城之域縣令栁公諱明字太易河東人也梁嶽之英長河之靈沐江漢之粹精待天衢之元亨旌旗赫奕於中古圭組陸離於下葉鳳巖抽律擢靈秀於龍門驪穴騰姿吐榮光於貝闕自朱絲就列光膺令宰之榮墨綬馳芬髙踐郎官之右仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨邛客位自髙文雅之庭彭澤賓門猶主壺觴之境曠懷足以御物長策足以服人重泉之意訓大行單父之謳謠遂逺猶為夏弦春誦俗化之樞機西序東膠政刑之根本上祇朝憲下奉藩維爰搜復廟之儀載闡重欄之制三門四表煥矣維新十哲宗師肅然如在將使圓冠方領再行鄒魯之風鋭氣英聲一變賓渝之俗於是侍郎幽思摛鳳藻於環林丞相髙材排龍姿於壁沼遺榮處士開簾詮孝悌之機頌德賢臣持節聽中和之樂其為政也可久其為志也可大方當變化台極儀型萬宇豈徒偃仰廳事風教一同而已哉勃幼乏逸才少有竒志虛舟獨泛乘學海之波瀾直轡髙驅踐詞場之閫閾觀質文之否泰衆矣考聖賢之去就多矣自生人以來未有如夫子者也嗟乎今古代絶江湖路逺恨不得親承妙旨攝齊於遊夏之間躬奉德音攘袂於天人之際撫聲名而永悼瞻棟宇而長懷嗚呼哀哉敢為銘曰五帝既沒三王不歸禮樂無主宗禋遂微大哉神聖與時回搏應運而生繼天而作龍躍浩蕩鵬飛寥廓奄有人宗遂荒天爵尼山降彩泗濱騰氣志匡六合神經萬類夾谷登庸中都歷試睿精貫一元猷絶四栖遑教迹寂寞河圖違齊出宋歷楚辭吳風衰俗毁禮去制無麟書既卷鳳德終孤杳杳靈命茫茫天秩吾道難行斯文易失式宣六藝財成四術虛往實歸升堂入室邈矣能仁悠哉化主力制羣辟權傾終古陸離彩粲蟬聨茅土涉海輕河登山小魯皇家載造神風四極檢玉題祥繩金署德聿懷聖迹同亨天則乃睿台庭爰升袞職玉律同派金提茂坂智士髙風文翁灘逺氓淳壤沃聲和俗願載啓仁祠遂光儒苑沈沈壼奧肅肅扃除靈儀若在列配如初槐新市密杏古壇疏楹疑置奠壁似藏書泛泛寰中悠悠天下徇名則衆知音蓋寡碝石參瓊遂風亂雅仲尼既殁天何為者楊炯新都縣先聖廟堂碑文敘曰銀衡用九天門壓西北之荒銅蓋虛三地戶拆東南之野迥七星於上列太清不能潛混茫之機環四海於中州巨塊不能祕生成之業聖人有以見天下之賾擬諸形容聖人有以見天下之動行其典禮靈圖廣運百姓日用而不知神理潛行萬方樂推而不厭古者熊山南眺金崇橫上帝之居鳳穴西臨玉室考爰皇之宅五龍乘正按天讖以希微六羽提衡驗星謠而罕漫洎乎尊盧赫胥之代驪連栗陸之君皇名邁於上元帝圖始於中葉莫不憑三靈之寶位鼓舞隂陽藉六合之尊名財成宇宙未有貴而無位博而無名大禮由其再造大樂由其一變蕩蕩乎人無得而稱焉巍巍乎其有成功者也若夫司徒立勳於天地還承帝嚳之家微子開國於商周仍纂成湯之業雖玄禽厯數推移於景亳之都而白馬旗裳赫奕於風丘之國由是千年有屬萬物知歸乾坤合而至德生日月會而明靈降奎婁胃昴風驅白虎之精角亢房心雲鬱青龍之祉君王異表儀石紐而法丹陵輔相宏姿狀臯陶而圖子産豈上鑿乾象摛光芒於北斗之宫括成地形騰粹氣於東山之曲非天下之至粹其孰能與於此神冥造化德合陶鈞獲沖用於生知運幽機於性道窮庶事之始終協庶品之自然覩者不識其靈仰者不知其德步三光於太極照曜三門含萬象於中區聲明萬國惟深也能通天下之志惟幾也能成天下之務非天下之至神其孰能與於此道尊德貴挫鋭同塵始於中都宰終於大司冦能使長幼異節男女别途路無拾遺器不雕偽姦雄獨立初明兩觀之誅正教未行仍赦同狴之罪讓齊侯而歸四邑夷不亂盟黜季氏而覆三都家無藏甲非天下之至剛其孰能與於此青光歇滅赤籙衰微一注為海岱之尊一戰有河防之霸故得三王不相襲禮亡於冦戎五帝不相沿樂入於河海是以哀生民之板蕩痛宇縣之分崩歷聘諸侯栖遑異國其為大也法象莫之能容其為髙也黎元莫之能覩時非我與遂厄宋而圍陳道不吾行終樂天而知命非天下之至柔其孰能與於此太山不辭土壤故能成其髙滄海不讓細流故能成其大自季孫之賜我也交益親矣自敬叔之乘我也道彌尊矣於是乎歷郊社之所考明堂之則金人右對仍觀太祖之階斧扆前臨還訪周公之位然後剛詩書而讀易象動天地而感鬼神運百代之舟車開千齡之户牖是故雷精日角聞道德而摳衣月頰山庭奉琴書而撰杖非天下之至文其孰能與於此智以藏往有感而必通神以知來無微而不照論五行於帝輔潛觀太皥之先揆七廟於天災預察釐王之過星流十月徵厯象於衰周日泛三江採謳謡於霸楚神無方而易無體聖人通變化之津河出圖而洛出書聖人悟興亡之兆非天下之至明其孰能與於此極天蟠地之禮周旋揖讓之規百神於是會昌二儀以之同節非禮無以别父子兄弟親疏之序非禮無以辨君臣上下長幼之位本之於元氣徵之於太古言足以法於九圍道足以用於八極服先王之制度黜紅紫而無施欽上帝之明威感風雷而有變非天下之至恭其孰能與於此五行四氣十二月還相為本五聲六律十二管還相為宫至音將易簡同和廣樂與神明合契盛於中國還陳武象之容奄有四方自得文王之操南風奏雅知大舜之溫北里宣淫察殷辛之暴非天下之至和其孰能與於此悲夫日中則昃動靜之常也月滿則虧盈虛之數也自太平王佐委龍翰於芳年禮義霸臣摧獸文於華月則知天之將喪也則知道之將廢也雖復頽山壞木兆悲歌於兩楹夏棟周牆陳盛則於三禮猶使文明照爛百王知察變之機鐘石鏗鏘萬代挹希聲之樂信可謂偹物致用立成器以為天下利者莫大於聖人也既而三河失統九州之寶幣不歸四塞提衡萬里之長城繼作星妖日祲乾象暗而恆文乖禮壞樂崩彝倫斁而舊章缺洎夫碭山休氣潛膺赤帝之圖沛國真人密召黃星之録尊褒成之厚級殷崇聖之榮班學校於是大興文武由其不墜年當晉宋運距周隋三重赤暈還開爭戰之端十里黃埃薦有干戈之務亂罹瘼矣黔首何依閭閻匝地今來為講武之場荆棘參天昔日作談經之市皇家揆亂返正應天順人鼓之以雷霆潤之以風雨馳欃槍而掃穢上廓鵬雲決河海以澄姦下清鼇極今天子握大象運洪爐星重輝海重潤乾回北列垂衣裳於太紫之垣日出東方備法駕於中黃之道溟涬之無天無地盡入提封伯陽之有物有象咸乘禮節太階三襲明瑞氣於朱符中極四遊發祥光於玉燭東膠西序雲閣蓬丘國號陶唐家成鄒魯遂使西山童子陳歌謠於璧水之前南國老人受几杖於環林之下乾坤之大德行矣皇王之盛節明矣江茆鄗黍晨昏薦帝之祥鳳穴麟洲晷刻因天之瑞乘輿乃選吉日協靈辰詔風伯以行觀促雷師而出豫房為天駟仍施列缺之鞭斗為帝車即動招搖之柄奠玉帛奏金絲登介丘下梁甫神休而尊名號莫之與京按玉册而考銀繩於斯為盛於是回輿轉斾臨曲阜之郊畿駐蹕停鑾訪雲壇之軌迹若使九原可作大君得廊廟之才千載有知夫子託風雲之會即以乾封元年追贈太師禮也咸亨元年又詔曰宣尼有縱自天體膺上哲合兩儀之易簡為億載之師表顧惟寢廟義在欽崇諸州縣廟堂及學館有破壞并先來未造者遂使生徒無肄業之所先師闕奠祭之儀久致飄零深非敬本宜令州縣速加營葺新都學廟堂者奉詔之所立也因三農之暇陳復道之規考幃帳於西京訪埃塵於東魯梅梁桂柱深沈風雨之津鏤檻文槐曠望江山之表納流雲於上棟白日非遙披濁霧於中階青天在矚雕鐫暐奕窮妙飾於重攔山海髙深盡靈姿於岌宇門生侃侃如陪文杏之壇胄子鏘鏘若預崇蘭之室每至南方二月草樹華滋北陸三秋風煙搖落莫不列蘋蘩於上席行禮敬於質明奠椒桂於巾樽敬神明於如在爾其邑居重復原野平蕪出江干之萬里入參星之七度龜城藹藹煥繁霞於百尺之樓蛟浦澄澄洗明月於千秋之水文翁舊學日往年歸劉禪平堂煙荒霧慘武侯龍伏猶觀八陳之圖壯士蛇崩仍辨五丁之石左巴右獠之勝域陸海三江之奧壤大都督周王天皇第八子也玄元繼天而作降仙才於玉斗之庭武昭應運而生開霸業於金城之域五潢高映流滋液於咸池十日旁羅散光華於若木星懸帝子遙澄井絡之郊嶽列天孫逺控彭門之野姬公以明德之重行寶化於周南曹植以懿親之賢發金聲於魯北通議大夫行長史南陽來恆隋十二衛大將軍榮國公之元子申侯太嶽鎮其靈襟傅説長河昭其神彩龎士元蓄西申之逸羽始翦題輿管公明絆東道之雄姿初臨别乘朝議大夫守司馬宇文純左衛將軍靈州都督之次子台門鼎族傳呼棨戟之榮玉質金相海若河宗之寶庾冰清識得嚴令而非常桓溫貴遊無車公而不樂縣令鄭鉉嘉榮陽人也東周玉裔北海金宗列矛戟之森森吐風流而蒨蒨尺兵不用瑕丘有上德之君枹鼓希聞洛陽有神明之宰丞京兆韋德工主簿扶風馬仁礪尉清河張嗣明北地傅懷愛等荆藍灼爍鄧杞扶疏許玄度入風月之清關郭林宗獲神仙之妙境南昌晦迹共梅福而齊衡左部韜真與喬玄而等列博士張玄鑒助教費仁敬等碧雞雄辨則江海沸騰白鳳宏辭則煙霞噴薄一州聞道親居典學之官四子秉風來聽中和之曲圓冠列侍執巾帙於西階大帶書生受詩書於北面泮宫之上更聞通德之門小學之前復見華隂之市鄉望等魚文驥子震耀於平原漢女巴姬駢羅於甲第杜陵亭長終成輔相之才桐鄉嗇夫且著亷平之號莫不公私務隟即聽絃歌隂雨時間仍觀爼豆逍遙城郭拜夫子之靈祠髣佛風塵見夫子之遺像天道之璣衡莫測下問書生陽精之逺近未知來求小子當仁不讓思齊於上古之名遊聖難言有愧於中郎之石其辭曰太虛寥廓洪罏噴薄上綴三宫旁清八絡元津獨化聖人攸作蛇柱為居龍門是託爰清爰淨惟寂惟寞龜讖韜名魚圖表靈火紀雲紀天正地正君臣禮制宇宙輝明文武既沒成康遂行羣飛海水若羽天星玉筐曽裔金符逺系鍾石雖遷山河不替乾坤降德隂陽合契虎嘯風清龍騰雲逝三元載停萬方攸濟魯道既昏綿綿若存祿移公室政在私門學而方仕謙而彌尊聽之也厲即之也溫義責齊國刑懲季孫多能惟聖道廢惟命天下莫容諸侯走聘至於是國必聞其政仁義立身溫恭成性不圖為樂終悲擊磐九野八方栖栖遑遑從周返魯考夏觀商先王道術夫子文章可久可大為龍為光星衡入室月準升堂智周通塞神兼語默幾然而長黯然而息漢承周運亥亡秦國察往知來研精茂德毋必毋我自南自北萬象皆宗千靈共同惟變所適居常待終樂天知命匪我求蒙北辰之北東海之東百王遺訓萬世餘風時亡玉斗運鍾陽九周井龍沈秦原鹿走生人卷舌道路鉗口禮樂崩頽典章殘朽萬邦請命三靈受手日角升圖星精應符載揚風教重闡規模數遷三紀年當五湖星芒夜指日暈朝枯環林摧折璧沼荒蕪赫矣髙祖粵若稽古丕哉文王昭臨下土地維旁綴乾紘上補鯤化三千龍飛九五爰及列聖重規襲矩我君文思念兹在兹金鏡八海珠囊四時三雍九室秋禮冬詩絳帳語道青襟質疑載垂仙渙廣創靈祠丕圖按籍逺求陳迹玉檻煙開金窗雨闢晬儀侃侃靈居寂寂弟子摳衣門人避席階列簠簋庭羅絲石地接臨邛山橫劒峯滇池躍馬沮澤蟠龍中堂擊節髙門撞鐘隂靈肸蠁文雅雍容書池必變講席常重今還古往寂寥無尚太山既頽吾將安仰梁木斯壞吾將安倣異代風行殊塗影響敢立言而徵聖冀得意而忘象陳子昂梓州射洪縣武東山陳居士碑君諱嗣字𢎞嗣其先陳國人也漢末淪喪八代祖祉自汝南仕蜀為尚書令其後蜀為晉所滅子孫避晉不仕居涪南武東山與唐胡白趙五姓置立新城郡部制二縣兩四姓宗之世為郡長蕭齊之末有太平者兄弟三人為郡豪傑梁武帝受禪網羅英豪拜太平為新城郡守尋加本州别駕弟太樂太濛濛為黎州長史督護南梁二郡太守太樂為本部司馬即君之髙祖父也生曽祖方慶好道不樂為仕得墨字五行祕書於武東山生烈祖湯仕郡為主簿遇梁季喪亂避世不仕生皇考廣回回蚤卒君即回之第二子也少孤而有純德恭已飭行一日三省家世本以清白崇德逮君之孤素業空矣君有仁兄養母以孝君克順至行同勤苦節夏不避暑冬不避寒蒸蒸服事行年四十有五入則孝出則悌謹而信泛愛衆而親仁無餘力也以是不憂於道逮親終殁春秋已髙從仕不可以養矣乃輟干祿之學修養生之道山壑髙居農野永嵗雅聞漢有王丹者放居不仕家纍千金以自奉田稼勤者載酒肴從之鄉里承化以相懲沮乃嘆曰彼王丹者足以為政矣奚其為政也由是始考林澤闢良田習山書務農政天道時變地道化成丘林泉藪星嵗雲物靡不用心原田莓莓粳黍稷稷汶陽之稼如雲矣春日載華嵗月其秋白露時降百穀收熟君常乘平肩輿省農夫饋田畯刑以肅惰悅以勞勤若孫吳之用兵鷙鳥之搏擊也倬彼碩田嵗取十千倉廩實崇禮節恤惸寡賑窮乏九族以親之鄉黨以歡之居十餘年家纍千金矣其鄰里有偷衣食刀劒椎埋胠篋之顃鬬雞走狗之豪莫下靡下風馴雅業曰里有仁焉吾何從也遂頓浮窳之節肅恭儉之規修孝悌飭亷恥將欲效君子之索業也君時年已耳順素無經世之情林園遺老靜默忘嵗遂保先君武東山之故居行不由徑非公事未嘗至於州縣也昔襄陽有龎德公谷口有鄭子真東海王霸西山蜀才皆避人養德退耕求志軒冕不可得而羈憂患不可得而纍逮於我君作者五人矣於戲古者至人不利茍得不務近貴量腹而食度身而衣非其道萬鍾不足豐也非其榮五鼎不足飪也躬勤耕稼植其杖而藝不答子路之問者豈我君之徒歟綿綿羅網冥冥髙鴻躍躍竹竿穆穆幽龍其與禍敗之遼絶如胡越哉然則兩龔不免於蘭焚二老不免於薇嘆其近貴利耶夫上無憂悔下無飢寒含道以制嗜欲逹命以順生死仁以愛身知以養德俾爾耆而艾俾爾昌而熾君子保之以永夀考非我君乎享年八十五太嵗壬辰五月十三日考終厥命誡曰啓余手啓余足我聞古人有言珠玉而瘞之是暴骸於中原古人不封不樹後代聖人易之以棺槨吾不敢違聖人可具棺槨而已斂以常服墳無丘壠吾將庶幾以奉先人之清業也有子某乙等皆能祇奉遺訓聿從先志長夀二年龍集癸巳某月某朔日元月載踰小兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也鄉里會葬者千餘人皆涕泣號慕悲純德之不見咸曰君子沒矣仁鄉人何以名陵壑不朽匪唯頌聲小子不敏謹述之教其辭曰肅肅我祖國始於陳中裔淪喪泊此江濱山川隆鬱旗鼎氤氲挺生君子於鑠元真唯孝肅悌唯仁善鄰樂我耕稼忘我縉紳藝藝田藪歲也其春農事方作君子犒勤孰為夫子植杖而藝弋者何慕鴻冥髙雲楚狂懼世夷叔求仁良圖終矣不考於身我異於是非隱非淪撫化隨運安排屈伸大年既沒長夜何辰聖逹不免宇宙同塵桐棺三寸豈我窶貧自古有禮吾從聖人嗟爾百代子子孫孫驕奢自咎天道無親思我松柏恭儉是尊劉全白題故翰林學士李君碣記君名白廣漢人性倜儻好縱橫術善賊詩才調逸邁往往興會屬詞恐古之善詩者亦不逮尤工古歌少任俠不事産業名聞京師天寶初明皇辟翰林待詔因為和蕃書并上宣唐鴻猷一篇上重之欲以編誥之任委之為同列者所謗詔令歸山遂浪迹天下以詩酒自適又志尚道術謂神仙可致不可小官以當世之務自負流離轗軻竟無所成名有子名伯禽偶遊至此遂以疾終因葬於此文集亦無定卷家家有之代宗登極廣拔淹瘁時君亦拜拾遺聞命之後君亦逝矣嗚呼與其才不與其命悲夫全白幼則以詩為君所知及此投弔荒墳將毁追想音容悲不能止邑有賢宰顧公遊秦志好為詩亦常慕效李君氣調因嗟盛才冥寞遂表墓式墳乃題其石冀傳於往來也貞元六年四月七日記沙門履人書墳去墓記一百二十步范傳正李白新墓碑并序歷騏驥筋力成意在萬里外塊一蹶斃於空谷唯餘駿骨價重千金大鵬羽翼張勢欲摩穹昊天風不來海波不起塌翅别島空留大名人亦有之故左拾遺翰林學士李公之謂矣公名白字太白其先隴西成紀人絶嗣之家難求譛牒公之孫女搜於箱篋中得公之亡子伯禽手疏十數行紙壞字缺不能詳備約而計之涼武昭王九代孫也隋末多難一房被竄於碎葉流離散落隱姓易名故自國朝以來編於蜀籍神龍初潛還廣漢因僑為郡人父客以逋其邑遂以客為名髙卧雲林不求祿仕公之生也先府君指天枝以復姓先夫人夢長庚而告祥名之與字咸所取象受五行之剛氣叔夜心高挺三蜀之雄才相如文逸瓌竒宏廓拔俗無類少以俠自任而門多長者車常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也由是慷慨自負不拘常調器度宏大聲聞於天天寶初召見於金鑿殿皇帝降輦步迎如見園綺論當世務草答蕃書辨如懸河筆不停綴明皇嘉之以寶牀方丈賜食於前御手和羮德音褒美褐衣恩遇前無比儔遂直翰林専掌密命將處司言之任多陪侍從之遊他日泛白蓮池公不在宴皇歡既洽召公作序時公已被酒於翰苑中仍命髙將軍扶以登舟優寵如是既而上疏請還舊山明皇甚愛其才或慮乘醉出入省中不能不言溫室樹恐掇後患惜而遣之公以為千鈞之弩一發不中則當摧撞折牙而永息機用安能效碌碌者落而復上哉脫屣軒冕釋羈韁鎖因肆情性大放宇宙間飲酒非嗜其酣樂取其昏以自賞作詩非事於文律取其吟以自適好神仙非慕其輕舉將不可求之事求之欲託壯心遣餘年也在長安時祕書監賀知章號公為謫仙人吟公烏栖曲云此詩可以哭神鬼矣時人又以公及賀監汝陽王崔宗之裴周等八人為酒中八仙朝列賦謫仙歌百餘首俄屬戎馬生郊逺身海上往來於斗牛之分優遊沒身偶乘扁舟一日千里或遇勝境終年不移長江逺山一泉一石無往而不自得也晚嵗渡牛渚磯至姑孰悅謝家青山有終馬之志盤桓庀居竟卒於此其生也聖朝之髙士其往也當塗之旅人代宗之初搜羅俊逸拜公左拾遺制下於彤庭禮降於冥壤生不及祿殁而稱官嗚呼命歟傳正生唐代甲子相懸常於先大夫文字中見與公有潯陽夜飲詩則知與公有通家之舊早於人間得公遺篇逸句吟詠在口無何叨蒙恩奬廉問宣地按圖得公之墳墓在當塗邑因令禁樵採備灑掃訪公之子孫欲申恩薦凡三四年乃獲孫女二人一為陳雲之室一乃劉勸之妻皆編户氓也因召至郡庭相見與語衣服村落形容林野而進退間雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不祿而卒有兄一人出遊一十二年不知所在父存無官父沒為民有兄不相保為天下之窮人無桑以自蠶非不知機杼無田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷於農夫救死而已久不敢聞於縣官懼辱祖考鄉閭逼迫忍恥來告言訖淚下余亦對之泫然因云先祖志在青山遺言宅兆頃屬多故殯於龍山東麓地近而非本意墳髙三尺日益摧圮力且不及知如之何聞之憫然將遂其請因當塗令諸葛縱會計在州得諭其事縱亦好事者學為歌詩樂聞其語便道還縣躬相地形卜新宅於青山之陽以元和十二年正月二十三日遷神於此遂公之志也西去舊墳六里南抵驛路三百步北倚謝公山即青山也天寶十二載敕改名焉因告二女將改適於士族皆曰夫妻之道命也亦分也在孤窮既失身於下俚仗威令乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞余亦嘉之不奪其志復井稅免徭役而已今士大夫之葬必志於墓有勳庸道德之家兼樹碑於道余才術貧虛不能兩致今作新墓銘輒刋二石一置於泉扃一表於通路亦峴首漢川之義也庶芳聲之不泯焉文集二十卷或得之於時之文士或得之於宗族編緝斷簡以行於代銘曰嵩嶽降神是生輔臣蓬萊譴真斯為逸人晉有七賢唐稱八仙應彼星象唯公一焉晦以麯糵暢於文篇萬象奔走乎筆端萬慮泯滅乎樽前卧必酒甕行唯酒船吟風詠月席地幕天但貴乎適其所適不知夫所以然而然至今尚疑其醉在千日寧審乎夀終百年謝家山兮李公墓異代詩流同此路舊墳卑庳風雨侵新宅爽塏松柏林故鄉萬里且無嗣二女從民永於此猗歟琢石為二碑一藏幽隧一臨岐岸深谷高變化時一存一毁名不虧宋張俞郫縣蜀叢帝新廟碑記水於五行為利害最大四瀆為之原水而江又為四瀆之長其為利害益大矣昔洚水警堯天下昏溺江實為暴民受其害帝乃命禹決江疏河東放於海則天下受其利然後受舜禪讓終陟元后功配天地德被萬世自水始也故孔子修書述禹之事尤勤備焉繼而歎曰禹盡力乎溝洫吾無間然矣劉定公亦曰微禹吾其魚乎然聖人之功大而易法簡而易循因時制治必通其變厥後千五百年蜀有開明氏能振其道故禹之功復興焉在昔蜀有賢主曰望帝獲楚人鱉靈以為相當是時巫山龍戰崩山壅江水逆襄陵蜀沈於海望帝乃命鱉靈鑿巫山開三峽決江水沱通綿雒合漢沔濟荆揚然後得陸處人保厥命望帝以其功高讓位而去鱉靈遂稱叢帝號開明氏襲郡於郫故蜀人誦先王功者以開明氏比夏后氏焉其後三百年秦強伐蜀命其臣李冰為守是時江妖為暴沫水淫流沃野嵗災民受其害冰乃誅水妖通水道鑿二山釃二江灌溉千里變凶為沃人賴其利故史氏美冰之功於蜀為大自冰殁後千五百載其功益彰焉大禹大聖人也智極於水用能因天順地永生厥民若叢與冰道不行於周秦而能迹禹之功厚利三蜀非有大賢之業安能至此天水趙君曰子觀蜀之山川及其圖記能雄於九丘者蓋乘成水利以富殖之其國故生生不窮然非開明氏則巴蜀魚其民淮漢汙其澤湮禹之力遺後之患憂可弭乎其後復得秦守之事謂其功出開明氏之下而蜀人獨神冰之廟祀史氏惟載冰之後功反使紹聖之烈暗而不耀世祀湮滅豫甚懼焉蓋所謂日用而不知遂忘其本矣按禮祭法聖王之制祀功施於人則祀之能禦大災則祀之能捍大患則祀之若開明氏可謂功施於民能禦大災能捍大患者也豫適治兹土而壠墓在邑之南彼民無知古闕祭享非所謂遵明詔存功烈者也康定二年春二月五日始作新廟成益州牧樂安公命辭來祭趙君乃躬執祀事會民吏以享之衆始大悅趙君名可度字叔儀治郫有稱觀其所舉可知也銘曰江發坤險堯憂懷襄夏后瘠力其流洋洋巫龍崩山江沈蜀疆開明疏鑿民復其常外通淮漢內殖岷梁利盡西海實為華陽聖聖同功千載同符微聖之力蜀其魚乎江陽之腴郫惟舊都丘墳巍岌拱木號呼血祀不作神何以居新廟奕奕牲牢孔碩民享其文神歆其質舊功克昭大患所逖不有博雅孰躋聖匹載德者言銘厥金石李大臨唐安修城碑記皇祐六年春王正月甲午城唐安朝廷從端明殿學士知益州廣平程公之請益之旁郡皆得從廣平公之命而役焉唐安郡將駕部員外郎清源王君以書屬大臨且列其事使記其城之之謂因得道其所以唐安自唐垂拱初分晉源縣為州於斯三百七十年無城嵗伐木剡而編之以為塞從權宜作限禦今俗之傳言曰塞內塞外者是也噫蜀地豈富饒沃衍而亡他盜耶大道之行而民不姦耶俗淳而自化者耶政察而不敢踰者耶作牧者繼至而不可以為而不為之者耶何制作因循之若此古之建立州里未有不先以城郭溝池為固聖人之作法豈虛也哉彼茍安者不思之甚君子則不然事必謀於其始而患必防之於未萌幸蠻獠而內兩川久泰當無事時不可忽於其備焉爾駕部君強幹明敏為守土臣而盡力於城郭乃可謂有能名者也與屬邑太常博士舒照亮注箔內殿承制藜傳慶監押左侍禁石炳軍士判官路諌司理參軍黃倚更相共事能身先風霜氛露又多心匠善計朝夕勸視其兵民兵民四千八百人樂且舞以趨其勸自鳩工至於訖役凡十旬有十日而城成上丈有五尺嶄然其髙也下丈有三尺妥然其袤也十里環然其周也四門腹然其擁也石柱架梁道其水也鐵閘水門時其利也如是其壯大堅完而又有所扞倉廩府庫之積營屯軍旅之戍軍馬出入之節商賈往來之征蔽焉通焉闔焉啓焉皆得以専而司之編民藏鏹百萬蓄儲萬廂安而居坐而愈曽不有所恐而有所虞於是老者幼者壯者義者疉肩拍袂而喜且賀曰今而往吾鄉吾里吾族吾父子兄弟相親而相保無緩急之警者賴駕部君之庇始也非唯吾民賴之後之守是邦者實賴之矣元賈元塗山古碑華陽志云渝郡塗山禹后家也古廟廢宋至壬辰郡守費著仍建廟嘗考娶於塗山之説一謂在此一謂在九江當塗東漢郡志云塗山在巴郡江州杜預考曰巴國也有塗山禹廟又古巴郡志云山在縣東五千二百步岷江東圻高七里周圍三十里酈道元水經云江州塗山有夏禹廟塗后祠九江當塗亦有之杜預所謂巴國江州乃今重慶巴縣江州非九江之江州也漢史蜀志有稽至今洞曰塗洞村曰塗村灘曰遮夫石曰啓母復合帝王世紀蜀本紀華陽國志元和志等書參考之禹乃汶山郡廣柔人其母有莘氏感星之異生禹於石紐廣柔隋改廣柔為汶川石紐在茂州域隸石泉軍所生之地方百里夷人共營之不敢居牧靈異可畏禹為蜀人生於蜀娶於蜀古今人情不大相逺導江之役往來必經過門不顧為可慿信先是帝曽大父曰昌意為黃帝次子娶蜀山氏生帝顓頊顓頊生鯀鯀生帝帝之娶於蜀又有自來又謂蜀塗山肇自人皇為蜀君掌塗山之國亦一徵也至會諸侯於塗山當以九江郡者為是東漢郡志云山在當塗杜預云在夀春東北今有禹會村栁子有銘蘇子有詩且於天下稍向中會同於此宜矣通鑑外紀亦云禹娶塗山之女生子啓南巡狩會諸侯於塗山如是則娶而生子生子而後南巡南巡而後會諸侯娶則在此會則在彼次序昭然會稽乃致羣臣之地或崩葬之所故有禹穴所謂塗山一曰棟山一曰防山紛紛不一太平乃晉成帝世當塗之民徙居於此故亦名其縣曰當塗好事者援此以為説而實非塗山世次綿逺地名改易煩亂傅會不足徴况會稽當塗在禹時未入中國禹安得娶彼哉今特辨而正之庶祠廟之建得其本真而禹后受享於誕生之地尤不可闕爾明楊廷和新建宋丞相魏國張公父子祠堂碑記宋丞相魏國張公浚在中興號為賢相初逃張邦昌之議平苗劉之亂其風聲氣節已聳動天下既秉軸毅然以恢復自任誓欲肅清中原表著天心扶持人紀引擢賢俊英材授任逺人伺其用舍為進退天下占其出處為安危忠君體國之誠直與諸葛孔明相望於千百載上下雖困於讒忌屢起屢躓功未克就而志不少衰其子右文殿修撰栻穎悟夙成魏公教之一以仁義忠孝之實受業於胡五峯之門其為學惓惓於理欲之分義利之辨朱子推之為大本卓然先有所見已非其匹學者稱為南軒先生嘗參贊魏公督府諸所綜畫幕巾人皆自以為不及魏公寢疾時手書諭南軒兄弟曰吾不能雪祖宗之恥死不當歸葬先人墓左葬我衡山下足矣乃葬之寧鄉溈山之南後南軒卒亦祔葬焉至是蓋三百餘年矣墳墓所在鞠為榛莽士人父老亦鮮有知之者鳳陽胡侯明善以名進士補令寧鄉一年政通人和訪而得之憮然嘆曰令甲有之凡忠臣烈士有功德於國家及惠愛在民事迹昭著者列於祀典其祠墓禁人毁撤若魏公所建立載在信史昭如日月正應令甲所著而南軒之學師表百世從祀孔廟逹之天下今其祠墓在二邑者顧蕪穢不治非我有司之責而誰也於是亟取眚贖之餘建専祠各四楹其右則南軒書院又買田四十畝以備時享之用門廡秩秩繚以周垣爼豆載陳衣冠動色會衡山劉侍御黻持節按蜀過家見而悅之既至蜀以告豫謂子魏公鄉後學也屬為文刻於神道之石且檄下廣漢訪其遺裔豫惟賢人君子之用於天下不患無才而患學術之不足不患無學而患所學之不正嘗觀魏公之所以告其君矣曰人主之學以心為主一心合天何事不濟又曰所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉措無有不當人心自歸敵讐自服其本原皆自聖賢學問中來非漢唐以下規規於功利之末者比至南軒每進對必自盟於心其言曰此心之發即天理之所存願時加省察而稽古親賢以自輔是即魏公之説也有宋一代名臣若仲淹之於純仁韓琦之於忠彥吕夷簡之於公著前啓後承其詩書之澤事功之盛皆足以名當時而傳後世若學術議論視魏公之於南軒或有間也尚論於魏公容有責備之意而其大處終不可泯豫是以表而出之觀者或勿以豫為齊人侍御君思賢尚友而樂成人之美縣侯為政而急於先務皆可書也故以為記楊慎霧中山開化寺碑記邛州大邑蜀之望縣也斜江乾溪合流於其前鶴鳴霧山環繞於其後沃野千里名於三蜀仙佛同源萃於二山鶴鳴二十四洞張道陵之所登真也霧山一百八盤僧騰蘭之所卓錫也今鶴鳴為芥蒼之墟而霧山擁莊嚴之美則又係於護法演教之隆替也惟茲霧中之山去縣治北四十餘里山恆孕霧故受斯名稽諸太平之記有浸淫被汨之文徵之瑞應之圖呈赤白青黃之異何止遊騰蛇而隱文豹實見騎荆鹿而乘晉龜啓塞望之三精融為香阜郤左道之五里爰樹仙陀嘗翻旁行內典以考𢎞明先聞所謂噓阿耨為旋嵐扇須彌為塵霧即此地也不有寶坊仁祠金剎梵宇孰能主名山而暢幽致乎開化寺者霧中之叢林禪教之總持也相傳西漢時此境時有金色布地玉砌天巒異相無窮庶氓驚罕考之列子稱西方聖人劉向别録有西方撰集則玉像之傳爰自周昭王而生於異域金人之夢不待漢明帝時已聞中華矣至漢永平十六年始建住持則摩騰法蘭兩尊者遊歷所止在晉永和有佛圖澄之孤創初唐顯慶有僧伽胡之雙修圓澤老宿奉敕接住於南宋之淳熙圓曦都綱御賜法名於皇明之正統前之普逹耶維焉納星吉同厪梵行俱沾國恩源逺流長遐而尚矣其三足古樾之竒四州香積之境龍淵壓乎獮池鷲嶺嫓於雞足豐碑古刻煥金薤於琳琅鐉谷劖嵌焜瓊敷於贔屭已昭衆見無俟重陳僧伽佛讖云此山三百年後兵燹劫空香火斷絶七百年後重興建造輪奐復宏則有蜀州江源廣漢三郡吳叟何翁袁子三信士大檀施以營寶坊平坎窞剪蒙蘢架雙琴通習險規坱圠分直繩鼪鼯之場易為龍象莽蒼之野絢為丹青罘罳絢粲俯倒景而共鮮鏞鐸玲瓏靡回䫿而獨􅞗步櫩之外江浦悠然井幹之端雲峯對出鐫屯文於靈陶炳卍字於石闕香灺燭跋夕磬清水月之音睡蓋眵昏霆唄驚寱鼾之耳聽和音者不撓於寂慮聞異香者自入於禪薰白足三明住水晶域赤髭四衆坐琉璃宫初發心者習威儀學無生者得自在信乎至道默存於濁劫元功心樹於康時矣往者戊戌之嵗余偕邛州太守夢山張公紀邑侯吳公興鄉進士左公晉王公葵同遊此地池號明月嶂名青霞石之海馬盤陀亭之三關四會解后解鞍信宿橫枕實悅旃檀之妙韻不假絲竹之清音疑有宿緣信非生客矣左綿瓦屋髙公第雙流珥江劉公大昌名髙儒行禪入上乘元戎柏村何公卿功成式遏心皈淨林咸枉書尺屬以記别戒僧真著逺勤不借獨負軍持來徴斯文以垂後觀先是寺僧淨談了靖等請於邑侯貴陽楊公佐允之以為此宇乃璽書賜額之寺非蘭若招提之儔許琢珉堅庸雕金篆山臺野色詎容杜牧之庾辭鄂渚頭陀宜勒簡栖之麗藻其染衣演梵之徒檀施斥資之衆審曲面勢之功經始落成之數具載碑隂爰宣魚山之嗣音用檦猊座之頌贊其辭云兜率迦維十九踰城陶冶滓濁澡練神清一切種智開覺有情常樂我淨談化無生五戒三歸七滿八平唐捐實際阿閦咸平霧山天作星劫神營窣堵地涌冪蓋香成綸綍賜額開化表名布金紺宇流銀寶楹龍泉嵽嵲鯨鷺轟鍧空花弗著意樹悉􅞑苦海甘露火宅水精耀兹佛日翊贊真人張佳印定逺縣胡公祠堂碑定逺之祠胡公也凡二十餘歲云今年郡侯臨川傅公走使五千里外扺書上谷納篚於不佞佳印且其言曰故令胡公為德於定逺也久恨不及考見當時治功幸徴於其祠祠故未有及其事者敢徼一言以信百世不佞謝曰微郡侯言胡公不佞故識之也當公尹定逺在嘉靖庚戌間不佞始成進士以使過其境公觴不佞於郊而嘆曰不腆敝邑寥寥三戶故元一殘壘耳先王辨方正位保民乂民之謂何而茍陋如此吾從事稽卜用永地於新邑於時不佞從臾之越六年不佞為曹郎復以使過其境百雉言言則公造基今理矣公留不佞信宿口登陴指點江山隂陽之所交廟社署廬之所止經緯纖悉即使上方氏操圭量人秉策有不能殫其智者不佞舉觴前夀曰公畢精神以為定逺建千百年不拔之業此公之桐鄉也公謝曰異日者而吾民果能為桐鄉乎吾死可瞑但以言纍下執事嗚呼此乙卯仲冬時語也不佞又何能孫不文耶胡公者名濂字深甫人稱為淝溪先生楚之崇陽人嘉靖乙酉鄉進士始定逺得公時見其癯乎山澤姿也與乎朴直容也訟師嘗以辭黠胥嘗以文頑民嘗以負豪宗嘗以姦公佯若中其嘗者徐為立科條運耳目敬老矝寡而又洽比其俗輸為限役為等修恭儉汰苛冗廉察大猾為公私蠧者不以假三尺諸嘗者咸潛伏屛息而公恂恂猶是也嵗行鄉落勸農力耕教積貯禁婚葬宴會因俗示禮而去其奢朔望申髙皇帝大訓延見長者問所便若暇則羣師儒考治經藝與鄉鄙保伍之法公曰民庶乎可使矣遂遷邑大興人徒逺邇之民勿傲從康山澤獻材萬姓獻力大家世族無重遷無浮言公為償其材程其力而相忘於勞城成四民之接轂摩肩出藏於塗市者揮汗可以為雨其人士之舉於鄉若春官者雲蒸飈發視舊邑之興衰相去又何但千萬已哉公敏幹博洽尤精於天地之學甲寅大飢公糴於鄰賑之而民猶洶洶公為禱忽號於衆曰吾仰觀於夜水氣制火雨在眉睫汝勿譁果大雨丁巳三殿災徵材於蜀下令若束濕公才望受臺使者檄得督諸州縣事公扶烏藤趿兩芒屬鑿空通道櫛沐瘴癘審勢計實諸州縣咸受要約楩柟豫章以谷量之乃竟用勞瘁病篤起語一二吏曰某山之材宜某木某水之險宜某時即我死惟勿替我命廢縣官事絶不及他語且曰我死必葬我定逺爾定逺子孫世世勿相忘言訖而逝計公一官九載不得調公亦以官為家邑民無遁詞亦無遁情有所事事僅以頥氣指使刑罰案牘幾不復用公子定成進士今陳臬在蜀道德文學克紹休烈以發公未究之志公之食報也厚矣始公卒訃聞於邑邑之人如喪考妣為之罷市人人肖像祀於家未已也文為建祀於縣之東凡若干楹更請奉公治命葬於邑如桐鄉故事無幾公之子竟扶櫬歸楚邑之人僅得奉公像伏臘蒸嘗瞻拜泣下而公之靈爽時時在焉凡邑之人出入飲食必告告必應先是乙丑妖賊起陷城公神降於民間余紞曰昔我蓽路藍縷東章西亥以相度兹土新造爾邦守臣不忠辨髦我民以城豫賊若亟為焚蕢數千我將滅之越二日保伍不約四集衆賊若或驅之就戮賊遂平張氏一蒼頭以禦賊立木繩其杪忽墮於谷竟無恙問之曰幸賴我胡公嗚呼公而生也其神運於人公而沒也其人依於神公真神君哉不佞乃系其略以報郡侯然公楚人也習為樂章其聲則楚俾刻諸石歌以祀之其辭曰靈匪躬兮綵檖眷故都兮鬱伊築宫兮山椒枕流兮白水湄梁文杏兮棟桂垣瓊玫兮繚之筮陽巫兮大招靈連蜷兮雲之際燦元宵兮於庭恍焄蒿兮含睇翠右迎神旗驅飛廉兮豐隆靈翩翩兮其來下弭蓋兮桂駐蒼螭兮文馬覽往迹兮四周撫父老兮弟子伐鼉鼓兮灌鬯升肥羜兮丹簋凄金石兮琴瑟舞巴渝兮皓齒靈偃蹇兮憺忘歸夜何其兮樂只右樂神任瀚平蠻碑夜郎為冦中國僭稱侯王自莊蹻略西極以來軍法所不治蠻中推夜郎部最號梟雄是稱都蠻竊據犍僰要害四塞險絶猿猱虎豹所宫即有孫吳提重兵壓境賊乘髙客軍處其下如人射雕雲中決背向空巧力俱喪故先朝諸將戰守多敗屈失利常置不問明興二百年間王師西下討罪前後數百戰訖無成功憲皇帝嘗敕大司馬提軍十八萬駐境上師老將疲僅博一捷然所耗傷甚衆得不補亡今萬厯元年皇帝嗣位朝覲萬國薄海窮裔包奉貢獻無敢後時惟都蠻擁部落橫行塞下數犯慶長髙拱筠戎漸逼敘瀘所到疆土盡赤刳衄人血肉以釁邊氓野死無弔殿中丞開府曽公上疏言臣待罪西陲不能絶邊患無所稱塞意旨願將戮力破蠻赭其巢略地以聞皇帝下閣臣議維時元相張公集百官闕下言蜀在中國為西南重鎮叛不速討諸蠻將望風起事蜀豈得全百官多以蜀道艱難什倍淮西塞北噤不敢發間又以漢武使唐蒙略通夜郎事對公厲聲言兵不擇地惟其人吾將以一中丞取夜郎若走雷電可橫槊立辦所不成者吾不得復平章國事遽入奏上取進止詔遣使授中丞弓劍節斧行大將軍事聽自擇官諸不用命者其殺無赦中丞既受詔督軍夜郎以左布政使成能參政官伯龍兵巡副使江僉事思充咸入贊計畫暨知府大壯等分局受事表請以南中軍都督顯為節帥統制諸軍以故總兵成參將澤等十二人為偏將自宣撫效忠以下咸聽節制會顯以往事論列當罷賴元相知顯自少從蠻中立功蠻故憚顯威名且臨敵易將非便得不罷由是顯益感激思奮願以身許國賊不破不敢生還元年春三月中丞南嚮誓師授要束傳令軍中無殺降無縱亡匿有敢黷賄市姦宣漏風指坐以黨叛伏誅臨敵首鼠攜二逗遛進退者其斬以徇誓已密進顯計師所嚮顯議九絲城蠻都中會自比幕南王庭夷漢土著無賴亡命所歸地深沮不猝得拔陵霄寨九絲便門都寨北東霤先擊便門次東霤即王庭早晚可得獨陵霄王阿茍最桀黠蠻所怖畏然喜貪賂遺封爵使通若啖令下關執其王并六酋帥以獻羣獠奪氣夏五月軍襲落豹設伏擒四賦將取惡淚坎進迫虜營顯以牙校鯨將鋭卒五千與成澤軍合圍連決十餘戰城破賊敗走追斬二百級誅名王阿么名賊將六七人梟其頭夜郎都市六月以鎮雄兵三千攻落亥鯨軍藍澱坂襲洪崖成軍堇木與鎮雄兵掎角火蠻巢千餘賊迎敵決殊死戰執其兩名王斬首麾下盡收都寨部落秋七月始計取九絲城城據夜郎西山兩壁對望中阻長谷軍入谷兩陳夾攻無得脫者崖澗斗絶四十里三雄王壁其上控弦數萬王皆強力曉軍事慣攻戰聞别柵既破益防隘拒險嚴矢石塹牢自衛顯使間諭三雄王大將軍用兵如神號聞海外今以十萬師摧兩寨如搏雛鷇理豈得逃能先事降我許待以不死蠻懼且遲回觀望不決部下乞降者二千三百有竒秋八月令募郡國敢死惡少年增兵至十四萬公按兵法分五部進各將二萬八千以行營副使江監督諸軍事顯仁威引兵入黑帽軍其西斷吕郜烏蒙豕峨諸路成將所部出印壩軍其南以當芒部越巂牂牁澤軍出榖爆陳其北以絶冉駹董卜韓胡韓似甫軍得穵口陳東北斷其內冦使毋猾餉道毋厄儲胥以資冦食任繼祖軍西南與顯兵合五陳環絡如連珠緩急相應兵既會賊出徑卒鏖柵下十餘遇皆北始退保兩壁間乘城轉石發標弩下擊􅛺􅛺如電霰不休時鬼方多淫雨瘴霧晝冥蠻堅持不下秋九月公傳檄責戰厲甚用顯計令軍中厚賞賚土漢衝鋒死士使夜襲城會鯨等將顯所用諜夜入帳中見顯諜言蠻中以九日作社椎牛大饗且見霖潦無搏戰理將弛兵酗酒自放顯密諭諸將官出不意乃夜發猿臂軍千人乘飛隥銜枚取道間關霧雨中遲明進薄城下斬守門虜破關以入諸路軍取鳥銃為節刻期會戰起寅至午所格殺慣戰數百人賊大披靡前軍引火炬燒城中屯千餘炎焰漲天賊勢窮赴火墮崖谷死者數萬雄王皆棄壘走分兵大索冬十月取次就擒都蠻至是盡滅計先後下城柵六十有竒擒王三十有六俘斬四千六百有竒略地四百里還報闕庭皇上御皇極殿傳制曰國有戎兵豫不敢臆決維朕元輔忠亮以身繫天下安危不問海內外聞有作難惕若蹈行陳中罔有寧所乃西事告警獨許爾中丞可屬戎政假爾大將軍節斧授之成算諸有所關決無弗汝從維爾中丞哲肅勞瘁封疆能策諸將士破虜王以速成丕功用奠西陲康靖我國家克稱朕意其晉爾右副都御史顯以下爵賞有差以其九絲城為建武城置府衛兵下控西南夷落命所司伐蔡蒙石勒朕文武臣功使能賦者銘其勞聲諸永世其辭曰天王神聖威加九夏僰胡為者坤之社其山峍屼谷􅛦閜蠶叢開國來百戰不得下鬼其讐之聲在野貍晝號守以虎獠不庭戒邊櫓國有大盜問元輔其誰使者徇西土殿中有丞既文且武願假旄鉞斬桀虜丞哉飛檄怒濤發英風颯爽能起邊城八萬四千戰死之白骨筆籌赤牘肝膽壯徑氣直上蒼龍闕雲旓雨旗蕩摩日月墨王廖王劂落豹慧落拗鈯長鎩夜搗雄王窟三十六王碎領顝士有賸壤戶有降卒畫蘭靡莫咋舌不敢唾揲揄邛筰磔狗飲血斷出沒咦雀入淮化礪房雉入海化蜃光冦盜得險化侯王窅窅建武城列雉天一方守者非忠賢能無化豺狼蜀有天險上為劒閣下瞿唐割據自古昔可獨問夜郎誰借聖主三尺鐵為君世代誅豪強蜀不割蠻不屋蔡蒙補天之石髙崒嵂長與乾坤鎮南荒無使三十六王城下鬼夜哭虞秦公世德碑虞出勾吳以國姓自吳泰伯謀與弟仲雍逃讓去周適吳義至髙世為勾吳君長國虞故稱虞仲傳季簡叔逹凡五世皆稱虞仲至武王克殷求益與虞仲後於周北故夏墟列為倫侯得稱虞公由熊遂強鳩夷餘喬屈羽轉皆仁厚立國用能藩衛宗周亡所失墜至畢軫以虢故黷賄晉人執虞公有其國虞再入吳凡自夀夢至季札虞之在勾吳者始益大季扎敦厥祖虞仲髙義遜位諸樊實揚丕休史蓋稱延陵季子云當平原君時有虞卿者善著書方略計事出公孫龍上名聞諸侯晚乃益窮困不得意逃匿會稽山下著書虞氏春秋號躡蹻虞卿梁始興王咨議參軍檢校太子中庶子荔皆虞卿後也荔生唐永興文懿公世南從吳郡顧野王受尚書京房易事秦王為佐命功臣掌制辭令主讐校中袐補益𢎞多薨賜葬昭陵園文懿生工部侍郎昶昶居雍為唐勛胄代以材官聞著九世至北郡刺史殷乾符中殷從僖宗幸蜀留仁夀郡多善狀遂家仁夀不返五傳而得周國公昭白周國生魏國公軒魏國生左中大夫陽陽生開國男贈太師秦國公祺祺字齊年初名聃政和五年舉進士受賜更名即宋丞相雍國忠肅公允文父雍國功勞氣略藏在盟府忠孝聞四海精誠炯炯蕩摩日月惟秦國實開厥先故稱舊家父老能端慎典刑陶範後來子弟炅炅有成立為國家倚緩急者必歸秦公秦公當宣和中判夔路轉運權大寧監夔山谷阻險多怪石碨礧不可以田民嵗用火耕日采溪毛薇蕨相啖食縣官令下數亡命散走不制分為請於上得悉蠲除非分科稅惠聲流聞時號為才臣紹興秦檜當國竭天下財力供歲幣令長吏時節包貢水土珍怪百物公轉運潼川諸路抗疏言王室在難宜務殺減繇役罷四方無名貢獻絀貪墨吏謝天下臣所部劒南軍困不宜有征制可其奏賜其所部減氓租半為令甲檜大慙沮竟坐公忤旨兒歸日閉閣著書不預外事舊所嘗部父老日饋遺問訊不絶道路紹興十七年以夀終逺近哭泣相弔時論偉之公長厚仁人有密行垂休奕世孫公亮拜光祿勳公著刺開州杭孫守長寧皆顯有丕功曽孫剛簡方簡夷簡同時舉進士剛簡尤負竒節謇然有直名元封雍郡侯奎章學士集嘉魚大夫槃皆公玄孫公既廟食五百年御史吳臯喻君奉皇帝命來按蜀覽咨方乘得公墓處哀虞仲延陵之世不宜令闕然堙滅不載使縣人請辭於瀚歸而鑱諸石為虞世家辭曰烈烈秦公厥初薑嫄維神明胄棄稷後昆勾吳太伯將仲逃奔從者成蹊古髙義存爰逮夀夢世逺益敦噩噩延陵業遜諸樊仁聖賢人其後倡作有窮夫差虞鬼不臘賴卿文懿崛起南服躡蹻著書策勞定國振微者聃判夔維惠允文勤王丕顯奕世山則河江有沱蔚然而蒼墳者何死而無朽碣則那曹汴重建塗山禹廟碑記今川東兵憲田公之駐節我郡也開忠益之賓亭廣咨諏之使務於是於郡東塗山之麓得禹廟舊址與元臣劉志道所題廟碑馬顧碑漫缺不可讀乃又於郡志得元臣賈易巖所撰碑引東漢郡志及華陽國志諸古籍辨禹之娶於塗山實茲山也其會諸侯乃在會稽塗山而世遂以為娶於彼非也其考既明備而核足破近世膚聞之誤而文復爾雅可傳於是公讀之歎曰昔人睹河洛而思禹功矧梁岷之髙山迅川其利鑿疏導之難殆又倍於河洛而今之享既藝之利而被安流之澤者顧漫不知思禹功也乎縱令禹非蜀人其娶非塗山猶當郡為之祠廟以報厥萬世永賴之功而舊籍之可考班班若是其舊址遺碑今猶巖然焉而顧坐視其鞠為瓦礫草莽之墟此豈非觀風守土者之責哉遂毅然亟為重建之舉乃首以語我郡守朱君君遂率郡二倅與邑令尹躬視其址以復於公公乃隨以督建之役委之衛使陳嘉勳且復親為之指授曰是舉也基視舊址宜拓三之二庶廟貌宏邃足壯觀瞻棟宇宜掄楩楠之材庶無速朽足垂久逖禹位宜遵洪武七年帝王廟例塑袞冕坐像庶謁者如見廟益藉以尊嚴然茲山以塗后而傳禮宜合祀顧像則弗典仍宜前設木二一稱夏大禹神主一稱夏后塗山氏神主庶禹不獨血食而山靈亦與榮矣第其役計費吾帑贖之餘若干而足以此構材以此募役可無更役夫里一人也授既定乃遂移上撫臺鍾祥確菴曽公按臺徽州環一郭公既後先報可而為時分守少參汪公駐涪陵公復以其事告之亦欣然贊焉於是嘉勳日在工督建唯亟而城野之人顧晏然若不知其有興作也蓋拓基於萬厯甲戌之冬十有二月至乙亥之春三月廟乃訖工廟基凡為臺三臺皆甃石為之前為門凡四楹躡級而上為亭亦四楹亭後左右各為房亦各四楹又躡級而上始為廟四楹而廟地勝棟隆後依朝曦之輝面挹郡基金碧之秀龍門抱其下塗洞峙其左遮灘陳其右殆儼然古塗山國之故宫而禹之像則考宋人所刻聖賢遺像為之復藹然錫圭告成之度如生也公於是諏日瓣香爰率郡邑長二恭謁於廟而告成事退乃顧汴城墟命載筆焉既而朱君復以公意申命之而汴遂無容辭也汴唯賈碑塗山辨甚詳顧未暇及塗山氏之賢之有功於禹也按漢劉向列女傳稱禹之治水而南也塗山氏蓋賦倚南之候其後周之二南實取風焉及生啓禹弗子塗山氏獨能教訓而使之化至立庶子之官以翼之故禹不惟獲告成功而卒至啓能象賢繼世以有天下善乎遷固之敘三代后妃之助曰夏之興也以塗山然則其今日之配享兹廟也固以其生兹山之故然實祀德祀功之典所弗可遺也汴故繼敘之用補前碑之缺庶昭公之舉也殆不獨使巴夔之間睹廟貌而思禹抑將使聞塗山氏之風者化不在周召之南而在川以東矣其有裨風教豈小哉於是碑方擬登刻而學憲沔陽陳公適校士至渝郭公按部偕汪公至聞廟成咸後先登謁於是一時塗林之旄無不躍然快覩也然公之意以山在江之東岸猶石紐在蜀之西皆冠蓋之所弗經故其傳不甚著也又欲倣之神禹鄉邦樹石南紀之衢題以塗山舊國以告觀風者而君去郡矣至是柱史任公來代公出巡於是朱公具以事白焉任公乃遂諏日登謁且面授嘉勳亟成公之所未及備也而朱君亦以是月上丁四日登修嘗祀以肇嵗典噫山河幸於數千載之下有兹曠遇哉汪公名仲川系黃岡田公名子堅系永寧任公名惟一系盩厔朱君名孟震系新淦其郡二趙侯方立倅盧侯晉梁侯棟朱侯崑推王侯邦俊暨邑令鄭侯宗學或與經其始或樂觀厥成而嘉勳則重慶衛指揮僉事蓋終役獨效勞也法故當備著於篇李長春新修成都橋塔碑皇帝在宥之二十一載蜀左轄余公一龍偕藩臬諸大夫暨閫帥上記都御史幕府御史臺言成都據七蜀之會層巒疊嶂掩映郛郭真屹然天府之勝哉獨東西兩江合流之所奔放衝突稍乏迤邐之勢形家者病之且川之西南以輪蹄擔負來者必取塗於此而夏潦秋霖往往望洋而阻行旅有嚬呻焉非創造橋塔罔與固風氣資涉濟也今縉紳耆老既言之博士弟子復言之請令成都旁近州邑各輸金榖礪煆為佐募匠庸作擇有幹局者董之不致耗公帑擾閭左以滋弊都御史御史咸可其議俾尅期以行余公復相率啓蜀王而請曰惟王世以忠孝賢良著聞兹舉關國鴻巨必仰邸第之資藉侍從之良方克底績王乃首助千金委承奉司鵬榮出綜厥事兩臺監司以下各捐俸有差卜以萬厯癸巳年菊月經始鵬榮祇役而往茇舍蓐食日夕與畚鍤者同甘苦不數月而塔成崨嶫前蹲崢嶸後竦朱碧炫熿鈴鐸砰訇危乎髙哉何羡永寧同泰彌九仞而踰十級耶顧橋工浩大經費漸拓而有司靡所措手諸為咻搖震撼之語者復乘間而起顧王色弗為動令鵬榮程督如故而橋乃次第就乃鵬榮竟以盡瘁終矣王復委承奉寧廷鸞門副司鵬愷及首事翟升者繼之廷鸞營綜率作勞勛什倍於初而鵬愷克承兄志與升拮據之力尤殫遂以是嵗丁酉十月橋成為洞者九從四十丈衡四十尺遠而望之虹舒電拖霞結雲構若跨碧落而太空為鬬俯而瞰之飊涌濤舂鯨飛鯢走若駕溟渤而拒浸為溜彼成都七橋象應七星如往牒所詡談者視此不當左次耶諸縉紳中若西安郡丞顧君紹履以王命從臾其間竭蹶不替終始而君乃豫昔同計偕者當塔成裹糧走雒源訪豫玉華山中屬以碑事今橋成復申前諾則已三閲嵗矣豫惟天地剖判以來神臯奧區苞靈稸秀吐景耀而貢庥祥者到於今繹繹未歇也乃形勝有刓而欲補風氣有泄而欲培則二儀所不能盡人力實為之故易曰后以財成天地之道輔相天地之宜以左右民非若青烏之説騖渺冥以徼福蔭弗可憑也顧今日論者曰橋以洪濟勝塔以回瀾勝於法當鞏固王室奠麗民居而於人文之宣朗尤有助若然則造化委其權而聽於人人成其能而歸於造化兩相待而兩相濟者也厥義不亦大哉斯舉非余公無以決首鼠非賢王無以握魁柄非二三中侍無以任仔肩而當路諸君子或蒿目慮始或鞅掌圖終皆所稱不朽之績也顧君復言承奉正藺君玉長史張君拱極贊襄調停多所倚辦事之美成信非一手一足之力哉橋名洪濟塔名回瀾則前中丞艾公王公指也豫既紀其事復系以銘銘曰瞻彼成都沃野千里城闢通門塗畫方軌閭棊布鄽陌星羅華闕臨阜綺窗瞰波秀吐芙蓉麗裁錦綺山色環郛江流衝壘聲饒震蕩勢乏濚洄形家攸忌王氣宜培更有急湍恆苦病涉匪藉津梁孰通舟楫議久畫餅事忽轉圜偉哉方嶽擔此巨艱爰啓賢王共襄盛舉睿命疉敷從臣特許資匪帑給力匪民輸甫操畚鍤奄就浮圖再起長橋橫跨髙漢綰束洪濤褰登彼岸觀者雀躍行者鳬趨開闢以降形勝所無佳氣鬱蔥鴻庥儲委佑我價藩綏厥繁祉載翼髦士丕振文明餘波滲漏羣庶阜成峩眉增髙瞿塘益險光奮井參績垂琬琰回瀾者塔洪濟者橋並據天府永鎮皇朝黃輝直指李公平險碑記西於平都可十里許計豎岩衡梁蛟環東江江怒而戰空激岸竦怪石鼓猛炮霆互吞戈鋋鱗鱗飢涎波豗舟一無幸立入鮓甕黔南李公昔司渝李行役過之躬嘗厥險謂灘無頑鏟若必我姑視吾力寧爾久貸後十餘嵗果來按蜀亟檄治灘毋養餘橫時維萬厯川有載役始春中人賈厥勇灘石慙愳未烈先泣沃膏而來邪許澒山冰磔金流不見鑿痕江舒以縠如尉如凡五閲月遂告成事舟檣往來望之歡踴昔我由兹五色靡主灘聲礉夭鼓榜不聞萬斛葉浮千指髮懸窘迫無之羣號大士謂惟大慈能救斯苦是故字灘曰觀世音赫赫李公應身濟世砥茲巨阻若捩舵轉匪神所相易詎乃爾神不敢居歸之我公公莞爾曰功則何有茲灘十年鬱於豫懷雖不去心敢問必償常鑒豫誠競決以流斧如不西其奈灘何必云有助歸諸國家僉曰議哉昔崇伯子實産我蜀塗山家門鑿狹如新公昔為理囊蜀利害今重我蒞若還厥鄉探懷施仁福利淡災如出金簡奔走百靈若茲灘險匪水匪石假合成隘乃於公斧無心猶爾况有心者凡茲伏慝有如此灘勿謂灘衆無暇盡斧公斧在心不依形力非故平之由灘自取有險有平猶云相待公非險平而來平險一灘就平百灘震驚不霜而栗維仁生威昔漕江淮載澄河海斧無難夷皆立底績於衣帶水解結何有若平都者又帶之縷何况其灘而敢怙險公念其灘競無自負由灘以往執國何極尚輔明慎逺追伯禹百爾神人當矢如公務平乃心無負帝命心本自平何故而險心所造灘險百於水毋謂無傷必有斧者禹亦人耳獨平水土思日孜孜為不平故能平一險一險之禹公功非灘即灘功在以灘功公如管窺天天豈在管亦不離管故樹斯碑表公平心以平神人如鑄九鼎為神姦故使弗若若孰為鼎者嗚呼念哉各護乃心如護公碑無險可斧無灘可平是謂大平蕩蕩岷江公功當存維公即緒公落以詩巴人和焉勒石亭之亭依於堂有臺有坊輔以仁祠苾芻守之並在灘岸灘去名存維觀自在常與公俱預斯役者守令而下凡若干人附書碑隂永示來祀樊鼎遇德陽縣儒學復古經樓碑記惟夫妙空顯質俱有神理之宗設位流行即為文字之祖東壁天書袐府耀炳雙珠西崑地册靈樞精藏羣玉丹書金版龍關開太昊之圖赤簡緑文滄水授文命之策此皆繩契未造業留呵護隱章然則事豈人謀吹皆天籟出入三光之道環坤腹以奠生周遍九有之民秉分星而别度羌華夷漢所以辨族類而繫萬民復簡隱民所以絶人神而察百物火符雷篆譯之卓有師傳虎畫狐編窺之更奪人巧凡鳥獸鳴動亦喜怒感其誠通或風水激號且宫商露其變狀雖各通其情而天地萬物之情並見雖各適其性而天地萬物之性並呈具聖具靈廣矣大矣惟是剛柔徐疾五性殊方専普龎純列國為政兼之是非同異譎雅俚都自開闢以至獲麟三百二十七萬六千嵗萬方所記十紀之書空委宛之巖不足紀其政典鑿觴謨之室不足載其方家周末益以恣橫秦火會應酷虐所以仲尼慈憫萬世約究多經乃定禮樂而修舊章刪古詩而存三百讚易道以黜八索述職方以除九丘斷三墳五典自唐虞約列國史記為春秋蓋始剪其繁蕪一就典雅刋其蹐駁並受折衷名為七經道揭千古然後西見柱史藏之王室周流列國演之疇人修函文於杏林漁父誚而罔介講爼豆於宋樹桓魋伐而無危不必七十二君之能行凡有國者不可不知其義不必三千弟子之優聖凡有識者欲使盡讀其書猶恐世有興廢家壁藏蝌蚪古字人懷疑信地機儲絲竹靈音是以秦炬雖炎祇能燼洪荒草創之冗穢漢律初解即能合諸儒口筆為篇章自此代置學官經分博士家以之式行國以之官人遂騁絢爛於百家莫能窺其博奧窮精蘊於二氏終不出其範圍備帝王損益之權盡人道綱維之理良定心續命之傳寶宰物經世之懸圖也奠兩楹之夢已兆太牢闕里之時齊衆喙之鳴何啻一馬天地之喻王都侯國辟雍頖宫并傑閣而陳宗器之文峙危樓而藏鼓篋之業嚴始羮牆之地無經籍則衆志不興尊崇絃誦之基非壯麗則真靈不集錦標寶軸卷帙極華淨之方桂棟蘭楹刻鏤窮輪奐之美旁通七略四部猶懼不足羽翼聖真髙亢日牖月欄尚疑未能登閎大道師各重其本教人自悅其家珍易地皆然由來尚矣德揚儒學講堂右隙有宋學士邑人章公森書經樓字碑字體盈尺書法八分嚴整若魯公之儀遒麗得中郎之意碑足則有宋進士范執中紀羣公興學盡肯搆肯堂之勤碑隂則有明育令夫巳氏鐫卧碑字痕發注金彈珠之嘆窿穹仆而復立則羅令錦弔古興嘆之思典刑晦而復章則栁諭維臨池紀勝之力然委諸草莽石不能言若復其藝蘭人應𢎞道鼎遇忝蒞茲土幸與斯文慨富有之業日新蓋一令因循一令惟慮始之治難任將後人復笑前人迹雖異代而感長懷忍當吾世而失盛事為之列上當道白文武興墜之繇因之逺購全經廣學士博通之路恭遇監察御史朱公廬江正學觀海鴻文破柱埋輪曽射狐狼於輦轂銷鋒卧鼓不驚犬豕於封疆駐節而細論文帙括盡談天之奧攬轡而亟興廢建立樹根道之標兼遇本道大參曹公八閩少逸四海宿宗玉潤氷清藐姑射喻其神骨和聲緩節王摩詰似其詩文每録金石遺言必扣巖瀾絶地本省督學魏公名臣嫡裔藝圃宗盟藻鑒人倫夙擬天曹綱紀衡程方類重新蜀部風猷拔士皆得其尤作人於斯為盛本府太守張公荆楚偉度觚管巨公十載為郎雞羣驚其野鶴一麾出守蛙郡詘以海鼇魯諸生半在門牆舊掄材揚馬王嚴之地邑列侯多象風指謹追躅李文韋趙之規本府司理楊公洞庭澄波祝融朗照平反百獄胡威清畏人知題品羣材山濤光膺帝鑒觀仁於過若清獻之不失元公録善於微即平仲之立解越石緣茲從臾覆議允行幸遇邑中憲大夫曽公家緗魯誥梵笈竺墳紫鱣専臯比之譯白馬演龍象之辨立朝正色片言不及私門過里飭躬五尺不干孱令趙相國之解脫化其剛稜黃太史之元通得其主柄本學教諭王公鄖子名宗單父清望鶖眸鵠立健翮有凌雲之思豹蔚虎文猛氣負開山之力發蒙罔憚其煩苦為道不憂其拮據相與率邑官僚電轟締搆共鼓通庠襟帶鸞集觀摩螢誦雪吟觸目見琳琅珠玉牖窺山望會心捨階筏筌蹄度其成不踰時教未匝月童冠刷羽而冀鴻陸數倍前人賢良燒尾而躍龍門蕪開二彥於是接境比封之士把袂而來問竒講德之朋填履而入至於道人法子乘杯按蹻以印心曹吏山民獻書録訣以備目先聲已證實效積學自有真儒此皆聖主右文久道逢化成之會亦先師翊教隂隲得感通之神故一時公卿盡擅墨林匠手而四境冠履同任德圃仔肩鼎遇小吏何以獲茲薦紳先生實貺臨此自古獲麟之後至今龍飛之年三十四甲子記載之文方家之説博雅君子之所通考慧心文人之所裁制繁盈鄴架重溢洛車帝室藏書之富代有汙隆髙門積帙之多家或偶國漢通七略三萬三千九百卷隋録西京三十七萬卷唐列四庫八萬九千四百卷宋崇文目二萬六百六十九卷張茂先入洛載書二十車李公擇山房藏書九千卷宋宣憲校讐定本二萬卷名家藏書如南都戚氏歷陽沈氏等少者數千卷多至四萬卷葉少蘊少貴博收遂逾十萬卷今鼎遇所藏經僅十三史僅二十一子僅二十集僅二通并學官弟子制傳注性理通鑑綱目及昭代名史數種共一百一十八函計四千二百二十二卷擬古則涼不足稱明經亦要而匪濫良以多多為善姑俟徐徐積儲凡茲散漫簡篇皆歷代乾坤精藴若假神聖筆削斯六經性道文章逺考宋儒馬端臨録古今經籍志近見白下焦太史作明史經籍志舉道釋兩藏之教即敘列諸子之中果得刪述方家因之大一統類千萬億卷之義自可約為一篇千萬億卷之文復可精藏一字薰蕕何病於芳臭鳬鶴焉較其短長作者尚未有人收之不厭其雜尚當備二氏之法寶何况獵諸儒之碎金但今古大觀急借肆之友終始大業尤須堅忍之儒過庭録言六經子史之善者通不過三千卷成人日閲一卷二十年可以再尋歐陽公言九經正史通不過四十七萬八千九百九十五字童子日誦三百不五年略可上口徐盛年過八十猶嵗讀五經一遍劉原父初欲窮經即手寫六經一通兹由深味義根故終身固堅白之好窮搜道奧故畢日遊雋永之途先聖業筮命盡日中尚取書延晷刻死而後已學之謂何蘇子瞻言老儒先生自言少時求史記漢書且不可得得則手自書寫日夜誦讀後生科舉之士日見諸子百家摹刻易致致即束書不觀遊談無根翻朽骨而發陳頥精心尚詆為書肆芙四寸而忘七尺密繕且笑為説鈴矧目不遍三篋之藏口惟授一師之説取科第之資不足詎天人之際可言期與求學實講之毋以故事虛崇尚之也冶子學而為裘謂因五緎為七屬之用孫郎圖而索驥至以去父冒山子之名聖人卷絻南面而不釋然其所憂者大也小人冠蓋里閈而有態色其所忘者多也不成位兩間靡擔幎幪六字之網第縻情好爵孰詣髙明良貴之階諸生感起即利賓王鼎遇盟期終願學孔周吕以公輔為載公輔有乘蹻跖之時夔龍以餼祿養亷餼祿有豢虎豹之日若夫介然抱一物至蓋棺而不脫悠然空萬有臨納麓而不驚樂則行之憂則違之卷懷靈密鴻寶生乎由是死乎由是歸藏真耀玄珠是則堯舜之心至今豈懷山稽天所能溺仲尼之土萬世詎炎岡烈澤所能焚匪劉炫之隋墳真得石經古本異舒公之周禮親翻竹簡漆書事理罔充溺之沈酣恣所取耳興復大義布露微懷佑直併上臺司節目副在曹案銘曰太虛惟靈函氣質行劙剖圓方布列星辰經緯日月殽列川陵抽莖敷葉縷析條分雕形鏤體脈絡井森龍圖龜畫馬鬛魚麟珠光玉彩赭丹黛青風聲雷號鳥語獸鳴鬼工神巧傅會聖心思通穆邈理徼玄冥結想擬化摛詞象鈞袪知簡智聞邪存誠黜浮體實芟駁歸純識小識大擇見擇聞百王合符千里印真易凖天地孝先渾沌禮本太乙樂超氣聲書陳中極詩道和溫春秋刑書亂賊是懲典雅奧博是曰七經道兼覆載義炳日星萬世素王二論心精異時同學子輿一人周官戴記與禮參明爾雅注詩公穀異經十三總録開元所尊諸子百家龎其斌箱輹輪轂合而車行巖廊魏闕何材不賓二氏角立俶詭幻冥偃師復孟舉止亂真俳宣聖旨妙演靈根龍門虎視百代撮英軒皇及漢裁綴創新筆劒所擊長短縱橫史匠繩墨文公典型孟堅以下嚴秉法程具體肖貌駢偶失神洗華露質削弱傷魂夾漈論集通志爰成考度辨惑博物邃生端臨總攬通考酌斟憲章備矣禮樂攸存詞章藻繢行逺腴身昭明之選𢎞麗和平一洗惡陋單寒浮榛文苑次之披沙錬金傳注性鑑代制所欽子史諸集極博明經採華托實捐短録嬴道我逹意證彼注心野人質耳君子彬彬廣心大畜巨細盡倫唯聖希天乃與斯文記唐段全緯城隍廟記陽之理化任乎人隂之宰司任乎神人保於城城保於德德者神所憑依也則都邑之主其城隍神之謂乎蜀地土惟塗泥古難版築至秦惠王始命張儀與蜀守張若城成都其環十二里其髙七十尺廨蜀廛里畫其下井幹樓櫓森乎上其金椎初作壞頽莫就有大蔡周旋而行俾壘堵依凖而立即今城也其神功乎由此而來乃墉洫崇濬啓塞扃固萬雉邐迤一都繁會神明支持金湯繕完故前年蠻冦卒來戎備無素但擾郊鄙不近闉闍閉關戒嚴即時罷退則扶傾捍患之力其隂靈幽贊之神乎前之舊祠寓託隈堞偏陋逼隘星歲滋深是用改度方隅惟新經搆去乎幽奧就於髙明其日惟丙其辰惟巳其卦直巽其宫在西揭署於髙門𢎞敞於正堂丹艧於周墉圖繪於回廊廟貌如生像容有睟神保是饗永安定位俾夫農無水旱人不夭札屏絶蠻夷阜安閭里護乎封域富庶乎億年爰書經營以昭祀事李景讓南瀆大江廣源公廟記戴禮有之曰五嶽視三公四瀆視諸侯古之禮於嶽瀆尚矣在昔夏后氏隨山濬川以畫九州華陽黑水界我庸蜀劒閣之陽益部饒焉岷山導江東别為沱禹繢也瀆者曰江曰河曰淮曰濟導積石桐柏沇水凡四流皆發源注海者也唐天寶六載開元神武皇帝加封南瀆為廣源公其三者亞焉漰沛滈江自峽奔荆且北且東百川會同爰及吳楚萬里歸海水府怪神非江不安水物族生非江不全海門二山逆我為滄由岷激沱逺邁無壅斯所謂祗上天而被下土南瀆之為大也壯矣開元皇帝古禮是式詔曰惟夏四月肇辰迎氣太守其率祭官祀南瀆於益州設玉篚及洗樽罍簠簋既舉羃初獻祝進神右跪揚我詞其文曰維某年嵗次月朔某甲子嗣天子遣某官某昭告於南瀆大江惟神包總大川朝宗於海功昭潤化德表靈長今因夏首用率常典敬以玉帛犧牲粢盛庶品明薦於神尚饗至於今不衰詔之歲歲直丁亥逮及戊寅當大中十二年合一百一十有二歲越五月朔辛酉日甲戌臣景讓承聖敬文思和武光孝皇帝詔自御史大夫檢校吏部尚書尹成都鎮蜀西川又五日戊寅復加檢校尚書右僕射其他如故凡再命皆以兼御史大夫罷焉秋七月庚午乘輅至止遂謁瀆廟惟神盛烈著金石刻他所必見於斯闕耶惟神奉大禹之休得蠶叢魚鳧望帝之勳開明之沒玉壘李氷之穿二江嘉而保之沃此黎首水旱不作於今賴之赫哉成功其可默耶乃作銘曰滔滔沱江發自岷山浪溢流飛走峽之荆逮及吳楚百川以歸南北東西萬里湯湯電激雷馳水府神宅鮫人陽侯世不可窺南瀆之功載主載張陰烈希夷上戴大禹丕承我唐開元其期先主不容天絶劉宗匪瀆殆而洸洸孔明鞠躬墮星匪瀆不悲念此下民於萬斯年九穀繁滋我來守土敬揚神休以琢豐碑杜甫唐興縣客館記中興之四年王潛為唐興宰修厥政事始自鰥寡惸獨而和其封內非侮循循不畏險膚而行而一咨於官屬於羣吏於衆庶曰邑中之政庶幾繕完矣惟賓館上漏下濕吾人猶不堪其居以容四方賓賓其謂我何改之重勞我其謂人何咸曰誕事至濟厥載則達觀於大壯作之閈閎作之堂搆以永圖崇髙廣大踰越傳舍通梁直走嵬將墜壓素柱上承安若太山兩旁序開發泄霜露潛靚深矣步櫩復霤萬瓦在後匪丹艧為實疏達為回廊南注又為覆廊以容介行人亦如正館制度小劣直左階而東封殖修竹茂樹挾右階於南環廊又注亦可以行步風雨不易謀而集事邑無妨工亦無匱財人不待子來定不待方中矣宿息井樹或相為賓或與之毛天子之使至則曰邑有人焉某無以粟階州長之使至則曰某非敢賓也子無所用俎四方之使至則曰子貺某多矣敢辭贄或曰明府君之侈也何以為人皆曰我公之為人也何以侈子徒見賓館之近夫厚不知其私室之甚薄器物未備力取之私室人民不知賦斂乃至於館之醯醢闕出於私厨使之乘駟闕辦於私廏君豈為亭長乎是躬親也若館宇不修而觀臺榭是好賓主無所納其車我浩蕩無所措手足獲高枕乎其誰不病吾人矣玼瑕忽生何以為之是道也施舍不幾乎先覺矣杜之友朋嘆曰美哉是館也成人不知人不怒廨署之福也府君之德也府君曰古有之也非吾有也余何能為是亦前州府君崔公之命也余何能為是日辛丑歲秋分大餘二小餘二千一百八十八杜氏之老記也張延賞南門記崇高莫大於君親嚴莫大於父君有覆幬父有訓育逮於蠻貊生知禽獸性感不俟教解也而肖形之內戾氣間存觸瑟生災夢牛成患何代不有可勝言哉賊昢焚門亦由是也族滅門覆為愚者鑒誡所以書其所由來其餘則詞存於左右壁矣興元元年記裴度諸葛武侯詞堂記度嘗讀漢史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公亮其人也公本系在簡册大名蓋天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱卧龍詩曰潛雖伏矣亦孔之昭荆州平心與昭烈神交洎乎三顧而許以驅馳一言而定其機勢於是翼扶劉氏纘承舊服結吳抗魏擁蜀稱漢政刑達於荒外道化行乎域中誰謂阻深殷為強國誰謂輕脆勵為徑兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啓雄圖出封疆以延大敵財用足而不曰朘我以生干戈動而不曰殘人以逞其砥定南方也不以力制而取其心服震懾諸夏也不敢角其勝負而止候其存亡法加於人也雖死而無怨德及於人也雖奕業而見思此所謂精義入神自誠而明者矣若其人存其政舉則四海可平五服可傾而陳夀之評未極其能事崔浩之説又詰其成功此皆以變詐之略論節制之師以進取之方語化成之道不其謬歟夫委棄荆州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武功分兵屯田謀久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方養威若天假之年則繼大漢之祀承先王之志不難矣且權傾一國威震八紘上下無異辭始終無愧邑茍非運膺五百道冠生知曷以臻於此乎故昭烈知人之明者倚仗如魚之有水仲逹姦人之雄者嗟稱曰天下竒才度每迹其行事度其逺心願奮短袖以排羣議而文字蚩鄙志願未果元和二年冬十月聖上以西南奧區寇亂餘孽罷氓未息汚俗未清輟我股肱為之父母乃詔相國臨淮公由秉鈞之重承推轂之寄戎軒乃降藩服乃理將明帝道陬落綏懷溥暢仁風閭閻滋殖府中無留事宇下無棄才人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同法矣度謬以庸薄獲參管記隨旌旄而爰止望祠宇而修謁有儀可象以赫厥靈雖徽烈不忘而碑表未立古者或拳拳一善或師表一城尚流斯文以示來裔況如在之歎終古不絶其可闕乎乃刻貞石庶此都之人存必拜之感云爾銘曰昔在先主思啓疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敦渭濱攝迹畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父佐周阿衡佐商兼齊管晏總漢蕭張易代而生易地而理遭遇豐約亦皆然矣鳴呼竒謀奮發美智夭遏吁嗟平立咸受謫罰聞之痛之或泣或絶甘棠勿翦駢邑斯奪繇是而言殊塗共轍本於忠恕孰不感悅茍非誠慤徒云固結古柏森森遺廟沈沈不殄禋祀以迄於今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玉壘峻岑入海際天知公德音元和四年記李德裕前益州五長史真記益州草堂寺成都記云在府西七里去浣花亭三里列畫前史一十四人代稱絶迹余嘗於數公子孫之家獲見圖狀乃知草堂繪事靡不造真者昔嵓野旁求徒聞審像稽山髙舉惟止鎔金孰若記之丹青妙畫神照楚國祠廟魯王宫室洎此邦文翁舊館皆圖歷代卿相燦然可觀雖有慕於前良曽莫究於形似豈與夫年代已逺遺像猶存入虛室而煙霞暫披拂浮埃而瑶林斯覿余以精舍甚古貌像將傾乃選其功德尤盛者五人摹於郡之廳所追維二漢臺閣皆有圖寫黃霸于定國雖宰相名臣不得在畫像之刋卓子師德行君子而在功臣之右今之所取意其在斯乎采色既新靈光可想儼若神對吾將與歸因敘其事詒諸來哲太和四年資福院記夫威鳯之炳然非海晏則不至卿雲之蔚然非氣和則不耀故君子藏器抱璞含粹育德遭遇其時則光明丕昭是以干木之退也髙於千乘君曼容之仕也止於六百石先僕射佩虎符而知足視蟬冕而蔑如由斯志矣苞文武之用有直清之德良玉美潤徙蓄實於荆岑喬松幽深不呈材於巖廟知者所以歎息也丞相鄒平公鍾是餘慶為唐實臣公天挺奇表角犀特秀居五嶽也稟太華削成之狀方四時也得清秋爽朗之氣森矛戟以耀穎粲圭璋而洞照蓋人之傑歟憲宗皇帝以神武之資墾災除害睿德淡以泉默英威赫而電斷兵權祕計皆中詔決之參神算者唯公與二三髦士揣摩潤色繄公稱首既而平淮夷蕩齊寇四罪咸服八表晏然雖則武力之拘原亦由謀臣之決䇿暨今上之宅憂也衮龍未襲嚮明未位召公於東宫含春殿歔欷前席付以大柄公乃請偃武論道與天下休息上若涉水而有舟楫馭馬而得銜策始拜言以命咎即其時而相説君臣之遇古無儔也公之為政貞以制動平以稱物其志在於識相體𢎞簡易而已嘗以為用京房之法則煩碎而亂理聽嗇夫之辨則捷給而傷化由是遵坦平之路窒邪枉之門不勤人以務逺恥竭澤以言利矧乎洞虛明之境應必有誠端不言之蹊孰不歸我故舉聖政者稱公為良相焉公之趨丹戺侍紫垣名冠近臣寵加贈典先僕射自珥貂而升左揆先夫人由趙郡而啓大國金印石窖當代榮之建中初先僕射以柱下史參梓潼軍計典昌榮二郡益部之內有林居一㕓庾氏誅茅始傷於寄寓仲長樹果終見於繁蔚公年才佩觿志拾青紫亦覃思於經籍未馳騖於文章遊焉息焉必在於是及鍾家艱乃入為官第韋太尉鎮是邦也公釋褐從事在賓幄之間逮兹抗龍旌佩相印曽未一紀繼為三台公下車逾月訪於蒨館召伯之樹未翦武侯之廬猶在于公邑里遂見髙車龍驤閈閎竟容長戟公曕構灑泣循陔永思以為徵壞壁者夫子之居尚毁固朽宅者如來之乘斯逺孰若歸於淨土環以香林乃贖之於官以為精舍義以桑門之上首者七人居之所以證迷途而資夙植也殿堂層立軒房四注鎔金作繢髣佛諸天况乎蜀山蔥蒨下臨於雉堞錦江明滅近繚於郊坰紅樹倚檻清渠傍砌海雛乍來靈草長秀彼之聽和音者不難於寂慮聞異香者自入於禪薰公之孝思永代作則豈止何充之宅獨入檀那將與文翁之堂俱稱不朽德裕藐焉孤生流落於代辱公感舊遂不見遺公自內廷升台司居視草之列二三年間位階先達由是議人倫者歸公之盛德不陪密座驟變寒暑遷懸榻之念虛授簡之恩且嘗典綸綍獲備宫屬報德不讓懼斯文之闕焉長慶二年十月日建劉禹錫新修福成寺記益城石門街大達坦然西馳曰石笋街街之址有仁祠形焉直啓曰福成寺寺之殿臺與城之樓交錯相輝繡於碧霄望之如崑閬間物太和四年蜀帥非將材不修邊備南詔君長謀帥內空乘隙坌入鬭於城下或縱火以駭衆此寺乃焚髙門修廊委為寒燼如是者再嵗帝命坤維丞相復來山川如近父老相識環視故地寺為焦墟載興起廢之嘆爰有植因之願乃命主俸吏以吾緍錢三十萬為經營之基自公來思蜀號無事時康嵗稔人樂檀施公言既先應如決川乃顧囊褚乃出懷袖勝因化愚慧力攝慳男奔女驟急於徴令匠者度材以指衆徒藝者運思以役衆技刀鋸磨礱丁丁澄澄陶者儲精圬者效能歘自火宅復為金繩沿故鼎新因毁成妍遐邇縱觀萬目同聳既告訖役公來慶成雲鮮日潤暉映前後於是都人舞忭而謡曰昔公去此福成以毁今公重還福成復完民安軍治亦如此寺庸可勿紀乎公實聞斯言遂折簡見命謹月而日之時太和某月日大檀越具官封爵段氏其他發大願者程功董事者自中貴人及賓寮將吏若僧徒偕籍之而刻於石劉禹錫夔州刺史廳壁記夔在春秋為子國楚并為楚九縣之一秦為魚復漢為固陵蜀為巴東梁為信州初城於瀼西後周大總管龍門王公述登白帝嘆曰此竒勢可居遂移府於今治所是嵗建德五年隋初楊素以越公領總管又張大之唐興武德二年詔書其以信州為夔州七年增名都督府督黔巫一十九郡開元中猶領七州天寶初罷州置郡號雲安至德二年命嗣道王錬為太守賜之旌節統峽中五郡軍事乾元初復為州偃節於有司第以防禦使為稱尋罷以支郡隸江陵按版圖方輪不足當通邑而今秩與上郡齒特以帶蠻夷故也故相國安賜公乾曜嘗參軍事修圖經言風俗甚備今以郡國更名之所以然著於壁云凡名殊必以國事建必以年謹始也長慶二年五月一日刺史中山劉禹錫記鄭宗經德陽龜勝山道場記維大唐乙酉祀蜀帥薨鎮其倅曰闢盜庫兵脅市人逆命於蜀門毒瀰浸淫軼制踰封自左綿抵黔渝八郡五十城俘掠單産驅逐守吏四面攻焚煙塵書昏明年皇帝嗣寶位會朝神京采衛侯甸蠻貊君長偕集庸蜀不至乃授南平王太乙靈旗玉節油幢統禁衛太原馮翊扶風之師問罪於岷陽越三月師次葭萌賊將宵遁涪潼以避我鋒涪濱萬戶隨師而復夏六月賊又成城於鹿頭列柵於此山公移師習乃次山下視其鑿峻址以回塹架層峯以結櫓旗轉霞光鼓雷雲中謂制勝在德義行權在形勢勝而臨之示建瓴之易也乃召中軍將以短兵二旅魚貫而登闢黨冒鋒而殪者什四奔墮崖谷而斃者又什二則向之險固反為我資公乃開玉帳以建牙旗列霜戟以周崇壘下瞰賊城如在掌中與都監使劉公監軍使徐公觀變禦敵分營守要自是凶徒居則魄悸魂落出則輿尸折首面縛倒戈請命轅門因命降者先導鋭師繼襲氛氲氣象遂清岷峨帝授公所封之土以守所活之氓以字之公威肅其令仁敷其政和氣照之金痍盡平退食之暇延想所歷以戰骨雖瘞遊魂尚痛非大聖之力不能息苦海非象設之教無以聳善心乃命庀徒鳩工度材揆力紺宇俄就絶如化城嚴鼓息而振金鐘戰聲寂而流梵響慈惠所庇災疾不生峨峨金界擢秀羣嶺公初宅此營有神龜由壁門來於牙旗之下公命投之逺澗翌日重至議者介蟲之長介蟲斯服蜀有龜城其城是師即日乃受降此山既靈及其祥遂以名龜勝山因以山名道場孫樵梓潼移江記涪繚於郪迫城如蟠淫漲於秋狂瀾陸髙突隄嚙涯包城蕩壚嵗殺州民以為官憂滎陽公始至則思所以治其患頗聞前觀察使欲鑿江東壖地别為新江使流北注流五里復匯而東即隄墟舊江使水道與城相逺以薄江怒遂命武吏發卒三千迹其前謀役興三月功不可就有謁於滎陽公曰公開新江將扶民憂然江勢不可決訛言不可絶公將何以終之滎陽公曰吾欲厚其直以勸其卒可乎對曰飢卒賴厚直民惜其田以顗得不可滎陽公曰吾欲戮其將以動其將以動其卒可乎對曰代之將者必苦吾卒卒苦叛不可滎陽公曰奈何對曰夫民可與樂終難與圖始固自役興以來彼其民曰夏王鞭促萬靈以導百川今果能改夏王迹耶非徒無功抑有後災羣疑牽綿民心蕩搖前時觀察欲鑿新江中輟議而罷豈病此耶公即能先隄民言新江可度日而決也滎陽公諾明日視政加猛決獄加斷又明日杖殺左右有所二事鞭官吏有所阻政者遂下令曰開新江非我家事將脫郪民於魚禍耳民敢橫議者死郪民以滎陽公嘗為京兆既憚其猛及是民心大栗羣舌如斬未幾而新江告成滎陽公歡出臨視班賞罷卒巳而嘆曰民言不隄新江其不決耶新江長步一千五百濶十分其長之二深七分其闊之一盤隄既隆舊江遂墟凡得田五百畝其年七月水果大至雖踰防稽陸不能病民其績宜何如哉滎陽公既已上聞有司劾其不先白詔奪俸錢一月之半樵嘗為褒城驛記恨所在長吏不肯出豪力以利民覩滎陽公以開新江受譴豈立事者亦未易耶是嵗開成五年也龍多山記梓潼南鄙越五百里其中有山崛起中天即山之趾得徑委延舉武三十北出其嶺氣象鮮妍孕成隂煙屹石巉巉别為東巖槎牙重復爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞橫者木仆挺者碑植又有似乎飛簷連軒櫟櫨交攢欹撑兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若戶庭攄乳側脈膏停泓石俯對絶壑杪臨蘭薄仙臺標異藂石負起屹與山别猿鳥迹絶腹竇而空路由其中斷齶相望攀緣上下闖然而出曜見白日始時永嘉飛真益羅玄蹤斯存石刻傳聞丹成而蛻駕鶴騰天一去遼廓千載寂寞澄泉傳靈别鶴絶朋風間境清寂寞無聲嘉木美竹岡巒交植風來怒黑雷動崖谷山禽巖獸捷翔牙驚曉吟暄啼聽之悽悽回環下矚萬類在目因山帶川青縈碧聨莽蒼際天杳杳不分月上於東日薄於泉魄朗輪昏出入目前其或宿霧朝雲糊空縛山漠漠漫漫莫知其端陽曜始浴徹天昏紅輪髙而赤洪流散射濃透薄釋綿裂綺拆千狀萬態倐然收霽樵起來而遊泊車而休登降信宿聞見習熟始曰山乎曽未始有得乎無處夸世釣名者汚此巖扃乎且欲聞於潁陽之徒乎王徽創築羅城記皇帝改元之六年諸道鹽鐡轉運兼鎮海軍節度等使開府儀同三司檢校司徒同中書門下平章事燕國公髙駢奏臣前理成都築大城請紀其事上命翰林學士承旨臣王徽授其功狀臣徽承詔再拜上言夫外户不閉雖前聖之格言設險以居乃有國之雄制用是則光昭振古勢讋逺夷不有髙墉曷稱巨屏我之奧區粵惟井絡繁阜昌熾標出宇內先是蜀城既卑且隘象龜行之屈縮據武擔之形勝里閈錯雜邑屋闐委慢藏誨盜城而弗羅矧乎西東江山南控烏滸疆理澒洞密邇舊貫因循日居月諸殆逾千祀漢魏以還英豪迭處至若公孫述之桀黠諸葛亮之經營曽不指顧留心乘機制禦斯蓋天藏盛烈神貯嘉謨俾集元功式耀雄武自二紀以降邊部戒嚴有虧懷柔或阻琮賮雖負山川之險且乏金湯之固上顧相臣曰朕以不德化罔被於四夷惟是西南載罹俶擾深軫豫衷將若之何丞相進曰陛下以睿哲照臨臣輔理臣不能敷聖澤以懷異俗俾流毒於益人臣之罪也然黃帝有阪泉之役放勳興丹浦之師是知猾亂自古皆有其所以滌厲梗致時雍乃在進任忠賢馳驅英雋耳臣伏見今天平軍節度使駢即威武公崇文之孫也威武在元和中屬闢以蜀叛憲祖殷憂擬其所以代之者由是允膺聖奬能以部兵復梓州統大軍平玉壘大節大忠煥乎典册駢能不墜其業益大其門既席勳烈之資克善匡扶之志材超衛霍氣蓋關張忠孝兩全河山繼誓聿修厥德自成名家馳譽石麟焯有美稱出守天水邊塵不驚戎律既申將略克舉俄而交址淪陷有命遄征既復土疆遂錫鈇鉞則馬援銅柱楊僕樓船步驟之間莫得倫比固以威張惠浹後徑中權五年於兹海波不動朝廷方期拔用不可久留爰命徵還彌增寵澤時屬龎勛始潰鄆方未寧駢則再登師壇復開將幕士絶朝飢犬無夜警威加鄰部化敷屬城相印以之疇庸和門為之增氣恭以憲宗録崇文定蜀之勳也既如彼陛下念駢復交理鄆之勤也又如此俾榮舊履重建髙牙必致師貞可期俗阜上曰俞爾為代天其行之於是詔駢復以丞相擁節去汶陽趍錦里至則詢問疾苦樹置紀綱巡按封域周覽郛郭且曰夫療疾者必在藥乎心腑然後可以堅四支植木者必嘗澤乎本根然後可以茂柯葉今城之於蜀其由心乎其由本乎則知不理於近曷能致遠不固其內安能保外未有不謀而能成不壯而能威不勞而能逸者也於是擇將量財拓開新址分命支郡以令蜀邑乘時就役靡不適中吏不敢欺人不敢怠岷峨之下欣欣子來昔梁伯亟城人疲弗處子囊築郢見誚於時曷若駢能度其宜樂用其士圖難於易去危即安環以大城用冠諸夏其功固已相萬矣惟蜀之地厥土黑黎而又磽確版築靡就前人之不為非不為也蓋不能也惟駢果得衆心克成大績鳩工揆日不愆於素十旬之中屹若山峙南北東西凡二十五里擁門却敵之制復八里其髙下蓋二丈有六尺其廣又如是其上袤丈焉陴四尺斯所謂大為之防俾人有泰山之安矣而甃碧塗塈既麗且堅則制礠飾頳又奚以異其上建樓櫓廊廡凡五千六百八間㮰柖櫛比闉闍鱗次綺疏挂斗鴛瓦凌宵若飛若翔如偃如仰栖息烏兔炫熀虹霓龍然而縈霞然而橫望之者莫不神駭而氣聳目眙而魂驚其始也咸謂冥助似非人力其外則繚以長隄凡二十六里或因江以為塹或鑿地以成濠則方城為城漢水為池又何以加焉是知摩壘者不復矜其能擊柝者足以抗其敵所謂能禦大災能捍大患者也其舊城周而復始蓋八里髙厚之制大小之規較其洪纖可得而辨矣况乎扼東都會襟帶地形險易之狀斯呈強弱之方可見自秦惠王疏翦山林以通中夏及李冰為守始鑿二江以導舟楫決渠以張地利斬蛟以絶水害沃野千里號為陸海由冰之功也漢文翁置學校勸人受業行俎豆獻酬之禮於是儒雅之風作自威武伐叛擒大憝而新其人玉石不得俱焚焉西蜀至今稱之駢之來鎮肇興武備俶有禦衝之事夫然後不為外羌之所窺矣惟蜀之人自冰與翁自威武暨駢乃獲佑於天者四天之於蜀厚矣長雲斷岸莫得而墮古往今來何常能覿傳不云乎人保於城城保於德觀駢之政可謂保城與人矣向非挺生俊傑來弼聖神則孰能建絶代之遺功創一時之偉績者乎况夫髙不可踰堅不可觸俯瞰天表方駕馬足銷吞祲沴互壓咽喉訖使豺狼耳之而色沮目之而膽褫是謂不爭而勝不戰而服者也新城成詔加大司徒封燕國公旌殊休也重以萑苻充斥荆楚傷夷遂假威望兹用底寧弓矢専征銅鹽劇任安危攸繫一以委之往哉荆渚荆渚既清又徙金陵金陵以平救鄢郢之剽殘拯江湖之焚溺期月之內罔不樂康若乃考其才稽其用所至難息所施利興智無不周技無不逹韜鈴捭闔固自生知詩禮幾微雅當師逸雖羽書疊至應用如神加以詞鋒莫前筆力遒徑屢獻平戎之策每陳憂國之誠抑又城府坦平器宇沖邃祿利不盈於私室夙宵無怠於公家段熲在邊未常蓐寢羊侃待士靡顧囊裝涯岸不可得而臻波瀾不可得而際矣所謂社稷柱石川嶽英靈者也則知駢如何臣城如何功嗚乎天贊其謀地襲其固非吾君不能用其材非臣誠不能就其事故曰為可為於可為之時則勳乃見城由駢而成駢由君而聲城既牢矣人既休矣宜乎讚盛德之形容敘勳賢之丕烈恭以操觚載事作者為難臣非其人何以稱此將欲刋諸貞石置彼坤維垂於無窮期乎不朽屬詞愈拙染翰增慙銘曰惟蜀之疆抱擁岷梁斗絶諸夏裂為一方啓逹上國肇自秦強壯者五丁導彼青冥鑿巖而梯飛棧以行動猶鳥逝舉若猿輕漢人既遷言語乃通眇邈千祀遂參華風界彼邛須靡設鍵關在古侵殘彼蜀之艱唐被聖德間仍凶慝猖狂逾紀吞噬無已芟獮焚驅氓不寧居皇帝踐祚驚嗟震怒爰擇藎臣推轂以付時惟燕公撫俗訓戎碩畫宏規神輔其衷經始新城心術潛形乃告編人版築云興相彼井鄽觀於封部調茲郡邑量其戶賦劃界指期莫敢踰度蜀人未安待城以歡蜀士方危待城而威阡陌繩直門閭棊布外聳風雲內扃貔武卉木蔥蒨麗譙輝映戎馬夜寧戈鋋畫靜蜀山嶅嶅蜀江滔滔寇不敢窺人不知勞險而不煩峻而不譁去來出入嬉嬉一家燕公之德其誰與鄰燕公之功式利於人德入人深公流不極勒名天隅為臣表則中和四年記李昊創築羊馬城記粵若蠶叢啓國魚鳬羽化於湔山望帝開基鱉靈復生於岷水然則疏鑿巫峽管鑰成都而猶樹木柵於西川跨土田於南越其後兼并梁漢睥眤巴賨獵騎奔馳會秦王於褒谷石牛來去闢蜀路於劒門空驚化玉之微寧獲糞金之利爰自朔分秦厯聲接華風代有雄豪迭為侯伯運當奇特子陽乘虎踞之機時運非常昭烈負龍蟠之勢若乃張儀之經營版築役滿九年楊秀之壯觀崇墉功加一簣洎我唐臨御聖德昭融武威雷駭於百王文德日暉於四海惟兹益部扼彼邛關蒙王坦綽時或窺吾臥鼓覘我韜戎彎弧學射之山飲馬沈犀之水纍朝是忘逸樂深軫殷憂夢卜良臣控彈巨屏南康王以儒術柔服教習詩書燕國公以將略威懷淬磨斧鉞息波瀾於錦水創制度於羅城踰百雉之恆規補一隅之闕事有備無患庇蜀人以金墉避亂蒙塵安僖皇之玉輦雲蠻稽顙遣使來朝航滇河以獻珍越沈黎而納欵當廟社阽危之際鑾輿出狩之秋坐制南荒終無北冦乃燕公之力也往以蒼穹告變天祿中微夷門方轉其斗魁王氏遂分其鼎足既而莊宗繼絶皇祚甫興靈旗西指於巴庸蜀主東朝於伊洛先帝以初復地方懷逺人須仗權謀乃眷勳戚於是詔飛丹鳯召何晏於并門節立蒼龍封杜悰於井絡即我太尉侍中平原公分茅金闕受瑞彤廷帳移竹馬之邦輪輾木牛之路星馳十乘霧廓三川宣皇風於上事之初慰人望於下車之日且以城邑自經尅復勢尚搔搖公來如太華之安帝寄得磐石之固益民多福而遇賢侯公曠度涵空英風擴古襲門胄則重侯纍將保勳榮則帶河礪山會族而象簡盈牀奕葉而貂冠滿座其為盛也無得名焉頃者鼓鼙未息干戈日尋公是時斡運璇樞端持瑶鏡贊神謀於不測斷人事以無疑獻替經綸折衝樽爼決勝廟堂之上制敵掌握之間借筯為籌舉無遺算內則翊戴天子外則承寧諸侯言正色莊有犯無隱成少康祀夏之德弼光武興炎之功再造巨唐削平新室厯數允集神器知歸皆由公叶和元勳光輔洪業是知取威定霸崇文教以興隆安上治民修理容而鎮靜足以神交旦奭事牟平參力致大同宜亨廣運以之首揚紅斾式遏錦川古有遺機待乎作者公鎮臨之始年運興之四載也嵗在丙戌春正月十有一日伏鉞而至無何期月逆師康延孝自普安竊兵版亂矯詔窺覦犯我鹿頭營於雒縣勢將率衆必冦近郊公曰清野待敵於民何罪堅壁而守謂我無謀况城雖大而弗嚴隍已平而可步衆情憂洶公意晏如飛羽檄以會兵伐林木而立柵森然棨戟密爾橫簫環以深溝屹如斷岸五日之內四面尋周民一其心士百其勇於是精選將領分部熊羆電激妖巢火熏狡窟一鼓而元凶氣喪載攻而同惡疲頽擒鄧艾於轞中斬龎涓於樹下長蛇碎首封豕析骸獻捷功於王廷掃逋穢於侯甸一除牙孽大定疆陲公於是提振紀綱恢𢎞典法六條已正七德兼修言出令行家至日見未幾先皇厭世今上纂圖聖政維新睿思求舊不改山河之寄永繄社稷之臣一年而加珥貂再除而升掌武將軍幕下列虎豹之瓜牙丞相府中集鴻鵠之腹背猶且爵盈而不飲肴乾而不食診療生靈討論獄訟固以忠為令德孝出因心力奉國家勤修職貢琛賮縈紆於劔棧包茅旁午於玉京史不絶書府無虛月閲其庭實標出羣芳推晉文尊奬之誠紹齊桓糾合之業天子得以居南面之貴銷西顧之憂萬里長城岋然存矣公一旦謂諸將吏曰夫華陽舊國宇內奧區地稱陸海之珍民有沃野之利郭郭則樓臺疊映珠碧鱗輝江山則襟帶牽連物華秀麗閭閻棊布鄽陌駢羅不戒嚴陴是輕武備耳亂臣賊子何嘗不窺南詔西羌曽聞入冦將沮豺狼之意須營羊馬之城吾已揣之衆宜叶力封章上奏揆日量工分界繩基辨方畫地百城酋壯呼之響答以雲來十萬貔貅令之風行以霧集杵聲雷震版級雲排王猛鬻畚於城隅傳説飛鍬於巖下公間日巡撫役者忘疲周給米鹽均頒牢酒如般五丁之力才踰三旬而成克就厥功不愆於素逺而望也象衆山之迤邐俯而瞰也若峭壁之斗懸掘大壕以連延增長隄而固護鷙鳥摶兮可越武夫勇兮莫干摩壘者諒之摧心守陴者由之示暇舊城崢嶸而後竦新城崨嶫以前蹲重門開而洞深危樓互而翼展至若八月之江澄寒碧七星之橋架晴虹偉乎津梁成兹壯麗公以羅城雖設智有所虧重築大敵鎮於四角嶔岑挂兔㟮屼栖烏儼樓櫓於泬寥懸刁斗於天表其東南也直分象耳回眺峨睂雲霞斂吳楚之天煙水送黔夔之棹其西南也旁連玉壘平視金隄宵瞻火井之光曉望雪峯之彩其東北也樹遙雲頂氣鬱金堂雨收而壘嶂屏新靄薄而重巒畫暗其西北也襟袖廣漢肘腋天彭魚龍躍萬嵗之池鸞鶴舞陽平之化其或碧雞啼曉金馬嘶風擁旄戟以登臨覩山川之形勝有以見公心同軒鏡竄讋鬼神手秉漢鈞錙銖造化能於昭代樹此豐功鄙金甌為漏巵小鐡甕為几器其興也已當農隙其罷也不害蠶時帝旨咨嗟王綸奬録詔書敕知祥省所奏重修葺當府城池已取十二月一日興功事具悉鄉寵分玉節榮鎮錦城守富貴以無疆慕功名於不朽特峻金湯之固以威蠻貊之邦况屬年豐復當農隙既暫勞而永逸尤預備於不虞益見廟謀允符朝寄省閲陳奏嘉嘆殊深公猶歸善於君讓功於下諸軍馬步軍都指揮使光祿大夫檢校太保守彭州刺史上柱國李仁罕左廂馬步軍都指揮使金紫光祿大夫檢校司空守漢州刺史上柱國趙廷隱右廂馬步軍都指揮使金紫光祿大夫檢校司空守簡州刺史上柱國張知業等家傳義烈世襲丕勳托弓而霹靂聲乾揮劔而魚麗陳破曹景宗鼻頭火出薛孤延髭尾煙生英毅無儔智謀咸博左都押衙金紫光祿大夫檢校司空守蜀州刺史上柱國潘在迎等或鼎鐘盛族或書劔名門佩鞬執弭以從戎憑軾搴帷而至理至於華皓不墜忠勞是能領袖雄藩表儀會府而皆躬臨卒列統攝庶工無揚干之亂行絶趙羅之辭役眀興晦息日就月將巨績告終羣才叶贊自天成二年丁亥嵗十二月一日起工版築至三年正月八日畢手公再飛章上奏詔曰敕知祥省所奏修治城壕畢功事具悉百堵皆興四旬而畢亙羅城而雲矗引錦水以環流外禦蠻夷中權帷幄公家之事相業可觀備覽奏陳殊甚嘉奬於以表綸綍褒揚之寵知朝廷倚注之恩其新城周圍凡四十二里竦一丈七尺基濶二丈二尺其上濶一丈七尺别築陴四尺鑿壕一重其深淺濶狹隨其地勢自卸版日構覆城白露舍四千九百五十七間內門樓九所計五十四間至三月二十五日停運斧斤其版築採造軍民共役三百九十八萬上其執事糇糧及役罷賞賚斗支稱給緡貫囊裝其數凡費一百二十萬其諸將大校出良駒於皂棧解重帶於腰圍選其纖柔釋其好玩曽無顧愛一以頒酬其縣大夫及寮佐以下或賞之器帛或給以緡錢咸有等差不無均普公即奢從儉節事省財馬如羊而不入私門金如粟而不藏私橐悉肆公家之利盡充工事之資圖有謂之功非無度之費也公誠欲為而不載朴而無文衆意未然牆進固請四民喧闐於衙閫萬口號沸於階墀父老曰公侯政洽神明慈如父母前年定延孝之亂今嵗防蠻蛋之虞盡力城隍務安井邑遂使我等保家庇族養老寧沖如是者功德在民憂勤報國安可不敘述休烈雕篆貞珉豈不美歟何容辭也公謂諸賓佐曰抑聞乘人之約義士猶或不為貪天之功智者宜然不取所修邊備式耀國威將欲罄臣節於一時彰帝猷於萬古殊非己力難遏人情誰當遊夏之才請紀見聞之事昊相門牢落堂構蕭條翁歸文武之材明時待間茍息忠貞之志暗室不欺寐酣而白鳳昻藏染翰而墨龍夭矯嗟乎鄧禹秉鈞之嵗雖慶承家陸機赴洛之年不堪觀國空餘壯節退卜良知驅車幸返於故園提筆謬登於華館金臺玉帳敢差俊彥之肩緑水紅蓮獲繼鵷鸞之踵酷慚薄技莫贊雄猷杜征南以矜大平吳沈碑漢水竇車騎以章明出塞勒碣燕山猶能炳著簡書發撝功業寧偕巨制永固坤維尚乏黃絹之辭孰拂白圭之玷受恩稟命紀事表年巍巍乎不騫不崩何患於為陵為谷四川通志卷四十欽定四庫全書
