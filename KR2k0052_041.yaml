body:
  text: 四川通志卷四十一藝文記宋彭乘修玉局觀記一氣委於化觀化則歸無萬物生於無本無而為有由是物物自别事事自分不為而成其用弗匱形上形下非柔非剛廣包太虛微在毫末吾不知物各自造而造物者有主耶抑自然爾自然為性虛無為體其道也歟道之用可勝言哉在天地為動靜而無動靜在日月為晦明而無晦明在雷霆為響震而不響震在山河為融結而不融結在四時舒慘為變而不變在百榖草木為生而不生在八音為和而不聞在五色為彰而莫覩其於人也為誠明之性視聽言貌焉非天下之至通其孰能與於此乎且人在道中道在人中人全道用而能體法雖不聞見觀萬物而索之反照自然原其所感無所執繫強為之名名有所宗宗其所自也是以名迹分焉名迹分而異途顯故物物紛擾靡所定例人而無别與飛走同故聖人則乾坤明上下順其節因其和而明禮樂禮樂之用其在人神人神必有所宗故壇墠以興牲器以設宗廟以制嶽瀆以崇虞書之始曰禋洪範之陳曰祀必有其具乃能其事焉斯蓋人倫之宗政教之始俾人有所向神有所居凡功施生民必盡崇祀實敦本也道為物始不其本歟功德之大詎可名述彼宫廟之列抑由此焉雖三洞九宫杳在上清之境太微紫極自居無色之鄉彼常有聞或難致詰惟太上混元上德皇帝體自然之運本無始之宗探象帝之前立先天之化武丁之世誕質厲鄉柱下同塵函關演教以恍惚離形質之表希夷非視聽之端託有寄無申明大道將令萬物自化統歸衆妙之門百姓樂推默契不言之教其德也博其用也澗然後各復歸根反其所自故曰消則為氣息則為人非謂妄惑之言蓋徴教化之極將見寂寥妙本澄湛淳源修身者去甚去奢治國者無為無事亦猶虙犧畫卦兩儀之德方明孔子立言百王之法斯在夫如是非崇嚴廟貌豐潔精誠日月所臨咸為崇奉其可得乎至若飛布雲霞穹崇土木深模絳闕邃狀丹臺彼積陽華此取大壯止欲極誠於道而率人趣善焉非為禍福報應而設爾益州玊局化者二十四化之一也傳云後漢永夀中老君與張道陵至此有局腳玉座自地而出老君升座為道陵演正一之法既去而座隱入地因成洞穴故以玉局名之矧當坤維奧區輿鬼之分墨池石室旁資古勝之蹤岷山導江逺供清粹之秀樓臺屹峙俯瞰郡城紀厯寖遙基構斯在皇帝實崇慈儉業盛盈成以清虛為宴遊以朴素為玩好八元授職五老賡歌耕鑿熙熙莫知何力跂喙蠢蠢但樂至和崆洞攸軫於順風赤火久全於罔象豈止格心黃屋讓德紫庭至誠感通天人合契故真祖示儲靈之應寶符錫無疆之休誕告成功備修墜典祗肅法駕躬謁真源崇懿號以示尊嚴率含靈而底清淨俾物自化與道同功自然三辰駢珠璧之光五靈為池藪之物域中四大貫而一焉有以見遊泳淳和出處沖妙皇帝之理指掌而窺乃詔寰區溥崇靈宇將俾混元之道赫赫巍巍知府諫議大夫集賢學士凌公以命世之才布移風之政盡易象黃裳之美得詩人溫玉之稱輟自諫垣臨兹藩屛教化周洽仁惠式敷誠格於民民咸知勸和樂之至屢為豐年庶俗既康郡政以簡故靈勝之迹時忽駐遊睇其弗臧必見完葺斯化密邇府署制度僅存自東漢權輿皇唐崇飾王氏竊據廣其闉闍壞此殿堂并為內禁尋與府庫悉為災焚後主因其舊規復創祠宇循其功力亦匪恢宏逮將百齡頽毁相繼不可終否屬於昌期公以國家詔被溥天誠歸真教聿遵虔奉將務增修飛章上聞詔允其請揆之以日作於此宫除舊創新闢小為大工無巨細罔不經心人之悅從匪懈其力東西廣七十七步南北長七十五步中建三清殿七間東廂三官堂鎮樓暨玉局祠屋西廂九曜堂太宗皇帝御書樓并齋廳厨庫門屋周回廊宇共一百三十五間丕變槐檀畢新棟宇奢不踰制儉而中規不妨農時不勞民用自然赤城在目何須紫府遊神臺殿霞明想像金樓之影松蘿霧鬱依稀李樹之隂壯麗規模率若神化非我公罄心悉力遵奉明詔曷以臻於此乎化主浦若谷克嗣焚修偶兹興創愈宜精確以永增崇且將紀歲時俾存金石式揚巨績宜屬鴻才乘識有津涯文無經緯狂簡類吾黨之子研精非道家者流照靈府以晶明未分日月豁丹田而曠蕩莫貯乾坤強索空筌仰遵嘉命濡毫扣寂良愧斐然大中祥符八年十二月日記張詠益州重修公宇記按圖經秦惠王遣張儀陳軫伐蜀滅開明氏卜築是城方廣七里從周制也分築南北二少城以處商賈少城之迹今并湮沒命郡曰蜀郡自秦至漢民戶益繁改郡曰益州由漢至唐逆順增損出諸史牒此不復言隋文帝封次子秀為蜀王因附張儀舊城增築南西二隅通廣十里今之官署即蜀王秀所築之城中北也唐明皇幸蜀升為成都府唐末政弛諸蠻內冦髙駢建節即時驅除以為居人圍閉多縈腫疾始築羅城方廣三十六里清逺江元在州前築羅城開移今所顧城之大小足以知四民之治否朱梁移唐鼎逺人得以肆志王建孟知祥迭稱偽號乾德初王師弔伐申命參知政事吕餘慶知軍府事取偽册勳府為治所淳化甲午歲土賊李順據有州城偏師一興尋亦殄滅是年降府為州危樓壞屋比比相望臺殿餘基屹然並峙官曹不次非所便宜至道丁酉歲詠始議改作計工上請帝命是俞仍委使守以董於役其計材也先二年討賊之始林箐隂深多隱亡命詔許其翦伐以廓康莊得竹凡二十萬木椽二萬條賊亂之餘人多違禁帝恩寬貸捨死而徒又以徒役之人陶土為瓦較日檢工人不告倦歲得瓦四十萬新故相兼無所闕乏毁逾制將顛之屋即棟梁桁櫨之衆不復外求乎屹然臺殿之址即磚礎百萬之數一以充足其計役也得繫岸水運二千人更為三番分受其事夏即早入晚歸當午乃息冬即辰後起工逮申而罷所以養人力而護寒燠也自夏徂冬十月工畢無遊手無逃丁所謂不勞而成矣其計匠也先舉民籍得千餘人軍籍三百人分為四畨約旬有代指期自至不復追呼由臺殿之土資圬墁之用與夫塹地勞人省功殆半其東因孟氏文明廳為設廳廳廊有樓廳後起堂中門立戟通於大門其中因王氏西樓為後樓樓前有堂堂有掖室室前回廊廊南暖廳屏有黃氏名筌畫雙鶴花竹怪石在焉衆名曰雙鶴廳次南涼廳壁有黃氏畫湖灘山水雙鷺在焉其畫二壁洎鶴屏皆於壞屋移置因名曰畫廳涼暖二廳便寒暑也二廳之東官厨四十間厨北越通廊廊北為道院一廳一堂厨與道院本非正位蓋撙減古廊二礎之外蜀地所安也涼廳西有都廳廳在使院六十間之中所以便議公也院北有節堂堂北有正堂與後樓前為次西位也節堂西通兵甲庫所以示隱故也涼都二廳南列四署同寮以居前門通衢後門通廳所以便行事也公庫直室客位食廳之列馬廄酒庫園果蔬流之次四面稱宜無不周盡疏篁竒樹香草名花所在有之不可殫記東挾戍兵二營南有資軍大庫庫非新建附故書改朝西門為衙西門去三門為一門平僭偽之迹合州郡之制允謂得中矣不損一錢不擾一民得屋大小七百四十間二營不在數有以利事矣若俟木朽而後計役耗官損民何啻纍百萬計州郡興修無足紀録且欲旌其削偽為正無惑逺民使子子孫孫不復識逾僭之度耳給事中判昭文館事安定梁周翰係曰夫九州之險聚於庸蜀為天下甲也五方之俗擅於繁侈西南為域中之冠也多獷驁而姦豪生因龎雜而禮義蠧故朝廷精求良牧憂在逺人每難其材頗精厥慮亦時有違咈上意侵鑠下民理絲而數棼澄水而屢撓公屬賊鋒肆虐之餘主將驕兵之後收其汚染滌惠澤以天波拯其傷殘示大造於聖詔萬族有其生意比屋返其營魂伊公之推心合主上素志顧公府之故治皆為政之遺基乃削大壯之宏規俾循列郡之常式不勞弊於民力不糜散於國財末歲云周民觀驟改凡視事之所洎燕勞之堂寮吏之所休遊賞之所適竹樹花卉所至畢臻自韋南康矯悍之餘孟知祥僭悖之後共安其過習以成風若今之所營實驅以合道輕浮潛厚凶狡寖仁循吏所能允克皆踐茍採訪之吏亟以狀聞而疇庸之急遄當下霈參三事之庶政翊大君之鴻猷休泰之辰恢闡益威乃中外之同詞也周翰柴愚有素顔鑄寧希自罷禁林出判上館漸迫老傳之齒復多負薪之憂滯思本微小才疑盡逺承延矚久未稱懷蓋明公語營繕之源敘致周密垂勸戒之旨通協神聽止以寵示知文便為昭代之式輒書後係聊贊元功時學士侍郎授代歸朝之年撰行之日周翰謹述於髙碑之隂云景德二年記張俞華陽縣學館記三代之學由秦廢蜀郡之學由漢興而天下之學由蜀起歷漢至宋殿室畫像古制盡在則蜀之學其盛逺矣哉始唐之衰侯王怙亂崩裂區宇蕩削典法民擾厥命不盜則兵仁義禮樂於世何有惟孟氏踵有蜀漢以文為事凡草創制度僭襲唐軌既而紹漢廟學遂勒石書九經又作都內二縣學館置師弟子講習以儒逺人王師既平蜀仍而不廢華陽縣學館者偽廣政十二年作逮今一百餘載矣棟撓墻圯鳥鼠攸居新進晚生陋而不顧有𢎞農楊安之為縣甚治慨念墜學裒羣士財因而新之事未克究得江東沈扶來承其政益用儒雅要歸於道興學飾像嚴翼堂宇上以遵朝廷之制下以成楊君之故也惟華陽理於州內而州故自有漢學前樂安蔣公既已大之今平陽文公率而教之濟濟洋洋禮樂流衍縣鄉之學亦從而興上動下效風化柔靡可追古治可表後式長世不墜惟賢是執宋慶厯四年楊君始修之後一年而沈君克成之又一年晉人張俞為之記望岷亭記凡為亭觀池臺於得勝之地則雖無山川而曠無江海而間况郫城據岷之陽繚江宅川自古都邑故有叢亭之勝山海備焉今邑大夫安定胡君自江南來從兹遊觀然憾尚有餘勝鬱而未揚會方牧廣平公命作縣之重門門臨間田盡歸蕪穢植為西園遂作大亭號曰望岷是亭西至岷山百里而近蟠地鬱天萬峯連延終古孕碧擁臨三蜀其望伊何春雲始波崑柔䦘藹涵蔚瀛海火宇無隂萬木交蒸重巖沓嶂倚雲峩冰秋空凝輝秀車天骨朝陽夕月異態殊色寒日慘烈時見城闕三峯含光隱射天末此望氓之大槩也故君子望之則目益加明形益加靜心益加清故可以脫拘攣之域入道義之庭清靜無為而治功日成矣茍使小人望之則目若加盲心若加昏俯仰悲戚蹙其本生有若越人之視章甫海鳥之聞鐘鼓豈其性哉俾之違義冒利入於刑死則欣然自謂登蓬萊棲崑崙之不若也奚肯謂峩山之尚可望耶然則岷峩之靈秀亦烏為小人而設也以一山而推天下之理則君子小人之道亦若是焉而已爾胡君字希逸強明公潔治遂無訟且觀前宰長樂馮君道元修叢亭之事復大修之又特作斯亭可以見志某遂為文以示愛山之君子田况進士題名記蜀自西漢教化流而文雅盛相如追肩屈宋揚雄參駕孟荀其辭其道皆為天下之所宗式故學者相繼謂與齊魯同俗然世有治亂化有隆薄士之出處貴賤實繫於此唐季五代政紀昏微斯文與人幾至墜絶國家之起海內統一堯文舜明寖昌以大其設科考士擢取之多則前王之所未有益州自太平興國以來登進士第者接踵而出天聖景祐中其數益倍至慶厯六年一榜得十八人皇祐元年得二十四人他州來學而登第者復在數外其盛也如此豈非世化治隆人隨而興乎主學者議建榮名堂於宣聖殿之東北盡題皇朝及第進士名刻於石柱以示來者豫喜聞而遂其請又為之序時皇祐二年五月一日也古柏記成都諸葛孔明祠古柏年祀寖逺喬柯巨圍蟠固凌拔有足異者杜甫嘗作歌段文昌亦作文摹狀瓌竒人多諳誦故老相傳及記事者云自唐季凋瘁歷王孟二偽國蠧稿尤甚然以祠中樹無敢翦伐者皇朝乾德丁卯歲仲夏枯柯復生日益敷茂觀者歎聳以謂榮枯之變應時治亂武侯光靈如有意於兹者誠為異哉因命工圖寫備述本末以貽好事者自三分訖今八百餘齡矣吕陶經史閣記蜀學之盛冠天下而垂無窮者其具有三一曰文翁之石室二曰高公之禮殿三曰石壁之九經蓋自周道衰微鄉梭廢壞歷秦之暴至漢景武間典章風化稍稍復講時文翁為蜀郡守起學於市減少府用度以遺博士諸生受業京師招子弟為除繇且以補吏或與之行縣民用向化幾比齊魯自爾郡國皆立學實文翁倡之所謂石室者存焉至東漢之季四海板蕩兵火相仍災及校舍絃誦寂絶儒俗不正興平中郡將陳留髙瞬修舊補廢作為廟堂模制閎偉名號一新所謂禮殿者見焉及五代之亂疆宇倒裂孟氏茍有劍南百度草創猶能取易詩書春秋周禮記刻於石以資學者吾朝皇祐中樞密直學士京兆田公加意文治附以儀禮公羊穀梁傳所謂九經者備焉始漢景末距今凡十六代千二百四十餘年崩離變革理勢不常而三事之盛莫易其故然則冠天下而垂無窮非夸説也考實以議也惟經史閣之成基勢崇大棟宇雄奧下視衆屋匪隘即陋聚書萬卷寶藏其間斯亦近類三事傳千百年而不可廢者乎龍圖閣直學士濮陽吳公因其成也會寮佐與蜀之士大夫及其講師徒弟凡若干人飲酒以落之德風洋洋頌聲愈愈布宣於一方有若闕里弟子集杏壇之下歌詠先王道德而歸諸聖門又若魯侯至泮水之上國人望其車旗和鸞而樂見之視其顔色笑語而有感思向化之意嗚呼其盛矣哉公純誠好善治有本末所至以勸學為先見一士可以語道誘進之常若不及乃詩人所謂能長育人才則天下喜樂之也陶於是推明公意而言焉夫治性修身以及國家天下大略本之仁義其文莫詳於經監見古之人注措發施正邪粹駁與其生民幸不幸其迹莫著於史世之學者不矜誦數而率履其言不競多聞而慎擇其是則為有得亦庶幾善學歟初閣之營建皆幕府太常博士王君霽為之謀君修潔有文嘗典吳興郡學挈其規範來遺諸生匪獨諸閣也陳臯杜宇鱉靈二墳記戰國時蜀災昏墊杜宇君於蜀不能治舉荆人鱉靈治之水既平乃禪以位死皆葬於郫今郫南一里二冢對峙若丘山獨鱉靈墳𨽻淨林寺寺僧平其崇為臺觀隱士張俞懼其遂湮沒請於郡而碑之因置祠其上使杜宇岡勢相及宇之墳尤盤大民災畬之其來逺矣皇祐壬辰春淨林僧死寺籍為田許氏墾甸而鱉靈墳與寺俱化為民畝張俞聞之建言於縣尹虞曹外郎郭公公愀然動色駕而省之明日進士杜常等五十八人以狀理於庭公報曰昔者七國相殘生民肝腦塗地獨杜宇亡戰爭之競有咨俞之求以拯斯民雖鱉靈成洪水之功微宇不立議其賢則杜宇居多載其烈則鱉靈為大二人嗣興其舜禹之業九之一焉况勤民禦災皆載祀典微此則古之聖賢暴於原莽而吾不之知矣於是具不可籍之議聞於郡郡嘉其請俾復其寺訪名僧以主之得景德寺禪者垂白焉白好靜退能禪寂邑人所嚮仰公於是命之因盡域二墳𨽻於寺命刻石志其事庶來者知二人有大造於西土宜與惠無窮皇祐四年九月草四日記何涉墨池凖易堂記道昧於叔世而白於盛時迹毁於無知而伸於有識蓋其常爾揚子雲歷漢哀平新莽際號為名儒聲光馮馮雖千百年亡輒衰貶有宅一區在錦官西郭隘巷著書墨池存焉後代追思其賢而不得見立亭池端歲時來遊明所以景行嚮慕入魏晉李唐其間興衰如蠓薨薨如蠅營營侵晦歡譊之聲未窮而氏姓俄變獨子雲之宅巋然下據不被廢撤亦足以信其材度藝學為世所仰也王德數盡中原潰喪王建由草竊進攘蜀土僭立稱號用淫虐暴恣以成其一切固不暇識所謂揚子雲果何人也宅與墨池垣入官界為倉庾地至知祥昶世及皇朝仍而弗革淳化甲午李順冦始亂放兵燒掠隆隆積廪化作灰阜賊平主者因其地改創營塢以休養卒徒環堵儒宫彌益汙辱慶厯丁亥今相國集賢文公適為是都尹有中興寺僧懷信詣庭言狀公歎惋纍日命吏尋遺址畫疆以還其舊然屋已名龍女堂池復湮塞淟涊時方議蔬葺而公遽迫入覲事用中寢明歲戊子提刑司田郎高侯惟幾乘間獨至睹荒圮渺莽咨嗟久之且言子雲八十一首十三篇逮它針頌其辭義奧逺山生澤浸上與三代經訓相褾襮士大夫不通其語衆指以為孤陋用其道反絀其迹如聳善救俗之風將墜地弗振何退諭賢僚名卿斂俸餘以圗經構知尹直樞密程公學據壺宧人推宗師扶乘颷流敦尚名義聞而説命取良材充助其用都人士逮田衣黃冠師雖平時叛吾教訓他説以自誇者亦歡欣忘劬來相是役辨方審曲率有意思直北而堂曰凖易繪子雲遺像正位南嚮諸公儀觀列束西序池心築臺置亭其上曰解嘲前距午際軒楹對起以須宴會曰吐鳳竒葩雜樹移置交帶垂苕森列氣象藹藹三月晦凡土木黝堊之事畢成君子謂髙侯是舉也扶既廢補久闕其激勸風旨雖古人不過矧夫資識端亮學術雄富若導積石引長河愈久愈洪無枯涸慮文章麗密據法裁詖若衣藻火以退塗服故舉動建置皆可師小子不文承命恐悚謹為之記時慶厯八年宋祁文翁祠堂記蜀之廟食千五百年不絶者秦李公冰漢文公黨兩祠而祀冰為蜀鑿離堆遂捍水以溉民田溉所常及無旱年西人德之因言冰身與水怪鬬不勝死自是江無暴流蛟蜃怖藏人恬以生故侈大房殿歲擊羊豕雉魚伐鼓吹籥傾數十州之人人得侍祠奔走鼓舞以娛悅神祝已傳嘏而後散文翁之治蜀開學校以詩書教人澡刷故俗長長少少尊尊親親百姓順賴其後司馬相如王褒揚雄以文章倡張寬以博聞顯莊遵李仲元以有道稱何武入為三公漢家號令典章赫然與三代等蜀有儒自翁始班固言之既詳矣初翁為禮殿以舍孔子及七十二子之像殿右廡作石室舍翁像於中晚漢學焚有守曰髙瞬能興完之後人又作瞬像進偶公室歲時長吏率掾屬諸生奉籩豆饔醪薦於前虔跽謹潔一再奠而退辭無敢不信焉冰以功翁以德功易見德難知故祠雖偕而優狹異焉嘉祐二年豫知益州往款公祠至則區位湫湢埃蝕垢蒙不稱所聞大懼禮益懈忽神弗臨享其明年乃占學宫之西改位鳩工弗亟弗遲作堂三檻張左右序及獻廡大抵若干間布尋以度堂纍常以度庭疏窗以快顯壯闔以嚴閉采有青丹陛有級次瓦密棟強若棘若飛乃肖公像於寧間繪相如等於東西壁本古學之復莫若瞬本今學之盛莫若右樞密直學士蔣公堂故繪二公於宧漏皆配祠焉於是擇日告成於神揖而升簠斚果酒脯修紛羅而有容可以造虔趍而降罍樽巾洗庭燎並施而不溷可以盡儀相者循循任者舒舒禮生於嚴廣靈妥於闃寂故也噫自公以來蜀之人自視若鄒魯宋興名臣巨公踵相逮於朝先帝時巨盜再作亂弄庫兵爭劒閣是時蜀豪英無一汙賊者羣頑愁窘不容喙而滅非人知忠家知孝使然耶所使然者不自公歟傳曰非此族也不在祀典公在之矣則是祠之作願自今而後無俾休息云祠之興同尚之賢則轉運使趙抃及提點刑獄使者凡三人賢輔之勤自通判軍州事祝咨以降六人營董之勞自兵馬都監毛永保而下二人咸畫像於西廂列官里於石隂銘曰公二千石兮守大邦冠峩峩兮紱斯皇出有瑞節兮車騎羅石室孔卑兮人謂何新堂翼翼兮耽耽庭廣直兮序巖巖吏奉神兮不譁神來此徒兮此其家儼羣賢兮並陳公所教兮如其仁庖魚脡兮爼肉鮮神來享兮憺寬延公教在人兮無有頗蜀賢不乏兮才日多俗祥順兮孝慈公祀百世兮庸可知治平四年記蘇洵張益州畫像記至和元年秋蜀人傳言有寇至邉邊軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰毋養亂無助變衆言朋興朕志自定外亂不作變且中起不可以文令又不可以武競惟朕一二大吏孰為能處兹文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍撤守備使謂郡縣冦來在吾無爾勞苦明年正月朔旦蜀人相慶如他日遂以無事又明年正月相告留公像於淨衆寺公不能禁眉陽蘇洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂將亂難治不可以有亂急亦不可以無亂弛是惟元年之秋如器之欹未墜於地惟爾張公安坐於其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繄以生惟爾父母且公嘗為我言民無常性惟上所待人皆曰蜀人多變於是待之以待盜賊之意而繩之以繩盜賊之法重足屏息之民而以砧斧令於是人始忍以其父母妻子所仰賴之身而棄之於盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意於法律之外以威劫齊民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘇洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲如何皆曰公則何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與鄉里之所在以至於其長短大小美惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故其思之於心也固由此觀之像亦不為無助蘇洵無以詰遂為之記公南京人為人慷慨有大節以度量雄天下天下有大事公可屬系之以詩曰天子在祚歲在甲午西人傳言有冦在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌場西人稽首公我父兄公在西囿草木駢駢公宴其僚伐鼓淵淵西人來觀祝公萬年有女娟娟閨闥間間有童哇哇亦既能言方公未來期汝棄捐禾黍芃芃倉庾崇崇嗟我婦子樂此歲豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂范鎮載酒亭羣公畫像記子雲古蜀人事漢成哀平世歷新室身絀而道不得行子雲沒宋興八十九年上距今千餘歲其鄉人之學者森然若林之植於畝其在太平興國中有若諌議大夫田公錫之論議參知政事蘇公易簡之博大雍熙淳化中有直昭文館陳公充直史館朱公台符之文雅景德大中祥符中有若侍御史張公及之介潔集賢校理王公湜之溫公職方員外張公達之疏達其在今慶厯有若虞部員外李公畋之經術翰林學士彭公乘之恬退孫公抃之厚重屯田員外陳君希亮戶部員外梅君摰殿中侍御史何君郯之直方度支員外郭君輔屯田員外張公中庸之通敏直集賢院李君絢之曠逺是皆子雲之徒學其道而得其傳者益州提點刑獄度支髙君既葺子雲之居鑱其書又畫其像以及其徒意者使後來觀之知賢人之道有塞有通有詘有伸塞於晦時而通於昭時詘於不用而伸於有用云爾蘇軾文與可篔簹谷偃竹記竹之始生一寸之萌耳而節葉具焉自蜩腹蛇蚹以至於劍拔十尋者生而有之也今畫者乃節節而為之葉葉而纍之豈復有竹乎故畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣與可之教豫如此豫不能然也而心識其所以然夫既心識其所以然而不能然者內外不一心手不相應不學之過也故凡有見於中而操之不熟者平居自視了然而臨事忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斫輪者也而讀書者與之今夫夫子之託於斯竹也而豫以為有道者則非耶子由未嘗畫也故得其意而已若豫者豈獨得其意併得其法與可畫竹初不自貴重四方之人持縑素以請者足相躡於其門與可厭之投諸地而罵曰吾將以為襪士大夫傳之以為口實及與可自洋州還而豫為徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可往求之襪材當萃於子矣書尾復寫一詩其略曰擬將一段鵝溪絹掃取寒梢萬尺長豫謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而已與可無以答則曰吾言妄矣世豈有萬尺竹也哉余因而實之答其詩曰世間亦有千尋竹月落空庭影許長與可笑曰蘇子辨則辨矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺豫曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令豫作洋州三十詠篔簹谷其一也豫詩云漢川修竹賤如蓬斤斧何曾赦籜龍料得清貧饞太守渭濱千畝在胸中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十二日與可沒於陳州是嵗七月七日豫在湖州曝書畫見此竹廢卷而哭失聲昔曹孟德祭喬公文有車過腹痛之語而豫亦載與可疇昔戲笑之言者以見與可於豫親厚無間如此也黃庭堅大雅堂記余謫居黔州盡書子美夔峽兩川諸詩遺丹稜素翁俾刻諸石使大雅遺音久湮沒而復盈三巴之耳素翁乃作髙屋廣楹以庇此石因請名焉余名之曰大雅堂仍為作記其略云由子美來四百餘年斯文委地文章之士隨世所能傑出時輩未有升子美之堂者况家室之好耶余嘗欲欣然會意箋以數語終以汨沒世俗初不暇給雖然子美詩妙在無意於文而意已至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖然而入其門耶故欲後輩自求之則得之深矣使後登大雅堂者能以余説而求之思過半矣彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草木魚蟲以為物物皆有所託如世商度隱語者則子美之詩委地矣四賢閣記忠州漢巴郡之臨江墊江縣也其治所在臨江故梁以為臨州後周以為南賓郡唐貞觀八年始為忠州其地荒逺瘴癘近臣得罪多出為刺史司馬故劉尚書以刺史貶一年死陸宣公以别駕貶十年死李忠懿公以刺史居六年白文公以刺史居二年其後州守以四公俱賢圖像為四賢閣故相贈司徒鄭州刺史南華劉晏士安故相贈兵部尚書嘉興陸贄敬輿中書侍郎平章事贈司徒安邑李吉甫宏憲刑部尚書贈右僕射下邽白居易樂天由開元以來訖於會昌四君子相望凛然猶有生氣忠民每以此自負而郡守至者必矜式焉紹聖三年正月知州事營丘王君闢之字聖塗下車問民疾苦曰吏驚而民困故聖塗為州拊養柔良知其飢飽鉏治猾姦幾於傷手治聲翕然邑中豪吏故時受賕舞文弄法者相與謀曰屬且無類即以智籠小騃吏羣訴於部使者聖塗不為變且嘆曰白頭老翁安能碌碌畏吏羞民耶亦會部使者察其為姦而聖塗治成時休車騎野次咨問故老詠四賢之逸事而三君之政寂寥無聞蓋士安即賜死而敬輿别駕不治民宏憲雖在州六年亦默耳樂天由江州司馬除刺史為稍遷故為郡最暇豫有聲爾又其在州時詩見傳東樓以宴賓佐西樓以瞰鳴玉溪登龍昌寺以望江南諸山張樂巴子臺以會竹枝歌女東坡種花東澗種柳皆相傳識其處所於是一花一竹皆放於詩復其舊貫種荔枝數百株移木蓮百十本忠於一時遂為三峽名郡聖塗乃以書誇涪翁曰為我記之涪翁曰聖塗急鰥寡之病使逺方沐浴縣官之澤可謂知務矣掃除四賢之室思欲追配古人可謂樂善矣樂天刺忠州於今二百七十九年在官者鰓鰓然常憂瘴癘之病已數日求去故樂天之遺事蕪沒欲盡聖塗齊人也蓋不熟巴峽之風土又其擊強撥煩材有餘地而晚暮為逺郡守乃敢慨然不倦興舊起廢使郡中池觀花竹鬱然如元和巳亥時追樂天而與之友聖塗於是賢於人逺矣董鉞制勝樓記蜀稱天下至險之國陸有劒門水有瞿峽設為兩關以扼秦楚之衝一夫當關百萬之師眥睨而不敢進五代之亂孟氏盜有其國垂四十年宋宅中土開一統之運而分遣王全斌出秦塞劉光義率楚師水陸並進而兩關俱不克守俘偽昶於闕下顧天命人謀有足勝其險者豫嘗客過劒門徘徊周覽切嘆太平之盛而警備濶略及承夔部之使而瞿峽適在部中其備往往加濶略於劔門乃請於朝曰夔州古雲安郡節度寧江軍舊治瞿峽之口景德中詔徙今治距峽口才八里實據上遊宜城夔以鈐截其險尋既報可會東宫舍人程君德孺來同漕事協濟其謀大合役於熙寧十年春正月之己巳而考以夏四月之甲午未幾尚書司門郎王君仲祥繇夷陵選領州牧行閲新城以規畫餘事得川圃故月臺者屹倚城側因展廣而增崇平接城面而方楹橫棟經構大備內疏軒檻以還月臺燕遊之舊而外嚴敵具以壯形勢一日豫三人者相與臨登其上四望羣山參差拱揖於雲煙縹眇之際而紫翠環合以為女牆之衛面有白鹽赤甲豆倉勝已卧龍馬嶺之列峭崒凌空而直上斷闕偃半而平削至於猱蹊鳥徑高下隱顯於荒苔秀蔓之間南顧江流遠經益都旁郡而斜引嘉陵之源雜匯以蠻鄉㺐社澗谷崖竇奔衝滴瀝之餘而夾以東西二瀼以當三面之壕而有三鈎之鎖八陳龍脊之灘與夫灩澦馬撲之變怒聲激石而洶湧晴影隨波而搖曵至於漁船商舸往來出沒於窮濆窊渘之側嗚呼江山之勝不亦盡得之乎是在物者也因而言曰物有勝形人有勝幾形吾所以致用於周也旋指顧之內而幾吾所以應變於無形不測之外宋肇三峽堂記三峽者乃總峽巫峽歸峽是也兹堂為巴東小遊快心娛目盡江山之勝然而一有登臨觀覽則景色雲物逡巡而異是皆人情參差不齊故使悲歡憂樂所得未嘗同也請試言其所以方其倚檻憑欄四顧逺眺長江急雨飄風怒號奔走轉石萬壑雷動驚湍駭浪喧豗震掉蛟鰐蜿蜒神怪叱吒若馬陵伏弩之射龎涓濰水決壅之擊龍且此西遊不得意之客方且隕心喪魄失筯停杯愕然而嘆也洎至瞬息之間一俯一仰雲煙變幻山川發露草花纖濃炳若繪畫松石竒怪旁出雜見巫峰髙唐想像髣佛襄王恍然而若遇宋玉斐然而成賦此西川行樂之士尚猶極目縱觀促席勸飲歡然而笑也逮其灩澦春深魚復漲緑風雨晦冥龍吟其下白鹽赤甲東屯西瀼斷崖奔峭安流逆浪逺近因依左右映帶則坐中能詩之流莫不擁鼻拄熲聳肩側身浩然而歌也又有沙岸石磧名灘古渡白帝武侯之遺迹永安八陳之故處荒煙野草廢宫舊戍逺樹平蕪孤村别浦牧童漁父棹歌牛唱深林巨谷重巖復嶺懸猿舞鶴飛鳴坐嘯則席上多感之士有至搔首撫膺掩袂沾裳泫然而泣也客有誚豫曰子作三峽堂記而有笑歌嘆泣之説子胡不忘是四者而付之一醉彼醉者劉伶阮籍之徒皆所以全其真而名後世者也子獨求異於數子乎余曰有是哉今幸不從監河侯貸粟則吾將以大江為飲凡雷雨之朝風月之夕所謂登臨觀覽行且無時而不往也亦不復問其悲歡憂樂之所來一寓諸酒矣尚庶幾有以自託於酩酊而厠迹二人之列也可矣客曰唯唯蒲宗孟重修至聖文宣王廟記夫茫茫渺渺浮於空虛運於兩間充牣於萬類而不息者天地之氣氣有順逆然而其施於物也無厚薄光明盛大橫於古今亙於日月籠絡於萬世而不絶者孔子之教教有興廢然而其被於人也無遠近氣無厚薄而百穀之成有不齊焉者過在播殖之人非氣之異也教無遠近而四方之學有不同焉者失在倡勸之人非教之弊也枯原瘠野可使為豐壤䎩鋤之不勤開鑿之不工地雖美求其茨梁之收嬉戲孺子皆知其不可禮義之不修忠信之不行人雖材求其聖賢之歸委巷小人皆知其不能告於人曰地不足殖而不耕是棄其地也告於人曰人不足治而不教是棄其人也棄地者將引而入於飢寒棄人者將引而使為禽獸飢寒至禽獸之性發何所不有今四方學可謂至盛而持其術者可謂不棄其人矣然猶教化之所浹風俗之所尚與其講磨養育之具獨完於京師浸漬於齊魯閩益而盛大於吳越惟夔為西南之陋當天下學者翕然嚮勸之時此邦之人尚不識書生慶厯詔郡縣立學今龍圖閣直學士廬江何公郯為郡别乘始能用文章理道感悟其俗於是人漸知讀書逮十餘年方有進士後又有以進士得科名者廬江公既去歷二十載傳至於今秀民稍稍輩出而為之倡者待其人尚如枯甬墝塉而䎩鋤闢鑿之不復加故窮歲月更寒暑終莫能豐乎所獲治平三年兵部郎中吳興陳公由三司判官出領本路轉運使入境之日悒然傷孔子之教不大被於一方乃下令風動諸郡使其守長招輯學子以德義錯磨其人守長承命不敢懈各飭僚吏以尸教誨夔州刺史長沙賈侯率先諸郡整治序宇完壞補缺設為規程郡之人喜聞而樂從日謀於其家告於其父兄奔走入學惟恐後時而不得羣於其間既至復勤詩書出入時又謀於其友告於其子弟率德勵行恥其身之不尊名之不髙而孝父忠君之説不間於耳日夜講解疲不知倦四逺之人執業而就學者交足在境學既盛諸生以孔子之廟庳隘毁墜階不容立堂不容處奠獻之際設席無地宿燎無所又謀於其鄉告於其常所往來而聞於郡曰汙宫敗室安足為孔子之所居而稱吾陳公所以尊事聖人之意耶願輸財以新之是年冬孔子四十六世孫以尚書員外郎來為轉運判官樂陳公之不鄙擯其人能均齊人之教剔刮愚瞶不以逺近為間使皆議忠信守仁義以自治也歡然叶力以終厥事又以其家之廟像及冕服之制合顔淵而下衣冠之飾授於刺史賈侯明年二月賈侯相址擇吉率其屬日從事於廟庭親畀匠指俾營俾構官工私庸雜作衆治六月廟乃成豐宇廣厦明敞廓大中嚴孔子之座冕旒服章悉用本朝之制而顔淵以下從燕居之儀翼侍左右并圖周漢以來及唐之大儒二十餘人於壁間籩豆罍樽盡易去舊器使就潔嚴諸生將考於新宫又謀於其徒告於其長有請於學官曰始者入於學懼無以承陳公之賜故羣趨而朋來既就講肆又恐無以謝陳公之教故勤行而力修術業既專所趨既明又嗟無以充陳公尊德事聖之意故率財以為廟今廟成而無傳諸生不任其責責在學官學官當有以施其職也宗孟曰然是誠學官之所宜為昔者魯作泮宫邦人是歌鄴侯修廟韓公有詩宗孟典領學事實司文詞其初其卒又皆與諸生遊泳於其間敢拜稽首刻詩廟碑詩曰夔於西南有國自昔人罕詩書士罕逢掖誰為豐腴獨此墝塉簡簡陳公初顧嗟戚曰人則然其瞶可剔教無逺近人自損益豈不在我示以標的使之得塗安往不適下令諸郡風動邦伯庶邦守長處命踧踖夔實有府庠序先闢方疏淵源灌溉枯脈旋不踰時芃芃其稷既穫既耘乃漸有獲公日來觀驄馬白額旗旐筏筏紫綬纁舄溫潤其音以勉其畫杠梁其湍以拯其溺與之酬揖升降同席與之坐起左右接膝匪棄伊教咸樂親炙四逺承風笈負墳籍爭來于夔奔走交迹人侈公惠衎衎晨夕相視廟貌毁墜頽窄曰吾聖人是豈來宅輦財輸金願就更革吉日辛卯爰始斯役衆工勤事不待繩迫衆板勤椽其均歷歷簷阿斯翬稜廉斯棘像貌有嚴堂塗有赫是奠是饗神降無射公來在廟禮容莊惕公來在泮笑語悅懌克明克嘉有警陋僻凡公之仁浸漬灑滌孰為父兄不舞公澤邦人孔懷懼或淪失學官宗孟實任斯責作詩記始以鏤金石吳師孟導水記蕞爾小邦必有流通之水以濟民用藩鎮都會顧可闕歟雖有溝渠壅閼沮洳則春夏之交沈鬱湫底之氣漸染於居民淫而為疫癘譬諸人身氣血并凝而欲百骸之條暢其可得乎伊洛貫成周之中汾澮流絳郡之惡書之濬畎澮禮之報水庸周官之善溝防月令之導溝瀆皆是物也按史記蜀守冰鑿離堆穿二江成都之中皆可行舟有餘則用溉然則成都水行其中尚矣自髙燕公駢乾符中築羅城堰糜棗分江水為二道環城而東雖餘一脈如帶潛流於西北隅城下之鐡窗涓涓然閏黷所及不能并蒙於一府歲久故道迷漫遂絶以故氣象枯燥而草木亦少滋澤其五門之南江及錦江二水之名最著而渠稍廣其汙瀦填閼或瀸或潐則編戶夾街之小渠可知矣間有鬱攸災以無水故艱於撲滅嚮雖以甕貯水為備然器小而善壤非應猝救焚之具故水不足用當平居無事時遑恤氣象湮塞之生疾而火災之為害歟自丞相吕公及今戶部尚書蔡公深惻民患欲尋故道以達之而所遣吏類皆茍簡不能體二公之意中作而罷今寶文王公勤恤民隱目睹水事􅍀然疚懷博訪耆艾得老僧寶月大師惟簡言往時水自西北隅入城纍甓為渠廢址尚在若迹其原可得故道遂選委成都令李偲行視果得西門城之鐵窗之石渠故基循渠而上僅十里至曹波堰接上遊溉餘之棄水至大石橋承以水樽而導之其水樽即中原之澄槽也自西門循大逵而東注於衆小渠又西南隅至窰務前閘南流之水自南鐵窗入城於是二渠既釃股引而東派别為四大溝脈散於居民夾街之渠而輻湊於米市橋之瀆其委也又東匯於東門而入於江衆渠皆順流而駛有建瓴之勢而無旁齧之虞回祿之患隨處有備又頗得以潄浣湔浣焉歲或霖潦脫有湓溢惟徹澄槽則衆渠立潐矣凡為澄槽二水閘三絶街之渠二木井百有餘所而民自為者隨宜增減不可遞數焉經始于仲春迄成於季秋言時計功盡如其素不妨民田不勞民力不逆地勢而興除無窮之利害古之所謂有功德於民者宜無間然彼王褒紀三篇之迹廉范播五袴之謡乃一時褒德之美言與夫千載澤民之實惠可同日而論哉謹書其事以備來者之詢考云文同梓州中江縣新隄記縣為江所環因名之其原蓋出於綿之龍安鹿爬山初若二帶其深才漸車至神泉始與諸谷瀵水會為一西至於羅江南至于陽平匯東南復吞旁流乃浩漾為洪波浮於縣之西郊歷坤隅勢頗壯猛南注折而東斗且閼遂㢋擊左岸土毳善崩歲歲內蝕若刳以刃若掃以帚邑人懦恐弗安厥居治平二年春河內廖君子孟為之令將解去尚防遺弊及此即行視嘆曰是將禍于後者夫吾不為地陂而民魚有日矣於是料材課工趣之成期補垣墊漏填築堅垍以循公而推乾之其夏大雨洚潦屢集至此力不勝乃逶迤讓行復走故道積填纍塗隱為金隄望之岌然直偃橫斷初民來觀萬首如蟻朋行旅聚歡譟踊躍詠誦令德老稚一口共曰秦之冰唐之兼瓊嘗以水利遺民民至於今神祀之吾廖君殄水害於吾邑吾邑之人又將何以報之哉謹當戒告子孫即其地以祠世世不敢忘也君聞之笑曰過矣此非所以盡吾之所為者曷足以云爾之德耶貢士賈汝竒等二百人遝然進而言曰夫古之賢者凡是建立豈與夫蒙其利者必固徼其所以見思者耶蓋仁惠浹人其久愈深雖欲已之自不能矣竊謂君之懿迹與古何愧當附之金石以信于萬年君又笑曰過矣愚何當此願毋言謹以謝諸君汝竒等退以圖以書詣余求文其言具如此余受之曰是可紀也乃為論次其所以云隄凡大小五其長共百三十七丈髙一丈廣倍其髙用人三萬計日四十五堤既成無有一人議之曰不可者噫如君者賢令矣梓州永泰縣重建北橋記上即位之明年永泰縣重建北橋既成其令郭君經與其佐史君潤辭有請于邑人文同曰經潤辭不佞竊廪食于此伏自念終無施短才立異效鄉者議與斯民興是役以利其往來此前人憚勞畏譏久而不克為之者工今休矣問諸左右約諸所以調用民實不艱其供而咸謂其且當然者經潤辭輒不愧宜其文紀其上敢以纍執事庶因之以傳乎無窮經潤辭幸矣同曰唯唯二君之治端幹明以潔便人謹己聞之長老舊無有也均徭賦平訴訟他人蓋亦有能之者夫何足書是舉也同嘗觀二君之為乃有志於行愛惠之深者勞躬瘁心旦夕惕勵暴外風露曾不以懈勤王事恤民隱古之賢吏凡不過此是可書爾二君雖不見屬同亦將件次休績揭諸華表之末以視于後人况二君所以來之意誠且願耶謹不避遜為之詞云維縣為梓之所領西上府治蓋百有三十里叢岡杳嶺圖聚邑屋疆畛蹙狹號最儉下然賓旅還過此焉要隙大抵閬中清化始寧符陽諸郡所仰二川産殖繒綿絺紵荈茗刺繡雕刻鏤冶之物與所市易牛羸絲繭椒蜜之貨日夜旁午絡繹他負羸羯抗蹄裂肩如水上下故北出之道路踵相織近郭有澗自東迤西橫匯曲決峭絶傾斷自昔經制有橋甚偉以利其涉逾五十祀至和甲午夏潦洚溢逺溪逆讓噎滀不瀉鐫豗嵦岸級礎崩納角楹翹虛羣版散墮日欹月陷以至大壓庸吏數易一不省問人擠溝馬還濘間則有矣維汾陽君為令之二年慈惠宣浹民實信賴諸敝已救回力圖此因倡于衆曰是橋廢圮爾所痌悼豫其爾復謂豫何者萬口一和令謀我協不煩令指願進諸辦材糧交委日謁就事於是集斤鋸會錐錚治木伐石均功授巧維武昌君適調此尉喜相厥役與合鳬藻昏旭臨視犒餉豐美作息時節咸樂其用無少踦􅚏始癸卯仲冬之丁未末訖甲辰孟春之壬子葺棧朽堊一已絶手觀其橫虛亙逺矯虹截巨載鉤擢攢扶鎖綰覺直如削堅鞏如鑄崖廉縟緻阿榮跂竦湍瀨搪激無以泐其固風日掀暴無以液其壯百數十年之利過莫知爾既而行者止居者起田野氓𨽻閭閧賈儈提引稚幼扶翼耆耋聨行散走環擁登降睨髙窺深歎息欣喜如是纍日始肯罷靜爰有杖者倚柱而歌曰昔政之鄙浸以毁兮今治之賢條以全兮興事以時罔齎咨兮取用有度胡怨怒兮無貸之仁濟斯民兮不朽之利安此地兮同既為二君委以論撰以詳言之矣復取杖者之歌系於後刻石道下以永行人之思治平元年二月一日記射洪縣拾遺亭記庚子秋同被詔校唐書新本見史第伯玉與傅奕吕才同傳謂伯玉以王者之術説武曌故贊貶之曰子昻之於言其聾瞽歟嗚呼甚哉其不探伯玉之為政理書之深意也明堂大學在昔帝王所以恢大教化之地自非右文好治之主為之且猶愧無以稱其舉豈淫豔荒惑險刻殘詖婦人之所宜興乎緣事警姦立文矯僭伯玉之言有味於其中矣彼傅吕者本好厯數才技之書但能略顧大體顓務記覽以濟其末學詎可引伯玉而為之等齊耶杜子美韓退之唐之偉人也杜云終古立忠義感遇有遺編韓云國朝盛文章子昂始髙蹈其推尚伯玉之功也如此後人或以己見而遽抑之人之材識信大有相絶者矣同當時嘗欲具疏於朝廷以辨伯玉之不然會除外官不果癸卯春伯玉縣人金華道士喻拱之過門言其令龎君子明於本觀陳公讀書堂舊基構大屋四楹題之曰拾遺亭棟宇宏豁軒楹虛顯步倚眺聽依然風尚將紀其實願煩執事同曰伯玊同之郡人也昔不幸而死於賊簡之手心嘗悼之矣今不幸而不得列於佳傳是故懇懇欲一為之伸地下之枉爾記此何敢妄遂述前事使揭於亭上聊以闡獨坐之幽其山川之勝登臨之美古今不易有子美之詩在焉周表焦夫子碑記蜀之故老傳岷山有焦夫子者國初時人亡其名飽詩書以博學教導人故世人稱夫子云夫子貌寢陋且怪長目而廣鼻海口而蚪髯癭纍纍絡頷下性直率不自飾雖冠帶往往爬癢捫蝨腰胯間忽為歌詩則竒言異句有足駭人耳目者今人止能誦其一聨兩輪日月磨興廢一合乾坤夾是非噫豈非所謂古之隱君子歟熙寧中吾鄉賢士文與可遊天彭館倅舍之徐公園杯酒談笑中忽放筆繪夫子之像於學之壁不數筆而成之經歲既久幾至泯滅元豐壬戌歲聶公子因守是郡惜其瀟灑神妙之迹或隱晦不顯遂徙其壁於西湖之凝翠亭焉嗟夫天下之人皆有所好然得其所以好者寡矣與可之於畫也縱橫意思類皆山石竹木枯稿古淡之物故其為人也亦愛夫清淨竒偉有道之士此真得天下之所以好者歟公之遷是畫也使與可在而居貴仕間人必曰有所奉焉耳與可已沒公特重惜之是乃所以為君子也方是時俯仰徇好方圓逐物喜事媚要迎合附會惟恐不足以赴功公乃恬然不以是為設慮而雍容間暇獨能好與可之所好實賢於人逺矣豈不可尚哉公索記敢直書云吕大防合江亭記江沱自岷而别張若李冰之守蜀始作堋以楗水而闊溝以釃之大溉蜀郡廣漢之田而蜀以富饒今成都二水皆江沱支流來自西北而匯於府之東南乃所謂二江雙流者也沱舊循南隍與江並流以東唐髙駢斥廣其穢遂塞縻棗故瀆始鑿新渠繚出府城之北然猶合於舊渚渚者合江故亭唐人宴餞之地名士題詩往往在焉久茀不治余始命葺之以為船官治事之所俯而觀水滄波修濶渺然數里之逺東山翠麓與煙林篁竹列峙於其前鳴瀨抑揚鷗鳥上下商舟漁艇錯落遊衍春朝秋夕置酒其上亦一府之佳觀也既而主吏請記其事余以為蜀田仰成官瀆不為塘埭以居水故陂湖漢漾之勝比他方為少倘能悉知瀦水之利則蒲魚菱芡之饒固不減於蹲鴟之助古之人多因事以為飾俾其得地之利又從而有觀遊之樂豈不美哉兹或可書以視後蓋因合江而發之辨蘭亭記蜀有草如萱紫莖而黃葉謂之石蟬而楚人皆以為繭蘭見於詩易而著於離騷古人所最貴而名實錯亂乃至於此豫竊疑之乃詢諸遊仕荆湘者云楚之貴蘭舊矣然鄉人亦不知蘭之為蘭也前此數十歲有好事者以色臭花葉驗之於書而名著况他邦乎豫於是信以為蘭考之楚辭又有石蘭之語蓋蘭蟬聲近之誤其葉冬青其華寒其生沙石瘠土而枝葉峻茂其芳不外揚暖風晴日有時而發則郁然滿乎堂室是皆有君子之德此古人之所以為貴也乃為小亭種蘭於其旁而名曰辨蘭無使楚人獨識其真者命亭之意也張玠創建有夏皇祖廟記至神長存大功必報廟而祀祀而歆亙千萬載顯顯注人心目是崇是敬是興是奉斯不有主張綱維之者邪開闢之初三靈未奠五行以汨時則洪水橫流懷襄滔天民用昏墊弗協厥居惟大禹以神智承命俾乂克底平成之功迹其乘四載别九州刋木濬川導江決漢櫛風沐雨手胼足胝八年于外而後澤者導陵者藝人得平土以居六府孔修三事允治餘風遺澤至于今賴之則所以報之宜何如春秋時劉定公館于雒汭猶思禹之功德且有微禹吾其魚乎之嘆矧兹夔門當西蜀川流之聚合數百源而委之沆漭泛濫又甚他所而巴岡巫嶠崔嵬盤錯壁立骨峙綿亙峻極固塞其衝奔潰洶湧之勢艱乎為力哉已而瞿塘瓜分灩澦孤蹲千崖萬磴兩兩却立黃流巨浸帖帖東下環數千里之地既宅既旅既蠶既粒孰知疏鑿功用之至於斯邪有唐杜少陵詩以史名寓夔日一吟咏不忘其本若曰禹功翊造化曰禹功饒斷石曰江流思夏后之類言意諄復殆不可悉數是其感慨景仰之情發為聲音有不能以自己後之志於時者至此詎得無所懷哉歲己酉玠被命將漕夔門居無何復攝郡事率職之外於修廢興闕竊有意而未遑也未幾前制帥趙公以書來言夏后平水之功與天地並今江淮河漢間咸知奉祀夔門疏鑿之力尢艱大而廟貌獨無何以示報本之意盍亟圖之僕因放前代有少遺烈在兹土者率有祠奉顧后之丕績冒六合而導江至斯功尤顯茂乃獨無享祭之地誠大闕典於是始為創建謀乃於江滸之白帝城得隙地十畝髙明虛曠控瞿塘而臨灩澦厥土燥壤厥勢面陽議以築曰宜哉則命計工役事材用既集未及作而今帥帳單公實來交郡章乃相與言是事具以營造囑之尋以卜龜未食更歲始得出幣僦工衆役皆作凡為殿約門及廊廡之屬合百楹乃塗乃堊乃設貌像器用從給不陋不華俾爾邦人與夫來者有以為瞻依享祠之所而其明明之德猶足以令江神而濟舟楫也昔人論廟祀以為德厚者流光德薄者流卑故有萬世之功斯享萬世之祀乃今廟貌之設夫豈荒忽迂誕而莫可質信哉繼自今薦而馨香實而恭敬肩袂相屬于廟庭者雖至于無窮可也李騊忠節廟記曾子居武城冦至則去冦退則反子思居衛則曰如伋去君誰與守二子所為不同而孟子以為曾子子思同道豈非曾子知所去子思知所守者耶余觀夏公之死誠有得於子思之守也方王室之亂朝廷綱紀蕩然藩臣跋扈而長蛇封豕強者輒勝天下之人奪氣喪膽卒無豪傑之士慨然特立不待文王而後興者公於此時乃能嬰孤城提弱卒與孟知祥董璋爭一日之勝而奮不顧身死之為當時所難而公能行之何者方董孟二蜀連衡拒命負固猖獗攻尅遂閬稱兵之初衆號十萬旌旗延亙直薄武信公自忠武召還繼鎮此土適蜀兵次明月池而公以騎卒二千勢不相軋乃堅壁深池坐困強敵始自戊寅迄于己巳蜀兵以洞室穴城自夕達旦公亦以驍徑力守曾不少衄不幸食盡勢窮義不茍生眥裂血面竟以死謝方是之時邛雅資眉黎茂刺史請命於蜀不啻奴𨽻而康文通輩亦束手趨成都且語知祥以夏公以死自守必無降意則公大節固已有素非偶然者然而世之議者乃列公為死事而不得與死節者比此尢可嘆方王彥章之守中都竟為夏公所擒而死裴約之見殺劉仁瞻之病卒皆未有卓然竒節不為敵人所屈如夏公者死節死事何自而分豈不以夏公去梁奔晉為公之疵而不知公之去就亦自有見觀公之戰單廷圭元行欽決莊宗之圍挫王彥章之勇河陽之惠政武信之遺烈至於設庠序以闡文教營雉堞以講武事深沈幾略靜以制勝意其忠義自將非若庸人武夫死於無名者昔者張巡之守睢陽勢窮備竭竟詬賊而終使夏公不幸有如張巡彼肯搖尾乞憐為齷齪茍全者耶茍援兵繼來孤壘堅守可以振揚北師鞭撻堅冦二賊之首坐致麾下將見公之功名自此輝赫非特一死而已以其所已為觀其所未為則公之大槩不論可知今夫世之人臨小利害僅若毫髮至有俯仰詞色以為去就况公之守土效死勿去與子思之居衛節守無異而議者乃以死事名之果信然歟騊被命出守是邦恭謁祠下痛公之大節既不為秉筆者所知而百載之後復未有顯號以揚公之美請之於朝蒙賜旌忠廟號舊惟郡圃祠堂卑隘湫陋不足以仰副朝廷追顯之意遂議更置度地於東城之隅凡板幹柱礎瓴甓垣墉不取諸民而悉出給於官曾未閲時而殿宇凛然亦以大公之威而竦邦人之視因備述公守土始末且敷揚朝廷所以賜號之意刻之堅珉庶幾可以為公無窮之榮而攄百載湮沒之憤使邦人每過祠下輒曰此夏公之祠也忠義之事吾曹可不勉乎夏公名魯竒字邦傑其始終出處詳之史册此不復書馬永卿神女廟記永卿自少時讀文選髙唐等三賦輒痛憤不平曰寧有是哉且髙真去人逺矣清濁淨穢萬萬不侔必亡是理思有以闢之病未能也後得二異書參較之然後詳其本末今按禹穴紀異及杜先生墉城集仙録載禹導岷江至於瞿塘實為上古鬼神龍蟒之宅及禹之至護惜窠穴作為妖怪風沙晝暝迷失道路禹乃望空而嘆俄見神人狀類天女授禹太上先天呼召萬靈玊篆之書且使其臣狂章虞餘黃魔大醫庚辰童律為禹之助禹於是能呼吸風雷役使鬼神開山疏水無不如志禹詢於童律對曰西王母之女也受回風混合萬景鍊形飛化之道館治巫山禹至山下躬往謁謝親見神人倐忽之間變化不測或為卿雲或為霏雨或為遊龍或為翔鶴既化為石又化為人千狀萬態不可殫述禹疑之而問童律對曰上聖凝氣為真與道合體非寓胎稟化之形乃西華少隂之氣也且氣之為用彌綸天地經營動植大滿天地細入毫髮在人為人在物為物不獨化為雲雨龍鶴而已僕始讀其書甚駭異之既而深思則皆合於易焉所謂西王母之女者則有合於坤為母兌為少女之説所謂變化不測者則有合於隂陽不測妙萬物之義豈不灼灼明甚哉易之為書與莊子多有合易者隂陽之書以九六為數而南華開卷已有南鵬北鯤九萬六月之説槩可見矣又莊子所載藐姑射之神人大似今之神女是其言曰肌膚若冰雪則有合乎金行之色綽約若處子則有合乎少隂之氣遊乎四海之外則可見乎神之無方使物不疵厲而年穀熟則又見乎秋之成物故郭象注云大神人者即今所謂聖人也斯得之矣僕因悟易之少女莊子之神人郭象之聖人今之神女其實一也僕然後知神女者有其名而無其形有其形而無其質不墮於數不囿於形超男女相出生滅法故能出有入無乍隱乍顯舉要言之乃西方皓靈七氣之中少隂之靈耳豈世俗所可窺哉且楚辭者文章之大淵藪也而屈宋為之冠故離騷獨謂之經此蓋風雅之再變者宋雖小儒然亦其流亞自兩漢以下未有能繼之者今觀文選二賦比之楚辭陋矣試並讀之若奏桑濮於清廟之側非玊所作決矣故王逸裒類楚辭甚詳顧獨無此二賦自後歷代博雅之士益廣楚辭其稍有瓜葛者皆附屬籍惟此屢經前輩之目每棄不録益知其贋矣此蓋兩晉之後膚淺鯫生戲弄筆研剽聞雲雨之一語妄謂神女行是雲雨於陽臺之下殊不知雲雨即神女也乃於雲雨之外别求所謂神女者其文疏繆可笑大率如此僕今更以信史質之懷襄孱主也與強秦為鄰是時大為所困破漢中轢上庸獵巫黔拔郢都燒夷陵勢亦駸駸不已於是襄王乃東徙於陳其去巫峽逺甚此亦可以為驗也且文選雜偽多矣昔齊梁小兒有偽為西漢文者東坡先生用數語破之何况戰國之文章傑然出西漢之上豈可偽為哉噫峽之為江其異矣乎逺在中州之外而行於兩山之間其流湍駛而幽深故無灌溉之利若求之古人是蓋逺遁深居之士介然自守利不交物若鮑焦務光之徙今吾儕小人乃敢浮家泛宅沒世窮年播棄穢濁日夜喧閧其罪大矣神不汝殺亦云幸也且峽既介潔清閟如此乃陸海之三神山也是宜閬苑真仙指以為離宫别館誕降爾衆之厚福故凡往來者既濟矣當於此致謝未濟矣當於此致禱以無忘神之大德云紹興十有七年二月永卿赴官期道出祠下既已祗謁若有神物以鬱發僕之夙心者因備述之以大闡揚神之威命明辟且為迎饗送神之詩用相祠事繫之碑末曰夔子之國山曰巫考驗異事聞古初有龍十二騰太虛仙官適見嚴訶吁霹靂一聲反下徂化為竒峰相與俱至今逸氣不盡除夭矯尚欲升天衢壯哉絶境天下無宜為仙聖之攸居仰為髙真握珍符鎮治名山奠坤隅昔禹治水何勤劬按行粵至萬鬼區妖怪護惜紛恣睢風沙晝晦迷道途神人親御八景輿授禹丹篆之靈書文命稽首受寶圖手握造化幽明樞驅役鬼神才斯須萬靈恐懼聽指呼巨鑿振響轟雷居回祿烈火山骨葅墾闢頑狼如泥塗岷江東去無停瀦倘非神人協禹謨襄陵正怒民其魚大功造成反清都朝遊閬苑莫蓬壺呼吸日月飲雲腴頻視濁世嗟卑汙江皋古廟象儲胥神兮幸此留踟蹰自古膏澤常霑濡逮今疲瘵蒙昭蘇巴峽野人貌瘠臞願降豐歲朝夕餔出入樵採無於菟客舟性命寄須臾願賜神庥保厥軀往來上下無憂虞日則居兮月則諸繄嚴奉兮永不渝蘇德祥新修江瀆廟記五行迭用水實居多四瀆朝宗江惟其長八卦之畫也坎之爻冥契北方之數水實主之二儀之判也岷之山騰為東井之精江實出之惟堯之世斯水未治遂有昏墊之虞以嗟方割惟禹之興斯江既道故有納錫之故以示成功其利萬物也大不可極深不可測而靈潤之功著焉其納百川也則察之無象尋之無邊而靈長之德昭焉昔者三國連衡吳人擅命六朝割據陳氏稱雄及晉祚之隆也下樓船於玉壘隋基之盛也進戈甲於金陵降孫皓則濟為安流擒叔寶則寂無駭浪得非有道則應無道則否威靈不昧肸蠁斯在若乃方軌十二惟帝之都邑勝兵百萬惟帝之爪牙非富庶無以示國威非漕運無以資邦計語其順流而下委輸之利通西蜀之寶貨轉南土之泉穀建帆髙挂則動越萬艘連檣直進則倐踰千里為富國之資助經邦之略此又妙不可盡之於言事不可窮之於筆也當隋之開皇二年文帝以沈祭之缺禮乃營之以廟貌唐之天寶六載明皇以廣元之美號爰封之以公爵而自梁室暴興蜀人僭命王氏則起之於前孟氏則繼之於後或征或戰越四五朝稱帝稱王垂七十載化風久隔祠典莫修應天廣運聖文神武明道至仁孝皇帝握乾樞而御極弔坤維而問罪聊施良䇿才舉偏師未越六旬已平三蜀既而王道坦泰階平四夷八蠻有跋扈者盡為臣妾矣名山大川有隔越者盡入提封矣爰伸昭謝用酬元貺乃下明詔遍立嚴祠有司承制繪樣於素頒之於所部長吏祗命官藏其事取之於大壯土木盡其妙丹艧窮其利僝功斯畢列狀以聞我其潔籩豆馨黍稷永享神以明德神其助造化和隂陽潛祐我之治世式覃睿旨俾建豐碑臣敢頌皇猷刋之翠琰豈比夫沈於江底杜元凱惟尚功名賦彼江流郭景純但矝詞藻而已哉銘曰江之源兮出蜀之界江之流兮歷吳而大利萬物於南方納百川而東會嗟乎盜發於唐兵起於梁神之祀兮久廢蒸嘗美哉我宋之昌彼蜀之亡神之廟兮復構梁棟我其享神以蠲潔神其祐我以豐穰勒銘垂裕休與無疆鄭少微孝感廟記按今漢州德陽縣西北四十里有鎮東漢薑詩故宅在焉故號薑詩治平中知綿竹縣事郭震者謂詩行甚高宜諱其名白郡刺史易之鎮遂號孝泉然廟猶因俗為呼於是開州司理參軍白夀朋與鄉之士民列於縣曰薑詩夫婦事迹最詳於漢史所謂舍側湧泉至今不絶民賴灌溉或遇旱厲禱焉輒應其厚俗利人之功居多廟額獨未蒙賜敢請縣乃上之有旨賜名孝感命至之日稚耋夾塗載舞踊躍爭觀為人子若夫者咸欲詩之行在其身也為人女若婦者咸欲龎氏之行在其身也為人父母若舅姑者咸願有子如詩有女與婦如龎氏也又相與詫於他州之民曰吾鄉雖僻幽而薑詩夫婦乃吾東家子也爾州曾有是耶方且侈上之賜以求稱厥名而故祠庳狹面勢不正像設不嚴靈不妥安瞻祈無所於是通直郎致事張績以義倡焉相其方位而辨奠之凡為屋五十楹益浚其泉流擇旁寺僧之潔勤者蒞之𢎞敞肅密千載陳迹一朝如新甚盛觀也廟成七年而紀述尚缺通直公子承議郎士行委少微書焉謂變風之際距先王未久婦人女子茍有片善可稱者遂見美於詩見取於孔子如共薑許穆夫人衛女皆貴者之妻不過以禮義自持不嫁不歸而已其植節挺操之難感格神明之異實後世賤夫匹婦未肯逺避之也范曄後漢書載列女才十有七而出於蜀者至四人一出南鄭一出廣漢二出犍為如程文矩妻於其子直以人情為之耳盛道妻於其夫叔先雄於其父殺身成仁固美矣要之不得已而然者若龎氏者事尤較著蓋未始行乎危難惟雍容禮法之中遂能感無知之魚革難化之盜使貴而姬薑賤而妾媵皆可黽勉以庶幾萬一讀曄書者未有不聳然而嘆况臨其魚躍之淵與盜過之里也哉然則龎氏之遇曄不為不幸也通直公有二子士行中行相繼登第事親孝謹清議許其賢餘皆有諸昆之風年今七十餘銀章朱紱偕其夫人板輿往來二子間鄉人榮之推其所自蓋發潛扶教之影響云侯溥郫縣漢大司空何公祠堂記君子治亦仁亂亦仁治亂殊時而君子之仁一也孔子曰商有三仁焉其以異於迹而同於心乎微子之去無以異乎箕子之留而囚辱也箕子之囚辱無以異乎比干之諫而剖剔也先王廟貌去則祀否則絶微子不敢留先王火法生則傳否則亡箕子不敢死先王忠義死則得否則喪比干不敢生各有當然爾漢德中缺而大盜作方此之時蜀郡有二仁焉生焉而仁其惟揚子雲乎死焉而仁其唯何君公乎子雲於漢為給事黃門三世不徙官其受祿也輕其任事也微一日遭新莽之變而責子雲以死國是不知道者也詩曰既明且哲以保其身其子雲之謂乎君公起諸生而位三公爵通侯主在與在主亡與亡固其職矣姦憝搆誣卒以隕生詩云之死矢靡它之死矢靡慝其君公之謂乎子雲不死而太玄法言垂之萬世猶箕子之有洪範也君公不生而高名大節千古凛凛猶比干之諫而死也使子雲有君公之位而君公居子雲之地則亦彼死而此生矣生者以文傳而死者以忠傳文可日見忠隨世異是以子雲之祠盛於蜀而君公獨未聞焉君公葬於郫綿東漢閲劉蜀歷二晉以至於唐至於五代至於今蓋亦久矣宅兆四周化為畦塍貧夫力耕殆至穿盡所賴以知者特二石柱爾知府大資政趙公聞之惻然曰君公之忠可以摩激萬祀今也食不得以血於廟墓不得以鬛於田殆非所以揚厲名教乃籲有司移告於郫俾治厥封俾建厥祠於是著作佐郎趙濬以縣令實職其事先是嘉祐中邑儒何昌禹嘗憤居民耰此墓之四周而末如之何因其賣之也而市之至是其姪邁獻其地三百步有進士宋誠倡邑之學者復市二百步以獻昔墓且毁今築以修昔廟未建今宇以祠乃礲石柱鑱識年月乃殖佳木表正疆畛功既集大資政命溥為之記溥復觀古之君子立身行已太上立天下之所不能立行天下之所不能行其次立所難立而行所難行其次立所當立而行所當行如君公者蓋竊以為得其上焉者矣封其墓建其祠其誰曰不然熙寧六年記家安國范文正公祠堂記公嘗曰周漢之興天下為福為夀數百年當時致君者功可知矣周漢之衰天下為血為肉數百年當時致君者罪可知矣考公之時朝廷致君之人喜功畏罪者尤多惟公之望節若南山貴名之起揭如日月亙諸夏之廣盡九邊之逺凡有舌者皆恥不談希文何耶好善優於天下而已矣善人天地之紀也政教之本也其所以優於天下者能思天下之所不思能為天下之所不為先天下之憂而憂後天下之樂而樂也然知為可憂則先王之澤無不被於世矣知為可樂則一夫之生無不獲其所矣公之憂如是而竟無以解其憂公之樂如是而竟不得享其樂豈成功則天歟公疏上夀儀以正君諫楊太妃不可稱制以立母述張華事西晉以諷宰相此天下所不能思也公參大政首請天下興學取士先德行不專文詞減任子以除冗官此天下所不能為也上百官圖以任人材舉縣令擇郡守以固邦本保直臣斥佞人以明國聽復遊散去冗僭以厚民力此天下之憂而公先之也西民禍兵公以龍圖閣直學士帥延慶橫山靈武勢如腐稿朝廷乃以邠州管內觀察使授公公曰漢御史出案二千石唐御史節度使以軍禮見本朝學士丞郎出臨戎閫節度諸將望風稟律皆由朝廷之重也居內朝近侍之職有彌縫闕失之道若貪厚祿換此外帥體得承迎朝廷指縱無復議論廟算得失矣况西華之人知有龍圖老子不知有太尉也竟辭元昊以書窺伺朝廷公惡其僭號斥不為奏自答其説諭以逆順禍福之理元昊卒伏公言稱臣請和此國強民息天下知其樂也然則所謂優於天下者舉是耶於事則顯功也於善則粗迹也上臣之善大於禮樂世有不得其門而入雖房杜之美其如不能何庠序者禮樂之門也得其門知其文矣知其文達其情矣情文備則致君挈國之功言不下帶而禮化行如神矣吾宋聖治逮慶厯僅百年太平之效以文致實景德祥符之風不減三代而功成治定未暇制作天下之人望禮樂之門不得而入公闢其門使天下由之雍泮之水洗天下之心後進之君子先進之野人參軌續轍可以論述制作者與時輩出然考積德之年天實有所興也成都學宫西南觀教之地二漢以降非善人之迹不存近世宏堂列像逮逾百人皆所遵德景行熙寧初公仲子丞相純仁漕蜀西南之人始請公像圖之經史閣西廡諸生歲時謁款於前以筵所未稱愧甚及元祐戊辰寶文閣直學士李公尹蜀誠於應物樂於為善凡可以成法者皆欲舉之客有告曰蜀有學自文公始本朝都邑有學自范文正公始天下之為烈者先王之所不遺法施於民者世主之所必報不遺之所以顯仁必報之所以立義事有惻然之仁孑然之義一及於蟲魚草木雖曠代異古且猶不忘况赫赫耳目之前明德輔世及於士民乎願正公祠使天下為善者勸李公樂其請命工成之於禮殿之東與石室對峙焉客喜而歌曰岷山之靈會公之英千歲之聲非雷非霆道德之澤以保我後生明哲之誠禮義之經百世之廟如日如星教化之功地平而天成王剛中張忠定公祠堂記謹按禮經曰有功德於民則祀之又曰盛德至善民之不能忘信哉是言也藝祖受命四方僭叛以次削平乾德中一舉下蜀首命參政吕公餘慶知成都越三十餘年更十二政而得尚書張公以繼之又五年再至率成考績其為治大抵以嚴猛奮厲制其暴以精明果斷摘其姦以公平信義善其俗訟至於庭據案一決悉中其隱百姓驚歎以為神明而不敢犯及受代而去密令寫真封以授僧希白戒之曰後十年即可開及期視之公適化去而訃至矣於是蜀人慟哭罷市置公畫像於天慶觀之仙遊閣建大齋會事之如生歲歲不絶迄嘉祐己亥府帥侍讀王公素始大建祠於府治之東落成之日人無幼艾爭捧牢酒或喜或泣列拜於庭雖周人之思召公襄人之思羊叔子無以加焉既又取公治蜀斷語可為後法者凡百三十首圖於壁嗚呼公之治可謂有功德於蜀人而蜀人懷公德善亦可謂不忘者矣剛中猥以庸陋被命帥蜀兼治成都距公又百六十餘年遐想風績卓乎莫及嘗躬奠祠宇徘徊周覽惜其歷歲滋多堂宇且敝乃命即其榱椽梁柱之撓弱而不支者瓴甓階礎之缺斷而不承者髙甍隆棟風雨之所飄剝者長廊巨壁丹青之已漫滅者悉舉而更新之仍於祠增接兩廊建堂三間築垣墉以周之而稍植花木於堂北以為士大夫謁祠遊息之所且以稱邦人嚴奉之意繼自今以往若時加修飭俾勿壤則為政者有所矜式而吏民亦悅服而易治是真有補於風教者其可不書以告後之人閻灝韓忠憲公祠堂記自侯國為郡縣傳記始有列循吏者固須凛德讓風迹清邵所居民富所去見思生有榮號殁得奉祀則其章明與日月參光而無窮已也漢元始詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔歲時郡二千石率官屬行禮而南陽亦為信臣立祠昭然史策增媺赤制此典一墜昧沒千載然而有碩德傑望矜式薦紳厚澤英績周洽民俗丕烜瑰偉自與禮之法施於民以勞定國者合而輿心稱願以祈薦饗則此甚盛事可得已耶宋天聖中韓忠憲公以樞密學士諫議大夫鎮成都威靖仁涵內外誠盡方嚴正直動迹儀矩中心樂易以教化為首務俗尚悛革安趨夷逵始內官以蜀當有兵變或大沴為言者朝廷憂之公於陛辭之日二宫諭以占説公俯伏曰願以屬臣既至蜀果大旱炎㿩午熾狼顧赫赫素寡儲峙生意僭奪公齎咨惻憂形見顔表遞發他廩粟及合富室造饘粥以賑救餓殍日日循往按蒞之撫慰噢咻率繇淵誠賴以獲全者不翅千萬始議救災也僚有請限節米價者公曰不可物始翔踊居蓄者固靳嗇以射利祈倍稱之息此令一出環千里之粟閉不至矣姑待之不浹日諸郡之輦餽大至價遂少損公嘗於中夕端肅衣冠祈請帝神霔雨如期焦稿以蘇斥絶宴嬉還集疲瘵捐瘠完好武斷縮栗易荒為穰化擾為寧或言張乖崖歲出米萬斛估於民一漁庾實白請減之公曰此朝廷所以濡澤逺人為最急者豈可輕議耶因前期倍數以給價之且刻石置廥中示後為不可革之意驕亢寖久府江幾涸蒔稼將瘁溝澮填閼提封暵然澆潤靡及公遂遣官行視江流訪故老得堰曰九外口未始疏導即命新釃為渠以注之水行徑便均溉諸邑後常修決倚為滋植而利甚豐博蜀之戍兵舊比食淡公損鹽估差等而鬻豫之著為定令新繁彭益之交舊匿姦冦賊有閃地黃之號公行剽殺蒙隱逾時公廉知之鈎發逮捕情得罪真誅竄渠支清洗胠篋至今新繁無盜公敦尚儒雅平日誘進文士以倡教育曾詔秋貢士公戒有司務公其選躬視精核擢章君陳為舉首章遂登甲科後立朝為聞人餘悉時之髦彥接武以取名第西南文章基此而盛藩會宴饗往皆趨佛宫廡下蕝具湫底庖宰擾雜公飭材於廣庭為廳事以宏豐鎬之地逺去封割表揭瞻望方隅偉之踰再期會以御史中丞召還蜀民慊悁如失慈哺公歸朝尚以邛部蠻馬歲來鬻於永康經踐山川知道途險易為蜀他日虞建言願徙即沈黎朝廷從之所以杜覘伺之便嗚呼何於蜀之恩始終隆隆耶踰三十年袴襦之頌歌不衰天福於遐世象其賢上復用公第三子端明殿學士翰林侍讀學士尚書禮部侍郎公繼治之追功席休踐修厥猷紹參神明今昔相照官榮家範古所未有德威亶白歲時大和於是耋耄善良會千百數擁棨戟門道前世祀事謂忠憲公之祠不修為蜀之愧願即文翁廟之南宇為一室繪犀日之表而以端明公侍其旁庶西南人事之無窮以大朝廷用世德之盛其不可辭端明公曰衆之請至矣矧於義無疑遂許之而止其圖已像堂序朴嚴繪事莊潔毅如嶽鎮煥如星辰憑憑威靈萬世瞻仰既已邦人士大夫謂灝竊頖宫之遊日與諸生道古今盛美宜實其紀從金石刻灝再拜受命而系以詩曰惟宋受命繼古聖聖弼臣臯夔世載德盛嚴嚴韓公有倬其道方國碩望朝廷元老天聖之末蜀人薦飢公竭惠慈營營百為厚恩春㿩凛威秋霜善惡判明納民安康殆三十年世象其賢公功愈昭斗奎於天蜀之父老百拜庭下願修公祠以永瞻慕岷盤坤維江紀南國公祠之嚴相與無極漢之文翁宋之韓公邦人永懷穆然清風張行成司馬溫公祠堂記故諫議大夫司馬君池以某年作尉郫邑越明年某月生公於官廨字之曰岷以山稱也是歲諫議君手植松楠各一本於庭逮今凡若而年自諫議之死骨已朽矣公相繼殂落靈亦歸矣而二木之中其一松者亦枯摧矣惟是兹楠蒼蒼猶在邦人依之尚可想見公初生時也公之遺德在天下名在後世行事在國史固一代偉人也當其道未合之初天子敬之而不用權臣憚之而不親天下仰之而不濟不獨其身見黜於朝廷波及遺言亦見抑於死後者凡數十載則松之不愛而楠之不録固其宜也邇來世道頓革士風漸回上自朝廷下逮黎庶咸知公議之不可破而公之言為不可抑於是朝廷旌其家學士誦其書後生想像其風采而不可得則又丹青肖形以寫瞻慕者無室不有公之道蓋大明於天下矣思其人愛其樹又理之必然者於是邑丞李公作堂以嚴公之祭護木以永公之思蓋從人望者柟之青青公生在兹邦人是榮祠之翼翼公像在兹後生是式公之道彰矣不假於一柟而兹柟實託公以不朽公之道傳矣不私於一邑而兹邑實賴公以不辱柟之喬斤焉而雕惟公之道磨天地而不銷柟之節斧焉而缺惟公之道涸河海而不竭則兹堂之建非以嚴公也乃以為護柟之標榜兹柟之愛非以榮公也乃以榮邑之冠冕堂之毁公不毁也柟則毁矣柟之辱公不辱也郫則辱矣嗟乎郫之民郫之吏繼今而後者其善護兹木乎劉涇王稚子石闕記西漢循吏稱文翁老於成都其石室在學宫東漢循吏稱王稚子葬於郪縣即今之新都石闕在道傍然石室依古禮殿得不磨滅而石闕獨暴露骨立可憐歷兩漢千三百餘年間二人為古今吏師而遺迹亭亭勢參岷峨氣凛雪山蓋宦學者所當臣於下風以幸教髣佛而至有未及知者其不韙如此子訪石類得秦石犀石筍漢石室石柱石闕凡五物若犀筍與柱無甚損益事而室闕茍不朽則實二人之甘棠也於是新都令王君天常趣古甚力得豫説因請大尹莆陽蔡公為稚子作屋書榜以昭昏昏按闕面有𨽻字三十一法度徑古過於鍾梁闕上下有衣冠鳥獸等象僅可辨氣運精簡過於顧陸并以告來者楊天惠華陽趙侯祠堂記吾里有仁焉銅山趙侯純祐名申錫本故家子有美才數試吏以能聞於人由州縣三陟奉議郎知華陽縣華陽𨽻成都其治直府城中央戶版夥繁訟筒紛委固倍餘邑又與尹廷四五行臺纚連錯峙勢相關制難於專逺趙侯獨富風力敏功緒遇聱涊事尢喜為之縣故有沙坎堰不知起於何人凡溉田三萬七百九十畝頗沃美然歲月猥深官不時省堰寖堙缺江流亦遷去田因以廢夷在草間雖世業者尚棄弗顧而浮客尢輕亡徙不可留以故公租歲閣一千餘緡省賦歲閣四百餘緡而私穫之失不在歲侯至則喟然曰曩輸入而今不入曩穫美而今無餘豈終不可為耶為而新之豈不在我由是訪遺迹按故道參校圖録訂以耆舊遂相地宜築隄故處髙二十五尺長四百四十尺其址之濶如髙之數用木五百章揵竹二百個役夫五萬指不浹旬功告就水即赴溝支分派别油油宛宛釃灌如初時願復故業者願就新㕓者挾牘自言惟恐人先銍耒交起塍壠飭治土膏和美粳稻奮張於是草萊畢溉而洫有賸流人曰是非水泉之利也侯實利我賦租迄入而私有衍藏人曰是非田租之賜也侯實賜我乃即堰側搆新堂乃圖侯像於其中曰使世世子孫無侯忘也間走人過余求為之記余觀魏史起論西門豹不能美鄴田為不仁不知引漳水為不智豹賢令也其治鄴使人不敢欺當時無及焉者亶以一不圖此蒙不仁不智之名後世不以為過及起繼之卒能化㵼鹵生稻梁為鄴人所歌誠賢於豹逺甚今侯風力如是功緒如是假令與豹易地與起並時吾知河內之績不在起在侯無疑也非直賢於豹而已頃者侯治廳廡得斷碑壁下蓋前令趙世長種柳詩也其自敘嘗從乖崖行柳按轡升仙橋上隨而觀者數千人乖崖號曰此趙公手植也宜呼曰趙公柳人咸應曰諾侯讀之及半忽驚悟髣佛類其疇昔所為遽拓本示余且言當復種此以竟趙公故事然侯方從辟書佐漕幕柳之種否未可知余欲寄聲父老幸為侯植五株堂旁勿翦勿伐以永侯愛思宜有益父老其聽余言毋忽政和元年記都大茶馬司新建簽廳架閣記茶之入以息計者凡二百萬馬之入以尾數者凡若干而其奇嬴其孳息溢於常數者不在是焉每嵗以其八分實塞下又以其課登詔王府故自階文龍茂並塞之區以及洮岷湟鄯窮邊之徼凡兵若民咸指日望賜待我而後出入食飲其為利害不博且大哉利如是然其取於民者民未嘗怨而市於羌者羌未嘗厭也蓋其法市茶以平榷估馬以優直惟其所便一切捐以與之故來者滋勸已則募健卒僦餘夫番休遞行輕騖而疾驅不涉月達秦隴則固以享十倍之獲矣其所取既不苛而所獲乃不資如此故由元豐歷元祐更紹聖時事數化國是屢變至於此法莫之改也非不欲改也是誠有不可改也已然使者所統地大以逺故使事之繁常稱之事巨以繁故文書之夥亦如之凡縣官之所裁可而行下者途無曠郵凡郡邑之所關決而須報者庭無虛迹日者有司嘗慮其多而易逸久而必亡也悉總為書而類次之復闢故屋而别藏之然而因陋就卑規模褊小下潰旁束黝昧不爽文牘後至者或無所容之而幕府治事之廳尤為褊迫羣吏晨趨肩凥豗掎蹀迹側睨需此乃進前此蓋有病者矣而未遑改作之功今使者黃公實始命揭而新焉度地若干尋為屋若干楹其廣若干其深若干經始於元符己卯之秋落成於明年庚辰之冬視其中則大軸山峙方籖雲委望其表則綺疏華煥門序峻整赤白炯發觀者增氣時彰明縣令楊某聞而竊言曰夫金榖乾沒之弊根於吏胥緣絶之姧萌於圖書之逸亡此吏治之常蠧尚非其大者也夫惟朝沒其一焉遺其日暮絶其一焉闕其月積日引久遺亡猥衆則其成法與存者幾何是其為蠧不既大矣乎今黃公為是顧欲與成法為無窮計此其念慮深逺矣是固不可不書也乃沐浴而書告於公而刻之淵樂堂記吾蜀有達伯曰木鴈先生生岷峩之崖長邛崍之墟出入於脂膏遊俠之窟而其心泠然獨追正始永和之人而師友之然其拔起甚苦其擢置甚厲其造端甚鋭其收續甚勝金寒玉暖五十有餘年而後得寄祿第七品賦秩四百石闢五畝之宅治百塍之田於是稍斥隙土築小堂焉名之曰淵樂會將致為臣歸老於其家間以書戲其友東蜀楊天惠曰豫癯儒也暴享此得無有物瞰之因書韓公示兒書曰始我來京師止攜一束書辛勤三十年以有此屋廬夫經之勤營之劇悴形忍性磨以寒暑而偶有獲焉此韓公詩之所以飾喜而豫欲記之亦以志難也唯是名堂之意頗有以而或者未即曉之今夫淵明嗜酒樂天亦嗜酒淵明工詩樂天亦工詩凡語故事者夫人知其然乃豫所以千載尚友之意殆不其然也子盍忖豫心而試發之天惠伏書嗢噱曰富哉名乎吾有以索夫子之匿矣夫論人者無論其人而論其人之天按淵明以微故輒行而樂天以直言屢黜是其過人已逺甚然尚非其巨者也晉宋之交新故糅分朝而南暮而北未見有堅明不二者也獨淵明逍遙前去無所回其迹牛李之禍簮笏僨路朝為卿而暮為囚未見有脫遺無預者也獨樂天耿介中立無所蹈其瑕黨者先生所以取二子寧是耶抑非歟於時天惠董役通濟江上腹稿雖成竊自疑其言之􅑦鄙弗敢出也行且謀以身承教共定其當為而病莫之前後一年先生自大邑力疾歸坐堂上委衣冠而嬗豫聞之抵杌哭曰嗟乎無與定吾文矣蓋鍾期死伯牙破琴而不復鼓然徐君亡季札挂劒而亡所愛之二人豈以死生寒久要之盟哉吾意先生精爽超徹決不澌盡時撫鶴翎過城郭猶當問記之有亡也輒憶枯思之遺餘補輯之以授其子俾置諸堂右吳拭銅壺閣記府門稍東垂五十步慶厯四年知府事蔣公堂作漏閣以直午門嘉祐中先公簽書府幕事拭侍行猶及見閣以八分大字題其額曰銅壺巋然南向一府之冠也崇寧元年七月乙酉閣災政和元年三月乙卯拭承乏尹事始至府視閣故處纍土如臺然問吏吏曰前尹蔣即臺為門治材略具朝廷亦嘗賜度牒售錢六百萬有奇尹去弗克成問錢與材今安在曰材為他所繕備輟用之錢則帑官專輒兑費矣拭曰午門既臺門也兹唯閣之宜奚臺之有即日便徹纍上圖閣如慶厯時戒府以本末聞計臺願給帑官向所輒費錢檄旁郡市木若石餘悉從府辦計使者然之於是府委倅路侯康國安侯章成都談令愈華陽趙令申錫供奉官城外巡檢段希戡供奉官監養焉務髙士若總領分蒞凡役事拭謂是舉也非聞諸朝以期限趣其成則弛而姑置之猶前日也亟馳以章上被旨曰可賜之限者半年占於龜筮得九月壬申始命工如所卜日迄十一月戊寅告成通閣上下一十有四間其髙一丈六尺有五寸廣十丈深五丈有六尺審曲面勢丹堊是飾瓴覆甓甃厥有彜度中設關鍵闢閣惟謹此州士大夫若稚若老相與歡曰吾邦之壯觀矣使地理書而可信吾邦自是其罔弗吉矣他日大合樂以落之酒行拭語客曰周官挈壺以令軍井挈轡以令舍挈畚以令糧蓋號令不能相聞故令之各以其物省繁趨疾以便事也然則漏刻之作周官之所甚重夫豈末務也哉齊詩顛之倒之自公召之倒之顛之自公令之不能晨夜不夙則莫則挈壺氏不能掌其職故也按閣初置天聖中燕梓州肅所制蓮花漏於其下閣災漏毁閲十載更六尹於兹今吾閣成漏悉如燕製匱一壺一泉一箭四十有八洞烏逼水而下金蓮浮箭而上氣二十四侯七十二百刻十二辰率是箭而定凡我將佐若掾屬吏士時其寢興悉心公家以弗懈厥職尚何瞿瞿狂夫之聽哉雖然閣成非難不擾於民者是為難上既賜以閣成之期又慮夫因閣而擾也乃敕提點刑獄走馬承受官以警察其事夫為民之長而不知愛民使民不自聊而困於力役故其官府園觀卜築締搆殆無虛日而藻繪鏤刻窮極技巧曽不以殫財蠧民之為念此曹不擊於中執法不劾於司財非辜何也今營閣以嚴漏刻正周官之法上猶以謂擾則民受弊德音督訓至申言之此君等所具聞者請與君等體上之所以仁民愛物之至意終身銘之以庶幾不忍人之政於是客皆起曰敢不拜幸公録今日語并以屬來者覽觀焉馬存顏魯公祠堂記上元中顏魯公為蓬州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖崩壞剝裂之餘而典型具在使人見之凛然也元符三年余友強叔來尹是邑始為公作祠堂於其側而求文以為記嘗謂仁之勝不仁久矣然有時乎不勝而反為所陷焉命也史臣論公晚節偃蹇為姦臣所擠見殞賊手是未必然公孫丞相以仲舒相膠而梁冀以張綱守廣陵李逢吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然於數君終不能有所傷而公獨不免於虎口由是觀士之成敗存亡豈不有命耶而小人軒然自以為得計不亦謬乎吾聞之古之尚友者以友天下之善士為未足又尚論古之人誦其詩讀其書思見其人而不可得則方且招屈子於江濱起士會於九泉蓋其志所願則超然慕之於數千百載之後而况於公乎公之功名事業已絶於人而文學之妙亦不可及因其心畫之所在而祠之此昔人尚友之意也嘗試與強叔登離堆探石堂觀其遺迹而味其平生則公之精神風采猶或可以想見也夫龔鼎賈浪仙祠堂記唐韓退之善為詩道性情一時相從者如孟郊張籍最號友善而浪仙學詩於劉又晚得偕與二子遊頗以才調相推髙雖然觀其風致清淡得之自然誠亦郊籍之儔故後世學者語騷雅之流裔孰敢外三子焉浪仙遊長江徙官於安嶽而卒於會昌三年凡為編次其詩者二人許彬者謂之小集而天仙寺浮屠無可謂之天仙集當時之人有可名者島俱請之讚天仙集傳之既久返以讚為退之之辭然退之前後二集皆所不載及得李洞句圖序質之然後信其非也浪仙於舊史無傳邇來朝廷新其書遂得附名於退之之後而頃嵗居官者署祠堂於蜀士神廟廡之次今伯氏實佐令長於是邑嘗議其堂雜與神居非所宜也而尉有西圃者在唐為主簿之廨址誠將遷其舊搆更以繪像無撓邑人於義何有既遂經畫而就之其屋不華而完固其地不奧而清越其兩傍封植筠柏鬱然嗚呼浪仙沒距今二百二十餘歲矣名始著於史䇿而其遺貌又得宅於故處乃知士之能蹈善雖日月之逺必有為黼黻其迹者今幸爾副其身後之所待措之無窮宜不復恨矣而伯氏逺以書諭俾文其實然而蹈前哲之為啓來者之慕抑所願聞即為取諸新故之所傳而備存之且以示改作之有由也袁輝通惠橋記益之南簡之西陵之北吾鄉在焉衝三州之會民閻僅千室而商賈輪蹄往來憧憧不減大郡俯市門有長江潄其址江出源餘霜山經龍淵歷漢陽而南趨岸戲勢迅水驟至即湍悍不可禦昔之虹梁鶴表可恃以固者輒飄蕩無幾吏苦興廢雖古遺愛至是亦多倦色民病涉久鄉僧士賢奮然以緣化從事即舊址架石磴而廣之巨若鼇背過者如步堂上又積石兩涘翼為長隄延亘凡數十尋經費不資未嘗以聞有司借民力而功成水患遂弭經始於崇寧三年十月甲子落成於大觀元年二月丁酉士賢請鄙文以志佘戲謂賢曰凡物載形象閲時數寧保勿壞况石有時以泐濟凡庸悟昏瞶出之沈淪俾造聖域其功利孰與是多賢曰若然豈可無相亦安用子言為土圯木朽繩絶船危石且然爾橋且然爾吾且妄作之子其為我妄述焉余嘉僧之誠能遊戲成如是功德竊願絺繪章句華豔其事為來者勸適預能書隨計偕方伯戒行甚邇聊書嵗月云大觀元年記楊暈碧玉亭記石挺出於山旁髙丈有二尺圓若礱錯上鋭而下廣蘚痕斑斕如抱籜焉俗呼為石筍下有衆水泓匯驚濤怒浪㵼入山腳石筍之北向東行百餘步有山曰王髙左右周視見羣山之邐迤如覆盂於地皆不足與爭雄得其名信哉山之稜一起一伏盤旋而去勢若飛動直奔於江滸逺望之若遊龍從空垂下矯首揚脊瞋目奮爪而投於水中山半起一峯乃損益髙下得數丈坦地建數椽於其上不求靡麗止可遊息粗適一時爾若夫聳立晴空如屏之列於前者三峩也縈紆曲直繞坐而流其下者雅水也茂林修竹塔露而出其中者九頂也兩山中分峙立而相望者涇口也煙雲散聚巗岫出沒中日變作千怪萬狀俯視舟航順流而下若脫葉之浮水車馬往來若螻蟻之在途竹徑松窗雲屏雪嶂四時之景變固自不常東西南北目斷不見涯涘雲天四垂無極復無無極無盡復無無盡然則千萬里之外豈知有此亭耶昔之荒榛叢薄穠蔽牛馬已而潔之置宇傅會草木丹漆黑白之所為豈知百祀之後柱石摧圮不復為荒榛叢薄者耶每聞古人未遇登山臨水未嘗不感慨興歎為儒者皤然一經歎功名未立為商者曉暮戴星歎道途艱阻春風秋月騷人歎詩思苦澀雨夜雪朝羈客歎鄉關邈逺一涉世路寧無感激昔孔子以道德自任所至之國分庭抗禮可謂尊貴矣然北遊於農山則曰於斯致思無所不至自衛適趙聞殺鳴犢臨河有不濟之語後世登臨之人有歎息者不為少矣豈非道與世抗命與時違而然哉文選有言曰日莫碧雲合家人空歎長無他鹽車久負髀肉漸消嵗不我與登是亭者豈不喟然聊序其意將以告子孫告朋友傳來世云建炎二年三月十八日記邵博清音亭記天下山水之觀在蜀蜀之勝曰嘉州州之勝曰凌雲寺寺南山又其最勝也有近嵗所謂廉訪者輒曰亭雖佳其名字於吾意不可自書為橫山堂易之余舊聞寺有東坡遺迹過而訪焉照禪師告余以故嗟夫此孔子習禮之樹所以不免於宋人也雖然東坡前日之不幸何獨此哉而小人之無忌憚則不復有加矣舊榜尚存復置於額而并刻之石且記其事以為往來士大夫之一笑徐粹中重建州學記世無不可成之材亦無不可善之俗潟鹵之地可使為良疇九夷之陋可使為洙泗其以為難者亦誠有所未至焉耳唯天下之至誠為能成天下之化天地之化育可贊也况於人乎君子之於天下也不患材之不成俗之不善患吾之誠或有未至是以無所不用其誠亦無往而不化夔之有學本末載於舊記嵗久屋老常有震陵之憂紹興二十三年春吳興沈公自宗伯翰苑均逸侯藩山東蜀移鎮於夔會夏大水屋被漂墊公命相土更築於舊學之北得髙明爽塏之地并其廟遷焉橫經有堂肄業有舍藏書有閣膳羞有所背山面江廟居其中肇上於秋九月戊申告成於明年夏五月辛巳總百三十四楹有來羣士其至如歸相率摳衣願識其實粹中嘗讀易之觀曰觀盥而不薦有孚顒若且盥而不薦者為化之誠也有孚顒若下觀而化之誠也是以為彖辭則曰聖人以神道設教而天下服為爻辭則曰觀國之光利用賔於王於戲公之化于夔誠既至矣諸生其勉之異時觀光上國進用于朝人知勸勉相率以從善寖寖乎入於鄒魯之化孰不曰自今日始謹拜手而為之頌曰夔之為州介於巴楚民生其間魚鹽商賈慶厯治平始為黌序逮夫崇觀俊造接武我皇中興嗣復疆土闡揚文教增光烈祖建侯作屏以綏以撫二十七年禁從分虎政未及施勸化庠宇來相其居榱椽敗腐顧將新之候時而舉會夏大水漫為洲渚卜築維新奐輪有度民初墊溺未遑安堵公命賑之爰發倉庾泮宫之修子來樂胥日者夜郎稱兵嘯聚三嵗興戎未免攻取泮宫既作囚執為虜鴟梟革心好厥音吐在昔僖公修泮東魯爰服淮夷頌聲鼓舞今也沈公道尊學古樂育人材不問淳鹵達以至誠化如時雨乃會其入乃豐其貯士不家食於焉遊處匪命匪攜率規蹈矩利用賓王陵我鴻羽豈不自公肇開義府昔者孟軻聖道是輔韓愈稱之功不下禹粹中於公亦云斯語紹興二十四年八月初一日謹記竇敷黔江修學記紹興戊寅春二月西魏公禧被命守黔始至之日祇謁先聖顧學宫不治荒陋狹隘固已憮然及跪觀上所賜宸翰匣而藏之蔀屋中則尤震懼不自安明年遂有意改建心思手畫度地辨方無不用其志乃取養士之餘鳩工積材斫石陶瓦動以千計而無一擾於民又明年首建宸奎閣崇顯壯麗氣象安廓而經天緯地之文驚鸞回鳯之筆卓越煥爛光被江山又摹上所題大成字揭之禮殿之榱椽闓其蔽障飾聖像正十哲顏孟位築東西二序繪七十二賢於壁闢四齋設明窗淨几更講堂以嚴涵養正門閭以快衆目未逾年而工畢既畢屬敷書其事敷曰學校者乃禮義之所出政治之所本而公議之所在也古者獻酋馘於是受成於是論政於是一官一職以至公卿將相皆出於是真為國者之先務也然鄭人遊於鄉校以議執政或謂子産毁鄉校子産曰不可善者吾行之不善者吾改之是吾師也孔子聞而謂子産仁嗚呼人有賢愚事有當否則世有謗譽當否在我謗譽在彼君子修其在我者而已奚恤於彼哉若逆畏其議已而欲毁鄉校則其為人可知也黔舊有學學者不減旁近郡不以教養為急故散居郊野此豈知子産之言哉能無愧於孔子之謂仁者哉頃嵗科舉朝廷禁挾燭之弊嚴其科條敷嘗督其事棘闈一開白袍百餘輩裹飯而前寂寂無譁須臾坐定不窺一册文賦自成日未斜而出敷心異之以為士固未可輕料也今公盡力於學又謹春秋二祀禮樂俱備文物皆新前所無有當見千里之間父誨其子兄友其弟正衣冠事語言爭先洗濯磨淬來集於斯目覩雲章口誦王言其不負上樂育之賜異時升薦必能起遐方而瑞天朝至於學問有暇欲議公之政其必曰尊主庇民奉法循課新學校肅教化而我之父兄子弟誓不忘公他復何言關耆孫大貢院記國家用唐制以進士取士三嵗大比士由州縣升者曰鄉貢詔有司進退之此貢院之始也太宗覽進士試喜曰天下英雄盡在是矣當時以為美談余則曰自周鄉舉里選之法壞而士失其寓猶賴春秋戰國之間齊晉鄭衛之君以君子多寡為盛衰而田文趙勝之徒客多則強士雖失周之寓然各隨其所寓而安至秦則忌之忌則殺之以為之窖可以盡掩天下士而不知蕭何曹參陳平張良之徒則秦不能掩之也漢用秦士起漢則先收士於是惠文而下有選舉之法曰賢良曰力田曰孝廉曰明經皆其目也漢以選舉寓士故亦不失其寓王莽曹操睨先後之弱而欲襲之則又忌士士遇莽操如遇秦然然秦不能殺蕭何曹參陳平張良之徒於前而莽操不能殺冦恂鄧禹周瑜諸葛亮之徒於後士之未易籠絡如此漢揚子雲曰周之士也貴秦之士也賤謂周貴士可也謂秦賤士則秦豈得而賤之哉唐因隋舊以進士取士其始也得士如狄仁傑張九齡姚崇宋璟裴度則亦能為唐強而其末也如鄭朴楊知至則為唐之亡矣取士一也何始末之異也余觀太宗初興本有忌天下英雄之心既不能用秦之殺則欲以進士為餌而銷之吾忌士欲以此銷士而乃誑人曰以此取士士不識吾心且已識則南山之南北山之北矣吾將幾萬鍾幾千駟可要而來之哉識吾心者不來則來者宜其為鄭朴楊知至之徒也國家取士用唐制纍聖待士則非太宗之心所以得士上勵精求治思欲得天下士與共大功業今取士一塗而貢院實為進士取士之始則其容略乎夔一路十五郡而合六郡進士試於夔初無貢院以破寺寓之寺破尚可也而夔一城惟一寺一嵗而天申會慶兩節郡臣子舍是寺無以東嚮而祝堯也豈可又以之為貢院而三年一殘破之乎夔則寓貢院于此歷幾嵗乎而不問也嵗庚寅前侍御史王君伯庠來鎮夔下車之明日慨然歎曰託釋氏以見臣子之尊君貢多士以示諸侯之報國此豈細故事而弊於前不問於後可乎况今取士惟進士一塗吾待進士誠不薄俾士亦不自薄進士而後得士則貢院為郡第一事也下令創新之然退而顧公帑視民力則弊不可仰欲遲之則已下令郡進士鵠立待也於是公私之須皆一歸於節專以治之凡五閲月而成為屋一百一十間一毫不取於民民但見其成而不知其為力也則相與歌之以為君曽為上耳目官知國體者君不薄進士是欲士不自薄進士得士而貢上也君之為政可謂知其本矣君濟南人君之考君諱次翁嘗參大政事光堯舜聖太上皇帝君自立不以公卿子弟官而世進士科今守一藩能不忘本如此視古以曲江題名為非以家有文選為過者何啻九牛毛耶貢院落成郡士屬余書輒記其月日云劉昉八陳圖記魚復陳磧創自武侯江流莫移若有神護雖經毁改幾失其真稽之圖經訪諸故老而遺迹隱然尚可見也顧將湮沒余心是悼亟令軍士裒石增壘悉還其舊方圓曲直縱橫廣狹之不敢少加損焉尚慮他時復罹前厄刋圖於石用示後人界垣之內縮而計之以丈為分其外圖山川城郭之勢而不計以度且命作侯祠於城上以俯臨之夔人嵗以人日傾城徙市縱遊八陳之間謂之踏磧是役告成適當是日賔僚咸集酹酒陳詞以落之昔侯嘗擒孟獲獲觀營陳心不服曰若祇如是固易勝耳逮至七縱七擒然後以為天威及司馬仲達觀其軍壘則嘆服曰天下奇才也桓溫過此雖能知其為常山之蛇勢蓋亦未究其妙然能知與否在孔明初何損益余非能知之者姑修故壘以俟來哲云紹興戊辰正月丙寅潮陽劉昉書馮時行修成都府府學記紹興二十八年冬天子命中書舍人鄱陽王公出鎮全蜀明年四月至成都下車謁孔子廟顧見學宫圮毁不治喟然而嘆且言皇上撥亂反正易干戈為俎豆開立政化純用儒術常以萬幾餘間手抄六經論語孝經孟子戰國樂毅晉羊祐列傳及圖孔子與門弟子七十二人像躬為敘贊頒之郡國藏之學宫以示惇勸以率斯文德至渥也成都西南大府當是時學校薦祭無位肄習無所其何以仰承聖明休德亟命度材計工涓吉肇事力不民役費不民取易腐敗而新之與新作而補其闕凡四百楹皆敞豁靚深精堅嚴賁公來視成諸生東自荆夔西極梁牂坌集廡下歡喜鼓舞咸願記載傳之將來公以命其屬部沈黎守吏縉雲馮某俾敘其興作之由且繫以辭公名剛中字時亨其治蜀純用儒術其有得於經術者豈弟樂易之政無愧於前人詞曰楩楠於山魚龍於囦物生有元彬彬學宫蓄儲其中登為卿公聖神宅尊滌除妖氛煥以堯文夏校周庠達於四方聲教洋洋皇曰岷蜀詩書之俗誰歟其屬振其殫竭孕其俊傑繄豫近列西南巨屏綿絡參井惟公是命皇曰往哉惟撫惟懷實惟汝諧漢有文翁千載吏宗汝惟其同公拜于庭皇亟其行虎熊旗旌公來祁祁致其肅祇先聖先師顧瞻頽傾心經目營亟命鼎新刋山浮川巨桴雲連徒旅闐闐己卯仲冬日旦昏中涓吉肅工千趾俱升趨之蒸蒸各奮而登翔然其成煥然其明杳然其深公其省諸邦人從之岌岌嶷嶷公升於堂而色而康喜言孔揚諄復誨語如父如母邦人鼓舞歡傳萬口父兄師友更相進誘一日二日化行洋溢如風之疾惟皇作極貴儒尚德百王之式惟公之賢受命於藩皇極遐宣斡旋樞機皇曰來歸蜀人其思樂石峩峩矢詩不多千古不磨謹記李燾新修四齋記蜀郡文學掾李浩蘇詵具書告丹稜李燾曰成都學者日增統帥陳侯懼學宫不足以容乃即公堂之左右更築崇寧廢址新為屋二十八楹分為四齋疏為四十八窗髙爽靜深學者益趨焉總其費為錢一萬九千緡有奇經始於去冬落成於今春而秋毫弗以煩民此美事也諸生咸願有所紀述敢以告燾再郤而再至已乃喟然嘆曰營繕齋屋事固甚美雖不紀豈不粲然陳前而燾私竊有感焉則不可不為諸生詳之蓋聞古之士皆有學學必有講習之處在家曰孰其曰庠曰序曰校蓋各因所處而立之名初未嘗有大小升降之殊也嵗時朋萃羣集有司於是取賢斂才推而上之其不率教者屛之夫推而上之亦必有講習之處焉斯總名曰大學大學惟王者之都得有是名非王都則名曰學而已故鄉黨莫不有學謂國乃有學固已失之且庠序及校皆所以名其講習之處云爾未始訂某處為序某處為校也亦未始曰庠不得名序序不得名校校不得名庠也昔孔子射矍相之圃蓋以魯君之命致衆而論士然則圃亦學矣豈必曰庠曰序曰校而後為學云乎哉若孔子固未嘗言庠序其言庠序則自孟軻氏始孟氏雖列三代學名而其義則專在養教及射修吾孝弟忠信而已故曰學則三代共之皆所以明人倫也又曷嘗分東北西南上下左右或在廟或在國或在郊春秋冬夏所居各異詩書禮樂所教亦不同如大小戴所記鄭康成蔡伯喈輩所箋注紛然交加雖巧辨曲通之成理考正求定終須掊擊况又增以成均米廩瞽宗辟雍膠射與夫三靈五府别號異辭叢脞雜遝混為一條不可致詰先儒悟其齟齬難以位置則從而為之説曰周兼四代之制蓋一處並建四學非四學各為四處也然其説要未允當姑置周勿問彼區區之魯而亦兼四代之制乎泮水詩今具存米廪瞽宗辟雍膠射不少槩見不知漢儒何所依憑而公倡異端強入他類疑誤學者蓋其甚病在溺心以博未識古書之正偽更怵世資傅會緯説錯亂經言遂使後世人主惑其名而不究夫學之實籠絡牽聯惟恐漏落崇侈土木贅聚冠履於孝弟忠信所當修者則未始致意焉其言豈不諄諄特其意倜倜然逺耳漢孝武幸從董仲舒等議立大學置五經博士舉孝廉增弟子員或獻雅樂或對三雍當時抑亦可謂彬彬矣然孝武實急功利士之精通秀穎者皆不肯遊學遊學者特章句之儒初無益於成敗之數也逮孝昭欲救民間疾苦更召天下賢良文學以訪之則其所養竟非所用此不究實之害也光武創業未及五載於傾側擾攘之間亟立大學雖不免以讖決事而崇尚儒術有意其推本之也孝明孝章是承是繼其後稍怠學舍鞠為蔬園永建六年更造黌宇開拓房室舉郡國明經耆儒以充入之大將軍下至六百石悉遣子弟遊學逮太初之元編牒數踰三萬郭林宗申屠子龍雖髙尚其事亦復周旋其間奬拔人物扶樹道教為諸生倡范孟博等與聞國政深議不諱自公卿以下皆折節下之假託如黃子艾晉文經稱疾臥家士大夫請見弗許三府辟召輒加詢咨隨其臧否以為豫奪當時儻非假託得不謂盛乎要不可與先漢同日語曽無幾何旋遭鉤黨之禍議者反歸過於太學若是則學終無益於政祇有損耳是不然學之為王者事久矣化民成俗匪學莫繇顧用之何若後漢之學是猶近古及其末造聲教廢於上風俗清乎下百餘年間亂而不亡匪學之力歟若郭有道名冠大學而超然塵垢之外不為好爵所縻正言直節嶤嶤獨全彼子艾文經終賴符緯明及林宗輩排斥詐不得售禍發鉤黨太學何與也惜漢儒但指經術為祿利之路而不推本於孝弟忠信俾人自進修所用者狹爾本朝詔遍天下立學肇於慶厯極於崇寧其得失之速有目共覩而三舍升降月書季考之法纖悉備具大率誘以祿利故未見豪傑之士卓然自太學興起者此則士所共歎也夫修其天爵而人爵從之又何俟於誘若誘之空激令躁競不安命分是不耘苗而又揠之長者也獨明道景祐間胡翼之治湖州學其規模去古差近弟子往來常數百人莫不以仁義禮樂為學其出辭氣動容色人忽遇之不問可知其師為翼之也磨礲浸灌之功多矣慶厯更新太學有司請下湖州取翼之法以為大學法焉抑嘗聞翼之弟子各以經相傳授又别置齋舍榜曰治道凡欲明治道者肄業於兹如治民治兵治溝洫治算數之類咸因其性而肄業焉劉彜蓋治溝洫者至今猶以水利著夫豈茍然純用科舉為學哉及元祐欲革元豐三舍詆訐苛繞之敝初命程正叔與顧子一孫莘老同更定學制三人議别置尊賢堂及待賓吏師等齋實用翼之故事會胡完夫與正叔異趣事不果行今天下立學皆遍師生相與言惟作文義詩賦論策爾是猶日不給而况敢及科舉外事且徒飲食之而不於是取賢斂才無怪乎自怠自棄者之多也今多有是説欲減鄉舉十二三以其額畀郡國之學使學者由是發身其得人未必不愈於三嵗驟舉於其鄉者是或一道也而朝廷憚於改絃易調然好學者亦豈因是而遂輟其所好乎燾鄉侍講席嘗從容為上言乞稍變試文體格無若今之煨釀熟爛庶幾豪傑有以自見上甚鄉納趣令就直廬條具疏得旨須再試即行會燾去位事亦隨寢若試文體格不變又不於是取賢見才則郡國之學誠徒立爾必不得已翼之故事尚可倣依而馳騁使學者不妨課試如式復於科舉外專精讀書且有以自食無復營求擾亂優遊饜飫日知其所亡月無忘其所能比及成就則自當與古為徒謂學果無補於當世吾不信也昔文翁初起學宫於成都市及元朔五年詔天下郡國皆立學宫蓋天下郡國學宫實自成都倡之後之為成都者於學宫不敢不致力雖迷國誤朝若崇寧宰相其致力尤甚異時縱不説學亦必枝柱邪傾圬墁赤白蓋虛矜偽以干逢掖之譽今陳侯獨能躬行節儉削浮冗之費罷誇詡之燕日積月纍創成大厦其視文翁減省少府用度以成就蜀諸生無不及焉其為德厚矣諸生曷亦思所以報之乎司馬相如雖文章冠天下然弗張四維似非吾黨揚子雲金口木舌真漢大儒而出處之際未免跋疐彼莊君平李仲元沈潛自遂莫我縶維乃可敬仰爾嗚呼繇文翁以來仕而顯者固多矣何君公趙志伯謙溫等雖登三公君子弗貴也惟范景仁起寶元終元祐其進退雍容實光於莊李若景仁斯不負玉堂石室云燾無德之齒猥杖於鄉稱道不亂則燾何敢其私竊有感焉者蓋具此姑以復諸生其尚交警戒哉雙流逍遙堂記雙流有堂曰三相其得名最久按諸史牒唐韋嗣立嘗長斯邑政績殊異後相則天中睿所稱三相嗣立其一人也餘二人蓋莫知孰何或曰季父思謙兄承慶仕皆歷鳯閣鸞臺邑人深德嗣立故併思謙承慶法其形貌因集其門戶而號以三相他族不當間此或曰圖像故止一人好事者強增益之俾益三數不知嗣立為相實三拜三已所稱三相即嗣立也思謙承慶無與焉余謂思謙承慶雖無并存之寧過於厚若論斯邑要當以嗣立為主且究其本末嗣立蓋長於治民相國殆無足言自隋改廣都曰雙流迄今踰五百嵗佩銅章結墨綬者紛不可紀而嗣立獨擅能名入踐臺閣更以平章事檢校汴魏兩州不嫌逺外先十八人請行晚益流落而巡察吏猶表其清白可陟之狀所長果在此不在彼當時最課諒非茍相諛悅必有當民心可傳繼者惜哉豫未之聞也嗣立既能得民其好尚復與流俗小異雖居廊廟每自託於山林孝和嘗幸其居即詔嗣立襲逍遙公敻故封逍遙公者嗣立之族人在宇文周時志節尤髙嗣立要非敻對然察嗣立胸懷本趣似不以紛華盛麗為悅者顧弗能蚤自絶於匪人與楊宋崔趙同執國柄豈必真知方外之樂抑亦羞處汙穢始託此強自洗濯乎故豫於嗣立猶有取焉爾嗣立去雙流既五百嵗而豫實來邑之頽剝殘缺固非當時比而余又遲鈍迂濶不堪世用拊存凋瘵惟恐傷之得免斯幸而何敢望嗣立之最課若山林則豫所固有也嗣立又烏得以權勢而兼取之乃即堂之南更啓窗戶乘嗣立故封而命以逍遙簿領空隙徜徉其間庶幾不失余之初心且為斯邑故事云􅓃䏰記漢志巴郡有􅓃忍縣顏師古注􅓃音劬杜君卿通典乃作􅓃䏰音蠢䏰如尹切與師古特異按許叔重説文朐脯脡也其俱切無他義􅓃䏰蟲名漢中有􅓃䏰縣地多此蟲因以為名􅓃如順切䏰尺尹切讀如閏蠢君卿蓋從叔重而小不同然叔重謂􅓃䏰屬漢中誤矣類編承叔重之誤既以朐䏰屬漢中别於䏰字下注朐䏰縣屬巴郡則又承師古之誤遍檢地志漢中實無朐䏰固當以君卿為正然朐當作􅓃從旬不當作朐從句君卿猶未及辨考職方者宜辨之閏月一日泊舟雲安之西三十里萬戶驛下橫石灘上土人云今驛之左右􅓃䏰故地也乾道九年記李石勾氏盤溪記君子之於物也物之而已不以為身之纍也不以為纍雖天地之大吾能物之一以為纍如飲食衣服皆反為身病故必以吾之一身較其大小輕重而為之等級身外之物泛然來悠然去以身為量而君子之物備矣且一丘一壑所須甚微而係物甚大以身取給可也不則連甍阡陌并絡包山絶江障林蔽麓造巧飾浮使他人視之以為玩已因之以為病何益哉嗚呼斥桑麻之用以種桃李飾茅茨之用以充藻繪如齊雪宫之麗如梁金谷之富一山之植非纍年不致一花之種非兼金不濟又求所以牣其中者非聲色不娛非絲竹不樂此桀紂之惡不至是也傳曰非人其物惟德其物君子嫓身以對物不以物為身之纍果如此哉吾友繁江勾君友于之作盤溪非茍於作也樓以藏書堂以教子亭以賦詩榭以置酒且自誓曰俗子汚我不汚門凡士凂我不凂室清風肅戶明月贊席抱琴之童挾卷之子照映几杖之側徜徉筆硯之間吾乃今知勾君之志於物以為盤溪之取亦多矣吾嘗過勾君問其所以作之之説曰吾學不適於時用官不逮於世資聊以盤溪之尚易其生平謬用之心望望外物乘除消長不既汰矣乎他人往往以斜川見誑吾甚不樂得一語以洗其侈名之謗足矣余天彭倅罷徒步過之門生何夔趙鶚從君欣然迎客謁記許之十年又以書來復許之不三月君今亡矣因書君平生語以志挂劒之義轉運司爽西樓記岷為蜀山之傑俯瞰井絡於天西維者皆平川也環山四麓凡府寺州廨丘里之室郊遂之居得以審勢髙下隨方廣狹敞樓觀鑿戶牖延空光揖秀色如直如負如飛如騖熙而陽肅而隂四時朝暮開闔晦明者皆岷山雲氣往來日月吐吞也成都官治多勝處端倚此山向背為重異時名輩接武於此往往貪得擷取為懷袖几硯間物神明之所激妙奇異之所鍾萃浩乎廓然文章事業不論其人胸府氣象可知也頃以邊圉多事要塗貴人尚不得緩帶為治而金榖計算局踧糾纒求如曩者燕笑豈弟於俎豆升降以無負西山之勝非曰不能有所未暇况俾之一日之葺兹豈其時使者潼川任公將漕西蜀方有司吝出納以幸集事獨能以約致詳以靜制動視族庖缺折於大軱一割者處之裕如先是有堂名宴思層堂作樓而未名大抵嵗久支撑凛若將壓焉者棟墨塵蝕斷碑卧草讀之則趙清獻公之經始而文湖州為之記審矣可以躋可以宴可以憩息昔之所在誰續誰似官如客寄屋如亭傳風雨鳥鼠不經人意且公則壞之私則營之豈人情哉於是即舊圖新用力不煩芟荒撥穢程績為多因以爽西名樓并繪清獻湖州二像於壁曰吾非敢作也自有此山以來如湛輩未問至於景行無窮斯人斯文與岷之三十六峯巍峩於目者可磨也哉石謂開物成務此學也妙之於道任重道逺此才也寓之於仁固有以媚世為學淺粗與農圃同役以適俗為才競走與蒱博爭路智跨力攘終為災人不知君子曰道曰仁將以澤物庇民而刻意細技有不足呈盍亦藏之於無所思慮育之於清曠粹夷放之於虛明爽塏窅爾心化倐爾神運而天道已行矣公所以嘯咏一室以風示吾儒仁義忠厚之實且因蜀山慘舒為吾民休戚之占非特登臨觀美而已雖然斯未足以窺公之盡會公有旨召東去落成登樓之賦客有未具若乃嵗月大概俾來者有考似不可無籍大成井記外學吏李石作二井於成都先筮得巽揲之六三三九而老之坎焉曰此井祥也陽搖其精陽開其明水湛乎深土溢乎津順所以汲以免於險吾井其濟乎乃闕甃三尋有咫得食焉分東西為亭以大成名據象詞也嵗大荒落日清明大余一十二小余一千七百七十一銘曰一奇而精六偶而盈此天地合水所未形我浚其原如海之溟派挹華滋分注以清我則不驟待其淵渟有綆之修此險之行爾汲爾學無敗厥成鄭銓冦萊公祠堂記府城之東有廟曰見報司者故太子太師萊國冦忠愍公之祠堂也廟初本澄覺院治平二年賜名正覺敕書存焉院初為十方有禪師曰可居自雲頂來住持因塑公像與雲頂山之神曰利國王者並祠於院之東偏嵗既久鄉人事之頗著靈異民相與質其曲直報輒如響遂呼為見報司今雖有僧居之而院實廢為廟矣見報司之説頗不經而傳之既久有不能廢然為善為惡使民知有所報則有之足以示勸戒亦不必廢也紹興甲子廟將壞鄉人徐復與院僧圓證率好事者再新之改前日之佛宫為萊公之祠堂公始正離明之位前為兩廡其東廡開一位以祠利國王其西一位亦塑神像以居之祠堂之後為齋廳乃住持之法堂又改方丈為妙音堂以備僧徒道場僧房齋庖皆備視前日規模不復然矣復思嵗月寖久人弗知興起之由屬豫記之豫既為志其詳矣按成都古今記正覺院與見報司俱不載惟前記祭祀門有王者八而利國王在焉有公者十而冦萊公在焉前記乃趙清獻公所集當時既載祀典則廟與院不宜俱失續記乃王公時亨所修而廟宇寺院門亦不録故鮮有得其詳者春秋之祀官並祭萊公與利國王甚久又未知自何人始也今述其重修之因以貽來者若萊公之遺德則有國史在兹不復述也然則生而聰明正直有功德於民死而祀之固宜况事有可以起人之敬而生其良心亦何嫌而不書之哉席益御書大成殿額記紹興六年十一月左迪功郎新成都府府學教授范仲殳言臣所任成都府府學大成殿建於東漢初平間天下棟宇之古無過此者而未有題榜願陛下萬幾之間新御翰墨揭之殿額以示人文化成流道德之富覃及逺方之意上可其請即命仲殳乘傳以賜次年九月辛巳仲殳至自輦轂下臣益備位牧守率籲僚佐出迎於郊拜受於先聖祠下圜冠方領之士濟濟翔翔閭巷阡陌黧老黃幼聳觀歡呼咸用欣戴天子闡融文教遐不作人之盛德罔不奮勵感激興於禮義嗚呼懿哉晉丞相王導有言方今國恥未雪忠臣義夫所共扼腕撫心宜正人倫設庠序使俎豆之事幽而更彰以著淳風流德化天子不以蜀之遐濶僻陋越在裔壤大頒宸筆光裕黌宇煙霏露結之形鸞翔鳯翥之勢煥乎如日月麗天雲漢昭回可謂甚盛舉矣昔苖民逆命虞舜舞干羽於兩階七旬而來格宣王興衰撥亂命召公平淮夷其詩曰矢其文德洽此四國臣雖駑劣敢不推廣上意聳動蜀之士大夫説禮樂敦詩書和衆安民慎固封守以仰裨中興之業追蹤前古無忝聖神樂育之惠臣益頓首幸甚紹興七年十月十日記府學石經堂圖籍記蜀儒文章冠天下其學校之盛漢稱石室禮殿近世則石壁九經今皆存焉自孝景帝時太守文翁始作石室至東漢興平元年太守髙瞬作周公禮殿於石室東圖畫邃古以來君臣聖賢然亦有魏晉名流以故世傳西晉太康中刺史張收始畫非也殿有畫自髙瞬始逮收嘗增益之今壁間又有東晉人士蓋收之後繼有畫者不知誰氏也齊永明十年刺史劉悛益以禮家器服制度偽蜀廣政七年其相母昭裔按雍都舊本九經命平泉令張德釗書而刻諸石本朝因禮殿以祀孔子為宫其旁置學宫弟子講習傳授故蜀帥尚書右丞胡公宗愈作堂於殿之東南隅以貯石經益之先人鎮蜀奏秩文翁髙瞬於祀典又請樂工於朝教士以雅聲而後頖宫之禮樂文物粹然近古自國家三雍之外無與比者鄉者中州陸沈惟蜀賴天子神聖威武得保生聚邑屋而吏視軍賦為急春秋釋奠守者不親行敕下吏攝事以故風雨鳥鼠之虞不至黌舍蓋自東漢興平元年嵗在甲戌始作禮殿逮我宋紹興六年丙辰歷年九百四十有三其間偽蜀刻石經之嵗是為晉開運甲辰至是一百九十三年矣益實受命盡護全蜀兼行太守事兹嵗八月諏日在丁郡文學藏儀吏以不圯板築之功雖垂軒皇之衣裳舞有虞之干羽自當功成於理外如其不然則伏湛行鄉射於東京征伐之間王導興學校於江左草創之始是真迂濶矣或者聞此而猶未喻吾將賦子襟之三章悲原氏之將落也尚友君子者知此心哉紹興七年記侯午仲漢州三賢堂記天下果無正味乎何嗜而皆期於易牙果無正色乎何姣而皆期於子都果無正音乎何聽而皆期於師曠夫三者之正與不正雖智者之所不能詰然以天下皆期焉則吾雖從而謂之正焉可也蓋天下固有不期於三子而自以為識味别色知音者矣然甘吐渣以為膾炙眩空花以為真實惑蟻動以為牛鬬是皆舉天下千萬僅一二焉則亦烏足以害其為正之説哉且是非賢否之難齊而不可為定論也久矣自孟子論善士已有一鄉一國天下之别識者疑焉夫士一也善於一鄉一國烏有不善於天下者孟子安用寸量銖較等列階升之為紛紛耶意者一鄉一國或得以用其好惡之情而徇其豫奪之私有蓋於天下之大善未有不公且廣者則夫善士之論每為之級而必以天下為至焉孟子蓋有微意也綿竹道德文章名節功業之士代不乏人然求其知名於天下而人無異於善未有如內翰楊公中允宇文公丞相張公之為章章也士之賢不肖雖無與於天下之善也然而天下皆以為賢如味之期於易牙姣之期於子都聽之期於師曠則凡所以為正者其必有由矣導江鮮于公宰邑之三年百廢具舉凡國朝以來邑士之賢達者既即學宫而悉繪其像矣獨念三君子知名天下且素心之所仰慕而祠堂未建若非表而出之何以稱邑之壯於是相公宇之西揭其舊屋而新之求遺像於三家之子孫而圖之於壁齒以長幼之序被以隱居之服使若其賢初無與官爵名位者噫公之用意其亦可謂周詳而曲折矣或曰公於衆稠中揭三君子以為賢而特出之則餘容有可議乎豫曰不然昔夫子嘗嘆虙子賤為君子而曰魯無君子者斯焉取斯説者謂其父兄之所訓誘師友之所漸習莫非君子之道而後子賤始得以君子成名蓋自夫子擊節於一子賤因以見魯國君子之衆然則公之表三賢而揭之豈特三賢而已哉涉流者可想其源拔茅者必連其茹於此見邑之多賢士而三人者特天下知名之尤而公之所願慕焉者爾然則是堂之建非獨足以表公師賢願學之心抑所以壯邑之觀也非小補矣三賢事迹著在國史兹不復書樊汝霖新繁縣三賢堂記吾友沈居中為新繁以暇日訪繁土故事則得賢者三人焉其一唐宰相李衛公德裕文饒其一我宋故贈太師王公益舜良其一龍圖閣直學士梅公摯公儀三賢者李衛公王公嘗為是邑而梅公則邑人也居中於是即縣署之東創為堂繪三公像其上榜之曰三賢堂既成以書抵豫曰其為我記之嗚呼衛公之事業文章世傳之史載也詳矣而不書其為繁豈以公勳烈如彼其崇一縣之政不足為公道歟觀其節度西川所以治蜀相武宗所以治天下而所以治繁者可見矣逮今餘三百年父老思之不忘以縣署最大一楠四柏為公手所植此與周人指甘棠以懷召伯何異前任人為此作文饒堂更名衛公蓋得之矣而堂宇褊小不稱及是居中乃徹而大之并與王梅祠焉王公始字損之年十七以文謁張公詠奇之改今字祥符八年進士後以殿中丞來為邑始至有犯法者鄉所素嫉也公條其姦上府流惡處自後一待以恩信迄其去不更笞一人去而為韶州終江寧府通判位不滿其德則有子荆國文公熙寧間相裕陵以經術為天下學者宗師梅公天聖五年第進士甲科歷臺諌言事有體仁宗嘉之嘉祐二年與歐王韓范司貢舉得人甚盛時蘇內翰在得中以箋謝諸公而謂公為大臣元老其秋出守杭天子賜詩寵其行後徙金陵河中府以卒甚矣三人者之賢天下所共欣慕也而居中獨拳拳於繁其於李衛公王公不特取以勵已思齊焉蓋以勵來者也乃若梅公則將為一邑勸焉或謂繁於成都為劇邑自梅公以來擢巍科躋顯仕者不乏賢在熙寧為御史元祐初自考功郎中知今潼川吕丞相蘇公皆賢之則有若周公尹止孺在今中興為給事中羽儀朝廷蜀之仕者視為領袖則有若勾公濤景山何獨一公儀氏哉居中曰然吾固知不可一二數特取其所自始者爾而况梅居鄉時實與王相值凡以詩往來者八十六和易而思深平淡而旨逺讀之使人一唱三嘆大雅君子也吾喜其補於風化為刻石其祠矣有能登堂而瞻其像讀其詩雖暴悍者吾知其易直子諒之心莫不油然為之生矣以美化厚俗未有捷於此也是豈小補哉居中之論如此誠有味其言也豫是以書之居中名鹵豫金堂人建炎二年進士第三人時以左奉議郎知縣事清慎強敏縣學縣南門一新徵科以時庭無留訟逾一嵗人安之惟恐其去也有不豫信視所作堂亦足以知其人矣任淵重修先主廟記智力之不勝義也久矣昔自英雄豪傑乘時崛起有能仗義而行偉然正大指麾號令天下從之雖其不幸不克大有所成就於當時而風烈之餘猶足以聳動後世歷千百載尊仰而懷思之有不能自已者非以義勝故歟東漢之季王室陵微曹氏怙姦賊之資以擅中原孫氏席強大之勢以并江左皆矜尚智力求所非望非有志於王室也海內之士劫於威制雖俯首聽從而心不與之至後世利害不相及則排貶譏笑未始少容惟蜀先主昭烈帝以宗胄之英負非常之略崎嶇奔走經理四方最後伐劉璋遂有蜀漢蓋將憑藉髙祖興王之地建立本基然後列兵東向誅有罪而弔遺民以紹復漢家大業其理順其辭直非若孫曹氏之自為謀也當是時丞相忠武諸葛侯實左右之人品意象髙逺英特駸駸乎伊吕之間應變機權本於道德內修綜核之政外舉節制之師欲以攘除姦凶混一區宇不負其君付託之意可謂社稷臣矣彼其君臣仗義而行正大如此是以海內之士心與而誠服之舉無異論雖厄於運數屈其逺圖而後世有讀其遺書過其陵廟者未嘗不咨嗟流涕尊仰而懷思之也夫義之所在俯仰無愧天地且將直之見信於人亦其理之然哉成都之南三里所立埠巋然曰惠陵者實昭烈弓劒所藏之地有廟在其東所從來逺矣大殿南向昭烈辨冕臨之東夾室以祔後主而西偏少南又有别廟忠武侯在焉老柏參天氣象甚古詩人嘗為賦之廟久不治風雨摧剝殿廡門墻率皆頽圮破缺像設僅存至或露處紹興二十有八年秋九月蜀當謀帥上親擇廷臣文武兼資可屬方面者得中書舍人王公命以龍圖閣待制制置四川使出鎮成都臨遣甚寵粵明年夏四月公始至用故事謁諸祠奠獻至此顧瞻大息曰有大功德於蜀人宜莫如昭烈忠武廟貌乃爾亦獨何心亟命有司繕治之鳩工庀材咸有程度以是嵗十月己巳經始落成於明年三月己丑雖號為因舊起廢實再造而一新之棟宇宏敞丹艧鮮明堅壯精密足以經久祠與惠陵皆護以垣墉限禁樵牧築室忠武祠北明潔幽邃有事於神者得以休焉蓋舊所無也用工萬一千六百七十有八為錢無慮二百萬木章竹箇取於津步商旅之征勞與費民不知焉既成命淵記之淵懼陋不克稱固辭公不許乃冒昧書其事蓋嘗妄論王霸之説以謂義近王智力近霸竊觀昭烈忠武之所為非深於王道未易明其心於千載上也今公之所學宏逺髙明正論凛然一以宗王為本嘗過公孫述廟笑唾不顧至劉蜀君臣嚴事之如此意固有在非特以欽崇秩祀為牧守之所當先也公名剛中鄱陽人開豁邁往而克勤庶事綜練周密治蜀之政百廢具舉不獨新此廟之可書也紹興三十年記安剛中張桓侯廟記漢自建安以來皇綱廢弛神鼎震覆姦雄觀釁實生豕心本初孟德之徒磨牙厲吻血視生靈期於吞噬不留遺種先主慷慷為國志在援拯一時豪英徇義蜂起相與提挈共成大事諸葛關張實為之最凛冽威風萬夫之雄荆州之役羣盜鼎來公為後拒畢力盡死以抗羣醜奮髯張目橫戈一叱蛇豕異類褫魄逃遁虞淵之日覆耀西南繄公之功迄今千嵗英靈之氣森聳如在廟食百世在禮固宜樂溫之山下瞰大江公之神爽實是寓焉自古迄今長載祀典舟行上下與兹土民奔走奉事敢不虔至九榖嘉生連被原隰舸楫往返安流無恙隂相之功在國與民天朝纍封進爵為王惟是廟宇興建嵗久行廊爛頽往來咨嗟力莫能振郡守李公向者趨朝祇謁祠下再拜祈禱厥應如響至郡未幾首議修繕自捐金帛衆趨成之功費雖多了不病民撤去卑陋增飾輪奐開展地基比舊加倍是役也議興於庚午之冬落成於辛未之春惟公既有以利其民矣又有以奉其神民和神安福祿來宜行將以是賀公剛中忝吏是役知之為詳敢具以記張震補夔州大晟樂記宋興百餘載文物具舉惟樂律之議紛然歷數大儒莫能定卒至大晟而百家盡廢於是鑄金尚方採石泗濱以班諸天下校學異時諸生類以時肄習春秋釋奠合堂上下之樂翕然雜奏以饗先聖先師盛矣自中原遭變城邑為墟雖東南郡縣還定安集之餘而禮樂器用無一存者蜀獨以不被兵僅獲全而數十年間吏唯簿書獄訟兵食之為故謂儒者事特無訾省甚者竊取資几案娛玩之用此其於幸中又得不幸者也始夔有賜樂視諸故府十闕五六雲安舊為軍亦有賜取而合之不足則又搜取於他州鐘磬正聲中聲凡五十有六按圖為簨簴置諸學宫每嵗祀陳於庭雖備而不作尚庶幾存其意此夫子不忍去告朔羊之志也嗟夫古之禮樂不可復見矣使器無廢猶有考焉而并舉是去之獨何心哉助豫為是舉者通判鮮于侃晉伯教授宋明孫晞亮隆興甲申十月甲子廣漢張震記王十朋唐質肅公祠記豫始聞夷陵巴東名意其為邑必壯自豫適夔過焉皆蕞爾邑巴東陋尤甚問其名之所由著曰昔冦萊公歐陽文忠公嘗令二邑地重以人非山川城郭人物之異於他邦也豫因謁其祠訪其遺躅歎息而去至夔一日登郡之東城城下臨奉節縣治問喻君思然曰昔宰是邑亦有如冦歐二公者乎喻令以唐質肅公對豫曰是皇祐中為御史獨立敢言嘗疏論貴戚廷斥宰相以貶天下稱為真御史不敢斥其名而曰唐子方者乎熙寧中首言王臨川不可大用及參大政奮然與爭是非於天子前氣不為之屈至不勝其忿而死天下至今稱為正人者乎吾夫子嘆未見剛者唐公非剛者歟名節凛然固無愧乎忠愍決澶淵之䇿文忠移司諌之書也其令是邑有殊績異政故相張公覺嘗筆之於墓碑矣邑故有令如此而無祠非缺典歟令聞之慨然不謀於僚不役於民即廳事之東隅易亭為祠求畫像於江陵得之故家丹青一新儼然如生觀者莫不起敬如見其冠豸觸邪正色立朝時也且丐豫記其事豫謂質肅公之髙明大節固已特書大書於國史何以記為然是邑賴公而重有不可不書者令蜀人捫膝先生子也有家學治邑有能聲觀其所慕可以知其人矣乾道二年六月永嘉梅溪王十朋記移建武侯祠記按圖經侯祠在州南門沿城西三十六步十朋蒞事之初謁焉敬想風烈廟貌不稱圖葺而新之地卑巷隘民居汙渠糞壤溷乎其間非所以妥靈而崇祠也門之東百八十五步有臺下臨八陳圖登臺而望常山之蛇四頭八尾之勢宛然在目北直郡倉即故水安宫據爽塏狀如屏宫北清瀼㵼出兩山之間過灩澦入於峽峽口有白鹽山卓立羣峯之外侯昔經營天下於平沙之上今及千年陵谷雖變精神不亡祠在兩者之間宜亦侯之志也遂與同僚謀遷焉為堂五楹廡萬椽西南各為門以通往來像仍其舊而加冠冕又塑關張像於左右乾道三年四月壬午告成詩以記之曰白鹽峙天兮灩澦屹江風雲慘淡兮翺翔臥龍千秋兮何之新廟貌兮江之湄前八陳兮後故宫龍兮龍兮神其中望昭烈兮隔清瀼遺廟存兮交精神於恍惚駕虛空兮雲為馭臣東朝兮主西顧魚得水而相忘兮事無今古儼關張於左右兮一龍二虎祠有新故兮侯無重輕舍其故而新是卜兮邦人之情祠舍於圖兮自今始祀事不絶兮有如此水閻蒼舒將相堂記古之文武道備於一身而其盛出於一門若三代之英居則坐廟堂出則專征伐春秋之世謀帥御職者皆其卿大夫而伊周方召自其父子至於孫曽皆以此道傳其家而位其國由漢以來文武分為二道而將相列為兩官其能兼資並美固代不乏人推而淵源流衍出於一門名教有光毫髮無憾者抑又艱矣是故以功名相副者謂之世濟以富貴相承者謂之世祿金張許史重侯纍將窮富極貴不足為世重輕而六龍三鳯之流聮飛並騖垂芳於無窮宋受天命神祖聖宗深仁厚澤涵育灌浸歷四朝而至於嘉祐治平之間風俗之美人才之盛極矣其間光明碩大雄傑俊偉以德業聞者固不可勝紀若其兼資文武出入將相如韓范富歐者豈易得哉求之吾蜀閬中陳氏亦其一也陳氏世有聞人自秦國公省華為左諌議大夫官至太師尚書令其積功纍德蓋有自來至公之三子後先舉進士仲居甲科伯季皆狀元由是名震天下堯叟姿貌強力奏對明辨久典樞密靡不淹貫堯佐剛毅篤實好古博學居官無大小所至必聞俱官至宰相堯咨性豪善射在內為學士補外居藩終於節度三子已貴時秦公尚無恙每賔客至其家皆列侍左右客不安求去公曰此兒子輩爾故天下皆以陳公教子為法以陳氏世家為榮伯季年皆踰六十獨仲年八十二父子兄弟仕皆同朝內外孫曽合一百一十人而仕於朝皆以材稱可謂盛矣始伯仲季未第時肄業於鄉之錦屏常從其父訪陳摶於終南山摶謂曰三子皆將相然仲子伯季不逮也後果如其言淳熙十五年臨安吳昭夫以朝使來守是邦其遊刃肻綮之間易呻吟為歡聲變隂曀為和氣令修於坐嘯之餘人自化服於千里之外乃以暇日登臨兹山感故家喬木之蔭擬前世三槐之貴爰作新堂於書巖之上庶幾髙山仰止之意伻來請名佘取圖南之言榜以將相而大書之既揭額矣來請記余以病倦荒落敬謝不能而書來益謹稽之國史考之家傳訪之圖牒而強記之俾陳氏遺芳愈久而愈新焉昔晉初渡江王導卜其家世郭璞筮之曰淮流絶王氏滅當時以淮流無絶理厥後諸王之盛度越六朝及於滅王之年淮水實竭一時人物掃地而盡袁天綱題錦屏山云此山磨滅英靈乃絶若與淮水讖略同然淮水有可竭之時而閬山無磨滅之理故此方人物其出蓋未艾不獨陳氏云張縯南康郡王廟記郡邑通祀有功德於其民者蓋古制也秦時蜀守冰鑿離堆辟沫水之害溉田以億萬計相與尸而祝之者今環蜀境漢興守文翁飭厲諸生於學蜀地學京師者比齊魯其後學校官為石室以祠翁至欲周公孔子配秦守以功惠漢守以德教光明俊偉世傳誦之自是以來凡守之賢者蜀人必為建祠或繪其像天下名鎮未是有也何者蜀逺而地勝受蜀之寄必其要官大人所可倚重者丞相御史往往不盡拘以文法政令能專膏澤可下而蜀之人亦以所事於君師者事之安其令而不違故雖去而敬其奉嘗猶不敢忘然則蜀視天下其亦可謂敦垕而易治矣唐制用節度使治蜀前後名人相望韋南康郡王在治最久德惠最著今蜀人之祠王者秩於土神家有其像而府城內外獨無專祠於禮為不稱今龍圖閣直學士四川制置使內相胡公鎮蜀之明年惟蜀諸路鹽之額浮茶之賦重與夫夔峽科買金銀之弊垂六十年民力重敝吏隂拱熟視莫一措手公悉審核精考以聞凡所以為民之瘼者不一而足公討理脈絡刮求根株盡變革乃止初青羌之未就順也公時方入境增調西兵指授方略扼其脊尾制不得肆至是懾服面縛塞下環蜀地數萬里安於靜簡雨暘順序年穀屢豐衆政既舉乃講舊典之缺度故官宇之隙地新庀王祠門屋耽耽廣殿渠渠修廊環擁便坐後列經始於八月之庚申告成於十二月之庚戌土木陶甓圬墁之工凡九千六百五十四費一出於官而民不與知蜀人戴公之德猶昔之德王也王祠既建民益忭舞縯以部中守吏入受約束於公府下公命縯記其事辭不獲請縯乃復考王之終始而復於公曰王治蜀二十一年當貞元姑息猜忌之間外能折敵人之鴟張以功自結於朝中能撫柔其民三嵗一復使蜀土晏然皆樂其生王之德於蜀蓋如此然王之始進也以隴州假守斬朱泚之使至其末也露章斥王叔文之姦逮謂憲宗監國朝廷為之增氣大節凛凛皎若日月豈獨書治蜀之功哉且今之蜀猶昔之蜀也王用蜀兵破敵人四十八萬衆俘其驍酋靡不如志雖諸葛孔明南定之功無以尚之而往者數嵗間黎雅小夷陸梁山谷吾將士乃選懦不武久無尺寸功今始聞其稽顙屈服然則王之折衝英略著於簡䇿之舊者其可不崇大之以昭示來業公方將奮張王靈灑掃宇縣以成陛下復古之烈宜於王眷然興懷而不置也語未既衆皆起曰子之言然盍遂書之縯因以其事敬書於石王諱臯字城武唐史有傳淳熙五年十一月壬申記蒲咸臨新繁古楠木記周公賦鴟梟之年大風拔木乃命邦人起而築之最為異事然大風拔木天也起而築之人也大木所偃因人而起之當無足怪者孔子定書從而記之示訓戒也元祐八年繁江隆道觀玉帝殿庭有古楠二章分列左右如輔如弼一夕風雷大作偃其左偏者邑宰命匠石取之方執柯伐其枝忽聞軋軋聲乃稍稍起立匠石皆在上如猿猱然觀者驚駭邑宰降階俯伏謝罪君子以是知天道之不可誣也較諸金縢兹為尤異蓋以不待人力而自起也今五十有一年矣縉紳先生尚能言之若不鑱諸石以永其傳則無以訓戒後代余被命尉兹邑道士詹次淵請書其事因從春秋記異之法月而日之以警不能寅畏上帝者任正一遊浣花記成都之俗以遊樂相尚而浣花為特甚每嵗孟夏十有九日都人士女麗服靚妝南出錦官門稍折而東行十里入梵安寺羅拜冀國夫人祠下退遊杜子美故宅遂泛舟浣花溪之百花潭因以名其遊與其日凡為是遊者架舟如屋飾以繪綵連檣銜瓦蕩漾波間簫鼓詠歌之聲喧閧而作其不能具舟者依岸結棚上下數里以閲舟之往來成都之人於他遊觀或不能皆出至浣花則傾城而往里巷闐然自旁郡觀者雖負版芻蕘之人至相與稱貸易資為一飽之具以從事窮日之遊府尹亦為之至潭上置酒髙會設水戲競渡盡衆人之樂而後返其傳曰此冀國故事也冀國姓任本漢上小家女任媼嘗禱於神祠夢神人授以大珠覺而有娠明年四月十有九日而生女稍長奉釋氏教甚謹有僧過其家瘡疥滿體衣服垢敝見者心惡獨女敬事之一日僧持衣從以求浣女欣然濯之溪邊每一漂衣蓮花輒應手而出里人驚異求僧已不知其所在因識其處為百花潭會崔寧節度四川微服行民間見女心悅之賂其家納以為妾寧妻死遂為繼室纍封至冀國既貴每生日即來置酒其家艤船江上訪漂衣故處徘徊終日後人因之嵗以為常且即寺之東廡作堂祠之余自為兒時得於傳聞如此顧未嘗一至其處今嵗之夏以事留成都而適及是日與二三友觀焉訪冀國遺迹漫無可考獨有吳仲庶所作祠堂記與余昔所聞於為兒時者大扺略同時余猶為疑其説之不然者余按唐書大厯中崔寧自蜀入朝留其弟寬守楊子琳自瀘州襲之寬戰力屈寧妻任素驍勇出家財募士得千人設部隊自將以進子琳懼引去蜀賴以全止以姓見初不載其封冀國及為何許人其嘗扞大冦以功得封史家略而不書尚或有之至其家世實不知所據杜子美詩曰百花潭北莊又曰百花潭水即滄浪其來久矣非由冀國而得名也吾意蜀人之不忘冀國之功嵗即其祠致禮焉因相與朋聚為樂非謂其為此邦之人及嘗自為僧漂衣之異也而或者因百花潭之名附會其説矜為誇誕若不足憑况潭在成都為近郊使冀國實生於是寧方節度鎮蜀何至奪其境內之民而妾之豈為民父之意哉此甚不然者矣客有謂豫曰杜子美在蜀與寧同時潭之得名與子美實相後先子又安知其不然寧跋扈人也何有於境內一女子乎大厯之世朝野多虞干戈兵甲時有所貸而不問重以從事中原未遑他及寧自恃僻逺違禮叛律以資聲色之奉以欺朝廷之不知且莫我誰何者蓋有所恃而為此也後寧從德宗狩奉天為盧杞譖死不能保其首領雖曰非罪得非罔上之報天或使之邪方寧無恙時驕其嬖妾至馳騁出遊於十數里之外使人習之而不能改遺風餘烈猶足以啓後人之侈心想其當時車服之盛疾驅於通道大都震耀其閭里之人傲睨一時不知有識者得以指議其後雖冀國嘗有功於蜀而專恣亦甚矣吾以吾之説如此客以客之説又如此相與詰難久之會日暮笑謂客曰是遊可樂事之然否姑置之未暇究也坐客皆笑而罷明日録其言為記蔡逮合江園記合江園唐尹韋忠武作後因其序為樓閣臺榭參植美竹異卉薈翳參差而春芳夏隂波光月暉以時獻狀無不可愛故為成都園亭勝踐之最嘉時暇日方伯刺史與其賓寮名勝登臨燕衎傳觴授簡以極其歡幾與東平之溪堂山隂之蘭亭爭長也而吕正愍之記實刻在石夫地因人而重則是園蓋可知矣然園可娛官官之人未必皆材又屬公府尚簡重燕遊濶疏因弗以治樓欹亭陊花竹剪刜荒穢蕭條可念其無恙者獨長江茂林耳淳熙二年春李唐來為是官入其寺傷焉欲善其墮圮而病其資會提點刑獄晉原李公兼漕領府事唐白其故公亟出緡錢材甓畀以庀事址之墟者屋之宇之仆者起之楹桷牖户上覆旁障之腐而缺者易而新之弗廢其舊而加壯焉而又補藝花竹叢條暢茂咸復其故園之壞而葺者數矣莫若今日之壞甚而葺之力而成之敏也非獨唐能張其官實惟晉原公達所以為政雖職併事叢而細大必舉頤指如意致其下盡力焉它視此可知也工之訖宜有以志逮將入吳會艤舟亭下唐請書其事喜為之書是年記陸遊籌邊樓記淳熙三年八月既望成都子城之西南新作籌邊樓四川制置使知府事范公舉酒屬其客山隂陸遊曰君為我記按史及他志唐李衛公節度劒南實始作籌邊樓廢久無能識其處者今此樓望犍為僰道黔中越巂諸郡山川方域皆略可指意者衛公故址其果在是乎樓既成公復按衛公之舊圖邊城地勢險要與蠻夷相入者皆可考信不疑雖然公於邊境豈真待圖而後知哉方公在中朝以洽聞強記擅名一時天子有所顧問近臣皆推公對莫敢先者其使北而歸也盡能道其國禮儀刑法職官宫室城邑制度自幽薊以北出居庸松亭關並定襄五原以抵靈武朔方古今戰守離合得失是非一皆究見本末口講手畫委曲周悉如言其閾內事雖彼耆老大人知之不如是詳也而况區區西南夷距成都或不過數百里一登是樓盡在目中矣則所謂圖者直按故事而已請以是為記公慨然曰君之言過矣豫何敢望衛公然竊有幸焉衛公守蜀牛奇章方居中每排沮之維州之功既成而敗今豫適遭清明寬大之朝論事薦吏奏朝入而夕報可使衛公在蜀適得此時其功烈壯偉詎止取一維州而已哉遊曰請併書公言以詔後世可乎公曰唯唯九月一日記范成大石經始末記石經已載前記朝子正作考異而為之序考異之作大抵以監本參校互有得失其間顛倒缺訛所當辨正然古今字畫雖少不同而實通用耳考異并序凡二十一碑具在石經堂中子正之序曰鴻都石經自遷徙鄴雍遂茫昧於人間至唐大和中復刋十二經立石國學而唐長興中詔國子博士田敏與其僚校諸經鏤之板故今世六學之傳獨此二本爾按趙清獻公成都記偽蜀相毋昭裔捐俸金取九經琢石於學宫而或又云母昭裔依太和舊本令張德釗書國朝皇祐中田元均補刻公羊髙榖梁赤二傳然後十二經始全至宣和間席文獻又刻孟軻書參焉今考之偽相實毋昭裔也孝經論語爾雅廣政甲辰嵗張德釗書周易辛亥嵗楊鈞孫逢吉書尚書周德正書周禮孫朋吉書毛詩禮記儀禮張紹文書左氏傳不志何人書而詳觀其字畫亦必為蜀人所書然則蜀之立石蓋十經其書者不獨德釗而能盡用大和本固已可嘉凡歷八年其石千數昭裔獨辨之尤偉然也公武異時守三榮嘗討國子監所模長興板本讀之其差誤蓋多矣昔議者謂太和石本授寫非精時人弗之許而世以長興板本為便國初遂頒布天下牧向日民間寫本不用然有訛舛無由參校判知其謬猶以為官既刊定難於獨改由是而觀石經固脫錯而監本亦難盡從公武至少城寒暑一再易節暇日因命學官讎校之石本周易説卦乾健也以下有韓康伯注略例有邢璹注禮記月令從唐李林甫改定者監本皆不取外周易經文不同者五科尚書十科毛詩四十七科周禮四十二科儀禮三十一科禮記三十二科春秋左氏傳四十六科公羊傳二十一科榖梁傳一十三科孝經四科論語八科爾雅五科孟子二十七科其傳注不同者尤多不可勝紀獨計經文猶三百二科迹其文理雖石本多誤然如尚書禹貢篇夢土作乂毛詩日月篇以至困窮而作是詩也左氏傳昭公十七年六物之占在宋衛陳鄭乎論語述而篇舉一隅而示之衛靈公篇敬其事而後食其祿之類未知孰是先儒有改尚書無頗為無陂改春秋郭公為郭亡者世皆譏之此不敢決之以臆姑兩存之亦鐫諸樂石附於經後不誣將來必有能考而正之者焉子正又刻古文尚書於堂而為之序曰自秦更前代法制以來凡曰古者後世寥乎無聞書契之作固始於伏羲然變狀百出而不彼之若者亦已多矣尚書一經獨有古文在豈非得於壁間以聖人舊藏而天地亦有所護不忍使之絶晦中間雖遭漢巫蠱唐天寶之害終不能滅蝕今猶行於人間者豈無謂耶况孔氏謂尚書以其上古之書也當時科斗既不復見其為𨽻古定此實一耳雖然聖人逺矣而文字間可以概想則古書之傳不為浪設豫抵少城作石經考異之餘因得此古文全編於學官乃延士張􅡃倣吕氏所鏤本再刻諸石是不從文字足以貽世若二典曰若粵之類學者可不知歟嗚呼信而好古學於古訓乃有獲蓋前牒所令方將配孝經周易經文之古者同附於石經之列以故弗克第述一二以示後之好議奇字者安知世無揚子雲時乾道庚寅仲夏望日序范謨分弓亭記蜀自􅡵山沫若水外即為邊境熙寧以來嵗遣禁旅更戍今留屯成都者合土兵凡十有七營邊久無事軍政廢弛遊手工技皆得編名籍中而鎧仗麾幟至朽敗不可用乾道六年蠻冦雅之碉門九年犯黎之虎掌殺州從事掠居民以去勢駸駸若無所憚上憂之命敷文閣直學士吳邵范公自廣西經略使徙鎮全蜀公至即以練兵丁繕保障抗章驛聞上賜詔嘉奬於是簡士卒之驍勇者别為一軍壯且少者次之罷遣其老羸者且示以坐作進退之法非風雨不休而尤致意於射以為蠻夷所恃峙嶔大山掩翳叢木出沒其間若猿猱然吾禦之者非刀矟所能及乃取弓人於綿弩人於䦘相膠析幹治筋液角極六材之良闢廣場於府舍之北築亭西向摘杜少陵酬嚴武之詩名之曰分弓時輕長幅巾引數百人按試技力而賞罰其勤惰未幾軍容一新悉為精鋭蹶張者至千斤挽強過六鈞而命中者十八九於戲盛哉公嘗至亭上語其屬曰誰謂蜀兵孱乎牧野誓師庸蜀羌髳微盧彭濮與焉蓋今東西蜀與巴郡是也諸葛贊皇二公勳烈偉矣其平蠻討魏飛星流電之軍豈盡出於西北哉士不素習而使之操弓挾矢馳危蹈厄未有不顛仆者非獨蜀軍然也今吾軍既練於昔而猶有所慮大抵興滯補弊用力甚難而敗之至易經營終嵗而荒之十日前功蕩然矣故曰屢省乃成欽哉功成而弗省省而弗屢此唐虞君臣之至戒而吾亭所為作亦欲取以自近而數省之耳公大儒退若不勝衣而經綸方略小用之已如此况擴而充之乎所謂收滴博之戍奪蓬婆之城又何足言哉亭創於淳熙乙未之季秋成於明年之仲夏命謨識其嵗月故併公語記之砌街記天下郡國惟江浙甓其道雖中原無有也太少二城坤維大都會市區櫛比衢隧碁布而地苦沮洳夏秋霖潦人行泥淖中如履膠漆既晴則蹄道轍迹隱然縱橫頗為往來之患紹興十三年鄱陽張公鎮蜀始命甓之僅二千餘丈後三十四年吳郡范公節制四川為竟其役鳩工命徒分職授任程督有方尺寸有度費出於官而不以及民日廩以食而人競力作未幾告成以丈計者三千三百有六十用甓一百餘萬為錢一千萬贏率一街之首尾立兩石以識廣狹凡十有四街然後所至側布如江浙間雨不乘橇騎不旋濘徐行疾驅俱從坦平父老相與謂曰周道如砥其尚見於斯乎昔日單襄公聘宋過陳火朝覿矣而道茀不可行於是歎司空視塗之失職而知其不久子産以乘輿濟人於溱洧而徒杠輿梁弗修孟子曰惠而不知為政夫善為政者緩急有序大小畢舉未有治其急而忽其緩志其大而略其細者而善觀人之國亦必以是公之於蜀藥傷補敗苗耨髮櫛無一不用其力至道路之政世所謂緩且細者亦整治如此百世之下四方之人入其境仰公之賢推此以考其政績尚可髣佛云淳熙四年四月日記楊甲修學記成都學宫自漢至今千餘載祠殿講堂巋然獨存其西屬延三百楹壯麗廓大是為崇寧新學而嵗久弊漏汚甚蜀連帥所統治繁夥月率一入學見諸生為故常講席徹即上車去不暇按行或有意苴補破敗吏緣為姦厚費府廩圬墁枝撑目所及以誣不察故雖數加葺亦易壞淳熙二年六月敷文閣待制范公自桂林移鎮全蜀始至謁先聖率諸生列拜庭下覽古歎息顧見屋室陊剝木老石腐則慨然欲興廢於是諏畫講席核經費虛實選吏程督刮絶蟊蠧自禮殿石室與今學官講誦之舍師儒之堂黝閽缺落風雨入而鳥鼠宅者皆撤新之蓋踰年而役休沈沈翼翼嚴靚宏固為西南冠公來新學延見多士與耆儒宿師考難疑義訓誨熟復自左右序生與四方之觀遊若弟若子望公辭氣容色揚厲奮發願識嘉績顯刻以毋忘公德公使甲記載本末甲辭不獲命則具著公惇本勸學委訓示後與蜀人所欲聲公無窮者為詞綴語下公名成大字至能吳郡人以儒長者治蜀有大惠利及民然其政發源實始興學其辭曰逺哉兹學循吏所作鋤荒鑄頑爰初維囏築室考宫誘民其間被之書詩惠我後人聖有廟祀士有攸宇相其喬木曰此干嵗孰傾不扶以雨以風掃除壞汙起自今公斥材鳩工左規右程執斤從之役徒蒸蒸乃崇乃治毋有庳腐廓焉新宫以就爾士士曰樂哉其來翼翼誦歌講讀金石屋壁公往視成辨服在門揖之畢升進退齊平公曰士子吾敬誨汝聖作斯學惟汝擇取蓋古有訓自本自根餘力則文以華其身滔滔利聲則非我徒毋墮爾修愧此學廬士拜稽首載銘公言敢有斁遺公參在前井絡之區稿乾既濡民以順賴士勸毋怠公歸廟堂我思維勩毋壞於成以詔來者縻棗堰記上之淳熙二年吳郡范公以鈇鉞鎮蜀仁行如春威行如秋休養生息人用以寧越明年六月築亭於縻棗堰下雲汀煙渚競秀於前古木修篁左右環峙柏蔭森森互數十里幽曠清逺真益州之勝概也又親書扁榜揭之顏間遒徑絶塵得古人用筆意藻繪不加而勝益奇矣又明年四月公始與客集於亭上命其諸生楊甲為之記甲詣轅門上謁以辭不獲退伏念蜀土肥衍由引江溉焉有如波流湍悍則囓渚崖穡事昏墊民且不奠居縻棗堰者殺湍悍之巨防也粵考厥初雖肇於唐髙駢然陴陋易圯不足以堙洪源折逆流逮隆崇基以漉沈淡災引注灌溉膏我梁稻絶其汜濫者宋端明殿學士劉公熙古之力也自開寶以迄於今踰二百年而沃野之利博矣享其利而忘其功不可也斯亭之作無乃章劉公之懿而起蜀人無窮之意乎蓋公之政以惠利斯民為急方其弭節奏減蜀之酒課四十八萬緡罷糴關中亦七十六萬斛公所為若是故視有功於民者欣然之色發越眉宇其惓惓於劉宜也甲承命書之使後之登覽者不獨有微禹之歎而敬公章善豫能之意焉公名成大號石湖居士道德文章震撼九牧嘗使絶域有功矣集於亭之月上詔來錫公命加敷文閣直學士召赴行在所其治蜀之績可知也劉光祖新繁縣朱真人祠堂記古之仙者或詭服變名姓佯狂市井間人莫測其為或啖食草木土炭諸臭惡物逢人不擇貴賤肆口罵毁至瓦石擊走之或事化丹砂水銀諸不死之藥往來海上遇其徒授之祕方期不泄於人世所傳多此類也或云有隂功者亦得白日仙去是皆不可疑其有無而佘嘗喜道朱真人事讀茅茨賦悵然知其為隱者也其言有曰壁崩剝而通風簷摧頽而㵼日又曰削野藜而作杖卷竹葉而為巾余雖不能然也而意殊欣然慕之至其終篇有曰口無二價日惟一餐於是置卷而歎曰仙者無他惟修心養生二事而已矣惟其純一不變人罕能之使人能終身不二價則赤子之性常全終日不再食則沖虛之氣常集其於仙也何有修心以保真養生以練神其為道也簡易其為功也悠久余嘗考唐隱逸傳然後知真人之事非有荒忽詭異之迹而皆可究也裂冠毁服竄匿林莽聞彼竇軌者方以多殺戮為治固髙人之所鄙而不顧也雖髙士亷相知安靜之理亦烏能識夫人不言之妙哉織芒屩置道上人曰居士屩也以米茗易之輒取去終不與人接其所為如此而傳不言其所終至其迹顯晦不常然而人所共傳者每每於夢中以藥石愈人疾本朝崇寧間賜號妙通真人比嵗蜀人信事之益多邑有其祠家有其像今新繁縣隆道觀新作祠堂者鄉貢進士李湀王焯率其邦人之為也余與李氏兄弟交重其能以文學相繼取科第湀之兄潩必欲得余文記立祠本末余魯鈍性不喜外騖竊於真人之道有感焉故樂為李氏兄弟書之若夫祠堂之嵗月有不以廢興為存亡者不必記也淳熙八年月日記萬里橋記維蜀慕王化通中國最為古逺載籍之傳尚矣至周武王牧野之誓史官書之曰庸蜀羌髳微盧彭濮人則其附聲教識仁暴概見於經矣獨秦見伐資以取楚儀錯之爭是也而儀城具存至今自秦置守李冰通二渠為蜀萬世利今萬里橋之水蓋秦渠也是則蜀號陸海蕭何藉之以基漢漢興五六十載文翁守蜀始取蜀秀民立學官教之學比齊魯而司馬相如之文遂擅天下晚有揚雄氏續孟荀之絃於漢之既衰漢祀中絶公孫述竊據蜀蜀人以死抗述者班班風節又凜乎東京之首也其後諸葛孔明用蜀以仁義公信懷而服之法度修明禮樂幾於可復夫歷周秦兩漢千有餘年孔明而以蜀通吳抗魏三分天下存漢社稷雖號霸業實宣王風蓋孔明學探伊傅而迹并管樂蜀人到今矜而誦之不忘今羅城南門外笮橋之東七星橋之一曰長星橋者古今相傳孔明於此送吳使張溫曰此水下至揚州萬里後因以名或則曰費禕聘吳孔明送之至此曰萬里之道從此始也孔明沒又千載橋之遺迹亦粗具非有所甚壯麗偉觀也以千載之間人事幾更興廢而橋獨以孔明故傳之亡窮其説雖殊名橋之義則一厥今天下兼有吳蜀朝廷命帥其逺萬里蓋受孔明之任以來由蜀走闕道亦如之其於橋孰不懷古以圖今追孔明之道德勳庸而思髣佛其行事侍御趙公之鎮蜀也始至謁古柏祠即命葺之明年作祠廟於其故營又明年新其故宅廟貌每曰諸葛公三代遺才也用法而人不怨任政而主不疑非天下之至公其孰能與於此今其遺迹所存尚多而萬里橋者乃通吳之故事前帥沈公嘗修廣之猶陋弗稱且易壞久將莫支則命增為石魚釃水為五道梁板悉易以木而屋之橋成耽耽屋成繩繩嚴嚴翼翼都人大和會觀所未有民不知役而公亦樂之風煙渺然岸水秀而川景麗公與客登此蓋未嘗不徘徊而四顧也雖然兹橋也過而弗能玩玩而弗能思者衆矣如公所懷風景抑末耳神交千古又安知諸葛公通吳之志亦未嘗一日不在於中原也乎光祖忝公元僚公命光祖為之記記其大者而遺其細蓋將以大者望公俾公之功名垂千萬世若曰橋美名公乂與之為美觀非知公者知公莫如光祖京鏜駟馬橋記出成都城北門不百步有橋舊名清逺凡有他道來成都者必經焉清獻趙公所編成都集記最為精詳余因究清逺得名之自則成都有橋七謂象應七星獨清逺不與及究司馬長卿題柱之所名升仙者乃在數然其説謂當在上流五里今之名升仙者在下流七里集記已疑其非古矣余謂長卿負飄飄凌雲遊天地之意氣發軔趨長安時欲與蜀山川泄其不平其操筆大書當於萬目睽睽之地決不在此况象應七星之義必其屈曲遼屬不應升仙獨與他橋相遼絶陵谷有變移册牘有缺逸竊意近時之清逺即昔日之升仙不然九達之衝百堞之旁一杠梁如此反不載於成都集記何耶集記作於國朝使清逺之名果得於古清獻公豈肯略之於簡編之外余久欲訂正之而無其因先是橋𨽻邑尉邑尉多茍且逭責疊石編木工不精良不惟簡陋視會府不稱嵗久石且泐木且折勢將圮敗過者病焉乃於農隙水涸時撤而新之取長卿題柱之語扁以駟馬因去清逺不經之名記其辨也不廢升仙相仍之地存其疑也或曰是則然矣無亦以貴富期待蜀士耶曰余何敢淺蜀士余所期待又在貴富外名當傳信稽事考迹曰駟馬為宜粵自六丁開蜀參井岷峩之英靈恥秦不文德不忍度劒關者百七十有餘年至漢文翁守蜀始振發之長卿實鍾其英靈者首入帝京以雄麗溫雅之文動萬乘震一時其後蜀土接軫以進者皆長卿破其荒議功當為文翁亞文翁創興之學長卿經行之橋事雖不侔迹皆不當蕪沒余來成都學宫欹傾欲壓已改築棟宇人謂自成均而下無此壯觀似足以侈文翁化俗之萬分兹建橋以駟馬名自是長卿之遺蹤亦不泯矣若曰長卿非全德不為蜀士所多則非余訪古名橋之意也橋石其址以釃水如堆阜者三屋其背以障風雨如樓觀者十有五楹板其虛距江底高二十有二尺其修十有七丈其廣二丈甃南北兩涘以禦衝決翼東西兩亭以便登覽經始於故嵗十二月之戊戌告其於今嵗四月之庚辰是役也取餘於公帑則民不知擾責成於寮寀則官無妄費易名以辨千古之疑則所傳或不朽持是以紀於石尚庶幾無愧辭云惜隂亭記豫聞乖崖張公鎮蜀時通夕宴坐郡樓上鼓番漏水歷歷分明一刻差誤必詰之守籤者服為神明公謂鼓角為中軍號令不可不謹爾自豫至成都首訪遺事所謂郡樓即今之銅壺閣也樓屹然自若銅壺則亡其實矣因詢其漏法則寅申己亥陟降其水者凡四既無所依據且其箭以七日半為等日升一刻必驟進之前郤頻數不無差忒因喟然曰此人而不天豈東坡所謂毋意毋我而得萬物之平者耶知成都縣事臨邛宋朝英於漏法甚精豫屬其籌鑄壺刻箭始更其法測午中之晷為升箭之初畢百刻而後易仍以厯象考七十二候初未昏明晝夜長短之數日異旬殊差布於箭似能以自然之理求之天者復為圖鑱諸石且名以惜隂有問其然豫告之曰人性勤惰得之天而不可強也使後世皆陶士行則此圖為贅人不能皆上智下愚凡有懼心者即可進於善矧人生誰能滿百藉令滿百亦不過三萬六千日而已幼稚髦期之時且三之一前賢功業窘束於二萬四千日之境人以壺滿為盈也而不知其年之縮也人以箭刻為升也而不知其年之降也以器之進知年之退茍能充其涓滴之善於其身如水之盈能積其圭黍之功於其民如刻之升則豫在蜀之日尚無負豫惟懼也尚借此圖以銘諸坐右云于􅡃修夔州東屯少陵故居記唐大厯中少陵先生自成都來夔門蓋欲下三峽道荆襄以向洛陽漸圖北歸始至暫寓白帝既而復還瀼西最後徙居東屯質之於詩皆可考峽中多髙山峻谷地少平曠獨東屯距白帝五里而近稻田禾畦延袤百頃前帶清溪後枕崇岡樹林蔥蒨氣象深秀稱髙人逸士之居少陵於是卜築焉厭囂塵而樂幽勝蓋詩人所以為吟詠風月之地夔州之詩多至四百餘篇計當一草一木盡入詩句中矣少陵既出峽其地三易主近世始屬李氏少陵手書之券猶在子襄頗好事講求故迹復置髙齋用涪翁名少陵詩意創大雅堂臨溪乂建草堂繪其遺像歷嵗滋久屋且頽圮弗治劵亦為有力者取去而前賢舊隱幾為荆榛之墟慶元三年春連帥閬中毌丘公漕使蘇臺錢公暇日聮轡訪古歎髙風之既逺而故居之弗葺無以致思賢尚德之意因李氏子欲析居毌丘公捐金市之而歸諸於官為田一十一畝有竒繚以短垣樹以嘉木齋與堂之欹腐撓折者從而增葺之架為憑軒闢為虛牖開新徑以直溪而東屯之景物深窈幽邃與少陵寓居之日無異錢公又跨草堂創為重閣移置少陵像於其上憑欄一望則平川之綺麗四山之環合若拱若揖與賔主相領略蓋東屯至是遂為夔州勝處嗟夫少陵始進三賦明皇奇其才嘗召而欲用之故其詩有主上頃見徵之句已而齟齬不偶流落頓挫故其詩有青冥却垂翅少陵抱負奇偉許身稯契蓋欲少出所學以自見於世而卒不遇憔悴奔走於羈旅之間可歎也雖然少陵之詩號為詩史豈獨取其格律之髙句法之嚴蓋其忠義根於中而形於吟詠所謂一飯未嘗忘君者是以其鏗金振玉之所與騷雅並傳於無窮也少陵避地入蜀其寓居之處同谷有草堂浣花亦有草堂皆官自葺之有以見其勿翦勿伐之意獨東屯不然誠夔門之缺典也夫地固以人重而物之興廢有時今帥漕二公獨能興四百年之遺址而更新之明示好尚丕變雅俗實權輿於此則是役也豈徒為遊觀設哉慶元三年十二月初二日朝奉郎權通判夔州軍州兼管內勸農事借緋于􅡃記景宜之講堂記慶元二年春正月郡守王君重修講堂成是堂也跨龍山飲青竹雄峙嶽陽掩映奎壁昔我先達嘗以為藏修之地前郡守彭君何君先後修葺風雨既久瓦石垣墉有頽剝者至是侯乃慨然新之落成之日衣冠會集諸生舉酒為夀侯曰君子之學必講而後明然講有二難受教弗篤難乎其為師指示弗專又難乎其為弟子中古之士有講有聽若學之弗講與講而弗聽惡在其為是堂也若其所以為講者大學之明德新民中庸之性道教聖賢之精藴在焉師舍是無以為教弟子舍是無以為學惟文學諸君與諸士子朂諸宜之曰侯之言是也吾黨之士能服膺乎師教而不負吾侯修堂之心斯可矣侯謂宜之不可無述也因次第其言以為記度正重修中江縣儒學記先王之所以教皆因人心之所有而順導之非有所強之於外也故其為教也易而成材也衆孩提之童無不知愛其親先王因之以成其孝及其長也無不知敬其兄先王因之以成其悌此弟子之職所以為小學之教蓋立身行已之本幼而學之者也夫人莫不有惻隱之心充之可以為仁莫不有羞惡之心充之可以為義莫不有辭遜之心充之可以為禮莫不有是非之心充之可以為智此大人之事所以為大學之教蓋齊家治國之本壯而行之者也後世設為學校庠序以養之詩書禮樂以教之其於古之道也可謂近矣然試之以科舉考之以經義詩賦論策則昔先王之所未有者然其所以為此者亦惟曰使之推其心之所有載之於言以見其所藴之淺深疏密云爾夫茍能推其心之所有則其於先王之教豈不尚庶幾哉國朝自藝祖皇帝以揖讓得天下兩幸太學列聖因之開設學校尊崇師儒內自京師外薄四海州縣莫不有學至於講明先王之遺言紹續洙泗不傳之緒風化之美無愧三代視秦漢而下蓋過之矣然自仁宗之世取湖州安定先生之法以為太學法然後太學之所以為教者定自二程先生侍太中公為漢州起止止先生中允宇文公為教官然後人知列郡之學不可以無師自司馬文正公之孫為玉山令邀晦菴先生於道請為諸生講説然後人知各縣之學亦以得師為美蓋學校之不修則士無所於學而師儒之不立則學者亦將何質疑請問必二者交舉然後可以明教化美風俗淑人才可不念哉成都宇文洞為中江酒官始至適科調煩興眉山李侯􅌫以為材使兼縣事朔望造學宫嵗久不葺日就頽圯則嘆曰俎豆之事文教所繫豈以軍旅數起大夫久役而遂廢耶於是以其餘力銖積寸纍而一新之內而夫子之宫堂與庭宇齋廬庖厨門觀以至外之牆圍無不畢備腐者易之堊者飾之起於嘉定十三年七月庚戌至八月癸未落成嚴嚴翼翼多士慰喜又創為一堂以祠濂溪而下諸老先生以示學者趨向抑亦可謂知所本矣書來請正文以為記正聞邑之士蓋嘗有遊東南講聞師友之微言而歸者來者或能致之使發其大端以私淑諸人異時必有卓然而興起者此又所以修建者之本意不可不知也尚其勉之洞即止止先生四世之從孫也巴川社倉記人與物並生於天地之間同於一理均於一氣故君子以為人者同胞之兄弟而物者相與之儕輩也視之如兄弟則必親之而有相友之義焉視之如儕輩則必愛之而無暴殄之失焉知此則知所以為仁知所以為仁則知所以仁民而愛物矣仁之為道用之一鄉不為不足用之一國不為有餘所施益博則濟益衆顧用之何如耳在上而行之則為仁政在下而行之則為仁里里仁之所以為美者非以其有無相賙患難相救疾病相扶持故耶往時崇安告旱人將乏食晦庵先生與其鄉之諸賢請於府得粟以貸於其鄉之人免於流離飢莩其年嵗則大熟於是收其息之二而藏之既而還其貸於府而以其息為社倉行之數年人以為便淳熙中先生為浙東常平使者以職入對因條其事奏之孝宗皇帝深嘉其意頒之天下於是所在好事往往各以其私穀推行以應詔旨仁聖之澤無逺不被人到於今賴之近年以來吾鄉之士慕而為之者三趙飛鳯兄弟行之龍多景元一等行之巴川陳孜等行之巴嶽之下行之巴川者合二十家為錢一千緡嵗得榖三百石登熟則以價糴之擇一人以掌其穀之數期月穀價暴貴細民不易則收三分之息而糶之以濟貧弱以平市價又擇一人以掌其緡之錢藏明年其時復行其事嵗以為常因其鄉俗之便變而通之於先生條目雖若稍異然其所以惠利窮困之意大扺同也吾鄉地勢髙仰無隄隁陂塘之利世所謂雷鳴田者五日不雨則枯十日不雨則稿故豐年常少而凶年常多比年穀價騰湧比之往時不啻三倍然人心不厭猶有閉糴以待善價者而此二十家者乃獨不然豈不足以羞其心愧其顔使知所觀慕然則是倉之設不惟可以利濟於人而其所以補益名教之功亦不為小矣於是景元一來言曰是二十家者其心固未嘗不一也而數年之後不能保其無倦他日若子若孫又不能保其行之而不廢願一言記之庶其知所警懼而傳之無窮也先正曰天下之道二仁與不仁而已棘不易時射利者龍斷之賤夫也愍細民之艱思有以惠利之者仁人君子之用心也使夫任事者因其貪鄙茍賤從而賤之因其用心之近於仁人君子而時加貴重之則孰不勉於為善又安用記為也雖然或者有所未暇矣無已則有一焉今二十家之所以為此者是必有聞於前賢矣且人物之生本同於一氣也見其一原也則其於人也豈不如手足兄弟其於物也豈不如鄉黨儕輩詩云兄弟孔懷又云兄弟急難行道之人顛連無告而莫之顧者有矣未有手足兄弟顛連無告而不為之惻然動心者也故凡二十家所以不謀而同不約而合者非有見於此耶既以此而開其始欲戒其終使不倦且使後世子孫循之而不廢則莫若讀書而講學讀書則理明義精講學則行著習察仁民愛物之心愈久愈光大矣夫如是窮則行之一鄉達則行之一國以至推之當世是烏可得而已哉故曰欲戒其終使不倦且使後世子孫循之而不廢莫若讀書而講學皆應曰然遂書為記魏了翁簡州三賢閣記成都之天慶觀仙遊閣故有張忠定公繪像嘉定十二年南海崔公與之來守成都清風令儀砥厲頽俗明年劉文節公一見灑然異之退語人曰是宜配忠定公與清獻公崔公之門人洪咨夔等乃即忠定公之次圖趙崔二公而並祠焉屬劉公為之贊厥十年眉山家侯大酉自將作監丞請外擢守簡州州有會勝堂堂圮已久僅守清獻詩刻侯既復之又為閣其上用成都近比繪三賢而綰之而馳書於靖曰趙張之風烈家傳而人誦之言之祇贅而崔公之潔己裕民憂邊思職亦近世所罕儷也其大城西家虜連嵗盜邊莫能入人尤德之恐久而遺忘子其為我記諸顧剪焉罪戾之餘世所棄置而陽安之𨽻數千里來辱余曷敢不可乃因劉公之贊比次其事而書之以復於家侯或曰自淳化四年迄今幾二百四十年矣而獨三賢之稱不已疏乎而况吏之得祠於仕國也如莊周所書庚桑子事特寓為之言耳自蜀人祀文翁由是桐鄉南陽渭城之祀史不絶書非其同氣而春秋奉嘗事已變古若夫生而繪像以配先賢則於義何居曰不然也劉公倡之洪侯和之家侯因之蓋將以表競廉貪則取其接乎耳目之近而可證焉者耳已所當律職所當憂孰非人臣之常分而俗淪世斁貪競相師乃有清方不移華皓益堅如崔公是不足以刑善而勸乎二氣五行之運鍾而為人千百載而一日億萬人而一心使為吏而無德於民民將盻盻然疾視之唯恐棄之不亟也至於嵗月滔邁情偽寂寥去者非有勢利之挾也居者非有交譽之求也而著乎斯人之心隱然與所寓俱存敬共承事罔敢不恪是區區者誰實使之然則祠不可義起乎既以謝客又次其説以附劉公之贊張神君紫府飛霞洞記吾舊生越巂間按越巂為郡居天下之西南角得坤之用在漢時戶僅四十萬其俗多營窟版屋而息如上古穴居野處之世其壙巖穴接黎之邛筰都雅之靈關道自唐大斥土宇包蠻荒而郡縣之民不堪命越巂遂與腹裏壤斷土隔真人幸啓偃兵息民執玉斧而大渡劃棄之外越巂遂淪嗚呼吾將安歸當以黎雅為鄉也黎之邛崍關有靈應洞乃吾之變化所其俗醇厚簡古如周民好善堯民可封其地襟帶巖巒如泰華之磅礴岷峩之嶙峋吾常愛而居焉近奉帝命往來全蜀至則寓之以行化恨榛莽掩翳如小有虛靜之所吾必久留邑下茍洙父子念此甚久吾知而直命之乃欣然於吾殿後斬荆棘去茅菅為一洞天費僅二十萬錢屋穴皆備吾揭為紫府飛霞蓋本班固賦西都據坤靈之正位放太紫之圓方與王勃記滕王閣彩徹雲衢霞鶩齊飛之義上以示吾不忘故鄉之意下以期有志於攀鱗者休哉蒙山之下亦有變化之所矣後之人有能自勵而期為汗漫遊者乎然東山舊祠興自紹興丙寅逮今年丁卯始克有洞穴而洞穴不成於他人而成於茍洙父子亦有數也一日茍洙父子欲記年月曰此事非神其誰宜為吾亦為欣然親書於石開禧三年六月十八日記何鏐相墨堂記君子之風烈其感於人者信逺矣哉謠岣嶁之碑慨然以思觀延陵之銘躍然以喜君子之風烈至於愈逺而彌新既往而如在積之者厚矣世之好名刻意從事於浮末其精神心術之運卒不能必其著不知君子道德之實充然溢乎中而灼然燭乎外天下後世願見不可得往往因其遺迹以起髙山景行之思蓋所謂感者有出於語言筆墨之外或可推而至也故資政殿學士兼山黃公裳劒陽人篤信力行尚友洙泗每謂學者由君子之學始於修身正心極則與天地為一是故以道為主以心體之以經為學以身臨之涵養純熟推之天下特其餘事先生雖居窮處不求聞知然亦嘗有援天下之志逮事孝祖橫經潛邸代言西掖進司喉舌忠規讜論有人所難言者故大參樓公鏞評之曰先生先見如吕中丞勇決如范蜀公敢言如蘇文忠司馬溫公自以為不及者公皆過之而得其全當是時兼山之名震天下皇帝即位虛席登庸曽未踰時大星殞沈而先生不起矣鏐嘗因是有歎焉夫君子所負者大而不能用或用之不盡若有物以制之蓋於本朝得二人焉明道與先生是也方荆公當國率意更署舉朝正論無一合者惟明道與語心平氣和荆公每為之動而終不能用先生之學實繼明道且超顯矣而功業亦不克盡見蓋明道無死新法之變不至已甚先生尚存儒學之禁可以無作二先生出處存亡實有關於天下休戚不幸皆齎志以殁惜哉然君子之於人過其居式其閻思其人愛其身百世在前猶知企慕况乎澤之存者近接於耳目之所及寧不寶而藏之乎先生筮仕漫尉壁山後三十有四年嘉定甲戌之冬鏐長斯邑慨念疇昔嘗執經函丈深辱知愛注目經行之地人寂山空規恢網羅聞見開示將領事甫爾未暇也明年春邑尉宋君出示先生所著詩書詞教章筆墨蕭散興寄髙邁超然有出塵之姿自先生之去歷尉掾以十數莫或表其事宋君於是作堂尉廨之西偏聚而刻之繪先生之容榜曰相墨堂而屬鏐記其嵗月序先生學術大略為壁山學者之勸昔山谷跋潘侯所藏五宰相書能屏却不祥非特一縣章之比其重之如此先生逸辭妙墨豈止與此五宰相爭強而已哉將百載之後山川鬼神實呵護之可以人之靈而不如鬼神乎先生曩與先君子及鏐往來之帖因以遺宋君丐書其後數語併刻之左右費士戣漕司髙齋堂記杜少陵遊蜀凡八稔而在夔者獨三年平生所賦詩見於集凡千四百六篇而在夔者乃至三百六十有一得非愛其山川奇壯風俗淳厚故其寄寓之久賦詠之多如是哉然則公雖下巴峽浮湘衡南遊以死吾意其精爽猶往來於夔子國中也嘗以其詩考之其在夔也始寓白帝城繼下瀼西居後乃移於東屯各隨所寓而賦髙齋曰次水門者為白帝城曰依藥餌曰見一川者則以瀼西東屯作也後人即其處所各肖像以髙齋名之所以紀其舊遊而欽其風致庶幾尚友之意云爾今東屯白帝城齋像具存而瀼西居按圖經所載漕廨即其故地嘗詢之故老謂舊亦有祠不知廢於何年而齋顏則前使者范公蓀移之東路蓋猶未逺遂使故地寂無一迹良可慨嘆屬東臺有堂嵗久弗支梁棟撓折簷楹摧圮一遇震風凌雨凛然有傾壓之懼議者欲撤去之屢矣豫惜其規模傑壯不忍撤乃鳩巨材積杗桷運瓦甓葺而新之木章竹個悉從官市不以勞民既成則取前移於東屯者東齋舊字臨而揭之齋之對舊有公詩石刻成列因肖公像於其中而祠焉於是遺響復存廢典且舉始有以副一方之願夫土木興作或得或失聖人必謹書之故考室詠於周詩復宇歌於魯頌豈以為細故而略乃今起輪奐於將傾揭丹青於欲壞退食有地肆筵有所以滌塵氛以舒心目政事之暇可不務乎况少陵忠義之氣根於素守雖困躓流落而一日未嘗忘君後之來者儻覩遺像而念其行藏曕齋顔而企其節義則愛君憂國之念油然而生其補於政治豈淺淺哉豫猶有望於後之人嗣而葺之俾無壞嘉定元年冬廣都費士戣記章察逸心亭記粵若緱山積秀耀真胄於千齡淮水澄源煥清風於百世紀其貴盛則同日分為五列侯稱彼才華乃當時號曰三珠樹折仙枝於奕葉流英概於遐方隱顯雖殊卷舒一致即太原王君表正鍾其緒矣君幼而雅於好尚壯而多聞交遊必賢談笑惟義逮乎知命於所居東偏創園亭以適性蹊分桃李愛其若君子之芳馨隂茂松筠賞其若志士之節操凡植奇葩異實咸資興詠或燕遊嵇阮以樂天和或集會荀陳以聲名教飲不逮乎沈湎言必盡乎切磋由是四方輶車望風而至千里多士慕義而來君必盱衡倒履勤勤拳拳聞義必行從善為樂一日僕息鞚林下晤語樽前屬君操觚求亭之號乃本其事題曰逸心固資日休之義也偉乎君其儲詩書以尊道勵絃誦以傳家則慶延後昆美紹先德莫之京矣又何必塵生羅襪珠貫歌衣方謂之樂歟會有浴沂之士朋簪而來遊是亭觀是説能無優之哉范仲芑盤溪記始豫先君試吏新繁稱邑中勾氏多人士曰友于字信卿者名鋭於學有當世意已而試有司數不合晚乃得官主閬中簿度不能酬其素即棄官去脫遺世事寄意間適其所居有溪環繞清徹可挹因取唐人李願太行之谷曰盤者以名其溪沿溪下上沙澄而谷岌土肥而植蕃躋攀曲折視著屋穩處為堂為亭為軒為菴為寮掩映相望至者如行圖畫中纍甓為洞窮之而深治涉為航浮之而安架虛為橋即之而通悉旁緣昌黎序中語橅其意而揭之扁榜經營之初物色自獻騁望之際面勢咸得嘯歌俯仰觴酒杖履盡一溪之勝而胸中梗概始披於此矣豫童時侍先居已聞君賢仲兄齊叔又與君通昏姻而盤溪之名往往流於士大夫之聽思一往遊以足於登覽而未暇也繫官於朝君書來以圖相示屬豫記之豫惟山林富貴二者莫或得兼富貴而或羞焉求人以塗之人恕我不可得而山林之樂茍多取之尚不為貪人情常以自恕擅壑專林而不知止者有矣然自漢以來柴桑輞川僅以一二名於天壤他皆泯沒至不得其處則凡致意於煙霏草木之間而人品或非者此又可以欺世也歟惟君澡於學問持滿而未發既其入仕筋力未及於衰視世之夸華悠然無以易之處隂息影休其轂而不悔非徒以枯稿宿名也是可書四川通志卷四十一欽定四庫全書
