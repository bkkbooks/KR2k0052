body:
  text: 四川通志卷四十三藝文疏漢但望分巴疏永興二年三月甲午望上疏曰謹按巴郡圗經境界南北四千東西五千周萬餘里屬縣十四鹽鐵五官各有丞史戶四十六萬四千七百八十口百八十七萬五千五百三十五逺縣去郡千二百至千五百里鄉亭去縣或三四百或及千里土界遐逺令尉不能窮詰姦宄時有賊發督郵追案十日乃到賊已逺逃蹤迹絶滅罪逮捕證驗文書詰訊從春至冬不能究訖繩憲未加或遇德令是以賊盜公行姦宄不絶榮等及隴西太守馮含上谷太守陳𢎞説往者至有劫閬中令楊殷終津侯薑昊傷尉蘇鴻彭亭侯孫魯雍亭侯陳已殷侯樂普又有女服賊千有餘人布散千里不即發覺謀成乃誅其水陸辨兵復害殺郡椽枳謝盛謇威張御魚復令尹尋主簿胡真若此非一給吏休謁往還數千閉囚須報或有彈劾動便歷年吏坐踰科恐失冬節侵疑光死如當移傳不能待報輒自刑戮或長吏忿怒寃枉弱民欲赴訴郡官每憚還往太守行桑農不到四縣刺史行部不到十縣郡治江州時有溫風遙縣客更多有疾病地勢剛險皆重屋纍居數有火害又不相容結舫水居五百餘家承三江之會夏水漲盛壤散顛溺死者無數而江州以東濱江山險其人半楚姿態敦重墊江以西土地平敞精敏輕疾上下殊俗情性不同敢欲分為二郡一治臨江一治安漢各有桑麻丹漆布帛魚池鹽鐵足相供給兩近市師榮等自欲義出財帛造立府寺不費縣官得百姓歡心孝武以來亦分吳蜀諸郡聖德廣被氏物滋繁增置郡土釋民之勞誠聖主之盛業也雖貪大郡以自優暇不忍小民顒隔謹具以聞明劉茝乞諡宋濂疏臣聞之記曰節以一惠諡以尊名故生而有爵死則有諡周之道也先王制治謂歆善而恥惡夫人之同情彰善而疸惡為治之要務如彼賢聖固無事於抑楊乃若中人宜有待於懲勸故自成周至於今日率用此道鼓舞士風蓋其節惠之法善善恆長惡惡恆短德學有聞才節兼邵無他疵疾固宜與之美諡尺璧而微瑕或瑕不掩瑜則節其善以為諡羣行雖未有聞而一善不可掩則但取其善以為諡皆以示勸也善泯而惡楊乃得惡諡則以示戒也故雖孔文子猶得諡文而幽厲則孝子慈孫不能改也漢唐以下諡之善多諡之惡少本朝制諡有善無惡列聖愛惜人才忠厚尤至若大小有過咎或遭譴謫則節惠之典例不復畀以是坊士士猶有棄道揆弛法守以自速戾者然後知節惠之靳所以憂天下也然過咎有眚有怙則譴謫有幸有不幸罪出於怙誠不足矜罪出於眚宜若可宥故歐陽修以罪黜州郡去而卒猶諡文忠蘇軾以罪竄海外歸而卒亦諡文忠蓋修有文章兼有忠勞故宋薄其辜軾有文章兼有忠節故宋略其過宋之遇士大夫亦庶乎先王矣國家肇基之初物色老儒於金華山中首得宋濂濂之文學固髙太祖之接禮亦厚備顧問則有禆補聖聰之益掌綸綍則有黼藻聖治之功講左氏傳則勸讀春秋論黃石書則請觀謨典語及軍賞以得人為規語及牛租以捐利為諷總元史筆削居多封功臣討論甚當神仙之問謂此心曷移以求賢才袞冕之詞謂此服祇用以祀天地至云帝王之學獨衍義為要三代之治必仁義為歸册厯有編受命之迹可考辨姦有録知人之鑒自昭寶訓作而詒謀燕翼之道傳祖訓序而創業守成之戒攸在律厯咨之制度郊廟為之樂章紀創修事關史志銘功德語協旗常屬之政事則辭屬之議論則不辭問之君子則對問之小人則不對誠悃形於事行忠告寓於文詞是以豫之敕符豫之楚辭皆寵以奎畫豫之襲衣豫之甘露悉出乎特恩賜坐於便殿而嘆其純賜飲於御筵而強之醉致仕而留之左右為日甚久來朝而延之禁中為禮甚優辭則為之觴道塗去則為之感夢寐受恩至此得君可知方為贊善之時茂修勸學之職讀書講究興亡之故謹禮請防言動之非稱呼致父師之名褒賞侈舊學之翰故聖諭謂為開國文臣之首而士論尊為間世儒者之宗偶孫慎干紀於班行濂亦連坐於桑梓法從末減猶安置於茂州天不憗遺遂喪亡於夔府既不蒙葬祭亦不蒙贈諡當時莫為之言蓋以為罪人也至今莫為之言又以為往事也臣惟我太祖昭代之聖君而濓以學問文章為昭代之名臣顧以外至之愆遂廢身後之澤臣今獨為之追言則以為缺典也歐陽修蘇軾皆以得罪於宋或出或竄及其沒也宋以其一代文宗不以有罪而奪其諡濓之文輩實為本朝歐蘇當時得罪自其孫不自其身天地之大當見容也日月之明當見察也見容見察則漏泉之澤當見恤矣臣往年待罪言路欲言之而未及今者蒙恩承乏適濂之鄉郡故敢以濓為言伏望聖慈追念濂為聖祖文學舊臣為本朝文章大家略可赦之眚流非常之恩興久廢之事特敕禮官討論內閣畫一賜濂揚明之典則聖明彰善之政善善之心激昂人才之風光輝文治之運一舉而兼得追迹先王矣宋安得專美哉臣下情無任隕越仰望之至薦兵部尚書劉大夏疏臣惟成天下之治功在賢才别天下之賢才在公論寄天下之公論在科道科道者明賢辨姦遏惡揚善之門也科道之言同出於至公則劾一姦惡而羣邪落魄薦一君子而士類揚睂公道昭明忠良必遂天下未有不治者也茍或家立町畦人懷封畛好惡拂乎公論愛憎辟於私情則忠讒混淆邪正雜揉天下未有不亂者也昨者尚書馬文升致仕會推員缺或薦或劾衆議譁然其中亦有公論不明彈劾失實者臣不得不辨且如兵部尚書劉大夏臣不詳知其人嘗於兵部閲章疏見其敷奏有方心竊慕之及見先帝委任之隆陛下嘉留之切臣意一時之望也今乃有劾其有愧於先進之人謂不得與焉文升相伯仲而亟宜黜退者則是非乖謬亦甚矣昔我太祖皇帝謂廷臣曰觀人之法即其小可以知其大察其微可以知其著視其所不為可以知其所為臣嘗奉此言以觀當代之士夫如劉大夏官至二品不為其子乞恩比之縱子庇壻者為孰優小者如此大者可知其子弟俱在原籍恪守家法寂無形迹比之縱容家人商販四方囑託衙門者為孰優微者如此著者可知歷官數十年其家不踰中人之産比之田連阡陌甲第通衢者為孰優其所不為如此則其所為可知矣夫以大夏持身如此而諸臣亦有斷斷不可之意則公論先晦於朝廷其何以服天下哉臣非曲為大夏辨説也但念天之生才甚難國家之得才尤難才用於時而能完始終之節為更難玷人之行如玷貞女臣竊為今之士夫不取也記曰古之君子進人以禮退人以禮今之君子進人若將加諸膝退人若將墜諸淵故馬文升一人也有劾其懷姦欺罔者又有頌其勞績茂著者劉大夏一人也有薦其簡質無私者有劾其清議鄙薄者甲可乙否莫知適從昔漢御史大夫張忠誣奏京兆尹王尊罪壺關三老公乘輿上書訟尊之寃曰一尊之身三期之間乍賢乍佞豈不甚哉今一人之身數日之內屢變其説此正所謂乍賢乍佞也陛下從何聽信焉又謂閔圭有擠井下石之嫌者不知擠誰於井謂劉大夏有蹊田奪牛之狀者不知奪誰之牛迹其心若為馬文升不平焉者殊不知文升官髙一品夀踰八旬投間頤老實惟其時亦惟其願也荷蒙陛下厚其恩禮準其致仕豫奪之柄悉在朝廷閔圭何能擠於井大夏何能奪之牛哉如此言論大傷國體殊非治世所宜有者況今皇上新政之初凡厥庶僚正宜同心一德共圖正理却乃方底圎蓋抵牾時政臣恐壞天下之公論惑陛下之見聞生人心荆棘而使老臣不安其位人主孤立於上故不得不為陛下詳悉言之也乞敕史部查勘閔圭劉大夏果有前項擠井下石蹊田奪牛情繇宜從奏請罷黜如無此事亦宜究治造言之人使老臣得以安其位而行其志勿使負屈於青天白日之下也更祈備查劉大夏歷官年勞應否廕子緣由上請聖裁如果相應乞準其子一人送監以為人臣盡節者勸如此則言路正公論明人心服而天下安矣鄒智欽崇天道疏臣聞樂人之樂者憂人之憂而食人之食者亦事人之事頃者上天垂戒以警我國家山上無雲地下無雨自正月至五月自北方至南方亦不可謂天地之小變矣而中外大小之臣拱手熟視無一人肯動一舌畫一訃為陛下一分憂者尚賴陛下克謹天戒不遑寧處下修政之令出罪已之言綸音朝發甘雨夕施天人交感信不可誣然臣於此方且為陛下憂而未敢為陛下賀也何者天之於君猶父之於子子有過父怒之為之子者憂愁鬱抑痛自悔尤亦既稍釋其父之恕矣然猶未能改過遷善立身行道以大得其父之歡心以成大孝於天下而恃父之愛遽肆然於家庭之間為之厮養者食其主之食衣其主之衣聽其主之使令略不思勸其主以為長久計視其主之憂不憂樂不樂若秦人視越人之肥瘠也長此不已日復一日則父之所以愛之者又將轉而為怒矣天天下之大父也陛下天之宗子也中外大小之臣陛下之厮養也今陛下方釋天之怒而中外大小之臣又不能建萬世之長䇿此臣所以寢不安席食不甘味為陛下長太息而不能自己也臣筮仕未久識練未深不敢枚舉以稽聖聽請獨以今日之急務為陛下陳之惟陛下虛心留聽焉一曰任宰相以亮天工臣聞體元者人君之職調元者宰相之事宰相之不可不任不待智者而後知也陛下於宰相有闕必備有事必咨有殊恩異數必加亦云任矣然或改革一政進退一人處分一軍國重事往往出自內批名為陛下之獨斷其實一二小人者挈其柄是既任之而又疑之也夫任則不疑疑則不任陛下任之而又疑之者豈不欲推誠以待物哉臣竊意其進身之初多出於私門不由於正路既有以致陛下之厭薄矣至於議事之時又容容唯唯若不能然伈伈俔俔若不敢然甘於模稜恬於伴食反不如一二小人者明白果決足以了事此陛下所以一任之一疑之也臣竊以為過矣宋之英主無出仁宗夏竦懷姧挾詐辜負任使則罷黜之吕夷簡痛改前非力圗後效則包容之杜衍韓琦范仲淹富弼抱才氣有重望則不次擢之而慶厯嘉祐之治號為太平未聞一任一疑可以成天下之事也臣願陛下盡體元之職重調元之任孰為夏竦吾黜之孰為吕夷簡吾容之孰為杜衍韓琦范仲淹富弼吾擢之凡宫中府中之事無一不屬其統領退朝之後召致便殿或賜坐或賜茶或給筆札使條陳治國平天下之道不使一二小人者得以參錯其間則天工於是乎亮矣二曰選諫官以開天聽臣聞天下之事惟宰相得以行之惟諫官得以言之諫官雖卑與宰相等茍非其人曷足以稱厥職哉宋神宗將定官制謂蒲宗孟曰御史大夫非司馬光不可古人慎重諫官有如此者今之諫官以軀體魁梧為美以應對捷給為賢以簿書刑獄為職業羣居終日迹若􅢟鸒間有以忠義激之者則曰吾舌非不能言吾心非不欲言吾官非不可言但言出而禍咎隨之其誰吾聽嗚呼既不盡言以稱其職而復引咎以歸於君有人心者何忍為此而陛下亦安用之臣願陛下罷黜浮沈之輩廣求風節之臣或令對仗彈呵或令入閣參議或請對或輪對或非時召對接之以溫顏欵之以厚語使得展底藴無少顧忌言有可採則次第施行如不可採亦曲加優容而不之罪則天聽於是乎開矣三曰收人望以協天心臣聞汲黯在朝淮南寢謀正人君子之有益於人國也大矣夫以陛下之聰明豈不知天下事必得正人君子而後可任哉其所以不樂正人君子而反屈折之者非有他也特以其所言則皆利於公室而不利於私家故小人巧為讒間以中傷之耳姑以臣所知者言之如兵部尚書王恕元勳碩德撑柱天地顧削其爵而投之於桑梓之墟監察御史強珍忠肝義膽貫鑄金石顧褫其權而置之於田野之間他如章懋之直亮林俊之剛方張吉之純雅或落之於空山或疏之於部署或竄之於蠻煙瘴雨之鄉使其向日之誠技癢於中而不得以遂此豈天所以生賢之本心哉臣願陛下綰王恕之蒲輪駕強珍之驄馬將林俊等分居要近之地使各盡其平生以圖來效則天心於是乎協矣四曰復祖憲以正天綱臣聞范祖禹有言自古國家之敗未有不繇輕變祖宗之舊也創業之君其得之也難故其防患也深其慮之也逺故其立法也密後世雖有聰明才智之君獨出羣臣之表然終不若祖宗更事之多也我太祖高皇帝監前古之迹識禍亂之原凡寺人之徒惟給事掃除之役不與一毫之政神謀雄斷誠萬世聖子神孫不易之發也頻年以來舊章日壞邪徑日開人主大權盡出此曹之手內倚之為相外倚之為將十三布政司倚之為鎮撫伶人賤工倚之以作竒技淫巧法王佛子倚之以出入宫禁鎮國永昌等倚之以結怨於軍民其他耳目之所不加思慮之所不及不可勝言者歐陽修曰宦官之禍甚於女寵可不念哉可不畏哉臣願陛下以宰相為股肱以諫官為耳目以正人君子為心腹然後深思極慮定宗社生靈長久之計則天綱於是乎正矣右臣前所陳四事皆今日最急之務而不可少緩者然深究其本則在人主之明理何如耳朱熹曰人主之學當以明理為先此萬古帝王之準的也陛下聖質高明聖學深遠豈不致力於明理之學而奚假於臣言哉然竊聞之侍臣之進講也指某章為某書訓某字為某義殊無反復論辨之功陛下之聽講也每嵗有常月每月有常日殊無從容啓沃之益如此而欲明理以應事臣不信也臣願陛下托難窮之義理惜易過之春秋考之於經驗之於史會之於心體之於身一嵗之間無一月之不然一月之間無一日之不然則所當為者不得不為所不當為者不得不去矣豈特四事之舉而已哉臣聞言切直則不用而身危不切直則不足以明道臣知急於明道固不暇於恤身惟陛下為太祖十五年艱難辛苦之業一留意焉則萬世幸甚臣干冒天威不勝恐懼待罪之至回天變疏臣伏覩今月初十日五鼓有大星飛流起西北亘東南光芒燭地蜿蜒如龍蛇人馬辟易蓋陽不能制隂之象也臣竊惟陛下即位以來慷慨奮發恭儉勤勞擯斥宦官黜遠左道根究浮費裁抑冗員痛懲法王佛子大放珍禽竒獸凡天下之人所欲而未得所患而未去者以次罷行幾無遺憾宜其克享天心景星卿雲昭回霄漢今變異若此何哉臣反復思之無乃隂之當消者未消陽之當長者未長而陛下所以事天者猶未至昔孔子作春秋凡星變必書朱子修綱目凡星變必書所以垂萬世帝王之明戒也伏讀詔書內一欵天下大小衙門政務如有利所當興有弊所當革者所在官員人等指實條具以聞臣有以見陛下知前日登極詔書為姧臣所誤阻塞言路物論囂然故復下此條以自解耳夫不曰朕躬有過失朝政有闕遺而曰利所當興弊所當革不曰許諸人直言無隱而曰所在官員人等指實條具以聞陛下之求言巳不廣矣然欲興天下之利當求利之所以興欲革天下之弊當求弊之所以革欲正天下之衙門當自大衙門始臣請遡流泝源為陛下陳之夫內閣者天下之大衙門也以內閣之利言莫利於君子以內閣之弊言莫弊於小人小人不退欲弊之革不可得已君子不進欲利之興不可得巳竊照少師萬安持祿怙寵殊無厭足少保劉吉附下罔上漫無可否太子少保尹直挾詐懷姧全無廉恥世之所謂小人也陛下留之則君德必不能輔朝政必不能修紀綱必壞風俗必偷天下之賢必有所觀望而不敢來天下之邪必有所盤結而不肯去上弊社稷下弊蒼生此弊所當革者也臣願陛下諷之再辭以全其體給之餘祿以飽其欲放之田里以休其勞則天下之弊無不革矣再照南京兵部尚書致仕王恕託志忠勤可任大事兵部尚書致仕王竑秉節剛徑可寢大姦北直𨽻巡撫右副都御史彭韶學識醇正可決大疑世之所謂君子也陛下用之則君德必為之開明朝政必為之淸肅紀綱以振風俗以淳天下之賢必拔茅而來天下之邪必望風而去上利社稷下利蒼生此利所當興者也臣願陛下安車以優其禮賜之手詔以重其行置之左右以展其藴則天下之利無不興矣然君子之所以不進小人之所以不退豈無自哉大抵宦官之權重也漢元帝嘗任蕭望之周堪矣一制於𢎞恭石顯則不得以行其志宋孝忠嘗任陳俊卿劉珙矣一間於陳源甘升則不得以盡其才李林甫牛仙客與高力士相為掎角而明皇之朝政不經賈似道丁大全與董宋臣相為表裏而理宗之國勢不振自古君子小人進退之幾未嘗不決於此曹之盛衰也臣願陛下鑒其所既往謹其所未來大張英斷總攬天綱凡所以待宦官者一以太祖高皇帝為法凡所以任內閣者一以太宗文皇帝為法則君子可進小人可退而天下之治出於一矣陛下聰明冠絶百王神武震驚六合豈不知刑臣之不可以弄天綱哉然而一操一縱之間卒無一定之守者殆正心之功未之講也心者人之神明常為一身之主以提萬事之綱者也但其所發不能無天理與人欲之異耳發於天理則耳自然聰目自然明言自然當理發自然中節可以對越上帝而無愧何宦官之能惑發於人欲則一身無主萬事無綱儀狄之酒或得以甘吾之飲易牙之味或得以飽吾之嗛蘭台須之美夾林強臺之樂或得以蕩吾之目彼必投間扺隙以施其蒙蔽搬弄之術於不知不覺之中雖有聰明神武之資亦將日消月化而寖失其本初矣欲進君子退小人興天下之利革天下之弊正天下之衙門豈易得哉陛下早朝後深居法宮其心之發於天理與臣不得而知也或天理人欲交戰於胸中與臣不得而知也此全在陛下自點簡自省察果天理耶則敬以養之如芝蘭之必生果人欲耶則敬以克之如荆棘之必盡則靜與天俱動與人合而宦官不敢惑矣蓋以君子對小人言之君子為陽小人為陰以羣臣對宦官言之羣臣為陽宦官為陰以天理對人欲言之天理為陽人欲為陰所謂陽者當力扶之使之日長所謂陰者當痛抑之使之日消陽日以長隂日以消則所以格天者在是所以配天者在是所以祈天永命者在是豈特天變之可弭而巳哉臣又聞今日中外之論有謂三年無改於父之道者臣請論之君子之事天也如事親事親也如事天天者理而已矣順理所以事天也事天所以事親也豈有違天而可謂之孝哉古之聖帝明王莫如堯舜史臣贊舜之德曰重華協於帝宜其無一事不合於堯矣今以書考之舜去四凶堯之所未去也舜舉十六相堯之所未舉也舜之所以協堯者一順乎理而已舜之心豈異於堯之心哉茍徒泥聖人之言而不會其言外之意則前日之宦官亦不必擯斥左道亦不必黜遠浮費亦不必根究冗員亦不必裁抑法王佛子亦不必痛懲珍禽竒獸亦不必大放是誠何理也哉臣願陛下不惑於浮言不拘於淺見凡所以事先皇帝者一以事天為法可也臣三尺徽命一介書生非不知言出而禍應計行而身危顧以天變赫然可畏如此而中外小大之臣拱手熟視無一人敢為陛下言之是人心天理可磨滅也天經地義可澌盡也天下以為何如後世以為何如臣之痛心實在於此昔朱雲以槐里令而論安昌侯張禹梅福以南昌尉而論大將軍王鳳孝宗詔監司郡守條具民間利病以聞而朱熹極論其故以為宰相一省師傅賓友諫諍之臣皆失其職而左右近習之臣隂執獨斷之柄也臣雖不肖蒙先皇帝採取收拾作養翰林固非一令一尉之比豈敢泛泛若水中之鳧與波上下偷以全吾軀乎惟陛下為太祖二十年艱難辛苦之業千萬世𢎞大靈長之統一留意焉則天下幸甚臣不勝畏天命悲人窮之至來知德辭官疏奏為感激天恩恭陳謝悃自分哀朽不堪職任懇乞聖明俯容終老山林以安愚分事臣繇本縣儒學生員中嘉靖三十一年壬子科鄉試第五名頻年計偕屢試屢蹶因父來朝患病母丁氏繼患目疾臣既鮮兄弟遂當家侍養未仕及父母去世臣雖有欲仕之心巳非可仕之年矣夫親存不能仕以養吾親親沒而竊升斗以養妻子臣不忍也既不忍負吾親而徒仕乃負明時而徒隱臣不敢也因思先民有言未得其位無所發施則講明聖人之學使其教益明出處雖異推已及人之心則一也臣佩此言遂將本朝纂修五經性理大全日夜誦讀又讀周易見諸儒皆以象失其傳不言其象止言其理臣愚劣自知遠不及諸儒但思易乃五經之首象既失傳則自仲尼十翼之後四聖微言祕旨巳絶二千餘年矣若不窮究其象則以訛傳訛何以謂之明經經不明何以為士所係世道匪輕臣遂客萬縣求溪深山中反覆探索思之思之夜以繼日如嬰兒之戀慈母數年而悟四聖之象數年而悟文王序卦孔子雜卦數年而悟卦變之非始於隆慶庚午成於萬厯巳亥二十七年而後成書書既成臣亦自知祖宗以來列聖相承菁莪棫朴之化皇上繼紹豐芑熙洽之仁有一代之聖君必有一代之經術天意不借才於異代故臣得窺易於一班非臣庸劣自能悟易也辟之鳥鳴於春蟬鳴於秋乃天地化育使之如是非鳥蟬自能鳴也不然鳥蟬天地一蠢蠢者安能應期而鳴於春秋哉臣自易注成後四肢罷敝萬念灰冷不復問人間事矣詎意四川督臣王象乾貴州撫臣郭子章會薦蒙吏部題覆奉聖旨來知德學行既優添注翰林院待詔欽此臣一聞報不勝惶懼臣章句腐儒樗櫟弱植未嘗不講學而學愧先賢未嘗不修行而行猶鄉人至於翰林乃名賢侍從之地待詔尢儒臣極榮之選臣何人斯敢覬於此且臣之齒今年七十有九旨天蜀道白首龍鍾雖犬馬之戀不敢忘於江湖而麋鹿之性終難馳於廊廟伏望皇上憫臣之老不能出户庭矜臣之病不能登舟輿臣未嘗效一日之勞於陛下不敢虛冒榮銜容臣仍以舉人終老山林庶臣於舜日堯天之下得遂鳶飛魚躍之性生為聖世之逸民老非明聖之棄物臣之榮踰於三捷九遷臣之感誓於魏草楊環矣董翼孔廟缺典疏題為幸學奉旨有期缺典及時宜舉事竊惟古今道德之極莫盛於孔子矣古今隆重之典亦莫盛於孔廟矣乃議禮之朝不數而聚訟之口常棼二千年來竟有所廢缺而不講者直至我世廟而始創舉之啓聖祠之祀叔梁紇是也九十年來尚有所疏略而未周者又將待我皇上而始備舉之啓聖祠之不獨祀叔梁紇是也粵自漢高帝迄宋初何代何君不知有孔子哉而牲帛諡號止及孔子之身未及孔子之先也世官世爵止下逮其所出而未始上逮其所自出也叔梁紇齊國之封自大中祥符始而名稱徒具典禮無聞逮我太祖聞天國子宋濓言之矣而兵戎倥偬未暇舉行孝宗嗣服侍講程敏政言之矣而甲乙紛嚻竟成寢閣肅皇帝禮樂中興乃用輔臣張璁議詔立啓聖祠祀叔梁紇配饗從祀濟濟一堂豈不稱殷禮哉惟是二臣建議不緣尊奉孔子起見原為顔曾思位堂上父不應坐廡下據子雖齊聖不先父食之禮求所以安處點鯉無繇伹得叔梁紇一祀可以配諸賢便可通祀典之窮而叔梁紇以前當有為孔子崇報者不暇計矣張璁稱引是説遂亦無所推廣致令世宗隆禮孔廟之制猶未大備殊為缺然夫國家之事孔子無不至矣猶是加思所自僅及其父進之而伯夏又進之而防叔俱泯泯無聞不得享封崇之榮與樽俎之列臣實傷之臣謂防叔伯夏合照叔梁紇一體追封奉祀壇宇無用别營第就啓聖祠倣同堂異室之例增設一龕以防叔處中伯夏處左叔梁紇處右或并稱啓聖公而以世次别之可也或并稱公而酌定二諡而别於啓聖亦可也此禮舉而孔氏父子祖孫並荷思綸並食國祭孔子在天之靈庶幾用慰而朝廷之崇報孔子又寧有缺略而不周至者乎或曰孔子之報與天無極猶當十世享之而臣不以為然也孔子稱周公成文武之德追王惟太王王季文王豈以素王而敢踰越耶司馬遷敘孔子世家亦斷自防叔伯夏為始則議禮而至防叔伯夏亦無容見少矣或又曰一切祀典必求其所表賢防叔伯夏無所著於春秋於禮何居而臣又不以為然也羽淵之血不可以配天乎孟氏之敫公宜又安知視防叔伯夏為何似也且顔曾思孟大賢矣而視孔子則遠矣周程朱蔡大儒矣而視孔子又遠矣彼且以其父配孔氏而享從孔氏而祀而孔氏祀享僅一啓聖而止無所加於諸賢諸儒何無等也不可解矣聖朝推思四品而下上及一世三品而上遞有增加何秩然也聖賢分量豈啻祿位崇卑乃推恩祀典一概而無所軒輊不可解矣臣子之官一品者恩寵榮施三世何優渥也而啓聖祠之封爵灌獻祖以上不得與焉豈至聖先師反出保傅下耶尢不可解矣為孔子惕尊祖敬宗之心為萬世開綱常倫理之報非皇上隆師重道之首務耶抑臣猶有説焉契為孔子遠祖堯所使為司徒敷五教而遜五品者此萬世教化之宗孔子道統所自來也視稼穡之稷教養開先並垂永賴應與厯代功臣祭典以湯武之故不便配享遂淪沒不祀何耶臣載按太稷禮以后稷配春秋猶兩有事焉而明倫如契彜教所昉獨無處與明禋之末何草草也臣謂帝王廟傍宜有一祠别祀稷契如謂稷已與配别祀可省一契又不宜有專祠請詔闕里為之祭丁分官致奠如啓聖祠禮則功臣祭典之罅補塞而無滲漏而聖學淵源亦不至滅沒而無傳矣方今軍旅倉望誼不得迂談爼豆乃聖作昌期正典禮修明之日而臨雍在邇環橋人士觀聽新天子禮樂行且雲集臣敢無説而處此耶伏乞敕下該部集議具覆舉行曠典臣不勝悚息待命之至再議孔廟缺典疏題為聖裔已沐殊思孔廟宜修缺典謹用補牘再申末議以裨典禮事臣昔為諸生時春秋二仲得駿奔啓聖祠竊嘗伏而思曰叔梁紇祀占未有也我列聖朝亦未之有也肅皇帝用輔臣張璁議創兹殷禮昭垂簡册焜耀千古詎非大聖人作為哉獨奈何防叔伯夏之未與也國家崇奉孔子何所不至而封爵俎豆不及三世竊有憾焉臣近竽言路得以言事皇上矣初夏入班行即擬一言以補典禮之缺而於時遼信初傳談兵孔棘議禮固未遑也居無何而禮臣以臨雍請矣隨得明嵗舉行之旨臣同官以孔氏鄉舉請矣隨得嵗外額加之旨臣於是有幸學奉旨有期缺典及時宜舉一疏私心計俞綸可旦暮邀也巳奉聖旨幸學改期已有旨了祀典先朝久定不得紛議該部知道欽此臣又伏而思曰皇上嗣服以來浩蕩之恩隆施廣運豈有靳於孔子之先亦惟是東事狼狽兵餉焦勞軍旅張皇無暇及俎豆事耳臣遂不敢復行陳瀆擬俟來嵗之春王正月釋奠屇期言之即或巡方輪次廷遣先時陛辭拜疏未晚也乃今荏苒數月而釋奠盛舉將轉盼至矣載讀東省獻土録四氏學中孔聞籍孔聞謤並以新命舉矣不愛實科目以寵孔氏子孫而獨愛虛祝帛不以榮孔氏之宗祖豈孔子亦猶是俗情也不念其宗祖而第念子孫乎臣固知孔子之不然也年來接邸報時時見覃恩諸疏隨上隨下百餘年荆棘之墓盡表新阡數十載凋落之家悉叨胄監絶無有愛惜鄭重而不行頒給者何獨於孔子之三世偏吝此典而不得與於覃恩之例也邇者皇上講席時勤開講必先謁孔子羮墻之見何處無之諸所陳説經書非孔子所口授則孔子所手定也陟降孔子誦讀孔子而孔子之王父曾王父竟不得霑封爵俎豆之賜安在其為尊孔子耶孝經稱周公大孝曰郊祀后稷以配天宗祀文王於明堂以配上帝中庸稱周公成文武之德曰追王太王王季文王此可見周公之孝不獨在文王一配帝文王一追王矣孔子素王也豈敢擬於王制而通於所以稱周公祀后稷王太王之義則尊祖敬宗聖人論孝蓋惓惓焉臣固知防叔伯夏之祀諒非孔子所不樂也僅僅祀一叔梁紇而不以及防叔伯夏其中豈無所缺然乎一切典禮定自先朝何敢輕議乃禮以義起隨時增定亦國家之所不禁也即以叔梁紇之祀高皇所未定也世廟固不嫌參酌而創舉之矣則防叔伯夏之祀雖世廟所未定者皇上又何嫌推廣而備舉之耶况乎同堂異室簡而易行禮有增加事無勞費巳悉臣前疏中見在御前無敢贅矣當此嵩視之辰萬國衣冠畢馳輦轂倘蒙皇上俯采芻言修舉曠典則孔子父子祖孫並沐恩綸並享國祭孔子在天之靈庶幾用懌而凡百有位誰非讀孔氏書者又誰不歡呼欣忭倍鼓暢於祝釐之下哉伏惟聖明裁察敕下該部集百官會議如果臣言不謬至聖孔子應得榮及三世孔子之曽祖防叔祖伯夏應得與於封爵俎豆具覆上請詔令同叔梁紇一體崇祀則數千年缺事一旦舉行而我皇上隆師重道之禮斯其無餘歉矣臣不勝懇切待命之至喻思恂劾權璫魏忠賢疏臣惟自古宦官之禍釀於肘腋成於近習中於官府貽於社稷而其原實起自一念無君無父之心憑藉一時易縱易逞之勢職守不敢彈乘輿不敢斥萬一禁之不早仍復除之不嚴俾其拚飛於不可測決裂於不能救則歷覽前代之事可得縷縷指也臣讀易至開國承家小人勿用心思人主自為國家計猶且勿用小人以稔亂胎矧我皇上實開中興之運承丕顯之基顧以刑餘為周召而令腐身薰體之人濳伏左右恣行威福閻宫咋舌通國寒心有如宦官魏忠賢者憲臣列狀以聞始邀諭責小臣連章而請未見施行可乎忠賢品流卑賤心性貪殘目不識丁巧能飾詐我皇上信以為忠而莫辨其大不忠名之為賢而靡覺其大不賢者良繇身雖毁穢衷甚姦回有時包藏小機小變取皇上之歡欣又時假借小善小忠以干賞鑒所以得冒居尊顯久厭寵榮一任罔欺不露破綻耳試迹其行徑數其罪辜在諸臣具奏之疏纍纍不罄亦既炯若列眉悉如擢髮其忠賢自造之孽件件非虛亦既詭同鬼蜮慘如戈矛臣即喋喋再陳更奚有重且巨於二十四欵者意我皇上朝經電照夕震霆威頓清黼扆之姦大泄神人之憤乃猶然惜誅戮於豺狼加生全於蛇虺也臣竊仰窺皇上天縱聰明原不難於詳察審聽性天英武又何憚於敕罰明刑或者以忠賢諸條俱實萬死難逃兹且暫留要領徐膏斧鑕而不知從來邪慝之在居側其未發也患人主之不知其既發也又患人主之不斷故去惡莫若盡除賊病於需誠恐稍墮優柔漸成牽戀逮後遷延時日忽然移易神情雖百錬之剛可化為繞指即太山之大可睞於簓粳一旦養成羽毛握定魁柄僨盈無忌勝氣籠霄向為我制者反來制我前欲我容者卒令我畏無窮之禍有不忍言則加膝若假其噬臍拔山愈滋其固蒂矣姑息養癰踟蹰臘毒後即能悔何益之有伏乞皇上揭日月之明用霹靂之手概將諸臣條上忠賢事迹乘天道昭彰之會人情鬱怒之秋通縣朝市布告多方或逮付法司按情如律或驅投荒裔賖死須臾則禁廷清肅聖治精嚴於以保國寧家以安中外皇皇疑畏之心以鞏二祖十宗永永靈長之祚天下幸甚臣愚幸甚歐陽調律建文帝編年崇祀疏臣聞國於天地必有與立禮制是已顧惟聖盡倫惟王定制值其常則稽古步趨惟恐愆忘值其變則因時補葺俾罔缺遺總析於愜天道宜人情故可以揆先後聖而合符可以俟千百世而不惑相反正以相成變終不失其當耳幾見有繼統立極之君如我建文皇帝者享國五年曾不得留一日之年號歆片晷之血食乎前者怵於忌諱後者牽於固仍遂成二百餘年之缺典何以厭天下人心而傳之後世無間也臣少嘗側聞父教及閲國朝往牒相與咨嗟掩卷欷歔者非一日矣比幸具數留垣時從諸臣趨蹌陵廟見佳氣鬱蔥深羡規模恢遠卜世無疆而感觸前念又未始不徘徊慺愴倍滋局蹐也臣伏惟皇上特偶未之念耳皇上仁孝性生明斷天成使萬幾清暇猛念及先朝闕事而慨然修補寧俟臣言畢哉臣是以不揣迂陋遠望宸嚴齊木稽首反復陳之蓋自古君雖桀紂不聞以失德削年主即幽厲非易姓不以殄祀乃建文皇帝則太祖高皇帝之嫡孫也繼統則正享國亦久廣厚仁明無敗度敗禮之失叔姪相承又非改玉改步之變而始終年號不著廟祀不舉前者猶謂怵於忌諱實非得巳獨怪夫後者牽於因仍遂使至今尚成缺典是皆膠泥形迹未嘗就天道人情一會通之也夫致疑於人事即咎建文皇帝以紛更亦何不可若問成祖以興師其復何辭然當太祖鬪乾定鼎之初我國家億萬載丕基天有默注此廢興存亡之故皆有莫知其然而然者且不觀建文皇帝曰惟恐殺我叔父之言乎逮宫一焚而此棄之若遺彼亦置之若忘則建文帝何罪於成祖成祖亦何憾於建文帝豈不照照然於天下而無奈論世者之終固也然非獨臣今日之言也見往牒中先臣言之屢矣亦非獨臣子之心也成祖即以鑒諸死事臣之忠漸寬禁令悔不及用練子寧矣至仁廟時嘉方孝孺等之忠盡弛黨禁矣孝廟時失臣吳臣忠請表祠諸臣矣神宗皇帝登極即沛然嘉與諸臣建祠祀諸鄉矣夫未有念其臣而反遺其君者以此可諒成祖之心并仰窺列宗之心雖遭時不同宅心無異善繼善述若專有待皇上所謂禮樂百年而後興待聖人而後定者自非偶也比皇上覃恩普被又褒忠恤死屢賚非常即如近者允浙撫臣之請亦巳恤方孝孺而欽其後矣豈恩推臣庶反遺尊親試思光宗皇考彌月善政人不忍忘即皇上秉籙以來之居諸不愛割以益之用永孝思而建文帝為缺陷且因而湮祀典神明之胄竟同若敖之鬼恐自光廟而上在天有靈俱不能無恫也兄皇上方加意制作簡命儒臣纂修兩朝實録概舉盛事而坐大典久缺不及今修補更待何日故臣斷謂國史另編建文五年以昭統系無俟再計而廟祀不容不議者惟皇上乘師濟在列之日敕下廷議無泥守株無撓築舍毅然設誠而力行之庶幾質之天理而順揆之人情而安仰以承聖祖神宗之心俯以慰孝子慈孫之願上可以補前缺下可以昭成憲近以快臣庶逺以信史册至孝至仁至誠至斷衆美畢萃於皇上一心究且誠感神明化孚異類華夏傾心蠻貊效順皆理之自然桴鼓可必者一時萬世咸頌今主禮明樂備自今日嫓美成康而文景不足道矣臣腐懦賤士豈宜輕干朝典獨積忱有日感時慺愴不忍當聖明不諱之世自甘隱忍且念轉盼即臣待幽黜之日失今不言恐終無言時用是齋戒沐浴焚香叩首先朝仰告二祖列宗然後拜疏上請世固有人輕而言重其人非而言則是者伏乞聖慈矜憫愚陋而恕其狂僭之罪亟採臣言見之施行萬代瞻仰在此一舉竊謂皇上勵精初政實莫大於此無迂闊視之使天下謂聖朝有缺事也臣干睿聽不勝戰懼迫切之至請施恤鄉官保城殉難疏竊惟天下不能保其常治而無亂但使人心之忠義存仆一於千伯則能支大廈於將傾何者蓋惟正氣能興起人心而旌恤之鼓舞更神耳奈何人心至今日若不知忠義為何物故自封疆有事以來士無闕志人懷二心雖身受封疆位極寵榮者不免而以禦亂捐軀求之巖居川觀之士抑又難矣乃有無土而守無兵而戰為武夫之所不能為而死文臣之所不肯死如合州鄉官原任安定縣知縣董盡倫其人者真世之竒男子烈丈夫也臣等生同里井備聞父老之傳頌且身實受其庇而忍不據實為我皇上陳之蓋先是逆酋蓄謀突發難於重慶一時守令望風鼠竄姦宄乘釁蜂起蹂躪郡邑勢如席捲而合固逼處虎吻且素為賊所垂涎而側目者故渝城一據即首欲得志於合自府吏蔡璿受遺迫索州印如寄而賊目中無合矣於時盡倫固自入山以來十餘年絶迹塵市者也至此毅然解帶傾資募族黨率子弟入城從知州翁登彥之請共圖嬰城固守故殆璿詣城隍祠曰吾當對神與爾印也乘璿稽首神前急出袖中鐵錐立碎頭顱抉兩目而生啖其肉手刃其首懸諸劇衢蓋自是而賊黨膽喪矣日與翁知州備謀防禦一切除戎備糗據險集哨密偵用問以禦外侮而清內姦者算無遺力而鬻産以侣義醵金以廣助衽甲枕戈以率先尢勞怨不避艱危弗辭故一時義士嚮風姦人奪魄賊鋭屢挫始終貽合以安且助銅梁而銅之解救安居而安之城復而合以西北諸郡邑賴之藩屏翼衛者尤未易更僕數也自是合州威名為賊所憚賊出悖傲云有捕獲翁知州董鄉官者許封侯再傳牌於合州安居銅梁定遠聞牌之及三邑者皆僭號改元獨合州牌不書以有翁董二臣在也繼而巡道臣徐如珂知盡倫滅賊志壯檄州欲盡倫援渝盡倫慨然領木州募兵以往嵗除抵江北元旦祭告死事諸臣即厲聲罵賊誓不與俱生聞其時七箸未遑子弟及其僕從皆力諫之不能止身先渡江直薄城下奮臂一呼殺賊顧多竟賫志以沒矣賊疑且懼掠其僕詰問不已而其僕亦寧忍死竟不言主死也喼嘻盡倫亦遵何德而致此蓋盡倫生而磊落不而進便為真循良退便為真肥遁故初令清水量移别駕尋拂衣歸繼以關中撫按屢薦蒙皇祖特恩破格徴召起加二守銜仍管安定縣復以執法忤孝廉又拂衣歸歸而僻處杜門即子民之伏謁上司之遺一切謝絶日惟書沈酣與處士李作梁共期著述不朽每嵗入租時以贍族無私也此其滿腔熱血渾身是膽貫顯晦而徹始終對天地而泣鬼神蓋誠有自來非偶然已也故臣等曽不避內舉薦之於先假令蚤使在封疆定能為國家效一臂之力而誰其用之今且無及矣此深山窮谷聞者無不涕淚酸辛而忠臣義士不扼腕痛悼者豈情哉今以保城之功則知州翁登彥業蒙皇上以督臣之所請擢居憲職暫酬其勞以死事之義則興文縣張振德亦蒙允諸臣之請特子恤廕以旌其忠臣等竊謂盡倫一身已兼而有之且異乎當官而守上者廟堂之上定有以厚待盡倫矣兼聞其子量三知慷慨激烈大有乃父風以一書生讎不共戴遂領盡倫所部兵同餐荼蘗共寢風露誓不殺賊不巳無何遵義兵叛降賊三日後三知鳴鑼大呼諸兵故為責如約狀賊遂疑悉軒降兵首棄於城而降卒乃不為賊用蓋忠肝義膽父子一心求之今日豈非間氣獨錘一門者乎則優恤之典並及父子此亦天理人心不容已者臣等得翁知州貽字備述盡倫之忠而惜天付完節太速云見請入祀并中請恤典又舉其子三知於道拔以僉書督兵亦知地方公道未嘗泯沒第蜀道萬里又南中見報不全義迫於衷不得不就所備聞縷縷上陳以聽廷議伏乞敕下該部查照近例將董盡倫優賜旌恤并豫諡廕以抒孤憤而慰幽魂庶節以竒而益著典隆而益彰將使四海忠義之士聞之而感戚則奮即全軀保妻子之人亦聞之而愧愧亦奮當此四方多故不肖别具肺腸賢者亦各愛要領之日若朝廷再吝此異數别無激發忠義之術而大事去矣抑臣等因是而有感焉何昔忠臣義士史不絶書今寥寥也蓋功名富貴之徒賊至則抱頭避難賊退則攘臂爭功甚而飾敗為成指害為利故武事之不振率由功罪之不明以至於此如城都之圍久無生理賴撫按諸臣出億萬生靈於半載湯火中為天子保西南半壁此其竭力苦心首在撫按兩臣為無前元勛應與賢王夾輔大忠並寵褒非常不俟終日而何以守常格知縣吳𢎞業屢出銅梁於阽危詳在南北子民二揭而新任道臣徐如珂聞難急赴惟恐後時聞其措置兵餉朝夕拮據至廢寢食不覺血枮髮白同知越其杰報陛之日正蜀事洶洶而其杰毅然勇往徵兵催餉利害自擔怨勞獨任判官胡平表救焚拯溺冒危涉險始終不憚此皆今日難得者他若李大儒金富廉一素封匹夫自酋亂以來即傾資養士襄創更戰以至於今亦錚錚佼佼當於古義俠中求之矣然亦據所確聞者如此其餘未得盡知或知未真并乞敕行督撫按臣一切查核功罪務極公極實勿漏勿冒力洗今日套習蓋四海之大不乏忠義惟在廟廊之上實實加意鼓舞而又重念西蜀被賊被兵交相戕害士紳小民元氣俱傷速如臣鄉臺省諸臣顧其仁梁之棟等之言力主發帑救急并斟酌一二嵗間火蠲額餉以救此孑遺天下事尚可為也全在謀國者留意焉王祥昌題為培養聖夀有道萬年疏人王之身非一人之身也天地之所寄託元廟之所憑式四海九州之所託命也此其關係何如重而可以屑越視之先是宣傳本月初三日聖駕幸學大小臣上手額稱慶咸謂臨雍之典肇新太下之景煥發諸司百執演習禮儀并清途灑道已非一日矣即龎眉皓叟兒童走卒靡不踴躍歡呼且快覩六龍騰泮水之波雙鳳掖雲中之輦矣不虞初一日本衙門傳奉聖諭謂聖躬忠鼻衄暫且停止改在明嵗舉行臣一聞之不勝憂懼蓋以臣之事君猶子之事父父偶感隂陽之患犯寒暑之疾為子者自當汲汲皇皇進藥餌講刀圭日以珍攝之方反覆陳於父前而後即安雖其天性然哉固亦職分宜爾也皇上固天下之大父也御體既稍有違和臣安得不進尊生之説以竭愚分乎蓋人有此身全以精神為本少有越泄諸病生焉然病生有胎實繇多所致故養生論曰萬人操弓共射一的的無不中萬欲重障以害一生生無不傷又曰洞房清宫招蹙之皓齒蛾眉伐性之斧總言多欲之為纍也數年來臣叨列班行每瞻天顔之粹穆真是堯舜之丰姿今聞聖躬忽病鼻衄以臣愚妄揣毋亦水虧火旺或於房帷之間有未節臣以為病有內因有外因外因者藥餌可療內因者恐未必全藉於藥餌也必皇上幡然猛省毅然獨斷勿令靡曼之色日侍於前不見可欲使心不亂庶恬靜以養神清虛以棲心不事藥餌而聖躬自安矣然此心最易馳騖不觀覽書史則無所持循而聲色乘是而感伏乞皇上居紫禁中觀覽孔子年少戒色之論則臨履薄之念悚動矣觀覽孟子養心寡欲之論則沖恬淡素之趣勃發矣如古之享國長久者自虞舜百嵗而後莫過於商商宗周文王然稽高宗之養壽命也內焉恭默思道外焉不僭不濫不敢息遑嵇文王之養壽命也內焉穆穆敬止外焉修和輯寧聿觀厥成是古帝王之保身皆淡泊明志寧靜致逺運精神於有用之地而不耗於聲色之場故綿衣厯聲施至今耳皇上試繹孔孟之言而追高宗文王之芳矩則燕趙二八之舉自無所鍾情而心志清明精神強固何患壽命不與虞舜比隆哉然臣更有進焉皇上固通天下為一身者也天下之壽命寄之皇上皇上之壽命亦寄之天下必疾病疴癢靡不相通關節脈理無處不貫乃可以言培養之周爾羣臣雖卑乃皇上之手足也批鱗敢諫之士熱血常灑玉階此亦天下之至忠也豈終靳夫轉廷伏殞軀之士忠魂常繞帝闕此亦天下之至苦也豈終吝夫恤典此而猶吝惜其何以聯手足之誼而體羣臣庶民雖賤乃皇上之四肢也山左之旱魃為災江南之馮夷作祟獨不可議賑議蠲以救孑遺乎全蜀額解之錢糧并已完未完之數目獨不可盡留該省以充兵餉乎此而猶屯膏其何以聯四肢之詛而子庶民至內操一節雖屬聖天子親衛之兵第宜列於禁城之外不宜列於宫庭之間逐日訓練銃刨喧聞豈所以葆太和而凝清靜儻有不測天下事尚忍言哉儻移至城外免其內操則親衛之兵既不缺乏而輦榖之下又免伏戎不猶為培養壽命之大肯綮乎諸臣言此章滿公車臣不過再為補牘以備培養之一端爾冒昧上瀆宸嚴無非祈聖壽無疆遂臣子岡陵之祝伏惟採擇施行李化龍平播疏看得楊酋匪茹與國為仇萬姓荼毒三省震驚孰不以為不可以嵗月克者乃自出師以來甫三月有竒而元凶授首黨與悉擒千年虎狼盤踞之窟一旦掃蕩無遺上足以伸中國之威下足以泄生靈之憤其他狡點土司獷悍惡苖無不落魄亡魂西南半壁天下可永無虞矣朝廷威福與指授方略所致斷非文武將吏敢貪天功為己力者惟是各官兵暴露行間勞苦萬狀不可不查敘也先是臣奉命入川賊知罪在不赦已統兵深入有擒王剿叛之説遂破綦江且逼重慶地方洶洶皆謂有長驅之志於時目前兵力略無可恃臣乃以計綬之一面調兵一面移文詰責若未嘗絶之者賊果信之即具文求撫且不西向臣因得以徴調漢土諸兵急為之備其時賊氣張甚川人畏之如虎臣登成都兵甫出門欲投錦江不復肯東及聞綦江城守兵見賊來競譟而走多投水者止餘二將與其家丁遂及於難臣念漢兵心膽已碎土兵狐兔有情自非招客兵不可因請調陜浙諸省之兵又念外兵之費甚侈往來途次且生擾是不可於每省鎮止調一二千多者三千共數省實僅僅二萬其餘仍三省及滇粵土兵也然西南人見外兵來莫測多少以為天下之兵皆至矣自是漢兵之氣北而土兵之心亦折無不樂為我用者時賊雖知調兵然以為虛聲赫之如往日非實事也臣亦止在成都積糧治器若無事然不復東賊亦不疑北兵且集臣移駐重慶賊始知必剿頗肆衝突然我兵漸益未易得志也臣又念兵以一路進既道狹不能容一有前郤不可復振因分為八路又念路分而兵少賊厚其陳以衝之敗矣因令每路皆三萬以上每一路皆可以當其全師又念關外賊黨多不可勝誅會兵部頒賞格至首重招降臣益推廣之但投戈者皆赦不誅臣又念兵無賞士不往會兵部賞格首言得賊者即以其家資與之臣益推廣之克關破屯各懸賞賞各以千萬計既川兵入關臣又恐其人自為心若九節度之師然因復委按察司張悌入總監之殺牲蒞盟務必得賊臣又恐賊事急詐降得之遷延至暑雨漸深我兵不能久困令但急攻之有稱降者斬使焚書無為所紿時湖貴之兵亦至屯下臣欲入營親監之會聞先臣之訃臣恐營中遂懈惰不可用因不待成服跣而草檄示以例應候代照常督兵有慢令者尚方具在令代中軍余德榮等再往監之臣又恐賊屯後易攻屯前難攻時諸將壁屯下者各有分地因令以徑兵一枝壁其前其餘併力於後臣又恐諸軍士爭超賊財物或至亂行至有他虞因移文再四中禁臣又聞營中流言水西目把尚不絶賊恐漏軍情因移文令其退劄水西上官懼撤其兵退而引嫌曰吾不欲為亡播之續也時久雨兵士曰在泥淖中至六月之初四而天忽晴初五日遂破其二城初六日遂登其屯賊已滅亡總計八路生擒賊首賊從一千一百二十四名斬級二萬二千六百八十七顆俘獲賊屬五千五百三十九名口招降播民一十二萬六千二百一十一名口全活被虜男婦一千六十四名奪獲馬牛七百六十七匹獲器械四千四百四十四件是役也自賊破綦江至剿滅可一年自進兵至滅賊百十有四日當八路對壘時土漢兵既參差不齊諸將領亦彼此觀望播人劫於賊之積威人自為戰未易即克我各路又糧運艱難時有脫巾之呼臣日夜催督走使馳檄至數百千即兩省撫臣各路鎮道亦靡不忘寢忘食或至頭鬚為白總之諸文武知廟堂之意必欲滅賊故鼓之即應勞之不怨誅罰之亦無敢囁嚅者倘更一月而賊不滅署雨久瘴疫深我兵自潰無問賊矣該臣會同巡撫貴州郭子章巡撫湖廣支可大巡撫偏沅江鐸議照國家方制萬里日所出入之邦悉為郡縣獨西南諸省不廢土司蓋亦曰因俗而治與之相安云爾二百年來此輩犬羊之性不堪馴擾亦時有之然未有若播酋楊應龍之公然叛逆者則何也蓋其地險其兵強其財力足以使鬼通神其聲勢足以呼羣嘯黨加以年來方宇多事九伐之旌未遑南指彼遂時時狂逞亦遂時時得志井蛙之見謂縣官真無奈我何諸羣不逞如楊珠楊明何漢良孫時泰輩􅗎其雄心或時有以公孫躍馬尉他自王之説進者賊亦念騎虎勢不得下將曰等死無且舉大名乎於是乎恣其狂圖淫怒以逞而破城殺將鶴起西南之勢成矣夫天下非小弱也九州四海兵非脆糧非乏也何賊逆形未著皇上不忍遽觀之兵曰吾且舞干吾且解網姑俟其悔過而與之相安於無事乃不謂凶人之性不移也始天怒赫然斷在必剿夫斷而敢行鬼神避之况此么麼者乎蓋自進剿之旨下尚方之劍頒然後海內熊虎之師如雲而集陳紅之粟蔽江而上智士陳謀勇夫效力火燎毛山壓卵賊即欲不灰飛煙滅亦曷可得已臣等嘗即諸路之功而評敘之在四川則楠木三洞賊黨以為三窟謂天險不可升者也婁山關賊前門我所必由賊所必爭者也海龍屯賊以為天造地設人迹所必不能到兵力所必不能加者也三戰而三克之賊力竭矣不亡何待夫賊黨自戰其地猶易與也惟賊父子親在行間則諸賊人人致死難與爭鋒該路到處與賊父子對壘最快者九盤子之戰賊悉其精鋭以付朝棟令之從綦江進從南川回此其目中尚復有官兵乎劉綎一戰而走之自是播人為之破膽尤快者諸軍壁海龍屯下連月不拔綎至一日而克其二城賊遂滅亡至今羣口囂囂然竟無敢沒其先登之烈者兵法無選鋒曰北綎於諸路其選鋒乎則綦江路之功也臣嘗言破賊關外宜招降謂多不可勝誅也關內宜疾戰謂師不可老也安羅陶洪三寨生口以數萬計勝兵以數千計令貪功者以大兵初入必且多殺以報捷勝之則傷仁不勝則損威矣而該路坐受其降兵不血刃自是一戰而斬郭通緒再戰而入崖門關三戰而屢捷於木牛塘賊計無復之遂父子相哭而上屯矣當其入木牛塘時川兵入關去屯尚逺湖貴兵在關外絶不相聞吳廣以孤軍去屯數十里而結營犯兵法之所忌而卒以得志自非其令嚴而戰力當不及此後雖以講降誤事然有激而奮竟以成功逆賊父子盡獲其首終不失為全捷則永合路之功也南川路最險最逺去屯可六七百里賊以為官軍必不能從此進當馬孔英之未至也高折枝以一書生請自將土兵以往此固已雄偉不常矣乃師期一月之前先搗官壩營以寒賊膽而撤回其龍泉之兵且以解思石之危其事甚竒其功甚大比進兵從真州入真人則簞食壺漿以迎播人則棄甲曳兵而走居然有三代氣象時諸將方欲候各路消息方入關折枝夷然曰若是則誰為當先入者䇿馬而前衆隨其後竟以三月初八日奪桑木關而據之臣用是以催各路尚有以四月入者令諸將皆折枝諸路皆南川滅賊當更速抵關而馬孔英至則文武相得如樂之和自是日日約各路攻圍有應有不應甚或以相誹詈而折枝不顧也分攻令下諸將爭走後門該路獨壁前門夫後門我易攻賊前門賊易衝我彼亦曰誰為宜當賊衝者蓋亦先入關之意乎破屯之役後門以二路更攻前門以一路摶戰日夜揮戈人百其勇坐使賊自盡而逆黨無一逸者總之倡諸路之先作三軍之氣令黔師不得以賊強我弱借口而竟以奏功臣於該路文武蓋心折焉則南川路之功也在湖廣則偏橋一路江外為四牌江內為七牌皆五司遺種九股留苗盤據糾結乎其聞四牌不掃即武騎千羣未易窺三渡也陳璘獨以一旅之師先掃四牌開我進兵之路用是烏江內賊黨寒心長坎瑪瑙青蛇三屯自昔以為險絶官兵所從未易得志者臣亦慮其難下令降之璘以為除惡務盡竟一鼓而升其巔殺戮數千臭聞十里時龍泉哨施南兵亦已先克扳角關至今白泥湄潭之間四牌七牌之苗遂無遺種非璘之力不及此該路漢兵少土兵多糧運少遲便成譟呼璘令嚴而法肅卒能使之用命而不為害逮至克關逼屯議設木柵製鐵牌以防賊逸其機智有足多者卒以入虎穴得虎子閹人繡女纍纍在俘良快人意則偏橋路之功也貴州各路與川湖不同其地近其兵少其餉乏其夷情反覆而靡常其民心搖惑而不定兹之用兵又非以一淬厲一鼓舞之為競者烏江失律已見法矣然能借是以激勵水西俾之絶狐兔之情踐虎狼之窟母氏屯一戰大足褫逆酋之魄而奪之氣此則失之武人得之文吏蓋運籌者之苦心乎李應祥以孤危之兵當臲卼之時能自審於緩急進止之間以守為戰以招撫為進攻卒之轉弱為強掦旌直指斬首數百招降數萬因破諸屯斬三渡扺白田何其壯也竟以合連川兵回心戮力破重城俘羣醜振積弱之邦舒華夏之氣始如處女繼如脫兹其審於機而神於用豈易得哉則平越烏江沙溪諸路之功也夫我國家從來用兵未有大得志於西南夷者也國初傅友德統二十四將軍止言防守未聞戡定正統聞麓川之役用兵五十萬轉餉半天下升敘萬人三返而罪人竟逸嘉靖初思田之役以剿始以撫終至今為諸夷借口兹其大致可覩已諸帥固中庸人臣等三五書生耳其智略才力不及古人逺甚乃兵才逾二十萬進兵才逾百日費才二百萬而幸以成功此非臣等之力皆由我皇上神武獨斷委任不疑用使文武同心將士效死爰有成績臣每誦詔旨即十行之札萬里之外往往曙於指掌而析於毫毛輒沾沾自得以為賊平矣已戰勝於堂上矣夫淮蔡之平直須一斷何况今廟謨詳一若此哉敬陳播地善後事宜疏查該州地鄰三省然楚止偏橋路通一線蜀與黔蓋無所不接壤夫蜀無籍於播黔瘠壤也若乘此時而割播地以附黔則於蜀無損於黔有裨且臣等别疏又請以楚之四衛並割附之從此黔省幅􅊷得與十二省比長潔大甚為永便但盡屬之黔則地方千里諸凡締造勞費尚多亦黔所不能堪因議設為二府分𨽻黔蜀庶建邦啓上各自經營成聚成都指顧可就皇上廓清之績既已盡被於三藩而恲懞之仁又復再造於黔土矣除寬脅從撤兵馬招流移厚賑恤抑兼併靖橫恣等項凡明旨所叮嚀而兵部所條議者俱已陸續舉行尚有後開款目謹集衆思列為十一事呈覽千一復郡縣播州南極牂牁西連僰道東西廣一二百二十里南北袤一千四十里漢唐設為郡縣在川貴之間亦一都會也至唐乾符聞陷於南詔楊端取而據之今逆酋既平相應改土復流以變夷俗及照播州白田壩沃壤數百里即播州遵義縣故地當復府治設縣附焉桐梓當綦南之衝走川貴道也舊為夜即縣故地當復一縣望草南接婺思北逹真涪為綏陽縣故地當復一縣仁懷濱播枕永襟合帶瀘為懷陽縣故地當復一縣真州即古珍州川原平衍商販周遊應復一州以上俱𨽻川省統轄黃平為川貴要區舊設撫苗通判一員列銜重慶駐鎮彼中其與播勢相控馭並為重地應設一府湄潭龍泉地理廣邈各應建設一縣甕水重安合設一縣餘慶白泥合設一縣并草塘容山二司應割𨽻各縣以上地方去黔甚邇相應改𨽻貴州統轄總計增府二州一縣八蓋亂流初殄地閬人稀姑建數城以為繫屬以後地閬人聚無妨增設其二府治與附郭縣分正佐首領各應照例全設外州縣正佐首領俱應量減一設屯衛播州地方千里山川險惡夷漢雜居又逼鄰二大土司時有啓疆之志必須設官軍建屯衛以明居重馭輕之勢因設一衛於白田壩與府同城指揮使一員同知二員僉事二員鎮撫一員經歷一員知事一員所屬前後中左右五所每所正千戶一員副千戶一員百戶四貝所軍各一千共五十衛所官於從征有功者酌量升授不足者於鄰近願入者調取移實之其邊隅逼鄰土司地方各設屯田每軍照祖制二十四畝再加六畝為冬衣布花之費共三十畝即自種自食不必納糧於官又復領出紛紛滋弊各開屯處除養屯兵之外餘田仍照民地起科上納本折於各州縣為衛官俸廩及不時軍興之用每年孟冬仲冬孟春仲春農隙各屯官時加操練又以十月二月望日齊赴兵備道大操三日驗其武藝較其強弱而明賞罰焉老弱者汰之一屯老弱多者並革其官軍田即另募壯丁補伍庶軍得實用異時即募兵散盡此五千軍與主兵三千自有八千可用之兵矣一設兵備播地三面環夷干戈甫戢當此經綸草昧之始設立有司可以招撫流亡或未能長駕逺馭而久安布置將領可以備禦倉卒或易于生事徼功而開邊釁欲以內修戎備外攝夷心整肅羣僚讋服衆志為地方長久之計必設分巡兼兵備官一員於播州白四壩新建府城駐劄專一整飭新復郡縣并重慶衛忠黔二所永寧酉陽石砫平邑等土司兵務兼理有司錢糧獄訟其重慶府巴縣綦江南川涪州武隆彭水切鄰地方悉聼管轄以便行事黃平新設一府四縣雖割屬貴州但人心初附田地毗連與貴州水西宣慰司並聼兼制令一設將播淪於夷閲八百餘年風俗獷悍法扞格已久今地雖蕩平而逋孽濳藏漢夷錯雜招苗樹黨越界侵田時所必有今議播州留兵一萬黃平留兵三千粗足防守然必得一大將鎮之始可無事查得先年克平九絲議留總兵一員鎮守其地今建武視播稍緩即一參遊足領之合無將軍門標下添設練兵遊擊一員改駐建武防守原設總兵移鎮播地應留各兵挑揀家丁三千買馬三百內標下標兵家丁二千七百馬二百七十以坐營千把總領之兵道員下家丁三百馬三十以中軍領之有事俱聽總兵提調名為正兵此外兵七千酌量分布於白田壩真州桐梓等縣播川等驛防守內以一遊擊領三千以二守備各領二千各用千把總分領之有事征戰無事即為築城鑿池建郡縣修郵驛之用糧銀照依舊例支發徐俟建置竣工日除家丁三千馬三百外餘軍以次議撤有願附籍當軍及民當差者聽千把總俱於附近衛所官內選用其黃平留兵三千仍設一參將領之總聼防播總兵節制一丈田糧環播幅􅊷千里田地無慮數千萬畝舊時額糧止歲以五千八百石輸貴州蓋蠻方賦稅原輕至應龍巧立新法名曰等賨每田一畝徵銀數錢初猶斂其財以招苗後並奪其地以養苖而賦法蕩然盡矣今既改流自當責成道府親率州縣官插定疆界沿丘履畝逐一丈量分為等則造册呈報以定賦法第額糧輕重蜀無定規查克平九絲丈量田地分别上中下三等每畝上田四升中田三升下田二升播地山水間雜不止三等尚有上上下下者宜逐項分析最上者一畝可當上田幾畝最下者幾畝可當下田一畝則待臨時斟定難以預計丈完總計田地若干糧若干徵本色若干折色若干候二年之外起科除足一年夏秋二稅銀力二差一切雜費外餘解布政司充邊餉支用一限田制播土舊民自逆酋倡亂大兵征討之餘僅存十之一二遺棄田地多無主人册籍不存疆界莫考復業之民往往冒認影占原少報多原瘠報肥甚至一人占田一二千畝尚有異省流徒假播籍而希冒占者今應將播之舊民號楊保子者查果真的無論原業肥瘠俱人給田三十畝上中下攙配均給若一處皆上田皆下田者臨時酌給大率純下田不得多過一百畝純上田不得少過二十畝其原非播民凡不能為楊保語者無問曽否寄住皆不得妄認遺下無主民田另行招人承種納糧當差應龍官莊並楊兆龍田一鵬何漢良等諸擒斬過冇名頭人莊田盡數沒官聼三省之民願占籍播州者承種其領地之人查照時值量行上納以充日下建立城池衙門驛傳諸費亦定為限制平人不得過五十畝指揮千百户不得過百畝俱於丈量時定糧定價令不得那移州縣官收過絶産價值給付印契登入循環聽兵備道稽查轉報撫按查考官吏乾沒從重治罪一設學校播故有學宋元之世俊茂朋興如冉從周猶道明白鎮之流俱登進士蜚聲上國自逆龍禁錮文字冦讐儒生坑儒燔書禍同秦始今干戈既戢文教宜先白田黃平舊有學宮補葺亦易應當於二府原學各補教授一員訓導二員至博士弟子員無論附郭外縣但入學使之選者蜀新四縣隸白田學黔新四縣隸黃平學待各縣人文漸盛物力稍紓嗣各立學未晚真州既改為流其地方殷富人物道華亦須建一學宮設一學正以示維新之化敢一復驛站播州各驛自逆酋閉關負固驛官不赴任過客不敢經行站戶逃徒館舍丘墟十數年矣兹者地方底定道路大通驛站之設勢不容已查播州舊轄松墳桐梓播州永安湘川烏江昌田沙溪仁水湄潭溪岑黃白泥一十三驛俱當用貴孔道所有各該驛館應趂時興工合用匠役亦於兵夫內查有慣造者徑撥不足者於附近州縣取用工食銀米計算於該邊支利軍餉內動支仍責成新設府佐一員往來稽督不許虛冒銀糧曠廢時日事完册報又查各驛夫馬支應及官吏俸薪舊額土司供辦今既改土設流似應與腹裹驛站一體僉𣲖但流民授田方始難便買馬行差目前一切站銀暫應官為出辦俟里甲稍定即行編派至於夫馬額數應照衝僻為凖湘川驛附郭為四路最衝應設馬四十匹夫八十名松坎桐梓播州永安四驛地衝路險應各設馬三十匹夫五十名烏江仁水湄潭岑黃鱉溪白泥各驛俱次衝應設馬各二十匹夫各三十名昌田沙溪止通水西次僻應設馬各十匹夫各二十名各驛官見在者行令赴驛任事驛吏因屬土司舊未撥發今應行川貴兩省布政司照缺查撥一建城垣播州一府一州四縣與黃平一府四縣並宜改築石城石少者以代之其兵備道總兵府并府衛州縣衙門公署倉廒庫獄城隍廟演武場與二府一州儒學文廟殿廡齊舍等項俱當以次修舉而各官一抵地方棲身為急衙舍之建尤宜首圖各府州縣正官選委勤明佐二於堪動銀內行支剋期興工多方稽督大約城垣以二十九年二月內起工限年終落成餘各以次備舉就中員役有怠惰冒破工力草率者俱聽該道詳參拏宄事竣之日造册報撫按衙門奏繳庶險要可資防禦有賴一順夷情播州皆夷也大兵之後為賊用力者芟夷藴崇已無遺種今見在者曰各土司官曰七姓奏民曰投降夷目皆宜安插得所顧就中情事不同亦宜分别如八司曰播州直州白泥餘慶草堂黃平重安容山內安撫二長官六又一司甕水原無印信亦稱長官又有宣慰同知羅氏此皆世有官號與播並建者播州長官王積仁以附播被擒獻俘已與枵氏俱滅真州附播多年綦江之破助兵三百顯在耳目同知羅氏與江外五司其疏改流挑怨啓禍致有今日之事海內震動流血千里則諸司乃罪之魁也故説者謂真州宜正其附播之罪江外諸司宜以通釁絶之第王道如天罰宜從輕賞宜從重真州當進兵之初率先歸附正副長官各領千人從軍江外諸司各招兵聚義充黔楚鄉導今將真州正長官即為該州土同知副長官即為州判官江外諸司安撫與正長官即為該縣土縣官副長官即為土主簿同知羅氏為新府土知事以外尚有投降夷目原非長官本無冠帶但賞格外坐名開諭輒爾先事歸誠亦宜少示春酬以明惇信如上赤水里頭目袁年父遭酷禍投降最早即授以所鎮撫職銜下赤水里頭目袁鍪仁懷里頭目王繼先安羅二村頭目羅國名羅國顯安鑾以上五名念其返誠歸正量授冠帶總旗諸人田産止將本身者暫時撥給應納稅糧通附州縣官處上納其餘里人俱令附籍納糧當差不許仍以家人為名恣行強占違者治其前罪至於七姓奏民始助楊氏之亂繼傾楊氏之族尤為禍首今蒙王仁寬宥外如仍蹈故習豪橫害民該道徑行拏問發落地方人等指稱前事告害者亦如之無一正疆域播地東北接連三省縣衛各有疆界容溷淆西南左營水西右逼永寧雖犬牙相攙未能齊一然晝野分疆亦自有相沿界至惟是夷性互為雄長強則侵奪弱則減削甚至有一地而甲乙互臨一人而齊楚兼事如儒溪沙溪水煙天旺皆播州五十四里之數見有黃册可考緝麻山李博埡仁懷石實甕水等處亦皆播州世業祇緣先年楊氏中衰時曾被永寧水西侵占後應龍當事治兵相攻恢復故業各邊目又已任其糧馬兩下支持此在土司可略今既改土設流自宜各復其故乃水西止求清查永寧輒行瀆擾且動以瓜分為言罔上行私垂涎古業應行該道會同鄰近道分及早清查一切相鄰地方原係播者歸播原係永寧水西者歸奢安刻石立碑永為遵守其鄰邊目兵如不安分義妄肆侵爭重行究治干礙王法一并參處余文㷮請速靖水藺疏題為水藺渠魁就戮西南定局已成宜慎剿洗之略以速安攘之效事臣乞身歸省跧伏田間者四年餘日聞彥賊負嵎狂逞而逋寇奢崇明爪牙之先事者苦於虎穴難探每謂餉不足兵不多曠日經歲老師費財氏膏日竭而賊焰日張岌岌乎莫知所終矣幸督撫按臣新授方略道臣劉可訓鎮臣侯良柱以一旅之師破賊十餘萬衆直如拉朽摧枯豈專師武臣之力仰賴皇上威德遐鬯莫不震疊故兩臣身先士卒背水決戰直以忠義之氣勝之耳元凶大殺戮幾盡倘寬脅從之誅西南半壁已可從而底定矣廟謨𢎞逺將欲剿洗以盡殲之柘土開疆此最勝之烈也惟是駭鹿易逐而狡兔多窟土夷烏合實繁有徒嘗見貴州解圍之後賊無堅壘直搗大方當時倘加持重豈至自棄前功懲前毖後必須先事詳計謀出萬全以畢此不常有之奇勳所當慎者一也功名之地人所欲居軍氣方揚易於輕敵而功高取忌則挑釁養寇逗遛以自圖者又未必無之嘗見三路進兵期會牽制剿撫異見庚癸爭呼幾同聚訟若非賊寇門庭道鎮獨當一面誰為出奇制勝故必協力同心呼吸相應將伯必可助豫困人不妨成事前矛後徑殺賊招降總屬廓清勿致見分爾我築舍道旁失此不再得之機會可當慎者二也水外膏脥已無難收入版籍進之深林密箐陵谷險阻攻取為難城守不易嘗見遵義郡縣其地近者三十年則壤所賦幾何有無補於公家而城郭宫室官僚守衛之費先已不資安在廣地之不荒而逹略之足勤也鬼方僻壤力爭諸原得將安用當先有控馭成晝以厝置之勿徒疲腹裹以事荒服而竟委此血戰之功於草莾所當慎者三也西南用兵九年兵戈所駐荆棘生焉諸所經過室疲荒廢萬龜寒煙蕭條滿目今幸大捷正哀鴻集澤之日矣兵貴拙速不尚巧遲速則乘機巧則生變况亡酋傷夷之餘躡以大軍有何堅陳即當尅期蕩平蘇此轉輸之孑遺勿使遺孽復安又生多事倘或尚須斟酌亦當蚤為請命罪在可原者待以不死使知雷霆自擊天地自寬戰勝之師寧戢而不騁以安反側前之徑敵功在攻克後之窮寇功又在收服勿但貪功妄殺零碎報捷致時可削平仍賣劍買犢之無期窮兵黷武自焚可虞干羽兩階豈曰虛語耶楚蜀滇黔每嵗百萬之金錢不至長付之逝波也慎以相機速以結局安危難易晷刻是爭審時度勢西南安攘之急著似不出此倪斯蕙保蜀援黔疏為蜀局將結黔事再壞勢必借蜀援黔究且因黔憊蜀情自切於同室計必畫於萬全敬抒一得以佐末議以保西南半壁事蓋今中外知邊事之為急不知黔事之為急也知黔事不知黔事即為蜀事也惟借蜀而後可以援黔惟保黔而後可以安蜀黔一日未得了局蜀一日未得息肩是黔蜀竟相終始天下安危實繫於此臣蜀人也生長重慶奢酋之變酷罹其禍三疏呌閽報變善後詣餉詳具列款荷蒙聖恩俞允下部議覆多所採擇謂宜數月之間即可蕩平不虞淹至四年師益老財益匱人心益惴惴不安而黔師又報潰矣臣自己酉得請假養親比今十七年矣辛酉二月蒙恩起補原官尋值奢酋之變本省按臣題臣蒙難不屈伏荷聖旨憫臣家難奉部檄催臣上任屬臣父驚悸成病出城四閲月物故至去冬十月始服闋會黔中又以敗聞臣在梓里聞見最真恨不插翼飛入春明一為皇上紓此西顧憂行至河南地方偶感風寒延淇縣醫李尚文調治尚無起色萬一臣疾未瘳溘焉朝露則臣之一念杞憂藿謀終未得盡吐於皇上也因不避愚賤敢再披瀝蓋自奢酋煽亂全蜀震動仰仗皇上威靈督撫按道諸臣相機戰守設奇制勝亦既解成都復重慶收四十七郡縣恢復永寧掃蕩藺州纍纍獻俘闕廷挈玉壘金躔之舊還之陛下蜀事儘已了局蜀人從此安枕謂宜乘勝席捲一掃欃槍乃奢酋高魚遊於釡底安賊猶虎峙於牂牁芒部鎮雄諸夷且欲窺漁利於􅛔蚌奢借安為負嵎安以奢為奇貨紐合一團結成三窟我師進則彼故退以誘我之入我師退則彼故進以躡我之後我師不進不退故彼兩持觀望以老我之師彼為其主我為其客彼以逸待勞我以勞就逸彼合一心以禦我我分兩省以禦彼况岩洞箐林既難長驅直搗而重趼不毛千里餽餉又三十鍾不能致一石荷戈者難於枵腹當事者勇於成功往往輒墮賊計自取衄亡以朝廷數百萬金錢全省數百萬民命止供衆兵一走非葬魚腹則填虎口令賈生在當何如痛哭流涕焉臣竊謂此一事也變之方起似難而或易及事之既久似易而實難蓋彼時賊勢方張人心奮勇切不共戴天之仇有封狠居胥之意恨不賈勇登先滅此朝食如人之初病六脈俱沈疾勢正劇人亟急於求醫術士療治恐後比今病已休囚人臥牀簀人子之心已竭醫家之術漸窮雖有俞跗倉公其將何以措手耶且蜀自奢酋之後大半消耗氣息奄奄旁有臥病呻吟者不忍坐視復欲䇿杖羸力疾往救人未救而我益病此兩斃之道也在蜀以援黔而兼計賊在黔以殲水而兼驅藺必欲救黔當先固蜀必欲固蜀當重為黔計昔我太祖髙皇帝之征東川敕諭傳友德曰東川芒部水西諸夷聚黟無事則互爭有事則相援昔閻羅鳯亡居大理唐兵追捕道出夷地聚集凶醜偶以不備喪師又曰夷地險峻崎嶇大將一至竄入林藪猝難捕獲宜駐兵屯種待以歲月而後可圖煌煌王言非蜀事之明鑑哉今內帑既不敢頻請民間又不能再派惟有太祖屯種之法在然事無專責終屬築舍或特屬一道專管屯田而地方逺闊難以逐一履畝各府原設有軍屯同知應擇任廉能二員畫地而田計畝而耕土民降夷一體分授庶無事則守有事則戰久之屯農漸慣習戰則防兵亦可漸撤趙充國之困先零計不越此則屯田之設不可不講也又考太祖皇帝征建昌也藍玉奏四川地曠山險控扼西番蠻夷梗化欲多置軍衛籍民為軍上曰連年供輸煩擾兵久在外不宜重勞但養鋭蓄威徐議後舉夫以太祖之神武國初之物力傅藍諸將之驍傑猶斤斤其慎如此兵法百里而趨利者蹶上將今日之事豈宜輕試深入再蹈覆轍哉只宜行間諸苗以攜其黨厚積戎餉以待其困多方綢繆以固其圉如太祖所謂徐議後舉者是也况敗師之後神氣便難猝振大兵便難驟集必須需以日月待以鎮靜發以沈毅而後萬舉萬當一戰即捷則進兵不可不慎也漢臣諸葛亮初平蜀南曰若留外人則當留兵兵留則無所食一不易也蠻初傷破父兄死喪留外人而無兵則必貽患二不易也蠻屢有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運餉而綱紀粗安有味乎漢臣之言其今日平蜀之第一義乎業已復永寧收藺州則此一塊土作何防守作何安插則區畫不可不周也昔播事之初七姓交攻有內叛而無外援今水藺之變各夷紏結有外援而無內叛計非設間懸賞便難遽得要領督臣苦心區畫數年於此其有成效賞信罰必惟在朝廷益申飭之諸土司有能擒安奢二酋以獻者即以其土地與之若中懷觀望尚持兩可有罪無赦則賞罰不可不信也蜀兵所稱慓悍勍卒惟南岸白桿子耳乃南岸之兵原不滿萬今日招去而逃明日逃回而招總之此兵往還道路希冒餉甚之遊手亡命之徒手不能挽弓身不能擐甲虛冒南岸補充兵數每見管兵之官經過渝城臨時招募或雇倩應點隨即散去見賊而逃者皆此輩也則兵之真偽數之虛實不可不核也孫吳將兵即婦人宫嬪皆可為戰如依臣曩疏責成有司處處團練鄉兵人可為兵家可為壘比今四年久即未必能摧鋒陷陳亦可扼要守陴乃一聞報警遂招募兵既挾驕蹇以邀重餉又恣咆哮以噬道路地方豈乏兵特訓之無人練之無法以故往往仰給於土司耳如敘州瀘合遵桐綦江各官設兵防守誠申飭鄉兵即以此為有司殿最不惟可以防奢酋之逸亦可以折驕兵之氣而壯地方之膽則鄉兵不可不練也臣尤有請者往郎銓部時其時河工正亟地方官員皆注停推升至今猶記之昔官重久任謂不宜以迎送頻頻擾纍百姓况今殘破之後坐未暖席事無成績又以他徙去接管不一推諉易生何以專責成而奏成功乎謂宜倣昔年治河例一切俱停推升只待平蠻後按功升擢破以常調即開府京堂亦不愛焉庶事有責成官無卸擔而何難殱此蠻髏則久任之責不可不議也此內外諸臣或言之已悉豈敢再𠞰陳言輒瀆天聽惟是傷弓之鳥計切維桑乃鳴不擇音之時也顧方伏枕旅次日理藥裹若待臣入奏痊可無期故敢輒為臚列如以臣言不謬伏惟聖明俞允下部採擇施行地方幸甚奉聖旨黔師再挫協剿宜亟但兵弱餉乏委難輕進地方官有能屯種養鋭設間懸賞團練鄉兵俟事平之後一體超擢以後但係黔蜀賢能官員任滿都著加銜管事不得含糊升遷該部知道傳唐盧藏用陳子昂别傳陳子昂字伯玉梓州射洪縣人也本居穎川四世祖方慶得墨翟祕書隱於武東山子孫家焉世為豪族父元敬瑰偉倜儻年二十以豪俠聞屬鄉人阻飢一朝散萬鍾之粟而不求報於是逺近歸之若龜魚之赴淵也以明經擢第受文林郎因究覽墳籍居家園以求其志餌地骨鋉雲膏四十餘年嗣子子昂奇傑過人姿壯嶽立始以豪子馳俠使氣至年十七八未知書嘗從博徒入鄉學慨然立志因謝絶門客專精墳典數年之間經史百家罔不該覽尤善屬文雅有相如子雲風骨初為詩幽入王適見而驚曰此子必為文宗矣年二十一始東入咸京遊太學歷抵羣公都邑靡然屬目矣由是為遠近所稱藉甚以進士對策高第屬唐高宗太帝崩於洛陽宫靈駕將西歸子昂乃獻書闕下時皇上以太后居攝覽其書而壯之召見問狀子昂貌寢寡援然言王霸大略君臣之際甚慷慨焉上壯其言而未深知也乃敕曰梓州人陳子昂地籍英靈文稱偉曄拜麟臺正字時洛中傳寫其書市肆閭巷吟諷相屬乃至轉相貨鬻飛馳逺邇秩滿隨常牒補右衛曹上數召問政事言多切直書奏輒罷之以繼母憂解官服閉拜右拾遺子昂晚受黃老言尢耽味易象往往精詣在職默然不樂私有挂冠之言屬契丹據營州建安郡王攸宜親總戎律毫閣英妙皆置在軍麾時敕子昂參謀帷幕軍次漁陽前軍王孝傑等相次陷沒三軍震懾子昂進諌曰主上應天順人百蠻向化大王以元老懿親威略邁世受律廟堂精甲百萬傾天下以事一隅此猶舉泰山而壓卵建瓴破竹之勢也然而張元遇王孝傑等不謹師律由此長敵威而殆戰士夫敵威長則難以爭鋒戰士殆則無以制變今敗軍之後天下側耳草野傾聽國成今大王沖謙退讓法制不申每事同前何以統衆前如兒戲後如兒戲豈徒為敵所輕亦生天下姦雄之心聖人威制六合故用聲爾非能家至户到然後可服况兵貴先聲今發半天下兵以屬王安危成敗在百日之內何可輕以為尋常大王若聽愚計即可行若不聽必無功矣須成功報國豈可送身誤國耶伏乞審聽請盡至忠之言凡事須先量智愚衆寡勇怯強弱部校將帥之勢然後可以合戰求利以長攻短令皆向前不量力又不簡練暗驅烏合敗後怯兵何由取勝僕一愚夫猶言不可况姦賊勝氣十倍未可當也且統衆禦姦須有法制親信若單獨一身則朱亥金鎚有竊發之勢不可不畏人有負琬琰之寶行於途必被劫賊何者為寶重人愛之今大王位重又總半天下兵豈直琬琰而已天下利器不可失一失則後有聖智之力難為功也故願大王於此決䇿非小讓兒戲可了若此不用忠言則至時機已失機與時一失不可再得願大王熟察大王誠能聽愚計乞分麾下萬人以為前驅則王之功可立也建安方求鬬士以子昂素是書生謝而不納子昂體弱多疾感激忠義常欲奮身以答國士自以官在近侍又參預軍謀不可見危而惜身苟容他日又進諫言甚切至建安謝絶之乃署以軍曹子昂知不合因拑然下列但兼掌書記而已因登薊北樓感昔樂生燕昭之事賦詩數首乃泫然涕而歌曰前不見古人後不見來者念天地之悠悠獨愴然而涕下時人不知也及軍罷以父老表乞罷職歸侍天子優之聽帶官取給而歸遂於射洪西山搆茅宇數十間種樹採藥以為養憾國史兼雜乃自漢孝武之後以迄於唐為後史紀綱紀綱粗立筆削未終鍾文林府君憂其書中廢子昂性至孝哀號柴毁氣息不逮屬本縣令段簡貪暴殘忍聞其家有財乃附會文法將欲害之子昂慌懼家人納錢二十萬而簡意未巳數輿曳就吏子昂素羸疾又哀毁杕不能起外迫苛政自度氣力恐其不全因命蓍自筮卦成仰而號曰天命不祐吾其死矣於是遂絶年四十二子昂有天下大名而不以矜人剛果強毅而未嘗忤物好施輕財而不求報性不飲酒至於契情會理兀然而醉工為文而不好作其立言措意在王霸大略而已時人不之知也尤重交友之分意氣一合雖白刃不可奪也友人趙真固鳳閣舍人陸餘慶殿中侍御史王無競亳州長史房融右史崔泰之處士太原郭龑徵道人史懷一皆篤嵗寒之交與藏用遊最久飽於其論故其事可得而述也其文章散落多得之於人口今所存者十卷嘗著江上人文論將磅礴機化而與造物者遊遭家難亡之荆州倉曹槐里馬擇曰擇昔從父友王適獲陳君欣然忘我幼齡矣榆關之役君籌其謀戎安纍年不接晤語聖厯初君歸寧舊山有挂冠之志豫懷役南遊遘兹歡甚幽林清泉醉歌絃詠周覽所計倐遍岷峨豫旋未幾陳君將化悲夫言絶道冥杳然若喪之幾延陵心許而彼已亡天喪斯文我憾何及君故人范陽盧藏用集其遺文為序傳議稱其實録嗚呼陳君為不亡矣遂為贊曰岷山導江四薄萬里浩瀭鴻溶東注滄海靈光氤氲上薄紫雲瑰寶所育則生異人於戲才可兼濟屈而不仲行通神明困於庸塵子曰道之將喪也命矣夫宋司馬光范鎮傳范景仁名鎮益州華陽人也少舉進士善文賦場屋師之為人和易修敕參知政事薛簡肅公端明殿學士宋景文公皆器重之補國子監生及貢奏院名皆第一故事殿廷唱第過三人則為奏名之首者必執聲自陳以祈恩雖考校在下天子必擢置上列以吳春卿歐陽永叔之耿介猶不免從衆景仁獨不然左右與並立者履趣之使自陳景仁不應至七十九人始唱名及之景仁出拜退就列訖無一言衆皆服其安恬自是始以自陳為恥舊風遂絶釋褐新安主簿到官數旬時宋宣獻公留守西京不欲使與下吏共勞辱召置國子監使教諸生秩滿又薦於朝為東監直講未幾宋景文公奏同修唐書及用參知政事王公薦召試學士院詩用彩霓字學士以沈約郊居賦雌霓連蜷讀霓為入聲謂景仁為失韻由是除館閣校勘殊不知約賦惟取聲律便美言霓不可讀為平聲也當時有學者皆為景仁憤節而景仁處之晏然不自辨為校勘四年乃遷檢理丞相龎公薦景仁有美才不汲汲於進取詔除直祕閣未幾除起居舍人知誎院仁宗性寬仁言事者競為徼訐以求名或緣愛憎汚人以帷箔不可明言之事景仁獨引大體自非關朝廷安危繫生民利病皆閣略不言陳恭公為相嬖妾張氏笞殺婢御史劾奏欲去之不能得乃誣之云私其女景仁上言朝廷設臺諌官使之除讒慝也審如御史所言則執中可斬如其不然御史亦可斬御史怒甚劾景仁以為阿附宰相景仁不顧力為辨其不然深救當時之弊誠者韙之仁宗即位三十五年未有繼嗣嘉祐初暴得疾旬日不知人中外大小之臣無不寒心而畏避嫌疑相倚伏莫敢發言景仁獨奮曰天下事尚有大於此者乎捨此不言顧惟抉摘細微以塞職是真負國吾不忍也即上言太祖捨其子而立太宗周王既薨真宗宗室子養之宫中陛下宜為宗廟社稷計早擇宗室賢者優其禮數試之以政與圖天下之事以繫天下人心章纍上寢不報景仁因闔門家居自求誅譴執政或諭以奈何效干名希進之人景仁上執政書言繼嗣不定將有急兵鎮義當死朝廷之刑不可死亂兵之下乃鎮擇死之時尚何暇顧干名希進之嫌而不為去就之決哉又奏稱臣竊觀大臣之意恐行之而事有變故畏避而為容身之計也萬一兵起大臣家中族首領顧不可保其為身計亦已疏矣就使事有中變而死陛下之職與其死於亂兵不猶愈乎乞陛下以臣此章示大臣使其自擇死所聞者為股栗尋除兼侍御史知雜事景仁因辭不辦乞解言職就散地執政復諭以上之不豫諸大臣亦嘗建此䇿今姦言已入為之甚難景仁復上執政書云但當論事之是非不當問其難易況事早則濟緩則不及此聖賢所以貴機會也諸公謂今日難於前日安知他日不難於今日乎謂今日姦言已入不可弭他日可弭乎凡見上面七有七朝廷不能奪乃罷諫職改集賢殿修撰頃之升知制誥遷翰林學士英宗即位中書奏諸追尊濮安懿王事下兩制議以為宜稱皇伯髙官大國極其尊榮大忤執政意更下尚書省集百官議之意朝士必有迎合者既而臺諫爭上言為人後者為之子不得顧私親今陛下既為仁宗後若復追尊濮王是二統也殆非所以報仁宗之威德衆論鼎沸執政欲緩其事乃下詔罷百官集議曰當令禮官檢詳典禮以聞景仁判太常寺即具列為人後之禮及漢魏以來論議得失悉奏之與兩制臺諫議合執政怒召景仁詰責之曰詔書曰當令檢詳奈何遽列上耶景仁曰有司得詔書不敢稽留即以聞乃其職也奈何更以為罪乎會宰相遷官景仁當革制坐失於考按不合故事加侍讀學士出知陳州今上即位復召還翰林王介甫參知政事置三司條例司變更祖宗法令専以聚斂為務斥逐忠直引進姦佞景仁上疏極言其不可朝廷不報景仁時年六十三因上言即不用臣言臣無顔復居位食祿願聽臣致仕章纍上語益切直介甫大怒自草制書極口醜詆以本官戶部侍郎致仕凡所應得恩例悉不之與於是當時在位者皆自愧景仁名益重于天下介甫雖詆之深人更以為榮焉景仁既退居有園第在京師專以讀書賦詩自娛客至無貴賤皆野服見不復謝故人或為具召之雖權貴不拒也不召則不往見之或時乘興出遊則無逺近皆往嘗乘籃輿歸蜀與親舊樂飲賑施其貧者周覽江上窮其勝賞期年然後返年益老而視聽聰明支體尤堅強嗚呼鄉使景仁枉道希世以得富貴蒙屈辱任憂患豈有今日之樂耶則景仁所失甚少所得殊多矣詩云愷悌君子神所勞矣又曰樂只君子遐不睂夀景仁有焉客有問今世之勇於迂叟者叟曰有范景仁其為勇人莫之敵客曰景仁長僅五尺循循如不勝衣奚其勇叟曰何哉而所謂勇者而以瞋目裂眥髮上指冠力曳九牛氣陵三軍者為勇乎是特匹夫之勇耳勇於外者也若景仁勇於內者也自唐宣宗以來不欲聞人言立嗣萬一有言之者輒切齒疾之與倍畔無異而景仁獨唱言之十餘章不止視身與宗族如鴻毛後人見景仁無恙而繼為之者則有矣然景仁者冒不測之淵無勇者能之乎人之情孰不謂天子與執政親愛之至隆者孰若父子執政欲尊天子之父而景仁引古義以爭之無勇者能之乎祿與位皆人所貪我老且病前無可冀猶戀戀不忍捨去況景仁身已通顯有聲望視公相無跬步之逺以言不行年六十三即拂衣歸終日不復起無勇者能之乎凡人有所不能而人或能之無不服焉如吕獻可之先見范景仁之勇決皆余所不及也余心誠服之故作范景仁傳蘇轍巢谷傳巢谷字元修父中世眉山農家也少從士大夫讀書老為里校師幼傳父學雖朴而博舉進士京師見舉武藝者心好之谷素多力遂棄其舊學畜弓箭習騎射久之業成而不中第聞西邊多驍勇騎射擊刺為四方冠去遊恭鳯涇原間所至交其秀傑有韓存寶者尢與之善谷教之兵書二人相與為金石交熙寧中存寶為河州將有功號熙河名將朝廷稍奇之會瀘州蠻乞弟擾邊諸郡不能制乃命存寶出兵討之存寶不習蠻事邀谷至軍中問焉及存寶得罪就逮自料必死謂谷曰我涇原武夫死非所惜顧妻子不免寒飢橐中有銀數百兩非君莫可使遺之者谷許諾即變姓名懷銀步行往授其子人無知者存寶死谷逃避江淮間會赦乃出豫以鄉閭故幼而識之知其志節緩急可濟者也豫之在朝谷浮沈里中未嘗一見紹聖初豫以罪謫居筠州自筠徙雷徙循豫兄子瞻亦自惠再徙昌化士大夫皆諱與豫兄弟遊平生親友無復相聞者谷獨慨然自眉山誦言欲徒步訪吾兄弟聞者皆笑其狂元符二年春月自梅州遺子書曰我萬里步行見公不自意全今至梅矣不旬日必見死不恨矣豫驚喜曰此非今世人古之人也既見握手相泣已而道平生逾月不厭時谷年七十有三矣瘦瘠多病非復昔日元修也將復見子瞻於南海豫愍其老且病止之曰君意則善然自此至儋數千里復當渡海非老人事也谷曰我自視未即死也公無止我留之不可閲其橐中無數千錢子方乏困亦強資遺之船行至新會有蠻𨽻竊其橐裝以逃獲於新州谷從之至新遂病死豫聞哭之失聲恨其不用吾言然亦奇其不用吾言而行其志也昔趙襄子厄於晉陽知伯率韓魏決水圍之城不沒者三板縣釜而釁易子而食羣臣皆懈惟高恭不失人臣之禮及襄子用張孟談計三家之圉解行賞郡臣以恭為先談曰晉陽之難惟恭無功曷為先之襄子曰晉陽之難羣臣皆懈惟恭不失人臣之禮吾是以先之谷於朋友之義實無愧高恭者惜其不遇襄子而前遇存寶後遇豫兄弟豫方雜居南夷與之起居出入蓋將老焉雖知其賢尚可以發之聞谷有子蒙在涇原軍中故為作傳異日以授之谷始名榖及見之循州改名谷云元趙汸黃澤世家先生諱澤字楚望其先長安人唐末有官於蜀者知資州內江縣曰舒藝卒葬資州次子師明留居後遂為資州人先生生有異質日誦數千言年十二三即通經義論䇿之學內附國朝年十六矣慨然以明經學古篤志力行自勵好為苦思屢以成疾疾止則復苦思如故年二十餘始旁通古今史志别集詩文皆不習而能詩尤超邁清美久之於周程張朱之書有得作顔淵仰高鑽堅論以自勉是時行省巨公猶有尊賢敬學者屢以書院山長之祿起先生教授江之景星洪之東湖考滿即歸閉門授徒以為養悉取六經百氏傳注疑義千餘條離析辨難以致其思不復言仕矣始先生嘗夢見夫子以為適然既而屢夢見之最後乃夢夫子親授所授六經字畫如新其家無一畝之殖而決意歸休以六經絶學為己任蓋深有所感發也時大德甲辰先生年四十五矣自是以來十餘年間屢悟聖經隱賾之義凡數十處而失傳之旨以漸可通乃作思古吟十章極言聖人德容之盛上逹於文王周公以致其寤寐不忘之意先生卒於至正六年丙戌某月某日得年八十有七以郡人王儀甫所歸棺斂九江學者蓋少先生又深自韜晦不求聞知唯待人接物則無貴賤長幼一致其誠故死之日遠近聞者莫不哀之先生於經學以積思自悟為主以自然的當不可移易為則故其悟也或得諸幽間寂寞之餘或得諸顛沛流離之頃或得諸疾病無聊之口或得諸道途風雨之中及其久也則豁然無不貫通自天地定位人物未生以前等而下之凡邃古之初萬物之原載籍所不能具者皆昭若發蒙如視諸掌然後由伏羲神農五帝三王以及春秋之末其人倫之端禮樂之本皇道帝德神化宜民之妙井田區畫之初封建自然之勢鬼神祭祀之始神物前民之用起數立象之機聲教文治之原制作因革之漸忠質文異尚之體世變禮失之由以力假仁之習皆若身在其間而目擊其事者於是易春秋傳注之釋詩書未決之疑周禮非聖人書之謗凡歷代聚訟不決數十年苦思而未通者皆冰解霧釋昭然各就條理蓋由專精積久而後得之自以為天開其愚神啓其祕也其於易以明象為先惟因孔子之言上求文王周公之意為主而其機括則盡在十翼故作十翼舉要以為易起於象因數設卦因卦立象因象起意因意生辭故孔子曰易者象也居則觀其象而玩其辭易不可廢象明矣由象學失傳漢儒掇拾凡陋不得聖人之意王輔嗣忘象之説興至邢和叔則遂欲忘卦棄畫雖以近代巨儒繼作理學大明而莫能奪也作忘象辨有一卦之象有一爻之象或近取諸身或遠取諸物或以六爻相推或以隂陽消長而為象者學者猶可求也然有象外之象則非思慮意識所能及矣而况於立例以求之乎李鼎祚綴輯於王氏棄擲之餘朱子發後出而加密丁易東繼之而愈詳聖人立象之妙終不可見作象略象學既明則因象以得意因意以得辭隂陽消長有一定之機上下貴賤有一定之分善惡吉凶有一定之則位之當者孔子無由獨言其非卦與爻之小者文王周公固不謂之大然後知三聖人之易一而已矣若舍象而求則人自為易不期於異而自異作辨同論嘗曰易有八卦有六十四卦有三百八十四爻有大象有小象有大傳繫辭有説卦有序卦有雜卦有河圖洛書蓍䇿之數學者當隨處用工各詣其極至一以貫之而後全易見矣其於春秋以事實為先以通書法為主其大要在考核三傳以來向上之工而其脈絡則盡在左傳作三傳義例考以為春秋有魯史書法有聖人書法而近代乃有夏時冠周月之説是史法與聖法俱失也作元年春王正月辨又以為説春秋有實義有虛辭不舍史以論事不離傳以求經不純以褒貶泥聖人酌時宜以取中此實義也貴王賤霸尊君卑臣皆古今通義然人自為學家自為書而春秋迄無定論故一切斷以虛辭作筆削本旨又作諸侯取女立子通考魯隱公不書即位義殷周諸侯禘祫考周廟太廟單祭合食説作丘甲辨凡如是者十餘通以明古今禮俗不同見虛辭説經之無益嘗曰説春秋須先識聖人氣象識得聖人氣象則一切刻削煩碎之説自然退聽矣其但以為實録而已者則春秋乃一直史可修亦未為知聖人也其説易有常變春秋有經有權易雖萬變而必復於常春秋雖用權而不遠於經各以二義貫一經之旨常曰易象與春秋書法廢失之由大略相似茍通其一則可觸機而悟矣蓋古者占筮之書即卦爻取物類象懸虛其義以斷吉凶皆自然之理乃上古聖神之所為也文王周公作易時取一二立辭以明教自九策之法亡凡策人所掌者皆不可復見而象義隱微遂為歷世不通之學矣魯史記事之法寶有周公遺制與他國不同觀韓宣子之言可見聖人因魯史修春秋筆則筆削則削遊夏不能贊一辭則必有與史法大異者然曰其文則史是經固不出於史也今魯史舊文亦不可復見故子朱子以為不知孰為聖人所筆孰為聖人所削而春秋書法亦為歷世不通之義也先生所謂廢失之由有相似者蓋如此又懼夫學者得以創聞不復致思故所著書目雖多皆引而不發乃作易學濫觴春秋指要經旨舉略稽古管見示人以為求端用力之方而易春秋全解則終身未嘗脫稿示人也其辨釋諸經要旨則有六經補注詆百家異義則取杜牧之不當言而言之意作翼經罪言其論周禮以為六官所掌皆循唐虞夏商已行之事雖有因革損益或加詳密而大體不能相遠非周公創為之制也古今風俗事體不同若不深考世變而輒指其一二古遠可疑者以為非聖人之書此不難辨獨其封國之制與孟子不合則所當論蓋孟子所言因殷之制周官周家之制也計武王之興殷諸侯尚千有餘國既無功益地亦無罪削邑此當仍其舊封百里之下為三等如孟子之説乃若周公太公有大勳勞及其餘功臣當封爵與夫並建宗親以為藩屏豈可限以百里之法哉自當用周制耳諸侯惡其害已而去其籍是書當世學者鮮得見之則周家一代之制雖孟子亦有不能詳也其於官屬多寡之由職掌交互之故錯亂之説發義尤精其祭祀之法則兼戴記而考之作二禮祭祀述略禮經復古正言其辨王肅混郊丘廢五天帝併崑崙神州為一祭之説曰祭法虞夏殷周皆以禘郊祖宗為四重祭周人禘嚳而郊稷祖文王而宗武王禘祭天地以嚳配即圜丘方澤是也郊祀上帝以后稷配建寅之月南郊祀感生帝以祈穀也四時祭五天帝於四郊以迎氣也祖帝嚳以后稷配尊始祖之所自出也宗祀文王於明堂以配上帝總配五天帝也其後則祖文王於明堂以配五帝宗五王於明堂以配五神凡此皆鄭氏義也故周禮大司樂注以圜丘方澤宗廟為三禘蓋天神地祇并始祖之所自出為三大祭皆五年之禘也郊次圜丘社次方澤宗次祖皆常嵗所舉之祭也東遷土蹙財匱大禮遂廢所修唯郊社二祭故圜丘方澤二禘傳諸記亦罕言之非淺聞所及矣周禮有祀天旅上帝祀地旅四望之文天地主於一故稱祀上帝四望非一神故稱旅肅欲以圜丘為郊可乎司服王祀吳天上帝服大裘而冕祀五帝亦如之既曰亦如之則五帝之祀與昊天上帝非一祭矣肅欲混之可乎孝經稱嚴父配天又稱郊祀后稷以配天宗祀文王於明堂以配上帝易豫卦曰先王以作樂崇德殷薦之上帝以配祖考上帝亦天神也肅欲廢五天帝而以五人帝當之可乎崑崙者地之頂神州者地之中皆天地之所交也地示主崑崙神州非是設此二祭乃求神於二處天地神靈莫測不知神之在彼乎在此乎故求之於彼亦求之於此也康成以方澤主崑崙北郊主神州北郊不見於經誤分為二王氏由此并崑崙神州為一祭而遂謂北郊為方澤可乎若鄭氏知樂九變之祭為禘而不言及嚳又以為禘小於祫此則其失也故斷之曰鄭氏深而未完王肅明而實淺晉武帝肅外孫也故用其説并方圜二丘而祀南郊歷代無所因襲而周禮天神地示人鬼極盛之祭遂為古今不決之疑矣其辨感生帝之説曰薑嫄履帝武敏歆而生后稷周人特為立廟而祭謂之閟宫君子以為聖人之生異於常人無異義也况乎生民之初氣化之始五天之精感而為帝王之祖亦何疑乎五帝感生之祀上世流傳既久非緯書創為之説也且河圉洛書蓍䇿之數皆緯文也其可盡廢乎其辨胡仁仲以社為祭地曰二社以享水上穀之神而配以勾龍稷非祭地也禮天子諸侯羣姓百姓大夫及庶民皆立社故有王社侯社大社國社置社之名其名義高下不同如此而謂之大示之祭可乎殷革夏周革殷皆屋其社是辱之也罕乾水溢則變置社稷是責之也王者父事天母事地顧可責可辱乎周禮王祭社稷五祀則希冕一社稷下同五祀而用第五等之服不得與先生先公四望山川比則社非祭地明矣傳曰戴皇天履后土是后土即地也周禮大祝大封先告后土大師旅大會同宜於社又建國先告后土則后土非社矣舜典類于上帝禋于六宗望于山川六宗者上下四方之神即五天帝及地也故其祀在上帝之次山川之前周禮四望與五帝同兆于郊又與祀地同玉又與山川同祭服則四望者祀地之四方也又有分樂所祭五土之示祭地之禮不止於方澤矣而欲以社當之可乎周禮以圜丘對方澤以天神對地示以蒼璧禮天對黃琮禮地以祀天旅上帝對祀地旅四望書及禮記乃多以郊對社蓋郊社祀上帝社祭水土之神其禮專圜丘方澤遍祭天神地示其意廣遠分為四祀明矣天地之道高深幽逺犬神大示不可煩瀆故嵗事祈之於郊而水土之變則責之於社此古人立祀深意也胡氏家學不信周禮故率意立説如此大抵先生之意以為聖人制禮逺近親疏高下貴賤皆有自然之序必通其本原而後禮意可得蓋圜丘所祭者全體圓轉之天總南北極黃赤道日月星辰所麗者而言故主北辰而曰天神皆降是總祀天神也上帝者髙髙在上之天以其在上而為主宰故曰上帝分主五方故曰五帝合上下四方而言則曰六宗皆天神之分配者也方澤所祭者全體承天之地總山陵川澤極天所覆者而言故主崑崙而曰地示皆出是總祀地示也地有四方望其方而祀曰四望五嶽四瀆之祀曰山川川澤山陵丘林墳衍原隰之祀曰五土水土之祀曰社皆地示之分祀者也所謂自然之序蓋如此其辨趙伯循王者禘其始祖之所自出之帝於始祖之廟以始祖配之而不及羣廟之主曰大傳王者禘其始祖之所自出以其祖配之諸侯及其太祖大夫士有事省於君干祫及其髙祖此以禘與祫對言則禘祫皆合祭通上下文言之也蓋諸侯之祫猶天子之禘諸侯及其太祖大夫士及其高祖是有廟無廟之主皆在而又上及其太祖髙祖故謂之祫天子則於七廟及桃廟之上更及所自出之帝故謂之禘也若曰禘其祖之所自出而反不及有廟無廟之主寂寥簡短非人情矣故程子曰天子曰禘諸侯曰祫其禮皆合祭也爾雅禘大祭也非大合昭穆何以謂之大祭乎字書訓釋曰禘者諦也審諦昭穆也若非合祭何以有昭穆乎蓋后稷有廟郊既配帝嚳雖配天而無廟不可闕人鬼之享故五年一禘則后稷率有廟無廟之主以共享於嚳所以使子孫皆得見其祖又以世次久遠見始祖之功德為尤盛也况后稷之廟毁廟數十世之主皆藏焉豈可當享嚳之時而屏置之乎蓋禘祫所以相亂者由天子諸侯之制不明先儒或推天子之禮以説諸侯或推諸侯之禮以説天子不知諸侯之禮有祫無禘天子之禘禮必兼祫雖其意不主合食而率子孫以共尊一帝自然當合食矣禮曰天子犆礿祫禘祫嘗祫蒸則是天子祫祭隨時皆用也其辨成王賜魯天子禮樂曰周公相成王制禮作樂為天子諸侯不易之大法身沒而王與伯禽躬為非禮而享周公成王賢王魯公賢君必不至是以魯頌白牡騂剛推之則記禮者之過也禘者殷諸侯之盛祭周公定為不王不禘之法故以禴代之成王以周公有大勳勞於王室故命魯以殷諸侯之盛禮祀周公以示不臣周公之意故牲用白牡白牡者殷牲也騂剛者魯公之牲也又可見魯公以下皆合食於太廟而禮秩初未嘗敢同於周公又以春秋推之則亦非常嵗之祀成王斟酌禮意蓋如此而非有祭文王為所自出之禮如或者之云也其禘於羣公之廟則後世始僣之然晉亦有禘蓋文公有勳勞於王室欲效魯禘祭而請於天子故得用之也若夫東周諸侯為所自出之王立廟稱周廟如魯與鄭是也然止謂之周廟不敢以祖廟稱之諸侯不敢祖天子也然則子孫亦不敢享於廟單祭所自出而已祭用生者之祿則亦用諸侯之禮而已若魯既得禘於周公之廟則周廟亦應用神禘必有配則固宜於文王廟以周公配也若據趙氏則魯本無文王廟止於周公廟祭文王臨期立文王主與尸而祭之此於禮意實不相似若以為有文王廟則是於文王廟迎尸以入周公廟以父就子以尊就卑必不然也魯之郊大雩則平王之世惠公請之是矣然郊祀蒼帝行三望雖僭而猶未敢盡同於王室也蓋以魯有天子禮樂為成王賜者本明堂位祭統以為惠公所請者出呂氏春秋魯鄭周廟晉有禘祀見左傳先生以經證經而折衷百氏之説多如此其辨説詩之失以為古者重聲教故采詩以觀所被之淺深然今三百篇有出於大師所采者周南召南是也有録於史官而非大師所采者幽風及周大夫所作是也其餘諸國風多是東遷以後之作率皆諸國史官所自記録方周之盛美刺不興漢廣江沱諸詩雖足見諸侯之美而風化之原實繫於周其後天子不能統一諸侯善惡皆無與於周故不論美刺皆謂之變風以其不繫於二南而各自為風也周禮王巡守則太史太師同車又其官屬所掌皆有世繫之説方采詩之時太師掌其事而太史録其時世及巡守禮廢太師不復采詩而後諸國之詩皆其國史所自記録以考見風俗盛衰政治得失若左傳於髙克之事則曰鄭人為之賦清人莊薑之事則曰衛人為之賦碩人必有所據矣故大序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠性情以諷其上逹於事變而懷其舊俗是説詩者不可不辨其采詩之時是也黍離降為國風此時王澤猶未竭也故人民忠愛其君猶能若此其後聽者既玩而言者亦厭遂與之相忘則雖國風亦不可復見至此則書契以來文治之迹始剗絶矣以時考之國風至於澤陂在頃王之世當魯文公之時故曰王者之迹熄而詩亡故説詩者尚論其世也先生經學自得之説為多以其書不大傳故掇其關於禮要者著之當是時唯臨川吳文正公辨學正誼盡通諸經最為知先生者當拜集賢之命至揚而還養病九江濂溪書院見先生所著易學濫觴春秋指要心大善之題其卷端曰楚望父之著經也其志可謂善矣易欲明象春秋欲明書法蓋將前無古而後無今又得六經辨釋補注觀之謂學者曰今人無能知黃楚望者孟子曰能言距楊墨者聖人之徒也楚望其人乎亦為序以歸之其略曰楚望貧而力學讀易春秋周官禮記為之辨釋補注𢎞綱要義昭揭其大而不遺其小究竟謹審灼有真見先儒舊説可信者拳拳尊信不敢輕肆臆説以相是非用功深用意厚以豫所見明經之士未有能及之者也晚年見此寧不為之大快乎豫歎美之不足因以諗於學者蓋必於諸經沈濳反覆然後有以見其用功之不易用意之不茍云然先生雅自慎重其學未嘗輕與人言以為其人學不足以明聖人之心志不以六經明晦為己任則雖與之言終日無益也學士李公慨之使還過九江請先生於廉溪書院會寓公縉紳之士躬定師弟子禮假館廬山受一經之學又將經紀先生家為子孫計先生謝曰以君之才輟期嵗之功何經不可明然亦不過筆授其義而已若豫則於艱苦之餘乃能有見吾非邵子不敢以二十年林下期君也李學士為之歎息而去或謂先生幸經道已明於已而又閟於人如此豈無不傳之懼乎先生曰聖經興廢上關天運子以為區區人力所致乎德化縣令王君子翼請刊補注藏先生家先生猶慎重之非其人不傳也洎經寇亂故宅為墟遺書之存者鮮矣悲夫先生寧使其學不傳於後終不肯自枉以授諸人是故能以數十年之勤盡究諸經於闕塞之餘而不能使聖人之心大明於天下後世蓋其道若是也豈非天乎昔者吾夫子贊易册詩定書正禮樂修春秋將以為百王大典遭秦焚書滅學帝王經世之法遂斬然泯絶於斯時蓋自開關以來宇宙橫分一大變也鄭康成當專門固陋之世以一家之學篡釋羣經具著成就孔穎逹考核百家大明鄭義雖於聖人之道無聞而博古窮經期以勤矣自是四百餘年習為定論至宋清江劉原父始以聰明博洽之資據經考禮欲盡排周秦以來傳注之失宋代經學之盛劉公實張之而説者日新矣及子朱子出而羣言有所折衷遂定於一猶吾夫子之志也而黃子於易簡其辭微其義博使學者皆得自致於經晚嵗猶拳拳禮學而弗克論著其成書貴闕疑而又深疑古今文之異體春秋獨得書法廢失之由折衷諸傳各極其當矣而門人學者於二經師説不能有所發明故君子論古今經注以為自朱子詩集傳之外俱不無遺憾也先生乃欲以近代理明義精之學用漢儒博物考古之功加以精思沒身而止此蓋吳公所謂前無古而後無今者也嗚呼其遂不傳也與汸始拜先生於其門請問治經之要先生念具遠來不以為不可教告之曰在致思而已然不盡悟傳注之失則亦不知所以為思也請問致思之道先生曰當以一事為例禮女有五不娶其一為喪父長子注曰無所授命近代説者曰蓋喪父而無兄者也女之喪父無兄者多矣何罪而見絶於人如此其非先王之意明矣始以此思之或二三年或七八年倘得其説則知先儒説經其已通者未必皆當其未通者未嘗不可致思也汸退而思之女之喪父無兄者誠不當與逆亂刑疾之子同棄於世久之乃得其説曰此蓋宋桓夫人許穆夫人之類爾故曰無所受命注猶未失也若喪父無兄則期功之親皆得為主之矣嘗以質於先生先生曰子能如是求之甚善然六經疑義若此者衆矣當務完養而慎思之母輕廢也遂授以求春秋之要曰楚殺其大夫得臣此書法也當求之於二百四十二年之內夫人薑氏如齊師此書法也當求之於二百四十二年之外汸思之經嵗不得其説先生為易置其語曰夫人薑氏如齊師此書法也當求之於二百四十二年之內楚殺其大夫得臣此書法也當求之於二百四十二年之外汸蓋自是始逹春秋筆削之權乃知先生於六經之學以其所自得而教人者蓋如此惟易所謂象外之象則有不可得而盡聞者嗚呼悲夫有遺憾矣謹述先生世家文行大概與其經學復古之功如右伏惟立言君子以當世斯文為己任者尚克表章之至正十有二年十有一月朔學生新安趙汸狀史母程氏傳嗚呼余嘗得三卯録讀之蜀禍之慘誠不忍言也夫史祀孫之死而復生也蜀民就死率五十人為一聚以刀悉刺之乃積其尸至莫疑不死復刺之祀孫尸積於下莫刺者偶不及尸血淋漓入祀孫口夜半始蘇匍匐入林薄匿他所後出為蜀樞密使嘗袒示人未嘗不泣下賀靖權成都録城中骸骨一百四十萬城外者不計嗚呼推是考之益可悲者蜀眉州史氏由唐吏部侍郎儼從僖宗幸蜀因家焉其先墓在青神將二十世宋世號名族其出蜀也今唯居湖州一房讀其遺事益悲之史母程夫人蘇文忠公之母之族也夫人將㩦其家於峽江以橐金腰纏之兵暴至伏林莽與鄰嫗謀曰輸金果可生吾兒無資不復能出蜀史宗誠無噍類矣縱得生旦夕兵復至亦決死均死死以全史兒誠不恨嫗見身死為吾出腰中金告兒使速走須臾兵果執母謝以實亡金遂遇害異日嫗語於鄰告史氏兒兒甫十三從草野得尸如其言窆以歸且亟圖其象識曰史光母年五十有四嘉熙二年十月二十七日申時死兵難兒遂東南來占籍湖州刻意自奮以右科為浙東兵馬鈐轄鈐轄生子主文任嘉定儒學教授在嘉定生子台孫介孫喜孫台孫儒術通吏文復有子幾人而史氏孫嘉熙至於今且四傳矣噫蜀孫秦帝入中夏至於宋凡一千五百餘年文物大盛絶不知有兵革一旦掃削殆盡迄今百餘年遺墟敗棘郡縣降廢幾半可哀也已可哀也已贊曰婦人內德不出門房中歌廢戰國而下俱不幸以著非得已也諱莫甚於死從容反覆烈士猶難之况士女乎歐陽公傳斷臂婦人以愧馮道夫人以死傳宗承平世澤於是乎見作史者烏得廢諸明劉惟德韓娥傳娥姓韓元四川鹽運司副使韓新澤之孫處士韓成之女也母王氏生娥於元至正乙酉娥甫三嵗失怙七嵗失恃鞠於叔父韓立遭元季之亂嵗丙申盜賊蜂起劫奪貨財虜掠婦女無所憚叔母杜氏度娥不能自保密謂娥曰我夫婦老矣汝年十二必遭寇手吾不忍視汝受掠吾製男子衣裳汝可服之寇知汝男或可免叔父又哭曰汝本故官之孫吾鞠汝恤汝願汝有家不幸至此時也命也汝宜自裁娥受叔毋教即易其服總其角旦日往拜叔母曰而今而後或達母訓有死無二豈忍不念吾叔母言甘受寇辱求茍活耶未幾果為寇虜問娥姓名娥曰我韓關保也遂與負戈而往後遇萬戶王起巖見而憐之以與千戶羅甲甲蜀之敘南人也撫之如己子與征雲南自雲南復歸敘南娥在師旅中與人和睦或有與之嬉戲即正色曰韓關保不能間戲恐官長怪責無益也每遇祁寒未嘗怨咨暑雨未嘗裸浴至夜則和衣而臥臥常後起常先人問其故曰恐家務不辦乃爾自是甲有軍旅之事事無大小娥皆勉勉為之無斯須惰容甲矜其勤慎間與之酒辭曰關保天性不能飲飲輒病甲益重之娥尤兢兢業業惟恐有失而違叔母訓出入軍中一十二年人皆不能窺測又善以父事甲故甲信而不疑甲嘗謂人曰我之關保幹蠱之子也為之婚娶冀其成立娥不得已從而百計避之婦訴其父母父母責娥夫婦不睦娥猶隱諱不言一日娥從王萬户自敘南之成都計事娥微行至城東度緑橋物色得叔父母已不能識矣娥具以實告指其上額刀傷痕仰天痛哭叔父亦哀其艱苦將以白金贖之王萬户謂娥叔父曰是子羅甲之子焉得為爾之女姪事聞有司召媪視之媪曰室女也萬戶乃受白金還之叔父以娥歸戍上馬復宗生男一人女二人娥夫婦繼歿而男女俱存洪武奄有全蜀王萬户入京朝授禮部郎中致仕還蜀以聞於蜀邸王召見賜寶鈔五錠褒之士君子多為詩文褒美永樂七年冬十二月余使蜀方外士韓太和立之子娥之弟也以其詳詣余誦之余喜娥之貞烈且孝作韓娥傳劉生曰韓娥少孤遭時多艱受叔母一言微服處軍中一怨人莫辨其為女譬之執玉馳馬馬驟而玉不玭捧盈升車車搖而盈不溢善於執捧故也亦由洞洞屬屬之心堅似金石故能保其身歸於馬氏娥有三善焉智也貞也孝也詩云既明且哲以保其身娥之謂也楊學可傳先生姓楊名學可其先世居蜀之新都邑相傳為關西夫子楊震之後至處士某其裔也有隱德弗仕惟讀書教子鄉閭稱為善士先生其子也自丱角好論孟書既長就學從鄉先生某受詩書春秋三經學既通丁元季世海內震動四郊多壘先生知蜀不能居乃遁入雲南之昆明邑昆明士君子聞先生來爭設臯比席以延之先生講論六經開陳二帝三王治天下之大經大法且謂帝王自有真不可僭竊以取荼毒由是名公貴人聞先生之言皆守其分服先生之訓咸知其義故多敬事先生而心實忌之先生亦知西南夷不可齊以禮又不可屈已以從彼俗尋歸西蜀適遇明氏強盛以國子助教逼之先生辭不就職至以法挾之先生堅以抱疾杜門自守逮乎聖朝混一海宇先生與故官宿儒計偕赴京師訴老疾辭歸蜀蜀之士知先生道學之明執經座下者無虛日先生隨其才而教之皆有造就由是先生之師道益彰彰於遠近矣未幾蜀邸就封崇儒重道乃召先生為國中士子矜式士子多躋顯官盡忠相國王知先生有德賜田宅於國之大安門外駟馬橋北俾先生有終身之樂特書流水畫橋題柱客清風精舍讀書人一十四字列於先生之門士子從學者皆稱為清風先生云吳郡顧祿篆書清風精舍扁於室且為文以記大夫士歌詩褒美永樂七年冬十一月余奉使來蜀道經其門得拜先生函丈前入門則喜松竹滿園葑菲繞蹊有隱者之趣焉升堂則喜詩書盈案琴瑟在前有長者之風焉又愛溫如崑山片玉者仲子也秀若桂林一枝者季子也茂似芝蘭玉樹者衆孫也貴如瑚璉圭璧者諸生也先生坐定略見辭色亹亹乎經史雍雍乎禮讓余益喜而敬曰先生少時奔迸遐方先難也命也暮年遭遇賢王錫養老厚恩後獲也命也於是乎先生之清風逺矣高節遂矣宜夫門弟子以清風先生稱之不誣矣作清風先生傳劉生曰晉徵士陶濳居柴桑里於夏月高臥北窗清風颯至自謂羲皇上人先生居精舍子孫娛老師生論道清風徐來焚香靜坐陶然為堯舜之民視濳無愧矣平蜀傳姓名舊志未載正江邑世𨽻渝郡元末兵亂羣雄角逞至十二年全蜀為偽夏主明玉珍所據渝即夏都江邑為偽畿甸邑未幾珍殂子升嗣嵗辛亥實明大祖高皇帝金陵登極之四年也時已削平羣雄混一疆宇惟明氏依違不決正月丁丑太祖乃命中山候湯和為征西將軍江夏侯周德興為左副將軍德慶侯廖永忠為右副將軍暨平章楊璟等率荆湘舟師由瞿塘趨重慶穎川侯兵趨隆州五月丙辰湯和師發夔州攻瞿塘以江水暴漲注大溪口己未傅友德兵至漢江阻水未渡造舟以濟己卯至漢州欲以軍中消息逹湯和而山川懸隔卒莫能通適水漲乃以木牌數千書克階文嵗月投漢江順流而下守者見之為之解體六月壬午友德攻漢州守將向大亨悉兵出戰敗走進克漢州先是夏人聞王師將至悉衆守三峽及階文失守乃分瞿塘守兵以援漢州及至而城已下矣逆戰敗走兩川大震丙戌太祖以湯和師久逗遛詔責之廖永忠聞命奮起率兵先進會得木牌於江和亦進兵自白鹽山伐木開道以趨夔州守將飛天張整衆逆戰大敗退走而出峽水急又阻於鐵索飛橋舟莫可進永忠乃密遣壯士數百人舁小舟踰山渡關以出其上流夏人不知覺也度其將至乃夜率精鋭分水陸為二軍而攻之遂克其陸寨舁舟者出上下夾繫大破之擒斬無算遂入夔明日湯和兵至乃各分兵約會重慶丙申永忠舟師自夔州乘勝直抵重慶是日次銅鑼峽明升等大懼欲奔成都其母彭氏泣止之曰事勢如此往亦無益况此城之兵膽破心悸區區城守死傷必多不如早降以免鋒鏑也乃遣使納款請降永忠以湯和師未至辭不受癸卯湯和兵至乃各駐朝天門升面縛銜璧與母彭氏及諸臣以降東川底定江邑遂入王朝仍𨽻重慶七月庚申傳友德兵圍城都偽丞相戴壽及知院向大亨等驅象載士出戰友德中流矢益奮鋭進擊大敗其兵會得重慶報壽等遂請降友德按兵入自東門壬戌遣兵徇下州郡未附者八月甲子周德興兵下保寧蜀地悉定乙丑明升至京師賜爵歸義侯賞賚甚厚九月乙未和等班師還京上所佩印綬並所得蜀金印冠冕儀使及路府州縣宣慰宣撫之數官吏將士牛馬等類太祖頒賞有差蓋自出師至此凡九閲月爾臣彜曰大哉聖靈其丕顯乎古者明王伐不敬取其鯨鯢而封之以為大戮王師伐蜀拯民水火昭義舉哉古者征西將多不利光武屢隕元戎宋祖兩川反覆視今中山潁川之師風行電逐無一矢隻輪之衄誠帝王之師以全取勝哉征伐之烈振古所無也薄海內外罔不康又迄今用休是皆髙祖開天列聖撫運之所被也於戲窺隙照者仰高明飲勺流者思滄海矧我蜀人嚴傑王源傳死節者姓王名源字淵之山西太原五臺人登𢎞治己未進士授刑部主事員外正德庚午秋擢四川按察司僉事孟冬入蜀境賊藍鄢作亂都御史林公見素檄公於途公倉卒置家於保寧間道兼程扺通巴會參議龔公勉仁分領土漢官軍征剿川北復見林公於軍門親受方略翌月七日按部營山九日按蓬州十日諜報賊聲言攻營十一日公選鄉勇四百統以義民費𢎞道等復守營至則十二夜三鼓矣召典史鄧俊醫官馬仁及師生於庭諭以國恩當報忠義難得嗚咽泣下已而復曰我一方重臣今日為汝生靈來分當與城存亡汝等有父母妻子乃獨棄而逃避哉亟令各易服持器械設敵棚以死守又括城中居民千餘人為兵下令曰敢有避縮者以軍法從事衆皆並力一心十三日儀隴告急十四夜漏下四鼓賊數十騎馳至東關公督典史率鋭卒乘城對敵賊前鋒不利奔告其酋乃悉衆火其東門而入勢莫能支賊乃大肆十五日公猶持短兵督戰手刃二賊已而麾下盡潰吏負印走蓬州公獨戰於魯公祠下為賊所執身中一刀六鎗將絶復蘇日晡民劉萬秀者亦被傷抱痛至公所公語之曰守城義也城陷身殞吾得死所矣向秀索水秀飲之復索紙筆題詩數首比暮秀以氈冒公十六日賊過祠見公微動復創之乃絶亭午生員羅紃視公惟存血汚小衣語民張善解衣衣之相率舁於學門且守護十七日州判孟仁遣吏詳探其實歸報十九日具衣棺來以斂越月冢嗣臣自保寧奔訃拊棺痛哭見者流涕次年正月扶櫬歸葬五臺營士收得公詩者遭變故失其全章僅存一絶與其長短吟數句一皆忠義所發至今赫赫在人耳目與正氣歌零丁句衣帶贊並傳賊滅事聞上憫其忠贈本司副使廕其一子仍敕蓬州營山建祠春秋致祭吁公之死重於泰山公之名昭於日月公復何憾哉羅廷唯胡子昭傳胡子昭字仲常一字伯尚舊名志高蜀大足人其宅里則在永川莢山里中余得考焉子昭當洪武中以經明行修薦至京師高廟重之初仕榮縣訓導時天台方公孝儒教授漢中倡明道學子昭往從之遊歸而盡得其所學繼遷翰林檢討充庚辰年史官纍升至兵部尚書文廟渡江靖難子昭與孝儒先期相為誓約及被執皆不屈死之臨刑時神色不變賦詩曰金聲催急鼓聲忙監斬官追上法場烙鐵火族燒紅焰焰剛刀磨利白茫茫此身刑憲歸冥府九伶仃各異鄉寄語滿朝朱紫客鐵人無淚也心傷復易中聯云兩間正氣歸泉壤一點丹心在帝鄉遂從容就殺都人無不傳誦而雪涕者父復被充邊軍其妻王氏女住兒俱沒為奴男長曰繼次曰縝俱坐死其弟子儀先是應聘分威逺教纍官山東僉事聞兄死節棄官匿於丹稜民家蜀獻王知而憐之命祝髮隱於僧辭曰父母遺體不敢自傷竟不從二子各數嵗撫而謂之曰嗟乎吾兄無後果天不絶吾氏二子當免於難遂棄去不知所終有懷鄉詩云一區茅宇棠山下半畝方塘夕照中鄉國未遙身自逺乾坤雖大足難容蜀人至今皆能道余嘗過大足棠山見子昭宅遺址旁有胡氏民家相傳為子儀後或曰其族也疑不能明劉霖傳劉霖永川人也自少負豪俊才隱居不求仕進嘗客遊瀘州與賢士先坤朋者友善宋季元兵攻蜀德祐元年六月咱萬壽以嘉定降已而長寧開逹及巴渠諸郡望風響應瀘州安撫使梅應春殺其判官李丁孫推官唐瑞奎以其城降先是合州守張玨知霖及坤朋名乃深相結納以為內應至是霖不欲辱身率鄉人起義兵自保乃亟走詣玨獻長計乞兵恢復瀘州初玨疑其反覆未之許也霖慟哭幾絶願以身為質玨知其無他始決䇿遣所部趙安王世昌等附霖引步卒兼程濳行至鐵爐城下夜四鼓遣敢死士數十人梯城而入殺守者破神臂門鼓噪而縱火餘兵乘勢悉入霖當先鋒督兵巷戰獲應春數其罪而殺之盡復瀘地時二年之六月也玨大喜亟表薦霖於朝以參謀幕府纍功升知南平軍事於是州東南依以為安堵矣居無何元兵轉圍瀘州霖復以計援之十一月瀘城粟盡人相食遂敗霖復歸於玨所元至元十五年元兵取重慶路玨軍潰敗霖亦被執不屈同玨死難於舟中適信國文公繫燕獄為瀘州詩以悲之云東南失大將帶甲滿天地高人憂禍胎感歎亦歔欷霖誠髙人之儔哉贊曰余聞燕人伐齊圉畫召王蠋蠋死之齊士大夫曰蠋布衣也義不北面於燕况在位食祿者乎於是舉卒復齊國劉南平以布衣義不辱於蒙古心迹相似而功倍之惜乎士大夫不皆南平爾天不祚蜀於人何説哉丘濬余子俊傳公姓余氏諱子俊字士英眉之青神人也其先郢之京山人元末入蜀父祥仕為戶部郎中公生十嵗而孤自幼有大志迥異常兒見者偉其不凡稍長從吳廉憲中受詩經中景泰辛未進士第授戶部江西司主事升福建司員外郎在部屬中獨明敏精勵嘗有兩勢家爭田久未決部檄公理之其地名偶與所爭者姓同執為其家故産公曰然則張家灣盡張産耶卒為直之一時能名聞諸上下部有難理事輒以委公天順庚辰出知西安府府居會城下公務叢委訟牒紛紜三邊之事咸萃於茲而使車過往無虛日公處之裕如也在任六年治行為關中七府之冠賜璽書旌異嵗丙戌擢陜西右參政督三邊軍餉明年升右布政使時用兵所需取給有司公在軍中督屬趨辦罔有廢缺是役公經畫之助為多庚寅轉折江左布政關中軍民皇皇失所倚賴才六閏月會西夏有警廷議以為公居陜久中外信服莫如用公遂拜公右副都御史巡撫延綏公具疏言狀云陜西有三邊延慶寧夏甘肅也三邊之患延慶一處於內地為尤近建議者始請於沿邊地立界石東西餘二千里於界石外開創榆林一帶營堡後纍增至三十四所延蔓二千里屯軍積糧又於營堡三十里外築墩臺以瞭望有事即舉煙以示警用是邊境久寧天順以來惟延慶一帶地無險阻可以馳突虜來侵邊掠我邊人以為嚮道遂知河套所在久屯其中以伺機變自是虜顧居內而我列屯守圉反在其外一入其中不得其出遂至遣將聚兵以為之備計以近日用兵所費芻糧銀鈔以萬萬計今猶屯宿重兵未見寧息將來供給又難計算臣愚以為莫若於沿邊一帶墩臺空處築為邊牆增立寨堡雖非天險要為有據况舊界石一帶多高山陡崖間有川口亦有限數乞敕沿邊將領各統鋭卒及行陜西布政司起倩民夫付臣統領依山形隨地勢或鐵削或壘築挑塹延引相接以為邊牆仍敕副參遊擊等官領兵於界石之外下營架厰以為防蔽乃東起清水營之紫城寨西至寧夏之花馬池延蔓幾二千餘里每二三里間為對角敵臺崖寨連比不絶於其空處築堵者三橫一斜二如新月狀以偵敵避射凡為堡十有二崖寨八百十有九小墩七十有八大墩十有五兩月之間厥功告成自是邊患稀矣初榆林列戍始於正統嵗調延安綏德慶陽三衛官軍分戍而以河南陜右客兵班上助之未有衛也成化初議者嘗請榆林城立衛然未就緒至是公始請以先年陜右清出遠年不明軍籍及有罪遣戍南土者之子孫免其遠戍就近編伍以實之且又拓其城比舊加廣凡軍中器用百爾具備率範銅鐵為之𣢾識以嵗月又擇軍民子弟之俊秀者為弟子員奏請進學立師以教之榆林俗不藝圃公求種於遠教民種植自是蔬果與內地等又於界石外開地以為屯田給軍民耕種得糧十數萬石以助經費自是榆林為重鎮而與寧夏甘肅鼎立為三矣癸巳公以功轉左副都御史又明年進右都御史仍鎮延綏公在延綏首尾六年説者謂榆林之鎮國初未有也有之始於正統然皆草創未備自是以後鎮守巡撫者非一人至公而後守禦之具始大備云丙申以本官移鎮關中有詔命議弭盜安民之策選將勵兵之方公乃條上事宜凡七一曰衛國之計二日保民之計三曰弭盜之計四曰安民之計五曰選將之計六曰守隘之計七曰善後之計其所建置皆關中軍民切要急務前人未舉者疏入皆從之行之至今人以為便是秋入朝議事奏免岷河洮三衛之民戍南方者一萬有奇易置南北之更戌者六千有奇就以分戍固原之葫蘆峽并魏王城設二千戶所領之既歸鎮岷州四族生羌作亂移兵平之岷地險隘自國初指揮馬葉深入其地至是再見於公羌人遠遁相戒曰馬帥復來矣誓不敢反捷聞賜敕奬勵初公在西安時患城中水多苦鹻民以為病宋時東引龍首渠水入城以利民汲其後湮塞成化二年又西引潏河之水自丈八頭起修石磻以啓閉撙節放水二分至西門十有五里貫城中以足民用餘水泄出城積滯日多幾與城基等將至壞城公有意欲修之未果至是乃議亦如丈八頭開新渠以泄餘水經漢時故城以逹於渭以免公私之患人至今便之號為余公渠又涇陽縣舊有洪口堰山高水下不利灌溉乃出公帑責健吏鑿山開道溉田千頃至今水為秦民之利過者思焉丁酉召拜兵部尚書論前功加一品俸逾年加太子少保賜金瑪瑙帶麒麟衣一襲是時權幸氣焰薰灼公敢與之抗人皆為公危既而相繼敗去公卒無患時貴州守將恃有粵援亦言播州苗賊齎果等出肆劫掠恐滋後患乞調湖廣四川軍馬五萬會貴州討之公言賊在四川而貴州守臣請討必有主之者興師五萬以三月計之計用軍儲六萬七千五百斛半年則十有三萬五千而楚蜀山路險阻不通舟楫取給負戴必得兩倍之數俟運至天氣熱而疾癘作非計也上是之乃止辛丑丁內艱服除即驛召改戶部尚書癸丑秋命公節制沿邊諸軍事公請兵數萬分戍尋召還加太子太保乙巳以星變上言大要欲朝廷節財用而無浪費於土木禱祈重鹽法而無以實數作羡餘以賜權貴禁奪民利而不許貴幸乞間田罷中官俾歸給役宫中而無預外事凡此皆人所難言者時論快之三月上以大同宣府雖有鎮守巡撫等官不足倚仗兵荒之後疲敝已極必得重臣庶其有濟復敕公仍總督兩處軍務自總兵以下咸聽節制既而守將不遵約束公復奏劾之而忌者因造為飛語俄改左都御史專鎮大同忌者撫公行事命工部社侍郎及科道官往按之案卷明白無有所私乃止落太子太保以左都御史致仕家居未逾年復起公典兵政比至屢疏以病乞休致不許悉復舊所兼官未盡兩月憲宗皇帝賓天今上嗣位憲以疾求去不允疾已亟猶命卧理部事屬楚蜀大荒公慮有變猶力疾草疏乞遣將臣鎮壓之以銷未然之患既封進屢問左右章出未或曰否遂側身面內而卒時己酉歲二月二十一日也享年六十有一上震悼輟朝一日遣官葬祭贈特進光祿大夫太保賜諡肅敏公沈重簡默外若和緩內實嚴毅自為部屬時事事不茍有一事不當輒熟思審處之夜以繼日或對客猶沈吟未巳或問之曰官中一二事恐不當耳凡奏疏文移必自起草每夜至二鼓方寢雖疾病中不廢天下事罔不經心而於國計邊務尤所注意一生仕宦立朝之外皆在邊鎮而於關中尤久故於榆林事為詳論曰古稱儒臣之守邊者首稱韓范然二公之事載諸史傳者議論居多鑿鑿乎見諸行事而有實迹留於後世者亦不多見也今余公之建功在延綏環慶之間蓋二公故壤也而榆林邊牆之修延袤餘二千里西人望望而去邊民優遊以嬉者餘二十年矣使繼公者人人皆體公心踵而葺之使無至廢壤則公之功留於後世者豈下二公哉夫山川不足而以人為補之因厄塞之關順形勢之便似不為過是故秦人築城非非而不量力不恤民則非也烏可以噎而廢食哉北魏高閭亦嘗建此議矣而不克遂而公則遂矣且有效矣而或者不廢其前功而顧逆料其後弊何哉忌之也亦非專為公也方公建議時有云凡事務須足到目過似能經久者方始為之豫固知公非茍焉而漫為之者嗚呼快一己之私而忘國計之大斯人何人哉崔銑鄒智傳君諱智字汝愚别號立齊一號秋因子蜀合州人也幼有異質日誦萬言既長受書於舅氏馮進士衡居龍泉庵貧無繼晷之給乃集樹葉燃以讀書通宵不寐如是者三年成化丙午願四川鄉試第一郡人聚觀於會江門外君馬上口占有天下許多難了事鄉人何用太相驚之句計偕上春官道出三原時大司馬王公恕致政家居君往見之且曰治天下之道在進君子退小人而已方今小人在位羣邪肆毒智此行非但為會試正欲上疏聖天子使進君子退小人則天下其庶幾乎公笑而不答越明年丁未登進士第入翰林為庶吉士𢎞治戊中有星變之異君上疏極論隂陽之理欲退萬安劉吉尹直而用王竑王恕彭韶且以君子所以不進小人所以不退大扺宦官有以隂主之也疏入不報己酉言事者誣知州劉公概御史湯公鼐妄言朝政嫉君者因疏君名下錦衣獄君身親三木僅餘殘喘神色自若無所曲撓供詞略云智與今湯鼐等來往相會或論經筵不宜以大寒大暑輟講或論午朝不宜以一事兩事塞責或論紀綱廢弛或論風俗浮沈或論生民憔悴撫賑濟之策或論邊境空虛無儲蓄之具議者欲處以死刑部侍郎彭公韶辭疾不為判案獲免己酉左遷廣東石城吏目毅然就道衣結履穿幾不能存親識饋遺堅郤不受在官盡心政務廢墜畢舉而持己清白纖塵不染稍暇則從白沙陳獻章先生遊篤志聖賢之學所造益深矣辛亥十月卒於廣東得夀僅二十有六卒之日囊無百緡左伯劉公大夏君同年進士順德令吳公廷舉資之還其家君介直孝友取豫惟義雅負竒氣與人寡合處事慷慨無阿比之習今上首登大寶明日常朝用御史二人侍班糾儀湯公鼐輪侍君造其私第告曰祖宗盛時御史糾儀得面陳政務得失言下取旨近年遇事但惟退而具本此君臣情分所由間隔不通也公以言官奏對幸值大政維新之日請效盛時故事此太平機會也及王公恕徵聘至京君曰三代而下人臣不復見君所以事事茍且老先生勿受官職先請見君時政之不便者歷歷陳於上前庶其有濟一受官職再無可見之時矣二公雖善其言而卒莫能用識者憾之其據經守義大率類此一時權豪貴戚聞其名爭請訓其子弟拒而不納亦不妄登其門忠君愛民之心久而彌篤富貴利逹視之漠如也詩文清徑平實不為空言有直齋遺文若干卷行於世崔銑曰嗚呼古義不明古人不復世之素號為士大夫通經術者立乎人之本朝則唯唯默默偷以全軀孰有如君之忠直乎於權貴貨利也見之則掉尾談之則垂涎孰有如君之剛義乎弱冠之年無導於前卓然自樹其孟子所稱豪傑之士乎假之以年所就殆未可量然執此以往則固青天白日斷斷乎不可磨沒是大有功於名教也故為之立傳以詔天下後世云張鶴鳴王雲芝傳公諱敕字嘉訏登第後御筆更字懋倫别號雲芝後易為竹泉歷下人也成化甲辰賜進士一甲第三人公少有仙骨穎邁絶人讀書華不注山東臥牛山寺嘗與友人趙璧晚眺見山坡光疑為夜磷公不言但夜分持石志火發處積石城纍一夜濳發之二尺許得石匣函書二册展讀一年後能知未來休咎御風出神語人曰地如篩子眼地下珍異幽竒皆可觀人半疑信之弗測也時與一僧侣相㩗山頭採杞葉持菜先下比僧扣門公已在門內僧訝之公笑曰我從裏間到來和尚自不知耳兩司梁蜀學憲一日集諸生講學衆俱見白雲一片起公即遣騎戒疾驅數里雲落處即掘之果得白石如雪命煮之細切如腐遍食諸生甘美非人世味公曰此雲母也大梁試士鎖院窗廡皆滿每處輒有一公危坐終日諸士出相語各以為近公危坐處惴惴弗寧也在輝縣山坡下掘得大石玲瓏蒼翠不類人間石置之百泉上今浸入豪家又在道傍古垣間紫石硯二池各有鴛鴦一隻雄雌相向余問公孫國子生云少猶見此硯後不知所在公以南國子祭酒家居前採杞僧疾將逝矣公問曰富貴何願僧曰願兼之公曰惜也功行未滿且著蜀府為二子王因批其背如所語比蜀王産第二子背上隱隱有此字王摩之而沒尹太常旻寢疾詢其大期公曰有大鶴入幕飛旋已揚去公之神也至日太常逝果然公預知死期安簀易道服而睟曽與王公陽明登佛山夜見帝星輝耀陽明曰此在江右公曰勿誤此自江漢聞分野耳陽明深服之合計公生平異迹蓋東方曼倩李鄴侯之流亞云嘉定二峩山豬肝洞嘗有道人居止其間一日題東嶽廟壁云教化先生特意來世人有眼不能開有人識我真名姓我是終南吕秀才公時按部至一見即識其仙筆令鑽其字墨透泥竹遂取去按張公令歷城聞見最確同時有潘公雪松亦著公行略云楊愼林母兩世貞烈傳林母者何成都林景元妻謝氏也景元亡時年僅二十四子名森夫周晬其姑劉氏憐其少齡子幼欲移所天謝堅不從乃以子托乳媪自投於井中幸缺甃淺泉救之獲免乃聽其守志森長為娶韓氏年二十八而森卒子軏方五嵗業攰資罄親鄰成勸其他適韓曰吾姑年少失倚尚克哺吾夫子成立吾年差長子又離􅘼其忍棄姑養移夫天乎乃絶䞒澤圭竇力織絍姑婦拮據備歷冰蘗子軏以進士起家孫曽滿前人以為兩世貞烈之所致云右事載四川總志及古今烈女傳余覽而重有歎焉婦之節猶木之節也木無節不林人無節不貞世衰教弛道之鮮矣傳其鮮礪俗垂訓國之大義家之大間也然閭閻之下湮沒而不傳者多矣升於載籍者僅百之一二耳即以近臣吾蜀之事證之明玉珍入蜀擒元平章濟格岱妻其妻義不受辱自投於江同事參政趙資妻玉珍以禮待之未死立於陳前招資使降資曰癡婦不死何待不見濟平章妻乎引弓射之殪同一死也而濟妻烈矣事見驅除録又瀘人傳劉貞作費烈女吟曰永康費氏女年少才十九至正十七年太嵗次丁酉逆賊從東來旌旗搖北斗唐姫與薑氏不慙為賊偶費女涕潸然勤勤告父母人生棄禮義犬豚亦何有夜深盛容飾自縊後圍栁高義感行人痛心如疾首平章瑪努勒者左丞韓淑亨低頭雙屈膝拜賊乞餘生費女生草野烈烈超凡倫二公國柱石棄節如輕塵芳名與穢迹遺戒千百春嗚呼伯夷雖賢得孔子而名益彰篳門邁軸之士不附青雲如伯夷者亦與卉木同盡况媰孀乎林氏有子而顯固貞烈之報亦天定之勝不幸如即妻費女僅得於傳聞久將湮沒余故附之林氏傳亦漢人象類求之例也吳國倫艾姫傳艾姫者蜀之什邡縣艾榮女吾友陶弼令綿竹時納為小姫初陶娶於黃無子而善妒嘗納吳氏姫生一子耳數嵗黃陽愛之因勸陶再納黃氏姫蓋黃姫即其兄女性悍而有妖態計納之足以蓴吳姫寵而危其孤也陶尋携兩姫之綿竹果不相能無何黃亦自往助之初入廨即撫吳姫子陽泣曰久不抱兒兒瘠甚豈小婦不善視兒耶陶信以為變也遂不復有他慮會兒有微疾而陶適役於外二黃隂賂醫鴆殺之且同吳姫曰尚能恃兒惑吾夫否已陶知兒死二黃手而莫如之何第遣與吳姫俱歸吳姫遂見逐為農人婦矣故陶得乘是時納艾姫艾姫年始十七端好寡言笑有寵於陶後陶遷妔安别駕携艾過家與二黃異居二黃竊恨之已陶又坐事貶閩閫參軍獨携艾姫往黃愈不能平嗾黃姫往制之比至則艾姫退處一室曰寧絶吾進御母寧使官廨有惡聲汚吾夫名是時陶已踰五十無嗣自憤為妒婦悍妾所制鬱鬱成疹死黃姫恬不為哀第自括其裝中資為再適計獨艾姫抱尸撫棺哭七日七夜不食而死死之日屬其從者曰吾從夫子地下無恨矣幸焚吾尸裹吾骨以歸庶幾祔夫子之餘土藏焉從者如其言以骨從陶櫬還至家黃猶妒未已大罵曰婢子安得祔夫尋瘞其骨壞垣下且徑其上曰婢子安得有冢乃所謂黃姫者業已不用命而自嫁夫矣嗟乎悲哉艾事陶未久且非其正御也而能慨然以死殉可不謂貞乎彼婦之妒不有其夫而忍於翦其嗣又何有於殉夫之小姫也後三年黃以惡疾死又二年郡牧楊仁甫始遷艾姫與陶合葬而為文祭焉王世貞楊廷和傳楊廷和字介夫蜀之新都人十二舉於鄉十九成進士選翰林庶吉士始告歸娶廷和為人美風姿性沈靜詳審為文亦簡暢有法而不好為聲律華藻之學惟以考究掌故民瘼邊事及一切法家言蓋鬱然負公輔望云授檢討滿九載進修撰憲宗實録成以預纂修進侍讀改左春坊左中允日侍皇太子講讀主順天試復且滿考而修會典成優拜左春坊大學士兼翰林院侍讀學士復主會試皇太子即位推恩進詹事府少詹事兼讀學如故充經筵講官為學廟實録則總裁尋進詹事專領內閣誥敕當進講時所稱逺佞幸戒遊逸失中貴人瑾指傳改南京吏部左侍郎既行而有為廷和解者去詹事之五月而遷南京戶部尚書又三月上問楊學士何在瑾以南京戶部對乃召入進兼文淵閣大學士參預機務明年加少保兼太子太保時重修會典與孝廟實録先後成諸纂修官屢當時遷而瑾意有所修怒屬廷和皆預總裁於是先摘會典誤廷和與大學士李東陽等奪俸二級而以實録功還之明年加光祿大夫柱國再遷改吏部尚書武英殿大學士時瑾橫益甚而大學士芳吏部尚書綵為中外媾廷和與東陽委曲其間小有所救劑而已尋安化王自夏州反以誅瑾為名廷和等乃稍自舒吐草赦詔且請擢邊將仇鉞以離賊黨而鉞果乘間報安化王會瑾絲中貴人張永發伏誅廷和等乃復論功進少傅兼太子少傅謹身殿大學士豫一子中書舍人流賊劉六劉七齊彥明反左都御史馬中錫當帥師往討之廷和言中錫文士也寧能當此寄時業已行果不能平賊廷和請逮中錫下獄以侍郎陸元代之而斬故受賕縱賊者參將桑玉已又薦都御史彭澤將諸邊兵討河南賊趙璲等時輔臣東陽病多委計廷和以是賊斬平論功録廷和一子錦衣衛千戶辭特加少師太子太師莘蓋殿大學士中貴人張永挾竒僇瑾而驕詗得男子有龍文於臂者以為功援故中貴人劉永誠例身欲得侯廷和謂封永誠之從子聚伯耳且自以戰功封非永誠身受之也永意乃塞亦不能為廷和怨彭澤將西討流賊鄢本恕等入問計廷和廷和曰以君才賊何憂不平所戒者班師早耳澤後破誅本恕等奏班師而餘黨復蝟起不可制澤既發而復留乃歎曰楊公之先見吾所不及也乾清宫災廷和請上避殿下詔罪已求直言因與其僚疏勸上早朝晚罷深居簡出躬九廟祭崇兩宮孝養勸日講復面奏開言路逹下情還邊兵革禁市罷皇店出西僧省工作減織造几十餘條皆切至而上不省尋以父春喪乞歸持服不許三請乃許奔喪使中貴人護而行起之復三疏辭始許閣臣之得終父母服自廷和始也服甫闕即召入時上出行邊使使賜廷和羊酒楮幣廷和疏謝因請回鑾不報復與大學士蔣冕馳至居庸願得以身出塞請上乃遣中涓阻之歸廷和之初奔喪實首揆而梁儲代之儲故同舉進士先貴而長於廷和十嵗纍遷至少師首殿矣至是讓居下時頗稱儲誼當廷和之任事上往往不視朝尋周穆王之轍廷和等數上疏諌止不聽而他如優寧王護衛貴諸義子乃至自稱威武大將軍鎮圖公尤諸失政之大者廷和亦強諫俱不聽以是邑邑不自得數稱疾乞骸骨上不聽當是時上寬大好佚遊於章疏不甚省而中貴人谷大用魏彬張雄義子錢寧江彬輩橫甚廷和雖不為之下然不能有所裁禁以是得稍自安寧王宸濠反江西事聞上欲帥師親征廷和等力阻之上乃自詭總督軍務威武大將軍總兵官後軍都督府太師鎮國公朱夀統各京邊將士南討而安邊伯許泰為威武副將軍左都督劉暉為平賊將軍前驅鎮守撫按悉聽節制命廷和與大學士毛紀居守以乾清坤寧二宫鼎建推恩録一子錦衣衛副千戶辭時廷和當草大將軍南征敕諭謝弗肯草上已心恚而會推南京吏部尚書劉龍理東閣誥敕以廷和私其鄉人切責之廷和謝罪乞罷不許少師梁儲等請與俱罷復不許是時廷和方閣門以病請而敕諭行矣上既南兩更嵗朔而廷和頗以鎮靜持重為中外所推服凡請上回轅者數十疏皆不復省上歸而駐蹕通州廷和等舉故事請上還大內御殿受俘而後正宸濠等誅上令趣召廷和等至通受事即行在執宸濠等僇之廷和不能爭也前是兵部尚書王瓊材而險與中貴人及錢寧江彬等狎相表裹為章奏誅賞遷斥捷取中旨不復關內閣而瓊躐進亦至少師與廷和儲埒共同居守又不自抑損怙侈亦甚廷和甚恨莫能制也至是與吏部尚書陸完皆發自張永云與宸濠通私外議洶洶以家且籍矣瓊先驅至通輸款上左右得免而顧奪陸完位而居之廷和以是益恨瓊明年正月上郊祀伏而嘔血輿疾歸尋益甚皇嗣未建而司禮中貴人魏彬等至閣言國醫力竭矣損萬金而購之草野或有人應廷和心知所謂乃出榜諭購而微以倫序之説風之彬等唯唯又十日而谷大用張永至閣來言上宴駕於豹房矣以皇太后命移殯大內且議所當立廷和業袖皇明祖訓出而示之曰兄終弟及誰能瀆焉以親以長毋如興世子遂合䇿迎興世子而王瓊率九卿突入左掖門厲聲曰九卿之在廷我為長今日誰當立者而不使聞廷和左右目遂皆不對乃薨然散去而故事內閣當一人與中貴勳戚大宗伯皆往首為梁儲次蔣冕有力志廷和欲倚以自輔而是時江彬擁重兵在肘腋間知天下之惡之勢必反廷和欲以太后旨捕誅彬恐梁儲老不任迎而故與彬善或泄之冕去則益孤乃佯惜儲憊阻其行儲奮曰事孰有大於迎天子者乎而敢以憊辭儲奉金符往而冕留矣魏彬故與江彬有連而柄司禮廷和知其稍文弱乃為詳言江彬反狀以危語脅之彬心動因俾其入白皇太后而後具啓請太監張永武定侯郭勛安邊伯許泰尚書王憲遷各營兵分布皇城四門京城九門及南北要害厰衛御史以其屬嚴干陬傳遺命罷威武營團練諸軍各邊兵入衛者俱重賚散歸鎮其皇店官校及軍門各色辦事悉勒還衛哈密土魯番佛郎機諸貢使皆給賞而遣之還國豹房所供番僧及少林僧諸技擊射生擢船黃頭郎散樂工伎一切罷遣時江彬之黨都督僉事李琮尤狼點勸彬乘間以其家衆反不勝則北走彬猶豫未決而與廷和合謀者獨蔣冕毛紀司禮中貴溫祥凡四人而魏彬亦不敢泄之張永伺知其意亦密為備乃誘江彬入安坤寧宫獸吻行禮入西華門過永所永飯之俾小緩以待彬且行禮而速旨下彬返走西華門門閉轉走北安門內監羣追而縳之因併縳都督神周及李琮下詔獄籍其家中外歡呼相慶興世子至都門禮部具儀如皇太子即位禮由東安門入居文華殿受箋不許遂從行殿受箋由大明門直入告大行皇帝几筵御前殿即位廷和具草詔上之報可始草上而司禮諸中貴以其關內政者數條屬廷和削去廷和曰往者吾儕之不得職公等謂出上意今者亦出新天子意耶不然吾儕賀登極後惟有一去且叩之上以誰削詔革必有當之者於是蔣冕及毛紀相繼發危言諸中貴語塞已而詔下正德中蠧政釐革且盡中外加額稱新天子聖人而所革錦衣等諸衛內監局旗校工役為數十四萬八千七百減漕糧百五十三萬二千餘石其中貴義子傳升乞升一切恩幸得官者殆盡失職之徒銜廷和切骨入朝有挾白刃恫喝於輿傍者事聞詔以營卒百人為廷和出入衛上御經筵廷和知經筵事修武廟實録充總裁前是廷和已加特進一品滿九載兼支大學士俸賜敕旌諭至是加左柱國而給事御史交章論王瓊罪狀下詔獄瓊迫則疏訐廷和以自解法司乃當瓊姦黨律論死瓊力自辨得減邊戍而有以為承望者會石瑶自禮部尚書掌詹事府改吏部廷和復奏改之掌府使司誥敕於是人或謂廷和太專然廷和以上雖幼沖然英睿不世出蓋自信以可致天下太平事事有所持諍錢寧江彬雖誅而張鋭張忠于經等獄久不決賂於內亦減從戍廷和等疏謂不誅此曹則國法不正公道不明九廟之靈不安萬姓之心不服禍亂之機未息太平之治未臻上乃籍沒其資産廷和復疏諸敬天戒法祖訓隆孝道保聖躬務民義勤學問慎命令明賞罰專委任納諫諍親善人節財用語多剴切皆優詔報可而大禮之議起時興獻王與母妃名號猶未定上欲有所加隆召廷和等從容賜茶慰諭而廷和持以為上當後孝宗稱孝宗曰皇考而獻王為皇叔考爵曰興國大王母妃曰興國太妃而别立益王之次子崇仁王為興王奉獻王祀禮部因之以請上弗悅而進士張璁有所窺見遂上疏言上宜考獻王母蔣妃宜崇以帝后號且持繼統不繼嗣之説甚晰語見璁傳自是廷和每召對上必溫旨諭之而持不可者三封還御批者四前後執奏幾三十疏上益忽忽有所恨而左右得乘間言廷和恣無人臣禮言官史道曹嘉等亦遂論劾廷和上雖為之薄謫以安之而意內移矣尋修定册功封廷和及蔣冕毛紀各伯爵嵗祿千石固辭改廕錦衣衛指揮使復辭上以賞太輕加廕四品京職各世襲復辭而會廷和滿四考超拜太傅復四辭而止特賜敕旌異錫宴於禮部九卿皆與焉時上顔留意齋醮廷和力言其不可引梁武宋徽為喻優旨報納時江左比嵗不登而中貴人以御衣請遣官之蘇杭二府督織造工部及給事御史言之皆不聽而趣內閣撰敕廷和等不奉命因極言民困財竭請母遣官上仍趣撰敕且戒以不得瀆擾執拗廷和因力辨其非瀆擾執拗且謂臣等與舉朝大臣言官言之不聽而獨二三邪佞之言是聽陛下獨能與二三邪佞共治祖宗天下哉且陛下以纎造為纍朝舊例不知洪武以來何嘗有之其創自成化𢎞治始耳憲孝二聖恤民節財美政非一陛下不之法而獨法其不美者何也即位一詔中官之幸路絀塞殆盡天下方傳誦聖德而今忽有此何以取信因請究擬旨者上為謝不審俾戒所遣官毋縱肆而已不能止也廷和故已纍疏乞休其後請益力而又以持稱考獻帝議不合疏辭露不平上責以因辭歸咎非大臣道然猶賜之璽書續與廩郵護如例申前廕子錦衣衛指揮使之命給事御史請留廷和皆不報而蔣冕代陸光祖陳以勤傳公諱以勤姓陳氏字逸甫别號松谷一號青居山人母免身時夢一星如月狀光燭庭階驚而拜之忽有神自天下授以研夢覺而公生嘉靖辛丑成進士考庶吉士癸卯授翰林院檢計壬子八月充裕邸講官丙辰冬九年任滿升修撰戊午進司經局洗馬兼侍講初兩邸並建位號未定世廟春秋高厭聞儲嗣事他邸宦侍規望非分萬一或於宫掖中造設機鍵不得動則為飛語中之分宜如彌逺新恩之説釁端叵測公及新鄭相向攢眉商圖調護密啓穆皇慎起居戒邸中口語無輕泄焦心瘁志髮為驟白一日分宜子世蕃以父命召公及新鄭宴語曰聞殿下有少嫌於家大人信否新鄭解紛不甚當窽公獨壯語曰觀皇上命名與尊公之題講讀官君臣之心固久定無可疑者也殿下名從元從土明示承乾御宇意故事藩邸講讀官以二檢討充之裕邸獨用一編修以示崇異是尊公將順聖意安社稷殿下洞鑒尊公何嫌之與有世蕃入語其父猜嫌立釋公侍裕邸幾十年在諸臣中勞最久穆皇亦注念特甚常手書忠貞二字及啓發𢎞多四字以賜他恩數賚豫不可勝紀庚申九月聞外艱特賜祭仍賻金五十兩路費稱是綵縀八表裏面辭日勉以途逺天寒切宜珍重語辛酉上命景邸之國公北面稽首曰此社稷蒼生福也癸亥三月起復除原官甲子二月升侍講學士掌院事總校永樂大典再升太常寺卿管國子監祭酒事乙丑升禮部右侍郎尋轉左丙寅改吏部左侍郎兼翰林院學士教習庶吉士時高文端公為大宗伯入直撰鉉儀諸文次且及公高戲語曰公向不肯作青詞今何如公曰安知我不能力辭迄不與事高公終以此致人言拊髀曰吾愧陳公多矣丙寅十二月二十六日穆皇登極公以從龍舊蒙召見賜賚加等丁卯二月手敕原講官陳以勤升禮部尚書兼文淵閣大學士同徐階等入閣辦事上之踐阼也天下顒顒想望太平公乃首上謹始十事疏一曰定志二曰保位三曰畏天四曰法祖五曰愛民六曰崇儉七曰欖權八曰用人九曰接下十曰聽言奉旨嘉納四月充世廟實録總裁官知經筵事以重録永樂大典成加太子少保兼武英殿大學士九月以大慶加少傅兼太子太傅穆皇敦尚淵默自朝講外希與羣臣見奏章每下閣臣條旨亦不甚可否而貴近乘間多録內降得橫思公憤之上勵精修政四事疏其一請司禮官將每日章奏類進擇便殿一一覽驗施行庶政體以漸明習且令左右不得窺其隙其二言上紹位漸久神明之斷未彰威福之柄稍移宜躬親決事時有所豫奪操縱以收大權其三請非時延見大臣發清問俾之日對狀以流通精神決去壅蔽其四言旨從中降者漸不可長宜裁以法使執常伯之職近日月之際者有嚴心而不敢肆四事皆披肝膽觸忌諱他人所咋舌不敢道者穆王覽之稍感悟庚午三月滿從一品考賜羊酒鈔錠給授柱國廕一子中書舍人時內江趙文肅公初登政府鋭意有所建豎新鄭再起與文肅相引重然其趣有公私意氣若款密而中實矛盾江陵且交閥其間文肅未之悟也公見之歸志遂決自以荷國深恩無能報塞因再上時政六事疏一慎擢用二酌久任三懲賊吏四廣用人五練民兵六重農穀奉旨所奏深切治理具見忠猷是年秋公連章乞骸骨上降溫旨慰留再四始得請加太子太師吏部尚書致仕賜璽書嘉奬給驛遣行人護行有司月給廩役恩禮濃渥近世罕儷越二年今上登極公貽書江陵勉其保聖躬輔聖德勤聖學每聞朝寧間善人登用眉端栩栩增色或事不當意必嚬蹙久之其盛德光美見於綸誥所褒子者不一而足穆皇敕諭稱公曰淳德應期宏才命世非堯舜不陳有朝夕納誨之益以社稷為悅有左右調護之忠又曰履正奉公心克勤於體國集思廣益量每廓於容賢又曰嘉猷入告常先天下之憂正色入朝深得大臣之體奉今上敕諭稱公曰難進易退屹然舊人之典刑後樂先憂卓爾大臣之風節天語鄭重一時所未有也公貌古氣清度量宏逺人莫窺其際常自言朝廷置輔設參當以協心幹國為務其果於自專不樂人言過於引嫌不肯盡言者皆非也又言吾輩當以威福歸主上公議付大廷寧使蒼生受利而已無其功自古賢豪功名彪炳皆後人所欣慕而述之彼其人固無喜功名心也一有此心其設施舉厝必且乖隔矯拂何功名之足紀故隆慶初巖廊畫一海宇晏然公所匡持調劑居多學問以倫紀為大宗踐修為實地謂聖賢盛德必自矜細行始堯舜事業必自一介不取始故終其身天彜修飭即一舉動左規右矩不失寸尺燕居必具衣冠斂足危坐終日無惰容言必稽古名教惟立節砥行為兢兢為文初學馬遷後宗曽子固晚則涵融閎肆自成一家大都氣完而力充沈鬱而有致近世聱牙棘澀巉削餖飣之習抹煞殆盡既參大政不復修詞人業古今名臣拯患扶傾解紛應變之迹手書大帙撫卷沈思若身周旋其間而求為之處者丁丑少宰補日講官公寓書勉之曰人皆以世侍禁幄為光榮吾意不然蓋講臣陪密勿無顯然可紀之功然日陳説德義或於上心有開悟即利澤加天下不資此昔賢所欲踴躍而效之也庚辰春少宰以公年七十懇請歸省上俞允且念先帝舊學特命撫按官具禮存問仍出尚方綺幣賽鏹以寵之人謂是役也有異數三焉廷臣非六載不歸省少宰守官踰兩期得以傳行今甲大臣致仕非九十不存問朝臣謝事非因緑國慶無由沐恩賚公非時蒙特賜甚渥中外咸豔慕之公卒之前一日有大星自東南隕一郡皆驚蓋適與母夢苻云公生於正德辛未終於萬厯丙戌六月十九日享年七十有六配王氏封一品夫人子于陛于明于陛隆慶戊辰進士官吏部右侍郎兼翰林院侍讀學士于明早夭三世俱以公鼎貴贈光祿大夫少傅兼太子太傳禮部尚書武吳殿大學士配俱一品夫人嗚呼以當世廟末年猜嫌起於父子安危繫乎社稷公於杯酒談笑間出一二言解之得相之才上穆皇三疏卓然可見之施行得相之略健而引疾眷而乞休無郤而先遁未缺而遽止得相之智立朝三十年一以忠誠自結人主貴溪分宜勢炎炎灼人無能以毫毛加公之上得相之節論聖賢德業在勤小物嚴一介得桐之學平章泉石舄氅自涉金閨衣鈢父子繼承未六十而引年未八十而存問得相之福余小子表公者止此至於總其始終核其巨細則有史臣之汗青在焉不具載范謙陳于陛傳大學士陳于陛字元忠别號玉壘山人其先閬人也自彥良徙南充之水西里世為水西陳氏當元至正間公九世祖曰興祖數傳至衡為大理府訓導其子信貢為太學生信生大䇿大䇿生公父太傅公以勤自衡至大䇿三世並以太傅貴贈如其官太傅為翰林檢計時生公長安邸第先夕比鄰數人夢天樂填填導一羽衣入太傅公所旦而公生既長犀角豐盈太傳絶愛憐之即課讀不甚亟而公自喜學益甚所綜撰立數千百言俱如太傅意所出太傅愈益喜曰兒類我辛酉年十七舉於鄉未午脫稿敏甚監臨者怪問何年少而穎若是名孰何公正色對曰兹非通姓名地也蓋是時大傅已起宫端浸貴盛戊辰二十四成進士髙等選入中祕而太傅業已相矣每誾試太傅輒引避弗預閲卷而公試輒裒然首諸士庚午授翰林院編修歷修撰講讀數年擢洗馬已擢詹事府詹事兼翰林院侍讀學士掌院事又擢禮部右侍郎尋改吏部自右徙左秩滿擢禮部尚書掌詹事府如故其明年入參大政自吏曹至相凡典文衡者三直日講者再所得士及獻納為多相之日距太傅二十七年明興二百年父子拜相者始見公時論榮之公亦自以遭遇尤奇思得當以報上是時上方深拱羣臣希得見以言斥者至百數吏治惰窳兵食消耗公私心憂之疏為六事以獻其一曰接見大臣謂天下猶一身然君為之心心之不運身於何有以肅皇帝之明聖而一倦於勤晚節可覩陛下自視孰與肅皇帝自肅皇帝不能以是為安臣有以知陛下之不能也請亟修朝講召對之典以決壅蔽其二曰録用人才謂言者本以戅直獲臯非有他深過可棄必終銅之令稿項黃馘以死國家曽不得其一割之用非所以計社稷也請自今天曹以屢薦者列聞惟上所用不則與衆斥之使歸於上而賢不肖無所溷三曰勤奬外吏謂今時重內亟矣要以親民宣化則守若令為政顧執不移等而令豪杰詘乎宜倣古制及祖宗初意行取之典雜及州守舉貢郡守考最得以次擢京卿諸撫臣當代視內外賢者參用之以示天下無不可得之效各務磨濯以自見四曰清查邉餉謂嵗入不過五千餘萬邊餉乃至三百三四十萬矣天下財産安得不蹶請慎簡邊計之臣今奉專敕得漸汰虛浮即不能如先朝舊額亦宜視近規為中制而止五曰儲養將才謂武科齪齪既不足致異材諸以薦用者又徒據紙上空言一再不效而絀請自今以武勇薦者必下公鄉大臣共核之各試以其能其有拳勇卓絶諸不登武舉之科者别立科羅之六曰擇用邊吏謂吏治最要而邊為甚以其內撫民而外禦侮非習邉不任也請别為銓法擇與邊宜者吏之有功則增秩久任諸生中間於武者督學得自選待用庶幾任環董邦政輩可復起也上采其議多見之行公性悃款居恆若不能道辭然遇大事廷臣即未言公輒言言又切至自在鄉二時已一再疏請册立東宫及臨朝講至是益以為地密責重非以時啓沃輒難報稱而又適國家多故愈益發憤故攄所欲言冀幸上之一悟化之一更也會是年冬言臣斥者二十餘人南北臺省幾空公從輔臣申救不已則又疏以為齒馬投鼠自古記之今法行自近不足煩白簡且臺省建白自有主名又或逺在南郡或奉使各省意外株連不知罪本兼其平日固有觸宸嚴劘貴近者槩而罰之是言亦罪不言亦罪臣恐天下有以窺陛下淺深謂隂惡其直而陽以默斥之從此士務默默即有姦蠧誰當糾發亹亹數百言直而且婉雖不得詣而中外翕然稱之公自隨太傅舍則習聞國家訓故又該覽諸家所撰結以為寶録寶訓會典諸書率渙不相屬亡以示後且使天子一旦思觀祖宗便宜故事及諸先臣善言懿行安所持而獻上因疏請纂修如宋正史既得諸則日夜編摩鈎校不遺餘力雖既相事日益劇而公尤拮據不懈諸詞臣以草呈者亡慮數十家公必為字櫛句沐之省覽日有程或不暇給輒夜繼之如程乃止以為常幾欲旦暮藉手以獻天子然公竟以此憊公初素強亡恙後稍病胃然亦時時愈比乃益數即又劇公自視其手理臞甚私憂之意欲解而西歸顧獨念受國恩厚固當奉職死節官下終不顧首丘矣故雖疾猶強視事率以分獻南郊不任風寒疾作卒年五十有二天子為哀悼輟朝賜御祭金錢雜帛少府供張又命皇長子以其意往賻之儀部郎一人持節護喪歸發水衡錢輟近臣董穿復土起墳如太傅制度追贈少保諡曰文憲都門挽送車數百兩道路皆舉音以過袞世侈為異數而賢士大夫憂時艱者率相顧欷歔以為時方多故而國家乃失一良佐公性至孝自太傅乞身公扶侍歸里第太傅輒趨公入侍及侍講幄至親切矣然未嘗三年淹也當太傅七十時公特乞歸省上因命使者存問太傅而公歸日舞綵奉觴為太傅夀又日造請里中諸耆舊故與太傅歡者相從劇飲為樂太傅雅愛嘉陵黛玉之勝公為構樓其椒集唐人詩涉江樓者為絶句若干首每大傅與客遊輒命歌以佐飲太傅遊而樂之太傅著有説約語皆至訓太傅沒公哀思不已奉其手澤襲而置之座右一嚬笑有不如説約指即痛自刻責曰吾乃負吾父嘗自以為物禁太盛即吾兩世繼貴何德以堪之深自貶損約敕食一肉脫粟之飯身自衣皂綈夫人以下三浣衣布蔽膝蒼頭廬兒數十指皆家産子惟魯質朴無褒衣大裙者以是為惜福持盈然亦性淡素非強飾也生平嚴取子自期在里未嘗以秋亳于人入秉樞軸尤謝絶賄遺門無雜賓泊然如水卒之日檢其橐僅成殮事其廉如此然好周人之急三宗賴舉火者數十人戊子巴蜀早甚公為設粥食之多所全活公廣顙長目美鬚髯骨隆隆起望之蒼然若古柏喬松又多隱德皆夀徵也顧乃及中夀止先彗出犯中台占於輔不利人私憂公公竟當之蓋天云公故善屬文常言蘇子自以其文如萬斛泉隨地而出行止一寓之自然斯足以狀文之樂矣至於觸山礙石傾仄洄洑澎湃激越無不自得此良工獨苦而蘇子未之及也蓋成之易則不工不工則不傳不工不傳之文為之不如其己所著有萬卷樓稿若干卷世多有之學士為之語曰前有眉山後有南充言父子俱擅文又蜀産也然公父子故不以是重贊曰余蓋聞陳故胡公後帝舜所出也公豈其苖裔耶何父子相繼之盛也公嘗語人曰吾居蜀言蜀寧靜淡泊吾之師也余考其行事良是聲稱爛焉為公輔冠有以也夫公故盛年天子倚以為重而竟早卒豈非天哉假今浸假之年如其所欲售當與閔夭散宜生等爭烈矣劉之綸張振德傳張公諱振德字季修崑山人觀察公清孫父應忠先舉子而殤母娠祝再來生彌月祖抱視云再來耶即笑異之曰吾家羊叔子也小字曰環號峴孩焉幼讀出師表而泣作求忠於孝論授經養親二十六拔雋太學稱二張蓋公與雲間太史公瀛海也授興文令番漢雜處土墉三尺公至即嚴出入寓拐之禁酋獻金公裂書郤之臺司重公併署宜賓長寧皆稱廉辦天啓辛酉奢酋反重慶殺大吏以下橫行公甫出棘闈馳歸守禦賊猝薄城公督鄉兵血戰援絶敕次子緄曰我為國死若母若二妹為我死汝不可死亟出請援或可濟夫人以帨覆緄額曰我二人不見汝冠矣公自以長纓繫項曰君子死冠不免兩臂縛二印右手持刀危坐一騎突入令降公瞋目罵之越宿又挾金至公曰我肯餌賊金乎又叱去乃望闕拜曰臣生不能殺賊一死報國入視夫人錢氏女淑昭淑慶僕婦蘇氏沈氏皆刎積薪上公命舉火火熾亦自刎次日見尸燼礫中臂猶繫印家人顧美亦死焉事聞上震悼贈光祿正鄉賜祭葬達坊祠諡烈愍廕長子紀錦衣衛千戶劉道開巴令王子美傳庚辰之役余從棘闈中晤西江舒君魯直為余言王子美制義之妙且曰今科必售非吾輩所及也會余友丁潤生朝揀亦素稱子美能余心識之撤棘後果褒然淡墨矣余方落第獨以聲氣訪之一見握手若宿契然比秋選即得巴縣子美以地方利病咨余余備言凋赲狀子美唯唯明年春正月余扺里門子美以二月蒞任巴縣故羶地錢糧十一萬有竒詞訟盈庭前令無不滿載歸者自子美受事局面一更輸納使自封投匱耗羡悉蠲詞訟自上司批問外餘片紙不罰願請息者聽之於是喧闐之場化為閴寂之區草長雀羅蕭如也時王氏傾倪氏構成大獄叩閽者號曰本頭凡數十人附和者又數倍羅織平民傾家破産翼虎縱橫道路以目子美一以清靜鎮之德禮所薰凶焰為之少戢日進諸生於庭與談舉子業循循善誘略無倦色衙齋集書千百卷間以弓矢暇則學射謂人曰此多事之日一味賦詩無濟也值姚黃賊犯境子美躬韎􅞘率民兵千餘往禦之賊雖退而壯氣亦復可觀壬午分典鄉闈以一破取元兩座主莫能易得人稱獨盛癸未冬闖賊入關漢中瑞王以避難來而蜀撫陳士竒亦移鎮巴縣羽書旁午客兵咆哮館餼軍需整辦不乏然後知子美非一於清靜者也甲申春獻賊入夔門勢同破竹一時當事共作虔堂之燕獨子美憂形於色日坐城上為綢繆計余自辛已居鄉去城三十里六月十四日入城晤子美於南紀門相對嘆息余曰事不可為也盍作變計乎子美曰城亡與亡萬無逃理余曰公即當死宗嗣不可不全子美頷之乃託其門人密護公子出余與子美灑淚而别是月十八日賊抵城下差一騎繞城説降子美詬罵自發炮石擊之至二十二日辰時城陷賊坐演武場縛瑞王陳巡撫關南道陳纁重慶知府王行儉及子美至賊問何不早降陳撫齒已打落含糊不成語有一人伏地云權不在巳乞埀鑒憐子美奮起以足蹴其背六大丈夫死則死矣乃向盜賊求活乎時暑甚賊各給茶一盞某人接茶子美奪而擲之罵不絶口賊大怒曰汝安得速死命以鈍刀剮之凡三日夜乃絶故死事諸人中惟子美為最苦最烈余有族子在旁親見之非風聞也憶子美文藝中云起自儒主殺人而色不變為人所殺而色亦不變嗚呼豈虛語哉賊去重慶後明年隘將曽英統兵至余乃入城哭子美於演武場求其尸不可得為設薄祭延羽流誦經以薦之有祭文一篇及詩一首文稿不存詩云臣死封疆職自然書生文弱亦堪憐撫臣有算惟􅍆命縣令無名只對天一笑餐刀神合漢千秋化碧血歸泉洪都夜冷榮門月幾度凄涼聽杜鵑賊隨破成都直指劉公之渤從容就義又有某縣令握刀自頸閣室舉火灰燼之餘惟握刀之手不化與子美並烈云論宋李昭玘八陳論兵陳之事有不可以言者有不得不言者衛靈公在諸侯之任當以守法為職不當問陳有不仁之資宜以修德為務不宜問陳然且問之此孔子所以不對也所謂不可以言者也然孔子不對衛靈公之問將以立教爾至其自謂則曰我戰則克其請伐罪則曰以魯之衆加齊之半宜可克是則使孔子中天下而立定四海之民其行兵用師之際必有道矣其不肯驅烏合無律之民以用之立死之地決矣當是時也兵陳之事將習之不暇而况於言乎此所謂不得不言者也世之不善講學者恥於戎事之不知則未嘗不以孔子闢衛靈為藉口彼不知孔子之闢其旨有在而文事必有武備乃吾儒之所當言儻曰吾知道而已兵非吾之所知其不當問者闢之以此而當問者亦闢之以此是毋乃拘而害事也哉儒者之於天下亦何所用也哉今夫古之用仁義之師者莫如武王為王者之佐者莫如太公為武王太公者疑若專以曲直老壯為定訃凡覆殺之機布設軍勢之事當絶弗道而其六韜之書乃有烏雲山兵烏雲澤兵等篇其所以較勝負利害之際者甚詳豈武王太公至是而變仁義為譎詐耶直以為德之不懷則兵之必用則凡所以御兵制敵之道不可不講之耳然此尚有可諉者曰六韜非大公之書蓋戰國相傾之士太公以為市者至於詩書為帝王之遺述豈復有可議者耶而有扈之役則曰左不攻於左汝不恭命右不攻於石汝不恭命御非其馬之正汝不恭命牧野之誓則曰今日之事不愆於六步七步乃止齊焉不愆於四伐五伐六伐七伐乃止齊焉宣王征徐方之詩亦曰綿綿翼翼不測不克又何敦陳整旅之能廢也夫左治其左右治其右六步七步之旅進不可不同心四伐五伐六伐七伐之擊刺不可不並力與夫綿綿以為竒而使敵不測翼翼以為正而使敵不克自帝王之時已然而書與詩載之未嘗以為恥後世之士乃獨恥言之豈非好名而不適實之弊哉蓋聞古之制陳其名不一有以三才名者日月星辰斗杓一在一右一迎一背謂之天陳丘陵水泉亦有左右前後之利謂之地陳用車用馬用文用武謂之人陳此三才之辨也有以五時名者春為牝陳弓為前行夏為方陳戟為前行季夏為圓陳矛為前行秋為牡陳劒為前行冬為伏陳楯為前行此五時之辨也有以四獸名者使商人為前兵象白虎使羽人為前兵象元武使徽人為前兵象朱雀使角人為前兵象青龍此四獸之辨也有以五行名者木之直金之方火之鋭水之曲土之圖此五行之辨也凡若是者因類制名固不可殫數而八陳之名猶為異同若所謂一方二圓三牝四牡五衝方六車輪七罘罝八鴈行是一八陳也若所謂金木水火土天地人又一八陳也若所謂車箱洞當金車上中黃土鳥雲鳥翔火折衝木龍騰却月水鴈行行鵝鸛天車輪地虎翼人又一八陳也紛紜異口其無定論如是至於天地風雲龍虎鳥蛇以是八物制為八名兵家者流於此多歸焉則八陳之定論亦有在矣然是八物者亦信其所從名之當否耳考其根底陳之所以八者自有所祖述蓋其法肇於黃帝具於成周而變化於諸葛孔明非諸葛孔明之獨能為是也昔黃帝潛通八卦而建一都之法默會九天而設三軍之制是以周公則而象之以九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都自九夫之井至於四縣之都而得乎一都之法又以五人而為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍自五伍至於五師之軍而合乎三軍之制至於孔明則又上探黃帝之微意下採成周之遺法因而循之與道神之革而化之與時宜之而陳法備焉故其制為八陳自九夫為井而演之縱橫皆八而有八八六十四陳者所以通乎八卦也立為三軍自五人為伍而演之周旋皆九而有九九八十一陳者所以會乎九天也然則孔明之所祖述者可謂深且逺矣非與夫古人之精神心術流通為一者嚋能爾哉李興曰推子八陳不在孫吳木牛之竒則非般模謂木牛非出於般匠之遺其説誠是若求八陳於孫吳之書則孫吳之書固無有也是不知孔明之祖述在彼而不在此也愚故曰肇於黃帝具於成周變化於諸葛孔明非諸葛孔明之獨能為是也嗚呼八陳之法黃帝既以北逐獯鬻南平蚩尤戡黎於阪泉省方於崆洞底定萬國旁羅七曜周公既以此誅紂伐奄縻戎狄懲荆舒而孔明又以此平定南中響霆關輔斬王雙走郭淮殺張郃以成鼎足之強則其明效大驗已可見矣後世之言兵孰不欲得其遺法而師承之然昧其法者莫如晉之桓溫明其法者莫如唐之李靖此又不可不知也壘石八行行去二犬此其為武侯之遺迹真與偽皆未可知而桓溫幸僚屬之不識遽欺之曰此常山蛇勢也夫常山蛇者在兵法謂之率然擊其首則尾至擊其尾則首至擊其中則首尾俱至考之陳勢特曲直一陳勢耳烏在為八哉且武侯所祖在黃帝周公而溫信於率然之説比之李興謂不在孫吳者尚或有愧故曰昧其法者莫溫若也唐太宗問李靖曰卿所製六花陳出何術乎靖曰臣本諸葛亮八陳法也大陳包小陳大營包小營隅絡鈎連曲直相對古制如此乃為圖陳之夫驅馳於戎馬之間識兵形陳法者莫如太宗而靖有六花之制乃不知其所出必待剖喻明白而後悟則靖之於八陳深矣又非守其緒餘糟粕者之比也愚故曰明其法者莫靖若也雖然論其深妙固未易以立談判考其大綱則不過奇正二字而已蓋古之制軍合萬二千五百人而為軍其為伍者一千一百二十五其為兩者二百五十十取三焉而為奇餘七以為正四奇四正而八陳生焉是其分陳之數有竒有正也四旋九攢以象天四平正列以象地散渙邪直以為風前大後鋭以為雲天地風雲四者陳之正也延邪綿直以為龍蟠前合後開以為虎翼彌蔓散洽以為鳥翔回屈包蓋以為蛇􅲇龍鳥虎蛇四者陳之竒也是其布陳之形有竒有正也天子上將居中而不動疑兵遊軍出沒而無常是其用陳之勢有竒有正也乃若陳行之踈陳戰之密其人之列而之相向背之相承陳間容陳隊間容隊曲間容曲前禦其前後當其後左防其左右防其右行必魚貫立必鴈行長以衛短短以救長回軍轉陳以前為後以後為前進無速奔退無遽走雖絶成陳雖散成行四頭八尾觸處為首先動為陽輊疾猛屬其勢儉其節短後動為隂持重固密不動如山其倏忽幽神出鬼沒十變萬態而不可致窮則又所謂竒正之相生如環之無端者八陳之制如此然則為今日訃肝欲戡亂略可不務乎雖王者之兵鼓之以道德征之以仁義有征無戰善師不陳也而其不幸有顧然不服者以為權謀之助非小補也唯乎物不終靜故受之以動當純坤用事則隂疑於陽而飛龍野戰當大朴既散則聖道并起而戎馬生郊則有力吞八荒爭截九有而生民之類然不寧黃帝於此順殺氣以作兵法文昌以命將而又制為陳洪以貽後代豈得巳者哉蓋所謂生道殺民威不軌而成文德也而後世經生儒士爭非之并與孔明之祖者黜焉一旦乘以倉卒之變而有抗衡之事其肝若之何然非黃帝孔明者既以大謬而法之不守德之不修專以嗜殺自封殖為事者其為生民之禍亦豈細故耶故鄭之魚麗鵝鸛魏之鶴列晉之三行楚之二廣二孟徒以逞一巳之欲而挈赤子於肝腦塗地耳其得罪於君子不亦甚乎孔子所以不對衛靈公而孟子亦嘗闢善陳善戰為民賊者豈非為此等慮者哉夫仁義權謀後世不可偏廢一於仁義則拘而不通專於權謀則浸入於詐而無以自反於正區區之慮每及乎此故歷陳武侯八陳之美以謹後世之武備而又闢魚麗鵝鸛之屬以終孔子俎豆之意焉范蓀八陳圖論夔州八陳之磧聞天下歷千有餘年至存於岐口之江浦往時每過其下惑於傳聞眩於目擊終莫得其説今蒙恩從宦於此始得以暇日澄崇臺而縱觀之臺高而磧平纍石粲然一一數之而無差於是推尋具意而為之説曰陳法之大要方圓竒正而巳爾武侯之法前為八者八皆東嚮其勢直而方後為十二者二皆南北嚮具勢曲而圓方者所以為正也圓者所以為竒也夫竒者正之餘李靖所論握竒文是也方圓相生竒正相救而陳法無餘事矣然前為八者八後為十二者二何也曰此分數之法皆以八計之是以為八陳也前為八者八總而計之為八八六十四後為十二者二總而計之為三八二十四凡為八者十一絶長補短而三分之以其二為正而以一為竒合為八八矣古八陳之法其别凡八李筌隂符經以為常山之勢者是也武侯之法為陳者一而已非古八陳也然而為常山之勢者固自若桓溫之言近之矣若武侯之所以為八者未知溫能悉之否也五人為伍五伍為兩萬二千五百人為隊二百五十十取三而以為竒者古也武侯之法八八六十四為正三八二十四為竒是十一取三焉以為竒則精於古矣犬竒正也方圓也隂陽也一而已矣方者其隂圓者其陽也前為方者八八六十四後為圓者三八二十四絶長補短大概二隂而一陽其在易二隂而一陽為震倍之四隂而二陽為臨嗟乎武侯之意儻取諸此乎古者用竒之法或取於中或列於左右或伏於後處於中者李靖之握竒是也列於左右者淮隂侯與楚戰垓下之勢也伏於後則武侯之法司馬遷書言漢與楚決勝垓下淮隂侯自以三十萬當之皇帝在後孔將軍居左費將軍居右絳侯柴將軍又在皇帝後淮隂侯先合不利却孔將軍費將軍縱楚兵不利淮隂侯復乘之楚以大敗史傳之紀軍陳未有詳於此者淮隂侯與高帝絳侯柴將軍所居之軍正也孔費二將列於左右者竒也淮隂侯喜以弱致人故其為竒者列於左右將佯却而後勝武俟節制之師使竒而將出於左右者常匿於後以固其軍正兵既有所持而竒兵唯無出出將不可禦比司馬仲達之所避而終身不敢與戰也然武侯之法密矣王當五運六氣論五運六氣之説不見於儒者之六經而見於醫家之素問夫素問乃先秦古書雖未必皆黃帝岐伯之言然秦火以前春秋戰國之際有如和緩秦越人輩雖甚精於醫其察天地隂陽五行之用未能若是精密也且夫寒暑燥濕風雨者天之隂陽三隂三陽上奉之木火土金水者地之隂陽生長化收藏下應之而五運行於其間即五行之化氣也天數中於五戊居之地數中於六已居之戊巳土也化氣必以五六故甲巳化土而居於其首上生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也地之三隂三陽亦五行爾而火獨有二五行之妙理也蓋木王於東火王於南金王於西水王於北而土王於四維戊附於戌而在乾已附於辰而在巽而未之對衝在丑故辰戊丑未寄王之位也未在西南其卦為坤其時為長夏以其處四時之中吕氏月令謂之中央土此土正王之位也春木生火秋金生水冬水生木而夏火制金生氣絶矣惟土王於西南然後以火生土以土生金四時之序循環不窮然火方王於午土遽王於未則火氣必枆故君火以名其氣溫而未熱相火以位與太陽同處未申之間奉君令以行暑氣於是火不耗於土不屈於金故丙盛則庚伏此火所以獨分君相之位也天氣始於甲地氣始於子子甲相合命曰嵗立曰行四周而為二紀天以六為節故氣以六期而為一備地以五為制故運以五嵗而為一周運統一嵗於四時之表氣分六位於一嵗之中風雨燥濕寒暑其應有候其至有期然用以占焉往往不效非素問之無驗用其説者知常而不知變故也凡物理有常必有變雖天地之運動往來消息盈虛可以逆其必然者常也若其變則無所不至可知而不可必也嘗試即其常而言之五太之運是為太過其至先時五少之運是為不及其至後時惟平氣則不疾不徐其至以時其大略如此火運上臨少隂水運上臨太陽木運上臨厥隂金運上臨陽明土運上臨太隂謂之天符木運臨卯火運臨午金運臨酉水運臨子土運臨四維謂之嵗會五太與在泉氣同謂之同天符五少與在泉氣同謂之同嵗會若是者具氣和土運上見少陽金運上見厥隂謂之運刑夭若是者其氣乖此皆五運之常也主氣各居一步厥隂主初少隂少陽次之太隂陽明又次之太陽主終六位不遷客氣與嵗推移子嵗太陽之水為初丑嵗厥隂之木為初迭相往來而少陽之氣為初乃在太隂之後半嵗以前司尺主之半嵗以後在泉主之其大略如此若其情則有相得與不相得其位則有順有逆相得者木火相臨火土相臨之類也不相得者金木相臨水火相臨之類也父臨子則順木居少陽之位是已反此則寒水居金位斯逆矣君臨臣則順君火居少陽之位是已反此則相火居君火之位斯逆矣此皆六氣之常也及論其變則有正有邪於是有變有勝有復有鬱有發有淫有承當時而行者正也非時而行者邪也當時而行其過則為變非時而行其至則為勝其救則為復抑而不伸則為鬱鬱而怒起則為發陵其所勝則為淫極而必反則為承假如太角之化為啓圻而變為推拉太徵之化為暄煥而變為炎烈正化之為變者然也少角木氣不足淸勝而熱復少徵火氣不足寒勝而雨復邪化之正復然也寒甚而無陽焰是為火鬱熱甚而無凄清是為金鬱䣇而不伸者然也水鬱而發則為水雹土鬱而發則為飄驟鬱而怒起者然也風淫所勝則克太隂熱淫所勝則克陽明陵其所勝者然也相火之下水氣承之濕土之下風氣承之極則有反者然也然摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔兩氣之後不應山澤無不蒸溽鬱也發也淫也承也其理皆然凡此者其應非有候其至非有期是以可知而不可必也其應非有候則有不時而應者矣其至非有時則有卒然而至者矣是故千里之逺其變相似者有之百里之近其變不同者亦有之即其時當其處隨其變而占焉則吉凶可知况素問所以論天地之氣化者將以觀其變而救民之疾也夫大而天地小而人之一身五行之氣皆在焉天地之氣有帝無變則人亦和平而無疾天地之氣變而失常則疾厲之所從出也是故木氣勝則肝以實病脾以虛病火氣勝則心以實病肺以虛病此醫者所能致察儒者不得其詳也至於官天地理隂陽順五行使冬無愆陽夏無伏隂春無凄風秋無苦雨和平之氣行於兩聞國無水早之災民無妖孽之疾此儒者所當致察醫家未必能知也素問亦略言之矣五行之精是為五緯與運氣相應有嵗里有辰星以察其行之逆順而占其吉凶然必曰德者福之過者罰之則是運氣之和平而為休祥有德者召之也運氣之乖疾而為災眚有過者致之也雖然其説略而未詳吾儒之經則詳矣洪範九疇始於五行中於皇極終於五福六極聖人建極於上以順五行之用是以天下之民有五福而無六極有五福皆可以康寧矣無六極皆免於疾病此其道固有行乎運氣之外者是謂大順成周之時嘗見之由庚之詩作而隂陽得由其道華黍之詩作而四時不失其和由儀之詩作而萬物各得其宜此逮皇極順五行使民有五福無六極之驗也是故素問方伎之書而洪範則聖人經世之大法也知有素問不知有洪範方伎之流也知有洪範不知有素問儒者何病焉四川通志卷四十三欽定四庫全書
