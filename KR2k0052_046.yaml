body:
  text: 四川通志卷四十六藝文詩話司馬相如為上林子虛賦意思蕭散不復於外事相闡控引天地錯綜古今忽然如睡煥然而興幾百日而後成其及人盛覽字長通牂牁名士嘗問以作賦相如曰合綦組以成文列錦繡而為質一經一緯一宫一商此賦之迹也賦家之心包括宇宙總覽人物斯乃得之於內不可得而傳覽乃作合組歌列錦賦而退終身不敢復言作賦之心矣相如將獻賦未知所為夢一黃衣翁謂之曰可為大人賦遂作大人賦言神仙之事以獻之賜錦四匹司馬長卿賦時人皆稱典而麗雖詩人之作不能加也揚子雲曰長卿賦不似從人間來其神化所至耶子雲學相如為賦而弗逮故雅服焉揚雄讀書有人語之曰無為自苦玄故難傳忽然不見雄著太玄經夢吐鳳凰集於玄之上頃而滅或問揚雄為賦揚雄曰讀千首賦乃能為之揚子雲好事常懷鉛提槧從諸計吏訪殊方絶域四方之語以為裨補輶軒所載亦洪意也揚子雲曰軍旅之際戎馬之間飛書馳檄用枚臯廟廊之下朝廷之中高文典册用相如又枚臯文章敏疾長卿制作淹遲皆盡一時之譽而長卿首尾溫麗枚臯時有纍句故知疾行無善迹矣惟寂惟莫自投於閣爰清爰靜無作符命此譏子雲作也宋孫明復曰太玄一書乃明天人始終之理君臣上下之分蓋疾莽而作也王介甫諸家以年數考之謂子雲與莽不相及上符命投閣恐係谷子雲事鑿鑿有據是何人忍於汚衊賢者如此近日李本寧移書示豫謂其在戶西以此段書之墨池上乃與當時意見不合後竟入彈章噫不但賢者被誣即代辨誣之人亦被禍矣可一慨嘆桓談新語雄作甘泉賦夢腸出收而納之卒王逸少與周益州書司馬相如揚子雲有後否西京雜記載卓文君為相如作誄梁劉孝威詩君平子雲闐不嗣江漢英靈信已衰宋有逃禪子揚補之則自稱子雲後云晉惠帝時蜀中謠江橋頭關下市成都北門十八子十八子李也其後李雄據蜀僭號按漢武元鼎二年立大城九門少城九門故有十八之稱豆子山打瓦鼓陽平山撒白雨此綿州巴歌也巴歌二字才見此後劉禹錫之竹枝詞李紳之巴女詞皆其變體若常璩巴志所引川崖惟平維月孟春等篇則古詩者流非通俗之唱矣杜宇化子鵑蜀本紀華陽國志俱引之其作詩實起於鮑昭行路難云中有一鳥名杜鵑言是古時蜀帝魂有兩揚雄兩李膺兩王褒漢揚雄成都人乃作太玄經者字從手漢王褒資中人作賢臣頌者晉李膺涪城人作益州記者已上皆土著也漢李膺為益州太守寰宇記云城西三里有李膺宅後周王褒同庾信從益州趙王出鎮之蜀褒詩有奉和趙王途中五韻峽路沙如月山峰石似眉錦城遙可望廽鞍念此時之句隋楊雄持節入蜀迎梁主蕭巋者字從木以上皆宦遊者也酈道元水經注曰峩山縣東北有武陽龍尾山并仙者羽化之所於其處得遺咏雖神栖白雲屬想芳流藉念泉鄉遺詠在兹覽其餘誦依然息逺匪直邈想遐迹愛其文詠可念故端牘抽札以詮其詠略曰登武陽觀樂數峩嶺千㽔洋湖口命緋駕白駒臨天水心踟蹰千載後不如此段本注遺失得古逸詩中道書所載平蓋觀稠粳治皆武陽境北史常景淹滯門下積歲不至顯官以蜀司馬相如王褒嚴君平揚子雲皆有高才而無重位乃作四君贊以託意按宋鮑昭仕亦不得志作蜀四賢詠但昭合四賢為一篇景則人自為詠也王楊盧駱初唐稱四傑無不入蜀中者唐詩紀事稱高宗時王勃以檄雞文斥出沛王府既廢客劔南與盧照鄰邵大震九月九日登玄武山旅眺詩照鄰為新都尉大震其同時人耳子安送杜少府之任蜀州詩城闕輔三秦風煙望五津未下注腳不知也丹鉛餘録云大江自湔隁至犍為有五津曰白華津萬里津江首津涉頭津江南津出華陽國志王勃詩風煙望五津盧照鄰文豫自江陽言歸五津皆指此然首句亦出華陽國志而用修未之引也成都本治赤里街張若徙置少城內廣營府舍修整里闠市張列肆得與咸陽同制此即城闕輔三秦之意賓王入蜀亦以使事至疇昔篇中曾及之其曰地角天涯渺難測者成都有此二石也遊宦紀聞云今之逺官及服賈者皆曰天涯海角蓋俗談也頃在成都嘗聞有天涯海角石暇時訪古及閲志圖乃知天涯石在中興寺耆老傳云人坐其上則腳腫不能行至今人不敢踐履又有天涯石在城東對昭覺寺高六七尺有廟今入市人湯家園地角石舊有廟在羅城內西北角高三尺餘王均之亂為守城者所壞今不復存矣獨異記載子昻初入京不為人知有賣胡琴者價百萬豪貴傳視無辨者子昻突出謂左右曰輦千緍市之衆驚問答曰豫善此樂皆曰可得聞乎曰明日可集宣陽里如期皆往酒肴畢具置胡琴於前食畢捧琴語曰蜀人陳子昻有文百軸馳走京轂碌碌塵土不為人知此樂賤工之役豈宜留心舉而碎之以其文軸遍贈會者一日之內聲華洋溢蘇頲將赴益州題小園壁歲窮惟益老春至却辭家可惜東園樹無人也作花宋璟鄭惟忠俱有詩送之亦絶句也小許公有長樂花賦即蜀之旌節花王維送李梓州詩萬壑樹參天千山響杜鵑山中一夜雨樹杪百重泉楊用修詩林振秀作山中一丈雨潼川志作山中一半雨千山響杜鵑作春聲響杜鵑方輿勝覽作鄉音響杜鵑不知何所適從漢女輸橦布李周翰曰漢女蜀之美女也漢書曰秦置黔中郡漢興令大人輸布一匹小口二丈是謂布即今橦花布也孟浩然途中晴詩已失武陵雨猶逢蜀坂泥天開斜景遍山出曉雲低餘濕猶霑草殘流尚入溪今宵有明月鄉思逺淒淒此曲盡蜀中之境非親到者不知除夜有懷迢遞三巴路羈危萬里身或收作孟浩然非此崔塗作也塗蓋避亂入蜀云天寶末明皇嘗乘月登勤政樓命梨園弟子歌數闋有唱李嶠詩云富貴榮華能幾時山川滿目淚沾衣不見祗今汾水上惟有年年秋雁飛時上春秋已高問是誰詩或對曰李嶠因淒然泣下不終曲而起曰李嶠真才子也明年幸蜀登白衛嶺覽眺久之又歌是詞復言李嶠真才子不勝感嘆時高力士在側亦揮涕久之明皇幸蜀劉長卿亦嘗侍從故有送史判官奏事之靈武兼寄巴西親故詩時肅宗權制靈武也閬中左綿皆得稱巴西長卿之親故有入蜀而未至成都者耳詩云猶有西歸心遙懸夕陽外李白本末傳記所載不同唐史稱白興聖皇帝九世孫隋末以罪徙西域神龍初遁還客巴西既長隱岷山蘇頲為益州長史見白異之更客任城與孔巢父韓凖裴政張叔明陶沔居徂徠山口沈飲號竹溪六逸天寶初南入會稽與吳筠善筠被召故白亦至長安往見賀知章知章見其文歎曰子謫仙人也東蜀楊天惠彰明逸事云元符二年春正月天惠補令於此竊從學士大夫求問逸事聞唐李白本邑人微時募縣小吏入令卧內嘗驅車徑堂下令妻怒將加詰責太白亟以詩謝云素面倚簾鈎嬌聲出外頭若非是織女何得問牽牛令驚異不問稍親招引侍研席一日賦山火詩思軋不屬太白從旁綴其下句令詩云野火燒山去人歸火不歸太白繼云熖隨紅日出煙逐暮雲飛令慙止頃之從令觀漲有女子溺死江上令復吟詩二八誰家女漂來依岸蘆鳥窺眉上翠魚弄口傍珠太白繼云緑鬢隨波散紅顔逐浪無因何逢伍相應是怨秋胡令滋不悅太白忽棄去隱居戴天大匡山往來旁郡依潼江趙徴君㽔亦節士任俠有氣善為縱橫學著書號長短經太白從學歲餘去遊成都賦春感詩云茫茫南與北道直事難諧榆莢錢生樹楊花玉糝街塵縈遊子面蝶弄美人叉却憶青山上雲門掩竹齋益州刺史蘇頲見而竒之時太白齒方少英氣溢發諸為詩文甚多微類宫中行樂詞體今邑所藏百篇大抵皆格律也雖頗體弱然短羽褵褷已有雛鳳態淳化中縣令楊遂為之引謂為少作是也遂江南人自名能詩纍謫為令云始太白與杜甫相遇梁宋間結交歡甚久乃去客居魯徂徠山甫從嚴武成都太白益流落不能歸故甫詩又云匡山讀書處頭白好歸來然學者多疑太白為山東人又以匡山為匡廬皆非也今大匡山猶有讀書臺而青亷鄉故居遺地尚在廢為寺名隴西院有唐梓州刺史碑失其名及綿州刺史高祝記太白子曰伯禽女曰平陽皆去蜀後生有妹月圓前嫁邑子留不去以故葬邑下墓今在隴西院旁二百步外或傳院乃其所捨云李白開元中謁宰相封一版上題曰海上釣鼇客李白相問曰先生臨滄海釣巨鼇以何物為釣線曰以風浪逸其情乾坤縱其志以虹霓為絲明月為釣又曰何物為餌曰以天下無義氣丈夫為餌丞相竦然李白與人談論皆成句讀如春葩麗藻粲於齒牙時號李白粲花之論唐人言李白不能屈身以腰間有傲骨范傳正作李太白墓志云白常欲一鳴驚人一飛沖天彼漸陸遷喬皆不能也及其謫退乃嘆曰千鈞之弩一發不中則當摧撞折牙而求息機安能效碌碌者蘇而復上哉用是脫屣軒冕釋羈韁鎖因肆性情大放於宇宙間意欲耗壯心而遣餘年此數語足以盡白之為人矣劉全白有李翰林墓碣記云太白廣漢人性倜儻知縱橫術善賦詩才調逸邁往往興會屬詞恐古之善詩者亦不逮裴敬有李白墓碑曰白為詩格高旨逺若在天上物外任華送李白之曹南序曰彼碌碌者徒見三河之遊倦百鎰之金盡乃議子於得失虧成之間曾不知才全者無虧成志全者無得失進與退於道德乎何有以上諸文附見李白集古本有之今不傳矣全白指太白為廣漢人蓋唐世彰明縣屬廣漢郡故獨舉郡為稱耳李太白初自蜀至京師舍於逆旅賀監知章聞其名首訪之既竒其姿復請所為文出蜀道難以示讀未竟稱歎者數四號為謫仙解金龜換酒與傾盡醉期不問日由是稱譽光赫賀又見其烏棲曲嘆賞苦吟曰此詩可以泣鬼神矣故杜子美贈詩及焉曲曰姑蘇臺上烏棲時吳王宫裏醉西施吳歌楚舞歡未畢西山欲銜半邊日銀箭金壺漏水多起看秋月墜江波東方漸高奈樂何或言是烏夜啼二篇未知孰是故兩録之烏夜啼曰黃雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔忩語停梭悵然憶逺人獨宿空房淚如雨白才逸氣高與陳拾遺齊名先後合德其論詩曰梁陳以來豔薄斯極沈休文又尚以聲律將復古道非我而誰與故陳李二集律詩殊少嘗言興寄深微五言不如四言七言又其靡也况使束於聲調俳優哉故戲杜曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦蓋譏其拘束也明皇聞之召入翰林以其才藻絶人器識高茂便以上位處之故未命以官嘗因宫人行樂謂高力士曰對此良辰美景豈可獨以聲伎為娛倘時得逸才詞人詠出之可以誇耀於後遂命召白時寧王邀白飲酒已醉既至拜舞頽然上知其薄聲律謂非所長命為宫中行樂五言律詩十首白頓首曰寧王賜臣酒今已醉倘陛下賜臣無畏始可盡臣薄技上曰可即遣二內臣掖扶命研墨濡筆以授之又令二人張朱絲欄於其前白取筆抒思晷不停綴十篇立就更無加點筆迹遒利鳳跂龍拿律度對屬無不精絶常出入宫中恩禮殊厚竟以踈縱乞歸上亦以非廊廟器優詔罷遣之後以不羈流落江外又以永王招禮纍謫於夜郎及放還卒於宣城杜甫所贈二十韻備敘其事太白渡金門詩仍連故鄉水萬里送行舟送人之羅浮詩爾去之羅浮余還憩峩眉又淮南卧病懷寄蜀中趙徵君㽔詩云國門遙天外鄉路逺山隔朝憶相如臺夜夢子雲宅皆寓懷鄉之意趙㽔梓州人字雲鄉精於數學與白齊名蘇頲薦西蜀人才疏云趙㽔術數李白文章李白名播海內明皇於便殿召見神氣高朗軒軒然若霞舉上不覺忘萬乘之尊因命納屨白遂展足與高力士曰去靴力士失勢遽為脫之及出指白謂高力士曰此人固窮相白前後三擬詞選不如意悉焚之唯留恨别賦及祿山反製胡無人言太白八月敵可摧及祿山死太白蝕月衆言李白唯戲杜考功飯顆山頭之句成式偶見李白詞亭上宴别杜考功詩曰我覺秋興逸誰言秋興悲山將落日去水共晴空宜煙歸碧海夕鴈度青天時相失各萬里茫然空爾思閭丘師詩云鳳藏丹穴暮龍去白水渾蓋稱均之文也均亦曾至雲南有刺史王仁求碑文爨王墓碑文皆均筆也出升菴詩話按成都文類均銅梁人武后朝為太常博士與杜審言同年均善書即所云世傳閭丘筆峻極逾崑崙者雪嶺多其碑碣甫時尚存曽在成都與甫為通家來往杜石笋行雨多往往得瑟瑟按華陽記開明氏造七寶樓以珍珠結成簾漢武帝時蜀郡火燒數千家樓亦以燼今人往往於砂土上獲珍珠又趙清獻蜀都故事石笋在衙西門外二株雙蹲云珍珠樓基也昔有人於此立寺為大秦寺其門樓十間皆以珍珠翠碧貫之為簾後摧毁墜地至今基腳在每有大雨其前後人多拾得珍珠瑟瑟金翠異物余謂石笋非為樓設而樓之建適當石笋附近耳蓋大秦國多璆琳琅玕明珠金碧水道通益州永昌郡則寺疑此國人所建也杜詩注嘗引酉陽雜爼謂蜀少城飾以金璧珠翠桓溫怒其太侈伐之事為證四月十九日成都謂之浣花遨頭宴於杜子美草堂滄浪亭傾城皆出錦繡夾道自開歲宴遊至是而止故最盛於他時豫客蜀數年屢赴此集未嘗不晴蜀人云雖戴白之老未嘗見浣花日雨也杜子美愁坐詩曰高齋常見野愁坐更臨門十月山寒重孤城水氣昏葭萌氐種逈左擔犬戎屯終日憂奔走歸期未敢論葭萌左擔皆地名葭萌人知之左擔人罕知也注者或改作武擔又改作立擔皆可笑按太平御覽引李猶蜀記云蜀山自綿谷葭萌道經險窄北來擔負者不容易肩謂之左擔道又李公印益州記云隂平縣有左擔道其路至險自北來者擔在左肩不得度右肩常璩南中志云自僰道至朱提有水步道水道有黑水及羊宫水至險難行步道度三津亦艱阻故行者謠曰楢溪赤水盤蛇九曲盤羊烏龍氣與天通庲降賈子左擔七里又有牛叩頭馬搏頰坂其險如此據三書是左擔有三綿谷一也隂平二也朱提三也義則一而已朱提今之烏撒雲貴往來之西路也子美題忠州龍興寺所居院壁詩云忠州三峽內井邑照雲根今其驛名曰雲根驛有筆名雲根筆蜀江三峽中水波圓折者名曰盤盤音漩杜詩盤渦鷺浴底心性張蠙黃牛峽詩盤渦逆入嵌崆地斷壁高分繚繞天杜甫出瞿唐峽詩五雲高太甲六月曠摶扶注不解五雲之義嘗觀王勃益州夫子廟碑云帝車南指遁七曜於中階華蓋西臨藏五雲於太甲酉陽雜爼謂燕公讀碑自帝車至太甲四句悉不解訪之一公一公言北斗建午七曜在南方有是之祥則無位聖人當出華蓋以下卒不可悉愚謂老杜讀書破萬卷自有所據或入蜀見此碑而用其語也晉天文志華蓋在旁六星曰六甲分隂陽而配節候太甲恐是六甲一星之名然未有考證以一行之邃於星厯張燕公段柯古之殫見洽聞而猶未知焉姑闕疑以俟博識杜少陵遊何將軍山林詩雨拋金鎖甲苔卧緑沈鎗竹坡周少隱詩話云甲拋於雨為金所鎖鎗卧於苔為緑所沈有將軍不好武之意此瞽者之言也薛氏補遺云緑沈精鐡也引隋書又帝賜張淵緑沈之甲趙德麟侯鯖録緑沈為竹引陸龜蒙詩一架三百竿緑沈森杳冥雖少有據然亦非也豫考之緑沈乃畫工設色之名鄴中記云石虎造象牙桃枝扇或緑沈色或木蘭色或紫紺色或鬱金色王羲之筆經云有人以緑沈漆管見遺南史梁武帝西園食緑沈瓜是緑沈即西瓜皮色也梁簡文詩吳戈夏服箭冀馬緑沈弓虞世南詩緑沈明月絃劉劭趙都賦弩有黃間緑沈若如薛與趙之説鐡與竹豈可為弓絃耶楊巨源詩吟詩白羽扇校獵緑沈鎗與杜少陵之句同皆謂以緑沈色為漆飾鎗柄耳杜子美元都壇歌云子規夜啼山竹裂王母晝下雲旗翻説者多不曉王母或以為瑤池之金母也中官陳彥和言頃在宣和間掌禽苑四方所貢珍禽不可殫舉蜀中貢二種鳥狀如燕色紺翠尾甚多而長飛則尾開梟梟如兩旗名曰王母則子美所言乃此禽也蓋遐方異種人罕識者子規夜啼山竹裂言其聲清越如竹裂也此墨莊漫録所解余閲峩山記云漢竇誼放浪不羈月夜聞子規啼曰竹裂吾可歸峩眉是夕竹裂天明遁去武帝三徵之不起老杜引此竹裂與旗翻字對始不偏重蘇東坡泊舟夔峽聞有人吟江流石不轉遺恨失吞吳之句曰豫杜子美也世人多誤解豫詩謂先主伐吳不利以此為恨非也蓋武侯之志在於中原欲結東吳為外援伐之轉失策耳武侯曰若法孝直在可免此行杜甫子宗武以詩示阮兵曹兵曹答以石斧一具隨使併詩還之宗武曰斧父斤也兵曹使我呈父加斤削也俄而阮聞之曰誤矣欲子砍斷其手此手若存天下詩名又在杜家矣繁知一蜀之巫山人贈白樂天詩云忠州刺史今才子行過巫山必有詩為報高唐神女道速排雲雨候清辭樂天見之邀繁生同舟且曰巫山有王無競沈佺期皇甫冉李端四詩竟不肯作古人之服善無我如此沈與皇甫李端詩人多知之王無競一首罕傳今録於此神女下高唐巫山正夕陽徘徊行作雨婉戀逐襄王電影江前落雷聲峽外長朝雲無處所臺殿鬱蒼蒼樂天取此在佺期三子之上信哉後唐張丕立嘗曰朝廷不用憂巴蜀稱霸何曽是蜀人人以為名言亦皆謂蜀人忠義固臣子之常分知不知庸何恤哉蜀人為蜀都辨將以發左思抑蜀黜吳借魏諛晉焉耳士之生蜀者其自今宜知所愛重母使後人辨今猶今辨昔焉唐子西文采風流人謂小東坡劉彜叔曰唐子西善學東坡量力從事雖少自成一家其詩工於屬對緣此遂無古意後村劉氏曰子西諸文皆高不獨詩也其出稍晚使及坡門當不在秦朝之下竹溪林氏曰唐子西學東坡者也得氣骨而未盡其變態之妙間有直致處然無一點塵俗亦佳作蘇軾飛白御書記抱烏號之弓不若藏此筆寶曲阜之履不若傳此書考追蠡以論音聲不若推點畫而究觀所用之意存昌歜以追嗜好不若因褒貶而想其所與之人或藏於名山或流於四方凡若此者皆當聳然而作如望旄頭之塵屬車之音相與勉為忠厚而恥為浮薄或由此也夫高太尉駢崇文曾孫也鎮蜀日以蠻夷侵暴乃築羅城四十里朝廷雖加恩賞亦疑其固護一日奏樂聞樂聲知有改移兆乃題風筝寄意曰夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又被風吹别調中旬日果移鎮渚宫聞説邊城苦如今到始知好將筵上曲唱與隴頭兒此薛濤在高駢宴上聞邊報樂府也文諷諭而不露得詩人之妙使青蓮見之亦當印可元白紛紛停筆不亦宜乎元稹聞西蜀薛濤有辭辨及為監察使蜀以御史推鞫難得見焉嚴司空潛知其意每遣薛往洎登翰林以詩寄曰錦江滑膩峩眉秀幻出文君與薛濤言語巧偷鸚鵡舌文章分得鳳凰毛紛紛詞客多停筆箇箇公侯欲夢刀别後相思隔煙水菖蒲花發五雲高白居易有詩與薛濤云峩眉山勢接雲霓欲逐劉郎此路迷若似剡中容易到春風猶隔武陵溪五溪論事云蜀尚書侯繼圖本儒士一日秋風四起偶倚闌於大慈寺樓有大桐葉飄然而墜上有詩云拭翠斂雙蛾為鬱心中事搦管下庭除書成相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地侯貯小帖凡五六年方卜任氏為婚嘗諷此詩任氏曰此是妾書葉詩怎得在公處曰向在大慈寺閣上倚闌得之即知今日聘卿非偶然也侯以今書較之與葉上無異元稹為御史鞫獄梓潼樂天昆仲送至城西而别後旬日昆仲與李侍郎建間遊曲江及慈恩飲酣作詩曰花時同酌破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州後旬日得元書果以是日至褒仍寄詩曰夢君兄弟曲江頭也到慈恩寺裡遊驛吏喚人排馬去忽驚身在古梁州千里魂交合若符契白有感夢記備敘其事段文昌太尉鎮益州有還别業尋龍華山寺廣宣上人詩云十里惟聞松柏風江山忽轉見龍宫正與休師方話舊風煙幾度入樓中郭震亦有題華山詩曰昔年曾到此山回百鳥聲中酒一杯最好寺邊開眼處段文昌有讀書臺太尉李德裕出鎮渚宫嘗謂賓侣曰余偶欲賦巫山神女一詩下句云自從一夢高唐後可是無人勝楚王晝夢宵征巫山似欲降者何如段記室成式曰屈平流放湘沅椒蘭久而不芳卒葬江魚之腹為曠代之悲宋玉則招屈之魂明君之失恐禍及身遂假高唐之夢以感襄王非真夢也我公作神女之詩思神女之會惟慮成夢亦恐非真李公退慙其文不編集於卷該聞録云段文昌鎮成都子成式好獵丞相患之成式以所獲雉分送幕僚各致書援引故事甚悉幕僚多不曉其意以呈丞相方知其子博學成式酉陽雜爼云故相李公賞揚州秀才蒯希逸詩蟾蜍醉裏破蝴蝶夢中殘每坐吟之豫請客各吟近日佳句因記蜀中客龎季豫每云寒雲生意滿秋草長難高之句楚水巴山煙雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑蘿此劉禹錫竹枝詞也紇那當時曲名劉詩翻南調為北調二字皆叶平聲此隨方轉言也楊栁枝詞有三條陌上拂金羈萬里橋邊映酒旗此日令人腸欲斷不堪將入笛中吹此閬中滕邁之作而劉采春歌之也藕花衫子桞花裙多著沈香慢火薰惆悵裝成君不見空教緑綺伴文君此李餘臨邛怨也玉淪江上雨絲絲公子遊春醉不知剪渡歸來風正急水濺鞍帕嫩鵝兒此餘寒食詩也餘成都人元微之稱蜀士李餘劉猛工為新樂府餘詩僅傳二首出絶句演義按汶江謂之玉淪江唐學士元庭堅左遷遂州參軍讀書郊外忽見有人身而鳥首來造者曰吾衆鳥之主也聞君好音律故來見君因留數朝教以音律清濁庭堅後遂著韻英今遂寧鳳臺鋪有遺迹金堂三學山盤陀石上刻詩一首云拔地山巒秀排空殿閣斜雲共數州雨樹獻九天花夜月摩峯頂秋鐘徹海涯長松拂星漢一一是仙槎下注作者姓名年代要非唐人不能辦也本刻九天二字提頭想必隨駕入蜀者徐耕成都人生二女皆國色教之為詩有藻思王建入蜀開之納於後房生衍及衍嗣位尊為太后太妃同衍禱青城山遊丈人觀元都觀金華宫丹景山至德寺各有倡和詩刻石次至漢州三學山夜看燈太后詩曰周遊靈境散幽情千里江山暫得行所恨風光看未足却驅金翠入龜城太妃詩曰翠驛江亭近蜀京夢魂猶是在青城比來出看江山景却被江山見出行僧貫休入蜀上王建詩曰一瓶一鉢垂垂老萬水千山得得來建大悅賜號禪月因名為得得和尚偽蜀武成二年王建遊龍華禪院召貫休賜坐及茶藥綵段仍令口誦近詩時諸王貴戚皆在貫休欲調之因誦公子行曰錦衣鮮華手擎鶻間行氣貌多輕忽稼穡艱難總不知五帝三王是何物建稱善貴幸皆惡之貫休本蘭溪人善詩與齊已齊名有西嶽集十卷王蜀樞密使潘岏字凝夢溺於美妾解愁夙恙成疾解愁姓趙氏其母夢吐海棠花蘂而生有國色善為新聲又工小詞建嘗至岏第見之謂曰朕宫無如此人意欲取之岏曰此臣下賤人不敢以薦於君其實靳之弟峭謂曰緑珠之禍可不戒耶岏曰人生貴於適志豈能愛死而自不足於心耶人皆服其有守王蜀相周庠初在邛南幕中留司府事時臨邛縣送失火人黃崇嘏才下獄便貢詩一章曰偶離幽隱住臨邛行止堅貞比澗松何事政清如水鏡絆他野鶴向深籠周遂召見稱鄉貢進士年二十許祇對詳敏即令釋放後數日獻歌周極竒之召於學院與諸生日相伴善碁琴妙書畫翌日薦攝府司尹參軍頗有三語之稱胥吏畏服案牘麗明周既重其英聰又美其風采在任將逾一載遂欲以女妻之崇嘏又袖封狀謝仍貢幕府若容為坦腹願天速變作男兒詩一篇周覽詩驚駭不已遂召見詰問乃黃使君之女幼失覆蔭惟與老妳同居元未從人周益仰貞潔郡內咸歎異旋乞罷歸臨邛之舊隱竟莫知存亡焉唐張元寶貞元間詩人詩多不傳唯有寒食詩一首寒食清明倍惘然海棠風落小花鈿如今獨有孤魂在半落嘉陵半錦川五代眉山楊義方舉進士仕蜀長於詩自以才過羅隱嘗有春詩云海邊紅日半離水天外暖風輕到花乾德五年重陽王衍宴羣臣於宣華殿夜分未罷衍自唱韓琮栁枝詞曰梁苑隋隄事已空萬條猶舞舊春風何須思想千年事惟見楊花入漢宫內侍朱光溥詠胡僧詩曰吳王恃霸棄雄才貪向姑蘇醉緑醅不覺錢塘江月上一宵西送越兵來衍聞之不樂於是罷宴後梁秦隴間謠􅥫􅥫引黑牛天差不自由但看戊寅歲揚在蜀江頭朝野僉載曰竹𪕋生深山取之甚艱秦隴之地此物爭出或穿墉壞城或自門闥而入犬食不盡則並入人家房內泰民之口腹飫焉故童謠云云庚午歲劉知佼叛梁入秦天水入蜀王建殺之粉其骨揚入蜀江正戊寅歲也王建據蜀之後有一僧常持大帚每過即汛掃人以掃地和尚目之掃畢輒寫云水行仙怕秦川其後王衍秦川之禍人方悟水行仙衍字也孟蜀廣政元年上已昶遊大慈寺宴從官於玉溪院賦詩十二年遊浣花溪御龍舟觀水嬉珠翠綺羅名花異卉環列十里人望之如神仙之境昶曰曲江金殿鎖千門殆未及此兵部尚書王廷圭賦詩十字水中分島嶼數重花外見樓臺昶稱善久之孟蜀後主崇尚六經恐石經本傳流不廣乃易為木板宋世稱刻本書始於蜀也昶嘗曰我不效王衍作輕薄小詞乃敇史館集古今韻會五百卷惜不傳今所傳昭武黃公邵者乃輯略耳正德戊寅豫訪余方池編修於武侯祠見壁間有詩云劍江春水緑沄沄五丈原頭日又曛舊業未能歸後主大星先已落前軍南陽祠宇空秋草西蜀關山隔暮雲正統不慙傳萬古莫將成敗論三分後有題云此詩始終皆武侯事子美或未過之惜不知其名氏乩仙詩每每有佳者蓋文人之沈魂滯魄所附也周飬春嘗親見朣朧律云露下天高夜未中鼎壷寒魄見朣朧月魂點化三生夢神步遨遊萬里風蘸水溪山凝黛緑醉霜楓葉染丹紅此時正好吟秋興還上蓬萊第一峯楊宜菴見賦一律云鶴駕逺辭春洞口綵雲常護畫樓頭書案時親周孔面琴書日寫水山愁栁隄帶露間鶯語明月依林照鶴眸幾回欲傍浮鷗去又遇黃梁對笛遊其情狀皆可想見宜菴又云太和吳臯河名懋李中溪之壻也作順慶三府卒於官有年矣一日附箕題云辛苦一官竟殞身吾鄉猶有未招魂月明空傍寒以鴉宿風冷徒依野樹吟百姓未能沾厚澤微軀何報朝廷託君為向僚寅説好把幽人念一聲時胡廬山督學感此遂入名宦祀少海任太史嘗葛巾訪僧於山寺行者固求名姓公書絶句於壁云兩字虛名動五湖等間不許俗人呼山僧若問真消息天子臺前講御書其師歸讀之知其為任內翰也走謝之會試歲有羣友北上舟次赤壁者月夜慕東坡故事狂歌醵飲聲逹於黃州守禦者次蚤走卒持牌行拘乃即牌隂草一律覆云舟泊蘆花淺水溪友人約我泛清巵高歌赤壁兩篇賦正是黃州半夜時城上將軍隂有約江邊士子總無知君侯若問真消息曾有芳劉名到鳳池卒持覆州守遂躬謝而厚禮之又內江怡溪僉憲為書生時家極貧授徒於一村叟家叟一日以襁褓孫戲云候大為公門徒公忿然曰我豈終於此乎題云飲馬清河日已長神機忽動月樓觴卷懷道義山河重出手經綸社稷康陳蔡得天須孔法會稽生伯敢吳忘英雄轉眼風光别莫負鄉人笑老狂遂拂袖而去蜀龍州土酋薛兆乾曽書一揮使扇云我有龍泉藏寶匣令人肝膽盡皆寒一朝提入中郎帳百萬羣雄孰敢當蓋述吕純陽詩余初不知見而驚嘆以示窗友高子藩山藩山時亦總角驚曰此人反狀形矣必有大僇後果然其亦億中乎連然郡得册頁一本皆書畫名筆蓋正德間物也上有豫章李士實及范香溪題蟹詩士實題云潮落灘高天色寒悄無人語到江干鏦縱兵甲鳴相應萬里橫行信不難觀此則士實佐濠為逆之本態露矣香溪題云橫行蠧稻雄稱鬭虎貪婪無厭化作田鼠吾將斫爾螯折爾股以除農殃分酣我醑此語似逆知其無君而誅之也愚按潮落天寒言其時之戚也悄無人語言謀之靜治也兵甲橫行言強不可禦也然取象於蟹何由萬里乎卒之支解族滅信如香溪斫螯折股之説矣可慨哉少海任太史公館閣仙才也善長對聯其題清泉寺云水國中孤峯倒影似青螺浮鏡雄劒插空此江山天南第一煙霞外萬事忘機但短笛吹雲素琴彈月這漁樵海內無雙題浮橋云江關雄棧聯屯畫舫千尋直穿雲霧通三峽天塹長虹鎖斷滄波萬頃不放春光下五湖又神京西下八千里見烏鵲橫江夾岸煙花迎使節閬苑南來第一橋象螭龍飲渭中天雲霧擁仙槎題書舍云杜陵草堂大如斗海內知名又何須畫棟飛雲珠簾捲雨王粲江樓不索錢書中有屋但願爾門庭奏賦虎觀橫經别墅云大江東去浪淘盡千古英雄問樓外青山山外暮雲何處是秦宫漢闕小院春深鶯喚起一簾風月向花邊紅雨雨邊煙樹此中有舜日堯天又大江東下一片石鏖盡英雄説甚玉堂金馬明月夜來數聲笛吹散星斗公然閬苑神仙敘珙僧印滿大千江安人初不知書因讀觀音經有悟遂能文有僧指八角磨盤七重行樹於室者渠演之曰大道原空八角磨盤何處轉本來非有七重行樹不須栽題水際觀音閣云曇影一江兜率院天凝水月身香五分婆羅門女散旃檀題懺筵云旋懺旋為若是不為何用懺非空非色但凡有色豈成空佛殿云皇朝大一統三教敷崇天子夀萬年億兆稱頌僧舍云補衲迎紅日開窗堆白雲又佛閣云白日住虛空千古慧光彌宇宙金身來淨土三乘祕典遍河沙又題文昌祠云半壁拱天心開北極圖書洞府六星明斗上應人間豪傑昌期開口皆佳句也因憶巴中嘗有道人號雪蓑者不知何許人詩文竒妙無塵俗語士夫爭竒之嘗揭一聯於室曰雪裏披蓑寒動一天星斗雲間補衲暖回大地山河塵市有此等見解哉嘗聞成都長老言曩溫少保修南宅於金津役里坊笞詈不輟實冢器公督之一日有老者運土畚至稍遲又將笞老者詭而言曰某取土最逺力竭矣懇宥之冢器公曰取自何所曰取自萬閣老之室公愀然遂遣里坊之役又某巡撫者索米醋於錦官驛時應役者金堂杜刑部之裔以醋獻怒其不佳也重箠之其人受杖訖斂衣泣詬曰此祖公之遺我也巡撫公因詰之其人曰吾祖杜銘為尚書不知威刑刻薄作何狀使我等受報如此巡撫蹙然遂不復有所索二事大略相似可為恃勢陵人者戒今古人不相及豈但百年即十數載後人心之愈趨愈下有若江河者因憶成都范浣溪翁與弟鹿溪漁舟俱友趙某趙鄉薦未仕而卒范公昆弟即倡率友人輩輪月授廪於其妻子其妻杜得以完節厥子亦補府庠生此嘉靖年事也又半江祝公仕至户部主政宦資頗富而厥嗣最愚公寢疾悉以篋笥屬之鳳野何公何公遊宦又寄之鹿溪漁舟時半江公殁十數年矣祝子愚日甚然有慧男至嘉靖丁卯歲何公悉以所寄委之今試以此求之士夫間或不多得嘗舉此以籌之逹事叟叟胡盧曰甚矣子之迂也利在則萬里靡遙利盡則籓籬弱水蠅逐蜂趨盡為利耳何范諸公安知有不目之為矯嗤之為騃者乎詩讖之説先輩非之確矣然亦有驗之事後如卜如見者曩余庚午北上過淇縣見蔣又溪戊辰下第詩一絶語頗自畫為之戲綴其傍曰莫道瓊枝不可攀東皇青眼正相看來年二月春風裏裝點征鞍作繡鞍及辛未正朔又溪扺都下喜謂余曰曩日詩人為更佳語矣余亦囅然是年會試甫畢又溪以母病遄歸中途得捷報非裝點征鞍作繡鞍乎癸酉馬鳯麓北上過岐陽寄詩於郿且極羡詞林之盛余屬和之末云詞林勝槩何庸羡鳳閣應須屬大工甲戌鳯麓登第考館不與而主政工部以修乾清宫著績又劉晴川作諭太平署東鄉縣遷安寧學正客有送之詩者云錦江春色來何暮灧澦波濤興蚤收立焉郊原重候郭投錢山谷好遺劉晴川三任遇余始得薦揚春之暮也以太平去官非灩澦波濤乎時蜀文宗郭夢菊舊夔守也四句皆曲中又竒哉宋江古心知吉州兼提舉就任改除江西漕使舟經臨江慧力寺前風濤大作舟人恐請燒香許願古心索紙筆書一詩云萬里為官徹底清舟中行止甚分明如今若有虧心事一任碧波深處沈詩才投江浪即恬靜徑逹洪都周太愚仁夀縣人自安肅令升雲南劍州牧甫報至即被論挈家歸渡黃河舟人以風濤止之太愚吟一絶云試將心事白河神五年常祿半千金若教此外苞苴入擬向洪濤一棹沈遂逆風而渡得無恙殆亦有江古心之風乎丁丑春余自靈臺攜得僕三𨽻一篋馳馬赴滇以兩晝夜出棧閣客有愛余者以鬼虎盜危之余答以韻語云千里雲關兩夜驅勞君為我慮瞿瞿青萍腰匣愁隅虎九曜胸藏逐野狐點檢行囊無别物僅收宦劄并衣襦緑林客遇應相笑此亦三秦令尹乎雖不敢希蹤先哲要亦心頭無愧也保寧别駕師公名道立者由甲第任鹽城縣尹以水災不待奏報而徑蠲民賦民德之然以此僅得授若官亦殆矣常格寧有是哉曾署內江事時都蠻亂撫臺檄之軍中以病辭然喜談長生久視之術習誦石杏林詩語大州翁嘗贈以詩云官輕東海三年水病懶西川六月師作吏風塵思度世參同玄搆識篇詩曾白村為余言有高士某者隱居善吟嘗中秋無酒對月吟云隔籬呼酒來烹芋又恐鄰家索酒錢不如與妻商確定閉門推出月還天真曠達者哉詹香山綿竹縣人為余言某寺有古柏一株縣令將伐之造署蜀人莫敢逆者寺有老僧題一絶於樹云定知此去棟梁材無復清隂覆緑苔只恐深山明月夜誤他千里鶴歸來縣令見之惻然而止又某節婦者哭夫瞽目老而殂有子登第痛母之無聞也以詩丏傳於一老先生云其薑我母若為儔我母何曾讀柏舟一點丹心隨父死百年殘喘為孤留啼乾血淚雲生眼歷盡艱難雪滿頭願借一言徵萬古青山不負老荒丘此詩字字酸辛可泣鬼神苦心之語哉香山云動人語不在多贅如朱仙鎮嶽武穆祠對聯云中原百戰回戈地萬里孤忠飲恨祠又湯隂嶽廟云殺身已植君臣義生氣常來父母邦人讀之未有不感動者升菴太史題聖燈寺云蒼煙叢裏聖燈紅火齊營軍照逺空元是楓林霜葉下露華光泫月明中又題峩眉山佛鳥云佛現佛現鳥語易隨人意變山川發晶熒草木呈蔥蒨坐使遊人心目亂佛現佛現觀二詩以放光事為誕妄矣及觀李中溪遊雞足山記云正當六月詣巖殿致禱俄頃見兜羅錦雲緬平一面宛如玉地有大圓光倚立玉地之上外暈七重每重五色環中虛明如鏡凝觀者各見自身現於鏡中毛髮可數舉手動足影亦如之衆人同止唯見己身不見傍人僧云攝身光也有頃光沒風起壑中雲氣散盡林巒敗色鮮姸奪目復出一光如大虹霓光缺此光圓如水晶映物僧謂此佛光也同行又見平雲上有二銀船檣柁皆具如人掉之云劉小鶴公亦云守隴右時一日午衙陡聽街民盛傳佛現起視之錦雲罩一新寺天花閃爍而墜異哉綿竹詹香山為西鄉令時上吏某者索賄於屬官最苦公清介獨無所奉乃首被其窘折殊甚公怡然久之拂袖去作愁虎吟以刺之云一入漢南如虎穴西鄉虎穴更還深黃昏黑夜嘗驚犬白日青天不怕人使我小心防出入任他大膽自縱橫不知世有周公否猛獸能驅見太平此詩當不減巷伯哉杜工部和裴迪登州東亭送客逢早梅相憶見寄詩云東閣官梅動詩興還如何遜在揚州按遜傳無揚州事而遜集亦無揚州梅花詩但有早梅詩云兔園標節序驚時最是梅銜霜當路發映雪凝寒開枝橫却月觀花繞凌風臺應知早飄落故逐上春來杜公以裴迪逢早梅而作詩故用何遜比之又以却月凌風皆揚州臺觀名耳所謂東閣官梅者乃新津之地非揚州有東閣也宋世有妄人假東坡名作杜詩注一卷刻之一時爭尚杜詩而坡公名重天下人爭傳之而不知其偽也其注此詩云遜作揚州法曹廨舍有梅一株遜吟咏其下後居洛思之因請再任及抵揚州梅花盛開相對倣佛終日按何遜未嘗為揚州法曹是時南北分裂遜為梁臣何得後居洛陽洛陽乃魏地也既居魏何得又請再任請於梁乎請於魏乎其説之脫空無稽如此偽蘇中如謂不分桃花紅勝錦為李夫人之語十年厭見旌旗紅為四皓語皆架空妄説如盲人風漠之言然猶借古人名也又謂碧山學士為梁章褒又昏黑應須到上頭為隋常琮語並人名亦杜撰之又妄撰景差五言律一聯尤可笑蘇李始有五言古詩而楚襄王時乃有五言律乎其人信白丁也而讀者不之悟其奈之何杜詩關山同一點點字絶妙東坡亦極愛之作洞仙歌云一點明月窺人用其語也赤壁賦云山高月小用其意也今書坊夲改點作照語意索然且關山同一照小兒亦能之何必杜公也幸草堂詩餘注可證蜀中杜處士好書畫所寶以百數有戴嵩牛一軸尤所愛錦囊玉軸常以自隨一日曝書畫有牧童見之撫掌笑曰此畫鬭牛也牛鬭力在角尾搐入兩股間今乃掉尾而鬭謬矣處士笑而然之古語云耕當問奴織當問婢不可改也亡友安公石嘉州人妙於集句以鱸魚正美不歸去對瘦馬獨吟真可哀又請君酌我一斗酒與爾同消萬古愁又梁間燕子聞長歎帆楓樓上花枝笑獨眠水國蓮花府翃雲樹林又集杜句弔葉叔晦讀者為之泣下其詩云臨江把臂難再得便與先生成永訣文章曹植波浪濶死為星辰亦不滅老去新詩誰與傳男兒性命絶可憐出門轉盼已陳迹山中妻子哭向天中夜起坐萬感集人生有情淚沾臆鳳凰麒麟安在哉石田茅屋荒蒼苔君不見赤牆日色晚悲風為我從天來合璧事類載杜工部詩云三月雪連夜未應傷物華只緣春欲盡留著伴梨花此詩舊集不載又寒食少天氣春風多栁花又小桃知客意寒盡始開花則今之全集遺逸多矣坡公亟稱文與可之詩而士罕傳丹淵集余家有之其五言律有韋蘇州孟襄陽之風信坡公不虛賞也今録其數首於此詠間樂云晝睡欲過午好風吹竹床溪雲生薄暮山雨送微涼粉裛衣裳潤蘭薰枕席香歸來間且樂多謝墨君堂過友人溪居云籬巷隔菰蒲間扉掩自娛水蟲行插岸林鳥過提壺白浪搖秋艇青煙蓋晚廚主人誇野飯為我煮秋鱸晚次江上云宛轉下江岸霜風繞人衣翩翩渚鴻壓閃閃林鴉歸前壑已重靄遠峯猶落暉孤舟欲何向擘浪去如飛玉峯園避暑值雨云南園避中伏意適晚忘歸牆外谷雲起簷前山雨飛興饒思秉燭坐久欲添衣為愛東岩下泉聲通翠微極寒云燈火宜冬杪圖書稱夜長簾鈎挂新月窗紙漏飛霜酒醴慙孤宦氊裘逐異鄉誰知舊山下梅艷滿東牆江上主人云客路逢江國人家占畫圖青林隨逺岸白水滿平湖魚小猶論尺鷗輕欲問銖何時遂休去來此伴潛夫詠梨花云素質靜相依清香暖更飛笑從風外歇啼向雨中歸江令歌瓊樹甄妃夢玉衣畫堂明月地常此借芳菲詠杏花云仙杏一番新妖嬈洗露晨待粧嫌粉重欲點要酥勻月淡斜分影池清倒寫真君須憐舊物曾伴曲江春此八詩置之開元諸公集中殆不可别今曰宋無詩豈其然乎蘇東坡詩八首大率皆田中語其第四首云種稻清明前樂事我能數晴空暗春澤計水聞好語分秧及初夏漸喜風葉舉月明看露上一一珠垂縷秋來霜穗重顚倒相撑柱但聞畦壠間蚱蜢如風雨新春便入甄玉粒照筐筥云此詩敘田家自清明至成熟曲盡其趣注未盡發其妙今補之於左漸喜風葉舉秧初立苖後得風則長吕氏春秋所謂禾心中央疏為冷風是也月明看露上農夫云秧苗得露皆先潤其根由根上節至葉稍埀一點月明窺見其上洪舜俞平齋集有魏城晚涼倚窗觀稼二絶云晚風不動稻苖平葉葉頭邉沆瀣明井養不窮功用在誰將易象細推評又飛明一點上苖端難作尋常露雨看碧眼道人參解得黃河夜半泝崑湍以此補坡詩注真妙也此事竒坡詩詠之竒平齋二詩注之又竒特表出之瑞香花即楚辭所謂露甲也一名錦薰籠又名錦被堆韓魏公詩云不管鶯聲向曉催錦衾春曉尚成堆香紅若解知人意睡取東君莫放回張圖之改瑞香為睡香詩云曾向廬山睡裏聞風香占斷世間春採花莫撲枝頭蝶驚覺陽臺夢裏人陳子昂詩宣和殿裏春風早紅錦薰籠二月時流落人間真詫事九秋風露却相宜蓋詠九日瑞香也余亦有詩云小屏殘夢暖香中花氣撩人怯曉風繡被堆春蝴蝶散開簾忽見錦薰籠又唐人詩云誰將玉膽薔薇水新濯瓊肌錦繡襌體物既工用韻又竒可謂絶唱矣東坡云老杜自秦川越成都所歷輒作一詩數千里山川在人目中古今詩人殆無其比明皇遣吳道子畫蜀山川歸對大同殿索其畫無有曰在臣腹中請匹素寫之半日都畢後明皇幸蜀經其地無不與畫吻合因知道子之神竒也丁未年彭州倅鄭昭請張野人道隱圖真龍於城西天山府君之祠為民致雨於是道隱與二道秉燭以畫使人捶鼓噴笛頓足起舞其夕三更果風雨大沛奈何一時之戲亦濟農事蔣貽恭留詩曰世人空解競丹青惟子通元得墨靈應有鬼神看下筆豈無風雨助成形威疑噴浪歸滄海勢欲拿雲上杳冥靜閉緑窗深夜後曉來簾幕似聞腥道隱不事談論不與人交往不冠帶不拜跪人謂之探頭相國李昊為著名道隱平生讀莊老之書性好圖龍興思忽至即畫百尺之狀任意揮寫飄飄然雲隂雨氣似蜿蜒之勢擲筆撫掌以此為適撰進龍證筆訣三卷傳於家建隆初有人泊舟巴峽夜聞人詠曰秋徑堆黃葉懸崖露草根猿聲一呌斷客淚數重痕通宵凡吟百過又有梁伯升者肄業廢宅中夢一女子緑裙紅袖呼梁君聽妾幽恨之句詩曰卜得上峽日秋來風浪多江陵一夜雨腸斷木蘭歌張乖崖公布衣時素善陳摶嘗因夜話謂摶曰我欲分先生華山一半住得無摶曰餘人則不可先輩則可及旦取别摶以宣亳十枝白雲臺墨一劑蜀箋一角為贈公謂摶曰會得先生意取某入閙處去曰珍重摶送公回謂弟子曰斯人無情於物逹則為公卿不逹為王者師公常感之後尹蜀乘傳過華隂寄摶詩曰性愚不肯林泉住強要清流擬致君今日星馳劔南去回頭慚愧華山雲又傳公席上贈官妓小英歌曰天教摶百媚相映明如花住近桃花坊正面門庭掩映如仙家美人宜稱言不得龍腦薰衣香入骨維楊軟縠如雲英亳郡輕紗似蟬翼我疑天上婺女星之精偷入筵中名小英又疑王母侍兒初失意謫向人間為歌妓不然何得膚如紅玉初碾成眼似秋波雙臉橫舞熊因風欲飛去歌聲遏雲長且清有時歌罷下香砌幾人魂魄遙相驚人看小英心已足我見小英心未足為我高歌送一杯我今贈汝新翻曲按公鐡石心人在蜀娶婢三年後歸其父猶然完璧此詩亦靖節間情廣平梅花之意也然歲華紀麗稱浣花人遊江起於公蓋亦不厭遊戲云方輿勝覽載公在蜀有録曹參軍老病廢事公責之曰何故不歸明日參軍求去且以詩留别其略云秋光多似宦情薄山色不如歸興濃公驚歎曰吾過矣同僚能詩而吾不知乃留而慰薦之蜀人魏野從萊公遊陜府僧舍各有留題後復同遊見萊公詩已用碧紗籠護而野詩獨否塵昏滿壁時有從行官妓頗慧點即以袂就拂之野徐曰若得常將紅袖拂也應勝似碧紗籠萊公大笑文彥博慶厯間知益州多燕集有飛語至京師御史何郯聖從謁告歸里上遣伺察之張俞少愚潞公客也迎見聖從於漢州有官妓楊姓者善舞聖從喜之少愚因取項帕題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作陽臺栁舞盡香風萬萬條後數日聖從至成都頗嚴重一日潞公大作樂以宴之迎此妓雜府妓中歌少愚之詩以酌聖從每為之醉及還朝潞公之謗乃息此與陶穀使江南事頗同范景仁鎮喜為詩年六十三致仕一朝思鄉里遂輕行入蜀故人李才元大臨知梓州景仁枉道過之歸至成都日與鄉人樂飲散財於親舊之貧者遂遊峩眉青城山下巫峽出荆門凡期歲乃還京師在道作詩凡二百五篇其一聯云不學鄉人誇駟馬未饒吾祖泛扁舟此二事他人所不能用也仁夀龍昌期初謁王荆公安石投刺稱詩人左右曰何物書生敢於丞相前稱詩人耶公揖之入值軍人運沙遂命賦此應聲云茫茫黃出塞漠漠白鋪汀鳥去風平篆潮回日射星公大稱賞之老泉攜東坡潁濵謁文定公時方習制科業將應詔文定公忽出題令人持與坡潁云請學士擬試文定密於壁間窺之兩公得題各就坐致思潁於一題有疑指以示坡坡不言但舉筆倒敲几上云管子注潁濵疑而未決又指其次東坡一筆勾去即擬撰出以納文定閲其文益喜勾去一題乃無出處文定欲試之也次日文定見老泉云二子皆天才長者明敏尤可愛然少者謹重成就或過之所以二公受知文定而潁濵感之尤深蘇明允至和間來京師既為歐陽文忠公所知其名翕然韓忠憲諸公皆待以上客嘗遇重陽忠憲置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為異禮席間賦詩明允有佳節屢從愁裏過壯心時傍醉中來之句其意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文如讀易詩云誰為善相因嫌瘦後有知音可廢彈婉而不迫哀而不傷所作自不必多也東坡送戴蒙赴成都玊局觀詩云拾遺被酒行歌處野橋官栁西郊路聞道華陽版籍中至今尚有城南杜費著氏族譜稱少陵之後者係宗武所傳豫閲眉州志杜莘老青神人甫十三世孫東坡後亦提舉玉局觀未赴東坡云趙伯成家有麗人僕忝鄉人不肯開樽徒吟春雪美句因次其韻一笑詩云朱簾繡户未曾開誰見梅花落鏡臺試問高吟三十韻何如低唱兩三杯莫嫌衰鬢聊相映須得纎腰與共回知道文君隔青鎖梁園賦客肯言才仍自注其末聊答來句義取婦人而已罪過罪過蘇小妹老蘇先生之女幼而好學慷慨能文適其母兄程濬之子之才先生有詩曰汝母之兄汝伯舅求以厥子來結姻鄉人嫁娶重母族雖我不肯將安云人言蘇子無妹却有此詩文同與可蜀人與蘇子瞻厚為人靜深超然不攖世故善畫墨竹作詩騷亦過人熙寧初時論既不一士大夫好惡紛然同在館閣未嘗有所向背時子瞻數上書論天下事退而與賓客言亦多以時事為譏誚同極以為不然每苦口力戒之子瞻不能聽也出為杭州通判同送行詩云北客若來休問事西湖雖好莫吟詩及黃州之謫正坐杭州詩語人以為知言大邑鶴鳴觀所謂張天師鶴鳴化也其東北絶頂又有上清宫壁間有文與可題一絶曰天氣隂隂别作寒夕陽林下動歸鞍忽聞人報後山雪更上上清宫上看漢嘉城西北山麓有一石洞泉出其間時聞洞中泉滴聲良久一滴清如金石黃魯直題詩云古人題作東丁水自古東丁直到今我為改名方響洞要知山水有清音紹聖二年四月甲申山谷以史事謫黔南道間作竹枝詞二篇題歌羅驛曰撑崖柱谷蝮蛇愁入箐攀天猿掉頭鬼門關外莫言逺五十三驛是皇州浮雲一百八盤縈落日四十九渡明鬼門關外莫言逺四海一家皆弟兄自書其後曰古樂府有巴東三峽巫峽長猿鳴三聲淚沾裳但以抑怨之音和為數疊惜其聲今不傳余自荆州峽入黔中備嘗山川險阻因作三疊傳與巴娘令以竹枝歌之前一疊可和云鬼門關外莫言逺五十三驛是皇州後一疊可和云鬼門關外莫言逺四海一家皆弟兄或用四句入陽關小秦王亦可歌也是夜宿於驛夢李白相見於山間曰豫往謫夜郎於此聞杜鵑作竹枝詞三疊世傳之不豫細憶集中無有三誦而使之傳焉其詞曰一聲望帝花片飛萬里明妃雪打圍馬上行人那解聽琵琶應道不如歸竹竿坡面蛇倒退摩圍山腰猢猻愁杜鵑無血可續淚何日金雞赦九州涪翁過瀘南瀘帥留府會有官妓盼盼帥嘗寵之涪翁贈浣沙溪詞曰腳上鞾兒四寸羅唇邊朱麝一櫻多見人無語但廽波料得有心憐宋玉祇因無奈楚襄何今生有分向伊麼盼盼拜謝涪翁瀘帥令唱詞侑觴唱惜春容涪翁大喜醉飲而别陸放翁之蜀宿一驛中見題壁云玉階蟋蟀閙清夜金井梧桐辭故枝一枕淒涼眠不得呼燈起作感秋詩放翁詢之驛卒女也遂納為妾方餘半歲夫人逐之妾賦卜算子云只知眉上愁不識愁來路窗外有芭蕉陳陳黃昏雨曉起理殘粧整頓教愁去不合畫春山依舊留愁住放翁在蜀日有所盼嘗賦詩云碧玉當年未破瓜學成歌舞入侯家如今憔悴蓬窗底飛上青天桐落花出蜀後每懷舊遊多見之賦詠有云金鞭朱彈憶春遊萬里橋東罨畫樓夢倩晚風吹不斷書慿春雁寄無由鏡中顔髮今如此席上賔朋好在不筐有吳箋三百箇擬將細事寫春愁又云裘馬清狂錦水濵最繁華地作間人金壺投箭消長日翠袖傳杯領好春幽鳥語隨歌處拍落花鋪作舞時茵悠然自適君知否身與浮名孰是親又以此詩櫽括作風入松云十年裘馬錦江濵酒隱紅塵黃金選勝鶯花海倚疏狂驅使青春吹笛魚龍盡出題詩風月俱新自憐華髮滿紗巾猶是官身鳳樓曾記當年語問浮名何似身親欲寫吳箋説與這回真箇間人韓駒詩題云仙泉虞童子郎使者聞諸朝三年不加考故作二絶以贈之歸七歲瀾翻數萬言飢鷹引子望騰鶱時人不識甘羅輩寂寞題詩歸故園又不作西京童子郎時人何事識黃香還家再誦五千卷十八重來謁太常按此即漢時童子郎明初嘗有此選蜀中相傳成𢎞間新都楊文忠亦在選列唐子西嘗見桃李盛開而梅尚存數枝因作詩時張無盡天覺被召乃以詩投之云桃花能紅李能白春來何處無顔色不應尚有一枝梅可是東君苦留客向來開處當嚴冬桃李未在交遊中只今已是丈夫行勿與少年爭春風無盡大加稱賞李燾過成都淨名院曰觸目都似曾到問訊乃非也其自題龍鵠山房詩云已作清時鳥亂飛杜鵑更勸阿誰歸似嫌住處猶城郭不解攜家隱翠微極有風韻可想謝慧卿巴謝氏女也頗能詩雖不盡合亦一方之秀有竊仙自樂詩云尋得桃源可悟仙丹書惟恐鳳飛傳雨收峯頂雲歸洞風到池塘月滿天清脫可喜有閨餘集題咏甚富成都女郎張窈窕上任事者詩云昨日買衣裳今日賣衣裳衣裳都賣盡羞見嫁時廂有賣愁應緩無時心轉傷故園戎馬隔何處是蠶桑閬中夀聖院僧沖古者工於詩其挽光獻太后云昔補一天成大業晚扶雙日耀重離有詩三百餘篇題曰錦屏集又僧惟聰能詩曾賦春隂云好花分日少間草占春多亦佳句也沖古眉陽人蜀僧號峩眉道者戒律甚嚴不下山二十年一日有布衣青裘昻然一偉人來與語良久期以明年是日復相見於此願少見待明年是日方午道者沐浴端坐而逝至暮偉人果來問道者安在曰亡矣偉人歎息良久書數語堂側壁間絶高處語云落日斜西風冷幽人今夜來不來教人立盡梧桐影字畫飛動如翔鸞舞鳳非世間筆也或云吕洞賓作蜀僧希晝遊雁蕩山云天長來月正木末渡猿稀答黃桂州云來書逢歲嗣去夢歷峯危送廣漕云春生桂嶺外人在海門西送僧歸東云帆影先寒雁經聲隱暮潮送承旨林亭云雪澑垂危石棋燈射逺林贈僧云潄齒冰溪逺聞蟬雲屋深送人云玉繩天闕近金柝海城秋贈勾學士云曉天金馬路晚歲石霜心寄人云山日秋光短江虹晚影低送新津尉云劒月啼猿苦江沙濯錦寒北宫書亭云花露盈蟲穴梁塵墮燕泥贈關上人云寄禪關樹老乞食塞城荒送僧歸云風泉舊聽僧窗改雲火曽行鳥徑殘春山云芳樹侵雲老孤泉落石危送人歸南海云落日橫秋島寒濤兀夜船漢州崇聖寺寒食日忽有朱衣一人紫衣一人氣貌甚偉驅殿僕馬極盛寺僧謂州官至奔出迎接皆非也與僧揖甚恭惟少言語命筆各題一絶句於壁朱衣詩曰禁煙佳節同遊此正值荼夾岸香緬想十年前往事強吟風景亂愁腸紫衣詩曰策馬暫尋原上路落花芳草尚依然家亡國破一場夢惆悵又逢寒食天題罷上馬疾去出松徑失其所在但有異香經月不散其詩於今見在李太白詩風吹栁滿店春溫庭筠詠桞詩香隨靜婉歌塵起影伴嬌嬈舞袖垂傳竒詩莫唱踏春陽令人離腸結郎行久不歸栁自飄香雪其實桞花亦有微香詩人之言非誣也瓦屋山徐瀾絶句瓦屋山高雲際來飛巒疊嶂九霄摧興來獨立金剛石雪海孤松翠作堆楊靜綿竹縣治詩通衢砌石蘚生鱗三兩人家屋宇新嚴子有祠存古里魏公無第與比鄰傳訛但説千年樹問話那逢百歲人回首向來佳麗地暮雲斜日紫巖春眉州孟拾遺祠二絶句一章何罪死何名千載惟君與屈平從此蜀江煙雨夜杜鵑應作兩般聲徹翠蓋西蒙駱谷塵尚從奄佞分亡身拾遺竟入玻璃水猶勝汙泥白馬津羅洪載城居憶山四首一日到城郭滿目是飛埃憶我紫山好拂衣歸去來城中豈不佳華屋鱗參差不奈人語喧夢我山與溪溪山素所有新結讀書廬白雲時往來碧樹相蔽虧農夫抱膝嘯村婦餉耕歸鳴鳥在茂樹吠大迎柴扉綿令張文奎前溪庵絶句一線流泉注石矼籬門穿樹不須窗山僧那識王喬令怪見飛鳧落一雙玉壺攜上翠微岑我卧苔茵君自吟别有一般清賞處溪山雲月幾知音孟蜀武德軍節度判官歐陽炯撰花間集序云鏤玉雕瓊擬化工而廽巧裁花剪葉奪春艷以爭鮮是以唱雲謠則金母詞清挹霞醴則穆王心醉名高白雪聲聲而自合鸞歌響遏青雲字字而偏諧鳳律楊栁大隄之句樂府相傳芙蓉曲渚之篇豪家自製莫不爭高門下三千玳瑁之簪競富樽前數十珊瑚之樹則有綺筵公子繡幌佳人遞葉葉之花箋文抽麗錦舉纎纎之玉指拍按香檀不無清絶之辭用助嬌嬈之態自南朝之宫體扇北里之倡風何止言之不文所謂秀而不實有唐已降率土之濵家家之香徑春風寧尋越艷處處之紅樓夜月自鎖嫦娥在明皇朝則有李太白應制清平樂詞四首近代溫飛卿復有金筌集邇來作者無愧前人今衛尉少卿字𢎞基以拾翠洲邊自得羽毛之異織綃泉底獨殊機杼之功廣會衆賔時延佳論因集近來詩客曲子詞五百首分為十卷以炯粗預知音辱請命題仍為序引昔郢人有歌陽春者號為絶唱乃命之為花間集庶以陽春之甲將使西園英哲用資羽蓋之歡南國嬋娟休唱蓮舟之引時大蜀廣政三年夏四月日序司馬相如有封襌詩四篇其一曰自我天覆雲之油油甘露時雨厥壤可遊滋液滲漉何生不育嘉榖六穗我穡曷蓄非惟雨之又潤澤之非惟遍之我泛布護之萬物熙熙懷而慕思名山顯位望君之來君乎君乎侯不邁哉其二曰般般之獸樂我君囿白質黑章其儀可嘉􅌈􅌈穆穆君子之態蓋聞其聲今親其來厥塗靡從天瑞之兹亦於舜虞氏以興其三曰濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君輿帝用享祉三代之前蓋未嘗有其四曰宛宛黃龍興德而升采色炫耀煥炳輝煌正陽顯見覺悟黎蒸於傳載之云受命所乘厥之有章不必諄諄依類託寓喻以封巒秦宓逺遊詩曰逺遊何所見所見邈難紀巖穴非我鄰林麓無知己虎則豹之兄鷹則鷂之弟困獸走環岡飛鳥驚巢起猛氣何咆厲隂風起千里逺遊長太息太息逺遊子王褒贈周處士詩我行無歲月征馬屢盤桓崤曲三危阻關重九折難猶持漢使節尚服楚臣冠巢禽疑上幕驚羽畏虛彈飛蓬去不已客思漸無端壯志與時歇生年隨事闌百齡悲促命數客念餘歡雲生隴坻黑桑疏薊北寒鳥道無蹊徑清溪有波瀾思君化羽翮要我鑄金丹梁蕭撝和武陵王遙望道館詩神境留精闕仙居紫翠房今有尋真地迤邐麗通莊九柱含虬重三臺飾夜光金輝碧海桃玉笈紫書方拂筵青鳥集吹簫白鳳翔履存堪是燕石在詎非羊煙霞四照蕊風月五名香於兹喜臨眺願得假霓裳宋慕容百才大劒山排律李勢非嵎虎公孫是井蛙聖朝無外户夷壤盡為家疊嶂寧須鏟停鼖久廢撾原鱗生駱谷鈞駟入彭衙關失千年壯方來萬里遐商淵盈澒洞使節偏谽谺岑蔚誰驚鳥豐茭自樂麚烽屯開雨雪樵爨老煙霞帝德朝宗地仙遊上漢槎賞竒酬酒興摛藻謝詩葩階走楓林葉窗摧柏竹花山亭無刻漏隱几待鳴鴉何景南遊資縣東巖詩人事何時休紛來如野馬相攜解鑣處去約岩之下清涼二城雨况值禳禬罷白雲醉堪眠青草春可藉泉甘嗽蘇醒樹好留間暇頻遊我嘗慣忽至公成乍徘徊共幽興靜坐絺衣挂中間五百士閲世知幾夏莓苔自成古香火仍同社巖縫更依然莫問豐下話李應元登雅州蒙山詩振衣萬仞岡頭路蒙頂蒼蒼倚大羅欲向雲邊看五嶽先從天際揖三峩上清風冷開元室甘露泉空照碧蘿莫謂天台迷舊處青鞋緑杖擬重過劉大謨遊資縣重龍山詩何年卓錫倚層空樓閣遙聯紫極宫曦駕逺馳青海外人家羅列翠煙中虛堂縹眇高僧定小徑微茫下界通盡日徘徊渾不厭虬松鳳竹靄蔥蘢龍昌期三山即事百貨隨潮船入市萬家沽酒市垂簾蒼煙巷陌青榕老白露園林紫蔗甜宋京遊資縣北巖資州城郭雲山裏北巖正在雲山底翠壁嵌空抱月明飛閣橫斜矗天起遊人祇解看城郭不知山底幽人樂六月全無暑氣生三春亦有林花落蒼楠卧月影如輪乳泉濺雹波生鱗利名付與百忙者早晚自由無事身紅蓮幕下青城客五斗留人歸未得衙回不用展山圖直到岩邊看秋色開縣有唐張籍梅溪絶句自愛青梅好行尋一徑斜不教人掃石恐損落來花宋喻汝礪雲安下岩次涪翁四首徑向山腰轉門從水面開片雲岩下宿一鉢朔方來落日鳥衝樹輕隂花覆苔惟應荔枝熟時攝白雲廽路暗松杉密天空霧雨開山容依檻轉鳥影渡江來汲水僧歸寺銜花鹿印苔年年蠶麥熟貧道餟齋來我來二月初荔子花未開僧云此果熟日日公人來自從劉使君樹下生莓苔久欲斫此樹為公且遲廽劉郎年三十見事心孔開雲安十二鄉麥炒相往來市櫩足乾柿印窠生緑苔明年當替去誰挽馬頭廽夾江宿進青溪漁隱詩磷磷溪頭水盤盤雲裏松有水須留月有松須乘風乘風氣清爽留月光璁瓏溪水流不去松濤常鏦鏦此境不易得懷哉漁隱翁漹江排律云天地張機軸隂陽散縝紛鳳梭流日月龍縠捲霞雯織女無庸巧天工豈在勤源頭飛素練流處泄元纁天濶江牽線風清浪皺文花飛明濯錦煙裊暗藏雲誰把并州剪今裁阿錫文峽門疑是束江閣若為縜吞日頳紅見臨崖綷縩聞荇鋪青作褉苔襯緑成裙伯禹殊縫補元明亦暖炘內江劉五清配汪藻之女有寄五清詩旅食京茟歲月多聖賢事業竟如何明年佇聽泥金報間把關睢獨自歌燈夕詩萬里玲瓏漾水晶滿城春色勝蓬瀛君王願坐光明景四海蒼生歌太平趙文肅李夫人舟中詩河水急於箭仙槎去若飛家人應羡我遙自斗邊歸眉州鄧氏適敘州戶部郎金寬亦有寄寬詩鎮日多愁屢廢餐閉門清坐遣應難庭前别我春猶在月下懷君秋已殘幾點落花誰著眼一聲飛雁獨憑欄夢回湘簟無消息更啓前書仔細看成都神鳳儀字子韶少工文流連女色老成勢朽生子俱不全然亦以夀終人謂之異數云客有誦其詠蚊蟲辭云兩翅輕盈楚腰纎細鏗鏗一派笙歌沸黃昏人未掩柴扉潛身悄入羅幃裏侵憐玉體挨傍香肌嘴痕到處胭脂寄耳邉做就百般聲夜深不肯教人眠詞義極工緻天地正大之氣隨物賦豫無處無之故松柏鴻鴈猶完貞介况含靈翕粹號為人者哉嘉靖丙午歲川中大飢川北猶甚有成都一承使自北來過保寧道遇一夫婦餒困待盡者以餅餌之稍稍能起其夫曰願鬻婦以兩全其生婦亦佯許之承使頗悅其姿遂解所攜來肉之類給之挈婦去泣别其夫行數里許即投身岩下死承使懊悔駭愕遂䇿馬亟去歸語親黨如此云張柟漢前將軍關公廟議云今天下事將軍者極天下之媚矣咸誄刀馬譽色鬚不則列之異端之側駕諸三界之上或又旒冠赭衣過為儀仗而嗶咕家又以道脈心傳強蒙之而將軍無如何夫將軍漢人也遇昭烈定布衣交與南陽孔明涿鹿翼德出死力以爭漢鼎危亦屢矣而卒成其志所謂久要不忘事君致身者真其人也當時多讀書能文章如荀彧孔融皆為曹操釣取魚肉之獨公委曲從容以成其節則凡姦宄狐鼠思輸資拜謁以求庇佑豈不謬哉至列為伽藍者吾不悉其何説第思將軍忠義之人於佛氏無父無君自應羞為而謂甘心下之必不然矣明神宗棄人事而重神道濫加封號蓋桓靈後身也夫桓靈昭烈之所恨而將軍肯受其賜乎據漢書將軍好讀左氏春秋獨不喜士大夫蓋摘句尋章不識有漢安足當其一盼耶然則何以事將軍哉為臣思忠結友思義以隻雞甌醪置將軍木主前則得之矣譜宋王宗稷蘇東坡年譜節録月仁宗景祐三年內子十二十九日乙卯時先生生實仁宗即位之十一年按先生送沈逵詩曰嗟我與君皆丙子又按玉局文云十二月十九日東坡生日置酒赤璧磯上又按志林云退之以磨蝎為身宮而僕以磨蝎為命宮若以磨蝎為命推之則為卯時生議者以先生十二月為辛丑月十九日為癸亥日丙子癸亥水向東流故才氣汗漫而澄清子卯相刑晚年多難又志林云韓退之詩我生之辰月宿南斗乃知退之以磨蝎為身宮僕以磨蝎為命宮平生多得謗譽殆同病也先慶厯二年壬午先生七歲知讀書三年癸未生八歲入小學按先生作范文正公文集序云慶厯三年某始入鄉校士有自京師來以魯人石守道慶厯聖德詩示鄉先生某從旁竊觀問先生十一人何人也先生曰童子何用知之某曰此天人也耶則不敢知若亦人耳何為其不可公五年乙酉先生年十歲按子由作先生墓志云生十年而先君宦學四方太夫人親授以書問古今成敗輒能語其要太夫人讀東漢史至范滂傳慨然太息公侍側曰某若為滂夫人亦許之否乎夫人曰汝能為滂吾顧不能為滂母耶又按大全集載東坡少時語云秦少章言東坡十來歲老蘇令作夏侯太初論有人能碎千金之璧不能無失聲於破釡能摶猛虎不能無變色於蜂蠆之語又按趙德麟所編侯鯖録云東坡年十歲見老蘇誦歐公謝宣召赴學士院仍謝賜對衣金帶及馬表老蘇令坡擬之其間有匪伊垂之而帶有餘非敢後也而馬不進老蘇喜曰此子他日當自用之方至和元年甲午先生年十九始娶眉山青神王女按先生作王氏墓志云生十有六歲而歸于某至治平二年而王氏卒二年乙未先生年二十遊成都謁張安道按先生作樂全先生文集序云某年二十以諸生見公成都一見待以國士有鼂美叔是年求交先生按送美叔詩云我生二十無朋儔當時四海一子由君來叩門若有求嘉祐元年丙申先生年二十一舉進士興二年丁酉先生年二十二赴試禮部按先生作國六祖晝贊云余嘉祐初舉進士館於興國寺浴堂院時歐陽文忠公考試得先生刑賞忠厚之至論以為異人欲冠多士疑曾子固所為子固文忠門下士也乃置第二復以春秋對義居第一及殿試章衡榜中進士乙科始見知於歐陽公又按先生作太息一篇送秦少章歸京云昔吾舉進士試名於禮部歐陽文忠公見吾文且曰此我輩人也吾當避之是年四月丁太夫人武陽君程氏憂按司馬溫公作程夫人墓志云夫人以嘉祐二年四月癸丑終於鄉里舟四年己亥先生年二十四服除十二月侍老蘇行適楚按先生南行前集序云己亥之歲待行適楚舟中無事雜然有觸於中而發於咏嘆蓋家君之作與弟轍之文皆在焉謂之南行集簿五年庚子先生年二十五授河南府福昌縣主六年辛丑先生年二十六應中制科入第三等有應制科上兩制書及上富丞相書又有謝應中制科啓授大理評事鳳翔府僉判按先生有感舊詩序云嘉祐中豫與子由奉制䇿寓居懷逺驛時年二十六子由年二十三是年十二月赴鳯翔任與子由别郡七年壬寅先生年二十七官於鳯翔二月有詔吏分往屬縣決囚作詩五百言寄子由先生年二十八官於鳯翔作思治論八年癸卯英宗治平元年甲辰先生年二十九官於鳯翔先二年乙巳先生年三十自鳯翔罷任按子由作生墓志銘云治平二年罷還判登聞鼓院英宗在藩邸聞先生名欲以唐故事召入翰林宰相限以近例召試祕閣皆入三等得直史館是年通義郡君王氏卒於京師三年丙午先生年三十一在京師直史館丁父憂扶護歸蜀按歐陽文忠公作明允墓志云明允太常因革禮書一百卷書成方奏未報而卒英宗聞而傷之命有司具舟載其喪歸葬於蜀四年丁未先生年三十二居服制中以八月壬辰葬老泉於眉州年神宗熙寧元年戊申先生年三十三免喪二己酉先生年三十四還朝監官告院仁三年庚戌先生年三十五監官告院是年范景嘗舉先生充諫官四年辛亥先生年三十六任監官告院兼判尚書祠部王荆公欲變科舉上使兩制三館議之先生獻三言荆公之黨不悅命攝開封府推官有奏罷買燈疏御史知雜事誣奏先生過失先生不辨乞外任避之除通判杭州記五年壬子先生年三十七在杭州是歲有牡丹其序云熙寧五年三月二十三日余從太守沈公觀花於吉祥寺是年科場先生監試八月十七日登望湖樓是日榜出有送杭州進士詩序云熙寧五年錢塘之士貢於禮部者九人十月乙酉宴於中和堂作是詩以勉之十二日運司差先生往湖州相度隄垾利害與湖州太守孫莘老相見有贈莘老七絶六年癸丑先生年三十八在杭州有八月十五觀湖詩寫於安濟亭上及作仁宗飛白記其略云熙寧六年冬以事至姑蘇安簡王公子誨出所賜公端敏二字又有作錢塘六井記其略云熙寧五年太守陳公述古至問民之利病明年春六井畢修故詳其語以告後人運司又差先生往潤州七年甲寅先生年三十九在杭州以子由在濟南求為東州守按子由超然臺賦序云子瞻通守餘杭三年不得代以轍之在濟南也求為東州守既得請高密五月乃有移知密州之命則通判杭已四載矣八年乙卯先生年四十到密州任有上韓丞相論災傷書到任二十餘日又論密州鹽稅九年丙辰先生年四十一在密州任中十年丁巳先生年四十二在密州任就差知河府已而改知徐州四月赴徐州任徐州水患大作七月十七日河決澶州曹村八月二十一日及徐州城下先生治水有功至十月五日水漸退城以全朝廷降詔奬諭作河復詩春元豐元年戊午先生年四十三在徐州任適值旱徐州城東二十里有石潭置虎頭其中可致雷雨作起伏龍行二月有旨賜錢二千四百一十萬起夫四千二百三人及發常平錢米改築徐州外小城創木岸四以奬諭勑記併刻諸石為熙寧防河録云乃即徐州城之東門為大樓堊以黃土名之曰黃樓以土實勝水故也二年己未先生年四十四在徐州任三月自徐州移知湖州按先生作張氏圉亭記云余自彭城移守吳興由宋登舟三宿而至是年四月二十九日到湖州任王子立子敏皆從先生作子立墓志云子立子敏皆從余學於吳興學道日進東南之士稱之是嵗言事者以先生湖州到任謝表以為謗七月二十八日中使皇甫遵到湖州追攝按先生上文路公書云某始就建赴獄有一子稍長徒步相隨其餘守舍皆婦女幼雅至宿州御史符下就家取書州郡望風遣吏發卒圍船搜取長幼幾怖死既去婦女恚罵曰是好著書書成何所得而怖我如此悉取焚之十二月二十日聞太皇太后升遐吏以某罪人不許成服欲哭則不可欲泣則不敢作挽詩二首已而獄具十二月二十九日責授黃州團練副使本州安置是年子由聞先生下獄上書乞以見任官職贖先生罪謫筠州酒官出獄再次寄子由二詩韻有百日歸期恰及春之句先生自八月下獄至是踰百日矣三年庚申先生年四十五謫黃州自京師道出陳州子由自南郡來陳相見三日而别乃正月十四日也以二月一日至黃州寓居定惠院按近日黃州東坡圖云先生寓居定惠未久以是年遷臨臯亭先生復就臨臯亭立南堂至八月先生乳母任氏卒於臨臯亭葬於黃岡按先生上文潞公書云到黃州無所用心覃思易論語若有所得由是言之先生到黃定居之後即作易傳九卷論語五卷矣四年辛酉先生年四十六在黃州居臨臯亭就五年壬戌先生年四十七在黃州寓居臨臯亭東坡築雪堂號東坡居士六年癸亥先生年四十八在黃州移七年甲子先生年四十九在黃州四月乃有量汝州之命則先生居黃五載矣試八年乙丑先生年五十按大全集雜説騾馱驛筆云今日離泗州然吾方上書求居常州及到南京有放歸陽羡之命遂居常五月內復朝奉郎知登州再過密州到郡五日以禮部郎召到省半月除起居舍人入哲宗元祐元年丙寅先生年五十一以七品服侍延和改賜銀緋尋除中書舍人按志林云元祐元年余為中書舍人復遷翰林學士知制誥任中書舍人日舉江寧府司理周穜充學官及除內翰又有舉魯直自代狀讀二年丁卯先生年五十二為翰林學士復除侍由三年戊辰先生年五十三任翰林學士有和子元日省宿致齊有白髮蒼顔五十三之句是年省試先生知貢舉聞院日有與李方叔詩序云僕與李豸方叔相知久矣僕領貢舉事李不得第愧甚作詩謝之又充館伴北使按先生與陳傳道書云某頃伴虜使頗能誦某文四年己巳先生年五十四任翰林學士三月內纍章請郡除龍圖閣學士知杭州按子由作先生墓志云宣仁心善先生辨蔡持正之謗出郊遣內侍賜龍茶銀合用前執政恩例先生以七月三日到杭州任謝表云江山故國所至如歸父老遺民與臣相問到任有謁文宣王廟祝文云昔自太史通守是邦今由禁林出使浙右又有謁諸廟祝文狀五年庚午先生年五十五在杭州任有論西湖及論髙麗公案六年辛未先生年五十六在杭州被召則在杭不過二載也既到京師除翰林承旨復侍邇英按子由所作潁濱遺老傳云先生召還本除吏部尚書復以臣故改翰林承旨臣之私意原不遑安乞寢臣新命與兄同偹從官不報侯鯖録云先生元祐中再召入院作承旨乃益舊擬作衣帶馬表云枯羸之質匪伊埀之而帶有餘斂退之心非敢後也而馬不進數月以弟嫌請郡復以舊職知潁州按先生懷舊别子由詩云元祐六年豫自杭州召還寓居子由東府數月復出領汝隂時豫年五十六矣有到潁未幾公帑已竭齋厨索然戲作數句侯鯖録云元祐六年冬汝隂久雪人飢一日天未明先生簡召議事曰某一夕不寐念潁人之飢欲出百餘金造炊餅救之老妻謂某曰子昨過陳見傅欽之言僉判在陳賑濟有功盍問其賑濟之法某遂相招令畤面議曰已備矣今細民之困不過食與火耳義倉之積榖數千石便可支散以救下民作院有炭數萬稱酒務有柴數十萬稱依元價賣之可濟衆民先生曰吾事濟矣遂草放積欠賑濟奏又奏乞罷黃河夫萬人開本州溝瀆從之七年壬申先生年五十七在潁州任已而改知揚州先生之在潁也與趙德麟同治西湖未幾有維揚之命三月十六日湖成德麟有詩見懷先生次韻又再和之已而以兵部尚書召復兼侍讀是年南郊先生為鹵簿使尋遷禮部尚書遷端明侍讀學士有讀朱暉傳題文潛語後及作醉翁操任兵部尚書日有薦趙德麟狀是八年癸酉先生年五十八任端明侍讀二學士年先生繼室同安郡君王氏卒於京師按先生作西方阿彌陀贊序云蘇某之妻王氏元祐八年八月一日卒於京師謹按先生初娶通義郡君王氏乃同安之堂姊也先生祭王君錫丈人云某始婚姻公之猶子允有令德天閼莫遂惟公幼女嗣執罍篚由是推之通義為同安之堂姊明矣又有八月二十七日建隆章淨館成一絶有坐待官人畫詔回之句復以二學士出知定州九月十四日東府雨中作示子由云去年秋雨時我在廣陵歸今年中山去白首歸無期蓋定州之除在九月內到定州任則有祭韓魏公文兩紹聖元年甲戌先生年五十九知定州就任落職追一官知英州有辭宣聖文行至南康軍再貶寧逺軍節度副使惠州安置過虔州是年十月三日到惠州寓居嘉祐寺二年乙亥先生年六十在惠州是年遷居於合江亭移三年丙子先生年六十一在惠州有和陶淵明居詩云余去嵗三月自水東嘉祐寺遷去合江樓逮今一年得歸善後隙地數畝父老云古白鶴觀基也意欣然居之營白鶴新居始於是矣當年惠州修東西新橋先生助以犀帶而子由亦以史夫人頃入內所賜金錢數千為助及橋成日先生有詩落之授四年丁丑先生年六十二在惠州五月先生摘瓊州别駕昌化軍安置則五十九歲惠州客至是六十二歲又過海也按志林云余在惠州忽被命謫儋耳太守方子容自擕告身來弔余曰此故前定吾妻沈事僧伽甚誠一夕夢和尚來辭云當與蘇子瞻同行後七十二日有命今適七十二日矣豈非前定乎遂寄家惠州獨與幼子過渡海到儋州有儋州謝表按子由作先生墓志云紹聖四年先生安置昌化初僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚上運甓以助之為屋三間元符元年戊寅先生年六十三在儋州二年己卯先生年六十四在儋州移三年庚辰先生年六十五在儋州五月大赦量亷州安置先生在儋食芋飲水作書傳以推明上古之絶學六月過瓊州作惠通泉記遂渡海是歲又有移永州之命按先生謝提舉成都府玉局觀表云先自昌化貶所移亷州又自亷州移舒州節度副使永州居住行至英州復朝奉郎提舉成都府玉局觀任使居住經由廣州有將至廣州用過字韻寄逮邁二子詩蓋先生甲戌謫惠州已而過海至是為七年矣次年正月五日過南安軍計先生度嶺必是歲除作建中靖國元年辛巳先生年六十六度嶺北歸南華長老題名記正月到虔州有與錢濟明書云某已到虔州二月十聞方離此及發虔州過吉州永和鎮清都觀有謝道士自言丙子生求詩為賦一首及作贊并寫清都臺三字中途又為南安軍作學記寫海外所作天慶觀乳泉賦四月舟行至豫章彭蠡之間遇成國程夫人忌日乃寫圓通偈云行當施廬山有道者又有與胡仁修書云旦夕道儀真暫令邁一至常五月行至真州瘴毒大作病暴下中止於常州六月上表請老以本官致仕七月丁亥卒於常州實七月二十八日也是為徽宗登極之元年辛巳云按子由作先生墓志云先生七月被病卒於毗陵吳趙之民相與哭於野其君子相與弔於家訃聞於四方無賢愚皆咨嗟出涕太學之士數百人相率飯僧惠林佛舍嗚呼先生文章為百世之師而忠義尤為天下大間加之好賢樂善常若不及是宜訃聞之日士民惜哲人之萎朝野嗟一鑑之逝皆出於自然不可強而致也以次年閏六月葬於汝州郟城縣釣臺鄉上瑞里陸遊天彭牡丹譜牡丹在中州洛陽為第一在蜀天彭為第一天彭之花皆不詳其所自出上人云曩時永寧院有僧種花最盛俗謂之牡丹院春時賞花者多集於此其後花稍衰人亦不復至崇寧中州民宋氏張氏蔡氏宣和中石子灘楊氏皆嘗買洛中新花以歸自是洛花散於人間花户始盛皆以接花為業大家好事者皆竭其力以養花而天彭之花遂冠兩川今惟三井李氏劉村毌氏城中蘇氏城西李氏花特盛又有餘力治亭館以故最得名至花户連畛相望莫得其姓氏也天彭三邑皆有花惟城西沙橋上下花尤超絶由沙橋至堋口崇寧之間亦多佳品自城東抵濛陽則絶少矣大抵花品近百種然著者不過四十而紅花最多紫花黃花各不過數品碧花一二而已今自狀元紅至歐碧以類次第之所未詳者姑列其名於後以待好事者花釋名洛花見紀於歐陽公者天彭往往有之此不載載其著於天彭者彭人謂花之多葉者京花單葉者川花近嵗尤賤川花賣不復售花之舊栽曰祖花其新接頭有一春兩春者花少而富至三春則花稍多及成樹花雖益繁而花葉減矣狀元紅者重葉深紅花其色與輕紅潛緋相類而天姿富貴彭人以冠花品多葉者謂之第一架葉少而色稍淺者謂之第二架以其高出衆花之上故名狀元紅或曰舊制進士第一人即賜茜袍此花如其色故以名之祥雲者千葉淺紅花妖艷多態而花葉最多花户王氏謂此花如朵雲狀故謂之祥雲紹興春者祥雲子花也色淡佇而花尤富大者徑尺紹興中始傳大抵花户多種花子以觀其變不獨祥雲耳胭脂樓者深淺相間如胭脂染成重趺纍蕚狀如樓觀色淺者出於新繁勾氏色深者出於花户宋氏又有一種色稍下獨勾氏花為冠金腰樓玉腰樓皆粉紅花而起樓子黃白間閛如金玉色與胭脂樓同類雙頭紅者並蒂駢蕚色尤鮮明出於花户宋氏始祕不傳有謝主簿者始得其種今花户往往有之然養之得地則歲歲皆雙不爾則間年矣此花之絶異者也富貴紅者其花葉圓正而厚色若新染乾者他花皆落獨此抱枝而稿亦花之異者一尺紅者深紅頗近紫色花靣大幾尺故以一尺名之鹿胎紅者鶴頂紅子花色紅微帶黃上有白點如鹿胎極化工之妙歐陽公花品有鹿胎花者乃紫花與此頗異文公紅者出於西京潞公園亦花之麗者其種傳蜀中遂以文公名之政和春者淺粉紅花有絲頭政和中始出醉西施者粉白花中間紅暈狀如酡顔迎日紅與醉西施同類淺紅花中特出深紅花開最早而妖麗奪目故以迎日名之彩霞者其色光麗爛然如霞疊羅者中間瑣碎如疊羅文勝疊羅者差大於疊羅此三品皆以形而名之瑞露蟬亦粉紅花中抽碧心如合蟬狀乾花者紅粉花而分蟬旋轉其花有大千葉小千葉皆粉紅花之傑者大千葉無碎花小千葉則花萼瑣碎故以大小别之此二十一品皆紅花之著者也紫繡毬一名新紫花蓋魏花之别品也其花圓正如繡毬狀亦有起樓者為天彭紫花之冠乾道紫色稍淡而暈紅出未十年潑墨者新紫花之子花也單葉深黑如墨歐公記有葉底紫近之葛巾紫花圓正而富麗如世人所戴葛巾狀福嚴紫亦重葉紫花其葉少於紫繡毬莫詳所以得名按歐公所紀有玉版白出於福嚴院土人云此花亦自西京來謂之舊紫花豈亦出於福嚴耶禁苑黃蓋姚黃之别品也其花間淡高秀可亞姚黃慶雲黃花葉重復郁然輪囷以故得名青心黃者其花心正青一本花往往有兩品或正圓如毬或層起成樓子亦異矣黃氣毬者淡黃檀心花葉圓正間背相承敷腴可愛玉棲子者白花起樓高標逸韻自然是風塵外物劉帥哥者白花帶微紅多至數百葉纎妍可愛莫知何以得名玉覆盆者一名玉炊餅蓋圓頭白花也碧花止一品名曰歐碧其花淺碧而閛最晚獨出歐氏故以姓著大抵洛中舊品獨以姚魏為冠天彭則紅花以狀元紅為第一紫花以紫繡毬為第一黃花以禁苑黃為第一白花以玉樓子為第一然花户歲益培接新特間出將不特此而已好事者尚屢書之天彭號小西京以其俗好花有京洛之遺風大家至千本花時自太守而下往往即花盛處張飲帟幕車馬歌吹相屬最盛於寒食時在寒食前者謂之火前花其閛稍久火後則易落最喜隂晴相半時謂之養花天栽接剔治各有其法謂之弄花有弄花一年看花十日之語故大家例惜花可就觀不敢輕剪蓋剪花則次年花絶少惟花户則多植花以牟利雙頭紅初出時一本花最直至三十千祥雲初出亦直至七八千今尚兩千州家歲常以花餉諸臺及旁郡蠟蒂筠籃旁午于道豫客成都六年歲常得餉然率不能絶佳淳熙丁酉歲成都帥以善價私售於花户得數百苞馳騎取之至成都露猶未晞其大徑尺夜宴西樓下燭焰與花相映影搖酒中繁麗動人嗟乎天彭之花要不可望洛中而其盛已如此使異時復兩京王公卿相築園第以相誇尚豫幸得以觀焉其動蕩心目又宜何如也明年正月十日山陰陸遊書胡元質牡丹譜大中祥符辛亥春府尹任公正宴客大慈精舍州民王氏獻一合歡牡丹公即命圖之士庶創觀闐咽終日蜀自李唐後未有此花凡圖畫者唯名洛陽花偽蜀王氏號其苑曰宣華權相勳臣競起第宅上下窮極奢麗皆無牡丹惟徐延瓊聞秦州董成林僧院有牡丹一株遂厚以金帛歷三千里取至蜀植於新宅至孟氏於宣華苑廣加栽植名之曰牡丹苑廣政五年牡丹雙開者十黃者白者三紅白相間者四後主宴苑中賞之花至盛矣有深紅淺紅深紫淺紫淡黃鏂黃潔白正暈例暈金含稜銀含稜旁枝副搏合歡重臺至五十葉靣徑七八寸有檀心如墨者香聞至五十步蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利每一本獲數萬錢宋景文公祁帥蜀彭州守朱君綽始取楊氏囷花凡十品以獻公在蜀四年每花時按其名往取彭州送花遂成故事公于十種花尤愛重錦被堆嘗為之賦蓋他園所無也牡丹之性不利燥濕彭州丘壤既得燥濕之中又土人種蒔偏得法花開有至七百葉靣可徑尺以上今品類幾五十種繼又有一種色淡紅枝頭絶大者中書舍人程公厚倅是州目之為祥雲其花結子可種餘花多取單葉花本以千葉花接之千葉花來自洛京土人謂之京花單葉時號川花爾景文所作贊别為一編其為朱彭州賦牡丹詩有蹄金點鬢密璋玉鏤跗紅香惜特來逺春應摘後空之句今西樓花數欄花不甚多而彭州所供率下品范公成大時以錢買之始得名花提刑程公沂預會數曰自離洛陽今始見花爾程公故洛陽人也下牡丹坪在灌縣西南八十里大面山自青城巖捫蘿而上由鳥道三十里許乃金華庵前有平阜樹高蔽天花開桃紅色莢葉十四五瓣狀如芙蓉香似牡丹春深花先長後發葉謂之枯枝牡丹譙大授李太素二先生隱居其中范至能有詩十丈牡丹如錦蓋人間姚魏敢爭春世傳謂三十年其花方一閛沈立海棠記序蜀花稱美者有海棠焉然記牒多所不録蓋恐近代有之何者古人獨棄此而取彼耶嘗聞真宗皇帝御製後苑雜花十題以海棠為首章賜近臣唱和則知海棠足與牡丹抗衡而可獨步於西州矣因摉擇前志惟唐相賈元靖耽著百花譜以海棠為花中神仙誠不虛美耳近世名儒巨賢發于歌咏清辭麗句往往而得至慶厯中為縣洪雅春多暇日地富海棠幸得為東道主惜其繁艷為一隅之滯卉為作海棠記敘其大槩及編次諸公詩句于右復率蕪拙作五言百韻詩一章四韻詩一章附于卷末海棠記棠之稱甚衆若詩有蔽䒥甘棠又曰有杕之杜爾雅釋木曰杜甘棠也今杜赤棠白者棠又吕氏春秋果之美者棠實又俗説有棣棠棠梨沙棠味如李無核較是數説俱非謂海棠也凡今草木以海為名者酉陽雜俎云唐贊皇李德裕嘗言花名中之帶海者悉從海外來故如海棕柳海石榴海木瓜之類俱無聞於記述豈以多而為稱耶又非多也誠恐近代得之於海外耳又杜子美海棕行云欲栽北辰不可得惟有西域僧識之若然則贊皇之言不誣矣海棠雖盛稱於蜀而蜀人不甚重今京師江淮尤競植之每一本價不下數十金勝地名園競為佳致而出江南者復稱之曰南海棠大抵相類而花差小色尤深耳棠性多類梨核生者長遲逮十數年方有花都下接花工多以嫩枝附梨而贅之則易茂矣種宜壚壤膏沃之地其根色黃而盤徑其木堅而多節其外白而中赤其枝柔密而修暢其葉類極二大者縹緑色而小者淺紫色其紅花五出初紅如胭脂點點然及開則漸成纈暈至落則若宿粧淡粉矣其蒂長寸餘淡紫於葉間或三蕚至五蕚為藂而生其蕊如金粟蕊中有鬚三如紫絲其香清酷不蘭不麝其實狀如梨大熟櫻桃至秋􅌻可食其味甘而微酸茲棠之大槩也舊海棠有色而無香惟嘉州色香並勝大足治中有香霏閣號曰海棠香國謂杜子美諱母乳名詩中不之及恐亦宋人傳會成都有名銀絲海棠樹可尺圍枝幹扶疏葉與海棠無異花白色若金銀花狀開時清香襲人􅙐醿花志載惟成都最佳有三種曰白玉碗曰出爐銀曰雲南紅色香俱美一牡丹諸色俱備千葉而大如毬兩都所不及也名魚血紅者獨艷藥山茶有雲南紅石榴紅謝萬定數種朵大勝芍重瓣如芙蓉上人自能接他處所莫匹也之素馨紅者白者俱竒品紅開於春白開於秋桂丹者色亦甲於南中茉莉枝如藤花瓣稍大山蘭四季有花香氣襲人又有一種葉稍大紅黃白三色而窮冬新正盛開名曰蟬花則尤異也洪邁糖霜譜糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玉招魂所謂胹鱉炮羔有蔗漿是也其後為蔗餳孫亮使黃門就中藏吏取交州所獻甘蔗餳是也後又為石蜜南中八郡志云榨甘蔗汁曝成飲謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫瓜根是也唐太宗遣使至摩揭陀國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域逺甚然只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歷世詩人模竒寫異亦無一章一句言之惟東坡公過金山寺作詩送遂寧僧圓寶云涪江與中冷共此一味水冰盤薦琥珀何似糖霜美黃魯直在戎州作頌答梓州雍熙長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰説我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖冰而遂寧為冠四郡所産甚微而顆碎色淺味薄比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黃氏以造霜之法繖山在縣北二十里山前後為蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰芳蔗本草所謂萩蔗也曰紅蔗本草所謂崑崙蔗也紅蔗止堪生噉芳蔗可作沙糖西蔗可作霜色淺土不甚貴杜蔗緑嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五榖以息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疉如假山者為上團枝次之甕鑑次之大顆塊次之沙腳為下紫為上深琥珀次之淺黃又次之淺白為下宣和初王黼創應奉司遂寧常貢外歲别進數千斤是時所産益竒牆壁或方寸應奉司罷乃不再見當時因之大擾敗本業者居半久而未復遂寧王灼作糖霜譜譜篇俱載其説元費著氏族譜前記凡五載人物不載氏族自今記晉常璩嘗記蜀中大姓成都有栁杜張趙郭楊朱郫有何羅郭繁有張新都有楊董沈鄭其它不一著列皆可槩見是數十姓果大曽不記人物司馬文園遺藁僅得之妻揚子雲有子童烏能與玄文裁九齡天然則人物有其傳尤可重矣記今自人物外載氏族不徒以補前之缺亦以表宋朝以來世系之盛凡第次以起家後先而見之今者書其名不書其事皆法也吳氏吳氏入蜀以唐左武衛兵曹參軍為始祖四世孫藂偽蜀時最顯至袞六世矣仕宋朝至太子舍人贈都官員外郎七世孫季良第端拱二年進士至都官郎中贈中大夫九世諸孫師孟第進士官至左朝議大夫門望始大王公安石當國謂師孟同年生也自鳯州别駕擢為梓州路提舉常平倉兼農田水利差役事師孟疏力言法不便寧罷歸故官後知蜀州又論茶法害民繼謝事去蘇文忠公軾刺新法書有曰吳某乞免提舉如逃垢穢至言茶病民以矯矯六君子稱之師孟其一也子縝以世科官至左朝議大夫知邛蜀洋萬四州子景知漢州官至朝散大夫景之子璘始遷蜀州今崇慶府惟師孟從兄弟師益三世猶居成都其嘗應賢良科科廢老死布衣族最舊子孫尤蕃十世皆葬成都范氏范氏自杜溫叔奔晉四世食采於范遂為氏世逺譜落唐相履冰下十有一世曰隆廣明間入蜀家成都孫紹溫處唐季歷王孟偽蜀雖不仕三世已能有立為著姓子曰昌佑有全德二子曰瑑曰璨瑑贈太保公也太保生二子曰度曰祥度贈太師公也太師生三子長曰鎡以進士甲科終隴城令次曰錯終衛尉丞贈太尉季子鎮是為蜀忠文公子孫曾三世登科曰百揆曰祖淳曰塤塤官至左中大夫歷使蜀移使荆湖北路卒太尉有子曰百祿位至中書侍郎贈榮國公榮公有從子曰祖禹位至翰林學士兼侍講有從孫曰沖位至翰林學士曰溫位至明堂班朔郎有曾孫曰仲芑故為右諫議大夫曰仲藝今為中書舍人曰黼前為著作郎兼禮部郎中皆世其官曰仲較曰仲綸曰仲藝以辭章世其門不克顯元孫曰子長曰子垓又世其科子長今為飛烏宰被命召榮公兄曰百祉不但有如祖禹孫如沖如溫而諸孫曰洄諸曾孫曰仲圭仲殳仲循仲徽仲南各以文學行義政事名四世諸孫謨故國子監丞孫嘗位於朝今知邛州榮公之仲兄曰百朋有子曰祖睿諸孫曰遊諸曾孫曰仲愷仲侃獨不第三子後先登科曰子修子奕子庚典州除節矣翁無恙稠人中莫覺有貴子賢德蓋相襲也父子兄弟登科至聨四世諸子登科世掌絲綸人共推范氏郭氏郭氏自及為廣都令家焉其自敘系出子儀子儀六世孫甫為御史中丞從僖宗幸蜀及其弟也故中丞死因以葬廣都石子山及三孫曰同介𦉢同之孫震以詩名號漁舟先生李畋序其詩淳化四年先生詣闕上書言蜀將有變未幾順賊作亂先生留中原不歸無子皆畋云𦉢諸孫早著𦉢生貞時孟氏納土朝廷謂西州豪右可任郡檄補貞吏貞稱疾不就子仁渥當順賊亂率卒黨保别墅獲免均賊繼起道遇害贈職方員外郎二子軫輔軫子子定子安皆以賞以恩得官孫衢亨登崇寧上第終宣教郎曾孫南義以詩名終於布衣輔起家登天聖乙科范公仲淹龎公籍韓公琦皆表其丰器可任自鳯州擢知興元平均房叛卒璽書褒美繼二持節後以梓州轉運使皇祐二年平淯井夷死賞延三子中子子臯最知名子臯知大邑均三邑灌溉人號為平歷知昌劍利三州子㻞瑜皆以賞得官瑜獨顯嘗提學京東後知懷州諸孫曰眉夀曰暘諸孫曰僙曰偉曰俟曰億曰傑眉夀俟億皆登第餘以世賞或以舉恩惟傑在介諸孫轔輯輊軾轔生由儀登慶厯第終南浦令由儀生忱登元豐第以博學名通判恭州年五十會蔡京用事忽忽不樂丐祠遂老生時敏終通直郎時敏生晞嘗為大金留豫司幹辦公事受金人所歸疆進二秩佐劉公錡為東京留守司幹辦公事順昌之捷不肻上功當時韙之從子垕傳皆登第垕終通直郎傳今從事郎子㻣均皆世賞堪終通直郎均今從事郎輯孫綱輊三世諸孫畋國寶惟肖僅疇四世諸孫樗年震湘畋國寶震湘登第餘以舉恩或以賞銓又有七世孫漸九世孫光選皆登第叔宜今迪功郎光選今丞議郎爰自廣都散居雙流獨成都為多李氏李氏唐胄也大唐四十子少郎曹王五子少即武衛大將軍偲武氏檀政偲入蜀來眉丹稜伏民間五世孫瑜明皇西幸時抗表言狀得通屬籍尋拜長江令卒官歸葬丹稜瑜四世曰逺逺二世曰同為始建令葬籍縣同生全始居華陽又三世曰惟吉惟吉三子曰莊曰允曰毅莊以學行名毅以科第顯莊子大厚博學工文辭從兄天章公大臨自謂不如大厚及長子升同登第後三年子降亦登升五典州號循吏降行義克著范公鎮薦之朝為金部郎中宣和間提學秦鳯路列郡刺史拜宣撫使童貫降獨長揖曰我師儒官也遂丐祠去力致仕陪大厚季子也有子時亮伯父升欲官之辭治命又以遺長官之章已上會升子從政郎時任卒時亮亟追還以與時任之子識後時亮二子登第三子以恩得官諸孫一以舉恩得官一登第去允子大臨第進士宋朝仕至天章閣待制事在國史知制誥時繳李定辭頭其一也子陶隲陶從司馬公光於洛當時大老皆喜之在錢塘蘇公軾送之詩忠文文正二大老蘇李廣平三舍人喜見通家賢子弟因言得邑少風塵其趣逺矣騭通達明敏吏事有能名尤工於書子時雍時敏皆世其學時雍高廟稱之弟兄多顯者賞延凡二世毅嘉祐二年進士李氏初起家者仕至殿中丞子大昕大昕生公濟公濟生謨謨生嵩凡四世登科大昕有學行謨能文章謨以下徙導江族盛時仕者不能悉書此其槩也曰頊者亦出自逺與同並世孫丞燦三世孫謹修謹交謹微謹思能登進士第謹修位至郡守三子賞皆傳嚴卿最顯官至朝散大夫䣊又與謹微子椿登第䣊官至朝議大夫丞炳三世孫彤四世孫觀登第丞哲四世諸孫象先厚登第象先應賢良方正科厚位至鴻驢少卿厚五子皆官孫洋亦登進士第族大子孫衆多近世有以世科名聞其世一曰自逺而下邵第進士四子樵孫楰孫材父今典州矣凡散居異邑者多不書張氏張氏韶州曲江人至唐相九齡顯九齡弟九臯九臯子抗抗七子仲方仲孚子孫在蜀可譜仲孚孫奉常博士隨扈僖宗幸蜀傳三世曰載陽資産巨萬豪待四方士子維崚待士益厚悉散之或相戒止笑曰吾遺子孫者不在是也以子起贈大理寺丞起寶元中登進士第官至太常博士是故族也起家尤難如此三子太初太寧太和太寧登治平四年第知邠漢渭等州四入為尚書郎三持使節遷陜西路為都轉運使二子察宇察以大小篆名入為左司郎中出知鼎州宇初名犯欽廟諱易名宇三丞寺監使淮西東路知濟榮果合四州娶榮國公百祿女故其學得之范氏子晦侍學中原有外家典刑筆法尤工歷知雅恭簡三州子仲堅是則家成都者太初家於崇慶之新津太和家於眉州之眉山仲方之後徙漢州之綿竹族尤大宋氏宋氏唐季有任崇文館校書郎諱玘者隨僖宗西幸家成都玘生綿州團練副使可思可思生太子舍人皓皓第進士仕唐皓生武信軍節度推官格格仕宋朝生惟吉惟亮號無為先生生太常博士世修世修生球球與從兄弟璋後先登第球終職方員外郎按譜惟吉惟亮子孫衆多相似也惟吉後為盛璋球諸從兄弟子孫相似也球後為盛按家傳無為先生嘗授經任公玠晚究易球仕至郡守潔身早退子先因世賞至縣令亦中年退休子昌宗典榮資二州將曹東蜀會鹽酒法弊坐籍沒者又所在繫捕充斥獨論列為不可法為士改猶申言不已由是罷歸諸子曰訓曰誨諸孫曰邈曰述曰逌曰運邈運登進士第邈終宣教郎餘皆至郡守運總領財賦四川未及卒當時惜之勾氏勾氏𨽻新繁𨽻華陽勾龍氏𨽻華陽𨽻郫𨽻溫溫皆祖勾望孔氏七十子曰井疆三國蜀曰扶其裔也唐末有曰惟立以扈衛僖宗為將軍二子弇會王建攻彭州弇與勇烈侯楊晟死之會匿新繁民間遂𨽻新繁四世孫士良登慶厯六年第官至朝請大夫七子以賞以第皆有官第二子宗顔官至朝奉大夫第四子宗召與顔之長子濤迭登進士第濤貴在髙廟時宰相趙鼎實薦之鼎言蜀有鴻儒可充載華之任然姓與御名音同臣未敢薦高宗曰古即有勾龍氏遂自涪陵召濤而勾氏著矣濤言事稱丄意繇郎曹問歲除給事中大抵以薦士為己任士因濤薦召凡數十人後多為名臣唐公文若其一也序其外制集云爾以是為權相忌遂出除潭州力辭乞祠許之乞歸蜀不許寓居秀華亭卒子躍從子距路蹈躒典三州兩持使節除職帥夔卒餘以賞任官官至孫云曰詠登宣和第第二其子輔登紹興第賞為四川類省第一亦族子也𨽻成都者自居體始著三世以上惟曰出井疆莫可考居體登熙寧第官至朝請大夫王公素使東蜀知其賢延請權領懷安軍事卒懷安居體素號鄉先生著書為多諸生從之廣多知名九子二以賞得官棓獨久遊太學以恩得官二子昌世昌泰皆登第昌世官至朝散大夫位至郡守昌泰為四川類省第一嘗除太學博士後徙將作丞又丞太府兼户曹郎出提舉常平浙東移節浙西旋報罷歸起知利州除職帥夔卒從子子皆有官即成都溫江以勾為氏猶曰勾惟立唐末入蜀即其祖亦曰避髙宗諱改為覆姓而世次率不合曰亷登進士官至朝議大夫諸子皆有官從子震雩同登進士即自郫𨽻成都者溫江則以中立為祖曰是在雍熙間以宗學名曰中正之兄也中正生希仲亦世其學以科第位至光祿卿王公安石銘其墓曰勾宗華陽世實兆京其援據云爾常氏京兆常氏為蜀人自宥始袞相唐母兄偕偕三世孫官戶部郎中扈衛僖宗駕入蜀者宥也謫授蜀川户掾卒葬江原二子包荒包蒙包荒子達選達子延昱負竒才雷公有終來平蜀寇一見竒之率從之謀有終守蜀數以書招致之延昱始來有功家成都卒鄉人諡曰亷貞先生子禧禧四子珙瑑琮玘皆登科珙守三州長子景修彭州景修二子時中執中為郡守相自景以下名從中從才者為一世從土者為一世城垍蓋珙諸曾孫城知均州垍有隱操蚤與薦以親喪不復就類皆隱居東山餘四十年蜀人大帥欲識之不可聲聞於今隱然珙弟琮之子績禧弟利涉之子鎮踵登崇寧二年第初延昱出從雷公選子守元留邛其後多通顯以𨽻他郡故不書房氏房氏以重為入蜀之祖重丞相玄齡八世孫也終新都令子諤為蜀太常少卿子四人皆以從為名從之諸子八人皆以知為名知之諸子亦八皆以昭為名曰昭應號虛谷子有傳家文無名詩皆詣理曰昭庶洞曉樂道學仁宗朝以大臣為薦得旨賜對特授祕書郎合樂書行世國史有傳昭之諸子十八人皆以審為名審能審基皆舉進士審能官至朝議大夫審權著大樂演義即昭庶子也審之諸子三十八人皆以希為名希聲甫冠與貢常官太學希參登元豐第官至通議大夫希之諸子六十四人或薦或第或廕或恩或贈而名率不齊其知名者五人曰淵太學上舍生充太學録曰偉以恩得官而博學文辭知名西州又審權孫有曰璣曰永登政和宣和第曰時中贈官至通議大夫又一世諸子踰百人名尤不齊曰與之曰軹曰子中曰子邵曰震仲曰巨皆登科與之視諸從弟行獨年髙宣和進士官至中奉大夫持節潼州路故諸從弟今多在子邵典州官至朝請郎震仲官朝請郎又一世諸子踰二百人惟大亮以典三州顯咸以世科顯餘子及諸孫以賞得官者五今在官者二曰燾曰夀卿吕氏吕氏自眉彭山遷成都三世始著曰懷玉曰公立曰陶世以風節聞陶世為元祐名臣三子傳嗣延嗣緣嗣緣嗣坐黨人子不達終右通直郎子焯當用給事遺奏補官靖康多難格不行商隱宜之凝之皆登第商隱第雖晚以四川類省第一與素望合胡公元質鎮蜀薦之禮部侍郎李公燾以自代召入除國子博士兼國史院編修官遷宗正丞兼史院如初凝之以才為茶馬使者陳公彌作宣撫沈公復見知後由茂州除閬州入對又以易學受知孝廟留為太府寺丞與商隱同時會凝之卒商隱亦乞歸除守崇慶卒子盧冝之登第最早所至有治聲而坎壈率多異除通判彭州改辟通判茂州移黎州丁母憂辟通判成州除知簡州擬通判綿州黎州簡州罷非其罪復積二年迭聞兄弟喪卒於綿杜氏杜翊世以死節顯蜀舊守名其居曰忠義坊蓋以勸也事詳見於先賢志矣因其世祖甫來依嚴武武卒甫旅遊衡陽二子宗文宗武留蜀甫卒葬耒陽後返葬偃師故元稹志甫墓謂孫嗣業終父志或者其家竟莫能出蜀也家青城實宗文裔十世孫凖皇佑五年第進士官至朝散郎宰綿竹以卒妻黎攜諸孤外氏家成都黎教子嚴必使世其家第二子即翊世紹聖元年第進士官至朝議大夫通判懷德軍靖康元年邊冦作西羌亦張奄至城下凡三旬援兵不至城陷翊世先火其家乃自縊死事聞特贈正議大夫命官其後十人五子慥沈以賞得官孫逸老俊老廷老曾孫光祖大臨以忠義遺澤得官翊世歿時慥棄官走視死所慟幾絶見者皆為流涕遂以喪招母魂歸葬餘孫自曾及雲今為士人指其門猶曰忠義杜云宇文氏宇文氏望河南自得氏以來有譜其以史學傳自唐諌議大夫藉藉子從禮為渠州司馬因家于蜀後徙成都子孫又分六院曰成都曰雙流曰廣都曰綿竹曰嚴道曰閬中三院𨽻成都自司馬至院莫知其世世有從仁者後可譜再世從元又一世從廷從卿又一世從崇從緒從惟繼是子孫行率不類按譜始可類耳雙流院自崇而次始登第曰册册登嘉祐第仕郡邑間卒李公大臨稱為西州顔子子昌齡喬齡昌齡少年登進士甲科神宗廟遷監察御史詔言事如侍御史徽宗初為刑部侍郎子常千宰諸孫伋僎價子震與喬齡之孫仁皆顯價子震任任之子禨皆第進士子震典著作兼為郎出總賦淮東晚守潼川價位至兵部尚書出以徽猷學士歷典大藩邑人見其家迭盛凡四世幾百年禨令中成州其諸從兄弟又寖顯賞傳至孫矣廣都院自緒而下凡三世始登第曰邦彥邦彥初名褒登元豐第仕至郡相卒子閎中粹中虛中迭登第粹中第在第三後為尚書右丞虛中後為僉書樞密院事終國信使諡貞愍天下聞其諡哀而敬之時中賜進士第後以直龍圖閣知潼川閎中及其子師尹師臯從子師申師獻孫紹直紹良從孫紹寅紹奕嘗為吏部郎典三州卒紹節典三州今被命紹直自郡守參議大藩今奉祠紹猷紹彭紹莊今方典州子孫又多傳視雙流亦不勝書也惟成都房自崇至降凡三世始以子朴貴贈官朴登政和第朴族弟谷從子臨望久望日華孫如石如圭會孫開仲樂登第開仲今在官積世名位視雙流廣都為顯而科第不愧族望矣綿竹房亦未為顯然緒下孫之紹登第仕元豐間年餘四十與時論不合致其仕號止止先生母舅范公鎮也賦詩敬之司馬公光亦敬之程公珦後守漢州其子皓頤從之遊子輝以明經第一及第仕至郡守邦彥與輝同世次視之猶兄弟然粹中時中亦待輝之子思忠猶同母兄弟粹中任思忠以官時中又任思忠之子師孟輝從弟彬登元豐第仕至郡守復自綿竹遷郫子仔仲仔仕至郡相二子猶世其賞仲亦登第是又𨽻成都矣綿竹房率聨得書故略北劉氏唐劉再思以御史從僖宗自蜀還京師留其子孟溫成都孟溫以儒學傳授成都中三子長璵偽蜀廣政十年補石室教授卒門人共諡為寶中先生五世孫處厚處厚始登第四子靖􅔲􅼔翊􅔲翊世其科處安四子俟端竦佇俟竦亦登第劉氏家法方嚴長身偉貌世世稱其家家城北異鄉人入北門問劉氏鄉人至謂之長劉然蒞民率從厚至臨難其方嚴始見處厚官至左朝請大夫范公祖禹第元祐循吏居之第三靖􅔲皆為張公浚幕客靖議不合流落州縣􅔲受浚命往熙河劉惟輔軍時惟輔軍驕將屬莫往獨靖􅔲往惟輔戰北􅔲為敵所殺後十餘祀河南境復惟輔將屬米知柔等來歸始言狀范公成大榜其所居節義坊為此翊竦賞皆傳端雖不第從遊甚衆自孟溫至是八世今又一傳矣鄉人以其五世不異籍尤義之南劉氏劉氏譜載三世名字卒月日耳四世曰惟正曰惟盛曰惟道始詳惟正之子欽惟盛之子長源後先登進士第欽使湖南官至朝議大夫黻後賜第入館遷戶部郎官官至朝請大夫後長源紹興初為監察御史典州除節官亦至朝請大夫兩家子弟賞得官黻弟嶷知荆門軍卒子述今典州長源子思學賞今亦傳子參惟道三世孫始登第曰晉或贈或賞而不年者不書北郭氏蜀郭氏衆多而家于北城者人號北郭矣其自敘亦曰出汾陽王有藏汾陽王丹書鐡劵可證也譜失其傳今以稹為祖稹生承訜承訜生希朴博極羣書晚精於易鄉人號曰有道先生李公畋為作知命録希朴前知死知命録所以作也四子仲曰友直蓄書嘉祐求遺書友直上千餘卷皆祕閣所闕者叔曰友諒季曰友聞友文經學鄉人號曰北郭先生仲叔氏子孫或家廣都或從唐鄧獨北郭子孫不遷四子逢通選迪逢三子行中剛中閎中選行中迭登元豐元祐第通七子倫師中久中大中宜中時中由中倫久中同登崇寧第皆居甲科倫最通顯初仕太子學録繼遷博士出為郡刺史凡四十任其提舉江南西路忤蔡京罷其帥潼川奏蠲虛額與都轉運使不合遂致其仕蔭補子孫十有三久中大觀二年召入册定勑令後提舉常平河北東路嘗因星變上封事言新開邊皆不毛地小人邀功肆為誕謾書首入邪等罷歸吏部後復為郡守為刺史年六十一致仕大中有聲太學上舍以釋褐後召為諸王府記室兼講書守兩州三持使節事有異政由中攫上舍異等登宣和第後給事中勾濤薦之高廟題其姓名屏間歷守二州一持使節其學深文亦髙政事自儒學出嘗守簡州人至今思之選五子勉中美中登第迪二子黃中登第三子皆有惠政官皆轉而二子至大夫餘子又多以子貴贈官北郭以中名者凡二十有六人楊氏楊氏自潼川徙郫繼徙成都譜實祖唐盈川令炯炯謫梓州司馬參軍遷盈川既卒官還葬潼因家焉盈川十一世孫天惠始家於郫以儒學稱自號回光居士元符末應詔上書入崇寧黨籍生伯詹伯詹遊太學十年不成受世賞四十二年以迪功郎年勞升從政郎以卒時又謂不成鄉人以其道不行於時而自樂終其身共以靖安先生易其名其成乃如此子祖識家成都登第後不樂仕棲遲州縣間沈公價汪公應辰鎮蜀聞其名辟至幕府自是持節典藩視再世為顯蜀士論世不稱其官稱其德又諡曰樂行先生三子韶甫第進士諸孫叔寅以賞得官城南郭氏自陳來成都居來寨郭氏曰從一亦祖汾陽曰吾蔡川司徒家以子貴贈朝奉郎子溥登大觀第初名將後更今名進士題名中實二名也嘗為樞密院編修官遷國子監丞出守劍州積官朝請大夫贈至左金紫光祿大夫四子伸似儀儔伸登宣和第儔登紹興第似儀則賞延者伸官至朝請大夫職直敷文閣鎮興元兼安撫利州似儔早死金紫藎伸儀纍贈云伸及儀賞及世至似儔之子於是三畏三聘三握三接皆傳又傳至諸孫曰可道曰德柄今惟德柄在子孫散居城中城南尤顯亦成都百年故家施氏施氏謂魯施季叔之後唐友諒從僖宗入蜀不歸居岷山下七世孫光祚始居成都碧雞坊又三世庭臣德修同登宣和第從兄弟也庭臣髙宗朝為中書舍人晚居潭州卒德修嘗除將作簿兼祕書丞出守洋邛二州除簡州卒子次卨次尹皆以賞得官次尹官至朝請大夫今傳其子坤之昔登紹興第曰晉卿又德修從子也庭臣子淵然仲舒登紹興第位至司農少卿遷中書門下省檢正諸房文字子棐又世其科淵然雖不顯以文稱於時初庭臣置田二頃贍宗族之貧徽猷閣直學士胡公寅為之記其族至今賴之楊氏楊最晚出自簡徙成都祖慶安至孫始有登進士第者四世孫承承子景溫又世科其盛也四世孫至同薦者十有二是舉登進士第者四又同堂兄弟皆復名以望為行蜀人號四望從望民望最顯從望知蜀州有子曰之言登進士第今知州民望位於朝歷左司郎中移太常少卿出知綿州甫半載復以太府少卿總蜀賦又移兩節職自直祕閣加直顯謨閣有子曰之復今通判綿州民望有清名又名文章嘗自敘其世自四世慶安已上得三世墳墓七世而上無咨考至謂唐宋氏族之學不明譜牒遂廢特起者恥其初微而不志昭穆甚者或求附甲族而過於傅會近世言其先者必自唐扈三宗西幸或遊至蜀居焉何古之蜀獨無人也且以楊氏之言在華在蜀皆承姓於姬而受氏於晉霍楊韓魏皆姬姓也儻於其攴别考證未明則不必慕他郡之盛而必求其遷徙之故也近世以族著者因以附見焉郫縣何氏漢自何武死後不絶亦幸矣子况載武喪如北邙山瘞焉廬其下公孫述誅蜀平况以喪歸郫葬縣東南按史武兄霸弟顯兄弟五人皆有名按志武後曰隨顯後曰包兄弟五人包子攀又皆有名曰英曰宗曰祗雖見之志第曰郫人爾莫知為武後也按譜武二世孫曰英五世曰宗宗子攀然英見之志在武兄弟前攀父曰包又與譜異或者譜為未詳不然何氏世世有譜當為蜀氏族第一矣然自漢至晉武弟顯之後猶傳如志云亦盛也譜逺不可盡考或居長安或徙江南唐季有乾符進士待詔翰林知節自謂武裔後僖宗幸蜀加知制誥因歸郫卒葬膏澤鄉孫偉登太平興國進士第嘗記景德寺邑人推為先生七子子孫散居成都崇慶遂閬彭之崇慶永康之𨗳江而武之族蕃矣偉三世孫邦基登元豐第官至朝議大夫賞及從子孫又三世俊茂登紹興第徙崇慶偉從子繼甫繼甫曾孫援登大觀第鉉孫碩頤預又世科而家成都者曰騰登紹興第至郡守亦自郫徙去王氏王氏曰簡隨唐僖宗入蜀因留蜀四世坦為郫人贈通奉大夫子冕定國覽定國登治平四年第更名覺正和二年以直龍圖閣知桂州討殺溪洞蠻有功進顯謨待制三年丐祠得提舉成都玉局觀卒纍贈特進冕子梅以覺蔭補將仕郎覽補登仕郎覺三子曰楫補登仕郎隨覺宦南方充廣西經略司內機法檄至雍州染瘴卒朝廷以楫死特命長子煥以官煥官至從政郎曰權補將仕郎曰棣補承務郎纍官朝奉大夫通判巴州棣子燾將仕郎熹卒於承議郎邵氏邵氏以唐郜城令錫為祖燕其始封也宋初自丹陽聞岷山勝槩來家於岷之陽曰慶餘三世曰才始登治平第嘗入尚書為郎贈其父仲良為大中大夫子孫皆官長子充官至朝請大夫賞又傳三子贈才官至銀青光祿大夫邵公溥撫蜀帥言丹陽邵公必嘗薦洛邵公雍於神廟溥蓋雍之孫故溥講丹陽好待充如兄邵氏在蜀於是為故家矣申氏申氏貫北京蜀廣政中曰幹臣始來青城子孫居郫幹臣四世孫曰起曰宗起纍贈朝請大夫有子曰祖錫曰積中同登元豐五年第祖錫終朝奉大夫積中終奉議郎永興軍路提舉學事祖錫子説終宣教郎詵迪功郎積中子詮以臣僚列奏積中孝行特授將仕郎終於雒縣丞孫伯時登淳熙元年進士第終晉原主簿宗始徙溫江四世孫曰叔度五世曰叔檢叔懷皆登進士第詹氏詹氏貫邛州安仁曰文舉以子貴纍贈正議大夫子曰權登元豐進士第終於巴州權子廷哲廷碩廷彥自邛始遷居郫廷哲終通直郎廷碩終朝請郎廷彥終從政郎廷哲之子𨽻廷彥之子籲皆登進士第張氏張氏俞隱居岷山七被詔命不赴賜以官又乞回授其父號曰白雲先生大節見國史事見先賢篇俞二子石民楚民登元豐進士第官至正奉大夫子曰吉甫以賞終朝奉大夫子伯振又以賞為青城令卒官石民死子雲從孫文叔夏曾孫山父王氏王氏望太原唐末避亂入蜀居郫曰彥生四子次子曰延夀生四子次子曰景以孝名邑人號王孝子景生四子曰慶祖慶柔慶餘慶宗傳世特盛散居成都永康資中富順惟慶宗之後不遷至曾孫蔭登大觀第位至郡守玄孫曰朴為朝議大夫賞傳至孫它院子孫或賞或第每歲上巳闔族無逺近共修祀事於縣東之塋人指為孝子冢楊氏楊氏居郫縣凡四世至邁始第進士官至左朝議大夫直祕閣主管環慶路經略安撫司公事纍贈文叔淵光祿大夫邁卒纍贈宣奉大夫邁子衍朝請大夫邛州曰思成儒林郎久成二子蕃卿從政郎萃卿修職郎思成一子漢卿將仕郎張氏張氏昔望崇慶之永康門望如初有遷於郫之犀浦鎮其為族望亦稱克尚五子第三子曰礪即遷犀浦者礪孫曰天迪曰煥曾孫曰汾曰洙曰漢玄孫曰嶧曰岐皆擢進士第又有遷於崇寧者其後視犀浦尤顯文氏文氏以丹淵先生同為望同貫潼川之安泰位雖未高以蘇先生軾為友名重當時其文號丹淵集同官西川樂岷山勝槩欲家焉不果子孫始來居郫有丹淵集曾孫仔紹興丙子進士青城尉卒四世故書尚無恙新繁彭氏彭氏曰景直唐中宗時為太常六世孫敬先常以左拾遺隨僖宗入蜀家於普州敬先孫濟民攜二子由普徙益長子生福次子生乘乘於宋仁宗朝翰林學士國史有傳乘卒三子不克歸國史載乘為華陽人繁華陽皆𨽻成都而乘實以太平興國八年生於繁見於故待制韓公駒所為跨鼇先生李公新集序曰繁上則彭乘之又辭云福生顯行顯行曾孫登政和二年進士第官至左朝散大夫知彭州贈其父望官至朝議大夫二子極材以廕補官卒季子傑從子仁徹同年貢於鄉仁徹登第官至文林郎極子亦第進士不待年致仕周氏周氏望汝南入蜀家於繁曰贇之孫頊有隱德號正晦先生二子曰洙曰淳洙生表權淳生庚庚生尹及申表權尹同登慶厯六年進士第表權後知漢州尹知梓州蘇文忠公軾文定公轍時皆在朝各賦詩送之初李稷使蜀𣙜茶為蜀病表權與尹論合與稷異為稷誣奏罷去尹嘗知利州後為侍御史奉使入蜀迎母靣賜五品服還至陜除節荆湖北路後知眉州丁母喪喪除入為主客郎遷考功兼權吏部元祐四年表權再知漢州表權奏改名表臣尹自是守梓梓漢相望即此時也兩家二大人年又髙表臣初知漢州尹知利州父皆及見之朱衣銀章子所遜也表臣三子克冕元尹四子禔禧祁祠元及祠後先登第餘子以賞得官庚弟庾表臣弟表民尹弟申庾之子丙吉平申之子禴祉祀丙之子夀松而表民之孫夏卿或以賞或以恩皆在官獨祉典二大州曰劍曰漢仕為顯雙流宋氏宋氏望京兆隋諫官遂以直言得罪流蜀隆山卒葬隆山隆山後以明皇諱改彭山比及四世少長踰二百人及珽二作入中朝為正議大夫扈僖宗狩復還歷眉彭州刺史歸瘞彭山子五人號五房宋長子渝生覽承作覽生祚始居成都之雙流祚二子承榮承慶榮生堂舉賢良方正成都府府學説書名載國史承慶生文禮以子右賢右仁同登慶厯第後贈朝散大夫右仁生桓桓生京京生衍同登科聨四世右賢孫良孺曾孫德之祖孫又相繼登科德之嘗為四川類省第一皆文禮之後也熙寧中邑令徐九思表其坊曰叢桂作堂於邑東延夀院繪五世像號叢桂堂邑人榮之有散而居汴居大安客歷陽徙依政者皆祖諌官今居崇慶者又自雙流徙其居汴者即公延渥之後譜稱延渥後更名渥有女孝章皇后其後譜聞唯彭山雙流依政譜可考子孫文行聞於時者衆獨雙流以𨽻成都故詳鄧氏鄧氏曰元明居梓中江以富名王建繇閬來圍成都元明開帑廪惟建取前後數百萬計建欲官之元明曰不願也願公安輯一方不然兩川皆魚肉矣建欣納官其子宏中州刺史宏生隆孟蜀時為資州刺史二子曰鎔曰釗釗生文溥文溥生琛均順薦亂琛文謁高資且諭諸富人無靳邑人以故保全家頓貧徙雙流以經學誘後生羣聚至數百人翕然知學有子曰至學益大號二江先生范公鎮為之友榮公百祿從之遊以子貴至贈太師琛亦贈太保琛生六子至其一也至四子綰縯縝先後登科綰試禮部為第一季登科時神宗臨軒綰為翰林學士侍唱名至綰縝下殿謝子洵仁洵武從子邰聨唱名於是綰聨謝執政因秦鄧至善教上曰知之於是時鄧氏以為寵綰後除龍圖閣直學士知鄧州改知滁州洵仁尚書右丞洵武知樞密院洵武子雍亦以侍從終以故賞延子孫為多凡子孫之散居者曰成都曰瀘曰嘉曰廣安曰懷安之古城鎮曰普曰夔而雙流族所未顯者惟二江先生至之兄弟之後亦異矣雍子椿機位至郡守椿念再世名位在宣政童蔡間率太息一日得洵武諫伐燕疏亟乞蜀守汪公應辰識之應辰曰事具國史矣亦為之跋椿哭先墓下以告蜀土謂為人孫如此皆賢之張氏張氏漢綱之後綱卒瘞犍為武陽唐大中時有天祺者自武陽徙江源卒瘞後有白檀生墓間號白檀張氏五傳至中理舉逸民不就即拜將作監主簿子曰公謹元祐五年五經出身纍贈少師公謹之子深徙雙流登崇寧第纍遷夔州路轉運判官張丞相浚宣撫川陜承制黜陟除深潼川路提點刑獄改轉運副使遷知夔州中書舍人勾濤論馬政力薦深除管川陜茶馬繼除都轉運使以制置使胡公世將議酒法不合改除瀘州因母祠請老子孫多以賞得官子玨慎孫徽之安之皆郡守張氏張氏先世曰守圭朝奉大夫若訥若愚孫協一再世弟兄登科協為詩有唐人風後終於宣議郎其弟終茂州别駕郭氏郭氏先世曰絳以至孝有聲州里子卯貢上庠中第官終於部刺史秦丞相檜與卯有庠序之舊及當國卯絶弗與通歷相三郡家食凡一十八年晚年號亦樂居士子皆以賞惟民復世其科嘗入為宗正丞知崇慶府除夔州路轉運判官未赴卒孫以祖賞得官曰道子梁氏梁氏七世曰介紹興丁丑進士第三人為校書郎乞彭州歸遷利州路轉運判官兼四川宣撫司參議官改知瀘州居嵗餘民夷便安之詔改瀘南兼安撫一路以旌其能瀘州為一路安撫自介始梁丞相克家薦之有旨詔赴行在道遇病辭得主管沖佑觀再召又辭除知遂寧府未赴卒二子皆得官曰种曰穆從子自類省奏名曰梓李氏李氏系出隴西自敘云七世祖騏隱五季間聞蜀多名山遂挈二子及宗屬自鼎灃入蜀遊岷峨棲於雅州之瓦屋世祖迪為儒生其家雙流自曾祖元義元義生文顯文顯生某某亦學道因出遊學放浪山水間不歸其葬也以衣冠三子師尹庾嵩卿庾入太學與四方賢士交獨於李光泰發最厚晚樂善好施子大年甚似之二子嘉謀嘉猷同登第嘉猷好學工詩文官至宣教郎嘉謀嘗入為宗正丞出守二州繼持節作牧又典州云廣都費氏費氏自敘曰大費佐禹平水土有功今其裔也史册費氏多賢其入蜀莫知何自從常璩華陽國志贊先賢曰師義至仁費奉君貽字也貽不仕公孫述佯狂漆身墓今在成都東南則蜀有費舊矣曰禕曰詩墓皆在詩子立孫盛蜀世譜云益州諸費有名位者多詩之後南宋時遊為寧蜀郡太守墓亦在雙石闕甚偉廣都北有鄉曰石柱雙指闕也王氏偽蜀有曰宗陶曰叔熊皆為輔佐宗陶之後為廣都房叔熊之後為沙渠鎮房宗陶子曰順初順初有族子曰黃裳舉孟蜀進士第一孫曰韜韜生傳誨傳誨生得圭得璋得圭生惟亮惟古惟亮生襄舉孝亷惟古生二子曰䇿調蒲江簿曰求登熙寧第官雖止眉山令而博學為鄉先生求生開開生樞機桓朴植子申之孫士戣士寅士威皆後先登第申之孫士寅又於四川類省第一士寅終右史士戣典州䇿之子曰汝弼孫曰安中曾孫曰行之玄孫曰士兖汝弼行之安中士兗亦後先登第行之常於中書門下省檢正諸房公事終直寶文閣沙渠房亦蕃登第相望實𨽻邛州惟雙流蓋廣都别名在漢曰廣都隋以諱更為雙流唐兼存之故雙流房日振舊遊太學登紹興第三子太猷太川太臨實世其科太川後為四川類省第一太猷典州雖兩邑子孫繁簡不齊實望族也馬氏馬氏族七世曰捷嘗登進士第不克顯曰騏始著騏登紹興進士第執政楊公椿薦之高廟有旨召騏辭召乃發賜對除軍器監主簿孝宗初元遷起居舍人兼侍講權中書舍人有旨權直學士丐祠除知遂寧眉州使權潼川路知潼川除祕閣修撰奉祠知瀘州再知遂寧除右文殿修撰再知潼川卒有子覺世其科自郡守召為太府少卿從子興孫亦登第張氏張氏族世曰大同登紹興進士第嘗教授成都解官不復出三奉祠祿多著書號淡齋先生子敬修從子聿修皆登科溫江文氏文氏自謂漢文翁裔有龜年者唐乾符中明經及第至彰明令孫曰谷為孟蜀侍御史再傳曰大章仕宋為國子祭酒谷兄弟五人一居漢州一居梓一居綿一居邛一居溫江云居溫江者曰祥有經學邑人師之曽孫察遂登元豐第積官及贈至中奉大夫二子振道振竒孫人中族子振德振鷺諸從孫定中安中衡中達之繼世登第袁氏袁氏以天綱為祖史曰天綱益州成都人也溫江西二十里曰淘壩鎮有井號天綱井其裔環居井側有名芝者於鎮建寺有異應費元量楊徽胡叔豹皆蜀賢大夫為之記載芝子孫蕃衍鎮莫能容四世子昌年遂徙溫江鴻為廣文館生試中上遊縣為立擢秀坊子孫遂連取名第自省大才大明大聲仲午桂凡七人鄉舉中選者過倍寋氏寋氏祖蹇叔唐有侍臣曰蹇道原從僖宗西巡僖宗謂曰蹇不利東北因更氏曰寋後有居懷安軍金堂曰逢生二子長曰生汝明皆登第為金堂開家及曰綰徙溫江子汝礪迪功郎汝能贈承事郎子孫皆登第者曰克諧曰誼曰騏曰寅望新都沈氏沈氏唐末有工部郎中穆之隨僖宗入蜀居新都之彌牟鎮穆之世孫卣紹興進士官至朝奉郎知榮州一世孫曰浚明曰子震曰恪曰樞十一世孫曰仲巽浚明子震仲巽皆第進士浚明子震官至通直郎仲巽修職郎恪以賞樞以恩皆得官樞迪功郎楮幣譜蜀民以錢重難于轉輸始製楮為劵表裏印記隱密題號朱墨間錯私自參驗書緡錢之數以便貿易謂之交子凡遇出納本一貫取三十錢為息其後富民十六户主之尋亦資衰不能相償爭訟數起大中祥符末薛公田為轉運使請宫置交子務以權其出入不報寇公瑊守蜀乞廢交子不用會瑊去而田代之詔田與轉運使張若谷度其利害田若谷議以廢交子為非便請為置務禁民私造條奏甚悉又詔梓州路提刑王繼明與田若谷共議田等議如初詔從之始置益州交子務時天聖元年十一月也自二年二月為始至三年二月終凡為交子一百二十五萬六千三百四十貫其後每界視此數為準交子舊以二月二十日起界清獻公為記時以遷至七月也熙寧五年續添造一界其數如前作兩界行使從監官戴蒙之請也每道初為錢一貫至十貫寶元二年以十分為率其八分每道為錢十貫其二分每道五道若一貫至四貫六貫至九貫更不書放熙寧元年始以六分書造一貫四分書造五百重輕相權易於流轉於是蒙又請置抄紙院以革偽造之弊引有兩界與官自抄紙皆自蒙始大觀元年五月改交子務為錢引務所鑄印凡六曰敕字曰大料例曰年限曰背印皆以墨曰青靣以藍曰紅團以朱六印皆飭以花紋紅團背印則以故事監官一員元豐元年增一員掌典十人貼書六十九人印匠八十一人雕匠六人鑄匠二人雜役凡十一二人廩給各有差所用之紙初自置場以交子務官兼領後慮其有弊以他官董其事隆興元年始特置官一員蒞之移寓城西淨衆寺紹熙五年始創抄紙場於寺之旁遣官治其中抄匠六十一人雜役三十人凡引一界滿納舊易新率千人取錢六十四曰貫頭錢天聖初止三十建炎初增八紹興十一年乃增今數其納換不盡者曰水火不到錢今一界所收併貫頭錢凡一百九十萬道總領所𣙜取以供軍儲所印之數自元豐元年兼收兩界之後紹聖元年增一十五萬元符元年增四十八萬道祖額每界以一百八十八萬六千三百四十為額以交子入陜西轉用故也崇寧間用兵陜西開拓境土通行引法以助兵費元年增二百萬二年增一千二百四十三萬五千四年增五百七萬五千大觀元年增五百五十四萬五千六百六十六比至換界以新引一當舊引四引法大壞尋有詔自四十一界至四十三界更不許換四十四界止依天聖舊額仍不得越銅錢界建炎二年罷鑄錢復用元符所增之數紹興元年增六十萬二年增一百四十萬三年增五百萬四年增五百七十萬五年增二百萬六年增六百萬皆以給利夔兩路軍費七年有旨不許泛印八年以邊報急闕增三百萬充糴買九年以移屯陜西合給糴本及陜西六路新復州軍衣賜增二百萬增數既多僉書樞密院事樓照奉使陜西奏禁泛科始定著刑章十年以贍軍急闕增五百萬十三年以都運司之請增四百萬二十九年以增招軍兵椿辦犒賞總領所請增一百七十萬詔從之自後纍增五百餘萬凡兩界共為錢引四千六百四十七萬二千六百八十紹熙二年有旨將八十三界錢引展一界行使增印錢一百九十萬以償總領所兌引貫頭水火不到之數慶元三年總領所奏以成都潼川利州三路旱場制置司減免民間租賦乞增印錢引以備對補有餘以充賑濟詔增一百萬逮今合四千九百三十七萬一千六百八十道矣而又偽造竊行足以亂真引日益增錢日益銷子母不能相權然有稱提之法以錢稱提者引價低則官出藏鏹增價與民市引是也以法稱提者凡民以錢輸官當折引則以一貫二百八十為限是也蓋有錢則有引天聖所印之數視錢以為準者也自軍興增科鑿空為錢天下大計仰給於紙猶幸守和議引之出納有常半藏諸司之庫半流轉於民維持不壞識者有憂其在軍旅之際乎箋紙譜古者書契多編以竹簡其次用縑帛至以木膚麻頭敝布魚網為紙自東漢蔡倫始簡太重縑稍貴人遂以紙為便倫宦者也傳多稱其能然受宫掖風旨諂親貴猶宦者態也智足以創物而亦足以殺身第于文字有功人至今稱蔡倫紙今天下皆以木膚為紙而蜀中乃盡用蔡倫法箋紙有玉版有貢餘有經屑有表光玉版貢餘雜以舊布破履亂麻為之惟經屑表光非亂麻不用於是造紙者廟以祀蔡倫矣廟在大東門雪峰院每遇歲時祭祀香火纍纍不絶易以西南為坤位而吾蜀西南重厚不浮此坤之性也故物生蜀者視他方為重厚凡紙亦然此地之宜也府城之南五里有百花潭支流為二皆有橋焉其一玉溪其一薛濤以紙為業者家其旁錦江水濯錦益鮮明故謂之錦江以浣花潭水造紙故佳其亦水之宜矣江旁鑿臼為碓上下相接凡造紙之物必杵之使爛滌之使潔然後隨其廣狹長短之制以造砑則為布紋為綾綺為人物花木為蟲鳥為鼎彝花紋雖多變大抵因時之宜非意為之也紙以人得名者有謝公有薛濤所謂謝公者謝司封景初師厚師厚創箋樣以便書畫因以為名薛濤本長安良家女父鄖因官寓蜀而卒母孀養濤及筓以詩聞外又能掃眉塗粉與士族不侔客有竊與之宴語時韋中令臯鎮蜀召令侍酒賦詩僚佐多士為之改觀期歲中令議以校書郎奏請之護軍曰不可遂止濤出入幕府自臯至李德裕凡歷事十一鎮皆以詩受知其間與濤唱和者元稹白居易牛僧孺令狐楚裴度嚴綬張籍杜牧劉禹錫吳武陵張祐餘皆名士記載凡二十人競有酬和濤僑止百花潭躬撰深紅小彩箋裁書供吟獻酬賢傑時謂之薛濤箋晚歲居碧雞坊創吟詩樓偃息於上後段文昌再鎮成都太和歲濤卒年七十三文昌為撰墓志謝公有十色箋深紅粉紅杏紅明黃深青淺青深緑淺緑銅緑淺雲即十色也楊文公億談苑載韓浦寄弟詩云十樣蠻箋出益州寄來新自浣花頭謝公箋出於此乎濤所製箋特深紅一色爾偽蜀王衍賜金堂縣令張蠙霞光箋五百幅霞光彩疑即今之彤霞箋亦深紅色也蓋以胭脂染色最為靡麗范公成大亦愛之然更梅溽則色敗萎黃尤難致逺公以為恨一時把玩固不為久計也箋凡紙皆有連二連三連四售者連四一名曰船又有青白箋背青靣白有學士箋長不滿尺小學士箋又半之倣姑蘇作雜色粉紙曰假蘇箋皆印金銀花於上承平前輩蓋常用之中廢不作比始復為之然姑蘇紙多布紋而假蘇箋皆羅紋惟紙骨柔薄耳若加厚壯則可勝蘇箋也川蜀箋體重一夫之力僅能荷五百番四方例貴箋蓋以其逺號難致然徽紙池紙竹紙在蜀蜀人愛其輕細客販至成都每番視川箋價幾三倍范公在鎮二年止用蜀紙省公帑甚多且怪蜀諸司及州縣緘牘必用徽池紙范公用蜀紙重所輕也蜀人事上則不致輕所重矣此以價大小言也余得之蜀士云澄心堂紙取李氏澄心堂樣製也蓋表光之所輕脆而精絶者中等則名曰玉冰紙最下者曰冷金箋村廣都紙有四色一曰假山南二曰假榮三曰冉四曰竹絲皆以禇皮為之其視浣花箋紙最清潔凡公私簿書契劵圖籍文牒皆取給於是廣幅無粉者謂之假山南狹幅有粉者謂之假榮造於冉村曰清水造於龍溪鄉曰竹紙蜀中經史子集皆以此紙傳印而竹絲之輕細似池紙視上三色價稍貴近年又倣徽池法作勝池紙亦可用但未甚精緻爾雙流紙出於廣都每幅方尺許品最下用最廣而價亦最賤雙流實無有也而以為名蓋隋煬帝始改廣都曰雙流疑紙名自隋始也亦名小灰紙蜀錦譜蜀以錦擅名天下故城名以錦官江名以濯錦而蜀都賦云貝錦斐成濯色江波遊蜀記云成都有九璧村出美錦歲充貢宋朝歲輸上供等錦帛轉運司給其費而府掌其事元豐六年呂大防始建錦院於府治之東募軍匠五百人織造置官以蒞之創樓於前以為積藏待發之所榜曰錦官公又為之記其略云設機百五十四日用挽綜之工百六十四用杼之工五十四練染之工十一紡繹之工百一十而後足役歲費絲權以兩者一十二萬五千紅藍紫茢之類以斤者二十一萬一千而後足用織室吏舍出納之府為屋百一十七間而後足居自今考之當時所織之錦其别有四曰土貢錦曰官告錦曰臣僚襖子錦曰廣西錦總為六百九十匹而已轉運司錦院織錦名色即成都府錦院土貢錦三匹花樣八答暈錦官告錦四百匹花樣盤毬錦簇四金雕錦葵花錦錦六答暈八答暈錦錦翠池獅子臣天下樂錦八十七匹雲鴈錦僚襖子錦花樣簇四金雕錦天下樂錦八答暈錦廣西錦二百匹花樣真紅錦一百匹大窠獅子錦雙窠雲鴈錦大窠馬打毬錦宜男百花錦青緑錦一百匹宜男百花錦青緑雲鴈錦茶馬司錦院織錦名色茶馬司須知云逐年隨蕃蠻中到馬數多寡以用折傳别無一定之數緋甲被錦七八行瑪瑙錦緋大被敘州紅大被褥真真紅雙連椅背南真紅單椅背平軍真紅大被褥皂大被褥真紅雙窠錦青太被褥文州設紅錦犒細色錦名色雲鶴錦青緑瑞草青緑如意牡丹錦真紅宜男百花錦真紅水林檎錦真紅穿花鳯錦真紅櫻桃錦真紅雪花毬錦紫皂段子錦鵝黃水林檎錦真紅天馬錦真紅飛魚錦錦真紅六金魚真紅聚八仙錦錦秦州細法真紅秦州中法真紅錦孔秦州鹿法真紅錦百花真紅湖州大百花雀錦四色湖州孔雀錦錦二色湖州大百花孔雀器物譜玉璧玉印各一印文似成信字雍州兵於成都縣獲之衛瓘以上之相國府魏咸熙元年於是司馬氏宣示百官仍藏之府公孫述起成都自號成家三五之文殆述作也淳于古禮器也廣漢什邡人段祖以獻之益州刺史始興王蕭鑑高三尺六寸六分圍三尺四寸圓如筒銅色如漆甚薄上有銅馬以繩貫馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注淳于以手振芒則聲如雷清響良久乃絶古所以節樂古鐵鑑一王宗壽字永年建族子得之江源下有篆文十二字宗壽覽照見一青衣小兒坐酒樓上試令人訪之青衣隨至謂宗壽曰何以知我宗壽以實對青衣曰吾失此百年矣知在公處故此盤桓公其還我宗壽出而與之青衣剖腹納長揖而去宗壽有辟穀吐納之術或謂得之青衣今載其篆文云龍宫寶藏神和子鑄永年萬歲銅印一廣政十四年冬十月十五日彭山縣副將頭楊富獲於江岸印有六面方各寸許皆有篆文兩面共通一竅竅中三虗一實其直可貫其圓有規六靣篆文共八十二十分夾其竅六十均在四旁各成文章印過雕鏤有竅靣各一十字無竅靣各十五字以印進上嚴築作瑞篆記今楷其篆文備考一靣天國老君生萬民治中國外國人和璽凡十五字其相對一靣云老君授生輔天下國安平受道人長生凡十五字又一靣虛無自然明日月辰星光凡十字其相對一靣云玄女致和氣玉女致天醫凡十字又一靣上國仙師天師老君道成明天地政璽凡十五字其相對一靣云上召吾拜無為大昊通天下洽氣同璽凡十五字小金印一建炎初盧公法原修治羅城役夫得之以獻公因會鄉老出而薄觀有識其文者曰漢破氐羌侯五字字分作三行漢字居其一公以印寄帑紹興十年胡公世將捷於剡家灣張公壽一因取送胡公按漢土德故印章以五成此先漢時物但不知封侯者為何人也唐鐡劵二昭宗以賜陳敬瑄田令孜也劵形方如半甑縱長尺餘橫廣不及二尺以金為字俱在軍資庫但金已剝落無餘字益漫滅間有不可識者敬瑄以中和三年十月受賜令孜以四年十一月受賜僖宗猶在成都明年僖宗還京師後此八年當景福六年四月二人俱為王建所殺據新唐書蓋同日死令孜與敬瑄實斫削唐室何功之有焉雖冒受此劵卒不可用天道果昭昭乎劵字益就漫滅可惜敬瑄劵文承旨樂明龜作唐末之號令文章其氣象類如此也其略曰烹巨鰲者鼎大於滄海斬長鯨者劔倚於青天既立異勳充膺殊寵李晟免其十死子儀成其九功鎮以金鏞賜其鐡券後來繼者豈在他人又曰致朕身安由卿忠藎前封公爵後錫郡王詢於衆情未愜羣望今賜卿鐡劵舍卿十死瑄鐡劵官宰臣姓名漫滅不可復識田令孜鐡劵文其略曰人臣之績古今莫儔爵位不足以答元勳竹帛不足以紀大節式遵盛典用表殊庸宣賜駱谷扈從定難中興社稷功臣仍恕十死宰臣裴徹敬瑄令孜與建罪等耳敬瑄令孜幸而不成是以建獨曰叛方中和褒敬瑄功時曰子儀曰晟不得專美於前令孜又自有宦者來無此榮也識者謂墓石猶砢石爾無用也鐡劵其不類是乎使無一卷史書君子何所恃哉塔玉隋蜀王秀作鎮井絡聞益州福感寺塔基全是一石令人掘之尋縫至泉不見其際風雨暴至人有於石傍鑿一片將出乃是黳玉王問於識寶商商曰此是真黳玉世間希有歲華紀麗譜成都遊賞之盛甲於西蜀蓋地大物繁而俗好娛樂凡太守歲時宴集騎從雜沓車服鮮華娼優鼓吹出入擁導四方竒技幻怪百變序進於前以從民樂歲率有期謂之故事及期則士女櫛比輕裘袨服扶老攜幼闐道嬉遊或以坐具列於廣庭以待觀者謂之遨牀而謂太守為遨頭仁宗朝以益州重地嘗謀帥命宋公祁宰相對曰蜀風奢侈祁喜遊宴恐非所宜仁宗不從卒遣之公先奉詔修唐書因以書局自隨自成都每宴罷盥潄闢寢門垂簾燃二椽燭媵婢夾侍和墨伸紙望之者知公修唐書若神仙焉嘗宴於錦江偶微寒命索半臂諸婢各送一枚公視之慮有厚薄之嫌訖不服忍冷以歸舊俗傳誇以為談本田公况嘗為成都遨樂詩二十一章以紀其實而薛公奎亦作何處春遊好詩十章自號薛春遊以從其俗且欲以易尹京之舊稱此皆可以想承平之遺風也至清獻公為紀乃曰曩時宴會皆牙校掌之蓋𣙜酤之利有餘人樂於為役公帑歲入亡慮千萬貫有竒自新法頒行酒坊為官所鬻牙校雖得劵錢不足自贍乃者議置成都市易務方逰觀時人情瞿然減常歲之半及浣花後始聞罷去乃復朋聚遊江今公使錢歲給三萬貫常凛凜慮不足譬之巨人以狹衾寢覆趾則露肩擁左則闕右甚可笑也今盤饌比舊從省樂優之給亦復過殺設遂廢之則非天子所以付畀一隅惠保遠人之意而小民之鬻肴果者旦營暮供藉以為養此遊宴之不可廢也觀公此言則蜀人之貧富欣戚可以之知政矣今以元日為始而第其事歲華遊宴節正月元日安福塔俗二日東郊燈五日蠶市即蠶叢遺也上元二十三日聖壽寺前蠶市日二十八日保壽侯誕期二月二日踏青八藥市三月三日學射山山九日藥市士二十一日靈智禪師寂日宴海雲山有小池女探石其中占求子二十七日大西門蠶市日寒食怡忠院大四月十九日浣花佑聖夫人誕五月五日慈寺六月初伏日宴會監司大中伏日宴會職官十末伏日宴會州縣七夕慈寺門樓七月七日大慈寺散盂蘭盤宴守九月九日登高處冬至日宴金繩寺以上太出遊大宴於其士女盛遊偕樂明簡紹芳楊升菴年譜公姓楊氏諱慎字用修别號升菴其先廬陵人六世祖諱世賢者元末避歐祥之亂徙楚麻城冉避紅軍亂乃入蜀居新都世賢生壽山隱德弗仕樂善行誼鄉閭化之有李佛子之稱蓋世賢贅李氏子孫冒其姓也壽山生政字美玉習春秋善歐書元配郭氏生子二曰遠曰政卒娶羊氏無子卒娶熊氏生子三曰春曰惠曰哲以貢士仕為貴州永寧吏目却土官之賂金正州民之地界貴陽人傳誦之卒於官遠政亦相繼殁熊氏夫人攜二孀婦併三幼子負遺骼歸新都葬之城西春即公大父留耕公也性穎敏日記數千言家舊藏周易一部朝夕研究日漸有得乃入縣學為諸生復姓楊氏成化元年乙酉舉於鄉十七年辛丑舉進士移疾歸養𢎞治元年以熊夫人命北上授行人司司正時王端毅公為太宰擬授之際顧謂少宰張莊簡公曰老成人任此官固宜八年升湖廣提學僉事踰年乞歸留耕公配葉氏子七人長廷和即公父少師石齋次廷平號龍山戊午舉人終養不仕廷儀號瑞虹己未進士兵部左侍郎廷簡早卒廷宣號龍崖辛酉舉人􅍦擅古學為李文正公所稱嘗著連雲棧賦載蜀志皆葉夫人出廷歷以石齋考滿廕國子生廷中縣學弟子側室王氏出石齋公生於天順己卯甫四歲知聲律日記書數卷年十三舉於鄉二十舉進士由翰林庶吉士歷官少師兼太子太師首相兩朝有除難定策之功焉子四長即升菴公少師元配一品夫人眉山黃公明善之女所出次惇號敘菴癸未進士兵部職方主事恆號貞菴承廕中書舍人升大理右寺副忱號孚菴丙子舉人皆太孺人蔣氏出若龍山公之子癸酉舉人悅縣學生悌瑞虹公之子丙戌進士恂姚安知府慥盧溪知縣性龍崖公之子荆州長史悅縣學生惟則公之從弟也先是石齋與黃夫人以囏嗣為憂嘗禱於神後神語曰當以聰明竒慧子畀君又夢送五代忠臣夏魯竒至曰武臣也復以中庸十入章輔之𢎞治元年戊申十一月初六日生公於京師之孝順胡同岐嶷穎逹十嵗母夫人教之句讀並授以唐絶句輒成調又以筆管印紙作圈令公書字於中曰吾雖不知書然即此則楷正自可觀矣公奮志誦讀不出外戶戊午年十一作近體詩有一盞孤燈照玉堂之句石齋公曰句佳矣但恨太孤寂耳不悅己未果罹母黃夫人憂極其悲號廢食骨立未幾祖母葉太夫人訃聞隨石齋公回蜀守制留耕公授以易兩旬而洽不遺一字擬作古戰場文有青樓斷紅粉之魂白日照翠苔之骨數語瑞虹公極稱賞復命擬過秦論留耕公竒之曰吾家賈誼也一日石齋公與瑞虹龍崖二公觀畫問曰景之美者人曰似畫畫之佳者人曰似真孰為正公舉元微之詩以對龍崖曰詩亦未見佳汝可更作公輒呈稿云會心山水真如畫名手丹青畫亦真夢覺難分列禦寇影形相贈晉詩人二公曰只此四句大勝前人矣時公年一十二辛酉石齋公服闋公亦入京師有過渭城送别詩及霜葉賦詠馬嵬坡詩云鳯輦匆匆下九天馬嵬西去路三千漁陽鼙鼓煙塵裏蜀棧鈴聲夜雨邉方上遊魂招不返詞人長恨曲空傳蛾眉尚有高丘在戰骨潼關更可憐師福建鄉進士雪溪魏先生浚習舉子業偶作黃葉詩李文正公見之曰此非尋常子所能吾小友也乃進之門下命擬出師表及傅奕請沙汰僧尼表文正覽之謂不減唐宋詞人𢎞治乙丑侍石齋公於禮闈時崔公銑試卷在分考劉武臣簾下疑其刻深未録公見之愛其竒雋以呈石齋公遂擢詩經魁崔知而以小座主稱焉竟為生平知己時公年一十八正德丙寅與同鄉士馮馴石天柱夏邦謨劉景宇程啓充為麗澤會即墨藍田永昌張含結社倡和丁卯歸應四川鄉試督學南峯劉公靣試而竒之曰吾不能如歐陽公乃得子如蘇軾是秋果擢易魁九月安人王氏來嬪清素僅如田家禮十一月上禮部戊辰春試主考王公鏊梁公儲得公文已置首選卷偶失燭遂下第有空吟故國三千里悔讀南華第二篇之句入國學祭酒周公王類試之曰天下士也己巳歷事禮部周旋朝夕不倦尚書劉公宇一日見公問曰子為誰公對曰楊慎劉曰本部天下人豈必一大臣子弟耶乃稱嘆不置辛未禮部費公宏知貢舉入總文衡則靳公貴擢公第二殿試則及第第一制策援史融經敷陳𢎞剴讀卷官李公東陽劉公忠楊公一清相與稱曰海涵地負大放厥辭共慶朝廷得人授翰林修撰公時年二十四癸酉丁繼母喻夫人憂居家讀禮賻儀一無所受學憲劉公節稱之曰禮不忘於口誦義每絶乎幣交明年藍鄢諸寇作亂公在邑城中日夕戒嚴有賊數百詐稱官軍以劫門者公令守雉堞者詰之散去乙亥服闋冬十二月北上舟至嘉定黃閣扁幾危而得濟遂與布政伍公符鄰舟倡和下江陵丙子入翰林為經筵展書官及校文獻通考同館則鄒公守益王公思尹公襄劉公泉孫公紹祖張公潮也丁丑為殿試掌卷官得舒公芬䇿以呈閣老梁公儲不置鼎魁公力爭乃得首第時武皇遊幸宣大榆林諸邉返而復往公疏切諫不報乃以養疾乞歸明年王安人卒己卯繼室得遂寧黃簡肅公珂女時江西寧藩之變值石齋公當國公經廣漢詩曰遊子戀所生不獲常懷安大哉宇宙內吾道何盤桓庚辰九月公北上仍舊官辛巳四月世宗即位五月公為殿試受卷官八月開經筵公首作講官進尚書金作贖刑之章言聖人贖刑之制用於小過者冀民自新之意若大姦元惡無可贖之理時大閹張鋭于經等皆犯先朝事罪當死以進金銀得免故及之壬午二月命公代祀江瀆及蜀藩諸陵寢著江祀記與給事熊公浹御史簡公霄遊浣花溪載酒賦詩有煙霞誰作主魚鳥自相親斗酒千金會扁舟兩玉人之句十二月北上復命癸未纂修武廟實録公練習朝典事必直書總裁蔣公冕費公宏曰官階雖未及實堪副總裁者乃盡以草録付校時六年考滿吏部侍郎羅公欽順考公語曰文章克稱乎科名慎修允協乎名字甲申七月兩上議大禮疏嗣復跪門哭諫中元日下獄十七日廷杖之二十七日復杖之斃而復蘇謫戍雲南永昌衛時同事死者配者黜者左遷者一百八人挽舟由潞河而南值先年被革挾怨諸人募惡少隨以伺害公知而備之至臨清始散去時公年三十七乙酉正月至雲南病馳萬里羸憊特甚栖栖旅中方就醫藥而巡撫台州黃公衷促且甚公力疾冒險抵永昌幾不起巡按郭公楠清戎江公良材極為存護卜館雲峯居之且上疏乞宥議禮諸臣而郭亦被詔下獄為民丙戌九月聞石齋公寢疾匹馬間道十九日至家石齋公悅而疾愈七月攜家就戍所十一月尋甸府土舍安銓變起十二月武定土舍鳯朝交亦起攻掠城堡為患孔棘公嘆曰此吾效國之日也乃戎服率旅僮及步騎百餘往援木蜜所守禦入城與副使張峩謀固守明日賊來攻城寧州土舍陸紹先率兵戰城下公促城中兵鼓譟開門出戰以助外兵賊散去公復歸會城戊子春疫殍大作乃徙居洱海城疫息仍居雲峯尚書伍公文定黔國沐公紹勳鎮守太監杜唐同來問疾時公一足病有半人嘲鑿齒一足笑虞夔之句己丑八月寓趙州聞石齋公訃奔告巡撫歐陽公子重疏上得歸襄事十一月還滇壬辰正月布政高公公韶聘修雲南通志館於滇之武侯祠時卿大夫有欲冒嗣潁川侯傅友德以覬世爵者公不可乃乘張羅峯復相流言欲中害公遂去有中宵風雨太多情留住行人不放行借問小西門外栁為誰相送為誰迎之句癸巳西遊大理諸處會禺山張公含於霽虹橋刻詩崖崿以志别甲午阿迷州僉事王公廷表迎往館之經臨安納少室新喻人周氏乙未六月子同仁生丙申至喜州訪給事楊𢎞山十雲復寓點蒼山感通寺之寫韻樓丁酉與御史李中漢元陽遊石寶山七月還戍所戊戌奉戎檄歸蜀便道獲拜阡梓事畢還滇己亥十一月冉領戎役於重慶道庚子役事竣至遂寧七月歸新都八月巡撫東阜劉公大謨聘公及玉壘王公元正方洲楊公各纂修蜀志辛丑還滇至東瀘疾作巡撫龍山戴公金留之返成都與梓谷黃公華珥江劉公大昌遊青城丹景雲臺諸山壬寅七月還戍所八月納少室北京人曹氏癸卯十二月子寧仁生公大喜時當道與黔國沐公交遊士夫俱詩章宴賀有天上麒麟輝蜀水海中龍馬過滇池之句是年公復領戎役於蜀甲辰至瀘州與少岷曽公璵遊九十九峯山四月還戍所乙巳二月徙居大理與門生董難尋罷谷山經喜􅚲會𢎞山諸公倡和九月還戍所丙午丁未居滇之高嶢有十二景日與士大夫交遊二月公屬紹芳𨽻漢王褒移金馬碧雞文於羅漢寺之崖凡招提佳勝會意處便操觚留題冬十月公復適臨安訪臬憲樊公景麟暨桐岡葉公遊諸巖洞勝景戊申春至晉寧與侍御池南唐公錡遊海窰蟠龍生佛諸山陀己酉居高嶢夏秋每與滇之卿大夫葉兩湖胡在軒遊初武廟閲文獻通考天文星名有注張命內閣取祕書通考又作汪張中使下問欽天監及翰館中皆莫知為何星也公曰注張栁星也歷引周禮史記漢書以復又湖廣土官水盡源通塔平長官司進貢同官疑為三地名於長官司上添一三字公曰此六字地名也取朝中官制證之嘉靖初給事中張翀上言時政論學術不止一條有矞宇嵬瑣之語上問之內閣公適在館中即取荀子非十二子篇以復敬所蔣公喜曰用修之博何減古之蘇頌乎其該洽精辨類如此乃若論王導之賊晉室辨太王之非剪商魯之重祭不始於成王周公春秋五伯深斥乎楚宋秦繆引墨子及修文御覽以辨范蠡無載西施之事引黃東發蘇東坡之言及李漢韓文序以辨文公與大顛書之偽駁歐陽氏非非堂之説辨陳白沙六經皆虛之語斥戴石屏之無行傳唐貴梅之死節此又證據古今闡揚幽隱謂其有功世教也非乎至若陶情乎豔辭寄意於聲伎落魄不羈又公所以用晦行權匪恆情所易測者也昔重慶守劉公繪貽公廷祿偕紹芳數遊昆明池有池賞詩社集庚戌四月海口疏雲南臺司顧箬溪諸公請公記其事於石壬子二月時在逸武辨得委祭龍海口歸肆狂惑復丁夫六千督往駐濬剝衆利州人苦之有言於公者公嘆曰海已涸矣田已出矣民已疲矣致書巡按趙公炳然罷之三月劉蓉峯明刑持先廷尉執齋王公詩文集請公批選於太華寺癸丑公復領戎役於蜀僑寓瀘州丁巳六月長子同仁卒無嗣八月歸新都敘菴弟卒公痛悼倍於尋常其誄辭有曰我生與弟先後之年呱呱而泣形分氣連夏炎合簟冬寒並氊母攜父抱偎溼就乾八歲就傅雙筆一研嬉戲偕止出入隨肩飲啖讓果跬步共磚又曰七帙將躋我歸自滇兄酬弟勸翕樂罔愆觴我於庭羣從孚攣劇談飛屑倡和珠蠙笑語亟斷頃刻弗延豈意宴席化為几筵遽爾凋喪門祚中顛幼弱一人何忍余捐余生則先弟亡則前前後存亡誰質諸天其友愛至情見於辭者如此至若保誨遺孤紀綱家政既乃心力從子有仁以髫年失怙而幸免於顛覆者皆公惠之及也戊午子寧仁娶瀘州滕恩官女為室公僑寓江陽者十數年交遊日衆與曽岷野章后齋諸公友善己未春還戌所六月遘疾感懷詩曰七十餘生已白頭明明律例許歸休歸休已作巴江叟重到翻為滇海囚遷謫本非明主意網羅巧中細人謀故園先隴癡兒女泉下傷心也淚流又訣李張唐三公詩云魑魅禦客八千里羲皇上人四十年怨誹不學離騷侶正葩仍為風雅仙知我罪我春秋筆今吾故吾逍遙篇中溪元半谷池南二叟此意非公誰與傳卒於七月六日年七十有時巡撫雲南遊公居敬命殯歸新都庚申冬袝葬石齋公墓側丁卯穆宗即位奉遺詔追贈光䘵寺少卿長子同仁先卒次子寧仁時寓瀘州公卒之年夫人黃至瀘迎歸撫教則夫人任之也公孝友性植穎敏過人家學相承益以該博凡宇宙名物之廣經史百家之奧下至稗官小説之微醫卜技能草木蟲魚之細靡不究心多識闡其理博其趣而訂其訛謬焉正德間有寄書曰凡人情有所寄則有所忘有所譏則有所棄寄之不深則忘之不遠譏之不甚則棄之不篤忘之遠則我無所貪棄之篤則人無所忌無所忌而後能安無所貪而後能適足下所為蓋得其適與安也古人買田宅擁聲伎皆豪傑蓋世之才然獨無抱尺寸者之見也僕觀足下自蒙難以來嘔心匠意摹文續經延搜百氏窮探古迹鑿石辨剝泐碑搜出遺忘有僻儒苦士白首蓬藋日自纂索所不能盡而謂竭精蕩神於逸欲聲色者能之乎斯言也可謂諒公之深者矣公嘗語人曰資性不足恃日新德業當自心力中來故好學窮理老而不倦又嘗自贊曰臨利不敢先人見義不敢後身雖無補於事業求不負乎君親遭逢太平以處安邉歌咏擊壤以終餘生天之顧畀厚矣篤矣吾之涯分止矣足矣蓋困而亨沖而盈寵為辱平為福者耶此公自狀實録至其生平著述四百餘種散逸頗多學者恨未睹其全也舊志器物譜夾江弱漹鎮玉印明𢎞治初士民耕田犁出一印如玉上刻云衛生藥寶為郡醫所獲又一藥臼碎之欲鑄農器遇火即飛散矣識者惜之旌陽古鼎昆明傅順孫令德陽時治廨後蔬圃鋤下地應有聲若震金石掘丈餘許得古鼎高三尺五寸圓四尺五寸厚二寸兩耳高五寸薄三寸五分孔圓一寸扃穿耳方圓一寸鼎蓋厚寸五分龍虎雕畫細如毛髮其質非鐵非石體作丹砂駁文發之黃金滿鼎可百餘斤順孫獲鼎以還昆明身後其子孫侈費蕩盡立錐地不能存蓋許真君作丹代民租以其餘瘞地中俟異日不能租者而人不知迄今千餘年神物或輕用若有攝而去矣靈巖石鼓眉州大江東北岸近靈巖寺下江沙中得巨石鼓一高三尺圍六尺許形製殆類岐鼓狀但無紀畫可考豈蜀石善泐為囓濤所薄蝕盡乎僧因舉置廡下寶重之邵氏爐宋邵伯溫仲子博隨父入蜀其祖康節嘗語之曰世亂蜀可居宣和末伯溫載家人仕蜀家於嘉州始免難博隱於犍為太定山遺草書千字文石刻為寺僧所毁惟方丈古銅香爐存異文瑞石宋太平興國四年嘉州夾江民王諸得江石二皆黝質丹文隱起成字一曰君王萬歲一曰趙二十一帝鳯頭石夾江縣有鳯頭石上有文若鳯頭狀提學王公懋倫識於江臯命縣令陸綸置於學銅馬宋時郫縣村民鑿古墓得一銅馬高可三尺許製作精妙簡池守景季淵取以歸中宵風雨輒聞嘶聲怪之不敢留移送佛寺紹興丙子王灼以事至成都黃伯淵見索灼為作銅馬歌云君不見武皇逸志凌九垓追風躡電思龍媒魯班門外立銅馬天廏萬匹皆塵埃又不見伏波將軍破交賊歸來殿前獻馬革據鞍習氣殊未衰想見老子真矍鑠兩京翻覆知幾秋只有山河共客愁孤煙落日蠶叢國出此神物於荒丘千年黃壤誰作主猶把歸心泣風雨但恐一朝去無蹤有似豐城寶劔化雙龍內江古物內江縣化龍山石崩裂得古鏡二寶劔一印篆一有石刻云有宋之始化龍為記日月相均永遠不墜鏡為當事者持去印劔貯長生觀中今皆不知所在又三堆山居人掘得銅牌一面上有字云塵世不我留身寄白雲浮若問真逰處三山與十洲綦江古物綦江縣白雲觀掘地得白雲石硯一古鏡一鑄有湖州青銅照子六字古錢一曰淳佑通寶又古劔山掘得古劔一諸葛鼓萬厯元年四川巡撫曽省吾蕩平九絲城都蠻俘獲諸葛銅鼓九十三面擇其有聲者六十四面分天地人三號以獻蠻中以為寶器有剝蝕聲響者為上上易牛千頭次者七八百頭遞有等差藏至二三面者即得雄視一方所鑄皆竒文異狀互相錯蟠僅可辨者雕螭刻鷺間綴蝦蟇其數皆四疑武侯所製以鎮蠻者鬵器同時又得銅鐵鍋二口皆阿大王所蓄製更竒異識者曰此非鍋乃鼎類也其名曰鬵詩云溉之釡鬵其制大上小下若甑鐺無足兩耳峙如山形蠻中尤為至寶即諸蠻多不得見其重又不啻銅鼓諸葛圖譜漢南夷輕為禍變諸葛亮乃為之作圖譜先畫天地日月君長城府次畫神龍龍生彝牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫牽牛負酒賫金寶詣之之象以賜夷夷甚重之許致生口又與瑞錦鐵劵每刺史校尉至賫以呈詣動亦如之丁大夫明朝御史大夫丁玉以平羌將軍經略西番鑄銀為錠與之要約散給諸羌得之者寶之如神物上有誓詞輕重不等番中號之為丁大夫大瀼玉印宋宣和中夔人龍澄嘗於大瀼水中獲玉印文非世間篆籒澄恍見天神立於傍曰此印為上帝所寶忽不見澄乃奉印投原處東溪石犍為治東二十里土人掘地得石上題東溪之湄孕秀懷竒偉哉文人文章之師寶而藏之赫然有輝玄武石中江玄武山下淵中産石成龜蛇之形嘉州寶鏡宋漁人王甲於江中網得古銅鏡一枚徑圓八寸許有雕㻲欵式甲不能識也持歸生計日豐不假經營而錢財自至間謀獻之白水寺寺僧以贋者易之後復為其徒竊以他往值神人持戟長身甚武叱曰還我寶鏡僧疾走百步有虎扼其前懼而擲之以竄遂不知所在詳見洪邁嘉州江心鏡記漢磬漢成帝綏和元年犍為郡於水賓得古磬一十六枚劉向因上言宜立辟雍陳禮樂以風化於天下得磬處在玉津縣今之犍為壩也距州十里丹缶漢嘉郡治之西偏望雲樓東有石穴天將雨輒出雲氣發之則石室屹立室之前地中獲瓦缶形製甚古貯丹砂雲母竒石或爛然類黃金意其金丹之餘也悉斂而櫝藏輸之府庫金氏諸錢綿州大參贈中丞金鬱為寺丞時治第於家瓦礫中得錢四其文曰早登科第後知思南府修廨舍得錢一其文曰子孫昌盛冢孫白建新宅復得錢一其文曰加官進祿考之古錢無如此者父子祖孫相繼榮顯亦非偶矣晉磚灌縣西鉢盂泉因墾地得一磚上有晉太康年號唐鐘雅州龍興寺有唐開元銅鐘鑄云唐開元十七年鐘上隱起一銀錠其迹宛然唐礎新都縣有唐僖宗幸蜀時所遺行殿柱礎唐幢成都石犀寺後有土阜嘉靖間寺僧掘得石幢一合頂趺高七尺許形削六方徑圍三尺上刻尊勝護諸童子等咒為唐太和中馬季武書筆法遒徑蓋竒物也元鐘江安縣西林寺有元時所鑄鐵鐘音聲洪逺震聞數里雅安竒石雅州山門寺殿前有石一株髙近二丈周五丈形如盛開花朵色青碧如鴿羽號太湖石縣令許長源愛其瑰特雨餘翠碧鮮潤謂宛如天竺羅浮飛來之異因名飛來又雲峯寺殿前亦有石髙丈餘周四丈竒峭若峯米石忠州石寶山一石突高員三四丈餘根狹小傍有一孔如盂通明其頂相傳昔有米出其中日可食一人僧因剎焉後以冗穢米遂絶巴縣亦有金田寺宋時米自山孔中流出以供寺僧今無矣氈草引藤忠州東南十里曰氈毛山地多産草如氈八十五里曰引藤山其山多出引藤大如指中空可吸酒白樂天詩間拈蕉葉題詩句悶取藤枝引酒嘗松屏石涪州松屏山翠聳雲霄其山上産石有文如松形可製為屛每雨餘青連江練色映州城青蟆石巴縣岷江水邉細密之石名青蟆石可作茶碾寶珠大足寶珠溪在治南四十里唐貞觀時漁人郭福者夜捕魚見水際有光即之有蚌如斗剖之得珠徑寸獻之太宗賜以積善井碑碣存石龜榮昌東有小石溪溪中有石坑如甕石底有天成石龜安居山亦有鑿石得龜者響石武隆治東關灘叢石中有響石舊傳高僧過此談經而鼓之鏗鏗然今擊之猶有聲山巖木匱彭水縣麻油灘上懸崖壁立人攀緣不能到其巖竇之處嵌空各有木匱藏置其中莫考從來今改名萬年倉又黔江匱子巖亦有此異其高數十丈上有木匱至今不朽因以為名焉諸葛石鼓夔州府江岸與八陳圖相對有石鼓世傳武侯教戰之鼓柏柱白帝城西有木如柱大十圍高三丈世傳為公孫子陽樓柱斫之出血枯而不朽誓水柱石泉縣河岸有石高一丈圍五尺前人立以坊水名誓水柱張三丰遺物銅梁巴嶽山有真人張三丰所遺扇硯竹杖各一寺僧寶以為重孫真人遺物藥罐一銅質大可容數升藥臼一鐵質有六足製甚朴古重二千餘斤在峩眉山牛心寺又有金錫杖為前人取去無存玉版金鐘銅梁十五里巴嶽山永樂中有人鑿井得玉版扣之其聲清越如磬獻華陽王又寺有鐘赤色如金扣之聲聞百里蓋先代物也今皆無存孔子篆碑保寧府文廟中有宣聖篆碑二其一題比干墓曰左林右泉峻岡前導萬世之寧兹焉是寶其一題曰嗚呼有吳延陵季子之墓放光石峩眉山放光岩下有石透白如水晶形如馬牙置之日隙以手撚之即成五色雲氣名曰放光石縣署竒石永寧陳以莊知成都縣曰修葺衙宇於土中得石一具約高三尺許廣倍之質理竒崛狀嵌空可愛頂有竅全體貫通以水注之周流噴溢如濺珠灑沫然陳甚竒之為文以紀移置內江王邸中石芝成都山人李蓁得一石於板築之家高尺許蟠頂垂足中圍如帶儼然瑞芝也名曰石芝南城石缶成都中和門右創建火神廟掘地基得磁盎容五六升形圓如瓜色緑如豆蓋如荷葉不知為何物也安置廟中晉刻漏嘉定州舊有銅壺滴漏相傳為郭景純守嘉州日製規制竒絶後移置會省在今鐘鼓樓上宋范成大有銅壺閣落成詩濓溪石宋周濓溪判合州時嘗與人對奕有一老人傍觀口吐涎香氣襲人公驚曰汝龍也何故來此老人曰何以知之公曰吾聞龍涎極香汝口中所落者是也須臾大雨雷電老人化龍從溪而去公取方石二十四片鎮溪口今通曉橋是也試劔石昔漢天師轟雷爍電而斬妖魔擲筆試劔而𢎞正法於此石試劔一劈而中分作二高有數十丈在青城山延慶觀北碁盤石灌縣靈巖山之極峯仙人嘗奕碁於此石有碁勢傍有年號乃天祐二年朝天石灌縣朝天寺正德末有遊僧開辟穢址得一石有詩前已剝落結句云天孫縱有間針線難繡西川百里圖筆法遒徑可愛中江碁石唐田真人名大神字南陽來隱棲妙山觀中能驅絶蛇虺履水如平地嘗與二道士奕撒碁於江人取以獻蜀王旋失去後又得於玉局洞前石盤內自是江中産碁石金堂石龍石足迹金堂縣華嚴寺後岩上有一石龍長數丈身現二處鱗甲儼然爪如古柏根其下泉水甚清歲旱取湫有應又峽岸有巨石足迹長二尺許指掌宛然不鑿而成廣元石文石符石筍廣元縣有石崖二字乃石中自然成文嘉靖中崩出一面字墜江中一面字現石上歲久不磨其痕如玉又江中有天符石大如棹上有文如符相傳為張道陵所書人佩之能祛邪孕生男三岔溝有石筍十餘根其直如柱皆百餘尺真竒觀也靈女搗衣砧綿州靈山治東五里舊巴西縣東絶頂有石明瑩相傳神女搗衣於此謂靈女搗衣砧石磬彰明縣治南二十里與大匡山接李膺紀云有石方丈餘如磬擊之聲聞數里石松永川縣六十里古有松化為石樹被雷擊折為斷石上有松紋節理蒼皺散卧野中世所罕見仙岩竒石資縣治南四十里壁立萬仭石室天造凝結人形或住或坐如舞如慿大類飛行仙天柱資縣旗鼓寺前岡特起一石約髙五丈餘下清而徑上方而稜非笋非牙題曰天柱蘇硯嘉煙尖山坡東坡曽稽古於此成化中有掘地得其遺硯者為督學王敕取去雞石龍安府石臼壩官道左黑石白文其狀如雞首尾冠目儼然俱備鷹石龍安平夷鋪有竒石狀如鷹蒼羽白項黑嘴行者望之以為竒觀劔石保寧真武廟小池中一石長丈餘挺然斜倚名石劔瓊鐘石越巂衛西北六十里山半有洞寬厰可容數千人崖半懸石一片長五尺濶四尺厚四寸擊之有聲名曰瓊鐘明初龜壺道士修鍊於此有詩留石壁云北倚峩眉西閬峯雲間岐路去皆通冰消玉浪鳴幽谷夜靜瓊鐘響太空嵐擁翠峯秋聳碧霞侵丹室曉舒紅九篇真訣無人得誰識金懸太素宫繡衣石仙女鏡開縣北二里盛山之麓有大石方圓二丈上有生成錦繡紋故以繡衣名之南五里山岩之畔有石方圓五丈許光彩耀目凡遇陰雨其光遠映照鑑則絲髮無隱麻山洞石德陽縣麻姑山有石洞六二開一閉在江南三閉在江北綿水流其中洞深數丈石牀四石人五石馬三騎者二掌石內江蓬瀛山下雙石屹立狀如合掌峻整巨秀為一方之竒觀趙文肅曽為之賦笏石內江治東江上有石尖挺如笏名曰笏石清流時浴而不汙夏漲奔衝不變蓋石之秀者金井海螺石瀘州九姓司地名金井盤石似螺往來人憩息吹之聲響洪越人不厭聞舊志動植譜紫柏灌口西有古樹圍八九丈上有寄生木亦大數圍傳言秦物也土人名曰紫柏金果成都府江瀆廟前有樹六株其樹高五六十丈圍約三四尋挺直如矢無他柯幹頂上才生枝葉皮如龍鱗葉如鳯尾實如棗而加大每嵗仲冬有司具牲饌祭畢然後採摘迎入公廨差點醫工以刀逐個劙去青皮石灰湯焯過令熬冷蜜浸五七日漉起控乾再換熟蜜如此三四次即入瓶缶封貯進獻川中人謂之金果番中名為若魯麻棗蓋鳯尾蕉也蜀桞齊劉悛之為益州刺史獻蜀柳數株條甚長狀若絲縷武帝植於太昌靈和殿前常觀嘆曰此楊柳風流可愛似張緒少年時其見賞如此犀浦古楠成都犀浦國寧觀有古楠四皆千歲木也枝擾雲漢聲挾風雨根入地不知幾百尺而隂之所庇車且百兩正晝日不穿漏夏五六月暑氣不至凛如九秋成都固多壽木然莫與四楠比者蜀荔枝荔枝敘馬瀘涪合俱出嘉定富順亦有之敘馬瀘為上涪合為次嘉定今生一二株舊屬蜀藩華陽國志載漢宣帝時荔枝開日二千石張具其下邀賓賞之一騎紅塵妃子笑蓋從棧道入關耳涪舊有妃子園顆最肥大馬馳七日夜即抵長安其速如此所謂無人知是荔枝來也重慶榮昌諸處亦間有龍眼白居易為木蓮荔枝圖各紀其狀曰荔枝生巴峽間樹形團團如帷蓋葉如冬青華如橘春榮實如丹夏熟朵如蒲桃核如枇杷殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴如酪若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣萊公柏寇萊公知巴東縣嘗手植雙柏於縣庭後巴人思之謂之萊公柏巴橘巴邛人家有橘園霜後盡收斂有大橘如三斗盎巴人異之剖開每橘有二叟鬚眉皤然肌體紅明皆相對象戲談笑自若一叟曰橘中之樂不減商山但不得深根固蒂為人所摘耳古桂彭縣玄妙觀中有桂二株對植於仙臺左右雙幹交枝老根蟠露不知幾百年矣四時清陰覆地十餘丈秋日花開黃金萬斛香飄十里殊為竒絶異栗青城山出天師栗似栗而小獨房者為異人食可治風攣相傳張道陵手植七十株在上清宫玉真花青城山出玉真花差小者號寶仙淺者為醉太平白為玉真古稱為石端聖花凌雲蕙凌雲山産蕙葉長而圓花英盛極香馥他蕙莫及俗云雅州蘭烏尤蕙異楠嘉定州兌説峯下有大楠三株留雲蔽午終歲黛色諸峯蔥蒨楠所助也匠氏謂之背陰斫之無香不中採用故存異柏嘉定清音亭前有異柏四株霜皮黛色其葉一則瑣細如剪一則扁仄如片一則垂絲如栁一則蝟刺如毛異於他柏松喬嘉定洗墨池有松四枝撑出如長蛟拿空柔條曲糾北折而南既垂且仰鬱然偃蓋大如車輪爾雅云小枝上繚為喬扶疏曲翹是謂松喬璧竇草峩眉山有璧竇草光如螢火或隱或見雖赤日不掩塔松峩眉山有松狀如杉而葉圓細偃蹇如浮圖莎蘿峩眉山莎蘿坪有花木一種每萼數枝多者十餘枝並開其蒂大可尺圍色有大紅有粉紅有白燦爛如錦散滿谷嶼中山僧呼為莎蘿花十餘里皆有之諸名山所無瓦屋山亦出莎蘿花五色如爛錦照映山谷移之他處則稿靈壽木産夔州府龍洞溪上江安二松江安三清觀有二松高十數丈每晨昏煙雲鬱鎮不散邛竹出邛州之邛崍山即古臨邛地也漢張騫奉使西域得高節竹還而植此今人取以為杖鶴膝者佳又敘州亦出此竹雅州復有一種名羅漢竹皆為杖之具蒟醬見相如揚雄左思諸賦中注云緣木而生其子如桑椹蓋僰道通越巂之地出蒟僰人取以為醬僰地即今敘州也或云今之雞鬃油及滇中窶葉皆相倣佛晉灼注拘音矩徐廣注拘亦作蒟音窶蒙頂茶名山縣蒙山上清峯甘露井側産茶葉厚而圓色紫赤味略苦春末夏初始發苔蘚庇之陰雲覆焉相傳甘露大師自嶺表攜靈茗播五頂舊志稱頂茶受陽氣全故芬香唐李德裕入蜀得蒙餅以沃於湯瓶上移時盡化以驗其真傳稱雅州蒙山上有露芽故蔡襄有歌曰露芽錯落一番新白樂天詩茶中故舊是蒙山吳中復謝人惠茶詩吾聞蒙山之嶺多秀山惡草不生生淑茗皆謂此茶也雷鳴茶蒙山有僧病冷且久遇老父曰仙家有雷鳴茶俟雷發聲乃茁可併手於中頂採摘服未竟病瘥精健至八十餘入青城山不知所之仐四頂茶園不廢惟中頂草木繁重人迹希到太湖茶瓦屋山太湖寺出茶味清冽甚佳詩人詠之曰品高李白仙人掌香引盧同玉腋風虞美人草益州草木記雅州名山縣出虞美人草人或歌曲應拍而舞酉陽雜俎云舞草出雅或云如雞冠花葉兩兩相對或云中出一莖旁兩葉相對似決明古榆睂山有古榆一株在蘇祠門外左隅相傳老泉手植至今枝葉榮秀古荆眉州治文廟左右有紫荆各一蒼古花甚盛相傳宋元時植文木宋太祖乾德五年合州漢初縣上青樛木中有文曰大連宋又瑞應山於景德中出異木生文成天下太平字魏了翁有記桃異榮昌峯腦山崖畔有巨石縫中突出桃一株高丈餘葉幹與凡桃異花實不常宣德中桃實各圍尺許每遇結實邑必有登第者宋人有題詠邑令張秉義名之曰桃香仙嶺蓮異榮昌有瑞蓮寺宋進士姚東之讀書處山高十數尋石池水泉不竭中産蓮一種從石縫中出左紅右白花不實根不藕開亦不常紅兆科第白兆豐年竹異黔江縣斑竹山上有仙池池邉每歲生斑竹二株及尾則環連焉桂異涪州南長灘里內巖下有古桂樹花不常開其年有士登科則花石上有桂巖二大字稻異酆都稻名重思其米如石榴子粒稍大味如菱杜瓊作重思賦曰日霏春暮翠矣重思雲氣交被嘉穀應時木蓮銅梁縣巴嶽山有木蓮樹高五六丈葉如楩柟花如菡萏出山則不植尚書王世貞異物志特紀之宋周敦頤觀巴嶽木蓮詩有枝懸縞帶垂金彈瓣落蒼苔墜玉盆之句蓍草漢平鄉縣費貽宅有蓍草生其上有雲氣覆之明成化間又生於南安鄉金樹保寧物産中有金樹上有鏤刻文可觀人多取以薦香不灰木會川衛産木火煅不化土人取以為燈心既燼復故名不灰木或曰火浣布乃此物織成也雪蛆産於岷峩深澗中積雪春夏不消而成者其形如蝟但無刺肥白長五六寸腹中有水身能伸縮取而食之須在旦夕否則化矣香豬土犬建昌松潘俱出香豬小而肥肉頗香土犬亦小而肥美羣逰稻田一犬登樹而望如有捕者則先鳴吠令衆犬奔逸去白蟹嘉定州凌雲寺白蟹間出祝融峯泉中黑頭魚黑頭魚在大佛沱春初出上止九泓下止烏尤䱱雅州有魚曰䱱即魚有四足大首長尾聲如嬰兒善緣木天旱輒含水上山以草覆身張口露水鳥來飲水因吸食之性有毒出溪江異鳥漢孝宣帝黃龍中越巂之南獻背明鳥形如鶴止不向明巢常對北多肉少毛聲音百變聞鐘磬笙竽聲則奮翅搖頭時人以為吉祥長鳴雞孝成帝時越巂獻長鳴雞即下漏驗之晷刻無差長鳴一食頃不絶長距善鬭豬鯉青神縣宋初百年前有牝豬伏於水次化為二鯉在泉中而莫有見者蘇子瞻偶見之以告其友王願願以為誕子瞻因禱於泉二鯉復出酆都白鹿酆都白鹿山與平都對峙昔時林木茂密相傳有白鹿藏此每令有佳客至則先夜輒鳴邑令往往以此候驗之水驢綦江縣明月沱在治南觀音堂百步外中有水驢見則致旱犪牛蜀山中有大牛重數千斤名為犪牛晉大興元年此牛出上庸郡人弩射殺得三十八擔肉即爾雅所謂魏也猛豹猛豹似熊而小毛淺有光澤能食蛇食銅鐵出蜀中𩢷𩢷崍山在漢嘉嚴道縣南江水所自出也山有九折坂出𩢷𩢷似熊而黑白駮亦食銅鐵也酋耳周永昌中涪州多虎有獸似虎而絶大逐一虎噬殺之録奏檢瑞應圖酋耳不食生物遇虎則殺峽猿峽中猿鳴清山谷其響泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣龍毛益州雒縣寺塔為龍所護側有三池莫知深淺三龍居之人莫敢臨視貞觀十三年三龍大鬭雷霆震擊水火交飛久之乃靜人皆拾得龍毛鬚一撮長三尺許黃赤可愛湔水魚湔水在威州治內玉壘山下石峽出泉滴注洞中碧澄瑩徹有魚長七八寸者隊遊其中不增不減相傳為神魚人不敢食上有古木蟠根蒼翠蔚然雖溽暑如秋龍馬馬湖府三百里外有湖四圍皆峻崖長二十里廣七里中有堆如螺髻去大江二里其水與江流同消長日夕作潮昔有龍馬見於湖郡因以名建昌異鳥建昌衛産異鳥有二首名曰雙頭鳥寧番異獸寧番衛産異獸名曰雪裏眠蓋狐貉之類也其皮可以禦寒金蟹凌雲寺金蟹池泉穴出蟹大如金錢有土人讀書其旁夜半汲水見一蟹如盂大急取而置之器中覆而壓之明日視之已失所在矣伏龍觀魚灌縣離堆山即李太守所鑿以導江處上有伏龍觀下有深潭傳聞二郎鎖孽龍於其中霜降水落或時見其鎖云每有羣魚遊深潭面僅露背鬛其大如牛投以石魚亦不驚人亦不敢取之蓋異物也錦江異龜成都大江有龜潛深淵父老相傳其形甚大人不常見見則少有沉溺之憂其行有定處上止青羊橋下止濯錦橋或云張儀城蜀時有龜出江中循其迹而築之名曰少城龜之異蓋自古而然矣麟兒獻瑞瀘州九姓司南澗繞流時當盛世漁人每見麒麟隨波隱見故名寶珠金鵝瀘州九姓司環堵皆山丘垤中出一井水流異味土人常見金鵝朝去暮宿建立寶珠庵於上四川通志卷四十六欽定四庫全書
