body:
  text: 四川通志目録地理𩔖三都㑹郡縣之屬卷一圖考星野巻二建置沿革巻三彊域形勢巻四城池關隘巻五戸口田賦學校祀典巻六名宦上巻七名宦下巻八人物上巻九人物下巻十孝友巻十一列女巻十二忠義武功巻十三蠲政水利巻十四鹽法巻十五茶法錢法巻十六木政𣙜政巻十七屯田邊防上松茂巻十八邊防下敘瀘建昌巻十九土司上巻二十土司下巻二十一西域巻二十二兵制津梁驛傳舖遞附巻二十三山川上巻二十四山川中巻二十五山川下巻二十六古蹟上巻二十七古蹟下巻二十八祠廟公署寺觀卷二十九陵墓宫室帝王巻三十職官上巻三十一職官中巻三十二職官下巻三十三選舉上巻三十四選舉中巻三十五選舉中巻三十六選舉下卷三十七選舉下成均巻三十八隱逸流寓仙釋祥異風俗物産巻三十九藝文一卷四十藝文二巻四十一藝文三巻四十二藝文四巻四十三藝文五巻四十四藝文六巻四十五藝文七巻四十六藝文八巻四十七藝文九臣等謹案四川通志四十七巻國朝總督四川兵部右侍郎兼都察院右副都御史黄廷桂等監修四川通志在明代凡四修惟藝文出楊慎手最為雅贍而其他則未能悉中體要國朝康熙十二年總督蔡毓榮廵撫張徳地又續事纂輯以兵燹之後文獻無徴亦多所脱漏是編乃雍正七年廷桂等奉勅重修凡分四十九𩔖舊志之缺者補之畧者増之較為詳備其中沿舊志之誤未及盡汰者如唐韋昭度征陳敬瑄無功而還宋岳雲為忠州防禦使乃遥授之官俱不應入名宦虞允文為四川宣撫乃總制全蜀應入統部不當僅入保寧府唐之鮮于仲通依附楊國忠䘮師南詔新舊唐書所載甚明乃反以為忤國忠被貶載入人物此𩔖尚不免地志附㑹縁飾之習然其甄綜排比較舊志則可據多矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀四川通志凡例一直省皆有通志葢倣古列國史書之遺意也其紀事必詳而核立例必簡而該始足以信今而傳後四川舊志修於康熙九年爾時兵燹之後文獻闕如纂輯罕據今者廣為搜羅嚴加叅訂闕者補之繁者汏之敘次求其綜貫而義𩔖期於典確有本有末不蔓不支共計四十九𩔖非敢駕軼前人庶弗遺誤來者一輿圖所以考職方稽形勢也蜀幅􅊷廣逺直通西蔵繪事可不詳乎兹於總圖之外各府與直𨽻州各繪一圖西蔵另繪一圖以觀帶礪之盛庶幾瞭如指掌一星野占騐莫詳於甘石諸書劒南為井鬼之分今西蔵悉歸版圖則躔次度數較徃時圖象自宜恢廓乃質之天官家云古制未載難以懸定故暫從闕疑俟將來有所考訂再為補入一建置沿革自禹貢職方以及歴代損益非詳載不足以資考證巴蜀自秦時更為郡邑其後或道或路或軍地益廣名益多因時通變皆非可略今以舊志為崖略而編次訂正則詳悉有加矣一城池公署地方之保障士民之觀瞻係焉邇來松潘建昌靖逺等處修築城垣州縣衞所添設大小公署莫不煥然改觀䂓模宏敞今備載之以見土木之功皆有裨於捍衞彈壓云一川省户口田賦原額難稽今者生聚日繁版籍益廣其丁糧歴年遞增名目不一今於九郡及直𨽻州衞所撮其總數若干悉遵新定科則編載燦若列眉無嫌煩瑣一學校為造士之本而廟廡為尢重我國家崇儒右文超越前代今皇上更加意學宫樂育人才祭典之隆於兹為重故博採孔廟儀文度數詳附於中以彰本朝之禮明樂備為亘古所未有也一歴代名宦人物凡功徳在民儀型足式者固已臚列無遺至我朝名宦鄉賢必得題准從祀者始為按名登載葢重之也其循吏人物有舊志遺落新冊補者悉為増入讀循良之傳曷罄咨嗟跂賢哲之生時深仰止博採慎列其敢濫諸一孝友忠義乃人道綱維寧容濫採故凡無事蹟及印冊可據者不敢妄登一人至節婦列女風化攸關不獨題請旌表建坊者查核載入其餘有公論攸同訪聞既確亦附簡編葢善善欲長之意也一武功舊志惟夔府志略存然亦寥寥無幾挂一漏十兹則逺稽往古近考當時凡功圖麟閣績著旂常班班可考者悉為載筆一蠲政蜀雖沃野素封家給人足其間或嵗偶不登即遇殊恩豁免此皆國家之深仁厚澤允宜特書用昭後世一鹽茶驛傳𣙜政皆財賦攸關歴代互有損益我朝於蜀省各項經制久定成規近又設立専司關差以董厥事總期上足裕國下不病民故凡已經題准者詳載督撫疏中以志事事經始籌畫周詳萬世無弊也一水利川省山多水險而成都則沃野千里全資都江大堰灌溉十一州縣記云深淘灘低作堰葢修濬得宜斯旱澇無患其原其委詳為志之重民事也一邊防於蜀特詳思患預防亦王公設險之意也凡諸重臣巨帥奏疏善後機宜經畫宏逺者備載之以資考鑑至形勢關隘又各為門𩔖桑土綢繆固不厭其詳爾一土司世襲之沿革貢賦之輸將舊志甚略我國家重譯來朝蠻夷率服川省大小土司計三百有餘故另列土司一𩔖詳著情形以備控馭方略一西域前蔵後蔵去京師將二萬里非獨邊塞且屬絶徼我皇上徳威四訖無遠弗屆是以前後蔵均𨽻職方咸遵正朔今於西蔵一𩔖彊域形勢户口貢賦之屬各條詳載而一統無外之模於兹見己一兵制舊志缺略甚多我朝布昭聖武無逺弗屆兩次平蜀設列鎮協加增營汛且歴年來剿撫蠻部開取西蔵佈置多方亘古未有今悉搜羅以補從前之未備一宫室舊志内雜以樓臺亭閣殊失體裁今按歴朝次敘編列而樓臺之𩔖則附諸古蹟云一職官各省舊志文職郡守以下武職叅遊以下多未載入不知縣令受百里之寄守備膺専城之選果屬循良忠義且入名宦志傳中豈以守土之命吏閫外之干城可略而不書哉兹於官制内悉紀其名文武並書亦仰遵我皇上緯武經文義無偏重云爾至國初吳逆之叛蜀中諸員弁有被汚偽職者難與縉紳並列今倣古削籍之例於職官中刪其姓氏而别附諸僭竊巻末以寓懲戒云一選舉蜀中自漢舉茂才賢良唐宋試以詩賦策論前明専尚制義而川峽英流往往軰出我國家春秋彚茹胥凖前規成均之外復加辟薦得人稱極盛矣且鹿鳴之後繼以鷹揚惜舊志於武科第略而不書今為循次並列庶無遺漏一隠逸者流雖非經世之彦而獨往之概往往可為流俗針砭至於流寓中如唐之子羙敬輿宋之涪翁放翁軰以暨才華譽望表表軼羣者俱為載入以志景行一藝文前明楊慎升菴甞加纂輯最稱善本兵燹後典籍無徴舊志所載非復廬山面目矣兹則選其精華芟其蕪穢叅互考訂閒有夏五魯魚謹從闕疑之義未敢以見聞所不及遂妄削前人之著作也至我朝教育涵濡人文蔚起其擇言尢雅者良足輝映前賢兹皆為斟酌採摭至蜀人所作非關於蜀亦得載焉葢倣升菴用程篁墩新安文獻志例也一田賦有新增新改科則土司有新近歸誠者值書已告成繕寫之後始奉部文故倣補遺之例斟酌添載至鹽茶税引亦止照已成全書開載其逐季加増者似難預為懸定也一新改設之嘉定潼川二府並直𨽻忠州黔彭㕔因書已告成未便添改惟於某屬下添註雍正十二年陞為府陞為直𨽻字様聊為補闕云爾四川通志修志姓氏總裁提調四川等處承宣布政使司布政使紀録二次臣劉應鼎貴州貴筑縣己卯科舉人四川等處承宣布政使司布政使紀録四十次臣竇啓瑛奉天正白旗人乙未進士監修四川等處提刑按察使司按察使臣髙維新直𨽻寜晉縣己丑進士四川等處提刑按察使司按察使紀録二次臣李如蘭山西陽曲人嵗貢生字位過密無法显示臣曹源邠河南商邱縣生員四川分巡松茂道布政使司叅議紀録一次臣鄭其儲湖廣石首縣壬辰進士代理松茂道事成都府知府加四級紀録四次臣謝櫏江南武進人嵗貢生四川分巡松茂道按察使司副使臣周彬雲南昆明縣人壬辰進士四川分巡建昌道按察使司副使臣馬維翰浙江海鹽縣辛丑進士四川分巡建昌道按察使司副使紀録二次臣李學裕河南洛陽人丁巳進士四川分巡川東道布政使司㕘議降三級留任臣陸賜書江南吳縣丙戌進士四川分巡川北道按察使司僉事加一級紀録十六次臣陳緯奉天監生四川分巡永寧道按察使司僉事加一級臣劉文誥直𨽻棗强人庚戌進士總理四川分巡永寧道按察使司叅議加一級臣劉嵩齡鑲白旗癸巳進士總纂原任河南南陽府鎮平縣知縣臣張晉生四川金堂縣壬午科舉人遂寧縣縣丞臣趙彪詔江南武進縣生員署東鄉縣知縣臣劉慶适江南桐城縣貢生䕫州府教授陞翰林院典簿臣王一正四川綿竹縣㧞貢生分纂雅州府名山縣教諭臣洪元遵四川江油縣拔貢生署蒲江縣知縣臣劉庶埴雲南永昌府抜貢生署徳陽縣知縣臣夏詔新雲南姚安府拔貢生遂寧縣縣丞臣蔣一鳴廣西臨桂縣抜貢生成都府金堂縣廪膳生員臣陳大綸福建漳州府龍巖縣生員臣林汝梅署南川縣知縣臣張晅雲南新興州拔貢生冕寧縣教諭陞任山東鄒平縣知縣臣樊如樟四川宜賓縣拔貢生成都府成都縣舉人臣桺公衣成都府新繁縣舉人臣費藻成都府溫江縣訓導臣白嵋四川梓潼縣嵗貢生龍安府江油縣訓導臣饒士盛四川資州嵗貢生直𨽻資州州判臣李泓雲南建水州拔貢生署直𨽻資州州判臣蕭莊廣西宣化縣拔貢生重慶府經歴臣湯正貴州貴筑縣生員原任射洪縣教諭臣龍門治四川仁壽縣拔貢生直𨽻綿州綿竹縣廪膳生員臣詹攀桂成都府成都縣舉人臣顧汝修直𨽻資州資陽縣嵗貢生臣詹懷徳總校定學習進士補授敘州府宜賓縣知縣臣劉暐澤湖南長沙縣人庚戌黔江縣知縣臣陳嗣諶貴州開泰縣人庚戌分校重慶府江津縣嵗貢生臣李專署汶川縣知縣臣張志和江南吳縣監生署三臺縣知縣臣葉肇芬浙江仁和縣監生越嶲衞教授陞國子監監丞臣韓崧什邡縣拔貢生富順縣教諭臣王在鎬南充縣拔貢生保寧府巴州舉人臣蒲曽英重慶府長壽縣舉人臣古曜晟校刋原任河南南陽府鎮平縣知縣臣張晉生福建漳州府龍巖縣生員臣林汝梅成都府成都縣廪膳生員臣葉春芳校刋兼督梓雅州府名山縣教諭臣洪元遵委辦局務天全州知州臣胡璉山東濟寧州監生巴縣知縣臣金宏勲浙江桐鄉縣監生郫縣知縣臣劉乃大江南山陽縣監生墊江縣知縣臣劉彝山西安邑縣監生委辦局務兼督梓四川布政使司經歴臣朱陸江南溧陽縣監生署四川布政使司經歴巴縣分駐白市驛縣丞臣金尚素浙江山隂人繪圖江南蘇州府崑山縣布衣陸澐欽定四庫全書四川通志巻首雍正十三年春臣竇啓瑛奉天子命任四川布政使事惟日孜孜懼職業之難稱因思文翁武侯張詠趙抃之儔其治蜀也𩔖皆有惇大成裕剛柔互濟之道故不愧為名宦焉而後之人殊覺其有志而未逮也適會四川通志纂輯將成啓瑛復加校正補其未備付之剞劂既竣事敬拜手稽首而為之序曰周禮職方氏掌天下之圖辨邦國都鄙夷蠻戎貉之人民與財用九榖六畜之數要周知其利害御史掌邦國都鄙及萬民之治令以贊冢宰葢牧長之責莫先安民安民之政在於富教使非志則無以知歴代之成憲非志無以知山川之險易田地之肥瘠榖種之異宜非志無以知户口之多寡官吏之賢否是故聖王重焉惟四川僻在西南實古梁州之地大禹咸則三壤成賦中邦梁州之田與荆揚同居下等厥賦乃下於荆揚而蜀人巴人自周書牧誓春秋文公十六年外不復再見於經豈非其時介在荒服所以富教之者尚未盡其道歟秦漢之世建為郡縣秦時鑿離堆以辟水患穿二江以資溉浸漢時成都學官修起下縣子弟縣邑吏民爭為學官弟子於是巴蜀之粟為天下饒而其文學比齊魯焉晉宋迄明循良代有舊志所紀累朝名宦大都留心於富教者也我國家重熙累洽之餘守土之臣莫不爭自奮勉以富教為己任百餘年間海宇昇平人民樂業向之川土荒蕪者今皆已墾闢向之川民凋瘵者今皆已生聚熙熙然郁郁然享太平之福矣惟是成都號為沃野其餘州縣之田有嵗嵗耕種者有休一嵗或休二嵗或三嵗更耕之者其民則鮮土著率多湖廣陜西江西廣東等處遷居之人以及四方之商賈俗尚不同情性亦異敘瀘松茂重䕫黎雅寧逺之間夷漢雜居撫綏尢為不易然則言富教於川中猶當審所設施矣啓瑛承乏以來仰惟朝廷付畀之重俯切痌瘝於乃身怵惕凛惶不勝是愳今幸通志已成典則咸在敢不朝夕黽勉式遵成憲以盡其富教之責乎抑甞竊聞之尚書曰無依勢作威無倚法以削寛而有制從容以和又曰必有忍其乃有濟有容徳乃大世宗憲皇帝詔脩通志以名宦人物為尢重試觀通志所載有不容忍居心寛和制事而能成一代偉人者乎今天子發政施仁務在與民休息啓瑛忝任旬宣亦惟有靖共夙夜與同事大小諸臣奉宣徳意益臻風動時雍之上理而不敢以苛察為精明不敢以殘刻為公正總期於惇大成裕剛柔互濟或庶幾不悖於前代之名宦而無負世宗憲皇帝詔修通志之初心也夫峕乾隆元年嵗在丙辰二月既望越五日甲申四川等處承宣布政使司布政使紀録四十次臣竇啓瑛謹序四川通志序竊惟蜀為古梁州域禹貢曰華陽黒水惟梁州是也山曰岷嶓水曰沱潛葢蜀山川之勝見於夏書者如此漢自元光間通道西南夷文教日敷昄章式廓下迄六代唐宋元明而山川郡縣沿革建置以及人物典故日裒月益此則古今有殊勢而詳略有異宜也舊志修於康熙十二年前督臣蔡毓榮撫臣張徳地實總理之顧掇拾於兵火之餘書冊㪚佚雖搜輯成編而魯魚訛舛挂一漏百實慮無以信今而傳後乃䝉我皇上勅下直省纂修通志蜀西南奥區道京師萬里而遥披文相質其與齊魯吳越固不相侔臣自䝉恩擢居制府與撫臣申飭所司廣延通經食古之士博採遺書即舊志所載重加校訂補其遺逸刪其繁複至新設城郭營堡増長户口田賦鹽茶錢𣙜驛傳水利兵制邊夷等條關於民生國計者必嚴加考核絲分縷析俾垂之可久而數十年來鄉賢耆徳忠孝節烈及官斯土者雲起霞蔚可用以勸為善者必敬謹備列勿敢遺缺外至畨蠻部落言語不通梯航重譯以求内附職貢者亦復次厥編輯葢我國家聖聖相承深仁厚澤涵濡於薄海内外者實為無逺弗屆豈直夏書所載云爾哉顧臣以不才幸遇堯舜在上又膺巖彊重任竊謂今蜀所志其不殊禹貢所紀者厥土青黎厥田下上厥賦下中三錯而已其他因時制宜地大物衆周覽繙閲實有夙夜惴惴於職守之難稱者若夫援据圖經指陳分野有臣所身歴者見山川之秀傑樂民物之繁庶太和之氣充塞上下即復念臣所未經環蜀數千里跂行喙息逺接西域而藝食汲飲貿遷化居莫不載一聖天子之雨露含哺鼓腹於光天化日之中而臣適逢盛典事竣例得弁名首簡亦私以慶臣之遭逢也雍正十一年冬十月總督四川等處地方軍務兼理糧餉兵部右侍郎兼都察院右副都御史仍帶拖沙喇哈畨紀録七次臣黄廷桂譔四川通志序王者彊理天下自畿甸以及直省莫不有志其源出於書之禹貢周官之職方故凡山川之險夷田賦之差等貢道之逺近以及人情風土物彦之屬洪纖巨細無不釐然畢具由是酌以時宜而輕重布之即財成輔相之道寓此矣蜀志何昉乎葢自陳壽耆舊傳李膺益州記常璩華陽國志張唐英蜀擣杌趙閲道集古今記唐求緝圖經李文子撰蜀鑑作者迭興於戲備矣迨前明之世屢經修輯惟楊慎王元正軰所纂稱善修志者葢得所取資焉夫蜀自魚鳧開國以褒斜為前門熊耳為後戸玉壘成都為城郭江潛綿雒為陂池沃野天府古人所稱將欲紀載詳明則蜀志之修良亟也己酉之嵗我皇上特命儒臣纂修大清一統志詔天下各修省志無闕無濫以成一統無外之書古稱不出户庭而周知四境者其在斯乎臣謬膺簡命撫綏兹土日夕冰兢有懷靡及毎因公事旁覽郡邑見夫山川日益奠麗幅􅊷日益式廓漢夷日益輸誠田土日益開闢户口日益蕃衍溝洫日益疏濬民風士習日益淳厚五禮六樂三物四維畜牧耕桑營建規制日益周詳而明備葢自三代以來未有如今日者總由我皇上聖神繼述道一風同是以景星慶雲嘉祥疊見唐虞之盛無以加兹當此時而使蜀志猶闕焉未備將何以表文運之熾昌昭重熙之累洽乎由是凛遵諭㫖遴委賢員以永寧道劉嵩齡總其務布政司劉應鼎督其成并延聘老成紳士博雅工文者若而人孰挈厥綱孰條厥目務令謹嚴以立法簡覈以述事雅馴以鑄詞勿濫勿遺矢公矢慎今者編輯既竣聿觀厥成可備西蜀一省之全書用彰聖朝萬年之徳教於以繼禹貢職方之後其庶幾焉臣謹序雍正十一年冬十月巡撫四川等處地方提督軍務都察院右僉都御史降三級又降一級留任紀録三次臣憲徳譔四川通志序乙卯秋九月四川通志剞劂垂成藩司竇啓瑛先持其鑴就者若干巻賫騐曰俟彊域兵制驛傳舖遞四𩔖漸次告竣即裝潢成帙請呈御覽竊惟我國家聖聖相承漸仁摩義重熙累洽海宇昇平其間毓秀鍾靈應景運而篤生不特垂紳搢笏者文章政事彪炳一時即闤闠閨幃沐浴教澤孝友節義各著其竒固已史不勝書指不勝屈矣天子勤求於上衆臣工敷奏於下設官分職彊理寰區因地制宜凖今酌古沿革損益較之徃昔尢稱盡善盡羙而徳威逺播雕題鑿齒之域鳥言卉服之鄉無不歸附版圖輸誠納貢海隅出日中外一家是人文之盛建制之隆幅􅊷之廣誠未有如我朝者也雍正六年欽奉上諭各省督撫大吏咸修省志以備一統志之採擇而川志脫稿於雍正十一年之九月􅀴前督臣黄廷桂前撫臣憲徳恭繕進呈命工雕開及今将竣恭逢我皇上嗣登大寶之初適副繼志述事之至意甚盛典也憶臣前待罪陜臬值秦省全志校訂伊始洊晉藩任并與提調之責書成䖍泐蕪詞綴於簡末附垂不朽嗣膺簡命署篆楚撫則楚志久備又得按籍而稽以識山川風土之盛今年春調撫西川假道關中歴雲棧登劒閣俯視全蜀生齒日庶老㓜恬熙舉凡密箐深林椎髻跣足素稱頑梗者今皆蒸蒸向化太和之氣布滿蠶叢猗歟休哉黎民於變一道同風何以無逺弗屆也兹披閲志乘見其廣搜博集綱舉目張不濫不遺允符體式流覽人物發潛徳之光化民而礪俗也考核建制見聯絡之密捍外而備内也計度幅􅊷則聲教覃敷豚魚之孚格輿圖之式廓也官斯土者鑒往事以為興除際昌期而勤撫字胥於志乎是頼矣臣遭逢聖世目覩三省纂修鉅典以昭萬年車書之統以成百代羙備之編謹拜手稽首颺言於簡端巡撫四川等處地方提督軍務都察院右副都御史加四級紀録七次臣楊馝謹序四川通志序竊聞聖門之論治道其要在富之教之而帝舜之命臯陶則曰明於五刑以弼五教故居刑名之職者實有化導斯民之責焉臣如蘭自慚愚陋深受國恩任四川臬司者已半載矣伏念蜀中土田日闢户口日蕃其間土著之民風氣質直而椎魯之習亦所不免至於秦楚諸省僑寄尢多間有險健之軰敢於干紀而囂然於有司之廷者因思所以獄訟衰息風俗茂羙之道而益嘆化導之方不可以已也粤稽李冰治水文翁興學以來其漸開富教之端者備載蜀志蜀志修於康熙十年又奉世宗憲皇帝詔令重纂於古今事蹟粲然陳列其中如姜詩李令伯之孝思萇宏巴蔓子之忠義以暨節烈之風友愛之雅代不乏人是蜀中風俗原非澆漓者比也第慮五方雜處薰蕕同器雖抱淳良之質往往被其漸染而不自覺臣蒞任以來率諸郡邑有司奉宣徳意勤懇而訓誨之動以為人子為人臣之大義使知尊尊而親親且隨時隨事養其亷恥開其䝉蔽而要歸於睦婣任䘏之㫖至於流寓中一二莠民則嚴加懲創凡以安善良也今聖天子聲教誕敷民氣和樂固已無此疆爾界陳常於時夏矣蜀介邊陲文獻闕略窮鄉僻壤於禮樂詩書之澤未盡深知是在身任地方者加意化導使椎魯之質共知親遜而並使各省僑居之衆與蜀中土著者俱為飲和食徳之民詎不休歟夫沃野千里四方輻輳富庶之餘以教為急維臣不材於昔賢治蜀之道未之逮也而竊有志焉總在常存李冰文翁愛育斯民之心兼倣諸葛武侯法行知恩之意庶可以求當於明刑弼教之萬一也其敢不撫是編而蚤夜孜孜也哉臣謹序四川等處提刑按察使司按察使臣李如蘭謹撰四川舊志序明楊慎藝文志序余嘗讀左太冲賦蜀都云江漢炳靈世載其英蔚若相如皭若君平王褒韡韡而秀發揚雄含章而挺生自漢而下文章之盛無出於四子矣然豈徒四海考儁游談為譽哉文之傳事之傳也去今千七百年而談漢事如昨日繄四子之文也文乎文乎其可諼乎若夫陳子昂懸文宗之正鵠李太白曜風雅之絶麟東坡雄辨則孟氏之鋒距邵菴詩律比漢廷之老吏繼炳靈而躡蹤感掞藻而騁轡與為多矣况子安少陵薄遊徧乎三巴石湖放翁篇詠洎乎百濮其原本山川極命草木亦楚材晉用秦渠韓利矣先君子在館閣日嘗取袁説友所著成都文𩔖李光所編固陵文𩔖及成都丙丁兩記輿地紀勝一書上下旁搜左右采獲欲纂為蜀文獻志而未果也悼手澤之如新悵往志之未紹罪謫南裔十有八年辛丑之春值捧戎檄暫過故都大中丞東阜劉公禮聘舊史氏玉壘王君舜卿方洲楊君實卿編録全志而謬以藝文一局委之慎乃檢故簏探行篋叅之近志復采諸家擇其菁華褫其煩重拾其遺逸翦彼稂稗支郡列邑各以乘上又得漢大守樊敏碑於蘆山漢孝廉桺莊敏碑於黔江文無銷訛刻猶古剞東阜公喜曰漢碑之傳於今中原亦掃跡矣乃今得兹於逺邦不謂斯舉之獲乎唐宋以下遺文墜翰駢出横陳實繁有昈乃博選而約載之為巻尚盈七十中間凡名宦遊士篇詠關於蜀者載之若蜀人作僅一篇傳者非關於蜀亦得載焉用程篁墩新安之文獻志例也諸家全集如杜與蘇盛行於世者祇載百一從吕成公文鑑例也同時年近諸大老之作皆不敢録以避去取之嫌循海虞吳敏徳文章辨體例也開局於靜居寺宋方二公祠始事以八月乙卯日竣事以九月甲申自角匝軫廿八日以畢食時而成既愧劉安之㨗懸金以市又乏吕覽之精乃屬鄉進士劉大昌周遜校正而付之梓人昔漢代文治興之者文翁禮殿之圖後世建學倣焉七十子之名馬遷之立傳徴焉當時號為西南齊魯岷峨洙泗文之有關於道若此文翁之功不可誣也繼文翁而作者今之阜翁歟獨愧慎華顛白紛舊植荒落不足以揚四子之芬而成一邦之史也恕其不敏補其未備尚有冀吾黨之助焉王元正蜀志序四川志成正反覆閲之乃告東阜公曰惟公膺命九重撫綏西蜀開誠布公柔逺能邇經綸展於久練之餘英華揮諸事業之大者矣乃於政暇因覩舊乗則嘆夫援古者資史記論物者本漢書古之人汲於載記而不遺餘力者葢事弗著而無稽世有傳而可據是故杞宋無徴尼父發嘆綱目既出千古仰勤其所由來深矣矧兹蜀省奧壤名區茍或因仍簡略奚以信後詔今乃遣文學敦聘禮方洲楊子由遂寧先至升菴楊子由新都繼至元正則由茂林後至假居宋祠分局從事方洲幾一月告完以先去升菴幾兩月告完而亦去元正則匝三月始得告成而後去夫英邁與衰憊殊科多識與膚學異品二子者宏識髙才以良史秉名管完之速而歸之先固宜正則驚駘敢云學步乃維流火之月及於初元之冬大肆簡袠之搜方落鉛槧之手凡例本諸一統志遵其制也稽舊志而稍増入者補其遺也至若順慶無府志廣安無州志又或邑志具而復闕者亦多竟忘苦心不免廢日草創而已潤色未能幸托名於梨棗敢懸金於都市是志也我東阜公暨合州侍御公創意舉之未幾合州竣事北上狷齋侍御公代按斯土而左右之兹乃繕録成編總十有六巻立論十有三篇統冀髙明牖我昏陋吳之皥序誌古郡國史也山川風物政事人文載焉今昭代史秉筆需人顧往往珥彤所闕而散見於方聞野記足藉證者則省志所以備外史也曩予職在治書曾蓄數㕑以其半貯本朝列聖實録半貯各省志以叅觀風㑹考獻徴文不徒供臥遊而已一時屈指信史如粤之𫝊以紫溪武功之𫝊以徳涵蜀之𫝊以升菴玉壘方洲三太史獨藝文出升菴手選網羅金石鼎彝秦漢之文幾盡竟可單𫝊太平清話亦稱其立例最古非他誌所及可知也洎叱馭入蜀縁巫峽經字流遊目岷嶓迴騶劒表訪鼈靈魚帝之奧區揖峨眉青城於天上行部之餘得於覩記覺向之披讀猶淺而遍覔古本以證嚮竒邃已不可復得緣萬厯初禩重修漸增沿革其釐正之功固不可誣而藝文裁却强半晦蝕之累亦不細矣由己卯來更四十年亡得覩升菴之遺者則亦蜀文一厄塞也予亟謀重梓頼督學杜君雅與同嗜搜購古本得二三殘牘凑之幸斷圭復完恨原日筆譌刀誤殊多魯魚况嵗久漫漶難以竟讀遂檄諸帳下士揀其品識超韻者司編校焉藩轄陳君欣措貲費諸各捐俸贖佐之以勷厥成開局數閲月於前人物職官科甲經略等誌合新舊本互有絓漏今㸃定而𩔖增之若平播剙設征南善後皆宜綴入惟藝文雖隻字必仍纖誤必考乃杜君更出心裁補續新藝若干巻俾成全書其補者或當日偶遺非故遺之也葢瑤氈怪牒其錯彩出世有後先即如花蘂之集拾於敝紙若不經安國拈出誌何得而有之又如唐元宗刻劒閣詩剥落莓蘚升菴録入詩品而誌反不載由此而推遺編敗碣之見於纂誌後者間有矣補之良不容己而文與世隆代有作者不續之其又何觀至於博摭郡邑之文凡家乘野榻足光兹典者其遺之也微杜君之左癖不至是事竣藩臬虛首簡以遲予語予惟蜀九州之上遊於形勢居其上於風氣則開其先其地脈迢遞逶迤注吳魏閩越而極受之者一若斬新特地窮妍殫工而不知其開之何從乃蜀人亦若不口其先者猶之竒貨然每騰艷於所聚而産處反得平平予非故為此語以張蜀也身歴其境乃知勝甲海内偶舉一山而業已崑崙伯仲矣他無不開先領異者以故塗山石組實開幅􅊷化碧埋輪實開義烈武宗吉甫文祖淵雲射洪彰明律揚初盛眉山父子綺思禪解不落二頭此聊指其一二剙獲者若鉅而鬚眉之士細而香奩之英有不出出必開先競秀當自展巻得之昔王逸少慕蜀山川諸竒疑子雲太冲所賦殊未備悉髙賢豔慕從古已然而予謂足備外史正意列國之語可以傳經十五國之風可以觀世皆取其人與事之表表者豈僅謂城池賦役建置攻守之故與武鄉文饒軰之宦蹟足資一方考鏡已哉博雅君子當紙貴於是編云杜應芳序蜀志凡三被修初正徳戊寅次嘉靖辛丑次萬厯己卯戊寅志居體要猶之椎輪也辛丑志出三先生手而藝文獨屬楊太史用修增華加麗令雒陽紙貴己卯補緝維勤芟剔過半得無疥壁之見哉中丞饒公直指吳公慨然興文旁求舊本得什之七八乃應芳遍搆復得二三珠還劒合事良不偶教下亟刻藝文庶幾雲漢昭回于天其他秩官人物經略沿革之𩔖因例編入而藝文竊續焉惟是火藜雖懸風葉難掃二三子殫厥校讐良工心苦已賈餘勇大肆蒐羅長此蠹魚漸成脈望用修有知何如撫掌矣夫志猶史也志備一隅史備天下同一觀耳惟子長史記其事竒其文竒書亦因以竒近日弇州謂千載有子長千載不能為史記是何言與何可令蜀聞之葢石紐湔山神功也鼈城魚復異績也躍井化泥至性也破琴滌器詎文也他如錦江玉壘火井鹽泉江珠瑕英側生旁挺豈罄竹堪書郄車易載者用修生而靈穎蚤窺中祕纔施采綴便覺陸離横絶安在子長不世出史記遂罷響哉二三子為用修忠臣披文相質富有日新方之史記殆小司馬索隠褚先生補遺與而予上下千載更有感於蜀之盛也子長固良史才然足跡徧天下必西瞻蜀之岷山及離堆而後已彼得於涉歴者猶若是况生居其鄉逢右文之世探禹穴發西蔵如集珍元圃操斧鄧林也即欲不嫓媺子長胡可讓焉雖然職方所掌不廢風謠入關之収必先圖籍志之繫本計尚矣兩臺為蜀畫長久集思廣益順風招之而大叅陳公掞五鳯文施三乘力佐費董工副在名山期偕不朽記不云乎耆欲將至有開必先易之言曰水流濕火就燥各以其𩔖也余何幸親見之王廷瞻序予甞覽觀岷峨之地直坤維而躔井絡昔人稱為天府奥區云自神禹發祥叢帝闢國詩書所述詳矣逮武王牧野之師庸蜀羌髳微盧彭濮悉共戎旅入漢卿雲軰始翩然以文藻翺翔西京其鋪張皇業掞述休羙綦盛然未有勒成一代之史以彪炳來禩者君子每劣其無以張蜀也孔明經略西土慨然有感於兹乃秦子勑軰有良史才然戎馬劻勷未遑注厝及晉陳承祚常道將始各譔一家言説者謂陳失之誣常失之瑣唐宋以來有為古今集記蜀檮杌諸編者亦或卑卑無甚髙論殆不若晉二氏猶蔚然翼蜀而馳也嗟嗟志何容易哉明興御寓道化翔洽成化中侍御瑞陽熊公始創蜀志嘉靖初撫臺東阜劉公侍御金川王公聘升菴玉壘方洲三太史續修之迄今刻已漫漶不可讀矧四十年來嵗月綿邈無論宦轍賢科蟬聯苞次而興革之大者若龍安改府隆昌剙縣建武立學及近年都蠻之蕩平白草人荒諸番之歸順建昌玀諸夷之底靖咸我皇靈赫弈炳烺是烏可弗志乎哉爰與侍御養純虞公商之下藩省議行焉於是檄敘州府同知魏樸如成都府推官游朴暨諸文學董良遂等開局纂輯復檄督學副使郭棐總其事將就緒乃養純公以秩滿入侍輦下而侍御鳴宇薛公來代謂兹鉅典義不可緩益注意趣之志既成予與鳴宇公叅訂焉付之梓僉謂予當有言弁諸端簡業不獲辭則甞謂志與史體異而以垂勸鑒則同葢政莫大於經時教莫重於宏化誼莫嚴於稽古事莫要於宜民斯四者非志曷觀焉是故匪精匪覈罔以考𠂻惟信惟裁乃克𫝊逺兹編大都遵明一統志例其仍三太史之舊者十七刪舊之繁而增入新事者十三其鏟謬訂譌以底於信尢惓惓諄篤焉至附入近年諸經略地方機宜則有關於國事民事甚大誠足補前志所未備而為一方之信史也已予故樂為序之亦以告後之嗣修者是役也左布政使劉庠右布政使李江按察使胡定左叅政兼按察使吳善左叅政蔡叔逵副使楊一桂周大烈史嗣元范崙僉事李薦佳黄徳洋丁元復田樂義王埏署都指揮僉事陳道皆疇咨襄事殫心綜理例得備書云郭棐序萬厯七禩嵗在己卯皇仁浹洽蜀宇輯寧時維巡撫黄岡王公巡按義烏虞公相與協心抒猷以康黎庶既標鴻業爰考稗乘顧念蜀居坤維號稱天府自神禹肇夏吉甫輔周勲烈匪彝流風斯邈典謨方貢書述綦詳江漢蒸民詩聲溢著此蜀文獻之所從來逖矣秦資其富以兼七雄漢階其力遂奄四海於是司馬相如揚子雲左太冲任文公等各述所聞用存故典及陳承祚别紀耆舊至常道將備志華陽下逮趙閲道之集古今張唐英之編檮杌唐求之緝圖經李文子之譔蜀鑑咸極蒐羅足垂觀勸繄我昭代運際嘉隆道化丕宏倫物宣朗時有玉壘王氏升菴楊氏方洲楊氏並摛鳯藻各擅麟書騁厥菁華咸臻元妙然才髙而綜核或疎嵗多而漫漶殊甚矧兹相曠四十餘秋世治之綸時政之經因革獻徴之彪著科第之駢聯倘缺弗書後將何考乃檄敘州府同知魏樸如成都府推官游朴及文學董良遂戈一龍劉止彭師古楊秉鉞李承霧彭應元等開局於濓洛大儒祠搜摭故實旁採藝文凡諸郡邑各以牒上而成都府知府張大器成都縣知縣印一中華陽縣知縣唐棟咸鳩籍供餼聿勤夙夜凡五閲月編次稍成則檄今左布政使劉公庠右布政使李公江曰咨惟習蜀敷猷宜統厥任申檄提學副使棐曰廣厲學官修明掌故兹其大者惟爾總校之以終厥成功棐承檄惴惴唯弗稱是懼乃於秋杪大比事竣始克受簡則作而嘆曰奕奕蜀都赫赫獻籍聖賢神明之淵宅也金躔玉壘之奥區也􅃡厥省乗實鉅且重奈何容易哉乃固扄窮晷殫精凝思刪譌訂誣芟繁補闕又閱五盈始告成事時則御史虞公政竣入朝以今御史福清薛公代既至鋭情志事益毖且篤庚辰首春以完帙上兩臺咸報曰可軫兹鉅典且戒梓人式昭往休用闡來鏡棐謹撰次為小序焉序曰軒轅畫州神禹底績周秦綿邈㝢縣分析峩峩蜀都氓萌允殖皇哉唐哉天府之域述沿革第一翳古炎帝申命正黎三辰肇敘七政翕齊煌煌鶉首實次蜀西察變授時奠兹坤維述分野第二􅏭嶫蜀國蜿蜒龍蟠西崢岷嶺東阻䕫門來關霄倚劒閣雲盤是稱金城徳守孔安述形勝第三蜀城磝磝鬱若鳯翺祥徴龜出義慎虎牢諸郡連綿百雉崇髙永言保障長屹江臯述城郭第四惟蜀自昔生齒滋繁周從牧誓漢驅項頑際兹宣朗宜䘏艱難何以蕃之國命攸關述户口第五蜀稱沃壤粒兹蒸民厥田維上厥賦維均義却繭絲以阜閭闉是在司牧無貳爾心述田賦第六赫赫禹功石紐發祥桓桓昭烈漢胄克昌倬彼正統爛然徽章帝驟王馳植我天常述國紀第七岷峨錯峙屏翰丕隆獻殿肇封詩禮是崇毖兹侯度恪爾孝忠匹休三代帶礪穹窿述藩封第八世化代遷忠文迭創蜀次井參風多質戇俗乃樸野士則倜儻斲雕還淳職在磢述風俗第九岷峨矗矗江漢洋洋水存亷讓山辨隂陽靈氛翕發雲靄髙驤鬱兹西南繡錯虬翔述山川第十山澤蘊崇土毛是出維此職方獻彼珍錯蜀壤所宜桑麻孔獲節以阜民君子攸度述方産第十一設官分職為國之程法嚴位署義慎經營蠱則修飾壯則儀刑君子居之攸芋攸寧述公署第十二漢代尊經文翁化蜀比齊埒魯仁摩義育士際昭明率循軌鵠棫樸菁莪彬彬郁郁述學校第十三賢轍攸經爰有創立以時觀省亦節勞逸錦官峩峩籌邊屹屹曩範如存來驂可匹述宫室第十四易嚴禦暴詩羙為梁民無病涉邊有隄防鄭輿非惠張銘則當時成慎守終焉允臧述關梁第十五桓桓禹功赫赫江瀆祀事孔殷徳休若燭凡百明禋彝典攸屬孔惠孔時靡滛靡黷述祠廟第十六昭烈經營惠陵巋若禁採崇封政之筦橐羣哲斯蔵九泉可作以時修之罔滋蓁落述陵墓第十七勝域雄區標𫝊自昔陵谷時遷桑田代易以兹有盡視彼無斁因名紀思滮流罔極述古蹟第十八維皇經國設官分職位有崇卑義均休戚曷以擾民惟仁是亟鑒戒在兹毖哉羣辟述職官第十九業業筦樞煌煌圭組夐樹勲庸丕彰矩矱代有循良嗣繩步武暐􅁮鴻名式兹西土述名宦第二十􅃡遡蜀川遥馳簦笈岷山錦水代有賢蹟鴻以逺弋鳯爰栖棘悠悠芳躅江山增色述流寓第二十一賢科㧞儁制肇有唐自宋及明蔚然炳烺鳯鳴髙梧驥騰康莊得士之盛前葉罕方述科第第二十二岷嶓毓粹江漢炳靈虎嘯風冽龍騰雲蒸濟濟鉅公斌斌名卿徳馨埒羙王國之楨述人物第二十三周詠白駒莊寶靈龜秉我明哲養兹天倪白雲蒼茫紫芝葳甤永矢弗諼榮名兩遺述隠逸第二十四百行之原萬事之紀厥惟孝義君子所履抗表湧泉漆身歿齒順變雖殊芳馨並羙述孝義第二十五關雎起咏江漢覃風孀操接袂坤輿所鍾懷瑾茹荼持以令終懿兹貞媛世異名崇述列女第二十六眉峯雲臺仙靈所都竒𫝊寰宇實蕃緇徒三乘筏邈萬刧輪徂子不語怪世何泊乎述仙釋第二十七國任師帥維以勤民匪抒經畫曷助陶甄蜀山險塞奸宄陵憑懷柔廓清實藉鴻勲述經略第二十八雈苻之濱爰多狺獍災祥之來儼示修警凡厥纖曲有關時政蒐攬靡遺鑒觀斯境述雜記第二十九元黄融結沱潛毓靈咸摛白鳯各吐元精源開四子派衍羣英豈伊蜀珍允為國禎述藝文第三十終焉總之省志為目十郡縣志目二十有二經略志目二十有一雜記目五文目二十有五詩目十有四為巻共三十有六體則一仍乎舊事變兼紀乎新顧惟鼯技非長豹斑寡識尚冀名賢廓所未逮云爾
