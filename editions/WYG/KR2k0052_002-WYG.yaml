年升為直隷資州屬松茂道領縣四資陽縣漢置資中縣屬犍為郡晉宋齊因之後周武成二年改為資陽縣又自陽安移資州來治幷置資中郡隋開皇初郡廢七年復移州於盤石以資陽為屬縣大業初屬資陽郡唐屬資州宋因之元省入簡州明成化二年復置資陽縣屬成都府正德中改屬簡州皇清初屬成都府雍正五年改隷資州内江縣漢犍為郡資中縣地至東漢置漢安縣仍屬犍為郡晉初因之永嘉後沒於夷獠後周天和二年置安戍尋改置中江縣屬資中郡隋避諱改曰内江屬資陽郡唐咸通六年移資州來治七年還治盤石宋亦曰内江縣元省縣明洪武初復置屬成都府皇清因之雍正五年改隷資州仁壽縣漢犍為郡武陽縣東境晉置西城戍梁置懷仁郡西魏置陵州改縣曰普寧隋開皇三年郡廢十八年改縣曰仁壽大業初改隆山郡唐武德元年復曰陵州天寶元年改仁壽郡乾元元年復曰陵州屬劒南道五代屬蜀宋熙寧五年廢州為陵井監宣和四年改仙井監隆興五年又改曰隆州屬成都府元至元二十年倂州為仁壽縣屬成都路明屬成都府皇清因之雍正五年改隷資州井硏縣漢犍為郡武陽縣地為井研鎭晉安帝僑置江陽郡亦曰西江陽郡宋齊因之西魏置蒲城縣後廢隋大業元年置井研縣屬隆山郡唐屬陵州宋屬仙井監南渡後屬隆州元至元二十年倂入仁壽縣明玊珍復置明洪武十年又省入仁壽後復置井研縣屬成都府皇清因之雍正五年改隷資州直隷綿州漢置涪縣屬廣漢郡王莽改曰統睦東漢復為涪縣元初二年徙郡治此水經注作永初後還治雒蜀漢屬梓潼郡晉永嘉後移梓潼郡來治按晉志有涪城縣今在州南六十里潼川州界為涪城壩孝武帝仍移郡治梓潼舊志作西魏移宋齊皆曰涪縣西魏置潼州廢帝二年改縣曰巴西隋志巴西舊曰涪置巴西郡隋開皇初郡廢五年改曰綿州大業初改金山郡唐武德元年復曰綿州天寶元年改郡亦曰巴西乾元元年復曰綿州屬劒南東道宋亦曰綿州巴西郡屬成都府路紹興三年以知州兼綿茂威州石泉軍沿邊安撫使五年移川陜宣撫副使司於此六年罷二十一年罷沿邊安撫使嘉熙元年為四川制置副使治所元至元二十年省州治巴西縣及魏城縣入本州改隷潼川路明亦曰綿州屬成都府皇清因之雍正五年陞為直隷綿州屬松茂道雍正九年改屬川北道領縣五德陽縣漢廣漢郡綿雒二縣地五代因之唐武德三年始析雒置德陽縣屬益州埀拱二年屬漢州宋因之元至元八年陞為德州十三年復為縣屬成都路十八年還屬漢州明因之皇清屬成都府雍正五年改隷綿州羅江縣漢涪縣地之潺亭晉置萬安縣於梓潼水尾屬梓潼郡後移縣治於此宋齊因之西魏置萬安郡隋開皇初郡廢縣屬金山郡唐屬綿州天寶元年改曰羅江縣宋元因之明屬成都府皇清因之順治十六年倂入德陽雍正五年復設改隷綿州安縣漢廣漢郡綿竹涪二縣地晉為綿竹萬安萇陽三縣地隋為綿竹神泉石泉三縣地唐為龍安西昌神泉三縣地屬綿州宋政和七年以龍安神泉二縣屬石泉軍宣和三年軍廢縣還故屬七年復屬軍寶祐中移石泉軍治於龍安元中統五年升軍為安州屬成都路以龍安神泉二縣省入明洪武七年䧏州為安縣屬成都府皇清因之雍正五年改隷綿州綿竹縣漢置綿竹縣屬廣漢郡為都尉治中平五年劉焉徙益州治此晉初屬新都郡隆安二年以秦州流民分置晉熙郡及晉熙縣並置長陽南武都二縣劉宋屬南陰平郡齊因之永元初廢晉熙郡以縣屬南新巴郡梁復置晉熙郡周省長陽南武都入晉熙後又省晉熙入陽泉隋開皇三年郡廢徙綿竹治晉熙城改曰晉熙縣十八年改雒縣為綿竹改晉熙為孝水以縣境姜詩孝泉得名大業三年復曰綿竹屬蜀郡唐武德三年屬濛州貞觀二年州廢始屬漢州宋因之元至元十三年省縣入州置巡司二十九年廢司復改縣明因之皇清屬成都府雍正五年改隷綿州梓潼縣漢置梓潼縣尋為廣漢郡治王莾改縣曰子同郡曰就都至東漢初復故尋以郡治雒以梓潼屬之建安二十二年蜀昭烈帝以縣置梓潼郡晉初因之孝武帝又移郡治涪梓潼屬焉宋齊因之西魏改縣曰安壽又於縣置潼川郡隋開皇三年郡廢大業三年復改曰梓潼屬普安郡唐屬劒州宋元明不改皇清初屬保寧府雍正五年改隷綿州直隷茂州古冉駹國地漢元鼎六年開置汶山郡治汶江縣地節三年省幷蜀郡為北部都尉夷人以立郡賦重宣帝乃省後漢為汶江道永初三年為廣漢屬國都尉延光三年復立為郡見後漢志又冉駹夷傳作靈帝時立宋志以為蜀漢立晉時移郡治汶山縣改縣曰廣陽屬之東晉後廢宋齊仍為汶山郡梁普通三年改為北部都尉置繩州北部郡仍置廣陽縣為治周保定四年置汶州隋開皇初郡廢改曰蜀州尋為會州置總管府仁壽元年改縣曰汶山大業初府罷復為汶山郡唐武德元年復曰會州三年置總管府四年改南會州貞觀八年始改茂州天寶元年改郡曰通化屬劒南道五代屬蜀宋亦曰茂州通化郡屬成都府元至元九年屬土番宣慰司明洪武十七年仍設茂州兼設茂州衞以汶山縣地入焉屬成都府皇清因之雍正五年陞為直隷茂州屬松茂道領縣二保縣古冉駹國地隋置薛城戍唐置薛城縣屬維州宋保寧地屬威州元至元十九年倂縣入州明洪武六年始置保縣屬成都府皇清因之雍正五年改隷茂州倂威州入焉汶川縣漢置綿虒縣屬蜀郡東漢後曰綿虒道蜀漢置汶山郡於此晉改縣曰汶山至東晉後郡徙都安縣廢周後置汶川縣仍於縣置汶山郡隋開皇初郡廢唐屬茂州宋熙寧九年卽縣置威戎軍使政和六年改名延寧宣和三年廢軍為砦南渡後復為汶川縣仍屬茂州元至元十九年以戶口稀少止設巡檢司後復置明屬成都府皇清因之雍正五年改隷茂州直隷達州禹貢梁州之域漢巴郡宕渠縣之東境和帝分置宣漢縣仍屬巴郡劉璋分屬巴西郡蜀昭烈帝分屬宕渠郡尋還屬巴西晉初省惠帝復置屬宕渠郡晉志分巴西郡置桓溫平蜀後以巴漢流人立晉昌郡縣屬晉昌劉宋分置巴渠郡齊因之宋志宣漢屬南宕渠郡齊志屬西宕渠郡梁曰石城置東闗郡元和志作後魏廢帝二年改宣漢為石城及置萬州寰宇記大同二年置通典以州境有萬頃池為名西魏改通州寰宇記以居四達之路故名隋開皇初郡廢十八年改縣曰通川大業初改州曰通川郡唐武德元年復曰通州三年置總管府貞觀五年府廢天寶初復曰通川郡乾元初復曰通州屬山南西道宋乾德三年改曰達州通川郡屬䕫州路五年六年以宣漢等縣省入元曰達州至元十五年屬四川東道二十年改屬四川南道二十二年屬䕫州路明洪武九年改州為縣以通川縣省入正德九年復升為州仍屬䕫州府皇清因之雍正六年升為直隷達州屬川東道領縣三東鄕縣漢宕渠縣地東漢後為宣漢縣地劉宋分置巴渠下蒲二縣屬巴渠郡西魏分置東鄕縣幷置石州後周廢州置三巴郡隋開皇初郡廢並廢巴渠下蒲二縣入東鄕屬通川郡唐武德三年置南石州八年州廢屬通州宋屬達州元至元二十年廢入達州明成化三年復置仍屬達州皇清初屬䕫州府雍正六年改隷達州太平縣漢宕渠縣地東漢後為宣漢縣地劉宋分置東關縣屬巴渠郡齊因之梁置南晉郡及幷州後周改永昌郡隋開皇初郡廢五年州廢仍改縣曰宣漢屬通川郡唐武德元年復置南幷州貞觀元年州廢入通州宋乾德五年省入東鄕明正德十年復割東鄕之太平里置縣屬達州皇清初屬䕫州府雍正六年改隷達州四川通志巻二
