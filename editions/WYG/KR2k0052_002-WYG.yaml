body:
  text: 四川通志卷二建置沿革蜀自人皇肇闢帝嚳分封及虞夏間為梁州之域嗣是任土作貢世隷侯伯自儀錯入而蠶叢魚鳧開國之跡茫然漢置益州部刺史察舉諸郡厥後唐設節度幷採訪處置等使宋設安撫分益梓利䕫四路歴元及明又幾經因革焉國朝御宇於蜀中版圖各加釐正其於作新之功由舊之意蓋兩得之今且疆隅廣輪聲教遠訖土宇版章亦孔之厚矣故衛所多改郡縣則苗猓馴簡僻多從復設則生齒滋他若鎭雄遵義又量地之遠近改屬滇黔何一非因時制宜者歟作建置沿革志四川布政司蜀之先肇於人皇為蜀山氏爾雅蜀者獨也言不與他處相連屬也黃帝次子昌意娶蜀山氏女後封其支庶於蜀為蜀國史記黃帝生二子青陽降居江水昌意降居若水正義江水若水皆在蜀即所封國也舜置十二牧蜀曰梁州晉書梁者言西方金剛之氣强梁故名禹貢亦曰梁州周初武王伐紂庸蜀羌髳微盧彭濮八國從焉周禮職方氏倂入雍州愼靚王五年秦滅蜀置巴蜀二郡史記秦惠文王後九年司馬錯伐蜀滅之秦惠本紀張儀伐蜀蜀王開明戰不勝為儀所滅揚雄蜀本紀荆人鼈靈為蜀相其王杜宇以國禪之號開明帝下至三代有開明尚始去帝號稱王華陽國志周衰蜀侯蠶叢先七國稱王其後王曰杜宇移治郫邑或治瞿上七國稱王杜宇稱帝禪位於其相開明九世有開明尚復稱王徙治成都後與苴巴相攻為秦所滅漢元年屬漢國王漢中四十一縣高帝六年分置廣漢郡武帝元光五年開西南夷置犍為沈黎汶山牂牁越巂五郡元封五年置十三部刺史改梁州為益州晉志平帝元始二年改梁州曰益州益之為言阨也言其地之險阨亦曰疆壤益大故名之後省沈黎汶山王莽末為公孫述所據治成都改益州置司隷校尉十二年屬漢復為益州治雒中平五年劉焉為益州牧徙治綿竹興平元年還治成都建安中劉璋分置巴東巴西江陽三郡十九年昭烈定益州卽位建都又分置梓潼涪陵汶山漢嘉朱提宕渠六郡三國魏景元四年入魏分置梁州治漢中見魏宋二志而晉志又作泰始三年置晉亦曰梁益二州梁州領漢中梓潼廣漢新都涪陵巴郡巴西巴東八郡益州領蜀郡犍為汶山漢嘉江陽朱提越巂牂牁八郡其後又有宕渠陰平晉昌等凡三十郡永寧元年為李特所據永興元年李雄建號曰大成咸康四年李壽改號曰漢永和三年歸晉寧康元年陷入苻秦太和八年仍屬晉義熙元年又為譙縱所據九年討平之宋齊皆為梁益二州梁州領漢中等二十郡益州領蜀郡等二十九郡齊志梁州領漢中等二十三郡又𢎞農等四十五荒郡益州領蜀郡等二十五郡東宕渠等七獠左郡及北部都尉梁元帝承聖元年為武陵王紀所據得益梁秦潼安瀘青戎寧華信渠萬江新巴楚義十八州西魏廢帝二年入魏周置總管府隋開皇二年廢益州置西南道行臺尚書省三年復置總管府大業元年府廢三年改諸州為郡梁州領漢中西城房陵清化通川宕渠宕昌武都同昌河池順政義城平武汶山普安金山新城巴西遂寧涪陵巴郡巴東蜀郡臨卭眉山隆山資陽瀘川犍為越巂牂牁黔安等郡唐武德元年復改郡為州梁益二州皆置總管府三年於益州置西南道行臺分遂瀘巂茂利䕫黔等州皆置總管府九年罷行臺貞觀元年以益州置劒南道梁州置山南道開元二十二年分山南為東西而梁州為山南西道劒南道領成都一府漢彭蜀眉綿劒梓遂普陵資榮簡嘉卭雅黎瀘茂翼維戎姚巂松龍當悉靜恭柘保眞霸乾昌合渝等三十八州山南西道領興元一府鳯興利通洋集巴蓬壁金開渠等十二州又䕫涪萬忠四州分屬山南東道又分黔州為黔中道至德二年又分劒南為東西川節度昭宗初為王建所據建以大順二年入成都天復七年建國得四十六州凡三十五年後唐同光三年屬唐長興五年為孟知祥所據知祥以同光三年入蜀長興五年建國亦得四十六州凡四十一年宋乾德三年平蜀置西川路開寶六年分置峽西路太平興國六年倂為川峽路咸平四年分置益梓利䕫四路總曰四川路成都府路領成都崇慶嘉定三府眉彭綿漢卭簡黎雅茂威降十一州永康石泉二軍仙并一監潼川府路領潼川遂寧順慶三府資普昌敘瀘合榮渠八州長寧懐安寧西三軍富順一監利州路領興元隆慶二府利洋閬文沔蓬政巴八州䕫州路領紹慶咸淳重慶三府施萬開達涪珍思播八州雲安梁山西平三軍大寧一監元置四川等處行中書省領成都嘉定廣元順慶永寧重慶䕫州敘州馬湖九路潼川紹慶懐德三府保寧廣安二屬府彭漢安灌崇慶威簡眉卭劒龍巴沔蓬渠遂寧綿筠連瀘忠合涪永寧柔遠酉陽服施達梁山萬雲陽大寧開高順高戎三十六州長寧一軍而播州則屬於湖廣沿邊宣慰司至正中為明玉珍所據本傳嵗乙未克重慶戊戌克成都壬戌建國號曰夏都於重慶明洪武四年平之置四川等處承宣布政使司領成重保順敘馬䕫龍遵九府嘉眉卭雅潼瀘六州東川烏䝉烏撒鎭雄四軍民府崇禎末為賊帥張獻忠所陷皇清順治二年討平之仍置四川布政使司康熙四年改烏撒隷貴州雍正六年改東川烏䝉鎭雄隷雲南遵義隷貴州倂馬湖入敘州改建昌衞為寧遠府升綿茂達三州及資縣並為直隷州雍正七年又升雅州為雅州府今領府九州九衞三成都府禹貢梁州之域自古為蜀國秦置蜀郡漢亦曰蜀郡王莽改郡曰導江後為公孫述所據後漢建武元年述置成都尹十二年平之仍為蜀郡興平元年為益州治蜀漢建都於此晉太康十年改置成都國封子頴為王尋復為蜀郡惠帝以後李特李雄李壽相繼據之安帝初以秦雍流民置始康郡寄治成都義熙元年為譙縱所據九年平縱復為晉地宋齊因之元嘉十年置宋寧宋興二郡十六年又徙南秦州之懐寧郡皆寄治成都梁移始康郡於新都梁時武陵王紀僭號於此周置總管府隋志廢懐寧宋寧宋興晉熙四郡入蜀郡隋開皇初州郡並廢置西南道行臺三年復置總管府大業元年府廢仍為蜀郡唐武德元年復置益州總管府三年府罷置西南道行臺九年罷行臺置都督府貞觀元年置劒南道龍朔二年置大都督府開元二年置劒南經畧使七年升節度使天寶元年復曰蜀郡十五年駐蹕於此至德二年改成都府陞置南京尋罷後復置劒南西川節度使五代時王建孟知祥皆都之稱蜀宋乾德三年平蜀置西川路太平興國六年罷節度使降為益州端拱二年復曰成都府淳化五年又降為益州咸平四年分為益州路嘉祐四年復為成都府其設節度及兵馬鈐轄安撫使安撫司制置司制置大使俱治成都府元初立總管府兼為四川等處行中書省治所明洪武初復成都府為四川布政司治所皇清因之今領州三縣十三成都縣附郭周蜀王所治秦置成都縣為蜀郡治漢因之漢末兼為益州治蜀漢建都於此晉隋皆為州郡治唐貞觀十七年分置蜀縣俱在郭下􅂷拱二年分置犀浦縣五代王氏孟氏皆為國郡宋為成都府路治元為成都路治明為成都府治皇清因之華陽縣附郭唐貞觀十七年分成都縣地置蜀縣乾元元年改曰華陽與成都共治郭下宋元明因之皇清康熙九年倂入成都雍正五年復設雙流縣漢廣都縣地晉永和中置寧蜀郡宋齊因之後周郡廢隋仁壽元年改廣都曰雙流仍屬蜀郡唐龍朔二年復分置廣都縣屬成都府宋因之元省廣都縣入焉明因之皇清康熙元年倂入新津雍正六年復設溫江縣漢郫縣地西魏為蜀郡治隋開皇三年省郡入郫縣仁壽三年改置萬春縣尋廢唐武德三年復置萬春縣屬益州貞觀元年改溫江縣屬成都五代宋因之元屬成都路明屬成都府皇清因之新津縣漢犍為郡武陽縣地後周閔帝元年置新津縣仍屬犍為郡隋屬蜀郡唐初屬益州􅂷拱二年改屬蜀州宋因之南渡後屬崇慶府元屬崇慶州明因之皇清屬成都府金堂縣漢新都牛鞞二縣地唐咸亨二年分置金堂縣以縣界金堂山為名屬益州􅂷拱二年屬漢州石晉天福初改曰漢城後復舊宋屬懐安軍元初陞軍為懐州至元二十年省州入金堂縣屬成都路明屬成都府皇清因之新都縣漢置新都縣屬廣漢郡晉泰始二年分廣漢置新都郡於雒縣以縣屬之武帝時封王建國太康六年郡國並罷縣屬廣漢郡宋齊因之梁改為始康郡西魏郡廢隋開皇十八年改曰興樂縣業初省入成都唐武德二年復置屬成都府五代宋因之元屬成都路明屬成都府皇清因之簡州漢置牛鞞縣屬犍為郡晉因之永和中屬蜀郡宋曰鞞縣齊復曰牛鞞西魏恭帝二年改置陽安縣並置武康郡周閔帝元年於郡置資州武成二年徙州治資中而郡縣如故隋開皇初郡廢仁壽三年改置簡州大業初州廢縣屬蜀郡唐武德三年析益州復置簡州天寶元年改陽安郡乾元元年復曰簡州屬劒南道後置清化軍五代屬蜀宋亦曰簡州陽安郡屬成都府路元至元二十年省陽安縣入州屬成都路明洪武六年廢州為縣正德八年復改為州屬成都府皇清因之崇慶州漢置江原縣屬蜀郡晉因之永嘉六年李雄分蜀郡置漢原郡亦以名縣永和中改郡曰晉原縣曰江原宋齊因之梁改江原郡後周廢郡改縣曰晉原隋屬蜀郡唐埀拱二年於縣置蜀州天寶初改唐安郡乾元初復曰蜀州屬劒南道五代屬蜀宋初亦曰蜀州唐安郡紹興十年以高宗潛邸升崇慶軍節度淳熙四年升崇慶府屬成都路元至元十二年立總管府二十年改曰崇慶州省州治晉原縣入焉屬成都路明洪武初以永康縣省入屬成都府皇清因之郫縣周蜀王杜宇所都秦置郫縣屬蜀郡漢晉隋因之唐屬成都府埀拱初置犀浦縣宋熙寧五年省犀浦入郫縣元明不改皇清因之灌縣漢郫綿虒江原三縣地蜀漢置都安縣屬汶山郡晉因之劉宋徙汶山郡治此齊因之後周天和三年廢郡及縣改置汶山縣於此隋仁壽初廢入郫縣唐武德元年置盤龍縣尋改曰導江復移治都安廢治為灌口鎭貞觀中改曰灌寧開元中復為導江並於鎭置鎭靜軍孟蜀置灌州宋乾徳四年改曰永寧軍太平興國三年改永康軍以導江縣屬之熙寧五年廢軍為灌口砦以導江縣還屬彭州九年即導江軍治置永康軍使元祐初復曰永寧軍元至元十三年改軍置灌州省導江縣入焉屬成都路明廢州為灌縣屬成都府皇清因之崇寧縣唐儀鳯二年置唐昌縣屬益州􅂷拱二年改屬彭州長壽二年改曰周昌神龍元年復曰唐昌五代梁開平二年改曰歸化後唐同光初復故晉天福初改曰彭山漢又復故宋開寶四年改曰永昌崇寧元年又改曰崇寧屬彭州元因之明屬成都府皇清康熙七年倂入郫縣雍正六年復設新繁縣漢置繁縣屬蜀郡晉宋齊因之後周改曰新繁隋開皇初省入成都縣唐武德三年復置屬成都府宋因之元屬成都路明屬成都府皇清因之漢州漢置雒縣屬廣漢郡後移廣漢郡及益州皆治此晉泰始二年為新都郡治太康六年罷新都郡仍為廣漢郡治宋齊因之隋開皇初郡廢十八年改縣曰綿竹大業初復改曰雒屬蜀郡唐􅂷拱二年於縣置漢州天寶初改德陽郡乾元初復曰漢州屬劒南道宋亦曰漢州德陽郡屬成都路元中統元年復立漢州以雒縣省入屬成都路明屬成都府皇清因之什邡縣漢置什邡縣屬廣漢郡高祖封雍齒為什邡侯晉初屬新都郡郡廢還屬廣漢宋齊因之周閔帝改曰方亭武帝省入雒縣唐武德三年復置屬益州垂拱二年改屬漢州宋元明不改皇清屬成都府彭縣古彭州秦漢晉俱為繁縣地劉宋元嘉十二年置晉壽郡及縣齊因之梁置東益州後周廢州改郡縣俱曰九隴隋開皇初郡廢仁壽初置濛州大業初州廢屬蜀郡唐武德三年復置濛州貞