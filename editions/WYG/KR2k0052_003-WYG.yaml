江安縣汶江流其東淯溪匯其左上連敘永下接瀘重合江縣鳯山特起城中江水横流郭外納谿縣西接蜀江南通滇省直𨽻資州金爐據其前枝池盤其後秀山層出資水環流資陽縣鴈江環帶於東北資谿旋繞於西南内江縣佳氣西來洪流東折雖非都㑹美矣江城仁夀縣跨鼇山之絶頂望官渡之清流井研縣鳯山崖秀龍門灘髙直𨽻綿州控扼全川舟車輻輳居涪水之上流為東北之要衝德陽縣有饒沃之利無崖壑之險雖一隅勝概實㑹城股肱羅江縣羅汶水合龍池山開安縣髙山環圍巨河縈繞蜀省北門松龍孔道綿竹縣四山壁立一徑斜通梓潼縣坡陀山勢漸就平衍蜀道之險至此將盡直𨽻茂州岷山為江瀆之源桃闗來西域之路控制吐蕃捍蔽内郡保縣花巗西峙沱水東流樹灌口之屏藩扼羌畨之要道汶川縣氐羌極地全蜀巨屏山路七盤石崖多險直𨽻逹州郡居四逹冠於峽右東瀉巴水西環鐵山南對戞雲北望鳳嶺東鄉縣三江合流羣峯排闥大平縣山環水遶地美田腴四川通志巻三下
