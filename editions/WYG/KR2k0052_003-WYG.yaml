  text: 四川通志巻三上疆域古者夏官卿之屬有掌疆掌固司險諸官而慎固封守之文尤嚴於畢命以是知畫井分疆匪細務也蜀地處邊徼夙號險固方今幅員式廓而區分障塞又復碁布星羅洵可以慶敉寧稱樂郊焉一上徳化所及薄海内外盡入版圖固已無此疆爾界陳常于時夏矣然考梁益之輿圖而按其形勢計其道里控羣蠻而通西藏則無逺弗屆之規模即此亦覘其槩云作疆域志四川布政司轄十一府七直𨽻州四川省在畿輔西少南東西距三千里南北距三千二百一十里東至䕫州府巫山縣界嶺交湖廣荆州府巴東縣界計程共一千七百六十里西至龍安府松潘衛交南夷部落瑪拉噶生畨界計程共一千二百四十里南至寧逺府㑹理州金沙江交雲南武定府元謀縣界計程共二千零三十里北至保寧府廣元縣七盤闗交陜西漢中府寧羌州界計程共一千一百八十里東南至直𨽻敘永㕔永寜縣赤水河交貴州威寧府畢節縣界計程共一千一百五十里西南由打箭爐出口歴裡塘等處至西藏阿喇勒岱界計程共九千六百七十五里東北至直𨽻達州太平縣分水嶺交陜西漢中府興安州界計程共一千四百一十里西北至龍安府平武縣交陜西鞏昌府文縣界計程共一千一百五十里陸程自省至京師五千七百一十里水程自省至京師一萬七百一十里成都府轄三州十三縣在布政司治西北東西距三百二十里南北距二百三十里東至直𨽻資州資陽縣界一百六十五里西至直𨽻茂州汶川縣界一百五十五里南至直𨽻卭州界一百二十里北至直𨽻綿州德陽縣界一百一十里東南至直𨽻眉州彭山直𨽻資州仁夀二縣界一百一十五里西南至直𨽻茂州汶川直𨽻卭州二州縣界二百三十里東北至潼川府樂至中江二縣界一百五十里西至直𨽻綿州綿竹直𨽻茂州二州縣界二百五十里成都縣附郭在府治北東西距三十里南北距三十五里東至府城内魚市口暑襪街交華陽縣界西至郫縣界三十里南至府城内丁字街交華陽縣界北至新都縣界三十五里東南至府城内青石橋交華陽縣界西南至温江縣界二十里東北至府城内喇嘛寺交華陽縣界西北至新繁縣界三十里華陽縣附郭在府治南東西距四十里南北距二十里東至簡州界四十里西至府城内魚市口暑襪街交成都縣界南至雙流縣界二十里北至府北城内交成都縣界東南至簡州雙流縣界四十里西南至雙流縣界二十五里東北至簡州界一百里西北至府城内喇嘛寺交成都縣界雙流縣在府西南四十里東西距四十五里南北距四十五里東至簡州界二十里西至崇慶州界二十五里南至新津縣界二十里北至温江縣界二十里東南至直𨽻資州仁夀縣界三十里西南至崇慶州界四十里東北至華陽縣界二十里西北至温江縣界十五里温江縣在府西少南五十里東西距四十五里南北距三十里東至成都縣界三十里西至崇慶州界十五里南至新津縣界十五里北至郫縣界十五里東南至雙流縣界三十里西南至崇慶州界十五里東北至成都縣界三十里西北至灌縣界四十里新津縣在府西南九十里東西距六十里南北距四十里東至雙流縣界三十里西至直𨽻邛州界三十里南至直𨽻眉州彭山縣界十五里北至崇慶州界二十五里東南至直𨽻眉州彭山縣界四十里西南至直𨽻卭州蒲江縣界六十里東北至雙流縣界三十里西北至崇慶州界二十五里金堂縣在府東北七十里東西距六十五里南北距六十里東至潼川府中江縣界五十里西至新都縣界十五里南至簡州界五十里北至漢州界十里東南至潼川府樂至縣界七十里西南至新都縣界二十五里東北至潼川府中江縣界七十里西北至漢州新都縣界二十里新都縣在府北五十里東西距三十里南北距四十五里東至金堂縣界十五里西至新繁縣界十五里南至成都縣界十五里北至漢州界三十里東南至華陽金堂二縣界二十里西南至成都縣界十里東北至漢州界二十里西北至新繁縣界二十五里簡州在府東少南一百二十里東西距一百二十里南北距一百四十五里東至潼川府樂至縣界四十里西至華陽縣界八十里南至直𨽻資州資陽縣界四十五里北至潼川府中江縣界一百里東南至潼川府樂至縣界四十里西南至直𨽻資州仁夀縣界六十里東北至潼川府中江縣界五十里西北至金堂縣界九十五里崇慶州在府西南九十里東西距四十五里南北距六十里東至温江縣界二十五里西至直𨽻卭州大邑縣界二十里南至新津縣界三十五里北至灌縣界二十五里東南至新津縣界四十五里西南至直𨽻卭州大邑縣界三十里東北至温江縣界二十五里西北至瓦寺土司界一百里郫縣在府西四十五里東西距四十五里南北距三十里東至成都縣界二十五里西至崇寧縣界二十里南至温江縣界十五里北至新繁縣界十五里東南至温江縣界二十里西南至灌縣界二十里東北至新繁縣界十七里西北至崇寧縣界二十里灌縣在府西一百二十五里東西距五十里南北距一百里東至崇寧縣界三十五里西至直𨽻茂州汶川縣界十五里南至崇慶州界八十里北至彭縣界二十里東南至温江縣界四十里西南至直𨽻茂州汶川縣界六十里東北至彭縣界六十里西北至直𨽻茂州界三十五里崇寧縣在府西北八十里東西距三十里南北距二十五里東至新繁縣界十五里西至灌縣界十五里南至郫縣界十里北至彭縣界十五里東南至郫縣界二十里西南至灌縣界二十五里東北至新繁縣界二十里西北至灌縣界四十里新繁縣在府西北五十六里東西距三十里南北距三十五里東至新都縣界十五里西至崇寧縣界十五里南至成都縣界二十里北至彭縣界十五里東南至