body:
  text: 四川通志卷四上城池惟王建國辨方正位體國經野為斯民長治久安之計必有深溝髙壘用奠金湯焉蜀城肇自張儀漢唐宋元明以來涖兹土者疊為增繕疏浚其制漸備至國朝統一六合懷德為城被澤為池已無容設險而自固然猶增置官守鎖鑰維嚴故諸屬城池雖廣狹各異要皆與山水相憑依屹然樹一方保障則仰崇墉之百雉固知苞桑之繫磐石之安萬世於兹永賴矣作城池志成都府秦惠王二十七年張儀築大城周十二里隋時楊秀附舊城西南二隅增築少城廣十里唐僖宗時髙駢築羅城周二十五里髙二丈六尺外繞長堤二十六里其後程戡盧法原王剛中范成大先後修葺明趙清甃以磚石陳懷復浚池隍崇禎末圮國朝康熙初巡撫張德地布政司郎廷相按察司李翀霄知府冀應熊成都縣知縣張行華陽縣知縣張暄共捐貲重修髙三丈厚一丈八尺周二十二里三分計四千一十四丈垜口五千五百三十八東西相距九里三分南北相距七里七分敵樓四堆房十一門四東迎暉南江橋西清逺北大安外環以池雍正五年巡撫憲德增修益固滿城在成都府城西康熙五十七年建築城垣周四里五分計八百一十一丈七尺三寸髙一丈三尺八寸門五大東門小東門北門南門大城西門城樓四共一十二間每旗官街一條披甲兵丁小衚衕三條八旗官街共八條兵丁衚衕共三十三條成都縣附郭華陽縣附郭䨇流縣唐宋元俱土城明正德間知縣王瓛因舊址增修周二里七分計四百八十六丈萬厯甲午知縣杜方偉改砌磚城東西濶五十丈門四廣都保民雙江好義萬厯庚戌知縣楊文林改北門於西北隅曰開元以掘得開元錢因名外環以壕溫江縣明成化間知縣李棠砌石城髙一丈五尺周三里六分計六百四十八丈門五昭化阜成廣安永寧進賢正德中知縣段善鑿池深八尺濶一丈崇禎十一年施之炳於城之東南西北各置譙樓一新津縣明成化間知縣唐昭始築土城正德間知縣田穀包砌以石髙丈餘周二里七分計四百八十六丈池深一丈三尺寛一丈五尺門四金堂縣明成化中知縣王賔砌石城髙一丈七尺周五里三分計九百五十四丈門四康逺長寧義安永靖外環以壕新都縣明正德初知縣張寛百户湯聘莘合砌石城髙一丈八尺周九里三分計一千六百七十四丈外浚深池知縣韓奕以南門臨河增置月城簡州明成化間知州張翔砌石城正德中知州王良增修髙一丈八尺周四里三分計七百七十四丈門四國朝康熙四年知州王孫盛補修崇慶州明成化中知州周尚文始築土城髙一丈五尺周九里三分計一千六百七十四丈上覆瓦門四國朝康熙六年知州藺開禧修葺郫縣明天順間知縣唐節築土城成化初知縣錢淵增修髙一丈五尺周八里三分計一千四百九十四丈闢門四各置樓正德間知縣李時暢重修灌縣舊無城明洪武中築土為牆𢎞治中知縣胡光包砌以石髙一丈六尺周八里計一千四百四十丈樓四省耕閲清懐逺拱極門四宣化導江宣威鎮安國朝康熙五年知縣馬機補修崇寧縣舊土城明正德間經厯李琰增牆浚壕城髙一丈一尺周三里三分計五百九十四丈新繁縣明正德間知縣周鸞始築土城髙一丈五尺周六里七分計一千二百零六丈門四池濶一丈深五尺嘉靖中知縣劉體仁改砌以磚國朝康熙五十七年知縣劉廷錫重修四門樓春暉陽亨秋登純德漢州明天順中知州李鼎州判王瑛始築土城正德間僉事郝綰用石包砌髙一丈八尺周九里七分計一千八百四十六丈門四池深濶各一丈什邡縣明正德八年知縣王選砌石城髙一丈八尺濶一丈周三里九分計七百零二丈門四外環以壕彭縣明天順間知縣侯福始築土城髙一丈五尺周四里四分計七百九十二丈門四朝京鎮逺文化武威成化初知縣李能重修浚壕築堤繞城重慶府明洪武初指揮戴鼎因舊址修砌石城髙十丈周十二里六分計二千二百六十八丈環江為池門十七九開八閉俗以為九宫八卦之形朝天翠微通逺金湯定逺南紀鳯凰金字仁和太平出奇大安臨江洪崖干斯福興東水明末圮國朝康熙二年總督李國英補築完固巴縣附郭江津縣明成化中同知莫琚砌石城髙一丈八尺周五里六分計一千零八丈昔門九迎恩通市嘉會臨江德威東阜西鎮南安北固今止開四門長壽縣舊土城明天順中知縣時順修築外環以壕永川縣明成化中同知莫琚知縣劉鳯砌石城髙一丈五尺周二里二分計三百九十六丈門六仁惠義正阜民嘉惠文明武德壁山縣明成化中知縣張本砌石城髙一丈五尺周三里八分計六百八十四丈門四迎恩臨髙拱秀演武明末圮國朝康熙初歸併永川雍正八年復設城亦重修榮昌縣明成化中同知莫琚知縣覃琳砌石城髙一丈五尺周五里五分計九百九十丈門四南和東泰西寧北謐外環以壕大足縣明天順中知縣趙恕砌石城成化中同知莫琚重修髙一丈二尺周四里八分計八百六十四丈門四昌寧昌泰昌孚昌靖嘉靖中知縣袁衍四增修改四門曰迎曦送夕來薰拱極綦江縣明成化中主簿宋璧砌石城髙一丈一尺周二里七分計四百八十六丈門四迎恩偃武柔逺永川明末圮國朝康熙八年知縣李秉直重修南川縣明成化中知縣劉斐始築土城髙一丈二尺周三里五分計六百三十丈門四國朝康熙二十四年重修黔江縣明洪武中知縣盧祥砌石城髙一丈二尺周三里五分計六百三十丈門四領夷望京宣化柔逺外環以壕明末圮國朝康熙二十四年修葺合州明成化中知州唐珣砌石城髙一丈七尺周一十六里二分計二千九百一十六丈門十二迎暉廣濟安遠望江洛陽演武修文觀德阜民瑞應會江迎恩萬厯三年知州史修移治瑞應山麓門八銅梁縣明天順中始砌石城成化中同知莫琚重修髙一丈三尺周六里六分計一千一百八十八丈門四慶元慶會慶平慶成明末圮國朝康熙初併入合州康熙六十一年復設縣今併安居縣入焉城亦重修定逺縣舊城崩於江明嘉靖三十年知縣胡濂遷今治甃築石城髙一丈五尺周三里七分計六百六十六丈門四文明武勝朝陽延景忠州明洪武中修砌石城髙二丈周五里三分計九百五十四丈門五修文修政懷忠懷賔賦清酆都縣明天順中知縣柴廣砌石城𢎞治中知縣李毅重修髙二丈周三里三分計五百九十四丈門五宣化迎恩會川陽和屢豐墊江縣明成化初知縣楊端砌石城髙一丈九尺周五里五分計九百九十丈門四人和大定太平永安涪州明成化初砌石城髙一丈三尺周四里計七百二十丈門五國朝康熙二十四年修葺彭水縣明嘉靖三十一年砌石城髙一丈二尺周二里計三百六十丈門五朝陽迎薰映暉北極東北曰小東門外環以壕保寧府漢劉璋築土城後張桓侯增修元末明玉珍重築仍土城明洪武四年千户滕貴即舊址增拓内外俱甃以石髙一丈六尺周九里三分計一千六百七十四丈門四富春錦屏澄清威德成化間指揮田儀建四樓閬中縣附郭蒼溪縣明成化中知縣朱敬始築土城正德間主簿唐賢包砌以石髙一丈五尺周三里五分計六百三十丈門四迎旭通濟觀瀾親賢南部縣舊無城明成化中知縣蔣矩樹木為柵累石為門萬厯中知縣饒一中改砌石城髙一丈八尺周二里七分計四百八十六丈門三靈雲跨黽狀元廣元縣明洪武三十一年設利州衞始築城砌以石髙二丈周九里計一千六百二十丈門五賔陽久閑南鎮川西臨清北清逺懷羌昭化縣舊土城明天順間築正德中包砌以石髙一丈一尺周二里七分計四百八十六丈門四巴州舊土城明成化間州判唐平知縣王成包砌以石髙一丈二尺周四里計七百二十丈池深廣一丈二尺門四有樓正德中參議胡鳯增修崇禎末圮國朝康熙初年復修通江縣明洪武初知縣樂韶壘石立柵成化中知縣毛鳯始築土城正德六年通判王斐包砌以石髙一丈七尺周四里計七百二十丈門三靖武永安朝鳯明末圮國朝康熙元年知縣王保釐重修南江縣明正德間知縣沈鏞始砌石城髙一丈一尺周二里三分計四百一十四丈池深一丈廣二丈東西南三門明末圮國朝康熙初年復修劒州明洪武初列柵為障成化中知州唐孟璋始築土城正德十三年知州李璧包砌以石髙一丈周二里計三百六十丈門五劒閣武建鶴鳴漢陽立馬並舊南門為六順慶府明洪武初自北津渡遷城於今治成化初增擴之甃以磚石髙一丈二尺周九里七分計一千八百四十六丈門八景和來薰阜成陽復小東小南小西小北崇禎末圮國朝康熙初知府李民聖重修五十年江漲城圮知縣張宿焜補修南充縣附郭西充縣明天順間知縣張貴始築土城成化間知縣柳金包砌以石髙一丈周七里計一千二百六十丈門四進賢大安僊林恩光蓬州明天順間州判李懋築牆樹柵𢎞治間知縣畢宗賢同知段普甃以磚石髙一丈周四里計七百二十丈門四蓬萊鳯山龍溪五馬營山縣明成化中知縣李林始築土城正德間知縣嚴傑包砌以石髙一丈周四里九分計八百八十二丈池廣一丈門四東秩臨清西城覽秀國朝康熙四十四年知縣張玉璘重修儀隴縣明成化初知縣胡睿築土城於金城山頂正德間知縣利本堅遷城於山下平溪包砌以石髙一丈五尺周九分一釐計一百六十丈有奇門四東作西成迎恩朝闕廣安州舊無城明初豎木為柵依山為牆成化間始築城甃以磚石髙一丈二尺周六里計一千八十丈門四柔安鎮安清安寧安渠縣明成化間知縣朱鳯始築土城正德間知縣甘澤包砌以石髙一丈周三里七分計六百六十六丈門四各覆以樓外環以壕大竹縣明成化初知縣李旻始砌石城髙一丈周二里四分計四百三十二丈門四通濟通賢通渠通達明末圮國朝康熙六年知縣俞宣琅重修岳池縣明天順間知縣陳琳始築土城成化初典史馬貴甃以石正德中知縣孫翰重修髙九尺周三里七分計六百六十六丈門四迎暉景安來薰永安鄰水縣明成化間知縣于福削山砌石為城髙一丈五尺周四里計七百二十丈門四迎陽永寧鎮安安慶明末圮國朝康熙四十三年知縣徐枝芳重修更建四樓曰發育迎陽金馬星拱叙州府唐德宗時韋臯開都督府於三江口創建土城會昌中因馬湖江水蕩圮徙築江北宋末安撫郭漢傑移治登髙山元至元中復城於三江口即今治明洪武初增築外城包砌以磚髙二丈七尺厚一丈八尺周六里計一千八十丈門六麗陽合江建南七星文星武安東南以大江馬湖二江為天塹西北鑿壕廣五丈深一丈五尺宜賔縣附郭南溪縣明天順中知縣鄧壽椿始砌石城髙一丈二尺周五里計九百丈門七縣前大江後小河東西北池深一丈廣二丈富順縣宋元舊有土城明天順間甃以磚石髙一丈八尺周二里一分計三百七十六丈門六長寧縣宋宼瑊築土城明成化間知府王良美甃以石髙一丈六尺周六里計一千零八十丈門四外環以壕隆昌縣明隆慶間知府張世印砌石城髙一丈八尺周四里三分計七百七十四丈門四慶符縣明成化初知縣詹文築土城後知縣黄瓚甃以磚石髙一丈二尺周三里五分計六百三十丈池深一丈門四髙縣明景泰初築土城成化間甃以石髙一丈五尺周二里計三百六十丈門四筠連縣明景泰初建土城成化二年知縣翁冕甃以石髙八尺周一里六分計二百六十八丈池深一丈門四明末圯國朝康熙八年知縣孫如芝重修珙縣明天順八年知縣曹棠始砌石城髙一丈周二里計三百六十丈門四興文縣宋趙遹征蠻常駐兵於此築土城明洪武中甃以石髙一丈周一里五分計二百七十丈門四屏山縣縣城即馬湖