body:
  text: 欽定四庫全書四川通志巻十上孝友聞之立愛惟親立敬惟長周家六行取士必以孝友爲先詩稱張仲書美君陳視此志也伏讀聖諭廣訓首曰敦孝弟以重人倫煌煌誥誡燦若日星以故朔望宣講漸漬薰陶凡兹黎庶莫不翕然從風而僻在西蜀者亦咸知敦本重倫遵道遵路洵所謂光于四海無所不通者矣詩曰孝思維則又曰永錫爾𩔖然則我朝之孝子悌弟與往代之孝友著稱者其事若相取則而其人亦可以𩔖從也作孝友志成都府漢禽堅成都人生而失父三出徼外乃尋𫉬之後王裔爲蜀郡守以堅至孝表其墓追贈之張霸字伯饒成都人自少知孝讓鄉人號爲曾子七嵗通春秋後博覽五經和帝時舉孝亷爲㑹稽太守表用郡中有業行者郡人爭勵志節化服羣盜童謡云棄我㦸捐我矛盗賊盡吏皆休後遷侍中晉鄧寳彭縣人事親至孝鄉里稱之其家酤酒爲業得錢即奉甘㫖有二仙客常就飲見寳事親盡禮每嗟異之一日言曰汝孝行可嘉學道有緣寳聞其言潛隨其後行三十餘里履江若平地俄抵山見其廊廡廣麗竒花怪石皆神仙境界二客見寳笑曰汝亦來耶引之周覽不覺饑渴謂寳曰汝離家乆母念汝成疾與藥兩丸令救其母遂出回顧舊處已失所在至家已二年矣寳以藥獻其母疾愈壽百餘嵗終寳結廬墓側嵗餘二客詣廬召之遂仙去人號所居爲鄧寳村唐李文素成都人喪母廬墓芝草生塋虎鹿馴擾刺史戴竒以聞賜粟三百石費襄雙流人至孝母病割股進之遂愈母殁身自負土廬墓終身産業多讓其兄云茹榮簡州吏事母姚氏至孝令賜一𤓰歸以奉母令知之乃聽歸養焉殁爲神里人至今祀之沈如琢崇慶人有孝行母患消渴冬時思桑椹求之不獲宅東桑忽生椹遂以奉母疾愈後母亡毁瘠廬墓有白鶴棲於墓上天寳二年旌表嚴舉成都人有嚴孝子碑在府治儀門内宋羅居通成都人母死廬墓三年有甘露芝草之瑞開寶中詔以爲延安主簿申積中成都人襁褓中楊繪從其父起求爲子及長知出繼楊氏而絶口不言年十九登進士第事所養父母盡孝終身有一弟二妹爲畢婚娶始歸本族復爲申氏蜀人以純孝歸之政和六年翰林學士許光凝守成都得其事薦諸朝擢提舉永興軍學道卒彭乘華陽人性純孝以好學稱舉進士嘗登相國寺閣悵然曰親老矣安敢舎晨昏之奉而圖一身之榮乎遂奏乞歸養父卒甘露降於封樹人以爲孝感後累官翰林學士周善敏雙流人喪父廬於墓側母病割股以進遂愈詔賜粟帛存慰之謝榮溫江人性純樸讀書躬耕以養母飲饌必躬自捧進冬寒溫衾候寢嘉魚魯儒爲作傳王景字仰山郫縣人淳化咸平中景以積行純孝稱於鄉里號王孝子嘗割股愈父母病及父母殁負土成墳結廬其側有甘露降於竹柏烏雀銜果麋鹿馴擾李順之亂郫人團結以自守順後下令集向之團結者将盡殺之孝子適役於縣度衆皆不免夜啟關縱令逃去數千人頼以活子孫七世貴顯乾道己丑夏孝子墓上復產紫芝一本人以爲仁孝之報云劉才郫縣人七代以孝聞才父子兼以儒行著後父卒才廬於墓有芝草連理之應大中祥符中旌表李定郫縣人好古力學志不願仕養二親以孝聞累舉孝㢘不就自號虚舟子蜀中累值兵火經籍不完天禧中詔求藏書定率先授牒監中羣書多出其家王禹夫字從善新都人持身整峻鄉族稱其孝友有兄弟爭貲者質於其兄舜夫禹夫曰此非義事切勿問吾家和氣兄弟聞此急當洗耳矣兄以語爭者亦感悟退讓聞者悉化爲友愛陳敏政漢州人五世同居乾道間詔旌表門閭明劉恩成都人事父母最孝父卒時恩任荆門司訓聞訃哀毁成疾尋殁姚淑字惟善其先江西新淦人祖商於蜀遂家成都長兄溥令潛江歸淑與季兄汶徃迎之舟次敘江夜有盜執溥淑徃曰此吾兄貴人也爾寜殺我溥亦曰若輩不過欲得貨耳吾弟少年其舎之僕從仗劍起逐賊賊怒遂俱遇害時汶亦被傷乆復甦曰有神人謂我汝幸免矣寃哉汝弟孝且友帝命恤録云朱佖字世望成都人邑庠生竭力事親和氣藹如母逝廬墓三年以孝稱賙濟婚喪鄉黨頼之族有絶產應歸佖不受推爲祭田年九十七無疾而終或問養生之術曰無他但平生不著惱耳李鸞號翔山父志宏江西臨川人寓成都遂家焉鸞性孝友父客死鸞徒跣千里歸櫬於蜀兄鳳蕩先業鸞茹苦自勵不以介懐補弟子員有博洽聲後以子學詩貴封南京户部主事楊宗成都人父重三爲中衛指揮宗性端慤以官讓弟從士夫遊仲子得遺金歸宗召其人還之鄭仕階字子陞成都人由舉人任白水令乞歸終養事親誠事兄讓徜徉林臯郡人士樂親之有浣花詩稿扇影集爲里中傳誦周存智華陽人諸生鑾之子鑾遇其讎於法華寺僧舎兇徒羣毆之存智以身翼父肋折氣絶毆者逃散父得不死已乃甦嵗餘竟卒時年十六縉紳咸哀之輓詠成帙茍纘宗字子孝華陽諸生孝事繼母段氏長兄無嗣纘宗長齋祈籲果得子當事聞其高誼表其閭曰篤行贈之詩有云善養直追曾閔孝古心應溯葛懐初又云薦逹未能慚淺簿空将遺話説成都其嘉重如此馬廷輔字良佐華陽人嘗拾遺金歸其主親有疾割股和藥以進每遇饑疫給粥施藥多所全活𢎞治間表聞於朝旌以孝義龔鼎雙流人天順閒進士幼稱孝友篤愛弟鳳後任主事有能績遷守南陽遇宗室縱横裁以法悉斂跡擢雲南叅政父文貴以義方敎子德壽兼隆鄉閭表重之子喜祺令福清有祖父風鮮榮字居仁灌縣人登進士授楚沅陵知縣母張氏多疾上疏乞終養生盡敬死盡哀教人以忠孝爲先服闋而卒郭瑄崇寧人仕兵科給事中歴官叅政治行著聞孝友篤至父早喪廬墓悲泣時人稱其孝鄧伯祿崇寧人任陜西永壽縣令有惠政父殁俸資悉以奉繼母囊無私積卒於官祀名宦祠宋繼祖字汝孝漢州人進士授定海令志大才敏倭寇薄城多方攻禦邑境用輯居家篤於養志事繼母尤盡子道誨諸弟皆成令名郡人作孝友傳以褒述之何節漢州人進士累官長沙太守多著惠政事孀母至孝言行不茍操履端正鄉里推重崇祀鄉賢史英彭縣人以鄉薦任江西瑞州府推官歴任九載數决疑獄以母老堅意乞歸終養瑞人感其孝祠祀之劉寅雙流人𢎞治間進士資性醇厚事繼母至孝随父宦淮陽從王衢吾遊荘定山結爲忘年交及長奮志力學登第官南京考功出守寧國值嵗歉賑活甚衆流賊之變備禦尤嚴又建梅都官祠嵗時祀之擢㕘汴藩未幾以疾歸所著有東谷集張時中金堂人父傑目盲旦夕躬授匕箸夜必焚香籲天三年遇醫復明又患腹脹常同臥起以手按摩尋愈父常曰吾無報汝願汝子亦如是也藍冦至負其父先逃累遇賊哀求得免後爲清平司訓車政新都人博學隱居父卒政年十四哀毁過甚死而復蘇既葬朝夕培墳有芝草之祥母病革祈天減壽益母母果愈人以爲誠孝所感楊維懷新都人從父宦遊扶母櫬歸三峽夜遇羣賊衆皆逃匿獨守母棺賊疑其有財欲發之維懷以身伏柩賊殺之沉尸於水母棺得全計朝聘字莘夫成都人正徳庚午舉孝廉性孝悌精易學以遺貲讓二弟以正學啟門人授正陽令歴澂江知府誠心敷政約已愛民增建昆明學舎數十楹捐俸賑饑開海田三千畝俾民買犢以耕民剙祠祀焉引歸林下布蔬自怡不事干謁壽八十二卒呉應祿新都人正德間母與人忿爭因抛石擊人至死官坐母罪應祿時年十一引罪歸已即受禁母𫉬免御史盧雍鞫知其狀釋之楊珩成都人幼頴悟七嵗能文與内江趙文肅齊名中嘉靖庚子鄉試博極羣書學宗程朱楚蒋道陵督蜀學得珩巻喜曰吾道有人矣進與語目之爲尹和靖珩學日深益得要領嘗謂學本修齊著居家箴百口同爨論及祀先等篇建祠堂明宗法事二親極恭謹内外無閒言以親在遂絶意仕進督敎三弟玠琮璲家庭雍睦皆切劘於聖賢之學珩卒年僅三十六里中後學至今誦法之崇祀鄉賢戢汝止字敬之幼出嗣於叔嘉靖乙丑進士授中書歴户禮兩垣在朝剛正不阿外轉湖廣僉憲飭武備足兵食江洋無警陞福建叅政屢疏陳情得俞㫖歸奉父母暨本生父母甚懽家居清約為人和易可親鄰里慶弔雖蓽門蓬户必躬造焉至懇恩疏四親並受封典世所希有云齊準字平甫成都人賦性公直潛心理學事繼母以孝待諸弟以友中嘉靖辛丑進士任户部主事未幾三上疏乞終養家居恤隣周困族人有不能婚喪者悉勉力代之尤長詞翰以文行名重一時壽八十卒蔣三近號又溪成都人進士授刑部主事歴郎中工詞翰才望卓犖陞瓊州知府未任而卒家仍寒素自少事節母曹氏至孝待二弟三益三畏極友愛里中俱稱長者弟三益號蓉野先登已未進士筮令金華慷慨尚氣節廉愛仁明士民為立生祠後以户部視𣙜浙中額外一毫不取屢謀迎養母以耋年未果浙中士紳歌頌節孝有賢節録一時公評號蒋氏二難干德昌華陽人嘉靖辛丑進士忠厚正直孝友著聞歴任户部郎疏陳時政擢知真定府陞徐州兵備值倭警城外縉紳士民以城閉不得入號哭城下德昌遽令以竹籠數百令軍士緣載而全活不可勝數陞河南大㕘即致仕歸里撫兄孤廷采如己子敎成名儒領丙子鄉薦第二楊鉉華陽人學行純篤孝友著聞舉於鄉初任郿令實心實政民像祀焉轉鞏昌通判職司西寧等處團練鄉兵擊走松番三㨗河湟奉㫖錫宴賜金兵部紀録擢用鉉乞歸養親章凡十六上乃得請家居崇儉約敦道誼與弟瑜博極羣書游心物外有記事珠等書十餘巻鄧宗古簡州人父死自負土爲墳廬其側晨夕悲慟甘露降於墓木里中號爲鄧孝子王曉郫縣人邑諸生父殁有遺腹子曉盡以田讓之嘉靖中學使扁其門曰友讓徐鳴陛郫縣諸生孝事孀母撫養孤妹周恤親族善行甚多直指聞而奨之何剛新繁人居親喪廬墓三年不怠王廷貴新繁人性孝謹母疾垂危割右股肉以進母尋愈又數年父病割左股肉療之父亦愈又有同邑徐表亦割股救父疾隆慶間與廷貴並賜旌表閻宗德簡州人三嵗失父事母張氏至孝宗德年七十割股愈母母壽至百有九嵗宗德年九十一天啟三年奉㫖建坊章玉鉉漢州人明經以母老不仕母九十餘玉鉉年亦七十朝夕就養惟求悦母時人比之老萊子周之冕漢州諸生事親克盡子道内外無閒有旌孝石坊尚存廬松林漢州人事繼母楊氏至孝母病割股和藥遂愈有司旌表邊洪彭縣諸生事母純孝輕財好義年六十七以哭母過哀而終李岳彭縣人事孀母至孝官華容訓導轉通山教諭米貝彭縣貢生苦學勵行事奉繼母曲爲順承推讓貨產以與累母弟當事以篤行表其閭徐仕明彭縣人母何氏常臥病仕明兩次割股俱𫉬痊愈當事聞其孝表曰愛篤慈烏又嘗拾人遺金盡歸其主人稱孝義熊安彭縣人兄弟六人力耕共爨直指呉公表曰孝友祝丕傳彭縣諸生賊變負母至樊家塲賊追至欲殺其母求以已代賊不許並遇害重慶府漢嚴永郡人延熙中居父喪哀毁盡禮詔旌其門有嚴孝子碑在郡治杜孝郡人事母以孝聞母喜食魚膾孝役成都買魚置竹筒以草塞之投於中流祝之曰願吾母得此食婦汲於江忽見竹筒横來觸岸婦異拾之見二魚曰必吾夫所寄也熟以進姑聞者嘆其孝感蕭瓘爲渝州長史居母喪以哀毁卒宋何光覺榮昌人淳熙庚戌第進士性孝愛母病渴值旱泉涸光覺竭誠祝天宅旁一泉湧出進母病愈後邑人因甃爲井名曰孝感泉元張孝子江津人逸其名元末兵亂孝子負其母餬口四方十有二年明兵平蜀始負母南歸至笋溪時值水漲母曰吾以老憊累吾子至此今隔一衣帶水天将不使吾見家鄉乎仰天長嘆自躍赴江孝子倉皇從之覺足下隠隱有石載之得渡孝子與母俱無恙及顧江中乃一石牛也今指渡處爲臥牛灘明施彦寧江津人母殁廬墓三年孝慕哀切没齒不衰呉仕坤南川人父彬薄宦山東病革仕坤侍湯藥哀籲於天竟不起寄殯任所三年後鬻女得財扶櫬歸家朝夕奉祀如生正統中旌表其門唐政江津人早喪父以樵採養母終身不怠母殁廬墓天順中有司上陳其事詔優恤之李凌高巴縣人家貧性孝友父卒事孀母尤謹母病思筍時值嚴冬凌高徃林中長泣竟日見一筍芽寸許深求得之取歸進母病愈後母卒廬墓三年不復櫛沐至履穿肘見鄉人以孝子稱之王愛義永川人天順間有盜剽掠殺人母羅氏病臥寝室愛義侍不忍去母子俱受害陳伯剛合州諸生父母喪負土成墳廬墓六年有白鵲來巢鄉人以爲孝感知州唐恂上其事詔旌表之王堂銅梁人成化中賊入境大肆焚掠母老不能去堂從烈燄中負母賊不忍害呉儉榮昌人父早卒侍母余氏疾三年如一日先是有異母兄蕩其貲產父臨終語曰爾兄貧無以自給爾其敦友于之誼儉曰諾竟以先人田廬讓其兄無難色邑人王侍御驥有詩表揚之成化四年大旱輸榖千餘石以給貧人有司以聞詔授承事郎王應松江津人正德中流賊據應松家縳其父母欲殺之泣跪求代賊殺之舎其父母胡月蟾江津人年十二遇流賊據其家月蟾與祖母許走藏張家崖下賊搜獲欲殺許月蟾泣跪求代賊並殺之李應文長壽人正德中流賊過縣擒其父應文跪告乞代賊殺之旦仕俊長壽人評事友賢之孫友賢殁仕俊以嫡孫承重既葬廬墓三年副使彭公旌表之熊萬變榮昌人諸生正德中流賊圍其家合室倉皇出走母尚未行萬變語其兄曰母在圍我輩脱出何爲相與還赴母難擊殺二賊負母出爲賊所執俱被殺其母伏屍罵賊亦被殺韋志通南川人少喪父事母婁氏每晨昏必詣􅃦所跪問安否母年八十瞽廢志通親侍起居母疾嘗糞焚香懇禱願以身代及終苫居跣足泣血三年酒肉不茹以哀慕終其身文可黼涪州人父作官布政使父歿事母陳夫人最孝夫人六十而瞽可黼起屈必侍進膳必親積三十年母九十乃卒既葬廬墓三年以明經任長泰令治行卓異卒於官泰人稱之爲清毅公王應元涪州人家貧居鄉力農養父父每出飲元候於途扶之以歸一日父醉臥應元田作其家不戒於火急奔囘烈燄甚熾身濡泥水出而復入救之者三號哭火中抱父而死何積有永川人事親至孝母李氏病痢彌年臥榻積有日浣垢衣溪邊石上踐洗處有痕邑人楊榮題其溪曰孝子溪以表之何其聰榮昌人父客亡寄殯滇之大理其聰少孤家貧年十四即徃訪殯所負骸歸鬻室以葬事母張終身不懈或甘㫖無資傭身以養邑中士大夫遇其母壽必冠帶稱觴莫不賢其節孝何楚涪州人嘉靖中知松滋縣生平言動不茍盛暑不廢衣冠七嵗嘗糞以療父病耄年竭力以事伯兄所有錢穀推贍族人一鄉稱其賢楊朝墊江人嘉靖乙酉嵗薦父育族子朝視若同氣貲産悉分與之嵗儉出粟賑饑全活甚衆夏銘涪州人任御史深得憲體母死廬墓三年著四書啓䝉以惠後學羅純榮昌人由嵗貢知嘉魚縣事奉親之任每鷄鳴則起温凊孝養民皆感化善事其親在嘉魚數年案牘俱清囹圄空虚民德之爲立生祠施訓巴縣人進士歴叅政忠厚廉潔嘗督邊餉調遣有方事繼母以孝稱朱卿大足人領鄉薦以母孀居絶意仕進母强之始就銓授陽武令尋聞母病即懇歸養母病痢嘗糞以驗甘苦又病疽吮之而愈母終居喪如禮足爲世範夏藩大足人父蚤逝母守節撫藩藩事母克孝萬歴初賜坊曰貞孝流芳余文元綦江人母丁氏疾危文元刲股療之病愈有司表其門江三極綦江人父母病俱刲股療之邑令旌焉熊奮鵬綦江諸生割股療父病病愈邑令旌之陳中道永川人有孝行陳仕輔墊江人兄仕隆商於秦年乆不歸二親憂之仕輔曰吾何愛一行以傷父母心乃歴探其所往徧西陲極邊周行萬里幾十年重趼偕歸父母尚無恙天倫暢遂人稱孝友駱任重墊江人七嵗喪父入殮時以首觸棺幾斃登萬歴癸丑進士授山西洪洞令有㢘聲母卒於洪舁櫬還里時值溽暑執杖隨趨道路感歎吕孝子失其名彭水人萬歴間以孝聞邑令曽一貫請於上以冠帶榮之戴北辰彭水節婦許氏子母病割股救之母卒哀毁骨立廬於墓側三年妻周氏亦以節聞盖一門節孝也丘鍾忠州人年十八父歿凉州扶櫬歸日夕痛泣聞者感傷孟僉事柯重其文行延以敎子時有托以公事者餽百金鍾力辭之鄉人並高其義李傑忠州人少貧負米以養祖母後頗裕兄弟貧無居傑以己屋分居之人稱孝友李伯春定遠人賊兵縱火将至其居父柩在堂伯春伏柩號哭衆感其孝爭救得免事繼母最孝喪葬盡禮與其弟叔春共爨五十年財貨不私臨終家人以分居告泣曰我死不忍聽分字其孝友如此黎伯滾大足人事母最孝出入溫清未嘗離左右一日山莊火伯滾不顧家資獨負母走已而火滅渡溪適大水至同行多沒惟伯滾母子得逹岸莊多虎亦不至伯滾居里人以爲孝感母死水漿不入口者數日拊櫬號呼氣絶而死與母同葬聞者哀之廵按喻時奏聞賜金恤其家匡振之號玉齋合州人領鄉薦事母承歡罔閒五上公車三次從中途思母而返因奉母三十年不仕母服閼乃就廣文後宰鳳縣清况若水不愧孝㢘二字袁三合州人父行賈家頗裕三少孤積弱家遂中落母年七十相倚爲命三負擔汲水傭錢以養母人有授之壺餐者即攜回進母母出則盛服人怪而問之母應曰此先夫所遺以送老者尚有棺一具屢令吾兒鬻之以爲贍養之資吾兒堅不從也後母死盡以父所遺殮母邑中名士作傭孝傳以表之毛宗成涪州人父早卒事母孝力農膳養偶盜至獨負母匿林中垂涕擁䕶得免於難母卒葬於室側每日往視至老無倦王寅銅梁人事親孝父疾不解衣者數月既葬廬墓三年有白馴擾羣鳥環集於旁成化中事聞旌表周朝旦銅梁諸生事繼母極孝執親喪有孝泉之瑞子逹萬歴乙未進士向上銅梁人母劉氏疾割股愈之有司爲旌其門蕭仁極綦江人三嵗父卒事母極孝母目雙瞽仁極百計醫治出入扶掖飲食必親進數十年無少怠有司表其門白眉壁山諸生自幼育於祖母晏晏病思魚㝷求無𫉬忽遇人攜魚授之倐不見晏病果愈父可縉曾被馬傷割左臂肉和藥療之生平孝謹里人頌焉段威武銅梁人舉孝廉爲渭源令事父母以孝聞既葬廬於墓朝夕哀奠相傳有鹿馴鳥集梨橘再實之異至今稱段孝子朱英酆都人父繼卒於官扶柩歸母桑氏孀居英茹蔬誦經日祝母壽至老不倦家貧治鐵作供甘㫖不乏有司表其門蕭顯用天啟閒進士任福州府同知假歸養母以孝行聞建坊入祠佘應祥長壽諸生家貧力學母老值兵亂扶母入山避亂母病難行應祥棄幼子女獨負母入山俄兵持刀至應祥哀告以故兵釋之越三日母死應祥負土成墳臥墳側不食死戴孝子失其名酆都人事祖母至孝有司表其門曰孝同晉密古養浩字健菴酆都人偕妻隆氏事二親至孝諺稱古氏孝子名重鄉里養體養志兩兼之矣柳映芳黔江人事母至孝家甚貧負薪供養一日遇老人引至酉陽山指一樹令伐之且曰月取一枝足給母膳矣映芳伐樹入市醫者識爲沉香重價購之母膳由是日豐云王三徵黔江人父檄好弈嘗延善弈者對局弗勝怒輒不解三徵厚賄弈者令徉負以博其歡檄疾甚刲股救之即瘳邑令旌之董大原郡庠生平生孝友誠篤著於鄉里崇禎中貤贈文林郎入鄉賢保寧府漢譙瑛閬中人父鉉不仕公孫述述賜以毒藥瑛盡捐家貲十萬求贖父死乃𫉬免後爲尚書郎以易學授明帝時有潔白之稱唐宇文百之閬中人數世同居庭前六燕共巢紫荆異本合幹人以爲孝友之應宋羅士堯巴州人讀書尚義事母至孝田廬家産分貽宗族子姪之貧孤者以孝友聞旌表張隱居劍州人嘉興間兵變母黄氏病不能興隱居襁負其母屢冐白刃聞者莫不歎異明呉璽閬中人志行高潔家貧力學言動不茍中𢎞治二年經魁歴任陜西岐山縣敎諭課士辛勤奔母喪徒跣泣血廬於墓所植柏數百株初墓所無泉忽有泉湧出既又生三異木一盤根爲龍蛇状一爲飛鶴狀一爲蟾蜍状敎諭毛秀擬爲四異曰地湧甘泉木形飛鶴龍蛇効靈蟾蜍標異因爲詩表之服闋陞國子助敎大司成署其考曰學問足以成物孝廉足以範俗授隨州知州所著有青峯集藏於家楊鳳岐閬中諸生親病嘗割股療之當事扁其門曰孝子蕭淳郡庠生母喪廬墓三年有甘泉之瑞僉事楊題其門曰孝感任啟閬中人少喪父事母先意承志未嘗稍違母終殯葬如禮廬墓三年有司上聞詔旌其家何鍾麒通江諸生正德初大疫母任氏病癘時癘氣方熾父及諸弟皆出次外舎鍾麒獨侍不去鄢藍賊陷縣城士民奔潰有强鍾麒去者曰母已無生理盍匿之而逃泣應曰母可棄乎方負母出遇賊於門母子俱遇害楊上林通江人父簡病篤上林祝於天斷一指和藥簡立愈後復病上林又割股以進及卒哀毁幾絶者數次人服其孝行云李元扶劒州諸生流賊陷州城入宅執其母徐氏欲殺之元扶哀求全母賊許之殺元扶鄭玉旒劒州人幼失怙事母至孝撫諸弟備極友愛鄢賊之亂玉旒獨抱神主遁去夜陷賊營賊酋廉知其義釋之且贈以金戒衆毋入其宅後州守舉爲鄉賢旌其門曰孝友蒲妙高南江人鄢藍賊起妙高負八十母偕妻子奔逃母疾篤諭令置身墳内姑置熟食聽自死子婦各宜逃去妙高痛哭曰兒何之子母死一處耳棄妻負母賊至伏地請代死賊感而全之仍周以衣食徐敷詔湖廣岳州籍保寧人舉孝廉博學篤行事長兄撫幼妹極友愛絶意仕進雅志著述當道重之扁其門曰南州高士後祀鄉賢謝東陽保寧千户所人進士爲人忠信端方居官廉潔自矢母族甚貧分俸給之事兄極愛敬撫孤姪成人讓以産祀鄉賢姜玉潔劒州人飭行講學孝友篤實兄玉山死竭力撫其孤貢入太學奏議孔顔曾孟分祀事執政是之所著有圖學淺見正字訓䝉東山拙稿藏於家袁濬廣元人遭父母喪廬於墓有白烏之祥以明經謁選聲聞都下咸以孝子呼之知永平縣稱循吏俞承勲保寧千户所指揮七嵗失父既娶不入私室設榻母旁省視寒溫竭力甘㫖自啗粗糲追思父貌圖畫宛然若有神助嚴祀堂中嵗時哀泣母年八十四無疾卒晨夕號慟淚盡繼以血既葬廬墓甘露降樹白鳩來巢人咸以爲孝感屢䝉旌異楊三省閬中人府庠生父珂任茂州倉大使以霉濫損邊儲至陷重辟三省痛心父罪竭貲以贖得改戍越巂竟死遠荒三省復罄産歸櫬身先輀役盛暑渡瀘歴卭崍九折之坂既還養庻母孝謹萬歴己酉家有牛生雙犢麥秀兩岐之瑞葢至孝所感也後屢䝉旌異云羅汝旦蒼溪人天啟時諸生母乆病刲股愈之縣令額其門曰苦孝動天任可貴蒼溪人割股愈親疾縣令額其門曰一割千古李永昌蒼溪人崇禎時諸生兄弟三人同居兄二子弟六子先世遺産悉均分之及自舉子獨甘窮窶學使旌其閭陳敏巴州諸生事母至孝崇禎七年賊破巴州闔城逃散時敏母病篤不忍舎去賊至欲殺其母敏引頸乞代賦義而釋之順慶府宋成象渠縣人淳化中李順據渠父憂悸死象哀毁慟哭廬於墓側有虎馴燕集之祥遠近咸稱孝子賈嵩蓬州人自少力學天性至孝後舉孝行黄壽蓬州人舉孝行狄承嗣蓬州人母年八十臥病不起承嗣告天願以身代母卒哀毁負土成墳廬墓三年周八行岳池人事親純孝親殁廬墓甘露降於里賜帛旌表元馮伯樂西充人四世同居孝義聞於時范均保儀隴人至正中母有疾均保割股和藥以進乃愈縣令上聞詔立孝感坊表之陳君節廣安州人元末兵起君節甫數嵗母被俘去幾三十年君節克勵成業及有室寢食不安遂攜貲北徃尋覔三嵗始得奉之以歸孝養不衰明羅坤賢蓬州人力敦孝義闔門八百口同爨人咸稱焉王燦渠縣諸生事親純孝親殁廬墓側讀禮三年有司額其門曰孝子何秉良廣安州人郡庠生父母先後卒哀毁廬墓事聞旌表程九霄岳池人天性孝友親殁廬墓繼母疾篤九霄齋沐求以身代尋愈及卒又廬於墓觀察使蔡中孚褒其孝行餽以厚帛鄉人咸敬慕之唐宥營山人通春秋事親以孝聞賊攻縣宥倡衆恊守衆潰與母被執不屈死之越三日如生魏必通儀隴人成化中賊犯境必通父成率兵禦之被執必通入賊營以身代父賊乃釋成留必通抗言不屈被殺羅敬營山人性敦孝友里崇釋敎敬獨不惑篤行家禮至今化焉王琰大竹人親患疾割股四次𫉬愈聘妻楊氏目雙盲琰娶之人服其孝義後旌表張銓南充人父令平湖時命銓扶祖櫬歸過黄陵舟覆銓號泣入水救櫬得舉郡守徐公聞於朝特旌其門家湧冽泉徐公名曰孝應泉張賢大竹人正德間父爲賊所獲欲殺之賢以身蔽父賊斫賢臂又折其唇流血數升祈請甚哀父頼以全賢亦不死郷人甚重之王翰臣渠縣人正德閒登進士居父喪遵行朱子家禮監司賻以金辭不受妻李氏卒終身不娶事繼母以孝聞授主事歴鹽運同知屏祛宿弊官民便之卒於官囊無餘物時人稱其廉介孔承宣鄰水人先聖六十一代孫爲楚麻城敎諭拜掃東魯先塋捐俸以資寒士歸家益篤孝友尤好賑貸甲寅丙辰間水旱相繼全活甚衆唐通南充人舉孝廉弱冠時推廪蓄以給鄉人知階州一介不取間父訃徒步歸哀至喪明時稱其孝楊灑南充人嘉靖中進士授户部主事歴守楚雄府有惠政民立生祠以祀歸與諸弟怡怡一堂分財讓産人稱君子譙孟龍南充人進士歴官叅政先知南昌府廉潔方正時稱循良居家孝友閭里間咸化之劉洋營山人孝友敦實守喪不出户庭官河南陜西皆捐金修文廟給寒士及歸囊無餘金而操愈不變羅翔鳳營山人事父兄以孝友著積學精深有芝城草剏古集新聲命説實録等書藏於家張唯南充人舉進士素履端介以忤逆瑾幾死於獄厥後家居力敦孝友鄉里稱焉茍繩武蓬州人隆慶中舉人性孝友事繼母曲爲承順父祖遺産割與叔父兄弟之貧者後爲涇陽司訓日與諸生講論不倦秦中人裹糧從之卒於官王有文廣安州人父瑨爲滇南順寧守死國難有文痛父殉節裂帛書姓名官秩置父尸又自書姓名於懐刎頸死父子稱忠孝焉斯舉斯字大力西充人父早卒事母至孝王範西充貢生賦性孝友任國子監助敎王選西充人少孤母撫育成人選躬耕奉養後登進士以母老不謁選母强之行遂任澄城令力請終養不允憂鬱成疾卒人以孝稱馬中樂蓬州人以明經敎授生徒性至孝遭亂負母避難遇賊欲殺其母中樂以身衛曰寧殺我勿傷我母抱首大哭賊感而釋之敘州府宋劉孝誠富順人性至孝親喪廬墓有芝草之異今郡庠碑碣尚載其事明程虎平夷司人永樂間官翰林持身清介孝養祖母捐貲惠族鄉評重之馬完驥長寧人宣德中貢生年十八時父瞽目完驥憂甚晨夕籲天以舌舐之父目復明任西鄉訓導致仕歸後學宗之蘇奎章筠連人岷藩敎授博覧羣書潛心理學事父孝一日與父入山遇虎倉皇無避奎章泣告願舎父食已虎並舎之而去人咸異之督學使爲作猛虎歌紀其事周安周寧富順人皓首同居百口一門永無閒言田舎生連幹梨一株生竹一竿高五尺許分作二竿麥生二三穗者四五本池蓮開竝頭花者三其和氣致祥有如此劉忠南溪人成化中進士歴户部郎守正不阿見眉州萬安當國解印綬歸縣尹陳俊饋以輿皂忠曰吾可以此累桑梓之民乎謝不受事母至孝子孫兄弟俱相繼登科陳卿宜賓人𢎞治中進士天性孝友學問淵深任都御史以介直聞晉兵部侍郎引年歸嚴家訓撫孤貧行誼茂著鄉里頌之楊僕南溪人𢎞治中進士歴刑部主事蚤孤事母以孝聞友愛伯兄甚至母喪畢起復後期忤逆瑾即引歸居家二十餘年布衣蔬食不履公門祖産悉以讓兄又捐貲以嫁族女之無依者李仕清長寧人𢎞治乙丑進士授户部主事歴陜西㕘政廣儲蓄革奸弊決疑獄致仕歸兄弟同爨以遺産讓其弟建文明書院率宗族子弟親爲講解多所成就鮮懐經屏山人母侯氏病疽躬爲吮之母復病割股和藥以進母殁廬於墓側夜有虎近廬咆哮乆之竟去人嘆爲孝感云楊嵱泥溪司人廪生嘉靖中鄰居失火延燒其屋嵱他無所顧惟以身翼母火烈不得出母子俱焚死甘化霖富順人嘉靖舉人平易方正有古君子之風授嵩縣令以親老堅乞終養尋卒謝廷􅉅富順人嘉靖壬辰進士任少卿立朝正直致仕歸以孝弟刑其家鄉閭化之馬俊長寧人邑諸生嘉靖中父以貢廷試京師卒俊弟扶喪至臨清亦卒俊奔喪萬里二載始歸因痛父弟俱歿異鄉遂棄舉子業養母終身不復求仕黄璿富順人字公瑾年十二其祖病渴思螺湯時天寒水凍家人遍求弗得璿往田間忽於水中得螺四十枚持歸作湯以進祖病愈璿後歴任中外致政而歸築室錫溪以奉母母殁廬墓芝草生於塋域少傅夏公原吉國子祭酒胡公儼皆作詩美之蹇均福長寧人性至孝父疾篤計無所出籲天割左股作羮以進父食之翼日謂均福曰吾覺病少差後三日父夢神人告曰汝子孝念通神明延壽一紀後果如其言年八十四終趙彦忠長寧人父遘疾欲起如厠彦忠曰乆疾不可動勞遂以兩手承之父曰汙汝手矣彦忠曰昔庾黔婁不因親疾嘗糞耶父病竟痊明年母病革彦忠割股以進尋愈後父母俱年八十有餘乃卒張介興文人萬歴五年嵗薦除楚常德倅辭職養親縣尹建孝子坊額曰移忠作孝周昭宣慶符人父病危割股救之𫉬愈李竒長寜人年十七喪父奉母尤謹時異母兄弟六人竒事長撫幼友恭備至始終如一郡守以孝友奨之汪瓊字子琢富順諸生兄弟九人瓊最長父母殁廬墓撫諸弟隨其職業各有成就有自痛吟語雖率直令人深罔極之思王孟芳字鄰軻富順諸生事親以禮父母殁哀毁骨立敎三弟皆成人率先訓不析財産睦宗䘏鄰人推長者彭名世隆昌人以孝稱父病侍湯藥衣不解帶者累月及病篤復刲股以進父竟𫉬瘳何孝子慶符人失其名父察值明末蜀亂誓不茍生自縊死孝子方五嵗日夜拊棺痛號不食而死䕫州府宋王相萬縣諸生家貧力學父病篤籲天乞代割股以進父疾愈人稱其孝王文義大寧人景德中母疾篤割股和藥疾愈及母卒廬墓鄉人憫其貧日給之食墳去水遠無以滌祭器後廬側忽湧甘泉人稱孝感事聞賜以衣帛明王子浩雲陽人事親孝養居喪哀毁廬墓有烏鵲羣繞之祥張芳新寧人任雲南太和縣丞母年八十芳假公事歸省辭母復去母曰汝去吾不及見汝矣芳感泣棄官養母母年九十終李維屛奉節人以諸生入監幼遭母喪哀毁過度事父及繼母甚孝與弟友愛白首無閒從父夢雷貧不能自存分遺産推予之金耀彩奉節人甫五齡父母相繼歿朝暮哀痛如成人伯母張氏孀居無嗣憐而撫育之年十有四以世及典襲職千夫長所得俸悉市甘脆奉張夫婦衣粗茹淡守素終身孫天澤奉節人父爲郡諸生早卒家貧棄儒習醫獨持門户俾弟專意嚮學列名黌序里人陳朝益坐事鬻子天澤聞悲啼聲遂脱婦簪珥贖之又王明者以納賦遺金自投於河即力救歸舎如數代納當事聞之旌其門曰躬奉天經何應宣梁山人諸生正德間母爲流賊所執應宣求以身代死賊果殺宣而存母都御史林俊嘉其孝入祀鄉賢王一驥字少賓巫山嵗貢生萬歴間授廣文奉母之任朝夕不離母年九十有八邑人莫不仰其德壽云譚國經雲陽人童時母病氣絶國經割股救母遂復生張漢卿梁山人家貧竭力孝養父母病漢卿割股進之俱愈來知德字矣鮮號瞿唐梁山人中嘉靖壬子鄉試四上禮闈不第以親疾遂不就銓後二親繼逝祭葬廬墓一軌諸禮萬歴壬寅督撫疏薦於朝特授翰林待詔力辭不赴奉㫖令有司月給米三石年八十卒所著有易註省覺録省事録入聖工夫字義格物諸圖理學辨疑心學晦明解遊呉稿等書行於世周鑾梁山人母向氏疾割左股煎湯奉母遂愈劉延儒梁山人父病醫藥罔效割左股煎湯奉之疾瘳熊進字汝德新寧人由進士任行人賫詔於蜀府至雲陽聞母喪匍匐奔赴憂痛成疾而卒絶筆云當宁實辜南面遣倚閭徒切北堂思士林哀之何仲才雲陽人家素貧母老病齒落才爲人傭作日得鷄子以養乆而不衰龍安府宋孫貴郡人事親盡孝承志不違親喪負土成塋烏雀銜土助之人歎其孝感至今稱孫孝子明李嘉石泉人李嗣泌養子爲縣諸生乙酉松潘亂兵𫉬嗣泌索金帛不遂将殺之嘉請以身代遂殺嘉嗣泌𫉬免文謨事親盡孝年六十定省不少怠父母或有不懌必跪求懽悦乃已邑令旌其純孝李聚平武人少以孝友著後膺嵗薦歴官平陽别駕易起渭松潘衛人家極貧同妻周氏事母盡孝萬歴三十八年兵使陳公錦轉詳撫按表其閭曰供爲子職史應詔松潘衛舎人母陳氏病劇醫弗療應詔割股煎湯進之是夕電繞房帷母尋愈萬歴三十一年兵使蔡守愚表其門張應時松潘衛典史父母相繼抱病藥餌罔效應時割股治之父母皆愈兵使史贊舜表其門寧遠府明張所抱建昌人母疾割股以進遂瘳呉國寶越巂衛諸生事親極孝親病籲天願以身代親歿廬墓三年人或勸以早歸則悲號欲絶其後終身哀慕鄧應碧寧番衛人素樸誠有孝行親病割股救之遂愈里人咸稱道之雅州府漢髙頤郡人與弟貫光子文玉一門三舉孝廉貫光爲益州刺史直𨽻嘉定州雍正十二年陞爲府漢隗相字叔通犍爲人事母至孝母惡江邊水不潔必得江心水相以舟汲之每因急流不便後江心忽湧一石舟乃可依朝廷徴拜爲郎呉順字叔和犍爲人至孝赤烏集其門後爲永昌太守宋毛安輿洪雅人年九嵗父死負土爲墳廬於墓側三年張方平知益州聞安輿孝行遺以酒餼状其事以聞詔旌表楊彬洪雅人業儒親歿負土成墳廬其側者三年日夕號泣不止楊九澤犍爲人世居安仁鄉一門孝義鄉里稱之家産五色靈芝數十莖有瑞芝圖記明王表州人字禮儀舉於鄉以母老孀居不樂仕進母有疾病割股以進輙愈三赴禮部皆中途返其詩云未忍慈闈終日别故将小艇幾番囘母九十卒水漿不入口者三日事聞詔旌其宅蔡廉州人正統中進士以母老乞教職終養授井研諭母終及葬遇雨不止廉大慟籲天至期開霽事畢雨如初人以爲孝感云張可述州人性至孝成進士授咸寕令擢兵部主政僉浙江憲廉明耿介不阿權貴旋叅藩貴州以忤鄢茂卿歸分産與從兄弟嫁孤女賑貧士歸田三十年絶無干請所著有梓里資談雲樵記龔林梓洪雅人萬歴辛酉年其父瑞乆病幾死林梓割股救之遂痊瑞延年八十七嵗而卒邑令王𢎞載申請優奨御史王額其居曰孝子之門楊繼連洪雅人父病刲左股母病復刲右股俱愈後皆以壽終居喪盡哀數十年如一日封聲雄洪雅人親喪廬墓三年張如淵洪雅人祖母趙以節著父纁早喪家貧如淵竭力承趙歡無不祇順課羣季有聲庠序鄉里稱孝友焉彭宗孝夾江人以孝行著夫婦一德人無閒言當事榜其門曰雙孝丁孝孫榮縣人年十餘嵗割股愈祖母疾知縣毛秀申表其門程崇榮縣人祖母病篤崇割股救之旋痊有司旌其門直𨽻眉州蜀漢楊洪州人諸葛亮諮以政事遷蜀郡太守事母至孝方子髙事母至孝有司旌之晉李密字令伯彭山人父早亡母更適人鞠於祖母劉武帝欲用爲太子洗馬詔書屢下密上表陳情願留養祖母云臣無祖母無以至今日祖母無臣無以終餘年臣今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報劉之日短也帝覽表曰密不空有此名唐李獻眉州别駕時宰相有請婚者力不可屈去官居家其弟遇疾慘卒獻燒指致禱於神弟得復生時稱其友愛云宋胡文貴事父至孝楊柳枝事母以孝名唐蒙震事父至孝孫如璧母葬廬墓哀泣數年楊守讓母卒廬墓三年宋沂廬母墓晝夜號泣沂以上俱丹稜人知縣文噩冇六孝子賦明張允孚州人少失怙母韓氏性嚴正允孚妻王氏微忤韓允孚順慈㫖絶跡閨闥乆之感動姑婦如初弟允恒稚弱悉推祖業予之允孚筮仕知江南靈璧縣每得俸以强半奉母并以贍允恒孝友之風一郡稱典型云胡敏丹稜人由監生授蒲城丞以母老歸養孝行爲鄉評推重直𨽻卭州宋杜國賓大邑人在乳時父遊東呉不歸音問杳然後四十年國賓南至荆渚以父名出處手揭以行閒關萬里父時爲韶州都廵因迎還鄉人咸嘉其孝眀閔元州人幼失父誠心事母母殁廬墓側歴三十餘年哀慕如居喪日成化間事聞旌表劉文恂州人國學生親病卒廬墓三年鄉人稱爲孝子李興才字用吾卭州人年五十餘父年八十且乆病興才减食廢寢旦晚祈以身代父獲瘳又閲十年卒興才亦以哀毁病終廖崇謙蒲江人萬歴間嵗貢舉孝子祀鄉賢孫繼昭卭州人中鄉試精探易象安貧敎子事母以孝聞一日讀性理歎曰天下義理書儘有可受用者遂慕來梁山之風終養不仕卒祀鄉賢直𨽻潼川州雍正十二年陞爲府晉程崇字孟德蓬溪人老母病篤冬月思筍無計可得乃從林中抱竹而泣須臾地裂出筍數莖持歸奉母食畢疾愈有孝義臺在今蓬溪城西二十里地名冬筍溝墓址尚存李釗射洪人李毅子世業儒學有聲望爲尚書外兵郎毅刺寧州李雄攻之救援不至疾病殁於窮城上表赴難至牂牁夷斷道不得進經年以寜州城中無穀父疾病未知吉凶遂不食穀惟茹草迄至奔喪後官至朱提越巂太守西夷校尉宋任伯傳鹽亭人皇祐初登進士官職方郎以孝行稱居喪廬墓有靈芝醴泉之祥茍允中中江人父病衣不解帶三月鬚髪盡白父亡廬墓三年虎豹馴擾醴泉自出母卒亦廬於墓楊榆中江人事嫡母賈氏極孝賈年八十四仍康健皆榆曲體親心頤養所致淳熙間旌表趙垠中江人孝友過人母袁氏疾垠兩割股以進𫉬愈奉父炎避兵於渝居四年渝被圍垠負販以爲養屬炎卒垠負遺骸歸葬先壟王奭鹽亭人居喪至孝負土成墳廬於墓禽鳥並集馮伯瑜鹽亭人性至孝父才運病篤瑜割股痊之縣令立石道傍表其孝黄氏九子射洪人家饒於財兄弟九人共篤友愛終身不分居事聞旌表黄嘉猷射洪人素孝養父歿負土成墳廬墓有甘泉之應詔蠲租税旌其門名其地曰甘泉牟敏中中江人家世孝友三代不分居有司旌表其門王利用射洪人少孤事母至孝乾道間登進士任監察御史三持使節風範凛然清聲直氣爲世所重明張謨安岳人𢎞治閒舉人孝友純篤承母志分産與姊授金州學正遷洵陽令奔父喪歸哀毁骨立後補寧遠令人誦其行譚紀字廷憲中江廪生孝友性成父志聰有足疾左右扶侍四十年不少閒父歿泣血三年不御酒肉不入妻室志不樂仕進於所居左右建思親樓望親臺有司奏聞授教諭職銜嵗時悲哀至老不替蹇衡州人性至孝母歿葬祭一遵家禮後擢都水主事居父暨繼母喪哀毁廬墓事聞旌表郭英相遂寧人事母極孝賊䧟城英相以䕶母爲賊所執被害詔旌其門楊蔭遂寧諸生正德間廖賊刼掠䕃奉母蘇氏避險崖草中賊𫉬之欲殺其母䕃抱母痛哭願以身代賊以刀屢試其頸䕃色不變遂釋其母截髪而去當道重之爲表其門湯虺州人事母以孝聞正德十六年進士觀刑部政即乞終養歸母强之仕授溧陽令多惠政年饑賑活數萬人母卒憂歸廬墓不仕惟潛心著述有春秋易􅂤發明二十巻石池集二十巻行於世王孝蓬溪人父母早喪刻木事之如丁蘭故事至今地名刻木山李應槐字庭三州人父母早殁嬸凃氏育之凃氏死應槐自外歸泣曰嬸養我以生我不能送其死奈何遂觸棺而死張旦蓬溪人母老癱廢時鄢藍賊破城人盡避之母謂旦曰吾殘疾之人雖死何辭兒當保身遠遁勿以爲念旦哭曰兒頭可斷誓不離母遂備猪酒迎賊道左賊驚問得其故曰此孝子也遂去之闔城頼以保全賜坊旌孝楊廷薦字汝能安岳諸生母秦氏病劇廷薦讀本草人肉能治羸疾乃割股以進母病𫉬痊父萬權寢疾四年日侍臥榻奉湯藥遂廢舉子業處鄉黨能敦廉譲爲時推許嘉靖庚子縣令李湖上其事旌其門曰篤行譚維蓬溪人嘉靖壬辰進士以親老不就仕廷對後六年始授户部主事𣙜京商税痛絶請托又典太平倉嚴袪積弊終以母老懇疏乞歸及母殁躬營葬具人稱其孝居鄉恥干謁以蓬有徑道甚衝白當事設朝天驛并請清減井課民咸利焉李祥州人性至孝舉萬歴癸卯鄉試以母老不仕母卒始授蔚州知州有政聲致仕歸居鄉謙謹年八十卒王庭蓬溪人父峩卒遺腹生庭有嫡母何氏庻母董氏生母郭氏撫育讀書隆慶辛未舉進士不就銓選上陳情表歸養三親雷應春富村驛人事親至孝父喪既葬廬墓側馴入室墓旁生異木里人皆謂孝感所致楊廕射洪人甫七嵗妖賊蔡百貫攻城士民盡逃廕随八旬祖母依城中不去賊至問故答以祖母在不敢行賊嘉其孝遂不焚城中房屋事聞建坊旌表楊三聘射洪人舊有孝子坊姚友金遂寧人家貧親老傭工盡孝及父卒友金卜葬於長樂山麓廬墓三年自後雖大風雨必日省其墓鄉人稱曰姚孝子邑令盧紳旌其門張繼髙樂至人母王氏病危繼高與胞弟繼宗繼先同時割股救母母病愈縣令田舜年聞於上命旌之給俸優養表其門曰一門三孝鄒學魯樂至人性孝友雙親年皆八十與妻王氏承歡如一日季弟心魯天啓間官守備以任俠多負貸學魯傾囊代償父母喜曰大吾門者其汝乎妻王氏病篤媳張氏割股救之次女適化州諭陽大亨子亦割股愈其姑有司旌其門聞者皆以爲學魯身敎所致余壽山安岳諸生父母疾篤日夜焚香籲天願以身代乆乃𫉬瘳當事旌其門曰普城行舉髙昺安岳諸生幼喪母繼母羅氏育之羅有女無子欲割田産爲嫁資父冲怒不與昺哀勸終分産以遂所願當事旌其閭曰表楊孝行莫如龍安岳諸生母疾篤夜焚香祝天割股以進母疾遂痊享年九十有三乃卒李尚華安岳諸生繼母楊氏患寒疾垂危割股以救遂痊撫按廉其事屢給銀米仍旌異之覃鳴球州人貢生明末寇亂被擄父􅅤斗爲賊所殺迨十年鳴球歸里遍訪鄉鄰得父骸葬之廬墓側哀慟而卒羅璋遂寧縣諸生崇禎末奉母避獻賊匿山中賊圍之力殺數賊母得脱璋遂遇害詔旌其門劉可能樂至人父母疾醫治罔效曰親若死何用身爲臠肉以進立愈事聞旌其閭子宗裕亦有孝行今華陽有篤孝維風坊尚存直𨽻瀘州周尹伯竒州人吉甫子也後母逐之作履霜操援琴而歌荷衣楟食不敢有怨後自沉於江韓昌黎作琴操哀之張子西銘曰勇於從而順令者伯竒也眀萬元州人事母至孝母嘗病思荔枝元力求得之還至溪邊水泛不能渡忽有舟自浮至得濟及母卒元已七十餘廬墓時有瑞芝連木之異韓士傑州人郡諸生祖母虞氏病篤士傑刲股以進尋愈虞後享壽八十餘卒何貴州人九嵗而孤因母孀居遂棄舉子業躬耕養母克盡子職撫幼弟謙至成立荒嵗有永寧商以金四十與貴販米舟破米盡溺貴哀其厄盡以金還之又嘗夜𫉬偷者其鄰也予以錢米宻遣去子宗義等俱孝友三世同居百有餘年無間士大夫頌美之有何氏世德録陸忠孝州人生七日喪母鞠於祖母自幼至孝繼母有疾朝夕奉藥餌至忘寢食後祖母與二親相繼卒哀號幾絶負土成墳廬墓三載廵撫許堅廵按盧黎各旌異之董瑤合江人貢士嗜詩書敦道義痛父早喪終身不近聲色養母純孝周旋寢食如孺子時著有源溪集直𨽻資州漢支漸資陽人事親至孝年七十時母死負土成墳廬於墓側哀毁疾甚有白烏白鶴集墓木㢠廻翔悲鳴若助哀者鄉人觀感多化於孝宋黄徳輿資州人二親繼逝負土成墳有甘泉湧其側大中祥符初降詔旌表王鞏字國賓資陽人少而端慤性至孝東溪文謙先生講道於眉山蘇氏之居鞏與蘇氏弟兄交逰三十年如一日試於漕司入選以父母老不復任及父母卒三日不食三年不茹葷㑹朝廷錫𩔖其父再被封命鄉人榮之程壬孫仁壽人慶元間進士爲射洪令利興弊革更令漢源時羌人擾邊科調煩興壬孫身任之且言番憚於攻寨利於刼村盍於要害處各聚爲寨以遏賊衝制置使呉獵稱善壬孫沈靜寡言笑慮而後發不爲媚嫵以悦世居官蹈踐繩墨至老愈篤後遷雅州僉判卒於官與弟遇孫極相友愛時多羨之程遇孫壬孫弟雄於文官至潼川路轉運判官兼提舉學士壬孫卒無後遇孫躬爲治葬撰墓銘其辭纏綿悲愴使人讀之慽如也先是壬孫病劇遺書及玉環曰謹藏之他日如見我也遇孫後誦書持環流涕不已其友愛葢出天性云龍海孫州人父失明刺左股血和藥㸃父目目遂愈母患心痛割肝以進竟無恙又刺右股血和藥療之母病亦平嘉定間有司紀其事易其里曰純孝里明余金内江人任長沙知縣拜御史風紀肅然陞陜西僉事母老乞終養不起處兄弟極友愛膚施人有訟田者金相地償之息其爭鄧翰内江人成化進士任知縣卓有異政陞府同知操守堅定舉止不茍致仕家居繼母停柩火災延及堂室翰以身蔽捍火至不動尋滅人以爲至孝所感呉泰井研人任湖廣監利知縣事祖母以孝聞母徐氏目盲泰以舌餂之母目復明鄉人稱爲孝子當道旌奨其門饒勅仁夀人舉鄉已端方邑中居家孝友行紳皆禮重之黄昌仁壽人登天啓壬戌進士任湖廣江陵縣興利除害多善政行取御史凜凜風裁疏劾温周二相無所避忌居家孝友里人敬慕後祀鄉賢謝本常内江人事祖母及二親至孝後親卒廬墓三年有烏栖麥秀之異饒充州人九嵗失父事母黄氏作奉萱堂嵗時介壽入太學未幾遂乞例歸母卒徒跣三年未嘗忘哀又能廣於恤貧人欽其錫𩔖云姜宗哲州人父病劇割股以愈鄉里傳誦史全忠州人家貧奉母朝夕就養母病全忠持刀剖胸取片肝烹以進母愈全忠身亦無恙焚香祝天香氣結靈芝形事聞奉㫖建坊袁文麟州庠生祖母病篤割股進之遂愈人傳爲順孫云鍾竒訓字起龍内江人年十四補諸生異母弟四人彼此讓金以安親志學使者屢表其閭以子應麟貴兩受誥命髙世洵字仲允内江人弱冠補諸生孝友敦睦色養誠至趙文肅公雅重之比之顔閔温崇嚴州人爲諸生通經學從者甚衆事親養志母愛少女以婿産薄爲憂崇嚴竭力助費以承母意邑令楊鶴齡遣子受業㑹有重獄人以千金乞書與楊崇嚴拒不納後邑令呉宗堯旌其門曰高士劉翲内江人父望之官大理卿有廉直名兄翾爲浙江兵偹晉大叅以忤權相歸里翲由進士官御史與翾同居不析貲産臨卒命與兄同穴邑人推其友愛黄映璧仁壽諸生孝行素聞崇禎十三年有鄉舉功令邑宰劉三策保舉廵撫批云懿行班班可紀紳衿同口稱賢事聞未仕而卒辜延昌仁壽人有孝行母周氏節婦也病篤延昌割股啖母病果愈張于衡性至孝母臥病跪奉湯藥旦夕祈天乞以身代登進士居官廉謹人欽其忠孝直𨽻綿州漢姜詩德陽人事母至孝妻龎氏奉順克勤母好飲江水嗜魚膾妻每踰里遠汲一日舎旁忽湧泉水每日輙出雙鯉取以供母永平中舉孝㢘明帝以大孝入朝拜郡國所舉孝㢘俱爲郎以寵之安安名石泉姜詩子年七嵗母爲父出安安曾問卜於麻姑飛雲洞時負米鄰姑家以養母母還安安代母汲水供姑爲水漂去至今立像祀之晉李餘州人父殺人亡命母下吏餘乞代母死吏不許遂自剄詔釋其母仍圖形於府庭唐王讚諦梓潼人少喪親負土壘墳二十年不脱衰麻黜陟使韋禎奏劒南孝子十六人以讚諦爲首宋張咸字君説綿州人少孤貧撫兄子漢淮與其女俱爲擇配視猶已出元祐中詔復六科咸以敎授對策擢第一有雜文二十巻年四十二卒子浚貴累贈太師秦國公明王吉綿竹人以純孝稱𢎞治間邑令許魁造閭旌之劉光遠安縣人與弟光大俱補石泉學諸生以造父墳墓光大乘桴運石至中流桴没時光遠在岸仰天呌曰弟以父故遭溺急解桴赴之桴亦沒弟呼曰救吾兄兄呼曰救吾弟相抱而死當道扁其門曰二難孝友王國禎與弟國祥俱德陽諸生母汪氏病兄弟咸割股愈之樊令鼎遇旌曰一門純孝王擢德陽諸生親卒廬墓三年謝成鼇時徃訪之贈以詩曰幾度登堂訪友生聞君廬墓極精誠辛中魁德陽諸生親亡廬墓見知於督學使郭子章表其門曰孝子張應聘德陽縣吏父恆居成都病虛悸垂死醫云得同類之物補之可愈聘即割膊肉調鷄臛雜進恆遂漸愈成都令雷叔聞旌其門曰真孝勵俗傅紹説德陽諸生母病篤同兄至母榻前兄失手撫其股不覺發聲問其故始知其刲股也奉勅旌表劉延齡綿竹人舉人天性孝友親殁寄櫬野寺中夜有虎搏櫬延齡哀號虎馴服去由教諭累遷雲南知縣縣苦於礦役延齡至悉心條畫諸弊悉清礦民繪像祀之時荒疫交作延齡捐貲易粟以賑貧民全活無算㑹丁艱歸遂不復出祀滇南名宦萬歴己未崇祀鄉賢周紹孔綿竹人與弟繼孔述孔俱邑諸生奉母文氏並以孝著崇禎丁丑寇亂母子被擄賊欲刃其母兄弟三人爭以身代賊俱殺之憐其母不殺乆之母夢子曰母不復有子可善撫孫孫可以代養母也嘗夜與母語如生時母恐延巫者禳而除之巫忽作三子語曰生不能奉母死而依母情弗忍也非鬼非祟何呪詛我爲語畢仆於地經夜乃甦逾年始絶人稱一門三孝黄守學綿竹民素以孝聞獻賊圍城其母柳氏自縊死守學備棺斂畢曰吾當從母死隨亦自縊直𨽻茂州明袁宏道保縣人由選貢歴青州判家素貧繼母孀居奉養不缺學使以孝行褒之郭干城汶川人由嵗薦任梁山教諭少失父事母至孝縣尹婁廷璋以孝子旌其門直𨽻達州宋牟天壹其先閬州人僑寓逹州事母至孝母卒哀毁啜粥廬墓三年與弟同居毫無私積明袁純極太平人母病氣絶純極晝夜哭泣亦氣絶母子昏憒中俱若有神憫而釋之越三日皆更生邑人公舉純孝四川通志巻十上欽定四庫全書四川通志巻十下皇清孝友成都府何之瀛成都人幼失怙恃善事繼母以孝見稱家貧好善樂施親族有不能婚葬者竭力周給訓三子習儒業先後成名同居式好門庭雍穆里黨化之邑令重瀛之品額其門曰錦里善人費密字此度新繁人年十四值父經虞病劇醫言知糞味甘苦可决死生密嘗糞覺苦病果起越數年經虞任雲南昆明令會張獻忠亂密奉母避黎州徃來滇蜀徒步省視屢陷賊營暨蠻洞中得無恙後流寓江南揚州著述甚多人稱中文先生費錫璜字滋衡密之子遵父命自揚州還新繁省祖墓時兵燹甫定道路榛莽間關萬里不憚艱險人咸以孝稱之著詩古文辭行世劉宗裕華陽人康熙二年母病不愈裕焚香祝天自割左股煎湯奉母母病遂痊邑人以孝稱趙日榮漢州人事母至孝賊至獨負其母避難妻孥皆被害母年九十有七始卒日榮哀毁骨立人稱純孝重慶府李元勲永川人性至孝父病篤元勲潛禱於神持刀剖腹割肝一片食父父竟愈羅彬綦江人幼以孝稱嘗刲股療母霍氏疾疾愈邑令旌之彭文舉綦江人十二嵗時母疾篤醫藥罔效文舉刲股以進疾瘥邑令以童齡篤孝旌之霍壽長綦江人年二十嫡母曹氏病危夀長三次刲股和藥療之病愈吳國瑞綦江人與弟國泰國安事母陳氏皆至孝母疾篤兄弟號泣祈天願以身代初國瑞刲股奉之疾少瘥繼兄弟三人同刲股以進疾良已韓茂榮綦江人素敦孝友早喪妻惟敎子讀書四十年不再娶康熙六年邑令孟易吉表其門曰家法可式冷應詔彭水人父病禱於天割股救之邑令尹嚴維旌其門陳我堯彭水人事繼母劉氏稱孝劉病痢甚劇堯偕妻李氏滌㢏浣中衣晝夜無倦劉死哭泣盡哀家素貧妻子常凍餓父天相年八十餘所需用必竭力營辦甘㫖不缺邑令蒋棟旌異之李方升黔江人事親至孝父母亡家貧治喪無力方升夫婦質身營葬升有膽氣膂力過人及質身後俛首服役畧無怨言或誘之曰以君才力舎此他往自當出人頭地奈何乆居人下升曰吾以父母故質身豈忍負之後土蠻擾境升率衆捍圉鄉人擁立爲團練長周儼字墨潭涪州人母先喪事父以孝稱時賊譚𢎞煽亂儼欲負父潛避爲賊所執兩臂受傷血溢昏憒弟儒與賊戰亦受傷四鄰奔救賊乃退逾年父疾篤儼嘗糞試甘苦後竟不起號泣嘔血七日髪盡白弟婦孀居撫藐孤如己出人謂孝友節義萃於一門周儒字魯生儼弟與兄事母以孝聞譚賊肆刧兄以身衛父被執儒急父兄之難奮力與賊戰受重傷賊退三日創發卒黄志煥涪州人事父母以孝稱康熙己丑夏五城中失火延燒民居父適病卒志煥先扶母置他所復冐烈焰入負父屍以出州牧董維祺目擊之額其門李嗣靖酆都人孫可望欲羅致靖父如星星不屈可望殺之嗣靖以身衛父手指迎刃皆斷抱父屍同死保寧府貫玗昭化人邑諸生崇禎十四年父玉元官江西龍泉縣知縣母與兄嫂及玕俱未随任未幾兵戈阻絶音問不通者凡十五年兄嫂皆殁於疫玗銜哀殯葬負母居鄉母亦物故玕哀毁骨立瀕死者數次康熙六年始知父卒於任徒歩奔喪時道路荒殘土寇搶掠玕沿途乞食人感其孝佽助金帛得扶櫬還里冉宗孔蒼溪人幼遭賊亂與母相失宗孔不避兵刃䟦渉尋母順治十四年至漢中始見之募財贖歸是年遂中鄉試人稱孝感任鍾麟蒼溪人襁褓喪母繼母高氏育之遭獻冦亂父及繼母皆羅禍鍾麟朝夕號泣刺指出血遍歴賊營沁骨認屍一日獲繼母骸於十廟山而父骨終不可得遂取父遺衣同繼母合葬後中順治辛卯舉人仕至刺史李能白通江貢生好學善二王書法性友愛析爨時自取菲薄豐者悉讓兩弟又鄰人謝某爲盜所縛能白傾囊贖之人高其誼順慶府楊若楹儀隴人出嗣叔楊純道姚黄賊亂執純道至逹州若楹聞之星馳赴賊營請以身代爲賊所殺龔遂西充貢生少失怙恃事庻母如母克盡孝敬弟瞽廢爲之娶妻生子代畢婚嫁人多賢之湯輅字居易渠縣人諸生父母相繼殁停喪未􅉎山賊蜂至人勸之避不從乃盡出資財於户外哀請曰幸持去勿驚我二人柩也賊爲之動相戒勿入其廬年八十餘無疾而逝侯啟印營山人父文才任直𨽻順德府同知印隨之任至沙河驛繼母王氏偶感疾昏憒服藥罔效印籲天割股和藥食之疾遂愈羅爲紘營山人順治丁酉舉人仕福建平和令㓜時性至孝生母李氏病篤紘刲股和藥母食之疾瘳羅心簡營山人康熙癸卯舉人事父母備極色養遇親疾即籲天請代屢以誠感𫉬愈于前光營山人賦性純孝母病光侍湯藥必親嘗跪進逹旦不寐母曰兒憊矣曷就寢光泣曰母病且未愈忍自安乎如是者三年勞瘁過甚一日伏母枕竟先其母而逝里人哀之姚銓西充人父早喪事母孝母病銓祈天願以身代疾危割股肉食母母病痊縣令王葵錫旌其孝李應瑞西充人事母以孝聞知縣黄朱勗旌以匾額張鳳舒西充諸生母劉氏病篤割股以愈王榮秀西充人母袁氏病危割股救之馮天桂西充人父病将死割股愈之楊鳳翥西充人母病割股療之父病復割股而愈髙璞西充人邑諸生叔祖儀坤任浙江平陽令卒於官璞奉祖儀乾命赴浙扶櫬儀坤居官清介囊無遣金璞作募啓丐求浙省當事風霜勞瘁越七載始移柩還葬先是璞已列子衿以入浙屢年不𫉬赴嵗試竟除名里人惜之陳搢南充諸生父于王敎諭營山隨任侍養父暴疾甚危搢哀號祈天割股以進父疾遂平耿聨甲南充武生父疾篤聯甲夜禱於竈神刲股進之病竟痊可馮瑛南充武生父光偉有痼疾一夕疾篤瑛割股和藥竟頼以痊張天錫南充民母病刲股進之𫉬愈逾年復病又刲股進之亦瘥馮勷南充民父化羽病危勷刲股以進尋愈敘州府王偉宜賓人康熙六年母病偉割股救母遂愈羅文斗宜賓人康熙十五年母病文斗刲股療之病遂愈樊澤迥字膏郇宜賓人四嵗失母終日哀慟不離喪次八嵗能文從父避亂與兄澤逹百里外負米養親寒暑弗輟先是哭母獲疾胸結痞塊後竟不禄鄉閭惜之鄧乾宜賓人郡諸生家貧授徒養親父汝謨病危乾殷憂莫措遂質子以備衾殮父病忽愈子亦贖歸康熙二十五年學使江臯以行優旌之郭充廣字𢎞毓隆昌人父忠懿宦黔省卒於任充廣時年十二又值兵燹無計歸櫬乃奉祖自黔寓播晝負薪米養祖夜則讀書弗輟後還鄉祖以天年終哀毁踰禮康熙癸丑列嵗薦值呉逆亂隠居教授叙瀘間從學者百餘人多知名士充廣每痛父喪未歸與人言及輙流涕不欲生終身如一日焉樊澤達字昆來宜賓人康熙辛酉解元乙丑進士選庻常歴任翰林院侍讀少值寇亂奉二親避兵越溪家貧負米百里外徒跣供爨又常於蓮塘賀市寺授徒養親徃來皆水道嘗撑筏至魚窩沱觸石身堕水中聞人呼曰此孝子也若有扶之者及出波心筏猶在側得不死亦異事也䕫州府李珍奉節人年十二母疾篤珍旦夕焚香祈以身代并刲股和藥以進母疾遂愈龍安府李芳平武人性至孝父成宗病篤割股救之病尋愈里人稱焉寧逺府胡其英冕寕人由貢生任永寧敎諭年十三時祖嘗臥病其英刲股療之雅州府丁文斗雅州監生天性純篤世敦孝友子一鶴翔鶴臯鶴析箸時互相推讓父母賢之仍令同爨焉時論推服王運開雅州諸生與弟運閎運閶最友愛各舉八子共二十四人衣冠濟美爲世所慕劉纉向雅州人與弟祖向四世同居敎子弟以孝弟力田爲本鄉里高其風義陳如佐雅州人孝友純篤與弟如章同居無閒言古誼爲後人法教子廷簡中乙酉鄉試有賢名胡元雍字玉南蘆山人年十二遭獻賊亂父兄伯叔皆遇害既又值土㓂破城負母避賊幸脱於難母病三年偕婦俞氏躬進藥餌兩弟被擄徧覔贖選人稱孝友兼盡王登震雅州貢生性孝友康熙庚申諸兄嫂多卒於疫登震乃與季弟撫育諸孤男女二十人皆成立婚嫁家貧絃歌自娯知州劉啟和甚重之王翰中雅州人父新命繼娶劉氏三十餘年無所出癱廢牀第者三年翰中與婦朝夕更侍飲食藥餌必躬進之劉臨終泣謂翰中夫婦曰願爾子孫世代榮昌又事兄某如父終身不變里中遭回禄者三火皆及門而反人以爲孝友所感梅頎雅州人與弟頑俱諸生兄弟友愛頎性尤公直讜論不阿後進畏服胡宗玉雅州人與弟宗琮事父純臣母姜氏和樂承歡朝夕匪懈父母壽俱九十有二同日而卒彭可富蘆山人有孝行親亡廬墓哀毁骨立知縣張緒揭其門曰永言孝思駱應成蘆山人事親孝家貧傭工以奉甘㫖有司旌其閭曰樸孝可風直𨽻嘉定州雍正十二年陞爲府彭崇峩眉人雍正癸卯進士嘗慮父母年迫桑榆每朔望夜表奏上天有願减一已之算以増二親之齡云云聞者感嘆謝朝玉榮縣人性至孝家貧奉養無缺居親喪朝夕悲號三年不入内室後薦明經任大竹訓導以老辭歸鄒玵榮縣人康熙丙子舉孝亷母早卒玵與弟三人俱幼能盡哀慕後繼母舒氏生少弟於玵等衣食故從豐反逾已子玵雖受之暗給少弟維均冬夜讀書以己衣爲少弟禦寒䕶惜備至舒屢窺見信其友愛之誠自悔矯情由是一視諸子人咸謂玵之孝友所感可爲異母者法楊州英榮縣人邑庠生貧能奉親菽水養志康熙庚午登賢書後任昌化縣令未幾聞父樞病篤力請終養歸侍湯藥父卒不起英竭力營葬哀毁見骨亦得疾旋逝人有王戎死孝之比直𨽻卭州王俅士卭州人康熙丙午舉人父孚顯卒異母弟俶士年幼俅士以所貽田產器物盡讓之仍代爲措辦差糧四十餘年中兄弟友愛無異兒時里人義之陳國龍卭州人同里陳思順年六十無嗣養以爲子娶妻周氏思順夫婦貧且病國龍與周朝夕奉養不懈及思順病劇臥榻經年家益窘不能延醫國龍每夜焚香泣告於天乆之病竟愈鄧潁孳卭州㧞貢生蚤孤事母孝母疾革謂曰兩幼弟汝善撫之獨弱妹目𤯝奈何潁孶泫然跪應曰必使得所嗣是婚兩弟且敎以成立妹贅同里白瑛爲置田產僕婢并延師課讀入泮食餼與兩弟等直𨽻潼川州雍正十二年陞爲府萬谷陽字律吹潼川州舉人母傅氏病篤朝夕侍湯藥衣不解帶者累月一夕母夢天門放榜有萬思壽三字覺語其事云吾病當愈子必獲雋病果愈次年谷陽遂登鄉薦平居敦行好學著述甚富年八十以壽終楊先憲字式穀潼川人嵗貢生敦品行博經史幼以孝聞母閔病卒值獻逆之亂粗具殯殮及蜀平始盡喪葬禮哀毁如初廬墓三年鄉里稱之彭鎔遂寧人十嵗喪母晝夜泣血欲絶粒以殉父力勸之乃復食比長奉父克孝父善病侍湯藥不離左右及父卒廬墓三年待諸弟以友愛族黨稱之康熙丁卯登賢書任成都府敎授訓課有方士争向學陞江南震澤令政有循聲楊繼光樂至人避獻賊亂奉母寓閬中得無恙順治十六年母九十繼光年六十有四忽抱重病屬其妻曰我死爾無過哀須自保愛孝養吾母言訖而卒後其妻竭力事姑能成夫志至今傳頌不衰何祉射洪人遇母疾露禱求以身代割股和藥以進康熙五年有司旌之周景旦安岳人事親恭謹温凊不懈曾刲股愈父疾康熙二十一年知縣鄭炳旌之曾光祖字輝前安岳人性至孝侍二人無疾言遽色家貧竭力以供膳脩父病篤刲股以進立愈康熙二十一年知縣鄭炳旌其門直𨽻瀘州李鳳翔瀘州人明末避亂山荘父如星病篤鳳翔焚香露禱持刀刲股血流被體適賊衆大至見而驚曰此孝子也戒衆勿犯遂引去如星病亦尋愈李長亨字㑹也合江人七嵗遇亂父華爲賊所執亨泣求身代賊感動并釋之順治十七年母任氏病篤刲股獲愈華患痢又嘗糞騐疾長亨殁十年其季女年十二亦刲股以療其母人稱爲孝德傳家云楊天植江安諸生天性純篤孝養惟謹親疾齋沐告天割股和藥以進病立愈湯日新江安諸生事親孝愉色承歡親病割股以進閭里咸稱孝子馮竒合江人父聖䀻病篤竒甫十嵗割股和藥父食之病愈巡撫榜其門曰孝篤穉齡舒登華合江人割股療親疾巡守二道以烈孝可嘉旌之韓士修字琢菴瀘州人康熙丙午解元癸丑成進士選翰林庻吉士授檢討卒於官士修博學能文弱冠應童子試學使者即期以解首既而果然性至孝方赴省試時以母病堅不欲行其母强起慰之曰吾幸無所苦兒但行倘成名即吾病立愈矣不得已乃往甫終塲不待報馳歸母卒哀毁幾不能生入館後值滇逆變蜀道阻絶思一見其父不可得日夜憂泣成疾疾革强起衣朝衣西望拜哭辭其父爲書云兒不孝彌天今死矣願大人勿以爲戚厚自愛也遂殂年僅三十有六同時有癸卯舉人湯澯字岷水事親以孝聞今瀘人言先輩文行必稱湯韓云直𨽻資州龔起鳳資州人同妻王氏事親極孝母病夫婦皆割股肉進之遂愈順治十八年學使席敎事旌之直𨽻綿州王允迪字吉甫綿竹人邑諸生幼以竒童稱博極經史事親誠敬父茂榮病允廸刲股以進尋愈後居喪哀毁里人稱其孝胡大振綿竹人事親至孝嘗割股療母病逾年母死廬墓盡哀鄉里咸稱之茍克孝綿州人獻賊之亂孝父被執乃紿賊曰隔河有藏金盍令吾父取以進父得脱甫渡克孝急呼父遠遁賊怒亂刃交下死之趙延吾字乂安安縣人家貧授徒縣城以供菽水一日思親歸省遇水漲溺死有司旌之鄭廷富安縣人值嵗儉父患病思肉食廷富割股代之父病獲瘳直𨽻茂州林承恩威州諸生父七旬病篤承恩情迫嚙指繕表籲天求代數日承恩病卒而父疾果起四川通志巻十下
