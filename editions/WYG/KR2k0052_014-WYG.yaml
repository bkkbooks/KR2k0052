body:
  text: 四川通志巻十四鹽法昔管子謹正鹽筴菹薪煮海齊用以富秦漢而後代有𣙜法盖皆以天地自然之利佐國家賦稅之供云爾方今民庶日繁需用日廣各省鹽政乆定成規而蜀鹽則取之於井歳加開鑿引額亦歴年遞增是鹽法之在蜀其經畫尤冝詳也自奉功令設官以董鹽政法既允釐商民均便行見井竈之間其産益滋其利益溥且熙熙然咸臻富庶之休矣作鹽法志唐時果閬開通井百二十三山南西院領之卭嘉眉井十三劒南西川院領之梓遂綿合昌渝瀘資榮陵簡井四百六十劒南東川院領之置榮安等十三鹽監憲宗討淮西度支使皇甫鎛加劒南東西兩川山南西道鹽估以供軍又奏置𣙜鹽使元和十三年鹽鐵使程异奏以𣙜稅茶鹽本資財賦贍濟軍鎮盖是從權兵罷自合便停事乆實為重斂伏請准赦文勒停從之五代時孟知祥因董璋誘商賈販東川鹽入西川甚患之乃於漢州置三塲重征其稅歳得錢七萬緡宋初䕫路納鹽課變價成都潼川利州路折納錢絹建炎用兵計臣趙開始許民間開井歳納錢絹銀兩後罷課改引太平興國三年右拾遺郭泌上言劒南諸州官糶鹽斤為錢七十鹽井濬深煮鹽極苦樵薪益貴輦置彌艱加以風水之虞或至漂喪而豪民黠吏相與為姦賤糴於官貴糶於民至有斤獲錢數百者有司虧失歳額而民間不得賤鹽望稍增舊價為百五十丈則豪猾無以窺利民有望以給食矣從之端拱元年七月以西川食鹽不足許商人販階文州青白鹽峽路井鹽永康軍崖鹽入川無收𣙜算大中祥符元年十二月詔瀘州南井竈户過正月至寒食各給假三日所收日額仍與除放三年正月減瀘州濬井監課鹽三之一熙寧中患井鹽不可禁欲盡實私井而運解鹽以足之修起居注沈括以為不可遂寝九年劉佐入蜀經度茶事乃歳運解鹽十萬席未㡬罷之崇寧二年川峽利洋興劒蓬閬巴綿漢興元府等州並通行東北鹽四年梓遂䕫綿漢大寧監等鹽仍舊鬻於蜀惟禁侵解池鹽紹興二年四川總領趙開立𣙜法令商人入錢請引井户但如額煮鹽赴官輸土産稅而已其後鹹脈有盈縮月額有登耗官以虚鈔赴之而收其算引法由是大壞井户既為商人所要因增其斤重與之毎擔有増及百六十斤者又逃廢絶沒之井許人增額承認小民利於得井每界遞增鹽課加多而不可售公私皆病紹熙間楊輔為總計遣官覈去虚額棧閉廢井申嚴合同塲法宋朝之制益州路則陵井監及二十八井卭州九井眉州一井簡州十九井嘉州十五井雅州一井漢州一井梓州路則梓州一百四十八井資州九十四井遂州三十五井果州四十三井普州三十八井昌州八井瀘州淯井監及五井富順監十四井利州路則閬州一百二十九井䕫州路則䕫州有永安監忠州五井達州三井萬州五井黔州四井開州一井雲安軍雲安監及一井大寧監一井所出鹽斤各給本路監則官掌井則土民幹鬻如數輸課聽往旁境販賣唯不得出川峽元世祖時四川鹽塲凡一十有二井凢九十有五至元十九年立陜西四川轉運司通辦鹽課一萬七千一百五十二引大歴間增至二萬八千九百一十引計鈔八萬六千七百三十錠又添辦餘鹽一萬引帶辦浙運五千引竈丁逃竄反妨正課明置鹽課提舉司洪武間鹽井二百七十八額課一千六百零五萬九千九百三十斤以後漸增前額名曰新增鹽竈民課重難完别尋小井煎貼旋即𣙜出名曰添辦鹽宣徳間富義等井户亦尋井開煎旋即𣙜出名曰增羡鹽景泰間戶部主事汪回顯復加増𣙜廣貯鹽倉以待中米中銀等商持引支給然濕鹵易耗迨其商至數多不敷賠者往往苦之兼以開煎既乆泉老山童不復如洪武永樂間水廣柴近竈户易於煎辦故私井查𣙜雖增人無餘利而課反難完數多縮額户部乃請歳遣按察屯田僉事兼理鹽法成化初僉都御史汪𢎞以汪回顯所𣙜數多虚額建議除豁未報十一年副都御史張瓚復請除豁亦未報𢎞治十七年竈丁楊南清奏將鹽課本色改徵銀兩罷先年召商引目不行嘉靖十五年廵撫都御史潘鑑題稱四川鹽井廢壞鹽課累民包賠戶部覆行兩院委官蹋勘二十年屯鹽僉事陸時雍條議稽竈丁寛新井酌歸併凡數款廵撫都御史劉大謨然其議民稍便之但自奏改折色主事鍾丈傑等官議分上中下等塲分計引定銀七萬一千四百六十四兩三錢與原額二萬七十兩大相懸絶由是丁逃井塌竈户每歳代賠課銀每年負逋虚額雖存實徵全減公私兩竭官民俱困矣萬厯三年四川廵撫都御史曾省吾㑹同廵按監察御史孫代㑹題請減課額銀兩言甚切直戶部議覆將歳額鹽課銀七萬一千四百六十四兩三錢依撫按奏議歳征四萬七千五百二十一兩四錢其減少銀二萬三千九百四十二兩七錢不許再派廢井竈丁及現在丁井惟將商人引票稅銀扺補如或稅銀不敷嚴令各州縣將新開小井逐一報官收課以充原額又按川屬上流永通富義仙泉黄市福興廣福華池通海新羅羅泉郁山渰井雲安大寧凡一十五鹽課司各設大使副使分涖之井竈稅課其法寖宻民甚病之議者謂宜豁鹽課以通商販又條處大寧雲安鹽課事宜一嚴鹽禁以通商販二復本色以恤竈丁三減虚課以收實利四設權宜以祛宿弊此雖酌議二邑之課然以嚴禁通商以本色恤竈則似達之通省可行者至於豁絶丁以矜竈戶之苦廣新開以補老井之缺宜急行之四十七年四川等處提刑按察司提督學校帶管軍驛屯鹽茶水道副使杜詩為鹽政更新有機功令申飭宜預謹折衷部議酌陳款條以副明綸以禆國計事准布政司照㑹煩請查照部疏及刋書款内事理備行該府州縣産鹽行鹽地方均酌嚴禁始終堅持一價不令商人畸輕畸重不許勢豪屯積官鹽抑勒商民至於考成銷引之法即以産鹽行引報中立額遵照四十五年題准事例務完八分以外准免議不及數者一如罰俸奪俸降級等例凡遇給由預呈各該司道查覈明白定足八分方准起送應查叅者不得姑息仍以六分六釐為例其各該地方闗隘處所官兵嚴行盤詰凡有順流船隻夾帶私鹽與強徒聚衆興販者所在官司就便擒拏依律重擬官座船隻與舉監勢豪有犯據實參詳定以白簡從事其私鹽出沒去處立石遵守嚴加峻防界限攸分各司廵責不許越行庶私販屛跡官鹽大䟽各該有司同為王臣誼急公家務期邊腹貫通毫無窒礙毋以商民互為兩岐秦越相視仍稽覈原編引目何由短少歴查四塲近年中引若干虧引若干酌量繁簡派加如額嚴禁四塲印官督商報中合無蹋騐各地方井眼每日出鹽若干共可計引若干聽其區畫期復原額册報存案以為定則毋令竈户潛行私賣販夫竊壓官鹽通遵部議載入考成如中納不足者一體叅治請速逐一酌議妥確通詳頒刻書冊發行出鹽四塲并行鹽州縣立石遵守等因本道叅酌輿論數款合行回覆為此移牒貴司煩請裁照轉報施行一鹽課之設國初以來額設二萬七千餘兩後又增至七萬一千有零額數雖存而實徵無幾以致嘉靖年間具題減免議於小票引票二項稅銀凑充復於萬歴十三年前院赫題允實徵井課銀三萬六千六百有零後因有各州縣井塌丁逃難完請豁未䝉具題以致屢年鹽課拖欠終無完局為今之計或照編審法三年一次選委廉能府佐官一員於産鹽州縣單騎清查要見舊井出鹽者計有若干倒塌若干逃故若干新開産鹽若干逐一清查造冊申報以憑裒益施行庻罷民少甦賠苦而奸民亦不得隠匿矣一川省産鹽地方與淮鹽大不相侔商人報中引票止共徵稅銀六兩三錢議於合屬井課湊解秦省充餉四塲産鹽處所每月額中三百二十道計一年該三千八百四十道約該稅銀二萬四千一百九十二兩奈法乆弊生鹽快與私販表裏為奸乘幾夾帶越境貨賣無日無之以致引票空懸額數而商人報中者稀自今以後嚴行各産鹽州縣痛加釐革每季捕獲私鹽多者官行奨勵仍從優叙捕獲私鹽少者或奪俸或另議庶人心儆惕而奸黨潛踪矣一徵收鹽課蓋在有司不肯立法稽覈痛革收頭吏書包侵之弊調停竈戶拖欠之端以致國課有損年復一年不得完納况今奉有新題事例自後該管産鹽州縣額課定要完及八分以外三年考滿方准給由如完不足者不准給由仍聽叅治則功令明而人思自効矣一産鹽州縣通行貨賣稅則畫一然而雲陽大寧發賣之所猶至混雜雖經本道填給小票任其商販或照鹽千斤或五百斤不等私行無忌非法之平也本道職專鹽法豈容任從多照自今以後俱要定本道則例每張止填照鹽一百斤不許多填漏稅違者拿䆒則法令嚴而小票庶可通行矣一各商貨賣鹽斤俱有定例每二萬三千斤為一引無容増減申飭不啻再三近訪四塲商人知法者固多而玩法者不少或借一引而照四五引之鹽推原其故因各秤盤衙門沿襲陋規有官七吏三之謡不肯盡法秤掣任憑奸商串同衙役打築大包夾帶公行故耳若能照引票鹽斤秤掣何患私鹽之難察乾賠之課無抵也自今以後嚴督盤騐衙門痛革陋規細加秤騐如違定重叅處庶上下交儆而國課得䟽通矣一川中民貧鮮貲所稱為鹽商者多係山陜之民聽其有本自來耳勢難強也近二十年來引票稀少欠課二十餘萬前何以無虧而今何以頓減哉如本道所縷指禁私販禁大包禁陋規嚴秤騐亦既詳哉言之矣而尤有病根之極重者盖自稅監𣙜稅以來每引票一道增銀五兩一錢五分則二十年來通得増銀四十餘萬矣夫正稅六兩三錢而監稅又五兩一錢五分商民出本既倍則取息亦倍安得不大包夾帶則一引可當二三引矣又安有餘銀以足三千八百四十引之數哉且此項稅銀又不係布政司正解之數曾奉前朱按院行查竟莫悉其故若兩院明告於上捐此無名之徵而鹽法不清國課不裕者未之有也皇清定鼎清理鹺政當蜀民疲乏之餘民力無多煎燒不易兼之户少人稀行鹽有限貿易之商多係農民乘間逐末或朝販鹽斤暮操耒耜是以井眼有開塞竈户有去留引票有盈縮每嵗課稅尚無定額至於水路小引每票載鹽五十包陸路小引每票載鹽四包而從前大引暫停不用以大引所載與井竈所出商民所辦實相懸絶今則户口既增商賈亦集定制垂乆立有成額鹽政之振興有漸矣今將諸臣奏疏附列於左康熙六年十一月廵撫四川都察院右副都御史張徳地題為恭報鹽課鹽稅銀兩等事據署四川布政司事按察司李翀霄呈稱奉行查議川省大引一款隨即備移鹽法道查議去後今准該道移據䕫州府回稱查萬雲寧太有井四縣俱屬新經開淘所産之鹽無幾即今日所出鹽斤尚不足本地易食之用如達東州縣之民俱係川北射洪南部驢駝之鹽梁萬新開四縣人民俱各於忠州塗渰二井背負食用以四邑些須之鹽何堪舉行大引即有引亦無多鹽可填更無處可賣及查各縣舊制原無大引行鹽之規似難輕議舉行又據潼川州回稱查得鹽引之設必地方全盛行鹽既多鹽課繁溢恐有私販縱横國課短少故非鹽引不足以督考成别殿最今蜀省戶口寥寥非期之百餘年之後斷無生聚驟蕃之理况鹽井盡為賊填開淘原復不易祇此小票聽民自領自賣頗為簡便若額定毎州每縣行鹽若干派引幾許反致行鹽無民歳課有虧其大引自應俟地方蕃庶之日再為領頒又據嘉定州申據犍為縣回稱查得犍邑自兵燹之後舊案無存而萬歴年間大引行鹽之例難以稽察目今犍為填票行鹽者不過開復之始權為便商計也苐川商難比他省即今日之水票五十包尚難填給誠恐大引舉行反有未便於擔夫小販者也等情到州該卑州查看得地方初定民稀財窮節年俱小販行鹽或借本或合本不過數百斤而已俱討小票負運駝載取其就便本少利㨗希圖快便以省僱船僱夫之費是民之朝夕養命者恃有小票且小票招商節年奉發之數尚已難銷兹欲舉行大引恐大引未行而小票亦停所悞鹽稅民生不小合無暫為權冝稍俟生聚再行大引庶民不畏難而國課日充矣又據順慶府呈據南充縣知縣沈紹堯回稱查得南充地方自經凋殘之後陸續開淘井眼照額輸課遞年奉發行鹽小票到縣出示勸諭責令竈民煎燒招商徵稅填給遵照定例每票一張填鹽四包每包徵銀六分八釐一毫不過營渠達州陸路手提擔挑背駝小販南民人户寥寥鹽井有限遞年奉發行鹽小票尚且輸徵不足實難請頒大引又據西充縣知縣王葵錫回稱查得西充雖有鹽井之名俱係倒塌止有現煎活井又不通河道遂無商賈貿易今奉確查酌議委難舉行大引又據蓬州知州鄭聖瑞回稱查得鹽法一事原以裕國利民頒發引票所以稽核考成蜀自開復之後大引難行向奉給票行鹽原為地方凋殘人民稀少小商販賣亦無誤課病商今奉酌議大引實難舉行等情各具申到府相應具文回報又據保寧府呈據閬中縣知縣高人秀回稱查行鹽政闗乎國課務在通商便民因時制冝然後行之經乆可以無滯查行大引之例前因時勢難行遂議通便之法大商每票五十包小販填鹽四包毎包額定稅銀六分八釐一毫不拘大商小販通行無滯裕國通商法盡善也今奉行查止憑在外給票行鹽殊非經乆之計但蜀省川北人民稀少食鹽無多且産鹽之井又僅存昔之什一若復部頒大引必至商民交困殊非長乆之計也合無仍照見行引票俟人民繁衍之日請頒部引庶上不虧課下不病商通行經乆而可以無滯矣又據南部縣知縣焦㴻詳稱查得南部雖有鹽井俱係小井淡水艱於柴薪煎燒無多况去路窄狹現今奉法小票通融填發尚且停壓難行若一旦頒發大引誠恐荒殘之區無處行銷又致病商累民等情詳報到府該本府知府薛柱斗復看得閬南二縣自遭兵燹以來鹽井乆塞近雖淘有井眼為數無多且食鹽者少商販資本亦㣲若必復大引則商竈不無兩病似應仍照見行引票暫為通商便民之計俟殘黎生聚食鹽加增之日再議改行大引可也又據叙州府報稱查得鹽引一事奉部文有頒行大引之條議但川省産鹽處所不止富順而各處行鹽地方又有險阻時勢之不同人民多寡之不一若一旦遽行大引誠恐阻滯難行有誤國課或俟商販繁多領鹽日盛俯照他處行鹽處所一例通行未為晚也又據重慶府呈據彭水縣知縣王煒回稱查得彭屬郁山鎮所産之鹽原聽思南婺川黔江酉陽各土司商販零星易賣或一二十斤或三五十斤多則不過一百斤况係南北東西之人焉得乆住井塲以待合引貿易前奉頒鹽票河引一張載鹽五十包旱引一張載鹽四包商販始得稱便通行無滯若舉行部頒大引則郁山零星小販坐守經月難合一引必至病商損稅恐非良䇿又據忠州申稱該卑職看得有鹽必有引載在鹺政天下遵行㒺敢違越但查得各省鹽引州縣俱載額數課則辦之商引則繳之官按其完欠以為考成此卑職兩任縣令時所深知者至於忠州雖有鹽井二處水既不佳産亦無幾竈户各照人丁歳納課銀自漢唐宋以迄元明從無納課之外又行大引之法井豎碑誌鑿鑿可慿者若謂稽核考成則歳課完欠即有司之殿最矣鹽商不至引萬難行理合回覆各等情到府該署府事同知汪永瑞覆看得川省近以小票行鹽原因各處人民稀少商販零星實屬便民至計但部行以考成無稽遂有頒行大引之議國家創制損益因時似原不必拘泥成規也各等情到道據此除龍遵馬三府瀘眉卭雅四州原不産鹽外該本道看得大引之設原䝉内部為普天率土裕國通商剔弊而專考成之善䇿也但省分有凋殘繁庶之不同故大引有可行不可行之異今據産鹽各屬咸稱大引難行其各情由備載於前無庸繁述今本道揆情度理大引有萬難行者二有不必行者一歴年商販本少力微所販鹽斤多則不過數百斤少僅數十斤耳今欲舉行大引查舊例每張必盈二萬三千斤之數非窮年經月何能得多商凑集合一大引之數此必不能行者一也又川省産鹽地方遼濶零星俱係深山峻嶺即濵江通水道者不過五六處其他盡陸行背負若必欲舉行大引則二萬三千斤之鹽非二三百人不能運動此必不能行者二也再查川省之井盡為寇逆填塞開鑿萬難此日之竈民不過單夫隻婦即盡力經營不但煎燒有限且以所出者半供衣食半供納課較之他省曬海煎池不及百萬中之毫末若舉行大引又安能驟得二萬三千斤盈足之竈戶以給之乎此不必行者一也歴年小票行鹽乆經額有稅課一旦變為大引商竈畏難不前是本欲增稅而不免反至於虧稅也理合移覆等因到司該本司查看得鹽政為國課重務引票為鹽法紀綱此議設大引誠内部剔弊竇而専考成之善䇿也但地方有荒熟之不同故立法有經權之各異查蜀省鹽引舊例每引正鹽二萬三千斤今自獻逆屠戮之後不惟無昔日蕃盛時之竈户堆積盈餘亦且無昔時之巨航大艦與水手橈夫可供挽拽甚且無昔時之凑集烟民可銷多鹽是即有富商大賈亦無所用其貲本此所以從前不得不因時通變而為每票五十包之水引及每票四包之旱引也今若一旦改設大引則小商無一引之貲窮竈無一引之貨勢必商竈俱困課稅交虧此産鹽各屬及鹽法道俱諄諄以大引難行為請也至於内部考成稽察遞年新淘井眼及徵收稅糧俱有冊報而奉撥充餉又復於兵餉冊内奏銷是稽察考成又不在大引之設與不設也今准該道查議移覆前來事闗國課民生伏候本院具題等因到臣據此該臣看得蜀省凋敝之後商民物力有限難行大引縁由先經臣咨部在案部臣以蜀省雖稱大引難行止憑在外給票行鹽無考成稽核行臣速議具題臣隨行據署布政司李翀霄詳稱大引舊例正鹽二萬三千斤祗縁川中無昔時蕃盛竈户亦無凑集商民是以因時通變填給水旱小票以便通其商竈今若驟改大引不惟零星小販既無一引之貲即寥寥竈户又無一引之貨勢必商竈俱困而課稅交虧至於稽該考成則遞年開淘井眼與行票徵收稅銀按年造冊報部撥充兵餉於年終入冊報銷即可以此稽核考成也等因理合具題伏乞皇上睿鑒勅部議覆施行康熙十一年正月二十七日廵撫四川都察院右副都御史張徳地題為恭報康熙四年鹽課鹽稅銀兩事康熙十一年正月二十一日據四川布政司布政使金儁呈稱奉總督川湖加一級帶管四川廵撫事蔡毓榮案騐康熙十年四月十二日准户部咨山東清吏司案呈奉本部送户科抄出該本部題覆四川廵撫張徳地題前事等因康熙十年二月二十三日題本月二十五日奉㫖依議欽此欽遵抄出到部送司奉此相應移咨案呈到部移咨到院粘抄内開該臣等查得先因四川省地方承平已乆請勅下該撫議定鹽課經制具題隨據該撫疏稱川省户口寥寥見開鹽井無幾若懸議加增恐貽累於民俟户口充實之日再議經制等語臣部以該省已定二十餘載應将見在户口查照應徵銀定額如有户口陸續增添彼時該撫即將增添數目具題等因去後今該撫疏稱此項經制蜀省無成例可稽至康熙九年新收正賦新舊丁户共二萬五千六百六十餘丁户食鹽八百八十六萬四十餘斤每百斤徵銀六分八釐一毫計共該徵稅銀六千餘兩等因造册具題前來查該省承平年乆見在户口豈止二萬五千六百六十餘丁戸且每丁户食鹽至三百四十五斤零鹽斤原係每包一百斤徵銀六分八釐一毫係彼時暫行之例今既定經制永行稅課亦應議增相應請勅下該督每百斤應徵課銀若干及户口有無隠匿逐一查明具題以憑再議可也等因案行到司奉此隨即催據各府州縣陸續申報具結前來該本司查看得蜀省食鹽固不能比於江浙之煮海亦難同於秦晉之鹽池始則穿山裂石而開淘鹽井有深至數十丈者有深至百餘丈者萬一泉脈不通則人力工本已盡費矣如開鑿一井其井眼僅容竹筒於數十丈下汲水煎鹽是所費之資本甚多而所出之鹽斤有限且每開一井眼即報納課銀每年造册題報在案或遇泉脈乾斷或遇竈戸貧乏無力開淘則井雖廢棄而課額難除不無包賠之累此鹽課萬難於議增者也至於行鹽徵稅毎包載鹽一百斤徵稅銀六分八釐一毫盖因省鹽自嘉定州屬永通厰發賣者只行於温江郫縣灌縣崇慶新津宜賔屛山眉州丹稜卭州大邑蒲江雅州名山榮經蘆山慶符高縣等州縣而止叙州府屬富義厰發賣者只行於綦江南溪隆昌興文筠連珙縣長寧仁懷瀘州江安納谿合江等州縣而止保寧府屬南部縣福興厰發賣者只行於蒼溪廣元昭化巴州通江南江劒州梓潼營山儀隴等州縣而止潼川州屬射洪縣華池厰發賣者只行於成都新繁金堂新都漢州徳陽江津長夀永川榮昌南川黔江合川酆都墊江涪州渠縣巫山建始達州東鄉太平遂寧等州縣而止是以所産之鹽僅供一省之用而暫行小票亦所以使商民兩便在今日凋殘之區誠美意良法莫有善於此者也前奉張部院憲牌行司仰遵部議酌照正賦新舊丁户共二萬五千六百六十餘丁户攤算每户每年約計食鹽三百四十五斤零約共食鹽八百八十六萬四千餘斤該徵稅銀六千餘兩乃就川省人地而論䆒竟每丁户豈能一歳食鹽至三百四十五斤之多今復奉部駁鹽斤原係每包一百斤徵銀六分八釐一毫係彼時暫行之例今既定經制永行稅銀亦應議增每百斤應增課銀若干户口有無隠匿逐一查明具題以憑再議等因當即轉行成重保順叙馬䕫龍遵九府直𨽻嘉眉卭雅潼瀘六州酌議見行鹽斤事宜務期通商便民不致有虧課稅幷有無隠匿户口去後續據各府州縣詳報咸稱鹽課出於淘井煎鹽之民各照歴年來上中下則例輸納課銀尚且以水渴井廢紛紛具控豁免額課豈能額外議增且川省州縣千山萬嶺又非平原坦途穿井最難萬一百姓辦課不前堵塞井眼逃竄深巖窮谷何處追求不但新增無望實倂舊額全虧至於行鹽地方亦不過川民興販總在本省發賣水路則溪澗川峽僅容小艇竹筏山路或人力背負或僱覔驢騾脚價數倍於鹽價非若兩淮大賈富商千艘萬艇揚㠶長江行鹽於他省者比也今雖暫行鹽票商民甚為相安總無虧於正稅况由山井汲水煎鹽每歳所産有限今若再增稅銀俾商民無絲毫之利誰肯冒山川之險見行引票尚慮遲滯難銷此鹽稅之萬難議增也職等再四思維欲為經乆永行之策但地荒人稀戸口寥寥賦役全書開載可考前以不敢有違部行遵照見在丁戸攤算食鹽徵稅其城市兵民以及四方逐末之衆幷行於各土司食用者統在此八百八十六萬四千有零之内今部議以通行之食鹽盡攤於見在百姓之丁户是凋殘窮黎一丁户一年必不能食鹽至三百四十五斤之多似難定經制垂永乆也合無仍遵舊例照票行鹽按鹽徵稅盖蜀省當兵燹之餘地方無殷實之商不能驟行大引是以照舊暫行小票以八百八十六萬四千有零之鹽徵稅銀六千三十六兩有零之數為見行定額每年鹽票遞有浮溢者即為新增俟將來通省人民繁庶商賈輻輳則行鹽自廣稅不待議增而自增矣所有取到各府州縣並無隠匿户口甘結一倂呈送伏候酌奪會題施行等因到臣據此該臣看得川省淘井成鹽計引徵稅始則鑿山穿石用力最艱既而汲水煎鹽所出甚少况彫殘之區人民寥落而興販不過本省非如江浙之煮海秦晉之鹽池有富商大賈可以行於各省者比也是以歴來止行小票不用大引自前任撫臣張徳地遵照部議以丁户攤算食鹽共計二萬五千六百六十餘丁户該鹽八百八十六萬四千有零亦就人地酌量一時權宜之計若論小民半菽不飽一户安能每歳食鹽三百四十五斤今奉部駁以為既定經制永行亦應議增稅課臣愚以為目前按丁行票窮民已屬難堪若於每包徵銀六分八釐一毫之外再為增加必至竈户潛逃商販褁足將來有誤國課臣䝉皇上特簡隆恩晝夜悚惶惟期愛養殘黎漸圖生聚今以鹽斤一課忽於常額之外驟議加增非所以綏輯殘疆而與為休息也臣再四躊躇莫若以八百八十六萬四千有零之鹽斤仍徵六千有餘之額稅一遵成例以小票暫行姑俟地方繁庶之時再為酌議則國計民生均有攸頼矣今據該司詳議前來除將府州縣印結送部外臣謹㑹同督臣蔡毓榮合詞具題伏乞皇上睿鑒勅部議覆施行雍正八年七月二十四日廵撫四川都察院右僉都御史憲徳題為欽奉上諭事雍正八年四月二十五日准户部咨山東清吏司案呈本部題覆四川廵撫憲徳題前事奉㫖該部議奏欽此欽遵抄出到部該臣等查看四川廵撫憲徳疏稱川省鹽政向來經理尚未允當欽奉上諭鹽乃民生日用所需查川省鹽課考成惟責之産鹽州縣其餘並無廵查之責且有僻逺地方不行官引以致私販充塞甚為鹽政之弊應將官引通行合省約計州縣户口之多寡均勻頒發令其招商轉運倘有壅滯責成各州縣定為考成如此則有司等自必加意查察使私販息而官引銷則弊端可以釐剔矣如何定為成例使川省之鹽經理妥協以裨益民生着督撫詳議具奏特諭欽此准部咨行到臣隨行據驛鹽道曹源邠署布政司事按察使吕耀曽確議詳請核題等情臣謹㑹同署理川陜總督臣查郎阿合詞具題隨奉部覆據疏稱川省産鹽各州縣衛共三十五處不産鹽州縣衞㕔共八十三處每歳計行銷水陸二引共三萬八千三百一十一張徵收課稅盡考成於産鹽州縣其餘並無考成原未妥協自應欽奉上諭令通行合省不論州縣有無産鹽約計户口之多寡均勻頒發引張令其各自招商轉運在商人於本地方官領引即於本地方官繳銷自無徃返違限之虞事屬易便再令各州縣各隘口設廵役稽查則私販自必斂跡官引亦無壅滯倘各該地方官不能覺察私販致官引壅滯遲延繳銷者將該地方官照例議處至僻逺地方不行官引以致私販充塞應令該地方官通查户口若干核定應銷鹽引若干即将引目交地方官設法行銷倘有壅滯惟責成該州縣照例處分又産鹽州縣既將官引分發各處是該地方人民竟無官引可銷自應計其户口另増引目但因其地出産鹽斤本地居民荷柴負米便於貿易不必令其另招商人應將本地居民計户增引其所增之引分配上中下井竈照商人一例行銷完納引稅再於通省接壤各要隘處所責令文武官弁實力廵緝以防越境外販各省行銷官引州縣均定有考成則不但鹽引易銷鹽稅漸増而小民必需日食之鹽亦得充用等語查鹽法官銷商辦原係按地利民情酌量舉行方為妥協今該撫將川省有無産鹽州縣以及僻逺地方或應招商轉運或應委官行銷分别酌議似亦因地制冝之意但川省産鹽係何州縣僻逺者係何地方疏内既未分晰而地方官如何設法行銷居民作何納稅之處亦未詳悉聲明臣部難以懸議應令該撫再行確查并將應增引目以及各隘口設立廵役稽查各州縣均定考成之處逐一定議具題到日再議等因雍正八年三月十四日題本月十六日奉㫖依議欽此欽遵抄出到部到司案呈到部擬合就行為此合咨前去查照本部覆奉㫖内事理欽遵施行等因為此仰道官吏查照牌内准咨奉㫖事理即便通飭該道仍㑹同布按二司遵照部文川省産鹽與不産鹽者係何州縣僻逺者係何處所地方官如何設法行銷居民如何納稅并應增引目以及各隘口設立廵役稽查各州縣定考成之制逐一詳查確議通報以憑核奪㑹題毋違等因奉此該四川鹽法道曹源邠布政司高維新按察司劉應鼎㑹查得川省産鹽州縣如簡州閬中南部南充西充蓬州富順隆昌屛山榮昌忠州酆都彭水大寧雲陽萬縣開縣鹽源潼川射洪鹽亭中江蓬溪樂至嘉定犍為榮縣江安資州仁夀井研内江資陽綿州太平縣以上共三十五州縣并復設之大足安岳威逺新報開淘之長寧與後蓬溪改歸之遂寧共四十州縣均係産鹽州縣應將原行水陸引目分行各州縣招商行鹽如將引目分行各處該州縣無引行銷應計户口另增引目責令竈戸照商人一例行銷如本地出産鹽斤無多不敷食用仍應分認别州縣官引以資食用又如忠州萬縣太平酆都等四州縣除酆都鹽井一眼辦課之外原無餘鹽不能增引其忠州萬縣太平三州縣向止𣙜課並未配引亦應查明鹽斤配引行銷至奉查不産鹽之州縣如成都華陽温江新繁金堂新都郫縣灌縣崇慶新津漢州什邡松潘蒼溪廣元昭化巴州通江南江劒州營山儀隴廣安渠縣大竹鄰水岳池宜賔慶符南溪高縣筠連珙縣興文叙永㕔建武㕔巴縣江津長夀永川綦江南川黔江合川墊江涪州銅梁奉節巫山梁山建始平武江油石泉西昌冕寧越巂衛㑹理州雅安名山榮經蘆山遂寧眉州丹稜峩眉洪雅夾江卭州大邑蒲江瀘州合江納谿安縣綿竹徳陽梓潼茂州汶川保縣達州東郷以上州縣㕔衛共八十三處又今復設之彭縣崇寧雙流壁山定逺新寧彭山青神彰明羅江并改歸之永寧改設之清溪改流之天全以及建昌所屬之徳昌所迷易所鹽中左所州縣㕔衛所共九十九處俱不出産鹽斤自應分認各産鹽州縣引目招商行運今奉查僻逺者係何州縣如成都府屬之松潘衛保寧府屬之南江順慶府屬之儀隴䕫州府屬之建始以上四處或地處邊逺或治設山僻途路﨑嶇人民散處招商不易因而鹽價高昻貪利奸徒乘機興販每致窮民淡食且蔓延於鄰近州縣有礙鹽政應令地方官查明户口約計日用鹽斤配定引目凡一村一庄設立散商承領引目赴産鹽州縣運鹽於各村庄之中各自開設鹽舖行銷令民買食但領引完稅必需專人董率查鹽法條例開載各鹽運司設有總催應照例於散商之中毎年輪流立總催一名按限催納引稅按季分發引目與衝繁之各州縣招商分引鹽政無不畫一再令該州縣衛照例於各隘口多設廵役查挐如遇私販立即擒獲送官䆒治是該州縣衛行鹽納稅各有責成既無淡食之虞亦無私販之弊於偏僻州縣似有裨益至奉查應增引目以及各隘口設立廵役稽查各州縣均定考成之處令逐一定議等因查各州縣應增引目向因未查戸口難以定其應增數目至州縣私販向因未設立隘口以致漫無稽查今奉行約計户口之多寡均勻頒發引目現在遵行但係通省查造之事不無有需時日應令各屬查報戸口及所設隘口到日核定應增引目應設廵役確數造冊另行詳請題報至各州縣考成既經分引行鹽之後倘官引或有壅滯課稅未能全完以及招商遲延私販發覺均有定例應請仍照定例處分再寧逺一府係新設府治查所屬之西昌縣㑹理州冕寧鹽源越巂衛徳昌所迷易所鹽中左所俱食鹽源縣之鹽今查鹽源縣但銷陸引四百張尚有餘鹽自應查明鹽斤請增引目行銷但查該府所屬八處地方均屬漢番雜處自來引稅俱向買鹽人民抽收稅銀完納應将引目交與鹽源縣令該縣典史駐劄白鹽井地方仍於各屬居民買鹽時抽收稅銀則民不難於完納官亦易於辦課似為妥便又川省引鹽有例行黔省之貴陽安順平越都勻思南石阡大定威寧併改隷黔省之遵義滇省之鎮雄烏䝉等十一府州縣及川省之酉陽石砫明正木坪瓦寺金川阿日雜谷九姓司等土司并新改設立黄螂雷波等處發賣者從前引目併未帶往各省及土司等處地方因途遥路險商人不能前進皆係􅆓邊州縣截角掛騐聽彼處商人轉運該地方截角州縣換給照票以為前途盤騐之據但地方官截引換照或有不肖有司營私舞弊恐滋私販今於此案俟各屬造報戶口至日彚造川省應食鹽斤確數再將應行黔行滇及各土司鹽斤核定水陸引張確數照依河東督部院酌議田房契稅頒用􅆻根契紙之例刋設雙聨引根引紙鈐盖鹽道印信分發􅆓邊州縣俟商人運鹽到日該州縣照部引字號張數填註引根引紙於中縫大書運鹽斤數以引紙截給鹽商以備前途盤騐照例截角放行其引根由該州縣同已截角部引申齎鹽道查核繳銷以杜影射並填多報少之弊如此旣可疏引通商於民生大有裨益且與大部按地利民情酌量舉行之議亦相符合是否允協本司道未敢擅便相應詳請撫都院俯賜察核具題等因為此恭疏具題伏祈皇上睿鑒施行雍正八年七月二十四日題八月二十二日奉㫖該部議奏欽此欽遵於本月二十三日抄出到部該部臣等會議得雍正七年十月内據四川廵撫憲徳疏稱欽奉上諭以川省鹽課考成惟責之産鹽州縣其餘並無廵查之責且有僻逺地方不行官引以致私販充塞甚為鹽政之弊應將官引通行合省約計州縣户口之多寡均勻頒發引張令其各自招商轉運倘有壅滯責成各州縣定為考成如此則有司等自必加意查察使私販息而官引銷則弊端可以釐剔矣着督撫詳議具奏欽此臣謹詳議具題等因戶部查該撫憲徳具題疏内川省産鹽與不産鹽者係何州縣僻逺者係何地方並未分晰而地方官如何設法行銷居民作何納稅之處亦未詳悉聲明難以懸議行令再行確查並將應增引目以及各隘口設立廵役稽查各州縣均定考成之處逐一定議具題到日再議等因覆准行文去後今據該撫憲徳逐一詳議㑹同署理川陜總督事務查郎阿合詞具題前來查疏稱川省州縣如簡州閬中等三十九州縣均係産鹽州縣將原行水陸引目分行各州縣招商行銷如將引目分行各處該州縣無引行銷應計户口另增引目責令竈户照商人一例行銷倘地方出産鹽斤不敷食用仍應分認别州縣官引以資食用又如忠州萬縣太平酆都等四州縣除酆都一縣鹽井一眼辦課之外原無餘鹽不能増引其忠州萬縣太平三州縣向止𣙜課並未配引亦應查明鹽斤配引行銷至奉查不産鹽州縣如成都華陽等州縣及㕔衛共九十九處俱不産鹽自應分認引目招商行運等語應如所請將川省産鹽之簡州等三十九州縣原行引目分發各州縣招商辦運仍將該州縣應銷引目計算户口另請增給責令竈戸照商人一例行銷辦課至所産鹽斤不敷民食之處亦令計算户口分認别州縣官引招商行運其不産鹽之成都華陽等州縣㕔衛共九十九處均令分認引目招商運銷再忠州萬縣太平酆都等四州縣内該撫憲徳止稱酆都一縣鹽井一眼辦課之外原無餘鹽不能增引其該縣有無原行額引之處未據聲明其忠州萬縣太平等三州縣配銷鹽引或令商人辦運或令竈户行銷亦未分晰應令該撫憲徳查明報部又疏稱僻逺州縣如松潘衛南江縣儀隴縣建始縣四處或地處遙逺或治設山僻途路﨑嶇人民散處招商不易因而鹽價高昻貪利奸徒乘機興販應令地方官查明户口約計食鹽配引凡一村一庄設立散商領引赴産鹽州縣運鹽於各村庄開舖行銷令民買食但領引完稅需人董率應於散商之中毎年輪流立總催一名催納引稅分撥引目等語亦應如所請將松潘等四縣衞令地方官查明户口酌發引目招商轉運接濟民食并於散商之中每年立總催一名令其董率至應納課稅仍令散商赴該地方官交納不得令總催干預以滋侵蝕等弊又稱各州縣應增引目以及各隘口設立廵役稽查係通省查造之事不無有需時日應令