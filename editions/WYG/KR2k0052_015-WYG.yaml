成之後公私出入一切以之除京邊起運照舊徴銀外其餘布政司條編存留各項皆銀錢對半收解百几支給亦復如是其有偽造阻撓及有司奉行不力者皆以三尺隨之庶窮川煩費之秋少紓空帑而閭閻困窮亦可少寛矣一錢局四道開局鑄造川西在省城川東在重慶䕫州府川南在瀘州嘉定川北在順慶保寧潼川待二三年後仍歸倂布政司始分之以廣流布終合之以總利權似屬長便一管理各委正官或府佐督之至於分委或州縣佐領或府衛經歴凡有心計有志向者任其選擇委用錢行之後查調度有方操持無染者分别薦奬以示激勸一錢本先令各府州縣搜括在庫銀兩册報兩院司道備照將銀解赴各府州買銅鑄完照原銀給錢支散各役工食扣銀補庫此於公帑無損民用自利至官吏俸鈔師生廩糧與夫一切條編之數亦宜銀錢兼支以廣流布有議令殷實之家捐貲為本錢成照數抵還者是錢以利民反以擾民也宜嚴禁之一錢製每錢一文止重一錢二分較定畫一各局皆然若錢無損壞俱得通用不許擇錢俾可西可北可東可南流徧通省無虞異同始免滯礙則體式畫一法守自同但銅色宜純字畫宜端輪廓宜匀胚胎宜厚鎔煉宜精其萬厯通寳文宜仍舊不必更易一收銅銅色純黄者舊日價値多不過六分五釐此時冶鑄者價不無騰貴巴縣請以八分為凖葢就搬運之費總計之耳其說可従至招商立市以銅收贖等法宜聽各郡邑之便多方兼收各州縣官有願自買銅斤赴局親鑄宜将鑄過錢數申報府州轉報院司查考瀘州近議欲將過江之銅每十支照時價抽買一支倘於中無抑勒需索之擾人未有不樂從者此亦收銅之一便也一鑄造工匠責成子母盈縮經費多寡此時議者參差不一據巴縣身親試騐稱每銀十兩鑄而為錢除經費工本外可積息三兩但工作伊始遽難援為定例曷無令各局管理官暫自便宜從事斟酌鑄造勿以贏餘炫長勿為漏巵虧息俟錢成計算的確之日各據實開報以憑折衷著為定規一行錢錢糧除解京邊外其餘令小民納糧錢四銀六各衙門一切抵贖俱令納錢且以錢之行否定官之殿最此法一立錢未有不行者但錢行必資販戸流布其領錢千文者宜納銀一兩至在外貿易宜稍寛之以遂蠅營之私每兩加値三分可也又令各衙門明示以賑貧濟乏之義及以錢納租之等以錢贖罪之條俾錢之入者常多出者常少閭閻之閒有垂涎孔方而不可得之景象錢之行自易矣一平衡民閒毎銀一錢當易錢百文販戶㒺利心熾低昂不均小民遂以錢為不便今宜以在官法馬較定官戥令城市鄉村畫一守之常出其不意於販户所在抽兑懲治平衡則錢易行矣一通商錢法之行為便於日用之需耳行商挾重貲遊千里外囊底加千文俾傴僂不能勝矣乃勒令行錢此必不得之數也自後行市貿易自一兩而上銀錢聽其自便一禁私鑄四道各局錢式輕重俱令畫一銅色務要淨好有私造者重懲如律此禁私鑄之大要也但私鑄之風禁於錢法舉行之初易禁於錢法盛行之時難彼見錢之為利川谷之閒往往有礦可依何憚不為自後宜嚴保甲之法合里鄰不時互相稽查庶防範嚴密私鑄無所容矣一防阻滯兹行錢法奸猾之徒必先賄買吏書揑稱小民不便申文回上皆由用銀便於懐挾出入輕易受贓不覺竊盗不知今當力行戒飭但銀匠巧偽所造葉銀茴銀渣銀之𩔖低假莫辨皆此輩作俑以致愚民惟恐低銀入手換錢難售輒病錢之難行今宜將城市鄉村銀匠籍名在官互相保結十日一遞如一家傾銷低銀鄰佑知而不舉者連坐不貸庶低銀無所容而錢法自通矣皇清初年底定全川一切經費多從外省協濟其時卽宜開設鼓鑄裕國便民緣康熙九年巡撫張德地以川省土著人民未甚殷繁貢賦無多商賈往來未便攜帶一時艱於舉行俟生齒繁盛開爐鼓鑄方為有益題請暫停康熙四十七年建昌鎮杜汝崑咨稱建南黎溪分水二厰自康熙四十二年五月奉㫖開採至四十三年五月十八日止一年抽收紅白銅斤二萬五千九百二十七斤得變價銀一千四兩六錢一分解貯藩庫充餉已有成效若以本地一嵗所産之銅斤題請就本省鼓鑄則國寳源流遍及於邊荒之地而夷猓皆懽忻鼓舞㒺不遵循將黎分二厰一並題請復行開採即以抽收銅斤鼓鑄將毎年鼓鑄出息若干造册報部以充兵餉又稍減外省之協餉矣雍正七年十一月四川巡撫憲德題凖開局鼓鑄分巡松茂道鄭其儲詳陳鼔鑄事宜今列於左四川分巡松茂道鄭其儲呈為皇圖逺届聖治彌隆等事今将四川省題准開局鼔鑄錢文開厰銅礦處所安設爐座召募工匠備辦噐具并日鎔化銅鉛折耗折淨鑄出錢數扣除工料及工匠食米等項理合逐一開造呈請察核一寳川錢局一所應設在成都府省城之内先經前撫都院奏明捐買原定房屋一所共六十五閒今查前項房屋原係民房其規模様式並不可作錢局且地方狹小椽木朽壞牆垣低薄逼近居民更非嚴密之地不便於彼處設局兹選得貢院内西偏有餘地一處極其寛大嚴密宜於此設立寳川錢局一所應於大院牆内前後建房大小一百一十三間一寳川錢局設爐一十五座每爐每日化銅五十斤鉛五十斤共銅鉛一百斤一年扣除小建六日及毎月修爐一次共除一十八日不計外應作三百四十二日扣算共可化銅鉛五十一萬三千斤又每銅鉛一百斤照例折耗九斤共折耗四萬六千一百七十斤實淨銅鉛四十六萬六千八百三十斤每錢一文計重一錢四分共鑄錢五萬三千三百五十二串整一每爐銅鉛一百斤照例給工料錢一千八百二十文計銅鉛五十一萬三千斤共該工料錢九千三百三十六串六百文一查毎爐銅鉛一百斤給工料錢一千八百二十交内除毎爐鎔化銅鉛之炭火及鎔罐串繩之外餘者方為匠役工食但查奉准部文以人工食物各省貴賤不等應令確查定議具題支給等語今查川省素無諳練鼔鑄土民皆係湖廣匠役遠來投充自難减其工資况川省近年以來生齒日繁食物價直較之滇楚兩省亦不能賤應請仍照原數給發又雲南爐局現行成例毎工匠一名毎日捐給食米八合三勺今川省各官養廉僅足敷本任辦事之用無從捐給應請將前項工役食米動支正項支給查工匠三百一十五名每名每日食米八合三勺一年以三百五十四日計算共用米九百二十五石五斗三升三合應照成都兵米折價之例毎石定價銀八錢五分共銀七百八十六両七錢三釐五絲按日照數支給仍將支過銀數目按季造册報銷俟鑄出錢文之日陸續扣補還項可也四川通志巻十五下
