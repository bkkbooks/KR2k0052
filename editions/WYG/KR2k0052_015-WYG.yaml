body:
  text: 四川通志巻十五上茶法茶者南方之嘉木其産於蜀者則王褒僮約有云陽武買茶而張載孫楚之詩復盛稱之凡廣漢之趙坡合州之水南峨眉之白芽雅安之䝉頂皆珍品也自唐時囘紇入貢以馬易茶宋元因之葢以餘茶易有用之馬斯衞民與備邉兩得矣前眀斟酌繁簡陜以西川以南置茶馬司各一且減蜀中松潘之引使不礙陜之馬政故其時引行之多獨在黎邉今則邉路全通引行漸廣而凡産茶郡邑種植益繁潄水泉之清駛洩山土之肥澤微黄嫩緑香茗叢生故各屬屢有增引之請上以裕國下以通商允為經久之良法矣作茶法志唐穆宗長慶元年鹽鐡使王播議增天下茶税率百錢增五十江淮浙東西嶺南福建荆襄茶税播自領之兩川以戶部領之宋真宗大中祥符元年鹽鐡轉運使裴休請釐革横税以通舟船商旅既安課税自厚又正税茶商多被私販茶人侵奪其利今請委強幹官吏先於西蜀出茶山口布置把捉量加半税給陳首帖子令所在公行使私販者免犯法之憂正税者無失利之欺從之天禧四年天下茶皆禁惟川陜廣茶聽民自賣不得出境神宗熙寧七年始建三司幹當公事李杞入蜀經畫買茶與成都路漕司議合初蜀之茶園皆民兩税地不殖五榖惟宜種茶賦稅一例既而運茶積滯歲課不給乃建議於彭漢二州歲買布各十萬疋以布息助茶利自熙寧七年至元豐八年蜀道茶場四十一處元豐四年仍詔專以雅州名山茶為易馬用高宗建炎元年朝廷擢成都路運判趙開主管川陜茶馬事二年開至成都大更茶法印給茶引使商人即園户市茶百斤為一大引為茶市以通交易紹興四年楊輔為使遂定為法成都利州路二十三場歲産茶二千一百二萬斤熙豐以來茶司權出諸司之上是年初命四川宣撫司支茶博馬七年復置茶馬官凡買馬州縣黎文叙長南寧平珍皆與知州通判同措置任責通判許茶馬司辟置視買馬額數之盈虧而賞罰之寧宗慶元六年詔四川產茶處歲輸頭子錢五千四十道有竒又科租錢三千一百四十道有奇嘉定三年詔茶馬官各差一員分為兩司文臣成都主茶武臣興元主馬元世祖中統十四年命汪惟正置𣙜場於碉門黎州與吐番易茶至元五年用運使白賡言運成都茶於京兆鞏昌置局六年始立四川𣙜茶使司掌之十年始立四川監𣙜茶場使司定長引短引法長引帶茶一百二十斤收中統鈔五錠有竒短引帶茶九十斤收鈔四錠有竒明洪武五年置四川茶鹽都轉司令四川産茶地方每十分官取一分三十年令成都重慶保寧三府及播州宣慰司各置茶倉歲徴川中課茶貯倉召商中買與西番易馬勅戸部差行人一員於陜西河州臨洮四川碉門等處嚴諭把隘頭目不許私茶出境永樂六年勅户部陜西四川地方多有通接生番偏僻小路嚴諭把隘頭目查禁緞疋絹帛私茶青紙出境違者犯人與把隘頭目俱各從重治罪成化七年罷差行人四川廵茶並罷播州茶倉令分巡道往來禁約之嘉靖四年巡撫都御史王軌巡按御史馬紀題奉以水利僉事帶管茶法每年布政司差官赴南京請印引目五萬道送與管茶官收貯分别等第芽茶每引三錢葉茶毎引二錢聽商赴管茶官處報明給以引目照買照賣立限截角回繳禁革湖茶不許越界進貢番夷不許夾帶私茶其該賞茶斤行布政司查給茶課與税初皆本色一以易馬一以賞番至是俱折收銀兩備買茶賞番及買馬之用二十年巡撫劉大謨議茶法六條甚善僉事崔廷槐議歲引五萬因全黎地方發賣茶引太少致令各商私販反多虧損官税利入私家又各商報中茶引多在巫山建始二縣地方收買至嘉定秤驗嘉定與黎雅逼近各商夾帶私茶到彼易於展轉越入通番奸弊蝟興除廣餘茶有礙律例外今依題准五萬引數聽商報中收買委官於巫山縣以上䕫州府扼吭之處秤盤撥運至嘉定州地方黒水尾委官再秤雅州又復盤驗方分撥天全黎州地方照時價發賣如議舉行隆慶三年巡撫嚴清題疏本省每年戸部關引五萬道半塡芽茶半塡葉茶以二萬六千道為腹引每引芽茶三錢葉茶二錢二萬四千道為邊引内一萬九千八百道給黎雅各商每引芽茶三錢八分葉茶二錢五分二百道給本地思經羅純產茶處所土民每引芽茶七錢六分葉茶五錢松潘四千道税與腹引同共税銀一萬三千八百六十三兩然邊引報中者多恒苦不足腹引常置於無用之地葢向來腹多邊少者無非謹中外之防也然腹地有茶而漢人或可無茶邊地無茶番人或不可無茶故邊引易行而腹引常滯先此議茶法者曰茶乃畨人之命不宜多給以存羈縻節制之意是矣乃邊引愈少私販愈多祇為奸人作私屯耳又曰四川茶法不縮即陜西馬政有妨此猶未深考夫番地最廣近者彌月遠者彌年陜西洮岷與松潘接境與黎雅邈不相及今不增松潘而増黎雅之引於陜西馬政何妨自隆慶三年始將原引五萬減去一萬二千道於黎雅邊引加一萬道每引量加一錢税銀已充舊額而邊腹相安矣監察御史王廷瞻會題每年茶引三萬八千道内将三萬道作黎雅邊引除二百道產茶地方報中每引照舊芽茶七錢六分葉茶五錢給思經羅純二萬九千八百道給商每引芽茶四錢八分葉茶三錢五分比舊俱增一錢四千道給松邊四千道腹引照舊芽茶三錢葉茶二錢通計一萬四千二百六十七兩萬厯三年巡撫曾省吾題准將驛傳鹽法茶水利合為一道又於黎雅邊引内除四百九道給思羅茶戸納税商人止二萬九千三百九十一道矣按洪武中命秦蜀歲収巴茶聽西番商人以馬易之大扺茶四十斤易馬一匹故曹國公以茶五十餘萬斤易馬一萬三千五百十八匹中國頗獲其利其後私茶出境馬價遂高乃差行人禁約永樂至成化歲以為常厥後或令布政司委官或令按察司分巡官雖沿革不同而以巡視禁茶則一也厥後法弛人玩朝廷雖禁之而權要私主之致令商旅滿關隘茶船徧江河每茶百斤私稅白銀二錢或金五分一年所得不下五六萬兩以是而歸之官不愈於塡私藏哉或曰此路不開恐陜西之馬益貴殊不知陜西四川茶路各異今四川名雖禁茶實未禁也而陜西之馬未聞甚貴若以為終非舊制則舊制之所以禁茶者止恐私茶多而馬貴也今四川既不易馬何故而禁茶哉或又謂恐惹邊釁目今官徴其税則當禁彼勿得重徴何釁之有自宋元至成化皆資是以裕國用古之人獨無所見哉巡撫都御史劉大謨博采茶議天下之事窮則變變則通通則久水塞則決之琴瑟不調則更張之是可以語變通矣變通者權之謂也國初定鼎維州松州河州有茶馬互市馬之資於此者纔千百之十一耳永樂以後騏驥駿騮盡冀北之羣平凉專設憲臣以提督茶馬遼東山西甘州之團牧直𨽻河南山東之騍種皆材之良而馬之產於南者不復入閑於是乎四川茶馬之法壞矣然番人乳酪腥羶之食匪茶則病憊立至而我之借以控制生番者在茶於是乎互市之名處之而善公私可得數十萬金此非取之於民而加之賦者也自權法者失化裁推移之意坐失厚利釀成弊穴可嘆也慎引目時秤驗謹關防重委官廣餘茶嚴互市憲典司存也然首尾畢舉而後可以言令舉之而遺其細末焉猶夫弊也甚哉權之難行也曷為慎引目也茶法之引司徒令甲也其通塞多寡會典移案俱載也自越渡賂放而後有無引之茶自冒給影射而後有無茶之引無引之茶人所知也無茶之引則奸人乘機冒給買窩於遠商至數十千百張證驗之難而易於作弊也今下令曰某月日開中聚四方之商而審其年貎籍貫填内號以付秤驗之官給外號以備官津盤詰取寄住里鄰店戸之結以防入山影射不行退繳盡所開之數量多寡而均給之芽茶十之七葉茶十之三區畫引價比舊或少增焉持之恒久冒濫可絶矣曷為時秤驗也秤驗之不時奸弊之必滋語曰事久生奸以此今聚數百艘鱗次水濱而後請官請之數日而後差官差之數十日而後臨按推托展轉比莅事且數月矣背負撑駕私竊趨利者可勝計哉今下令曰始十月朔終明年三月晦茶船以次抵嘉定比其至石馬也巡司具數逹委官所委官即黒水尾挨帮秤驗立票照放辰而至午而行移時畢事如法處分過期不及期者懲之以法奸利何從而生哉曷為謹關防也嘉定三江自越巂來者曰沬江自雅州來者曰青衣江自瀘口來者曰錦江三江合流中有州曰黒水尾古之黑水尾秤掣批驗所也青衣江與沫江合曰觀音灘由灘而上曰浮橋口勝國時造舟為梁而扃鑰之茶船由黑水尾驗訖則啓浮梁橋放行至愼重也今船泊漁村則已近浮梁口矣何所關防乎江河變遷浮梁不可作黒水尾尚存也不於此地秤驗已失扼吭之機矣今下令曰茶船至石馬星馳呈報所司於黒水尾秤驗如法押送漁村轉發雅州交易沿途防範越渡私帶者如律設以法影射私竊勢不相及矣曷為重委官也處脂膏不能自潤者有幾利之所在義士視之如酖毒貪夫視之如旨酒弄文法壞典章墮官箴輔之以狙獪之徒詭祕尤甚鮮有不中其機者於凉作法且恐其渝而可不慎哉今下令曰所轄即府佐若州縣正官初任精敏廉能懋著可期遠到者撫巡會委一人以十月至嘉定弛張先後一切付之事竣返任不負委托者明揚之即九江蕪湖荆州臨清歲𣙜不過萬金猶攝以主事一人欽依差遣而秤驗者茍得其人歲可入數萬金矣又何輕重之不權哉曷為廣餘茶也每引約收若干曰餘茶取其値以輸之官纔毫毛耳而無引私茶總若干萬石則巧為影射利歸私門致損公府此無他法嚴而固執也法嚴則人畏避之固執則人巧避之語曰倖門如䑕穴葢傷之也夫私茶至五百斤入官仍擬充軍夫人不難於充軍而難於入官今准鹽法引外帶者曰餘茶一引聽納銀倍加引價免問彼將幸其免罪而慶獲茶且胥吏之羅織羣小之恐嚇潛消焉是曷不趨吾令哉即一歲可獲萬金矣夫餘茶行則利入府藏公私兩便在察識而推廣之耳曷為嚴互市也西番互市一由黎州一由碉門今中分其引以兩通之其法甚善但奸人玩法潛入番境者責在安撫招討司也今下令曰諸番入市聽商人兩平於信地交易越境通番者法無赦招討安撫司縱令出入者連坐通把該吏撥置者如之禁欺誘戒搶奪推誠懷之亦三表五餌之餘也余既為此議客有告余曰為學而言利不明於義也謀國而言利不良於法也曰甚哉權之難也大學絜矩理財為先周官會計財用為急周公孔子未嘗不言之久矣國之需於財也此議之行取之商不取之農取之裔土不取之田賦有抑末之理焉有懷遠之道焉公而匪私義而匪利也用是計之云巡撫都御史尹同臯茶法條議為茶法事照得四川每年原額茶引三萬八千道於南都請領歲費三百多金在邊引湖茶每道納銀四錢七分五釐歲額行二萬九千八百道又每年額發該州青城茶地畝茶引二百道每道稅銀六錢三分係雅州採買此舊例也數年前猶未阻滯近年州縣私票公行僅得税一錢七分或二錢便爾給發奸人利其價少致正引不行夫課何以縮則以土茶多而私茶之盛行也私茶何以盛行則以土棍刁而湖商之不敵也湖商固以引行茶者有引者日弱日減無引者日强日增課又安得不縮知其所繇縮而其所繇復可知嘗稽賦役書册茶税之立也夷人多食乳酪以茶為命濫與貿易恐輕視天朝故茶法從來慎重茶法中引一道照茶百斤無引即係私茶斤兩違禁則律有明條邇者雅州榮經縣土產茶多而思羅店戸又皆本地神棍上蔽官府下挾孤商兼以地方官不自振刷輒為私税所濡不能弊絶風清自非立湔積弊國課何濟相應開欵查議為此牌仰該道官吏即将後開條欵逐一再加查議應釐剔者查實釐剔應議詳者查實議詳迅速具報毋得遲違一本院新立法令州縣各官不寄耳目於衙役不受簧鼓於學霸俾思羅店戸不得逞其奸榮雅地虎不得張其焰止從實開報是為第一議一嚴收草凡收草之家或三五百擔或一二百擔數甚夥矣須祕密神速差官細訪如已經收草數百擔之家匿而不報明為勘實入官懲治照數報引舉一儆百其餘難概治者務要黨正鄰佑甘結以求的實報引有通同隱漏者許諸人指實呈首但事機一漏恐即遷移規避雅州榮經等處一時併行出其不意方得實跡一先給引凡做茶必照湖茶如數給引茶行日送州縣秤驗截角繳引其踹茶時必要鄰佑及踹茶之人豫遞如數甘結以防暗帶凡在榮經縣及思經羅純地方等處私踹者不能查理即係私茶須許人呈首治罪且碉門係土司地方近有商販潛住彼處做茶亦當出示嚴禁一禁透漏如思經有榮經摸地之小販羅純有碉門越境之私路晝夜皆送不計其數往年亦為禁革但屬虛文務要着實舉行差人嚴緝以拿獲計功即将私茶充賞一禁小販凡做茶以給引為主有隨販隨做或三五十擔或一二十擔不時運發難以查理必一概嚴禁毋許踹茶之人代為私茶一思羅店戸凡遇官有禁諭視為生理動牽舊騙而未滿志者或私忿而未快意者多以曾經做茶為辭肆行勒騙其見在做茶之家反隱充私槖須嚴查實在思羅店戸凡有禁諭毋得牽扯抵塞止以見在收草買茶者一一實報以便查理一嚴查未完茶税歷年欠至三萬一千四百三十五兩四錢八分五釐思羅引税亦縮一百五十五兩天啓四五兩年分公然不納該道嚴行查實掌印官是何人承行吏書是何人店戸是何人經紀是何人番人之不能不用茶猶華人之不能不用鹽也何以至今遂斷絶不行一􅆕究處一􅆕嚴催一立循環簿凡出茶州縣各置立循環簿六本二送本院二送本司二送該道各印發收存每季給領同載賣茶應徴税銀目逐一挨順備細登塡按季差吏赴比如此行後官再有私票民再有私販或被人告發或别有風聞一體治罪皇清四川省原額新增邊腹土引茶課茶税銀兩數目以及收買發賣州縣逐一分晰備載於左成都府屬成都縣原額邊引二千二百六十張毎張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀一千六十六兩七錢二分每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二百八十二兩五錢於灌縣彭縣汶川等縣買茶至松潘發賣原額腹引四百張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀一百兩每張運茶一百斤隨帶附茶一十四斤共𣙜課銀五十兩於洪雅縣大邑縣灌縣彭縣等縣買茶至本縣發賣華陽縣原額邊引七百五十張每張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀三百五十四兩每張運茶一百斤隨帶附茶一十四斤共𣙜課銀九十三兩七錢五分於灌縣彭縣買茶至松潘發賣原額腹引二百二十張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀五十五兩每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二十七兩五錢於大邑縣洪雅縣買茶至華陽縣新都縣雙流縣簡州安岳縣樂至縣等州縣發賣新津縣原額邊引六十張每張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀二十八兩二錢二分每張運茶一百斤隨帶附茶一十四斤共𣙜課銀七兩五錢於大邑縣買茶至松潘發賣溫江縣原額邊引二十張毎張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀九兩四錢四分每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二兩五錢於大邑縣買茶至本縣發賣灌縣原額邊引二千一百二十八張每張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀一千零四兩四錢一分六釐每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二百六十六兩於本縣買茶至松潘發賣原額腹引六十二張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀一十五兩五錢每張運茶一百斤隨帶附茶一十四斤共𣙜課銀七兩七錢五分於本縣買茶至保縣發賣新增代銷通江縣邊引五十張巴州邊引一百張南江縣邊引五十張共邊引二百張徴税銀九十四兩四錢共𣙜課銀二十五兩於本縣買茶至松潘發賣崇慶州原額腹引一百零八張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀二十七兩每張運茶一百斤隨帶附茶一十四斤共𣙜課銀一十三兩五錢於本州買茶在本州發賣新繁縣原額腹引二十張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀五兩每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二兩五錢於彭縣買茶至本縣發賣彭縣原額邊引二千二百二十六張每張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀一千五十兩六錢七分二釐每張運茶一百斤隨帶附茶一十四斤共𣙜課銀二百七十八兩二錢五分於本縣買茶至松潘發賣原額腹引六十一張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀一十五兩二錢五分每張運茶一百斤隨帶附茶一十四斤共𣙜課銀七兩六錢二分五釐於本縣買茶至保縣發賣什邡縣原額邊引九十九張每張𣙜課銀一錢二分五釐徴税銀四錢七分二釐共徴税銀四十六兩七錢二分八釐每張運茶一百斤隨帶附茶一十四斤共𣙜課銀一十二兩三錢七分五釐於本縣買茶至松潘發賣原額腹引八十一張每張𣙜課銀一錢二分五釐徴税銀二錢五分共徴税銀二十兩二錢五分每張運茶一百斤隨帶附茶一十四斤共𣙜課銀十兩零一錢二分五釐於本縣買茶至保縣發賣新增腹引一百二十張徴税銀三十兩𣙜課銀一十五兩於本縣買茶至中江縣徳陽縣漢州資州等州縣發賣漢州新增腹引二十張每張𣙜課銀一錢二分五釐徴税銀