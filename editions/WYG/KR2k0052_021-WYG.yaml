勒無人户柴草有五十里中庭山下有人戸柴草二十里江達橋有人户柴草四十里江勒根則無人户柴草有五十里樹丫塘無人户柴草有四十里阿王宗無人户柴草有四十五里結塘無人户柴草有六十里結述賓卡有人户喇嘛寺柴草有五十里三大崩宫有人户柴有草㣲五十里剛達奔巴無人户柴草有四十里殷巴無人户柴草有四十里喇里有人户喇嘛寺柴草有以上共一千二百三十里約有二千里喇里三十里五馬多喇里至藏此亦草地若行内路則必由工布江達路頗﨑嶇以至墨竹工卡合路無人戸柴草有三十里吝窩馬無人户柴微草有六十里足谷松多亦草地宜於夏秋冬則大雪難行無人戸柴微草有五十五里行噶兒嚢無人户柴㣲草有七十里上竹工有人戸喇嘛寺柴草有六十里下竹工有人户喇嘛寺柴草有七十里墨竹工卡有人户喇嘛寺柴草有六十里出欲有人户柴草有三十里栁林渡河有人户喇嘛寺逺柴有草㣲二十里羊入井有人戸柴草有五十里喇撒以上共五百三十里約有八百里以上通共四千五百八十五里約有五千里聖祖仁皇帝御製瀘定橋碑記載藝文聖祖仁皇帝御製平定西蔵碑記載藝文康熈六十年二月初四日撫逺大將軍王摺奏奉上諭朕於地理従幼留心凡古今山川名號無論邉徼遐荒必詳考圖籍廣詢方言乃得其真故遣使臣至崑崙西番諸處凡大江黄河黒水金沙瀾滄諸水發源之地皆目撃詳求載入輿圖今大兵得蔵邊外諸番悉心歸化三蔵阿里之地俱入版圖其山川名號番漢異同當於時考証明核庶可傳信於後大概中國諸水皆發源於東南大幹内外其原委可得而縷晰也黄河之源出西寧徼外枯爾坤山之東衆泉流出沮洳渙散不可勝數望之燦如列星䝉古名敖敦他拉西番名蘇羅木譯言星宿海也是為河源匯為查靈鄂靈二湖東南行折北復東行由歸徳堡積石關入蘭州岷江之源出於黄河之西巴顔哈拉嶺七七勒哈納番名岷揑撮漢書所謂岷山在西徼外江水所出是也而禹貢導江之處在今四川黄勝關外名楮山古人謂江源與河源相近禹貢岷山導江乃引其流非源斯言實有可據其水自黄勝關流入至灌縣分數十岐至新津縣復合為一東南流至敘州府金沙江入之又金沙江之源自達賴喇嘛東北烏揑烏蘇流出烏揑烏蘇譯言乳牛山也其水名烏魯烏蘇東南流入喀木地又東南流逕中甸入雲南塔城闗名金沙江至麗江府亦名麗江至永北府㑹打冲河東流經武定府入四川界至叙州府合岷江流經䕫州府入湖廣境由荆州府至武昌府與漢江合漢江源出陕西寧羌州北嶓冢山名漾水東流至南鄭縣為漢水入湖廣界東南流至漢陽縣漢口合岷山江此水自東南大幹之内故發源於西番流入中國也瀾滄江有二源一源於喀木之噶爾機雜噶爾山名雜楮河一源於喀木之濟魯肯他拉名敖母楮河二水㑹於乂木廟之南名拉克楮河流入雲南境為瀾滄江南流至車里宣撫司名九龍江流入緬國瀾滄之西為哈拉烏蘇即禹貢之黒水今雲南所謂潞江也其水自達頼喇嘛東北哈拉腦兒流出東南入喀木界又東南流入怒夷界為怒江入雲南大唐隘名潞江南流經永昌府潞江安撫司境入緬國潞江之西為龍川江龍川江之源従喀木所屬春多嶺流出南流入大唐隘西流為龍川江至漢龍闗入緬國此諸水在東南大幹之外故皆流入南海也又雲南邉境有檳榔江者其源發自阿里斯之岡底斯東打母朱喀巴珀山譯言馬口也有泉流出為牙母藏布江従南折東流經藏危地過日噶公遙兒城傍合噶兒諾母倫江之南流工布部落地入雲南古勇州為檳榔江出鐵壁關入緬國而岡底斯之南有山名即干喀巴珀譯言象口也有泉流出入馬品母達賴腦兒又流入郎喀腦兒兩湖之水西流至桑納池岡底斯之北有山名生格喀巴珀譯言獅子口也有泉流出西亦至桑納池二水合而南行又折東行至那克拉蘇母多地與岡底斯西馬珀家喀巴珀山之水㑹馬珀家喀巴珀者譯言孔雀口也其水南行至那克拉母多地㑹東行之水東南流至厄納忒克國為岡噶母倫江即佛書所謂恒河也佛國紀載魏法顯順恒河入南海至山東之渤海入口應即此水矣梵書言四大水出於阿耨達山下有阿耨達池以今考之即岡底斯是唐古特稱岡底斯者猶言衆山水之根與釋典之言相合岡底斯之南有二湖接連土人相傳為西王母瑤池意即阿耨達池也又梵書言普陀山有三一在厄納忒克之正南海中山上有石天官觀自在菩薩遊舍是乃真普陀一在浙江之定海縣海中謂善才第二十八叅觀音菩薩設法處一在圖白忒今番名布達拉山亦為觀音化現之處釋氏之書本自西域故於彼地山川頗可引為據也禹貢導黒水至於三危舊註以三危為山名而不知其所在朕今始考其實三危者猶中國之三省也打箭爐之西南達賴喇嘛所屬拉里城之東南為喀木地達賴喇嘛為危地班禪苦圖克兔所屬為藏地合三地為三危耳哈喇烏蘇由其地入海故曰導黒水至於三危入於南海也至於諸番名號與史傳不同而亦有可據者今之圖白忒卽唐之突厥唐太宗時以公主下降公主供佛像於廟今番人名詔詔者譯言如来也其地猶有唐時中國載去佛像明成化時烏斯藏大寳法王來朝辭歸時以半駕鹵簿送之遣内監䕶行内監至四川邉境即不能前進而返畱其儀仗於佛廟至今往来之人多有見之此載於明實錄者爾等將山川地名詳細改正具奏御製惠逺廟碑文載藝文定西將軍噶爾弼平定西藏碑記聖天子統御中外覆育萬方文徳覃敷化自古難化之族武功赫濯闢従来未闢之疆允矣澤被無雷威周出日凡秉血氣莫不尊親獨澤旺阿拉布坦蠢爾無知自外生成逞井蛙之見肆螳臂之雄暗令車零敦多布等戕害喇藏荼毒生靈邊臣奏報上厪宸衷軫此荒隅陷於水火爰命撫逺大将軍王親統貔貅駐節木魯烏蘇居中調度指授機宜遣平逆将軍延信由苦苦兒塞一路進𠞰命臣噶爾弼統領川滇荆楚江浙滿漢官兵由蜀進𠞰於康熈五十九年四月十六日自成都拜䟽起程出蜀之打箭爐􅂻塘巴塘以至乍丫乂木多㑹集滇兵整隊進發一由類伍齊結結樹冰噶三達奔三為正兵一由洛隆宗碩般多達隆宗沙弓喇弩弓喇為竒兵訂期㑹取喇里竹工墨竹工卡一帶地方宣佈天朝恩威曉以順逆大義撫歸戮叛敗散賊番降服凖噶爾委授之藏王達格咱碟巴阿角喇復坦兵不血刃於八月二十三日直抵詔地封倉庫以待西師撫僧俗而寧佛土招回哈喇烏蘇助逆之蠻兵斷彼喇撒達木餽賊之糧道西師在前我兵在後而車零敦多布等援散食絶力竭勢窮狼奔鼠竄戢影逺遁由是西来之達賴喇嘛得於九月望日抵藏坐牀僧俗皈依逺邇傾嚮歡聲振天梵音匝地共祝聖壽無疆河山鞏固此皆上賴廟謨𢎞逺徳威遐震下仗諸臣佈置有方糗糧充裕更兼將士奮勇志切同讐所以道經五千履危峰雪嶺有如平地時歴四月冒蠻烟瘴雨而甘之若飴壯氣凌雲直入亙古師旅未到之絶域而成此克捷之功也勒之豐碑恭紀道塗年月云爾銘曰天地為界日月為期一洗塵氛永靖荒裔定西將軍噶爾弼平定西蔵疏兵部為欽奉上諭事據定西將軍噶爾弼等謹奏聞為取定詔地事従前将拉里地方攻取奏聞臣等領兵暫且在拉里地方喂養馬匹住扎與平逆將軍約㑹再行進取詔地在案我們差往打聴信息之人回来稟稱竹工之苦圖克兔迎来歸順今推木品宰桑帶領凖噶爾之兵六百名蠻兵二千名在於噶兒招母倫之渡口堅守墨竹工卡章名兒自榮所前来與我們之兵對敵聞聴竹工苦圖克兔暫行歸順臣即與衆人商議我們若住扎仍等約㑹日期倘或推木品前来将噶兒招母倫之渡口墨竹工卡監守将歸順我們之人俱驚怕更變則坐失事機必致有悞我們即行起身俟推木品未能措及之先不若将墨竹工卡噶兒招母倫之渡口攻取再等候西寧之兵一同前進如此議定即將滿漢兵内挑選三十名扮為唐古特之人先行差往打探信息此際工布之碟巴等親身前来稟稱我等遵奉将軍之令帶領工布兵二千名在於工布加木打地方下營情愿一同効力等語臣等逐一賞賜令千總趙儒碟巴集古爾将銀緞等物拿去前往工布加木打地方將工布之兵逐一賞賜八月十六日在於墨竹工卡地方約會已經差去臣等帶領滿漢官兵於八月初六日自拉里起身到工卡爾拉地方竹工之苦圖克兔将伊地方人口數目冊籍呈送迎来歸順已到竹工地方據我們従前差去之滿漢兵稟稱墨竹工卡兒地方有唐古特之兵榮梭䝉古兵共有千餘名俱行安營並無推木品之兵信息次日起身到墨竹工卡地方據前行之先鋒稟稱前邊扎營之賊聞我們之兵到来俱行撤散現今彼處無兵等語因此臣等即行前去将墨竹工卡攻取碟巴達哇等俱行賞賜安民據差往噶兒招母倫渡口騐看船隻之通事查錯阿喇木巴等稟稱渡口無有船隻問村庄人等俱回稱船隻俱被碟巴打克渣収去推木品宰桑找尋車零敦多布已回當木地方渡口等處碟巴打克渣㑹積聚二三千名蠻兵扎營聞知大兵取了墨竹工卡地方兵丁俱已潰散碟巴打克渣情愿逃往沙漠地方臣等即差千總趙儒碟巴集古爾前往碟巴打克渣曉諭爾原受聖恩之人今聖主廣施法教救護唐古特之人差兵前来是為爾等速行歸順如若仍然兩意不順即差兵将爾拿来問罪如此差去碟巴打克渣自沙漠野地方又潛逃回家前往搜尋明白曉諭如不歸順即行拿訊因此碟巴打克渣同趙儒集古爾一同過噶兒招母倫前来歸順接續喇嘛中古兒達哇等相繼歸順前来㸔来此處唐古特俱甚是恭敬碟巴凡事俱遵碟巴打克渣指使行事因此将碟巴打克渣暫行款待令其在我們營中駐扎探聴凖噶爾賊人信息俱前往達嗎哈喇烏蘇等處地方接我們西寧一路兵馬前去伊等所食糧餉俱係碟巴打克渣自詔地攢凑送去詔地凖噶爾之喇嘛甚多此内亦有車零敦多布甚是靠用之人碟巴打克渣雖經歸順不可信服臣等僉議得詔地地方乃凖噶爾賊人根基我們速行由噶兒招母倫過去攻取詔地將伊巢穴佔住四面路口堅守斷賊糧道凖噶爾調来之唐古特兵丁暗地差人前去令其各散挑選兵馬迎接西寧一路之兵前来幇助使凖噶爾之賊兵首尾不能相顧合力易於𠞰滅令碟巴打克渣傳聚皮船於八月二十三日過河即分隊令二等侍衛那沁郎中鄂理等帶領滿漢官兵作第一隊臣與都統五哥帶領滿漢官兵作第二隊副都統吳那哈總兵官趙坤馬㑹伯等帶領滿漢官兵作第三隊於二十三日五更進兵将詔地攻取詔地所有大小碟巴等布来崩等寺廟之喇嘛聚集将聖主廣施法教救護圖伯忒愛蠻衆民之至意宣諭衆碟巴民人喇嘛俱跪稟䝉聖主之恩享受安逸自凖噶爾人等前来将我們遭害以致殘壊天朝大兵到来我們衆唐古特愛蠻人等得復見天日紛紛歡恱舉掌叩首臣等將詔地所有之達賴喇嘛倉庫盡行封謹住於詔地堅固地方安營於相通四面道路俱派兵堅守斷絶凖噶爾往来之人運糧道路又為唐古特字様用碟巴打克渣印信将車零敦多布處所有唐古特之兵暗地差人前去令其各散派緑旂官兵前往噶爾旦色喇布来崩等廟内有喀木布等曉諭凖噶爾喇嘛凖噶爾喇嘛等幇護車零敦多布毀壊法教将唐古特人等殘燬爾等即行舉出與爾等出家之人無涉若隠藏一名俱歸罪於伊等因此三個廟内喀木布衆喇嘛將廟内所有一百一名凖噶爾喇嘛舉出内有為首者五名喇嘛碟巴打克渣各廟堪布等俱稱伊等係車零敦多布甚是靠用之人詢問此五名喇嘛即行斬戮其餘九十六名凖噶爾喇嘛盡行収禁詔地監内臣等挑選滿漢兵整頓馬匹即前往迎接平逆將軍延信之兵幇護合力𠞰滅賊冦外為此謹奏等因奉㫖将軍噶爾弼将得詔地奏摺即鈔寫發往大将軍王将軍富寧安傅爾丹竒立徳盛京三處将軍江南杭州荆州西安右衛将軍各省督撫提鎮欽此附唐徳宗御製西蔵碑文唐文武孝徳皇帝撰大蕃神聖贊普舅甥二主商議社稷如一統立太和盟約永無淪替神人皆以證知世世代代使其稱讚是以盟文即日闕四字之闕二字文武孝徳皇帝與大蕃神聖普綺之黎賛陛下二聖舅甥睿哲鴻被曉世運之屯亨憫生靈之塗炭其無内外商議叶同務令萬姓安闕二字恩如一成又闕一字大闕十八字燕義二國所守見管封疆闕二字屬大唐國界其界以西方是大蕃境土彼此不為殺敵不舉兵革不相侵謀闕二字或有猜阻挺生問事訖給以衣糧放歸今社闕十一字舅甥相安之義不朽每須通傳彼此相倚一任闕七字路蕃漢臣以将軍闕三字其綏氏柵已東大唐祇應清水縣以西大蕃供應舅甥親近之後使其兩界烟塵不揚闕四字之名須無驚恐之患闕一字人情闕一字鄉闕一字俱安如斯樂業之闕一字恩萬代或有闕一字美之聲徧於日月所照矣蕃於蕃國受安漢亦漢國受樂兹乃合其大業耳闕一字依此盟誓永久不得私易然三寳及諸賢並日月星辰闕十二字約闕二字於陳刑之此大闕三字倘不依此誓蕃漢闕八字破盟者来其殃禍也仍須闕五字盡為隂謀者不在破盟之限蕃漢君臣並稽古立誓周細為文闕八字紀功碑在大卜喇巖前朝代年號未詳上刻雲山為劒風樹為旂用彰我武永靖邊夷四川通志卷二十一
