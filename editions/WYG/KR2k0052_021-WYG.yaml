body:
  text: 四川通志卷二十一西域昇平之世重譯来賓者未嘗拒而逺之所以示懐柔昭度量也三藏僻居西海前代遣使徒事羈縻從未内附我國家聲教洋溢遐邇無遺如大渡以西萬有餘里咸稽顙輸誠嵗時入貢於以見聖朝一道同風之治為千古所莫及兹為列其山川紀其風土人物以備職方覺越裳獻雉西旅貢獒未足專美於成周也作西域志打箭爐昔為南詔地自後漢諸葛武侯征孟獲時遣將郭達往彼處造箭因名係青海部落於前明永樂五年土目阿旺堅叅向化歸誠授為長河西魚通寧逺軍民宣慰使司頒給印信號紙世代承襲國朝因之於康熙三十九年被藏差營官昌側集烈等戕害佔據化林營叅将李麟守備王滿江詳請進𠞰提督唐希順會疏具題聖祖仁皇帝特遣四川提督唐希順帶領川省標鎮恊營官兵進𠞰隨即克復河西之猴子坡扯索咱威杵泥子牛磨威楚壩咱哩烹壩等處昌側集烈等預㑹藏屬乍丫工布番兵哨聚磨西靣大岡等處恃險負隅禦敵官兵提督唐希順親督官兵大破之殺死助逆藏番無數暨營官昌側集烈等直抵打箭爐安撫被害漢土人民其喇嘛番民率衆歡呼跪地歸附已故長河西魚通寧逺軍民宣慰司蛇蜡吒吧乏嗣其妻工喀承襲即今現任土司堅叅達結之外祖母管轄打箭爐十三鍋庄夷民約束新附土司及土千百戸五十六員三年上納貢馬每年徵觧雜糧漢番商賈畢集設監督一員以榷税課設雅州府同知一員分駐其地以理夷情一如郡縣之制星野天文井鬼分野疆域在布政司西南一千二十里東西距六百四十里南北距八百三十里東至瀘定橋交冷邊界一百二十里西至瞻對抵熱泥界五百二十里南至雅龍江中渡交裡塘界二百八十里北至小金川界五百五十里東南至寧逺府冕寧縣界五百里西南至喇滚抵熱桑江邊界四百八十里東北至金川司界四百五十里西北至甘孜宜隆界四百八十里形勢層巒峻嶺峭壁懸巖中隔爐河勢最險要城池阜和營石城週一百四十五丈計八分有竒門樓凡三在爐東北雍正八年建關隘大卡在爐東栁楊卡在爐東三十里俱康熙四十一年設盤查貨物徵收啇稅戸口康熙四十年復設明正司原額户口四百六十户外所轄各土司戶口總計二萬四百二十四户二共戸口二萬八百八十四户貢賦康熙四十年復設明正司原額雜糧折徵銀一百六十二兩雍正三年招撫口外等處番民認納貢馬雜糧每嵗折徵銀通共四千零九兩八錢五分原在化林營徵收今設同知各番糧歸該明正土司催收彚觧撥充泰寧協營兵餉津梁上橋中橋下橋俱在爐城内公出橋在爐南三里塘舖沈抗在爐東十五里栁楊在爐東三十里大藏在爐東四十里折多在爐東南八十里提茹在爐東南一百二十里惡洛在爐東南一百七十里臥龍石在爐東南二百二十里八角樓在爐東南二百七十里中渡在爐東南三百二十里裡塘交界山川南無脊山在爐東一百里髙五百餘丈金釵在爐東七里險窄巉巖大岡山在爐東八十里高陡盤折郭達山在爐東北一里髙七百餘丈時有青羊繞山而行呵喇穆公山在爐西髙八百餘丈折多山在爐南進蔵要道大蓋雪山在爐北八十里瀘河源出折多山西南東流七十里至爐雅納溝河源出大蓋雪山西北南流八十里至爐與瀘河㑹又七十里入魚通河古蹟郭達山相傳漢諸葛武侯七擒孟獲時命郭達至爐於沙哇納安爐造箭因名溫泉在爐東南五十里榆林旁水性溫煖四時不竭浴之能除積疾祠廟關帝廟在爐城河東武侯祠在爐城河東郭達廟在爐城河西達賴喇嘛廟在爐城西北噶達去爐二百四十里雍正七年奉勅建廟逺賜名惠公署監督課稅衙署康熙四十一年建新設分防同知兼管驛務衙署雍正七年設即裁并關差喇嘛舊署瀘定橋巡檢衙署阜和營都司衙署把總衙署驛丞衙署今裁寺觀漢人寺在爐河東喇嘛寺在爐河西漢名報國寺職官欽差管理打箭爐稅課監督一員分防同知一員巡檢一員泰寧協副将一員都司一員千總一員把總一員以上駐劄噶達阜和營都司一員把總一員徳靖營都司一員把總一員以上駐劄中渡寧安營都司一員把總一員以上駐劄靈雀寺上渡汛防千總一員下渡汛防千總一員吹音堡汛防千總一員明正宣慰土司一員風俗夷風原陋男女瀆倫今革舊從新淳良成俗管轄地方明正宣慰司堅叅達結安撫司六綽斯甲側冷滚布住牧單東革什咱七立端朱住牧把底囊錯住牧喇滾丹正邦住牧喇滚副安撫革松結住牧瞻對側冷滚布住牧土千户一咱哩古天錫住牧土百戶四十八姆朱阿拉烏金住牧八烏籠羅藏丙朱住牧藥攘烏金烹錯住牧吉增沙加平住牧本噶朱得結住牧作蘇䇿江初扎什住牧格窪卡桑結林琴住牧八哩籠堅忠住牧拉里奪牙崩錯喇碟住牧沙卡洛藏林琴住牧瓦七革松七立住牧呷那工弄噶納汪住牧白桑郎結住牧惡洛七林平住牧扒桑甲呷七立住牧惡熱沙甲三朱住牧索窩籠巴工噶打結住牧他咳格冗塔住牧惡拉希落金巴住牧上渡噶喇住索工布七立住牧初把出丁交住牧下渣壩木藏石扎巴呷住牧中渣壩熱錯姜初台住牧中渣壩業窪石唵中住牧中渣壩沱羊馬七立住牧中渡啞出卡賈甲七立住牧上渣壩惡疊騷大住牧上渣壩卓泥革松七立住牧上八義雍中多兒濟住牧白隅郎結七立住牧下八義沙加七立住牧沙悞石沙加七立住牧梭布喳胎住牧長結松歸雍中交住牧昌拉加蓋住牧堅正扎什住牧祖布七林住牧魯蜜東谷囊卡朱住牧長結杵尖郎結大住牧達嗎八馬䇿結住牧格桑丁巴住牧郭宗安初住牧本滾納卜住牧卓籠白馬汪丁住牧魯蜜達則卡交住牧普其碟八佈他住牧結藏䝉他兒住牧木轆騷大交住牧物産青稞牦牛山羊酥油裡塘在打箭爐之