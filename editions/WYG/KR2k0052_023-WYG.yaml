body:
  text: 四川通志卷二十三山川天地之氣結而為山融而為水其經緯流峙之迹固兩間之脈絡所為顯呈其象也蜀自大禹隨刋岷嶓而外有峩眉劒門遥與太華爭其秀異至江水則發源於岷山逺近衆流奔㑹經渝城過三峽而趨海若以朝宗焉以故神氣勃發地靈人傑山水之竒固已甲於天下矣至於奠麗一方安瀾萬里更足徴其獻瑞呈祥効靈於盛世則凡人力所通莫不梯航而共戴尊親云爾作山川志成都府成都縣附郭武擔山在城内西北隅後漢方術傳公孫述時武擔山折蜀記武都山精化為女子蜀王開明納為妃不習水土而死王遣五丁于武都山擔土為冢盖地數畝髙七丈上有石厚五寸徑五尺瑩潔號曰石鏡用表其門又傳成都内及毘橋側有一折石長二丈云是五丁擔也三國志漢昭烈即位于武擔山之南即此裴松之日在縣西北章懐太子曰在縣北二百步明蜀府建于其陽宋興山在縣北三十里昇仙山在縣北十里一名星宿山唐咸通十一年南詔宼成都將軍宋威敗之蠻退保星宿山梁開平二年王建講武于星宿山即此威鳳山在縣北十八里一名石斛山蜀後主禪嘗習射于此又名學射山唐光啓三年王建攻陳敬瑄拔漢州進軍學射敗敬瑄將句惟立遂攻彭州同文淵錄成都燕㑹一春為常然各有定處惟上已學射山之集為盛天回山在縣北三十里舊名天隳唐明皇幸蜀至此及聞長安平車駕乃回因更名下有天回鎮龍華山在縣西南五十里濵江山有段文昌讀書處故名二江史記李冰穿二江成都之中括地志大江一名汶江一名流江一名笮橋水一名清江亦名外江西南自温江縣流来又云郫江亦名成都江一名市橋江亦名中江亦曰内江西北自新繁縣界流来二江並在益州成都縣界杜預益州記二江者郫江流江也風俗通秦昭王使李冰為蜀守開成都縣兩江溉田萬頃神須取女二人以為婦冰自以為女與神婚徑至祠勸神酒酒桮澹澹因厲聲責之遂忽不見良乆有兩蒼牛鬭于江岸有間輙還流江謂屬官曰吾鬭疲極不當相助耶南向腰中正白者我綬也主簿刺北面者江神遂死宋郡縣志初李冰既鑿離堆又開二渠一由永康過新繁入成都謂之外江俗名走馬河一由永康過郫入成都謂之内江蜀人以此水濯錦鮮明故又名錦江華陽國志亦云蜀時濯錦流江中則鮮明也又李冰穿郫江檢江别支雙流過郡下水經注成都直西門曰郫江北折左對繁田水又東至廣都北岸南入於江斯為北江晉永寧元年李特軍至廣漢羅尚在成都阻長圍縁郫水作營自都安至犍為七百里二年特攻尚水上軍特從盎底渡黨徒從赤水渡入郫寰宇記府西四里有都江宜造粉一名粉江皆此水也又名清逺江宋咸平三年王鈞陷益州雷有終討之敗賊于昇仙橋東進至清逺江浮橋而渡築壘于城北門外收羊馬城進逼羅城别將秦翰又於城北魚橋列築土山賊遂敗走亦即此俗以合于流江通謂之二江宋元豐志二江舊從府西入城自髙駢築羅城遂從西北作麋棗堰塞故瀆更作新渠導外江繞城西而北内江繞城西而南下流仍合于舊渚舊渚合江亭也舊志内江由城南外江由城北至濯錦橋合流按都江上流即油子河自郫縣東南流四十里經縣北闗外轉東入錦江金水河在城内唐白敏中所開舊名禁河吴師孟導水記自髙駢築羅城堰麋棗二江惟餘一脈自城西北隅鐵窓潛流入城嵗乆遂絶宋天禧中王覿知成都博訪父老得鐵牕石渠故基循渠而上十里許至曹波堰接上流溉餘之棄水于是導之自西門循大逵而東注于衆小渠又西南隅至窰務前閘南流之水自南鐵窓入城于是二渠既釃股引而東派别為四大溝脈散于居民夾街之渠而輻輳于米市橋之瀆又東匯于東門而入江民以為便乆之復塞大觀初席旦復疏導之宣和末旦子益以舊渠堙廢復修築城西外堤引江水入城如故作三斗門節之并議嵗加修治舊志云王明叟度大光范成大相繼修之明初建蜀府改曰金水河舟國朝来乆經淤塞雍正九年廵撫憲徳復開楫往来民甚便之三台井在城内舊天慶觀内隋文帝夢三台星隕于西南化為井遣人潛訪未獲有道士馮善英者修池忽得二井每汲一水則二井皆動拳扠井在縣西北相傳五丁嘗于此為角觝戲渴甚以拳擊地泉水湧出今乆廢菊井在廢蜀府蕭牆内龍淵井在府西聖夀寺大殿内通仙井在嚴真觀方輿勝覽與綿竹縣君平宅井相通昔有人淘井得三錢徑可二寸恍惚不安因復投井中立愈或謂此錢即君平擲卦錢也摩訶池元和志在府城中唐咸通十二年南詔入寇民爭入城時城中乏水取摩訶池泥汁澄而飲之寰宇記汙池一名摩訶池蕭摩訶所置在錦城西方輿勝覽隋蜀王秀築廣子城取土于此因為池有僧見之曰摩訶宫毗羅盖梵語謂摩訶為大宫毗羅為龍謂此池廣大有龍耳陸游渭南集摩訶池入蜀王宫中泛舟入池曲折十餘里至宋世蜀宫後門已為平陸然猶呼為水門也明初其地填為蜀藩正殿西南尚有一曲水光漣漪云萬嵗池在縣北十里華陽國志張儀築城取土於此因成池水經注作萬頃池唐志縣北十八里有萬嵗池天寳中章仇兼瓊築隄積水溉田宋紹興中制置使王剛中復疏之累土為防植榆栁表以石柱方輿勝覽池側有龍壇唐開元中旱有僧云池中龍違天降雨為天所誅僧取其骨焚之為之立塔呼為龍壇洗墨池在縣治前漢揚雄草太𤣥經處宋米芾書洗墨池三字知府耿定力勒之石萬厯十六年左布政程正誼濬廣地基甃石為岸建大㕔五楹南向今俱廢康熙二年知府冀應熊建草亭木橋亦書洗墨池三字勒石以紀其事華陽縣附郭大面山在縣東二十八里六對山在縣南六十里相傳蜀後主自新津修覺山回至廣都見十二峯有三峯六對之語故名鐵爐山在縣南六十里五代時有日者占此山當出異人乃掘斷之有羅氏墓松根纒棺狀若雙龍取刀斷之血流不止西山在縣西一名雪嶺杜甫詩雪嶺界天白又云東郭滄江合西山白雪髙錦江在縣南俗名府江即岷江支流自郫縣東南六十里至縣南轉東合都江下流三十里至二江寺合流江汶江經仁夀縣西北入眉州界後漢建武中吳漢征公孫述乗利逼成都去城十里阻江北立營作浮橋使副將劉尚屯江南相去二十餘里述遣將謝豐等攻漢而别遣兵劫尚使不得相救漢潛師就尚于江南大戰斬豐即此水經注江水自郫縣東北經成都縣南又東至廣都為南江亦名錦江織錦濯之於此則甚鮮明濯以他水則錦闇矣元和志大江在成都縣南七里蜀中又謂之笮橋水此水濯錦鮮于他水又在華陽縣南六里明末張獻忠欲移錦江而涸其流穿地數仞實黄金瑶寳累億萬下土石以填之然後決隄放流名曰錮金汶江在縣南十五里自新津雙流縣流入東北流二十里合流江流江在縣南二十五里亦自雙流縣流入東北流二十五里合汶江二江合流里許至二江寺入錦江象耳池在江瀆廟西浣花溪在縣南五里方輿勝覽一名百花潭按吳中復冀國夫人任氏碑記夫人微時見一僧墜汚渠為濯其衣百花滿潭因名其潭曰浣花杜子美嘗居此又女校書薛濤家潭旁以潭水造為十色箋唐李義山詩浣花箋紙桃花色宋韓浦詩十樣鸞箋出益州寄来新自浣溪頭蜀檮杌乾徳五年四月十九日王衍出㳺浣花溪龍舟綵舫十里綿亘日方午暴風起有白魚自江心騰空而去州人每嵗于是日泛溪謂之大游江傾城而往巷里闐然陸游曰予在蜀數年每赴此㑹必遇晴明戴白之老亦云未嘗見浣花日雨也解玉溪在城内大慈寺南唐韋臯所鑿溪中細沙可以解玉今廢板橋灘在縣南合江亭下五里自蜀下峽之第一灘也諸葛井在城東武侯祠内相傳武侯欲通井絡王氣於此為井薛濤井舊志玉女津在錦江南岸水極清冽為蜀藩製錦箋處有堂室數楹令卒守之每年定期命匠製紙以為上進表疏寰宇記益州舊貴薛濤十色箋短狹纔容八行段氏游蜀記竹惟九種箋惟十色龍躍池在縣東南十二里隋開皇中欲伐陳鑿此池以教水戰王衍乾徳元年以龍躍池為宣化苑即此舊志作躍龍池誤按摩訶龍躍本二池蜀檮杌王建武成元年改摩訶池為龍躍池王氏開國記建將薨兩月摩訶池有鶢鶋来集衍即位改龍躍池為宣化池俱誤千秋池在縣東五里秦張儀所鑿華陽國志城東有千秋池又城北有龍壩池城西有栁池水經注龍壩作龍隄又城之西北有天井池江瀆池在城南江瀆廟前廣二十五畝昔有二亭今廢雙流縣應天山在縣南八里南接宜城山唐僖宗幸此賜名隋志雙流縣有女伎山或曰即此宜城山在縣南十里山出紫芝聖燈山在縣東南八里一名普賢山世傳昔有聖燈現蜀太后詩所恨風光㸔未足却驅金翠入龜城大塔山在縣南二十里方輿勝覽有阿育王塔因名元和志在廣都縣東四十里簇橋河在縣東北十里即流江簇錦河在縣東二十里即汶川與笮橋河謂之二江皆自温江縣流来下流入華陽縣界合府江大江在縣東北即皁江也自温江縣流入又東南入眉州界黄水河在縣西南十五里自温江縣流入南流四十里過縣東至彭山縣界合岷江牛飲水在縣北元和志在廣都縣西三里寰宇記有清水在雙流縣西十里牛飲水之末流也昔陳鄭家此每羣牛飲江水為之竭故名色水在縣西五里源出岷江温江縣大墓山在縣北二十五里土人云是魚鳧王墓女郎山上南志在温江張魯女浣衣石上感赤光之祥而懐孕生二龍及女死將殯柩車忽騰空飛躍升此山遂葬焉其浣衣石猶在大江在縣西南自灌縣流入一名皁江元和志大江俗謂之温江南流經縣西一里出麩金又皁江在縣西十里寰宇記大江在縣西二百步自青城縣流入又岷江在縣西二里按岷江俗名三渡水在縣西十里自灌縣流入又南流五十里入雙流縣界又大皁江俗名新開河本岷江自灌縣布袋口分派入縣界又分為二派皆東南流一派經縣西轉南名楊栁河又二十里入雙流縣界名黄水河至彭山縣界入岷江一派經縣城東又分為二支一支南流合楊栁河一支東流入雙流縣為流汶二江之源府河在縣西一里自灌口流来繞城西南下流入府界清水河在縣東三十里玉石河在縣北十里新源水在縣西唐志温江縣有新源水開元二十三年長使章仇兼瓊因隋蜀王秀故渠開通漕西山竹木馬壩渠在縣西北元和渠志鹿角之北涯有渠曰馬壩東流至成都入於南江渠東行二十餘里水決其南涯四十有九每嵗疲民力以塞之乃自其北涯鑿二渠與楊栁渠合東行數十里與馬壩渠㑹而渠成安流新津縣天社山在縣南三里水經注文井江至武陽天社山下入江元和志北枕大江南接連嶺每益土有難人多依焉修覺山在縣東南五里山有修覺寺紀勝亭杜甫嘗遊焉其上為雪峰亦名寳華山其下為三江渡唐志新津有主簿山或以為即此平岡山在縣南五里與天社山相連稠稉山在縣南八里方輿勝覽稠稉山有草名稠稉服之可長生平盖山在縣北三十里崔孝通于此得道寳資山在縣東南三里大江在縣北即皁江也自温江縣流入又東南入眉州界九域志縣有皁江水經注江水自江源又東南經武陽縣􅗪江入焉又與文井江㑹又東至彭山縣志云岷江正派曰金馬河自雙流縣流来又南二十里合洋馬河西河至縣東門外又合南河五十里入彭山縣界味江在縣北自崇慶州流入又東流十五里經縣北文井江在縣南自崇慶州流入大江即古僕千水也漢志臨卭縣僕千水流至武陽入江水經注自臨邛承布僕水東經江原縣又東至武陽縣天社山下入江元一統志有白木水自卭州依政縣流入經天社山下入江洋馬河在縣北