body:
  text: 四川通志卷二十五山川直𨽻嘉定州雍正十二年陞為府高幖山在州城内巋然高峙萬象在前舊有層樓江山千里一目可盡一名高望又名萬景山宋時建有萬景樓今圮范成大詩若為喚得涪翁起題作西南第一樓左為龍頭山右為玉鳳山九頂山在州東隔江山有九峯曰集鳳棲鸞靈寶就日丹霞祝融擁翠望雲兊說下有凌雲寺唐開元間僧海通者於瀆江沬水濛水三江之會悍流怒浪之濱鑿山為彌勒大像高踰三百六十尺建七層閣以覆之咸通十年南詔蠻陷犍為掠陵榮二州既而大集於凌雲寺與嘉州對岸州刺史楊志等遣兵拒之蠻潛出竒兵自東津濟夹擊官軍潰遂陷嘉州又名凌雲山宋蘇軾詩生不願封萬戸侯亦不願識韓荆州但願身為漢嘉守載酒時作凌雲遊又蘇轍詩巉巉九頂峯可愛不可住其右為東山一名聖岡山屏列江上一名榜山九龍山在州東北東山之右臨江距州四里石壁舊刻九龍形有龍泓水出焉烏尤山在州東五里一名烏龍又名青衣寰宇記青衣山在平羌縣南四十里導江沬水平羌水㑹流於山下方輿勝覽烏尤山在九頂之左舊名離堆突然於水中如犀牛狀一名烏牛山山谷始謂之烏尤俗仍謂之烏牛明初明玉珍據重慶元將旺扎勒圖將攻之屯嘉定之大佛寺明玉珍遣兵刼烏牛山砦擣嘉定是也三龜山在州東十里東山之右以形似名分上中下與龍泓近中龜山腹空洞風薄之有聲宋徳祐初元將汪徳臣攻嘉定守將昝萬壽戰敗籍境内三龜九頂諸城以降明一統志三龜山在州治東其形似龜而首亦其當中一龜循其趾而上彎環有九洞石犀山在州東十五里有巨石如犀狀馬落山在州東十里青泉舖南三里為尖山其形高銳亦名東尖與西尖對峙協氣山在州東二十里俗名歇氣以山勢高峻必歇息而後可登走麻坪路達井研尤捷馬鞍山在州東南七里烏尢之左望之若馬鞍然山有古柏倒生石罅中最竒紅巖山在州東南十五里馬鞍之下接犍為縣界山色正赤産鹽金燈山在州西南五里方輿勝覽即至樂山其趾有淵每嵗人日郡守於此修油卜故事謂以油灑水面觀其文驗一嵗之豐歉宋王樸居此淵今塞印臺山在州西五里亦名五臺山石像山在州西二里有石鐫彌勒如凌雲像而小或謂初作此以為大佛之式揚雄山在州西一里方輿勝覽在府治西有洞深邃子雲隱居於此又有海棠山上多植海棠為宴賞之地茶山在州西五里與水城相望勢長而平如案舊産茶今無相近為洛都山梨花山在州西七里方輿勝覽過西津橋五里舊有梨花寒疾者食之即愈今無尖山在州西十五里與東尖對峙雅水流其下蘇稽山在州西二十里過尖山渡相傳因蘇東坡稽古於此故名玉屏山在州西三十里壁立如屏高可百丈下為鹽泉鎮沫水經焉五峯山在州西四十里五峯突兀與綏山對峙又名五高山白佛山在州西北六里有石龕鐫三像自成白色刮去旋復本色因名水兊山在州北一里一名聖水山白崖山在州北十里上有清風白雲朝露三洞四峯山在州東十里山如連珠者四極髙其第三峯之腰有洞外石筍三高數丈洞下有清泉嵗旱不涸黙齋居士曾隱此以自樂官帽山在州西十里以形似名雲頭山在州北二十里俗謂之石牛山竹溪出此錦江山在州北三十里錦江經其下因名唐李白題詩其上宋黄庭堅作亭名曰太白亭三峽山在錦江山北上峽曰犁頭中曰背峩下曰平羌杜甫詩外江三峽且相接即此卓望山在州東北三十里相傳卓王孫葬此熊耳山在州北元和志在平羌縣東北三十一里方響洞在州儒學東百步許水從洞出甃為大井聲若環珮鏘然有韻俗名丁當水黄山谷改名有詩我為更名方響洞信知山水有清音穿洞在州西四里官道傍大洞曲轉又一小洞穿透容光若石牖然朝霞洞在州南宋程公望於此注易東坡常攜二子過此郭璞巖在烏尤山右郭璞於此注爾雅蘇轍詩區區辨魚蟲爾雅細分縷爛柯洞在州北江岩上東坡大書爛柯岩洞四字有詩云但得身閒便是仙眼前黒白漫紛然請君試向岩中坐一日真如五百年治易洞在九頂山後宋郡守吳祕有鉊白雲洞在州西八十里清風洞相連白雲洞大江在州東自眉州青神縣流入州界二十里合竹溪又五里至城東會陽江又七十里入犍為縣界寰宇記南安縣治青衣江會有名灘二曰雷垣曰鹽溉李冰所平也水經注江水自武陽又東南經南安縣西有熊耳峽漢河平中山頽地震江水逆流懸溉有灘名壘抵亦曰鹽溉縣治青衣江㑹襟帶二水又東南至僰道唐咸通十年南詔陷犍為薄嘉州刺史楊志與蠻夾江而軍蠻陰自上游濟背擊王師志走嘉州遂陷江蓋州之襟要也寰宇記導江水在平羌縣西二十步又曰大江一名汶江又名通江自平羌流入龍游縣界舊志岷江流繞烏尤下為三江會流處中有洲曰黒水尾竹溪在州北三里環溪多竹故名俗名祝公溪源出雲頭山瀑聲撼兩崖間如雷下瀦為龍潭流入山谷凡九折而始東入江故上流名九溪青衣水在州西自夾江縣流入合大渡水入江漢志青衣縣有大渡水東至南安入渽水水經注南安縣有濛水即大渡水也水發濛漢東南流與涐水合又東入江元和志龍游縣有青衣水經縣南去縣三里寰宇記青衣水濯衣即青故名又曰青衣津在平羌縣南去縣四十里方輿勝覽青衣水出蘆山徼外東南流經嚴道洪雅夾江至龍游與岷江合曰青衣以縣名一曰䝉水以山名一曰大渡以溪名又曰雅州以州名舊志青衣水源出六畨經靈關至雅州飛仙關與卭崍水合行五里與周公水合又百里與花溪水合經夾江下九盤至雙湖距州十五里與沬水合抵九峯山下會大江蘇溪在州西二十里自峩眉縣麄石溪來至七孔山下與符文水合俗名馬跳溪又至尖山入青衣水舊志云溪以蘇名重東坡也大渡河在州西南自峩眉縣流入合青衣水入江漢志汶江道有渽水南至南安入江水經注謂之涐水寰宇記龍游縣有沫水自陽山縣流入即此方輿勝覽府有陽江蜀南方之水所交會明一統志陽江在州治西一名沫水又名涐水舊志陽江即大渡河至州西南合青衣水又東北流十五里至州東南合岷江又云沫水在州西按水經發源於廣柔西南徼外由鐵豹嶺經漢源中鎮銅山茶土邁東而下為金銀三漕至雙湖與青衣水合同會於江臨江溪在州西南四十里即羅目江發源二峩山自峩眉縣流入陽江泥溪在州東五里源出仁壽縣山中東南流經中巖山後至小萬渡入大江麻坪河在州東北四十里源出金銀岡至五塊石千佛崖入泥溪三溪源出平羌峽口鱔魚洞張公溪源出平羌山谷中至跳蹬子入於泥溪石堂溪在州東一里源出溪泉流入明月湖内復入流花橋合導江方輿勝覽明月湖在州東大西湖在州瞻峩門外與大江隔一隄環繞皆山大二十畝水平如鏡可以泛舟其西又有小西湖大僅前湖三分之一浣龍池在州東三十里保平鄉圍六百餘丈灌田數百畝又有天生泉旱禱立應半月池即學前泮池有泉不涸洗墨池在凌雲寺後東坡所鑿東卦井在州東相傳郭璞所鑿聖水井在州北竹溪岸上嵗旱禱雨輒應東巖泉在州東泉宜釀酒東坡詩一時付與東巖酒峩眉縣十里山在縣東南路經山腰迤邐十里故名羅䝉山在縣南三十里寰宇記在羅目舊縣北三里俗名羅目山隴寧山在縣南七十里寰宇記在羅目縣東南七里僊人宿山圖採藥於此服之羽化又名隴定山銅山在縣南一百里産銅峩眉山在縣西南博物記南安縣西百里有牙門山即此蜀都賦抗峩眉之重阻華陽國志山在南安縣南去縣八十里水經注平江經峩眉山去成都千里然秋日清澄望見兩山相峙如峩眉焉隋志峩眉縣有峩眉山唐十道志劎南道名山有峩眉元和志峩眉大山在縣西七里兩山相對如峩眉然此山有洞天石室髙七十六里又中峩山在縣東南二十里有古穴初纔容人行數里漸寛有鍾乳穴穴有蝙蝠其大如筐又有小峩山在綏山縣南六里寰宇記峩山張華以為牙門山之外又有小峩眉又曰小峩山在羅目縣南十里峩眉之亞者宋趙抃詩蜀山天下竒三峩壓岷右方輿勝覽大峩山在縣西南一百里周千里有石龕一百十二大洞十二小洞二十八南北有臺又中峩山在縣南二十里一名覆蓬山又名綏山上有葛仙洞又小峩山在縣南三十里一名鏵刃山上有季仙洞與中峩大峩相連是為三峩又曰峩眉山有日月峯伏羲女媧鬼谷諸洞舊志大峩山在縣西南五十里髙一百二十里二峩山在縣南三十里髙減大峩之半三峩山在縣東南三十里髙又減二峩之半范成大峩眉紀行自縣出西門登山過慈福普安二院白水莊蜀村店十二里至龍神堂小憩華巖院過青竹橋峩眉新觀至中峯院院有普賢閣回環數十峯繞之背倚白崖峯右傍最髙峻者曰呼應峯茂真尊者與孫思邈相呼應於此出院過樟木牛心二嶺及牛心院至雙溪橋自是登危磴過菩薩閣當道榜曰天下大峩山遂至白水普賢寺自縣至此皆峻阪四十餘里然始是峯頂之山脚耳自此至峯頂光相寺其髙六十里大約去平地不下百里絶無溪磴斫木作長梯釘巖壁間緣之而上意天下登山險峻無踰此者自白水寺登㸃心山過茅亭嘴石子殿大小深坑駱駝嶺簇店又過峯門羅漢殿大小扶舁錯喜歡木皮里猢猻梯雷洞坪又過新殿八十四盤自娑羅坪過思佛亭軟草坪洗脚溪至峯頂光相寺板屋數十間初登山衣暑綌漸髙漸寒至峯頂則挾纊擁爐有泉煮米不成飯俱碎如砂粒蓋萬古冰霜之汁也又登天仙橋至光明巖有小殿以木皮蓋之易以瓦為霜雪所薄一年輒碎云輿地紀勝自縣勝峯門出歴石魚橋山門路黑水白水莊彼岸橋天公龍神堂妙峯閣亂石溪遊仙橋華巖橋在寶巖兩峯之間居山之前峯又五里至中峯寺後改乾明寺前後有八峯環之又五里至延福寺有孫思邈故宅青蓮蓬白雲峽最為寺中之勝又十里至普賢寺又上至華藏寺光相寺山徑如線者六十里舊志自縣南門外勝峯橋前真境樓聖積寺踰普菴橋前龍神堂歴凉風橋解脫橋上解脫坡至華嚴寺蜀獻王改歸雲寺由華嚴西上為槽木坪為五十三步有馬鞍山響水橋大峩石下有玉液泉泉西為呼應臺又上至中峯寺獻王改集雲寺前為三望橋三望坡下坡即雙峽雙溪橋度橋而南泝流三里許為牛心寺獻王改卧雲寺左孫仙洞右羅漢洞由橋上有象牙坡白龍洞四會亭自亭西上至白水寺又上至頂心坡有回龍山南為小雲大雲二壑舊名大小深坑有長老坪鷲殿自殿又上九嶺為蛇倒退猢猻梯錯喜歡木皮殿梅子坡雷洞坪又上為八十四盤歡喜亭娑羅坪天門石天仙橋至光相寺有七寶覩光二臺俗名峯頂俯瞰大江如線瓦屋曬經雪山青城歴歴可數綏山在縣西南隋志峩眉縣有綏山元和志在綏山縣西南二百十九里峩眉西南其髙無極寰宇記其山産桃諺曰得綏山一桃雖不得仙亦足以豪龍門山在縣西十里兩崖峭削仰觀青天僅露一線上有洞可容百人對山瀑布飛泉直下百餘丈瀦為深潭范成大嘗遊此以為天下峽泉第一花山在縣西北十里山形有稜瓣如花故名四峩山在縣北十里鳳臺山在龍門之側紫芝洞在綏山之腰山脂結成芝形懸洞口鐫吕純陽所題紫芝洞三宇筆意竒古車剛水在縣北二十里寰宇記有車剛川在洪雅縣西南百里車剛山下即此下流入青衣江麄石河在縣北六里雙佛河在縣北十五里符文水在縣北門外自峩眉山牛心寺發源出雙飛橋過縣北合天津水下至嘉定州為蘇溪河入青衣水從雷洞坪經白水寺出雙飛橋左名曰白水自九老洞過洪椿坪出雙飛橋右名曰黒水天津水在縣南一