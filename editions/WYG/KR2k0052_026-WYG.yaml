在巫山有太史跋嘉定癸未漕使王觀之并黄太史跋俱徙置漕廨王漕又作跋語攷之為晉周撫墓碑今亦湮沒神女廟碑舊志在巫山集古録唐李吉甫詩一首以貞元十四年刻丘元素一首無刻石年月李貽孫三首會昌五年刻敬騫一首元和五年刻沈幼貞書其他皆無名氏巫山詩碑唐金吾衛兵曹參軍沈幼貞撰元和五年建雲陽縣􅓃䏰城在縣西六十里漢置屬巴郡後漢興平元年劉璋遣趙韙擊劉表屯􅓃䏰即此城也晉屬巴東郡宋以後因之周改置雲安縣此縣遂廢章懷太子曰雲安西萬户故城即漢之􅓃䏰縣今有萬户壩即其遺址舊志係漢扶嘉食邑雲安故城在縣東北本漢􅓃䏰縣地唐末置監以收鹽課宋亦置監於此屬雲安軍寰宇記熙寧四年以雲安監户口析置安義縣八年還𨽻雲安復為監在軍東北三十里元并入雲安軍明置監課司於此寳子塔在縣東大江中昔人鑿石為之為行舟之則詩云水侵寳塔脚下舟休要錯雲臺在縣北廢大昌縣南二里演易堂在縣北三十里地名向陽坪宋邵康節於此註易水閣在縣南德輝堂在縣北宋晁公遡有記杜鵑亭在縣北前有巨石每嵗春深則杜鵑啼其上杜甫詩雲安有杜鵑因名橘官堂在縣南五峯驛前李亳有記古碑記附周靈王符碑舊志在棲霞宫文末有周靈王三字漢處士金廣延母子碑舊志初無文字但有人物廣雲外尊師碑舊志在雲昇宫唐杜光庭撰見九域志今名棲霞宫人物碑舊志所勒皆車馬人物或云古者修車馬偹器械之圖也梁山縣梁山故城在縣西西魏置按寰宇記後周天和二年分魚泉置梁山縣因界内高梁山為名九域志開寳三年以萬州石氏屯田務置梁山軍割梁山縣𨽻馬熙寧五年又析忠州桂溪地益軍元初曰梁山軍尋升為州明初復為縣萬川城即今縣治一云在縣西西魏平蜀置萬川郡於此復徙南浦吕保藏家在縣東北輿地紀勝梁山絶崖半腹有一穴人跡不到漢赤眉之亂邑人吕保藏家貲巨萬鑿石以居冦不能近後舉家隱焉垂雲樓在縣北右瞰萬石樓左倚東山景物竒麗桂香樓在縣儒學内萬厯二年副使范璲行置知梁山事推官董學孔重修萬石樓在縣東北宋知州李仲孚建白亭在縣東飛雪亭左嘉靖壬辰獲白於此巡撫宋滄遣使馳獻命建亭並勒石䜿坊亭當孔道題咏頗多為夔州勝蹟瑞豐亭在縣東陸游詩峽中地褊嘗苦貧政令愈簡民愈淳本來無事只畏擾擾者才吏非庸人都梁之民獨無苦須晴得晴雨得雨父老羅拜豐年賜縱産芝房非上瑞飛練亭在縣東三十里蟠龍山瀑布之側東坡名之曰飛雪亭古碑記附涼山吕保藏漢篆舊志源山保有吕保藏在絶崖半腹漢赤眉之亂吕保藏家資巨萬舉家終馬紹熙中有樵夫得一劵於崖側非鋼非鐵其聲鏘然上有古篆云西漢之末赤眉邂逅黄全千兩坑埋而走羔豚十祭其財自阜今藏所猶存浮蘭碑通川志記梁山軍忠州兩界舊有石刻漢時官屬及白虎夷王夷民等姓名字多磨㓕梁山驛唐碑題云令長新誡之記乃明皇御製梁山令尹茂元得此誡於萬州守河東裴公而刻之乃大中十年也嘉定丁卯郡守李錫移其碑於軍治其詞云我求令長保乂下民民之不安必有所因侵漁浸廣賦役不均使夫離㪚莫闗其身徵諸善理寄爾良臣與之革故政在維新調風變俗背偽歸真敎化為先惠䘏於貧無小無大以躬以親青旌勸農孰不攸遵曷云被之我澤如春舊梁山驛碑舊志軍之東四十里相傳李唐時有白虎蛟龍為民害民遷居以避之韓昌黎嘗按部經行二害乃去作碑識之今名其地為碑抝猶存溪側字多漫㓕不可識飛練亭碑多唐人碑刻圖經敎授黄震仲撰新寧縣舊縣壩在縣東三十里今存兩石獅相傳為舊縣故物東闗故郡在縣西北十里寰宇記通川梁置開巴郡而東闗郡置於開州領龍蛇新寧二縣周建德五年始割屬萬州故城在新寧縣西北四十五里李靖埡在縣西二十里與金山相接唐武德初蠻酋冉肇寇信州李靖擊斬於此故名愧竹臺舊志在縣治後知縣胡明書修有記萬柳書齋在縣西明邑人趙鼇罷歸時建此吟誦其間萬縣南浦故城今縣治或云在大江之南岸本名羊渠季漢建興八年改曰南浦魏改魚泉寰宇記魏廢帝元年置魚泉縣以地土多泉民頼漁罟為名隋志後周置安鄉郡後改縣曰安鄉郡曰萬川隋開皇初郡廢十八年縣仍改名南浦按華陽國志固陵郡初領羊渠縣吳平後省改置南浦縣在郡南三百里武寧廢縣在縣西一百六十里舊傳為巴子故城漢臨江縣地後周武帝時折置源陽縣並置南州及南都郡建德四年改郡曰懐德縣曰武寧隋開皇初州郡俱廢縣屬巴東郡唐屬萬州宋元皆因之明初省入萬縣許旌陽宅在廢武寧縣西一里今為白鶴觀分水公館在縣西百里明𢎞治年建岑公洞舊志在大江南岸唐岑公隱於此山中有石狀如芝名曰石芝又有泉曰灌芝泉流桮池在縣西二里宋守魯有開所鑿江會樓在縣北桂華樓在縣治内慶元中張賓知萬州以州士二人同年登科故名二詠亭在縣東張俞范鎮常唱酬於此太守趙希緄因以名亭西山亭方與勝覽距萬州治二里其初蔓草荒蕪宋郡守馬元穎魯有開元翰相繼修葺為峽上勝境七賢堂在縣東繪像祀宋張俞魯有開范鎮蘇洵蘇軾蘇轍黄庭堅古碑記附報恩寺漢碑圖經云硤中漢刻少今萬州報恩寺有碑高五尺乃漢桓帝延熹間所刻凡百餘字土人謂之宜子碑絶塵龕石刻絶塵龕三字在西山石壁字體清勁類晉宋人書寳像記鍊巖有莊修隋朝寳像記岑先生銘嚴挺之撰開元二年立又有段文昌銘貞元三年四月十五日鐫岑公洞記在岑公洞元和八年段文昌記魯直留題在岑公洞下巖寺聖業院碑在蘇溪大江之濱石旁蘚封可見者僅有咸通三年十一月建數字大雲寺碑寺有唐僧圓滿傳中和間萬州守李裁書冉仁才碑見㳂革門南浦州下萬州廟碑乾德乙丑白廷誨為刺史重修碑雖存而漫滅不可讀白刺史題名記開賓二年九月白廷誨題名記上云刺史白廷誨今萬利廟有碑仆草莾中攷之字皆漫滅獨白刺史名衛在靈顯王碑舊志加封昭毅武惠靈顯王遺愛碑碣於廟南浦志趙善贛編新志王子申序開縣開江故城在縣東一里後漢建安二十一年置漢豐縣於此西魏改永寧寰宇記周天和元年改縣曰永寧於縣置周安郡隋開皇三年罷郡屬開州十八年改曰盛山大業二年州廢始屬巴東唐改開江武德元年移今治清水廢縣在縣東北六十里漢􅓃䏰縣地宋武帝分置巴渠縣後周天和元年分巴東置萬安郡隋開皇三年罷郡屬開州大業二年州廢屬萬安郡唐武德初屬開州二年移今治寳厯中節度使裴度奏廢并入開江尋復置仍屬開州宋元豐後改曰清水元廢舊志周曰萬縣隋改萬世唐貞觀二十三年改曰萬嵗與前説不同新浦廢縣在縣西南九十里本漢胊䏰縣地寰宇記宋永初中置後魏恭帝三年於縣置開江郡後周天和五年改江會郡建德五年郡廢屬周安郡隋開皇初郡廢屬開州大業二年州廢屬巴東郡唐仍屬開州武德七年自縣西北故城移於今縣宋慶厯四年并入開江西流廢縣在縣西北一百五十里後魏置漢興縣西魏改曰西流後周屬周安郡隋開皇三年罷周安郡以縣屬開州大業初州廢改屬通州郡唐武德初改屬開州貞觀初省入盛山黃侯城在縣東五里五代時土人黃侯二家避兵於此虎跳城在縣南七十里五代孟知祥據蜀土人築以防寇老鴉城在縣南八里宋政和初土人避寇所築鯉魚城在縣南九十里宋建炎初土人築仙女鏡在縣南五里山巔有石圓五丈餘明徹如鏡白鶴樓在縣城内宋慶元中建即今鼓樓四並臺在縣北三十里宋張灝有詩遺址尚存雲鴻亭在縣南三十里宋賈緯有詩宿雲亭在縣盛山溫造有記韋處厚詩薺平連郡國帶繞抱江城張籍詩捲簾無俗客應只見雲來翠薌亭在縣北宋夏侯孚先記云盛山風物冠冕峽郡其間十二樓多唐宋名人唱和盛山堂在縣後圃太守柳公綽建韋處厚為開州刺史時嘗咏遊其地有盛山堂十二景詩韓愈為序懐古堂在縣東圃為太守陳公璟建遺愛堂在縣西圃為太守王正甫建裕民堂在縣舊州治内又有惠養䨇柏二宋盧德有詩古碑記附盛山宿雲亭記名在縣西北三里唐元和十三年刺史韋處厚詩溫造撰記盛山十二題詩唐韋處厚撰韓文序云韋侯所為十二詩讀而詠歌之令人欲棄百事往與之遊和者元稹許康佐白居易李景儉嚴武温造於是盛山十二詩與其和者廣行於時唐開元刺史新宅記權德輿撰盛山集商有序撰圖經李宗諤編建始縣業州故城在縣東晉置建始縣於此後周建德三年改置業州貞觀八年州廢屬施州方輿勝覽故業州在今縣東州基山下石通洞在縣西三里前後通明可客數百人中有層臺宋明文人詩刻甚多層臺在縣西三里石通洞中宋明文人多題詩刻石淡寧居在縣治内令國朝康熙年間縣劉珙徵修四川通志卷二十六
