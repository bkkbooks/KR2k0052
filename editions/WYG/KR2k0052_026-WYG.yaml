body:
  text: 四川通志卷二十六古蹟亭臺樓閣附大凡有事攷古者茍得其遺跡之所存則當時之規模形勢與夫政治方畧皆瞭然若指諸掌葢大賢君子其精神歷久而不湮而後之知人論世胥有藉矣蜀中如爾雅臺籌邊樓文事武備固已攬其大概他若三賢之堂二老之閣高山景行於此有流連不盡者焉况夫望古遥集則父老所傳聞簡編所紀載又何一不足以動人慨慕也哉作古蹟志成都府成都縣附郭古蜀國按史記黄帝子曰昌意娶蜀山氏女生帝高陽後封其支庻於蜀歷夏商至周衰始稱王秦惠王九年司馬錯伐蜀滅之揚䧺蜀本紀荆人鼈靈為蜀相其王杜宇以國禪之號開明帝下至三代有開明尚始去帝號稱王華陽國志周衰蜀侯蠶叢先七國稱王其後王曰杜宇移治郫邑或治瞿上七國稱王杜宇稱帝禪位於其相開明九世有開明尚復稱王徙治成都後與苴巴相攻為秦所并大城一名子城秦張儀所築初築時城屢頽不立忽有大龜出於江周旋而走儀以問巫巫言依龜行處築之可成從之功果就故又稱龜城少城一名小城在子城之西蜀都賦亞以少城接乎其西舊志張儀既築大城後一年又築少城華陽國志秦惠王二十七年張若城成都周十二里縣本治赤里街若徙治少城容齋筆録晉益州刺史治大城蜀都太守治少城永和三年桓温平李勢夷少城宋張詠創設記隋開皇初蜀王附張儀舊城増築南西二隅通廣十里亦曰少城時因謂大城曰子城其後少城復毀羅城唐乾符六年高駢為劒南西川節度使以子城湫隘展築羅城周二十五里以甓甃之亦名大元城羊馬城後唐天成二年孟知祥於羅城外增築羊馬城周四十餘里及孟昶時僭擬宫苑城上盡種芙蓉謂左右曰此誠錦城矣故又名芙蓉城赤塗城在縣北三里晉大安中李特所築宋興廢郡在縣北宋志元嘉十年立領南漢建昌永川三縣齊梁皆因之後周俱并入城都今縣北有宋興山葢以故郡得名廢蜀王府在縣城内明洪武中建又有永川内江徳陽石泉汶川慶符南川等七王府今皆廢廢寧川衛在縣東四里明洪武十一年建又成都右衞在縣西三里中衞在縣西南七里前衛在縣南六里後衛在縣東三里俱同時建又成都左䕶衛在縣西南七里為蜀府建今皆廢司馬相如宅在縣西南五里蜀記在市橋西即文君當壚滌器處舊傳宅在少城中笮橋下百步許明一綂志金花寺即相如故宅劉宋時有番僧攜金花玉像至此因名揚䧺宅即今縣治寰宇記在少城西南一名草𤣥堂方輿勝覽中有載酒亭及洗墨池嚴君平宅在縣西即君平賣卜處後為普賢寺今名嚴真觀内有通仙井相傳與綿竹縣君平宅井通昔有人濬井得銅錢三徑可二寸因恍惚不安復投井中立愈或謂此即君平擲卦錢也諸葛亮宅在縣北二里今為乘烟觀李膺宅寰宇記在縣西三里或云是姜維宅杜甫宅寰宇記在縣西郭外地屬犀浦縣接浣花溪舊傳杜甫草堂有二一在萬里橋一在浣花溪萬里橋者今不可攷籌邊樓在縣西唐李德裕建四壁畫蠻夷險要日與習邊事者籌畫其上宋范成大又改建子城西南今圯一説茂州保縣亦有籌邊樓張儀樓在縣西南元和志在城西南髙百餘丈臨山瞰江明一綂志即宣明門樓也一名菟樓錦樓在龜城唐建一名錦江樓前瞰大江西望雪嶺東望長松明末張獻忠攻成都總兵劉佳印戰敗廵撫龍文光急遣人往灌縣決堰水注江以益城濠賊四面縱火遂圮大觀樓在縣城内開府束園都御史喬壁星改名天尺樓海棠樓在縣西唐李回建鄭谷詩上國休誇紅艷杏深溪自照緑苔磯一枝低帶流鶯睡數片猶如舞蝶飛五福樓在縣城内唐韋臯建以上俱無存望鄉臺在縣北十里蜀王秀所築讀書臺在縣北二里寰宇記孔明相蜀築此臺以集諸儒兼待四方賢士今為乗烟觀城東二十五里有唐段文昌讀書臺彰明縣北五十里有李白讀書臺雲臺在縣北門外俗名賽雲臺即玉局觀望京臺在縣北十五里唐韋臯築講經臺在縣西青羊宫内相傳老子遺址降生臺與講經臺對面紫金臺在青羊宫通明寳閣之後載酒亭在城外市橋西漢司馬相如宅内唐杜甫詩茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲嘉靖中學使陳鎏建坊於道傍題曰琴臺徑沿徑半里許始達松栢榿柳遺址猶存草𤣥亭在縣南揚䧺宅内寰宇記在華陽縣少城西南郫縣又有揚䧺讀書堂趙抃為記百花閣在城西向百花潭尊經閣在府學明倫堂後知府耿定力重葺舊址無存魁星閣在府學正面明萬厯間布政王志逺建今圮通明寳閣在青羊宮九皇殿後上祀玉皇静勝堂在府治内宋建䧺邊堂在府治内宋時建於甲庫之北圜通堂在府治園中宋建趙抃葺之惠逺堂在府治内宋靖康初盧法初建以禮殿人物繪圖其上草白堂即洗墨池明方伯程正誼建國朝知府冀應熊重修池前立石碑書洗墨池三字草堂在縣西南五里浣花溪上即唐杜甫宅甫詩萬里橋西宅百花潭北莊謂此又有草堂别館明廵撫劉東臯廵按王金川建獻賊毀國朝知府冀應熊重修立碑書草堂寺三字右為工部祠廵撫張徳地建立石勒像後有小亭環以修竹題咏甚夥石鏡揚䧺蜀本紀武都丈夫化為女子顔色美好葢山之精也蜀王娶以為妻無幾物故於成都郭中塟之以石鏡一枚今武擔山上有石徑五尺厚五寸瑩徹可鑑號曰石鏡石笋在縣西華陽國志蜀時毎一王死輙為立大石今石笋是也號為笋里劉禹錫福成寺記益州石門街大逵西馳曰石笋街五丁擔華陽國志成都縣内有一方折石圍可六尺長三尺許去城北六十里曰毘橋有一折石亦如之相傳為五丁成武擔山石擔支機石在縣西嚴真觀博物志有人乘槎入天河得一石歸問嚴君平曰此織女支機石也相傳有欲琢之為器者風雷驟作咫尺昏曀遂不敢犯碧雞坊在縣西南隅益州記成都之坊百有二十第四曰碧雞石婦昔有孝婦守節孝於舅姑後人刻石像之白居易詩至今為婦者見此孝心生不比山頭石空有望夫名古碑記附漢蜀郡守何君造尊楗閣碑容齋隨筆云在成都末云建武中元一年唐僧大辯修功德碑元和十五年立在文殊閣觀政閣記秦漢至唐領太守刺史節度使之職有功績可攷者畫像得二十八人别圖於他閣而榜曰觀政吕大防成都志云二十有八人李冰文翁王遵張堪第五倫亷范种暠李膺高䀢諸葛亮王濟高儉陸象先蘇頲嚴武翟寕韋臯高崇文武元衡段文昌李德裕楊嗣復杜悰魏謩牛叢夏侯牧高駢陳敬瑄成都古今前後記眉山人孫汝聰修成都古今前後記六十卷見眉州江鄉記趙淸獻公成都記見張有成光福寺記成都志袁説友序古石刻共二十有三在廢藩府中後改為貢院於瓦礫中得之皆古名書内有仙筆四按察使李翀霄豎之至公堂左為文記之華陽縣附郭錦城在縣南華陽國志萬里橋南岸道西有城故錦官也元和志錦城在縣南十里故錦官城錦官猶合浦之有珠官也又有車官城在錦城西盤古城元和志在縣東三十里方輿勝覽在盤古祠廣都故城在縣東南蜀本紀蜀王本治廣都之樊鄉後徒成都漢置縣屬蜀郡華陽國志縣以元朔二年置在郡南三十里蜀號三都成都新都廣都是也王葬改為就都亭後漢復故晉永和中分縣界置寧蜀郡領廣漢廣都升遷西鄉四縣宋以後因之周廢寧蜀郡隋仁壽元年改縣曰䨇流而此遂廢章懐太子曰廣都故城在成都縣東南唐又别置廣都縣明一綂志廣都廢縣在府南四十五里漢廣都城在其東北十五里又有晉廣都城在其北十三里此無所攷懐寧廢郡在縣南晉安帝時置屬南秦州宋元嘉十六年改屬益州領西平萬年二縣齊梁皆因之後周廢郡縣并入成都文翁石室在縣南又名文翁學堂即今之成都府學華陽國志文翁立學精舍講堂作石室一曰玉室舊志文翁立學作石室在城南安帝永初間遇火興平初太守高䀢更新又增一石室始作禮殿以祀先聖周公畫三皇五帝七十二子及三代兩漢君臣像於壁李膺記後漢中平火延學觀廂廊一時蕩盡惟此堂火焰不及壁上悉圖古聖賢齊永明中劉瑱更圖馬内有禮殿記歐陽修謂蔡邕所書柱上有鍾㑹𨽻書葢追文翁高君之美而書也又周公禮殿圖攷禮殿制度甚古低屋方柱柱上狹下廣與今異制殿有板龕䕶先聖像丘文播畫山水龕後有板壁黄筌畫湖灘禮殿之壁高下三方圖像世傳晉太康中太守張牧之筆即張載父也宋嘉祐中王素命摹寫為七卷凡一百五十五人為成都禮殿聖賢圖紹興中席益又摹寫於石經堂凡一百六十八人明末為獻賊所毀十國朝康熙四十三年按察使劉德芳修復之六年學使方覲増修講堂學舍三十餘間拔通省士之尤者延師敎之一時文物稱盛譙樓在縣東南即鐘鼓樓明萬厯丁巳知府江和修建獻賊焚毀後重修為成都勝槩散花樓在縣東北隅唐建李白詩日照錦城頭朝光散花樓金牕夾繡户珠箔懸瓊鈎雪錦樓在縣東大慈寺前取杜甫雪嶺界天白錦城曛日黄之句為名合江亭在縣東南二江合流處唐韋臯建吕大防重修有記俯而觀之滄浪渺然東山翠麓與烟林篁竹列峙於前一府之䧺觀也就都亭在縣南三十里故廣都城也元朔二年置王葬改名就都亭後漢復故飛鸞閣蜀王衍建今圯螽斯堂在縣西南江瀆廟内石犀在縣南三十五里秦太守李冰作五石犀沈江以壓水怪其後土人立廟祀冰號石犀廟今有一石在大慈寺佛殿前攷華陽國志李冰石犀一頭在市橋即今金花橋也或以為秦惠王所遺者非天涯石在縣東五塊石在縣南萬里橋之西五石相疊高一丈餘圍倍之相傳下有海眼昔人常起其石風雨㬧作蠶市舊志在大慈寺前蜀民重蠶事毎嵗二月望日於寺前鬻蠶器謂之蠶市唐韋南康有記宋太守田況有詩蔣琬宅在縣東七里又犀浦縣有蔣橋亦以琬得名赤里街在縣南寰宇記成都之南街名赤里華陽國志成都舊治赤里街雞鳴原在縣南十五里宋咸平三年知蜀州楊懐忠攻益州賊王均乘勝逐之砦於雞鳴原以待王師即此古碑記附漢文翁學生題名集古録不著書人名氏文翁題名可見者凡一百十二人碑在益州漢文翁石柱記集古録云漢𨽻不著書撰人名氏永初中火災被焚惟廟内兩闕存太守高䀢重立又於其東創周公禮殿碑以初平五年立殿柱記先儒謂鍾會書按鍾會於季漢炎興元年始入蜀距漢興平初禩已七十一年不應追書也今在禮殿東漢學殿嵗月記繫年録云紹興六年成都敎授范仲殳奏疏言本府學殿建於東漢之初平漢人以大𨽻記其修築嵗月刻於東楹至今九百四十三年葢天下棟宇之古無過於此者宋高宗御書大成殿榜繫年録云紹興六年上書大成殿榜賜成都府學左右生題名集古録謂為晉宋間碑晉益州刺史羅君碑在碑陰晉朱齡石刻宋高祖檄譙縱文在石室館學廟堂記唐永徽元年賀公亮撰集古録謂不著撰人名氏不同州學廟堂頌唐神龍二年立唐太平公主出家勒在天慶觀孔子廟堂碑唐開元中周灝撰唐平蠻碑集古録云唐蕭晉用撰開元十九年刻石紀功在成都昭烈帝廟又容齋隨筆成都有開元十九年南蠻為邊患明皇遣内常侍高守信為南道招慰處置使以討之拔其九城此新舊唐書及野史皆不載肅宗以魚朝恩為觀軍容處置使憲宗用王承瓘為招討使議者譏其以中人主兵柄不知明皇用守信葢有以啟之也先主廟碑貞元四年蘇端撰在昭烈帝廟中韋臯寳國寺記政元中立段文昌元和中律師銘在府學蠶市記韋南康撰在寳厯寺寺有南康像武侯碑陰記集古録云唐崔備撰元和二年武元衡刻及其僚屬題名於武侯廟碑陰古柏行長慶四年段文昌撰重寫前益州五