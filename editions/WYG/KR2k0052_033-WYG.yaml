body:
  text: 四川通志卷三十三選舉取士之制漢唐宋明以來凡幾更矣或舉賢良或䇿詩賦或試經藝要其延攬英豪舉於鄉而登於朝者異世有同揆也蜀中山水竒秀素稱人才淵藪至我朝闢門籲俊念切旁求而又疊奉恩綸加科廣額蜀士之登賢書捷南宫者類多瑰竒磊落出而應昌隆之運其或敦行積學未得與於科目者復有薦辟以廣捜羅斯在野無遺賢矣至若鷹揚之選智勇咸得以自見亦干城所由寄也文事武備孰得而異視焉作選舉志漢何武郫縣人茂才科晉孟彪巴郡人茂才科進士唐陳元敬陳子昂岑倫苑咸楊興義上俱開元進士李希元友諒汶川縣人裴廷裕上俱元和進士栁震雙流縣人㑹昌進士劉睽綿州人范崇凱内江縣人狀元王圭璞狀元李渥田璋上俱大中進士裴琛閬中縣人裴遠閬中縣人鮮于仲通巴州人封舜卿巴州人鮮于叔明李逺雲陽縣人士上俱咸通進李現射洪縣人李義甫永泰人嚴侁鹽亭縣人張九宗陳光嚴公弼鹽亭縣人梁震邛州人後唐張􅒷勾景延張曙狀元孫光憲井硏縣人鹿䖍扆卞震成都縣人王著成都縣人勾中正華陽縣人勾若古勾希古裴莊閬中縣人袁廓梓潼縣人宋田望之以下成都府屬宇文愚王仲華綿州人羅處約王琪王珪俱華陽縣人國上俱太平興進士張賀李建中陳充上俱成都縣人雍熙進士劉昱杜希言吴季良上俱端拱進士李見素鄧餘慶綿州人李畋華陽縣人士上俱淳化進徐任尹誠俱咸平進士張逵勾龍震勾龍雱張及宇文之竒綿竹縣人士上俱景徳進勾中容謝頤素俱祥符進士范鎡程坦郭輔馬稱尹簡任乃孚上俱天禧進士陳布袁拱鄧永世梅摯新繁縣人尹瞻温江縣人謝堯輔張正劉諷簡州人進上俱天聖士章君陳黎及李堯俞李絪閻温何源任允孚李慎修李慎交吕鵬蒲逢楊繪綿竹縣人李謹交何郯上俱成都縣人景祐進士范百之宋璋王甲張起趙衆楊宏上俱寳元進士李由之張宗諤趙復宇文逸郭由儀楊大亨樊汝芳楊助周尹任其孚常拱蹇逢辰呉師孟胡整上俱成都府人龎旭宋佐仁宋球馮介宋佑賢張無競李彤郭子堅許儀新繁縣人蹇周輔雙流縣人蘇冰蒲逺猷勾士良周表權上俱新繁縣人牟峻勾龍緯錢袞陳奎韓震上俱仁夀縣人張公岳金堂縣人士上俱慶厯進許平施李慎微楊文昌吕陶成都縣人李儀新繁縣人趙炳張夢得閻灝鄧惟清勾昌逢周諷陳昂新繁縣人章辟光章辟疆楊詡李琪馮越李慎思呉靖王莊費琦張公紀楊方嘉蹇綬上俱金堂縣人員安輿韓復員安宇上俱仁夀縣人錢規謝汝弼范亦顔劉澄上俱郫縣人陳希甫陳冕李誼伯上俱綿州人呉師道成都縣人梁鼎華陽縣人張唐英新繁縣人士上俱皇祐進楊竦楊少逸常拱之鄧惟良張仲虞黎上行穆升卿王若拙李大昕李軫葉沅宇文冊楊偉節李公朝上俱成都府人范鎮李大臨楊宗恵范百禄上俱華陽縣人宇文之紹綿竹縣人馬逢楊濳宇文昭度焦俊明吴師元張甲之王震榮瞿能趙丙上俱成都縣人嘉祐進士邵辟宋莊吳縝勾濤新繁縣人王起李奕陳戭牟冲勾龍球范祖禹華陽縣人士上俱治平進李陞蹇序辰王師愈張若訥費永李大源李觀陳操陳仲通黎授李文輝喻天祺陳佑仁夀縣人陸昭迴王任周元龎適勾麟馮源黎持許天啓樊逸張企光雷成鄧洵武上俱雙流縣人宇文昌齡鄧洵仁蘇槩新繁縣人喻舜俞青陽泰井研縣人蒲經文輅趙寜上俱熙寜進士文察李降范百揆華陽縣人李積中李像先宇文褒趙崧趙式何邦基劉處厚黄文昌勾敢臨周天休王毅夫劉欽梁成房希參申祖錫宋良儒費汝弼倪陟明陳之復郭選范百嘉華陽縣人羅鼎金堂縣人謝混金堂縣人韓賁韓浚夫張楚民灌縣人何嗣老何彦立范弁羅敏功何如石張上行徳陽縣人文軫張汲文正權唐嘉上俱綿州人楊天恵郫縣人尹瞻温江縣人士上俱元豐進楊畬杜資深費貢勾宗召康朝喬嗣立賈章郭行中楊大章張元才史公度栁璣范祖義范祖翼上俱華陽縣人虞充謝濳俱金堂縣人楊開喻鼎輔員子思謝庶幾員悅黄遷張亢上俱仁夀縣人楊添佑鄭少微華陽縣人許樊上俱元祐進士趙知剛郭簡循張康時黎揆文初許因楊韞李昇李蠡袁武震趙霖范世雄牟興道倪元明何問杜翊世范沖俱華陽縣人蹇汝明金堂縣人文正倫張思永蒲伯祥李大徹上俱紹聖進士閻夷簡楊辰陳坤吕馬成宋乃餘上俱成都府人王時雍李新俱仁夀縣人青陽回簡州人姚騰上俱元符進士郭允中郭執中趙耆孫范洵李敞郭進修張觀常績謝良佐李彦升郭衢亨宋京黎簡能郭阜梁式王國光王耆栁允諧勾濤新繁縣人古詢直王宗元吴詢李百藥牟邦基郭信老内江縣人黄哲華陽縣人湯三錫文正思張安行馬受黄華上俱崇寜進士黎簡亷徐大成文振竒羅興韓宇文黄中劉砥平黄騭朱曰嚴郭溥將王輔范沆王稑上俱成都府人宇文虚中雙流縣人王棠王辨之李康權上俱仁夀縣人韓迪譚望謝啟上俱郫縣人范懐侯鐸張樂青陽競井硏縣人何慤内江縣人景斆綿州人進上俱大觀士周亮功周方彭賓范天賀劉翊李邦光郭眉夀栁允蹈鄧郊馮勲張天迪杜本世王軹張煥楊起鄧雍楊桓樊祐杜天佑宇文璞李弼違雷硏費機宇文恒郭印范沈唐折楊希仲新繁縣人費植張弼直梁天輔張協劉義李弼直范執中馮海郭黄中郭美中許自得方機上俱成都府人李􅂜徐熙迪張密古亶上俱金堂縣人青陽充崔天迪韓駒何㮚吕思正虞祺馮時喻贄喻安雅黄唐傑上俱仁夀縣人錢驤勾聲何俱范安節賈天英謝天圭錢恬上俱郫縣人喻變井研縣人楊植黄允中何如霆唐之問張亶臣濯行王寵光上俱内江縣人王溥什邡縣人趙君模呉致馮如為上俱綿州人張虞英新津縣人勾龍如淵灌縣人進上俱政和士韓思舜房興之王國器張汾王棐周平施廷臣房永周禴聶軫韓軫韓郁楊敏馮九思施徳修費樞文振徳郭勉中文悅費行之朱衍郭畯宋乃普戴焯宋稱郭由中楊貫勾亷張惇趙延王介郭漸閻安祺楊衍郭伸范仲南潘當時范游羅凡上俱成都府人吕伸謝思誠樊汝霖上俱金堂縣人何棠喻燮袁天騭王倬韓忱楊傑陳知常陳剛上俱仁夀縣人蕭卞馮褒張周欽上俱郫縣人何悊何慈王迪上俱内江縣人趙雄飛胡棐迪文良張宋翰上俱綿州人宣和進士喻汝礪仁夀縣人靖康進士范仲凱王克勤袁自省閻楷張洙梁友正上俱成都府人沈逍張掞庭張審上俱金堂縣人何榘張稷何邦昌牟國材陳在庭上俱仁夀縣人黄彭祖内江縣人張詢陳卓陳俛景騭景蘇上俱綿州人建炎進士韓墨卿楊承袁渤周時劉尚中馬騏許史梁益嚴賞王信臣常城郭知弟馬犍范仲芟楊大中張嶧王敦和張宗紹費樸郭知元李若愚楊從望郭知節燕大中馮知剛楊大望師問楊民望張清王興費振張賓樊彦思賈侑張政景煥王孝亷李維杜思權李汝舟張敏蒲榮楊起宋邈郭相范仲時郭公麟文振鷺甘丹李輝尹衡勾龍時許自昭程知微牟南琴楊圭張良能王子信王揆之袁拱辰王元槩馮應唐起寅張申之張欽宇文畢李邁劉瑛王孝義楊倚張謨梁彬茍世昌倪紱李椿郭儔周松夀楊祺郭知牧黎綬王蕃張師心蹇克諧費安中黎商老范仲微何騰范仲較王睿蘇頴士王回范仲偉楊普王振劉焞許自治張大同楊佳史楠郭衡史忠范仲圭許自成楊耆夀䄷浮楊賓楊煥施普卿房鉅唐子之范仲符張煇范淐宇文任任禧李謙范仲敏蹇祺杜舜舉楊鏜牟天麟何溱支邦傑蹇誼宇文紹節吕誼之孫松夀楊箴李鈞劉如霖何正伸范仲綸王并唐朝李輝上俱成都府人錢復思雷友直任山謝敦夫謝忠厚盧如晦虞杞張潮蹇懋任雲濤張在庭張行李繼張甯王定國張公卿李賁張觀國張過庭馮賞李珪王柄李陽煥張康國王玨李憲楊丙楊頴錢盈姚應變上俱金堂縣人竇敷牟國賞董貢譚篆韓訏喻起喻充蘇輔黄巨卿喻漢卿員良臣杜悟于時傑牟國卿牟庠蘇衍牟周卿何邦彦員南圭楊天休孫洙虞育韓炳李伊鼎喻邦佐牟子正于椿黄朝卿費潮牟琮員彦材孫確何杞虞允文牟天麟韓汴喻驎員興宗韓椿陳申郭鼎牟國成員沆上俱仁夀縣人張孝祥狀元張敦仁袁炎張康臣畢豫王執中陳堯年郭郊陳柏年王麟陳熙年何師中黄邦直勾龍亶郭豐王詵上俱内江縣人張淙沈灌縣人趙逵狀元資縣人張諾黄匯俱崇寜縣人索揚李繁胡晉臣上俱崇慶州人張振己李季儀俱漢州人孫觀國毛亢宗王思道李居中譚潭張諮袁觀文楷式趙汝明馮總馮適孫廷玉馬慶孫王易簡李長庚范思復張簡王正炎張應卯任源威州人甘定中什邡縣人李鎔王時彦竇卞上俱紹興進士仲大年任虞俱金堂縣人趙雄内江縣人歴右丞相上俱隆興進士白選沈子震李執中錢度樊芻王從軍上俱成都縣人蘇觀黄炎牟琰袁灝鮑朝卿牟燾青陽仲博崔淵陳損之喻倪楊椿年牟甲喻備李舜臣趙楙任寅王從革廖炳陳叔卿上俱井研縣人謝時舉謝三俊黄清問趙伯揆王南中陳伯牛劉丙楊輝陳堯張汝弼何元亮貞驥何三才鄭昂張剛錢儔陳頤賈敦夫雍有容魏憲張忠謝敦馮穫牟丙謝二連李占黄常楊充張安問趙迪趙百聰張元龍劉令孫趙洵李忻王化鵬魏譽仲史堯仁支自中黄依仁張穆錢仁勾龍復李浩王庠王翔錢大夀郫縣人勾龍京濯庾内江縣人文日新文炎綿州人黎毓張宗楊澥任振金堂縣人士上俱乾道進耿望之王叔任文衡中張謨支良耜范子弗楊焦昇文逵之彭仁徹申叔環潘慶基王子甲劉山凝宋華甫申叔儉劉申范仲黼陳昭陳咸仁仁壽縣人張炎金堂縣人范子長賴平楊仲正杜蓋李甫材袁桂張若谷馬仲楊庚劉大臨楊震仲李賁之房成任持范子修賈紳錢義甫劉時昇趙詢范晩趙寅吕田趙彦標姚子文趙思黼王太張壽支元龍王鐸王順馮宜之上俱成都府人郭立義喻慶孫青陽師魯龍旦陳昭文陳咸譚季士李雲瑞喻子庚陳焯孫文濟陳厚樊森張伯源喻如箎張若谷程遇孫馬仲午馬仲寅喻革鄧洵美仁壽縣人范曉張釋裴仲虎王鐸郫縣人何輝瞿賡亞魁王天麟張輝王釋馮三槐内江縣人趙實張燾王頤起王正嗣綿州人進上俱淳熙士青陽燮謝士亮仁夀縣人何蕃王用中内江縣人士上俱紹熙進王起范思復李長庚宋徳之李蘩俱崇慶州人李正張有元楊煥楊酉孫崔棘馮公揆李道傳井研縣人程壬孫喻顯道樊漸王廷傑李震韓深仁夀縣人趙希混黄震龍趙介胄張方資縣人謝璹趙希耑趙思柵賈元巽趙希濟黄太左震劉成道楊墀趙思敬郫縣人費行父劉逵之王震成黄舜仁王太乙楊辨内江縣人張榮仲漢州人朱序楊道孫綿州人進上俱慶元士趙師邵黄震楊亮文兗上俱成都府人喻榮孫喻宋傑仁夀縣人何應龍何􅊅内江縣人勾龍公翊蹇必雄漢州人進上俱嘉泰士文侯王成孫何炎仲上俱成都府人崔棟仁夀縣人許奕簡州人狀元鄭伏一内江縣人范震東漢州人文居趙彦呐彭縣人王成綿州人進上俱開禧士雍午之宋炎湯甲尹考謝全智張坤臣張伯于牟貴勾易之黄鏜李世衡謝餘智楊黄中員伯熊喻厪喻子庚楊虞用班益新李性傳井研縣人鄧若水牟子才仁夀縣人張瓘黄震魏林裴選揚黄寅震李仲熊何觀光趙炎震王如意張受傳張俊錢淵鄧震發蹇許王國華支中弼謝震寅王昌辰趙希慤趙炎趙子信謝方叔王揆之謝用之支鑑張良能勾良傳張光遠張開發郫縣人王震舉内江縣人甘震王垌夫漢州人馮申王戍孫蒲子美蒲申之馬淵鄧真孫朱淡綿州人進上俱嘉定士趙希隆成都府人趙與玳仁夀縣人謝伯林王翊郫縣人黄君甘節梅鑄甘振叔漢州人鄧丹祖伊震發綿州人進上俱寳慶士勾復之程世徳李逵