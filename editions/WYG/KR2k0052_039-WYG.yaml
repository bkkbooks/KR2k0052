body:
  text: 欽定四庫全書四川通志卷三十九藝文粤自猗南寄咏江渚興歌蜀之藝文所由肇也嗣是漢有馬揚之賦唐有陳李之詩宋有三蘇之詩文論策類皆表儀百代為舉世所宗仰亦云盛矣他若異地之賢宦游寄跡如武侯二表為伊訓説命之遺杜甫詩篇亦雅頌風騷之亞而歴代諸名人彬彬蔚起可存實多至我朝則巍巍宸翰既如日月經天而名公鉅卿所撰述者亦復炳炳烺烺羽翼經傳蓋所謂鼓吹休明者此其選歟作藝文志御製聖祖仁皇帝御製瀘定橋碑記蜀自成都行七百餘里至建昌道屬之化林營化林所隷曰沈村曰烹壩曰子牛皆瀘河舊渡口而入打箭爐所經之道也考水經注瀘水源出曲羅而未明指何地按圖誌大渡河水即瀘水也大渡河水源出吐蕃匯番境諸水至魚通河而合流入内地則瀘水所從來逺矣打箭爐未詳所始蜀人傳漢諸葛武鄉侯亮鑄軍器於此故名元設長河西宣慰等司明因之凡藏番入貢及市茶者皆取道焉自明末蜀被冦亂番人竊踞西爐迄本朝猶阻聲教頃者黠番肆虐戕害我明正土官侵偪河東地罪不容逭康熙三十九年各遣發師旅三路徂征四十年春師入克之土壤千里悉𨽻版圖鍋莊木鴉萬二千餘戸接踵歸附西爐之道遂通顧入爐必經瀘水而渡瀘向無橋梁巡撫能泰奏言瀘河三渡口高崖夾峙一水中流雷犇矢激不可施舟楫行人援索懸渡險莫甚焉兹偕提臣岳昇龍相度形勢距化林營八十餘里山址坦平地名安樂擬即其處彷鐵索橋規制建橋以便行旅朕嘉其意詔從所請於是鳩工構造橋東西長三十一丈一尺寛九尺施索九條索之長視橋身餘八丈而贏覆版木於上而又翼以扶欄鎮以梁柱皆鎔鐵以庀事橋成凡命使之往來郵傳之絡繹軍民商賈之車徒負載咸得安驅疾馳而不致病於跋涉繪圖來上深愜朕懐爰賜橋名曰瀘定任事著勞諸臣并優詔奬敘仍申命設兵戍守夫事無大小期於利民功無難易貴於經久今既肇建兹舉俾去危而即安繼自今嵗時繕修協力維䕶皆官斯土者責也尚永保勿壞以為斯民貽無窮之利是為記御製平定西藏碑文昔者太宗文皇帝之崇徳七年班禪額爾徳尼達賴喇嘛固始汗謂東土有聖人出特遣使自人跡不至之區經讎敵之國閱數年始達盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之殁第巴隠匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏苦苦腦兒羣衆公同之請中間策妄阿喇蒲坦妄生事端動準噶爾之衆肆行奸詐滅壊達賴喇嘛并廢第五輩達賴之塔辱衊班禪毁壊寺廟殺戮喇嘛名為興法而實滅之且欲竊據圖伯特國朕以其所為非法爰命皇子為大將軍王又遣朕子孫等調撥滿洲䝉古緑旗兵各數萬歴烟瘴之地士馬安然而至賊衆三次乗夜盜營我兵奮勇擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今虎必爾汗冊印封為第六輩達賴喇嘛安置禪榻撫綏圖伯特僧俗人衆各復生業於是文武臣工咸謂王師西討歴瘴癘險逺之區曽未半載輒建殊勲實從古所未有而諸䝉古部落及圖伯特酋長亦合詞奏曰皇帝勇畧神武超越往代天兵所臨邪魔掃蕩復興蒙古向所尊奉法教坎麻藏衞等部人衆咸得拔離湯火樂土安居如此盛徳大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招提以垂永久朕以何功焉而羣衆勤請不已爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落累世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾康熙四十一年嵗次壬午十二月朔日皇帝勅命御前頭等侍衞海青伍格朝峩眉山隨齎御賜扁聨詩章經卷散給成都府屬昭覺寺僧臣徹綱祗領御賜扁額法界清嚴御賜詩章入門不見寺十里聽松風香氣飄金界清隂帶碧空霜皮僧臘老天籟梵聲通咫尺蓬萊樹春光共鬱葱御賜金字心經一部墨刻藥師經一部䕶國菴僧臣超密祗領御賜扁額蓮界御賜墨刻金剛經一部文殊院僧臣宏法祗領御賜扁額空林御賜詩章人皆趨世出世者誰人皆遺世世誰為之爰有大士處此兩間非濁非清非律非禪惟是海月都師之式庶復見之衆縛自脱我夢西湖天宫化成見兩天竺宛如生平雲波月滿遺像在此誰其贊之惟東坡子臨米芾御賜墨刻金剛經一部藥師經一部二仙菴道人臣陳清覺祗領御賜扁額丹臺碧洞御賜詩章赤龍黒虎各西東四象交加戊巳中復姤自兹能運用金丹誰道不成功峩眉山伏虎寺僧臣祗領御賜扁額離垢園御賜詩章宿世身金粟初因社白蓮瞻依神八萬接引佛三千果結菩提樹池分阿耨泉無生能自悟雨似散花天御賜金字心經一部金剛經一部藥師經一部又祗領御賜扁額善覺寺御賜對聨到處花為雨行時杖出泉御賜詩章名山越遍未到天涯願得真印勤修離家雷音雖拜那見拈花知此無益再遊中華八旬老耄行履不斜言語忠厚一宇弗遮觀爾樸誠朕意甚嘉峩眉嵂崪直逼雲霞明心見性壽守毋譁御賜金剛經一部大峩眉僧臣祗領御賜對聨洗鉢泉初暖焚香曉更清御賜金剛經一部洪春坪僧臣祗領御賜扁額忘塵慮御賜對聨錫飛常近鶴桮渡不驚鷗御賜金剛經一部藥師經一部白龍洞僧臣祗領御賜對聨掛衲雲林靜翻經石榻涼御賜金剛經一部毘盧殿僧臣祗領御賜詩章釣艇去悠悠烟波春復秋惟將一點火何處宿蘆洲御賜金剛經一部藥師經一部雷洞坪僧臣祗領御賜扁額靈覺御賜金剛經一部藏經閣僧臣祗領御賜扁額玉毫光御賜對聨絶頂來還晩寒窻睡達明御賜金剛經一部又祗領御賜扁額野雲御賜詩章何所問津梁行行到上方天香飄廣殿山氣宿空廊石潄泉聲細林穿鳥路長疎鐘沈片雨坐覺俗情忘又祗領御賜扁額臥雲菴御賜金剛經一部藥師經一部心經一部光相寺僧臣祗領御賜扁額慈燈普照康熙四十二年御賜江瀆廟扁額涵濡萬物康熙四十八年御賜江瀆廟扁額永奠大川雍正九年御製惠逺廟碑文我國家受天眷命撫御寰瀛光被四表莫不尊親太宗文皇帝崇徳七年班禪額爾徳尼達賴喇嘛知東土有聖人遣使通欵路涉萬里時經數載始達盛京逮世祖章皇帝時遂親至京師朝覲備䝉恩眷後以策妄阿喇蒲坦肆惡逞奸殘蹂西藏皇考聖祖仁皇帝特遣大師計日平定撫綏人衆各復生業賜今虎必爾汗冊印封號安置禪榻重興黄教用以慰番衆皈依佛法之誠並酬班禪達賴喇嘛累世恭順之悃也朕御極以來加意䕶持俾安淨土因思古今之有佛教特以勸善懲惡濟人覺世為本黄教之傳所以推廣佛經之㫖也演教之地愈多則佛法之流布愈廣而番夷之嚮善者益衆西藏既有班禪額爾徳尼而近邊之番夷離藏遼逺皆有皈依佛法之心因思川省打箭爐之外有地曰噶達昔年達賴喇嘛曽駐錫於此爰相度川原創建廟宇發帑金數十萬兩遣官董司工役依西方白賴本佛廟之圖式凡為殿堂樓房一千餘間又為平房四百間賜額曰惠逺丹艧輝煌器用充備置兵以衞之達賴喇嘛來登禪榻率諸徒衆咸就新居諸番耆幼踴躍欣喜使臣奏言彼土早寒自造寺以來氣候和暖深秋未凍則知兹寺之建人神胥慶山川著靈朕所以仰體皇考厚酬達賴喇嘛累世恭順之忱且以廣布黄教宣講經典使番夷僧俗崇法慕義億萬斯年永躋仁壽之域則以佐助王化實有裨益是用紀文豐碑以昭示久逺焉歴代御製蜀漢昭烈帝即位告天文漢有天下厯數無疆曹操阻兵戮殺主后子丕載其凶逆竊居神器羣臣將士以為社稷墮廢備宜修之嗣武二祖恭行天罰詢於庶外遐方君長僉曰天命不可以不答祖業不可以久替四海不可以無王率土式望在備一人備畏天明命又懼漢室將湮於地謹擇元日與百僚登壇受皇帝璽綬修燔瘞告類於天神惟神嚮祚於漢家永綏四海唐明皇祭江瀆文惟神包總大川朝宗於海功昭潤化徳表靈長今因夏首用率常典敬以玉帛犧牲粢盛庶品明薦於神宋哲宗除范純仁左僕射制勅朕惟朝廷之盛衰常以輔相為輕重若根本强固則精神折衝故蒍吕臣奉已而不在民則晉文無復憂色汲長孺直諌而守死節則淮南為之寢謀朕思得其人付之以政使天下聞風而心服則人主無為而日尊咨爾在廷咸聴朕命中大夫同知樞密院事上柱國高平郡開國伯食邑九百戸實封二百戸賜紫金魚袋范純仁器逺任重才周識明進如孟子之敬王退若蕭生之憂國朕覽觀仁祖之遺跡永懐慶厯之元臣强諫不忘喜臧孫之有後我心是似命召虎以來宣雖兵政之與聞疑逺猷之未究坐論西省進貳文昌増秩益封兼隆異數於戲時難得而易失民難安而易危予欲守在四方以汝為偃兵之姚宋予欲藏於百姓以汝為息民之蕭曹勉思古人以稱朕意可特授太中大夫守尚書右僕射兼中書侍郎進封高平郡開國公加食邑七百戸實封三百戸餘如故孝宗御製蘇軾贊并序之成一代之文章必能立天下大節立天下之大節非其氣足以高天下者未之能焉孔子曰臨大節而不可奪君子人歟孟子曰我善養吾浩然之氣以直養而無害則塞乎天地之間蓋存之於身謂之􅂔見之於事謂之節節也􅂔也合而言之道也以是成義剛而無餒故能參天地之化關盛衰之運不然則雕蟲篆刻童子之事耳烏足與論一代之文章哉故贈太師諡文忠蘇軾忠言讜論立朝大節一時廷臣無出其右負其豪氣志在行其所學放浪嶺海文不少衰力斡造化元氣淋漓窮理盡性實通天人山川風雲草木花實品彚萬狀可喜可愕有感於中一寓之於文雄視百代自作一家渾涵光芒至是而大成矣朕萬幾餘暇抽繹詩書他人之文或得或失多所取舍至於軾所著讀之終日亹亹忘倦常寘左右以為矜式信可謂一代文章之宗也歟乃作贊曰維古文章言必已出綴詞緝句文之蟊賊手抉雲漢斡造化機氣高天下乃克為之猗嗟若人冠冕百代忠言讜論不顧身害凜凜大節見於立朝放浪嶺海侣於漁樵嵗晚歸來其文益偉波瀾老成無所附麗昭晰無疑優游有餘跨唐越漢自我師模賈馬豪奇韓栁雄健前哲典刑未足多羨敬想高風恨不同時掩卷三嘆播以聲詩乾道九年閏正月選徳殿書賜蘇嶠明仁宗賜少師吏部尚書蹇義勅曩朕監國之時卿以先朝舊臣擢兼詹事日侍左右時肇建兩京政務方殷隨事籌畫適中惟難卿以善翊君以義徇國勞心焦思不恤身家載歴艱虞未嘗有咨嗟之意及朕嗣承大統贊襄治理用濟斯民喻朕於道不懈益恭二十餘年夷險一節朕篤不忘兹以巳意創製蹇忠貞印一枚賜卿用藏於家傳之後世俾爾子孫知前人顯榮於國者良不易致宜加保守朕之子孫亦知卿弼予於艱體朕愛卿之心以保爾子孫庶幾上下相安與國咸休書曰惟后非賢不乂惟賢非后不食自古君臣相遇難矣哉往績維茂永終是圖故勅宣宗元年遣永康侯徐安致祭江瀆文大江之流神發其源利濟之功民務永賴兹予嗣承大統謹用祭告惟神昭格惠我邦家詩漢古辭蠶叢國詩川崖惟平其稼多黍㫖酒嘉穀可以養父野惟阜丘彼稷多有嘉穀㫖酒可以養母既惟月孟春獺祭彼崖永言孝思享祀孔嘉彼黍潔彼儀惟澤蒸命良辰祖考來格惟日月明明亦惟其夕誰能長生不朽難獲徳實寶富貴何常我思古人令問令望灌令歌崔瑗為灌令開溝耕田民賴其利歌曰天降神明君錫我慈仁父臨民布徳澤恩惠施以序穿溝廣溉灌抉渠作甘雨豐年歌漢永建中泰山吳資元約為郡守屢獲豐年民歌之曰習習晨風動澍雨潤禾苗我后恤時務我民以優饒去思歌吳資遷去民人思慕又歌曰望逺忽不見惆悵嘗徘徊恩澤實難忘悠悠心永懐譙君黄詩譙君黄仕成哀之世為諌議大夫數進忠言後違避王莽又不仕公孫述述怒遣使齎藥酒以懼之君黄嘆曰吾不省藥乎其子瑛納錢八百萬得免國人作詩曰肅肅清節士執徳實固貞違惡以授令没世遺令聲應季先嚴王思詩巴郡嚴王思為揚州刺史惠愛在民毎當遷宫士民塞路攀轅詔遂留之居官十八年卒百姓若喪考妣義崇者齎錢百萬欲以贍王思家其子徐州刺史不受送吏義崇不忍持還乃散以為食食行客巴郡太守汝南應季先善而美之乃作詩曰乗彼西漢潭潭其淵君子愷悌作民二親没世遺愛式鏡後人三節婦歌永初中廣漢漢中羌反虐及巴郡有馬妙祈妻義王元憒妻姬趙蔓君妻華夙喪夫執共姜之節守一醮之禮號曰三貞遭亂兵迫匿懼其拘辱三人同時自沈於西漢水而死有黄鳥鳴其亡處徘徊焉國人傷之乃作詩曰關關黄鳥爰集於樹窈窕淑女是繡是黼惟彼繡黼其心匪石嗟爾臨川邈不可獲古辭白頭吟與櫂歌同調五解皚如山上雪皎若雲間月聞君有兩意故來相決絶平生共城中何嘗斗酒㑹今日斗酒㑹明旦溝水頭蹀躞御溝水溝水東西流郭東亦有樵郭西亦有樵兩樵相推與無親為誰嬌凄凄重凄凄嫁娶不須啼願得一心人白頭不相離竹竿何嫋嫋魚尾何離簁男兒欲相知何用錢刀為䶘如馬噉萁川上高士嬉今日相對樂延年萬嵗期峽中行者歌宜都山川記云峽中猿鳴至清山谷傳響泠泠不絶行者歌之曰巴東三峽巫峽長猿鳴三聲淚沾裳巴東三峽猿鳴悲猿鳴三聲淚沾衣黄牛歌朝發黄牛暮宿黄牛三朝三暮黄牛如故淫豫歌李膺益州記云灩澦堆夏水漲没數十丈其狀如馬舟人不敢進故曰灩澦又曰猶豫言舟子取途不決水脈故猶豫也樂府作淫豫坤元録作冘豫南史云淫豫大如襆瞿塘不可觸樂府云淫豫大如馬瞿塘不可下類要云淫豫大如鼈瞿塘行舟絶淫豫大如龜瞿塘不可窺水經注灩澦歌灘頭白浡堅相持倐忽淪没别無期先民謡岷阜之山江出其腹帝以㑹昌神以建福大饑不饑蜀有蹲鴟大旱不亂蜀有廣漢巴郡謡漢安帝時巴郡太守連失道其國人諷之曰明明上天下土是觀帝選元后永定民安孰不可念禍福由人願君奉詔惟徳日親廉叔度歌後漢書曰廉范字叔度建初中為蜀郡太守成都民物豐衍邑宇逼側舊制禁民夜作以防火災而更相隠蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓以為便乃歌之曰廉叔度來何暮不禁火民安作昔無襦今五袴灩澦歌孝子傳庾子輿扶父柩過瞿塘六月水泛子輿禱而遂平既過泛溢如故人歌之曰灩澦如牛本不通瞿塘水退為庾公晉張載登成都白兔樓詩重城結曲阿飛宇起層樓累棟出雲表嶢嶭臨太虛高軒啓朱扉迴望暢八隅西瞻岷山嶺嵳峩似荆巫蹲䲭蔽地生原隰殖嘉蔬雖遇堯湯世民食恒有餘鬱鬱小城中岌岌百族居街􅃷紛綺錯高甍夾長衢藉問揚子舍相見長卿廬程卓累千金慆奢擬五侯門有連騎客翠帶腰吳鈎鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黒子過龍醢菓饌踰蟹蝑芳茶冠六清溢味播九區人生苟安樂兹土聊可娛梁簡文帝蜀道難詩巫山七百里巴水三回曲笛聲下復高猿啼㫁還續陳隂鏗蜀道難詩王尊奉漢朝靈關不憚遥高岷長有雪隂棧屢經燒輪摧九折路騎阻七星橋蜀道如此險功名詎可要隋僧智𤣥遊三學山詩秀嶺接重烟嶔岑上半天絶巖低更舉危峯㫁復連側石傾斜澗迴流瀉曲泉野紅知草凍春來鳥自傳異錦無機織猿鳴詎假弦葉密風難度枝疎影易穿抱裘依澗沼策杖戲荒田游心青漢表置想白雲邊榮名非我願息意且蕭然唐王勃遊梵宇三學寺詩香閣披青磴琱臺控紫岑葉齊山路狹花積野壇深蘿幌棲禪影松門聽梵音遽忻陪妙躅延賞滌煩襟𤣥武山聖泉詩并序𤣥武山有聖泉焉浸淫歴數千百年乗巖泌湧接磴分流下瞰長江沙堤石崖咸古人遺迹也兹乃青蘋緑菱紫苔蒼蘚遂使江湖思逺寤寐寄託既而崇巒左峙石壑前縈丹崿萬尋碧潭千頃松風唱響竹露熏空瀟瀟乎人間之難遇也方欲以林壑為天屬琴罇為日用嗟乎古今同逝方深川上之悲少長偕遊且盡山隂之樂盍題芳什共寫高情詩得泉字詩云披襟乗石磴列籍俯深泉蘭􅂔薰山酌松聲韻野絃影飄垂葉外香度落花前興洽林塘晚重巖起夕烟陳子昂白帝懐古詩日落滄江晚停橈問土風城臨巴子國苔没漢王宫荒服猶周甸深山尚禹功巖懸青壁㫁地險碧流通古木生雲際歸帆出霧中川途去無限客思坐何窮劉希夷巫山詩巫山幽隂地神女艷陽年襄王伺容色落日望悠然歸來高堂夜金釭焰青烟頽想卧瑶席夢魂何翩翩揺落殊未已榮華倐阻遷愁思瀟湘浦悲涼雲夢田猿啼秋風夜雁飛明月天巴歌不可聽聽此益潺湲張九齡巫山高詩巫山與天近烟景常青熒此中楚王夢夢得神女靈神女去已久白雲空㝠㝠惟有巴猿嘯哀音不可聽蘇頲武擔山寺詩武擔獨蒼然墳山下至泉鼈靈時共盡龍女事同遷松柏銜哀處幡花種福田詎知留鏡石長與法輪圓利州兆佛龕前重於去嵗題處作重巖載清美分塔起層標蜀守經塗處巴人作禮朝地凝三界出空見六塵銷臥石鋪蒼蘚行藤覆緑條嵗年書有記非為學題橋王維曉行巴峽詩際曉投巴峽餘春憶帝京晴江一女浣朝日衆雞鳴水國舟中市山橘樹杪行登高萬井出眺迥二流明人作殊方語鶯為舊國聲賴多山水趣稍解别離情鷰子龕禪師詩山中鷰子龕路劇羊腸惡裂地競盤屈插天多峭崿漆泉吼而噴怪石看欲落伯禹訪未知五丁愁不鑿上人無生緣生長居紫閣六時自槌磬一飲尚帶索種田燒白雲斫漆響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙博救世多慈悲即心無行作周南倦積阻蜀物多淹泊巖腹自旁穿澗脣時外拓橋因倒樹架柵值垂藤縳鳥道悉已平龍宫為之涸跳波誰揭厲