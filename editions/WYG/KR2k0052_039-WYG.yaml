下當年使鷁招回段誰道地拘偪仄須知天閟幽妍一丹青臺閣何人淡掃松烟謁丞相祠俯八陣圖詩人言忠孝不磨滅神物䕶持存水滸千年陵谷幾變遷此石不易自章武本由黄帝古兵法六十四以八為伍髯孫且懼仲達走賊操遊魂何敢拒刻銘沙伏水底碑教戰石存山下鼓一片丹心天地間萬世聞風猶禦侮我來起敬凛如生再拜一言公必取瀼流東截陣圖前寢墮城壁頽民宇能安拳石止波流願回瀼患思民撫常使夔人知感公踏磧年年弔千古李之純西園辨蘭亭詩緑葉纖長間紫莖蜀人未始以蘭名有時只怪香盈室此日方傳譽滿城恩意和風揚馥郁光榮灝露滴清英庭階若不逢精鑒何異深林靜處生章楶海棠軒詩珍葩寄幽島正對孤軒植優柔自俯仰紅緑若組織春酣晴日曛坐久濃香逼池面淨可鑑朝霞罩澄碧許將西園詩高牙負北郭芳園路西轉烏鳴戀故木蘭茁歸新畹坐延花景深行倚松枝穩翳然想林木㑹心不在逺豐稷詩同前題虛一水從何來應是崑山頂釃成緑玉池堂透清影公退泠然賞了非心外境魚泳陽光動鳥啼春晝永不石印魚在屏犀透星入角迺知明月光日用人覺陟此百尺臺餘念坐消剝洞曉弦望機仙丹兹可學風長虹臥松江一葦航大河豈如此安穏無復畏波幽香萃花島魚藻㫖且多徙倚小欄曲月色透薜蘿孫甫詩同前題清回環引細泉泉聲潄簷底美哉智者心通樂流水琤琮戛鳴球淅瀝泛緑綺塵慮無由得何須洗雙耳簹小閣連雪峯憑欄憙幽玩紅接海棠洲緑對篔岸有時開罇罍波影侵几案何須架長江然後沖雲漢周敦頤冠鼇亭詩紫霄峯上讀書臺深鏁雲中久不開為愛此山真酷似冠鼇他日我重來蘇軾入峽詩自昔懐清賞今兹得縱探長江連楚蜀萬派瀉東南合水來如電黔波緑似藍餘流細不數逺勢競相參入峽初無路連山忽似龕縈紆收浩渺蹙縮作淵潭風過如呼吸雲生似吐含垂崖鳴窣窣垂蔓緑􅆴􅆴冷翠多崖竹孤生有石楠飛泉飄亂雪怪石走驚驂絶澗知深淺樵僮忽兩三人烟偶逢郭沙岸可乗籃野戍荒州縣邦君古子男放衙鳴晚鼓畱客薦霜柑聞道黄精草叢生緑玉篸盡應充食飲不見有彭聃氣候冬猶暖星河夜半涵遺民悲昶衍舊俗接魚蠶板屋漫無瓦巖居窄似庵伐薪嘗冐險得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固常諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽邃信難耽獨愛孤棲鶻高超百尺嵐横飛應自得逺颺似無貪振翮遊霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多為富貴酣試看飛鳥樂高遁此心甘送戴䝉赴成都玉局觀歸老詩拾遺被酒行歌處野梅官栁西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年已足燒百嵗風狂定何有羨君今作峩眉叟縱未家生執㦸郎也應世出埋輪守莫欺老病未歸身玉局他年第幾人㑹待子猷清興發還須雪夜去尋君寄黎眉州膠州高處望西川應在孤雲落照邊瓦屋寒堆春後雪峩眉翠掃雨餘天治經方笑春秋學好士今無六一賢且待淵明賦歸去共將詩酒趂流年八陣磧詩平沙何茫茫髣髴見石蕝縱横滿江上嵗嵗沙水齧孔明死已久誰復辨行列神兵非學到自古不畱訣至人已心悟後世徒妄説自從漢道衰蜂起盡姦傑英雄不相下禍難久連結驅民市無烟戰野江流血萬人賭一擲殺盡如沃雪不為久逺計草草常無法孔明最後起意欲掃羣孽崎嶇事節制隠忍久不決志大遂成迂嵗月去如瞥六師紛未整一旦英雄折唯餘八陣圖千古壯夔峽蘇轍絶勝亭詩夜郎秋漲水連空上有虛亭縹緲中山滿長天宜落日江吹曠野作驚風爨烟慘淡浮前浦魚艇縱横逐釣筒未省岳陽何似此應須仔細問南公張天覺䕶國寺詩薄宦區區可嘆嗟寂寥寒館過邨家神錐豈向囊中出寶劒聊憑醉後誇就禄勉持毛義檄讀書空滿惠生車掩關不識青春好一夜狂風已落花胡宗師題雙流保國觀古柏詩孔明廟前古柏奇此木氣象尤過之幹東髣髴烟焰起鐵龍空駕焚一枝真人丹成何所適世傳乗鶴沖天飛求詩道士心彌堅試聽一誦工曹詩馬提幹涪州十韻詩地居襟喉重城依雉堞堅東漸鄰楚分南望帶夷邊舟楫三川㑹封疆五郡連人烟繁峽内風物冠江前溪自吳公邑園由妃子傳許雄山共峻馬援壩相聨灘急羣瀦沸崖高落馬懸石魚占嵗稔鐵櫃驗諸天地暖冬無雪人貧嵗不綿巖標山谷子觀望爾朱僊王益新繁縣顯曜院詩梵宇蕭條白日長苦空譚麈接藤牀雲章酷愛休詩麗蓮柄慵思逺社香石髮雨梳雞苑寂風梭春織鷲山涼刧灰心火銷平盡又聽鐘聲下講堂留題重光寺羅漢院贈憲上人詩曉剃吟髭雪半零海窻曽呪鉢龍醒蚤知西竺能持法應笑南僧不㑹經雲氣晝閒侵麈柄蘚痕春老上銅瓶近來禪觀都無語手指餘花滿寺庭留題清涼院詩背倚青峯面枕溪濡毫新向壁間題善根不撓金蓮合淨界無塵水月齊㑹啓苾蒭真樂境花開薝蔔逺香畦因思祖塔嘗遊處更在龍盤虎踞西頓起贈廣都寓舍賢婦二喻詩嘗聞趙清獻䘏孤慰亡友至今西蜀人談美不容口二喻出儒家清貧一無有零丁依老姑破屋僧堂後相對誦詩書未嘗窺戸牖圭折玉彌芳山寒松更茂縣宰初聞名咨嗟為之久從容語其配夫人曽見否長者二十三次亦十八九青裾長蔽膝荆簪短在首我欲效清獻言不為人取近於吾邑中選壻得豪右夫人相宰意魚蔬薦罇酒屈致二喻來呼名老與壽女子當有行詩稱逺父母饑寒日月長蓬蓽風雨漏大喻前致詞洒淚濕衣袖荷徳固已深緘情亦須剖上言親未葬心欲土自負下述妹未筓􅑱􅑱無傅姆還家復獻書自敘貧且陋鉛華世所悦銅臭非吾偶肯效閭閈間碌碌逐雞狗世無梁伯鸞應嫌孟光醜孔明若再生承女甘箕箒陳義一何高夫人驚拊手至今書藳在光輝射星斗董子慕高風喜曰真吾婦吾親雙白髮吾弟室未授睠言姊妹賢可以相先後五兩幣雖輕意則千金厚輜軒雙造門觀者競奔走女子尚能爾男兒宜自守重聘或不來豈欲終􅅵畝畜徳尚未充高位亦虛受寄語事君者慎勿輕去就魯交遊華山張超谷詩太華鎖深谷我來真景分有苗皆是藥無石不生雲急瀑和烟瀉清猿帶雨聞幽棲未忍别峯半月將曛楊天惠送孫正忠臣移成都小漕詩升平芝菌效神奇況乃賢豪用世資人物熙寧中興日風流荆國適同時起家便作三公客乗傳何為九折馳少府但分新賜節石渠猶借舊官儀素心久辦經綸計妙意前知遇合期聊與西南成勝事暫將清獻續良規橋横萬里重開府水接雙旌共去思怊悵參卿無限意道傍索筆强題詩闕及境小刹為徘徊殿閣隨窻向水開僧雖持鉢出客自艤舟來欲往無留計幽懐亦暢哉李宏遊金泉觀詩昔時謝女昇天處此日遺蹤尚宛然蟬蜕舊衣留石室龍飛勝地湧金泉碑書故事封蒼蘚殿寫真容鏁翠烟薄暮松巔聴鶴唳猶疑髣髴是神仙杜東之雲安玉虛觀南軒感事詩穉梧植嵗首擢起青琅玕其葉大如掌其隂灼若㸐弱幹尋丈展氣已雲霄干期之四五載定足容棲鸞我老無定居僦屋蝸螺跧平生輞川宅面勢胸中盤何當遂誅茆規庭十步寛非無松柏堅未易蒼龍摶種此南窻下醉眠風雨寒不念我蓄一櫛間關走西東攜持三十年出處靡同朝梳帶殘月暮鐘含清風戸樞既日運何由生蠧蟲今晨無故折脆響猶春蔥物理有定數吾生得無窮即事感百慮撫躬悲一翁空囊乏賮鐵閙市多良工鸞膠墮渺茫秋扇慚初終從渠老齒豁稱我醉顱童晁公休夏日過莊嚴寺詩十里溪橋梵宇新那知陌上漲紅塵老僧若要題名姓不道林泉皆故人驚病起支離倚瘦笻幅巾芒屩竹隂中聞蟬未有人句且就禪林一榻風張孝祥山居詩松韻笙竽徑雲容水墨天人行春色裏鶯語落花邊修竹三間屋清泉二頃田了無官府事雞犬慕登仙蒲瀛游呪土寺西臺詩偶到西城寺人言咒土墳夕陽臺半出秋草徑才分地下無紅粉天邊有碧雲徘徊追往事風急葉紛紛李石禮殿詩蜀侯作頖錦水湄先聖先師同此室巍然夫子據此座殿以周公名自昔聖人兩兩如一家均是周人先後出東家想見終夜夢猶與公孫同衮舄斯文授受乃關天不為漢唐加損益我時來視俎豆事重是漢人斤斧迹漢宫制度九天上散落人間此其一多因豐屋起戎心獨此數椽綿歳厯規摹嵽嵲東魯似􅂔象縹緲西岷敵竹松猶是斯干詩風雨方知隆棟吉雖然漢獻來至今閲時已多駒過隙中間豈無鳥鼠慮妙斲不知難輒易工師不揆亂如麻敢向殿門言匠石詩書譬彼尚闕文後學如何補遺逸祖龍非意竊登牀蝌蚪有心來壊壁舊章僅在命如絲誰勒吾詩勝丹漆郭祥正蜀道篇送别府君吳龍圖詩長吟李白蜀道難蜀道之難難於上青天長蛇併猛虎殺人吮血毒氣何腥羶錦城雖樂不可到側身西望泣涕空漣漣其辭辛酸語勢險有如曲折頓挫萬丈之洪泉世人不識寶玉璞毎欲酬價齊刀鉛求之往古疑未有惜哉不經孔子之手加鑱鐫公今易節帥蜀國為公重吟蜀道篇旌旗翻空度劒閣甲花照雪叅林顛雲鼉連催谷聲碎畫角漫引斜陽懸竹馬爭迎舊令尹指公長髯皓素非往年蜀道何坦然和氣拂拂回星躔長蛇深潛猛虎伏但愛雄飛呼雌響亮調朱絃時乎樂哉公之往也九重深拱堯舜聖廟堂論道孔孟賢撫綏斯民賴良守平平政化公能宣束兵興學有源本何必早夜開華筵嘗聞家家賣釵釧只待看舞青春前此風不革久愈薄稔嵗往往成凶年噫吁嘻今我無匹馬安得從公遊盡書政績來中州獻之明堂付太史陛下請捐西顧憂梅堯臣送錢駕部知邛州詩細雨梅初熟輕寒麥已秋路危趨劒道夢穏過刀州秦粟非吳食巴粳類越疇當壚無復舊試似長卿求石介嘉州寄左綿王虞部詩江山如畫望無窮況屬昇平嵗屢豐萬國芙蓉秋色裏千家方響月明中㫁霞半赭燕枝木零露偏留笙竹叢只欠流桮曲水宴風流未與左綿同范祖禹資州路東津寺詩山行無晨暮日瞑崖谷昏哀猿落客淚永路驚旅魂憑陵上高巔俯視大江奔迴環島嶼合縈轉洲渚屯行雲赴楚天飛鳥下蜀門地遐怪物聚寺古深殿存憶昔李氏末烟塵暗中原奸雄競草竊割據窮海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水靜蛟鼉騫臨風獨笑叱浩蕩欲飛翻王十朋武侯新祠復用前韻詩山藏古寺柏青青地重端因蜀相登沙上不聞江轉石人間幾見谷為陵龍蛇樹影摇千尺玉雪花枝吐萬層堪歎草廬誰復顧凄然香火却依僧戒石亭詩爾俸爾禄民膏脂下民易虐天難欺聖訓昭昭日月垂刻石於亭勵官師臣庭堅字尤瓌奇光堯宸翰増光輝坤維門戸州名夔庭前戒石原本闕筆畫微茫觀者疑太嵗在酉嘉平時吉日丁亥刑牲犧命工舉石少高之一新欄檻嚴䕶持銀鈎照眼光陸離天威咫尺顔不違虐民之事焉可為勿謂蒼蒼不吾知與爾同僚共孜孜李燾從何使君父子遊墨池分韻得名字詩蜀學擅天下馬王先得名簧如巧言語於道蓋小成子雲最後出振策思遐征斯文大一統歘使聖域清富貴盡在我紱冕非所榮旁皇天禄閣聊亦觀我生懐哉不能歸舊宅荒榛荆寂寞竟誰顧正路今莫行使君蓬萊仙盼節歸赤城門無俗賓客家有賢父兄慨念此耆老不登漢公卿臨池一樽酒尚友千載英拜呼嚴與李月旦共細評區區可無憾彼重適我輕朅來成都市塵土汚冠纓古人不可見見此眼自明請為懐古詩玉振而金聲張浚登道觀詩蒼髯野褐予甚古蘿月桂風誰謂貧當戸蛟龍森漢柏隔江雞犬隠秦人好山如畫能留客寶鼎藏丹不計春更上高亭問雙鶴莫教詩眼有纖塵張栻送朱元晦詩君侯起南服豪氣蓋九州頓登文石陛忠言動宸旒坐令聲利場縮頸仍包羞却來臥衡門無愧自日休盡收湖海氣仰希洙泗遊不逺關山阻為我再月留遺經得細繹心事兩綢繆超然㑹太極眼底無全牛惟兹㫁金友出處寧殊謀南山對牀雨匪為林壑幽白雲正在望歸袂風颼颼朝來出别語已抱離索憂妙質貴强矯精微更窮搜毫釐有不察體用豈周流驅車萬里道中途可停輈勉哉其無斁邈矣追前修陸游遊三井觀詩三井久知名暇日偶一訪棟宇壊欲盡基址尚閎壯畫牆皆國工烟雲儼天仗旌旄亞戈㦸佩玉雜弓韔太古實傑作筆落九天上吳生名擅世睥睨未肯讓規模逺有考意象豪不放最奇老癯僊骨立神愈王石恪雖少怪用筆亦跌宕兩姝淡蛾眉非復火食狀塵埃久侵蝕風雨無蓋障好事未易逢寧能久亡恙雍洛刧火餘妙迹盡凋喪斯遊恐難繼佇立増悄愴觀華嚴閣萬僧㑹齋詩拂劒當年氣吐虹喑嗚坐覺朔庭空早知壯志成癡絶悔不藏名萬衲中飯昭覺寺抵暮乃歸詩自墮黄塵每慨然攜兒蕭散亦前緣聊憑方外巾盂淨一洗人間七箸羶靜院春風傳浴鼓畫廊晚雨濕茶烟潛光寮裏明窻下借我逍遥過十年漢嘉城中萬景樓詩左披九頂雲右送大峩月殘山剰水不知數一一當樓供勝絶玻璃濯錦遥相通指揮大渡來朝宗川靈胥命各東去我亦順流呼短篷詩無傑語慚風物頼有丹青傳小筆仍添書客倚欄看令與山川相映發龍彎歸路遶烏尤棟雲簾雨邀人留若為喚得涪翁起題作西南第一樓芳華樓賞梅詩素娥竊藥不奔月化作江梅寄幽絶天工丹粉不敢施雪洗風吹見真色出籬藏塢香細細臨水隔烟情脈脈一春花信二十四縱有此香無此格放翁年來百事惰惟見梅花愁欲破金壺列置春滿屋寶髻斜簪光照座百榼淋漓玉斝飛萬人辟易銀鞍過不惟豪横壓清臞聊為詩人洗寒餓龍掛詩成都六月天大風拔屋動地聲勢雄黒雲崔嵬行風中凜如鬼神塞虛空霹靂迸火射地紅上帝有命起伏龍龍尾不卷曳天東壯哉雨點車軸同山灌水溢路不通連根拔出千尺松未言為人作年豐偉觀一洗芥蔕胸樓上醉歌詩我遊四方不得意佯狂施藥成都市大瓢滿貯隨所求聊為疲民起憔悴瓢空夜靜上高樓買酒捲簾邀月醉醉中拂劒光射月往往悲歌獨流涕剗却君山湘水平斫却桂樹月更明丈夫有志苦難成修名未立華髮生臨别成都帳飲萬里橋贈譚徳稱詩成都城南萬里橋蘆根蘋末風蕭蕭映花碾草鈿車小駐坡驀澗青驄驕入門翠徑絶窈窕臨水飛觀何岧嶤判無功名著不朽惟仗詩酒寛無聊迎霜早已足雉兔微冷便欲思狐貂喜看縷鱠映盤箸恨欠斫蟹加橙椒坐中譚侯天下士龍馬毛骨矜超遥烏犀白紵謫仙明但可邂逅不可招今年一戰馘餘子風送六翮凌青霄美人再拜乞利市醉墨飛落生鮫綃我衰於世百無用十年不趂含元朝華纓肯傍蕭颯鬢寶帶那束龍鍾腰祝君好去事明主日望分喜來漁樵遊談引類亦細事寄酒且解相如消浣溪女詩江頭女兒雙髻丫嘗隨阿母供桑麻當戸夜織聲咿啞地爐豆䕸煎土茶長成嫁與東西家柴門相對不上車青裾竹笥何所嗟插髻煜煜牽牛花城中妖姝臉如霞爭嫁官人慕高華青驪一出天之涯年年傷春抱琵琶趙汝愚致爽軒詩濃隂夾道水流渠吹盡殘花不復餘惟有范家千畝竹青青依舊色侵書范成大中巖詩赤巖倚竛竮翠邏森成削岑蔚嵐氣重稀閒暑光薄聊尋大士處往扣洞門鑰雙撐紫玉關中矗翠雲幄應供華藏海歸坐寶樓閣無法可示人但見雨花落不知龍湫勝何似魚潭樂夜深山四來人靜天一握驚看丹桂白月影到林壑門前六月江世界塵漠漠寶瓶有甘露一滴洗煩濁捫天授斗杓請為諸君酌蜀西湖詩閒隨渠水來偶到湖光裏仍呼水月舟徑度雲錦地誰不云解飲我已荷香醉湖隂玉嬋娟敻立紅粧外何須東閣梅悠然自詩思驚風入午暑水竹有秋意采菱不盈掬興與蓴鱸㑹遥知新津宿魂夢亦清麗楊甲遊滄浪亭詩霧回林蒼黄漲落水寒碧西郊好風景䁱霽千里色相從二三子掃灑溪上石主人亦愛客沽酒洗玉粒年荒酒味薄相勸助吻濕同光與共景弄此竹間日沄沄憂端來落落險語出穽機誰復設􅟨髀各自適跳波醉中舞野唱寒外急牛羊歸匆匆鳧雁來一一獨行豈不好酒盡歸亦得頽然寄疎放未愛世褊迫永懐堂中翁回首千嵗跡豈無獨坐願冉冉饑凍逼霜空洞庭野天濶雲夢澤欲窮扶桑枝尚挂滄海席何當從今去一夜生羽翼登安福浮屠詩以高幖跨蒼天為韻得跨字高誰能於虛空千仞擢修架層梯􅩩寥可厯不可跨疑從地上湧幻手聊一化飛龍送千柱雷雨天一借巍巍大勝妙突兀此其亞道人豈澄觀佛事了閒暇指揮三百尺斤斧隨叱咤當時奮赤手意濶已遭罵從來見奇特世眼一驚詫塹山作平地海濶良可駕哀哉耳目陋未信猶疑嚇凌高更回首落日在雲罅蒼蒼野浮樹漠漠水分汊悲涼豪傑窟野冢埋王伯百年眼前是俯仰閲榮謝惟當快飲酒醉聽風鈴夜謝翺花卿冢行濕雲模糊埋秋空雨青沙白丹陵東莓苔隂隂草茸茸云是花卿古來冢花卿舊事人所知花卿古冢知者誰精靈未歸白日西廟鴉啄肉枝上啼左右生題名詩蜀地雖逺天之涯蜀人只隔一水巴自從文翁建此學此俗化為齊魯家頖林春風桑椹熟集鼓坎坎聞晨撾諸生堂奥分左右相比以立如排衙九牧之金充嵗貢搜出指鑛遺其沙卿雲褒武皆蜀秀虎豹各自雄鬚牙兩京得人廣數路忍使丘中留子嗟不然題名百許輩無一顯者何謂耶我亦典學老從事試向坐中尋孟嘉古柏詩思人誰復念婆娑窟室崖隂未易磨四十圍間看溜雨二千年後數恒河不堪與世供狙械尚許遺民占鳥窠從此便名夫子樹匡人斤斧奈予何到夔門呈王待制詩手挈東風上水關鳯書迎日看新班五湖家世烏衣巷三峽樓臺赤甲山畫㦸門開春晝永臥龍帳穏海波閒安危大計須公等天定應知即賜環仲昂題西門外筰橋下觀音院詩雨砌風亭長緑苔壁間題字半塵埃城南蕭寺無人跡幾度曽因送客來岑象求遊定林院詩野濶連宫迥樓臺半倚山地連巴峽近門對濮溪灣柏徑松烟濕岩房雨蘚斑白雲邀客住明月伴僧閒經梵喧譁外香燈杳靄間勝遊成邂逅危搆喜躋攀世路長何極塵心久欲還輶車正催發緩步出重關劉壎輓制置使張珏詩坤維拓提封形勝古天府血戰五十秋零落餘八柱江南傳箭急誰暇此回顧落目古渝城仗鉞乃甚武天東甑雖墮吾自强支拄渡瀘躬討逆歸來戰彌苦蕭條下夔門機穽伏中路咄咄快敵仇誰與掩抔土哀哉關西雄國亡猶不負同時督軍將腰金插雙虎楊安誠白帝廟詩蜀江萬壑俱東奔瞿塘喧豗爭一門驚濤駭浪建瓴下巔崖仆谷相吐吞朋妖窟宅恃幽阻正晝噴薄隂霾昏靈宫奕奕鎮地險衆瀆稟命川祗尊赤甲後聳黄熊躍灩澦前峙青猿蹲舳艫銜尾下吳楚約束蛟鰐如雞豚舊傳鼓角致雨雹裹篙不觸撐舟痕綜理脈絡盡四徼帝假之柄攸司存子陽祚國十年近此地未省東其轅連江列炬鐵鎖㫁戎備犇北無留屯江關回首盡漢幟遺黎何自知公孫血食漢代定不爾但有故壘山之樊子美誤信齊東語感慨勇畧招英魂山川之靈載望秩僭偽詎可同時論向來名實久淆溷薦祼無乃瀆俎膰請從酈元為考證神理昭昭斯可原元吳成季送虞伯生使蜀詩送别因思舊所經秦州花栁短長亭三峯高附仙人掌萬里先占使者星錦水東流江月白潼關西去蜀山青當年不盡登臨意待爾重鐫劒閣銘虞集雪山圖為劉伯温監憲詩我家成都雪山東公家張掖雪山北吳船誰載鄭廣文起寫崑崙半天白張掖雪融草木長禾生隴畝芻牛羊烽火連臺擬樓觀江海微茫秋練光看書東觀夜如水太乙然藜照圖史從遊冠帶文武備斐然四郡良家子君不見黄河奔流百谷盈神禹疏鑿中州平極天鳥道雲氣盡惟北有斗西長庚閒閒宗師和前韻期望過當復用韻以謝草堂長憶蜀西郊屢卜歸休自折茅司馬檄傳驚父老少陵詩苦入神交山多美竹深宜屋江有嘉魚逺致庖乞得閒身當及早堯時原自有由巢張道士蜀山圖詩碧玉參天是蜀山舊曽飛度歴孱顔松風上接空歌外蘿月長懸合景間試劒丹崖秋隼疾濯纓錦水夜龍閒君家虛靖歸來日冉冉蓬壺為憶還贈道人簡天碧畫士詩千仞青山裏和衣坐石苔看雲為雨去聽水共風來春盡揚雄老秋清宋玉哀故園誰賦得空對畫圖開重贈簡畫士詩雲氣連山動松聲夾雨寒抱琴穿竹徑留棹寄江湍夕照歸神女春隂帶錦官此生舊同里偏解寫潺湲仁壽寺僧報更生佛祠前生瑞竹有懐故園詩聞道故園生瑞竹試從來使問何如蒼筤獨出千叢裏翠節駢生數尺餘比管可吹丹穴鳯長竿莫釣錦溪魚折筳已向靈氛卜亦説能歸似兩疏瞿聞道故園生瑞竹令人歸興滿江干扁舟不畏塘險匹馬誰云蜀道難杜甫溪頭花匼匝孔明廟裏柏闌珊新堂題作歸與字定得臨江把釣竿聞道故園生瑞竹山僧為我重栽培百年雨露餘生息一日風雲幾往迴壠上枯桑鴞萃止城東華表鶴歸來聖恩若許歸田里千石清尊為爾開趙孟頫巫山十二峯詞疊嶂千里碧長江一帶清瑶壇霞冷月朧明欹枕若為情雲過船窻白星移宿霧晴古今離恨撥難平惆悵峻猿聲片月生危岫殘霞拂翠桐登龍峯下梵王宫千古感遺蹤栁色眉邊緑花明臉上紅欲尋靈跡阻江風離思杳無窮松鶴堆嵐靄陽臺枕水湄風清月冷好花時惆悵阻佳期别夢遊蝴蝶離歌怨竹枝悠悠往事不勝悲春恨入雙眉離思雲裏高唐觀江邊楚客舟上昇峯月照粧樓兩悠悠雲雨千重阻長江一帶秋歌聲頻咽引離愁光景恨如流過客絶頂朝雲散寒江暮雨頻楚王宫殿已成塵轉傷神月是巫娥伴花為宋玉鄰一聽歌調一舍嚬哀怨竹枝春纖雨過蘋汀逺雲深水國遥渡頭齊舉木蘭橈細楚宫腰暎水匀紅臉偎花整翠翹行人倚棹正無聊一望一魂銷碧水鴛鴦浴平沙荳蔲紅望霞峯翠一重重帆卸落花風澹薄雲籠月霏微雨灑篷孤舟曉泊浪聲中無處問音容芍藥空投贈丁香漫結愁鳯樓鸞去兩悠悠新悵怯逢秋山色驚心碧江聲入夢流何時弦管簇歸舟蘭棹泊沙頭别是碧水澄青黛危峯聳翠屏竹枝歌怨月三更㫁腸聲烟外黄牛峽雲邊白帝城扁舟清夜泊蘋汀倚棹不勝情惆悵鶴信三山逺羅帬片水深高堂春夢杳難尋至如今十二峯前月三千里外心紅牋錦字信沈沈腸斷舊香衾曉色飄紅豆平沙枕碧流泉聲雲影弄新秋觸處是離愁臉淚横波淡眉攢片月收佳人無笑準難休來整玉搔頭嬝娜江邊栁飄颻嶺上雲卸帆迴棹楚江濱歸信夜來聞欲拂珊瑚枕先熏翡翠帬江頭含笑去迎君鸞鳯畫成羣明劉基蜀國弦悲笳拍㫁河冰結湘靈曲終斑竹裂為君更奏蜀國弦一彈一聲飛上天蜀國周遭五千里峩眉迢迢連玉壘峩嶓出水作大江地砉天浮戒南紀舒為五色朝霞暉慘為虎豹嘷隂霏翕為千嶂雲雨入噓為百里雷霆飛白鹽雪消春水滿谷鳥相呼錦城暖巴姬倚歌漢女和楊栁壓橋花纂纂銅梁翠氣通青蛉碧雞啼落天上星山都號風寡鵠泣杜鵑嗚咽愁幽㝠商悲羽怒聽未了窮猿三聲巫峽曉瞿塘波浪翻九淵倒瀉流泉喧木杪樓頭仲宣羈旅客故鄉渺渺音塵隔含悽更聽蜀國音不待天明頭盡白陳南賓遊草堂詩西出秦關道路長岷峩東望鬱蒼蒼蓬萊三賦舊無敵同谷七歌今可傷茅屋秋高風瑟瑟布衾鐵冷雨牀牀浣花溪上應回首千載令人憶草堂方孝孺蜀道易有序酷唐李白作蜀道難以譏刺帥之虐厥後韋臯治蜀陸暢反其名作蜀道易以美之今其詞不傳伏惟今天子以大聖御極殿下以睿哲之姿為蜀神明主臨國以來施惠政崇文教中外同聲稱頌西方萬里之外水浮陸走無有冦盜商賈駢集如赴鄉閭蜀道之易於斯為至矣臣才雖不敢望白而所遇之時白不敢望臣也因奉教作蜀道易一篇以述聖上及賢王之徳名雖襲暢而詞無溢美頗謂過之嶺美矣哉西蜀之難何今易而昔難陸有重巖峻萬仞鑱天之險閣水有砅雷掣電懸流怒吼之江關自昔相戒不敢至胡為乎今人操舟秣馬夕往而朝還大聖建皇極王道坦坦如弦直西有雕題鑿齒之夷北有氊裘椎髻之貊東南大海際天地島居州聚千萬國莫不奉琛執贄効朝貢春秋使者來接迹何況川蜀處華夏賢王於此開壽域播以仁風沾以義澤家和人裕櫜兵歛革豺狼變化作騶虞蛇虺消藏同蜥蜴鑿山焚荒穢畧水剷崖石帆檣扇履任所往宛若宇宙重開闢美哉蜀道之易有如此四方行旅絡繹來遊成都萬室比屋如雲桑麻蔽原野雞犬聲相同文翁之化孔明之仁嚴鄭之節揚馬之文遺風漸被比鄒魯士行賢哲方回參方今況有賢聖君大開學館較論典墳坐令致化希華勲徵賢一詔到巖穴咄爾四方之士孰不爭先而駿奔王道有通塞蜀道無古今至險不在山與水只在國政並人心六朝五季時王路嗟陸沈遂令三代民盡為獸與禽當時豈惟蜀道難八荒之内皆晦隂今逢天子聖賢王之徳世所欽文教洽飛動風俗無邪淫孱夫弱婦懐千金悍吏熟視不敢侵蜀道之易諒在此咄爾四方來者不憚山高江水深張三丰題元天觀詩等閒釣罷海中鼇一笑歸來祖晉陶花吐碧桃春正好笋抽翠竹葉還高心懐鳯闕龍鱗㑹身寓龜城馬足勞何必終南論捷徑宦情於我似鴻毛李東陽寄楊留耕先生詩峩眉山頭雲氣濃錦官城上花枝紅地靈人傑應時出往嵗五識留耕翁一從獻策明光殿三世科名眼中見鸚鵡洲前驄馬歸鳯凰池裏麒麟現一品封高七袠稀烏紗玉帶明緋衣祇疑天上神仙是若比人間富貴非誰信今人不如古片玉一枝安足數蘇氏奇峯僅有三竇家芳樹纔稱五太史文章祕閣勲少年狀元才出羣眼看是父復是子此語吾傳揚子雲白頭憂國猶心切剛道承平好時節已見西川洗甲兵更依北斗瞻京闕懸霜彩筆泥金箋為君興寄西南天願山不童花不老一嵗一賦長生篇李夢陽寄寄菴子詩寄菴子張鵬也洪雅人利寄菴子嘗曰人生寄爾然孰與義安愆孰與美久臭孰與芳永庫部駱子以其言告李子李子曰卓哉張子持此於天下誘之能移撼之能動乎能招之來麾之去乎吁乎張子者足以荷天下之重矣於是作寄寄菴子詩嚶其鳴矣彼何求天下願識韓荆州心傾意投神便往萬古不廢江河流張侯崛起西南裔覽輝振翮風雲際鉤陳蒼涼閶闔閉排閽直謁蓬萊帝豸冠峩峩不動紳挺身遂作蘭臺賓竊憤辛裾謂淟涊誓與朱檻爭嶙峋已看騕褭狹道路復訝鵰鶚卑風塵霜飛維揚海月苦陽行沮洳汾花春還朝衮衣煥日月立仗正色偕星辰行步既工馬復瘦諌草毎就雞將晨餘力猶馳翰墨圃先秦兩漢文心古壯志真趫劒閣銘幽懐緬擬歸田賦拖珠響玉豈不足靦顔徒餐竟何補及時願作朝陽鳯不然退與漁樵伍予也綸竿孟諸客心本無他衆莫白李白世人欲殺之蘇軾能詩遭貶斥雷劒雖埋光在天卞玉未剖終為石垂老重逢四海清虛名幸免諸公擲思君欲追嵇吕駕贈言輒踐回田迹有田負郭不餓死且自射獵芒碭澤陶驥送田國用鎮撫還蜀詩燕臺花栁客徜徉蜀國風烟興渺茫玉勒幾年登劒閣江船五月下瞿塘清樽錦軸高人共玉笛短簫良夜長年少壯遊輕萬里可容華髮綴清霜胡濙祥符訪張三丰詩交情已久念離羣獨向山中禮白雲龍送雨來留客住鹿銜花至與僧分疎星出竹昏時見流水鳴渠靜夜聞却憶故人如此隠題詩誰是鮑參軍雷賀正初同陳玉泉代巡飲青羊宫詩丹室崔嵬傍郭幽塵襟喜向上清遊青羊自古逢𤣥肆白鶴何年下寶丘鐘鼓頻開千堞曉松筠長鎖四時秋仗君繡斧霜威霽萬象春寒錦水流余子俊次唐王勃元武山聖泉詩青鞵布襪陟層巔望道其如未及泉天近尋常塵不到旬當十四月猶弦山花亂落誰為掃野鶴相隨或在前老我重來應指日山靈珍重䕶寒烟楊春同前題丹厓翠壁接雲巔元武西山湧聖泉一水靜中拖緑黛萬松深處響冰弦登臨恍訝崑崙頂倡和渾疑太華前緬想昔人増感慨數聲啼鳥度晴烟徐文華大司馬梧山李公詩吾受李公知未識李公面嗟公久方殁緬懐何由見休休好善心卓卓當朝彦美玉瑩無瑕精金嘗百錬氣概凌秋空巋若靈光見所在樹功勛聲光耀雷電後進賴推轂曽不遺寸善劉堪費烈女吟永康費氏女年少十八九擇對無可人真心似瓊玖禮法以防身絲麻常在手至正十七載太嵗次丁酉逆賊從東來旌旗摇北斗三巴數十城皆降不敢後唐姬與姜氏不慚為賊偶費女涕泣悲勤勤告父母人生棄禮義猪狗亦何有我身不如賊我死骨不朽夜深盛容飾自縊後園栁高義感行人痛心而蹙首平章買奴者左丞韓叔亨低頭奴屈膝拜賊乞餘生不能受白刃空負朝廷恩茫茫天壤間生死義與仁泰山與鴻毛孩提知重輕費女生草野烈烈超凡倫二公國柱石棄甲如輕塵芳名與汚跡遺戒千百春安磐弔張士元詩七載遐方謫三年諌議班家聲續臺史封事動天顔弔客何人至秦川有櫬還不才同放逐後死淚潺湲何景明賦四亭詩四章秀地名山出晴窻疊巘羅褰帷入雲霧拂鏡影嵯峨仙客丹梯意樵人白石歌悠然時一眺佳色滿烟蘿見中田背北郭曲樹俯通川未羨龎公隠先知沮溺賢驅牛迎社日聽鳥餉春烟閒讀農書罷逍遥策杖前閲舊種三湘岸初移千樹香柰花繁檻雪丹果壓簷霜裊裊生南國娟娟貢玉堂嘉應伯夷並高詠楚臣章楚翠幹盤仙樹西亭烟霧中風簾自馥郁月幌共玲瓏白露棲雙鶴青天下八公獨同招隠曲攀望小山叢淮吳廷舉宿玉蟾寺詩川北湖南一水通生涯半寄祝融峯此身尚逐雲來往又挂玉蟾山上松劉成穆過千佛巖和察罕廉訪韻丹壁蒼巖青鐵楹巖頭石溜蘚苔生千年刻畫魚龍擁白日隂溟麋鹿行金草細摇蘿洞冷玉魚横過石梁清臨流拊樹看心折野寺黄碑月二更楊廷和贈劉春劉台詩君家兄弟好文章經學淵源有義方奪錦兩刋鄉試録凌雲雙立解元坊大蘇氣節古來少小宋才名天下香從此聖朝添故事巴山草木也生光楊慎竹枝歌夔州府城白帝西家家樓閻層層梯冬雪下來不到地春水生時與樹齊曬日照峯頭紫霧開雪消江面緑波來魚復浦邊網去麝香山下打柴回江頭秋色換春風江上楓林青又紅下水上風來往慣一年長在馬船中最高峯頂有人家冬種蔓菁春采茶長笑江頭來往客冷風寒雨宿天涯香清江白石女郎神門外往來祈賽頻風颭青旗雨歇山薑花開瑶草春同紅粧女伴碧江濆蓪草花簪茜草帬西舍東鄰夜燭吹笙打鼓賽朝雲神女峯前江水深襄王此地幾沈吟煜花温玉朝朝態翠壁丹楓夜夜心上峽舟郎風浪多送郎行去為郎歌白鹽紅錦多多載危石高灘穏穏過青無義灘頭風浪收黄雲開處見黄牛白波一道峯裡聽盡猿聲是峽州孝津行詩岷山青蟠空下映犍為江江濱有孝娥自名叔先雄娥父為功曹冉冉趨府中泛舟越洪濤捐軀以凶終娥也痛文死臨淵矢相從練囊封兒臂珠環係兒躬寄言與兒别别去不再逢寧假黿鼉梁直下蛟龍宫川后垂懸鑒江妃憐丹衷死抱父屍出依泊葶花叢戚黨悲復感閭里唁且閧風誼動今古廟貌森穹崇文紀與令伯祠墓相西東解使犍為縣永作忠孝邦岷之山石可泐犍之江波可竭千秋菊兮萬春蘭孝娥之名焉可滅黄輝送李都御史平播後奉命治水詩何許山河有不臣夜郎霪霧豫州津為憐白虎收幡地便昱黄龍負艦身人代擬同堯丙子精靈行付禹庚辰凱歌應奏巴人曲荷鍤何由列水濱郭莊巫山高詩巫峽之山崔嵬兮干雲并吐芙蓉巔十二峯巒竦秀兮瑰如鳴環簪玉鬬嬋娟當時章華臺上兮細腰落雪曳翩躚吁嗟哉襄王何事神遊華胥天自從高唐精靈感夢憐山中芳樹琪花兮笑日披霞弄粉鉛十二峯巒低昂異態兮纍纍猶作望夫篇又若亭亭龍影照寒泉巫峽之山崔嵬兮只今人去千年陵谷遷巴流東逝恨綿綿但見千巖萬壑蒼蒼兮朝夕雲霧濛濛連苦竹叢中飛杜鵑年年春風呌破桃花烟崔嵬兮巫峽之山巔高唐遺跡何年惟有古今騷客兮寫江山文藻流傳琅琅兮巫山篇吁嗟哉千載王孫作嵬僊魏裳巫山詩巫山倚天外地險控荆門鳥道青蘿暗猿聲落日繁隂晴千壑變雲雨二儀昏寂寞高唐夢空傳宋玉言余承業送楊升菴客還滇南子雲辭天禄南走哀牢鄉稽首謝閶闔銜恩不敢忘策馬達天津張帆度飛梁孤劍伴衾枕洞庭與瀟湘鵩賦揮賈涕鳯歌激楚狂幽蘭被九畹采采不盈筐五月冒瘴氣異哉驅逐强問俗邁牂牁至止滇之陽卉木麗繁輝山海摇晴光復有好奇士摳衣來門牆濯泉選碧玉齧雪搜點蒼城飛花霧煖寺入松風涼飯兒資海貝宴客傳檳榔可惜昆明旅可憐詞林望蹉跎成白首艱苦㫁柔腸金雞豈不赦奈何數乃妨暫以奉戎役趨過桑梓旁青冢咽烏號荆樹悲鴻翔萬物遂施化窮旻胡茫茫夙夜懐往義秉燭理行裝邂逅青衣浦勸進紫霞觴歴歴嵗月馳悠悠道路長袂連意俱愜鬢改情各傷抱憂予局促戒逺君徬徨徬徨聽我歌浮生焉用忙潮州非魍魎白也流夜郎折木感姬旦撫髀思馮唐神劒有時合良璧豈終藏騏驥食弗飽荃蕙性本芳詹尹不能卜顔壽彭乃殤天運詎如此窮達未可量努力崇令徳萬禩仰文章養雛學鳯鳴挾飛覽遐荒金馬舊梧竹翩翩雲錦裳歌罷轉遲暮棹月下平羌江鳥舌初巧江栁眉已黄離别在須臾後㑹擬何方夢中見顔色尺素遥為將周洪謨雪山天下高詩巨靈擘㫁崑崙山移來坤維參井間内作金城障三蜀外列碉䂺居百蠻自昔蠶叢始開國千巖萬谷積寒雪疑有五城十二樓玉色玲瓏界天白光連銀漢霏素虹六月大暑飄寒風俯見五嶽在平地遥窺三島皆溟濛此去石紐無幾許昔鍾靈秀生大禹當時自此導江流至今名垂千萬古眉山天下秀大峨兩山相對開小峨迤邐中峨來三峨之秀甲天下何須涉海尋蓬萊昔我登臨彩雲表獨騎白鶴招青鳥石龕石洞何參差時遇仙人拾瑶草丹崖瀑布連天河大鵬圖南不可過晝昏雷雨起林麓夜深星斗棲巖阿四時青黛如繡繪岷嶓蔡䝉實相對昔生三蘇草木枯但願再生三蘇輩瞿唐天下險兩崖壁立何險􅇖巴東大江如一絲杜宇神功渺何許堯時餘燼誰復知中流灩澦實挺特如牛如馬夏秋月怒濤掀天萬壑雷巨漩觸石千層雪湯湯東去幾洄灣虎頭狼尾如連環赤甲下映人鮓甕黄牛高抗鬼門關憶昔英雄割據日插木為梯上絶壁只今四海盡為家鎖江鐵柱存何益巫山天下奇靈鼇一動海水翻三山飄流無定根岱輿忽失十二峯萬流飛墮夔之門仰把銀漢洗青黛俯瞰長江似衣帶地森玉笋青雲端大開罨畫彩虹外山間神女棲陽臺芙蓉為貌玉為腮如何朝暮行雲雨却使懐襄相繼來無乃宋玉善蠱惑託為怪誕荒淫説只今高崖紫蔓間惟有猿聲哀不絶趙貞吉成都揚子雲洗墨池詩墨鱗跋浪遊奇門靈烏下掃腸泔痕幽蚪吐水沈古影武擔山風珮珊冷魂迷瘴雨芙蓉濕侯芭噴腔三斗汁黄金蹴地吹作灰商鬼蒿成淚花澁眉山歌白帝昔稟鴻濛匠鑄錯江山排罔象赤髓鎔成巴字流青稜幻出峩眉狀峩眉兩片翠浮空日月跳轉成雙瞳美人西倚映碧落崑崙東向縣青銅嘉陵黛色何窈窕暮雨朝雲情未了力士空埋工冶魂王孫暗轉琴心調可憐烟靄下燈州望望行人芳意留香象渡河春泯泯碧雞啼晚思悠悠歸來悵悵高唐趾不願封侯願遊此錦繡洪都羨畫圖神明此宅嗟疑似憶昨路遶犍為中褰裳遥指白雲峯蟠霄拓落開南紀鼉吼鯨訇迨巨蹤此山疑有真靈住此地遥疑接懸圃天上年年種白榆人間嵗嵗飛紅雨白榆紅雨異凡仙放光臺上一茫然百年萬刼僅彈指七十二君皆比肩雪嶺星橋殊小小銅梁玉壘何渺渺西拈優鉢影團團東釣珊瑚光杲杲蒼顔灝炁有誰同羞落襄王一夢中塵心祗㑹題紅葉素業先須訪赤松白龍吐霧成海水青鳥銜花供寸晷我來踏遍八十四盤旋飛雪之奇蹤一洗靈山少年恥長卿多病在臨邛傾心縹緲玉芙蓉抽毫為作大人賦折簡應招無是公賦漢揚雄蜀都賦蜀都之地古曰梁州禹治其江渟臯彌望鬱乎青葱沃埜千里上稽乾度則井絡儲精下按地紀則坤宫奠位東有巴賨綿亘百濮銅梁金臺火井龍湫其中則有玉石嶜岑丹青玲瓏邛節桃枝石䲛水螭南則有犍䍧潛夷昆明峨眉絶限㟍嵣嵁巖亶翔靈山揭其右離堆被其東於近則有瑕英菌芝玉石江珠於逺則有銀鉛錫碧馬犀象僰西有鹽泉鐵冶橘林銅陵邙連盧池澹漫波淪其旁則有期牛兕旄金馬碧雞北則有岷山外羌白馬獸則麙羊野麋羆㹈貘貒麕􅪲鹿麝戸豹能黄獑胡蜼玃猨蠝玃猱猶豰畢方爾乃蒼山隠天岎崯迴叢増嶃重崒􅰗石􅵏崔􅱕􅱓嶵㟴霜雪終夏叩巖岭嶙崇隆臨柴諸徼崼􅒈五矹參差湔山巖巖觀上岑嵓龍陽累峗漼交倚􅞐崪崛﨑集嶮脇施形精出偈嵁􅨅隠倚彭門嶋㟅􅛜嵃嵑㞹方彼碑池􅲡􅴁輵􅦌礫乎岳岳北屬崑崙泰極涌泉醴凝水流津漉集成川於是乎則左沈犂右羌庭漆水浡其匈都江漂其涇乃溢乎通溝洪濤溶洗千湲萬谷合流逆折泌瀄乎爭降湖潧排碣反波逆濞石洌巘紛周溥旋溺寃綏頽慚博岸敵呷䘹瀨磴巖摚汾汾忽溶闛沛踰窘出限連混陁隧銍釘鍾涌聲讙薄泙龍歴豐隆潛延延雷扶電擊鴻康濭逺逺乎長喻馳山下卒湍降疾流分川並注合乎江州於木則楩櫟豫章樹榜櫖樿柙青稚雕梓枌梧橿櫪㯕楢木椶枒信楫叢俊幹凑集􅫩柍楬圠樘椅從風推參循崖撮捼涇淫溶繽紛幻靡汎閎野望芒芒菲菲其竹則鍾龍䇣野篠紛鬯宗生族攢俊茂豐芙洪溶忿葦紛揚搔樖與風披夾江緣山尋卒而起結根才業填衍迥野若此者方乎數十百里於氾則汪汪漾漾積土崇隄其淺濕則生蒼葭蔣蒲藿芧青蘋芊葉蓮藕茱華菱根其中則有翡翠鴛鴦梟鸕鷁鷺鶴鶤鷫鷞其深則有徧獺沈鱓水豹蛟蛇黿蟺鼈龜衆鱗鰨􅰋爾乃其都門二九四百餘閭兩江珥其市九橋帶其流武擔鎮都刻削成蘞王基既夷蜀侯尚叢邛籠石岓岑倚從秦漢之徙元以山東是以隤山厥饒水貢其獲苴竹浮流龜磧石蝎相救魚酌不收􅵑􅳰鴝䳨風胎雨鷇衆物駭目殫不知所禦爾乃其蓏羅諸圃緣畛黄甘諸柘柿桃杏李枇杷杜樼栗柰棠梨離支雜以梴橙被以櫻梅樹以木蘭扶林禽爚般關旁支何若英絡其間春机楊栁褭弱蟬抄扶施連卷􅩅貕螗蛦子呼焉爾乃五穀馮戎𤓰匏饒多卉以部麻往往薑梔附子巨蒜木艾椒蘺蒟醬酴清衆獻儲斯盛冬育筍舊菜増伽百華投春隆隠芬芳蔓茗熒郁翠紫青黃麗靡蠄燭若揮錦布繡望芒兮無幅爾乃其人自造奇錦紌繏􅳴䋶縿緣盧中發文揚采轉代無窮其布則細都弱折綿繭成衽阿麗纖靡避晏與隂蜘蛛作絲不可見風筩中黄潤一端數金雕鏤釦器百伎千工東西鱗集南北並凑馳逐相逢周流往來方轅齊轂隠軫幽輵埃喉㪍塵拂萬端異類崇戎總濃般旋闤闠齊􅊱楚而不感概萬物凑馳四時迭代彼不折貨我㒺之械財物饒贍蓄積備具若夫慈孫孝子宗厥祖禰鬼神祭祀練時選日瀝豫齋戒襲明衣表𤣥縠儷吉日異清濁合疎明綏離旅乃使有伊之徒調夫五味甘甜之和芍藥之羹江東鮐鮑隴西牛羊糴米肥䐗􅬨􅝤不行鴻􅰄乳獨竹孤鶬炮鷁被魮之胎山麕腦水遊之腴蜂豚應鴈被鴳晨鳧戮鶂初乳山鶴既交春羔秋􅔺膾鮫龜肴秔田臑鷩形不及勞五肉七菜朦厭腥臊可以練神養血腄者莫不畢陳爾乃其俗迎春送臘百金之家千金之公乾池泄澳觀魚於江若其吉日嘉㑹期於送春之隂迎夏之陽侯羅司馬郭范畾楊置酒乎滎川之閒宅設坐乎華都之高堂延帷揚幕接帳連岡衆器雕琢藻刻將星朱緑之畫邠聁麗光龍蛇蜿蜷錯其中禽獸奇偉髦山林昔天地降生杜鄠密促之君則荆上亡尸之相厥女作歌是以其聲呼吟靖領激呦喝啾户音六成行夏低徊胥徒入㝠及廟􅏐吟請連單情舞曲轉節踃馺應聲其佚則接芬錯芳襜袩纖延􅟩淒秋發陽春羅儒吟吳公連眺朱顔離絳脣𦕈𦕈之態吡噉出焉若其遊怠魚弋郤公之徒相與如平陽巨沼羅車百乗期㑹投宿觀者方隄行船競逐偃衍撇曳絺索恍惚羅罥瀰澥蔓蔓沕沕籠睢䁨兮罧布列枚孤施兮纖繁出驚雌落兮高雄蹷翔挂兮奔縈畢俎飛膾沈單然後别晉左思蜀都賦有西蜀公子者言於東吳王孫曰蓋聞天以日月為綱地以四海為紀九土星分萬國錯跱崤函有帝皇之宅河洛為王者之里吾子豈亦曽聞蜀都之事歟請為左右揚摧而陳之夫蜀都者蓋兆基於上世開國於中古廓靈關以為門包玉壘而為宇帶二江之雙流抗峨眉之重阻水陸所凑兼六合而交㑹焉豐蔚所盛茂八區而罨藹焉於前則跨躡犍牂枕輢交趾經途所亙五千餘里山阜相屬舍谿懐谷岡巒糾紛觸石吐雲鬱葐蒀以翠微崛巍巍以峨峨干青霄而秀出舒丹氣而為霞龍池􅘝瀑濆其隈漏江伏流潰其阿汨若湯谷之揚濤沛若濛氾之涌波於是乎邛竹緣嶺菌桂臨崖旁挺龍目側生茘枝布緑葉之萋萋結朱實之離離迎隆冬而不凋常曄曄以猗猗孔翠羣翔犀象競馳白雉朝雊猩猩夜啼金馬騁光而絶景碧雞儵忽而曜儀火井沈熒於幽泉高爓飛煽於天垂其間則有琥珀丹青江珠瑕英金沙銀鑠符采彪炳暉麗灼爍於後則却背華容北指崑崙緣以劒閣阻以石門流漢湯湯驚浪雷奔望之天迴即之雲昏水物殊品鱗介異族或藏蛟螭或隠碧玉嘉魚出於丙穴良木攢於褒谷其樹則有木蘭梫桂杞櫹椅桐椶枒楔樅楩柟幽藹於谷底松柏蓊鬱於山峯擢修幹竦長條扇飛雲拂輕霄羲和假道於峻岐陽烏迴翼乎高標巢居棲翔聿兼鄧林穴宅奇獸窠宿異禽熊羆咆其陽鵰鶚鴆其隂猿狖騰希而競捷虎豹長嘯而永吟於東則左綿巴中百濮所充外負銅梁於宕渠内函要害於膏腴其中則有巴菽巴㦸靈壽桃枝樊以蒩圃濱以鹽池􅨧蛦山棲黿龜水處潛龍蟠於沮澤應鳴鼓而興雨丹砂赩熾出其坡蜜房郁毓被其阜山圖采而得道赤斧服而不朽若乃剛悍生其方風謡尚其武奮之則賨旅翫之則渝舞鋭氣剽於中葉蹻容世於樂府於西則右挾岷山湧瀆發川陪以白狼夷歌成章坰野草昧林麓黝䨹交讓所植蹲鴟所伏百藥灌叢寒卉冬馥異類衆夥於何不育其中則有青珠黄環碧砮芒硝或豐緑荑或蕃丹椒蘪蕪布濩於中阿風連延蔓於蘭臯紅葩紫飾柯葉漸苞敷蘂葳􅅋落英飄颻神農是嘗盧跗是料芳追氣邪味蠲癘痟其封域之内則有原隰墳衍通望彌博演以潛沬浸以綿雒溝洫脈散疆里綺錯黍稷油油稉稻莫莫指渠口以為雲門灑滮池而為陸澤雖星畢之滂沱尚未齊其膏液爾乃邑居隠賑夾江傍山棟宇相望桑梓接連家有鹽泉之井戸有橘柚之園其園則有林檎枇杷橙柿梬楟榹桃函列梅李羅生百果甲宅異色同榮朱櫻春熟素柰夏成若乃大火流涼風厲白露凝微霜結紫梨津潤樼栗罅發蒲萄亂潰石榴競裂甘至自零芬芳酷烈其圃則有蒟蒻茱萸𤓰疇芋區甘蔗辛薑陽蓲隂敷日往菲微月來扶疎任土所麗衆獻而儲其沃瀛則有攢蔣叢蒲緑菱紅蓮雜以藴藻糅以蘋蘩總莖柅柅裛葉蓁蓁蕡實時味王公羞焉其中則有鴻儔鵠侣䳲鷺鵜鶘晨鳧旦至候雁銜蘆木落南翔冰泮北徂雲飛水宿哢吭清渠其深則有白黿命鼈𤣥獺上祭鱣鮪鱒魴鮷鱧鯊鱨差鱗次色錦質報章躍濤戲瀨中流相忘於是乎金城石郭兼市中區既麗且崇實號成都闢二九之通門畫方軌之廣塗營新宫於爽塏擬承明而起廬結陽城之延閣飛觀榭乎雲中開高軒以臨山列綺窻而瞰江内則議殿爵堂武義虎威宣化之闥崇禮之闈華闕雙邈重門洞開金鋪交映玉題相暉外則軌躅八達里閈對出比屋連甍千廡萬室亦有甲第當衢向術壇宇顯敞高門納駟庭扣鐘磬堂撫琴瑟匪葛匪姜疇能是恤亞以少城接乎其西市廛所㑹萬商之淵列隧百重羅肆巨千賄貨山積纖麗星繁都人士女袨服靚粧賈貿墆鬻舛錯縱横異物崛詭奇於八方布有橦華麪有桄榔邛杖傳節於大夏之邑蒟醬流味於番禺之鄉輿輦雜沓冠帶混并累轂疊跡叛衍相傾諠譁鼎沸則哤聒宇宙囂塵張天則埃壒曜靈闤闠之裏伎巧之家百室離房機杼相和貝錦斐成濯色江波黄潤比筒籝金所過侈侈隆富卓鄭埒名公擅山川貨殖私庭藏鏹巨萬鈲摫兼呈亦以財雄翕習邊城三蜀之豪時來時往養交都邑結儔附黨劇談戲論扼腕抵掌出則連騎歸從百兩若其舊俗終冬始春吉日良辰置酒高堂以御嘉賓金罍中坐肴槅四陳觴以清醥鮮以紫鱗羽爵既競絲竹乃發巴姬彈弦漢女擊節起西音於促柱歌江上之􅥝厲紆長袖而屢舞翩躚躚以裔裔合樽促席引滿相罰樂飲今夕一醉累月若夫王孫之屬郤公之倫從禽於外巷無居人並乗驥子俱服魚文𤣥黄異校結駟繽紛西踰金隄東越玉津朔别晦期匪日匪旬蹴蹈䝉籠涉躐寥廓鷹犬倏眒罻羅絡幕毛羣陸離羽族紛泊翕響揮霍中網林薄屠麖麋剪旄麈帶文蛇跨雕虎志未騁時欲晚追輕翼赴絶逺出彭門之闕馳九折之坂經三峽之崢嶸躡五屼之蹇嵼㦸食鐵之獸射噬毒之鹿皛貙氓於葽草彈言鳥於森木拔象齒戾犀角鳥鍛翮獸廢足殆而朅來相與第如滇池集於江洲試水客艤輕舟娉江妃與神游罨翡翠釣鰋鮋下高鵠出潛虯吹洞簫發櫂謳感鱏魚動陽侯騰波沸涌珠貝沈浮若雲漢含星而光耀洪流將饗獠者張帟幕㑹平原酌清酤割芳鮮飲御酣賓旅旋車馬雷駭轟轟闐闐若風流雨散漫乎數百里之間斯蓋宅土之所安樂觀聽之所踊躍也焉獨三川為世朝市若乃卓犖奇譎倜儻罔已一經神怪一緯人理逺則岷山之精上為井絡天帝運期而㑹昌景福肸蠁而興作碧出萇𢎞之血鳥生杜宇之魄妄變化而非常嗟見偉於疇昔近則江漢炳靈世載其英蔚若相如皭若君平王褒暐煜而發秀揚雄含章而挺生幽思絢道徳摛藻掞天庭考四海而為雋當中葉而擅名是故游談者以為譽造作者以為程也至於臨谷為塞因山為障峻阻塍埓長城豁險吞若巨防一人守隘萬夫莫向公孫躍馬而稱帝劉宗下輦而自王由此言之天下孰尚故雖専諸夏之富有猶未若兹都之無量也唐陸肱萬里橋賦萬里兮蜀郡隋都二橋兮地角天隅相去而如乖夷貊曽遊而只在寰區倚檻多懐結長悲而莫極憑川試望思逺道以何殊昔者滄海朝宗岷山發跡斯觀理水之要若啓鑿穴之役逮夫東土為揚西邦日益架長虹於兩地客思迢迢浩積水於千秋江流脈脈宇宙綿綿今來邈然結構應似途程甚偏將蹔遊於楚岸欲徑度於巴川目㫁波中過巫峯之十二心馳路半到荆門而五千徒觀夫偃蹇東流崢嶸二邑揭華表以相效刻仙禽而對立俄驚迴復潮生而夕月初明孰敢爭先帆去而秋灘正急𦕈天末之殊方有人間兮異鄉顧盼而層隂動色徘徊而浮柱生光飾丹艧以雖同彼臨淮海度軒車而既異此對銅梁古來幾許行人曽遊此路跨緑岸以長存俯清流而下注寧為駐足之所莫問傷心之故復有逆旅傷情臨邛逺行壯宏製以靈矗壓洪流而砥平家本江都羨波濤而自返身留蜀地偶萍梗以堪驚沴迤歸遥飄流恨結之子去兮揚桂棹長卿還兮建龍節既風月以相間固音塵之兩絶斯橋也可以濟巨川之往來不可以攜手而相别蘇頲長樂花賦并序繁蜀太守庭際有紫華草秋中始英露洗冬早尚直本霜封蕪雜大同於衆卉盛衰小異於羣物余訝而未識吏或告余曰此長虞所賦蜀長樂花也故心暗賞焉因口授書吏遂墨而成作恨不見古人所為得髣髴其㫖爾夫長者以短長之形度其長者至美夫樂者以哀樂之類同其樂者至喜長也樂也吾安得而聞之嘉纖植之並用偉令名兮在兹徒見其豐族苯䔿高標璀璨莖丹外而縞中葉縹分以紅貫綴緑穎之重疊索紫㽔之爛漫迫而象之君子其常或微或章聳危冠兮纓若綬黙退靜其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晚兮自耀匪以耀兮自强快濁露之均灑庇清舒之汎光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽䒠茸灼爍萬品千計摇瑞色而函芝雜奇葩而轉蕙孰與夫玉堂金闕之偏賞白日青雲之特麗嵗不與兮時向闌風蕭蕭兮夜漫漫賓逺鴻於沙塞呌離鶴於江干君曽不見三月華矣盡林間之槁木千霜殞矣亦庭下之枯蘭懿此常度凌於早寒假春期而不採雖秋令而不殘衡雨霰之飛薄任雲山之險難芳弗珍於靃靡節常慕於檀欒吾則知樹背之奚託惟傾心之可安如後凋之是貴罔獨立其誰觀文學掾起而為亂曰白露瀼瀼何草不黄紫華的的生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賓連伊榛莽而荒些君曷為兮賦旃無名氏題橋賦以望在青霄居然有異為韻將昔蜀郡之司馬相如指長安兮離所居意氣而登橋有感沈吟而命筆爰書儻並遷鸎將欲誇其名姓非乗駟馬誓不還於里閭原夫别騎留連鄉心顧望銅梁杳杳以横翠錦水翩翩而逆浪徘徊浮柱之側睥睨長虹之上神催下筆俄聞風雨之聲影落中流已動龍蛇之狀觀者紛紛嗟其不羣染翰而含情自負揮毫而縱意成文渥澤尚遥滴瀝空瞻於垂露翻飛未及離披且覩其崩雲蓋以立誓無疑傳芳不朽人才既計其獨出富貴應知其自有潛生肸蠁之心暗契縱横之手於是名垂要路價重僊橋離離迥出一一高標參差鳥跡之文旁臨綵檻踴躍鵬摶之勢下視丹霄既而玉壘經過金門寵異方陪侍從之列忽奉西南之使乗軺電逝於遐方建節風生於舊地結構如故高低可記追尋往跡先知今日之榮拂拭輕塵宛是昔時之字想夫危梁蘚剥清墨蟲穿長含氣象久帶風烟幾遭凡目之見嗤徒云率爾終俟瓌姿之後至始覺昭然所謂題記數行寂寥千載何搦管而無惑如合符而中在警後進而慕前賢亦丁寧而有待范崇凱花萼樓賦以花萼樓賦一首并序為韻東開元中嵗天子築宫於長安郛有以眷夫代邸之義舊者中宫起樓臨瞰於外乃以花萼相輝為名蓋所以敦友悌之意也銀牓天題金扉御闕俯盡一國旁入萬里崇崇乎實帝城之壯觀也是時海内賓薦之士咸遊仙署馳神累日以待問於有司有司盛稱兹樓並命賦之小子庸蔽敢同頌美詞曰惟唐六代盛徳被於幽遐彌𤣥都暨丹穴掩扶海於流沙莫不推福祚之攸永極威靈之所加敦本既同夫羲軒之日睦親又比乎棠棣之花裂土苴茅以表慶賜珪分瑞以聨華信可以受無窮之祉而保乂我皇家者哉迺命有司濬池隍繕城郭將崇大壯之義載攷方中之作繚垣牆周乎舊宫設井幹而為新閣既集既繩已揆已度望馳道而通禁林走建章而抵長樂攢畫拱以交映列綺窻以相薄金鋪摇吹以玲瓏朱綴含烟而錯落飾以紛繪塗之丹艧飛梁迴遶於虹光藻井倒垂乎蓮萼信神明之保䕶亦列仙之憑託於是乗輿乃登夫翠輦而建華旒鈎陳驚道兮環衞周命期門使接蹕將有事乎娛遊六龍驤首以啓路八駿騰光而夾輈且肅肅以穆穆幸夫花萼之樓然後層軒四敞聖情周顧遥窺函谷之雲近識昆池之樹緑野外霽入渭北之川原青門洞開覽山東之貢賦亦以崇友悌之徳勸農桑之務豈止唯臨鄠杜之郊空指邯鄲之路而已哉且壯麗難匹光華匪一馮禁掖以孤明隠垂楊而半出赫昈昈以𢎞敞肅隠隠而靜謐非匠氏之奇工梓人之妙術孰能至於是哉嵗如何其嵗之首花萼樓兮對仙酒願比華封兮祝我聖君千萬壽嵗如何其嵗始正花萼樓兮開御營願同吉甫兮頌我聖君億載聲蓋聖人去有欲反無名深宫皓素高居穆清觀羣方之樂業朝諸侯而嚮明即知遐邇欣慶冠帶混并均五氣之善叶三光之精嗟乎時難再得嵗不我與跡已混於沈滯心未齊於出處此小子之所以瞻棟梁以自悲仰雲霄而失序史翽仁壽鏡賦并序之天寶初有獻書闕下者言巴蜀間有石鏡見於巖之半仁壽之字昭然可觀僕深奇之因而為賦主上恢大寶闡鴻休仁風揚而元徳布壽星輝而皇化流故得仙靈啓瑞石鏡涵秋無往不形鑒乃侔於止水有鼎而應道可喻以虛舟懿夫化自天鈞質非鎔造亭午光射靈朝曙早來洞穴之九仙對商山之四皓炳崑岫之龍燭倒風壇之竹埽光能照乗不遺罔象之珠跡在幽巖為啓崆峒之道動如秋水之澄皎如寒雪之凝駐清夜之圓月掛長河之片冰其形不由於拂拭其勢豈假於鈎繩君則無心惟徳之斯感山非自爾喜神之有憑左猿吟右虎嘯萬籟相聒羣容必召雖復晉有金飾之美魏有銀華之妙何如辟魅而野鹿羞窺愛舞而山雞自照昔之寫形仁壽見膽咸陽倚玳瑁而稱麗掛珊瑚而益光名傳嵗月事著縑緗咸播美於前古孰歸功於我皇鏡為之鑒與明徳之合符石類於金惟聖功之初應可以示後世之千葉可以軌前王之萬乗記事之簡以光良史之書頌美之詞更動詩人之興法天法地之謂仁不騫不崩之謂壽惟仁也故能昭泰惟壽也故能長久萬人咸識鄙石室之仙經六體自然輕漢園之臥栁我大君猶抑而不納謙而不有小人無益於補天庶斯文之不朽獨孤申叔資州獻白龜賦以泰平將洽神物効靈為韻皇帝在位十五載西人獻異龜於王庭匪青黒以飾體特潔白而成形融采可嘉且不溷於五色呈祥有異詎止齊乎四靈蓋以我皇行化無外止戈偃武人綏道泰升至徳於元穹降殊祥於神蔡且夫龜者稟先知之異白者表司殺之方豈天意興威於有感俾臣下授命而無將西土是生實西方而主義被甲以至猶帶甲以來王不然何以皧精代雪純容皎素甲皓霜華而浹洽炯玉質輝金凝彩之清貞泳靈沼而冰靜息太階之砥平足使孟津之鱗恥捷乎素鬣越裳之雉羞奮於翹英矧乎稟殊姿體異貌陋三足之為美匪六眸以是效其用也或協聖人之心其動也克符知者之樂然後知戲朝之虎不足徵御鈎之狼不足云若作彼駒來思徒稱皎皎爾獸至止虛擅諄諄未兹瑞徳無與鄰應天之命昭皇之仁非櫝中之毁棄不蓮上以因循將順乃元穹以呈其貺曷思乎綠水而返其身則彼寧王有遺元緒之屯又安得而比倫嚮非我皇從道不咈必將混於介族詎得分為理物宜乎冠異紀首靈篇且無使其湮鬱宋蘇軾灩澦堆賦世以瞿塘峽口灩澦堆為天下之至險凡覆舟者皆歸咎於此石以余觀之蓋有功於斯人者夫蜀江㑹百水而至於夔彌漫浩汗横放於大野而峽之小大曽不及其十一苟先無以齟齬於其間則江之逺來奔騰迅快盡鋭於瞿塘之口則其嶮悍可畏當不啻於今耳因為之賦以待好事者試觀而思之而天下之至信者唯水而已江河之大與海之深可以意揣唯其不自為形而因物以賦形是故千變萬化而有必然之理掀騰勃怒萬夫不敢前兮宛然聽命唯聖人之所使予泊舟乎瞿塘之口而觀乎灩澦之崔嵬然後知其所以開峽而不去者固有以也蜀江逺來兮浩漫漫之平沙行千里而未嘗齟齬兮其意驕逞而不可摧忽峽口之逼窄兮納萬頃於一盃方其未知有峽也而戰乎灩澦之下喧豗震掉盡力以與石鬬勃乎若萬騎之西來忽孤城之當道鈎援臨衝畢至於其下兮城堅而不可取矢盡劒折兮迤邐循城而東去於是滔滔汩汩相與入峽安行而不敢怒嗟夫物固有以安而生變兮亦有以用危而求安得吾説而推之兮亦足以知物理之固然蘇轍巫山賦過瞿塘之長江兮蔚巫山之嵯峨雲孤興其勃勃兮北風慨其揚波山嶔崟而直上兮越至神女之所家峯連屬以十二兮其九可見而三不知蹊遂蕪滅而不可陟兮木猿黄鶴四顧而鳴悲覽松柏之青青兮紛其若江上之菰蒲維其大之不可知兮有橈雲之修柯蔓草䝉茸以下翳兮飛泉潔清而無沙亭亭孤峯其下藂木交錯而不明兮若有美人慘然而長嗟斂手危立以右顧兮舒目逺望怳然而有所懐儼峨峨其有禮兮盛服寂寞而無譁臨萬仞之絶險兮獨立千載而不下顛追懐楚襄之放意肆志兮泝江千里而逺來離國去俗兮徘徊而不能歸悲神女之不可以朝求而夕見兮想遊步之逶遲築陽臺於江干兮想氛氣之參差惟神女之不可以求得兮此其所以為神湛洋洋其無心兮豈其猶有懐乎世之人朝雲蔚其晨興兮暮雨紛以下注變化倐忽不可測兮俄為鳥而騰去忽然而為人兮佩玉鏘以琅琅愛江流之清波兮安燕處乎高唐彼蛟龍之多智兮尚不可執以罝罦高丘深其蒼蒼兮怳誰識其有無狄遵度鑿二江賦嗚呼吾聞魚鳧氏以降秦太守之前蜀之為國不幾千萬年方二江之害被兹土以禹之功不是施兮嗟後來亦奚言彼民之昏溺兮無乃得之於天不能遷土而改宅兮其流漂亦誰寃勁崖挺以中亞兮激狂瀾而右旋横驚折走莫知其所之兮吼穹谷而下穿蛟鼉鼈蟹訝以相濡兮何允蠢而緣延嘬膚吮血沸以咀嚼兮咸飲腐而飽膻萑蒲菱芡紛以相被兮汙百項之良田土不藝而民無所食兮孰與奏其艱鮮民之害固不可終極兮歴百千萬世天乃授之以賢曰噫中國之無人遂使民至於此焉天之生斯民兮故使之食飽而居安降巨菑以漂之兮天之意不然水之性固就下善利兮決之則宣濬九州而距四海亦奚艱且九載之孜孜民不憚苦而訴煩蓋因利而為利兮勞之在先不忍一勤其力兮乃至騖萬世而害弗捐胡不浚發其利源剷削其害根巨崖剖以裂兮砉頽乾而陷坤怒石奮以交墜兮吁電走而雷奔蕩重淵以傾覆兮喪百怪之精魂雲轉霧溢盤薄蹙踳兮注壑於其間寂寥散漫肆以長往兮若氣散於坯渾決其餘以旁溉兮居其側數百頃皆膏腴之上珍民降丘而下宅兮若蟻聚而蜂屯則幾年幾世之積害一日刷去兮不啻捐芥而蕩塵嗚呼蜀之為國非地之中宜乎夷貊之雜處魚鼈之與同有李侯者至然後别類於水物有仲翁者至然後同俗於華風然則今所棟宇而處衣冠而嬉皆二公之所翳若李侯之事固所莫得而繼彼仲翁之教亦何憚而弗為嗚呼以禹之功至大至神括六合以横被疇有存而勿論胡兹為害獨不得聞無乃力所不泊兮抑亦遺其功於後人而今而後乃知民末得所欲事或有不利先世所未暇除去聖人所未及裁制苟有志於生民皆吾人之所事若曰兹事體大必聖人而後為則小子也不敢與知劉望之八暉圖賦并序感余與客登夔子城望八陣圖忠武侯之行事恨世議者之弗獲於斯也作賦以悲之其詞曰靄孤臺之巋然臨千步之沙場石離離其斑斑紛棲鴈之未翔山瞑黒而更惡水雖波而不揚澹徙倚其不去含鬱紆之内傷是何以使之然哉客或告之在漢之亡有人超然臥鄧南陽甚似阿衡樂未渠央感大耳之至意姑黽勉而徂征又佀子房初未有意隆準之老也及其既作亦不能已手胼足胝夙夜赤子忽一龍與一蛇蓋亦未可以優劣計大兵初來雷電下空璋孱小兒孰嬰我鋒駐師江郊坐向必東蒐我卒乗取彼凶殘我不往取高帝在天衆謂夘金之不可相而況夫子之賢也運去道窮嘔血繼之非公實愚愚者不知自古聖賢亦行其義道之不濟已知之矣相夫子之所立固已無窮而不貲彼丕操父子鳥雀犬彘之竊食雖甚饜而不害其驚疑愍世俗之隘陋徒顧瞻而涕洟請舉酒以酌公混一笑於江麋鄭少微憫相如賦韙長卿之絶塵邈下視於屈宋思𦕈𦕈以入微辭蔚跂而易貢騖八紘之津涯括動植而錯綜擢篆籕於重泉幹形聲而罄控當其奮翼巴庸前無古人拾阨灰之㫁簡搜屈壁之遺文紛齊魯之老師徒騁辯於説鈴蜕筆上梗鼻端運斤専兔園之右席麾鄒枚於嚬呻顧天西之櫟社悵夜錦之未晨念絃歌之石友暢落魄於情親夫何嫠人之豔豔兮感燿燿之宵光矚綺疏以託誠兮佩徽音而曷忘嗟父母之不聰兮昧彼都之丰臧盼星河之照闈兮徑遡迴而往從縉紳先生而為此歟涼徳汙行既不勝誅誾誾烈女世未乏諸足不下堂步中瑀琚紉幽蘭以為佩兮飾美玉以為車豈無泳漢之游女兮亦有采桑之秋胡秉周禮以律身兮諒冰雪之難渝裨化國之隂教兮飾家道之權輿爾弗安於正告兮䝉惡聲於簡書訪舊壚於故老莽榛蕪之離離眢井乃貪泉之戒修梧實曲木之規渴者勿汲暍者勿棲噫嘻余觸類取譬操觚黙維滔滔儒服相逺幾希摟處子者迷忠義之大閑窺鄰牆者闇富貴之危機吁雁幣之聘媒妁之辭墦間之夫河間之婦等亡羊爾未容勝負又奚獨料理十日卜之與典午邪王騰辨蜀都賦夫人物習性有忠有邪有智有愚出於才行而不由土産自趙諗狂圖好事者類指以疵蜀人蜀之衣冠含笑强顔無與辨之者余嘗切齒焉及讀左思賦見其薄蜀陋吳諂魏以諛晉之君臣茍售一時之聲價而滅天下之忠義晉之公卿一口稱譽風俗頽矣士無特操以陷四朝於五代卒貽萬世之愧夫魏者漢之賊也原思之詞似欲尊正統而黜偏方然不顧正氣之淪溺乃知蜀之横被枉抑其所由來者久矣故作辨蜀都賦以申蜀人之憤氣其商畧土風採摭人物不該乎治亂興廢之變邪正是非之理者不在鋪布之限非若前輩之詞主於類聚山川毛羽動植以煥文彩之美觀悦讀誦之利口而已辨疑先生核理儲思欲折蜀都未繹其辭客有東方者過而問之曰昔者太沖搆十稔之意搜三都之奇文成示人張華見推士安序焉盛傳於時豈其猶有未盡而夫子欲糾其所違先生曰嘻子未之知也吾蜀立極之初域民之始井邑山川之秀人物風俗之美是則左思備言之矣然而論列人材詳明士類第言文藻之華掞不及蜀人之忠義遂與吳俗例加抑忌非特沒其實美且沮之以横議川靈為之扼腕嶽鎮為之憤氣吾以此為有遺恨故申言其所以夫品物流形九土分敷惟有蜀為極險之區羊腸繞其垠鍔鳥道駕於至虛行者却履以視棧乗者投繩而鈎車騐太白之所賦蓋未髣其錙銖實天限而地隔故山硝而川迃宜若與中夏否閉而不通其車書然而朝宗之水浩浩而南傾内附之山峩峩而東蹙口呀雙劒若邠岐虎啗之吻尾拽終南乃咸雍金城之麓以其有所附屬而不能自立故命名者號之曰蜀自西而東昔本無途金牛詐言五丁是除吾人由之既艱且虞一夫舉足十夫荷儲食黄白以骨立臥冰蔾而裂膚蜀士逺於進取蜀民疲於轉輸嘆天閽之已邈望秦隴以長吁然且連綱之運應聲穿領之牛係路陟長坂以猶及繞大江而不悞指日而物不緩期按籍而民無逋戸邊餉以需上供有裕悉陸海之攸産飽神囷之所聚五季之阨王朴獻謀謀先取蜀以阜兵餱餱足兵强乃征方州時乏逺御朴言不酬及我太祖算如朴策蜀定國富次平諸國蜀於是時興王有力嚮者孟氏撫嫗矜憐惠愛其人捐租五年及我王師宣威三川卒無一夫東嚮而控弦蓋傾心於正統視私恩猶缺然是使偽命牽羊偏方銜璧顧旌纛以涕泗仆逵衢而思積感恩之意則誠効順之心自直豈若他邦之惷悍怒螳臂於車轍由古而來可得而聞李雄劉闢季連公孫因仍世難割據坤靈盜蜀而王踵起而霸類非蜀人三國之際異方鼎峙若南若北輔吳崇魏惟我蜀人不私非類雖輔璋戴備以自固猶謂吾君之子而卒臣劉氏晉宋而下南北風馬南鬱屈以遊魂北陸梁而騁駕惟此西土爰歸南化迨蕭紀之不令泝岷江而僭正梁人召冦以救亂魏氏懐姦而託信彼實包藏此惟附順逆施不惠於宜都内潰爰從於遲迥豈瞻顧於北風蓋欽恭於王命不惟蜀人不盜蜀都歴代以來亂離間起在内在外為姦為宄董卓桓氏元載朱泚龎勛劉闢樊崇韓遂懐兇煽悖言不詳紀試攷譜牒按其閭里苟揮羿浞之戈悉匪岷嶓之士在唐中弱齊蔡幽并諧結諸隣脣齒相因叛主之師逐帥之黥陸梁百年不為王臣是亦何嘗連吾蜀民帝室内訌孽牙匪彝震動萬乗再狩於西民與其帥開關迓之天王莅止百官六師國用告乏衆艱於饑與其吏民縑粟輸之比其還歸恬不知危兹蓋處平則率理以奉京邑之靈遭變則自完以待中原之睦欲攜之則難叛欲一之則易服豈特文有餘而武不足耶亦其天資正順而敦篤近者趙諗圖結巴渠包藏歴年困於無徒爰及吳儔妖謀是趨蜀人自發遄服其誅由是言之蜀何負於君王歟思徒見其隣於西夷逺於上國誚丘壑之險鄙方隅之僻但分中外之質麗不決正邪之名實胡所據耶成周之盛四海同風冠帶所加古無比隆淮徐連齊魯之軫而有夷伊洛接豐鎬之都而有戎方春秋之尊夏視吳楚猶貉蟲犬周宗伯而不數抑又矧於閩中雖今俊乂之所出在昔語言之不通是則與我均為逺服安得妄論其異同然而自差觀之華陽黒水别封畛於堯籍岷山導江歴經營於禹跡秦氏剖符李冰擁節五政七賦被自古昔而四載所至南止荆揚之域荆揚之民島夷卉服矧又過此以往耶百粤之取始自漢武郡國雖判衣冠未楚所謂粤人無用章甫常衮化之士乃文舉然則論淺深之時較久近之序烏可與蜀同日而語王莽元舅霍山冡勲遺愛帝壻林甫皇孫許李聯階於黼座封裴接棟於楓宸既同心於肺腑亦託體於親隣逞螟蟊之毒噬為虺蝮於君親是則勢疎者未必孽惡地近者未必誠純我雖逺於國而忠則邇也高下既别一凸一凹太行成臯三門二崤或壯帝王之形勢或資姦盜之炰烋或王路之攸梗或伏兵之所交正用之則亦在徳只邪憑之則遂為冦巢吾人之心如砥吾人之行如螘結羶美於一心捐崎嶇於萬里申韓生於中土不免為僻學鄭衞作於中州不免為僻樂九野同列於地何獨非梁益之墟四隅無私於天曷常戾西南之角況乎江行地脈鮮決埽而敗岸星直天狼工弭姦而觸惡肖此正􅂔挺吾先覺節以遇立文非茍作王褒明君臣之合何武憤福威之削張綱扼腕於跋扈揚子甘心於寂寞相如不數子昂見却謂誦述以阿諛恐吾徒之貽怍才高則委靡面靦氣直則回邪膽落彼徒嫉於西子殊不慚其鄭璞不意兒曹懵其志行之僻反以居處僻我也且圃植蕙而菜育畦疏禾而莠生梟倫鳯族蜒肖龍蟠君子小人常溷其間古何邦而無佞亦何地而無賢龜䝉孔孟之攸宅冀北唐虞之所營宜丘門之不雜何蹠黨之横行鯀為父而禹子蔡為弟而旦兄導挺節而敦逆奕推忠而杞姦彼為同屬以行異況指一方而槩言吾請與子姑置逺近之殊而摭正邪之辨晉取之魏魏取之漢功非定亂位實圖簒思誠晉人言諛而辨辭抑蜀以黜吳志借魏而佞晉魏為高廟之冦賊蜀實中山之宗姓不然何故進亂世之姦雄而沮先王之枝屬乎况蜀以得賢而王以失賢而亡魏以已篡而張以人篡而戕彼賦魏事徒言刑罰之清平胡不言文君之殞命也徒言忠良之聚㑹胡不言三馬之食槽也詞未及已客奮而起獲聞高義欽服厥㫖嘆草澤之空言不能廷辨於天子元楊維禎八陣圖賦遐哉邈乎蠶叢故墟劒閣崢嶸兮石棧縈紆車不得而運兮馬不得以驅非王業之所基兮徒抗險乎中都帝中山之苗裔兮乃猶厄此斗隅黄星射乎宋野兮强猘狺乎江之東偉伏龍之感激兮起左顧乎隆中允識時之俊傑兮吞餘子於一空圖八陣以用武兮必先天而獨得六十四之成美兮本馬圖之全畫三十二之岐分兮妙隂陽之互宅天地衝軸兮風雲盤辟龍飛鳥逝兮蛇蟠虎翼撓之無跡兮連之無方進退不愆兮出没靡常奇不失於正正兮怪不越於堂堂伏至動於至靜兮寓能柔於能剛喻以常山之蛇勢兮曽未測其望洋巴之水兮砯崖折壁峽之濤兮風霆礔礰彼箕張而翼布兮曽不轉其磈石非神物之隂衞兮孰萬夫之捍力想貔貅之對壘兮指白羽之一麾運縱擒於掌握兮算不出於八奇賊之望而走兮甘巾幗之受雌按渭濱之所屯兮實鼎國之王師自風后之有圖兮距神巫之赫伐逮尚父之六韜兮佐牧野之黄鉞孫吳馬之剽標兮徒生靈之肉血鄙敗事於腐儒兮彼譙生其又何法兹八陣之猶覺兮軼軒黄與天老曰流馬與木牛兮又神機之所造歘中營之告變兮哀夫人之奪蚤訖黄芒以當天兮掩炎精之皜皜嗚呼西望岷峨兮南泝錦江山川相繆兮地老天荒歌梁父兮釃吾觴招謫仙兮呼子長訪魚腹之砂磧兮弔新都之戰場雖武無用於今之時兮亦以發吾文之氣剛明楊廷宣連雲棧賦己夘之嵗時方冬矣臘云暮矣余年過賈生學慚董相怔怔營營内不自定由是謀邁於行載言北征擔簦負笈陟岵跋阻攝穹嶐控青雲扣天閽順風而稱曰肇𤣥黄之既判兮迺陽浮而隂橐嗟大塊之茫茫兮孰則排而山鑿帝既設此靈險兮余總丱聞乎棧閣肆皇圖之廣運兮都形勝乎燕漠𦕈蠶叢之建國兮隅星分乎井絡連秦帶蜀方五百里兮繚咸陽以為郭阻褒斜之艮隆兮擁岐斄之巨壑惟隆理與替墜兮亦槩聞乎往索良既䇿羽以絶望兮委回禄以烟灼何退身而鷙擊兮思駕馭乎帝畧迄超漢而蹷楚兮遂用建夫三恪陽中路以迴車兮紛不爽於髮膚白發嘆而長嗟兮意深諷乎彼夫憤儀圖之詭祕兮誑金牛以為諛憫漢帝之遵駕兮忍蛾眉而西趨侈御愛之仙蹕兮瘁萬乗之玉軀蓋其危也足以駊騀巨麗而其至也不亦為禦侮之天區夫山本其奥也石備其崇也水出其䝉也盤紆突兀嶔崟嵂崒澒洞深涯蓊蔚茀鬱天之所生也地之所産鳥不得而翔獸不得而逸四時變化剛柔錯摩交構乎其中終始乎其内其雲則黤黯曇衣被膚寸漸深候於木末逺視極黪邇之則黝䵤於石黦於深谷靉靆淹留氛氲隠天冪幙屯需落落寞寞異於常態其雨則津津汋汋石潤林響瀑布滴珠滿壑盈瀨霑濕霮䨴與地潛通豁徑注流烟樹迷濛松膏林沐淖濘跼蹐病於逆旅其風則飄颯䬍轉山循谷料峭觱發颲䬑批亢巽二乗虛峻峯高颲平坻微䬒飀落木寒颸切肌石尤激射打頭周回延歴萬象莫之可捕其日則黯淡蔽虧斜景遏雲東谷西隅窺於中天曀㫱晦㝠翳􅧵隂難未嘗昭晰其風俗之所習土地之所宜余故得并吞其所經歴包舉其所問答而囊括其語焉於是有五徳公子導余以喬闕兮㠌雲路之巃嵸據嶟崿之扼塞兮羅萬象於景從聳巑岏之崨嶫兮怯衣繡之乗驄盤七曲而腸迴兮眴高目之瞇矇瞰龍江之崒崒兮瀉白練之霓虹余既登此絶嶺兮瞠乎前觀藐乎後視拾級坎懍連步錯愕怔忡悸駭倦臨色勃久而後定迺渡水閣馳青橋涉凌兢而惝惘兮列御風而憑空側身穽而撇健兮足秦法之重重㠧飛棟巇巉崖兮矻浮柱而増崇截王孫之便給兮碥磈礧而青葱靄雲樓與露蜃兮比朝暮之仙蹤橇不足以為術兮憫征夫之溟濛儂鞠躬而進登兮殆郭駞之形容馳丹梯下峻阪兮擬抱甕之忡忡亦既身倦而神罷兮迺偃息乎崖慵慵未極也訊往路以前山兮越馬道與武關嵾嵳㟡路偪側狹隘騎不得方人不得比吁嗟乎其赤帝之所興首咸陽以入關兮降子嬰而要盟羽不得而爭驅兮適自兹以為兵故稱名為劉埧兮意非此莫之與京因是以益遊乎奥屏兮閲千古之芳林於是有凌烟大夫挺瓌梧負霄漢迓余而言曰繄前林之矗矗兮豈非皇華之岐嶷楸檜障以蔽天兮鵾南溟之翼施旎龍之蹇兮雜遝糾㑹之標枝蕩日月以扶疎兮幹輪囷而參差杞强梁而麗霄兮樗臃腫而䲭夷楊郅偈而膚敏兮檉垂身而委隨節美秀而喬修兮紛篁鐘之陸離月極望而攢㝠兮何摧嗺而鬱伊悲落木之蕭蕭兮恣行人之淅炊風雨晦而濤起兮嚮萬壑之隆墀余稔遊此窐窌兮窺管天而㝠疑馳豫章之絶幹兮駕鄧圖之平騎悵梁棟之齷齪兮雖牛山其何為彼其衆夥之富山桃石榴橪柿苦李小棗楟柰楂棃梬栗斂朱榮祕生意錯綜懸岩潛隠乎其中不可殫述由是踰三坌窺姜嶺山益進而㠍岌樹益窈而縱横憶岐豐之盛瑞播覽徳之美名於是有綠衿使者麗質修儀且逡且巡其氣也愒其志也怜翋􅢣直前櫽括以此山之靈昔寶雞之耀羽兮托千里之峭嶸惟樊籠之我求兮窮巖嵏而多縈彼蒼鷹羅鸗紛修翎兮屬玉交青鸊鵜鴐鵞晨風子規鸂䳵鸕鷀白練沙雞錦胸繡臆累黔啄兮羌有萬而難并鵲占嵗而音妙兮鳥散聚而時鳴鸖宿霧而懐寶兮鴠呼類而為盟雉招摇而曳尾兮鳩思婦而藏聲鸛獨立而不懼兮鷫依稀而將迎鴻漸逵而自得兮鴈遞比而從兄其他角毒之屬又未可以須臾傾蓋而語班荆而坐對也聊舉虎豹羣而晝哮兮黄熊慢而遷延狼跋胡而恣遊兮豪豬放而盤旋猱嫵媚而先後兮㕙兔逸而長便狻猊茁而豐茸兮麋鹿呦而雲眠鼬鼯幻而蹁躚兮狐貉衞而自賢余因聽此富儗上林靡邁長楊公子王孫有智不能以施㔋磻羅穽有術不能以張王良何以歆趙主造父何以駿周蹄徒縻思於行李噫何補於攀躋既騁草涼之墟復背東河之西尖巒义呀隘若虎關凌遲委蛇下若抎鳥崔嵬嵑􅙙守若扼吭宋代之賢所以遏元兵而一時之雄終不能向南鄭而窺也可不謂之壯哉天地設險高則為山深則為水山之所峙水之所流余又見夫𤣥㝠先生之為費也濺洶濤泛瀇瀁出崎嶇走漲隨余馬而犇流諒余行而相望岌岌乎譎哉詭哉滔滔乎泓哉瀼哉南通沔漢北入汧渭粤衆派之汎濫兮觴礫碌之彷徨經逶邐而迅駛兮礜慫恿而鏗鏘崪震電之憑怒兮綰萬夫之阿房砥中流而濆潰兮沸狂怒而滵湯霈幃蓋之溰溰兮恍白鷺之翺翔懔三軍之旋凱兮摇甲胄之鐵裝撼韶濩之夜􅯳兮奮馮夷之擊鏜灑雲根之溜篆兮濯白玉之琳琅邁蝌蚪之瀺灂兮神太史之籀藏三江駭而奔鯨兮穀洛鬭而非常瓠子決而訇湃兮吕梁隘而飛浪未有似此之崛岉翻湓豗觸騰驤況其時也竺寒凝嶺洹凍呵僵冰崖珠絡雪巘瑶光人思挾纊之主屋存􅏈瘃之霜皎皎皚皚堅堅强强此亦過客之壯麗奇觀也瀟灑拂鬱滌汔腎腸喜溢眉㫸樂忘故鄉已而望秦塞之渭縈瞻太華之麗麓水東去而長辭翠漸微而山促嗟此平原之易地豈非前代之雄都乎余迺繫離懐於山水寄餘情於巴蜀障庾規之塵窮阮宗之躅薊門烟月蘆溝曉昱煇煌乎帝里蓬萊乎京屋世態無常天時又速余於是復冬往而春來兮殫未盡之芳蹤忽寒暄之易劑兮訝風景之靡同嵐開障麗石淹灘渾鱅鱔出没鰬䰷䵶黿喁喁族族别孕鮞鯤獺入水而四捕豺向岩而懐吞余始驚夫昔者之遁而今者之温故夫路蓊薈以彌深山爛漫而舒容百和異香徐來應風蘅杜茝蘭緑蕙幽蘺蘼蕪蒥荑山椒蓀萇有質無名殆不可窮藁本射干石芥茈薑温韭香菜赤根水芹豐蔚之盛何其隆歟若夫寶藏之興太守夜懐六奇反間熠爚繁光生乎古壙類乎石國則鳯山之産也黒金巧冶積薪而鼓鍛錬成鋼許子之所耕而晉國之所賦近代求猿伐木披荆又有夜光布網網牽百里則安山之奇也玉版雲英非濤非倫燦如白雪膩如滑肌咸陽不足論其價山隂不足供其資西蜀賴焉二秦給焉則武關之藝也伊所居之棟宇兮樹板屋以層甍隨凸凹以偨傂兮無風雨之暴傾飯土鉶如上古兮燃松膏以為明性剛勁以質樸兮讓齊魯之蜚英挑雲水於上山兮燒石田以為耕播穜稑以有秋兮兼芋橡與蔓菁其官府之所寓舍則譙樓麗棟盛鶴摇鈴重門雙闕井幹華程黝堊壁飾後寢前廰無菑無害庖食具精勞乎逺人達乎帝廷其衣冠之耀則禄不易常用其武弁間以流官統以方面毋暴毋忝考其勤倦撫其人民而庇其所縣嗚呼皇風清穆兮四海無虞山川奠安兮草木茂殊我生值此兮何徳之腴余去故鄉千里兮獨褦襶於兹嵎以高山為知己兮以流水為鍾期以喬木為朋友兮以道路為箴規名不見成功不可知手胼足胝化不轉移揚雄為之解嘲崔駰為之達辭齊師幾此卞玉屢齎惟守道以自全恐辱己而為嗤余故得假息於姒狄之館沈酣於吏部之酤先生見而㖤㗅使者候之以長吁大夫腹非於其側公子反脣而揶揄噫嘻何吾子之倥傯兮勞不憚於僕痡荷一往之足訴庸再來之可乎彼一握以為笑赤焉知吾之為吾匪區區之宦轍抑以覽聖世之皇圖未敢擬司馬之遊不亦異博文之徒非聞子言孰策余駑言以足志竊效漢儒迺相與忘形共賦於開山之途四川通志卷三十九
