風鄭谷蜀中詩三首馬頭春向鹿頭關逺樹平蕪一望閒雪下文君沽酒市雲藏李白讀書山江樓酒客黄梅後邨落人歌紫芋間堤月橋烟好時景漢庭無事不征蠻夜多無雨曉生塵草色風光日日新䝉頂茶畦千點露浣花牋紙一溪春揚雄宅在唯喬木杜甫臺荒絶舊隣却共海棠花有約數年留滯不歸人金渚逺江清碧簟文小桃花繞薛濤墳朱橋直指門路粉堞高連玉壘雲牕下斷琴翹鳯足波中濯錦散鷗羣子規夜夜啼巴樹不並吳鄉楚國聞西蜀淨衆寺松溪八韻兼寄小筆崔處士詩松因溪得名溪吹答松聲繚繞能穿寺幽奇不在城寒烟齋後散春雨夜中平染岸蒼苔古翹沙白鳥明澄分僧影痩光徹客心清帶溜侵雲響和鐘擊石鳴淡烹新茗爽暖泛落花輕此景吟難盡憑君畫入京渠州汧江寺詩退居瀟灑寄禪關高掛朝簪淨室間孤島暫留雙鶴歇五雲爭放二龍閒輕舟共泛花邊水野履同登竹外山仙署金閨虛位久夜清應夢近天顔崔塗渠州沖相寺詩水流花謝兩無情送盡東風過楚城蝴蝶夢中家萬里子規枝上月三更故園書動經年絶華髮春惟滿鏡生自是不歸歸便得五湖烟景有誰爭吕洞賔題岳池縣集虛觀詩青蛇煉影月徘徊夜靜雲閒尚未來應是有人新換骨暫留蹤跡到天台留題飛雲道院詩攜笻來此步飛雲踐滿賔堦緑蘚明江上同歸共誰去不堪回首不逢人目偶乗青帝出蓬萊劒㦸崢嶸徧九垓我在前人不識為留一笠莫沈埋羅隱巫山高詩下壓重泉上千仞香雲結夢西風緊縱有精靈得往來狖軛鼯軒亦顛隕嵐光雙雙雷隠隠愁為衣裳恨為鬢暮灑朝行何所之江邊日月情無盡珠零冷露丹墮楓細腰長臉愁滿宫人生對面猶異同況在千巖萬壑中王鐸題濟順王祠詩廣明二年僖宗幸蜀神有隂兵助順見形於桔柏津帝幸其廟解劒贈神三盛唐聖主解青萍欲崛新封濟順名夜雨龍抛尺匣春雲風入九重城劒門喜氣隨龍動玉壘韶光待賊平為報山東諸將相格天勲業賴隂兵歐陽詹益昌行詩并序興貞元年中天子以工部郎中元少尹吳興陸公長源牧利州其為政五年予旅遊於利覩人安俗阜昌欽所以美作詩一章利州故益昌郡也目曰益行詩曰驅馬至益昌倍驚風俗和耕夫壟上謡負者途中歌處處川復原重重山與河人烟遍餘田時稼無閒坡問業一何修太守徳化加問身一何安太守恩懐多賢哉我太守在古無以過愛人甚愛子治郡如治家雲雷既奮騰草木遂萌芽乃知良二千徳足為國華今時固精求漢帝非徒嗟四氣有青春衆植佇揚葩期當作說霖天下同滂沱後唐杜仁傑至真觀三言詩坤所載乾所燾象與形孰眹兆緯五行環二曜流而川何浩浩四溟晏九河導峙而山亦多號神有嶽山有嶠粤天壇極道妙巉孤撐未易到日出沒見遺照偃東西絶海徼倐光怪來熠耀大龍燭細螢爝不恒出赴感召笙嘹喨鶴窈窕羽人路屯其要青螺堆玉簪峭左參井右丹竈揭清虛不二竅昔王人往昭告始軒轅末徽廟接柴望咸親燎莽刧灰起天燒摧棟宇失朱縹羣鹿豕雜蓬藋予何為一來弔必勝廢乃大造聖之作賢者紹矧𤣥𤣥語祕奥探逾逺理益燿微是理萬有秏文雖徑實非剽庶今來永為詔杜光庭題鴻都觀詩亡吳霸越已功全深隠雲林始學仙鸞鶴自飄三蜀駕波濤猶憶五湖船雙溪夜月明寒玉衆嶺秋空斂翠烟也有扁舟歸去興故鄉東望思悠然題都慶觀詩三仙一一駕紅鸞仙去雲閒遶古壇煉藥舊臺空處所掛衣喬木兩摧殘清風嶺接猿聲近白石溪涵水影寒二十四峯皆古隠振纓長往亦何難題仙居觀詩往嵗真人朝玉皇四真三代住繁陽初開九鼎丹華熟繼躡五雲天路長煙鎖翠嵐迷舊隠池凝寒鏡貯秋光時從白鹿岩前往應許潛通不死鄉度世古元歌後周至真觀小蠻橋下掘得石碑云始青之下日與月兩半同升合為一大如彈丸甘如蜜出彼玉堂入金室子若得之慎勿失蜀道觀中鑿井得一碑刻文似賦似贊有隠士言是漢時隂真人所著鍊丹法雜著於子玉碑有物有物可大可久採乎蠶食之前用乎火化之後成湯自上而臨下夸父處中而見受氣應朝光功參夜漏白英聚而雪慚黄酥凝而金醜轉制不已神趣鬼驟金歟玉歟天年上壽無著於文訣之在口宋楊億成都詩五丁力盡蜀川通千古成都緑酎濃白帝倉空蛙在井青天路險劒為峯漫傳西漢祠神馬已見南陽起卧龍張載勒銘堪作戒莫矜函谷一丸封錢勰成都詩武侯千載有餘靈盤石刀痕尚未平巴婦自饒丹穴富漢庭還負碧砮征雨經蜀市應和酒琴到臨卭别寄情知有忠臣能叱馭不論雲棧更崢嶸何耕雲溪詩幽居定何如頗恨未見之主人向我言喜色融雙眉修篁流翠隂寒溪漾清漪領畧非一狀幽妍發餘姿空濛雨亦佳瀲灩晴更奇豈惟二江獨意恐兩蜀稀主人信妙士得此固所宜天公閟好景授受各有時豈無多田翁偃蹇遊莫隨素交懐老蒲秀句紛珠璣安得招歸來為君賦清詩往者不可作後生欲何為浮翠橋詩隔溪蒼翠各西東架竹為梁路始通缺月罅林凝淨緑㫁霞明水抹殘紅芒鞋步步幽聲處藜杖聲聲屈曲中回首忽驚橋已逺泠然身御圃田風寒碧亭詩憑欄日日俯清湍洗竹年年斬惡竿十頃琉璃秋色靜一林竿籟曉聲寒涼風有意生天末明月無邊照水端誰謂過清難久處愚溪元自不相安龍淵詩門前大江何渺漫昔人飲牛水為乾水乾龍逝亦其理近在咫尺聊泥蟠魚蝦玩侮獱獺笑縱有靈怪誰當看徳人問舍壓吾境便爾築室相遮欄坐令異類皆屏伏恃有此耳差少安却紆朱紱去監郡遺我守舍良獨難昨來過門恍如夢龍致此語催歸鞍先生不信反不笑謂我饒舌狂豐干忘機臺大虛生微雲機事日夕繁兼忘豈不佳尚有忘者存稽首老龎翁妙處希一言請觀臺上月萬古無昭昏劉望之新都驛逺平軒詩霜晴木落送歸鞍袖手微吟此慰顔賸欲憑欄招白鳥更煩翦樹出青山晚悲薄禄非三釜賴許清詩見一班看到逺平纔得恨我寧歸臥尺椽間王灼露香亭詩北渚一帝子洛川一虙妃池有千種蓮平生所見稀纖穠各態度紅白爭光輝我來亭上飲夜久未忍歸翁家採香人但愛香滿衣豈知清露濕團荷瀉珠璣勾昌泰題新繁勾氏盤溪詩勝簪不肯黒浮頰故能紅心寄塵埃外春歸杖屨中徑松看謖謖庭草碧茸茸無術繫白日年光如轉蓬范鎮遊昭覺寺詩炎蒸無處避此地忽如寒松砌行無際石房禪自安鴛鴦秋沼漲蝙蝠晚庭寛登眺見田舍衡茅半不完張詠悼蜀詩蜀國富且庶風俗矜浮薄奢僭極珠貝狂佚務娛樂虹橋吐飛泉烟栁閉朱閣燭影逐星沈歌聲和月落鬭雞破百萬呼盧縱大噱遊女白玉璫驕馬黄金絡酒肆應不扃花市春漸作禾稼暮雲連紈繡淑􅂔錯熙熙三十年光景倏如昨天道本害盈侈極禍必作當時布政者罔思救民瘼不能宣淳化移風復儉約情性非方直多為聲色著從欲竊虛譽隨俗縱貪攫蠶食生靈饑作威恣暴虐佞罔天子聽所利唯剥削一方忿恨興千里攘臂躍火氣烘寒空雪彩揮蓮鍔無人能却敵何暇施擊柝害物黷貨輩皆為白刃爍瓦礫積臺榭荆棘迷城郭里第鏁苔蕪庭軒喧燕雀斗粟金帛市束芻羅綺博悲夫久奢民不能飽葵藿朝廷僉元戎帥師盪兇惡虎旅一以至梟巢一何弱燎毛焰晶熒破竹鋒熠爚兵驕不可戢殺人如戲謔悼髦皆麗誅玉石何所度未能剪强暴爭先謀剽掠良民生計空賖死心隕穫四野構豺狼五畝孰耕鑿出師不以律餘孽何由却俾夫熾蜂蠆寡術能籠絡邊陲未肅清何顔食天爵世方尚奔競誰復振謇諤黄屋逺萬里九重高寥廓時稱多英雄才豈無衞霍近間命良臣拭目觀奇畧薛田成都書事百韻詩并序物金躔奥壤玉壘名區風尚饒曠古稱最僕守兹職任五年載至初則木牛流馬馳八使以均財次則皂蓋朱幡奉一麾而作鎮歴覽勝異慷慨興懐古人曰非感發不可以言詩非聲詩不可以導志故言成志激流為美談偶因公退輒作成都書事七言一百韻止陳乎益都事蹟罔暇以外景加諸庶幾謬發於斐然詎敢芳揚於作者詩曰混茫丕變造西阡物像熙熙被一川易覺錦城銷白日難歌蜀道上青天雲敷牧野耕桑雨栁拂旗亭市井烟院鎖玉溪留好景坊題金馬促繁絃風流餔席堆紅豆瀟灑門庭映碧鮮表狀屢言同穎穗敕書頻奬並生蓮旋科杞樹炊香稻剰種豌沃晚田仁宅不墮由政立義圍無取任情遷民知禮遜蠶叢後俗尚奢華邃古先遶郭波濤來浩浩歸朝岐路去綿綿乍回黒水將成道潛到青羊恐遇仙靚女各功翻樣繡袨商兼制砑綾牋壚邊泛蟻張裙幄江上鳴鼉簇綵船石筍崚嶒衙對峙琴臺恢闊寺相連羣葩豔裏珍禽語百草香中瑞獸眠喜趣必臻尤佇望勝遊爭倦更遷延早荷葉底蹲鴟伏椶樹梢頭亂蝶穿鹺發牢盆渾棄鹵鐵資圜法免鈈鈆豐饒物態寧殊越美麗姝姬酷類燕西海號雄彰傳紀南康辭健積銘鑴良工手技高容學妙隠丹方祕不傳倚劒靈關凌絶頂夢刀孤壘削危巔金華巷陌遺三品石鏡伽藍露一拳信落荆州隨鼓枻檢頒芝闕聽摇鞭若量内地寒暄異且在遐陬水陸全渝舞舊云傳樂府巴談誰曰繫言詮九苞綰就佳人髻三閙裝成子弟韀欲辨坤維尋地理纔臨益部認郊廛文翁室暗封苔蘚葛亮祠荒享豆籩貨出軍儲推賑濟轉行交子頌輕便氣蒸蒟蒻根鬚潤日罩楩柟樹影圓藥市風光蟲蟄外花潭遨樂鵙鳴前聚源待擬求梟氏貯怨那能雪杜鵑衆植森榮還蓊蔚夾流湍迅迥潺湲鮮明機杼知無算細碎錐刀不啻千合伴鵶鬟齊窈窕對陪霓袖競翩翾五門冷映岷峨雪千里爰疏灌堋泉茂盛八弦宜得最膏腴十道比俱偏袁滋不到生無分段相重來宿有緣欵召相如登兔苑驟遷太白步花甎葳􅅋草木時為瑞奇秀江山代産賢曉後細風紅灼灼夜中微雨碧芊芊錦亭焰燭明歌障繡閣香毬煖熨氊寶塔徘徊停隼􅒅觀街雜沓擁輜軿酴醿引架家家郁躑躅攀條處處妍重愛魯儒提徳柄威降曹將董戎旃歡謡少負賨人勇長講多經楚客禪似簇綺羅偏煥耀如流車馬信喧闐搘機顯綽名堪録題柱芬芳事莫捐李特鋒鋩徒恃險張儀規畫自持顛鷹揚器業成悠久烏合姦雄敗轉旋漫向鼎分澄霸道却當龜化驗都廛强貪楚滅悲傾轍廣洽堯詢喜慕羶側弁猖狂抛玉斚歸鞍酩酊墜金鈿氛埃屏息雲常覆稼穡繁滋澤靡愆睿聖宵衣垂迺睠貴臣馳日毎傳宣石牛邁路加歆饗江瀆隆區助潔蠲避暑亭臺珍簟設縱閒池沼釣絲牽遮蠻帶礪長能固捍蜀金湯逺益堅何武甲科曽繼踵嚴真十兆罕差肩儲書競甲諸家集博識咸修百氏箋紙碓暮舂臨岸滸水樽春注截河壖華嚴像閣涼堪愛淨衆松溪僻可憐學射崔嵬横罨靄放生寛廣媚漪漣蘚庭嫩筍青篸篸風檻新荷緑扇扇守戌貔貅千萬騎采葑簪筍兩三員清江瀉勢方流巽大面盤形正壓乾電掃谷風藏虎嘯雷瞑官樹灑龍涎郃占逖應星舒彩欒噀端聆火撲燃令範式驅民􅆙􅆙咨謀疇倚道平平性寒甘蔗猱偷齧體膩芭蕉蠧莫沿誌讀備興重掩卷史看唐幸懶終篇雕盤姹女呈酥作水巷癡童颺紙鳶初下鹿頭迷鄠杜暫來犀浦誤伊瀍變秦言語生皆㑹戀土情懐死不悛結廈斧斤宗簡易入神丹艧厲精專栁隄夜月朱簾捲花市春風繡幕搴十縣版圖分戸籍一城牌肆係民編受辛滋味饒薑蒜劇饌盤餐足鮪鱣月季冒霜秋肯挫茘枝衝瘴夏宜然幾番藂箐鳴虛籟是箇園林噪懶蟬蠢動乗時先養育菁英屆候别陶甄地丁葉嫩和嵐採天蓼芽新入粉煎平代啓闈聞繼岌監軍憑軾見劉焉蕙蘭馥裛幽蹊畔菱芡交鋪曲島邊繪網晚晴誇蹴踘畫繩寒食戲鞦韆氤氲紫霧濛都邑縹緲彤霞聚偓佺螭伏自然銷劒㦸螻翻幾度起戈鋋宦遊止嘆音塵闕鄉飲何驚嵗月遄靈壽桃枝奇共結金砂銀鑠貴相聯埋輪昔按均輸命叱馭今分太守權徒為行春飛皂蓋詎能許國報青錢政經旋考尤多僻民瘼深求尚未痊雖愧袴襦非叔度日期毫墨有馮沿俛遵廉察思從訓克謹操修敢好畋南市醉過攢幟隊西樓歡坐列瓊筵煩囂謹畏傷淳厚慧黠周防近巧諞重禄省心宜致冦薄材莊貌若臨淵扶危頗異巢居幕勸善還同矢在弦叨莅一麾康逺俗等閒光景又三年喻汝礪謁江瀆廟詩坤軸東南傾大江日夜注前驅下洛洙餘濤畧吳楚任勢不期勞得意縁所遇水也初無營神哉亮誰主芳蘭沈清華碧藻舒翠縷晨鵠戲野岸春鳧集深渚均是得所安而神豈私汝古來幾精魄捨此迷所處淫遊不知還沙村失烟樹而我後千載悠然在江滸抱嗇貴無競矜名忌多取㝠㝠罨岸風淫淫打船雨舞雪窺紅濤開蘋渡前浦再拜謝神貺聊復隨所住錦屏山暮景詩暝色輕烟罩郡城漁舟燈火倒觀星寒山逺水江村暮自在粧成水墨屏清曉坐四天王院詩杳杳天雨涼月墮星亦稀朝輝下簷隙逺色開村扉寂坐無物役隠几或在斯曠焉耳目清擬覺形神歸混世迹若近抱沖心獨微故殿經幾年何人所摹規當時亦姱哉作者良已罷快意取一好於身亮何私不知壯觀地徒使來者悲坐頃頃成昔安知今是非宋祁集海雲鴻慶院詩地勝祠仍古春餘物徧華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙谿雜環珮怪蔓走龍蛇供坐僧飛鉢香園客戲沙吾遊真草草深意寄青霞再遊海雲寺詩十里雲邊寺重驅千騎來天形欹野盡江勢讓山回園木濃成幄樓鐘近殷雷斜陽歸鞅足飛蓋冒輕埃江瀆亭詩一翬掀翅壓溪隅吏事初閒此宴居㫁岸有時通畧彴輕風盡日戰栟櫚雲鴻送日揮絃後客杖看山挂頰餘芰碧蒲青來更數江人多識使君旟夏日江瀆亭小飲詩飛檻枕溪光歡言客徧觴暫雲消樹影驟雨發荷香新臼橙韲熟庖刀膾縷長蘋風如有意盈社借浮涼錦亭晩矚詩長夏宜高明緩帶散煩窘憑軒一超然目與天共盡山從雲端現日就林外隠風來草樹披烟生井閭近自公況多暇沖臆無留藴即此可宴居何須事遊軫謁希夷陳先生祠堂詩仙館三峯下年華百嵗中夢成孤蝶往蜕在一蟬空蘂笈微言祕霄晨浩氣通丹遺䑛後鼎林遣御餘風市霧成荒白餐霞委暗紅岷峩有歸約飛步與誰同程密學知益州詩墀頭畫對别堯蓂細札芝泥襲綬馨三蜀舊臺呼輻寵十連新府夢刀靈雲梯霽日明鈎棧雨閣蒼苔蝕劒銘只恐廉襦歌未厭熒煌歸應六符星梅摯東湖瑞蓮歌詩東湖七月湖水平鱗波暗織簫籟聲中有植蓮一萬本紅漪相照摛繁英地靈氣粹不我測雙葩倐如同一莖黄姑織女渡銀漢蜺旗鳯葆羅空清又認英皇立湘渚翠華不返凝怨慕五十哀絃頻曉聲駢首低昂泣珠露是時主人集宴喜湖光浸筵霞脚膩朋簪峩峩盡才子椽筆交輝雲􅍨麗酒酣倚欄惜紅暉烟素徘徊縈不飛魏宫甄后晝方寢髣髴有人持玉衣此邑古來無異政室家瘡痏何由慶三年鼠竊例皆然以薪救火火彌盛自公柅車政克和載途鼓腹騰謳歌歌公用心同日皎不獨於今古應少因感珍芳兩兩開玉貫珠聯當縣沼況我與公高適道芝歌肯迹商山皓嘉謀嘉猷忠入陳願將此美歸華勲酬贈王益舜良殿丞詩才地淵宏筆力恢三年枌社幸遊陪八吟麗賦憑高得三咏雕觴選勝開玉苑早容收樸􅈪蘭池嘗許試虺海棠風裏甘棠政只恐星趨節召回風度幽閒識宇高暫分朝寄握牛刀賈生學贍思儀漢李白才多合命騷步武即看峩豸角對揚幾見擲麟毫琴齋頌罷吟魂逺時夢鈞天醉碧桃歐陽修蘇明允輓詩布衣馳譽入京都丹旐俄驚返舊廬諸老誰能先賈誼君王猶未識相如三年弟子行喪禮千里鄉人㑹葬車我獨空齋掛塵榻遺編時閲子雲書張俞謁白帝廟詩孤山扞江口上有白帝祠横視天下險萬流皆俯窺古殿銷神物悲風出隂帷天昏瓦棟折狐鼠亦生威優巫日鼓舞鬼怪生奔馳雷霆卷蛟窟雹火燒松枝入戸精魂動有如隂兵隨吁哉漢盜亂海内遂崩離赤龍始潛躍逐鹿過秦時公孫奮神劒定蜀國安危隴坻開北戸荆門啓東陲長驅百萬衆日鬭天下師羣豪插羽翼與漢爭雄雌兩帝不並立興亡良可悲天運雖有在聖賢豈無為昭皇覽英傑襲軌奄重基風雲共浩蕩千古餘寒碑威神竟不没萬里震南夷姚孶簡州東溪碧波亭詩賴簡池臺兩蜀誇東溪别是一仙家今人却憶康王谷坐看珠簾濺雨花潘洞聖母山祈雨詩錦里城東邑高原十六鄉江流分不到天雨降為常節及三春後晴逾兩月强龍乖尋穴蟄魚困入泥藏樹影全虧緑苗姿半吐黄耕夫皆慘戚市戸亦倉忙潛慮寃無雪深疑政有傷推恩慙睿主引咎謝虛皇罄折真人宇星奔聖女堂先時蠲玉饌隔夜浴蘭湯洞口焚香逺山椒作梵長幽誠期必達懸應果旋彰雷震南峯下雲飛北嶺旁聲稠喧竹塢勢迫瀉銀潢飄灑連三晝霶􅑛遍一方稻畦烟漠漠蓮沼水泱泱物態涵優渥民情遂樂康洪施周庶品餘潤浹他疆稔嵗還堪待隂功詎可忘明靈何以報奮藻紀遺芳宋肇三峽堂詩林巒十里上巉巖飛檻初憑縹緲間夔子風烟依白帝夜郎耕稼接烏蠻砌横亂石遥臨澗門對高峯近帶山咫尺驚湍吁莫測每來登此念江關初尋磴道踏雲烟漸引茅簷屋數椽江影動摇波面日山光隠見峽中天放懐罇酒憑欄客回首舷歌趂市船要與舟人同此樂移花種竹滿巖前白帝城詩江雨霏霏白帝城秋草未枯春草生古來戰壘如雲横萬里瞿塘㫁人行至今三峽路崢嶸時清不見更屯兵荒涼廢堞没春耕但見牛羊日西平田況題琴臺詩西漢文章世所知相如閎麗冠當時遊人不賞凌雲賦只説琴臺是故基葛琳和浣花亭詩井絡西南區成都號佳麗錦城十里外物景居然異傍縈浣花溪中開布金地杜宅巋遺址任祠載經祀自昔嵗一遊有亭久摧廢將期汎舟㑹先此留旌騎弗基矧肯構後人莫予嗣冠