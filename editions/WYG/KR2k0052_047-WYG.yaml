body:
  text: 欽定四庫全書四川通志卷四十七皇清藝文詩梁清寛奉使江瀆廟詩江干遠祀答神功聖主新恩九域同已幸長波平巨浪寜忘徧野集飛鴻流移望冷眉山月耕鑿思龡黍谷風疾苦殊方今尚劇亟旌㢘吏拯民恫汪琬巴州歌巴水遙連蜀道長哀猿落木兩茫茫劍門山勢都如鍔莫怪行人易㫁腸無滕王亭子與雲齊十尺朱欄萬仞梯那使君登眺處滿簷山色杜鵑啼送人司李成都鳯城垂柳為君攀西去髙軒指散闗望帝愁魂春樹外臥龍故壘夕陽間天懸鳥道連三峽地入蠶叢控百蠻到日不妨頻弔古訟庭草長簿書閒張徳地詠瑞麥詩六載殘疆叨重任勤勞惟有帝九重知恩承召天和秀七岐瑞靄自能鍾蜀産來牟不命榮三錫麥聖主何必誦周詩微臣莫遂涓埃報當雨露垂楊思聖遊錦屏山武侯祠詩廟貌依然在悲凉舊業空河流猶漢水山色似隆中今古慿欄盡乾坤極目同斜陽霜氣肅涕淚落西風題閬城陳氏兄弟書巖詩讀書兄弟好巖洞已千秋池涸荷香謝堂空桂樹留鳴泉風自答谷鳥韻相酬破壁遺文在摩崖記勝逰王士禎望青城山雲氣連西域名山作漢標千秋軒帝蹟每夜岳靈朝玉宇凌丹壑神鸞下碧霄丈人一招手天路未應遙眉州謁三蘇公祠祠即故宅今為眉山書院如蟇頤山色腴不枯玻瓈江水醍醐眉州城郭刧灰後水塍漠漠成榛蕪郵亭下馬詢老卒蘇公故第域西隅旋來束帶薦蘋藻辰良何必煩神巫往者此地鐡脚亂作維公大節據高門大宅皆焚如此祠巋然誰所驚頑愚雙柏輪囷溜霜雨廷立冠劍古文夫長公遺像龍眠筆馬劵剝落涪翁書一水谷殘碑揷笏尚林立紫藤碧蘚纒龜趺祠西最蕭瑟經霜菡萏猶扶疎甘蕉一丈覆簷霤落花亂迸紅珊瑚當年結構不草草要令咫尺成江湖故園如此不歸老與人家國徒區區瓊儋雷藤歴九死口甘熏鼠随猿狙頭綱八餅有何意桄榔萬里非吾廬兩公神靈未磨滅應翳白鳯逰清都遊戲下界亦聊爾鯤鵬豈必搶枋榆眉州玻􅝃天馬駒酹公三酹公歸乎登高望山絶頂望峩眉三江作歌四海復四海九州還九州河伯帝蓬萊海若更相笑蟪蛄何足知春秋今年辭失喜太華宫乗風偶作西南逰中條姑射不足數揚高旒河潼遠坼巨靈跖鈎梯百丈臨龍湫終南太白幻雲物秦棧佶屈哀猿愁錦城小住五十日岷山秀色垂簾釣青城玉壘尻首接灌口屈注雙江流興極欲蹋大峨脊却騎瘦馬來龍逰嘉州罨畫枕江上孤峰縹緲東南浮神霄玉清有遺跡登臨可以消煩憂蹋泥盤盤到絶頂江山披豁開雙眸峰巒八面簇金碧下瞰江海如浮漚八十四盤在衣帶氣凌五岳驕公侯暮雲早雪互明滅兠羅綿現無時休岷江從東來奔騰廻萬牛沫水滙青衣簸蕩千斛舟三江九峰倐然合丹崖翠嶂窮雕鏤江山竒麗冠天下何意絶景來蠻陬天風蓬勃日西墜搔首欲去仍淹留荆呉萬里自兹始來朝起柁尋巴丘岑公洞岑公昔學道遺跡空山中洞門界飛流白日生雷風石髓無古今鍾乳盡玲瓏巖泉日穿穴點滴成窪窿中央若累棊狡獪造化功頺竈倚青壁中夜丹砂紅睠彼遺世翁於此悟參同壁間題字人嵗月何匆匆巨碑亦笏立文詞競豪雄中間岑襄州頗擅語句工豈其南陽裔源流故難窮此洞與魯池望望江流通昔是仙靈宅今為豺虎叢太息下山麓風健孤帆東晩登夔府東城樓望八陣圖永安宫殿莽榛蕪炎漢存亡六尺孤城上風雲猶䕶蜀江間波浪失吞呉魚龍夜偃三巴路蛇鳥秋懸八陣圖搔首桓公慿弔處猿聲落日滿夔巫瀼西謁少陵先生祠五首選二首口萬古瀼西宅斜連峽闗髙雲魚武縣秋水麝香山老作諸侯客心依供奉班樊川臨素滻遺恨不生還浩刧遺祠在依然白帝城岸連巫峽影門對蜀江聲太息隆中業平生庾信情艱難詩萬首夔府至今名謁白帝城昭烈武侯廟赤甲山頭雲氣蒼楓林蕭瑟落微霜漁人故壘生秋草鳥道寒空掛夕陽當日君臣真灑落至今祠廟有輝光江流薄暮聞笳鼓廻首中原泣數行張光祖題學宫愛兹石一端詩愛兹石一端質直復潔皖矩度無偏頗規模得易簡試問所由來父老言笑莞此物非有竒石室舊方限噫嘻兹石方曽經文翁僝刧火幾孑遺若木獨完産沖穆尚赫喧疏越猶瑟僴上下千年餘太守能識揀我聞高自標自不入俗眼我聞牧自卑自不逢時􅏌吁嗟都人士為愛兹石撰君不見芙蕖石室肇文翁蜀士彬彬鄒魯風一綫常存吾道力千秋永祝表章功當年典籍興治化此日追揚厲學宫仰止高山無限意蕭條豎立法堂中南廷鉉瑞麥行皇帝八載月在午文山有麥七岐吐錦浪翩翩五日風珍芒濯濯十朝雨田家乍見詫非常州郡轉上中丞天子前府中丞歸獻天子曰都休惟汝三錫命兮素繭抽廷僚動色徵徵羽不腆時叨宗伯郎按歌幾見行雲舞福曜遙曕神早命西南馳掃門無自徒延佇一朝銜徳與𢎞功筆端無力來邀禄幸䕃中丞宇中丞厚難為譜大者經營榛莽間夙興夜寐懷靡盬勞来心力竭無遺哀鴻次第就安堵粤稽伊始造蠶叢特簡踵氣鍾石紐生神禹中丞蜀稱陸海李氷貽士林山司空弼時仔肩文變虎斗文翁祖艱難之際武侯賢琴鶴飛鳴清獻圃粒我蒸民稷配天我公玉振羣公覩五丁神力何足天顔薄多七岐瑞靄誠軼古喜溢時曾誦滿庭芳於今復海聞百靈將順先牟糈往見文山武和氣致祥理固然况是民天符斗數衆維魚矣旐維旟大人占之豐且聚碌碌忝竊茂之陲欣承下風能無語吁嗟乎漁陽樂不支青田頌可取碧雞金馬往往奏神竒何如家給七岐之麥黍朱嘉徵遊浣花溪訪拾遺草堂詩郊南十里浣花溪溪繞空原東復西題壁總隨蝌蚪漫穿林不住鳥聲啼詩情欲傲千峰出野興頻牽萬木低余亦愁心江上客故園芳草日萋萋翁佶小河道中詩誰鑿鴻濛一綫開盤空鳥道傍巖隈遙通隔岸縁繩度忽㫁懸崖接棧來樹杪穿雲疑作雪石横障水激成雷祇因鎖鑰西陲重不惜流沙遠堠臺黄鈁瑞麥詩堯廷推后稷粒民功配天矧從榛棘後隻手闢疆田誠惠撫孑遺歸鴻樂受廛解刀爭佩犢遠邨烟火連積和相感召祥應屢豐年嘉植貽來牟文山七穗妍拜疏告我后增徳達穹天臣矢潔蠲堂㢘交䇿勵喜起想當然聖主豈言瑞勉特典錫纁組用章節鉞賢兼旌吏與農二張名奕奕今事恩賫一何專西顧使君重漁陽麥秀傳更超前玉壘雲為捲錦江春倍宣猶懷臣職歉率屬猛加鞭覃慮蠻荒外綢繆周萬全務期膏雨徧王㑹極無邊孫如芝流盃池山亭詩趨侍大中丞憲駕觀原州牧黄魯直所鑿石上南極二字登節鎮名藩控上遊元戎小隊領諸侯省方不倦臨興出牧何妨碣石留樓對黄公雲羃羃江連白帝水悠悠松州雪嶺烽烟靜天外寒光倚劎收戎州勝蹟枕山根禹鑿寒江舊闢門空裏已開池九曲望中猶聳石雙蹲前賢詞賦封苔蘚上國旌旗報夕昏西極逶迤南極遍更於何處問真源鄭日奎七盤闗詩迢迢七盤山地勢介梁雍三秦及兩川形勝資以控重闗樹雲外竒險信天縱我行歴荒阻及此彌惚恫倭遲幽壑底風烟莽澒洞循磴蜿以蜒勢若蛇出甕車馬疲登頓往往失銜鞚仰視山雲高俯聞江浩洶謝公良矯情嗒然輟吟諷聖明今御宇此道通職貢梯航走西南行役日以衆懷遠惟以徳天險安所用何事勞山靈﨑嶇日迎送吾欲鏟叠嶂大地一鴻絧臨風重惘然視天猶夢夢閬中舊説閬中地五城十二樓仙家得幽寄詞客縱冥搜一自兵氛劇曾無勝蹟留結芳誰對壁雲石迥含愁馬跑泉桓侯轉戰處猶賸馬跑泉㫁碣苔相蝕遺踪人共傳閬河綿蜀道風雨足巴天緬想英雄氣臨流一浩然天柱山天柱山中路風烟何慘悽亂泉爭道出怪鳥作人啼林密雲難度峯高日易低却憐迷誤處不是武陵谿蜀闈中一首蠶叢古帝國孤懸天西隅自昔盛文物中原並馳驅作人逢聖代於今廿年餘禮樂洗甲兵應見菁莪敷嗟余亦何人來佐衡文樞奉命懷靡及茫然戒征途載驅燕趙地載歴秦晉墟棧閣連髙雲跋涉忘﨑嶇風烟六千里到来如須臾長安日以遠回首中踟蹰國君慎進賢敢不竭臣愚又七言律一首芙蓉秋色滿江城桂子香流鎖院清廿載荆榛開蜀道兩朝棫樸憶周京風雲有路羣龍鬭鼓角無聲萬馬横願得英雄都入彀勞臣藉以答昇平登錦城南樓危樓髙峙錦江邊遠客登臨旅思牽載酒難尋揚子宅題詩空憶薛濤箋霸圖跡已湮金馬古帝魂猶泣杜鵑更莫臨風懷往事一城烟雨正淒然嘉定舟中望凌雲山東坡載酒時逰處鄭子維舟靳一登山帶兩江仍浩渺雲蔵古刹自崚嶒還家有夢牽孤客訪古無心愧老僧惆悵芳踪迷咫尺疾風吹雨下巴陵登敘州溪山一覽樓鐵㦸烟銷戍壘殘危樓喜見峙江干地經轉戰雲常黒天入悲歌雨易寒不盡雙溪流往恨尚餘一塔聳遙觀鬰姑仙去涪翁逝今古茫茫獨倚闌登重慶府澄清樓扁舟来過古巴國獨上危樓一縱探城郭大都依壁岸人家一半住烟嵐招賢館廢荆榛長來鳯山荒鳥雀叅惟有滔滔渝閬水流將旅恨下東南李先復弔斷臂烈婦行并序烈婦鄧氏長溝民何獻圖之妻齡廿一事孀母趙氏至孝㑹呉逆作叛夫負餉隨征母已出婦鍵户治内事守備張某騰騎突入翩翩糾糾竊意於深谷無人之地挽一女子如探嚢易耳始而以言挑之則罵繼而以金誘之又罵再則以力脇之仍大駡張乃直創其頭顱連揮數刀痕寸餘婦欲撞圍而出張牽其肘婦力拒之遂㫁左臂張懼甚乃自刺復自刺所乘馬赴縣庭中夜死婦匍匐往食田水鄰人詢其故猶云馬兵殺我不踰時卒鄰人鳴之官遣捕跡其狀見滿室皆血一手在門後刀挿户側婦遍體皆傷下衣無全縷遠近觀者如堵詳聞偽將軍俟事定方蓋棺露尸四月顔色如生噫威武不能屈謂之大丈夫只大丈夫耳而婦人云乎哉爰紀其異以存傳紀云風長溝之山山矗矗長溝之水水緑緑蒼巖松老謖謖村婦扁籬形影獨織無機絲舂無粟荆釵蓬鬢蹙顔玉良人長征不可憐長征輸輓秦師前阿婆牧犢柴桑外倚問終朝望不還紅日未暝青山紫馬蹄轟處黄塵起寳劎金鞍羽林郎下馬督見雙頤喜低首求歡甘言餌婦氣沖沖髮豎指躑躅徬徨奔無門心口相商惟有死兇奴忿極刃交加血和珠淚飛紅雨中庭電掣雷霆吼神龍只抱驪珠走烈婦守身不顧身敝屣形骸傷其手手既㫁肝如鐵血千行腸百結勢如漢魏交鋒金鏃折賈復拖腸不敗北又如真卿義激李希烈割舌期期猶罵賊哭已無聲魂黙訴上帝聞之心震怒隂遣六甲與六丁藉手殱奴奴惡露渠自戳匪無故忠孝節烈鬼神䕶不則泰山等鴻毛石完玉碎芳名悞君不見漢殿明妃馬上嬌銅雀空勞鎖二喬美人一旦埋烟草姓氏誰將烈女標又不見金屋阿嬌傾國色一笑千金難買得宫中脂粉賤如泥不換村姑一點血吁嗟乎别夫不於室拜姑不於堂慷慨赴義曷忙忙千載而下仰清風於髙山之崔巍兮與流水之汪洋賦李鍾峩經史賦文獻徵於册府禮樂備於明廷稽帝王以立則考賢聖以垂型爰編年以成史迺吐辭而為經别理欲於黑白判賢奸於渭涇名有十三萬古之淵源有赫朝分廿一千秋之典故留青是皆比流峙於河嶽並輝光於日星者也一畫藴造化之竒三才備隂陽之變書佶屈而渾穆易簡潔而奥衍禮森嚴而條暢詩和平而婉孌春秋見筆削之精爾雅肇訓詁之善六樂正於聲微兩論著於逰倦述仁義乎七篇明褒譏於三傳足緯地而經天等擊雷而鞭電蓋嘗觀爻象之紛賾察名理之縱横歸蔵自坤而起象連山首艮而殊名周文之所推演姬旦之所經營惟羲皇之本㫖由素王以發明編三絶而不厭撰十翼以相成歴坑焚而莫損借卜筮以流行繼西河之卜氏有淄水之田生採本原於東魯垂端緒於西京焦贛之占騐費直之研精鼎三足以杰峙河九派以洄瀠若夫畧三墳之瓌竒首二典之贍核列謨訓之堂皇載誓命之鬱窟著二帝之鴻猷昭三王之偉伐古今之文各異真贋之旨相越伏勝之所傳授劉向之所窮矻歐陽於焉闡揚鄭沖於焉洗發迺若省方既遍觀風是先賦比興維其託矣風雅頌由是成焉二南歌王化之美盛七月述祖徳之綿延公卿所諷詠里巷所流連妥侑乎神保燕樂乎賔筵細則陳於閨閫大則格乎帝天初披陳於太史終刪定於文宣厥後齊之轅固魯之韋賢韓嬰之傳浮丘之編毛鄭曾疏其義歐蘇欲鈎其元皆名賢之緒論固時俗所爭傳慨風詩之既微屬道統之將墜即魯史之成文存周官之遺意紀正月以定厯書天王以正位嚴㑹盟以明禮謹侵伐以申義扶萬古之倫紀加一字之褒刺欲明道以匡時任罪我而弗避理靜深而如淵義博厚而象地丘明詳其本末公榖宣其義類齊有子都梁有賈誼繁露玉杯之篇膏肓墨守之義凡以晰五始之本末明三傳之同異爾其用之邦國達於郊畿祭享見於朝廟吉凶備乎宫闈周官繁其節目儀禮辨其等威經曲華而有則官骸順而莫違咸恩明而分肅胥别嫌而明微㑹古今文而一致合大小戴而同歸更作篇章唐魏徵有所論定重加次序宋臨川有其發揮乃若舞蹈之節奏同律之範圍制氏世其官而不能言其義藴劉向著其録而未嘗指其是非是故學必講而後明徳以修而彌邵濂洛為狂瀾之砥闗閩闢層霄之照契歴聖之心傳洞六經之微妙集解擇中正之歸立説握精一之要秉經徳而不回實踐形而惟肖瑞為麟鳯之靈彩煥圭璋之耀是宜親炙者嘆巨浸之汪洋私淑者驚喬嶽之聳峭矣蓋載道莫詳於經而紀事莫備於史三綱之所由持五常之所必紀稽星辰之順逆誌郡國之終始載治忽於微茫别邪正於疑似存制度之精粗書風俗之惡美要使既往者常呈形於明鏡將來者若鑑容於秋水雖有是而有非夫誰譽而誰毁是以貴事詳而辭約欲法密而氣疎識足服乎今古才足任其卷舒丘明之紀繁冗子長之叙古初廬陵五代之史紫陽綱目之書倘良史而有作舍斯人其誰歟嗣龍門而秉筆迨扶風而未改紀澤中之靈竒寫馬上之丰采歌大風而慨然握長劍而礪乃美文景之升恒傷哀平之危殆十志以為搜羅八表於焉記載燦彝鼎之古樸煥鸞凰之儀彩粤若東都建國西蜀啓疆或奄有乎九域或偏安乎一方惟炎精之未歇乃漢徳之重光范曄之書彷彿乎醇而後肆陳夀之志庶幾乎闇然以章何人物之臧否未允而統緒之正閏未詳若夫兩晉之駢麗六朝之纂組或受裁於御撰或摭拾乎塵腐或馳騁而無律或脱誤而難補或貪穢而多私或浮誇而無取競靡麗以趨時尚繁縟而非古貽尚論以口實失前修之高矩有若合南與北而為史歴父與子而潛心刪穰辭以見直稱嘉史以賞音悵書志之未師乎昔憾典制之或闕乎今洎隋書之自出實魏徵之所任資顔孔以商確偕于李以酌斟庶綱紀之畧備病誕妄以相尋竊嘗彚唐宋以遐稽訖金元而詳覈或文省而不備或辭繁而無益或彼此之相迕或去取之未適或遠害而引嫌或反主而為客美固稱於藝林瑕亦昭於簡册是惟兼三長以探討廣五志以攟摭表志同天人之微紀傳悉朝野之跡乃可名為信史而奉若金册也幸置身於藝苑謬厠列於詞臣每出入乎閶闔時侍直於楓宸將學古以致用恒憂道而忘貧值典章之明備睹名物之燦陳稽史籍之浩瀚究經義之深醇思登高之有自懼濟川之無津可無師考亭之純粹而漫信衆説之紛紛也乎李以寜峨眉山賦綏山先生薄逰於楚漢南有客惠然與處被服閒都從容燕語窮造物之通復論阸塞之修阻事無微而弗研理無端而不舉客前席而請曰君子生於巴蜀習聞蠶叢㟴㟴三峩南戒之宗茹芝采藥考槃在中幸攄厥畧佑啓愚蒙先生曰伊大塊之積氣始突兀於崑崙恣延宛兮萬里並星宿而東奔行山盤紆於中原岷峨作鎮於西坤互華裔兮若限阻重嶮兮如門星紀則井絡曜其上水源則天津灌其根應鶉首而分野視蟇頤為曽孫近則倚陵雲與烏尤遠則馮火燄與葱嶺卭崍瓦屋襟其前青城玉壘為其枕霧中控羅回以内籓雪山自天竺而外屏莫不拱揖而縈紆鈎連而嶾嶙其為狀也則嶜岑嶱嵑峻極於天危磴㩻䧢增岡連綿百步九折八十四盤以脅仰息踵可摩肩三山並立則若蓬瀛之遙接兩山相對則如眉嫵之便娟斯秀甲九州高邁五嶽為靈虛太妙之所由儔也與若嶚剌干霄磅礴攝犍豐隆殷殷其在腹珠斗爍爍而離躔驚羲馭之迴標指望舒之倒懸浮雲僅被其足翔羽不至其巔雪初融兮六月氷不冶兮萬年超欲界而杏邈豈塵􅅽之風烟其峰則有翠竹白雲玉女蓮花鉢盂香爐之拂漢天池石筍之凌霞其石則有盤陀天柱瑞星金剛鳯喙牛心天門象王升仙受道之臺歌鳯七寳之裝悉厜㕒而岌岌皆碪􅑇以硠硠其洞則有白龍朱砂三仙九老人訝桃源誰探瑤島雷風穴而砰鐘鼓聞而窈窅然未若龍門之竒也嶻嶪兩崖嵯峨千尺絶壁赮駮澄潭紺碧挐舟而入仰天一隙高峽卓立而蒼茫雙瀑分飛而漰湱嘘噏散沫以垂虹濆瀹觸石而成霹若百靈兮飄颺雖萬夫為之辟易當亭午而涼飈倐吹際渥暑而寒氣恒積雁宕之懸流吞聲匡廬之谷簾避席縹緲兮霧穀為衣惝恍兮羽翰生腋此澹蕩胷懷澡溉塵跡客能從我而共適乎客曰唯唯先生曰未也其卉木則有檜柏杉松楩柟榿槲合抱之材連理之木蒟蒻楓香離支龍目銀杏朱櫻金柑盧橘人面之簳桃絲之竹森森莖青萋萋葉緑結根抽條縁阪蔽谷族茂鄧林叢淇澳乃春夏之交桫羅始葩吐英馥郁敷蘂紛華艷張幄錦紅披幛紗似若木之乍見與優鉢而並嘉羌錦帶垂兮纎蔓石楠放兮烘赮五色燦兮木蓮重苞灼兮山茶以及槐萌巢菜樹挺石瓜仙縚金釧黄獨河車感物類之有殊知葐蒀之最奢其鳥則有翔鶤奮集𤣥鶴􅨧蛦鵁青屬玉鷫鷞鳧驚異采棲桐而鳯舞駁羽䕶花而人啼佛見鳴兮挂明鏡王母下兮翻雲旗迴谿深兮號獨鵠隂崖暮兮述羈雌其獸則有騶虞騕褭辟邪天禄文豹隠霧白猿如玉金線之狨雪毫之鹿犪重千斤夔惟一足鼯鼠能吞火烟麝香眠於石竹貘食鐵而如飴貔拉虎兮似犢猰㺄聞風以犇馳熊羆望影而觳觫匪丘壑之通靈詎鷙猛之咸伏其流則有羅目瑜珈月池聖水黒白分於符文濛涐通於越巂虎橋有八音之蛙龍池出四尾之鯉蟠螭向大壑以深潛嘉魚推丙穴之甘㫖龍馬出没於深淵靈蠵蕩漾於淺沚芳洲時矚其泳㳺華鱗競耀其青紫或揚鬐兮溪畔或曝腮兮巖底恣吸浪以排空任随波而起止至於來尋方丈惟事瞿曇嶔岑傑搆精舍名藍光相之寺呼應之菴材闢洪椿閣啓楞嚴風霜甚厲瓴甓何堪削木皮以蔽屋鑄鐵瓦以為莾花宫馮高而翼翼梵殿臨險而巉巉振蒲牢於香臺動陽馬於風檐藻繡互糅丹碧相参綺疏晃朗於遠岫金鋪罨靄於晴嵐洵祇園之布地疇彌勒而同龕乃若畸人命駕俗士絶響宿舂三月蠟屐幾緉為訪真詮更怡幽賞神僧則有詎羅長生則惟寶掌葛由騎羊以来逰瞿武繫龍而獨往雷威空傳其琴茂直尚存其杖孫思邈之藥臼曾留白海瓊之雲母誰餉偶弔遺跡而徘徊曠覽大野之泱漭更有幻化無端佹異非常湧兜羅緜觀攝身光銀色皛皛雲海茫茫或如輪而示清睍或横天而設金梁瓔珞空中兮乗巨象鬰儀夜半兮出扶桑三峯隔絶域而照耀千壑起聖燈而迴翔縱有懸河之口不可思議雖竭叩囊之智烏能測量也若夫大道攸傳微言斯寄石室之蔵金匱之祕茍非其人得之豈易天皇授軒轅以丹經隂仙弆銀函之緑字鬼谷子以珞琭名書嚴君平藉指歸示異杜光庭之所編張君房之所識薛季昌注道徳以成文宋吕勤覈圖經而作志悟盈虚於自然闡闔闢之妙義其載籍易簡而淵源其詞章博雅而𢎞備何殊探竒於羽陵不必訪古於玉笥此皆要眇精微之所萃客能䇿杖而求所未至者乎客曰聞子之説博大雄竒如蠡之不可測管有所難窺顧何以不嶽凟之共列明禋而受釐竊不能以無疑先生曰嘻巢由隨光盛世高蹈維兹峩山處在僻隩升中之禮不臨巡幸之轍弗到然而瓌瑋無以復加烟霞足以自傲是蓋有隠君子之徳焉固可與知者言未能為一二俗人道贊張徳地瑞麥贊維皇布愷嘉祥洊至攢槊生芒含穎吐穗上應斗樞下齊政治降康自天來牟式瑞祈實於民薦鮪飭毖意萬斯年大有垂誌頌萬文麟瑞麥頌蜀國凋殘已廿年邨邨甌脱抛良田歴經災疫兵荒苦千黒埏埏幾絶烟十兩黄金一斛穀茹芹飲莢相頻顣東逃西竄離鄉井天道好還無不復聖主垂矜咨股肱我公何事不能了志在澄清攬轡登平綸音特簡大中丞寇救飢如禹稷沈潛剛克干戈熄益州刺史布仁慈民得煖衣與飽食瓦礫成堆半草莱仁聲仁聞廣招徠差官捐俸重恩濟秦楚流移向蜀回督課農桑嚴息訟懽聲處處聴輿誦慈祥愷悌以安懷天子重名卜金甌能致祥七岐瑞麥産梁疆嘉禾多穗無和氣烝烝龍顔歡如此珍重瑤函上舞奏章漢代漁陽僅兩岐動喜孜孜滿朝歌歸天子克讓允恭以再辭赫赫在旂裳歴年施澤已云乆瑞帝賫中丞極庶蕃勲名鳯祥麟出此方盛事從今迭記史留芳千載垂庚壘普天處處祝昇平西蜀家家歌樂只碑記張徳地重修青羊萬壽宫碑記尚稽治理至黄虞以前邈已然撮以一言曰清淨無為而天下自化三代以下漢治為近古孝文之世頌稱刑措史載文帝好黄老跡其一代之治罔非權輿於此東京之盛光武亦曰吾治天下以柔道勝之孰非師孝文之治而為之歟世之言老氏者率神其説於玉局靈符飛昇長生之術不知其有資於治理若斯之宏也我朝誕膺寳籙統一區寓以簡以寛民登治維蜀自罹兵燹淪灌莽者幾廿年不榖猥承簡命招徠安集尤務與民休息之時也昔曹參治齊聞蓋公善治黄老言避正堂以舍公公為言治道貴清靜而民自定參用之而齊大治其後以其治齊者治天下民歌之曰載其清靜民以寜一然則今之治蜀如蓋公之言推類而行之豈謂無裨歟成都治西南十里許有青羊宫相傳老子過函谷謂令尹喜曰千日外遇我於蜀之青羊肆即其地也粤昔珠庭琳館干霄迴日之盛邦人艷稱焉今遺碣已盡不識建置何昉矣記曰有其舉之莫可廢也況勝蹟垂於百禩麗觀甲於諸郡者乎顧瞻天府皇仁漸仰浹阜思所以揚扢臻康天庥釐祝兹實振古焉爰燔椔翳摉遺址有殿曰青羊三邦祐清五鳯萬壽有臺曰紫金八卦降生説法有堂曰真武純陽三官以暨左右廡山門垣墉之屬故老猶得追識焉不穀遂捐金計徒慮材以令於羣工舉循其舊以次而新之始康熙丁未之秋成於辛亥之春時川湖制府蔡公憲節西来同光斯舉其柱下猶龍以此段因縁作再来真氣不榖亦得拂闗尹驅塵耶是役也有豫撫前藩使郎君廷相前臬使李君翀霄今藩使金君儶臬使宋君可發督學張君含輝暨成都郡守冀應熊同知萬文麟通判馬御世載襄厥事既訖功以命道士陶来御居之使奉獻事維岷之陽錦水湯湯谷神所宅滮流無疆不穀幸托雄區式宣道化庶幾舉廢之一端耳敢希清靜寜一之理歟重修昭烈陵碑記凡聖主肇興必於古帝王陵寢遣官致祀所以重一代之君也雖徳業之隆替多有不一運祚之修短毎有不齊然而君臣㑹合創業垂統其求為可繼之懷未嘗不思貽謀燕翼為一日萬年之計而究竟不能必其齊一者則亦數之有幸有不幸耳余於漢昭烈不能不深致慨焉方其以布衣崛起遂欲力振炎漢一時英雄蜂聚雖九州之地人有其七我無其一乃由遐陬而啓雄圖竟峙三分之鼎以承大漢之祀茍非精義入神知人則哲曷克臻於此乎其君臣大烈載在史乗無庸復贅但遡厥始事義締桃園而闗張實倚股肱三顧隆中而臥龍迺資輔弼集一代之人豪盡歸羅網因而底定西南震疊諸夏匪後代之主所易幾也况君臣身後威靈經千秋萬嵗愚夫愚婦靡不浹洽真若懸日月於中天又豈區區人力可易致耶余奉命撫蜀偶過萬里橋行西南不數武有昭烈陵武侯祠在焉遂芟荆誅棘􅉨瞻拜之徘徊良乆雖鹿走草萋而陵寢無恙且祠側碑記猶存余拂拭讀之則裴中立撰文而栁子寛書丹也後人遂以雙絶紀之噫嘻西蜀自罹獻逆焚戮萬物悉化焦土即王公墳墓莫不掘毁無遺獨昭烈一冡歴乆常存巍然如故且與名公碑記並垂不朽使非其英靈不泯沒世難忘又安能保千餘年後晏然無恙若此是又不可以數之有幸有不幸而論也矧今日者西蜀之土地人民所頼以呵䕶周全誰無木本水源之思耶余因捐資命成都守重修厥坊以表其陵載立之碣以紀其蹟仍飭守僧勿使樵子牧夫敢聖天子有或邇將以仰體意焉爰書數言以弔之崇重歴代君王至夜郎採楠碑記天生楨幹之材以備隆棟之用而國家時簡勝任者取之然得之匪易竒偉之産􅉨􅉨生於環山疊嶂絶跡罕到之鄉如幽人碩士之蔵用待時隠處槃澗也採取者恒世祖章戞戞乎難之我創業垂統迨皇帝統一海内皇上纘承丕基作述廿有餘年聞風向化識水来王者即殊方絶域咸稽首闕下而堂搆尚仍卑陋非所以崇之宸居壯觀瞻也任部檄屢下而諸郡率以不材木應余思楚材晉用豈屬在版圖而可使清廟明堂之物委諸草莽乎爰具疏自任即蜀道難亦所弗恤陟巉巖履嶮巇研踵於豐草長林間舍輿而馬舍馬而步甫兩閲月得大木百有餘株以之充梁棟而資巨任豈復有遺材耶使當事之遴才者果如余之周爰諮諏實心採訪或亦不至有淪落之歎也疲薾之暇特援筆而誌之一片石李翀霄樹集棘院舊碣碑記稽古名人墨妙皆蔵之深山祠宇以及王公第宅如淳化諸帖多集梁園之妙選高河間之休風故能廣搜博覽訂訛較真勒之貞珉蔵於石室與名山大川同為不朽有足徵也西蜀成都廢藩邸舊多前代碣石集諸家名筆蓋纍纍矣今既改建棘闈余每一逰覽見殘碣鱗次傾臥荒苔拂拭讀之皆前賢手澤因而歎息不能置憶昔有慕蘭亭鍾楷者或發塚以求之迺種種舊跡鐵畫銀鈎龍跳虎臥忍令其滅沒於蔓草荆榛為牧豎樵子所狎侮乎爰是捐資囑兩邑令募工鳩匠固植而林立之覆以瓴簷列於至公堂之左以資文苑勝觀俾古人毫瀋之靈不與綵雲俱化後之流覽者或有取於此舉焉遂勒石以紀嵗時冀應熊少保武襄李公崇祀碑記今上御極之五年歲次丙午九月九日總督四川少保大司馬中丞李公國英以勤勞王事殁於宦邸維時全蜀之沐浴其徳者遠近番漢罔不搶地呼天如喪考妣乃川西紳衿父老思其徳而不能忘咸欲崇祀名宦以昭三代之直遂合詞以控於邑令兩令復摭公善狀詳請於熊念熊守土之官也凡官兹土者上自督撫下逮令尹如功績果應崇祀與輿論允叶者有司例應轉請督學確察實行准入名宦以崇祀典稽古先王之制法施於民則祀之以勞定國則祀之以死勤事則祀之能禦大災則祀之能捍大患則祀之有一於此例應從祀况蜀自獻逆屠戮城舍坵墟民鮮遺孑少保李公入蜀以來由鎮而撫由撫而督恢復殘疆修葺郡邑闢草萊墾荒土發給牛種教民稼穡豪右悍卒魚肉殘黎置之重典釐剔激揚均平賦役痛革加派解民倒懸所謂法施於民也至躬擐甲胄繕器秣馬踰越險阻北擒偽王於閬中南靖郝逆於嘉雅東收偽侯於夔門西服羌番於威茂所謂以勞定國也且也大兵之後凶年饑饉瘟疫頻仍少保公捐資普濟施藥餌并米粥所全活者億萬人先是威茂地震壓死軍民公特疏請蠲地方頼以寜輯所謂能禦大災也迨諸冦既平復慮十三家為三省禁旅要害爰疏兵決䇿運籌躬冐矢石不㑹朝而渠魁集各省將廟堂蕩平三省獲有寜宇紓患也年來身親血戰心力西顧之憂所謂能捍大俱枯晝夜行間積勞成恙兼以垂白慈親告殞京邸陳情守制又縁特命朝廷倚重忠孝難兼以哀愈病以病愈哀因而百藥奪情遂至難瘳且彌留之際遺疏五難盡瘁鞠躬死而後已所謂以死勤事也自古聖賢立身無逾忠孝少保孔公五者俱修而又克盡大倫斯不愧廟一席其於祀典也何有況奉俞㫖乆任巖疆積瘁病殞深為憫惻應得卹典著察例具奏在君上方有不可泯之大典在地方自有不容己之報稱因而轉請於督學使張公遂報可雖徃例凡名宦鄉賢從祀督學使竟主之若少保公功在社稷難比尋常仍請於大中丞張公公深嘉少保公之懋烈復行藩臬兩公知照全蜀郡邑諸庠俱造主入祠崇祀奈成都郡庠自遭兵燹乆為灰燼前於癸卯賴諸臺捐葺學宫兹已告竣獨名宦鄉賢二祠未遑議及今奉有少保李公入祠而妥侑無地如春秋大典何於是方伯郎公廷相觀察使李公翀霄大叅郭公亮副憲郭之培蕭炎成都郡守冀應熊郡丞高夢説司李姚締虞成華兩縣令張行張暄各捐俸金創建二祠如舊制前立名宦鄉賢祠三楹仍録殘碣所載歴代名賢姓氏而重鑴之各寘神主祀享春秋復於祠後建碑亭三楹特立一石朝以紀少保公之偉績於不朽一以體輿情一以垂廷酬功之至意一以順斯民直道之前賢不朽之令名一以樹後人勸忠之懿範蓋一舉而四善備焉其裨於名教非小補矣迺命熊繕言以誌之熊職司守吏曷敢以不敏謝遂既誌而頌之曰於爍我公參井降靈厥猷翼翼維國之禎乾坤浩氣篤生穎異不競不絿文兼武備天眷蜀邦畀我良翰日靖四方式遏寇亂經營念載奠此巖疆明發不寐母弗遑將泣血陳情嬛嬛在疚莫克我親莫棐我后致身報帝鑒國尚爾綢繆五難遺疏嘉猷帝曰欽哉晉公寵錫民曰莫忘酬公血食新祠奕奕籩豆秩秩以妥我公萬邦是式匪公斯逝有石則留匪徳斯泯寢成孔悠金儁重建諸葛忠武侯祠碑記古之祀典有五一曰法施民二曰死勤事三曰勞定國四曰禦大災五曰捍大患有一於此從而祀之以云報也昔者諸葛武侯之治蜀也撫百姓示儀軌賞不遺遠罰不阿近恩威並濟上下有節故刑政雖峻而人無怨法施民也受命託孤之際泣效忠貞繼之以死及其出師上表又以鞠躬盡瘁死而後已為言竟以食少事煩病卒軍中死勤事也五月渡瀘深入不毛用攻心之説七縱七擒終侯之世夷不復反勞定國也蜀人曰祀典有五侯得其三焉予謂侯之事先後主忠矣其於人民亦以威行其愛耳世有忠主愛民之人而不為此一方禦大災捍大患者哉蓋侯之身雖告終於五丈原而其心未嘗一日不在炎劉社稷間也是宜廟饗千世而勿替者與舊制侯祠近昭烈墓今仍之益奉昭烈於正殿侯居後子若孫從之殿兩廊位闗張北地王次文武諸臣之有功者其正大規模遺像儼然率皆凜凜有生氣焉嗚呼當其屯田渭濱居民安堵庶幾三代之兵望若時雨向使天假以年則國賊可靖漢業可復惜也中營星殞大志未伸後世黜魏削呉以蜀漢繼炎統固史家之正論其亦慰侯之苦心也夫皇清康熙十一年秋廟成嵗時致祀嘉侯之忠誠感被閲世乆而愈深也頌曰先生抱道高臥南陽長吟梁父與世相忘亦有英雄聞聲思慕志興漢室慇懃三顧魚之得水骨肉君臣感斯情好可以忘身侯之忠貞死而後已嗟侯此心萬世不死重建杜工部祠堂碑記蓋聞不朽之業有三立徳尚矣其次立功其次立言夫所謂言者何易之於天道也書之於政事也禮之於軌物也詩之於性情也春秋之於褒刺也其言咸造其極有功世教逮至後世著作日繁標竒騁異然而㫖趣既殊純駁乃判若夫言之而傳傳之而不朽者非有功於世教不能也世之讀少陵詩者見其豪逸若五陵少年悲壯若燕趙烈士渾噩若周鼎商彜爛然古色莊麗若千官朝列劍珮鏘然信乎極立言之大觀矣余謂公自獻三禮賦後既遇禄山之亂自秦之蜀涕淚奔馳舉平日忠君愛民之意一皆發之乎詩是其言乃有徳者之言有功於世教之言豈一切騷人韻士所可彷彿其萬一哉公於乾元二年入蜀時裴冀公冕為成都尹為卜西郭浣花寺居後營草堂居之迎妻子家焉閉嘗至外邑去來於斯五六載是以﨑嶇羈旅之中戀戀於蜀之草堂一篇之中三致意焉時遠地遙草堂固不可得而見及蒞治蜀都私幸獲覯先生之遺址歲辛亥從大中丞蔡公跨馬出郊遵萬里橋西泝而上過百花潭求所謂草堂者榛蔓瓦礫一望凄迷傍有老僧稽首曰此杜公草堂地也相傳為其讀書咏歌遨逰棲息之所舊有祠今廢余低徊乆之澄江未改紅蕖翠篠之遺猶有存者而草堂固不可得而見也夫前賢之蹟弗彰地主之責也弔古者有餘憾焉爰承蔡公命剪棘構祠不侈雕鏤不事丹雘體公儉也懸額設像從衆慕也後之君子賡浣花溪水之句睪然神往庶於是祠焉遇之重修東嶽廟碑記天下之能應順效靈為民禦災畀福者名山大川也山川者天地之司牧也天之愛民甚矣顧雨暘寒暑之失時豐歉旱潦之不齊天之權專而難徧爰分其事於山川故天子祭五嶽四瀆所以崇有功昭報典也又曰五嶽視三公四瀆視諸侯是則山川之神五嶽稱尊五嶽之中泰岱為宗夫岱處於東於行為木於時為春萬物之所托始也知所始者必知所歸故其權兆於有生之先而不可端測其祠徧海内與社稷並列亙古而莫之廢惟神徳象天地愚民稚子望之莫不肅然起敬凡吏於土者必以時致䖍所以昭朝廷崇徳報功之典也我朝定鼎懷柔百神及河喬嶽聲教四訖海澨山陬罔不率俾蜀都去京師萬里風雨時若民無夭札是以知神之能奉職也無替命也顧草萊方闢百廢漸興而神廟未復何以為萬姓祈福之地爰是捐俸鳩工逾年告成吁此邦之民其困已甚摭摩而噢咻之方兢兢未周之是懼神尚黙維而隂相焉以相與有成庶幾康阜歌而熙皥臻也其余之志也夫重修南瀆祠碑記粤惟鴻濛爰闢天一生水江淮河源厥惟水首其灌注百川澤潤萬物其功用與天地侔而未能窺際其涯涘者歟論者謂河源自天必歸於海惟海無源盈虛莫測迺神禹導江及淮而井絡之區實為橇車之所先則以江之源由於蜀故也夫長江之勢千里一折百里一波險劃地軸名雄天塹古誌之矣蜀隘區也萬山環合一綫通流泝而上之莫窮所自第見怒激奔騰至此而約束受命未嘗有泛溢之虞觀其所以受之者焉及夫渡三峽下夔門浩蕩汪洋奮迅萬里百折而必東識朝宗之義觀其所以出之者焉噫惟神之功何其偉歟是以古之王者天子睠受命必有事於四瀆而江其首也曩者嵗在丁未焉西顧遣少宰致祭大禮告成祀典用彰惟是方承勘定之後祠宇傾廢未暇葺也今者中丞公来撫是邦綱紀畢張廢墜漸興乃告於衆曰神為四瀆之長有功於民祠不可以不肅盍新之於是共相割俸鳩工祠以落成余顧而樂之執爵而言曰吾聞境内山川諸侯之所主也敬神以勤民守土之事也蜀雖富庶未徵而百堵於垣劬勞安宅神聖朝所慿依將在是矣指山高與水清知歎百神效靈熙皥之風與兹江流同永覩安瀾者不從此仰見懷柔之化也耶自屬僚以及耄耋咸謂兹言之有合於兹舉也爰録以勒諸石張明彩重修文廟碑記尼山有聖人天下於是有道統故忠孝代出英賢崛起皆聖人之教之所為嚴廟崇祀所以肅瞻拜振人文也成都為古文獻地昔文翁起學教士非即此乎自逆張毒屠城社燼煨聖域賢闗幾不可問噫嘻茂林荒草閴無人烟值從未有之刧雖氣數使然嗟吾道之窮大聖大賢亦罹此厄運也耶余從事巴蜀自己亥撫院高提征恢復展開兹土遂求謁文廟焦爍蕪土踪跡莫辨爰剪荆棘闢草萊僅通一線始得孔聖故址一片坵墟無片瓦隻椽數仞宫墻果何在耶令人見覩不勝流涕思欲修葺諸務未遑力有弗贍止等之跛僧説法已矣辛丑之冬撫院佟持節來蜀下車謁祠眸及荒殘喟然嘆曰澤宫如此人文可知風雨不蔽神將安依因奮修舉捐俸鳩工檄余為督余恐菲才不堪任繼而思之讀聖賢書不能有功聖賢而坐視宫墻之鞠為茂草也如此心何爰董其事不敢有憚勞瘁亦不敢少棄錙銖木植磚瓦悉得之易買工作力役悉求之徧覓不取民間一錢一粟建正殿五楹㦸門五間東西廡各五間啓聖宫三間以暨櫺星門俱仍舊址雖不敢侈輪奐之美然修理丹塗煥然改觀亦未始不可以棲神靈肅趨蹌也起工於辛丑年十一月某日落成於癸卯年四月某日上有諸憲臺之風力下有羣有司之樂輸余僅仰體憲臺徳意捐助微資克殫心力監工督修勤勷厥成已耳工成不能無記僅誌其實勒之於石以為紀年叙事云爾沈巨儒蕩平川東碑記代楚提徐治都作之粤稽上古軒轅有涿鹿戰顓頊有共工之征自兹而後虞有有苗夏有有扈商有韋顧昆吾周有淮戎頑民之屬率皆勘以武功大清猶先綏以文徳恭惟我自世祖章皇帝以順天應人之主興弔民伐罪之師享九有寜萬方暨我今皇上繼體文武秉徳成康東西南北無思不服者幾四十年何物呉三桂敢負國恩大肆兇逆跳梁於滇黔旋罹乎天誅而逆豎譚𢎞始以井蛙而脅從於川北繼以首鼠而竊據於川東恃彈九天城為負嵎之虎用幺麽羣小為百足之蟲而陷川東數萬生靈為處堂之燕遊釡之聞魚嗟乎傷哉事始庚申八月也事皇上天威震怒比蒙軍臣某章京臣某率滿漢精鋭由楚廟算命臣㑹同將道水陸並進一戰而克巫山再戰而克夔城三戰而克雲陽隨挽舟師乗風直上不二日而直造逆巢城下兵不血刃矢不傷鏃而天城土崩元兇授首逆黨傾心此皆上荷朝廷威靈下藉諸將士勇力露布以聞當無煩睿懷西顧矣書曰殱厥渠魁脅從罔治舊染汚俗咸與維新惟時元逆已誅從黨咸服余惟仰體皇上好生之仁遵奉𠞰撫並用之扶攜載道襁負来歸余㫖宣布徳意招徠流移不旬日而乃屬其耆老子弟而告之曰嗟爾百姓本係良民陷於水火罔見天日從今以後母曰蜀水險也爾視我師如越谿澗母曰蜀山峻也爾視我師如履康莊習文者屬我司徒習武者屬我司馬務本者歸田逐末者歸市改爾舊習服我新政念兹在兹永蹈斯言凡此皆布朝廷文徳以全武功之本末因勒斯石以示全省耆老子弟取鑑往轍垂訓來兹共享國家昇平之福靈長之運於萬億斯年也云爾曾王孫重修松潘衞文廟碑記今天子尊崇聖道躬釋奠於闕里詔新廟貌天章所頒四方風動且陪祭胥天下而教育之蓋莫不鼔命武臣二品以上得與舞於詩書禮樂之途矣蜀自文翁化俗號比鄒魯賊焰既熾之後復遭逆藩變亂所在文廟皆不命視學可問余奉輒語守長以學校興廢闗王政之盛衰行部所經不可不亟修以勵風俗而逡巡未有應者其頽廢傾毁不堪寓目者可勝道哉今年春中丞于公推上徳意合羣議新成都府之學宫復咨曲阜聘樂舞生遴童子而肄之既嫺乃用於廟於是覩崇牙樹羽旄翟之美聞鐘鼓簫管之聲柷敔鞉磬之音升降有度進退有節烝烝皇皇穆然見聖人之徳之盛私幸備官於兹得樂觀其成而又竊念省㑹者郡邑之倡也惟兹郡邑其必慨然有所興感庶幾奔走就事以後為羞以仰慰中丞公之望乎冬十月松潘教授張其赤率諸生張良佐等以重修文廟碑記来請曰衞舊有學垂二百載變亂之後鞠為茂草蓋數十年於兹矣今總戎卓公來鎮兹土慨然以修復為己任於是他將校及衞守偕其赤良佐等共勷其成工始於康熙三十四年春二月十有九日成於秋八月朔日自大成殿啓聖祠及東西兩廡櫺星門月臺甬屏煥然更始足以示瞻仰於邉陲明聲教之遠訖焉微總戎無以致是也余於是歎總戎熊體聖天子崇儒重道之意而以身先之所謂修之樽俎之間折衝千里之外者非耶其所以對揚休命者何與我中丞公不謀而合也攷諸圖誌松潘為古氐羌地自漢通西南夷叛服不常明初平定之至景泰三年始建學宫由是置博士弟子員登聖人之堂為聖人之徒豈不幸甚顧地極寒薄不産嘉穀聞諸生往往代負荷取傭值以供俯仰蓋與耕讀相半者更什倍苦辛矣夫生瘠土者勞而思思則善心生今諸生入廟而思敬奉庠序之教朝夕黽勉於達道而求不詭於聖人將偕此邦之人朝廷為禮義之鄉諸生不既莊莊乎君子哉此夫表章重學之意而總戎則蔵美利於不言者也興復之功明倫常以振起後之學者學臣之責也是誠不可以無記卓公名䇿閩之惠安人衞守備為賈尚謀博士弟子自良佐而下凡五十八人例得備載劉徳芳錦江書院碑記成都古益州故多材地秦以前遠莫可稽漢孝文時二千石文翁仁愛教化符守此邦慨土風僻陋欲誘飭蠻戎而進之儒雅選郡子弟開敏有材者遣詣國學受業博士郡生皆成就顯拔榮進乃作禮殿立石經修起學宫於成都市中文教由是大啓士風埒齊魯焉永初後高守䀢更新禮殿於灰燼之餘増一室以祀翁生徒相誦習講課歴魏晉唐宋元明巨公名彦踵接代興蜀學之盛甲宇内所以繼文翁遺緒乆而不墜者實惟高守迨獻賊入朝川所在屠滅郡邑為墟我文學諸生謀生猶恐不受命逆宼就殱反側屢安給奚暇誦讀其年盛志美亟思向學之士既乏師承尤鮮載籍然則繼高守遺緒於兵火之餘以不墜文翁之流風雅化者端有待後之人矣巡撫都御史貝公蒞蜀三載爐蠻既平民樂靜鎮士被陶命觀察甄公亟欲興文教以植人材而余適奉任而興廢兹土因以俾之於余弼教興行實余之礪鈍尤余夙忘也爰度郡黌右偏有隙地敗礫蕪烟嵗乆未治迺蠲俸金創置為門幾楹為堂筵齋講為蔵書之軒為賓師之位為東西號舍為庖湢逰息之所屬成都令田君軒來温江令邱君璋董其役凡五閲月而訖事工不知勞民不知費既落成披之輿乗訪之故老蓋石室故址也余聞古者鄉有序黨有塾擇師資令其教授將以𢎞長奬掖化人成俗率由於是故法制代有變更惟學校絃誦之事建國者率無以易書院之設與學相表裏王化之本而菁莪棫樸之盛所自出誠不可一日聖明在廢也今覃敷上文徳幸魯有典訓士有文興學立教遠嫓三代極盛之時大備之制海隅徼塞四方萬里之外靡不感動淬厲烝烝以變蜀當休養生息富教有可漸加之候公以寛平涵煦兼父母師保於一身佐朝廷興道育賢政莫大於此矣夫士棄詩書行誼勿道為士者之恥而狃頽襲媠徳教不聞有司之過也今學之名猶昔而古者教士之良法美意與其文具一無所與而士之無所傳習不務其實而馳於名也久矣掌教事者又每視學為聲利之場第取其善為科舉之文而嘗得雋於場屋者以相夸尚孰知科名固足以榮當時而所謂久大之業紹往哲以開來學寜盡乎是若徒托執經問業之地飾韋帶青衿之譽以虛聲相慕悦則更卑不足道豈余之所期乎今建此書院延訪賢士可為人師者主其席定課試之約籌膏火廩餼之貲日與諸生揖讓講習乎其中將見蜀之士皆蹈德詠仁追前天子昇賢懿軌上答以無孤我公之教且以繼石室之流平文治之功風於無窮俾後之周覽學舍自文翁以來上下千百餘年其間之建而廢廢而興者僅公繼高公而三政教盛衰視乎其人顧不重歟遂為之記以垂永久而告來者黄廷桂雷波衞闗帝廟碑記維我皇上撫御寰宇仁漸義摩聲教所訖無逺弗屆凡夫跂行喙息之倫孰甘自棄於光天化日之下者蠢兹僰蠻性同狼豕在昔叛服不常頃者戊申之嵗米貼土婦陸氏悖法跳梁而雷波土司楊明義勾通結命統戎覺阿照諸夷肆行盜掠時余職任提督事務奉行用彰撻伐仗天威而遵三旬殱厥渠魁焚巢掃穴一洗氛祲綏靖邉徼宸算未浹皇仁寛復仰體安輯無辜當雷霆震懾之餘沐以雨露涵其脅從濡之澤莫不匍匐懽呼永誓無貳一切善後機宜彈心籌畫敬陳天聽幸蒙覽進勦經由之地見夫雷波一境左挾冕越右俞允余周跨六詔前拱建南後衞叙馬羣山扼險金沙劃界誠腹裡之屏藩要荒之隘區也爰相度形勢築城郭修營壘設流官規畫既成邉鄙晏然事半功倍又如是之速恍有神助伏念上御闗聖帝君歴朝累加顯號今洛陽皆設博士春秋極以來又復追封三代解州祭享備極尊崇維此蠻疆無異中夏特䖍搆廟宇是經是營大門三間正殿後殿如之配以廊廡繚以周垣計日落成規模宏敞余肅將瞻拜因憮然曰闗聖浩氣英風卓絕千古廟祀之典不獨通都大邑巍峩煥赫即僰道蠻荒咸昭誠敬且月之朔望營聖諭彼衞諸員於此宣講不環拱敬聴嚮風慕義蒸蒸然旃裘魋結之衆靡其沐浴於太平德化之盛焉夫捍禦疆圉撫字百姓則官斯土者之責而黙祐於上俾雨暘時若嵗神獲屢豐民歌樂土者維之力也蓋以聖天子在上則百神効靈我天率土莫不尊親今輿地日皇上文德武功光被四表普拓邉陲蕩平瞻雲就日之下兵息民安當共慶郅隆於億萬斯年矣余中心懽忭敬獻匾聨用誌永久并序顛末永夀之於石黄廷桂黄螂所闗帝廟碑記聖天子御極之六年雍正戊申天宇所覆地維所載氈裘卉服之區鑿齒雕題之域来享来王悉主悉臣顧兹米貼土婦陸氏以蚍蜉畏罪不能自縛就戮遽敢要結黨羽跳梁山澤余時提督軍務率諸營將天討旬士奉間深入蠻箐行列陣布旗明甲耀未盡厥月之武所向率服一二醜類莫不俘獲誅殱藁街懸首以宣示國威俾震懾之餘又憫其頑愚宥其脅從蓋殺伐既張與之更始而黄螂土司國寶遂以其地内附余因夷情歸化相度形勢見黄螂一隅實為黔越咽喉戎瀘藩衞乃扼險隘築哨堡建城池設戍部歴聞又歴善後俱有成畫并以奏伏思闗聖帝君廟祀徧萬國精靈彌六合義勇蓋三分我朝神聖相繼威武張大湛恩汪濊聲教所訖無遠弗帝屆是威靈君之朝廷之徳化兼荒并包齊觀等量爰崇其廟貌昭其祀事禮制之隆侔於東魯每月之朔望營衞得於此聖諭宣講拱聴以成一道同風之盛且冀夷氓神之黙存感應與意胥為表裏其荷國家懷柔綏服之神之休曷有既與廟創始於周月干尺日告竣於堂月日屋成若干楹垣若輪奐既新皇既飭室宇有嚴廊廡有秩漢夷具瞻罔不祗肅遂額曰闗帝之廟且叙次顛末勒石垂遠他如工力財用之數供億董事之人則紀於碑之隂云記佟鳯彩修成都府學記嵗辛丑子受命撫蜀駐節錦城循故例視事三日昧爽謁説六經蓋倣先師孔子廟集博士弟子升堂鼓篋稱周禮大司成掌成均之法以教國子者也及期余質明而興盥而奠不見所稱先師廟者惟茂林豐草間諸屬吏張幕而拜陳詞以燎余矍然進博士問故答曰是火而為墟也俎豆之地為豺狼之所穴狐之所嘷將廿年所矣予愀然曰夫子之道與天無極為萬世法去佛老遠甚今佛老之徒習於其教溺於其所學尚金碧其像瓊瑤其宫崇其饗侑伐鼓撞鐘祓巫紛史盛其歌舞奔走竭蹶天下之人惟佛老之教之歸彼都人士側足儒林佩服絃誦獨於吾夫子之宫牆坐視圯廢不一過而問耶諸博士揖而進曰成都新復寇訌於東士疲於伍當事者惟櫜鞬之從奚暇學校為予曰不然學校之設非僅文教也凡有事出征受成於學執有罪反釋奠則以訊馘告何獨孔一文教乎昔漢高祖討陳豨還沛過魯以太牢祀子至光武中興臨淄方定天水未賓即躬視太學夫漢高不事詩書光武起家徒步俱於干戈擾欀之際留心仁義禮樂之宗尊儒重道為天下勸況今天子明聖繼體重熙山海遺孽漸次削平又成都係省㑹重地為屬郡觀瞻文翁遺教宜有存者顧令夫子之宫榱桷几筵盡淪草莽毋乃諸生羞諸博士復揖而進曰昔夫子之策衞也曰庶而富之富而教之今士民其瘵靡有孑遺怨鼠驚鴻捉襟見肘孜孜建學興文不其迂歟予曰嘻學校王政之本也夫子之言謂非教無以保富庶非謂待富庶而後議教也若二三殘黎不使之揖讓夫子之堂僾然愾然習其衣冠劍履觀感興起於善將見三綱淪九法斁反浸淫於佛老之教漸趨於邪竊恐殺運之不殄也諸博士唯唯而退予迺諏日卜吉斬荆驅石鳩工庀材捐資程費經始於順治十八年十月越康熙二年九月竣厥工計建大成殿一啓聖宫一大成櫺星門各一明倫堂敬一亭各一暨兩廡左右學舍及大門石室載啓坊表悉具翬飛鳥革將將翼翼過者望宫牆之崇高起斯文之瞻仰矣余故樂為之記張象翀眉州修學記康熙六年秋九月上親天下政詔以實學廣録人才是嵗十一月睂侯趙公重修學宫成先師殿及兩廡具㦸門櫺星門具啓聖祠明倫堂具二十年荒址率作如是公勞矣公嘗憫三代後人不宗實學皆由士民異業遂以羣分每為浩歎焉古者有分人無分學父子兄弟相勸誡倫常事耳力餘乃敢事文故耒耨牽車之時猶行以孝弟詩書之義學之名不立學之實無不備大司徒所書升而官之録之者胥此俊民也故小大偏全之才胥得各出所能以佐君父而天下治三代後學之名非不尊且美聲華相尚而聖人之道無聞於是翹翹然曰吾士也而樸遫顓蒙者亦退然以民自處上之人不能禁其區分不得已而取古人考言試藝之餘意以辨天下才雖名實并茂之士間於此得之抑亦難矣嗚呼園橋頖水間僅存此俎豆牲醢之文以事我孔子而遂謂郡縣皆有學豈古人本意與此大道所以不著也然則為民父師而有志於行道亦惟以務本之意行勸導之微權猶可及耳眉於蜀有文學名乆矣於宋為盛故仁宗謂天下好學之士多在眉山思昔蘇氏之學卓然深求於聖人之道尚志節講名義淳如也初未嘗以工文為專事而一時經術之言遂成碩畫當時雖不盡其藴忠厚之誼處窮弗改今讀其書皆言而能行者學有實用如是亦足矣了翁先生牧於眉嘗築室白鶴山以所聞於輔廣李燔者開門授徒人盡知理學昔人謂了翁深於政由今思之蘇氏之好學如彼了翁之善教又如比彬雅之英相望於一代何其盛歟吾固知今之人服蘇氏之學而未能未有不起而思了翁之教者雖然公於眉較了翁苦矣聞開禧間蜀無大兵革了翁所教猶未亂民耳今眉當大難餘經數百年未有之困而公教數十年不教之民古所云功在起衰斡旋剝復當不過是公良勞哉雖然公樂任之公有道者也出政有次甫至即急民事修廢堰四又親勸民墾荒六載之内民自謂食足公㕔事尚不葺惟四時勸民讀法與課士并行已得古者有分人無分學遺意兹學宫成諸生得進籩學禮於中又為徵選師儒公公餘輒臯比於鶴山書院而蘇子祠又悉列齋舍使眉士居業焉論語曰君子學道則愛人公其人矣眉之人由此思敬思勉惟實學是務公卿大夫之才由此具可求也嗚呼公之望於眉人不止如三蘇子也眉人之徳公又豈止如了翁云公諱蕙芽字㓜湘燕人也嘉定州修學記高幖之麓維嘉學官明御史郡人程子啓充實肇造者故廡下曽專國祀祠之經百餘年甲申蜀亂殿廡門楹悉燬於火朝順治之辛丑嵗西山張公諱能鱗以少叅領蜀南先建明倫堂為講地未幾以入遑賀去明年復来是時有巫峽餘氛大役繁起不也甲辰役止民寜公乃建兩廡置七十子及先儒主起㦸門三舍乙巳春謀於州牧高侯仰崑乃大集工建先師殿啓聖祠櫺星門及池上大坊鄉賢名宦二祠丙午復建尊經閣及六齋一切榱棟壯麗丹雘炳朗入其中者愾然有車書杖履之思秋八月特牲告成諸生述公之功商記於予夫公之功可勝紀哉公之學深得於自强不息萬物一體之㫖迹其守兹南土去害興利父老子弟之歌頌自有志不朽者惟是蜀南多士乆困幽谷心莫適從將甘為齊民焉王道不興聖人之所恫也憶公下車日首重孝弟專以明倫課士士子自有油然動於中者公又恐樸茂寡文不學無術將焉用之爰置高幖書院設廩以延多士四方来者盈舍公每政事少閒輒臨院為諸生講論出所纂著孝經衍義大學衍義補儒宗理要等書無一非敦本善俗明體達用之學又訂釋奠禮書附進賢論謂有子諸人之徳高於予求而僅配食廡下議將進之升堂此非具千古卓識何能取古人而尚論之則公之藻鑑人羣旌别淑慝大槩可思矣書院初起公登壇之日未嘗斤斤然為士子訓鉛槧業一以主敬致知窮理盡性至命為指歸二年之内諸生靡不快然有所得亦各能言所言卯午且書升八人夫不徒以文教人而文亦應之則公之至文入人心深矣聖人之為不厭誨不倦非終不可學也貞恒之力不足故純駁分焉遂令聖人之詣為千古絶業公之學極乎粹而力足以貞之故在己者有以續千聖之傳及人者有以大一體之盛淺識之士徒知公之煇煌廟貌馨香俎豆為足以隆事我先師也烏知公之事人之為誨也乎嗚呼親公之教先師者尤在善學聖而有得於心則人人皆公之繼體而道由此其大行矣是所望於蜀士之善學我公以事先師也己予以功不可勝紀也聊記其畧云學附張公高幖書院徵聘名士文竊以士子志必先端其所向儒生問業須知己往之非茍斯道未得淵源則所習皆屬糟粕聖賢之閫奥必何如而後入室升堂性命有精微豈姑且為之尋章摘句況乎六經註脚果盡貫通否乃以一第浮名遂分得失耶若自恃以及自滿便非下學之純倘自省因而自慚猶有進階之路用是𢎞開書院徴選俊良庶幾載望高幖復興雅化謹諏嵗首建寅之月卜吉念五入學之辰聊備薪水以供饔飱并潔齋廊而懸臥榻負笈千里西南可以得朋星聚一堂觀摩豈曰無益從來渾金璞玉之質尚須陶鎔砥礪之功矧當化雨春風之時豈忘栽培傾覆之理知子之來之必有以懷之知子之好之必有以報之伊人宛在欲溯洄而莫從匪我斯求雖再三而非瀆幸無守株以待兔何至臨淵而羨魚吾道其傳勿令眼前錯過此中名理誰能言下承當企望殊殷筆多覼縷允屬譽髦敬聴無諼王士禎登嘉州高望山記入嘉定州境連岡複嶺直達州郭一水遶郭南流注江曰竹公溪有竹林三郎祠嘉州古溪上人家背江面山隨溪數曲達於州門南安華陽志南安縣治青衣江㑹云蜀王開明故治也憩上南道舊署署枕高望山之足有高望樓牕檻軒豁三峩正值其西問丁東院無知者飯後門人鄭陳季帥四子從登高望過一小寺甚荒落鄭生曰丁東寺也一井泓然在佛殿之南即丁東井山谷易名方響者時雨後水溢鄭生云水涸則井半有泉鏗然下注其聲丁東然高望一名高幖州之主山也有宋神霄玉清萬壽宫絶頂為高幖書院登此四望其西三峩竦峙青衣沫若二江自西来㑹於雙湖岷江自灌口成都下新津武陽經城北平羌峽至凌雲山前三江合流浩淼無際凌雲九峰相接又名九峰稍南烏尤馬鞍二山鱗次江岸丹厓翠壁望若畫圖江流平遠戎瀘諸山宛至杯案昔人謂嘉陽山水為西州冠非虛語也日晡迫下山帳望而别約明晨登凌雲觀大像登渝州塗山記康熙壬子十月初八日舟抵重慶府古渝州也明日登塗山林生堅本從常氏謂禹娶於塗山辛壬癸甲而去即江州塗山是也有禹祠及塗后祠酈氏辨之以為禹娶在壽春當塗非此倦逰録云禹廟後一氈裘像侍衞皆夷人云是禹婦翁也操小舟由龍門登岸龍門者江濱積石中㫁如門俗謂龍門浩巴人謂小港為浩今戎州亦有金箱浩也浩之上瀑布如練數折入江右即粉水亦曰清水穴穴右即海棠溪遡瀑而上石瀨泓然茆屋十餘架閣以居畧彴通往来山半時有稻畦凡十八里屢折益峻東倚奔峭西俯絶澗至一天門更上二里許度回龍橋抵真武觀遵西麓而上登鐵桅峰即塗山絶頂矣下視羣山纍纍如蟻垤三江合流曲折正如巴字渝城孤峙江中宛如龜之曳尾記稱渝城有門十七九開八閉以象九宫八卦云西北為縉雲山山有迦葉尊者手跡上有相思寺生相思竹形如桃釵遵東麓而下石磴高危俯視千仞令奴子夾持以行下山登舟順流至朝天門林生别去登白帝城謁昭烈廟記十一月十六日舟發夔州太守熊君過予以小舟同往魚復浦磧上觀八陣圖所謂六十四陣如棋盤二十四陣如偃月者不甚可辨太守云登高遙望行列宛然近觀即存髣髴理不可曉按蔡氏云八陣生於方圓方者坤圓者乾或謂風后因井田之法以立兵制武侯得之布之魚復壘或曰武侯與風后名司實異不可知也陳都督東海相待臥龍山下里許至少陵祠有石碣題唐杜工部子美㳺寓處堂三楹祠中有沔陽陳文燭修祠碑宋治平中知州賈昌言常刻少陵夔府詩為十二碑建中靖國元年運判王蘧又刻十碑於瀼西果園今昆明池水一篇獨完則後人别刻秋興八碑非宋之舊矣此地在宋為漕司即少陵瀼西宅址連騎而東石路頗坦迤山上女牆曰子陽城其下為下闗城稍折而南即白帝城二城犬牙相連城枕白帝山石垣繚繞上極青冥水經注所云白帝山北縁馬嶺接赤岬山其間平處南北相去八十五丈東西七十丈東傍瀼谿即以為隍西南臨大江瞰之眩目者也然入蜀記謂瞿塘闗唐故夔州與白帝相連闗西門正對灎澦堆則臨瞿塘者當是唐之夔州非白帝矣羊腸數轉始達絶頂正俯瞿塘兩崖灎澦石在其西孤峙江面南向為昭烈廟規製宏麗明良殿凡五楹中祀昭烈皇帝以武侯闗張配食像設古雅舊傳有山谷題名及元和碑皆不存正徳中行軍右都御史林公俊一碣記舊有廟祀公孫述林以征藍之役駐軍於此始廢述祀改創三功祠三功者后土氏江瀆之神漢伏波將軍馬援也乃知此地曾祀子陽及伏波矣放翁白帝廟詩參差層嶺上邦人祀公孫力戰死社稷宜享廟貌尊丈夫貴不撓成敗何足論二公持論不同如此祠北有麝香山杜詩注引寰宇記謂在秭歸縣東南者非東即瀼溪源出大昌縣流經天池清溪南入草堂河曰瀼溪水流經赤岬白帝二山間逶迤入江又一水出大寜縣流經郡北戚靜山亦南與相㑹少陵草堂在其東河以得名蓋東屯故地也寰宇記大昌縣西有千頃池水分三道一道南流為奉節縣西瀼水是也困學紀聞東屯乃公孫述留屯之所距白帝五里田百許頃稻米為蜀第一放翁云土人謂山間之流通江者曰瀼猶沱潛之類也瞿塘之上兩山夾立北為赤岬南為白鹽對江山半有故城基畧可辨識陗仄尤甚僧言即古魚復縣漢江闗都尉治者都督慨然曰古人設險良有深意今若治白帝一夫當闗可遏百萬之衆過今治逺矣放翁謂今治比白帝頗平曠然失闗險無復形勢古今人所見畧同也四顧江山雄麗緬懷霸圖徘徊慿弔不能去都督開讌祠下奏軍中之樂聲琅琅然與天風江濤相應酒行無算移晷始告别諸君皆騎行送予由山麓出白帝城西門門去工岸直下數十丈為之震掉下馬徐步舉少陵白帝城門水雲白低身直下八千尺之句宛然目中予登舟諸君自崖而返舟過灧澦自江中望之出江面可二十許丈正當瞿塘兩崖之中勢如怒猊北尻南首稍北即黄龍灘復有一石宛如研山兩岸各百餘丈豁然中坼是為峽門酈氏所謂廣谿峽即瞿塘峽也是為三峽之首峽程記三峽謂廣谿峽明月峽仙人峽其瞿塘灎澦皆不與者誤也記又云自蠻江桔柏沱導等江至此凡二百八十江㑹於峽前實為蜀江滙處峽口有鐵柱二景定五年守將徐宗武作各六尺四寸貫以鐵絙鎖峽者時江水既落明流紆直白鹽赤岬峰巒交映鑿翠流丹四十里間目不給賞山間紅樹與石色相錯如繡舟人云山黄金也過臺閣子黒石虎鬚諸灘皆夏秋江漲時最險處今猶湍悍可畏大抵夔峽之山丹碧赭白不一狀其高刺天望若雲霞山趾别有巨石似巨靈初闢斧鑿宛然如跗承萼削壁萬仞玲瓏凹凸割其片段皆米家海岳菴中物也峽中風逆晚抵飛纜子泊去巫山縣三十里劉如漢嘉州高幖書院記漢嘉山水清巋之聚城有高幖山主於中而博收焉峩眉之遠大凌雲之高明龍泓之秀雅烏尤之疎越莫不屹然爭勝登高幖瓌顧諸峰逺大者高明者秀雅者疎越者若一一受其裁成錦江来多岷山厥水清悠淼淼沫水遄急漹水遒勁淙淙有聲踞高幖而俯視三江清悠者遄急者遒勁者何衆派之滙於宗耶我藩叅張公之建書院於兹以育蜀南士也蓋有所取爾昔之蜀南為傑士藪出者各有建樹處者亦罔不彬彬秀良甲申之變坑焚殆盡廿年来絃誦聲歇士亦不自振起豈天生才有豐嗇抑亦作人之化無聞也公辛丑出守南土慨然惜之既為民經營溝澮即建學明倫以斯道為己任先是以時課士士勃然知所嚮往繼憂其散處爰設書院檄召各庠士子居業且捐㢘金備廩餼且募齋夫供薪爨負笈者如歸也顧所業各未得要歸公乃出江南督學時手訂大學衍義孝經衍義儒宗理要等書示士子理學天人之㫖又自下購經史古書八百卷貯之尊經閣俾多士沈酣飽飫於其中政暇輒親臨臯比剖決譌疑使知要歸之處每曰學不究天人而徒榮青紫雖得之終於吾道無所輕重是以癸卯丙午雖登賢書者數人公未嘗以此為宫牆多蓋所望者得孔顔之樂繼道統之傳不區區尺幅自見也嗚呼置身軒冕之中而欲體聖人之教有其志者未必有其事公之曲成不遺可多遘歟公横渠裔也家學淵源以民胞物與為志以窮理盡性為歸今取全書讀之西銘正蒙諸篇與公所續緒言太極歌定性諸論其心其理先後一轍蜀南多士茍能仰止高幖風雨晦明勿輟涵泳於知水仁山從容於天人性命萬事受裁統宗一貫各有得焉處則自適於孔顔之域出亦不愧為伊周之侣則公之家學固淑身善世之模楷多士之學公之學心公之心者亦庶幾無負此高幖也已書院中上公車者在長安與予述其事誦其徳請予記予曰公之為此也樹一代之真才衍千古之道緒葆兩間之元氣淑百代之儀型教思無窮天下後世必有聞而興起者區區吾鄉已哉公諱能鱗别號西山燕人也李先復柳邉驛免解逃人記嘗考古者碑以記往事而懸用木後人書之以表其功徳因留之不忍去碑之名由是而傳自秦漢以降生而有功徳政事者亦碑之而又易之以石失其稱矣余之碑逃人則異是逃人奚以碑曰碑逃人紀栁邉驛之免解逃人自黄公始也公諱貞泰號澹園山東即墨人由壬子副車康熙二十年来南邑蒞任四載政事功徳載在口碑未暇校舉而栁邉驛免解逃人則尤功徳政事之大者逃人為我朝首禁窩縱之嚴律有明例今蜀去呉逆煽亂王師京師萬里逃人之累全蜀未有頃以肆征八旗兵丁間有私逃者愚民不知其累或窩或縱貽害良多甲子嵗鹽亭遞解逃人至栁邉以守防稍疎逃人復逃栁邉驛丞併應差里排均照律議罪邑侯黄公聞之曰驛遞止應夫馬遞解逃人責在州縣乃通詳府道司院一不允至再再不允至三畧云驛丞接解逃人重犯天下從未嘗聞查閬中至廣元廣元至寜羌凡有逃人重犯閬中直解廣元而施店等驛未嘗接解廣元直解寜羌而神宣等驛亦未嘗接解祈照施店神宣例逃人重犯俱不接解鹽亭直解閬中栁邉驛遞止應夫馬等語大中丞韓批云驛丞職司應付夫馬原無接解逃人重犯之責嗣後仰照神宣等驛之例止應夫馬凡遇逃人重犯飭令鹽亭徑解閬中接解可也業經遵奉在案嗟乎即一事而貽福闔縣如此仁人之言其利溥信哉今公以考成特最將行矣邑人士恐事乆言没之失傳也索余記余曰春秋之筆有紀事者有紀言者公之以解逃而力任其事不避勞怨其事可紀也公之因解逃而敝舌秃穎始獲如議其言可紀也余乃執筆而紀之其辭曰柳邉疲驛界在閬鹽皇華孔道供億維繁西送至鹽北迎於閬夫馬絡繹困苦難狀繄維逃人責專州縣胡為柳驛成例紊亂婉婉黄公民之父母援例陳情繪民疾苦晁董公孫其對洋洋公言炎炎堪與比芳一再至三上允其議勒之貞珉世世無替後有繼者皆沐徳功況乎親炙感戢何窮吁嗟愚民無疑無猜鄰邑有吉視此文哉宋璋義學記古聖王之治天下也國有學鄉有校三代相沿俾其子弟咸奉一師為車鍼而不趨於異路是故明五典迪五常以䇿其躬談六經授六藝以牖其識教者之所以教學者之國所以學無非崇實黜浮務期文行交修焉已矣我家昌明正學一道同風學校迭興依然鐘鼓辟廱之盛余宰邑必以誨民朂士惓惓勿懈七年来義學之設塾師之延館舍之取直余未嘗以貧乏故少有倦心第邑署附城城西之地半為伍營八旗所棲息其餘民居與市廛交錯館舍維艱兹從西湖街内覓得廣厦南向離位文明象也深肆進計壹拾伍丈壹尺前濶四丈一尺後濶六文二尺後通大馬站西向屋四進長一十三丈七尺前濶二丈三尺抵街後濶二丈五尺挨近别駕公署大小屋舍二十九間售價三百二十有竒余於捐貲易劵後又捐八十餘金即為修葺改造煥然一新䥴其額曰南海義學永為邑之子弟及五方負笈者讀書課業之所義學門前左右鋪舍兩間收其庸為將来補葺棟宇之費餘則留為先生燈油之助頭門内堦墀上為講堂三間中為絳席談經論道與諸生朝夕質疑問難外時或㑹文月省程課後堂三間左一房先生燕息於斯中一堂右一房并後廊十五間與後堂之左三間旁有隙地分搭偏厦二間為厨房新舊増置共成二十九間俱待来學者處此至大馬站另院房屋七間每嵗取庸為先生薪水是資擇多士素所樵重毋覓蠅頭毋爭趨騖影沈潛粹養文行兼優者以登師席為義學典型夫南海為嶺南首邑代有名儒如區册下筆千言韓昌黎稱其人不易得郭棐與聞心性陳獻章賴其疏以闡揚霍文敏行誼清高直聲震於天下倫伯疇四元疊出才望茂於一家要皆文可法而行可宗無非由於粤秀樵山珠海鬱州靈氣之所鍾者豈必藉學校之所致哉雖然亦何嘗非學校之所致也人未有不本乎教以牖其識以䇿其躬彼不教而能者天下一人而已伊川先生曰教必就人之所長所長者心之明也從其心之所明而入然後推及其餘爰是從其不忍之心推而至於仁從其辨别之心推而至於智從其剛正之心推而至於勇進徳固然即課文亦然從其好竒之心推而至於古奥從其好新之心推而至於清雅從其好富麗之心推而至於淋灕典贍從其好圓熟之心推而至於錘鍊精純且推其求名之心使之人人務實推其冀效之心使之人人專功為師先端其矩範學者共凛其率循庶幾南海之子弟行南宫敬叔之行學張南軒之學擅曾南豐吕河南之文相與圖南則下筆千言之區册與聞心性之郭棐直聲震於天下之霍文敏才望茂於一家之倫伯疇復見於今日既可以副國家昌明正學求賢若渴之心更可以無負古聖王設學校以造士之意并不虛余建立義學之摰願焉詎不甚快因勒石以驗余言序王士禎蜀道驛程記自序自昔揚一益二并稱天府按古者虞十有二州夏九州揚州之域盡於南海五嶺之地所暨遠矣至漢始别置交州部而梁州據華山之陽西距黒水以今日輿地考之漢中興安屬秦則雍州南境也鄖房屬楚則荆州西北境也所統不及揚什一而揚益甲乙相次亡軒輊者則其山川之竒人物之美物産財用之饒蓋可知矣漢唐以来志於常氏賦於左氏傳於陳氏句氏記於譙氏韋氏圖於宋氏詩於杜氏後有作者可以橐筆而退矣至述征之作則韋莊李用和輩不甚著於世而陸㳺之書獨傳余以康熙壬子有成都之役往来五閲月賦詩三百餘篇世多有其本又所記驛程二卷置篋中漫不省録忽忽二十年往矣屬門人盛御史符升為余刻粤行三志因憶前事從蛛絲鼠齧之餘譯而存之其間考古述今亦有足觀者不忍棄也金儁峩眉山志序天下名山多矣而蜀山稱佳余以為天挺峻拔當必有竒凡蜀之萬仞揷雲連峰千里而不㫁者率皆培塿比可也而峩眉獨異顧峩為蒙山之首比肩五嶽不獲列於祀典何歟余嘗考舊紀云峩以名言眉以形言夫其横亙西陲衆莫與京譬諸人之面焉五官各有司而眉獨無所事然而聚秀凝姿標英煥彩非眉則弗克彰若峩眉之瓌瑋天地而表章宇内也亦猶是余自己酉秋来涖蜀藩殷殷焉望三峰而神往而吏治旁午未果躡屐登臨以挹峩山之異者四載於兹矣今夏太史綏菴蔣公選勝来蜀憩是山者數月陟嶮巇捫霄漢求歌鳯之遺跡訪爛柯之故址探芝洞之幽竒擷香巖之真勝凡古利名泉以及瓊草琪樹怪鳥異獸靡不寓諸目而得於心顧山志之未悉散軼而莫紀也從而輯之浹月告成齎簡問序於余余謝不敏既而自念天下所難遘者不獲身接猶得以心遇之夫以巢由之肥遯也偓佺之導引也老子之談經列子之禦風也千百世而下何從聆謦欬而覿平儀乃求其人而不得聞其事讀其書如見其人焉是志也將以政事之餘咏歌嘯傲展卷而峰巒劃裂致趣畢呈不煩登陟不費攀援而峩山已在目中矣是誠足以酬逸少之餘憾而副青蓮之追憶者也然則是書之成當與峩山同壽吾第恐蛟龍雷雨之震躍於其間也杜濬送宋荔裳之官四川按察使序君子之學出處二者而已出處之道處以為身出以為民而已求之當世處以為身者當如宣城沈耕巖先生出以為民者當如合肥龔芝麓先生耕巖而外處而賢者不具論芝麓而外出而賢者則又有宛陵施公愚山萊海宋公荔裳二公皆余石交而穏其心乎為民者也宋公往年觀察兩浙政成化洽為民之效則既見矣中間不知何故跧伏者十年宇内之民皇皇汲汲望公之復出至是聞其以原官起田間補四川提刑按察使斯民相慶於路而士論翕然既以日者竒寃得白為公喜又有稍稍致惜於其間者以謂向使公微一蹉跌則十年敭歴計今已乗鈞軸居中而運澤之所及者遠奈何蘇而復上絶險千里獨幸西州之民乎吾獨以為不然夫居中而運其權分而去民也遠按察一方其權一而去民也近且方今民困莫如楚蜀而蜀又甚於楚則度公為民之心宜莫先於蜀然則按蜀之任雖使公擇而處之不是過也奚惜乎雖然公何以治蜀夫公竒材也敉寜之道非他人所能隃度維吾嘗考之前烈治蜀最著者有三人焉莫不因時制變有卓然不可易之識即亦可以知公矣在漢初葉文翁以文治蓋蜀承新造其民不知禮譬如田舍翁家未嘗見典籍草野而倨侮矣從而教之延師受經所以擊其蒙而通其志使知向方文翁之時然也在蜀漢諸葛忠武以嚴治蓋劉璋富而孱其民不知法譬如懦師之縱頑童繼之者必峻其章程威以榎楚然後循循服吾教武侯之時然也在宋張忠定以剛治蓋沃野長養而盛宋涵濡其民不知節譬如有餘之疾宜用尅伐疾愈藥止耳忠定之時宜然也若夫今日之蜀何如哉獻賊肆虐之餘民不知命矣譬如癰疽潰爛旋事收拾藥餌饘粥循次謹節猶恐不濟又必禁其所忌戒其所怒勿風勿勞以善其後是又向者文治嚴治剛治之所未合而期以仁治焉者也蓋古今之遇獨際其難非有竒材即仁心亦無由達此則宋公之時宜然矣夫公憲臬大官與文張守郡事體不同乃若武侯以丞相領益州牧至今蜀人思之不忘公其類是歟且夫按察之任在於察吏察今日之蜀吏貪無所取而酷無所施惟其使民得墾南畞則吏之良者也刑期無刑較之他日轉覺少易焉則於公出而為民之心豈不尤加惻怛哉至於公之文章騷雅嫓美前人方將發揮山水之竒秀興復前賢之遺跡姑在所不言惟言其最重者最重者何出以為民也王新命東山集自序立言必本性情為政務在力行余生平期此以自朂顧幼遘離亂失學長即從事簿書無由含英咀華潤色鴻業僅於退食之暇涉獵經史竊窺中秘博搜强識討論不倦蓋癖性之所嗜也因是皇華四牡所歴名山大川偶有編述以攄見聞朝堂政府追隨公卿大夫之後亦間有論説發明以達下情而宣上徳朋友酬答雍容揄揚長箋短劄各殫胷臆乃疎慵成習脱藳輒置罕有存者自戊午嵗承乏豫章旋叨量移歴呉歴楚忽忽八九年其間軍興旁午羽檄紛馳籌供億而恤瘡痍拮据靡寜更有民生風俗之所係交游感慨之所及與夫馬蹄舟楫登臨懷古或章奏或記序或詩歌皆録之成帙自念年軼知非老之將至恐乆而不能記憶也刪其繁冗存什一以授剞劂不過以志數十年中之大槩並以記鄙性之所自適勉行之不敢怠耳若竟以為有當於立言為政也則吾豈敢吾梓人也梓城東山層崖修阜蜿蜒綿亙為一州之勝用以名吾堂遂以名吾集云學統序大道之在古今也如日月經天江河行地無論智愚賢不肖皆共見共由者也人心之不正由於道統之不明道統之不明由於學術之不端朱翟為我兼愛鄉愿似徳非徳荀卿以禮為偽告子性無善無不善後世聪明才辨之流假良知以附禪宗皆足以亂吾學既足以害吾學堯舜禹湯文武繼天立極道統相傳而必待孔子以集大成大成之説孟子亦借作樂以為喻乃傳之千古而不易蓋堯舜治天下世遠言湮非得孔子則後世亦何所據令孔子達而在上行道濟時亦止如臯夔伊傅周召之事業何暇以道學之統正之萬世俾顏曽思孟見而知之周程張朱諸子聞而知之若是哉此春秋時之不用孔子殆天之重學統甚於重治統也予生也晚且在蠶叢固陋之鄉幼囿於帖括長從事於簿書間或涉獵經史黑白混淆異同雜亂問以統緒茫無津涯今敬修先生示以學統一書是非判别邪正井然如暗室得燈洪流遇筏寤初覺而瞽驟明也先生英年力學不愧科名予自承明識先生迄今垂三十年見其正色立朝古心古貌時時以泰山仰之然未讀先生之書也計先生憩息林泉方踰强仕孔子不惑孟子不動心恰在斯時居諸就將日新富有編成學統繼正脈而扶大道假先生於此十年中勞心吐握晨夕坐論不過為臯夔伊周之黼黻贊襄耳聖天子若欲為萬古明學統恐有志未逮也今日者徳元尊道崇學親辛東魯移風易俗以正人心一老再出而濟蒼生明體達用内聖外王復覩熙皥勲華是不亦學統而兼治統也哉李蕃通江縣志建置序嘗觀風宗畫野測圭記里逮夫職方辨土保章立州尚矣秦漢以還郡縣屹峙雖名號易於時代而封域仍此山川是以欲觀天者占躔度欲察地者任土疆雖有聖人弗與易也吾邑在萬山中太倉稊米耳然辨方正位卜宅契龜昔之人有經畫焉敢曰故籍殘闕置而弗考乎自蜀山俔妺於黄初神禹樹徳於河洛載隆謨訓功配川嶽老彭博聞著聲商室萇𢎞忠赤於爍周朝是巴子未盟之先聖喆接跡秦錯未謀之日聲教早通况吾邑界接興元地域梁州者哉然秦漢以前記載罕著亦由簡樸不事縟煩今欲考志源流自漢始巴為三十六郡之一地屬千八百國之封均名宕渠列在兩漢班史紀十一縣范志同十四城蕞爾幅員延袤匪廣第以傳記不核莫問扶特之山時代已遷難訪曹源之水况經和帝之東北分置又兼先主之割省紛紜然欲考古昔必據今兹試以地輿按之巴州宕渠也保屬之蒼溪通江順屬之蓬營廣渠大嶽鄰夔屬之新寧皆宕渠地也二州八縣之廣千有餘里一宕渠也何延袤哉及考西漢志則為巴郡十一縣之一縣也東漢則為巴郡十四城之一城也而志載扶特之山今不知何地灊徐之谷今不知何名令人按圖悵惘耳又按巴郡記曰東漢和帝分宕渠之東置宣漢今之達州也州近在邑東似為近之今之蒼溪漢之漢昌記亦謂割渠之北所立也今以地里考之又殊不合將安所究問哉陳壽缺志三國失考僅見晉志所載有蜀先主割巴州之宕渠宣漢漢昌三縣為宕渠郡是宕渠固一縣也晉屬巴西載紀甚明而分注闕焉猶為憾事至於宋書為宕渠縣者三一屬華陽郡而係於下曰永初郡國並無一屬梁州之南宕渠而係於下曰永初郡國有宕渠郡領宕渠漢興二縣屬梁州元嘉十六年廢屬益州非此南宕渠也又曰何徐並無此郡一屬益州之南宕渠係於下曰起居注本屬梁州元嘉十六年廢是宋書之錯見也如此至於蕭齊志宕渠之郡五而冠以東西南北宕渠之縣三而不注建置沿革至隋開皇初廢宕渠縣而後人之考稽愈無據矣一統志謂邑在魏為諾水屬萬州今按此段僅見於隋唐書分注魏史俱未注别僅曰巴州郡縣闕而已豈邢巒之説不用而王足来奔尉迥之功方成而魏鼎已西無暇纂籍至漏簡編耶然邑西有磨巖石刻則諾水之號在焉不可謂非魏收之疎也梁陳無志北齊地狹吾每惜李延壽修南北史徒割紀傳之半未備志載之書使當日者搜之掌故詳考因革去古未遠為功或易奚至以點金成鐵貽譏後世哉若隋志之為始寜為符陽為白石原𨽻清化郡今皆邑之境内也若唐志為壁州為通江為廣納為符陽為白石為東巴即𨽻壁州今亦皆邑之境内也良由隋唐之際雖寇盜之充斥於天下者六十家而梁益之間無弄兵刃而盜名字者余每讀史至此未嘗不為當日之蜀人幸也以故人物殷盛州縣碁置隋唐之志吾無議焉五代初為王氏所據後唐滅蜀而入唐未幾而復為孟氏有矣縣之因革不可考壁州之名未有改也至宋開寳五年而壁廢矣白石符陽並省入通江焉元至元二十年省上通江下通江入罾口然廣納東巴尚未詳其廢自何年上下通江亦未著其置於何日覽者自不能不於邑也善乎沈約之言曰地里參差其詳難舉實由名號驟易境土屢分或一郡一縣割成四五四五之中亟有離合雖千回百改巧厯不算尋校推求未易精悉也則作志誠難責於後學矣吕潛唐山人詩序世稱唐山人詩瓢第謂隠居獨善者流耳以余觀其行事固介然則義士也當山人投詩江中匿影韜聲得一人知己足矣遑計千百世後哉乃一瓢泛泛若為蛟龍所䕶持不滅没於驚濤怒湍之中而光氣歴代猶新豈無故歟蓋山人生唐末不屈志權帥亮節高風可干霄漢故其寄之於詩精靈炳朗不受銷沈有如斯也今讀其詩僅三十餘首蒼勁閒逸猶可想見其人嗟乎夫人欲以布衣雄世而無鐵石心風霜氣譬一籜葉空中翺翔耳亦何繫輕重於人代乎余友青夕於中唐人中獨取數家可謂矜重矣而山人在焉非其介然之節義有合而取之也耶青夕謂余曰此蜀人也子序之余烏足以知山人姑就其大節論之如此陳書跋李鍾峩太史所録保寜志序志者古郡國史也吾蜀自承祚耆舊傳後作者迭興迨有明之世踵事增華猗與盛矣而升菴玉壘方洲三太史所輯為最著此蜀志源流大畧也曩者嵗在己丑余自閩旋里適梓潼邑侯袁公還樸奉檄纂輯邑志屬余校讐觀其所蒐羅書籍率皆殘編㫁簡雨漬蟲凋或有其人矣而事跡無徵或載其事矣而人地莫考至其詩文諸類間從榛莽中抄録一二以備數蓋兵燹以来紀載之殘蝕非一日矣既而薄逰成都見某年某撫軍所修省志則又綱目􅾦雜條例不清其間傳信傳疑恐亦未為允恊思得三太史舊本一寓目焉乃求之一二知交皆鮮有蔵者嗟乎陵谷變遷典籍淪没夫豈細故哉康熙丙子在京師見萬厯己未督學杜公所修志於王純嘏先生家因得借觀其書於三太史原本已三經修輯然常考敝邑鹽亭科第而先祖𢎞治八年經魁萬正公以篤行博學至今享祀鄉賢者亦遺漏不載其他又何可盡攷耶顧其體例正大去古未遠猶存三太史遺意爰摘録潼川志一册以備他日叅考而吾友雪原李君亦抄其保寜志一帙可謂有同心矣夫士君子於身所經歴一草一木猶將識之况其在父母之邦乎獨是三太史之原本吾蜀既不可復覯而其猶存三公之遺意者亦遠在數千里外積十數年求之而始得一見設今吾蜀州郡各有人焉在京人各録其本郡之一册以歸則是書縱不能全蓄於一家猶得散見於三蜀無如吾蜀居京師者既落落晨星而遇是書者又未必如吾兩人同志而吾兩人卒不能謀傭寫之資使此書完璧以歸蜀也可勝慨哉故叙而志之為雪原筆諸簡至若風土之宜甲第人物之美與夫山川之秀麗物産之繁賾編中具載覽者自知皆畧而不論云壬子武闈鄉試録序兹值壬子武闈奉㫖以督臣監臨試事體統愈重朝廷之大典益隆臣仍循舊例主試自揣譾陋倍増惶懼惟是矢公矢慎仰副皇上鄭重掄才之至意爰偕監臨四川總督臣黄廷桂監考四川重慶總兵官臣馬義提調驛鹽道僉事臣曹源邠監試松茂道參議臣鄭其儲同詣外場集督學臣周人驥所録武生暨文生員共一千二百六十餘人布政司臣劉應鼎彚送各標鎮協營兵丁六十餘人編次校閲馬步技勇得合式者八百四十餘人扃闈試以䇿論率同考試官湖北進士臣闞昌言臣吳率祖雲南進士臣李盛唐臣段開化虛衷披閲如額得四十人事竣就其前列者以次録論二䇿一恭呈御覽臣例得揚言於簡端竊惟人材者秉天地之秀川嶽之靈而實因乎氣運之隆培植之厚自古龍彲碩彦雷雨良材類皆應運而生連茹而起歴歴不爽也今聖朝樂育羣英裁成多士即棧壑梯山之逺雕題鑿齒之倫莫不驤首跂足欲自奮其智勇以佐太平矧西蜀峩峰屹屼錦水瀠洄其菁華清淑之氣有鍾於竒士者哉臣於己酉科典試武闈見夫麟麟炳炳實多疏附先後奔奏禦侮之材今科即其技藝文詞細加評隲覺猶是張弓挾矢也而正直有加焉猶是舉重挽強也而純熟有進焉猶是敷陳條對也而經濟較𢎞焉仰見我皇上敎澤之廣化導之神邉圉遐陬蒸然丕振如此由此而益精於技暢於詞且立德立功力敦乎實行器識文藝屏去其浮華他日受元戎長子之寄為好仇為腹心於以輝煌盛治鼓吹休明共襄基者於是乎在猗與休哉謹拜手以言聖天子萬年鞏固之疏申明言官職掌疏題為請申明言官之職掌以彰聖朝昌言之實政事昔時言路之途甚雜今專責於科道官是科道衙門原以盡言為職分也况恭逢聖明在上懸鞀止輦無殊神禹虚懐諸臣凡有條奏必蒙聖顔開霽從容下詢使得盡其所言其或所存緘黙又必諭㫖導之使言是非臣下知無不言言無不盡之時乃極皇上納諫如流豈言竭忠者寡其故何也以臺臣而言各道御史與堂上都御史皆以御史名官古制無甚統屬彼此得互相叅劾今則都御史視監察御史儼然為屬官矣殊非設官初制且各道御史奏疏於前都御史指叅於後其所以指叅者以御史不先預聞也阻塞言路莫此為甚至臣衙門職掌曰封駁曰紏叅曰條奏曰申救封駁申救乆已不行至於糾叅條奏未嘗不循分盡職也然誰則無所避忌直言無隱者耶間有直言者議事之臣非斥為釣譽沽名即目為紛更報怨且誣為受人囑託不思人非皇上豢性生忠烈不忍負身之功名性命冒此嫌疑哉即養之恩孰肯以一皇上允科道諸臣條奏有為行者亦有不允行者聖人無我必確見其應行與否乃因偶一不用遂相率以言為戒而羣目為多事之人必欲去之而後已若皇上聖非包容言官幾無容身之地矣伏乞明皇上申諭科道諸臣務皆秉公抒藎以副厥職不許瞻顧嫌怨茍且塞責各部諸臣凡議覆科道諸臣條奏止論其言之有無闗係虚公採取不得因所言之礙其行事輒用私意概以無容議具覆庶幾人各國有懷忠願盡之心而邊方末學止知抒誠報家受昌言之效矣臣主罔有瞻狥冒昧陳言伏乞皇上睿鑒施行李先復敬陳管見疏題為法無可貸情有可矜敬陳管見以廣皇仁事臣侍從臺班仰見我於各直省命盜重情必令法皇上愛惜民命刑期無刑每司再四平反方成信案熱審之後繼以秋審情真而外復予矜疑求生於可生之中無事不厪聖懷今嵗秋審如貴州田成士廣東俞堯福建羅東壽潘存誠九卿詹事科道會核以情真上皇聞改為緩決在廷諸臣咸頌上如天之仁殆不止泣罪解網而已也臣閱直省招册有盜命兩案首犯已經正法續獲之犯年遠贓物花費証佐無人歴審監候有至五六年者有甚至十餘年者此輩皆有罪之人而乆羈則聖心之所憫若不籲囹圄或至斃命縱日後弋獲証佐之恩曲賜矜全恐奄奄人亦難起九泉而問之矣近查廣東之大頭晚葉得有二犯已蒙綸音減等發落他如直隷之劉二棍子劉三陳大麻子竇麻子劉富正曹來文安金施承恩孫自友山東省張重臣龎一亮廣東省之黄立章湖廣省之呉重養江西省之葉憲章盛京之趙三此十六犯者贓物花費與夫証佐無人皆與大頭晚等相似應與大頭晚等同邀浩蕩今十六犯中有已經題請者有尚未題請者臣仰體皇上大徳好生請將劉二棍子等情由概予減等發落勅部照依大頭晚葉得有等電其皇上格外𢎞慈與天無極矣至若湖廣省之江金趙國竒四川省之毛文燦福建之巫珠既非正犯監禁已睿裁非乆應否從寛保釋俟獲正犯之日另審質結統候臣所敢擅便者也臣恊理山東道未與秋審妄陳睿鑒施芻蕘字多逾格伏乞行奉㫖該部議奏打箭爐設鎮疏題為爐蠻既經翦除駐防宜設重鎮仰祈睿鑒以奠遐方事竊惟我海甸要荒悉歸版籍不意打箭皇上承乾御極仁漸義摩命將出爐番蠻罔知向化致蒙首獻土歸誠此皆我師不數月之間營官授皇上指授方畧故師武臣力祇奉成功以上紓西顧之憂也臣係蜀人畧言蜀事近見四川巡撫貝和諾㑹覆侍郎滿丕等籲請官兵駐防一疏内開喇嘛與營官夥黨行惡年乆伊等夷性難料應設官兵三千名副將一員併逰守等駐防爐地仍令提臣一二年巡查一次等語其條議誠周且善也然臣伏思打箭爐地界綿亙千有餘里投誠之衆種類繁多現今遠遯之蠻所以伏居巢穴不敢肆其鴟張者祗以大兵雲集魄喪心悸故耳將来師旋之後商賈相通貨物屯聚其間保無有鷹眼未化因利乗便易其初心者乎是已附者窺伺萌奸新闢蠻疆正多可慮若止設副將駐防實不足以資彈壓而讋服遠人蓋副將於軍機大事不得自專萬一蠻人叵測一切軍機勢必請裁於督撫提鎮往返愆期貽悞匪細臣以為不若特設總兵官一員鎮守之為便事權歸一既無牽制之憂而大帥威嚴蠻人自有所畏而不敢動所轄鎮標遊守千把等官應各如額設總兵之數而化林營仍照題改設遊擊一員其應設兵丁共三千名除化林營原有兵五百七十五名外所不足之二千四百二十五名應於提標添設兵内調撥一千名再於川省各營額兵三萬六百二十名之内抽調一千四百二十五名俱照題定處所酌量緩急分汛庶免提臣一二年巡查之滋擾至於新増總兵併逰守等官亦於通省協鎮將弁内斟酌拔用一轉移間兵未嘗減糧不加増要地巖疆足資捍衞而蠢爾爐蠻天威於皆凜矣他若目前之建城池置營房以及應否設有赫睿裁臣立文職如松潘建昌之例伏候黄難盡伏乞從防邉善後起見字多逾格貼勅部議覆施行奉滿丕貝和諾㑹同一併詳議具奏㫖這條奏事情著河防疆界疏題為河防各有疆界變例苦樂不均仰祈勅部查覆舊制以杜紛更以免貽悞事我皇上勵精圖治勤恤民隠俯念河工重大躬親閱視其於江南開濬修築事宜喙矣獨是山東河南面諭河臣又下九卿㑹議無容臣置居徐邳上㳺地平土弱非若雍西高山大嶺以為夾束故每嵗必加修防蓋以山東河南為江南門户必門户完固而後堂室無虞為運道乆遠計也山東河堤北岸止曹單兩縣共計一百九十里此應分修築之工也其自戴家樓起至儀封縣交界止堤工三十里計長五千餘丈查係河南考城縣地方歴来修築無紊又康熙四年為哀辨河工地界等事經前河臣與山東督撫㑹同河南巡撫批令考城縣修築歴年奏銷册籍可據不意康熙二十五年河南考城知縣王如淮私詳河南㕔道轉詳前河臣靳輔咨部隨將考城三十里河汛險工歸併曹縣十餘年来代為修理官民交困臣作令曹縣時曾查明從前卷案通詳河臣于成龍後以河臣丁憂臣行取離任未經結案伏查考城三十里堤内如流通集崔家壩等二十二處係大鎮人烟甚密地為考城之地民為考城之民則堤工自應考城修築今歸併曹縣則是曹縣一百三十里堤工之外又加三十里之遠而考城獨手足寛閒亦苦樂不均之至矣且河防設官各有責成河南設通判一員主簿一員專駐考城以治豫省兩河之堤山東設同知一員主簿一員專駐曹縣以治東省兩河之堤今考城三十里之堤工推諉於曹縣則駐考城之通判主簿何所事事又查曹縣額役徭夫三百六十四名曹州定陶金鄉城武協濟徭夫六百二十三名撥充曹縣嵗修一百三十里堤工之役如有險工臨時尚須協調今又増考城堤工三十里夫不加増何能無悞又查考城河堤三十里併無歲修夫役止設㸔守河堤堡夫五十名今歸併曹縣管理而充役者仍係考城人民動輒私逃則河工稽查之難也又堡夫工食仍係河南道官給發則具文赴領之難也毎年奏銷亦赴河南道官核算則册籍造報之難也種種不一殊屬紛更臣令曹縣五載屢經險汛頂沖防曹縣堤工一百三十里止有傅家集險工一處防考城堤工三十里乃有柳林頭芝蔴庄險工二處晝夜隄防幸免沖決若不亟請復歸考城河工重大恐不能無顧此失彼之虞來春正月河臣例往曹邑查工伏祈勅下河臣于成龍協理河臣徐廷璽㑹同東撫臣王國昌豫撫臣李國亮親詣河汛正明疆界將此三十里堤工照二十五年以前仍歸河南考城縣官民修築庶兩省連界之民各得相安無事而河工不致貽誤矣臣因條陳山東河南河工酌復舊制事理字多逾格貼黄難盡伏祈睿鑒全覽施行奉㫖該部速議具奏請復内簾監試疏題為科場闗係大典仰請皇上酌復内簾監試以杜弊源事伏惟鄉㑹科場尤厪用人行政無一不斟酌盡善而於睿懷比者作人推恩廣額海内人士無不喁喁向風今年加意嚴綸議順天鄉試現奉之門振拔孤寒蓋亦至矣臣以為處所以杜倖進科場之弊與其既萌而嚴其法何如未發而絶其根查康熙十八年都察院左都御史臣魏象樞為弊竇多端等事議於内簾設滿漢御史各一員不與文事於聚奎堂上向上設坐㑹經堂左右歇宿專察内簾情弊以及拈題封門収卷封箱條奏極其詳明部議奉㫖遵行已乆自此數科闈中未聞物議而康熙二十六年臣衙門御史陸祖修乃以㑹試及順天鄉試内簾設滿漢御史各一員不與文事實屬無益因議停止在去之者臣不知其何心然自去内簾監試而科場乃往往滋弊矣臣請自今以後㑹試及順天鄉試勅部復設滿漢御史各一員於内簾監試其内簾監試事宜仍照康熙十八年所議條例遵行而皇上特簡清正有風力者以往如满漢御史有扶同狥私一經發覺併從嚴處庶弊端可塞而大典有光抑臣更有請者㑹試順天鄉試内簾供事人役例用禮部儒士夫儒士名目不識起於何時初不過書記奔走近聞闈中分卷打印暗通闗節悉由若輩之手在試官精明謹慎自能加意防閑稍失檢點鮮不墮其術中臣請嗣後闈中將儒士永不取用臨時於各部院衙門選擇老成無過字畫清楚書進辦四五名止令繕寫不假以事權更嚴禁其不許呈題名録及榜文併與房考往来交通是亦澄清塲屋弊竇之一端也如果臣言不謬伏祈睿鑒施行奉㫖該部議奏楚民寓蜀疏題為直陳楚民寓蜀之害伏祈勅部嚴加查逐以恤殘黎事竊照蜀省雖地居天末素稱沃野經明季流寇屠戮於是民無孑遺荒榛滿目國仰賴我三十餘年漸有起色復遭呉逆煽亂流毒家休養皇上赫六載幸然一怒天戈所指旋即撲滅而土廣人稀招徠為急我之二十年皇上軫念殘疆數罹兵燹謀所以撫綏而安全恩至渥來臣係蜀人伏念巴蜀界連秦楚地既遼濶兩省也國失業之民就近入籍墾田填實地方漸增賦税沔計民生豈不兩有攸賴乃近有楚省寶慶武岡陽等處人民或以罪逃或以欠糧懼比託名開荒攜家入蜀者不下數十萬其間果以開墾為業固不乏人而奸徒匪類擾害地方則有占人已熟田地者掘人祖宗墳墓者紏夥為竊為盜肆虐行刧者結黨兇毆倚强健訟又有私立㑹館凡一家有事率楚中羣兇横行無忌此告彼誣挾制官府者告比凡此臣皆得之傳聞未敢入遐齡揭帖為盜刧傷臣辦事衙門見湖北撫臣年命事沔陽州鄭錫我刧盜鄭价玉案内續獲盜犯鄭允文供云逃出就在四川度了兩年等語夫允文以盜案重犯逃入四川兩年則此數十萬楚民豈遂無鄭允文者乎臣請勅下四川撫臣于養志將楚民流寓蜀省開墾者令各州縣逐户確查實係楚省何處人民妻子親戚同居若干人開明籍貫仍取連名互結以防更名改姓之弊造貝清冊咨移楚撫查明原籍因何事逃出或係隻身或有妻子兄弟共幾名口並無過犯取具各州縣印結轉咨川省存案方准開墾入籍當差如因犯罪私逃如鄭允文之類及欠糧避差不法者亦令楚省州縣開明犯罪事由何事逃出或隻身或妻子兄弟幾名口轉咨川撫即行逐一清查遞解回籍仍照原案歸結庶奸民不致漏網而蜀省殘黎永享無事之福矣其入蜀楚民實係開墾樂業不敢為非者該地方官亦應照蜀民一體撫恤不得借端驅逐鋤暴安良此又並行不悖者也如果臣言不謬伏祈勅部議覆施行奉㫖該部議奏楚省五縣南糧疏題為楚省五縣南糧本色解運維艱仰祈勅部改徵折色以便兵民事竊臣以西蜀豎儒七年外吏荷蒙隆恩異數拔置臺班辦事衙門仰見我弊籌畫精詳務使皇上天地為心勤恤民隠於凡民生利膏澤下流無一夫不獲其所大哉堯舜之仁不復過矣臣至愚極陋何能仰贊皇高深謹以見聞所及者敬為我以協濟本省駐防官兵上陳之伏查楚省南糧一項所荆州鄖陽襄陽武昌皆官兵駐防之所每年秋成後徵収本色解交各汛支放兵糧臨江各州縣船載直達各汛無甚煩難獨是黄州府屬之黄梅麻城黄安三縣武昌府屬之通山大冶二縣僻處萬山之中雖地原産米而崇巖峻嶺不通舟楫肩挑背負為數無多輓運之賫倍於米價矣近来每遇開徵各縣亦詳請改折但須候督撫批允始得改折及改折時又將折色解赴糧道轉差各汛買交亦滋往来文移之擾其或仍收本色百姓間於鄰近州縣糴買交倉又有鋪户勒索高價之苦蓋每年開徵時各縣未嘗不詳請而改折迄無成例民困不支目今七月正南糧開徵之時伏祈勅行楚省督撫湖北南糧除臨江州縣仍照例徵本色外其黄梅麻城黄安通山大冶五縣南糧共二萬七千二百二十二石八斗零准其改徵折色即令各縣解交荆鄖等汛永為成例在兵有因時購買之益在民無山路輓輸之艱一轉移間兵民咸得其便矣臣再查荆襄諸郡皆産米之鄉米價不甚騰貴每南糧倉斗一石折銀以六錢五分為率倘慮豐歉或有低昻則酌量至七錢一石至足也倘蒙恩改折仍飭各縣不得另立名色即於地丁内彚徵分解以免滋弊五縣窮黎世世頂祝皇仁與天無極矣縁係條陳楚省南糧事理字多逾格如果臣言可採伏祈睿鑒施行為此具本謹題奉㫖該部議奏傳沈汝霖孝子趙延吾傳孝子諱延吾字又安係綿州安縣人儀部宗普公冢孫性純孝事父母惟謹幼岐嶷不凡垂髫補郡弟子員試輒高等孝子家甚貧饔飱莫繼孝子不忍垂白枵憊遂赴邑城課童蒙資升斗以奉親每得粟孝子即躬負歸家恬不為瘁嵗丁未七月淫雨連旬河水暴漲時新穀告登孝子將所得館米二斗急欲歸獻以備晨炊遂負之行渡至中流巨浸衝激孝子獨力莫支負米偃仆遂以淹溺告終次日漉孝子於積沙中僵植危立玉色如生闔邑為之悲悼邑侯呉公輯孝子平生行畧詳之郡伯冀公復上之學憲孫公以請祀鄉賢因額其祠曰文孝行令公為之致祭於家焉矣楚辰沈汝霖曰古有以赴湯蹈火俠烈著聞者未有為親負米殞身於洪濤巨浪中人莫知之如趙孝子之所為者説者方之仲由曾參以為無愧古人余則更有進焉方其褰裳思濟時使稍涉瞻顧則深厲淺揭必望洋而返矣孝子不然此志之所以皎皎也使天假以年克自表樹顯可備國家股肱之用隠當作儒林山斗之型何以竟奪之速嗚呼痛哉雖然沙岸猶存芳魂不遠後之人過而指之曰此趙孝子負米殞身處則孝子之死而生矣墓誌銘王士禎行健趙先生墓誌銘康熙壬子予有蜀役蜀士之才美者多從遊而西充二趙子心抃心普兄弟尤卓犖竒偉因獲聞其尊人行健先生之賢又二十四年心抃官給事中與予同在京師於是先生年八十餘矣而神明不衰每家書至皆蠅頭細書所以教誡心抃者不啻辟咡提命以為先生期頤未有艾也無何心抃視河報命歸而先生訃聞心抃擗踊泣血次先生行述稽顙来乞銘嗚呼予以通門之舊仰止先生餘二十年矣其忍不銘按家乗趙氏之先本秦人明初徙蜀西充至良佐者有學行稱石橋處士處士子純純子延年家益起好施予鄉鄰待以舉火者恒數百家有二子長曰永慶次即先生諱長慶行健其字先生世祖章年十五補博士弟子有聲抜貢入國學謁選人得皇帝順治十年甲午始以棗强縣丞為政平恕蒞事明決令長取裁焉縣有大繇役輒倚辦事訖而民不知勞故上官重之有加禮俾署高邑武邑兩縣治狀著聞兩縣人尸祝之㑹以武邑逃人案詿誤去官縣之父老子弟籲留不可則宿舂糧泣涕走送百里外其感人如此先生既歸閉門授徒户屨恒滿其訓心抃兄弟曰讀聖賢書貴明義理非祗佔􅖶章句梯榮媒利為仕進羔鴈也人能將賢賢易色吾日三省吾身二章身體而力行之其去聖賢不遠富貴利達非所知也先生事父母至孝喪葬一遵古禮兄殁撫兩從子如子崇禎末蜀大疫里有一室七人同日併命者先生往經紀其喪無所畏避先生父病彌留舉逋欠契莂百紙悉焚之曰天災流行變難將作吾得正首丘幸矣彼窶人子勿更苦之先生泣受教及獻賊躪蜀屠戮靡孑遺胔骼狼籍道路亂定先生率童僕躬自收瘞匝月乃畢將瘞雲雷驟作雨大至先生跪禱曰天豈不欲刧餘枯骨復於土耶抑某心未誠不蒙神鑒耶禱竟而霽人皆異之先生自祖父隂行為善至是益好行其徳大亂之後家僅具饘粥而親黨之不能葬不能婚嫁者賙給無倦色鄉人以不平来訴先飲之酒乃婉言以明其是非人率悦服一邑化之以鬭爭為恥獄訟為之衰息康熙十三年呉三桂作逆偽檄至蜀脅士大夫先生挈諸子遁山谷以免亡何賊平先生天威撻乃復故廬謂心抃曰出而仕矣心抃令太平以課伐四方寜謐子可以最入為兵科給事中守先生之教罔敢隕墜其以給事需次歸也先生教之曰小子幸叨聖恩備員諫官補闕拾遺是其職也勿黙黙則曠官勿激激則近名小子慎之心抃居門下省一載章十數上皆闗天下大計而立言一本忠厚識者謂得諌官之體蓋先生之教也康熙三十三年心抃奉簡命視河工於淮揚明年二月還京師而先生考終於家無疾坐逝若禪定然銘曰南岷之山靈氣輸國僊人所家以葆厥真行同王烈居近何岷孰云幽宫閬臺與鄰華表歸来福爾後昆李仙根王璲暨元配熊氏墓誌銘公諱璲字元佩號子荆明大司徒希泉公之仲子也大司徒子六人公最賢歴官中外所至輒有政聲退處三十年日以著書為事絶不與世通而宇内談經濟風雅者莫不推蜀北子荆先生云自西南播亂蜀道阻絶余官京師望故鄉如異國庚申大兵平蜀越一嵗而公訃至今夏冢君以誌銘請於余於戲余與公有世好之誼素所景仰其公之可傳者皆見之余文也微斯請余亦烏可辭謹按狀曰王氏系出瑯琊宋南渡入浙元末入蜀居廣安世以科第顯至司徒公益盛公負姿淵穎十嵗餘博通羣籍補博士弟子員時司徒公官於朝公侍太夫人有小失受責不敢起太夫人病奉湯藥衣不解帶司徒公卒於任聞訃哀毁骨立往返數千里奔喪扶櫬請誥請䘏以至經營壠墓事事咸當是時公方二十許而練達恒如老成人非其純孝誠篤出於天性者然耶服闋以明經承門䕃初授順天治中再移南户部江西司主事督常徳銅差一時聲譽籍甚旋丁太夫人艱歸起南户部新餉司郎中遷廣西左江道未任國旅食江南絶意仕進强之始起授江西驛鹽副使初當道聞其才名屢公訪求驛政最急者莫如黄快丁每因漕累破家而舊設沿江諸驛往来悉索靡寜公分别黄運一倣雨田倪公法漕撫以庇䕶快丁劾奏吏議終直公勒為令典名船政新書改金陵三驛設城内多寡之數悉由官府不能强驅一人江寜食鹽苦商人高下公阻商餽聴民自為便宜尋擢荆南大叅去之日老幼擁道為立仁壽祠江寜人至今尸祝之入楚駐節澧州時黔蜀未歸版圖密邇巨寇先是官兹土者駐澧市寇来登舟公率士民歸城闢官舍創學校備戰具給牛種以屯田暇則與詞人酬處盤錯棘手時晏如也慮者以澧斗大孤城公文儒長者猝有變當奈何而流冦王進財張光華果率精鋭三萬薄城下公冐矢石指揮士卒相持兩月突出竒兵大捷於洋湖口八戰八克進財走死光華僅以身免一時推公知兵楚中方以為長城不意為讐家所中解官後益肆力於古學與呉人邢昉周景濂顧夢㳺豫章周亮工陳伯璣楚人王天庚嚴平子張禎曹國樸蜀人尹子求范文光李長祥輩稱詩揚㩁論難絶去畦町而旁及西洋勾股岐黄養生堪輿家言法書名畫種植修造靡不究習著述三千餘種皆確期有裨於世用公之長兄璟河南項城縣令三弟珣貴州普安道四弟瑨雲南順寜太守五弟瑊廩生六弟瓘庠生公年七十追念升沈半在患難而諸昆弟存亡散失天各一方西望大司徒墓誰為掃者輒愴然泣下遂攜歸廣安樂兔山山水佳勝用西洋法築生壙一區辛酉九月疾作奉遺命卒後三日歸􅉎公時年八十二嵗元配恭人熊氏先公二十年卒於澧浦癸亥春冢君有師扶柩至起壙祔葬焉公五子五女長有師貢生熊氏出次有鼎庠生趙氏出三有馮壬子舉人四有章庠生周氏出五有經庠生李氏出長女有崑適舉人宋起莘子詰庠生熊氏出次女有峑適梁山進士暴巖高公匹子商南知縣宗梅有芷適富順翰林雪灘陳公三子庠生厥有蘅適叙府進士凌霄宗公三子太學生之瑚有蓀適泗州教諭佩公顧公仲子庠生清江俱周氏出孫十一人長鏞庠生有師出次鑄庠生鋐鎮有馮出鎔鎬鉞鑑錬鐘有章出銑有經出重孫懷仁鏞出余嘗聞公好義樂施周人之急恤人之難如迎明季殉難河南大中丞文岳楊公汝寜刺史世琮王公喪治棺殯送歸蜀土代部吏償官逋三百金以全二女仍為擇士厚資奩嫁此其較著者也署江南臬司時有常熟大宗伯牧齋錢公為豪滑所訐公極力䕶持置訐者於法錢公致千金謝不受又輦古玩好重千金拒益堅錢喟然嘆曰希泉公可謂有子矣其生平蓋如此惜中道坎壈齟齬卒不得竟用以展其所學嗚呼豈非天哉銘曰惟彼砥柱狂波不折鋒鍔雖弢考終大耊兔山峩峩兮江水冽恭人楚歸獲同穴相白雲之捲舒而云胡不悦祭文冀應熊祭簡州濟川橋孤魂文大凡國家祀典各有攸屬嵗序舉行亦有定隅即如無祀孤魂因時設祭府屬之内原立郡厲州厲邑厲之壇時嵗之中聿定清明中元冬初之節非其地則祭為無名非其官則祭為失禮兹以郡守而致祭州厲以侵屬僚之權且於橋下而設祀孤魂爰失定制之體然而禮以義起祭以情通是則今日郡守之祀孤魂於橋下也請得言其説予於是嵗之七月十有二日因督修浮橋危坐江濱遂進父老而詢地方艱苦適有嵗進士李為楫等博士弟子員李開恒等垂涕而道曰簡自甲申嵗遭獻逆犯蜀設為水軍二都督屯駐灌水壩勦殺九井之居民至乙酉偽令盡勒各邨衆姓入城仲冬發賊兵抵簡驅兩城紳衿百姓男婦老穉盡填濟川橋下赤水為之不流可憐盈萬生靈悉成寃鬼闔簡無祀孤魂俱在此一泓浩淼中爾予聞之不覺潸然淚下嗟此黔黎何遭刧運至此耶夫守土而不能使生者安居死者瞑目亦焉用長民者為哉矧此盈萬寃魂屈沈廿載求脱生而未能望享死而難得呻吟於星月之下呼籲於汪洋之中積怨氣以干天和聚厲鬼而為人祟不但死者難伸其寃即生者莫寜其宇興言及此負咎未遑又奚暇計非其官非其地之為嫌也然更可異者予方與州牧州尉及學博共議延僧設醮大放河燈施食而濟川橋下忽水湧尺許若有物焉以伸首者數四衆皆驚視迨遣人渡筏往覷之則杳然止水耳噫嘻此非二十年前諸寃鬼若有所聞而引領以待之也耶洵若此則予今日之祭正所謂禮以義起祭以情通而地適當其地官斯服其官者矣時州牧進曰浮橋成而上下不病涉孤魂祀而生死悉銜恩厥功普哉予曰不然予匏羈守土之官也使非有郊迎撫憲之行予曷由而至簡非有藩臬兩臺督橋之委予又安能以旬日留簡非有諸父老環泣而道予又何事而有祀於簡則此一役也實諸上臺有以相成予不過宣上之徳意以順下之輿情而已予何敢貪天功焉因請列銜以誌之遂為之致誄辭曰咨爾孤魂罹兹異刧匪人是尤實天作孽天降喪亂産彼無良檮杌獍梟屠此一方老穉何辜羣膏血刃窮谷荒村搜羅畢盡嵗屆乙酉偽令仇民厥凶降簡促野歸城遄發冦兵四圍邏集烈焰燭天兩城如炙中間赤水橋曰濟川焚梁燬屋百刃共淵哀我士民莫分男婦驅納溝中屍填可渡十千慘鬼廿載淵沈洪滔碧血白骨青燐上下隨波遊魂莫止夜月凄風誰焚陌紙予役陽安徒杠河畔諮諏民艱凶矜是念方延寶筏度兹羣靈霎時浪湧白日現形幽明罔殊人鬼一理綏爾九泉寜我百里爰商牧屬勷此良縁拯援諸苦以控於天伏願神祇洋洋降鑒拔此孤魂式登彼岸諸魂目瞑戾氣以銷四方生聚共享熙皥雜著李蕃通江縣星野考舊志曰古壁州居鶉首之次天文井鬼分野入參七度按班固天文志觜觿參益州東井輿鬼雍州按東坡指掌天象分野圖云觜參星曰實沈州曰益州官曰隂陽時曰申是益為實沈之次也井鬼星曰鶉首州曰雍宫曰巨蟹時曰未是雍為鶉首之次也而唐史謂觜觿參伐實沈也自畢十度餘八百四十一杪四之一參七度終東井十一度為秦晉其地上應天闕東井輿鬼鶉首也自東井十二度餘二千一百七十二杪十五太中東井二十七度終栁六度自漢三輔及北地上郡盡巴蜀漢中之地古秦梁芮豐扈密庸蜀羌髳之國自漢中東盡華陽與鶉首相接又謂興元府下金洋鳯與利集壁巴等二十州為鶉首由此舊志所以謂為井鬼分野也又按二十八辰分野之圖云自畢十二度至井十五度為實沈而分注之云益州永興河東河西北路是自井十六度至栁八度為鶉首而分注之云雍州永興五路及四川似以益與四川分為二而躔度幾不可攷今按晉志十二次度數及州郡躔次以十二辰配十二野則通江而上如保寜似非井鬼分野也今以觜參井鬼之次言之本圖云益州入參七度廣漢入觜四度越巂入觜三度蜀郡入參一度犍為入參三度牂牁入參五度巴郡入參八度漢中入參九度未嘗為井鬼分也而井鬼為秦雍州雲中入井一度定襄入井八度上黨入輿鬼二度是井鬼為秦分而觜參為蜀川無疑惟以輿地騐之觜參為魏分魏在三河之間越秦漢而與蜀益同一分野是難以詰辨即入參七度以巴郡漢中之分考之亦微有不合噫人無甘石之學而欲試推步之法其不為識者所笑乎謹因所見而附於後以俟後之君子記觜參應為實沈之次其曰鶉首從唐書也史正義星經云畢觜參魏之分野益州東井輿鬼秦之分野雍州禹穴辨蕃二十而南遊江淮上㑹稽探禹穴闚九疑子長之自叙所謂足跡半天下也後人不察止以意為㫁若曰上㑹稽而探禹穴云爾如呉越春秋謂宛委山有一穴探不見底謂之禹穴括地志謂山中稽探又有一穴深不見底謂之禹穴史遷云上㑹禹穴即此穴也而五帝紀張晏謂禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴皆誤讀史記而禹穴遂誤在㑹稽矣今詳考諸書如左易林大禹生石夷之野正義禹名文命字密身長九尺二寸西夷之人也帝王紀禹以六月六日生於石紐身長九尺二寸西夷之人也蜀王本紀禹本汶山郡廣柔縣人也生於石紐括地志茂州汶川縣石紐山在縣西七十三里華陽國志大禹生於石紐今夷人共營其地方百里不敢居牧至今猶不敢放六畜東漢書戴良字叔鸞汝南人嘗自比若仲尼長東魯大禹生西羌水經注禹生於蜀之廣柔縣石紐邨一統志禹穴在石泉治之北大禹生此外書升菴著廣柔隋改汶川今之石泉縣也石紐邨今之石鼓山也其山朝暮二時有五色霞氣又有大禹採藥亭在大業山其地藥氣觸人往往不可到禹穴者禹蔵書之所也按正義禹至衡山夢見繡谷男子自稱元夷蒼水使者卻倚覆釡之山東顧謂禹曰欲得我山神之書者齊於黄帝之岳巖石之下三月季庚乃登宛委之山發石得金簡玉字以知水泉之脈及治水功成乃蔵書於所生之地焉按廣輿記㑹稽之穴石如臼可知非蔵書所也張鵬翮治鏡録功過格其傳已乆自了凡袁氏力行有效而後之士大夫往往重行之然袁氏以儒而惑於釋氏因果報應之説以勸誘後人後人亦皆習焉不察夫為善而有祈福之念則其為善也必不公去惡而有畏禍之念則其去惡也必不誠以不誠不公之心存於中而徒以為善去惡之事勉强致飾於其外吾恐其功日微而過日滋矣奚取夫日懸一格而丹黄識之曰某事為功若干某事為過若干哉近有刋布當官功過格以風於百爾有位者予覽之而深嘉其意又惜其仍惑於釋氏之説而不本於儒者正誼不謀利明道不計功之㫖乃為之易其説以進焉夫人之居恒功過其所係猶輕而當官者之為功過也不綦艱且鉅哉治一邑者以一邑為功過治一郡者以一郡為功過上之居方面之任則其功過有愈大者焉更上之而處輔弼之位則功過又有愈大者焉要其本不越於一心而已茍能以虛心講求以實心幹濟以精心照察以公心推行毋沽名毋懼謗母矜已毋狥人總以上不負國下不負民而為清夜自矢之素縱未敢言功亦可以無大過矣功過格雖不設可也雖然功過之成其相懸幾若河漢而功過之始其相别僅同淄澠是以古之上哲盤盂几杖銘誦箴䂓猶且觸於目警於心朝夕罔敢豫怠而况其下焉者乎茍任其氣質之偏憑胸臆以行之而非有學問察識之功則居官臨民之際一切兵刑錢穀禁令興革之宜自謂可以有功而每以隠伏其過於不覺後雖悔之而無及矣曾子曰吾日三省吾身孟子曰行有不得者皆反求諸已是故格物致知正心誠意當功過未形之先而所以密其存養者不可以一偶怠也審擇義利堅持取舍功過將形之初而所以嚴其省察者不可以或忽也昔者董安于性緩佩弦以自急西門豹性急佩韋以自緩皆將以矯其偏而約之中而唐太宗之言曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失今兹記功書過之格其亦古人韋弦之意而以備當官者之一鑑殆不為無助乎倘必曰如此而有功如此而無過如此而可以邀福可以遠禍則行道而有市心非予之所願聞也高人龍梁山縣學碑記聖人之道通天地亙古今合遠邇無有乎或遺無有乎或間者也天得之而永清地得之而永寜凡日星河嶽之大以及昆蟲草木之細莫不賴斯道焉以範圍而曲成之羲農而上無論矣爰自三代以迄於今凡紀綱法度之端政教禮樂之統莫不賴斯道焉以經緯而損益之至於通都大邑文物殷繁僻壤遐陬山谷深阻諸凡鄉黨室家之内日用飲食以及風謠習尚之間循斯道則治悖斯道則亂蓋天下一家家一人人一心也大哉聖人之道孔乎而集羣聖之大成開百代以立極者惟我徳報子故帝王南面而治天下必建學秩祀而崇功之無盡者洵識其本已天子之學曰成均諸侯之學曰泮宫黨有庠術有序家有塾蓋天下無可不學之人亦無可不學之地而時代之升降氣數之盛衰鮮不由之自秦以還馬鹿甫定太牢肆興橋門之盛比隆三古若唐若宋皆其選也慶厯中詔令天下州縣立學迄今遂為定制顧古今之學雖同而古今之教則異矣周禮大司徒以鄉三物教萬民而賓興之初一曰六徳次二曰六行次三曰六藝以故人材輩出風俗寖美馴致治隆化治而比屋可封夫亦恃有此具焉耳自科舉法興上之選舉恒於斯下之仕進恒於斯相沿既乆於是逢掖之徒胥視學為梯榮干禄之徑父教其子兄教其弟類弄筆墨拾青紫以相與為光寵而止豈惟六徳六行之不講即所謂六藝者較今帖括之文為何如也人材將何由而盛風俗將何由而美哉雖然亦患在不知聖人之道耳聖人之道在六經六經之理則皆具於人之一心由修悖而有吉凶是謂心易由得失而有因革是謂心書由善惡而有美刺是謂心詩心有是非春秋因之以作心有中和禮樂因之以起聖人以其心詔乎天下後世者可謂詳且切矣夫人不能自見其心故無由以見聖人之心因不知有聖人之道何怪乎離經畔道而惟利欲之歸也嗚呼利欲之蝕人心乆矣一旦欲舉而廓清之舍學無由舍學而求諸本心之正更無由學者誠能由心之存以驗心之發體之以誠守之以敬擴而充之以勇將所謂六經以及六徳六行六藝者皆在是矣處而士習以端出而治功以懋即於科舉中取之何不可者然則科舉何足以累人哉亦人之自累實甚耳吾梁為東川鉅邑舊學在城南隅明末流冦蹂躪殿堂銷燬國朝初甫平蜀疆庶務草創迨文廟僅屋三楹為春秋祭奠之所兩廡㦸門以師生之舍庖湢之屬聖㮣皆闕如於是邑侯王君若羲瞿然懼無以妥靈倡教化稱天子一道同風之指肆首捐資庀材鳩工以次葺治之匪直為觀美而已蓋以移風俗育人材俾梁之人有所觀感而興起也故予為之記以諗里人俾落成而刋諸石使知返求諸一心而聖人之道乃賴以不墜云吕潛高惕菴語録序讀惕菴語録而不腠斯道盛衰之感也鄒魯既遠言人人殊惟河汾濂洛諸君子起頗得千載已墜之緒繼是名儒輩出臯比日新明三百年間河東姚江最著沿及末流不無龎襍之譏迄於今而遂成絶響矣夫道學之敝也名盛而實已衰吾甚疑乎其實亦實亡而名且並廢吾又惜乎其名至於名廢而世遂不知講學為何事輒相與非而笑之人心之不醇風俗之不古由此其故也梁山高子惕菴有憂之於是毅然以講學為己任捐鏹葺屋日與二三門人講習其中遠近向風駸駸有昔賢之遺軌焉李子仙根録其答問之語顔曰惕菴語録余得受而卒業焉見其迎機導窽則庖丁之無全牛也芟繁黜異則迅風之掃秋籜也抑且單詞隻語居要不煩則又對東郭順子而令人之意消也雖惕菴之學不盡於問答即當時之問答亦不盡於此録而此其類著矣吾蜀固多君子伊川客涪而易學愈進嘉靖南充少海任公瀚倡道經筵已而乞休講學五十餘年著述甚富梁邑瞿塘来公知徳早領隆慶壬子鄉薦中年著有易註日録諸書惕菴生来公之鄉宜其後先競美也夫李仙根高霖公廬山紀遊跋昔覽廬山志王弇州有紀無詩鍾退谷有詩無紀採者之遺耶兹山靈勝筆不能盡耶抑各有所限耶霖公先生高才積學當代偉人山川清興著作如林數日間兩遊廬嶽雖未能即窮其勝然星渚以南潯陽以北亦佳處領其要矣詩宗唐音鏗訇俊逸妙絶一時紀崇正學懷大雅有侃然自任之心凡神竒仙佛之説皆屏而不録豈非儒學之正宗乎至流連泉石詠嘯雲烟則又未足為霖公先生稱詡矣四川通志卷四十七欽定四庫全書四川通志卷四十七皇清藝文詩梁清寛奉使江瀆廟詩江干遠祀答神功聖主新恩九域同已幸長波平巨浪寜忘徧野集飛鴻流移望冷眉山月耕鑿思龡黍谷風疾苦殊方今尚劇亟旌㢘吏拯民恫汪琬巴州歌巴水遙連蜀道長哀猿落木兩茫茫劍門山勢都如鍔莫怪行人易㫁腸無滕王亭子與雲齊十尺朱欄萬仞梯那使君登眺處滿簷山色杜鵑啼送人司李成都鳯城垂柳為君攀西去髙軒指散闗望帝愁魂春樹外臥龍故壘夕陽間天懸鳥道連三峽地入蠶叢控百蠻到日不妨頻弔古訟庭草長簿書閒張徳地詠瑞麥詩六載殘疆叨重任勤勞惟有帝九重知恩承召天和秀七岐瑞靄自能鍾蜀産來牟不命榮三錫麥聖主何必誦周詩微臣莫遂涓埃報當雨露垂楊思聖遊錦屏山武侯祠詩廟貌依然在悲凉舊業空河流猶漢水山色似隆中今古慿欄盡乾坤極目同斜陽霜氣肅涕淚落西風題閬城陳氏兄弟書巖詩讀書兄弟好巖洞已千秋池涸荷香謝堂空桂樹留鳴泉風自答谷鳥韻相酬破壁遺文在摩崖記勝逰王士禎望青城山雲氣連西域名山作漢標千秋軒帝蹟每夜岳靈朝玉宇凌丹壑神鸞下碧霄丈人一招手天路未應遙眉州謁三蘇公祠祠即故宅今為眉山書院如蟇頤山色腴不枯玻瓈江水醍醐眉州城郭刧灰後水塍漠漠成榛蕪郵亭下馬詢老卒蘇公故第域西隅旋來束帶薦蘋藻辰良何必煩神巫往者此地鐡脚亂作維公大節據高門大宅皆焚如此祠巋然誰所驚頑愚雙柏輪囷溜霜雨廷立冠劍古文夫長公遺像龍眠筆馬劵剝落涪翁書一水谷殘碑揷笏尚林立紫藤碧蘚纒龜趺祠西最蕭瑟經霜菡萏猶扶疎甘蕉一丈覆簷霤落花亂迸紅珊瑚當年結構不草草要令咫尺成江湖故園如此不歸老與人家國徒區區瓊儋雷藤歴九死口甘熏鼠随猿狙頭綱八餅有何意桄榔萬里非吾廬兩公神靈未磨滅應翳白鳯逰清都遊戲下界亦聊爾鯤鵬豈必搶枋榆眉州玻􅝃天馬駒酹公三酹公歸乎登高望山絶頂望峩眉三江作歌四海復四海九州還九州河伯帝蓬萊海若更相笑蟪蛄何足知春秋今年辭失喜太華宫乗風偶作西南逰中條姑射不足數揚高旒河潼遠坼巨靈跖鈎梯百丈臨龍湫終南太白幻雲物秦棧佶屈哀猿愁錦城小住五十日岷山秀色垂簾釣青城玉壘尻首接灌口屈注雙江流興極欲蹋大峨脊却騎瘦馬來龍逰嘉州罨畫枕江上孤峰縹緲東南浮神霄玉清有遺跡登臨可以消煩憂蹋泥盤盤到絶頂江山披豁開雙眸峰巒八面簇金碧下瞰江海如浮漚八十四盤在衣帶氣凌五岳驕公侯暮雲早雪互明滅兠羅綿現無時休岷江從東來奔騰廻萬牛沫水滙青衣簸蕩千斛舟三江九峰倐然合丹崖翠嶂窮雕鏤江山竒麗冠天下何意絶景來蠻陬天風蓬勃日西墜搔首欲去仍淹留荆呉萬里自兹始來朝起柁尋巴丘岑公洞岑公昔學道遺跡空山中洞門界飛流白日生雷風石髓無古今鍾乳盡玲瓏巖泉日穿穴點滴成窪窿中央若累棊狡獪造化功頺竈倚青壁中夜丹砂紅睠彼遺世翁於此悟參同壁間題字人嵗月何匆匆巨碑亦笏立文詞競豪雄中間岑襄州頗擅語句工豈其南陽裔源流故難窮此洞與魯池望望江流通昔是仙靈宅今為豺虎叢太息下山麓風健孤帆東晩登夔府東城樓望八陣圖永安宫殿莽榛蕪炎漢存亡六尺孤城上風雲猶䕶蜀江間波浪失吞呉魚龍夜偃三巴路蛇鳥秋懸八陣圖搔首桓公慿弔處猿聲落日滿夔巫瀼西謁少陵先生祠五首選二首口萬古瀼西宅斜連峽闗髙雲魚武縣秋水麝香山老作諸侯客心依供奉班樊川臨素滻遺恨不生還浩刧遺祠在依然白帝城岸連巫峽影門對蜀江聲太息隆中業平生庾信情艱難詩萬首夔府至今名謁白帝城昭烈武侯廟赤甲山頭雲氣蒼楓林蕭瑟落微霜漁人故壘生秋草鳥道寒空掛夕陽當日君臣真灑落至今祠廟有輝光江流薄暮聞笳鼓廻首中原泣數行張光祖題學宫愛兹石一端詩愛兹石一端質直復潔皖矩度無偏頗規模得易簡試問所由來父老言笑莞此物非有竒石室舊方限噫嘻兹石方曽經文翁僝刧火幾孑遺若木獨完産沖穆尚赫喧疏越猶瑟僴上下千年餘太守能識揀我聞高自標自不入俗眼我聞牧自卑自不逢時􅏌吁嗟都人士為愛兹石撰君不見芙蕖石室肇文翁蜀士彬彬鄒魯風一綫常存吾道力千秋永祝表章功當年典籍興治化此日追揚厲學宫仰止高山無限意蕭條豎立法堂中南廷鉉瑞麥行皇帝八載月在午文山有麥七岐吐錦浪翩翩五日風珍芒濯濯十朝雨田家乍見詫非常州郡轉上中丞天子前府中丞歸獻天子曰都休惟汝三錫命兮素繭抽廷僚動色徵徵羽不腆時叨宗伯郎按歌幾見行雲舞福曜遙曕神早命西南馳掃門無自徒延佇一朝銜徳與𢎞功筆端無力來邀禄幸䕃中丞宇中丞厚難為譜大者經營榛莽間夙興夜寐懷靡盬勞来心力竭無遺哀鴻次第就安堵粤稽伊始造蠶叢特簡踵氣鍾石紐生神禹中丞蜀稱陸海李氷貽士林山司空弼時仔肩文變虎斗文翁祖艱難之際武侯賢琴鶴飛鳴清獻圃粒我蒸民稷配天我公玉振羣公覩五丁神力何足天顔薄多七岐瑞靄誠軼古喜溢時曾誦滿庭芳於今復海聞百靈將順先牟糈往見文山武和氣致祥理固然况是民天符斗數衆維魚矣旐維旟大人占之豐且聚碌碌忝竊茂之陲欣承下風能無語吁嗟乎漁陽樂不支青田頌可取碧雞金馬往往奏神竒何如家給七岐之麥黍朱嘉徵遊浣花溪訪拾遺草堂詩郊南十里浣花溪溪繞空原東復西題壁總隨蝌蚪漫穿林不住鳥聲啼詩情欲傲千峰出野興頻牽萬木低余亦愁心江上客故園芳草日萋萋翁佶小河道中詩誰鑿鴻濛一綫開盤空鳥道傍巖隈遙通隔岸縁繩度忽㫁懸崖接棧來樹杪穿雲疑作雪石横障水激成雷祇因鎖鑰西陲重不惜流沙遠堠臺黄鈁瑞麥詩堯廷推后稷粒民功配天矧從榛棘後隻手闢疆田誠惠撫孑遺歸鴻樂受廛解刀爭佩犢遠邨烟火連積和相感召祥應屢豐年嘉植貽來牟文山七穗妍拜疏告我后增徳達穹天臣矢潔蠲堂㢘交䇿勵喜起想當然聖主豈言瑞勉特典錫纁組用章節鉞賢兼旌吏與農二張名奕奕今事恩賫一何專西顧使君重漁陽麥秀傳更超前玉壘雲為捲錦江春倍宣猶懷臣職歉率屬猛加鞭覃慮蠻荒外綢繆周萬全務期膏雨徧王㑹極無邊孫如芝流盃池山亭詩趨侍大中丞憲駕觀原州牧黄魯直所鑿石上南極二字登節鎮名藩控上遊元戎小隊領諸侯省方不倦臨興出牧何妨碣石留樓對黄公雲羃羃江連白帝水悠悠松州雪嶺烽烟靜天外寒光倚劎收戎州勝蹟枕山根禹鑿寒江舊闢門空裏已開池九曲望中猶聳石雙蹲前賢詞賦封苔蘚上國旌旗報夕昏西極逶迤南極遍更於何處問真源鄭日奎七盤闗詩迢迢七盤山地勢介梁雍三秦及兩川形勝資以控重闗樹雲外竒險信天縱我行歴荒阻及此彌惚恫倭遲幽壑底風烟莽澒洞循磴蜿以蜒勢若蛇出甕車馬疲登頓往往失銜鞚仰視山雲高俯聞江浩洶謝公良矯情嗒然輟吟諷聖明今御宇此道通職貢梯航走西南行役日以衆懷遠惟以徳天險安所用何事勞山靈﨑嶇日迎送吾欲鏟叠嶂大地一鴻絧臨風重惘然視天猶夢夢閬中舊説閬中地五城十二樓仙家得幽寄詞客縱冥搜一自兵氛劇曾無勝蹟留結芳誰對壁雲石迥含愁馬跑泉桓侯轉戰處猶賸馬跑泉㫁碣苔相蝕遺踪人共傳閬河綿蜀道風雨足巴天緬想英雄氣臨流一浩然天柱山天柱山中路風烟何慘悽亂泉爭道出怪鳥作人啼林密雲難度峯高日易低却憐迷誤處不是武陵谿蜀闈中一首蠶叢古帝國孤懸天西隅自昔盛文物中原並馳驅作人逢聖代於今廿年餘禮樂洗甲兵應見菁莪敷嗟余亦何人來佐衡文樞奉命懷靡及茫然戒征途載驅燕趙地載歴秦晉墟棧閣連髙雲跋涉忘﨑嶇風烟六千里到来如須臾長安日以遠回首中踟蹰國君慎進賢敢不竭臣愚又七言律一首芙蓉秋色滿江城桂子香流鎖院清廿載荆榛開蜀道兩朝棫樸憶周京風雲有路羣龍鬭鼓角無聲萬馬横願得英雄都入彀勞臣藉以答昇平登錦城南樓危樓髙峙錦江邊遠客登臨旅思牽載酒難尋揚子宅題詩空憶薛濤箋霸圖跡已湮金馬古帝魂猶泣杜鵑更莫臨風懷往事一城烟雨正淒然嘉定舟中望凌雲山東坡載酒時逰處鄭子維舟靳一登山帶兩江仍浩渺雲蔵古刹自崚嶒還家有夢牽孤客訪古無心愧老僧惆悵芳踪迷咫尺疾風吹雨下巴陵登敘州溪山一覽樓鐵㦸烟銷戍壘殘危樓喜見峙江干地經轉戰雲常黒天入悲歌雨易寒不盡雙溪流往恨尚餘一塔聳遙觀鬰姑仙去涪翁逝今古茫茫獨倚闌登重慶府澄清樓扁舟来過古巴國獨上危樓一縱探城郭大都依壁岸人家一半住烟嵐招賢館廢荆榛長來鳯山荒鳥雀叅惟有滔滔渝閬水流將旅恨下東南李先復弔斷臂烈婦行并序烈婦鄧氏長溝民何獻圖之妻齡廿一事孀母趙氏至孝㑹呉逆作叛夫負餉隨征母已出婦鍵户治内事守備張某騰騎突入翩翩糾糾竊意於深谷無人之地挽一女子如探嚢易耳始而以言挑之則罵繼而以金誘之又罵再則以力脇之仍大駡張乃直創其頭顱連揮數刀痕寸餘婦欲撞圍而出張牽其肘婦力拒之遂㫁左臂張懼甚乃自刺復自刺所乘馬赴縣庭中夜死婦匍匐往食田水鄰人詢其故猶云馬兵殺我不踰時卒鄰人鳴之官遣捕跡其狀見滿室皆血一手在門後刀挿户側婦遍體皆傷下衣無全縷遠近觀者如堵詳聞偽將軍俟事定方蓋棺露尸四月顔色如生噫威武不能屈謂之大丈夫只大丈夫耳而婦人云乎哉爰紀其異以存傳紀云風長溝之山山矗矗長溝之水水緑緑蒼巖松老謖謖村婦扁籬形影獨織無機絲舂無粟荆釵蓬鬢蹙顔玉良人長征不可憐長征輸輓秦師前阿婆牧犢柴桑外倚問終朝望不還紅日未暝青山紫馬蹄轟處黄塵起寳劎金鞍羽林郎下馬督見雙頤喜低首求歡甘言餌婦氣沖沖髮豎指躑躅徬徨奔無門心口相商惟有死兇奴忿極刃交加血和珠淚飛紅雨中庭電掣雷霆吼神龍只抱驪珠走烈婦守身不顧身敝屣形骸傷其手手既㫁肝如鐵血千行腸百結勢如漢魏交鋒金鏃折賈復拖腸不敗北又如真卿義激李希烈割舌期期猶罵賊哭已無聲魂黙訴上帝聞之心震怒隂遣六甲與六丁藉手殱奴奴惡露渠自戳匪無故忠孝節烈鬼神䕶不則泰山等鴻毛石完玉碎芳名悞君不見漢殿明妃馬上嬌銅雀空勞鎖二喬美人一旦埋烟草姓氏誰將烈女標又不見金屋阿嬌傾國色一笑千金難買得宫中脂粉賤如泥不換村姑一點血吁嗟乎别夫不於室拜姑不於堂慷慨赴義曷忙忙千載而下仰清風於髙山之崔巍兮與流水之汪洋賦李鍾峩經史賦文獻徵於册府禮樂備於明廷稽帝王以立則考賢聖以垂型爰編年以成史迺吐辭而為經别理欲於黑白判賢奸於渭涇名有十三萬古之淵源有赫朝分廿一千秋之典故留青是皆比流峙於河嶽並輝光於日星者也一畫藴造化之竒三才備隂陽之變書佶屈而渾穆易簡潔而奥衍禮森嚴而條暢詩和平而婉孌春秋見筆削之精爾雅肇訓詁之善六樂正於聲微兩論著於逰倦述仁義乎七篇明褒譏於三傳足緯地而經天等擊雷而鞭電蓋嘗觀爻象之紛賾察名理之縱横歸蔵自坤而起象連山首艮而殊名周文之所推演姬旦之所經營惟羲皇之本㫖由素王以發明編三絶而不厭撰十翼以相成歴坑焚而莫損借卜筮以流行繼西河之卜氏有淄水之田生採本原於東魯垂端緒於西京焦贛之占騐費直之研精鼎三足以杰峙河九派以洄瀠若夫畧三墳之瓌竒首二典之贍核列謨訓之堂皇載誓命之鬱窟著二帝之鴻猷昭三王之偉伐古今之文各異真贋之旨相越伏勝之所傳授劉向之所窮矻歐陽於焉闡揚鄭沖於焉洗發迺若省方既遍觀風是先賦比興維其託矣風雅頌由是成焉二南歌王化之美盛七月述祖徳之綿延公卿所諷詠里巷所流連妥侑乎神保燕樂乎賔筵細則陳於閨閫大則格乎帝天初披陳於太史終刪定於文宣厥後齊之轅固魯之韋賢韓嬰之傳浮丘之編毛鄭曾疏其義歐蘇欲鈎其元皆名賢之緒論固時俗所爭傳慨風詩之既微屬道統之將墜即魯史之成文存周官之遺意紀正月以定厯書天王以正位嚴㑹盟以明禮謹侵伐以申義扶萬古之倫紀加一字之褒刺欲明道以匡時任罪我而弗避理靜深而如淵義博厚而象地丘明詳其本末公榖宣其義類齊有子都梁有賈誼繁露玉杯之篇膏肓墨守之義凡以晰五始之本末明三傳之同異爾其用之邦國達於郊畿祭享見於朝廟吉凶備乎宫闈周官繁其節目儀禮辨其等威經曲華而有則官骸順而莫違咸恩明而分肅胥别嫌而明微㑹古今文而一致合大小戴而同歸更作篇章唐魏徵有所論定重加次序宋臨川有其發揮乃若舞蹈之節奏同律之範圍制氏世其官而不能言其義藴劉向著其録而未嘗指其是非是故學必講而後明徳以修而彌邵濂洛為狂瀾之砥闗閩闢層霄之照契歴聖之心傳洞六經之微妙集解擇中正之歸立説握精一之要秉經徳而不回實踐形而惟肖瑞為麟鳯之靈彩煥圭璋之耀是宜親炙者嘆巨浸之汪洋私淑者驚喬嶽之聳峭矣蓋載道莫詳於經而紀事莫備於史三綱之所由持五常之所必紀稽星辰之順逆誌郡國之終始載治忽於微茫别邪正於疑似存制度之精粗書風俗之惡美要使既往者常呈形於明鏡將來者若鑑容於秋水雖有是而有非夫誰譽而誰毁是以貴事詳而辭約欲法密而氣疎識足服乎今古才足任其卷舒丘明之紀繁冗子長之叙古初廬陵五代之史紫陽綱目之書倘良史而有作舍斯人其誰歟嗣龍門而秉筆迨扶風而未改紀澤中之靈竒寫馬上之丰采歌大風而慨然握長劍而礪乃美文景之升恒傷哀平之危殆十志以為搜羅八表於焉記載燦彝鼎之古樸煥鸞凰之儀彩粤若東都建國西蜀啓疆或奄有乎九域或偏安乎一方惟炎精之未歇乃漢徳之重光范曄之書彷彿乎醇而後肆陳夀之志庶幾乎闇然以章何人物之臧否未允而統緒之正閏未詳若夫兩晉之駢麗六朝之纂組或受裁於御撰或摭拾乎塵腐或馳騁而無律或脱誤而難補或貪穢而多私或浮誇而無取競靡麗以趨時尚繁縟而非古貽尚論以口實失前修之高矩有若合南與北而為史歴父與子而潛心刪穰辭以見直稱嘉史以賞音悵書志之未師乎昔憾典制之或闕乎今洎隋書之自出實魏徵之所任資顔孔以商確偕于李以酌斟庶綱紀之畧備病誕妄以相尋竊嘗彚唐宋以遐稽訖金元而詳覈或文省而不備或辭繁而無益或彼此之相迕或去取之未適或遠害而引嫌或反主而為客美固稱於藝林瑕亦昭於簡册是惟兼三長以探討廣五志以攟摭表志同天人之微紀傳悉朝野之跡乃可名為信史而奉若金册也幸置身於藝苑謬厠列於詞臣每出入乎閶闔時侍直於楓宸將學古以致用恒憂道而忘貧值典章之明備睹名物之燦陳稽史籍之浩瀚究經義之深醇思登高之有自懼濟川之無津可無師考亭之純粹而漫信衆説之紛紛也乎李以寜峨眉山賦綏山先生薄逰於楚漢南有客惠然與處被服閒都從容燕語窮造物之通復論阸塞之修阻事無微而弗研理無端而不舉客前席而請曰君子生於巴蜀習聞蠶叢㟴㟴三峩南戒之宗茹芝采藥考槃在中幸攄厥畧佑啓愚蒙先生曰伊大塊之積氣始突兀於崑崙恣延宛兮萬里並星宿而東奔行山盤紆於中原岷峨作鎮於西坤互華裔兮若限阻重嶮兮如門星紀則井絡曜其上水源則天津灌其根應鶉首而分野視蟇頤為曽孫近則倚陵雲與烏尤遠則馮火燄與葱嶺卭崍瓦屋襟其前青城玉壘為其枕霧中控羅回以内籓雪山自天竺而外屏莫不拱揖而縈紆鈎連而嶾嶙其為狀也則嶜岑嶱嵑峻極於天危磴㩻䧢增岡連綿百步九折八十四盤以脅仰息踵可摩肩三山並立則若蓬瀛之遙接兩山相對則如眉嫵之便娟斯秀甲九州高邁五嶽為靈虛太妙之所由儔也與若嶚剌干霄磅礴攝犍豐隆殷殷其在腹珠斗爍爍而離躔驚羲馭之迴標指望舒之倒懸浮雲僅被其足翔羽不至其巔雪初融兮六月氷不冶兮萬年超欲界而杏邈豈塵􅅽之風烟其峰則有翠竹白雲玉女蓮花鉢盂香爐之拂漢天池石筍之凌霞其石則有盤陀天柱瑞星金剛鳯喙牛心天門象王升仙受道之臺歌鳯七寳之裝悉厜㕒而岌岌皆碪􅑇以硠硠其洞則有白龍朱砂三仙九老人訝桃源誰探瑤島雷風穴而砰鐘鼓聞而窈窅然未若龍門之竒也嶻嶪兩崖嵯峨千尺絶壁赮駮澄潭紺碧挐舟而入仰天一隙高峽卓立而蒼茫雙瀑分飛而漰湱嘘噏散沫以垂虹濆瀹觸石而成霹若百靈兮飄颺雖萬夫為之辟易當亭午而涼飈倐吹際渥暑而寒氣恒積雁宕之懸流吞聲匡廬之谷簾避席縹緲兮霧穀為衣惝恍兮羽翰生腋此澹蕩胷懷澡溉塵跡客能從我而共適乎客曰唯唯先生曰未也其卉木則有檜柏杉松楩柟榿槲合抱之材連理之木蒟蒻楓香離支龍目銀杏朱櫻金柑盧橘人面之簳桃絲之竹森森莖青萋萋葉緑結根抽條縁阪蔽谷族茂鄧林叢淇澳乃春夏之交桫羅始葩吐英馥郁敷蘂紛華艷張幄錦紅披幛紗似若木之乍見與優鉢而並嘉羌錦帶垂兮纎蔓石楠放兮烘赮五色燦兮木蓮重苞灼兮山茶以及槐萌巢菜樹挺石瓜仙縚金釧黄獨河車感物類之有殊知葐蒀之最奢其鳥則有翔鶤奮集𤣥鶴􅨧蛦鵁青屬玉鷫鷞鳧驚異采棲桐而鳯舞駁羽䕶花而人啼佛見鳴兮挂明鏡王母下兮翻雲旗迴谿深兮號獨鵠隂崖暮兮述羈雌其獸則有騶虞騕褭辟邪天禄文豹隠霧白猿如玉金線之狨雪毫之鹿犪重千斤夔惟一足鼯鼠能吞火烟麝香眠於石竹貘食鐵而如飴貔拉虎兮似犢猰㺄聞風以犇馳熊羆望影而觳觫匪丘壑之通靈詎鷙猛之咸伏其流則有羅目瑜珈月池聖水黒白分於符文濛涐通於越巂虎橋有八音之蛙龍池出四尾之鯉蟠螭向大壑以深潛嘉魚推丙穴之甘㫖龍馬出没於深淵靈蠵蕩漾於淺沚芳洲時矚其泳㳺華鱗競耀其青紫或揚鬐兮溪畔或曝腮兮巖底恣吸浪以排空任随波而起止至於來尋方丈惟事瞿曇嶔岑傑搆精舍名藍光相之寺呼應之菴材闢洪椿閣啓楞嚴風霜甚厲瓴甓何堪削木皮以蔽屋鑄鐵瓦以為莾花宫馮高而翼翼梵殿臨險而巉巉振蒲牢於香臺動陽馬於風檐藻繡互糅丹碧相参綺疏晃朗於遠岫金鋪罨靄於晴嵐洵祇園之布地疇彌勒而同龕乃若畸人命駕俗士絶響宿舂三月蠟屐幾緉為訪真詮更怡幽賞神僧則有詎羅長生則惟寶掌葛由騎羊以来逰瞿武繫龍而獨往雷威空傳其琴茂直尚存其杖孫思邈之藥臼曾留白海瓊之雲母誰餉偶弔遺跡而徘徊曠覽大野之泱漭更有幻化無端佹異非常湧兜羅緜觀攝身光銀色皛皛雲海茫茫或如輪而示清睍或横天而設金梁瓔珞空中兮乗巨象鬰儀夜半兮出扶桑三峯隔絶域而照耀千壑起聖燈而迴翔縱有懸河之口不可思議雖竭叩囊之智烏能測量也若夫大道攸傳微言斯寄石室之蔵金匱之祕茍非其人得之豈易天皇授軒轅以丹經隂仙弆銀函之緑字鬼谷子以珞琭名書嚴君平藉指歸示異杜光庭之所編張君房之所識薛季昌注道徳以成文宋吕勤覈圖經而作志悟盈虚於自然闡闔闢之妙義其載籍易簡而淵源其詞章博雅而𢎞備何殊探竒於羽陵不必訪古於玉笥此皆要眇精微之所萃客能䇿杖而求所未至者乎客曰聞子之説博大雄竒如蠡之不可測管有所難窺顧何以不嶽凟之共列明禋而受釐竊不能以無疑先生曰嘻巢由隨光盛世高蹈維兹峩山處在僻隩升中之禮不臨巡幸之轍弗到然而瓌瑋無以復加烟霞足以自傲是蓋有隠君子之徳焉固可與知者言未能為一二俗人道贊張徳地瑞麥贊維皇布愷嘉祥洊至攢槊生芒含穎吐穗上應斗樞下齊政治降康自天來牟式瑞祈實於民薦鮪飭毖意萬斯年大有垂誌頌萬文麟瑞麥頌蜀國凋殘已廿年邨邨甌脱抛良田歴經災疫兵荒苦千黒埏埏幾絶烟十兩黄金一斛穀茹芹飲莢相頻顣東逃西竄離鄉井天道好還無不復聖主垂矜咨股肱我公何事不能了志在澄清攬轡登平綸音特簡大中丞寇救飢如禹稷沈潛剛克干戈熄益州刺史布仁慈民得煖衣與飽食瓦礫成堆半草莱仁聲仁聞廣招徠差官捐俸重恩濟秦楚流移向蜀回督課農桑嚴息訟懽聲處處聴輿誦慈祥愷悌以安懷天子重名卜金甌能致祥七岐瑞麥産梁疆嘉禾多穗無和氣烝烝龍顔歡如此珍重瑤函上舞奏章漢代漁陽僅兩岐動喜孜孜滿朝歌歸天子克讓允恭以再辭赫赫在旂裳歴年施澤已云乆瑞帝賫中丞極庶蕃勲名鳯祥麟出此方盛事從今迭記史留芳千載垂庚壘普天處處祝昇平西蜀家家歌樂只碑記張徳地重修青羊萬壽宫碑記尚稽治理至黄虞以前邈已然撮以一言曰清淨無為而天下自化三代以下漢治為近古孝文之世頌稱刑措史載文帝好黄老跡其一代之治罔非權輿於此東京之盛光武亦曰吾治天下以柔道勝之孰非師孝文之治而為之歟世之言老氏者率神其説於玉局靈符飛昇長生之術不知其有資於治理若斯之宏也我朝誕膺寳籙統一區寓以簡以寛民登治維蜀自罹兵燹淪灌莽者幾廿年不榖猥承簡命招徠安集尤務與民休息之時也昔曹參治齊聞蓋公善治黄老言避正堂以舍公公為言治道貴清靜而民自定參用之而齊大治其後以其治齊者治天下民歌之曰載其清靜民以寜一然則今之治蜀如蓋公之言推類而行之豈謂無裨歟成都治西南十里許有青羊宫相傳老子過函谷謂令尹喜曰千日外遇我於蜀之青羊肆即其地也粤昔珠庭琳館干霄迴日之盛邦人艷稱焉今遺碣已盡不識建置何昉矣記曰有其舉之莫可廢也況勝蹟垂於百禩麗觀甲於諸郡者乎顧瞻天府皇仁漸仰浹阜思所以揚扢臻康天庥釐祝兹實振古焉爰燔椔翳摉遺址有殿曰青羊三邦祐清五鳯萬壽有臺曰紫金八卦降生説法有堂曰真武純陽三官以暨左右廡山門垣墉之屬故老猶得追識焉不穀遂捐金計徒慮材以令於羣工舉循其舊以次而新之始康熙丁未之秋成於辛亥之春時川湖制府蔡公憲節西来同光斯舉其柱下猶龍以此段因縁作再来真氣不榖亦得拂闗尹驅塵耶是役也有豫撫前藩使郎君廷相前臬使李君翀霄今藩使金君儶臬使宋君可發督學張君含輝暨成都郡守冀應熊同知萬文麟通判馬御世載襄厥事既訖功以命道士陶来御居之使奉獻事維岷之陽錦水湯湯谷神所宅滮流無疆不穀幸托雄區式宣道化庶幾舉廢之一端耳敢希清靜寜一之理歟重修昭烈陵碑記凡聖主肇興必於古帝王陵寢遣官致祀所以重一代之君也雖徳業之隆替多有不一運祚之修短毎有不齊然而君臣㑹合創業垂統其求為可繼之懷未嘗不思貽謀燕翼為一日萬年之計而究竟不能必其齊一者則亦數之有幸有不幸耳余於漢昭烈不能不深致慨焉方其以布衣崛起遂欲力振炎漢一時英雄蜂聚雖九州之地人有其七我無其一乃由遐陬而啓雄圖竟峙三分之鼎以承大漢之祀茍非精義入神知人則哲曷克臻於此乎其君臣大烈載在史乗無庸復贅但遡厥始事義締桃園而闗張實倚股肱三顧隆中而臥龍迺資輔弼集一代之人豪盡歸羅網因而底定西南震疊諸夏匪後代之主所易幾也况君臣身後威靈經千秋萬嵗愚夫愚婦靡不浹洽真若懸日月於中天又豈區區人力可易致耶余奉命撫蜀偶過萬里橋行西南不數武有昭烈陵武侯祠在焉遂芟荆誅棘􅉨瞻拜之徘徊良乆雖鹿走草萋而陵寢無恙且祠側碑記猶存余拂拭讀之則裴中立撰文而栁子寛書丹也後人遂以雙絶紀之噫嘻西蜀自罹獻逆焚戮萬物悉化焦土即王公墳墓莫不掘毁無遺獨昭烈一冡歴乆常存巍然如故且與名公碑記並垂不朽使非其英靈不泯沒世難忘又安能保千餘年後晏然無恙若此是又不可以數之有幸有不幸而論也矧今日者西蜀之土地人民所頼以呵䕶周全誰無木本水源之思耶余因捐資命成都守重修厥坊以表其陵載立之碣以紀其蹟仍飭守僧勿使樵子牧夫敢聖天子有或邇將以仰體意焉爰書數言以弔之崇重歴代君王至夜郎採楠碑記天生楨幹之材以備隆棟之用而國家時簡勝任者取之然得之匪易竒偉之産􅉨􅉨生於環山疊嶂絶跡罕到之鄉如幽人碩士之蔵用待時隠處槃澗也採取者恒世祖章戞戞乎難之我創業垂統迨皇帝統一海内皇上纘承丕基作述廿有餘年聞風向化識水来王者即殊方絶域咸稽首闕下而堂搆尚仍卑陋非所以崇之宸居壯觀瞻也任部檄屢下而諸郡率以不材木應余思楚材晉用豈屬在版圖而可使清廟明堂之物委諸草莽乎爰具疏自任即蜀道難亦所弗恤陟巉巖履嶮巇研踵於豐草長林間舍輿而馬舍馬而步甫兩閲月得大木百有餘株以之充梁棟而資巨任豈復有遺材耶使當事之遴才者果如余之周爰諮諏實心採訪或亦不至有淪落之歎也疲薾之暇特援筆而誌之一片石李翀霄樹集棘院舊碣碑記稽古名人墨妙皆蔵之深山祠宇以及王公第宅如淳化諸帖多集梁園之妙選高河間之休風故能廣搜博覽訂訛較真勒之貞珉蔵於石室與名山大川同為不朽有足徵也西蜀成都廢藩邸舊多前代碣石集諸家名筆蓋纍纍矣今既改建棘闈余每一逰覽見殘碣鱗次傾臥荒苔拂拭讀之皆前賢手澤因而歎息不能置憶昔有慕蘭亭鍾楷者或發塚以求之迺種種舊跡鐵畫銀鈎龍跳虎臥忍令其滅沒於蔓草荆榛為牧豎樵子所狎侮乎爰是捐資囑兩邑令募工鳩匠固植而林立之覆以瓴簷列於至公堂之左以資文苑勝觀俾古人毫瀋之靈不與綵雲俱化後之流覽者或有取於此舉焉遂勒石以紀嵗時冀應熊少保武襄李公崇祀碑記今上御極之五年歲次丙午九月九日總督四川少保大司馬中丞李公國英以勤勞王事殁於宦邸維時全蜀之沐浴其徳者遠近番漢罔不搶地呼天如喪考妣乃川西紳衿父老思其徳而不能忘咸欲崇祀名宦以昭三代之直遂合詞以控於邑令兩令復摭公善狀詳請於熊念熊守土之官也凡官兹土者上自督撫下逮令尹如功績果應崇祀與輿論允叶者有司例應轉請督學確察實行准入名宦以崇祀典稽古先王之制法施於民則祀之以勞定國則祀之以死勤事則祀之能禦大災則祀之能捍大患則祀之有一於此例應從祀况蜀自獻逆屠戮城舍坵墟民鮮遺孑少保李公入蜀以來由鎮而撫由撫而督恢復殘疆修葺郡邑闢草萊墾荒土發給牛種教民稼穡豪右悍卒魚肉殘黎置之重典釐剔激揚均平賦役痛革加派解民倒懸所謂法施於民也至躬擐甲胄繕器秣馬踰越險阻北擒偽王於閬中南靖郝逆於嘉雅東收偽侯於夔門西服羌番於威茂所謂以勞定國也且也大兵之後凶年饑饉瘟疫頻仍少保公捐資普濟施藥餌并米粥所全活者億萬人先是威茂地震壓死軍民公特疏請蠲地方頼以寜輯所謂能禦大災也迨諸冦既平復慮十三家為三省禁旅要害爰疏兵決䇿運籌躬冐矢石不㑹朝而渠魁集各省將廟堂蕩平三省獲有寜宇紓患也年來身親血戰心力西顧之憂所謂能捍大俱枯晝夜行間積勞成恙兼以垂白慈親告殞京邸陳情守制又縁特命朝廷倚重忠孝難兼以哀愈病以病愈哀因而百藥奪情遂至難瘳且彌留之際遺疏五難盡瘁鞠躬死而後已所謂以死勤事也自古聖賢立身無逾忠孝少保孔公五者俱修而又克盡大倫斯不愧廟一席其於祀典也何有況奉俞㫖乆任巖疆積瘁病殞深為憫惻應得卹典著察例具奏在君上方有不可泯之大典在地方自有不容己之報稱因而轉請於督學使張公遂報可雖徃例凡名宦鄉賢從祀督學使竟主之若少保公功在社稷難比尋常仍請於大中丞張公公深嘉少保公之懋烈復行藩臬兩公知照全蜀郡邑諸庠俱造主入祠崇祀奈成都郡庠自遭兵燹乆為灰燼前於癸卯賴諸臺捐葺學宫兹已告竣獨名宦鄉賢二祠未遑議及今奉有少保李公入祠而妥侑無地如春秋大典何於是方伯郎公廷相觀察使李公翀霄大叅郭公亮副憲郭之培蕭炎成都郡守冀應熊郡丞高夢説司李姚締虞成華兩縣令張行張暄各捐俸金創建二祠如舊制前立名宦鄉賢祠三楹仍録殘碣所載歴代名賢姓氏而重鑴之各寘神主祀享春秋復於祠後建碑亭三楹特立一石朝以紀少保公之偉績於不朽一以體輿情一以垂廷酬功之至意一以順斯民直道之前賢不朽之令名一以樹後人勸忠之懿範蓋一舉而四善備焉其裨於名教非小補矣迺命熊繕言以誌之熊職司守吏曷敢以不敏謝遂既誌而頌之曰於爍我公參井降靈厥猷翼翼維國之禎乾坤浩氣篤生穎異不競不絿文兼武備天眷蜀邦畀我良翰日靖四方式遏寇亂經營念載奠此巖疆明發不寐母弗遑將泣血陳情嬛嬛在疚莫克我親莫棐我后致身報帝鑒國尚爾綢繆五難遺疏嘉猷帝曰欽哉晉公寵錫民曰莫忘酬公血食新祠奕奕籩豆秩秩以妥我公萬邦是式匪公斯逝有石則留匪徳斯泯寢成孔悠金儁重建諸葛忠武侯祠碑記古之祀典有五一曰法施民二曰死勤事三曰勞定國四曰禦大災五曰捍大患有一於此從而祀之以云報也昔者諸葛武侯之治蜀也撫百姓示儀軌賞不遺遠罰不阿近恩威並濟上下有節故刑政雖峻而人無怨法施民也受命託孤之際泣效忠貞繼之以死及其出師上表又以鞠躬盡瘁死而後已為言竟以食少事煩病卒軍中死勤事也五月渡瀘深入不毛用攻心之説七縱七擒終侯之世夷不復反勞定國也蜀人曰祀典有五侯得其三焉予謂侯之事先後主忠矣其於人民亦以威行其愛耳世有忠主愛民之人而不為此一方禦大災捍大患者哉蓋侯之身雖告終於五丈原而其心未嘗一日不在炎劉社稷間也是宜廟饗千世而勿替者與舊制侯祠近昭烈墓今仍之益奉昭烈於正殿侯居後子若孫從之殿兩廊位闗張北地王次文武諸臣之有功者其正大規模遺像儼然率皆凜凜有生氣焉嗚呼當其屯田渭濱居民安堵庶幾三代之兵望若時雨向使天假以年則國賊可靖漢業可復惜也中營星殞大志未伸後世黜魏削呉以蜀漢繼炎統固史家之正論其亦慰侯之苦心也夫皇清康熙十一年秋廟成嵗時致祀嘉侯之忠誠感被閲世乆而愈深也頌曰先生抱道高臥南陽長吟梁父與世相忘亦有英雄聞聲思慕志興漢室慇懃三顧魚之得水骨肉君臣感斯情好可以忘身侯之忠貞死而後已嗟侯此心萬世不死重建杜工部祠堂碑記蓋聞不朽之業有三立徳尚矣其次立功其次立言夫所謂言者何易之於天道也書之於政事也禮之於軌物也詩之於性情也春秋之於褒刺也其言咸造其極有功世教逮至後世著作日繁標竒騁異然而㫖趣既殊純駁乃判若夫言之而傳傳之而不朽者非有功於世教不能也世之讀少陵詩者見其豪逸若五陵少年悲壯若燕趙烈士渾噩若周鼎商彜爛然古色莊麗若千官朝列劍珮鏘然信乎極立言之大觀矣余謂公自獻三禮賦後既遇禄山之亂自秦之蜀涕淚奔馳舉平日忠君愛民之意一皆發之乎詩是其言乃有徳者之言有功於世教之言豈一切騷人韻士所可彷彿其萬一哉公於乾元二年入蜀時裴冀公冕為成都尹為卜西郭浣花寺居後營草堂居之迎妻子家焉閉嘗至外邑去來於斯五六載是以﨑嶇羈旅之中戀戀於蜀之草堂一篇之中三致意焉時遠地遙草堂固不可得而見及蒞治蜀都私幸獲覯先生之遺址歲辛亥從大中丞蔡公跨馬出郊遵萬里橋西泝而上過百花潭求所謂草堂者榛蔓瓦礫一望凄迷傍有老僧稽首曰此杜公草堂地也相傳為其讀書咏歌遨逰棲息之所舊有祠今廢余低徊乆之澄江未改紅蕖翠篠之遺猶有存者而草堂固不可得而見也夫前賢之蹟弗彰地主之責也弔古者有餘憾焉爰承蔡公命剪棘構祠不侈雕鏤不事丹雘體公儉也懸額設像從衆慕也後之君子賡浣花溪水之句睪然神往庶於是祠焉遇之重修東嶽廟碑記天下之能應順效靈為民禦災畀福者名山大川也山川者天地之司牧也天之愛民甚矣顧雨暘寒暑之失時豐歉旱潦之不齊天之權專而難徧爰分其事於山川故天子祭五嶽四瀆所以崇有功昭報典也又曰五嶽視三公四瀆視諸侯是則山川之神五嶽稱尊五嶽之中泰岱為宗夫岱處於東於行為木於時為春萬物之所托始也知所始者必知所歸故其權兆於有生之先而不可端測其祠徧海内與社稷並列亙古而莫之廢惟神徳象天地愚民稚子望之莫不肅然起敬凡吏於土者必以時致䖍所以昭朝廷崇徳報功之典也我朝定鼎懷柔百神及河喬嶽聲教四訖海澨山陬罔不率俾蜀都去京師萬里風雨時若民無夭札是以知神之能奉職也無替命也顧草萊方闢百廢漸興而神廟未復何以為萬姓祈福之地爰是捐俸鳩工逾年告成吁此邦之民其困已甚摭摩而噢咻之方兢兢未周之是懼神尚黙維而隂相焉以相與有成庶幾康阜歌而熙皥臻也其余之志也夫重修南瀆祠碑記粤惟鴻濛爰闢天一生水江淮河源厥惟水首其灌注百川澤潤萬物其功用與天地侔而未能窺際其涯涘者歟論者謂河源自天必歸於海惟海無源盈虛莫測迺神禹導江及淮而井絡之區實為橇車之所先則以江之源由於蜀故也夫長江之勢千里一折百里一波險劃地軸名雄天塹古誌之矣蜀隘區也萬山環合一綫通流泝而上之莫窮所自第見怒激奔騰至此而約束受命未嘗有泛溢之虞觀其所以受之者焉及夫渡三峽下夔門浩蕩汪洋奮迅萬里百折而必東識朝宗之義觀其所以出之者焉噫惟神之功何其偉歟是以古之王者天子睠受命必有事於四瀆而江其首也曩者嵗在丁未焉西顧遣少宰致祭大禮告成祀典用彰惟是方承勘定之後祠宇傾廢未暇葺也今者中丞公来撫是邦綱紀畢張廢墜漸興乃告於衆曰神為四瀆之長有功於民祠不可以不肅盍新之於是共相割俸鳩工祠以落成余顧而樂之執爵而言曰吾聞境内山川諸侯之所主也敬神以勤民守土之事也蜀雖富庶未徵而百堵於垣劬勞安宅神聖朝所慿依將在是矣指山高與水清知歎百神效靈熙皥之風與兹江流同永覩安瀾者不從此仰見懷柔之化也耶自屬僚以及耄耋咸謂兹言之有合於兹舉也爰録以勒諸石張明彩重修文廟碑記尼山有聖人天下於是有道統故忠孝代出英賢崛起皆聖人之教之所為嚴廟崇祀所以肅瞻拜振人文也成都為古文獻地昔文翁起學教士非即此乎自逆張毒屠城社燼煨聖域賢闗幾不可問噫嘻茂林荒草閴無人烟值從未有之刧雖氣數使然嗟吾道之窮大聖大賢亦罹此厄運也耶余從事巴蜀自己亥撫院高提征恢復展開兹土遂求謁文廟焦爍蕪土踪跡莫辨爰剪荆棘闢草萊僅通一線始得孔聖故址一片坵墟無片瓦隻椽數仞宫墻果何在耶令人見覩不勝流涕思欲修葺諸務未遑力有弗贍止等之跛僧説法已矣辛丑之冬撫院佟持節來蜀下車謁祠眸及荒殘喟然嘆曰澤宫如此人文可知風雨不蔽神將安依因奮修舉捐俸鳩工檄余為督余恐菲才不堪任繼而思之讀聖賢書不能有功聖賢而坐視宫墻之鞠為茂草也如此心何爰董其事不敢有憚勞瘁亦不敢少棄錙銖木植磚瓦悉得之易買工作力役悉求之徧覓不取民間一錢一粟建正殿五楹㦸門五間東西廡各五間啓聖宫三間以暨櫺星門俱仍舊址雖不敢侈輪奐之美然修理丹塗煥然改觀亦未始不可以棲神靈肅趨蹌也起工於辛丑年十一月某日落成於癸卯年四月某日上有諸憲臺之風力下有羣有司之樂輸余僅仰體憲臺徳意捐助微資克殫心力監工督修勤勷厥成已耳工成不能無記僅誌其實勒之於石以為紀年叙事云爾沈巨儒蕩平川東碑記代楚提徐治都作之粤稽上古軒轅有涿鹿戰顓頊有共工之征自兹而後虞有有苗夏有有扈商有韋顧昆吾周有淮戎頑民之屬率皆勘以武功大清猶先綏以文徳恭惟我自世祖章皇帝以順天應人之主興弔民伐罪之師享九有寜萬方暨我今皇上繼體文武秉徳成康東西南北無思不服者幾四十年何物呉三桂敢負國恩大肆兇逆跳梁於滇黔旋罹乎天誅而逆豎譚𢎞始以井蛙而脅從於川北繼以首鼠而竊據於川東恃彈九天城為負嵎之虎用幺麽羣小為百足之蟲而陷川東數萬生靈為處堂之燕遊釡之聞魚嗟乎傷哉事始庚申八月也事皇上天威震怒比蒙軍臣某章京臣某率滿漢精鋭由楚廟算命臣㑹同將道水陸並進一戰而克巫山再戰而克夔城三戰而克雲陽隨挽舟師乗風直上不二日而直造逆巢城下兵不血刃矢不傷鏃而天城土崩元兇授首逆黨傾心此皆上荷朝廷威靈下藉諸將士勇力露布以聞當無煩睿懷西顧矣書曰殱厥渠魁脅從罔治舊染汚俗咸與維新惟時元逆已誅從黨咸服余惟仰體皇上好生之仁遵奉𠞰撫並用之扶攜載道襁負来歸余㫖宣布徳意招徠流移不旬日而乃屬其耆老子弟而告之曰嗟爾百姓本係良民陷於水火罔見天日從今以後母曰蜀水險也爾視我師如越谿澗母曰蜀山峻也爾視我師如履康莊習文者屬我司徒習武者屬我司馬務本者歸田逐末者歸市改爾舊習服我新政念兹在兹永蹈斯言凡此皆布朝廷文徳以全武功之本末因勒斯石以示全省耆老子弟取鑑往轍垂訓來兹共享國家昇平之福靈長之運於萬億斯年也云爾曾王孫重修松潘衞文廟碑記今天子尊崇聖道躬釋奠於闕里詔新廟貌天章所頒四方風動且陪祭胥天下而教育之蓋莫不鼔命武臣二品以上得與舞於詩書禮樂之途矣蜀自文翁化俗號比鄒魯賊焰既熾之後復遭逆藩變亂所在文廟皆不命視學可問余奉輒語守長以學校興廢闗王政之盛衰行部所經不可不亟修以勵風俗而逡巡未有應者其頽廢傾毁不堪寓目者可勝道哉今年春中丞于公推上徳意合羣議新成都府之學宫復咨曲阜聘樂舞生遴童子而肄之既嫺乃用於廟於是覩崇牙樹羽旄翟之美聞鐘鼓簫管之聲柷敔鞉磬之音升降有度進退有節烝烝皇皇穆然見聖人之徳之盛私幸備官於兹得樂觀其成而又竊念省㑹者郡邑之倡也惟兹郡邑其必慨然有所興感庶幾奔走就事以後為羞以仰慰中丞公之望乎冬十月松潘教授張其赤率諸生張良佐等以重修文廟碑記来請曰衞舊有學垂二百載變亂之後鞠為茂草蓋數十年於兹矣今總戎卓公來鎮兹土慨然以修復為己任於是他將校及衞守偕其赤良佐等共勷其成工始於康熙三十四年春二月十有九日成於秋八月朔日自大成殿啓聖祠及東西兩廡櫺星門月臺甬屏煥然更始足以示瞻仰於邉陲明聲教之遠訖焉微總戎無以致是也余於是歎總戎熊體聖天子崇儒重道之意而以身先之所謂修之樽俎之間折衝千里之外者非耶其所以對揚休命者何與我中丞公不謀而合也攷諸圖誌松潘為古氐羌地自漢通西南夷叛服不常明初平定之至景泰三年始建學宫由是置博士弟子員登聖人之堂為聖人之徒豈不幸甚顧地極寒薄不産嘉穀聞諸生往往代負荷取傭值以供俯仰蓋與耕讀相半者更什倍苦辛矣夫生瘠土者勞而思思則善心生今諸生入廟而思敬奉庠序之教朝夕黽勉於達道而求不詭於聖人將偕此邦之人朝廷為禮義之鄉諸生不既莊莊乎君子哉此夫表章重學之意而總戎則蔵美利於不言者也興復之功明倫常以振起後之學者學臣之責也是誠不可以無記卓公名䇿閩之惠安人衞守備為賈尚謀博士弟子自良佐而下凡五十八人例得備載劉徳芳錦江書院碑記成都古益州故多材地秦以前遠莫可稽漢孝文時二千石文翁仁愛教化符守此邦慨土風僻陋欲誘飭蠻戎而進之儒雅選郡子弟開敏有材者遣詣國學受業博士郡生皆成就顯拔榮進乃作禮殿立石經修起學宫於成都市中文教由是大啓士風埒齊魯焉永初後高守䀢更新禮殿於灰燼之餘増一室以祀翁生徒相誦習講課歴魏晉唐宋元明巨公名彦踵接代興蜀學之盛甲宇内所以繼文翁遺緒乆而不墜者實惟高守迨獻賊入朝川所在屠滅郡邑為墟我文學諸生謀生猶恐不受命逆宼就殱反側屢安給奚暇誦讀其年盛志美亟思向學之士既乏師承尤鮮載籍然則繼高守遺緒於兵火之餘以不墜文翁之流風雅化者端有待後之人矣巡撫都御史貝公蒞蜀三載爐蠻既平民樂靜鎮士被陶命觀察甄公亟欲興文教以植人材而余適奉任而興廢兹土因以俾之於余弼教興行實余之礪鈍尤余夙忘也爰度郡黌右偏有隙地敗礫蕪烟嵗乆未治迺蠲俸金創置為門幾楹為堂筵齋講為蔵書之軒為賓師之位為東西號舍為庖湢逰息之所屬成都令田君軒來温江令邱君璋董其役凡五閲月而訖事工不知勞民不知費既落成披之輿乗訪之故老蓋石室故址也余聞古者鄉有序黨有塾擇師資令其教授將以𢎞長奬掖化人成俗率由於是故法制代有變更惟學校絃誦之事建國者率無以易書院之設與學相表裏王化之本而菁莪棫樸之盛所自出誠不可一日聖明在廢也今覃敷上文徳幸魯有典訓士有文興學立教遠嫓三代極盛之時大備之制海隅徼塞四方萬里之外靡不感動淬厲烝烝以變蜀當休養生息富教有可漸加之候公以寛平涵煦兼父母師保於一身佐朝廷興道育賢政莫大於此矣夫士棄詩書行誼勿道為士者之恥而狃頽襲媠徳教不聞有司之過也今學之名猶昔而古者教士之良法美意與其文具一無所與而士之無所傳習不務其實而馳於名也久矣掌教事者又每視學為聲利之場第取其善為科舉之文而嘗得雋於場屋者以相夸尚孰知科名固足以榮當時而所謂久大之業紹往哲以開來學寜盡乎是若徒托執經問業之地飾韋帶青衿之譽以虛聲相慕悦則更卑不足道豈余之所期乎今建此書院延訪賢士可為人師者主其席定課試之約籌膏火廩餼之貲日與諸生揖讓講習乎其中將見蜀之士皆蹈德詠仁追前天子昇賢懿軌上答以無孤我公之教且以繼石室之流平文治之功風於無窮俾後之周覽學舍自文翁以來上下千百餘年其間之建而廢廢而興者僅公繼高公而三政教盛衰視乎其人顧不重歟遂為之記以垂永久而告來者黄廷桂雷波衞闗帝廟碑記維我皇上撫御寰宇仁漸義摩聲教所訖無逺弗屆凡夫跂行喙息之倫孰甘自棄於光天化日之下者蠢兹僰蠻性同狼豕在昔叛服不常頃者戊申之嵗米貼土婦陸氏悖法跳梁而雷波土司楊明義勾通結命統戎覺阿照諸夷肆行盜掠時余職任提督事務奉行用彰撻伐仗天威而遵三旬殱厥渠魁焚巢掃穴一洗氛祲綏靖邉徼宸算未浹皇仁寛復仰體安輯無辜當雷霆震懾之餘沐以雨露涵其脅從濡之澤莫不匍匐懽呼永誓無貳一切善後機宜彈心籌畫敬陳天聽幸蒙覽進勦經由之地見夫雷波一境左挾冕越右俞允余周跨六詔前拱建南後衞叙馬羣山扼險金沙劃界誠腹裡之屏藩要荒之隘區也爰相度形勢築城郭修營壘設流官規畫既成邉鄙晏然事半功倍又如是之速恍有神助伏念上御闗聖帝君歴朝累加顯號今洛陽皆設博士春秋極以來又復追封三代解州祭享備極尊崇維此蠻疆無異中夏特䖍搆廟宇是經是營大門三間正殿後殿如之配以廊廡繚以周垣計日落成規模宏敞余肅將瞻拜因憮然曰闗聖浩氣英風卓絕千古廟祀之典不獨通都大邑巍峩煥赫即僰道蠻荒咸昭誠敬且月之朔望營聖諭彼衞諸員於此宣講不環拱敬聴嚮風慕義蒸蒸然旃裘魋結之衆靡其沐浴於太平德化之盛焉夫捍禦疆圉撫字百姓則官斯土者之責而黙祐於上俾雨暘時若嵗神獲屢豐民歌樂土者維之力也蓋以聖天子在上則百神効靈我天率土莫不尊親今輿地日皇上文德武功光被四表普拓邉陲蕩平瞻雲就日之下兵息民安當共慶郅隆於億萬斯年矣余中心懽忭敬獻匾聨用誌永久并序顛末永夀之於石黄廷桂黄螂所闗帝廟碑記聖天子御極之六年雍正戊申天宇所覆地維所載氈裘卉服之區鑿齒雕題之域来享来王悉主悉臣顧兹米貼土婦陸氏以蚍蜉畏罪不能自縛就戮遽敢要結黨羽跳梁山澤余時提督軍務率諸營將天討旬士奉間深入蠻箐行列陣布旗明甲耀未盡厥月之武所向率服一二醜類莫不俘獲誅殱藁街懸首以宣示國威俾震懾之餘又憫其頑愚宥其脅從蓋殺伐既張與之更始而黄螂土司國寶遂以其地内附余因夷情歸化相度形勢見黄螂一隅實為黔越咽喉戎瀘藩衞乃扼險隘築哨堡建城池設戍部歴聞又歴善後俱有成畫并以奏伏思闗聖帝君廟祀徧萬國精靈彌六合義勇蓋三分我朝神聖相繼威武張大湛恩汪濊聲教所訖無遠弗帝屆是威靈君之朝廷之徳化兼荒并包齊觀等量爰崇其廟貌昭其祀事禮制之隆侔於東魯每月之朔望營衞得於此聖諭宣講拱聴以成一道同風之盛且冀夷氓神之黙存感應與意胥為表裏其荷國家懷柔綏服之神之休曷有既與廟創始於周月干尺日告竣於堂月日屋成若干楹垣若輪奐既新皇既飭室宇有嚴廊廡有秩漢夷具瞻罔不祗肅遂額曰闗帝之廟且叙次顛末勒石垂遠他如工力財用之數供億董事之人則紀於碑之隂云記佟鳯彩修成都府學記嵗辛丑子受命撫蜀駐節錦城循故例視事三日昧爽謁説六經蓋倣先師孔子廟集博士弟子升堂鼓篋稱周禮大司成掌成均之法以教國子者也及期余質明而興盥而奠不見所稱先師廟者惟茂林豐草間諸屬吏張幕而拜陳詞以燎余矍然進博士問故答曰是火而為墟也俎豆之地為豺狼之所穴狐之所嘷將廿年所矣予愀然曰夫子之道與天無極為萬世法去佛老遠甚今佛老之徒習於其教溺於其所學尚金碧其像瓊瑤其宫崇其饗侑伐鼓撞鐘祓巫紛史盛其歌舞奔走竭蹶天下之人惟佛老之教之歸彼都人士側足儒林佩服絃誦獨於吾夫子之宫牆坐視圯廢不一過而問耶諸博士揖而進曰成都新復寇訌於東士疲於伍當事者惟櫜鞬之從奚暇學校為予曰不然學校之設非僅文教也凡有事出征受成於學執有罪反釋奠則以訊馘告何獨孔一文教乎昔漢高祖討陳豨還沛過魯以太牢祀子至光武中興臨淄方定天水未賓即躬視太學夫漢高不事詩書光武起家徒步俱於干戈擾欀之際留心仁義禮樂之宗尊儒重道為天下勸況今天子明聖繼體重熙山海遺孽漸次削平又成都係省㑹重地為屬郡觀瞻文翁遺教宜有存者顧令夫子之宫榱桷几筵盡淪草莽毋乃諸生羞諸博士復揖而進曰昔夫子之策衞也曰庶而富之富而教之今士民其瘵靡有孑遺怨鼠驚鴻捉襟見肘孜孜建學興文不其迂歟予曰嘻學校王政之本也夫子之言謂非教無以保富庶非謂待富庶而後議教也若二三殘黎不使之揖讓夫子之堂僾然愾然習其衣冠劍履觀感興起於善將見三綱淪九法斁反浸淫於佛老之教漸趨於邪竊恐殺運之不殄也諸博士唯唯而退予迺諏日卜吉斬荆驅石鳩工庀材捐資程費經始於順治十八年十月越康熙二年九月竣厥工計建大成殿一啓聖宫一大成櫺星門各一明倫堂敬一亭各一暨兩廡左右學舍及大門石室載啓坊表悉具翬飛鳥革將將翼翼過者望宫牆之崇高起斯文之瞻仰矣余故樂為之記張象翀眉州修學記康熙六年秋九月上親天下政詔以實學廣録人才是嵗十一月睂侯趙公重修學宫成先師殿及兩廡具㦸門櫺星門具啓聖祠明倫堂具二十年荒址率作如是公勞矣公嘗憫三代後人不宗實學皆由士民異業遂以羣分每為浩歎焉古者有分人無分學父子兄弟相勸誡倫常事耳力餘乃敢事文故耒耨牽車之時猶行以孝弟詩書之義學之名不立學之實無不備大司徒所書升而官之録之者胥此俊民也故小大偏全之才胥得各出所能以佐君父而天下治三代後學之名非不尊且美聲華相尚而聖人之道無聞於是翹翹然曰吾士也而樸遫顓蒙者亦退然以民自處上之人不能禁其區分不得已而取古人考言試藝之餘意以辨天下才雖名實并茂之士間於此得之抑亦難矣嗚呼園橋頖水間僅存此俎豆牲醢之文以事我孔子而遂謂郡縣皆有學豈古人本意與此大道所以不著也然則為民父師而有志於行道亦惟以務本之意行勸導之微權猶可及耳眉於蜀有文學名乆矣於宋為盛故仁宗謂天下好學之士多在眉山思昔蘇氏之學卓然深求於聖人之道尚志節講名義淳如也初未嘗以工文為專事而一時經術之言遂成碩畫當時雖不盡其藴忠厚之誼處窮弗改今讀其書皆言而能行者學有實用如是亦足矣了翁先生牧於眉嘗築室白鶴山以所聞於輔廣李燔者開門授徒人盡知理學昔人謂了翁深於政由今思之蘇氏之好學如彼了翁之善教又如比彬雅之英相望於一代何其盛歟吾固知今之人服蘇氏之學而未能未有不起而思了翁之教者雖然公於眉較了翁苦矣聞開禧間蜀無大兵革了翁所教猶未亂民耳今眉當大難餘經數百年未有之困而公教數十年不教之民古所云功在起衰斡旋剝復當不過是公良勞哉雖然公樂任之公有道者也出政有次甫至即急民事修廢堰四又親勸民墾荒六載之内民自謂食足公㕔事尚不葺惟四時勸民讀法與課士并行已得古者有分人無分學遺意兹學宫成諸生得進籩學禮於中又為徵選師儒公公餘輒臯比於鶴山書院而蘇子祠又悉列齋舍使眉士居業焉論語曰君子學道則愛人公其人矣眉之人由此思敬思勉惟實學是務公卿大夫之才由此具可求也嗚呼公之望於眉人不止如三蘇子也眉人之徳公又豈止如了翁云公諱蕙芽字㓜湘燕人也嘉定州修學記高幖之麓維嘉學官明御史郡人程子啓充實肇造者故廡下曽專國祀祠之經百餘年甲申蜀亂殿廡門楹悉燬於火朝順治之辛丑嵗西山張公諱能鱗以少叅領蜀南先建明倫堂為講地未幾以入遑賀去明年復来是時有巫峽餘氛大役繁起不也甲辰役止民寜公乃建兩廡置七十子及先儒主起㦸門三舍乙巳春謀於州牧高侯仰崑乃大集工建先師殿啓聖祠櫺星門及池上大坊鄉賢名宦二祠丙午復建尊經閣及六齋一切榱棟壯麗丹雘炳朗入其中者愾然有車書杖履之思秋八月特牲告成諸生述公之功商記於予夫公之功可勝紀哉公之學深得於自强不息萬物一體之㫖迹其守兹南土去害興利父老子弟之歌頌自有志不朽者惟是蜀南多士乆困幽谷心莫適從將甘為齊民焉王道不興聖人之所恫也憶公下車日首重孝弟專以明倫課士士子自有油然動於中者公又恐樸茂寡文不學無術將焉用之爰置高幖書院設廩以延多士四方来者盈舍公每政事少閒輒臨院為諸生講論出所纂著孝經衍義大學衍義補儒宗理要等書無一非敦本善俗明體達用之學又訂釋奠禮書附進賢論謂有子諸人之徳高於予求而僅配食廡下議將進之升堂此非具千古卓識何能取古人而尚論之則公之藻鑑人羣旌别淑慝大槩可思矣書院初起公登壇之日未嘗斤斤然為士子訓鉛槧業一以主敬致知窮理盡性至命為指歸二年之内諸生靡不快然有所得亦各能言所言卯午且書升八人夫不徒以文教人而文亦應之則公之至文入人心深矣聖人之為不厭誨不倦非終不可學也貞恒之力不足故純駁分焉遂令聖人之詣為千古絶業公之學極乎粹而力足以貞之故在己者有以續千聖之傳及人者有以大一體之盛淺識之士徒知公之煇煌廟貌馨香俎豆為足以隆事我先師也烏知公之事人之為誨也乎嗚呼親公之教先師者尤在善學聖而有得於心則人人皆公之繼體而道由此其大行矣是所望於蜀士之善學我公以事先師也己予以功不可勝紀也聊記其畧云學附張公高幖書院徵聘名士文竊以士子志必先端其所向儒生問業須知己往之非茍斯道未得淵源則所習皆屬糟粕聖賢之閫奥必何如而後入室升堂性命有精微豈姑且為之尋章摘句況乎六經註脚果盡貫通否乃以一第浮名遂分得失耶若自恃以及自滿便非下學之純倘自省因而自慚猶有進階之路用是𢎞開書院徴選俊良庶幾載望高幖復興雅化謹諏嵗首建寅之月卜吉念五入學之辰聊備薪水以供饔飱并潔齋廊而懸臥榻負笈千里西南可以得朋星聚一堂觀摩豈曰無益從來渾金璞玉之質尚須陶鎔砥礪之功矧當化雨春風之時豈忘栽培傾覆之理知子之來之必有以懷之知子之好之必有以報之伊人宛在欲溯洄而莫從匪我斯求雖再三而非瀆幸無守株以待兔何至臨淵而羨魚吾道其傳勿令眼前錯過此中名理誰能言下承當企望殊殷筆多覼縷允屬譽髦敬聴無諼王士禎登嘉州高望山記入嘉定州境連岡複嶺直達州郭一水遶郭南流注江曰竹公溪有竹林三郎祠嘉州古溪上人家背江面山隨溪數曲達於州門南安華陽志南安縣治青衣江㑹云蜀王開明故治也憩上南道舊署署枕高望山之足有高望樓牕檻軒豁三峩正值其西問丁東院無知者飯後門人鄭陳季帥四子從登高望過一小寺甚荒落鄭生曰丁東寺也一井泓然在佛殿之南即丁東井山谷易名方響者時雨後水溢鄭生云水涸則井半有泉鏗然下注其聲丁東然高望一名高幖州之主山也有宋神霄玉清萬壽宫絶頂為高幖書院登此四望其西三峩竦峙青衣沫若二江自西来㑹於雙湖岷江自灌口成都下新津武陽經城北平羌峽至凌雲山前三江合流浩淼無際凌雲九峰相接又名九峰稍南烏尤馬鞍二山鱗次江岸丹厓翠壁望若畫圖江流平遠戎瀘諸山宛至杯案昔人謂嘉陽山水為西州冠非虛語也日晡迫下山帳望而别約明晨登凌雲觀大像登渝州塗山記康熙壬子十月初八日舟抵重慶府古渝州也明日登塗山林生堅本從常氏謂禹娶於塗山辛壬癸甲而去即江州塗山是也有禹祠及塗后祠酈氏辨之以為禹娶在壽春當塗非此倦逰録云禹廟後一氈裘像侍衞皆夷人云是禹婦翁也操小舟由龍門登岸龍門者江濱積石中㫁如門俗謂龍門浩巴人謂小港為浩今戎州亦有金箱浩也浩之上瀑布如練數折入江右即粉水亦曰清水穴穴右即海棠溪遡瀑而上石瀨泓然茆屋十餘架閣以居畧彴通往来山半時有稻畦凡十八里屢折益峻東倚奔峭西俯絶澗至一天門更上二里許度回龍橋抵真武觀遵西麓而上登鐵桅峰即塗山絶頂矣下視羣山纍纍如蟻垤三江合流曲折正如巴字渝城孤峙江中宛如龜之曳尾記稱渝城有門十七九開八閉以象九宫八卦云西北為縉雲山山有迦葉尊者手跡上有相思寺生相思竹形如桃釵遵東麓而下石磴高危俯視千仞令奴子夾持以行下山登舟順流至朝天門林生别去登白帝城謁昭烈廟記十一月十六日舟發夔州太守熊君過予以小舟同往魚復浦磧上觀八陣圖所謂六十四陣如棋盤二十四陣如偃月者不甚可辨太守云登高遙望行列宛然近觀即存髣髴理不可曉按蔡氏云八陣生於方圓方者坤圓者乾或謂風后因井田之法以立兵制武侯得之布之魚復壘或曰武侯與風后名司實異不可知也陳都督東海相待臥龍山下里許至少陵祠有石碣題唐杜工部子美㳺寓處堂三楹祠中有沔陽陳文燭修祠碑宋治平中知州賈昌言常刻少陵夔府詩為十二碑建中靖國元年運判王蘧又刻十碑於瀼西果園今昆明池水一篇獨完則後人别刻秋興八碑非宋之舊矣此地在宋為漕司即少陵瀼西宅址連騎而東石路頗坦迤山上女牆曰子陽城其下為下闗城稍折而南即白帝城二城犬牙相連城枕白帝山石垣繚繞上極青冥水經注所云白帝山北縁馬嶺接赤岬山其間平處南北相去八十五丈東西七十丈東傍瀼谿即以為隍西南臨大江瞰之眩目者也然入蜀記謂瞿塘闗唐故夔州與白帝相連闗西門正對灎澦堆則臨瞿塘者當是唐之夔州非白帝矣羊腸數轉始達絶頂正俯瞿塘兩崖灎澦石在其西孤峙江面南向為昭烈廟規製宏麗明良殿凡五楹中祀昭烈皇帝以武侯闗張配食像設古雅舊傳有山谷題名及元和碑皆不存正徳中行軍右都御史林公俊一碣記舊有廟祀公孫述林以征藍之役駐軍於此始廢述祀改創三功祠三功者后土氏江瀆之神漢伏波將軍馬援也乃知此地曾祀子陽及伏波矣放翁白帝廟詩參差層嶺上邦人祀公孫力戰死社稷宜享廟貌尊丈夫貴不撓成敗何足論二公持論不同如此祠北有麝香山杜詩注引寰宇記謂在秭歸縣東南者非東即瀼溪源出大昌縣流經天池清溪南入草堂河曰瀼溪水流經赤岬白帝二山間逶迤入江又一水出大寜縣流經郡北戚靜山亦南與相㑹少陵草堂在其東河以得名蓋東屯故地也寰宇記大昌縣西有千頃池水分三道一道南流為奉節縣西瀼水是也困學紀聞東屯乃公孫述留屯之所距白帝五里田百許頃稻米為蜀第一放翁云土人謂山間之流通江者曰瀼猶沱潛之類也瞿塘之上兩山夾立北為赤岬南為白鹽對江山半有故城基畧可辨識陗仄尤甚僧言即古魚復縣漢江闗都尉治者都督慨然曰古人設險良有深意今若治白帝一夫當闗可遏百萬之衆過今治逺矣放翁謂今治比白帝頗平曠然失闗險無復形勢古今人所見畧同也四顧江山雄麗緬懷霸圖徘徊慿弔不能去都督開讌祠下奏軍中之樂聲琅琅然與天風江濤相應酒行無算移晷始告别諸君皆騎行送予由山麓出白帝城西門門去工岸直下數十丈為之震掉下馬徐步舉少陵白帝城門水雲白低身直下八千尺之句宛然目中予登舟諸君自崖而返舟過灧澦自江中望之出江面可二十許丈正當瞿塘兩崖之中勢如怒猊北尻南首稍北即黄龍灘復有一石宛如研山兩岸各百餘丈豁然中坼是為峽門酈氏所謂廣谿峽即瞿塘峽也是為三峽之首峽程記三峽謂廣谿峽明月峽仙人峽其瞿塘灎澦皆不與者誤也記又云自蠻江桔柏沱導等江至此凡二百八十江㑹於峽前實為蜀江滙處峽口有鐵柱二景定五年守將徐宗武作各六尺四寸貫以鐵絙鎖峽者時江水既落明流紆直白鹽赤岬峰巒交映鑿翠流丹四十里間目不給賞山間紅樹與石色相錯如繡舟人云山黄金也過臺閣子黒石虎鬚諸灘皆夏秋江漲時最險處今猶湍悍可畏大抵夔峽之山丹碧赭白不一狀其高刺天望若雲霞山趾别有巨石似巨靈初闢斧鑿宛然如跗承萼削壁萬仞玲瓏凹凸割其片段皆米家海岳菴中物也峽中風逆晚抵飛纜子泊去巫山縣三十里劉如漢嘉州高幖書院記漢嘉山水清巋之聚城有高幖山主於中而博收焉峩眉之遠大凌雲之高明龍泓之秀雅烏尤之疎越莫不屹然爭勝登高幖瓌顧諸峰逺大者高明者秀雅者疎越者若一一受其裁成錦江来多岷山厥水清悠淼淼沫水遄急漹水遒勁淙淙有聲踞高幖而俯視三江清悠者遄急者遒勁者何衆派之滙於宗耶我藩叅張公之建書院於兹以育蜀南士也蓋有所取爾昔之蜀南為傑士藪出者各有建樹處者亦罔不彬彬秀良甲申之變坑焚殆盡廿年来絃誦聲歇士亦不自振起豈天生才有豐嗇抑亦作人之化無聞也公辛丑出守南土慨然惜之既為民經營溝澮即建學明倫以斯道為己任先是以時課士士勃然知所嚮往繼憂其散處爰設書院檄召各庠士子居業且捐㢘金備廩餼且募齋夫供薪爨負笈者如歸也顧所業各未得要歸公乃出江南督學時手訂大學衍義孝經衍義儒宗理要等書示士子理學天人之㫖又自下購經史古書八百卷貯之尊經閣俾多士沈酣飽飫於其中政暇輒親臨臯比剖決譌疑使知要歸之處每曰學不究天人而徒榮青紫雖得之終於吾道無所輕重是以癸卯丙午雖登賢書者數人公未嘗以此為宫牆多蓋所望者得孔顔之樂繼道統之傳不區區尺幅自見也嗚呼置身軒冕之中而欲體聖人之教有其志者未必有其事公之曲成不遺可多遘歟公横渠裔也家學淵源以民胞物與為志以窮理盡性為歸今取全書讀之西銘正蒙諸篇與公所續緒言太極歌定性諸論其心其理先後一轍蜀南多士茍能仰止高幖風雨晦明勿輟涵泳於知水仁山從容於天人性命萬事受裁統宗一貫各有得焉處則自適於孔顔之域出亦不愧為伊周之侣則公之家學固淑身善世之模楷多士之學公之學心公之心者亦庶幾無負此高幖也已書院中上公車者在長安與予述其事誦其徳請予記予曰公之為此也樹一代之真才衍千古之道緒葆兩間之元氣淑百代之儀型教思無窮天下後世必有聞而興起者區區吾鄉已哉公諱能鱗别號西山燕人也李先復柳邉驛免解逃人記嘗考古者碑以記往事而懸用木後人書之以表其功徳因留之不忍去碑之名由是而傳自秦漢以降生而有功徳政事者亦碑之而又易之以石失其稱矣余之碑逃人則異是逃人奚以碑曰碑逃人紀栁邉驛之免解逃人自黄公始也公諱貞泰號澹園山東即墨人由壬子副車康熙二十年来南邑蒞任四載政事功徳載在口碑未暇校舉而栁邉驛免解逃人則尤功徳政事之大者逃人為我朝首禁窩縱之嚴律有明例今蜀去呉逆煽亂王師京師萬里逃人之累全蜀未有頃以肆征八旗兵丁間有私逃者愚民不知其累或窩或縱貽害良多甲子嵗鹽亭遞解逃人至栁邉以守防稍疎逃人復逃栁邉驛丞併應差里排均照律議罪邑侯黄公聞之曰驛遞止應夫馬遞解逃人責在州縣乃通詳府道司院一不允至再再不允至三畧云驛丞接解逃人重犯天下從未嘗聞查閬中至廣元廣元至寜羌凡有逃人重犯閬中直解廣元而施店等驛未嘗接解廣元直解寜羌而神宣等驛亦未嘗接解祈照施店神宣例逃人重犯俱不接解鹽亭直解閬中栁邉驛遞止應夫馬等語大中丞韓批云驛丞職司應付夫馬原無接解逃人重犯之責嗣後仰照神宣等驛之例止應夫馬凡遇逃人重犯飭令鹽亭徑解閬中接解可也業經遵奉在案嗟乎即一事而貽福闔縣如此仁人之言其利溥信哉今公以考成特最將行矣邑人士恐事乆言没之失傳也索余記余曰春秋之筆有紀事者有紀言者公之以解逃而力任其事不避勞怨其事可紀也公之因解逃而敝舌秃穎始獲如議其言可紀也余乃執筆而紀之其辭曰柳邉疲驛界在閬鹽皇華孔道供億維繁西送至鹽北迎於閬夫馬絡繹困苦難狀繄維逃人責專州縣胡為柳驛成例紊亂婉婉黄公民之父母援例陳情繪民疾苦晁董公孫其對洋洋公言炎炎堪與比芳一再至三上允其議勒之貞珉世世無替後有繼者皆沐徳功況乎親炙感戢何窮吁嗟愚民無疑無猜鄰邑有吉視此文哉宋璋義學記古聖王之治天下也國有學鄉有校三代相沿俾其子弟咸奉一師為車鍼而不趨於異路是故明五典迪五常以䇿其躬談六經授六藝以牖其識教者之所以教學者之國所以學無非崇實黜浮務期文行交修焉已矣我家昌明正學一道同風學校迭興依然鐘鼓辟廱之盛余宰邑必以誨民朂士惓惓勿懈七年来義學之設塾師之延館舍之取直余未嘗以貧乏故少有倦心第邑署附城城西之地半為伍營八旗所棲息其餘民居與市廛交錯館舍維艱兹從西湖街内覓得廣厦南向離位文明象也深肆進計壹拾伍丈壹尺前濶四丈一尺後濶六文二尺後通大馬站西向屋四進長一十三丈七尺前濶二丈三尺抵街後濶二丈五尺挨近别駕公署大小屋舍二十九間售價三百二十有竒余於捐貲易劵後又捐八十餘金即為修葺改造煥然一新䥴其額曰南海義學永為邑之子弟及五方負笈者讀書課業之所義學門前左右鋪舍兩間收其庸為將来補葺棟宇之費餘則留為先生燈油之助頭門内堦墀上為講堂三間中為絳席談經論道與諸生朝夕質疑問難外時或㑹文月省程課後堂三間左一房先生燕息於斯中一堂右一房并後廊十五間與後堂之左三間旁有隙地分搭偏厦二間為厨房新舊増置共成二十九間俱待来學者處此至大馬站另院房屋七間每嵗取庸為先生薪水是資擇多士素所樵重毋覓蠅頭毋爭趨騖影沈潛粹養文行兼優者以登師席為義學典型夫南海為嶺南首邑代有名儒如區册下筆千言韓昌黎稱其人不易得郭棐與聞心性陳獻章賴其疏以闡揚霍文敏行誼清高直聲震於天下倫伯疇四元疊出才望茂於一家要皆文可法而行可宗無非由於粤秀樵山珠海鬱州靈氣之所鍾者豈必藉學校之所致哉雖然亦何嘗非學校之所致也人未有不本乎教以牖其識以䇿其躬彼不教而能者天下一人而已伊川先生曰教必就人之所長所長者心之明也從其心之所明而入然後推及其餘爰是從其不忍之心推而至於仁從其辨别之心推而至於智從其剛正之心推而至於勇進徳固然即課文亦然從其好竒之心推而至於古奥從其好新之心推而至於清雅從其好富麗之心推而至於淋灕典贍從其好圓熟之心推而至於錘鍊精純且推其求名之心使之人人務實推其冀效之心使之人人專功為師先端其矩範學者共凛其率循庶幾南海之子弟行南宫敬叔之行學張南軒之學擅曾南豐吕河南之文相與圖南則下筆千言之區册與聞心性之郭棐直聲震於天下之霍文敏才望茂於一家之倫伯疇復見於今日既可以副國家昌明正學求賢若渴之心更可以無負古聖王設學校以造士之意并不虛余建立義學之摰願焉詎不甚快因勒石以驗余言序王士禎蜀道驛程記自序自昔揚一益二并稱天府按古者虞十有二州夏九州揚州之域盡於南海五嶺之地所暨遠矣至漢始别置交州部而梁州據華山之陽西距黒水以今日輿地考之漢中興安屬秦則雍州南境也鄖房屬楚則荆州西北境也所統不及揚什一而揚益甲乙相次亡軒輊者則其山川之竒人物之美物産財用之饒蓋可知矣漢唐以来志於常氏賦於左氏傳於陳氏句氏記於譙氏韋氏圖於宋氏詩於杜氏後有作者可以橐筆而退矣至述征之作則韋莊李用和輩不甚著於世而陸㳺之書獨傳余以康熙壬子有成都之役往来五閲月賦詩三百餘篇世多有其本又所記驛程二卷置篋中漫不省録忽忽二十年往矣屬門人盛御史符升為余刻粤行三志因憶前事從蛛絲鼠齧之餘譯而存之其間考古述今亦有足觀者不忍棄也金儁峩眉山志序天下名山多矣而蜀山稱佳余以為天挺峻拔當必有竒凡蜀之萬仞揷雲連峰千里而不㫁者率皆培塿比可也而峩眉獨異顧峩為蒙山之首比肩五嶽不獲列於祀典何歟余嘗考舊紀云峩以名言眉以形言夫其横亙西陲衆莫與京譬諸人之面焉五官各有司而眉獨無所事然而聚秀凝姿標英煥彩非眉則弗克彰若峩眉之瓌瑋天地而表章宇内也亦猶是余自己酉秋来涖蜀藩殷殷焉望三峰而神往而吏治旁午未果躡屐登臨以挹峩山之異者四載於兹矣今夏太史綏菴蔣公選勝来蜀憩是山者數月陟嶮巇捫霄漢求歌鳯之遺跡訪爛柯之故址探芝洞之幽竒擷香巖之真勝凡古利名泉以及瓊草琪樹怪鳥異獸靡不寓諸目而得於心顧山志之未悉散軼而莫紀也從而輯之浹月告成齎簡問序於余余謝不敏既而自念天下所難遘者不獲身接猶得以心遇之夫以巢由之肥遯也偓佺之導引也老子之談經列子之禦風也千百世而下何從聆謦欬而覿平儀乃求其人而不得聞其事讀其書如見其人焉是志也將以政事之餘咏歌嘯傲展卷而峰巒劃裂致趣畢呈不煩登陟不費攀援而峩山已在目中矣是誠足以酬逸少之餘憾而副青蓮之追憶者也然則是書之成當與峩山同壽吾第恐蛟龍雷雨之震躍於其間也杜濬送宋荔裳之官四川按察使序君子之學出處二者而已出處之道處以為身出以為民而已求之當世處以為身者當如宣城沈耕巖先生出以為民者當如合肥龔芝麓先生耕巖而外處而賢者不具論芝麓而外出而賢者則又有宛陵施公愚山萊海宋公荔裳二公皆余石交而穏其心乎為民者也宋公往年觀察兩浙政成化洽為民之效則既見矣中間不知何故跧伏者十年宇内之民皇皇汲汲望公之復出至是聞其以原官起田間補四川提刑按察使斯民相慶於路而士論翕然既以日者竒寃得白為公喜又有稍稍致惜於其間者以謂向使公微一蹉跌則十年敭歴計今已乗鈞軸居中而運澤之所及者遠奈何蘇而復上絶險千里獨幸西州之民乎吾獨以為不然夫居中而運其權分而去民也遠按察一方其權一而去民也近且方今民困莫如楚蜀而蜀又甚於楚則度公為民之心宜莫先於蜀然則按蜀之任雖使公擇而處之不是過也奚惜乎雖然公何以治蜀夫公竒材也敉寜之道非他人所能隃度維吾嘗考之前烈治蜀最著者有三人焉莫不因時制變有卓然不可易之識即亦可以知公矣在漢初葉文翁以文治蓋蜀承新造其民不知禮譬如田舍翁家未嘗見典籍草野而倨侮矣從而教之延師受經所以擊其蒙而通其志使知向方文翁之時然也在蜀漢諸葛忠武以嚴治蓋劉璋富而孱其民不知法譬如懦師之縱頑童繼之者必峻其章程威以榎楚然後循循服吾教武侯之時然也在宋張忠定以剛治蓋沃野長養而盛宋涵濡其民不知節譬如有餘之疾宜用尅伐疾愈藥止耳忠定之時宜然也若夫今日之蜀何如哉獻賊肆虐之餘民不知命矣譬如癰疽潰爛旋事收拾藥餌饘粥循次謹節猶恐不濟又必禁其所忌戒其所怒勿風勿勞以善其後是又向者文治嚴治剛治之所未合而期以仁治焉者也蓋古今之遇獨際其難非有竒材即仁心亦無由達此則宋公之時宜然矣夫公憲臬大官與文張守郡事體不同乃若武侯以丞相領益州牧至今蜀人思之不忘公其類是歟且夫按察之任在於察吏察今日之蜀吏貪無所取而酷無所施惟其使民得墾南畞則吏之良者也刑期無刑較之他日轉覺少易焉則於公出而為民之心豈不尤加惻怛哉至於公之文章騷雅嫓美前人方將發揮山水之竒秀興復前賢之遺跡姑在所不言惟言其最重者最重者何出以為民也王新命東山集自序立言必本性情為政務在力行余生平期此以自朂顧幼遘離亂失學長即從事簿書無由含英咀華潤色鴻業僅於退食之暇涉獵經史竊窺中秘博搜强識討論不倦蓋癖性之所嗜也因是皇華四牡所歴名山大川偶有編述以攄見聞朝堂政府追隨公卿大夫之後亦間有論説發明以達下情而宣上徳朋友酬答雍容揄揚長箋短劄各殫胷臆乃疎慵成習脱藳輒置罕有存者自戊午嵗承乏豫章旋叨量移歴呉歴楚忽忽八九年其間軍興旁午羽檄紛馳籌供億而恤瘡痍拮据靡寜更有民生風俗之所係交游感慨之所及與夫馬蹄舟楫登臨懷古或章奏或記序或詩歌皆録之成帙自念年軼知非老之將至恐乆而不能記憶也刪其繁冗存什一以授剞劂不過以志數十年中之大槩並以記鄙性之所自適勉行之不敢怠耳若竟以為有當於立言為政也則吾豈敢吾梓人也梓城東山層崖修阜蜿蜒綿亙為一州之勝用以名吾堂遂以名吾集云學統序大道之在古今也如日月經天江河行地無論智愚賢不肖皆共見共由者也人心之不正由於道統之不明道統之不明由於學術之不端朱翟為我兼愛鄉愿似徳非徳荀卿以禮為偽告子性無善無不善後世聪明才辨之流假良知以附禪宗皆足以亂吾學既足以害吾學堯舜禹湯文武繼天立極道統相傳而必待孔子以集大成大成之説孟子亦借作樂以為喻乃傳之千古而不易蓋堯舜治天下世遠言湮非得孔子則後世亦何所據令孔子達而在上行道濟時亦止如臯夔伊傅周召之事業何暇以道學之統正之萬世俾顏曽思孟見而知之周程張朱諸子聞而知之若是哉此春秋時之不用孔子殆天之重學統甚於重治統也予生也晚且在蠶叢固陋之鄉幼囿於帖括長從事於簿書間或涉獵經史黑白混淆異同雜亂問以統緒茫無津涯今敬修先生示以學統一書是非判别邪正井然如暗室得燈洪流遇筏寤初覺而瞽驟明也先生英年力學不愧科名予自承明識先生迄今垂三十年見其正色立朝古心古貌時時以泰山仰之然未讀先生之書也計先生憩息林泉方踰强仕孔子不惑孟子不動心恰在斯時居諸就將日新富有編成學統繼正脈而扶大道假先生於此十年中勞心吐握晨夕坐論不過為臯夔伊周之黼黻贊襄耳聖天子若欲為萬古明學統恐有志未逮也今日者徳元尊道崇學親辛東魯移風易俗以正人心一老再出而濟蒼生明體達用内聖外王復覩熙皥勲華是不亦學統而兼治統也哉李蕃通江縣志建置序嘗觀風宗畫野測圭記里逮夫職方辨土保章立州尚矣秦漢以還郡縣屹峙雖名號易於時代而封域仍此山川是以欲觀天者占躔度欲察地者任土疆雖有聖人弗與易也吾邑在萬山中太倉稊米耳然辨方正位卜宅契龜昔之人有經畫焉敢曰故籍殘闕置而弗考乎自蜀山俔妺於黄初神禹樹徳於河洛載隆謨訓功配川嶽老彭博聞著聲商室萇𢎞忠赤於爍周朝是巴子未盟之先聖喆接跡秦錯未謀之日聲教早通况吾邑界接興元地域梁州者哉然秦漢以前記載罕著亦由簡樸不事縟煩今欲考志源流自漢始巴為三十六郡之一地屬千八百國之封均名宕渠列在兩漢班史紀十一縣范志同十四城蕞爾幅員延袤匪廣第以傳記不核莫問扶特之山時代已遷難訪曹源之水况經和帝之東北分置又兼先主之割省紛紜然欲考古昔必據今兹試以地輿按之巴州宕渠也保屬之蒼溪通江順屬之蓬營廣渠大嶽鄰夔屬之新寧皆宕渠地也二州八縣之廣千有餘里一宕渠也何延袤哉及考西漢志則為巴郡十一縣之一縣也東漢則為巴郡十四城之一城也而志載扶特之山今不知何地灊徐之谷今不知何名令人按圖悵惘耳又按巴郡記曰東漢和帝分宕渠之東置宣漢今之達州也州近在邑東似為近之今之蒼溪漢之漢昌記亦謂割渠之北所立也今以地里考之又殊不合將安所究問哉陳壽缺志三國失考僅見晉志所載有蜀先主割巴州之宕渠宣漢漢昌三縣為宕渠郡是宕渠固一縣也晉屬巴西載紀甚明而分注闕焉猶為憾事至於宋書為宕渠縣者三一屬華陽郡而係於下曰永初郡國並無一屬梁州之南宕渠而係於下曰永初郡國有宕渠郡領宕渠漢興二縣屬梁州元嘉十六年廢屬益州非此南宕渠也又曰何徐並無此郡一屬益州之南宕渠係於下曰起居注本屬梁州元嘉十六年廢是宋書之錯見也如此至於蕭齊志宕渠之郡五而冠以東西南北宕渠之縣三而不注建置沿革至隋開皇初廢宕渠縣而後人之考稽愈無據矣一統志謂邑在魏為諾水屬萬州今按此段僅見於隋唐書分注魏史俱未注别僅曰巴州郡縣闕而已豈邢巒之説不用而王足来奔尉迥之功方成而魏鼎已西無暇纂籍至漏簡編耶然邑西有磨巖石刻則諾水之號在焉不可謂非魏收之疎也梁陳無志北齊地狹吾每惜李延壽修南北史徒割紀傳之半未備志載之書使當日者搜之掌故詳考因革去古未遠為功或易奚至以點金成鐵貽譏後世哉若隋志之為始寜為符陽為白石原𨽻清化郡今皆邑之境内也若唐志為壁州為通江為廣納為符陽為白石為東巴即𨽻壁州今亦皆邑之境内也良由隋唐之際雖寇盜之充斥於天下者六十家而梁益之間無弄兵刃而盜名字者余每讀史至此未嘗不為當日之蜀人幸也以故人物殷盛州縣碁置隋唐之志吾無議焉五代初為王氏所據後唐滅蜀而入唐未幾而復為孟氏有矣縣之因革不可考壁州之名未有改也至宋開寳五年而壁廢矣白石符陽並省入通江焉元至元二十年省上通江下通江入罾口然廣納東巴尚未詳其廢自何年上下通江亦未著其置於何日覽者自不能不於邑也善乎沈約之言曰地里參差其詳難舉實由名號驟易境土屢分或一郡一縣割成四五四五之中亟有離合雖千回百改巧厯不算尋校推求未易精悉也則作志誠難責於後學矣吕潛唐山人詩序世稱唐山人詩瓢第謂隠居獨善者流耳以余觀其行事固介然則義士也當山人投詩江中匿影韜聲得一人知己足矣遑計千百世後哉乃一瓢泛泛若為蛟龍所䕶持不滅没於驚濤怒湍之中而光氣歴代猶新豈無故歟蓋山人生唐末不屈志權帥亮節高風可干霄漢故其寄之於詩精靈炳朗不受銷沈有如斯也今讀其詩僅三十餘首蒼勁閒逸猶可想見其人嗟乎夫人欲以布衣雄世而無鐵石心風霜氣譬一籜葉空中翺翔耳亦何繫輕重於人代乎余友青夕於中唐人中獨取數家可謂矜重矣而山人在焉非其介然之節義有合而取之也耶青夕謂余曰此蜀人也子序之余烏足以知山人姑就其大節論之如此陳書跋李鍾峩太史所録保寜志序志者古郡國史也吾蜀自承祚耆舊傳後作者迭興迨有明之世踵事增華猗與盛矣而升菴玉壘方洲三太史所輯為最著此蜀志源流大畧也曩者嵗在己丑余自閩旋里適梓潼邑侯袁公還樸奉檄纂輯邑志屬余校讐觀其所蒐羅書籍率皆殘編㫁簡雨漬蟲凋或有其人矣而事跡無徵或載其事矣而人地莫考至其詩文諸類間從榛莽中抄録一二以備數蓋兵燹以来紀載之殘蝕非一日矣既而薄逰成都見某年某撫軍所修省志則又綱目􅾦雜條例不清其間傳信傳疑恐亦未為允恊思得三太史舊本一寓目焉乃求之一二知交皆鮮有蔵者嗟乎陵谷變遷典籍淪没夫豈細故哉康熙丙子在京師見萬厯己未督學杜公所修志於王純嘏先生家因得借觀其書於三太史原本已三經修輯然常考敝邑鹽亭科第而先祖𢎞治八年經魁萬正公以篤行博學至今享祀鄉賢者亦遺漏不載其他又何可盡攷耶顧其體例正大去古未遠猶存三太史遺意爰摘録潼川志一册以備他日叅考而吾友雪原李君亦抄其保寜志一帙可謂有同心矣夫士君子於身所經歴一草一木猶將識之况其在父母之邦乎獨是三太史之原本吾蜀既不可復覯而其猶存三公之遺意者亦遠在數千里外積十數年求之而始得一見設今吾蜀州郡各有人焉在京人各録其本郡之一册以歸則是書縱不能全蓄於一家猶得散見於三蜀無如吾蜀居京師者既落落晨星而遇是書者又未必如吾兩人同志而吾兩人卒不能謀傭寫之資使此書完璧以歸蜀也可勝慨哉故叙而志之為雪原筆諸簡至若風土之宜甲第人物之美與夫山川之秀麗物産之繁賾編中具載覽者自知皆畧而不論云壬子武闈鄉試録序兹值壬子武闈奉㫖以督臣監臨試事體統愈重朝廷之大典益隆臣仍循舊例主試自揣譾陋倍増惶懼惟是矢公矢慎仰副皇上鄭重掄才之至意爰偕監臨四川總督臣黄廷桂監考四川重慶總兵官臣馬義提調驛鹽道僉事臣曹源邠監試松茂道參議臣鄭其儲同詣外場集督學臣周人驥所録武生暨文生員共一千二百六十餘人布政司臣劉應鼎彚送各標鎮協營兵丁六十餘人編次校閲馬步技勇得合式者八百四十餘人扃闈試以䇿論率同考試官湖北進士臣闞昌言臣吳率祖雲南進士臣李盛唐臣段開化虛衷披閲如額得四十人事竣就其前列者以次録論二䇿一恭呈御覽臣例得揚言於簡端竊惟人材者秉天地之秀川嶽之靈而實因乎氣運之隆培植之厚自古龍彲碩彦雷雨良材類皆應運而生連茹而起歴歴不爽也今聖朝樂育羣英裁成多士即棧壑梯山之逺雕題鑿齒之倫莫不驤首跂足欲自奮其智勇以佐太平矧西蜀峩峰屹屼錦水瀠洄其菁華清淑之氣有鍾於竒士者哉臣於己酉科典試武闈見夫麟麟炳炳實多疏附先後奔奏禦侮之材今科即其技藝文詞細加評隲覺猶是張弓挾矢也而正直有加焉猶是舉重挽強也而純熟有進焉猶是敷陳條對也而經濟較𢎞焉仰見我皇上敎澤之廣化導之神邉圉遐陬蒸然丕振如此由此而益精於技暢於詞且立德立功力敦乎實行器識文藝屏去其浮華他日受元戎長子之寄為好仇為腹心於以輝煌盛治鼓吹休明共襄基者於是乎在猗與休哉謹拜手以言聖天子萬年鞏固之疏申明言官職掌疏題為請申明言官之職掌以彰聖朝昌言之實政事昔時言路之途甚雜今專責於科道官是科道衙門原以盡言為職分也况恭逢聖明在上懸鞀止輦無殊神禹虚懐諸臣凡有條奏必蒙聖顔開霽從容下詢使得盡其所言其或所存緘黙又必諭㫖導之使言是非臣下知無不言言無不盡之時乃極皇上納諫如流豈言竭忠者寡其故何也以臺臣而言各道御史與堂上都御史皆以御史名官古制無甚統屬彼此得互相叅劾今則都御史視監察御史儼然為屬官矣殊非設官初制且各道御史奏疏於前都御史指叅於後其所以指叅者以御史不先預聞也阻塞言路莫此為甚至臣衙門職掌曰封駁曰紏叅曰條奏曰申救封駁申救乆已不行至於糾叅條奏未嘗不循分盡職也然誰則無所避忌直言無隱者耶間有直言者議事之臣非斥為釣譽沽名即目為紛更報怨且誣為受人囑託不思人非皇上豢性生忠烈不忍負身之功名性命冒此嫌疑哉即養之恩孰肯以一皇上允科道諸臣條奏有為行者亦有不允行者聖人無我必確見其應行與否乃因偶一不用遂相率以言為戒而羣目為多事之人必欲去之而後已若皇上聖非包容言官幾無容身之地矣伏乞明皇上申諭科道諸臣務皆秉公抒藎以副厥職不許瞻顧嫌怨茍且塞責各部諸臣凡議覆科道諸臣條奏止論其言之有無闗係虚公採取不得因所言之礙其行事輒用私意概以無容議具覆庶幾人各國有懷忠願盡之心而邊方末學止知抒誠報家受昌言之效矣臣主罔有瞻狥冒昧陳言伏乞皇上睿鑒施行李先復敬陳管見疏題為法無可貸情有可矜敬陳管見以廣皇仁事臣侍從臺班仰見我於各直省命盜重情必令法皇上愛惜民命刑期無刑每司再四平反方成信案熱審之後繼以秋審情真而外復予矜疑求生於可生之中無事不厪聖懷今嵗秋審如貴州田成士廣東俞堯福建羅東壽潘存誠九卿詹事科道會核以情真上皇聞改為緩決在廷諸臣咸頌上如天之仁殆不止泣罪解網而已也臣閱直省招册有盜命兩案首犯已經正法續獲之犯年遠贓物花費証佐無人歴審監候有至五六年者有甚至十餘年者此輩皆有罪之人而乆羈則聖心之所憫若不籲囹圄或至斃命縱日後弋獲証佐之恩曲賜矜全恐奄奄人亦難起九泉而問之矣近查廣東之大頭晚葉得有二犯已蒙綸音減等發落他如直隷之劉二棍子劉三陳大麻子竇麻子劉富正曹來文安金施承恩孫自友山東省張重臣龎一亮廣東省之黄立章湖廣省之呉重養江西省之葉憲章盛京之趙三此十六犯者贓物花費與夫証佐無人皆與大頭晚等相似應與大頭晚等同邀浩蕩今十六犯中有已經題請者有尚未題請者臣仰體皇上大徳好生請將劉二棍子等情由概予減等發落勅部照依大頭晚葉得有等電其皇上格外𢎞慈與天無極矣至若湖廣省之江金趙國竒四川省之毛文燦福建之巫珠既非正犯監禁已睿裁非乆應否從寛保釋俟獲正犯之日另審質結統候臣所敢擅便者也臣恊理山東道未與秋審妄陳睿鑒施芻蕘字多逾格伏乞行奉㫖該部議奏打箭爐設鎮疏題為爐蠻既經翦除駐防宜設重鎮仰祈睿鑒以奠遐方事竊惟我海甸要荒悉歸版籍不意打箭皇上承乾御極仁漸義摩命將出爐番蠻罔知向化致蒙首獻土歸誠此皆我師不數月之間營官授皇上指授方畧故師武臣力祇奉成功以上紓西顧之憂也臣係蜀人畧言蜀事近見四川巡撫貝和諾㑹覆侍郎滿丕等籲請官兵駐防一疏内開喇嘛與營官夥黨行惡年乆伊等夷性難料應設官兵三千名副將一員併逰守等駐防爐地仍令提臣一二年巡查一次等語其條議誠周且善也然臣伏思打箭爐地界綿亙千有餘里投誠之衆種類繁多現今遠遯之蠻所以伏居巢穴不敢肆其鴟張者祗以大兵雲集魄喪心悸故耳將来師旋之後商賈相通貨物屯聚其間保無有鷹眼未化因利乗便易其初心者乎是已附者窺伺萌奸新闢蠻疆正多可慮若止設副將駐防實不足以資彈壓而讋服遠人蓋副將於軍機大事不得自專萬一蠻人叵測一切軍機勢必請裁於督撫提鎮往返愆期貽悞匪細臣以為不若特設總兵官一員鎮守之為便事權歸一既無牽制之憂而大帥威嚴蠻人自有所畏而不敢動所轄鎮標遊守千把等官應各如額設總兵之數而化林營仍照題改設遊擊一員其應設兵丁共三千名除化林營原有兵五百七十五名外所不足之二千四百二十五名應於提標添設兵内調撥一千名再於川省各營額兵三萬六百二十名之内抽調一千四百二十五名俱照題定處所酌量緩急分汛庶免提臣一二年巡查之滋擾至於新増總兵併逰守等官亦於通省協鎮將弁内斟酌拔用一轉移間兵未嘗減糧不加増要地巖疆足資捍衞而蠢爾爐蠻天威於皆凜矣他若目前之建城池置營房以及應否設有赫睿裁臣立文職如松潘建昌之例伏候黄難盡伏乞從防邉善後起見字多逾格貼勅部議覆施行奉滿丕貝和諾㑹同一併詳議具奏㫖這條奏事情著河防疆界疏題為河防各有疆界變例苦樂不均仰祈勅部查覆舊制以杜紛更以免貽悞事我皇上勵精圖治勤恤民隠俯念河工重大躬親閱視其於江南開濬修築事宜喙矣獨是山東河南面諭河臣又下九卿㑹議無容臣置居徐邳上㳺地平土弱非若雍西高山大嶺以為夾束故每嵗必加修防蓋以山東河南為江南門户必門户完固而後堂室無虞為運道乆遠計也山東河堤北岸止曹單兩縣共計一百九十里此應分修築之工也其自戴家樓起至儀封縣交界止堤工三十里計長五千餘丈查係河南考城縣地方歴来修築無紊又康熙四年為哀辨河工地界等事經前河臣與山東督撫㑹同河南巡撫批令考城縣修築歴年奏銷册籍可據不意康熙二十五年河南考城知縣王如淮私詳河南㕔道轉詳前河臣靳輔咨部隨將考城三十里河汛險工歸併曹縣十餘年来代為修理官民交困臣作令曹縣時曾查明從前卷案通詳河臣于成龍後以河臣丁憂臣行取離任未經結案伏查考城三十里堤内如流通集崔家壩等二十二處係大鎮人烟甚密地為考城之地民為考城之民則堤工自應考城修築今歸併曹縣則是曹縣一百三十里堤工之外又加三十里之遠而考城獨手足寛閒亦苦樂不均之至矣且河防設官各有責成河南設通判一員主簿一員專駐考城以治豫省兩河之堤山東設同知一員主簿一員專駐曹縣以治東省兩河之堤今考城三十里之堤工推諉於曹縣則駐考城之通判主簿何所事事又查曹縣額役徭夫三百六十四名曹州定陶金鄉城武協濟徭夫六百二十三名撥充曹縣嵗修一百三十里堤工之役如有險工臨時尚須協調今又増考城堤工三十里夫不加増何能無悞又查考城河堤三十里併無歲修夫役止設㸔守河堤堡夫五十名今歸併曹縣管理而充役者仍係考城人民動輒私逃則河工稽查之難也又堡夫工食仍係河南道官給發則具文赴領之難也毎年奏銷亦赴河南道官核算則册籍造報之難也種種不一殊屬紛更臣令曹縣五載屢經險汛頂沖防曹縣堤工一百三十里止有傅家集險工一處防考城堤工三十里乃有柳林頭芝蔴庄險工二處晝夜隄防幸免沖決若不亟請復歸考城河工重大恐不能無顧此失彼之虞來春正月河臣例往曹邑查工伏祈勅下河臣于成龍協理河臣徐廷璽㑹同東撫臣王國昌豫撫臣李國亮親詣河汛正明疆界將此三十里堤工照二十五年以前仍歸河南考城縣官民修築庶兩省連界之民各得相安無事而河工不致貽誤矣臣因條陳山東河南河工酌復舊制事理字多逾格貼黄難盡伏祈睿鑒全覽施行奉㫖該部速議具奏請復内簾監試疏題為科場闗係大典仰請皇上酌復内簾監試以杜弊源事伏惟鄉㑹科場尤厪用人行政無一不斟酌盡善而於睿懷比者作人推恩廣額海内人士無不喁喁向風今年加意嚴綸議順天鄉試現奉之門振拔孤寒蓋亦至矣臣以為處所以杜倖進科場之弊與其既萌而嚴其法何如未發而絶其根查康熙十八年都察院左都御史臣魏象樞為弊竇多端等事議於内簾設滿漢御史各一員不與文事於聚奎堂上向上設坐㑹經堂左右歇宿專察内簾情弊以及拈題封門収卷封箱條奏極其詳明部議奉㫖遵行已乆自此數科闈中未聞物議而康熙二十六年臣衙門御史陸祖修乃以㑹試及順天鄉試内簾設滿漢御史各一員不與文事實屬無益因議停止在去之者臣不知其何心然自去内簾監試而科場乃往往滋弊矣臣請自今以後㑹試及順天鄉試勅部復設滿漢御史各一員於内簾監試其内簾監試事宜仍照康熙十八年所議條例遵行而皇上特簡清正有風力者以往如满漢御史有扶同狥私一經發覺併從嚴處庶弊端可塞而大典有光抑臣更有請者㑹試順天鄉試内簾供事人役例用禮部儒士夫儒士名目不識起於何時初不過書記奔走近聞闈中分卷打印暗通闗節悉由若輩之手在試官精明謹慎自能加意防閑稍失檢點鮮不墮其術中臣請嗣後闈中將儒士永不取用臨時於各部院衙門選擇老成無過字畫清楚書進辦四五名止令繕寫不假以事權更嚴禁其不許呈題名録及榜文併與房考往来交通是亦澄清塲屋弊竇之一端也如果臣言不謬伏祈睿鑒施行奉㫖該部議奏楚民寓蜀疏題為直陳楚民寓蜀之害伏祈勅部嚴加查逐以恤殘黎事竊照蜀省雖地居天末素稱沃野經明季流寇屠戮於是民無孑遺荒榛滿目國仰賴我三十餘年漸有起色復遭呉逆煽亂流毒家休養皇上赫六載幸然一怒天戈所指旋即撲滅而土廣人稀招徠為急我之二十年皇上軫念殘疆數罹兵燹謀所以撫綏而安全恩至渥來臣係蜀人伏念巴蜀界連秦楚地既遼濶兩省也國失業之民就近入籍墾田填實地方漸增賦税沔計民生豈不兩有攸賴乃近有楚省寶慶武岡陽等處人民或以罪逃或以欠糧懼比託名開荒攜家入蜀者不下數十萬其間果以開墾為業固不乏人而奸徒匪類擾害地方則有占人已熟田地者掘人祖宗墳墓者紏夥為竊為盜肆虐行刧者結黨兇毆倚强健訟又有私立㑹館凡一家有事率楚中羣兇横行無忌此告彼誣挾制官府者告比凡此臣皆得之傳聞未敢入遐齡揭帖為盜刧傷臣辦事衙門見湖北撫臣年命事沔陽州鄭錫我刧盜鄭价玉案内續獲盜犯鄭允文供云逃出就在四川度了兩年等語夫允文以盜案重犯逃入四川兩年則此數十萬楚民豈遂無鄭允文者乎臣請勅下四川撫臣于養志將楚民流寓蜀省開墾者令各州縣逐户確查實係楚省何處人民妻子親戚同居若干人開明籍貫仍取連名互結以防更名改姓之弊造貝清冊咨移楚撫查明原籍因何事逃出或係隻身或有妻子兄弟共幾名口並無過犯取具各州縣印結轉咨川省存案方准開墾入籍當差如因犯罪私逃如鄭允文之類及欠糧避差不法者亦令楚省州縣開明犯罪事由何事逃出或隻身或妻子兄弟幾名口轉咨川撫即行逐一清查遞解回籍仍照原案歸結庶奸民不致漏網而蜀省殘黎永享無事之福矣其入蜀楚民實係開墾樂業不敢為非者該地方官亦應照蜀民一體撫恤不得借端驅逐鋤暴安良此又並行不悖者也如果臣言不謬伏祈勅部議覆施行奉㫖該部議奏楚省五縣南糧疏題為楚省五縣南糧本色解運維艱仰祈勅部改徵折色以便兵民事竊臣以西蜀豎儒七年外吏荷蒙隆恩異數拔置臺班辦事衙門仰見我弊籌畫精詳務使皇上天地為心勤恤民隠於凡民生利膏澤下流無一夫不獲其所大哉堯舜之仁不復過矣臣至愚極陋何能仰贊皇高深謹以見聞所及者敬為我以協濟本省駐防官兵上陳之伏查楚省南糧一項所荆州鄖陽襄陽武昌皆官兵駐防之所每年秋成後徵収本色解交各汛支放兵糧臨江各州縣船載直達各汛無甚煩難獨是黄州府屬之黄梅麻城黄安三縣武昌府屬之通山大冶二縣僻處萬山之中雖地原産米而崇巖峻嶺不通舟楫肩挑背負為數無多輓運之賫倍於米價矣近来每遇開徵各縣亦詳請改折但須候督撫批允始得改折及改折時又將折色解赴糧道轉差各汛買交亦滋往来文移之擾其或仍收本色百姓間於鄰近州縣糴買交倉又有鋪户勒索高價之苦蓋每年開徵時各縣未嘗不詳請而改折迄無成例民困不支目今七月正南糧開徵之時伏祈勅行楚省督撫湖北南糧除臨江州縣仍照例徵本色外其黄梅麻城黄安通山大冶五縣南糧共二萬七千二百二十二石八斗零准其改徵折色即令各縣解交荆鄖等汛永為成例在兵有因時購買之益在民無山路輓輸之艱一轉移間兵民咸得其便矣臣再查荆襄諸郡皆産米之鄉米價不甚騰貴每南糧倉斗一石折銀以六錢五分為率倘慮豐歉或有低昻則酌量至七錢一石至足也倘蒙恩改折仍飭各縣不得另立名色即於地丁内彚徵分解以免滋弊五縣窮黎世世頂祝皇仁與天無極矣縁係條陳楚省南糧事理字多逾格如果臣言可採伏祈睿鑒施行為此具本謹題奉㫖該部議奏傳沈汝霖孝子趙延吾傳孝子諱延吾字又安係綿州安縣人儀部宗普公冢孫性純孝事父母惟謹幼岐嶷不凡垂髫補郡弟子員試輒高等孝子家甚貧饔飱莫繼孝子不忍垂白枵憊遂赴邑城課童蒙資升斗以奉親每得粟孝子即躬負歸家恬不為瘁嵗丁未七月淫雨連旬河水暴漲時新穀告登孝子將所得館米二斗急欲歸獻以備晨炊遂負之行渡至中流巨浸衝激孝子獨力莫支負米偃仆遂以淹溺告終次日漉孝子於積沙中僵植危立玉色如生闔邑為之悲悼邑侯呉公輯孝子平生行畧詳之郡伯冀公復上之學憲孫公以請祀鄉賢因額其祠曰文孝行令公為之致祭於家焉矣楚辰沈汝霖曰古有以赴湯蹈火俠烈著聞者未有為親負米殞身於洪濤巨浪中人莫知之如趙孝子之所為者説者方之仲由曾參以為無愧古人余則更有進焉方其褰裳思濟時使稍涉瞻顧則深厲淺揭必望洋而返矣孝子不然此志之所以皎皎也使天假以年克自表樹顯可備國家股肱之用隠當作儒林山斗之型何以竟奪之速嗚呼痛哉雖然沙岸猶存芳魂不遠後之人過而指之曰此趙孝子負米殞身處則孝子之死而生矣墓誌銘王士禎行健趙先生墓誌銘康熙壬子予有蜀役蜀士之才美者多從遊而西充二趙子心抃心普兄弟尤卓犖竒偉因獲聞其尊人行健先生之賢又二十四年心抃官給事中與予同在京師於是先生年八十餘矣而神明不衰每家書至皆蠅頭細書所以教誡心抃者不啻辟咡提命以為先生期頤未有艾也無何心抃視河報命歸而先生訃聞心抃擗踊泣血次先生行述稽顙来乞銘嗚呼予以通門之舊仰止先生餘二十年矣其忍不銘按家乗趙氏之先本秦人明初徙蜀西充至良佐者有學行稱石橋處士處士子純純子延年家益起好施予鄉鄰待以舉火者恒數百家有二子長曰永慶次即先生諱長慶行健其字先生世祖章年十五補博士弟子有聲抜貢入國學謁選人得皇帝順治十年甲午始以棗强縣丞為政平恕蒞事明決令長取裁焉縣有大繇役輒倚辦事訖而民不知勞故上官重之有加禮俾署高邑武邑兩縣治狀著聞兩縣人尸祝之㑹以武邑逃人案詿誤去官縣之父老子弟籲留不可則宿舂糧泣涕走送百里外其感人如此先生既歸閉門授徒户屨恒滿其訓心抃兄弟曰讀聖賢書貴明義理非祗佔􅖶章句梯榮媒利為仕進羔鴈也人能將賢賢易色吾日三省吾身二章身體而力行之其去聖賢不遠富貴利達非所知也先生事父母至孝喪葬一遵古禮兄殁撫兩從子如子崇禎末蜀大疫里有一室七人同日併命者先生往經紀其喪無所畏避先生父病彌留舉逋欠契莂百紙悉焚之曰天災流行變難將作吾得正首丘幸矣彼窶人子勿更苦之先生泣受教及獻賊躪蜀屠戮靡孑遺胔骼狼籍道路亂定先生率童僕躬自收瘞匝月乃畢將瘞雲雷驟作雨大至先生跪禱曰天豈不欲刧餘枯骨復於土耶抑某心未誠不蒙神鑒耶禱竟而霽人皆異之先生自祖父隂行為善至是益好行其徳大亂之後家僅具饘粥而親黨之不能葬不能婚嫁者賙給無倦色鄉人以不平来訴先飲之酒乃婉言以明其是非人率悦服一邑化之以鬭爭為恥獄訟為之衰息康熙十三年呉三桂作逆偽檄至蜀脅士大夫先生挈諸子遁山谷以免亡何賊平先生天威撻乃復故廬謂心抃曰出而仕矣心抃令太平以課伐四方寜謐子可以最入為兵科給事中守先生之教罔敢隕墜其以給事需次歸也先生教之曰小子幸叨聖恩備員諫官補闕拾遺是其職也勿黙黙則曠官勿激激則近名小子慎之心抃居門下省一載章十數上皆闗天下大計而立言一本忠厚識者謂得諌官之體蓋先生之教也康熙三十三年心抃奉簡命視河工於淮揚明年二月還京師而先生考終於家無疾坐逝若禪定然銘曰南岷之山靈氣輸國僊人所家以葆厥真行同王烈居近何岷孰云幽宫閬臺與鄰華表歸来福爾後昆李仙根王璲暨元配熊氏墓誌銘公諱璲字元佩號子荆明大司徒希泉公之仲子也大司徒子六人公最賢歴官中外所至輒有政聲退處三十年日以著書為事絶不與世通而宇内談經濟風雅者莫不推蜀北子荆先生云自西南播亂蜀道阻絶余官京師望故鄉如異國庚申大兵平蜀越一嵗而公訃至今夏冢君以誌銘請於余於戲余與公有世好之誼素所景仰其公之可傳者皆見之余文也微斯請余亦烏可辭謹按狀曰王氏系出瑯琊宋南渡入浙元末入蜀居廣安世以科第顯至司徒公益盛公負姿淵穎十嵗餘博通羣籍補博士弟子員時司徒公官於朝公侍太夫人有小失受責不敢起太夫人病奉湯藥衣不解帶司徒公卒於任聞訃哀毁骨立往返數千里奔喪扶櫬請誥請䘏以至經營壠墓事事咸當是時公方二十許而練達恒如老成人非其純孝誠篤出於天性者然耶服闋以明經承門䕃初授順天治中再移南户部江西司主事督常徳銅差一時聲譽籍甚旋丁太夫人艱歸起南户部新餉司郎中遷廣西左江道未任國旅食江南絶意仕進强之始起授江西驛鹽副使初當道聞其才名屢公訪求驛政最急者莫如黄快丁每因漕累破家而舊設沿江諸驛往来悉索靡寜公分别黄運一倣雨田倪公法漕撫以庇䕶快丁劾奏吏議終直公勒為令典名船政新書改金陵三驛設城内多寡之數悉由官府不能强驅一人江寜食鹽苦商人高下公阻商餽聴民自為便宜尋擢荆南大叅去之日老幼擁道為立仁壽祠江寜人至今尸祝之入楚駐節澧州時黔蜀未歸版圖密邇巨寇先是官兹土者駐澧市寇来登舟公率士民歸城闢官舍創學校備戰具給牛種以屯田暇則與詞人酬處盤錯棘手時晏如也慮者以澧斗大孤城公文儒長者猝有變當奈何而流冦王進財張光華果率精鋭三萬薄城下公冐矢石指揮士卒相持兩月突出竒兵大捷於洋湖口八戰八克進財走死光華僅以身免一時推公知兵楚中方以為長城不意為讐家所中解官後益肆力於古學與呉人邢昉周景濂顧夢㳺豫章周亮工陳伯璣楚人王天庚嚴平子張禎曹國樸蜀人尹子求范文光李長祥輩稱詩揚㩁論難絶去畦町而旁及西洋勾股岐黄養生堪輿家言法書名畫種植修造靡不究習著述三千餘種皆確期有裨於世用公之長兄璟河南項城縣令三弟珣貴州普安道四弟瑨雲南順寜太守五弟瑊廩生六弟瓘庠生公年七十追念升沈半在患難而諸昆弟存亡散失天各一方西望大司徒墓誰為掃者輒愴然泣下遂攜歸廣安樂兔山山水佳勝用西洋法築生壙一區辛酉九月疾作奉遺命卒後三日歸􅉎公時年八十二嵗元配恭人熊氏先公二十年卒於澧浦癸亥春冢君有師扶柩至起壙祔葬焉公五子五女長有師貢生熊氏出次有鼎庠生趙氏出三有馮壬子舉人四有章庠生周氏出五有經庠生李氏出長女有崑適舉人宋起莘子詰庠生熊氏出次女有峑適梁山進士暴巖高公匹子商南知縣宗梅有芷適富順翰林雪灘陳公三子庠生厥有蘅適叙府進士凌霄宗公三子太學生之瑚有蓀適泗州教諭佩公顧公仲子庠生清江俱周氏出孫十一人長鏞庠生有師出次鑄庠生鋐鎮有馮出鎔鎬鉞鑑錬鐘有章出銑有經出重孫懷仁鏞出余嘗聞公好義樂施周人之急恤人之難如迎明季殉難河南大中丞文岳楊公汝寜刺史世琮王公喪治棺殯送歸蜀土代部吏償官逋三百金以全二女仍為擇士厚資奩嫁此其較著者也署江南臬司時有常熟大宗伯牧齋錢公為豪滑所訐公極力䕶持置訐者於法錢公致千金謝不受又輦古玩好重千金拒益堅錢喟然嘆曰希泉公可謂有子矣其生平蓋如此惜中道坎壈齟齬卒不得竟用以展其所學嗚呼豈非天哉銘曰惟彼砥柱狂波不折鋒鍔雖弢考終大耊兔山峩峩兮江水冽恭人楚歸獲同穴相白雲之捲舒而云胡不悦祭文冀應熊祭簡州濟川橋孤魂文大凡國家祀典各有攸屬嵗序舉行亦有定隅即如無祀孤魂因時設祭府屬之内原立郡厲州厲邑厲之壇時嵗之中聿定清明中元冬初之節非其地則祭為無名非其官則祭為失禮兹以郡守而致祭州厲以侵屬僚之權且於橋下而設祀孤魂爰失定制之體然而禮以義起祭以情通是則今日郡守之祀孤魂於橋下也請得言其説予於是嵗之七月十有二日因督修浮橋危坐江濱遂進父老而詢地方艱苦適有嵗進士李為楫等博士弟子員李開恒等垂涕而道曰簡自甲申嵗遭獻逆犯蜀設為水軍二都督屯駐灌水壩勦殺九井之居民至乙酉偽令盡勒各邨衆姓入城仲冬發賊兵抵簡驅兩城紳衿百姓男婦老穉盡填濟川橋下赤水為之不流可憐盈萬生靈悉成寃鬼闔簡無祀孤魂俱在此一泓浩淼中爾予聞之不覺潸然淚下嗟此黔黎何遭刧運至此耶夫守土而不能使生者安居死者瞑目亦焉用長民者為哉矧此盈萬寃魂屈沈廿載求脱生而未能望享死而難得呻吟於星月之下呼籲於汪洋之中積怨氣以干天和聚厲鬼而為人祟不但死者難伸其寃即生者莫寜其宇興言及此負咎未遑又奚暇計非其官非其地之為嫌也然更可異者予方與州牧州尉及學博共議延僧設醮大放河燈施食而濟川橋下忽水湧尺許若有物焉以伸首者數四衆皆驚視迨遣人渡筏往覷之則杳然止水耳噫嘻此非二十年前諸寃鬼若有所聞而引領以待之也耶洵若此則予今日之祭正所謂禮以義起祭以情通而地適當其地官斯服其官者矣時州牧進曰浮橋成而上下不病涉孤魂祀而生死悉銜恩厥功普哉予曰不然予匏羈守土之官也使非有郊迎撫憲之行予曷由而至簡非有藩臬兩臺督橋之委予又安能以旬日留簡非有諸父老環泣而道予又何事而有祀於簡則此一役也實諸上臺有以相成予不過宣上之徳意以順下之輿情而已予何敢貪天功焉因請列銜以誌之遂為之致誄辭曰咨爾孤魂罹兹異刧匪人是尤實天作孽天降喪亂産彼無良檮杌獍梟屠此一方老穉何辜羣膏血刃窮谷荒村搜羅畢盡嵗屆乙酉偽令仇民厥凶降簡促野歸城遄發冦兵四圍邏集烈焰燭天兩城如炙中間赤水橋曰濟川焚梁燬屋百刃共淵哀我士民莫分男婦驅納溝中屍填可渡十千慘鬼廿載淵沈洪滔碧血白骨青燐上下隨波遊魂莫止夜月凄風誰焚陌紙予役陽安徒杠河畔諮諏民艱凶矜是念方延寶筏度兹羣靈霎時浪湧白日現形幽明罔殊人鬼一理綏爾九泉寜我百里爰商牧屬勷此良縁拯援諸苦以控於天伏願神祇洋洋降鑒拔此孤魂式登彼岸諸魂目瞑戾氣以銷四方生聚共享熙皥雜著李蕃通江縣星野考舊志曰古壁州居鶉首之次天文井鬼分野入參七度按班固天文志觜觿參益州東井輿鬼雍州按東坡指掌天象分野圖云觜參星曰實沈州曰益州官曰隂陽時曰申是益為實沈之次也井鬼星曰鶉首州曰雍宫曰巨蟹時曰未是雍為鶉首之次也而唐史謂觜觿參伐實沈也自畢十度餘八百四十一杪四之一參七度終東井十一度為秦晉其地上應天闕東井輿鬼鶉首也自東井十二度餘二千一百七十二杪十五太中東井二十七度終栁六度自漢三輔及北地上郡盡巴蜀漢中之地古秦梁芮豐扈密庸蜀羌髳之國自漢中東盡華陽與鶉首相接又謂興元府下金洋鳯與利集壁巴等二十州為鶉首由此舊志所以謂為井鬼分野也又按二十八辰分野之圖云自畢十二度至井十五度為實沈而分注之云益州永興河東河西北路是自井十六度至栁八度為鶉首而分注之云雍州永興五路及四川似以益與四川分為二而躔度幾不可攷今按晉志十二次度數及州郡躔次以十二辰配十二野則通江而上如保寜似非井鬼分野也今以觜參井鬼之次言之本圖云益州入參七度廣漢入觜四度越巂入觜三度蜀郡入參一度犍為入參三度牂牁入參五度巴郡入參八度漢中入參九度未嘗為井鬼分也而井鬼為秦雍州雲中入井一度定襄入井八度上黨入輿鬼二度是井鬼為秦分而觜參為蜀川無疑惟以輿地騐之觜參為魏分魏在三河之間越秦漢而與蜀益同一分野是難以詰辨即入參七度以巴郡漢中之分考之亦微有不合噫人無甘石之學而欲試推步之法其不為識者所笑乎謹因所見而附於後以俟後之君子記觜參應為實沈之次其曰鶉首從唐書也史正義星經云畢觜參魏之分野益州東井輿鬼秦之分野雍州禹穴辨蕃二十而南遊江淮上㑹稽探禹穴闚九疑子長之自叙所謂足跡半天下也後人不察止以意為㫁若曰上㑹稽而探禹穴云爾如呉越春秋謂宛委山有一穴探不見底謂之禹穴括地志謂山中稽探又有一穴深不見底謂之禹穴史遷云上㑹禹穴即此穴也而五帝紀張晏謂禹巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴皆誤讀史記而禹穴遂誤在㑹稽矣今詳考諸書如左易林大禹生石夷之野正義禹名文命字密身長九尺二寸西夷之人也帝王紀禹以六月六日生於石紐身長九尺二寸西夷之人也蜀王本紀禹本汶山郡廣柔縣人也生於石紐括地志茂州汶川縣石紐山在縣西七十三里華陽國志大禹生於石紐今夷人共營其地方百里不敢居牧至今猶不敢放六畜東漢書戴良字叔鸞汝南人嘗自比若仲尼長東魯大禹生西羌水經注禹生於蜀之廣柔縣石紐邨一統志禹穴在石泉治之北大禹生此外書升菴著廣柔隋改汶川今之石泉縣也石紐邨今之石鼓山也其山朝暮二時有五色霞氣又有大禹採藥亭在大業山其地藥氣觸人往往不可到禹穴者禹蔵書之所也按正義禹至衡山夢見繡谷男子自稱元夷蒼水使者卻倚覆釡之山東顧謂禹曰欲得我山神之書者齊於黄帝之岳巖石之下三月季庚乃登宛委之山發石得金簡玉字以知水泉之脈及治水功成乃蔵書於所生之地焉按廣輿記㑹稽之穴石如臼可知非蔵書所也張鵬翮治鏡録功過格其傳已乆自了凡袁氏力行有效而後之士大夫往往重行之然袁氏以儒而惑於釋氏因果報應之説以勸誘後人後人亦皆習焉不察夫為善而有祈福之念則其為善也必不公去惡而有畏禍之念則其去惡也必不誠以不誠不公之心存於中而徒以為善去惡之事勉强致飾於其外吾恐其功日微而過日滋矣奚取夫日懸一格而丹黄識之曰某事為功若干某事為過若干哉近有刋布當官功過格以風於百爾有位者予覽之而深嘉其意又惜其仍惑於釋氏之説而不本於儒者正誼不謀利明道不計功之㫖乃為之易其説以進焉夫人之居恒功過其所係猶輕而當官者之為功過也不綦艱且鉅哉治一邑者以一邑為功過治一郡者以一郡為功過上之居方面之任則其功過有愈大者焉更上之而處輔弼之位則功過又有愈大者焉要其本不越於一心而已茍能以虛心講求以實心幹濟以精心照察以公心推行毋沽名毋懼謗母矜已毋狥人總以上不負國下不負民而為清夜自矢之素縱未敢言功亦可以無大過矣功過格雖不設可也雖然功過之成其相懸幾若河漢而功過之始其相别僅同淄澠是以古之上哲盤盂几杖銘誦箴䂓猶且觸於目警於心朝夕罔敢豫怠而况其下焉者乎茍任其氣質之偏憑胸臆以行之而非有學問察識之功則居官臨民之際一切兵刑錢穀禁令興革之宜自謂可以有功而每以隠伏其過於不覺後雖悔之而無及矣曾子曰吾日三省吾身孟子曰行有不得者皆反求諸已是故格物致知正心誠意當功過未形之先而所以密其存養者不可以一偶怠也審擇義利堅持取舍功過將形之初而所以嚴其省察者不可以或忽也昔者董安于性緩佩弦以自急西門豹性急佩韋以自緩皆將以矯其偏而約之中而唐太宗之言曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失今兹記功書過之格其亦古人韋弦之意而以備當官者之一鑑殆不為無助乎倘必曰如此而有功如此而無過如此而可以邀福可以遠禍則行道而有市心非予之所願聞也高人龍梁山縣學碑記聖人之道通天地亙古今合遠邇無有乎或遺無有乎或間者也天得之而永清地得之而永寜凡日星河嶽之大以及昆蟲草木之細莫不賴斯道焉以範圍而曲成之羲農而上無論矣爰自三代以迄於今凡紀綱法度之端政教禮樂之統莫不賴斯道焉以經緯而損益之至於通都大邑文物殷繁僻壤遐陬山谷深阻諸凡鄉黨室家之内日用飲食以及風謠習尚之間循斯道則治悖斯道則亂蓋天下一家家一人人一心也大哉聖人之道孔乎而集羣聖之大成開百代以立極者惟我徳報子故帝王南面而治天下必建學秩祀而崇功之無盡者洵識其本已天子之學曰成均諸侯之學曰泮宫黨有庠術有序家有塾蓋天下無可不學之人亦無可不學之地而時代之升降氣數之盛衰鮮不由之自秦以還馬鹿甫定太牢肆興橋門之盛比隆三古若唐若宋皆其選也慶厯中詔令天下州縣立學迄今遂為定制顧古今之學雖同而古今之教則異矣周禮大司徒以鄉三物教萬民而賓興之初一曰六徳次二曰六行次三曰六藝以故人材輩出風俗寖美馴致治隆化治而比屋可封夫亦恃有此具焉耳自科舉法興上之選舉恒於斯下之仕進恒於斯相沿既乆於是逢掖之徒胥視學為梯榮干禄之徑父教其子兄教其弟類弄筆墨拾青紫以相與為光寵而止豈惟六徳六行之不講即所謂六藝者較今帖括之文為何如也人材將何由而盛風俗將何由而美哉雖然亦患在不知聖人之道耳聖人之道在六經六經之理則皆具於人之一心由修悖而有吉凶是謂心易由得失而有因革是謂心書由善惡而有美刺是謂心詩心有是非春秋因之以作心有中和禮樂因之以起聖人以其心詔乎天下後世者可謂詳且切矣夫人不能自見其心故無由以見聖人之心因不知有聖人之道何怪乎離經畔道而惟利欲之歸也嗚呼利欲之蝕人心乆矣一旦欲舉而廓清之舍學無由舍學而求諸本心之正更無由學者誠能由心之存以驗心之發體之以誠守之以敬擴而充之以勇將所謂六經以及六徳六行六藝者皆在是矣處而士習以端出而治功以懋即於科舉中取之何不可者然則科舉何足以累人哉亦人之自累實甚耳吾梁為東川鉅邑舊學在城南隅明末流冦蹂躪殿堂銷燬國朝初甫平蜀疆庶務草創迨文廟僅屋三楹為春秋祭奠之所兩廡㦸門以師生之舍庖湢之屬聖㮣皆闕如於是邑侯王君若羲瞿然懼無以妥靈倡教化稱天子一道同風之指肆首捐資庀材鳩工以次葺治之匪直為觀美而已蓋以移風俗育人材俾梁之人有所觀感而興起也故予為之記以諗里人俾落成而刋諸石使知返求諸一心而聖人之道乃賴以不墜云吕潛高惕菴語録序讀惕菴語録而不腠斯道盛衰之感也鄒魯既遠言人人殊惟河汾濂洛諸君子起頗得千載已墜之緒繼是名儒輩出臯比日新明三百年間河東姚江最著沿及末流不無龎襍之譏迄於今而遂成絶響矣夫道學之敝也名盛而實已衰吾甚疑乎其實亦實亡而名且並廢吾又惜乎其名至於名廢而世遂不知講學為何事輒相與非而笑之人心之不醇風俗之不古由此其故也梁山高子惕菴有憂之於是毅然以講學為己任捐鏹葺屋日與二三門人講習其中遠近向風駸駸有昔賢之遺軌焉李子仙根録其答問之語顔曰惕菴語録余得受而卒業焉見其迎機導窽則庖丁之無全牛也芟繁黜異則迅風之掃秋籜也抑且單詞隻語居要不煩則又對東郭順子而令人之意消也雖惕菴之學不盡於問答即當時之問答亦不盡於此録而此其類著矣吾蜀固多君子伊川客涪而易學愈進嘉靖南充少海任公瀚倡道經筵已而乞休講學五十餘年著述甚富梁邑瞿塘来公知徳早領隆慶壬子鄉薦中年著有易註日録諸書惕菴生来公之鄉宜其後先競美也夫李仙根高霖公廬山紀遊跋昔覽廬山志王弇州有紀無詩鍾退谷有詩無紀採者之遺耶兹山靈勝筆不能盡耶抑各有所限耶霖公先生高才積學當代偉人山川清興著作如林數日間兩遊廬嶽雖未能即窮其勝然星渚以南潯陽以北亦佳處領其要矣詩宗唐音鏗訇俊逸妙絶一時紀崇正學懷大雅有侃然自任之心凡神竒仙佛之説皆屏而不録豈非儒學之正宗乎至流連泉石詠嘯雲烟則又未足為霖公先生稱詡矣四川通志卷四十七
